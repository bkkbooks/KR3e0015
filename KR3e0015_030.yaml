body:
  text: 外臺秘要方卷二十六唐王燾撰五痔方一十二首崔氏論曰凡痔病有五若肛邊生肉如鼠乳出孔外時時膿血出者名牡痔也若肛邊腫痛生瘡者名酒痔也若肛邊有核痛及寒熱者名腸痔也若大便輒清血出者名血痔也若大便難肛良乆肯入者名氣痔也此皆坐中寒濕或房室失節或醉飽過度所得當時不為患乆乆不差終能困人别有大方今單行亦要便宜依按用之肘後集驗同出第四卷中廣濟療五痔方生槐煎五分皂角二兩炙去皮子麝香研鰻鱺魚炙雄黄研莨菪熬丁香木香各二分右八味擣篩以槐煎和丸分為五丸取一净瓶可一升以耒掘地埋之著一疊子於瓶上鑚疊子作孔内火瓶中灰盖之然後内藥一丸燒以下部著疊孔上坐便通汗其盡一丸藥即止内痔以藥一丸内下部立效仍不及薫忌魚熱麫等又療五痔蝟皮散方蝟皮炙龜甲炙當歸各六分黄茋槐子大黄各八分蛇皮炙五寸露蜂房炙五分藁本桂心各五分猪後懸蹄甲十四枚炙右十一味擣為散空腹以米飲服方寸匕日二漸加一匕半不利忌如前方又療五痔下血不止方槐子五色龍骨槲葉炙令紫色乾薑芎藭當歸茜根呉茱萸各六分白歛附子五分炮黄茋八分大黄十分猪懸蹄甲十四枚炙髪灰四分右十四味擣篩蜜丸空腹以飲服如梧子二十丸日二漸加至四十丸若利恐多以意减之忌如前方出第四卷中小品療五痔散主酒客勞及損傷療下部中傍孔起居血縱横出方赤小豆四分熬黄茋三分附子炮白歛桂心各一分芍藥黄芩各二分右七味擣為散以酒服方寸匕日三止血大驗文仲同備急集驗同又方藜蘆大黄黄連各半兩練木子十四枚桃仁十四枚去皮巴豆四枚去皮心萆麻十四枚一名狗蜱右七味㕮咀以猪肪一升煎三沸下去滓𫝊贅肉上日三外著此膏内服紫參丸常併行古今録驗同又療五痔大便肛邊清血出紫參丸療不差服之無不差方紫參秦芁亂髪灰紫菀厚樸炙已上各一兩藁本二兩雷丸半升白芷一兩䗪蟲半兩熬貫衆三兩去毛猪後懸蹄甲十四枚炙䖟蟲半兩去翅足熬石南半兩炙右十三味擣篩以羊脊骨中髓合猪脂各半升煎和丸如梧子未食酒服十五丸日再亦可飲下劇者夜一服四日肛邊痒止八日膿血盡䑕乳悉愈滿六十日終身不復發乆服益善有痔病十八年肚出長三寸服此方即愈亦療脫肛有人熱可除羊髓以赤蜜代集驗備急千金同集驗療五痔有氣痔温寒濕勞即發蛇蛻皮主之牡痔生肉如䑕乳在孔中頗見外妨於更衣鼈甲主之牝痔從孔中起外腫五六日自潰出膿血蝟皮主之腸痔更衣挺出乆乃縮牡猪左懸蹄甲主之脈痔更衣出清血蜂房主之方右所主藥皆下篩等分隨病倍其所主藥為三分旦早以井花水服方寸七病甚者旦暮服之亦可至四五服唯得食乾白肉病差之後百日乃近房室又用藥内下部有瘡内中無瘡内孔中千金删繁文仲同又方野葛末右一味以刀圭内藥中服五日知二十日差三十日愈徐安用之良千金同又方煮槐根洗之又煮桃根洗之千金備急同並出第九卷中刪繁療五痔桃葉蒸痔方桃葉一斛細糠胡麻各一斗熬右三味合為一家蒸之取細糠熟為度内小口甕中將肛門坐桃葉氣熏入肛門蟲出當死出第十七卷中千金療五痔方蝟皮三指大切熏黄如棗大熟艾一握右三味穿地作坑調和取便熏之取口中熏黄煙氣出為佳火氣稍盡即停三日將息更熏之三度永差勿犯風冷羹闕臛將補慎雞猪魚生冷又方桑耳右一味作羹空腹下飰飽食之三日食之待孔卒痛如鳥喙取大豆小豆各一升合擣作兩囊中蒸之及熱更互坐之即差並出第二十四卷中五痔數年不差方六首深師療五痔數年不差槐子丸主燥濕痔痔有雌雄為病苦暴有乾燥腫痛者有崩血無數者有䑕乳附核者有腸中煩痒者三五年皆殺人忌飲酒及作勞色犯之即發方槐子乾漆熬榝木根皮各四兩一名榝子即茱萸秦芁黄芩白歛青木香牡蠣熬龍骨附子炮八角者雷丸蒺莉子白芷桂心雞舌香各二兩黄茋二兩右十六味𢷬篩蜜和為丸一服二十丸日三服千金翼同千金翼有丁香茱茰根皮無雞舌香榝木根皮千金小槐實丸主五痔十年方槐子三斤龍骨十兩礬石燒硫黄各一斤白糖二斤大黄十兩乾漆十兩熬右七味擣篩石二種及糖並細切内銅器中一石米下蒸之以綿絞取汁以和藥合作丸併手捻之丸如梧子大隂乾一服二十丸日三服深師同又槐酒主五痔五十年不差方槐東南枝細剉一石槐東南根細剉二石槐白皮剉一石槐子一石右四味大釡以水十六石煮取五石澄取漬更煎取二石六斗炊兩石黍米上麫二斗釀之攪令調封泥七日酒熟取清飲日三四適寒温量性常令小小醉耳合時更煮滓取汁濤米洗器不得用生水此藥忌生水故也深師并翼同又方塗熊膽取差乃止但發即塗一切方皆不及此救急并翼同並出第二十四卷中古今録驗療三十年痔肛出下血如雞肝此腸痔肛邊生痤横肛中此牡痔肛邊生乳此牝痔皆飽勞氣所生方大黄如金色者十兩滑石七兩研碎芒硝三兩桑白皮二兩棗三十枚黄芩五兩杏仁二兩研右七味切以酒一斗二升煮取二升盡服之當下又療十年痔如䑕乳膿出便作血劇白歛散方赤小豆四分黄茋三分芍藥二分白歛二分黄芩三分桂心三分附子炮牡蠣各二分熬右八味𢷬篩為散酒若泔汁服方寸七日三服並出第三十卷中五痔脱肛方二首千金療五痔脱肛槐皮膏止痛痒血出方槐白皮二兩薫草辛夷甘草白芷各半兩野葛六銖巴豆七枚去皮漆子六枚桃仁十枚去皮猪脂半右十味切以猪脂煎三上三下去滓以綿沾膏塞孔中日四五過蟲死差止痒痛大佳出第二十四卷中必效五痔脱肛方以死蛇一枚指大者濕用掘地作坑燒蛇取有孔板覆坑坐上蟲盡出張文仲處出第六卷中腸痔方一十五首肘後療患腸痔每大便常有血方以蒲黄水服方寸七日三差備急文仲崔氏千金古今録皆同又方礬石熬附子炮各一兩右二味𢷬篩蜜丸如梧子服二丸酒下日三稍増百日永差不發備急文仲崔氏千金同又方以鯉魚作鱠薑虀食之任性多少良崔氏用鱔魚又方常食鯽魚羹及蒸隨意任之備急文仲同並出第三卷中文仲療腸痔方以槐木上耳擣末飲服方寸七日三肘後古今録千金同又方白薔薇根枸把根各二分暴乾右二味擣篩為末服方寸七日三五六日當更小腫是中病崔氏備急肘後同又方生地黄一斤切酒二斗右二味以酒漬地黄三日隨意飲多少即差肘後備急同又方取枳根皮末飲服方寸七日三亦可煮汁常飲肘後備急崔氏皆同備急療腸痔方以穀子燒末𫝊之深者導之文仲崔氏同又方以槐白皮一擔剉水煮令濃脫衣入中坐當如欲大便狀冷更易不過三蟲出又方𢷬槐白皮作屑粉以導之崔氏文仲千金必効同又方以蘩蔞燒灰礬石熬和為粉粉之崔氏文仲范汪同出第六卷中刪繁療肺虚勞寒損至腸中生痔名曰腸痔肛門邊有核痛寒熱得之好挺出良乆乃縮而瘡生猪懸蹄青龍五生膏方猪懸蹄甲三枚炙生梧桐白皮四兩生龍膽五分生桑白皮五分蛇蛻皮五分雄黄五分生青竹皮六分生栢皮七分炙露蜂房炙蜀椒汗各三分蝟皮附子㚿各四分杏仁二十枚去皮右十三味細切綿褁以苦酒二升浸一宿於火上炙燥𢷬篩以猪脂三升和㣲火煎之如薄糖𫝊并酒服如棗核出第七卷中崔氏療大便後出血此腸痔之疾宜服薤白湯方薤白切七合羊腎脂一升右二味緩火煎令薤白黄去滓頓盡未差更服即止得膿血與糞相和即差又方白礬燒汁盡附子炮去皮乾姜各一兩右三味𢷬篩蜜和飲服二丸至三丸日二服並出第四卷中諸痔方二十八首廣濟療痔下血方以蛇不問多少煎煮肉消盡去滓用汁和婆羅粥著少塩食之大效一無所忌又黄茋丸方黄茋枳實炙各三兩烏蛇炙當歸赤石脂各二兩蝟皮二兩炙右六味𢷬篩蜜丸空腹酒下如梧子二十丸二日服更不加減並出第四卷中范汪療痔下血黄連麯散方黄連二兩麯一兩右二味擣篩薄蜜溲先食以飲服五分七日三不知増至方寸七集驗療痔蝟皮丸方槐子三兩附子炮二兩當歸二兩連翹二兩乾地黄五兩乾薑二兩礬石二兩燒令汁盡續斷黄茋各一兩蝟皮一具細切熬令焦右十味𢷬篩蜜丸飲服十五丸如梧子日再加至三十丸亦可主瘻常用大驗肘後備急文仲删繁千金古今録驗同又方以生槐皮十兩削去黒皮熟擣丸如彈子綿褁内下部中大效備急千金同又方以槐赤雞一斤為散飲服方寸七千金云槐糯也千金療痔神方以七月七日多採槐子熟擣涎取汁重綿絞内銅器中盛庭中髙門上暴之二十日以上煎成取如䑕糞大納穀道中日三亦主瘻及百種瘡救急崔氏古今録驗同又方鯉魚腸三具以火炙令香右一味以綿褁内下部中一食頃蟲當出魚腸數數易之盡數枚當差一方云坐上蟲出古今録驗同又方虎頭骨炙犀角右二味各為末如雞子大以不中水猪脂和塗瘡上即差救急深師同並出第二十四卷中崔氏療痔方雀林草一大握粗切右一味以水二大升煮取一升頓服盡三日重作一劑無不差者又方取駱駝頷下毛燒作灰可取半雞子大酒和頓服之並出第四卷中必效熨痔法痔頭出或疼痛不可堪忍方取枳實煻灰中煨之及熱熨病上盡七枚立定發即熨之永除也又方以麝香當門子印成鹽相和以手塗痔頭上若令人著亦佳其痛不可忍者不過兩度永差又方以野猪肉炙食十頓即差三方云奇效又方取五月五日蒼耳子隂乾擣末水服三方寸七日三差乃止又方以二十年乆鍼線袋口燒作灰分和水服又痔正發疼痛方以葱和鬚濃煮湯置盆中坐浸之須臾即當痛止又方以狸肉作羹食之或作脯食之不過三頓無不差又方以肥大棗一顆剥去赤皮取水銀掌中以唾研令極熟塗棗瓤上内下部中差又方以萹蓄根葉𢷬汁服一升一兩服差又方薑屑二兩右一味以水三大合煮之取一合去滓煖空腹服隔日再服忌猪肉蒜等又方倚死竹色黒者取之折斷燒為灰篩和薄飲服之方寸七忌牛肉餘無所忌出第三卷中古今録驗療痔黄茋丸方是直殿中省散騎常侍郎甄立言處黄茋青箱子漏蘆鼈甲炙狼牙各五分黄蘗四分犀角屑八分班猫去足翅熬蝟皮四分炙白礬十分燒去汁芫青去足翅熬地膽去足翅熬蜈蚣各十枚炙猪懸蹄甲七枚炙右十四味𢷬篩為散蜜和丸如梧子大空腹以飲服二丸日二増之以知為度忌一切油膩莧菜又方掘地深一尺圓徑四寸炭火燒令赤去火以魚簿著口上取莨菪子一合内坑中燒煙出痔人坐上以被擁當汗出密室内作之以煙盡更著一合莨菪子熏避風如發汗法則差又療諸痔及下血不止轉虚羸者服之無不效方黄茋枳實各二大兩半細剉熬令黄黄礬石一大兩炭火燒經一伏時仍數翻轉令匀著火冷訖細羅去沙浄右三味先擣黄茋枳實篩訖然後和礬石更擣匀蜜和丸空腹以酒下二十丸加至三十丸日再服忌蕎麫猪肉蒜魚勞事惟乆服一年半年愈良驗又療痔方鯉魚腸可半升右一味擇之令浄仍新鮮取一方板可濶二尺以來厚二寸當中鑿孔深一寸半圓如醬盞口大布魚腸於其内以好麝香碎末滲魚腸取厚毡二三重當心開孔可板孔大小舖坐以被擁之數進食可至兩炊乆覺下部痛者即是䖝出也時且更坐良乆取魚腸細擇之恐䖝入於腸中䖝可長一二寸許細如網絲班作五色每出不過十餘枚不問度數䖝盡則止許仁則日此病有内痔有外痔内但便即有血外有異外痔下部有孔每出血從孔中出内痔每便即有血下血甚者下血擊地成孔出血過多身體無復血色有痛者有不痛者有此候者宜依後藥方生槐子一斗候未堅硬時採右一味𢷬令碎絞取汁日暴取稠取地膽暴乾𢷬篩為散和槐子煎作丸以飲服十丸日再加至三十丸如桐子大兼以煎撚作丸如棗核大内下部中日夜三四度亦可𢷬苦參末代地膽依前生槐子煎不覺可宜合後黄茋十味散服之方黄茋五兩苦參𤣥參各六兩附子炮大黄各三兩乾薑二兩蝟皮炙二兩黄連四兩槐子六合猪懸蹄甲一具炙右藥擣篩為散空腹以飲服方寸七日再服之漸漸加至二七忌猪肉冷水出下卷中痔下部如蟲齧方九首肘後療痔下部痒痛如蟲齧方胡粉水銀右二味以棗膏調匀綿褁夜卧内穀中導之效崔氏同又方以莵絲子熬令黄黒末以雞子黄和塗之集驗文仲備急范汪崔氏等同又方以杏仁熬令黒𢷬取膏塗之集驗備急文仲崔氏同又方以蝟皮燒灰傅之又獺肝燒𢷬散服之崔氏備急文仲同又方以溺温令熱内少礬石以洗之良崔氏同並出第二卷中文仲療痔下部如蟲齧方𢷬桃葉一斛蒸之令熱内小口器中以布葢上坐之蟲死即差肘後崔氏備急同一方有烏梅又方掘地作小坑燒令赤以酒沃中𢷬呉茱萸三升内中及熱以板覆上開一小孔以下部坐上冷乃下不過三度即差肘後崔氏備急同又方以小豆一升好苦酒五升煮豆令熟出暴乾復内令酒盡止𢷬末以酒服方寸七日三崔氏備急同又方以猪椒子一升酒一升漬經五日稍稍飲一日令盡佳崔氏同出第六卷中大便下血風冷積年變作痔方三首崔氏療大便急去血或至一升數合而少血色此是内傷風冷積年多變作痔方大黄五分甘遂三分黄芩二分乾姜附子各四分炮桃仁三七枚去皮尖葱白七莖右七味以水六升煮取一升半先服半升藥稍安又服半升須臾血發又服半升未㫁候發日再作不過三劑差忌猪肉等又方煮桃皮李皮篇蓄苦參取汁漬之大佳出第四卷中備急療大便血風冷積年多變作痔方燒稻藁灰淋汁煎熱漬之三五度佳崔氏肘後文仲同灸痔法方二首崔氏灸痔法以繩圍病者項令兩頭相拄展繩從大椎正中量之垂繩一頭當脊正下以墨㸃訖又量病者口兩吻頭接繩頭正下復㸃之又量病者口吻如前便中屈繩接前口吻繩頭正下復㸃之望使相當所三處並下火重者各五百壯輕者三百壯即愈又法令疾者平坐解衣以繩當脊大椎骨中向下量至尾株骨尖頭訖再折繩更從尾株尖頭向上量當繩頭正下即㸃之高虢州初灸至一百壯得差後三年復發又灸之便㫁兼療腰脚並出第四卷中雜療痔方五首廣濟療痔瘻疽瘡方光明砂别研麝香當門子别研蛇皮五月五日者熬右三味等分研先以鹽湯洗拭乾於瘡上傅少蜜以散傅上差止小品療穀道中痒痛痔瘡槐皮膏方槐皮五兩甘草當歸白芷各二兩陳豉桃仁各二十粒去皮赤小豆二合右七味剉以猪脂二升煎候白芷黄膏成去滓以塗之日三度集驗同刪繁療虚勞寒下痢不止肛邊轉生肉如䑕乳在大孔傍時時膿出名牡痔鼈甲丸方鼈甲炙乾地黄黄連連翹各七分括樓黄茋乾姜各六分蠐螬五枚炙猬皮炙續㫁各五分附子炮槐子礬石燒汁盡各四分右十三味𢷬篩以蜜丸如梧桐大飲下二十丸漸加至三十丸日再忌如常又療腎勞虚或酒醉當風所損腎藏病所為酒痔肛門腫生瘡因酒勞傷發㵼清血肛門疼痛蜂房膏方蜂房三兩炙生槐白皮十兩練實桃仁各五十枚熬白芷二兩赤小豆一合碎猪膏一升半右七味㕮咀綿褁以苦酒一升漬一宿下膏煎取酒盡膏成去滓取杏子大綿褁内肛門中又酒服一方寸七出第三卷中必効療痔及諸蟲方石榴東引根深者取一握右一味勿令見風拭去土挫又取鹿脯四指大一片炙兩畔令熟搥碎擘以水三升煮取一升適寒温空腹頓服之其患痔盛發者服即定諸蟲無問赤白並出差出第三卷中脫肛方三方病源脫肛者肛門脱出也多因乆痢後大腸虚冷所為肛門為大腸之候大腸虚而傷於寒痢而用氣􅀈而氣下衝則肛門脱出因謂脫肛也出第十七卷中小品療脱肛熏方以女萎一升以器中燒坐上熏肛門即愈范汪集驗千金同出第十卷中刪繁論曰肛者主大便道肺大腸合也號為通事令史重十二兩長一尺二寸廣二寸二分應十二時若藏傷熱即肛閉塞大便不通或腫縮入生瘡若腑傷寒則肛寒大便洞㵼肛門凸出良乆乃入熱則通之寒則補之不虚不實依經調之療肛門主肺熱應肛門閉塞大便不通腫縮白蜜兊通之方以白蜜三升煎令成乾燥投冷水中可得丸長六七寸許兊肛門中到身中向上入頭向下停少時兊烊斯須即通泄千金同出第三卷中千金療肛出方磁石四兩研桂心一尺蝟皮一枚炙黄右三味篩為散服方寸七一日服十服即縮勿舉重須㫁房室周年乃佳出第二十五卷中肛門凸出方三首刪繁療肛門主大腸寒應肛門寒則洞㵼凸出猪肝散方猪肝一片炙令黄燥黄連阿膠炙芎藭各二兩烏梅肉五兩熬艾葉一兩熬右六味擣篩平旦空腹温服方寸七日再若不能酒白飯服亦得千金同出第三卷中千金肛門凸出壁土散方故屋東壁土一升碎研皂莢三挺長者右擣土為散褁敷肛門其頭出處取皂莢炙煖更遞熨之取入則止又麻履底按入方麻履底鼈頭一枚右二味燒鼈頭為散敷肛門凸出頭炙履底以按熨令入永不出矣並出第二十五卷中卒大便脫肛方六首肘後療卒大便脱肛方灸頂上迴髪中百壯又方以豆醬清合酒塗之文仲備急同又方燒虎骨末水服方寸七日三即差范汪療卒大便脫肛方以縁桑枝螺取燒末猪脂和敷之立縮亦可末以粉之備急張文仲同出第三卷中千金療卒大便脱肛方以猪膏和蒲黄敷之指推内之但以粉粉之亦佳張文仲備急同又方灸鳩尾骨上七壯備急文仲集驗同出第二十五卷中腸肛俱出方二首肘後療若腸隨肛出轉廣不可入一尺來者方擣生括樓取汁温服之以猪肉汁洗手隨抑按自得入効范汪小品張文仲備急千金同備急若腸隨肛出方熬石灰令熱布褁熨之隨按令入冷即易小品文仲備急同出第八卷中脫肛歴年不愈方三􅔣集驗療脱肛歴年不愈方以上鐡三斤以水一斗煮取五升以洗之日再范汪千金備急文仲同出第六卷中千金療脫肛歴年不愈方以死鼈頭一枚燒令煙盡作屑以敷肛門上手按之令入兼灸横闕骨百壯又方以鐡精粉上按令入即愈並出第二十五卷中疝氣及㿗方六首廣濟療疝氣核腫疼方黄茋桃仁去尖皮熬山茱萸五加皮檳榔仁各八分牛膝六分茯苓六分蓯蓉八分五味子十八分人參續㫁各六分桂心八分逺志去心石南各五分海藻洗八分𤣥參十分枳實炙龍骨八分蒺蔾子二十分熬右十九味擣篩蜜丸如桐子大酒服三十丸日二漸加至四十丸又療腎虚疝氣腰膝冷疼隂囊腫痒狐隂丸方狐隂一枚炙木香蒺蔾子腽肭臍昆布各六分牛膝莵絲子各八分酒漬桃仁去尖皮熬石斛各十分檳榔仁十枚右十味擣篩蜜和丸如梧子大空腹以酒下二十丸至三十丸日再服忌熱麫蕎麥猪魚粘食等物並出第六卷中集驗療㿗方取楊柳如脚大指長三尺二十枚以水煮令極熟以故布乾掩腫處取桞枝更互拄之如此取差止文仲備急千金同千金療㿗方牡丹二兩海藻二兩洗狐隂一具炙地膚子二兩茯苓二兩五味子二兩芍藥二兩橘皮二兩蜘蛛五十個熬防葵二兩細辛二兩蒺䔧子二兩桂心二兩澤㵼二兩桃仁五十枚去皮尖熬右十五味下篩蜜和服十丸如梧子大稍加至二十丸忌胡荽生葱生菜酢物出第二十五卷中備急療㿗方以桃擣敷之亦療婦人隂腫乾即易集驗同出五卷中古今録驗療㿗蒺蔾丸方蒺䔧子乾地黄各一分鹿茸炙十分白歛八分磁石十分研礜石煉十分鐡精桂心續㫁各五分巴㦸天芍藥𤣥參通草升麻牛膝寄生各八分澤㵼七分射干八分蓯蓉十分海藻八分如髮者右二十味擣篩以蜜和為丸如梧子大飲下十丸日二漸増至二三十丸甄立言處出第四十一卷中卒病㿗方五首肘後療超躍舉重卒得隂㿗方白术五分地膚子十分桂心一分右三味擣末以飲服一刀圭日三古今録驗同又方狐隂一具炙海藻牡丹皮各三分桂心二分右四味擣篩為散蜜和為丸如梧子大小兒服五丸大人増之集驗灸卒㿗法以蒲横度口折之一倍増之以布著小腹大横理令度中央上當臍勿使偏僻灸度頭及中央合二處隨年壯好自養勿舉重大語怒言大笑呼喚千金范汪同又方牽隂頭正上向灸莖頭所極又牽下向榖道又灸所極又牽向左右髀直下行灸所極皆使正直勿偏四處炷隨年壯佳千金范汪同又法灸足厥隂左右各三壯穴在足大指間是也千金范汪同並出第九卷中㿗卵偏大方三首千金療㿗疝卵偏氣上方牡丹防風各一方右二味擣為散温酒服方寸七日二忌胡荽出第二十五卷中張文仲小品牡丹散療㿗偏大氣脹方牡丹桂心防風鐡精豉熬等分右五味擣篩酒和方寸七服之小兒一刀圭二十日愈嬰兒以乳汁和大豆與之大効忌如前肘後同出第七卷中古今録驗牡丹五等散療㿗疝隂卵偏大有氣上下脹大行走腫大服此良驗方牡丹皮防風黄蘗炙桂心各一分桃仁二分去皮尖研右五味擣為散以酒服一刀圭二十日愈少小㿗疝最良小兒以乳汁和如一大豆與之忌如前出第四十一卷中灸諸㿗法一十四首千金論曰男㿗有腸㿗卵㿗氣㿗水㿗四種腸㿗卵㿗難差氣㿗水㿗鍼灸易差又卵偏大上入腹方灸三隂交在内踝上八寸隨年壯又男隂卵偏大㿗法灸肩井解臂接處隨年壯男㿗灸小指端七壯病在左者可灸左在右者灸右良効又法灸闗元百壯又法灸玉泉百壯報之穴在臍下四寸又法灸泉隂百壯三報之在横骨邊三寸又㿗病隂卒腫者法令並足合兩拇指爪相並以一艾丸灸兩爪端方角處一丸令頓上兩爪角各令半丸上爪上七壯又兩丸縮入腹法灸三隂交隨年壯神効又男隂卵大㿗病法灸足太陽五十壯三報之又法灸足太隂五十壯又在内踝上一穴又法灸大拇指内側去端一寸白肉際隨年壯甚騐雙灸之又法灸横骨兩邊二十壯夾莖是也又法灸足大指理中十壯隨邊腫灸之灸小兒㿗法先將兒至碓頭祝之曰坐汝令兒某甲隂囊㿗故灸汝三七二十一灸訖便牽小兒令碓頭下向著囊縫當隂頭灸縫上七壯即消巳驗艾炷㡌簮頭大耳又法凡男㿗當騎碓軸以莖伸置軸上齊隂莖頭前灸軸木上隨年壯即愈並出第二十五卷中隂腫方六首病源此由風熱客於腎經腎經流於隂腎不能宣散故致腫也出第四卷中集驗療男子隂腫大如斗核痛人所不能療者方以雄黄一兩研碎綿褁甘草一尺生用切水一斗煮取二升以洗之忌海藻菘菜又方取莧菜根𢷬薄之范汪千金同又方取蔓菁根𢷬薄之范汪同又方𢷬馬鞭草薄之范汪同並出第九卷中文仲療隂腫方取桃仁去皮尖熬末酒服彈丸許不過三服即差千金備急同出第七卷中古今録驗療腫大如斗方取雞翅燒灰飲服其毛一孔生兩毛者佳腫在左取左翅在右取右翅雙腫取兩邊翅千金治小兒卵腫出第四十一卷中隂疝腫縮方一首病源疝者氣痛也衆筋㑹於隂器邪客於厥隂少陽之經與冷氣相摶則隂痛而攣縮也出第四卷中文仲療隂卒縮入腹急痛欲死名隂疝方狼毒四兩炙防葵一兩附子二兩炮右三味𢷬篩蜜和丸如梧子酒服三丸日三夜二古今録驗范汪同出第七卷中隂卒腫痛方三首文仲葛氏療男子隂卒腫痛方灸足大指第二節下横理文正中央五壯姚云足大指本三炷亦治小兒隂疝發時腫痛隨痛左右灸之出第七卷中備急療男子隂卒腫痛方雞翮六枚燒蛇床等分右二味為末以飲服少許隨卵左右取雞羽集騐同姚方無蛇床又若有息肉突出方以苦酒三升漬烏喙五枚三日以洗一日夜三四度差肘後同出第五卷中隂囊腫痛方五首千金有人隂冷漸漸冷氣入隂囊腫滿恐死夜即痛悶不得眠睡方取生椒擇之令净以布綿褁著丸囊令厚半寸須臾熱氣大通日再易之取消為効乃止又方煮大薊根汁服一升日三不過三劑愈又方醋和麵炙令熱熨之又方以醋和麫塗之又方釡月下土以雞子白和敷之効肘後同並出第二十五卷中隂下痒濕方七首病源大虚勞損腎氣不足故隂汗隂冷液自泄風邪乗之則搔痒也其湯鍼灸石别有正方補養宣導今附於後養生方導引法云卧令兩手布膝頭取踵置尻下以口内氣腹脹自極以鼻出氣七息除隂下濕少腹裏痛膝冷不隨出第四卷中文仲療隂痒生瘡方嚼胡麻塗之驗肘後千金同葛氏療隂囊下濕痒皮剥方烏梅十四枚錢四十文鹽三指撮右三味以苦酒一升於銅器中浸九日洗之効肘後同又方煮槐皮苦參黄蘗及香薷汁洗之並良肘後同出第七卷中救急療隂下濕痒成瘡方猪蹄兩脚槐白皮切一升右二味斟酌以水煮洗瘡一日五六遍永差又方煮桃皮和黍米汁洗之並出第五卷中古今録騐療隂下痒濕湯洗方甘草一尺以水五升煮取三升漬洗之日三四度便愈又療隂下濕痒生瘡方呉茱萸一升水三升煮取三五沸去滓以洗瘡諸瘡亦治之出第四十一卷中隂痛方三首病源腎氣虚損為風邪所侵邪氣流入於腎經與隂氣相擊真邪交争故令隂痛但冷者惟痛挾熱者則腫其湯熨鍼石别有正方補養宣導今附於後養生方導引法云兩足指向下拄席兩涌泉相拓坐兩足跟頭兩膝頭外扠手互前向下盡勢七通去勞損隂膝冷出第四卷中集驗療卒隂痛如刺汗如雨出方小蒜一斤韭根一斤一方無楊桞根一斤右三味合燒以酒灌之及熱氣熏之即愈千金同出第九卷中千金療隂腫痛方灸大敦三壯又方車前子末酒服之佳出第二十五卷中隂瘡方七首病源腎榮於隂腎氣虚不能制津液則汗濕虚則為風邪所乗邪客凑理而正氣不泄邪正相干在於皮膚故痒搔之則生瘡出第四卷中千金療隂下生瘡洗湯方地榆黄蘗各八兩右二味切以水一斗煮取六升去滓適寒温洗瘡日再只以黄蘗湯洗亦効又凡妬精瘡者男子在隂頭節下婦人在玉門内並似疳瘡作臼方用銀釵以綿褁用臘月猪脂熏黄火上煖以釵烙瘡上令熱取乾槐枝爇塗之以麝香黄礬青礬末敷之小便後即敷之不過三兩度差但用疳瘡方中藥敷之即差出第二十五卷中葛氏療男子隂瘡方爛煮黄蘗洗之又用白蜜塗之又方黄連黄蘗各等分末之先煮肥猪肉湯洗之然後以藥粉之又方以蜜煎甘草末塗之大良比見有人患塗頭腫坎下瘡欲㫁者以猪肉湯漬洗之并用前粉粉之及依陶方即差神驗出第七卷中必効療隂生瘡膿出作臼方髙昌白礬一兩右一味𢷬細研之鍊猪脂一合於磁器中和攪作膏取槐白皮切作湯洗瘡上拭令乾即取膏敷上及以楸葉貼上不過三兩度永差古今録驗療隂瘡方黄蘗黄連各三分胡粉一合右三味𢷬為末粉上日三婦人綿褁棗核大内之出第四十一卷中隂邊粟瘡方五首必効療隂瘡隂邊如粟粒生瘡及濕痒方以槐北面不見日處白皮一大握鹽三指一撮以水二大升煮取一升洗之日三五遍適寒温用若涉逺恐衝風即以米粉和塗之神効又療隂瘡有二種一者作白膿出名曰隂蝕瘡二者但赤作瘡名為熱瘡若是熱瘡用此方取黄蘗黄芩各一兩切作湯洗之用黄蘗黄連末粉之云神良又方以黄連和胡粉末敷之必效又方紫芽茶末一分荷葉一片燒灰右二味為末以鹽漿水洗訖敷之三五度即愈又方取停水處乾卷地皮末敷之神效是長安郭承恩用之得效出第四卷中著硇砂方四首救急邂逅著􅓀砂損隂方猪蹄一具擘破浮萍草三兩右二味以水三大升煮取半升去滓以瓶子盛汁内隂瓶中漬之冷即出拭乾便敷後藥粉之又粉法薔薇根皮黄蘗各三分朴硝蛇床子各一分甘草二分炙右五味擣為散用前法浸洗後以粉瘡上亦不甚痛慎風出第八卷中必効主著硇砂方取雞子一枚煮熟剥取肉更用生雞子二個傾取白和熟研令細以綿褁之立定李饒州云竒効又方甘草黄蘗白礬燒令汁盡右二味為末敷之出第四卷中九蟲方一首病源夫九蟲者一曰伏蟲長四寸二曰蛔蟲長一尺三曰白蟲長一寸四曰肉蟲狀如爛杏五曰肺蟲狀如蠶形六曰胃蟲狀如蝦蟇七曰弱蟲狀如𤓰瓣八曰赤蟲狀如生肉九曰蟯蟲至細微形如菜蟲伏蟲羣虫之主也蛔虫貫心則殺人白蟲相生子孫轉大長至四五尺亦能殺人肉蟲令人煩滿肺蟲令人欬嗽胃虫令人嘔吐胃逆喜噦弱䖝又名隔䖝令人多唾赤蟲令人腸鳴蟯蟲居胴腸多則為痔劇則為癩因人瘡處以生諸癕疽癬瘻瘑疥齲蟲無所不為人亦不必盡有有亦不必盡多或偏有或偏無者此諸蟲依腸胃之間若腑藏氣實則不為害若虚則能侵蝕隨其蟲之動而變成諸患也集騐同出第十八卷中集驗貫衆丸主療九蟲動作諸病方貫衆熬石蠶熬五分狼牙四分雚蘆二分蜀漆六分炙殭蠶三分熬雷丸六分蕪荑四分厚樸三分檳榔六分右十味擣篩蜜丸空心煖漿水服三十丸日三不知稍稍加之白蟲用榧子湯服備急文仲古今録驗范汪同出第九卷中五藏蟲方七首刪繁療脾勞有白蟲長一寸在脾為病令人好嘔而胷中駭駭一作𤣥𤣥嘔而不吐出前胡湯方前胡三兩白术三兩赤茯苓三兩枳實炙三兩細辛三兩旋復花三兩常山三兩松蘿三兩龍膽三兩竹葉切一升杏仁三兩去尖皮右十一味切以水一斗煮取三升去滓分三服若腹中熱滿下茫硝三兩黄芩三兩苦參二兩加水二升依方煎忌如常又療脾勞熱有白蟲在脾中為病令人好嘔茱萸根下蟲湯方茱萸東引根大者一尺切大麻子八升橘皮二兩切右三味切擣麻子爛並和煎服或下黄汁凡合藥禁聲勿語道作藥蟲當聞便不下切須忌之甚驗以水煎服臨時量之效又療肺勞熱損生肺蟲形如蠶在肺為病令人欬逆氣喘或謂憂恚氣隔寒熱皆從勞之所生名曰膏鍼灸不著麥門冬五隔下氣丸方麥門冬十兩去心蜀椒四分汁逺志附子炮各六分乾薑五分甘草十分炙人參七分細心六分桂心五分百部根白术黄茋各五分杏仁四十枚檳榔五分右十四味擣篩蜜丸如彈子許含一丸稍稍嚥汁忌如常千金療腎熱四肢腫急蟯蟲如菜中蟲生腎中為病方貫衆大者三枚熬乾漆二兩熬茱萸六分一云五十枚杏仁四十枚蕪荑胡粉槐白皮各四分右七味𢷬散平旦以井花水服方寸七増之以差止又肺勞熱生蟲在肺為病方東行桑根白皮切一升東行茱萸根切五兩狼牙三兩右三味切以酒七升煮取一升半平旦服盡又療肝勞生長蟲在肝為病令人恐畏不安眼中赤方雞子五枚去黄東行茱萸根切三升蠟三兩乾漆四兩熬粳米粉半升右五味𢷬茱萸根漆為末和藥銅器中打雞子調火鍊可丸如小豆宿勿食旦以飲服一百二十丸小兒五十丸蟲即爛出差又療心勞熱傷心有長蟲名蛔蟲長一尺貫心為病方雷丸熬橘皮桃仁各五分狼牙六分貫衆三枚蕪荑青葙子乾漆熬各四分亂髪如雞子燒殭蠶二十枚熬右十味𢷬篩蜜丸以飲及酒空腹服二七丸日再服之並出第十八卷中長蟲方二首集驗療長蟲雞子丸方雞子白三枚乾漆四兩熬一本無蠟三兩粳米粉半斤右四味内銅器中於㣲火上煎攪令調内粉令凝可丸置土上温乃内雞子攪令相得又煎令可丸宿勿食以飲下小豆許大一百二十丸小兒五十丸効驗又方取棟實以淳苦酒中漬再宿以綿褁内下部中令入三寸許一日易之千金范汪同並出第九卷中蛔蟲方九首病源蛔蟲者是九蟲之一也長一尺亦有長五六寸或因腑藏虚弱而動或因食甘肥而動其發動則腹中痛發作種聚去來上下痛有休息亦攻心痛口中喜涎及吐清水賁傷心者則死診其脈腹中痛其脈法當沉弱弦今反洪而大則蛔䖝也出第十八卷中廣濟療蛔䖝方酸石榴根東引入土五寸者切二升檳榔十枚碎右二味以水七升煮取二升半絞去滓著少米煮稀粥平旦空肚食之少間䖝便死快利効無忌出第四卷中肘後療蛔䖝或攻心痛如刺口中吐清水方取龍膽根多少任用以水煮濃汁去滓宿不食平旦服一二升不過再服下蛔䖝也又方取有子棟木根剉以水煮取濃赤黒汁用米煮作麋宿勿食旦取肥香脯一片先喫令䖝聞香舉頭稍從一口為度始少進漸加服一匕服至半升便下蛔䖝千金文仲同又方以雞子一枚開頭去黄以好漆少許内中相和仰頭吞之䖝悉出矣文仲集驗備急千金同出第二卷中集驗蛔䖝攻心腹痛方取薏苡根二斤剉以水七升煮取三升先食盡服之䖝死盡出千金范汪同出第九卷中千金療蚘䖝方雚蘆下篩以餅臛和服方寸七䖝不覺出之亦主蟯䖝出肘後云雚蘆一兩末以羊肉作臛和服出第十八卷中崔氏療蚘䖝方取繰蠶蛹汁空腹飲之良若非繰絲時即須収蛹暴乾患者搗篩取意斟酌多少和粥飲服之又方鶴蝨三兩右一味擣散以肥猪羊肉但得一色以葱豉為臛汁每旦空腹服以臛汁和一方寸匕頓服稍多飲臛汁佳若不能散服即以蜜和為丸如梧子一服十丸還以此臛汁下之假令明旦服今日暮即勿食明旦服藥訖還至巳時為佳要服此丸散使盡已後三十日勿雜食永差出第五卷中必効療蛔䖝方菉豆三升煮取濃汁麻子一大升研取汁一升以下然後取麻子汁半升和豆汁一升更煖令温温正發即炙羊肉脯令熟先含嚥汁三五嚥即服之須臾即吐出或利其䖝巳消如綿練帶三二百條如未盡更服即永絶郭叅軍云頻試無不差者一方服麻子汁效出第六卷中寸白蟲方一十九首病源寸白者九䖝之一也長一寸而色白形小褊因腑藏虚弱而能發動或云飲白酒以桑枝貫牛肉炙食之并食生魚所成又食生魚後即飲乳酪亦令生之其發動則損人精氣腰脚疼弱又云此䖝生長一尺則殺人出第十八卷中廣濟療白䖝如馬藺葉大於下部出不盡以刀截㫁者令人漸漸羸瘦石榴湯方醋石榴根東引者一大握牽牛子半兩熬末蕪荑三兩右三味以水六升煮取二升去滓分三服别和牽牛子末每服如人行五里更服盡快利䖝亦盡死出忌生冷猪魚牛肉白酒葵笋等此方神驗又方狼牙白歛各四分蕪荑六分右三味擣散空肚以大醋和如膏温頓服之無所忌千金同並出第四卷中肘後療白䖝方淳漆三合猪血三合右二味相和㣲火上煎之不著手成宿勿食空腹旦先吃肥香脯一片服如大豆許一百丸日中䖝悉出亦主蚘䖝范汪同又方濃煮猪肉汁煎檳榔三十枚取三升服之䖝盡出文仲備急同又方熟煮猪脂血宿勿食明旦飽食之䖝當下文仲備急同出第二卷中范汪療白䖝橘皮丸方橘皮四分牙子蕪荑各六分右三味擣篩蜜丸如梧子以漿水下三十丸先食日再服又方狼牙五兩右一味擣篩蜜丸如麻子大宿不食明旦空腹以漿水下一合服盡差又方棟實破其上取皮中子𢷬合蜜丸如梧子宿不食旦以醋漿水若米汁下三百丸蟲並死或以麋爛皮亦可丸服八十丸忌如常法出第十九卷中備急療白䖝蕪荑散方狼牙三分炙蕪荑二分右二味擣為末酒和服之先食脯後頓服盡立差張文仲同出第六卷中救急療白䖝方石榴枝東引者一握去瘡皮檳榔七枚右二味以水二大升煮取強半頓服欲服時先嚼鹿脯嚥汁即進之每月一二三日喫藥必差以䖝頭向上月三以後服藥不効為其䖝頭向下也今日欲服預前一日莫食其䖝吃藥之後或利出或内消皆差忌食生繪白酒諸生肉冷物一月餘又方取榧子一百枚去皮火然啖之能食盡佳不能者但啖五十枚亦得經宿䖝消自下無忌崔氏同出第八卷中崔氏療白䖝諸方不差方取石榴東引根令患人以手大指與第三指滿一握兩頭出者摠留之又取乾脯肥者如手大一片細剉以水四升漬之一宿明旦煮取一升去滓分三服如人行十里乆每欲服先嚼脯一片然後飲藥并令人以手按所患人腹令藥易宣都服了有頃當自便䖝出服藥以月一至五日以前是䖝頭向上服之得力無問多少皆得出盡若疑䖝未盡更合一劑永愈又方東引茱萸根一大握切麻子半大升右二味先擣麻子極碎又盆中熟研以水一大升更和研絞取濃汁以浸茱萸根一宿明旦煮兩三沸頓服如不頓服分再服至明旦欲服藥今日午後便不得食仍須先嚼一片肥乾脯嚥汁然後服藥服一劑去䖝不盡停一日更作服一劑永差後一月日勿食脂膩魚肉必效出第五卷中千金療白䖝方取榧子四十九枚去皮以月上旬旦空腹服七枚七日服盡䖝消為水永差又方取茱萸北隂根洗去土切以酒一升漬一宿平旦去滓分再服凡茱萸皆用細根東北隂者良若指以上大者皆不佳用之無力范汪同又方熬錫令速燥末平旦作羊肉臛以藥方寸匕内汁中服之一方熬胡粉又方桑白皮切三升以水七升煮取二升宿不食明旦頓服之又方用石榴根如茱萸根法又方胡麻一升胡粉一兩右二味搗末明旦空腹以猪肉臛汁服盡即差並出第十八卷中蟯蟲方六首病源蟯蟲是九蟲之一也形甚小如今之蝸蟲狀亦因腑藏虚弱而致發動甚者則能成痔瘻疥癬癩癕疽瘑諸瘡蟯蟲此是人體虚弱極重者故蟯蟲因之動作無所不為也出十八卷中范汪療蟯蟲芫花散方芫花狼牙雷丸桃仁去皮尖右四味𢷬散宿勿食平旦以飲服方寸七當下蟲也又巴豆白膏療蟯蟲方巴豆一枚燒令烟㫁去心皮桃仁四枚熬令黒去皮右二味合𢷬作三丸大人清旦未食以漿服盡少小服一丸若不下明旦更復作服並出第十九卷中千金療蟯蟲在胃中漸漸羸人方淳酒白蜜好漆各一升右三味合銅器中微火上煎之令可丸丸如桃核大一枚宿勿食空腹温酒下蟲不下再服之肘後備急集驗范汪同出第十八卷中備急葛氏療蟯蟲攻心如刺吐清汁方𢷬生艾汁宿不食平旦嚼脯一片令蟲聞香後飲汁一升當下蟯蟲備急文仲並同肘後云療蚘䖝陶氏療蟲方取七月七日蒺藜子隂乾燒作灰先食服方寸七一服三日止范汪千金同又方以好鹽末二兩淳酒半升於銅器中煮令數沸宿勿食清旦空肚頓服之備急文仲千金范汪等同並出第七卷中三蟲方匕首病源三蟲者長蟲赤蟲蟯蟲為三蟲也猶是九蟲之數也長蟲者蚘蟲也長一尺動則吐清水出則心痛貫心則死赤蟲狀如生肉動則腸鳴蟯蟲細微形如菜蟲也居胴腸之間多則為痔劇則為癩因人瘡處即生諸癕疽癬瘻瘑疥齲蟲無所不為此既是九蟲内之三者而今别立名者當以其三種偏發動成病故為三蟲也其湯熨鍼石别有正方補養宣導今附於後養生方導引法云以兩手著頭相乂長引氣即吐之坐地緩舒兩脚以兩手從外抱膝中疾低頭入兩膝間兩手交义頭上十二通愈三蟲又云叩齒二七過輒咽氣二七如是三百通乃止為之二十日邪氣悉去六十日小病愈百日大病除三蟲伏尸皆去面體光澤出第十八卷中肘後療三蟲方茱萸根取東引指大者長一尺括樓四兩切右二味細剉茱萸根以酒一升漬之一宿旦絞去滓宿勿食旦空腹先喫脯然後頓服之小兒分三服亦療寸白蟲又方擣桃葉絞取汁飲一升千金集驗同一方云平旦飲三合又方真珠一兩研亂髪如雞子大燒末右二味内苦酒中旦空腹頓服之令盡集驗范汪同千金治蟯䖝又三蟲者謂長蟲赤蟲蟯蟲也乃有九種而蟯蟲及寸白人多病之寸白從食牛肉飲白酒所成相連一尺則殺人服藥下之須結褁潰然出盡乃佳若㫁者相生未巳更宜速除之蟯蟲多是小兒患之大人亦有其病令人心痛清朝口吐汁煩燥則是也其餘各種種不利人人胃中無不有者宜服九蟲丸以除之范汪療三蟲白歛丸方白歛狼牙雚蘆桃花貫衆各三分橘皮二分蕪荑分右七味搗篩蜜丸如小豆大宿勿食旦以漿水服一劑日中乃食立下男子病大腹面黄欲食肉服此藥下赤蟲如笋莖者一尺所有頭目百餘枚病愈又九江謝丘病脅下有積大如杯小腹亦堅伏痛上下移嘔逆喜唾心下常痛欲食肉服此藥下蟲無頭足赤身有口尾二百餘枚得愈又九江陳昉病大腹煩滿常欲食生菜服此藥下白蟲大如臂小者百餘枚立差姙身婦人不得服之又療三蟲竹節丸方燒竹節雷丸各三分錫屑二分橘皮一分半右四味𢷬篩蜜丸如梧子大一服八丸日三服又療三蟲芎藭散方芎藭雷丸桔梗白芷各四分右四味擣散以蜜飲苦酒或米汁服方寸七日三服又可用蜜丸如梧子吞三十丸當稍稍下不盡更服一劑出第十九卷中備急療三蟲方雚蘆四兩炙乾漆二兩熬呉茱萸四兩右三味為末依前先嚼脯以粥清服方寸七日一服肘後范汪同雜療蟲方三首廣濟療蛔蟲寸白蟲方檳榔十二分當歸鶴蝨蕪荑熬橘皮各六分貫衆雷丸各四分右七味擣散空腹煮大棗湯服方寸七日二服漸加至三匕微利無忌出第四卷中千金療蟯蟲蛔蟲及痔䘌蟲食下部生瘡桃湯方桃皮一兩槐子三兩艾葉兩大棗三十枚右四味以水三升煮取半升空腹頓服之出第十八卷中又療寸白蟲化為水泄出永除方榧子檳榔蕪荑等分右三味為散温酒服二錢七先燒牛肉脯喫後服藥也外臺秘要方卷二十六
