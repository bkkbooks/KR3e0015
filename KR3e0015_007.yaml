body:
  text: 外臺祕要方卷三唐王燾撰天行病發汗等方四十二首病源夫天行時氣病者是春時應暖而反大寒夏時應熱而反大涼秋時應涼而反大熱冬時應寒而反大溫者此非其時而有其氣是以一歲之中病無長少率多相似者此則時行之氣也從立春節後其中無暴大寒又不氷雪而人有壯熱為病者此屬春時陽氣發於冬時伏寒變為溫病也從春分以後至秋分節前天有暴寒者皆為時行寒疫也一名時行傷寒此是節候有寒傷於人非觸冒之過也若三月四月或有暴寒其時陽氣尚弱為寒所折病熱猶小輕也五月六月陽氣已盛為寒所折病熱則重也七月八月陽氣已衰為寒所折病熱亦小微也其病與溫及暑病相似但治有殊耳然得時行病一日在皮毛當摩膏火炙愈不解者二日在膚可法針服解肌𣪚汗出愈不解三日復發汗若大汗則愈不解者止勿復發汗也四日在胸服藜蘆丸微吐之愈若病固服藜蘆丸不吐者服赤小豆瓜蒂散吐之即愈視病者尚未了了復一法針之當解不愈者六日熱已入胃乃與利湯下之愈百無不如意但當諦視節度與病耳若食不消病亦與時行病俱發熱頭痛食病當速下之時行病當待六七日下之時行病始得一日在皮二日在膚三日在肌四日在胸五日入胃入胃乃可下也熱在胃外而下之則熱乘虛便入胃然病要當復下去之不得留於胃中也胃若實熱致此為病三死一生此輩皆多不愈胃虛熱入爛胃也其熱微者赤斑出劇者黑斑出赤斑出者五死一生黑斑出者十死一生但論人有強弱病有難易功效相倍耳病者過日不以時下之熱不得泄亦胃爛斑出矣若得病無熱但狂言煩躁不安精采言語與人不相主當者勿以火迫之但以豬芩散一方寸匕水和服之當以新汲冷水令強飲一升若一升半可至二升益佳以指刺喉中吐之隨手愈不即吐者此病輩多不善勿強與水水停即結心下也更當以餘藥吐之皆令相主當者不爾必危若此病不急以豬芩𣪚吐解之者其死殆速矣亦可先以去毒物及法針之尤佳其湯尉針石别有正方補養宣導今附於後養生方導引法云清旦初起以左右手交互從頭上挽兩耳舉又引鬢髮即流通令頭不白耳不聾又摩手掌令熱以摩面從上下二七止去汗氣令面有光又摩手令熱從體上下名曰乾浴令人勝風寒時氣寒熱頭痛百病皆愈又時氣病一日太陽受病太陽為三陽之首主於頭項故得病一日頭項腰脊痛又時氣二日陽明受病陽明主於肌肉其脈絡鼻入目故病二日內熱鼻乾不得眠夫諸陽為表表始受病皮膚之間故可摩膏火炙發汗而愈又時氣病三日少陽受病少陽脈循於脅上於頸耳故得病三日胸脅熱而耳聾也三陽經絡始相傳病未入於藏故可汗之而愈又時氣四日太隂受病太隂為三隂之首是知三日已後諸陽受病訖即傳之於隂而太隂受病焉其脈主於咽嗌故得病四日腹滿而嗌乾其病在胸膈故可吐而愈也又云夫得病四日毒在胸膈故宜取吐有得病二三日便心胸煩滿此為毒氣已入或有五六日已上毒氣猶在上焦者其人有痰實故也所以復宜取吐也又時氣病五日少隂受病少隂脈貫腎絡肺繫於舌本故得病五日口熱舌乾渴而引飲其病在腹故可下而愈又時氣病六日厥隂受病厥隂脈循隂器絡於肝故得病六日煩滿而囊縮也此為三隂三陽俱受病毒氣入於腸胃故可下而愈又時氣病七日法當小愈所以然者隂陽諸經傳病意盡也今病不除者欲為再經病再經病者謂隂陽諸經重受病也又時氣病八九日以上不解者或是隂陽諸經重受於病或已發汗吐下之後毒氣未盡所以病不能除或一經受病未即相傳致使停滯纍日病證不改者故皆當察其證候而治之並出第九卷中士弱氏曰七日傳經盡再傳經必七日蓋剝復之義耳廣濟天行壯熱煩悶發汗麻黃湯方麻黃五兩去節葛根四兩梔子二七枚擘蔥切一升香豉一升綿裹右五味㕮咀以水八升先煮麻黃葛根三兩沸去沫內諸藥煎取二升五合絞去滓分為三服服别相去如人行五六里更進一服不利覆取汗後以粉粉身忌風及諸熱食出第一卷中肘後療天行一二日麻黃解肌湯方麻黃一兩去節升麻一兩甘草一兩炙芍藥一兩石膏一兩碎綿裹杏仁三十枚去尖雙仁貝齒三枚末右七味細切以水三升煮取一升頓服覆取汗汗出則愈便食豉粥補虛也忌海藻菘菜千金同又方麻黃二兩黃芩桂心各一兩生薑三兩右四味切以水六升煮取二升分三服忌生蔥張文仲同又葛根解肌湯方葛根四兩芍藥二兩麻黃一兩去節大青一兩甘草一兩炙黃芩一兩石膏一兩碎大棗四枚擘桂心一兩右九味切以水五升煮取二升分溫三服相次服之覆取汗差忌海藻菘菜生蔥炙肉等張文仲同又療二三日以上至七八日不解者可服小柴胡湯方柴胡八兩人參三兩甘草三兩炙黃芩三兩生薑三兩半夏半升洗大棗十二枚擘右七味切以水一斗二升煮取六升去滓更煎取三升分三服微覆取汗半日便差如不除更服一劑忌海藻菘菜羊肉餳范汪張文仲同此張仲景傷寒論方又若有熱實得汗不解腹脹痛煩躁欲狂語者可服大柴胡湯方柴胡半斤大黃二兩黃芩二兩芍藥二兩枳實四枚炙半夏五兩洗生薑五兩大棗十二枚擘右八味切以水一斗二升煮取六升去滓更煎取三升溫服一升日三服當微利忌羊肉餳此方四首最第一急疾須預有幸可得藥處便不可不營之保無傷死諸小療為以防窮極者耳忌羊肉餳出第二卷中同上刪繁療天行三日外至七日不歇肉熱令人更相染著大青消毒湯方大青四兩香豉八合熬綿裹乾葛梔子各四兩生乾地黃一升切芒硝三兩右六味切以水五升煮諸藥味取二升五合去滓下芒硝分三服忌蕪荑熱麵酒蒜等物一方有石膏八兩又療天行五日不歇未至七日皮肉毒熱四肢疼痛強苦參吐毒熱湯方苦參八分烏梅七枚雞子三枚取白右三味以苦酒三升煮二物取一升去滓澄清下雞子白攪調溫去沫分再服之當吐毒熱氣出愈又療天行七日至二七日藏腑隂陽毒氣天行病欲歇而未歇或因食飲勞復心下脹滿煩熱生地黃湯方生地黃切一升黃芩三兩桂心二兩甘草二兩炙竹葉切一升洗香豉一升綿别裹蓴心一升芒硝三兩尖鼠屎三七枚乾葛一兩麻黃三兩去節石膏八兩碎綿裹右十二味切以水九升煮取三升去滓下芒硝分三服忌蕪荑海藻菘菜生蔥等又療天行二七日外至三七日不歇或寒或熱來去吸吸四肢羸瘦飲食不能腹中虛滿熱毒不安生地黃湯方生地黃汁一升生麥門冬汁一升赤蜜一升人參二兩白术三兩桂心一兩甘草二兩炙生地骨皮四兩升麻三兩石膏八兩碎綿裹蓴心一升右十一味細切以水九升煮諸藥味取二升去滓下地黃汁更煎三兩沸分溫五服晝四夜一服忌蕪荑生蔥海藻菘菜桃李雀肉等物又療天行三七日至四七日勞悁不歇熱毒不止乍寒乍熱乍劇乍差發動如瘧鱉甲湯方鱉甲三兩炙大青二兩石膏八兩碎綿裹牡丹皮一兩烏梅肉一兩常山三兩竹葉切一升牛膝根三兩甘草一兩香豉一升熬綿裹右十味切以水九升煮取三升分溫三服日三忌生蔥生菜鯉魚海藻菘菜莧菜蕪荑一方有生天門冬生地黃各切一升千金療天行熱病五六日以上宜服苦參湯方苦參三兩黃芩二兩生地黃八兩右三味切以水八升煎至二升去滓溫服半升日再忌蕪荑出第九卷中又凝雪湯療天行毒病七八日熱積胸中煩亂欲死起死㩉湯方芫花一升右一味以水三升煮取一升半漬故布薄胸上不過再三薄熱則除當溫四肢護厥逆也張文仲備急古今録驗深師范汪並同出第十卷中千金翼療天行脈浮緊無汗而發熱其身疼痛八九日不解其表證續在此當發其汗服藥已微除發煩目瞑劇者必衄衄乃解所以然者陽氣重故也宜服麻黃湯方千金翼不療天行麻黃三兩去節桂心二兩甘草一兩炙杏仁七十枚去尖皮兩仁右四味切以水九升先煎麻黃減二升去上沫內諸藥煮取二升半分服八合取汗不須飲粥投此湯易得汗忌菘菜海藻生蔥深師同出第九卷中此張仲景傷寒論方崔氏療時行數日而大下熱痢時作白通諸藥多不得止吾思舊方多療傷寒後下痢耳未有尚在數日便兼除熱止下者也四順湯熱白通苦溫故吾思作此湯以救數十人兼主傷寒黃連龍骨湯方黃連三兩止痢除熱黃蘗三兩止痢除熱熟艾如雞子一枚除熱毒止痢龍骨二兩止痢除熱右四味切以水六升煮取二升半分三服無不斷者忌豬肉冷水又其年時行四五日大下後或不下皆患心中結滿兩脅痞塞胸中氣急厥逆欲絶心胸髙起手不得近不過二三日輒便死殁諸醫用㵼心湯余用大小陷胸湯並不得療重思此或是下後虛逆而氣已不理而毒復上攻毒氣相摶結於胸中縱不下者毒已入胃胃中不通毒還衝上復摶於氣氣毒相激故致此病療之當先理其氣次下諸疾思與增損理中丸方人參二兩白术二兩甘草二兩炙乾薑六分炮括蔞根二兩枳實四枚茯苓二兩牡蠣二兩熬右八味末之以蜜和為丸服如彈子一丸熟水下不歇復服余時用此效的神速下喉即折續復與之不過服五六丸胸中豁然矣用藥之速未嘗見此然渴者當加括蔞不渴除之下者當加牡蠣不下勿用余因以告領軍韓康伯右衛毛仲祖光祿王道豫靈臺郎顧君苖著作商仲堪諸人並悉用之咸歎其應速於時枳實乃為之貴難者曰傷寒熱病理中溫藥今不解之以冷而救之以溫其可論乎余應之曰夫今診時行始於項強赤色次於失眠發熱中於煩躁思水終於生瘡下痢大齊於此耳忌海藻菘菜酢物桃李雀肉等深師方同又阮河南療天行七八日熱盛不解艾湯方苦酒三升葶藶子二合熬搗生艾汁取一升無生艾熟艾乾艾亦可用無艾可艾根搗取汁右三味煎得一升頓服愈若有牛黃內一刀圭尤良此宜療內有大熱也阮河南曰療天行凡除熱解毒無過苦醋之物故多用苦參青葙艾葶藶苦酒烏梅之屬此其要也夫熱盛非苦醋之物則不能愈熱在身中既不時治治之又不用苦酢之藥如救火不以水必不可得脫免也又曰今諸療多用辛甜薑桂人參之屬此皆貴價難得常有比行求之轉以失時而苦參青葙葶藶子艾之屬所在盡有除熱解毒最良勝於向貴價藥也前後數參並用之得病內熱者不必按常藥次也便以青葙苦參艾苦酒療之但稍與促其間耳無不解千金集驗同並出於第一卷中又茵蔯丸療瘴氣時氣及黃病痎瘧等方茵蔯二兩大黃五兩豉五合熬令香常山三兩梔子仁二兩鱉甲二兩炙芒硝二兩杏仁三兩去尖皮熬巴豆一兩去心皮熬右九味搗篩蜜和為丸初得時氣三日內平旦飲服每服一丸丸如梧子大如人行十里久或吐或利或汗如不吐及不利不汗更服一丸五里久不吐利汗則以熱飲投之老小以意量減黃病痰澼時氣傷寒痎瘧小兒驚熱欲發癎服之無不差者療瘴特神驗有人患赤白痢者服之亦差春初有宿熱依上法服之取吐利當年不憂熱病忌莧菜蘆笋野豬肉生蔥生菜出第二卷中千金同張文仲療天行若已五六日不解頭痛壯熱四肢煩疼不得飲食大黃湯方大黃半兩黃連半兩去毛黃蘗半兩梔子半兩擘右四味切以水八升煮取六七沸內豉一升蔥白七莖煮取三升分三服此許推然方神良又療傷寒已五六日頭痛壯熱四肢煩疼取汗並宜老小忌豬肉冷水小品備急同又支太醫桃葉湯熏身法水一石煮桃葉取七斗以薦席自圍衣被蓋上安桃湯於牀簀下取熱自熏停少時當雨汗汗遍去湯待歇速粉之并灸大椎則愈又廪丘蒸法經云連發汗汗不出者死可蒸之如中風法後以問張苖苖云曾有人疲極汗出卧單簟中冷但苦寒踡四日凡八過發汗汗不出苖燒地排葉蒸之則得大汗被中傅粉極燥便差後用此法發汗得出療之備急方同又療天行熱毒垂死破棺千金湯方苦參一兩右一味㕮咀以酒二升半舊方用苦酒煮取半升去滓併服當吐如煬膠便愈神驗肘後同延年治天行四五日結胸滿痛壯熱身痛出第二卷中延年祕録療天行頭痛壯熱一二日水解散方麻黃四兩去節大黃三兩黃芩三兩桂心二兩甘草二兩炙芍藥二兩右六味搗篩為散患者以生熟湯浴訖以暖水和服方寸匕覆取汗或利則便差丁強人服二方寸匕忌海藻生蔥菘菜生菜古今録驗同千金無黃芩芍藥又梔子湯主天行一二日頭痛壯熱心中熱者方梔子三兩黃芩三兩豉一升熬綿裹蔥白切一升石膏四兩碎綿裹乾葛四兩切右六味切以水七升煮取二升六合去滓分溫三服如人行八九里再服忌麵酒生冷等物又解肌湯主天行病二三日頭痛壯熱者方乾葛四兩麻黃三兩去節芍藥二兩黃芩二兩甘草一兩炙大棗十二枚擘桂心一兩右七味切以水八升煮取二升半去滓分三服得汗愈忌海藻菘菜生蔥等蔣孝璋處又療欲似天行四五日熱歇後時來時往惡寒微熱不能食者知母湯方知母二兩枳實三兩炙梔子仁三兩豉一升熬别裹右四味切以水六升煮取二升半去滓分溫三服如人行八里一服忌蒜麵又療天行五日頭痛壯熱食則嘔者竹茹飲方竹茹二兩生薑三兩黃芩二兩梔子仁二兩右四味切以水五升煮取一升六合去滓分溫三服忌蒜熱麵等五日又療天行五六日頭痛骨節疼痛腰痛兼痢黃芩湯方黃芩三兩梔子仁三兩芍藥三兩豉一升綿裹右四味水六升煮取二升半去滓分三服忌物依前又柴胡湯天行五六日壯熱骨煩疼兼兩脅連心肋下氣脹急硬痛不能食恐變發黃者方柴胡三兩枳實三兩炙括蔞三兩黃芩三兩梔子仁三兩茵蔯三兩龍膽二兩大黃三兩切右八味切以水九升煮取二升七合去滓分溫三服忌熱麵蒜並出第九卷中又竹茹飲主痢後得天行病頭痛三四日食即嘔吐者方竹茹二兩橘皮二兩生薑四兩人參二兩蘆根切一升粳米一合右六味切以水六升煮取二升五合去滓分溫五六服中間任食忌熱麵生冷張文仲處又療天行熱病七八日成黃面目身體悉黃心滿喘氣粗氣急者茵蔯丸方茵蔯三兩大黃五兩梔子仁二兩黃芩二兩鱉甲二兩炙常山二兩芒硝二兩巴豆一兩去皮心熬升麻二兩豉三合熬右十味搗篩以蜜和為丸如梧子大患者飲服三丸以得吐利則差忌莧菜生蔥生菜野豬肉蘆笋出第十卷中救急療天行熱氣頭痛骨肉酸疼壯熱等疾若初病一日在毛髮二日在皮膚三日在肌肉必未得取利且宜進豉尿湯豉一升蔥白切一升小便三升童子者為佳右三味先熬豉及蔥白令相得則投小便煮取一升澄清及熱頓服或汗或利但差則得如未歇依前更進一劑頻用有效又如不除進柴胡湯方麻黃二兩陳者去節柴胡三兩黃芩三兩甘草二兩炙乾葛三兩石膏五兩碎綿裹蔥白根切一升勿令有青處青即熱白即冷一作桑根皮豉七合綿裹三沸出之右八味切以水九升宿漬藥明旦先煮麻黃令沸掠去上沫然後并諸藥煮取一升七合分三服服别相去三食頃良久覆取汗汗出以粉拭之惡寒多加桂心一兩忌海藻菘菜等又療天行病不即差經四五日渴引飲心上急強手不得近又不得眠荒亂此則是黃不必得待刺黃始服藥凡是心強氣急不得眠卧服此湯吐即差瓜蒂散方瓜蒂僅量一合熬令似黃勿令焦小豆一合小弱量右二味搗篩為散凡有病如前候及天行病得四五日不歇皆宜服此方以漿飲五合和散一錢匕服之二食久必吐不吐更與半錢匕服吐畢即差中男以上量意斟酌服之又天行病若大困患人舌燥如鋸極渴不能服藥者宜服乾糞湯一名破棺湯解大熱方陳久乾人糞一大升右一味以沸湯一大升沃此糞一食久澄清瀝取一升頓服如渴不止者又依前法更服此宜灸從心厭骨向下一寸半名巨闕取患人中指節為寸灸三十壯若無心厭骨則以中指節前量橫括心上至歧骨上兩頭築著骨當橫量下以前一寸當中直下則是巨闕也士弱氏曰同身寸以心鳩尾下至臍折算必效療天行一二日者方麻黃一大兩去節右一味以水四升煮去沫取二升去滓則著采一匙及豉為稀粥取強一升先作生熟湯浴淋頭百餘碗然後服前粥則厚覆取汗於夜最佳又療天行病經七日以上熱勢彌固大便澀祕心腹痞滿食飲不下精神昏亂恍惚狂言浪語脈沈細衆狀之中一無可救宜決計服此鱉甲湯方鱉甲二兩炙細辛二兩桂心二兩白术二兩生薑四兩吳茱萸二兩白鮮皮二兩附子一兩半炮枳實二兩炙茵蔯二兩大黃三兩切右十一味切以水八升煮取二升六合去滓分三服服别相去如人行五里進一服忌生蔥生菜莧菜豬肉桃李雀肉等又療天行十日以上腹微滿讝語或汗出而不惡寒體重短氣腹滿而喘不大便繞臍痛大便乍難乍易或見鬼者大承氣湯方大黃四兩厚朴半斤炙陳枳實五枚炙芒硝三合右四味切先以水一斗煮二味取五升去滓內大黃復煮取二升去滓內芒硝煎令三兩沸適寒溫分再服得下者止不下更服之並出第三卷中此張仲景傷寒論方古今録驗八毒大黃丸療天行病三四日身熱目赤四肢不舉産乳後傷寒舌黃白狂言妄語亦療溫病已後飛尸遁尸心腹痛隔上下不通癖飲積聚癰腫苦痛溫中摩痛上諸毒病方藜蘆二分炙大黃三分朱砂五分蜀椒四分雄黃四分研巴豆四分去皮熬桂心四分右七味搗篩蜜和為丸如麻子大飲服三丸當下不差更服合時勿令婦人雞犬見之忌生蔥野豬肉蘆笋狸肉生血物又牽馬丸療天行病四五日下部生瘡醫所不能療者方附子一枚炮藜蘆一兩炙桂心一兩巴豆一兩去心皮熬右四味搗篩研巴豆如膏和散蜜丸如梧桐子空腹服二丸熱在膈上不下飲半升熱飲投吐之後下下部瘡自差神良病家嘗牽馬買藥因名牽馬丸老小半之以意消息之忌野豬肉生蔥狸肉蘆笋等物又療若六七日熱盛心煩狂言見鬼者方絞人糞汁飲數合服良出第三卷中近效療天行三日外若忽覺心上妨滿堅硬腳手心熱則變為黃不療殺人秦芁湯方秦芁一兩紫草一兩白鮮皮一兩黃芩一兩梔子一兩右五味切以水一大升半牛乳一大升煮取七合分為二服老小以意量之一劑不愈更喫一劑試有效天行病方七首此方兼療傷寒為題云天行所以入天行部許仁則云此病方家呼為傷寒有二種有隂有陽隂傷寒者反於陽是也陽傷寒狀表裏相應心熱則口乾苦肝熱則眼赤暈脾熱則穀道稍澀腎熱則耳熱赤肺熱則鼻乾渴胃熱則嘔逆大腸熱則大便祕澀小腸熱則小便赤少皮膚熱則脈洪數身體熱反此者乃隂傷寒夫傷寒者則為寒所傷也寒生隂隂主殺凡人隂陽調則無病氣既為寒所傷便致斯疾也又論隂陽傷寒者則毒氣傷隂陽氣也人身中有隂陽之氣隂陽者則寒熱也本以隂為毒所傷則不能流行陽熱獨王故天行多熱者也以病於諸病之中最難為療隂陽二病隂尤可憂耳時聞有此病而多倉卒死者不少或由診候不能精審方藥未達指歸飲食乖宜寒溫失節故致爾自心不全甄别他醫難得精妙與其療也寧可任之但能滋味適寒溫將理中間冷暖守過七日此最為得計其中事須服藥不可徒然者惟多日大便不通暫須一轉泄耳病經一二日覺身體壯熱頭痛骨肉酸楚背脊強口鼻乾手足微冷小便黃赤此是其候若如是宜先合煮桃栁等三物湯浴之方桃枝細切五斗栁葉細切五斗酢漿水一斗右藥先以水一石煮桃栁枝葉二物取七斗汁去滓內醋漿水攪𢃄熱以浴浴訖拭身體令乾以粉摩之勿觸風則於密處刺頭眼後兩邉及舌下血斷以鹽末厭刺處則入被卧又後服解肌乾葛等五物飲微覆取汗如病根輕者因此或歇方葛根切五合蔥白切一升生薑切一合豉心一升綿裹粳米二合研碎右藥切以水五升煮取豉心以上四味取三升半汁去滓內粳米屑煮令米爛帶熱頓啜候盡微覆取汗無所忌又依前浴等法不覺歇宜更作雞子湯重泄之方新殼産雞子五枚右各破頭㵼置一盞中别加一雞子水以筯攪令極渾别用水一升煮極沸則投雞子於湯中微攪才似熟則㵼置碗中內少醬清似變腥氣帶熱啜令盡覆使汗出又依前雞子湯出汗汗泄當歇如不覺退合梔子等六味散以下之方梔子三十枚擘乾葛五兩茵蔯二兩蜀升麻三兩大黃五兩芒硝五兩右藥切合搗為散以飲服三方寸匕服之須臾當覺轉則利也如經一兩食頃不利且以熱飲投又不利即斯須更服一方寸匕還以飲投得利為度後適寒溫將息更不須服此也又依前梔子等六味散取利復不覺退加嘔逆食不下口鼻喉舌乾燥宜合生蘆根八味飲子細細服之方生蘆根切二升生麥門冬二升去心生薑五兩人參二兩知母二兩烏梅十顆白蜜一合竹瀝三合右藥切以水八升煮取三升去滓內蜜瀝等攪令調細細飲不限遍數冷暖亦不限食前後服此飲子雖不能頓除熱病然於諸候不覺有加體氣安穩心腹不冷意又欲得此飲任重合但依前服之如熱勢不退心腹妨滿飲食漸少心上痞結則不可重服之又依前生蘆根等八味飲子飲之諸狀不歇漸不下食心腹結硬不得手近有時觸著痛不可忍既是熱病體氣合熱骨肉疼痛脈合洪數口合苦爽食合嘔逆體氣反涼脈反沈細飯食反下反不知痛惱大小便祕塞心上如石痛不可近視脣急鼻張手眼尋繹狂言妄語此由熱極將息酷冷飲食寢寐惟冷是求熱結在心無因通泄如有此者十不救二三更不可以常途守之當須作成敗計耳此非半夏等十味湯無奈之何其中有諸狀與此無别但加身體黃眼白睛色如黃蘗此是急黃如有亦不可守常法還宜合後湯救之方半夏五兩熊州者湯洗去滑汁盡疑熊字乾薑三兩吳茱萸二兩桂心二兩白术三兩細辛三兩柴胡三兩牡丹皮三兩大黃五兩芒硝二兩右藥切以水一斗煮取三升去滓內芒硝攪令消盡分溫三服每服如人行十里久若服一服利後須伺候將息勿更進湯藥但研好粟米作汁飲細細與之如覺利傷多可以酢飯止稠酢漿粥亦得忌羊肉餳生蔥生菜桃李雀肉胡荽等又依前成敗計服半夏等十味湯後雖得毒熱勢退利尚不休體力漸弱宜合人參等五味散細細服之方人參五兩生犀角末二兩烏梅肉三兩熬生薑屑三兩黃連三兩去毛無亦可以龍骨四兩代之右藥搗篩為散以飲服一方寸匕日三服稍加至二匕忌豬肉冷水等吳升同天行嘔逆方七首病源胃家有熱穀氣入胃與熱相并氣逆則嘔或吐下後飲水多胃虛冷亦為嘔也出第九卷中廣濟療天行惡寒壯熱食則嘔逆前胡湯方前胡一兩麥門冬三兩去心竹茹二兩橘皮一兩甘草一兩炙生薑二兩生地黃四兩切右七味切以水七升煮取二升三合絞去滓分溫三服服如人行六七里進一服忌海藻菘菜蕪荑熱麵豬犬肉油膩出第一卷中崔氏療天行數日或十許日而表不解心下有水熱毒相搏遂嘔時復有咳者增損阮氏小青龍湯方麻黃二兩去節芍藥二兩桂心一兩甘草二兩炙細辛一兩右五味切以水六升煮取二升溫服七合阮本湯方等分雖未嘗用嫌其太溫余增損其分兩以療十餘人皆愈忌海藻菘菜生蔥生菜等出第一卷中近效療天行壯熱嘔逆不下食橘皮湯方橘皮三兩生薑四兩茯苓三兩右三味切以水五升煮取一升五合去滓分溫五六服中間任食一日服盡忌大酢蒜麵李處儉張文仲等並同出第九卷中必效療天行嘔吐不下食方取臘月兔頭并皮毛燒令煙盡擘破作黑灰搗羅之以飲汁服方寸匕則下食不差更服燒之勿令大耗無所忌比用頻效出第一卷中救急療天行後嘔逆不下食食入則出方取羊子肝如食法作生淡食不過三兩度則止文仲同又方以雞子一枚於沸湯中煮三五沸則出水浸之外寒內熱則吞之神效無所忌並出第一卷中集驗療天行後氣膈嘔逆不下食生蘆根湯方燈心一分生麥門冬十二分去心人參四分切生蘆根一大握切右四味以水一大升煎取八合去滓分溫三服天行嘔啘方七首病源伏熱在胃令人胸滿胸滿則氣逆氣逆則噦若大下後胃氣虛冷亦令致噦也出第九卷中肘後療嘔啘不止橘皮甘草湯方甘草一兩炙橘皮三兩升麻半兩生薑三兩右四味切以水三升煮取一升盡服之日三四作當止忌海藻菘菜文仲同出第二卷中文仲近效療嘔逆麥門冬飲子方麥門冬去心蘆根人參各二兩右三味切以水六升煮取二升七合去滓分溫五服徐徐服常用有驗又方飲生薑汁三二合大良又方枇杷葉去毛煮飲之作粥亦佳出第一卷中又方研油麻汁煮菉豆令爛取半升許以手掌大猬皮燒作灰篩之內豆中和食出第二卷中救急療天行乾嘔若噦手足逆冷薤豉粥方薤白切一升香豉一升白米四合右三味以水一升煮豉一沸漉去滓下薤及米煮為稀粥進兩碗良又療天行後噦欲死兼主傷寒小半夏湯方半夏五兩洗去滑生薑八兩切令薄細勿令濕惡經水浸者為好右二味各以水三升别煮各取一升半去滓二汁相和一處共煮取二升分三服服相去如人行十里久當令下食其噦不過俄頃則止近二公及任理居中屬纊得之明奉御來彖執祕此方但止煮藥送來彖與方郎中鄰居後乃方便得之大良效忌羊肉餳傷寒論同並出在第一卷中天行喉咽痛方二首病源隂陽隔絶邪客於足少隂之絡毒氣上熏攻於喉咽故痛或生瘡也出第九卷中深師療天行毒病或下不止喉咽痛黃連馬通湯方小豆一升黃連一兩去毛馬通汁三升吳茱萸一兩右四味以馬通汁令煮取一升盡服不差復作有效忌豬肉冷水出第十四卷中古今録驗青木香湯療春夏忽喉咽痛而腫兼下痢方青木香二兩黃連一兩去毛白頭翁二兩右三味切以水五升煮取一升半分溫三服小兒若服之一服一合忌豬肉冷水出第三卷中天行衄血方四首病源天行衄血者五藏熱結所為心主於血邪熱中於手少隂之經客於足陽明之絡故衄血衄者血從鼻出也出第九卷中深師療天行毒病鼻衄是熱毒血下數升者方勿療自差亦無所苦亦可取好松煙墨搗之以雞子白和丸丸如梧桐子大水下一服十丸並無所忌又黃土湯療鼻衄去五藏熱氣結所為或吐血者方當歸甘草炙芍藥黃芩芎藭各三兩桂心一兩生地黃一斤釡月下焦黃土如雞子一枚碎綿裹青竹皮五兩右九味切以水一斗三升煮竹皮減三升去滓內諸藥煮取三升分四服忌海藻菘菜生蔥又方黃芩四兩右一味切以水五升煮取二升分三服亦療婦人漏下血又療脈浮大鼻中燥如此必去血鼻衄方灸兩臂中脈取止取臂脈法以鼻嗅臂點其鼻尖所著處是穴兩臂皆爾出第十四卷中天行口瘡及口乾苦方四首病源發汗下後表裏俱虛而毒氣未盡熏於上焦故喉口生瘡也出第九卷中深師療天行熱盛口中生瘡酪酥煎丸酪酥三合蜜三合大青一兩右三味合煎三沸稍稍傅口以差為度又口瘡方取蛇莓五升搗絞取汁稍稍飲之並出第十四卷中集驗療天行熱病口瘡升麻湯方升麻二兩通草四兩射干二兩羚羊角三兩屑芍藥三兩生蘆根切一升右六味切以水七升煮取三升分為三服如人行五里更服古今録驗同又療天行熱病口苦下氣除熱喉中鳴石膏蜜煎方石膏半斤碎蜜一升右二味以水三升煮石膏取二升乃內蜜復煎取一升去滓含如棗核許盡更含千金同並出第二卷中天行咳嗽方五首病源熱邪氣客於肺上焦有熱其人必飲水水停心下則上乘於肺故上氣而咳也出第九卷中廣濟療天行壯熱咳嗽頭痛心悶前胡湯方前胡升麻各八分貝母紫菀各六分石膏十二分碎綿裹麥門冬八分去心杏仁三十枚去尖皮兩仁竹葉切一升甘草二分炙右九味切以水八升煮取二升五合絞去滓分溫三服相去如人行六七里進一服不吐利差忌海藻菘菜油膩豬魚等又療天行肺熱咳嗽喉有瘡地黃湯方生地黃切一升升麻玄參芍藥柴胡麥門冬去心各八分貝母六分竹葉切一升白蜜一合右九味切以水九升煮取三升絞去滓內蜜再上火煎三沸含咽其汁勿停中間不妨食不利忌蕪荑熱麵豬犬肉油膩又療天行後乍寒乍熱昏昏不省覺脅下痛百節骨痛咳不能下食兼口舌乾生瘡柴胡湯方柴胡八分升麻六分黃芩六分甘草五分石膏十二分碎綿裹生麥門冬六分去心蔥白半分香豉六合綿裹生薑六分竹葉切一升洗右十一味切以水九升煮取二升五合絞去滓分溫三服服别相去如人行六七里進一服不吐不利差忌海藻菘菜熱麵油膩並出第一卷中集驗療天行病上氣咳嗽多唾黏涎日夜不定生薑煎方生薑三兩去皮切如豆粒大右一味以餳半斤和微煎令爛每日無問早晚少少含仍嚼薑滓一時咽之必效療天行病後因食酒麵肺中熱擁遂成咳不止方桑白皮十二分桔梗十分肥乾棗二十一枚擘麻黃六分去節曹州葶藶子十分熬令紫色令為膏湯成下右五味切先以水四升煮桑白皮等四味可取一升半去滓下葶藶子膏更煎三五沸去滓分溫五服空心食後服或利勿怪忌豬肉油膩生冷果子等物天行發斑方三首病源夫熱病在表已發汗未解或吐下後熱毒氣不散煩躁謬語此為表虛裏實熱氣燥於外故身體發斑如錦文凡發斑不可用發表藥令瘡開泄更增斑爛表虛故也出第九卷中肘後比歲有病天行發斑瘡頭面及身須臾周匝狀如火瘡皆戴白漿隨決隨生不即療劇者數日必死療得差後瘡瘢紫黯彌歲方滅此惡毒之氣也世人云以建武中於南陽擊虜所得仍呼為虜瘡諸醫參詳作療用之有效方取好蜜通身摩瘡上亦以蜜煎升麻數數拭之亦佳又方以水濃煮升麻漬綿洗之苦酒漬煮彌佳但燥痛難忍也並出第二卷中文仲陶氏云天行發斑瘡須臾遍身皆戴白漿此惡毒氣方云永徽四年此瘡從西域東流於海內但煮葵菜葉蒜虀啖之則止鮮羊血入口亦止初患急食之少飯下菜亦得出第二卷中天行發瘡豌豆疱瘡方一十二首病源夫表虛裏實熱毒內盛攻於藏腑餘氣流於肌肉遂於皮膚毛孔之中結成此瘡重者匝遍其身狀如火瘡若根赤頭白則毒輕若色紫黑則毒重其瘡形如豌豆亦名豌豆瘡脈洪數者是其候也出第九卷中千金療人及六畜天行熱病豌豆瘡方濃煮黍穰汁洗之若是穄穰則不差瘡若黑者搗蒜封之又煮乾藝臺汁洗之又方真波斯青黛大如棗水服之差又熱病後發豌豆瘡方黃連三兩去毛水二升煮取八合頓服之忌豬肉冷水又若赤黑發如疥大者方煎羊脂摩傅之又方青木香二兩水三升煮取一升頓服之效又方小豆屑和雞子白傅之又方以月布拭之又療豌豆瘡初發覺欲作者方煮大黃五兩服之延年同又療瘡出煩疼者木香湯方青木香二兩丁香一兩薰陸香一兩白􅈨一兩麝香二分右五味以水四升煮取一升半分再服熱盛者加一兩生犀角如無犀角以升麻代之如病輕去􅈨石大神效又方瘡上以芒硝和豬膽塗勿動痂落無瘢仍卧黃土末上良此病小便澀有血者中壞瘡皆黑靨不出膿死不療又內發瘡盛方醋四合大豬膽一具右二味煎三沸一服一合日五服良驗並出第十卷中延年療天行壯熱頭痛發瘡如豌豆遍身大青湯方大青三兩梔子二七枚擘犀角屑一兩豉五合右四味切以水五升煮取二升分三服服之無所忌古今録驗水解散療天行熱氣則生疱瘡疼痛解肌出汗方出翟世平麻黃一兩去節黃芩三分芍藥二分桂心二分右四味搗篩暖水解服二方寸匕覆令出汗日再服差者減之忌海藻菘菜生蔥延年同出第二卷中一方有大黃三分甘草二分天行虛煩方二首病源夫天行病隂氣少陽氣多故身熱而煩其毒氣在於心腑而煩者則令人悶而欲嘔若其人胃內有燥糞而煩者則謬語時繞臍痛腹滿皆當察其證候也出第九卷中文仲療天行表裏虛煩不可攻者但當與竹葉湯方竹葉二把石膏碎綿裹一升麥門冬去心一升半夏半升洗人參甘草各二兩右六味切以水一斗煮取六升去滓內粳米一升煮米熟去之分五服嘔者與橘皮湯湯方在上嘔啘篇中不愈者重作此宫泰數用甚效若傷寒後虛煩亦宜服此方是仲景方忌羊肉海藻菘菜餳又療虛煩不可攻方青竹茹二升右一味以水四升煎至三升去滓分溫五服徐徐服之天行狂語方三首病源夫病熱盛則棄衣而走登高而歌或至不食數日踰垣上屋所上非其素時所能也病反能者皆隂陽氣爭而外并於陽四肢者諸陽之本也陽盛則四肢實實則能登髙而歌熱盛於身故棄衣而走陽盛故妄言罵詈不避親疏大熱遍身狂言而妄見妄聞也出第九卷中千金水道散療天行病煩熱如火狂言妄語欲走方白芷一兩甘遂二兩熬右二味搗篩以水服方寸匕須臾令病人飲冷水腹滿則吐之小便當赤也一名濯腹湯此方療大急者出第十卷中文仲范汪同又五苓散主天行熱病但狂言煩躁不安精采言語與人不相主當方豬苓二分白术三分澤㵼五分茯苓三分桂心二分右五味搗篩為散水服方寸匕日三服多飲暖水汗出愈忌大醋生蔥桃李雀肉等張仲景論深師同出第九卷中古今録驗療天行壯熱狂言謬語五六日者方雞子三枚芒硝方寸匕井花水一杯右三味合攪盡服之心煩下則愈出第三卷中天行熱毒攻手足方五首病源熱毒氣從藏腑中出攻於手足則焮熱赤腫疼痛也人五藏六腑井滎輸皆出於手足指故此毒從內而出攻於手足也出第九卷中肘後療天行病毒熱攻手足疼痛赤腫欲脫方鹽豉及羊肉一斤以來右三味以水一斗煮肉熟以汁看冷暖漬手足日三度差范汪同又方細銼黃蘗五斤許以水三斗煮漬之必效亦治攻隂腫又方作坎令深三尺大小容兩足燒坎中令熱以酒灌坎中著屐踞坎上衣壅勿令氣泄日再作之又方煮羊桃葉汁漬之加少鹽尤好並出第二卷中崔氏療天行熱毒攻手足方豬蹄一具去毛銼碎合蔥白一握切以水一斗煮熟去滓內少鹽以漬之肘後同出第一卷中天行大小便不通脹滿及澀方四首病源天行大小便不通此由脾胃有熱發汗大過則津液竭津液竭則胃乾燥結熱在內故大便不通又汗後津液虛少其人小腸有伏熱故小便不通出第九卷中廣濟療天行熱氣惡寒頭痛壯熱大小便澀柴胡散方柴胡八分茵蔯十分青木香十分黃芩八分土瓜根十分白鮮皮八分梔子仁十分擘大黃二十四分芒硝十二分右九味搗為散平辰空肚以新汲水服五六錢匕少時當三兩行微利利後煮蔥豉稀粥食之熱如未歇明辰更服四錢匕熱歇停藥忌熱食豬犬肉油膩等又療天行惡寒壯熱頭痛大小便赤澀不下食飲柴胡湯方柴胡七分茵蔯七分大黃十二分别漬升麻七分梔子四枚擘芒硝四分湯成下芍藥七分黃芩十二分右八味切以水四升先漬藥少時猛火煮取一升五合分溫三服服别相去如人行六七里喫一服以快利為度第二服則利更不須服之忌熱食炙肉蒜粘食並出第一卷中近效主天行後兩脅脹滿方熬鹽尉之如小便澀亦用鹽尉臍下如水腫以穀枝汁服愈大效集驗療天行病腹脹滿大小便不通滑石湯方滑石十四分研葶藶子一合紙上熬令紫色搗大黃二分切右三味以水一大升煎取四合頓服兼搗蔥傅小腹乾即易之效肘後崔氏同無大黃天行熱痢及諸痢方四首病源此由熱氣在腸胃挾毒則下黃赤汁也又熱毒傷於腸胃故下膿血如魚腦或爛肉汁壯熱而腹絞痛此溫毒熱氣所為也並出第九卷中深師療天行毒病酷熱下痢七物升麻湯方升麻當歸黃連去毛甘草炙芍藥桂心黃蘗各半兩右藥切以水三升煮取一升頓服之忌海藻菘菜豬肉冷水生蔥等物又天行諸下悉主黃連湯方黃連三兩去毛黃蘗二兩當歸二兩右三味以水六升煮取三升去滓內蜜一合微火煎取二升半分三服良驗忌豬肉冷水並出第十四卷中一方有龍骨一兩范汪療天行熱毒下痢赤白久下膿血及下部毒氣當下細蟲如布絲縷大或長四五寸黑頭鋭尾麝香丸方麝香一分附子二分炮雄黃丹砂乾薑各二分右五味各搗下篩訖復更合治之蜜和為丸如小豆大飲下一丸老少半之效驗忌豬肉生血等出第三十三卷中甲乙方療天行熱病差後痢膿血不止方龍骨一兩右一味搗研為末米飲下一錢不計時節日三服佳天行􅉶瘡方八首病源毒熱結在腹內穀氣衰毒氣盛三蟲動作食人五藏多令泄痢下部瘡癢若下脣內生瘡但欲寐者此蟲食下部也重者肛爛見五藏出第九卷中深師療天行下部瘡爛方烏梅二七枚去核大蒜二七枚屋塵半升篩取細者右三味搗篩為散苦酒一升和調於銅器中煎成丸作長挺內下部范汪同出第十四卷中范汪療人下部中癢方蒸棗取膏以水銀熟研丸之令相得長二三寸以綿薄裹內大孔中蟲出差又療穀道中瘡方以水中荇葉細搗綿裹內下部日三肘後同又療天行􅉶蟲食下部生瘡雄黃兌散方雄黃半兩青葙子三兩苦參黃連各三兩桃仁一兩半去皮尖及兩仁熬右五味合搗篩綿裹如半棗核大內下部亦可米汁服方寸匕日三服忌豬肉冷水及熱麵炙肉蒜等物又桂枝湯療天行􅉶病方桂心二兩小藍二兩右二味㕮咀以水一斗煮取二升半內豬肝十兩去上膜細研著湯中和令相得臨時小溫若毒悉在腹內盡服之在下部者三分藥中用一分竹筒內下部中服藥一時間當下細蟲如髮大五六升小兒半作之忌生蔥並出第三十三卷中文仲姚氏療天行病􅉶下部生瘡方濃煮桃皮煎如糖以綿合導下部中若口中生瘡含之肘後范汪同出第二卷中甲乙方療天行病有􅉶蟲蝕下部生瘡青葙子散方青葙子一兩雚蘆二兩狼牙一兩橘皮一兩苦參三兩右五味搗篩為散米飲和服方寸匕日三服未差更服以差為度又療天行痢膿血下部生􅉶蟲黃連丸方黃連三兩末生用蠟一兩烏梅肉三兩熬末右三味鎔蠟和蜜為丸如梧子大空心米飲下三十丸再服加至四十丸差忌豬肉冷水天行隂陽易方二首病源天行隂陽易病者是男子婦人天行病新差未平復而與交接得病者名為隂陽易也其男子病新差未平復而婦人與之交接得病者名為陽易其婦人新病差未平復男子與之交接得病者名為隂易若二男二女並不相易所以呼為易者隂陽相感動其毒度著於人如換易也其病狀身體熱衝胸頭重不能舉眼中生眵四肢拘急小腹絞痛手足拳皆即死其亦有不即死者病苦小腹裏急熱上衝胸頭重不欲舉百節解離經脈緩弱血氣虛骨髓竭便噓噓吸吸氣力轉少著牀不能搖動起止仰人或歲月方死出第九卷中深師療丈夫得婦人隂易之病若因房室及諸虛勞少腹堅絞痛隂縮困篤欲死方灸隂頭一百壯便差可至三百壯皆愈良無比後生子如故無妨范汪同無所忌又療隂陽易病方取豚卵二枚溫令熱酒吞之則差出第十四卷中天行虛羸方二首病源夫人榮衛先虛復為邪熱所中發汗吐下之後經絡損傷隂陽竭絶虛邪始散真氣尚少五藏猶虛穀神未復無津液以榮養故虛羸而生衆病焉出第九卷中崔氏療煩躁而渴不止惡寒仍熱盛者竹葉湯常用亦佳不徒療天行凡虛羸久病及瘧後胸上痰熱者服之皆妙方甘草二兩炙棗十五枚擘半夏一兩洗芍藥三兩前胡一兩黃芩一兩小麥五合人參二兩粳米一升知母二兩麥門冬四合去心栝蔞一兩生薑四兩竹葉一把須以竹蓧飲代水煮湯不用其葉右十四味切以竹蓧飲一斗五升煮取五升分三服若非天行而虛羸久病胸生痰熱亦可服之加黃耆二兩除黃芩減知母一兩除栝蔞用之大效忌羊肉海藻菘菜餳出第一卷中千金補虛大病後不足萬病虛勞同此方取五歲以上七歲以下黃牛新生者乳一升以水四升煎取一升如人肌稍稍飲之不得過多十日不住服佳出第十卷中天行差後禁忌方二首集驗云凡熱病新差及大病之後食豬肉及腸血肥魚油膩等必大下痢醫不能療也必至於死若食餅餌粢黍飴脯鱠炙棗栗諸果及堅實難消之物胃氣尚虛弱不能消化必更結熱適以藥下之則胃中虛冷大利難禁不下必死下之復危皆難救也熱病之後多坐此死不可不慎也病新差但得食糜粥寧可少食令飢慎勿飽不得他有所食雖思之勿與引日轉久可漸食羊肉糜若羮汁兔雉鹿肉慎不可食豬犬肉也新差後當靜卧慎勿令人梳頭洗面非但體勞亦不可多言語用心使意勞凡此皆令勞復故督郵顧子獻得病已差未健詣華敷視脈敷曰雖差尚虛未復陽氣不足勿為勞事餘勞尚可御內即死臨死當吐舌數寸其妻聞其夫病除從百餘里來省之止宿交接中間三日發病舌出數寸而死病新差未經百日氣未平復而以房室者略無不死也蓋正疾愈後六十日已能行射獵以房室則吐涎而死及熱病房室名為隂陽易之病皆難療多死近者有士大夫小得傷寒發汗已十餘日能乘馬往來自謂平復故以房室則小腹急痛手足拘拳而死出第二卷中千金同深師説天行病未復強食黃花菜手足稍重一方云青花天行病差食鱔鱠必變成癡又食鱯魚肉結氣不化天行病差飲酒合隂陽復必死天行病損未滿三月日食鯔鱔肉則復下血食鹽豉令人四肢不舉天行病差食諸菜有花者三年肌膚不充天行病未好時食生瓜芥三月流腫也天行病差食菜合隂陽復必死出第十四卷中千金天行病差後未滿五日食一切肉麵者病更發困天行病差食芥鱠作疽天行病差新起飲酒及食薤菜病更發天行病新差食生魚鮓下痢必不止天行病差食生菜顔色絶身不平復天行病新汗解飲冷水者損心包令人虛不復天行病未復食犬肉並葫荽合食之復則死天行病差食生棗及羊肉者膈上作熱蒸天行新差食犬肉羊肉作骨中蒸熱天行病差食魚肉并瓜生菜令人身腫天行病差食蒜膾者病發大困出第十卷中天行勞復食復方六首病源夫病新差血氣尚虛津液未復因即勞動更成病焉若言語思慮則勞傷於神梳頭澡洗則勞於力未堪勞而強勞之則生熱熱氣既還入經絡復為病者名曰勞復又病新差脾胃尚虛穀氣未復若食肥肉魚膾餅棗栗之屬則未能消化停積在於腸胃使脹滿結實因更發熱復為病者名曰食復並出第九卷中廣濟療患天行熱氣差後勞發頭痛如初病者鼠矢湯方雄鼠屎三七枚熬末湯成下乾葛二兩梔子十四枚擘蔥白一升豉八合右五味切以水三升煮取一升七合去滓內鼠屎末分溫二服服别相去如人行六七里微汗內消不利忌如藥法又療患數日復勞發者枳實湯方枳實三枚炙梔子十四枚擘蔥白切一升香豉半升鼠屎二七枚右五味以水一斗煎取二升五合分溫三服服别相去如人行六七里進一服內消不利忌如藥法並出第一卷中深師竹葉湯療天行後虛熱牽勞食復四肢沈重或一卧一起氣力吸吸羸弱方竹葉一把小麥一升甘草一兩炙石膏二兩碎茯苓二兩半夏一升洗去滑前胡二兩知母二兩黃芩二兩人參二兩生薑四兩大棗二十枚擘右十二味切以水一斗二升煮竹葉小麥減四升去滓內藥煮取三升分三服忌海藻菘菜醋物羊肉餳等物備急療勞復方以粉三升以暖飲和服厚覆取汗又以水和胡粉少許服之亦佳出第一卷中延年葛根飲主熱病勞復身體痛天行壯熱煩悶葛根湯方葛根一兩蔥白一握豉半升米一合右四味先切葛根以水九升煮取七升則內蔥白更煮取四升去葛及蔥滓訖則內䜴及少許米煮取三沸並濾去米等滓分四服當有汗出即差明旦又更作服忌豬肉蒜等並出第九卷中必效療天行勞復鼠矢湯方雄鼠屎五枚兩頭尖者豉一升梔子二十枚擘枳實三枚中破炙令黃右四味以水五升煮取二升四合分四服相去十里久若覺大便澀加大黃二兩出第一卷中天行差後勞發方五首許仁則云此病復發不但起動勞役或因飲食稍多或因言語過分或緣視聽不節或為動轉不常皆成此復若復甚者乃至不救劇於初得病時不可以復發而云輕易勞復狀一如傷寒初有如此者宜合蔥白等七味飲服之漸覆取汗方蔥白連鬚切一升乾葛切六合新豉一合綿裹生薑切二合生麥門冬去心六合乾地黃六合勞水八升此水以杓揚之一千過右藥用勞水煎之三分減二去滓分溫三服相去行九里如覺欲汗漸漸覆之兼主傷寒忌蕪荑又依前蔥白等七味飲服之得可但適寒溫將息以取安穩若不覺可宜合萎蕤等五味飲子服之方萎蕤五兩切蔥白切一升豉一升綿裹粳米三合研碎雄鼠屎七枚末之右藥以水七升先煮豉以上取四升汁去滓內粳米屑煮米爛訖內鼠屎末攪調頓服覆被安卧取汗差又凡天行病差後凖常合漸健能行履遂過限不堪起動體氣虛羸每覺頭痛唇口乾乍寒乍熱發作有時或雖能行動運轉然每作時節有前狀者名天行後不了了有此宜合地骨白皮等五味飲子白薇等十味丸方細細服之地骨白皮三兩知母三兩麥門冬五兩去心竹瀝一升白蜜三合右藥切知母以上和麥門冬然後以水六升煮取二升去滓內竹瀝蜜攪調分溫三服服相去如人行十里久如覺虛不能空腹頓盡欲間食服亦佳兼主傷寒又若服前地骨白皮等五味飲子不可雖可不能全退宜合白薇等十味丸方白薇三兩知母四兩地骨皮三兩乾地黃六兩麥門冬五兩去心甘草四兩炙蜀􅃮三兩萎蕤三兩橘皮二兩人參三兩右藥細切合搗篩絹羅為散蜜和丸如梧桐子大初服以飲下十五丸日再服稍加至三十丸服經三數日後自候腹中若覺熱則食前服如不能以空飲下藥宜合烏梅等四味飲下前丸忌菘菜海藻蕪荑等烏梅飲方烏梅十枚萎蕤五兩生薑五兩白蜜一合右藥切以水六升煮三味取二升去滓內白蜜攪調細細用下前丸多少冷暖以意斟酌縱不下丸但覺口乾渴則飲之吳升同外臺祕要方卷三
