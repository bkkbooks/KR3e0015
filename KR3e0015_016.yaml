如梧子二丸日三不知稍加千金文仲集驗古今錄驗同云療癥堅心下大如柸食則腹滿心腹絞痛又熨癥方生葫一升竈中黄土一升右二味先擣葫熟内土復擣以好苦酒澆令浥浥先以塗布一面仍㩉病上又塗布上乾復易之取令消止並出第一卷中癥癖痃氣灸法四首崔氏療癥癖閃癖方令患人平坐取麻線一條繞項向前垂線頭至鳩尾横截斷即迴線向後當脊取線窮頭即㸃記乃别横度口吻吻外截却即取度吻線中摺於脊骨㸃處中心上下分之各㸃小兩頭通前合灸三處其所灸處日别灸七壯以上十壯以下滿十日即停看患人食稍得味即取線還度口吻於脊中㸃處横分灸之其數一準前法仍看脊節穴去線一二分亦可就節穴下火如相去逺者不須就節穴若患人未捐可停二十日外還依前灸之仍灸季肋頭二百壯其灸季肋早晩與灸脊上同時下火也又灸閃癖法其癖有根其根有著背者有著膊上者遣所患人平坐熟看癖頭仍將手從癖頭向上尋之當有脈築築然向上細細尋至膊上至築築頭當膞即下火還與前壯數無别王丞云背上恐不得過多下火只可細細日别七炷以來又療癖左右相隨病灸法第一屈肋頭近第二肋下即是灸處第二肋頭近第三肋下亦是灸處左右各灸五十壯一時使了千金云灸癥癖方患左灸左患右灸右脊屈肋數第二肋上第三肋下向肉翅前初日灸三次日五周而復始至五十止忌大蒜餘不忌又灸痃氣法從乳下即數至第三肋下共乳上下相當稍似近肉接腰骨外取穴孔即是灸處兩相俱灸初下火各灸三壯明日四壯每日加一壯至七壯還從三壯起至三十日即罷右前兩種灸法若㸃時拳脚㸃即拳脚灸若舒脚㸃時還舒脚灸並出第七巻中積聚方五首病源積聚者由陰陽不和腑蔵虚弱受於風邪搏於腑藏之氣所為也腑者陽也臟者陰也陽浮而動陰沈而伏積者陰氣五臓所生始發不離其部故上下有所窮已聚者陽氣六腑所成故無根本上下無所留止其痛無有常處諸蔵受邪初未能為積聚留滯不去乃成積聚肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人發㾬瘧連嵗月不已以季夏戊巳日得之何以言之肺病當傳肝肝傳脾脾季夏適王王者不受邪肝欲復還肺肺不肯受故留結為積故知肝之積以季夏戊巳日得之也心之積名曰伏梁起臍上大如臂上至心下以秋庚辛日得之何以言之腎病當傳心心當傳肺肺以秋適王王者不受邪心欲復還腎腎不肯受故留結為積故知伏梁以秋庚辛日得之也脾之積名曰痞氣在胃管覆大如盤久不愈令人四肢不收發黄疸飲食不為肌膚以冬壬癸日得之何以言之肝病當傳脾脾當傳腎腎以冬適王王者不受邪脾欲復還肝肝不肯受故留結為積故知痞氣以冬壬癸日得之也肺之積名曰息賁在右脅下覆大如杯久不愈令人灑浙寒熱喘欬發肺癰以春甲乙日得之何以言之心病當傳肺肺當傳肝肝以春適王王者不受邪肺欲復還心心不肯受故留結為積故知息賁以春甲乙日得之也腎之積名曰賁㹠發於少腹上至心下若賁㹠走之狀上下無時久不愈令人喘逆骨痿少氣以夏丙丁日得之何以言之脾病當傳腎腎當傳心心以夏適王王者不受邪腎欲復還脾脾不肯受故留結為積故知賁㹠以夏丙丁日得之也此為五積診其脈駃而𦂳積聚脈浮而牢積聚脈横者脅下有積聚脈來小沈實者胃中有積聚不下食食即吐出脈來細䎡附骨者積也脈出在左積在左脈出在右積在右脈兩出積在中央以部處之診得肺積脈浮而毛按之辟易脇下氣逆背相引痛少氣善忘目瞑皮膚寒秋愈夏劇主皮中時痛如蝨緣狀其甚如鍼刺之狀時痒白色也診得心積脈沉而芤時上下無常處病悸腹中熱面赤咽乾煩掌中熱甚即唾血主身瘈瘲主血厥夏差冬劇色赤也診得脾積脈浮大而長饑則減飽則見瞋起與穀爭累累如桃李起見於外腹滿嘔瀉腸鳴四肢重手足脛腫厥不能卧是主肌肉損色黄也診得肝積脈弦而細兩脅下痛邪走心下足脛寒脅痛引少腹男子積疝也女子病淋也身無膏澤喜轉筋𤓰甲枯黑春差秋劇色青也診得腎積脈沈而急苦脊與腰相引饑則見飽則減病腰痛少腹裏急口乾咽腫傷爛目昏昏骨中寒主髓厥喜忘色黑也診得心腹積聚其脈牢强急者生脈虚弱急者死又積聚之脈實强者生沈者死其湯熨鍼石别有正方補養宣導今附於後養生方導引法云以左足踐右足上除心下積又云病心下積聚端坐柱腰向日仰頭徐以口内氣因而咽之三十過而止開目又云左脅側卧伸臂直脚以口内氣鼻吐之通而復始除積聚心下不便又云以左手按右脅舉右手極形除積及老血又云閉口微息正坐向王氣張鼻取氣逼置臍下小口㣲出十二通氣以除結聚低頭不息十二通以消飲食令人輕强行之冬月令人不寒又云端坐拄腰直上展兩臂仰兩手掌以鼻内氣閉之自極七息名曰蜀王橋除脅下積聚又云向晨去枕正偃卧伸臂脛瞑目閉口不息極張腹兩足再息頃間吸腹仰兩足倍拳欲息㣲定復為春三夏五秋七冬九蕩滌五臓津潤六腑所病皆愈復有病積聚者張吸其腹熱乃止癥瘕散破即愈矣出第十九巻中范汪破積丸療積聚堅癥方大黄一觔牡蠣三兩凝水石一兩石膏一兩石鍾乳一兩理石一兩右六味擣合下篩和以蜜丸如梧子先食服酒飲任下三丸日三不知稍増以知為度又順逆丸主久寒積聚氣逆不能食方大黄十分黄芩四分厚朴四分炙乾地黄四分桂心四分滑石四分杏子二分黄連四分麥門冬四分去心右九味擣合下篩和以蜜丸如梧子服十九日再服後食不知稍増以知為度忌蕪荑生葱猪肉又捶鑿丸療腹中積聚邪氣寒熱消穀方甘遂一分蕘花一分桔梗一分桂心一分巴豆一分杏仁一分芫花一分右七味蕘花芫花熬冷香巴豆杏仁去皮熬令變色已各異擣下細篩擣合丸以白蜜擣萬杵服如小豆一丸日三行長將服之傷寒増服膈上吐膈下利小兒亦服婦人兼身亦服名曰捶鑿以消息之忌猪肉蘆笋生葱並出第十三巻中延年療腹内積聚癖氣衝心肋急滿時吐水不能食兼惡寒方鼈甲六分炙防葵四分人參四分前胡四分桔梗四分檳榔八分白术八分大黄八分枳實四分炙厚朴三分炙當歸四分附子四分炮乾薑四分甘草五分炙呉茱茰三分右十五味擣篩蜜和為丸梧子大一服十五丸酒下日再服加至三十丸忌莧菜猪肉生冷魚蒜又白术丸主積聚癖氣不能食心肋下滿四肢骨節酸疼盜汗不絶方白术六分黄芪六分牡蠣四分熬人參六分茯芩六分烏頭六分炮乾薑六分芍藥四分當歸六分細辛四分麥門冬四分去心桂心五分前胡四分甘草六分炙防葵三分鼈甲四分炙紫菀三分炙檳榔六分桔梗三分右十九味擣篩蜜和為丸空肚酒下二十丸日再加至三十丸忌莧菜桃李大醋猪肉生葱並出第十六巻中積聚心腹痛方三首病源積者陰氣五蔵所生其痛不離其部故上下有所窮已聚者陽氣六腑所成故無根本上下無所留止其痛無有常處此皆由寒氣搏於蔵腑與陰陽氣相擊下上故心腹痛也診其寸口之脈沉而横脅下有積腹中有横積聚痛又寸口脈細沉滑者有積聚在脅下左右皆滿與背相引痛又云寸口脈𦂳而牢者脅下腹中有横積結痛而泄痢脈㣲細者生浮者死出第十九巻中范汪通命丸療心腹積聚寒中㽲痛又心胷滿脅下急繞臍痛方大黄四分逺志四分去心黄芪四分麻黄四分去節甘遂四分鹿茸四分灸杏仁六十枚䜴一合巴豆五十枚芒硝三分右十味擣合下篩和以蜜丸如小豆先食服三丸日再忌蘆笋野猪肉一方無鹿茸黄芪用黄芩出第十四巻中又療心腹積聚食苦不消胷脋滿除去五臓邪氣四物丸方大㦸五分㕮咀熬令色變芫花四分熬杏仁一分巴豆一百枚去皮心熬右藥擣合下細篩以雞子中黄亦可以蜜和丸如小豆日三日増一丸覺勿復益欲下頓服七丸下如清漆陳宿水婦人乳有餘疾留飲者下水之後養之勿飲冷水長壯者服五丸先食忌野猪肉蘆笋出第十三卷中古今錄驗匈奴露宿丸療心腹積聚膈上下有宿食留飲神方出僧深甘草三分炙大黄二分甘遂二分芫花二分熬大㦸二分炙葶藶子二分熬苦參一分硝石一分巴豆半分去心皮熬右九味細擣合蜜和丸如小豆服三丸當吐下不吐下稍益至五六丸以知為度先少起忌海藻蘆笋菘菜野猪肉范汪同出第十巻中積聚心腹脹滿方一首病源積聚成病藴結在内則氣行不宣通還搏於腑蔵故心腹脹滿則煩悶而短氣也出第十九巻中深師烏頭丸療心腹積聚脹滿少食多厭繞臍痛按之排手寒中有水上氣女人產後餘疾大人風癲少小風驚癎百病者元嘉中用療數人皆良有一人服五服藥即出蟲長一尺餘三枚復出如牛膽黑堅四枚中皆有飯食病即愈方烏頭七枚炮乾薑五分菖蒲三分人參三分桂心四分柴胡三分附子三分炮厚朴三分炙黄連三分茯苓三分蜀椒五分汗桔梗三分呉茱茰四分皂莢五分炙兼皮子右十四味擣節蜜和為丸服如梧子二丸日三稍加至十五丸忌猪肉冷水醋物生葱羊肉餳出第二十三巻中積聚宿食寒熱方四首病源積聚而宿食不消者由腑蔵為寒氣所乘脾胃虚冷故不能消化留為宿食也診其脈來實心腹積聚飲食不消胃中冷故也出第十九巻中千金翼三台丸療五蔵寒熱積聚臚脹腸鳴而噎食不作肌膚甚者嘔逆若傷寒寒瘧已愈令不復發食後服五丸飲多者吞十丸長服令人大小便調和長肌肉方大黄二兩熬熟硝石一升葶藶一升熬前胡二兩厚朴一兩炙附子一兩炮茯苓半兩半夏一兩洗細辛一兩杏仁一升去尖皮熬右十味擣篩蜜和擣五千杵酒服如梧子五丸稍加以知為度忌猪羊肉餳生菜酢物深師同出第二十巻中古今錄驗氣痞丸療寒氣痞積聚結不通繞臍切痛腹中脹滿胷逼滿風入蔵憂恚所積用力不節筋脈傷羸瘦不能食飲此藥令人强嗜食益氣力方烏頭二分炮甘草二分炙葶藶子二分熬大黄二分芎藭二分芍藥二分甘皮二分炙右七味下篩蜜和丸如梧子一服三丸日再不知漸至五丸七丸一方桂心二分去甘皮忌海藻菘菜猪肉冷水等一方有通草無甘皮又小烏頭丸療久寒積聚心腹繞臍切痛食飲不下方烏頭三兩炮甘草三兩炙茱茰半兩細辛二兩半夏二兩附子二兩炮藁本二兩右七味下篩蜜和丸如梧子大先食服五丸日再不知稍増之忌羊猪肉冷水又五通丸主積聚留飲宿食寒熱煩結長肌膚補不足方椒目一兩附子一兩炮厚朴一兩炙杏仁三兩半夏一兩葶藶三兩熬芒硝五兩大黄九兩右八味擣葶藶子杏仁使熟和諸藥末和以蜜擣五千杵吞如梧子二丸忌諸羊肉餳冷水出第十巻中療癥方三首病源癥者由寒温失節致腑蔵之氣虛弱而食飲不消聚結在内漸染生長塊段盤牢不移動者是癥也言其形狀可徵驗也若積引嵗月人則柴瘦腹轉大遂至於死診其脈弦而伏其癥不轉動者必死出第十九巻中范汪療癥病丸方射罔二兩熬蜀椒三百粒汗右二味擣末下細篩以雞子白和丸半如麻子半如赤小豆先服如麻子漸服如赤小豆二丸不知稍増之以知為度出第十三巻中集驗療心腹宿癥及卒得癥方取雄雞一頭飼之令肥肥後餓二日以好赤朱溲飯極令朱多以飼雞安雞著板上取糞暴燥末温清酒服五分匕可至方寸匕日三若病困急者晝夜可五六服一雞少更飼餘雞取足出第六巻中備急熨癥方呉茱茰三升右一味以酒和煮熱布褁以熨癥上冷更炒更畨用之癥移走逐熨都消乃止也肘後方云亦可用射罔五兩茱茰末以雞子白和塗癥上出第三巻中暴癥方六首病源暴癥者由蔵氣虚弱食生冷之物蔵旣本弱不能消之結聚成塊卒然而起其生無漸名之暴癥也本由蔵弱其癥暴至至於成病斃人則速出第十九巻中肘後療卒暴癥腹中有物堅如石痛如刺晝夜啼呼不療之百日死方取牛膝根二斤㕮咀暴令極乾右一味酒一斗浸之宻器中封口舉著熱灰中温之令味出先食服五六合至一升以意量多少又用蒴藋根亦準此大良千金集驗經心錄張文仲同又凡癥堅之起多以漸生而有覺便牢大者自難療也腹中㣲有結積便害飲食轉羸瘦療多用陷氷玉壺八毒諸大藥今上取小小易得者方取虎杖根勿令影臨水上者可得石餘淨洗乾之擣作末以秫米五斗炊飯内攪之好酒五斗漬封藥消飯浮可飲一升半勿食鮭鹽癥當出亦可但取其根一升乾擣千杵酒漬飲之從少起日三亦佳此酒療癥乃勝諸大藥張文仲同又方大黄半斤朴硝三兩蜜一觔右三味合於湯上煎可丸如梧子服十丸日三備急文仲崔氏同惟崔氏用朴硝半斤蜜一升半服二十丸日再服餘依肘後並出第一巻中千金翼療卒暴癥方蒜十片去皮五月五日户上者伏龍肝鴨卵大一枚桂心一尺二寸右三味合擣以淳苦酒和之如泥塗著布上掩病處三日消肘後千金同凡蒜或無桂心亦得用也又方商陸根擣蒸之以新布籍腹上以藥鋪布上以衣覆冷即易取差止數日之中晨夕勿息千金集驗肘後同並出第十九卷中古今錄驗療暴得癥方取蒴藋根一小束淨洗瀝去水細切以醇酒浸之取淹根三宿服五合至一升日三若欲速得可於熱灰中温令藥味出服之此方無毒已愈十六人神驗藥盡復作將服之出第十巻中鼈癥方四首病源鼈癥者謂腹内癥結如鼈之形狀也有食鼈觸冷不消而生癥者有食雜冷物不消變化而作者此皆脾胃氣弱而遇冷不能剋消故也癥者其病結成推之不動移是也出第十九巻中廣濟療鼈癥服白馬尿方白馬尿一升五合温服之令盡差又方白馬尿一升雞子三枚破取白右二味於鐺中煎取三合空腹服之不移時當吐出病無所忌千金同又療鼈癥蟹爪丸方蟹爪三分附子六分炮麝香三分研半夏六分生薑四分屑鼈甲六分炙防葵六分郁李仁八合右八味擣篩蜜和為丸如梧子空肚以酒下二十丸日再服以知為度忌生冷猪肉莧菜並出第二巻中集驗療鼈癥伏在心下手揣見頭足時時轉者并心腹宿癥及卒得癥方白雌雞一雙絶食一宿明旦以膏熬飯飼之取其屎無問多少以小便和之於銅器中火上熬令燥擣篩服方寸匕日四五服消盡乃止常飼雞取屎差畢殺雞單食之肘後同出第六卷中米癥方二首病源人有好啞米啞謹按說文於革切笑也集韻無此字但有飢乙革切飢也今詳啞者飢而喜食之義也下同轉久彌嗜啞之若不得米則胷中清水出得米便止米不消化遂生癥結其人常思米而不能飲食久則斃人出第十九卷中廣濟療米癥其疾常欲食米若不得米則胷中清水出方雞屎一升白米五合右二味合炒取米焦擣篩為散用水一升頓服取盡少時即吐吐出癥如研米汁碎若無癥即吐白沫痰水乃憎米不復食之無所忌千金同又療米癥久不療羸瘦以至死方葱白兩虎口切烏梅三十枚碎右二味以水三升宿漬烏梅使得極濃清晨噉葱白隨飲烏梅汁令盡頃之心腹煩欲吐即令出之三晨療之當吐去米癥差無所忌並出第三卷中食癥及食魚肉成癥方二首病源有人卒大能食乖其常分因饑値生葱便大食之乃吐一肉塊繞畔有口其病則愈故謂食癥特由不幸致此妖異成癥非飲食生冷過度之病也出第十九卷中廣濟療食癥病食葱差方有一人食飯七升并羊脂餅畨不論數因於道中過饑則食生葱須臾吐出一實簿而圓繞畔有口無數即以食投之立消盡飯七升乃止吐此物後其人食病便愈此名食癥無忌出第二卷中千金療食魚肉等成癥結在腹内并諸毒氣方狗糞五升右一味燒灰末之綿褁以酒一斗漬再宿濾取清分十服日三服三日令盡隨所食癥結即便出矣出第十一卷中髪癥方二首病源有人因食飲内誤有頭髪隨食而入胃成癥胷喉間如有蟲下上來去者是也出第十九卷中廣濟療髪癥乃由人因食而入久即胷間如有蟲上下去來唯欲得飲油方油一升右一味以香澤煮之大􅀈鐒貯之安病人頭邊以口鼻臨油上勿令得飲及傳之鼻面並令有香氣當呌喚取飲不得與之必疲極眠睡其髪癥當從口出飲油人専守視之并石灰一褁見癥出以灰粉手捉癥抽出須臾抽盡即是髪也初從腹出形如不流水中濃菜隨髪長短形亦如之無忌千金同又療胷喉間覺有癥蟲上下偏聞葱䜴食香此是髪蟲故也方油煎葱䜴令香二日不食張口而卧將油葱䜴置口邊蟲當漸出徐徐以物引去之無所忌出第二卷中蝨癥方一首病源人有多蝨性好齧之所齧既多而腑臓虛弱不能消之不幸變化生癥而患之者亦少俗云患蝨癥人見蝨必齧之不能禁止蝨生長在腹内時有從下部出亦斃人出第十九卷中千金療蝨癥由齧蝨在腹生長為蝨癥方故箆子一枚故梳子一枚右二味各破為兩分各取一分燒作灰末之又取一分以水五升煮取一升用頓服前末盡少時當病出無所忌廣濟同出第二卷中鼈瘕方一首病源鼈瘕者謂腹内瘕結如鼈狀是也有食鼈觸冷不消而生者亦有食諸雜冷物變化而作者皆由脾胃氣弱而遇冷即不能剋消所致瘕言假也謂其形假而推移也昔曽有人共奴俱患鼈瘕奴在前死遂破其腹得一白鼈仍故活有人乘白馬來看此鼈白馬忽尿墮落鼈上即縮頭及脚尋以馬尿灌之即化為水其主曰吾將愈矣即服之果如其言得差故養生云六月勿食澤中水令人成鼈瘕出第十九卷中崔氏療鼈瘕方大黄六銖乾薑半兩附子九銖炮人參九銖側子半兩炮桂心六銖貝母半兩白术一兩細辛十八銖䗪蟲大一尺者七枚熬右十味擣下篩以酒服半方寸匕日三忌猪肉冷水出第九卷中蛇瘕方一首病源人有食蛇不消因腹内生蛇瘕也亦有蛇之津液誤入飲食内亦令人病瘕其状常苦饑而食則不下喉噎塞食至胷内即吐出其病在腹摸揣亦有蛇狀謂蛇瘕也出第十九卷中崔氏療蛇瘕大黄湯方大黄半兩芒硝如雞子一枚烏鰂魚骨三枚黄芩半兩甘草如人指一尺炙皂莢六枚如猪牙者炙去皮子右六味㕮咀以水六升煮之三沸下絞去滓内芒硝適寒温盡服之十日一劑煮作如上法欲服之宿無食平旦服當下病也千金同出第九卷中蛟龍病方一首病源蛟龍病者云三月八月蛟龍子生芹菜上人食芹菜不幸隨入人腹變成蛟龍其病之狀發則如癲出第十九卷中廣濟療蛟龍病三月八月近海及水邊因食生芹菜為蛟龍子生在芹菜上食入人腹變成龍子須慎之其病發似癲面色青黄少腹脹狀如懷姙宜食寒食餳方寒食粥餳三升日三服之吐出蛟龍有兩頭及尾開皇六年又賈橋有人喫餳吐出蛟龍大驗無所忌千金方同出第二卷中胷痺方二首病源寒氣客於五蔵六腑因虚而發上衝胷間則胷痺胷痺之候胷中愊愊如滿噎塞不利習習如痒喉裏澁唾燥甚者心裏强痞急痛肌肉苦痺絞急如刺不得俛仰胷前皮皆痛手不能犯胷滿短氣欬唾引痛煩悶汗出或徹背膂其脈浮而㣲者是也不治數日殺人其湯熨鍼石别有正方補養宣導今附於後養生方云以右足踐地左足上除胷痺食熱嘔出第三十卷中仲景傷寒論療胷痺理中湯方人參三兩甘草三兩炙白术三兩乾薑三兩右四味切以水八升煮取三升去滓温服一升日三夜一頻服三劑愈張仲景云胷痺心中痞堅留氣結於胷胷滿脅下逆氣搶心理中湯亦主之千金同出第十六卷中深師療胷痺麝香散方麝香四分牛黄二分生犀角一分屑末右三味研服五分匕日三忌生冷物葱蒜出第十六卷中胷痺短氣方三首千金論曰夫脈當取太過與不及陽㣲陰弦即胷痺而痛所以然者責其極虚故也今陽虚知在上焦所以胷痺心痛者以其脈陰弦故也平人無寒熱短氣不足以息者實也仲景傷寒論同胷痺之病喘息欬唾胷背痛短氣其脈沉而遲關上小𦂳數者栝樓湯主之方栝蔞一枚薤白一斤半夏半升洗生薑四兩洗枳實二兩炙右五味切以白酨漿一斗煮取四升服一升日三肘後仲景傷寒論無生薑枳實半夏等三味同小品云用水一斗忌羊肉餳又胷中氣塞短氣茯苓湯主之方茯苓三兩甘草一兩炙杏仁五十枚右三味㕮咀以水一斗煮取五升温服一升日三服不差更合仲景傷寒論同並出第十三卷中深師療胷痺連背痛短氣細辛散方細辛乾地黄甘草各二兩炙桂心茯苓各五兩枳實炙白术生薑栝蔞實各三兩右九味擣篩酒服方寸匕日三古今錄驗千金同出第十三卷中胷痺心下堅痞緩急方四首千金論胷痺之病令人心中堅痞急痛肌中苦痺絞急如刺不得俛仰其胷前皮皆痛手不得犯胷中愊愊如滿咽塞習習痒喉中乾燥時欲嘔吐胷滿短氣欬唾引痛煩悶自汗出或徹引背腹痛不即療之數日殺人出第十三卷中范汪療胷痺心中痞堅留氣結於胷中胷滿脅下逆氣搶心枳實湯方陳枳實四枚炙厚朴四兩炙薤白八兩桂心一兩栝蔞實一枚右五味先以水五升煮枳實厚朴取二升半去滓内餘藥又煎三兩沸去滓分温三服除心氣良古今錄驗千金同此本仲景傷寒論方古今錄驗療胷中隠然而痛脊膂肩痛方桂心一分乾薑一分貝母三分細辛三分烏頭一分炮山茱茰三分人參三分右七味擣下篩和以蜜丸如小豆大酒若粥汁呑二丸稍稍益以胷中痛止温温為度忌生葱生菜猪肉冷水又療胷痺偏緩急薏苡仁散方薏苡仁五百枚附子十枚大者炮甘草三兩炙右三味擣下篩服方寸匕日三忌海藻菘菜猪肉冷水又療胷痺偏緩急薏苡仁散方附子大者十枚炮薏苡仁一千五百枚右二味擣下篩服方寸匕日三不知稍増之忌猪肉冷水此方出僧深范汪同仲景方用薏苡仁十五兩並出第八卷中胷痺噎塞方二首仲景傷寒論胷痺之病胷中愊愊如滿噎塞習習如癢喉中澀唾燥沫是也橘皮枳實湯主之方橘皮半斤枳實四枚炙生薑半斤右三味切以水五升煮取二升分再服肘後小品文仲深師范汪古今錄驗經心錄千金同出第十五卷中千金通氣湯療胷滿短氣噎塞方半夏八兩洗生薑六兩呉茱茰四十枚桂心三兩右四味切以水八升煮取三升去滓分温三服忌羊肉餳生葱一方無桂心用橘皮出第十三卷中胷痺欬唾短氣方四首仲景傷寒論胷痺之病喘息欬唾胷背痛短氣寸脈沉而遲關脈小𦂳數者栝蔞薤白白酒湯主之方栝蔞實一枚薤白切半升右二味以白酨酒七升煮取二升去滓温分再服深師范汪同出第十五卷中肘後論胷痺之病令人心中堅痞急痛肌中苦痺絞急如刺不得俛仰其胷前及背皆痛手不得犯胷滿短氣欬唾引痛煩悶白汗出或徹引背膂不即療數日殺人療卒患胷痺方雄黄巴豆去皮心熬右二味先擣雄黄細篩内巴豆務熟擣之相和丸如小豆服一丸不覺稍益忌野猪肉蘆笋又方枳實炙右一味擣篩以米汁先食服方寸匕日三夜一又或已差復更發方取薤根五斤右一味擣絞取汁飲之立愈並出第一卷中胷痺心痛方四首仲景傷寒論胷痺不得臥心痛徹背者栝蔞薤白半夏白酨漿湯主之方大栝蔞一枚薤白切三兩半夏半升洗右三味以白酨漿一斗煮取四升去滓温服一升日三忌羊肉餳古今錄驗同范汪同出第十五卷中千金療胷痺心痛方灸膻中百壯穴在鳩尾上一寸一云膺腧中行直兩乳内間是忌鍼又療胷脅滿心痛方灸期門隨年壯穴在第二肋端乳直下不容旁一寸半是並出第十三卷中古今錄驗小草丸療胷痺心痛逆氣膈中飲不下方小草三分桂心三分蜀椒三分汗乾薑二分細辛三分附子二分炮右六味擣合下篩和以蜜丸如梧子大先食米汁服三丸日三不知稍増以知為度忌猪肉冷水生葱生菜范汪同出第八卷中胷痛方二首范汪療胷痛枳實散方枳實八分炙桂心五分右二味擣下篩酒服方寸匕日三忌生葱深師同深師療胷痛枳實散方枳實四枚炙神麴一兩熬白术一兩右三味擣節酒服方寸匕日三忌桃李雀肉等出第十六卷中賁㹠氣方四首病源夫賁㹠者腎之積氣也起於驚恐憂思所生也若驚恐則傷神心蔵神也憂思則傷志腎蔵志也神志傷動氣積於腎而氣下上遊走如㹠之賁故曰賁㹠其氣乗心若心中踊踊如車所驚如人所恐五蔵不定食飲輒嘔氣滿胷中狂癡不定妄言妄見此驚恐賁㹠之狀也若氣滿支心心下煩亂不欲聞人聲休作有時乍差乍劇吸吸短氣手足厥逆内煩結痛温温欲嘔此憂思賁㹠之狀也診其脈來祝祝一云觸祝者病賁㹠也腎脈㣲急沉厥賁㹠也其足不收不得前後出第十三卷中小品黄帝問金冶子曰驚為病如奔㹠其病奈何金冶子對曰驚為奔㹠心中踊踊如事所驚如人所恐五蔵不定食飲輙嘔氣滿胷中狂癡欲走閉眼謬言開眼妄語或張面目不相取與衆師不知呼有所負賁㹠湯主之黄帝曰善黄帝問金冶子曰憂思賁㹠何以别之金冶子對曰憂思賁㹠者氣滿支心心下煩亂不欲聞人之聲發作有時乍差乍劇吸吸短氣手足厥逆内煩結痛温温欲嘔衆師不知呼有觸忤奔㹠湯主之黄帝曰善師曰病如奔㹠者氣從少腹起上衝喉咽發作欲死復還生皆從驚恐得之腎間有膿故也范汪同師曰病有奔㹠有吐膿有驚怖有火邪此四部病者皆從驚發得之火邪者桂枝加龍骨牡蠣湯主之若新亡財為縣官所捕迫從驚恐者療用䲭頭鈆千金翼有飛鴻鈆丹丸主癲癎瘲此意相近鈆􅀈一云角為馬桃末即羚羊角復餘物未定未定者上作方未成所言奔㹠者病人氣息逆喘迫上如㹠奔走之狀奔㹠湯主之又療卒傷損食下則覺胷中偏痛慄慄然水漿下亦爾問病與相應急作此方麥門冬一升去心人參二兩桂心二兩甘草一兩炙生李根一斤細剉之右五味㕮咀以水一斗煮取三升分三服范汪同又奔㹠湯療虛勞五蔵氣乏損逰氣歸上上走時若羣㹠相逐憧憧時氣來便自如坐驚夢精光竭不澤陰痿上引少腹急痛面乍熱赤色喜怒無常耳聾目視無精光方葛根八兩乾者生李根切一升人參三兩半夏一升洗芍藥三兩當歸二兩桂心五兩生薑二斤甘草二兩炙右九味切以水二斗煮得五升温服八合日三不知稍増至一升日三忌羊肉餳生葱海藻菘菜等出第十一卷中肘後療卒厥逆上氣氣支兩脅心下痛滿淹淹欲絶此謂奔豚病從卒驚怖憂迫得之氣從下上上衝心胷臍間築築發動有時不療殺人方甘草二兩炙人參二兩呉茱茰一升生薑一斤半夏一升桂心三兩右六味切以水一斗煮取三升分三服此藥須預畜得病便急合服之千金方桂五兩甘草三兩張文仲同賁㹠氣衝心胷方四首廣濟賁㹠氣在心吸吸短氣不欲聞人語聲心下煩亂不安發作有時四肢煩疼手足逆冷方李根白皮八兩半夏七兩洗乾薑四兩茯苓三兩人參二兩甘草二兩炙附子一兩炮桂心四兩右八味切以水一斗煮取三升絞去滓分三服别相去如人行六七里忌生冷羊肉餳海藻菘菜油膩醋物生葱粘食范汪同又療賁豚氣在胷心迫滿支脇方生薑一斤半夏四兩桂心三兩人參二兩甘草二兩炙呉茱茰一兩右六味切以水一斗煮取三升絞去滓分温三服服别相去如人行六七里忌生葱熱麫羊肉餳粘食海藻菘菜范汪同並出第四卷中集驗賁㹠茯苓湯療短氣五蔵不足寒氣厥逆腹脹滿氣賁走衝胷膈發作氣欲絶不識人氣力羸瘦少腹起騰踊如㹠子走上走下馳往馳來寒熱拘引陰器手足逆冷或煩熱者方茯苓四兩生葛八兩甘草二兩炙生薑五兩半夏一升湯洗人參三兩當歸二兩芎藭二兩李根白皮切片右九味切以水一斗二升煮取五升服一升日三夜二服忌羊肉餳海藻菘菜酢物等又療賁㹠氣上衝胷腹痛往來寒食賁㹠湯方甘草二兩炙芎藭二兩當歸二兩半夏四兩湯洗黄芩三兩生葛五兩芍藥三兩生薑四兩甘李根白皮切一升右九味切以水二斗煮取五升去滓温服一升日三夜二服忌海藻菘菜羊肉餳等並出第四卷中雜療奔㹠氣及結氣方六首深師療憂勞寒熱愁思及飲食隔塞虛勞内傷五蔵絶傷奔氣不能還下心中悸動不安七氣湯方桔梗二兩人參三兩一方二兩芍藥三兩茱茰七合黄芩二兩一方三兩桂心二兩一方三兩枳實五枚炙橘皮三兩乾薑三兩一方一兩乾地黄三兩一方二兩半夏三兩洗一方一升甘草三兩一方二兩炙右十二味切以水一斗煮取三升去滓分三服忌海藻菘菜羊肉餳生葱猪肉蕪荑等千金無桂心橘皮桔梗有厚朴栝蔞蜀椒集驗療賁㹠氣從下上者湯方生葛五兩半夏五兩洗黄芩二兩桂心二兩芍藥三兩人參二兩生薑五兩甘李根白皮五兩切右八味切以水一斗五升煮取五升去滓温分為五服日三夜二服忌羊肉餳生葱出第四卷中小品牡蠣賁㹠湯療賁豚氣従少腹起憧胷手足逆冷方牡蠣三兩熬桂心八兩甘草三兩炙李根白皮一斤切右四味切以水一斗七升煮取李根皮得七升去滓内餘藥再煮取三升分服五合日三夜再忌生葱海藻菘菜范汪同又療手足逆冷胷滿氣促從臍左右起鬱冐者奔㹠湯方甘草四兩炙葛根一斤黄芩三兩栝蔞二兩桂心二兩人參二兩芎藭一兩李根白皮一斤切右八味切以水一斗五升煮取五升去滓温服一升日三夜再忌海藻菘菜生葱范汪同又方桐君說伏出雞卵殻中白皮梨木灰麻黄去節紫菀各等分右四味擣下篩作丸散隨宜酒服十丸如梧子散者方寸匕療三十年喉中結氣欬逆立差也亦可水煮為湯以意分之經心錄同並出第一卷中千金奔氣湯主火氣上奔胷膈中諸病每發時迫滿短氣不得卧劇者便悁欲死腹中冷濕氣腸鳴相逐成結氣方桂心五兩生薑一斤人參三兩半夏一升洗呉茱茰一升甘草三兩炙右六味切以水一升煮取三升去滓分為四服忌羊肉餳生葱海藻菘菜出第十七卷中灸奔㹠法千金療奔㹠腹腫法灸章門一名長平二穴在大横外直臍季肋端百壯又主奔㹠衝心不得息灸中極一名王泉在臍下四寸五十壯又主奔㹠上下腹中與腰相引痛者法灸中府二穴在雲門下一寸乳上三肋間動脈是百壯一云百五十壯又主奔㹠上下者法灸四滿夾丹田旁相去三寸七壯又主奔㹠法灸氣海在臍下一寸半百壯又法灸關元在臍下三寸五十壯亦可百壯並出第十七卷中外臺秘要方卷十二
