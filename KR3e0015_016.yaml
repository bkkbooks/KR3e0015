body:
  text: 外臺秘要方巻十二唐王燾撰療癖方五首病源夫五蔵調和則榮衛氣理榮衛氣理則津液通流雖復多飲水漿亦不能為病若攝養乖方則三焦痞隔三焦痞隔則腸胃不能宣行因飲水漿便令停滯不散更遇寒氣積聚而成癖癖者謂僻側在於兩脅之間有時而痛是也其湯熨鍼石别有正方補養宣導今附於後養生云卧覺勿飲水更眠令人作水澼又云飲水勿急咽久成水澼又云舉兩膝夾兩頰邊兩手據地蹲坐故久行之愈伏梁伏梁者宿食不消成癖腹中如杯如盤宿癰者宿水宿氣癖數生癰久則腸化為筋骨變為實出第二十巻中廣濟療腹中癖氣方牛膝八分桔梗六分芍藥六分枳實八分炙白术六分鼈甲八分炙茯苓八分人參六分厚朴六分炙大黄六分桂心六分檳榔六分右十二味擣篩蜜和丸空肚温酒服如梧子二十丸日二服漸加至三十丸老小㣲利忌生冷油膩小豆粘食莧菜醋生葱猪肉出第二巻中千金翼江寧衍法師破癖方白术三兩枳實三兩炙柴胡三兩右三味切以水五升煮取二升分温三服服三十劑永差忌桃李雀肉出第十九巻中必効療癖方取車下李仁㣲湯退去皮及並仁與乾麫相半擣之為餅如猶乾和淡水如常溲麫大小一如病人手掌為二餅㣲炙使黄勿令至熟空肚食一枚當快利如不利更食一枚或飲熱粥汁即利以快利為度至午後利不止即以醋飯止之利後當虛病未盡者量力一二日更進一服以病盡為限小兒亦以意量之不得食酪及牛馬肉無不効但病重者李仁與麫相半輕者以意減病減之後服者亦任量力頻試差神効又方大黄十兩右一味擣篩醋三升和煎調内白蜜兩匙煎堪丸如梧子一服三十丸以利為度小者減之又方牛黄三大豆許麝香一當門子大朱砂準麝香生犀角小棗許别擣末以上四味並研令極細湯成後内之大黄一兩弔藤一兩升麻一兩甘草半兩炙鼈甲半兩炙丁香五十枚右十味切以水三升先煑大黄等六味取强半升絞去滓内牛黄等四味和絞分為三服每服如人行十里久忌如藥法若利出如桃膠肉醬等物是病出之候特忌牛馬肉其藥及水並是大兩大升此藥分兩是十五以上人服若十嵗以下斟量病減之忌莧菜海藻菘菜生血物等並出第三巻中癖結方三首病源此由飲水聚停不散復因飲食相摶致使結積在於脅下有時弦旦起或脹痛或喘息短氣故云癖結脈緊實者癖結也出第二十卷中廣濟療癖結心下硬痛巴豆丸方巴豆三枚去心皮熬杏仁七枚去尖大黄如雞子大右三味擣篩大黄取巴豆杏仁别擣如膏和大黄入蜜和丸空肚以飲服如梧子七丸日一服漸加以㣲利下病為度忌生冷油膩出第二巻中千金狼毒丸主堅癖方狼毒五兩塗薑汁炙半夏三兩洗杏仁三兩桂心四兩附子二兩炮細辛二兩椒三兩汗右七味擣篩别擣杏仁蜜和飲服如大豆二丸出第十一巻中救急中候黑丸療諸癖結痰飲等大良方桔梗四分桂心四分巴豆八分芫花十二分熬杏仁五分右五味先擣三藥成末别擣巴豆杏仁如膏合和又擣一千杵下蜜又擣二千杵丸如胡豆漿服一丸取利可至二三丸兒生十日欲癎發可與一二丸如黍米諸腹不快體中覺患便服之得一兩行利即好肘後千金同服四神丸下之亦得出第三巻中寒癖方五首病源寒癖之為病是飲水停積脅下痃强是也因遇寒即痛所以謂之寒癖脈弦而大者寒癖也出第二十巻中肘後療腹中冷癖水穀癊結心下停痰兩脅痞滿按之鳴轉逆害飲食方大蟾蜍一頭去皮及腹中物支解之芒硝大人用一升中人七合羸小五合右二味以水七升煮取四升温服一升一時頓服一升若未下更服一升中人七合羸小五合得下者止後九日十日一遍作之又方大黄三兩甘草二兩炙蜜一升二合棗二十七枚右四味切以水四升先煮三物取二升一合去滓内蜜再上火煎令烊分再服忌海藻松菜又方巴豆三十枚煎杏仁二十枚桔梗六分藜蘆四分炙皂莢三分去皮右五味擣蜜和丸如胡豆未食服一丸日三欲下病者服二丸長將服百日都好差忌猪肉蘆笋狸肉古今錄驗同並出第三卷中深師主乆寒癖胷滿短氣心腹堅嘔吐手足逆冷時來時去痛不欲食食即為患心冷引腰背强急呉茱茰丸方呉茱茰八分附子三分炮厚朴五分炙半夏五分洗桂心五分人參五分礬石五分熬枳實五分炙乾薑五分右五味下篩蜜和酒服如梧子二十丸日三不知増之出第十六巻中延年白术丸主宿冷癖氣因服熱藥發熱心驚虚悸下冷上熱不能食飲頻頭風旋喜嘔吐方白术六分厚朴二分炙人參五分白芷三分橘皮四分防風五分呉茱茰四分芎藭四分薯蕷四分茯神五分桂心四分乾薑四分大麥蘖四分熬防葵四分炙甘草五分炙右十五味擣篩蜜和丸如梧桐子酒服十五丸日再加至二十丸出第十六卷中久癖方二首病源久癖謂因飲水過多水氣擁滯遇寒熱氣相摶便成癖在於兩脅下經久不差乃結聚成形段而起按之乃水鳴積有嵗年故云久癖出第二十巻中集驗療冷熱久癖食不能下虚滿如水狀方前胡四兩生薑四兩枳實三兩炙半夏四兩洗白术三兩茯苓四兩甘草二兩炙桂心二兩右八味切以水八升煮取三升分三服千金同出第六卷中古今錄驗曽青丸療久寒積聚留飲宿食天行傷寒者服之二十日愈久服令人延年益壽殷仲堪曰扁鵲曽青丸療久癖積聚留飲宿食天行傷寒欬逆消渇隨病所在久病羸瘦老小宜服藥或吐或下或汗出方曽青二分寒水石三分朴硝二分茯苓三分大黄三分附子三分炮巴豆二分右七味各異擣下篩巴豆硝相合擣六千杵次内附子擣相得次内茯苓擣相得次内大黄擣相得次内曽青擣相得次内寒水石擣相得次内蜜和擣千杵大人服大豆二丸小兒五嵗以下如麻子一丸二三嵗兒如黍米一丸如服藥以薄粉粥清下當覆臥令汗出吐下氣發作服二丸霍亂服三丸泄痢不止服一丸可至二丸一方用曽青三分忌猪肉冷水蘆笋大酢崔氏同出第十巻中癖羸瘠方二首刪繁療癖羸瘠膏髓酒方猪肪膏三升牛髓二升油五升薑汁三升生地黄汁三升當歸四升蜀椒四分汗呉茱茰五合桂心五分人參五分五味子七分芎藭五分乾地黄七分逺志皮五分右十四味切擣九味下篩為散取膏髓等五種汁加水一斗同汁煎取水并藥汁俱盡但餘膏在停小冷下散攪令調火上煎三上三下燥器貯凝冷為餅方寸以清酒一升煖下膏取服之晝兩服夜一服非但療癖亦主百病忌生葱蕪荑又枸杞子散方枸杞子五升乾薑五兩白术五兩呉茱茰一升蜀椒三合汗橘皮五兩右六味切擣五味三篩下為散取枸杞子燥瓷器貯研暴如作米粉法七日暴之一暴一研取前藥散和之又研隨飲酒食等即便服一方寸匕和酒食進之如此能三年服非但療百病亦長陽氣並出第五卷中痃癖方四首廣濟療痃癖氣兩脅妨滿方牛膝十分桔梗八分芍藥八分枳實八分人參六分白术八分鼈甲八分茯苓八分訶梨勒皮八分柴胡六分大黄十分桂心六分右十二味擣篩蜜和丸如梧子空肚酒飲及薑湯任服二十丸日二服漸加至三十丸利多即以意減之常取㣲通洩為度忌生硬難消油腻等物及莧菜一方用五加皮無人參出第二巻中千金翼療十年痃癖方桃仁六升豆豉六升蜀椒三兩乾薑三兩右四味先擣桃仁如脂令擣千杵如乾可下少許蜜和擣令可丸空肚酒服三丸如酸棗大日三本方下有熨法此不載出第十九巻中崔氏療痃癖積冷發如錐刀所刺鬼疰往來者方烏頭八分炮人參八分桂心八分附子八分炮乾薑八分赤石脂八分朱砂三分研右七味擣篩蜜和丸如梧子大以煖酒服七丸稍稍加之至十丸又療痃癖方鼠屎一合炒令黄右一味以水二升煑五六沸及熱濾取汁置椀中急内硇砂一小兩乃蓋頭經宿明日平旦温為兩服稍晩食無所忌一方硇砂作朱砂並出第七卷中痃氣方三首廣濟療痃氣方牛膝六分芍藥六分桔梗八分枳實三分炙厚朴六分炙橘皮四分茯苓六分人參五分蒺䔧子五分熬訶梨勒六分熬柴胡八分檳榔四分大黄六分右十三味擣篩蜜和丸空肚煮大棗飲服如梧子二十丸日再漸漸加至三十丸如利多以意減之忌生硬難消物及油膩猪肉醋物出第二卷中延年療兩肋脹急痃滿不能食兼頭痛壯熱身體痛方枳實三兩炙桔梗二兩鼈甲二兩炙人參二兩前胡二兩生薑四兩檳榔七枚桂心二兩右八味切以水九升煮取二升五合去滓分温三服如人行七八里久禁生葱莧菜出第十六巻中救急療腹中痃氣連心以來相引痛𦂳急方白术三兩枳實三兩炙柴胡四兩鼈甲二兩炙右四味切以水七升煮取二升五合去滓空肚分三服相去七八里久能連服三四劑始知驗禁生冷猪肉并毒魚大須慎之頻服有効忌莧菜生葱出第七卷中癖及痃癖不能食方一十四首廣濟療癥癖痃氣不能食兼虗羸瘦四時常服方牛膝六兩生地黄九兩當歸三兩桂心四兩肉蓯蓉六兩逺志三兩去心五味子五兩白术三兩麴末五合熬炒令黄人參三兩大麥蘖末一升五合熬黄茯苓六兩一方三兩右十二味擣篩為散空腹温酒服方寸匕日二服漸加至一匕半夏中煮生薑及檳榔飲下加麥門冬六兩此方甚宜久服令人輕健忌牛肉生葱蘿葡等出第二卷中崔氏療宿癖時腹㣲滿不能食調中五參丸方人參沙參𤣥參丹參苦參各一兩大黄四兩附子一兩炮巴豆四十枚蜀椒一合汗乾薑半兩防風一兩䗪蟲十五枚熬葶藶一合熬右十三味擣下篩蜜和為丸如梧子先食服一丸日三忌猪肉蘆笋生血等物又療癖飲并醋咽吐水及沬食飲不消氣逆脹滿方檳榔十兩高良薑三兩桃仁一升右三味和擣絹篩以白蜜和丸酒服如彈丸二枚日再服漸加至四五丸加減任意自量並出第七巻中延年人參丸主痃癖氣不能食方人參八分白术六分枳實六分炙橘皮四分桂心七分甘草五分炙桔梗五分右七味擣篩蜜和為丸如梧子大一服十五丸酒下日二服加至二三十丸又療冷氣兩肋脹滿痃氣不能食方白术三兩人參二兩茯苓三兩枳實三兩炙生薑三兩桔梗二兩桂心一兩半右七味切以水八升煮取二升五合去滓分温三服如人行七八里久又桃仁丸主痃癖氣漫心脹滿不下食發即更脹連乳滿頭面閉悶欬氣急者方桃仁八分鼈甲六分炙枳實六分炙白术六分桔梗五分呉茱茰五分烏頭七分炮檳榔五分防葵五分芍藥四分乾薑五分紫菀四分細辛四分皂莢二分去皮子人參四分橘皮四分甘草四分炙右十七味擣篩蜜和丸如梧子服十丸日再服加至二十丸忌猪肉莧菜等又浸藥酒用下前藥方紫蘇三兩牛膝三兩丹參三兩生薑六兩生地黄三升香䜴三升紫菀三兩防風四兩橘皮三兩大麻仁一升五合右十味細切絹袋盛以清酒二斗五升浸三宿後温一盞用下桃仁丸酒盡更添忌蕪荑又檳榔子丸主腹内痃癖氣滿胷背痛不能食日漸羸瘦四肢無力時時心驚方檳榔子六分桔梗四分當歸四分人參五分桂心四分前胡四分橘皮三分厚朴三分炙白术四分甘草五分炙烏頭四分炮乾薑四分茯神四分鼈甲五分炙大黄四分龍齒六分炙右十六味擣篩蜜和為丸如梧子大服十丸飲汁下日二服加至二十丸酒下亦得忌醋莧菜生葱等又療痃癖胷背痛時時欬嗽不能食方桂心四分細辛四分白术六分厚朴三分炙附子五分炮乾薑五分橘皮三分鼈甲四分炙防葵三分炙呉茱茰三分右十味𢷬篩蜜和為丸如梧子大服十五丸酒下日二服加至二三十丸忌莧菜醋物生葱等又療痃癖發即兩肋弦急滿不能食方檳榔子六分枳實六分炙桔梗四分鼈甲五分炙人參六分白