body:
  text: 外臺祕要方卷二十三唐王燾撰癭病方一十八首病源癭者由憂恚氣結所生亦由飲沙水沙隨氣入於脈搏頸下而成之初作與癭核相似而當頸下也皮寬不急垂捶捶然是也恚氣結成癭者但垂核捶捶然無脈也飲沙水成癭者有核㿔㿔然無根浮動在皮中又云有三種癭有血癭可破之息肉癭可割之有氣癭可具針之養生方云諸山水黑土中出泉流者不可久居常食令人作癭病動氣增患出第三十一卷中肘後療頸下卒結囊漸大欲成癭海藻酒方海藻一斤去鹹清酒二升右二味以絹袋盛海藻酒漬春夏二日一服二合稍稍含咽之日三酒盡更以酒二升漬飲之如前滓暴乾末服方寸匕日三盡更作三劑佳崔氏文仲同又方昆布海藻等分末之蜜丸含如杏核大含稍稍咽汁日四五並出中卷深師療癭方桂心昆布洗海藻冼甘草炙白麵熬錢三分龍膽草海蛤研土瓜根半夏洗吳茱萸牡蠣熬各一兩右十一味為散酢漿水服五分匕先食日三十日知盡藥愈節食鹽羊肉餳生葱菘菜又方海藻二分洗龍膽草二分昆布二分洗土瓜根二分半夏二分洗小麥麵二分炒右六味為散先食酒服方寸匕日三二十日知三十日愈忌羊肉餳並出第二十九卷中小品癭病者始作與癭核相似其癭病喜當頸下當中央不偏兩邉也乃不急膇然則是癭也中國人息氣結癭者但垂膇膇無核也長安及襄陽蠻人其飲沙水喜癭有核瘰瘰耳無根浮動在皮中其地婦人患之腎氣實沙石性合於腎則令腎實故病癭也北方婦人飲沙水者産乳其於難非針不出是以比家有不救者良由此也療癭方小麥一升醇苦酒一升漬小麥令釋漉出暴燥復漬使苦酒盡暴麥燥搗篩以海藻三兩别搗以和麥末令調酒服方寸匕日三禁鹽生魚生菜豬肉肘後崔氏備急云療三十年癭疾集驗文仲范汪等同出第十卷中肘後用海藻五兩集驗療癭酒方是水雨經露出柳根三十斤右以水一斛煮得五斗同米三斗釀之酒成先食服一升日三范汪同出第四卷中崔氏海藻散療癭方海藻八兩洗去鹹汁貝母二兩土瓜根二分小麥麴二分炒右四味作散酒服方寸匕日三又方秫米三升依酒法炊右一味取圓葉白楊皮十兩去上蒼者慎勿令見風細切以水五升煮取二升濃汁漬麴末五兩用前件秫米依酒法酘之熟訖封塞一七日然後空腹服一大盞日再服三日內即效神驗無比並出第四卷中張文仲隱居效驗療癭方昆布洗松蘿各三分海藻五分右三味搗蜜丸如杏核大含咽津日三夜二大佳備急肘後同又療癭司農揚丞服效第一方昆布六分洗海藻七分松蘿乾薑桂心各四分通草五分右六味搗篩蜜丸如梧子一服吞七丸即住在頸下癭處欲至食時即先飲少酒下却丸子後進食禁酢䔉鹽酪臭肉倉米等若癭大者加藥令多取差又第二方昆布洗海藻洗各一斤右二味細切好酒五升浸七日量力取數服酒盡以酒更浸兩遍藥力盡當以此酒下前丸藥益善備急肘後同又方小麥三升右以三年米酢三升漬麥暴乾乾更浸使酢盡又暴乾搗篩為散别搗昆布為散每服取麥散二匕昆布散一匕旦飽食訖清酒和服之若不能飲酒者以水和服亦得服盡即差多服彌善無所禁但不用舉重及悲啼煩惱等事肘後備急集驗同又含丸方檳榔三兩馬尾海藻三兩洗昆布三兩洗右三味末之蜜丸如雞子黃大每日空腹含一丸徐徐令津液取汁咽之忌鹽並楊丞方服驗肘後備急同並出第六卷中救急療癭要切方鼠粘草根一升湯洗右細切除皮者一升一物以水三升煮取一升半分溫三服服相去如人行四五里一服宜頓服六劑病即差一方削除皮細切取三大升搗篩為散蜜和丸如梧子一服二十丸日再服之稍稍加至三十丸以無灰酒進之出第五卷中古今録驗療氣癭方晉州熙公奏徐公方問荆一兩出海島羯羊靨五具去脂炙白斂椒目甘草炙各一分小麥麴末二兩熬右六味搗篩為散羊靨一種别搗為末相和好漿浸更搗作丸如小棗大一服五丸無禁又方羊靨一百枚暖湯浸去脂炙大棗二十枚去皮作丸服忌慎如常藥法又方取羊靨一具去脂含汁汁盡去皮日一具七日含便差又療癭海藻散方海藻十分洗昆布一兩洗海蛤一兩研通草一兩菘蘿洗乾薑桂心各二兩右七味下篩酒服一錢匕日三出第四十一卷中肘後無乾薑有白斂氣癭方一十首廣濟療氣癭氣胸膈滿塞咽喉項頸漸粗昆布丸方昆布二兩洗去鹹汁通草一兩羊靨二具炙海蛤一兩研馬尾海藻一兩洗去鹹汁右五味蜜丸如彈子細細含咽汁忌生菜熱麵炙肉蒜笋又療冷氣築咽喉噎塞兼癭氣昆布丸方昆布八分洗乾薑六分犀角六分屑吳茱萸四分人參八分馬尾海藻四分洗葶􅐗子六分熬杏仁八分去皮尖熬右八味搗篩蜜丸如梧子空腹以飲服忌生冷粘食陳臭等餘忌同前又療氣妨塞方昆布三兩洗菘蘿通草柳根鬚各三兩近水生者右四味搗篩蜜丸如彈丸大以海藻湯浸細細含之咽盡勿停忌舉重生嗔憂悲等又療癭細氣方昆布十二分洗馬尾海藻十分洗杏仁八分通草麥門冬去心連翹各六分乾薑橘皮各六分茯苓八分松蘿三兩右十味搗末以袋盛含之乃以齒微微嚼藥袋子汁出入咽中日夜勿停有問荆加四分佳忌嗔及勞油膩粘食並出第二卷中深師蘇子膏療氣癭方臘月豬脂一升蘇子桂心大黃當歸乾薑橘皮蜀椒汗各三分右八味切以水六升煮取二升去滓內豬脂消盡服差忌生葱出第二十九卷中崔氏云凡水癭氣癭可差石癭不可治療氣癭方平旦手挽癭令離項掐其下根脈斷愈一日一度掐易愈者七日如難差者三七日愈又方昆布二兩洗海藻二兩洗龍膽草一兩馬刀半兩炙海蛤半兩研大黃一分熏黃半兩右七味搗蜜丸如梧子大破除日以綿裹一丸含咽津朝暮空腹服忌五辛豬肉又方海藻二兩洗右一味以淳酒四升漬二宿漉去滓細細暖含咽之盡即更造取差為度范汪同並出第四卷中必效主氣癭方白頭翁半兩昆布十分洗海藻七分洗通草七分𤣥參連翹各八分桂心三分白斂六分右八味搗篩蜜丸如梧子五丸若冷用酒服禁䔉麵豬魚生葱出第五卷中古今録驗療癭有在咽喉初起游氣去來隂陽氣相搏遂停住喉中前不去腫起如斛羅諸療不差小麥湯方小麥三升昆布二兩洗去鹹厚朴炙一兩橘皮附子炮海藻洗各二兩生薑五兩半夏洗五兩白前三兩杏仁一百枚去尖皮右十味切以水一斗煮取三升半分五服相去一炊頃忌豬肉餳羊肉冷水出第四十一卷中五癭方八首深師五癭丸方取塵靨以酒漬炙乾再內酒中更浸炙令香咽汁味盡更易十具愈千金翼同出第二十九卷中范汪療五癭方昆布三兩洗海蛤二兩研松蘿二兩海藻三兩洗通草白斂桂心各二兩右七味作散酒服方寸匕日三千金翼同出第四十二卷中千金療石癭勞癭泥癭憂癭氣癭方海藻洗龍膽草海蛤研通草昆布洗礜石燒松蘿各三分小麥麴四分熬半夏洗二分右九味作散酒服方寸匕日三禁食魚豬肉五辛生菜羊肉餳十日知二十日愈又方菖蒲二兩海蛤研一兩白斂一兩海藻洗一兩松蘿一兩桂心一兩椒汗兩羊靨百枚半夏一兩洗續斷一兩神麴三兩到桂草一兩右十二味搗作散以羊牛髓和為丸如梧子日服三丸忌羊肉生葱等翼同又方小麥麵一升特生礜石一斤燒海藻一斤洗右三味以陳酢一升漬小麥麵暴乾更漬令酢盡乾各搗下篩每服兩方寸匕日四五服含乃咽之忌同前及大誦大語吹火用氣翼深師用小麥麵一斗餘同並出第二十五卷中千金翼五癭方海藻一兩洗昆布洗半夏洗細辛土瓜根松蘿各一兩白斂龍膽草各二兩海蛤二兩通草二兩右十味作散酒服方寸匕日再忌羊肉餘忌同前又方昆布二兩洗右一味切如大指酢漬含咽汁盡愈又方海藻一斤小麥麵一斤右二味以陳酢一升溲麵暴令乾復漬令酢盡作散酒服方寸匕日三忌怒出第十一卷中灸癭法一十三首千金灸諸癭法灸肩髃左右相宛宛中男左十八壯右十七壯女右十八壯左十七壯再三以差止又法灸風池百壯風池夾項兩邉兩穴兩耳上髮際中通按此條千金聖濟作灸風池百壯又灸兩耳後髮際百壯乃是兩條然明堂無髮際穴又法灸大椎百壯兩邉相去各一寸半小下垂各三十壯又法灸頸衝頸衝在伸兩手直向前令臂著頭對鼻所住處灸之各隨年壯凡灸五處九穴翼深師並同通按頸衝即臂臑穴在肘上七寸其灸五處九穴即風池髮際大椎大杼頸衝五處共九穴也又癭上氣并短氣方灸肺俞一百壯又癭上氣胸滿法灸雲門五十壯又癭惡氣方灸胸堂百壯又癭惡氣法灸天府十五壯又癭勞氣法灸衝陽隨年壯在肘外屈橫文頭是據此是曲池穴衝陽在足跌上五寸又療癭法灸天瞿三百壯橫三間寸灸之又癭氣面腫法灸通天五十壯在耳上二寸又灸癭法灸中封隨年壯在兩足趺上曲尺宛宛中並出第二十五卷中又灸癭法灸耳後髮際有一隂骨骨間有一小穴亦有動脈準前灸大效已上穴所在具三十九卷明堂中出第六卷中瘤方三首肘後云皮肉中忽腫起初如梅李漸長大不癢不痛又不堅强按之柔軟此血瘤也不療乃至如􅌉大則不可復消而非殺人病爾亦慎不可破方乃有大療今如覺但依癭家療療若不消更引别大方出中卷深師療瘤脂細瘤方吳茱萸一分􅈨石燒芎藭當歸大黃黃連芍藥白斂黃芩各二分右九味合搗下篩和雞子塗著細故熟布上隨瘤大小薄厚貼之燥輒易之著藥當熟作膿脂細細從孔中出探知膿血盡著生膏若膿不盡復起故也生肉膏方如左又生肉膏療癰瘤潰漏及金瘡百瘡悉療之方真當歸附子炮甘草白芷芎藭各一兩薤白一兩生地黃三兩右七味㕮咀以豬膏三升半合微火煎白芷地黃去滓稍以傅瘡上日三良千金並同出第二十九卷中千金云凡肉瘤勿療療則殺人慎之慎之出第二十五卷中千金翼療瘤病方麞鹿二種肉割如厚脯火炙令熱搨掩可四炙四易痛膿便愈不除更炙新肉用之良出第二十四卷中白瘤及二三十年瘤方三首千金翼白瘤方先極搔刮以繩縳之即愈又取東向木空中水熱刮瘤上洗之日三即愈又方白礬硫黃等分右二味末以酢和封上並出第二十四卷中千金陷腫散主二三十年瘤癭及骨瘤石瘤肉瘤膿瘤血瘤或大如柸盂升斗十年不差致有漏潰令人骨消肉盡或堅或䎡或漬令人驚惕寐寤不安體中掣縮愈而復發療之方千金翼云陷麥散烏賊魚骨一分白石英二分石硫黃一分紫石英二分鍾乳三分研乾薑一兩丹參三分琥珀一兩研大黃一兩附子一兩炮胡燕屎一兩右十一味為散貯以韋囊勿令泄氣若瘡濕即傅之若瘡乾無汁者以豬膏和傅日三四以乾為度若汁不盡者至五劑十劑止勿措意不作也著藥令人不疼痛若不消加芒硝二兩益佳忌豬肉出第二十五卷中翼無燕屎喉痺方二十一首病源喉痺者喉裏腫塞痺痛水漿不得入也人隂陽之氣出於肺循喉嚨而上下也風毒客於喉間氣結藴積而生熱故喉腫塞而痺痛脈沉者為隂浮者為陽若右手關上脈隂陽俱實者是喉痺之候也亦令人壯熱而惡寒七八日不治則死其湯尉針石别有正方補養宣導今附於後養生方導引法云兩手拓兩頰手不動樓肘使急腰內亦然住定放兩肋頭向外附膊腰氣散盡勢大悶始起來去七通去喉痺出第三十卷中廣濟療喉痺急疼悶妨不通方馬蘭根切一升升麻三兩瞿麥二兩射干十兩犀角二兩屑通草二兩𤣥參三兩右七味切以水八升煮取二升去滓細細含咽一日令盡得破膿慎熱麵炙肉䔉又療喉痺方馬藺子八分牛蒡子六分右二味搗為散每空腹以暖水服方寸匕漸加至一匕半日再並出第二卷中肘後療喉痺者喉裏腫塞痺痛水漿不下入七八日即殺人療之方巴豆一枚開其口右一味以綿裹極堅令有繩出外以巴豆內鼻中隨腫左右時時吸氣半日許即差無巴豆用杏仁以塞耳如之文仲范汪同又方熬杏仁熟搗蜜丸如彈子含咽其汁亦可搗杏末帛裹含之小品文仲備急范汪同又方礬石一兩水三升漬洗手足又方生地黃汁二升蜜二升合微火煎之取二升稍稍含之又方射干當歸各三兩右二味切以水三升煮取一升稍稍含之吐去更含又方剝葫塞耳鼻孔日再易之有效又方菖蒲根嚼燒稱鎚令赤內一柸酒中沸止飲之文仲備急同又療喉痺方射干一片含咽汁又方升麻斷含之喉塞亦然又方桔梗三兩右一味切以水三升煮取一升頓服之忌豬肉又方取芥子搗碎以水及蜜和滓傅喉下燥輒易又𫝊用神效方桔梗甘草炙各一兩右二味切以水一升煮取服即消有膿即出忌豬肉海藻菘菜備急同又療垂死者方搗馬藺根一握少以水絞取汁稍稍咽之口噤以物拗灌之神良古今録驗雞子湯療喉痺方半夏末方寸匕右一味開雞子頭去中黃白盛淳苦酒令小滿內半夏末著中攪令和雞子著刀子鐶令穩炭上令沸藥成置杯中及暖稍咽之但腫即減忌羊肉餳肘後文仲同此與仲景苦酒湯同半夏不可作末剖之可也又療喉痺塞射干丸方射干二兩豉三合芎藭杏仁去尖皮各一兩犀角一兩屑升麻二兩甘草一兩炙右七味搗下篩蜜和丸含之稍稍咽津日五六忌海藻菘菜又射干湯療喉痺閉不通利而痛不得飲食者若閉喉并諸疾方當歸二兩升麻一兩白芷三兩射干甘草炙犀角屑杏仁去尖皮各一兩右七味切以水八升煮取一升半分服神良忌海藻菘菜出第二十九卷中近效療喉痺方大附子一個刮去皮作四片右一味以蜜塗火上炙稍熱即含咽汁甜盡又取一片準前含如已作頭即膿出如未作頭立消神驗忌豬肉冷水又方朴硝一兩細細含咽汁一食頃差又若腫全盛語聲不出者方大附子一枚炮裂削去皮切如豆右一味含一塊咽汁半食間即差烏頭亦得忌豬肉冷水咽喉中閉塞方三首廣濟療咽喉中塞鼻中瘡出及乾嘔頭痛食不下方升麻通草黃蘗𤣥參各八分麥門冬十分去心竹茹前胡各六分芒硝十分右八味切以水八升煮取二升五合去滓內硝溫分三服服别如人食頃自利去硝又方生雞子一顆開頭取白去黃著米酢拌煻火燠沸起擎下沸定更三度成就熱飲酢盡不過一二即差並出第二卷中近效療喉痺喉咽塞喘息不通須臾欲絶神驗方馬藺根葉二兩右一味切以水一大升半煮取一大盞去滓細細喫須臾即通絡石草亦療煎法分兩亦同喉舌生瘡爛方八首肘後療喉口中及舌生瘡爛方含好淳苦酒即愈文仲備急同又方一酒漬蘘荷根半日含潄其汁又方杏仁二十枚甘草一寸黃連一分右三味末綿裹含之千金同又方礬石二兩燒去汗黃連一分末右二味同研內口中令布瘡上又方黃連一兩右一味切以水三升煮取一升稍稍含冷吐忌豬肉冷水張文仲療口中及舌生瘡爛方取牛膝根酒漬含潄之無酒者但亦取含之肘後同又方銼黃蘗含之肘後同並出第七卷中備急療喉中及舌生瘡爛方銼薔薇根濃煮汁含潄之冬用根夏用枝葉文仲肘後同出第四卷中咽喉生瘡方四首廣濟療咽中生瘡吐血不下食方方怡雲曰此方余用巳驗但不大便者先看輕重消息下之後用此方生地黃五兩青竹茹𤣥參雞蘇各二兩茯苓升麻麥門冬去心各三兩右七味切以水八升煮取二升五合去滓分溫三服服相去如人行七八里不能多服含細細咽亦得忌生冷熱麵炙肉油酢出第五卷中千金療口中塞及咽喉不利生瘡口燥膏方豬膏一斤白蜜一斤黃連一兩右三味合煎去滓攪令相得含如半棗日四五度又療熱病口爛咽喉生瘡水漿不得入膏方當歸射干升麻各一兩附子半兩炮二白蜜四兩右五味切以豬膏四兩先煎之成膏下著地勿令大熱內諸藥微火煎附子色黃藥成絞去滓內蜜復上微火煎令相得盛器中令凝取如杏子大含之日四五度稍稍咽之並出第六卷中古今録驗升麻湯療咽喉生瘡方甘草一兩炙升麻石膏碎牡丹皮各一兩右四味切以水七升煮取三升一服七合日三忌海藻菘菜出第二十九卷中咽喉腫方五首肘後咽喉卒癰腫食飲不過方用薤一把搗傅腫上冷復易之用苦酒和亦佳范汪同又方吞薏苡仁子二枚延年療喉中熱腫方鼠粘根切一升右一味以水五升煮取三升去滓分溫三四服忌䔉麵出第十九卷中古今録驗羚羊角豉湯療喉痛腫結毒氣衝心胸方豉一升半犀角一兩屑羚羊角屑一兩芍藥三兩升麻四兩杏仁一兩去尖皮梔子七枚甘草炙一兩右八味切以水七升煮取一升半去滓分三服忌海藻菘菜又五香湯療諸惡氣喉腫結核方沉香二兩薰陸香一兩麝香二分研湯成下青木香二兩雞舌香二兩右五味以水五升煮取一升半去滓分三服並出第二十九卷中喉卒塞痛及卒毒攻痛方三首范汪療卒喉中塞痛不得飲食方取敗筆一枝燒屑以漿飲服一方寸匕良驗出第十五卷中文仲療喉中卒毒攻痛方章陸根切炙令熱隔布尉之冷轉易立愈姚云苦酒熱熬傅喉亦療喉痺肘後小品同又方搗艾傅之並出第七卷中懸癰腫方三首肘後療懸癰腫卒長數寸如指隨喉出入不得食方開口捧頭以筋抑舌及燒小鐡於管中灼之令破灼火畢以鹽隨烙處塗之又方搗鹽綿纒筋頭㸃鹽傅以揩之日六七度文仲備急同千金療懸癰垂暴腫長方乾薑半夏等分洗右二味末之以少少著舌本翼同出第六卷中咽喉雜療方四首范汪療咽喉不利下氣丸方射干附子炮人參杏仁各一分右四味合搗下篩蜜丸如梧子含一丸咽汁日三夜一忌豬肉冷水千金同又療口中咽喉不利當歸含丸方當歸末二兩杏仁一兩右二味搗合下篩以蜜和為丸如梧子二丸含漸漸咽汁日三夜再又療咽喉中痛不利丸方升麻甘草炙鬼臼射干丹砂各一兩雄黃一兩杏仁一十枚麝香半兩右八味搗下篩和以蜜丸如梧子飲服一丸日三漸加之酒下亦得咽痛失聲不利用良忌海藻菘菜千金同出第五十卷中崔氏療口咽咽內瘡痛欲失聲方桂心二兩杏仁熬二兩黃荑一兩右三味搗末合和綿裹含如杏仁許咽汁消盡更含日三夜二忌膩食出第四卷中寒熱瘰􅊓方一十一首病源此由風邪毒氣客於肌肉隨虗處而停結為瘰􅊓或如梅李等大小兩三相連在皮間而時發寒熱是也久則變膿潰成瘻也其湯尉針石别有正方補養宣導今附於後養生方導引法云踑踞以兩手從腳入據地曲腳加其上舉􅥑其可用行氣愈瘰􅊓乳癰出第三十四卷中甲乙針經寒熱瘰􅊓論黃帝問曰寒熱瘰􅊓在於頸腋者皆何氣所生岐伯對曰此皆鼠瘻寒熱之氣也稽留於脈而不去者鼠瘻之本皆在於藏其末上出於頸腋之間其浮於脈中未著於肌肉而外為膿血者去易問曰去之奈何對曰請從其末引其本可使衰去而絶其寒熱審安其道以豫之徐往徐來以去之其小如麥者一刺知三刺而已決其生死法反其人目視之其中有赤脈從上下貫瞳子見一脈一嵗死見一脈半一嵗半死見二脈二嵗死見二脈半二嵗半死見三脈三嵗死此赤脈不下貫瞳子者可療千金同出第八卷中廣濟療瘰􅊓丸方鸛骨貍骨並炙射干𤣥參升麻炙青木香沉香犀角屑丁香羚羊角屑丹參甘草炙各四分人參沙參各三兩獺肝六分連翹六分光明沙二分研右十七味搗篩蜜丸以飲服十五丸日二服漸加至三十丸空腹服之忌生冷油膩血食竝酢熱肉海藻菘菜粘食陳臭生血物等又療瘰􅊓方連翹射干𤣥參芍藥青木香芒硝升麻梔子仁劈前胡當歸甘草炙大黃各二兩右十二味切以水一斗煮取三升分三服服别相去如人行六七里快利忌同前方並出第五卷中劉㳙子療寒熱瘰􅊓散方貍骨五兩炙烏頭七分炮黃連六分右三味搗下篩先食以酒服一錢匕日三良忌豬肉冷水范汪同出第十卷中千金療瘰􅊓方白殭蠶為散以水服五分匕日三十日差深師救急同又方於患人背兩邉腋下後文上隨年壯灸之又方灸耳後髮際七壯又方槲白皮二斤右一味細切以水七升煮取三升去滓真硃砂方寸匕和汁一升旦向日服之強行須臾吐鼠出三朝服良又方貍頭一枚炙搗下篩旦白飲服方寸匕日再服之又方狼糞灰封上良又療寒熱瘰􅊓散方連翹土瓜根龍膽草苦參黃連括樓芍藥常山皮各兩貍頭骨一枚炙右九味搗下篩酒服五分匕日三忌豬肉冷水翼集驗古今録驗同一方云無貍頭骨加之名貍頭散餘同並出第二十四卷中救急療瘰􅊓方馬齒莧隂乾燒灰臘月豬膏和之以暖泔清洗瘡拭乾傅之日三出第三卷中瘰􅊓結核方四首廣濟療瘰􅊓息肉結硬薄方白斂甘草炙青木香芍藥大黃各三兩𤣥參三兩右六味搗為散少減以少酢和如稀糊塗故布貼上乾易之勿停忌豬肉五辛熱肉飲酒熱麵等又瘰􅊓結核令消散方黃茋七分𤣥參八分連翹人參升麻青木香伏苓蒼耳子甘草炙朴硝桂心各四分枳實炙去瓤大黃羚羊角屑麥門冬去心各五分鼠粘子苦參各九分右十七味搗蜜丸如梧子以酒下十丸日三夜四漸加至二三十丸以知為度忌同前方竝出第五卷中肘後療頸下生瘡􅊓瘰如梅李宜使消之方海藻一斤洗右一味以酒三升漬數日稍稍飲之文仲備急等同又方人參甘草炙乾薑白斂各四分右四味搗篩酒服方寸匕日三忌同劉涓子文仲備急同出第六卷中惡核瘰􅊓方四首文仲五香連翹湯療惡肉惡脈惡核瘰􅊓風結腫氣痛方青木香沉香雞舌香各二兩麝香半兩薰陸香一兩射干紫葛升麻桑寄生獨活通草連翹各二兩大黃三兩淡竹􅅹二升右十四味切以水九升煮取減半內竹􅅹更煮取三升分三服忌五辛千金方無紫葛雞舌香有丁香古今録驗同出第五卷中延年丹參湯療惡肉核瘰􅊓諸風氣結聚腫氣諸病並主之方蒴藋丹參各二兩甘草炙蓁芁獨活烏頭炮牛膝各一兩躑躅花蜀椒各半兩汗右九味切以水八升煮取三升溫服一升忌海藻菘菜豬肉冷水古今録驗有白及餘並同又𤣥參湯主惡核瘰􅊓風結方𤣥參升麻獨活連翹各二兩木防己菊花各一兩右六味切以水八升煮取三升分服一升日三文仲同又丹參膏主惡肉結核瘰􅊓脈腫氣痛方丹參八分白斂獨活連翹白及各四分升麻蒴藋各六分防己𤣥參杏仁各五分去皮尖右十味細切以生地黃汁淹漬一宿以鍊成豬膏四升微火煎五上五下藥成絞去滓以摩病處日三四癰腫瘰􅊓核不消方五首經效犀角丸療瘰􅊓方犀角四分升麻三分大黃六分牛蒡子八分烏蛇十分炙去頭尾𤣥參八分右六味末之蜜和丸如梧子大每日至午後煎牛蒡湯下三十五丸又方龍骨八分牡蠣八分熬右二味末之酒下三錢匕日三度良又大黃膏方大黃六分附子四分炮細辛三分連翹四分巴豆一分右五味以苦酒浸一宿以臘月豬膏煎三上三下去滓以綿濾之用傅之日三五度塗之良集驗療寒熱瘰􅊓散方連翹六分土瓜根四分龍膽草五分黃連四分苦參六分栝樓四分芍藥五分右七味為散食後溫酒下五分匕日三又方陵鯉甲二十一枚燒搗末傅瘡上效千金同鼠瘻及瘰􅊓方一十一首文仲療瘰􅊓方苦參四大兩搗末生牛膝和丸如梧子食後暖水下十丸日三服又方昆布四分海藻四分右二味各洗去鹹搗末蜜和丸如杏核許大含之日三度良差救急療鼠瘻久不差方取狼鼠不限多少常作羮粥任喫之必驗千金經效同范汪療鼠瘻瘰􅊓方取臘月豬膏正月鼠頭燒令作灰以膏和傅之愈若不差者瘰􅊓