其根在膽地膽主之甘草為佐八曰瘰􅊓瘻始發於頸有根初苦痛瘰􅊓覺之使人寒熱得之新沐頭濕結髮汗流入於頸所致其根在腎雌黃主之芍藥為佐九曰轉脈瘻始發於頸如大豆浮在脈中濯濯脈轉苦驚惕身如振寒熱始得之時驚卧失枕其根在小腸斑猫主之白芷為佐療瘻九種方空青研鍊之商陸根狸骨炙知母荏子桔梗雄黃黃芩礜石燒防風礬石燒汁盡地膽熬白术甘草炙雌黃芍藥斑猫去足羽熬白芷各二分右十八味搗其論病者特加其分餘種令分等細篩末空青最在後內之苦酒服一刀圭日三服三十日知五一日愈七十日平復病者百日禁食魚肉忌生菜桃李雀肉海藻菘菜犬肉生血物餘二大豆為一刀圭小兒服之半大人全服八嵗以下寧從少起過度令人淋淋即減之出第九卷中千金問曰何謂九瘻答曰一曰狼瘻二曰鼠瘻三曰螻蛄瘻四曰蜂瘻五曰蚍蜉瘻六曰蠐螬瘻七曰浮疽瘻八曰瘰􅊓瘻九曰轉脈瘻謂之九瘻又療狼瘻發於頸頭腫有根起於缺盆上轉連延耳根腫大此得之因憂恚氣上不得下其根在肺空青主之商陸為佐方空青研二分蝟腦二分炕之獨活一分蝟肝一具乾之芎藭半兩女婦草一分黃芩鱉甲炙斑猫去趐足乾薑當歸茴香礬石燒地膽各一分蜀椒三十去汗右十五味作散下篩酒服方寸匕日三十五日即止忌生血物莧菜劉涓子古今録驗同又療鼠瘻發於頸無頭尾如鼷鼠使人寒熱此得之因食大鼠餘毒不去其根在胃狸骨主之知母為佐方陵鯉甲炙山龜殼炙甘草炙桂心雄黃乾薑等分右六味作散下篩服方寸匕日三蜜和內瘡中無不愈先灸作瘡後與藥良忌海藻生葱劉涓子備急古今録驗文仲同又療鼠瘻瘡差復發及不愈出膿血不止方以不中水豬脂㕮咀生地黃內脂中令其脂與地黃足相淹和煎六七沸去滓桑灰汁淨洗瘡去惡汁以地黃膏塗上日一易范汪同又療鼠瘻方得蛇虺所吞口中鼠燒末服方寸匕日再不過三服此大驗但難遇耳并傅瘡中范汪同又療鼠瘻方死鼠一枚中形者亂髮如雞子一枚右二物以臘月豬膏令淹鼠髮煎之令其鼠髮都盡消膏成分作二分一分稍稍塗瘡一分以酒服之即愈矣鼠子當從瘡出神良祕不𫝊翼備急文仲集驗范汪同又療螻蛄瘻發於頸項狀如螻蛄腫潰連生瘡其汁赤黃此得之食瓜螻蛄餘毒及果實不去核其根在大腸荏子主之桔梗為佐方桂心乾薑桔梗礬石燒獨活各一分附子一分炮椒一百粒汗芎藭半分龍骨半分荏子一分右十味搗下篩棗二十枚合搗以酢漿丸如大豆溫漿下五丸古今録驗劉涓子同又方槲葉灰先以泔清煮槲葉取汁洗拭乾內灰瘡中又療蜂瘻發於頸瘰􅊓三四處俱腫起相連潰潰移此得之飲流水有蜂毒不去其根在脾雄黃主之黃芩為佐方蜂房一具炙鱉甲一分炙茴香一分吳茱萸二分椒一百粒汗乾薑一分右六味搗下篩作散傅瘡孔中日十度十日止忌莧菜又療蜂瘻初生時狀如桃而癢搔之則引大如雞子如覆手者方熬鹽尉之三宿四日不差至百日成瘻其狀大如四五寸又廣三寸中生蜂作孔乃有數百治法以石硫黃隨多少然燭燒令汁出著瘡孔中須臾皮中見蜂數十唯蜂盡即差又療蚍蜉瘻發於頸初得如傷寒此因食中有蚍蜉毒不去其根在腎礜石主之防風為佐方白术四分知母雌黃乾地黃獨活青黛斑猫去首羽足熬白芷柏脂芍藥海藻一云海苔當歸各一分蝟皮四分炙椒一百粒去汗桃白皮一分正旦取右十五味搗下篩作散服一錢匕日三劉涓子古今録驗同又療蠐螬瘻發於頸無頭尾如棗核塊塊多在皮中使人寒熱心痛滿此因喜怒哭泣其根在心礬石主之白术為佐方白术一分礬石一分空青兩三分當歸二分細辛一分蝟肉炙枸把根斑猫去翅足熬地膽各一分熬乾烏腦三大豆右十味搗下篩散服方寸匕日三酢漿服之病在上側卧在下髙枕卧使藥流下劉涓子古今録驗同七曰浮疽瘻發於頸如兩指使人寒熱欲卧得之因思慮憂憶其根在膽地膽主之甘草為佐方雄黃一分乾薑一分龍膽二分一作龍骨石決明續斷菴䕡根各分細辛二分大黃半分地膽一分熬右九味搗下篩為散傅瘡日四五忌生菜劉涓子同古今録驗無雄黃有硫黃餘同又療瘰􅊓瘻發於頸有根初苦痛厯厯覺之使人寒熱此得之新沐頭濕髻髮汗流入於頸其根在腎雌黃主之芍藥為佐方茯苓續斷礬石燒令汁盡乾薑雌黃芍藥桔梗椒汗乾地黃常山空青狸肉烏腦并腎肝斑猫去翅足熬各一分附子一兩炮礜石二分燒半日虎指各一分一云虎腎右十七味搗篩為散蜜丸如大豆夜酒服十丸日三古今録驗同又療轉脈瘻發於頸如大豆浮在脈中濯濯脈轉苦驚惕身如振寒熱得之於驚卧失枕其根在小腸斑猫主之白芷為佐方緑青二分礬石半分燒半日防風一分甘草半分炙大黃二分桂心二分人參二分當歸二分升麻一分地膽一分熬白术一分鍾乳一分研斑猫一分去翅足熬白芷一分續斷一分麝香一分麥門冬一分去心右十七味搗下篩蜜丸酒服如大豆十丸日三勿食倉米慎房百日劉涓子古今録驗同並出第二十四卷中崔氏療九種瘻方芫青二十枚去足翅熬地膽十枚去足羽熬斑猫三十枚準上生犀如棗核大屑豉四十九粒大豆黃一百枚生用牛黃棗核大蜈蚣一枚肥大者折取一寸半微火熬右八味搗篩蜜丸如梧子初欲服藥少夜食明旦飲服二丸須臾可煮酢漿薄粥稍稍冷飲之其瘻蟲有形狀皆從小便出至日西甚虛悶可煮湯餐蔓菁菜羮醬食之其餘脂膩醋脯一切口味五辛果子之類並不得食人強隔日一服人弱兩三日一服服藥以瘡差蟲盡為度若差仍作二十日許將息藥欲盡豫合勿使斷絶藥氣不能將息便不須服救急千金同出第五卷中張文仲療鼠瘻方石南生地黃雌黃茯苓黃連各二兩右五味作散傅瘡日再備急同又療鼠瘻諸惡瘡方苦參三斤露蜂五兩麴二升右三味以水三斗漬藥三宿去滓黍米二升釀熟飲日三一方得蝟皮一具劉涓子同並出第五卷中備急劉涓子鼠瘻方山龜殼炙桂心雄黃乾薑狸骨炙甘草炙右六味等分搗篩為散飲服方寸匕日三蜜和內瘡中無不愈先灸作瘡後與藥良又方礬石三分燒斑猫一分去首足羽熬右二味搗下篩用酢漿服半匕須臾瘻蟲從小便出刪繁文仲同出第五卷中古今録驗療鼠瘻麝香塗方麝香研雌黃研右二味等分並為散取蝦蟇背白汁和塗瘡孔中日一度又療鼠瘻著頭生小者如杏大者如杯方斑猫一分去首足羽熬牡蠣二分熬海藻四分先去醎味右三味搗下篩酒服五分匕日三病當從小便出如魚胞忌蒜並出第四十一卷中諸瘻方一十五首劉涓子瘻腫病方斑猫四十枚去足翅熬桂心四分芫青十枚去足翅熬葛上亭長三十枚熬右四味搗下篩酒服半錢匕日一忌生葱又療瘻方斑猫四十枚去足羽熬地膽三十枚去首足翅熬蜥蝪三枚炙右三味搗之千杵蜜和如大豆服二丸又療瘻衆方不差效驗方牡蒙數兩右一味搗之湯和適寒溫取一升許薄瘡上冷易經宿佳又療瘻生肉膏方桑薪灰三升水四升淋之復重淋之取三升石灰熬令黃內灰汁中以兩重帛裹絞去滓更魚目煎取二升勿用急火煎隨瘻孔深淺初時作服散而差孔若深四寸新藥與孔裏薤白使濡安藥薤白入藥孔裏若深四寸隨瘻根而灸兩處每處與四十壯唯勿灸瘻孔隨深淺去膿散與膏安著瘡孔裏十五過少遷延日月取差肉滿膿亦斷神良無比出第六卷中肘後論此本在諸方瘡條中病類既多今狀出為别一篇凡瘻病有鼠蛇蜂蛙蚓類似而小異皆從飲食中得其精氣入人肌體變化成形瘡既穿潰浸諸經脈則亦殺人而鼠蟻最多以其間近人故也通治諸瘻方以八月中多取斑猫蟲即內苦酒中半日許出暴乾使十取六七枚著銅器中微火上遙熬令熟搗作屑巴豆一粒去皮熬之又拔取黃犬背上毛二七枚亦熬作屑好朱以錢五分匕都合和以苦酒頓服之蟲當盡出若一服未效先時可預作三兩劑後日服逺不過三兩劑通按朱一作末又方虎薊根杜蘅枳根酸棗根各一把斑猫一枚一方云三分去頭足翅熬猫薊根各一把右六味搗蜜丸日一服如棗一枚以小丸著瘡中又方若先著下部邉或上出耳後頸項諸處者苦參切五升以苦酒一斗漬三四日宜服一升亦加之但多作以知為度不過三四度必差又療瘻方槲木皮長一尺闊六寸去黑皮細切以水一斗煮取五升去滓內白糖十挺煎取一升分三服以銅器接吐出看視之又方新生兒矢一百日以來皆收置蜜器中五十六十日取塗瘡孔中又方鯉魚腸切作五假火上脫之洗瘡拭乾以腸封之冷即易自暮至旦乾止覺癢開看蟲出差崔氏療瘻方槲白皮切取五升右一味以水八升煮令泣泣絞去滓重煎令成膏日服半棗漸加至一棗許亦著瘡上無忌患瘡唯宜煮飯苜蓿鹽醬又不得多食之出第五卷中備急療瘻生肉膏方楝白皮二兩鼠肉二兩薤白三兩當歸四兩生地黃五兩右五味以臘月豬膏三升煎薤白黃色膏成傅瘡孔上令生肉肘後文仲同又葛氏云苦著口裏方楝木東引根切右一味水煮取濃汁含之數吐勿咽肘後同並出第五卷中備急療諸瘻方取葶􅐗子搗細羅取好白蜜和丸每欲著藥先溫泔洗著瘡孔中以丸內之若塞以物道開日三度瘡痛是差候勿停藥大效出第五卷中必效療諸瘻方先以泔清溫洗以綿拭之取葵葉微火暖貼之引膿不過三二百葉膿盡出即肉生王丞頻用大奇效腋臭方三十七首病源人腋下臭如葱豉之氣者亦言如狐狸之氣者故謂之狐臭此皆血氣不和藴積故氣臭出第三十一卷中肘後療人體及腋下狀如狐􅀈氣世謂之胡臭方炊甑飯及熱丸以拭腋下臭仍與犬食之七日一如此即差文仲備急同又方煮雞子兩枚熟去殼及熱各內腋下冷弃之三路口勿反顧三為之文仲備急並同又方燒好礬石末絹囊盛之常以粉腋下不過十度小品集驗文仲備急同又方青木香二兩附子一兩礬石半兩燒白灰一兩半右四味細末著粉腋下汗出因以粉之亦差又方青木香一斤石灰半斤熬右二味常以粉身亦差並搗末傅之又方乾薑胡粉白灰等分右三味合作末粉之范汪同並出第五卷中千金療胡臭漏腋有天生胡臭有為人所染臭者天生者難療為人所染者易差然須三年傅白礬散勿止并服五香丸乃可得差勿言一度傅藥即差止可傅藥時暫得一度差耳凡胡臭人通忌食藝薹五辛療之終身不差胡臭方辛夷芎藭細辛杜蘅藁本各三分右五味㕮咀以苦酒漬之一宿煎三日取汁傅之以差為度小品集驗必效范汪同五香丸主口臭及身臭止腫痛散血氣方豆蔲子丁香藿香白芷青木香當歸桂心各一兩零陵香一兩甘菘香二分香附子二兩檳榔二枚右十一味搗下篩蜜丸如大豆日三夜一時含之咽津五日內口香十日身香二七日衣被香三七日下風人聞香四七日靜洗手水落地香五七日把他人手亦香禁五辛下氣去臭第一出第六卷中又石灰散主胡臭方青木香楓香丁香薰陸香各二兩陽起石橘皮各三兩礬石四兩燒石灰一升熬右八味搗下篩以綿作篆子粗如四指長四寸展取藥著上即以絹囊盛之繫著臂先以布拭揩令痛然後夾之又方水銀胡粉面脂研和傅之大驗救急同又方辛夷細辛芎藭青木香右四味等分搗下篩作散熏畢粉之又方伏龍肝作泥傅之良又方牛脂和胡粉三合煎令可丸塗腋下一宿即愈集驗同又方三年苦酒和石灰傅之又方赤銅屑以酢和銀器中炒極熱以布裹尉腋下冷復易差止又方附子炮石灰熬青木香三兩礬石三分燒米粉一升右五味搗篩常粉之又方馬齒草一束右一味搗碎以蜜和作團以紙裹之以泥糊紙厚半寸暴乾以火燒熟破取更以少許蜜和使熱勿令冷先以生布揩之夾藥腋下痛久忍不能得然後以手中勒兩臂差出第二十五卷中崔氏療胡臭有效方先用泔清淨洗又用清酢漿水淨洗訖微揩使破取銅屑和醶酢熱揩之不過三四度差又方胡粉銅青右二味等分研以人乳和塗腋下若成瘡且停瘡差又塗以差為度出第四卷中張文仲療胡臭若股內隂下常汗濕且臭或作瘡者方但以胡粉一物粉之即差常用大驗備急同又隱居效驗胡臭方雞舌香藿香青木香胡粉各二兩右四味搗散作粉綿褁內腋下常傅即差備急同出第七卷中救急療腋臭方銅屑一升石灰三升熬右二味合和囊盛粉之有汗便粉之又方甘草炙松根白皮甘瓜子大棗各四分右四味為散食後服方寸匕日三出第三卷中又方雞矢白礬石熬令汁盡黃礬熬附子炮木蘭皮青木香各一大兩右六味搗為散粉之又石龍衣一大兩蛇蛻皮是也以子日夜半燒為灰服之又方常以鹽緑和醶酢塗之一遍一年再塗永除以胡粉和水銀和令相入塗腋下十日以來無氣出第八卷中又方黃礬細辛芎藭各二兩雄黃一兩右四味搗下篩為散先以泔清洗腋拔去毛令血出以粉腋下出第九卷中必效療腋臭方好􅔈砂二兩好白礬熬蜜陀僧各三兩酢酪二兩胡粉二分金屑八分鉛錫生銅屑各二分右八味並研令細酢一升新銅器中盛藥密封其口二七日看上青緑色鬱鬱然其藥即成還須研令極細至用時若乾更以好酢和藥以塗病處若有毛先拔去以石灰水淨洗拭使乾以生布揩令微赤可作瘡一日一塗洗逺不過十日即待腋瘡差訖更取銅屑細研成粉粉病處日五六即止病差終身不得帶麝香食胡荽又方取五月五日承露百草隂乾火燒為灰用井華水和灰為團重火鍊如燂灰色鍊訖即以醶酢和為餅厚如掌大小徑二寸以來即於兩腋下挾即易夾時一身連頭並悶二日後若病不差復著藥微發亦不甚臭還依法療之永斷又金錯屑塗法金錯屑一銖銀錯屑一兩赤銅屑香附子胡粉錢錯屑各一兩三年醋三升右七味以羊酪一升於銅器中煮得二沸以用塗之又方三年醶酢二升碎銅一斤鹽半合灰二合右四味浸藥攪藥色青即塗腋下日三四塗三日小愈一月全差又方大銅錢二七文白梅二七箇鹽一升右三味以五月五日水一升共置瓶子裹掛户上百日畢可取用塗不得婦人為塗藥食粘食蒜發又方以酢五合內銅器中以錢十四文胡粉五銖置中泥頭七日後以粉十銖和之訖去腋下毛日再傅之合藥勿令人見祕之又方以首子男兒乳汁浸鹽研銅青拔去毛使血出塗差又方醶醋浸青木香置腋下夾之即愈又方錢三七文胡粉三兩馬齒草粗莖三兩青木香二兩大酢半升右五味切先以醋漬錢五六日然後總漬諸藥一物煮五六沸置垍器中先以石灰汁洗病處拭乾訖塗之以差為度並出第三卷中古今録驗療胡臭青羊脂粉方胡粉銅青等分右二味先以鹽湯洗兩腋下及著藥且淋洗又以青羊脂和傅數日差又錢汁𫝊方錢二七文右以礦石磨令平以夾腋下神良范汪同並出第三十卷中漏腋方三首病源腋下常濕仍臭生瘡謂之漏腋此亦是氣血不和為風邪所搏津液藴瘀故令濕臭出第三十一卷中集驗療漏腋腋下及足心手掌隂下股裏常如汗濕致臭六物胡粉傅方乾枸杞根半兩胡粉一兩乾商陸根一兩滑石一兩乾薔薇根半兩甘草半兩炙右藥搗下篩以苦酒和塗腋下當微汗出易衣復塗著藥不過三傅便愈或更發復塗之不可多傅傷人腋餘處亦塗之小品文仲備急范汪同出第九卷中經心録漏腋方正朝旦以小便洗文仲備急集驗小品范汪千金同又方搗馬齒草腋下夾之令燥後復易之先用雌黃石灰等分合水煎一兩沸如泥泥之毛落然後塗諸藥良並出第五卷中七孔臭氣方三首千金療面目口齒七孔臭方沉香五兩甘草二兩炙白瓜瓣半升芎藭二兩丁香五兩藁本二兩麝香二兩當歸二兩右八味搗下篩蜜丸食後含如小豆五粒日三祕不𫝊久服令人舉體皆香救急同出第六卷中救急療人七孔臭氣方甘草五分炙芎藭四分白芷三分右三味作散下篩食後飲服方寸匕日三又方瓜子仁一分芎藭藁本當歸杜蘅各一兩細辛二分防風一分右七味搗下篩食後溫水服方寸匕日三令人體香方四首肘後令人體香方白芷薰草杜若杜蘅藁本等分右五味末之蜜和旦服如梧子三丸暮服四丸三十日足下悉香文仲備急范汪同又方甘草炙瓜子大棗松根皮等分右四味搗下篩食後服方寸匕日三二十日覺效五十日身體並香百日衣服床幃悉香文仲備急范汪千金同又方瓜子仁芎藭藁本當歸杜蘅細辛各二分白芷桂心各五分甘草二分炙右九味搗下篩食後服方寸匕日三五日口香二十日肉香文仲備急同出第五卷中千金療諸身體臭方竹葉十兩桃白皮四兩右二味以水一石二斗煮取五斗浴即香出第六卷中雜療汗出不止方一十首集驗療止汗粉藥方牡蠣二兩熬附子半兩炮麻黃根二兩右三味搗篩以白粉一升和合粉汗汗止忌豬肉又汗後遂漏不止其人惡風小便難四肢微急難以屈伸桂枝加附子湯方大棗十三枚擘附子一枚炮桂心三兩芍藥三兩生薑三兩甘草二兩炙右六味切以水七升煮取三升溫服一升延年同此夲張仲景傷寒論方千金止汗方青松葉一斤右一味搗令汁出清酒一升漬二宿近火一宿初服半升漸至一升頭面汗即止出第八卷中延年澤瀉湯療大虛煩躁止汗治氣方澤㵼茯苓各二兩牡蠣熬白术各兩生薑半升右五味切以水八升煮取二升分服一升日再服又都梁散療汗出如水及汗出衄血吐血小便血殆死方都梁香二兩紫菀人參青竹茹蓯蓉各一兩乾地黃二兩熬令燥右六味搗下篩水服方寸匕不效須臾再服忌蕪荑又療大病之後虛汗不可止方杜仲牡蠣等分熬右二味搗下篩向暮卧以水服一錢匕午前汗止者不再服服之令人乾燥若汗不止者復服一錢不過再必愈有驗天行及百病後虛吸漏汗遂服之無不止者又療大病後虛汗出不禁者方粢粉豉等分焦炒故竹扇如手掌大燒取灰右三味合搗以絹囊盛粉體立止最驗當先熬末粉之千金並同又粉散療大病後身體虛腫汗出止汗方麻黃根三兩防風乾薑細辛各二兩白斂一兩右五味合下篩以粢粉五升熬令黃合和以粉身出第十一卷中古今録驗療汗出不止术桂散方麻黃桂心各五分白术附子炮菖蒲各三分右五味搗末酒服方寸匕日三未食服又止汗熱雷丸散方雷丸桂心牡蠣各五分熬右三味搗下篩粉身日三出第二十六卷中外臺祕要方卷二十三
