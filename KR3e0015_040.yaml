熱方升麻柴胡石膏各一兩大黄甘草二兩當歸二兩右六味切以水三斗煑取一斗去滓以浴小兒瘡上訖敷黄連散又療小兒身體頭面悉生瘡方榆白皮乾者多少任用右一味𢷬末以醋和塗之綿覆上蟲出立差亦可以猪脂和塗之千金翼苦參湯主少兒頭面熱瘡方苦參八兩黄芩二兩大黄芍藥黄連各二兩蛇床子一升黄蘗五兩菝葜一斤洗右八味切以水二斗煎取一斗以洗兒日三即差千金云治上下徧身生瘡又方石南草大黄黄芩黄蘗礬石澤蘭各一兩戎鹽二兩真者蛇床子二合右八味切以水七升煑取三升以絮内湯中洗拭兒日三度差備急療小兒三嵗患頭上起熛漿如釘蓋一二日及胷背皆生仍成瘡方水銀朱砂各半兩石硫黄一兩研臘月猪脂右四味煮桑葉湯洗以敷之勿令豬犬婦人小兒等見之無效古今録驗療小兒頭瘡面上亦有日益甚者方黄連赤小豆各等分右二味𢷬末以臘月猪脂和塗之即差止小兒瘰癧方二首千金連翹丸主小兒無辜寒熱彊徤如故而身體項頸結核瘰癧及心脅腹背裏有堅不痛名為結風氣腫方海藻三分洗連翹桑白皮牡丹白頭翁防風黄蘗桂心香䜴獨活秦芁各四分右十一味𢷬篩蜜丸如小豆三嵗以飲服五丸至十丸五嵗以上以意加之必効療小兒項上瘰癧方以榆白皮爛𢷬如泥封之頻易小兒侵淫瘡方三首備急療小兒侵淫瘡方取竈中黄土亂髮灰各三分研成粉以猪膏和塗之差亦治身赤腫起千金同又方燒艾作灰敷之千金同又方以牛屎燒作灰敷之千金同小兒蠼螋瘡方二首備急療小兒蠼螋瘡繞身匝即死方𢷬蒺蔾葉敷之無葉子亦可千金同又方取鷰窠土研成粉以猪脂和塗之乾易千金同小兒惡瘡方五首文仲療小兒身中惡瘡方取笋煮汁洗之又燒笋皮作灰敷之古今録驗療小兒惡瘡方取豆豉熬令焦黄末以敷瘡差止千金同又療小兒惡瘡匝身衆藥所不能療之方取父根洗取汁以浴兒勿使母知良又療小兒面及身上生瘡如火燒方取黄米一升末以蜜水和塗之差為度又方以赤地利𢷬末以粉之佳小兒火灼瘡方二首千金療小兒火灼瘡者一身盡有如麻豆或有膿汁乍痛乍痒方甘草芍藥白斂黄芩黄連黄蘗苦參各半兩右七味𢷬末以蜜和敷之日二夜一亦可作湯洗之千金翼療小兒火瘡方煑大豆濃汁温洗之差亦令無瘢小兒風疹瘙痒方五首廣濟療小兒風疹浴湯方柳木空中屑二升蒴藋根切二升鹽二合櫨木切一升右四味切以水二斗煮取一斗入鹽以洗浴頻為之以差止又療小兒壯熱隠疹已服湯丸不消宜服竹瀝湯方淡竹瀝一升二合葛根汁五合牛黄豆粒三顆研右三味相和與兒服一嵗至五六嵗一合至三合五合再服以意增減之千金療小兒風瘙癮疹方蒴藋切一升防風羊桃石南秦椒升麻苦參茵芉芫花一作茺蔚蒺藜子蛇床子黄礬石燒枳實各一兩右十三味切以酢漿三斗煮取一斗内礬石令少沸以浴之又療小兒風搔癮疹方牛膝末酒服方寸匕漏瘡多年不差𢷬末敷之主骨疽癲病瘰癧絶妙千金翼療癮疹方巴豆五十粒去皮以水三升煮取一升半以綿内湯中拭病上隨手滅神良小兒疝氣陰㿗方八首小品療少小陰㿗白頭翁敷之神効方生白頭翁根不問多少𢷬之隨病處以敷之一宿當作瘡二十日愈一方三日上除日取之千金療小兒狐疝傷損生㿗方半夏洗芍藥茯苓各三分防風一作防葵大黄各二分桂心椒各一兩汗右七味𢷬散蜜丸如大豆以湯飲下一丸至二丸三丸日五服以差為度又方桂心三分地膚子一分白术五分右三味𢷬蜜丸如小豆白酒服七丸日三服亦治大人千金翼療小兒氣㿗方土𤓰根芍藥當歸各一兩右三味切以水二升煮取一升去滓分服五合日三備急療小兒㿗方以蜥蜴一枚燒灰末以酒服之又方灸足厥陰大敦左患灸右右患灸左各一壯即當差千金同古今録驗療小兒陰㿗方狐陰一具炙飛生蟲十四枚桂心附子炮乾薑蒺蔾硝石一作滑石細辛各二分卷栢桃仁去尖各六分右十味𢷬散蜜丸大豆許以飲下五丸至七丸再服差止劉氏療小兒疝氣陰囊核腫痛灸法如一嵗兒患向陰下縫子下有穴灸三壯差五嵗以上即從陰上有穴灸之即愈小兒陰瘡及腫方八首千金療小兒陰瘡及腫方取狼牙濃煮汁洗之又方黄連胡粉等分右二味末和以香脂油敷之差備急療小兒陰瘡方人屎燒作灰以敷之即差千金同又方猫兒骨燒作灰敷之即差千金云狗骨灰敷之又療小兒歧股間連陰囊生瘡汁出先痒後痛十日五日自差一月二十日復發連年不差者方灸瘡搔去痂以綿拭令乾以蜜敷麫作燒餅熟即以餳塗餅上熨之冷即止再度差千金同又治小兒陰腫方猪屎五升水煮沸布褁安腫上千金同又方灸大敦七壯差千金同又方𢷬蕪菁菜葉根薄之小兒脫肛方六首備急鼈頭丸療少小積痢乆下下後餘脫肛不差腹中冷肛中疼痛不得入者方死鼈頭一枚炙令焦小形蝟皮一枚炙焦磁石四兩桂心三兩右四味𢷬篩蜜丸如大豆三嵗至五嵗服五丸至十丸日三兒漸大以意加之千金同又療小兒脫肛方灸頂上旋毛中三壯即入又方灸尾翠三壯愈千金同又方炙臍中三壯愈千金云隨年肚古今録騐療小兒乆痢脫肛方東壁土五分鼈頭一枚炙焦五色龍骨五分卷栢四分右四味𢷬散以粉敷之按内之即差又方取鐡精粉敷内之差小兒䘌蟲食下部方四首千金療小兒蟲食下部方胡粉熬雄黄末各等分右二味以著下部穀道中即差又除熱結腸丸斷小兒熱下黄赤汁沫及魚腦雜血肛中瘡爛生䘌蟲方黄連蘗皮苦參鬼臼獨活橘皮芍藥阿膠炙各二分右八味𢷬篩以藍汁及蜜丸如小豆日服五丸冬天無藍汁可用藍子一合舂蜜和丸凡三嵗以下服三丸三嵗以上服五丸五嵗服十丸又杏仁湯方杏仁五十枚去皮尖鹽一合右二味以苦酒一升煮取一半量與服之又療小兒下部被蟲食大腸赤瘡爛方水銀一兩以漿水煮之取少許以唾研安著竹筒中吹入下部中三度差小兒疳濕瘡方六首備急療小兒疳濕瘡方以鐵上衣少許内下部中即差千金同又方自大椎數至第十五椎夾骨兩傍灸七壯不差加七壯千金同又方艾葉一兩水一升煮取四合分三服差千金云艾葉切五升以米一斗煮取一升半分三服又療小兒疳瘡方胡粉熬八分猪脂和塗之差為度油亦得千金同又方嚼栗子塗之差千金云嚼麻子敷之日六七度又方羊膽二枚以醬汁和灌下部中猪膽亦得千金同小兒蚘蟲方七首千金療小兒蚘蟲方棟木削上蒼皮以水煮取汁飲之量大小多少為此有小毒又方大麻子研取汁與飲之又方石榴根一把水五升煮取一升分二服又小兒羸瘦有蚘蟲方雚蘆二兩以水一升米二合煮取米熟去滓與服之又方萹蓄三兩水一升煮取四合分服之𢷬汁服亦佳又方東引茱萸根白皮四兩桃白皮三兩右二味切以酒一升二合漬之一宿漸與服取差又方蕪荑六分狼牙四分白斂二分右三味𢷬末以苦酒和量與服之小兒蟯蟲及寸白方五首千金療小兒蟯蟲方取猪膏服尤妙又方𢷬生槐實内下部中差為度又主寸白蟲方東行石榴根一把水一升煮取三合分服又方桃葉𢷬絞取汁服之又小兒蟲方雷丸芎藭各等分右二味𢷬散服一錢匕日三小兒瘻瘡方四首千金療小兒瘻方塚中石灰研敷之厚著之良又方燒桑根灰敷之并燒烏羊角灰和敷之又療小兒疽瘻方丹砂大黄各五分雌黄雄黄䕡茹各四分礬石燒如馬齒者佳莽草各三分黄連六分右八味㕮咀以猪脂一升三合㣲火煎三上三下膏成去滓下諸藥末攪凝塗之差備急若患漏瘡頭盡開出膿夜復合者方大附子一顆内鯽魚腹中於炭火上燒灰研以敷之更𢷬蒜以封之良小兒疥瘡方六首范汪療小兒疥瘡雄黄膏方雄黄研雌黄研各一兩烏頭一枚松脂亂髮各一雞子許猪脂一升半右六味和煎之候髮消烏頭色黄黑膏成去滓以敷之熟塗之千金瘡疥方以臭蘓和胡粉敷之差為度備急療疥方燒竹葉灰以雞子白和塗之以差為度又方以亂髮灰以猪膏和敷之效救急療疥瘡及小兒身上熱瘡並主之方黄連黄蘗赤小豆臭黄各一兩水銀半兩研相和右五味為散以麻油和先浄洗瘡然後塗之甚佳又療小兒疥瘡等神驗方黄連糯米粉各十二分水銀八分碎胡粉六分吳茱茰赤小豆各一兩右六味𢷬散水銀手中和唾研如泥以猪脂并水銀成膏先洗瘡乾拭令浄以塗藥三兩度差忌猪雞魚肉小兒癬瘡方六首集驗療小兒癬方以蛇床子末以白膏和敷之千金療小兒濕癬方枸把根𢷬末和臘月猪膏敷之一云酢和亦佳又方桃青皮𢷬末以醋和敷之日二又方煎馬尿洗之又方揩破以牛鼻上津塗之又方狗屎灰和猪脂以塗之小兒誤吞物方四首小品療小兒誤吞鐵珠子如狸豆大者經年不以為害後病瘦瘠食不生肌膚時下痢或寒熱服諸藥自療來反劇不效有師診之云是吞物不消作法服衆藥所吞物不去終不差令其家中察之云兒近嵗常㺯十六貝鐵珠覺失一顆慮是吞之從來積嵗實不以為疑之師六診乃信是故令病矣為處湯藥所患即差復與將療其兒肌膚充悦而忘説其方且記之又有一家女子六七嵗許患腹痛其母與摩按之覺手下有一横物在兒肉裏正平横爾問兒曰那得鍼在肉中大驚恠脱衣㸔之肉完浄無有刺處按之兒亦不患鍼痛惟覺腹裏痛耳其母即以爪甲重重介之乃横物折爪下兩段亦不偏痛迎師診之共察若吞鍼刺物者其嬰兒時不經鯁礙惟恐養兒時母常帶鍼躶抱橫兒體鍼入兒肌膚中兒縱覺痛啼呼與乳卧息便止遂成不覺今因腹痛摩之知耳鐡得土木濕皆生屑易朽鍼在人肉中經數嵗肉得血氣皆朽也故介之即折令患腹痛不安但療腹痛服温中湯下心腹病差後長大嫁因産乳不聞道鍼處為患故記之千金療小兒吞鍼方取磁石如棗核大吞之其鍼立出又誤吞鐡等物方艾蒿一把剉以水五升煮取一升頓服之即下肘後療小兒誤吞梅李方以少許水灌小兒頭承其水與飲之即出良近効療小兒誤吞錢在喉中不出方取麩炭末指彈入喉中其兒當便咯出妙小兒雜療方六首劉氏療小兒上冷下熱上熱下冷難將息方犀角末甘草生地黄各六分芍藥五分白术茯苓梔子各三分柴胡人參大黄生薑各四分黄芩二分桂心一分右十三味切以水三升煮取一升分温服之又療小兒身體滿氣急卧不得方郁李仁一合𢷬末和麫溲作餅子如常法與兒喫微利即差又方郁李仁末六分以水七合和調去滓煮粥與兒喫之又療小兒油丹赤腫方栝樓三大兩以醶醋𢷬藥以敷之佳又方取蕎麥麵以醋和塗之差又療小兒野雞下部痒悶方通按野雞未詳枳實二兩鬼箭青木香鬼臼各二兩右四味𢷬為末以釅醋和以青布褁以熨之有頭即破熨訖令根拔去之差止甚佳外臺秘要方卷三十六
