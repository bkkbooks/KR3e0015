body:
  text: 外臺秘要方卷三十六唐王燾撰小兒中風方四首千金療少小中風手足拘急二物石膏湯方石膏雞子大眞珠一兩研右藥以水二升煮取五六沸内真珠煮取一升去滓稍稍分服之又療少小中風脉浮發熱自汗出項强鼻鳴乾嘔方甘草炙芍藥桂心生薑各一兩大棗四枚右五味切以水三升煮取一升去滓分温三服忌如常法此張仲景桂枝湯但劑分小爾又療少小新生中風二物驢毛散方驢毛鬐頭毛一把生麝香大豆許二枚右藥以乳汁和於銅器中微火上煎令焦熟出研末之小兒不能飲以乳汁和之於􅓗竹筒中盛寫入咽中然後飲乳汁令入腹又療少小新生肌膚幼弱喜為風邪所中身體壯熱或中大風手足驚掣五物甘草等生摩膏方甘草防風各一兩白术桔梗各二十銖雷丸二兩半右藥切以不中水猪脂一斤煎取成膏合諸藥於㣲火上煎之消息視之凝膏成去滓取如彈丸大一枚炙手以摩兒百過寒者更熱熱者更寒小兒雖無病常以少膏摩𩕄上及手足心甚辟風寒良翼同並出第五卷中小兒欬嗽方八首小品療少小欬嗽腹脹七物小五味子湯方五味子碎紫菀各一分黄芩甘草炙麻黄去節生薑桂心各一分右藥㕮咀以水一升煑取七合分五服忌如常法又療少小欬嗽晝差夜甚初不得息不能復啼四物欵冬丸方欵冬花紫菀各一兩半伏龍肝一分桂心二分右藥𢷬篩蜜和如泥取如棗核大塗乳頭令兒飲之日三千金同又療少小十日以上至五十日卒得暴欬吐乳嘔逆晝夜不得息四物湯方桔梗紫菀各三分甘草一分炙麥門冬七分去心右藥切以水一升煮取六合去滓分五服以差為度千金有桂心無桔梗以水二升煑取一升以綿著湯中捉綿滴兒口中晝夜四五過節哺乳又療小兒中冷及傷寒暴欬嗽或上氣咽喉鳴氣逆者或惡寒鼻塞清水出紫菀湯方紫菀杏仁去皮尖甘草炙黄芩麻黄去節橘皮桂心青木香當歸各一兩大黄三分右十味切以水三升煮取九合去滓一嵗以上至五嵗兒以意量之分服千金云兒六十餘日至百日一服二合半百餘日至二百日一服三合餘同千金療少小欬嗽八物生薑煎方生薑七兩乾薑四兩桂心二兩甘草三兩杏仁一升去尖皮欵冬花紫菀各三兩蜜一升右藥末之以蜜合諸藥微火煎之使如飴餔量其大小多少與兒含咽之百日小兒含如棗核許日四五甚良出第五卷中備急療少小欬嗽上氣杏仁湯方麻黄八分去節杏仁四十枚去尖右二味切以水一升煮取七合去滓分服百日小兒患熱氣急不得服小便赤黄服之甚良大人孩童以意量之忌如常法又療少小欬𠻳方紫菀六分貝母三分欵冬花一分右三味𢷬為散取豆許著乳頭令兒飲之日三妳母忌如常法劉氏療小兒欬𠻳不得卧方甘草六分炙桔梗四分桑白皮貝母茯苓各三分大青吳藍五味子人參各二分右九味切以水二升煑取八合去滓量多少大小與服忌如常法小兒欬逆上氣方七首千金杏仁丸主大人小兒欬逆上氣方杏仁三升右一味熟𢷬如膏蜜一升分為三分以一分内杏仁𢷬合强更内一分𢷬之如膏又内一分𢷬熟止先食含之咽汁量其多少日三每可半方寸不得過也又射干湯主小兒欬逆喘息如水雞聲方射干二兩麻黄去節紫菀甘草炙生薑各一兩桂心五寸半夏五枚洗大棗二十枚去核右八味切以水七升煮取一升半内蜜五合去滓分温服二合忌餳羊肉生葱又方半夏四兩洗生薑三兩桂心紫菀細辛阿膠各二兩甘草二兩炙欵冬花二合蜜一合右九味切以水一斗先煮半夏取六升去滓内諸藥煮取二升五合去滓兩嵗兒飲六合五嵗兒飲一升量大小多少加減之又五味湯主小兒風冷入肺上氣氣逆面青喘迫晝夜不息食則吐不下方五味子二分麻黄去節一分當歸二分人參一分細辛半分乾薑一分桂心一分紫菀一分欵冬花半分甘草炙一分大黄六分右十一味切以水二升半煮取九合去滓兒六十日至百日服二合半百日餘至二百日一服三合一方無欵冬大黄有大棗三枚出第五卷中通按食則吐乃吐食也不下不大便也故用大黄以下之氣降而吐自止喘自定千金翼療小兒寒熱欬逆膈中有澼乳吐不欲食方乾地黄四兩麥門冬半升去心五味子五合大黄硝石各一兩蜜半升右六味切以水三升煑取一升去滓内硝石蜜煮令沸服二合日三胷中當有宿乳一升許出兒大者服五合又療小兒大人欬逆短氣胷中吸吸呵出涕唾𠻳出臭膿方燒淡竹瀝煑二十沸一服一合日五服大人服一升不妨食息乳哺並出第十一卷中劉氏療小兒上氣急滿坐卧不得方鼈甲一兩炙令極熟𢷬為末燈心一握右二味以水二升煎取八合以意量之與服小兒傷寒方三首千金論曰夫小兒未能冐涉霜雪乃不病傷寒也大人解脫之久傷於寒冷則不論耳然天行非節之氣其亦得之有時行疾疫之年小兒出腹便患斑者也治其時行節度故如大人法但用藥分劑少異藥小冷耳又療小兒傷寒方生葛汁淡竹瀝各六分右二味相和二三嵗兒分三服不宜煮生服佳又療少小未滿百日傷寒鼻衂身熱嘔逆麥門冬湯方麥門冬三分桂心八銖寒水石石膏碎甘草炙各二分右五味切以水二升半煮取一升分服一合日三又療少小傷寒芍藥四物解肌湯方芍藥黄芩升麻葛根各二分右藥切以水二升煮取九合去滓分四服期嵗以上分三服並出第五卷中小兒天行方八首廣濟療小兒天行壯熱欬𠻳心腹脹妨方人參甘草炙各一分生地黄麥門冬去心茅根各六分右五味切以水二升煮取七合去滓以意量之分温與服忌如常法又方麥門冬去心茅根各六分甘草炙人參各二分紫菀升麻貝母竹瀝各二分右八味切以水二升煑取八合分服忌如常法千金療少小有熱不汗二味通汗散方雷丸四兩粉半斤右藥𢷬篩以粉兒身以差為度又療小兒生一月至五月乍寒乍熱方細剉栁枝煑取汁以洗兒立効若渴絞冬𤓰汁服之又療小兒寒熱及赤氣中人猪蹄散方取猪後脚懸蹄燒灰末以乳汁飲一撮立効並出第五卷中劉氏療小兒天行頭痛壯熱方青木香六分白檀香三分右二味擣散以清水和服之以水調塗頂頭痛立差又方吳藍大青各十分甘草炙生麥門冬去心生薑各六分茵蔯三分梔子仁十枚蘆根一握洗右八味切以水二升煮取九合分温服之忌如常法又療小兒天行五日以後熱不歇方棗葉一握麻黄一兩去節葱白切一合豉一合右四味切以童子小便二升煎取九合去滓分服之小兒諸黄方四首千金療小兒黄方𢷬上𤓰根汁澄清滴兒鼻中如大豆許日服三合又方𢷬麥青汁服之又方𢷬韭根汁以滴兒鼻中少許即出黄水差又療諸黄方小豆二十一枚𤓰蒂十四枚糯米四十粒右三味𢷬散吹鼻中差並出第五卷中小兒諸瘧方九首廣濟療小兒瘧方取蛇皮燒灰一錢匕和冷水服之又方取驢軸下垢膩刮取和麫作燒餅與喫以差止刪繁療小兒瘧或自能飲或不能飲母含藥與飲之常山酒煎方常山二兩桂心一兩甘草半兩右三味切以酒一升煎取七合去滓分服取吐差止千金常山湯主小兒温瘧方常山四分切淡竹葉切一握小麥三合右三味以水一升半煑取五合一日至七日兒一合為三服八日至十五日兒一合半為三服十六日至二十日兒二合為三服四十日至六十日兒六合為三服六十日至百日兒一服二合半百日至二百日兒一服三合其一嵗至七八嵗兒增藥水並以此為率又方灸兩乳下一指各三壯又方燒雞膍胵黄皮末和乳與服男雄女雌又方生鹿角末發時與一錢匕服之又方燒鼈甲灰以酒服一錢匕至發時服三匕出第五卷中劉氏療小兒瘧方黄丹半錢匕以蜜水和與服若冷以酒和與服之良小兒眼赤痛方八首古今録驗療小兒眼痛方取淡竹瀝拭之又方取鯉魚膽㸃之又方取車前草汁和竹瀝㸃之又方以人乳浸黄連㸃之劉氏療小兒赤眼方黄連二分朴硝一分令乾右二味以婦人妳汁浸之㸃眼良小品療小兒蓐内赤眼方生地黄薄切冷水浸以貼之妙又方取羊子肝薄切以井花水浸以貼之妙又方取黄蘗以乳浸㸃之小兒諸淋方六首千金療小兒淋方車前子一升水二升煮取一升分服之一方用車前草又方以冬葵子煮汁服之又方取蜂房亂髮燒灰以水服一錢匕日再服文仲療小兒淋兼石淋方取特牛陰毛燒灰以漿水服一刀圭日再服又方榆皮瞿麥各六分右二味切以水一升煮取半升去滓分温服之又方小麥一合葱白一握右二味以水一升煑去滓取一半分服之小兒小便不通方五首廣濟療小兒熱極病小便赤澁或不通尿輒大啼呼滑石湯方滑石十六分子芩十四分冬葵子八分車前草切一升右四味以水二升煮取一升一嵗至四五嵗服一合日再服甚良小品療小兒小便不通地膚子湯方地膚子一分瞿麥冬葵子各三分知母黄芩猪苓海藻橘皮升麻通草各一分半大黄八分右十一味切以水二升煮取一升大小多少量與服忌如常法千金有枳實無橘皮千金療小兒小便不通方車前草一升切小麥一升右二味以水二升煑取一升二合去滓以煑粥服日三四量與服又方冬葵子一升右一味以水二升煑取一升入滑石末一分温分服劉氏療小兒忽不得小便急悶方葱白一握通草一兩冬葵子一合右三味切以水二升煮取一升去滓量服小兒遺尿失禁方五首千金療小兒遺尿方瞿麥龍膽石韋去毛桂心皂莢炙去皮子各二分雞腸草四分車前子五分人參二兩右八味𢷬篩蜜丸如小豆每服五丸加至六七丸又方灸臍下一寸半隨年壯又方灸大敦三壯又方小豆葉擣汁服佳又療失禁不覺尿出方以豆醬和竈突黒如大豆許内尿孔中佳小兒大便有血方三首救急療小兒大便訖血出方鼈甲一枚炙末五分右一味以水和量多少大小服日三忌如常法千金云鼈頭一枚又方以車釭一枚燒令赤内水中與服差千金同又方燒甑帶灰塗乳上與飲之差千金同小兒大便不通方四首千金紫雙丸主小兒身熱頭痛食飲不消腹脹滿或小腹絞痛大小便不利或重下數起小兒無異疾唯飲食過度不知自止哺乳失節或驚悸寒熱唯此丸治之不差復可再服小兒欲下是其蒸候哺食減少氣息不快夜啼不眠是腹内不調悉宜用此丸不用他藥數用神驗千金不𫝊方巴豆去心皮熬㽔核仁各十八銖别𢷬麥門冬十銖去心甘草五銖炙甘遂二銖真珠二銖牡蠣熬臘各八銖右八味以湯熟洗巴豆研以新布絞去油别𢷬甘遂甘草牡蠣麥門冬細篩畢擣巴豆蕤仁令極熟乃内諸藥散更擣三千杵如藥燥入少蜜足之半嵗兒可服如荏子一雙一二嵗兒服如半麻子作一雙三嵗兒服如麻子一枚作一雙四嵗兒服如麻子二丸五六嵗兒服如大麻子二丸七八嵗兒服如小豆二丸九嵗十嵗兒㣲大於小豆二丸常以雞鳴時服至日出時不下者飲熱粥汁數合即下丸皆雙出也下甚者飲冷粥止之必効療小兒大便不通方灸口兩吻各一壯又方猪苓一兩右一味以水少許煑雞矢白一錢匕與服立差又主小兒大小便不通妨悶方白蜜一合右一味煎為丸内下部中即通小便不通嚼生葱以綿褁少許内小便道中即通小兒赤白痢方七首廣濟療小兒赤白痢腹痛方赤石脂龍骨地榆黄連各四分厚朴炙人參各三分當歸乾薑各三分右八味𢷬散以飲汁服半錢匕日再服之蜜丸以乳汁下三丸至七丸亦佳此方甚妙以意量之又療小兒客冷白痢方人參六分厚朴炙甘草炙各四分茯苓桔梗各五分櫸皮八分炙右六味切以水三升煮取一升量其大小可一合為度以差止忌如常法救急療二百日小兒赤白痢日夜五十行方白术乾薑各四分茯苓甘草炙各四分附子