body:
  text: 外臺秘要方卷十七唐王燾撰素女經四季補益方七首素女經黄帝問素女曰男子受氣陰陽俱等男子行陽常先病耳目本其所好陰痿不起氣力衰弱不能強健敢問療之道素女曰帝之所問衆人同有陰陽為身各皆由婦人夭年損夀男性節操故不能專心貪女色犯之竭力七傷之情不可不思常能審慎長生之道也其為疾病宜以藥療之今所説犯者七第一之忌日月晦朔上下弦望六丁之日以合陰陽傷子之精令人臨敵不戰時時獨起小便赤黄精空自出夭夀喪身第二之忌雷電風雨陰陽晦瞑振動天地日月無精光以合陰陽生子令狂癲或有聾盲瘖瘂失神或多忘誤心意不安忽常喜驚恐悲憂不樂第三之忌新飽食飲榖力未行太倉内實五藏防響以合陰陽六腑損傷小便當赤或白或黄腰脊疼痛頭項寄彊或身體浮腫心腹脹滿毁形夭夀天道之常第四之忌新小便精氣微弱榮氣不固衛氣未散以合陰陽令人虛乏陰陽氣閉絶食無味腹脹滿結怫鬱不安忘誤或喜怒無常狀如癲發第五之忌作事步行身體勞榮氣不定衛氣未散以合陰陽藏氣相干令人氣乏喘息為難脣口乾燥身體流汗榖不消化心腹脹滿百處酸疼起卧不安第六之忌新息沐浴頭身髮濕舉重作事流汗如雨以合陰陽風冷必傷少腹急痛腰脊疼彊四肢酸疼五藏防響上攻頭面或生漏瀝第七之忌共女語話玉莖盛彊以合陰陽不將禮防氣腠理開莖中痛傷外動肌體内損腑藏結髮塞耳目視􅑩􅑩心中怵惕恍惚喜忘如杵舂膈欬逆上氣内絶傷中女絶痿弱身可不防犯此七篇形證已彰天生神藥療之有方黄帝問高陽負曰吾知素女明知經脉藏腑虛盈男子五勞七傷婦人陰陽隔閉漏下赤白或絶産無子男子受氣陰陽同等其病縁由因何而起故欲問之請為具説對曰深哉問也男子五勞六極七傷病皆有元本由狀帝曰善哉七傷之病幸願悉説對曰一曰陰汗二曰陰衰三曰精清四曰精少五曰陰下濕癢六曰小便數少七曰陰痿行事不遂病形如是此謂七傷黄帝曰七傷如是療之柰何對曰有四時神藥名曰茯苓春秋冬夏療隨病形冷加熱藥温以冷漿風加風藥色脉診評隨病加藥悉如本經春三月宜以更生丸更生者茯苓也療男子五勞七傷陰衰消小嚢下生瘡腰背疼痛不得俛仰兩膝臏冷時時熱癢或時浮腫難以行歩目風淚出逺視􅑩􅑩欬逆上氣身體痿黄遶臍弦急痛及膀胱小便尿血莖痛損傷時有遺瀝汗衣赤黄或夢驚恐口乾舌彊渴欲飲水得食不常或氣力不足時時氣逆坐犯七忌以成勞傷此藥主之甚驗方茯苓四分若不消食三分加一菖蒲四分若耳聾三分加一山茱茰四分若身癢三分加一括樓根四分若熱渴三分加一莵絲子四分若痿洩二分加一牛膝四分若機闗不利加一倍赤石脂四分若内傷三分加一乾地黄七分若煩熱三分加一細辛四分若目􅑩􅑩三分加一防風四分若風邪三分加一薯蕷四分若陰濕癢三分加一續斷四分若有痔加一倍蛇牀子四分若少氣三分加一柏實四分若少力加一倍巴㦸天四分若痿弱三分加一天雄四分炮若有風三分加一逺志皮四分驚恐不安三分加一石斛四分若體疼加一倍杜仲四分若絶陽腰痛三分加一蓯蓉四分若冷痿加一倍右二十味𢷬篩蜜和丸如梧桐子先食服三丸日三不知漸増以知為度亦可散服以清粥飲服方寸匕七日知十日愈三十日餘氣平長服老而更少忌豬羊肉餳冷水生菜蕪荑等物又黄帝問曰夏三月以何方藥幸得具聞對曰宜以補腎茯苓丸療男子内虛不能食飲忽忽喜忘悲憂不樂恚怒無常或身體浮腫小便赤黄精泄淋瀝痛絞膀胱脛疼冷痺伸不得行渴欲飲水心腹脹滿皆犯七忌上已具記當療之法隨病度量方用如左茯苓二兩食不消加一倍附子二兩炮有風三分加一山茱茰三兩身癢三分加一杜仲二兩腰痛三分加一牡丹二兩腹中遊氣三分加一澤㵼三兩有水氣三分加一薯蕷三兩頭風加一倍桂心六兩顔色不足三分加一細辛三兩目視􅑩􅑩三分加一石斛二兩陰濕癢三分加一蓯蓉三兩身痿三分加一黄芪四兩體疼三分加一右十二味𢷬篩蜜和丸如梧桐子先食服七丸日二服忌生葱生菜豬肉冷水大酢胡荽等物又黄帝問曰春夏之療已聞良驗秋三月以何方藥對曰宜以補腎茯苓丸療男子腎虛冷五藏内傷風冷所苦令人身體濕痒足行失顧不自覺省或食飲失味目視􅑩􅑩身偏拘急腰脊痛彊不能食飲日漸羸瘦胸心懊悶欬逆上氣轉側須人起則扶舁鍼灸服藥療之小折或乗馬觸風或因房室不自將䕶飲食不量用力過度或口乾舌燥或流涎出口或夢窹精便自出或尿血尿有瀝淋陰下痒濕心驚動悸少腹偏急四肢酸疼氣息噓吸身體浮腫氣逆胷脅醫不能識妄加餘療方用如左茯苓三兩防風二兩桂心二兩白术二兩細辛二兩山茱茰二兩薯蕷二兩澤㵼二兩附子二兩炮乾地黄二兩紫菀二兩牛膝三兩芍藥二兩丹參二兩黄芪二兩沙參二兩蓯蓉二兩乾薑二兩𤣥參二兩人參二兩苦參二兩獨活二兩右二十二味𢷬篩蜜和丸如梧桐子食前服五丸臨時以酒飲下之忌酢物生葱桃李雀肉生菜豬肉蕪荑等又黄帝問曰春夏秋皆有良方冬三月復以何方治之對曰宜以垂命茯苓丸療男子五勞七傷兩目􅑩􅑩得風淚出頭項寄彊不得迴展心腹脹滿上支胷脅下引腰脊表裏疼痛不得喘息飲食欬逆面目痿黄小便淋瀝清精自出陰痿不起臨事不對足脛酸疼或五心煩熱身體浮腫盜汗流離四肢拘攣或緩或急夢窹驚恐呼吸短氣口乾舌燥狀如消渴忽忽喜忘或悲憂嗚咽此藥主之補諸絶令人肥壯彊健氣力倍常飲食百病除愈方茯苓二兩白术二兩澤㵼二兩牡蒙二兩桂心二兩牡蠣二兩熬牡荆子二兩著蕷二兩杜仲二兩天雄二兩炮人參二兩石長生二兩附子二兩乾薑二兩莵絲子二兩巴㦸天二兩蓯蓉二兩山茱茰二兩甘草二兩炙天門冬二兩去心右二十味𢷬篩以蜜和丸如梧桐子先食服五丸酒飲皆得忌海藻菘菜鯉魚生葱豬肉酢等物又黄帝問曰四時之藥具已聞之此藥四時通服得不對曰有四時之散名茯苓散不避寒暑但能乆服長生延年老而更壯方用如左茯苓鍾乳研雲母粉石斛菖蒲柏子仁莵絲子續斷杜仲天門冬去心牛膝五味子澤㵼逺志去心甘菊花蛇床子薯蕷山茱茰天雄炮石韋去毛乾地黄蓯蓉並等分右二十二味𢷬篩為散以酒服方寸匕日再二十日知三十日病悉愈百日以上體氣康彊長服八十九十老公還如童子忌酢物羊肉餳鯉魚豬肉蕪荑等高陽負曰凡經方神仙所造服之療病具已論訖如是所擬説從開闢以來無病不治無生不救也並出古今録驗二十五卷中五勞六極七傷方一十首病源夫虛勞者五勞六極七傷是也五勞者一曰志勞二曰思勞三曰心勞四曰憂勞五曰瘦勞又有五勞肺勞者短氣而面腫鼻不聞香臭肝勞者面目乾黑口苦精神不守恐畏不能獨卧目視不明心勞者忽忽喜忘大便苦難或時鴨溏口内生瘡脾勞者舌本苦直不得咽唾腎勞者背難以俛仰小便不利色赤黄而有餘瀝莖内痛陰濕嚢生瘡少腹急滿也六極者一曰氣極令人内虛五藏不足邪氣多正氣少不欲言二曰血極令人無顔色睂髮墮落忽忽喜忘三曰筋極令人數轉筋十指爪甲皆痛苦倦不能乆立四曰骨極令人痠削齒苦痛手足煩疼不可以立不欲行動五曰肌極令人羸瘦無潤澤飲食不生肌膚六曰精極令人少氣噏噏然内虛五藏氣不足髮毛落悲傷喜忘七傷者一曰陰寒二曰陰痿三曰裏急四曰精連連五曰精少陰下濕六曰精液清七曰小便苦數臨事不舉又一曰大飽傷脾脾傷善噫欲卧面黄二曰大怒氣逆傷肝肝傷少血目暗三曰彊力舉重久坐濕地傷腎腎傷少精腰背痛厥逆下冷四曰形寒寒飲傷肺肺傷少氣欬嗽鼻鳴五曰憂愁思慮傷心心傷苦驚喜忘善怒六曰風雨寒暑傷形形傷髮落肌膚枯天七曰大恐懼不節傷志志傷恍惚不樂男子平人脉大為勞極虛亦為勞男子勞之為病其脉浮大手足煩春夏劇秋冬差陰寒精自出痠削診寸口脉浮而遲浮即為虛遲即為勞遲即衛氣不足浮即榮氣竭脉直上者逆虛也脉澀無陽是腎氣少寸闗澀無血氣逆冷是大虛脉浮微緩皆為虛緩而大者勞也脉微濡相薄為五勞微弱相薄虛損為七傷其湯熨鍼石别有正方補養宣導今附於後養生方導引法云唯欲嘿氣養神閉氣使極吐氣使微又不得多言語大喚呼令神勞損亦云不可泣淚及多唾洟此皆為損液漏津使喉澀大渴又云雞鳴時扣齒三十六下訖䑛口脣漱舌聊上齒表咽之三過殺蟲補虛勞令人彊壯又云兩手拓兩頰手不動摟肚肘使急腰内亦然住定放兩肘頭向外肘髆腰氣散盡勢大悶始起來去七通去肘臂之勞又云兩足跟相對坐上兩足指相向外扒兩膝頭柱席兩向外扒使急始長舒兩手兩向取勢一一皆急三七去五勞腰脊膝疼傷冷脾痺又云跪一足坐上兩手䏶内捲足努踹向下身外扒一時取勢向心來去二七左右亦然去五勞足臂疼悶膝冷陰冷又云坐抱兩膝下去三里二寸急抱向身極勢足兩向身起欲似胡牀住勢還坐上下來去二七去腰足臂内虛勞膀胱冷又云外轉兩脚平蹹向陰端急蹙將兩手捧膝頭兩向極勢捺之二七畢身側兩向取勢二七前後努腰去心勞痔病膝頭冷調和未損盡時須言語不瞋喜偏跏兩手抱膝頭努膝向外身手膝各兩極勢挽之三七左右亦然頭須左右仰扒去背急臂勞又云兩足相蹹令足掌合也蹙足極勢兩手長舒掌相向腦項之後兼至髆相挽向頭髆手向席來去七仰手七合手七始兩手角上極勢腰正足不動去五勞七傷臍下冷煖不和數用之常和調適又云一足蹹地一足屈膝兩手抱犢鼻下急挽向身極勢左右換易四七去五勞三里氣不下又蛇行氣曲卧以正身復起踞閉目隨氣所在不息少食裁通腸服氣為食以䑛為漿春出冬藏不財不養以治五勞七傷又云蝦蟆行氣正動摇兩臂不息十二通以治五勞七傷水腫之病又云外轉兩足十徧引去心腹諸勞内轉兩足十徧引去心五息止去身一切諸勞疾疹出第三卷中廣濟療五勞七傷六極八風十二痺消渴心下積聚使人身體潤服之多情性補益養精方生乾地黄十二分天門冬十分去心乾薑六分莵絲十分酒漬二宿焙乾别𢷬石斛八分當歸六分白术六分甘草八分炙肉蓯蓉七分芍藥六分人參八分𤣥參六分麥門冬十分去心大黄八分防風六分杏仁八分去皮尖熬麻子仁八分地骨皮六分椒三分去目汗牛膝六分紫菀六分茯苓八分右二十二味𢷬篩蜜和丸如梧子空腹酒下二十丸日再服漸加至三十丸忌鯉魚海藻菘菜桃李雀肉大酢蕪荑等崔氏腎瀝湯療五勞六極八風十二痺補諸不足方豬腎一具去脂膜附子四分炮芎藭四分牡丹四分桂心四分茯苓八分乾地黄六分人參四分桑螵蛸八分炙磁石八分研如粉牡荆子八分當歸四分黄芪八分菖蒲八分右十四味切以水一斗七升煮腎取一斗一升去腎内藥煎取四升分四服忌羊肉餳冷水酢生葱蕪荑胡荽古今録驗同又治丈夫五勞七傷百病無不補之乾漆散方乾漆八兩熬令斷烟蓯蓉八兩石斛八分枸把子一升乾地黄十兩逺志皮五兩續斷五兩莵絲子五兩天雄三兩炮桂心三兩右十味𢷬篩為散每旦服一匕暮一匕酒飲皆得忌豬肉生葱蕪荑冷水又七味乾漆散方韋都水服不踰月光恱倍常療虛羸無比乾漆三兩熬煙斷乾地黄八兩芍藥一兩蓯蓉二兩五味子二兩食茱茰四兩枸杞子四兩右藥𢷬篩為散酒服方寸匕漸加至二匕日二服以知為度忌蕪荑又五落散主五勞六極七傷八不足裏急胷脅脹滿背痛頭眩四肢重腰膂彊環臍腹痛小便或難或數劇者大便去血歙歙少氣手足煩熱卧不能舉起起行不能久立有病若此名曰内極或生愁憂恐怖生熱或飽食飲酒房室自極陽氣虛竭耳鳴消渴甚則手足浮腫逆害飲食名曰内消五勞七傷視病所苦加其藥方大黄六分麥門冬七分去心栝樓五分白薇七分甘草五分炙當歸十分乾地黄七分山茱茰七分桑螵蛸七分炙石斛九分六安者茯苓五分桂心三分鐡屑三分研厚朴三分炙吳茱茰二分右十五味合𢷬篩以白蜜一斤棗膏一斤當蒸之以温湯浸之和􅘞疎有切前藥令如乾飲狀藥悉成又别取牛膝五兩肉蓯蓉六兩附子三兩炮三物合𢷬下篩内諸藥和令相得以酒服之方寸匕日三不知稍増之長肌肉補不足久服益氣力若少氣力加石斛消渴加括樓止痛結煩裏急加芍藥腹中痛下濃血加厚朴四兩炙四肢酸疼加當歸歙歙少氣加天門冬白薇一名五若散忌海藻菘菜生葱蕪荑酢物鯉魚等通按音搜沃也又淘米聲又落腎散一名腎著散療腰背痛少腹攣急尿難自汗出耳聾陰痿脚冷皆其病候方羊腎一雙作脯炙燥磁石六分研天門冬五分去心人參二分防風三分天雄三分炮龍骨五分茯苓一分續斷七分肉蓯蓉五分𤣥參三分乾地黄四分桑白皮三分白膠五分炙乾漆五分熬右十五味下篩空腹以大麥飲下二方寸匕日五六服忌鯉魚豬肉冷水蕪荑酢等物又枸把酒療五内邪氣消渴風濕下胷脅間氣頭痛堅筋骨彊陰利大小腸填骨髓長肌肉破除結氣五勞七傷去胃中宿食利耳目鼻衂吐血内濕風疰補中逐水破積瘀膿惡血石淋長髪傷寒瘴氣煩躁滿悶虛勞喘吸逐熱破血及脚氣腫痺方用米一石為一劑黍糯竝得計常醸酒米一石用麯一斗此加五升彌佳其麯唯須上好者末之枸把三十斤去赤皮半寸剉之以水一石浸之三日煮取五升汁生地黄二十斤洗去土細切共米同炊之秋麻子三斗微熬細粉蒸氣出以枸把湯淋取汁豆豉二斗以枸杞湯煮取汁右四味地黄一味共米同蒸之三物藥汁總合得五斗分半漬米饙半及麴和醸飯如人肌温總和一酘盖甕口經二七日壓取封泥復經七日初一度醸用麻子二斗多即恐令人頭痛服酒慎蕪荑生冷陳宿猪犬鷄魚麫䔉油膩白酒房室等服經一二七日將息病退並出第八卷中千金五勞六極七傷虛損何謂五勞五藏病六極六腑病七傷表裏受病凡逺思彊慮傷人憂恚悲哀傷人喜樂過差傷人忿怒不解傷人汲汲所願傷人慼慼所患傷人寒温失節傷人故曰五勞六極七傷也論傷甚衆且言其七悉主一方蓯蓉七分五味子八分地膚子五合續斷五分蛇床子五分車前子五合莵絲子七合乾地黄八分牡蠣六分左顧者熬天雄七分炮桑寄生七分韭子五合天門冬八分去心地骨皮八分白石英八分陽起石七分白龍骨七分右十七味合𢷬篩以酒服方寸匕日三忌猪肉冷水鯉魚蕪荑等出第十九卷中古今録驗淮南八公石斛萬病散療五勞七傷大風緩急濕痺不仁甚則偏枯筋縮拘攣胷脅支滿引身彊直或頸項腰背疼痛四肢酸煩陰痿臨事不起痒濕卧便盜汗心腹滿急小便莖中疼痛或時便血咽乾口燥飲食不消往來寒熱羸瘦短氣肌肉損減或無子若生男女纔欲及人便死此皆極勞傷血氣心神不足所致藥悉主之令人康健多子方牛膝二分逺志二分去心續斷二分蛇牀子三分莵絲子三兩酒漬蓯蓉二分茯苓二分杜仲二分桂心二分乾薑一分蜀椒一分汗細辛二分附子二分炮天雄二分炮防風二分乾地黄二分白术二分萆薢二分石斛二分雲母粉二分菊花二分菖蒲二分右二十二味隨病倍其分𢷬篩為散先食以酒服方寸匕日三以知為度神良忌猪羊肉冷水桃李雀肉生葱生菜大酢錫等千金有人參山芋巴㦸天五味子山茱茰為二十七味又淮南王枕中丸療五勞六極七傷胃氣不和發於五藏虛勞小便或難或數令人多思脾氣不和宿食熱所為流入百脉食飲不進沉滯著中隔并來著一邊或食不消夜服三丸方芎藭二兩附子二兩炮桂心二兩甘草二兩炙黄芩二兩芍藥二兩乾薑二兩蜀椒二兩汗杏仁四兩去皮尖熬白术五兩當歸二兩大黄一兩右十二味𢷬篩蜜和丸如梧子以酒服五丸日三忌海藻菘菜生葱猪肉冷水桃李雀肉等並出第二十五卷中雜療五勞七傷方三首古今録驗薯蕷丸療丈夫五勞七傷頭痛目眩手足逆冷或煩熱有時或冷痺骨疼要髖不随食雖多不生肌肉或少食而脹滿體澀無光澤陽氣衰絶陰氣不行此藥能補十二經脉起發陰陽通内制外安魄定魂開三焦破積聚厚腸胃消五藏邪氣除心内伏熱彊筋練骨輕身明目除風去冷無所不療補益處廣常須服餌為佳七十老人服之尚有非常力況少者乎謹具方如左乾薯蕷二兩蓯蓉四兩牛膝二兩莵絲子二兩酒漬杜仲二兩赤石脂二兩澤㵼二兩巴㦸天二兩去心山茱茰二兩茯苓二兩乾地黄二兩五味子一兩半石膏二兩研逺志一兩去心柏子仁一兩白馬莖筋乾之二兩炙右十六味𢷬篩蜜和丸如梧子以酒空腹服二十丸至三十丸日再忌大酢蕪荑䔉陳臭物又療五勞七傷諸虛補益及下元後用甚驗五石黄芪丸方黄芪二兩紫石英二兩研赤石脂二兩石硫黄二兩研石斛二兩白石脂二兩白礬石二兩鍊研桂心四兩烏頭二兩炮去皮鍊鍾乳二兩研芎藭二兩防風二兩茯苓三兩乾薑四兩棗一百枚當歸二兩細辛三兩人參二兩肉蓯蓉二兩附子二兩炮乾地黄二兩芍藥三兩甘草三兩炙白术二兩右二十四味草石各别𢷬篩棗蜜和丸如梧子空腹酒下十丸日三漸加至三十丸忌海藻菘菜猪肉冷水桃李雀肉生葱酢物蕪荑生菜千金有羊腎羌活無白术鍾乳紫石英石硫黄赤石脂白石脂礬石止十九味又大薯蕷丸療男子