右十六味切以水一斗五升如常法煎取三升去滓分三服忌海藻菘菜生葱猪肉蕪荑等古今録驗瀉腎湯療腎氣不足方芒硝二兩礬石二兩熬汁盡大豆一升右三味以水三升煮取一升二合去滓分再服當快下出第二十七卷中又療丈夫腰脚疼腎氣不足陽氣衰風痺虛損惙惙諸不足腰背痛耳鳴小便餘瀝風虛勞冷腎氣丸方羊腎二具炙細辛二兩石斛四兩蓯蓉四兩乾地黄四兩狗脊一兩黑者桂心二兩茯苓五兩牡丹皮二兩麥門冬三兩去心黄茋四兩人參二兩澤㵼二兩乾薑二兩山茱茰二兩附子二兩炮薯蕷二兩大棗一百枚取膏和丸右十八味𢷬篩以棗膏少著蜜合丸如梧子大以酒服二十丸漸加至三十丸日再服忌猪肉冷水生葱生菜胡荽蕪荑酢物出第二十五卷中經心録羊腎湯療腎氣不足耳無所聞方羊腎一具芎藭一兩茯苓二兩人參三兩附子一兩炮桂心二兩牡丹皮一兩磁石二兩當歸二兩乾地黄三兩大棗五枚擘牡荆子一兩碎右十二味切以水一斗七升煮藥腎取一斗去腎煮取四升分四服晝三夜一忌猪肉冷水生葱胡荽蕪荑酢物出第四卷中虛勞裏急方六首病源虛勞則腎氣不足傷於衝脉衝脉為陰脉之海起於闗元穴在臍下隨腹直上至咽喉勞傷内損故腹裏拘急也上部之脉微細而卧引裏急心膈上有熱者口乾渴寸口脉陽弦下急陰弦裏急故為胃氣虛食難用飽飽則急痛不得息寸微闗實尺弦緊者少腹腰背下苦拘急痛外如不喜寒身憒憒也其湯熨鍼石别有正方補養宣導今附於後養生方云正偃卧以口徐徐内氣以鼻出之除裏急飽食後小嚥氣數十令温寒者乾嘔腹痛從口内氣七十所大䐜腹小嚥氣數十兩手相摩令極熱以摩腹令氣下也出第三卷中深師黄芪湯療大虛不足少腹裏急勞寒拘引臍氣上衝胸短氣言語謬誤不能食吸吸氣乏悶亂者方黄芪三兩半夏一升洗大棗二十枚擘生薑四兩桂心四兩芍藥四兩人參二兩甘草二兩炙右八味切以水一斗二升煮取四升分四服日夜再若手足冷加附子一兩忌生葱海藻菘菜羊肉餳又大建中湯療内虛絶裏急少氣手足厥逆少腹攣急或腹滿絃急不能食起即微汗出陰縮或腹中寒痛不堪勞苦脣口舌乾精自出或手足乍寒乍熱而煩苦酸疼不能久立多夢寤補中益氣方黄芪四兩人參二兩大棗二十枚擘當歸二兩桂心六兩生薑一斤半夏一升洗芍藥四兩附子一兩炮甘草二兩炙右十味切以水一斗二升煮取四升分四服先服後食忌海藻菘菜生葱猪羊肉餳冷水等又樂令黄芪湯療虛勞少氣胷心痰冷時驚惕心中悸動手足逆冷體常自汗補諸不足五藏六腑虛損腸鳴風濕榮衛不調百病又治風裏急方黄芪二兩當歸三兩烏頭三兩炮去皮尖四片入蜜炙之令黄色桂心三兩生薑四兩蜀椒二兩汗人參二兩芍藥二兩大棗二十枚擘茯苓二兩逺志二兩去心半夏四兩洗右十二味切以水一斗五升煮取四升分服八合日三夜再忌生葱羊肉餳猪肉冷水大酢千金有橘皮細辛前胡甘草麥門冬無烏頭蜀椒逺志為十四味集驗療虚勞裏急諸不足黄芪建中湯方黄芪三兩桂心三兩甘草三兩炙芍藥二兩生薑四兩大棗十二枚擘飴糖一斤右七味切以水一斗二升煮取六升去滓内飴糖令消適寒温服一升間日可作嘔者倍生薑腹滿者去棗加茯苓四兩忌生葱海藻菘菜古今録驗同是此本仲景方恐甘草二兩芍藥六兩生薑三兩也通按當以此為準與金匱方同古今録驗黄芪湯主虛勞裏急引少腹絞痛極攣卵腫縮疼痛方黄芪三兩甘草三兩炙桂心二兩芍藥六兩生薑一斤大棗十二枚擘飴糖半斤右七味切以水一斗二升煮取三升去滓内糖令消分服一升嘔即除飴糖忌海藻菘菜生葱又黄芪湯療虛勞裏急少腹痛氣引胷脅痛或心痛短氣方芍藥六兩黄芪四兩甘草二兩炙桂心二兩乾薑四兩當歸四兩大棗十二枚飴糖六兩右八味切以水一斗煮取三升去滓下飴糖令消分三服忌海藻生葱菘菜並出第二十三卷中虛勞心腹痛方二首病源虛勞者臓氣不足復為風邪所乘邪正相干冷熱擊摶故令心腹俱痛出第三卷中古今録驗療虚勞腹中痛夢失精四肢痠疼手足煩熱咽乾口燥并婦人少腹痛芍藥湯方芍藥六兩桂心三兩甘草三兩炙生薑四兩大棗十二枚擘飴糖一斤右六味切以水九升煮取三升去滓下糖分服七合日三夜一忌海藻菘菜生葱此仲景小建中湯方本云甘草二兩生薑三兩又建中黄芪湯療虛勞短氣少腹急痛五藏不足方黄芪三兩甘草三兩炙桂心三兩生薑一斤薄切飴糖半斤大棗十二枚擘右六味切以水一斗煮取三升去滓下糖温服一升日三忌海藻菘菜生葱並出第三卷中虛勞偏枯方一首病源夫勞損之人體虛易傷風邪風邪乘虛客於半身留在肌膚未即發作因飲水水未消散即勞於腎風水相摶乘虛偏發風邪留止血氣不行故半身手足枯細為偏枯也出第四卷中古今録驗主新飲水未散而交接令人偏枯身偏不足乾地黄丸方乾地黄五分乾漆四分熬萆薢三分防風二分椒一分汗附子二分炮烏頭一分炮右七味𢷬篩以蜜和丸如梧子每服三丸漸加至五丸酒下日三以知為度忌蕪荑猪肉冷水出第二十四卷中虛勞骨熱方二首集驗枸杞湯療虛勞口中苦渴骨節煩熱或寒方枸杞根白皮切五升麥門冬一升去心小麥二升洗右三味以水二斗煮麥熟藥成去滓分服一升差止出第五卷中古今録驗療虛勞少氣骨節中微熱諸疼痛枸把湯方枸把葉十斤乾薑二兩桂心一兩甘草五兩炙大麻子仁二升右五味切碎以河水三斗煮取九升去滓每服一升日三忌海藻菘菜生葱出第二十三卷中虛勞虛煩不得眠方八首病源夫邪氣之客於人也或令人目不得眠者何也曰五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積於胷中出於喉嚨以貫心肺而行呼吸焉榮氣者泌其津液注之於脉化而為血以營四末内注五臟六腑以應刻數焉衞氣者其出悍慓疾利而先行於四末分肉皮膚之間而不休息也晝行於陽夜行於陰其入於陰也常從足少陰之分行於五藏六腑今邪氣客於五藏六腑則衞氣獨營於外行於陽不得入於陰行於陽則陽氣盛陽氣盛則陽蹻滿不得入於陰陰氣虛故目不得眠也出第三卷中深師小酸棗湯療虛勞不得眠煩不可寧者方酸棗仁二升知母二兩生薑二兩甘草一兩炙茯苓二兩芎藭二兩右六味切以水一斗煮酸棗仁減三升内藥煮取三升分三服一方加桂二兩忌海藻菘菜酢物出第三卷中小品流水湯主虛煩不得眠方半夏二兩洗十遍粳米一升茯苓四兩右三味切以東流水二斗揚之三千遍令勞煮藥取五升分服一升日三夜再忌羊肉餳醋物有半夏必須著生薑四兩不爾㦸人咽不審古方何以如此今改正之集驗療虛煩悶不得眠千里流水湯方半夏三兩洗生薑四兩麥門冬三兩去心酸棗仁二兩甘草二兩炙桂心三兩黄芩二兩萆薢二兩人參二兩茯苓四兩秫米一升右十一味切以千里流水一斛煮米令蟹目沸揚之萬遍澄清一斗煮諸藥取三升分三服忌海藻菘菜羊肉餳酢物生葱又煩悶不得眠方生地黄五兩香豉五合綿褁人參二兩粟米三合茯苓四兩知母四兩麥門冬三兩去心前胡三兩甘草二兩炙枸把根皮五兩右十味切以水八升煮取二升七合去滓分四服忌海藻菘菜蕪荑酢物延年酸棗飲主虛煩不得眠并下氣方酸棗二升茯苓三兩人參三兩生薑一兩半麥門冬一兩去心橘皮二兩陳者杏仁二兩去皮尖碎紫蘇二兩右八味切以水七升煮取一升半分再服忌大酢又酸棗飲療虛煩不得眠肋下氣衝心方酸棗仁一升人參二兩白术二兩橘皮二兩五味子二兩半桂心一兩茯苓二兩生薑四兩右八味切以水六升煮取二升半去滓分三服忌桃李雀肉生葱酢物蔣孝璋方又酸棗飲主虛煩不得眠方酸棗仁一升茯神二兩人參二兩生薑三兩右四味切以水五升煮取一升二合去滓分再服忌酢物蔣孝璋處又茯神飲療心虛不得睡多不食用此方茯神四兩人參三兩橘皮二兩甘草一兩半炙生薑二兩酸棗仁一升右六味切以水一斗煮取二升去滓分三服忌海藻菘菜酢物蔣孝璋處並出第十一卷中病後不得眠方二首病源大病之後腑藏尚虛榮衞未和故生冷熱陰氣虛衞氣獨行於陽不入於陰故不得眠若心煩而不得睡者心熱也若但虛煩而不得卧者膽冷也出第三卷中集驗温膽湯療大病後虛煩不得眠此膽寒故也宜服此湯方生薑四兩半夏二兩洗橘皮三兩竹筎二兩枳實二枚炙甘草一兩炙右六味切以水八升煮取二升去滓分三服忌羊肉海藻菘菜餳出第五卷中古今録驗療虛勞客熱百病之後虛勞煩擾不得眠卧骨間勞熱面目青黄口乾煩躁偃慬渠斤切煩也不自安短氣乏少食不得味縱食不生肌膚胷中痰熱煩滿憒悶大竹葉湯方甘草二兩炙小麥五合完用黄芪二兩人參二兩知母二兩大棗二十枚擘半夏三兩洗括樓一兩粳米一升黄芩一兩當歸二兩生薑四兩前胡二兩芍藥二兩麥門冬六合去心龍骨三兩桂心三兩竹葉切一兩右十八味切用東流水二升煮取五升去滓分服一升日三夜二不過兩劑如湯沃雪效忌海藻菘菜羊肉餳生葱虛勞百病方五首廣濟療虛勞百病腎瀝湯方羊腎一具去脂切八片茯苓三兩五味子二兩桂心二兩肉蓯蓉三兩牛膝二兩防風二兩黄芪二兩澤㵼二兩五加皮二兩地骨皮二兩磁石六兩右十二味切以水一斗五升先煮腎取一斗去腎入諸藥煎取三升去滓分温服服别相去如七八里久不利春夏秋三時並可服之忌生葱酢物油膩陳臭出第四卷中古今録驗彭祖丸無所不療延年益夀通腑藏安神魂寧心意固榮衛開益智慧寒暑風濕氣不能傷又療勞虛風冷百病方柏子仁五合石斛三兩天雄一兩炮巴㦸天三兩去心續斷三兩天門冬三兩去心澤㵼二兩莵絲子五兩人參二兩乾地黄四兩薯蕷二兩逺志二兩去心蛇牀子五合取人鍾乳三兩鍊研成粉覆盆子五合蓯蓉六兩山茱茰二兩杜仲三兩菖蒲二兩五味子五兩桂心四兩茯苓二兩右二十二味𢷬篩蜜和丸如梧子服八丸日再漸加至十丸本方與天門冬散方同但以覆盆子代菊花先服藥齋五日不食脂肉菜五辛藥宜以酒服勿令醉服二十日斷白瀝三十日漸脫六十日眼童子白黒分明不復淚出溺血餘瀝斷八十日白髮變黑腰背不復痛行步脚輕百五十日都差意氣如年少時諸病皆除長服如神忌鯉魚生葱猪羊肉冷水酢物蕪荑餳經心録鍾乳散療傷損虛乏少氣虛勞百病令人丁壯能食去風冷方鍾乳粉用五分附子五分炮白术十四分防風十分牡礪十分熬括樓十分乾薑五分桔梗五分茯苓五分細辛五分桂心五分人參五分右十二味𢷬篩為散以酒服方寸匕日二漸加至二匕忌食生菜生葱猪肉冷水桃李雀肉大酢又更生散療虛勞百病方防風十分括樓十分鍾乳十分粉赤石脂十分海蛤十分乾薑六分白术六分桔梗五分白石脂十分細辛六分人參五分附子三分炮桂心三分右十三味𢷬篩為散以酒服方寸匕日再服忌猪肉冷水生菜生葱桃李雀肉等出第四卷中一方以簿一分半為一簿以温酒一日再又陸抗膏療百病勞損傷風濕補益神効男女通服之方豬脂三升羊脂二升牛髓二升並錬成白蜜二升生薑汁三升右五味先煎豬脂等次下薑汁又煎次下蜜復煎候膏成收之取兩匙温酒服又一方加生地黄三升忌蕪荑出第六卷中虛勞陰痿方七首病源腎開竅於陰若勞傷於腎腎虛不能榮於陰氣故痿弱也診其脉瞥瞥如羮上肥者陽氣微連連如蜘蛛絲者陰氣衰陰陽衰微而風邪入於腎經故陰不起或引少腹痛也養生云水銀不得令近陰令消縮出第四卷中廣濟療陰痿不起滴瀝精清鍾乳酒方鍾乳三兩研絹袋盛附子二兩研甘草二兩炙當歸二兩石斛二兩前胡二兩薯蕷二兩五味子三兩人參二兩生薑屑二兩牡礪二兩熬桂心一兩莵絲子五合枳實二兩乾地黄五兩右十五味切以絹袋盛清酒二斗漬之春夏三日秋冬七日量性飲之効忌海藻菘菜猪肉冷水生葱蕪荑生冷粘食等出第四卷中范汪療男子虛勞陰痿不起無子方杜仲十分蛇牀子八分莵絲子五分酒漬逺志五分去心茯苓四分天雄五分炮澤㵼五分石斛五分蓯蓉四分五味子四分右十味𢷬篩為散酒服方寸匕日再効忌猪肉冷水酢物出第七卷中備急蓯蓉丸療痿弱益精氣男子服之外充婦人服之内補百病差方鍾乳粉三分萆薢三分蓯蓉三分乾地黄六分薏苡仁三分莵絲子四分右六味𢷬篩以雞子黄棗膏和丸如梧子酒服十丸漸至二十丸日再服忌蕪荑又逺志丸療男子痿弱方續斷二兩薯蕷二兩逺志二兩去心蛇牀子二兩肉蓯蓉二兩右五味𢷬篩以雀卵和丸如小豆以酒下七丸至十丸百日知之神良文仲療陰下濕痒又痿弱粉散方白粉乾薑牡礪各三分熬右三味𢷬篩為散欲卧時粉陰下至起亦粉粉盛疏布袋中撲之佳此大驗又方加麻黄根三兩又方礬石熬令汁盡蛇牀子黄連各三分右三味為散粉之同前經心録雄鵝散療五勞七傷陰痿十年陽不起皆由少小房多損陽神女養母得道方雄鵝十分熬石斛三分巴㦸天二分天雄二分炮五味子二分蛇牀子二分薯蕷二分莵絲子二分牛膝二分逺志二分去心蓯蓉五分右十一味𢷬篩為散以酒服方寸匕亦可丸服日三忌猪肉冷水出第四卷中虛勞小便利方五首病源此繇下焦虛冷故也腎主水與膀胱為表裏膀胱主藏津液腎氣衰弱不能制於津液胞内虛冷水下不禁故小便利也出第四卷中深師黄茋湯療虛乏四肢沈重或口乾吸吸少氣小便利諸不足方黄芪三兩茯苓二兩桂心二兩芍藥二兩甘草一兩半夏三兩洗生薑五兩當歸一兩大棗三十枚人參二兩桑螵蛸二十枚熬兩片破右十一味切以水一斗煮取四升分服一升忌海藻菘菜羊肉餳生葱大酢出第四卷中又療虛勞腹滿食少小便多黄芪建中湯方黄芪三兩甘草三兩炙大棗三十枚桂心二兩芍藥四兩生薑四兩人參二兩半夏一升洗右八味切以水一斗煮取三升去滓分三服忌海藻菘菜羊肉餳生葱古今録驗同出第十九卷中又阿膠湯療虛勞小便利而多有人虛勞服散又虛熱盛當風取冷患脚氣喜發動兼小便利脉細弱服此方利即減阿膠二兩乾薑二兩麻子一升𢷬碎逺志四兩去心附子一枚炮人參一兩甘草一兩炙右七味切以水七升煮六味取三升去滓内膠烊銷分三服一方云小便利多日夜數十行一石五斗者良忌猪肉冷水海藻菘菜小品黄芪湯療虛少氣小便過多方黄芪二兩麥門冬二兩去心大棗三十枚擘芍藥二兩乾地黄二兩黄芩一兩桂心二兩生薑二兩當歸二兩甘草二兩炙右十味切以水九升煮取三升去滓分三服忌海藻菘菜生葱蕪荑猪肉冷水出第十三卷中一方有黄連一兩必効療虛勞下焦虛冷不甚渴小便數黄芪建中湯方黄芪三兩桂心二兩人參二兩當歸二兩芍藥三兩生薑八兩膠飴八兩大棗三十枚右八味切以水一斗煮七味取三升去滓下飴烊銷分三服若失精加龍骨一兩白斂一兩忌生葱外臺秘要方卷十七
