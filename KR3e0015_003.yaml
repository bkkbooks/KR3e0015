body:
  text: 外臺秘要方原序昔者農皇之治天下也嘗百藥立九候以正隂陽之變診以救性命之昬扎俾厥土宇用能康寧廣矣哉洎周之王亦有冢卿格於醫道掌其政令聚毒藥以供其事焉嵗終稽考而制其食十全為上失四下之我國家率由兹典動取厥中置醫學頒良方亦所以極元氣之和也夫聖人之徳又何以加於此乎故三代常道百王不易又所從來者逺矣自雷岐倉緩之作彭扁華張之起迨茲厥後仁賢間出嵗且數千方逾萬卷專車之不受廣厦之不容然而載祀綿逺簡編虧替所詳者雖廣所略者或深討簡則功倍力煩取捨則論甘忌苦永言筆削未暇尸之余幼多疾病長好醫術遭逢有道遂躡亨衢七登南宫兩拜東掖便繁臺閣二十餘載久知𢎞文館圖籍方書等繇是覩奥升堂皆探其秘要以㛰姻之故貶守房陵量移大寧郡提携江上冒犯蒸暑自南徂北既僻且陋染瘴嬰痾十有六七死生契闊不可問天頼有經方僅得存者神功妙用固難稱述遂發憤刋削庶幾一隅凡古方纂得五六十家新撰者向數千百卷皆研其總領覈其指歸近代釋僧深崔尚書孫處士張文仲孟同州許仁則吳昇等十數家皆有編錄並行於代美則美矣而未盡善何者各擅風流遞相矛盾或篇目重雜或商較繁蕪今並味精英鈐其要妙俾夜作晝經之營之捐衆賢之砂礫掇羣才之翠羽皆出入再三伏念旬嵗上自炎昊迄於聖唐括囊遺闕稽考隱秘不愧盡心焉客有見余此方曰嘻博哉學乃至於此耶余答之曰吾所好者夀也豈進於學哉至於遁天倍情懸解先覺吾常聞之矣投藥治疾庶幾有瘳乎又謂余曰禀生受形咸有定分藥石其如命何吾甚非之請論其目夫喜怒不節饑飽失常嗜慾攻中寒温傷外如此之患豈由天乎夫為人臣為人子自家刑國由近兼逺何談之容易哉則聖人不合啓金縢賢者曷為條玉版斯言之玷竊為吾子羞之客曰唯唯嗚呼齊梁之間不明醫術者不得為孝子曽閔之行宜其用心若不能精究病源深探方論雖百醫守疾衆藥聚門適足多疑而不能一愈之也主上尊賢重道養夀祈年故張王李等數先生繼入皆欽風請益貴而遵之故鴻寳金匱青囊綠帙往往而有則知日月所照者逺聖人所感者深至於嗇神養和休老補病者可得聞見也余敢採而綠之則古所未有今並繕緝而能事畢矣若乃分天地至數别隂陽至候氣有餘則和其經渠以安之志不足則補其復溜以養之溶溶液液調上調下吾聞其語矣未遇其人也不誣方將請俟來哲其方凡四十卷名曰外臺秘要方非敢傳之都邑且欲施於後賢如或詢謀亦所不隱是嵗天寳十一載嵗在執徐月之哉生明者也王燾撰夫外臺者刺史之任也秘要者秘宻樞要之謂也唐王燾臺閣二十餘年久知𢎞文館得古今方上自神農下及唐世無不採摭集成經方四十卷皆諸方秘宻樞要也以出守於外故號曰外臺秘要方凡一千一百單四門以巢氏病源諸家論辨各冠其篇首一家之學不為不詳王氏為儒者醫道雖未及孫思邈然而採取諸家之方頗得其要者亦崔氏孟詵之流也且古之如張仲景集驗小品方最為名家今多亡逸雖載諸方中亦不能别白王氏編次各題名號使後之學者皆知所出此其所長也又謂鍼能殺生人不能起死人其法云亡且乆故取灸而不取鍼亦醫家之蔽也此方撰集之時或得缺落之書因其闕文義理不完者多矣又自唐歴五代傳寫其本訛舛尤甚雖鴻都秘府亦無善本國家詔儒臣較正醫書臣承命㠯其書方證之重者刪去以從其簡經書之異者註解以著其詳魯魚豕亥煥然明白臣謂三代而下文物之盛者必曰西漢止以侍醫李柱國較方技亦未嘗命儒臣也臣雖濫吹儒學但盡所聞見以修正之有所闕疑以待來哲總四十卷并目錄一卷恭惟主上盛徳承統深仁流化頒此方論恵及區宇贊天地之生育正萬物之性命使嵗無疵癘人不夭橫熙熙然歌樂於聖造者也前將仕郎守殿中丞同較正醫書臣孫兆謹上
