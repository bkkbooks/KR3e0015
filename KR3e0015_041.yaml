body:
  text: 外臺祕要方卷三十七唐王燾撰乳石論序按古先服餌賢明繼踵合和調鍊道術存焉詳其羽化太清則素憑仙骨若以年留壽域必資靈助此蓋金丹乳石之用豈流俗淺近而能知所患其年代浸深訣籙微密世有傳習罕能詳正更加服石之士精粗不同雖志貪補養而法未精妙遂使言多鄙䙝義益繁蕪每加披覽實長疑惑既子弟不得親授亦家童莫能曉了存諸左右殆謂闕如余宿上谷神栖心勿藥歲月云久經書粗通知文字之一失乃性命之深誤是以㑹集今古考量論訣取斷名醫都凡纂要建題篇目并五藏合氣經絡受病八風所中形候論訣兼諸家㑹同將息妙術及乳石丹與雜石壓理之法録定倫次即以時代為先後今刪略舊論纂集新要分成上下二卷可謂價重千金比肩萬古垂之於後學豁若冰消者乎薛侍郎服乳石體性論一首中書侍郎薛曜論曰夫金石之性堅剛而急烈又性清淨而惡滓穢凡服乳石訖即須以意消息尋檢舊法不可無備忌也但人性或冷或熱或寬或急皆須量性將衛不可輕有犯觸凡乳石一服之後常在腸胃若人氣力衰石氣强即發動若人氣力盛石氣安即强健謹按古法皆令五十以上始服乳石殊謂不然今驗所見年少服者得力速兼無病患何以言者年少筋力滿盛飲食飽飫彌益精明壯健終無發理年歲遲暮氣候衰竭食飲失宜此石氣勝人無不發動厯觀得失莫過於此夫人年少縱不喫飲食血氣自强年老力微縱肉精細猶不可健以此言之足明古法疏矣凡人身血脈經行不絶如血脈微有滯處便於其處發瘡或發熱神氣昏悶必欲防之每朝及暮溫一兩盞清酒或可以生薑刮碎和少茱茰飲之令遍體熱薰薰又作熱羮粥啜之使腸胃通利即石氣流行其初服石一二百日尤宜作此將息是古法服石不取夏月只取冬月所以然者石有發動與服時皆背此又殊乖通論今驗服石飲食失時勞役過度立即發動豈待背時今立見將衛得宜並不發動復見名醫平章服石之人常作熱將息儻發調適乃易耳脫若石氣發動暫須宣泄服少冷藥便得轉㵼若得通暢熱氣併除若常作冷將息脫若石氣發動用冷藥無由得轉此一曲之說今古存之但欲廣聞見爾其將息皆須自量本性冷熱為候務取安穩不可拘執古論捨己從人庶通幽君子以此為意也按本草石鍾乳味甘溫無毒主咳逆上氣明目益精安五藏通百節利九竅下乳汁益氣補虗損療腳弱疼冷下焦傷竭强隂久服延年益壽好顔色不老令人有子不鍊食之令人淋一名公乳一名蘆石一名夏石生少室山谷及太山採無時蛇牀子為之使惡牡丹𤣥石牡䝉畏紫石蓑草少室猶連嵩山也今第一出始興而江陵及東境名山石洞亦皆有之唯通中輕簿如鵝翎管碎之如爪甲中無鴈齒光明者為善長挺乃有一二尺者黃色以苦酒洗刷則白仙經用之少俗法所重亦甚貴之謹按鍾乳第一始興其次廣連澧朗栁等州者雖厚而光潤可愛餌之並佳今硤州清溪房州三澗出者惡本草作亞於始興自餘非其土地不可輕服多發淋渴只可搗篩白鍊褁之合諸草藥酒浸服之耳陶云鍾乳一二尺者謬說也李補闕研鍊鍾乳法一首研鍊鍾乳法取韶州鍾乳無問厚薄但令顔色明淨光澤者即堪入鍊唯黃赤兩色不任用欲鍊亦不限多少置鍾乳於金銀器中即以大鐺中著水沈金銀器於鐺中用火煎之常令如魚眼沸水減即添若薄乳三日三夜即得若粗肥厚管者即七日七夜候乳色變黃白即熟如疑生更煎滿十日最佳煮訖出金銀碗其鐺內煮乳黃濁水弃之勿令人服服必損人咽喉傷人肝肺令人頭痛兼復下利不止其有犯者食猪肉即愈弃此黃水訖更著清水凖前更煮經半日許即出之其水色清不變即止乳無毒矣即於瓷盆鉢中用玉鎚著水研之其鉢及鎚須夾白練袋籠口稍長作之使鎚得轉兼通上下每日著水攪令調勻勿使著鎚鉢即封繫練袋自作字記勿使人開一即免纎塵入中二免研人竊喫研覺乾澀即是水盡即便添水常令如稀泔狀乳細者皆浮在上粗者沈在下復繞鎚鉢四邊研之不及者即粗細不勻為此每日須一開或二開攪刮令勻勿使著鎚即得勻熟免有粗細研至四五日狀若乳汁研揩視之狀如書中白魚膩即成自然光白便以水洗之不隨水落者即熟若得水而落者即未成更須研之以不落為限熟訖澄取暴乾任將和藥及和酒空腹服佳千金翼同曹公草鍾乳丸法二首主五勞七傷肺損氣急療丈夫衰老陽氣絶手足冷心中少氣髓虛腰疼腳痺體煩口乾不能食服之安五藏補腸胃能息萬病下氣消食長肌和中方唐尚書用之鍾乳二兩别研十日吳茱茰二分石斛莬絲子各一兩酒浸别搗右四味搗篩蜜丸如梧子空腹服七丸日再服訖行數百步溫酒三合飲之復行二三百步口胸內熱熱如定即食乾飯豆醬過一日食如常須暖將息不用聞見尸穢等氣亦不用食粗臭陳惡食初服七日內勿為事過七日後任性然亦不宜傷多服過半劑覺有效即相續服三劑終身更無所患欲多陽事者加雄蛾三十枚若失精加蓯蓉花三兩佳千金翼同又鍾乳丸法成錬鍾乳二十四分石斛蛇牀子各五分人參桂心各四分乾薑三分椒三分汗去目并合口者右七味總四十八分計一十二兩以錬白蜜和之搗三千杵藥成丸如梧子空腹溫無灰清酒下二十五丸日再服如性飲宜加飲少許仍行三數百步即乳氣溜下任食若能節量甚佳古法云令食乾飯得丸力速如覺熱衝上進一兩口飯行步消息良久任食若能節食甚佳古法云令食乾飯豆醬不得過多不可依古法終是節食忌行陽事最要能依此法將慎補益之功不可具述終妙也崔尚書乳煎鍾乳餌法二首療風虛勞損腰腳弱補益充恱强氣力法鍾乳三兩研如麵以夾綿練袋盛稍寬容急繫頭內牛乳一大升中煎之三分減一分即好去袋空飲乳汁不能頓服為再服亦得若再服即待晚間食消時服之如能頓服即平朝盡服之不吐不利若稍虛冷人即微下少溏利亦無所苦明朝又以一大升牛乳準前煎之依法服餌其錬袋每煎訖即以少許冷水濯不然氣不通泄如此三十度以上四十度以下即力盡其袋中滓和麵飼母雞取其生子食亦好不然用浸藥酒亦得若有欲服白石英並依此法若患冷人即用酒煎患熱人即用水煎若用水及酒例須減半乃好若用牛乳三分減一分補益虛損無以加之永不發動千金翼同忌在别卷中服乳粉法乳小稱一兩分為兩服朝服夜盡無問多少一準此法一兩為度凡服乳皆須溫清酒服之常令酒氣不絶為佳不得使醉吐唯須少食日食一升許飯得滿三日不出即乳不隨食下化為度三日外任意作美食將息其乳多少任人貧富服之師云服一斤百病自除二斤流及三世三斤臨死之時顔色不變在土下滿五百年後乃成强壯人通按三日不出謂三日不大便使乳氣不下泄也雜餌鍾乳丸散補益法二首千金錬鍾乳散療虛羸不足六十以上人瘦弱不能食息百病法能多得常服益佳鍾乳一斤取白淨光明色好者即任用之非此者不堪用一味先泥一鐡鐺受四五斗者為竈貯水令滿去口二寸內乳著金銀瓷器中任有者用之使得沈之於鐺中令水沒器留一寸餘即得常令如此勿使出水也微火煮之日夜不絶水欲竭即添成暖水每日一周時輒易水洗鐺并淘乳七日七夜出之淨淘訖內瓷鉢中玉鎚縳格著水研之一日一夜多著水攪令大濁瀉取别澄為粉其乳粗者自然沈底可研之凡三日三夜皆細逐水作粉畢澄取暴乾更於銀鉢中研之一日候入水洗不落為佳可分稱入散藥服之取錬成乳粉三兩上人參上石斛乾薑各三分右三味搗篩與乳令相得均分作九貼早朝空腹溫酒服一貼昏黃後服一貼三日內凖此服之三日後還須準舊服如前盡此一斤乳訖其氣力當自知耳不能具述也新撰英乳論同延年祕録鍾乳散主補虛勞益氣力消食法防風人參各一分鍾乳二分研細辛半分桂心二銖乾薑一銖右六味為散分作三貼每晨溫酒服一貼食時服一貼食時進不用過飽亦不得過饑常令飲酒使體中薰薰有酒氣若熱煩以冷水洗手面不用熱食亦不得冷忌法如常雜餌鍾乳酒法二首纂靈記鍾乳酒主風虛氣上安五藏通百節利九竅益精明目補下焦傷竭腳弱疼久服延年益夀肥健好顔色不老法鍾乳三兩細研兩重綿練袋盛內六升清酒中用白瓷器盛蜜封安湯中煎令三分可減二分即出湯還添酒滿元數封頭七日取飲一服三合忌如藥法又和酒服餌鍾乳法成錬鍾乳三兩以無灰新熟清酒一斗於不津器中相和蜜封閉冬七日夏二日空腹溫服三合日再服漸加以知為度十五日令盡亦有用此三兩和酒服三日令盡並令節食忌陽事雜慎如藥法千金翼同東陵處士錬乳丸餌并補乳法二首鍾乳無問州土但白薄光潤者即堪以疏布袋盛懸於釜中勿令著底炭火煮之日三度易水出釡水淨洗訖內釡中發火如前候水色不變為度將乳袋出於新汲清水中洗去乳袋上浮沫更以牛乳五升緩火煮之一日欲服乳先飲此牛乳任和酒飲之其袋中乳傾出於盤中以水淨洗入鉢即研研滿七日七夜常添水令如牛乳狀勿令乾燥使粗細不勻候白光可愛水闕其四色英今不復用謹按白石英所在皆有今澤州虢州洛州山中俱出虢州者乃大徑三寸長五六寸者今通以澤州所出為勝採之妙又經云紫石英味甘辛溫無毒主心腹咳逆邪氣補不足女子風寒在子宫絶孕十年無子療上氣心腹痛寒熱邪氣結氣補心氣不足定驚悸安魂魄填下焦止消渴除胃中久寒散癰腫令人悅澤久服溫中輕身延年生太山山谷採無時長石為之使得茯苓人參芍藥共療心中結氣得天雄菖蒲共療霍亂畏扁青附子不欲鮀甲黃連麥勾薑今第一用太山石色重徹下有根次出雹零山亦好又有南城石無根又有青綿石色亦重黑不明徹又有林邑石腹裏心有一物如眼吳興石四面才有紫色無光澤㑹稽諸暨石形色如石榴子先時並雜用今散家採擇唯太山最餘處可作丸酒耳仙經不正用而為俗法所重也採時依此又錬服石英法周司戶處溫傳授云於假侍郎處得甚妙白石英五大兩微搗碎以醶酢五大升於不津瓷器中蓋頭埋屋北隂處經七十日出瀉除酢搗碎研以水飛如出粉法澄清瀉之更研飛之可經二七日以醶酢三小升還置不津瓷器中蓋頭又埋可經二十日出以水洗去酢味盡研之極細即以好驢乳三大升安不津器中重湯煮令乳竭止依方用和後丸又丸法生乾地黃茯苓華州者人參潞州者蜀天門冬去心枸把白皮取時月州土者各三兩右五味搗篩為散入前石粉令相得勻調錬蜜和丸如梧子初服十丸加至二十丸日一服以後地黃酒服之又酒法生地黃切五小升烏豆二小升右二味以無灰清酒漬經五宿取服雜煮石英和金銀草藥餌及銀罐中煮水飲法三首千金翼煮石英服餌法石英五大兩澤州光淨無㸃翳者取石英打碎如小豆蕎麥許大去細末更於水中濤洗令淨重練袋盛之以繩子繫頭取五大升清水於不津鐡鐺中煮之煮時石袋不用著鐺底恐沙石煎壞先以一杖橫鐺口挂石袋著杖上去底三二分許煮取一升汁置碗中經宿澄取清平朝空腹頓服若以此汁煮稀粥服之亦佳每服後可行五百步并飲三兩盞清酒又更依前法煮石二十度者石即無力以布裏埋南墻下深三尺滿百日又堪用服之然終不如新者又石英和金銀人參煮服餌法金十大兩銀四大兩白石英五大兩人參二大兩右四味取一鐡釡淨洗即下前件藥於釡中先下水三大升立一杖入釡中令至底水所浸著處即刻記之更下水二大斗七升通前總三大斗煎之如魚眼沸漸減至杖所刻處即停火急取濕土置釡底取其汁貯以不津器中其金銀石等漉出收取其人參隨藥汁細細喫却其汁每朝空腹服三大合夜間又服二大合欲作食餌亦任每服之後隨性多少酒使行藥氣忌如常法纂靈記銀罐煮白石英服水法白石英五大兩通按罐底多開小孔四旁亦然欲令上上者火氣逼入罐內而石又不焦損也右以銀罐盛石受可一小升罐底開小孔子令遍側畔近下又兩行開孔繞遍於鐡鐺中著水五大升則內銀罐水中炭火上煎取二小升去罐澄清分再服服訖飲少酒脯行一二百步許其石三遍煎一回打碎一片作兩片乃至麻米大即休弃之不堪服也無所誡忌同州孟使君餌石法一首服石法粗白石英一大斤敲碎顆粒如酸棗核大不用全取白石顆先砂盤中和粗磊磊砂使壯兒仍少著水和挼二三千下訖即淨洗取石又於砂盤中和砂更挼一二千下依前淨洗即安柳簸箕中蒿葉兼少許水熟挼訖以水淨淘出曬令乾又以手細細挼之令浮碎總盡熟挼使光滑即盛於夾帛練袋中若出將行若於家內安當門牀上每日平明未梳裹前取七顆含於口中以酒或水下之一顆一回咽七回吞直令到小腹下以兩匙飯壓著即依大家食一無所忌死生穢惡白酒牛肉但是石家所忌皆總不忌所以辛苦料理使光滑者恐有浮碎薄人腸胃作小瘡子亦無他疑即每日亦起梳裹前依前服之值冷熱都總無忌比至日午左側即便轉出為新石推陳石下下訖還依大家食時即餐飯若自知病羸至夜食前又服七顆依前法吞一夜令在小腹下溫齊腳明日平明先便轉陳石總與石下訖又朝法夜法服之此石常在小腹內仍附倉門但小腹溫熱於四肢膀胱頭目髓腦膚體之內元無石氣欲發從何而作丈夫婦人多有積冷若下熱必須上冷若上下俱冷胃口不下食便成消渴致死若上下俱熱頭面生瘡唇乾眼赤手腳枯槁皮毛浮起不久成骨蒸凡人必須上下焦冷熱氣息調和筋脉通逹若上熱下冷必有痼積服石之後即下熱自然上冷骨氣堅實腰腎强健萬病自除若不得力十斤亦須常喫若得力訖一斤即止也羊肉中蒸石英及石汁缹豬肉兼作薑䜴服餌法三首羊肉中蒸石英服餌法精羊肉一斤白石英三兩右二味先取肉擘作兩假鑽作孔內石著肉中還相合即用荷葉褁又將臘紙褁又將布褁於一石米飯中蒸之候飯熟即出却石後取肉細切和葱椒薑等絶小作餛飩子熟煮每旦空腹冷漿水中吞一百子吞訖將冷飯壓之百無所忌宜春夏服大驗其石永不發勿令餛飩破碎其石三兩回用之乃換之又石汁中缹豬肉餌法白石英一大兩右一味絹袋盛以水三斗煎取四大升去石以猪肉一斤細切椒葱鹽豉一如食法煮之任意服隔十日一度打碎煮之一無所忌甚妙又石英汁作薑豉服餌法白石英二大兩肥猪肉三斤通按中破者打作兩塊也右二味以水八升煮石英取五升量煮猪肉得爛熟為度取猪肉汁下葱豉切肉作薑豉食之一劑可六七日喫令盡二兩石英三度煮之第一度全用第二度中破第三度搗碎煮之每煮皆用白練袋盛之其石經三度煮即須換新者二月以前八月以後皆可作餌也千金翼同猪肚中煮石英及飼牛取乳兼石英和礠石浸酒服餌法三首千金翼猪肚煮石法年四十以下服二大兩年四十五十乃至六十以上加二兩常用四月以後服之者緣石性重服經兩月以後石力若發即接秋氣石力下入其藏腰腎得力終無發理白石英二大兩末以生絹袋重盛縫却口人參末生地黃切生薑細切各三大兩葱七莖細切豉一抄椒四十九顆去目合口者羊肉半斤細切猪肚一具淨料理如食法新粳米一合和前伴藥并石英袋內著猪肚中急縳口勿使少泄氣及水入右十味以水二斗煮至八升即停出藥肚著盤上使冷然後破之如熱破恐汁流出先出石袋訖取煮肚汁將作羮服之每年三度服每服石英依舊餘藥換之分數一依初法每服隔一兩日不得食木耳竹笋又石英飼㹀牛取乳服餌法白石英三大斤取好者以上亦得右一味搗篩細研三兩日研了取一㹀牛十嵗以上養犢者唯瘦甚佳每日稱一大兩石末和銼豆與服經七日即得取乳每朝空腹熱服一升餘者作粥喫任意食之百無所忌以五月上旬起服大好如急要亦不待時節終無發也牛糞糞地隨意種菜供服乳人喫之又石英和磁石浸酒餌法白石英五大兩澤州上好者磁石五兩去毛石引針多者十兩亦得二物各搗令碎各用兩重帛練袋盛之右二味以好酒一斗置不津器中懸藥浸經五六日以後每日飲三兩盞常令體中微有酒氣欲加牛膝丹參杜仲生地黃吳茱萸黃芪等藥者各自量冷熱及所患并隨所有者加之仍隨所加有忌者禁之餘百無所忌一年以後鬚髮變黑腰疼耳聾悉差其酒三五日已後即漸添一二升常令瓶滿所加草藥疑力盡者任換之經三四箇月疑石力稍微即更出搗碎還以袋盛經半年以後弃之凖前更合服石後有不可食者有通食而無益人者有益人利石者藥菜等一十條不可食者油脂其性滑腸而令人不能食縱喫勿煎炙也又蕪荑能生瘡發石氣又薺苨云發石亦云損石又芥子及芥菜皆能發藥發熱又蔓青菜發氣損石又葵菜滑而且擁亦不可食凡不可食者勿食為佳若欲食者皆須報錬雜以葱椒然可通食者蘇其物潤腹而能行石氣又冬瓜龍葵此二味甚壓石亦多食又蔓菁作黃虀和肉作羹始可少食亦須椒葱雜之又葵不可空喫腹胃燥澀可取三五葉入肉時食一頓也張文仲論服石法要當違人常性五乖七急八不可兼備不虞藥并論二十三條五乖重衣更寒一乖凡人寒衣即暖服石人宜簿衣若重衣更寒經云熱極生寒故云一乖饑則生臭二乖平人飲食不消作生食氣服石人忍饑失食即有生食氣與常人不同故云二乖極即自勞三乖平人有所疲極即須消息恬養服石人久坐久卧疲極唯須自勞適散石氣即得暢故云三乖溫則泄利四乖平人因冷乃利得暖便愈服石人溫則泄冷即差故云四乖飲食欲寒五乖平人食溫暖則五內調和服石人食飲欲寒乃得安穩故云五乖千金翼名六反云腫瘡水洗六反也餘同此但有五條名五乖七急當洗勿失時一急若覺身體暖疼關節强直翕翕發熱憒憒心悶即須洗浴若初寒先用冷水後用生熱湯若初熱先用暖水後用冷水浴訖可以二三升冷水淋頭故云一急當食勿饑二急須食即食不得忍饑故云二急酒必淳清令溫三急無問冬夏常須飲多少任性熱飲尤佳故云三急衣溫便脫四急食必極冷五急卧必榻薄六急食不厭多七急八不可冬寒欲火一不可飲食欲熱二不可當疹自疑三不可凡服石常須消息節度覺小不安將息須依法不得自生狐疑畏避風濕四不可若覺頭風熱悶憒憒心煩則宜當枕頭以水洗手面即好不比尋常風濕依此尤佳極不欲行五不可若久坐久卧有所疲極必須行役自勞飲食畏多六不可居貪厚席七不可所欲從意八不可不用從意所逹石性將息節度為妙凡藥石發宜浴浴便得解浴訖不差者乃可餘療若浴不差即得依後服葱白麻黃等湯諸隨身備急藥目新附紫雪金石凌未詳何也甘草萎蕤黃芩大黃狗白糞芒硝朴硝二加蘆根麥門冬香豉石膏犀角胡豆露蜂房白鴨通大麥奴右以上諸藥皆乳石所要仲嗣今與名醫擇之常用隨身備急寒食諸法服之須明節度明節度則愈疾失節度則生疾愚者不可强强必失身智者詳而服之審而理之曉然若秋月而入碧潭豁然若春韶而泮水積實謂美矣凡將理解折法具在中卷參而行之乳石隂陽體性并草藥觸動形候等論并法一十七首延年袐録論曰乳者陽中之隂石者隂中之陽乳石從來隂陽精體處至隂之裏有正陽伏其中正陽之中復在至隂之裏故陽生十一月甲子後服乳隂生五月甲子後服石隂陽發明互相為用而服之皆理於內不泄於外也夫人膚虛皆帶風氣處人全軀常經含象理之有法則禍害不生乖於時候則危瘵立至竊覽古法皆云四月服石此謂浮學不曉由來按聞承開服石僉曰四月雖開而未平六月謂得氣之節他皆倣此常以不全實其府不全虛其藏即入風之道無所滯焉或有藥觸成痾飲食發疹今并倫次詳而行之通按雖開而未平五字疑有闕舊論曰神農桐君深逹藥性所以相反畏惡備於本草但深師祖學道洪道洪所傳何所依據云鍾乳動术令人頭痛目疼术動鍾乳即胸塞氣短海蛤動乳即目疼氣短雖患不同其療一矣如與上患相應速服葱白䜴湯其五石大散自後人發動將療亦非古法乃云鍾乳與术更互相動本草既無成文但學者穿鑿今但依頭疼目痛胸塞氣短證候速服葱白豉湯方千金云鍾乳又對栝樓葱白切一斤去青香豉三升綿裹吳茱萸一升甘草三兩炙切右四味以水一斗半先煮葱白澄清取八升內藥煮取三升分三服訖令人按摩搖動口中嚼物然後仰卧覆以暖衣汗出去衣服湯熱歇即便冷濤飯醬脯等物任意食之千金用葱半斤䜴二升甘草人參各三兩無吳茱萸若服此不解復服甘草湯方甘草三兩炙桂心二兩豉二升葱白半斤右四味合服如上法若服此已解肺家猶有客熱餘氣復服桂心湯方桂心麥門冬去心各三兩人參甘草各二兩炙葱白半兩豉二升右六味合服如前法出千金防風細辛動硫黃令人煩熱腳疼腰痛或嗔忿無常或下痢不禁防風細辛能動硫黃而硫黃不能動彼才覺發便服杜仲湯方杜仲三兩枳實炙甘草炙梔子仁十四枚李核仁去皮各二兩豉二升右六味合服如上法若不解復服大麥奴湯方大麥奴四兩甘草炙人參芒硝桂心各二兩麥門冬去心半斤右六味合服如上法若服此已解脾腎猶有餘熱氣或冷復服人參湯方人參乾薑甘草炙當歸各一兩附子一枚炮右五味合服如上法出千金附子白石英兩更相觸若白石英先發令人煩熱腹脹若附子先發令人嘔逆不食或口噤不開或言語難手足酸疼初覺宜服生麥門冬湯方生麥門冬四兩去心甘草二兩炙麻黃二兩去節豉二升右四味切先以水一斗煮麻黃掠去沫訖內諸藥煮取三升分三服服訖若按摩卧覆取汗候藥氣散溫飯醬菜脯等任食若熱未退更服大黃湯方大黃三兩别漬甘草二兩炙梔子二十九枚劈豉二升右四味切以水九升煮甘草梔子取二升半然後下大黃煎三四沸去滓分三服得下便止不下當盡服一法若煩熱加細辛一兩若熱勢未除視瞻髙而患渴復服栝樓湯方生栝樓大麥奴各四兩甘草二兩炙葱白半斤豉二升右五味合服如上法稍稍一兩合服之隱約得一升許便可食少糜動熱若已解胃中有餘熱復服芒硝湯方芒硝桂心各二兩通草甘草炙各三兩白术一兩大棗二十枚擘李核仁二十一箇去皮右七味合服如上法若腹脹去芒硝加人參二兩出千金人參動紫石英令人心急而痛或驚悸不得卧或恍惚忘誤失性發狂或惛惛欲眠或憒憒喜嗔或差或劇乍寒乍熱或耳聾目暗又防風雖不動紫石而紫石猶動防風為藥中亦有人參緣防風動人參轉相發動令人心痛煩熱頭項强才覺發宜服麻黃湯方千金服後人參湯麻黃一兩去節人參一兩甘草二兩炙葱白切一升豉一升大麥奴一把右六味切以酒五升湯三升煮取三升分三服良又解服人參湯法人參三兩細辛一兩炙白术二兩桂心二兩豉三升右五味以水一斗煮取三升去滓分三服若瞋盛加大黃黃芩梔子各三兩出千金有甘草二兩若忘誤狂發猶末除服麥門冬湯方在後礜石發下若心有餘熱氣更服人參湯方人參防風甘草炙各三兩桂心二兩生薑切白术各一兩右六味合服如上法出千金桔梗動赤石脂令人心痛寒噤手腳逆冷心中煩悶赤石脂動桔梗令人頭痛目赤身體壯熱始覺發宜溫清酒飲之隨能解須酒勢行則解亦可服大麥麨方大麥熬令汗出燥止勿令大焦舂去皮細搗篩以冷水和服之入蜜亦佳千金翼云炒去皮蒸令熟暴乾香搗篩礐石無所偏對發則令人心急口噤骨節疼强或節節生瘡將食太過發則多壯熱以冷水洗浴然後用生熟湯五六石灌之食少暖食飲少熱酒行步自勞即服麥門冬湯方麥門冬半斤去心䜴二升葱白半斤切右三味以水七升煮取三升分三服覆暖衣汗出即差一法加甘草三兩人參一兩半千金又有桂心二兩云始覺發即服葱白豉湯用葱白半斤豉二升甘草二兩炙三味以水六升煮取二升半分三服若散發身體卒生瘡即服麥門冬湯銓擇薛侍郎等服石後將息補餌法一十五條薛侍郎曰服石之後一二百日內須喫精細飲食羹粥酒等使血脉通利羹法取麞鹿兔雉鵝鴨肉等以水淨洗切如指大於鐺中炒令欲熟即多下葱白少下椒鹽熬令香即下少水煮次下粳米糝次下豉清醬汁調鹹酸適口每欲食先須啜十數口羹汁令胃口開通皮膚津潤然後進諸食縱噉炙肉亦無所慮作此將養食多且健縱噉餺飩亦須多啜臛汁又若覺體氣沉滯石勢不行慎勿喫麵若覺虛惙任餌薯蕷餺飥方取大薯蕷刮去皮薄切日暴乾承潤挼作粉不粉者更暴依前挼粉訖下篩以暖湯及鹽如麵細切作餺飥肉造臛如前羹法用澆餺飩任食此肉補益强筋骨止渴又若覺渴及熱盛慎勿食炙肉羊麞尤惡自外肉性平冷者通食仍勿熱進恐成消渴又若欲知體實而壅者先看腳拇指甲肉滿及肉色赤是實也實即畏熱發當須服藥微㵼又若覺四肢筋强背脊重或頭痛如刺眼睛欲脫者宜以香湯浴須虛靜大屋內適寒溫先以湯淋大椎及𩕄上三五十碗然後乃浴勿令見風浴訖覆被安卧擬取汗仍須喫葱根葛豉粥法葱根三大握乾葛六兩切豉三合葱白一大握劈生薑少許切椒十五顆右六味先以水五大升煮葱根減半去滓下葛及豉煮取二大升去滓細研少米作稀粥并著葱白等煮熟承熱啜服之訖依前覆被取汗訖令婦人以粉遍身揩摩使孔合半日許始可出外其病立差如不損可重為之又若覺大熱者可服紫雪或金石凌或綘雪或白雪等但溫半大升水取次研一大兩香湯浴後頓服之候一兩行利熱乃退矣凡此救急紫雪為上如不得通泄宜服黃芩飲子法黃芩二大兩梔子仁二七枚乾葛二大兩芒硝半大兩右四味切以水三大升煮取軟一大升絞去滓下芒硝調之分溫兩服快利即差止又若發熱但依法次第將息及服藥後得微汗微利為佳不要多利利多即反損石勢又加虗人又若覺體氣惛惛不痛不癢小便赤澀即搗茅根汁服之又若口乾即搗蔗汁服之其甘蔗能利大小腸如先利即勿喫甘蔗在下卷口乾法中又若少覺不下食服生薑汁酒等法生薑汁一合白蜜一匙清酒倍生薑汁右三味相和溫頓服之半日乃效甚佳又若覺食不下兼嘔宜服麥門冬飲子法麥門冬一大兩去心甜竹葉一大握生薑半大兩切小麥四合淘去土粃右四味以水三升煮取一升半分溫兩服又若不下食體弱乏氣力即宜食鮮鯽鱠法取鮮鯽魚剝去鱗破去腸血勿洗之但用新布一二尺淨拭令血脉斷名曰上鱠餘依常鱠法美作䔉虀仍食瓜薑等醬尤益人下食亦療氣痢赤痢又若發瘡及腫有根無根但服五香連翹等湯及丸其法在此卷末癰疽法中忌食猪肉䔉生菜等唯宜食兔肉仍須熟喫甚佳又若腫有根堅如鐡石帶紫赤色者服湯後仍以小小艾炷當腫上炙之日一兩炷為佳養如常法又若觸穢必不善四體凛凛飲食無味亦可含香丸如不瘳服一盞五香湯取微利一行佳則不煩沐浴也飲酒發熱諸候將息補餌論并法一十條古今録驗論曰飲酒則石勢敷行經絡氣力强溢腎氣堅王即頓為陽事陽事過多便腎虛腎虛則上熱熱盛則心下滿口乾燥飲隨嘔吐胃府不和宜服葛根飲安榖神除熱嘔止渴也且石酒相得遞相為用若石勢不行則須少飲如石氣調歇不復須飲又若熱盛充滿經絡心腹少脹欲心下􅂒􅂒不消或時聚如堅隨復消者宜服秦芁湯得利便差秦芁湯法秦芁三兩細切以牛乳一大升煮取一小升去滓頓服之得利即差若老弱可量氣力進之其飲食亦宜清冷不得濁熱濁熱則使石勢壅塞不行喜嘔吐病堅結也亦能發黃或小便赤心堅痛者亦宜服秦芁湯得溏泄差熱氣散後黃色縱徹皮膚是差候勿怪熱散後慓慓寒顫若困顫黃復出外者是謂餘熱欲散也勿厚覆但使肌膚中少寒顫即止又若熱解寒不解者可飲三合熱酒使解又若寒解後頭重耳鳴滿眼漠漠心下痛者可飲二合許清酒便差寒溫宜依此法又若心下結硬腹脹大小便不利者急服前胡大黃湯下之法在下卷小便淋法中又若欲狂癖失常者與白薇湯下之法在下卷痰澼乾嘔法中又若酒熱歇石熱亦不復行心下熱結已消黃縱未歇亦無所苦但冷飲食勿進辛辣菜及熱補食若不欲進清冷者可和暖餌勿令大熱又若飲熱歇後石勢虛損飲食入口自覺諸脉中􅂒􅂒如冷水入者是酒石俱退經絡空虛故也宜積日調冷食兼依服進猪蹄羹通養諸脉自差止又若頭眩耳聞空中有人語心怯恐懼兼憂悸不安四肢如痺或起眠即輒驚如被虎狼所逐威勢所攝者方服淡竹瀝一二升乃至三升差止亦可進白薇湯下之消息稍與令飲粥常令有食力時進雞心酸棗湯常令對偶安慰之以美言相恱慎不可以惡事驚之又雞心酸棗湯療飲後陽多腎虛發熱積日不食胃中虛熱飲食不已氣入百脉心藏虛甚令人失常法出古今録驗雞心十枚酸棗半升人參一兩茯神芍藥各二兩白薇枳實炙知母甘草炙栝樓各二兩生地黃八兩右十一味切以水一斗煮藥半熟內心煮取三升冷分三服餌寒食五石諸雜石等解散論并法四十九條小品論曰凡服五石散及鍾乳諸石丹藥等既差節度觸動多端發狀雖殊將攝相似比來人遇其證專執而療之或取定古法則與本性有違或取决庸醫則昧於時候皆為自忤遂推石過深省其理未曰合宜每尋古醫互相晦見直言沐浴實未探微寒溫適情蓋須自度隨時之義易所通焉故陶正白云昔有人服寒食散簡古法以冷水淋身滿二百罐登時疆斃又有取汗乃於狹室中四角安火須臾則殞據兹將息豈不由人追之昔事守株何甚今列篇章幸擇長而録用耳寒食藥得節度者一月輒解或二十日解堪溫不堪寒即已解之候也其失節度者或頭痛欲裂為服藥食溫作癖宜急下之又若手腳卒患頑癖者為犯熱經久故也急與冷水洗飲熱清酒進冷食即止一法飲冷清酒亦止又若體上生瘡結氣腫痛不得動者為自勞太過也宜服香䜴飲法香䜴三升葱白一虎口右二味以水三升煮三沸服之不止乃至三四劑自止又若腰痛欲折兩目欲脫者為熱上肝膈腰腎冷極故也宜服黃連飲法腰痛欲折兩目欲脫千金翼作二條黃連甘草炙各一兩萎蕤二兩右三味切以水三升煮取一升去滓內朴硝一兩頓服得微利止又若眩冒欲倒者為衣厚犯熱故也宜冷水淋頭并洗之須臾即愈千金翼云宜洗頭又若腳疼欲折者為久坐溫處故也宜常須單牀行役并以冷水洗浴即止又若腹脹欲裂者為久坐下熱衣溫失食故也宜數冷食冷洗當風取冷須臾即差又心痛如刺者為應食不食應洗不洗寒熱相擊氣結不通填於心中故也宜數飲熱酒任性多少酒氣行經絡通逹淋以冷水又冷淹手中搭著苦處溫復易之須臾解也解後仍速與冷食食多益善於諸痛之中心痛最急宜速救之法在下卷心痛法中又若發急遍身熱如湯火或氣結不識人時倒口噤不開不自覺知者救之要以熱飲隨其性酒之卒不得下者當打去齒灌之咽中塞盛酒入必還出但灌勿止半日許以酒下氣徹乃蘇酒卒不下者難可救矣又若下痢如寒中者為行止食飲犯熱所致宜速脫衣冷食冷飲冷水洗即差又若百節酸疼者為卧處太厚又蓋覆被衣溫不脫故也但單牀薄被單衣或以冷水洗勿著新衣著故垢衣雖冬寒常須散髮受風仍以冷石尉其衣勿繫帶若犯此酸悶者急入冷水浴勿忍病而畏冷兼食冷飯又若兢顫惡寒或發熱如溫瘧者為失食忍饑失洗不行又食臭穢故也宜急飽冷食冷水洗數行即愈又若惡食臭如死物氣者為食溫作癖故也宜急以三黃湯下之若不下終不差法在下卷解壓法中又若咽中痛鼻中塞清涕出者為衣溫近火故也但速脫衣取冷當風以冷石尉咽鼻當自差不假洗也又若胸脅滿氣上嘔逆者為饑而不食藥氣上衝故也速與冷水洗食冷飯止又若食便吐出不得安住者由癖故也宜急以甘草飲下之不下當危人命爾甘草飲法甘草二兩炙大黃三兩别漬黃芩二兩右三味切以水三升煮三兩沸去滓分服以利為度又若大便難腹中堅如盤蛇者為犯溫積久腹中有乾糞不去故也宜銷酥蜜膏服一二升津潤腹內即下若不可服大黃朴硝等下之又若患淋者為久坐溫處或乘鞍馬坐處大熱熱入膀胱故也但冷食冷水洗冷石尉腹不過一日即差止千金翼云若不止可下之不下殺人又若寒栗頭掉不自支持者為食少藥氣溢於肌膚五藏失守百脉搖動與正氣相競故也宜强飲熱酒以和其脉强食冷食以定其藏强行以調其關節强洗以宣其擁滯即差又若小便稠數者為熱食及噉諸熱餅肉之屬故也宜冷水洗腹兼服梔子湯法梔子仁二兩甘草炙芒硝湯成下黃芩各二兩右四味切以水五升煮取二升分溫二服取利即差又若失氣不可禁止者為犯溫不時洗故也但冷水洗之即差又若遺糞不自覺者為熱氣入胃大腸不禁故也當冷洗即差又若目痛如刺者為熱氣衝肝上眼故也但數冷食清朝溫小便洗之不過三日即差止又若耳鳴如風聲又有汁出者為自勞過度陽事不節氣上耳故也宜數飲食補之節禁陽事即差又若口中傷爛舌强而燥不得食味者為食少榖氣不足藥氣積在胃管故也宜急作䜴湯服之䜴湯法香豉二升萎蕤甘草炙各二兩麥門冬去心小蘗各三兩右五味切以水六升煮取二升分溫三服能頓服益佳再合為度又若關節强直不可屈伸為久停息不自勞泄藥氣不散漸侵筋血故也出力使溫冷洗即差止又若得傷寒溫瘧者為犯熱故也宜以常療藥救之無咎但勿服熱藥耳其傷寒瘧藥等皆除熱破癖不與寒食相妨故通服也凡服寒食雖已熱解而更病者要先以寒食救之終不中冷其法在下卷解壓法中又若飲酒不解食不得下乍寒乍熱不洗便熱洗之復寒甚者數十日輕者數日晝夜不得寢寐愁悲恚怒自驚跳悸恍惚忘誤者為犯溫積久寢處失節食熱作癖內熱與藥併行寒熱交爭雖以法救之終不可解也昔皇甫氏曽餌此散每發即欲自刑尊親制之乃免斯禍强令飲食其熱漸除縱家有寒熱藥發急皆忘雖素聰明發皆頑冥告令難喻為兹斃者不可勝數遂簡家兄士元救急之法合三黃湯服之大下便差止而録之法在下卷解壓法中又若脫衣便寒著衣便熱為脫著之間失適故也小寒自可著小溫便可脫即止洗之則爽然差慎勿忍之使病成也小品云洗則了然差矣應洗勿忍之忍則病成也又若齒齗腫唇爛牙齒搖痛頰車噤為坐犯熱故也宜時救之可當風張口使冷氣入咽漱寒水即差又若脉洪實或斷絶不足似死脉或細數弦駃其所犯非一此脉無醫不識也熱多則弦駃有癖則洪實急痛則斷絶凡寒食藥熱率常如此自無所苦非死唯勤節度為妙又若大便稠數為坐久失節度將死之候也如此難療矣可與前大黃黃芩梔子芒硝湯下之儻十有一生耳可為必死之療不可不利致死令人恨也又若人已困而脉不絶為藥氣盛行於百脉人之真氣已盡藥氣尚自行故不絶非生氣也死後體因溫如生人肌腹中雷鳴顔色不變一兩宿乃作死人也又若周體患腫不能回轉者為久坐不行又不飲酒藥氣滯在皮膚之內血脉不通故也宜飲酒氷水洗自勞即差若不能行者遣人扶持强行使肢節調暢乃止亦不得令過度使反發熱或反熱者還當洗之又若食患冷不可下者為久冷食口中不知味故也當作白酒糜多著蘇熱食一兩頓若小悶者還令冷飲食即差止又若下部臭爛者為坐薦席厚熱故也當坐冷水中即差又若夜眠不得睡者為食少熱在內故也服梔子湯方梔子仁十四枚大黃三兩黃芩二兩右三味切以水五升煮取三升去滓分三服微利又當數進餐食自得眠睡又若嘔逆咽喉中傷清血出者為卧溫及食熱故也但飲冷水冷石尉咽喉即差又若藥發輒安卧不與人語者為熱盛食少失其性故也但與熱酒冷洗冷食自勞便差千金翼云藥發輒尸卧不識人由熱氣盛食少不充邪忤正性故也又若四肢面目浮腫者為飲食溫久不自勞力藥與正氣相隔故也但飲熱酒冷食自勞洗浴即差千金翼云藥氣與正氣相併又若鼻中有氣如􅖁雞子臭者為著衣溫故也或隂囊臭爛為坐熱故也入冷水中即差宜脫衣洗浴即自差又若卒目暗無所見者為飲食居處太溫故也但脫衣冷洗冷食須臾差止又若身肉痛痛無常處如遊風者為犯熱所作非風冷也宜冷洗以冷石尉之自差又若服藥心悶亂者為服溫藥與疾爭力故也法當大吐如或不吐病當至死若吐不絶可食冷食飲自然差也若絶不識人口復不開者亦當斫齒以熱酒灌之入咽吐出者更與之但得酒氣下通不半日即便蘇矣又若嗜寐不覺者為久坐熱悶故也宜冷洗冷食即差又若肌膚堅如石不可屈伸為熱食溫卧作癖五藏隔閉血脉不通故也急服前三黃湯下之食冷食飲熱酒自勞即差又若臂腳偏急痛苦者為久坐卧溫熱不自移轉氣入肺脾胃故也宜勤以二布巾淹冷水搭之覺溫則易如此不過三日即差千金翼云熱入腹附骨故也又若患腹背熱如子如柸如盤許大者以冷石隨處尉之又若腳指間生瘡者為履襪大溫故也當以腳踐冷地以冷水洗足差又若口熱痛煩悶者方生雞子五枚右一味頓服之即便愈癰疽發背證候等論并法五十四首夫二儀含象三才貫形五體以類於五行六府乃同於六吕人之肉也則脾之所主人之皮膚則肺之所管膚肉受病皆繇滋味而與衣服衣服厚暖則表之呼寒滋味失度則府藏皆熱府藏既擁則血脉不流血脉不流則毒氣偏注湊於俞穴俞穴之所隂陽㑹津承虛伏守必煮其血血敗即潰肉肉腐而成膿實則為癰浮則為腫也若兼腎肝虛熱遂成疽成癧矣且疽則附骨癧則著筋凡曰癰疽脉皆有狀有浮有滑有數有澀有弱有沈浮為陽虛滑為陽實數為陽燥澀為隂寒弱為隂虛沈為隂堅三陽三隂之脉也若三部之中脉有一隂一陽復結為失常經者癰疽之候也且脉法心洪肺浮肝弦腎沈若肺肝心俱至即發癰疽何以言之為一隂一陽水火競焉舊論寒熱客於經絡血澀不通其理乖也論熱盡發於內而形於外未有外熱能入於內而成其腫皆繇表虛客寒所搏故衣厚暖呼其寒是其義也凡癰發生皆繇自召一呼吸失度二喜怒不調三飲食愆時四隂陽乖候犯此四者則六府不和榮衛不利榮者血也衛者氣也血傷寒則澀氣傷熱則益氣則為火血則為水水火相摶遂形癰疽故加虛則氣撮心惙四肢顫掉若有失而悸此為膿不出盡之候久即成漏縱差終發宜服排膿補養藥即無咎也癰疽之名大體相似發有深淺療有虛盈然攝之於藥物殊途而同歸也凡人强壯之年少陽氣省皮膚疏薄滋味愜情腸胃壅塞因壅發熱即受其寒寒氣總至受有深淺隨處為證淺即內陽尚壯中即少虛深即虛竭病在陽即易去在隂即難除其有决生死之神功辨形色之宗㫖明劉㳙之術籙爾凡癰疽膿出後不可療者有五一眼白睛青黑而小二咽藥而嘔三傷痛渴甚四膊項中不仁五音嘶色奪此為極也又凡食諸生果皆召其痾養生法云勿食不成核之果勿食和汚粒之食皆為瘡癰略為網舉以曉將來耳千金論曰凡發背皆繇服五石寒食更生散所致亦有單服鍾乳而發者又有生平不服石而自發背者此是上代有服之者其候率多於背兩胛間起初如粟米大或痛或癢仍作赤色人皆初不以為事日漸長大不過十日遂至不救及其臨困時瘡方圎徑三四寸髙一寸兼有數十孔以手按之諸孔之中膿皆反出尋即失音不言所以養生者小覺背上痛癢有異即取淨土水和作泥捻作餅子徑一寸厚二分貼著瘡上以粗艾大作炷灸之一炷一易餅子腫若粟米大時可灸七餅即差若如榆莢大灸七七炷即差若至錢許大日夜灸不住乃差并服五香連翹湯及鐡漿諸藥攻之乃愈又五香連翹湯方青木香沉香獨活連翹升麻各二兩麝香半兩薰陸香攻頭痛不著亦得射干二兩一法一兩大黃三兩别漬淡竹瀝二升雞舌香各二兩桑寄生二兩通草二兩右十三味切以水九升煮藥待水減半後內竹瀝更煮取二升分溫三服甚佳千金本方有丁香無雞舌香又五香丸療心腹鼓脹冷㵼鬼氣疰忤方亦名沉香丸沉水香青木香丁香硃砂别研各一兩麝香别研犀角錯取屑薰陸香梔子仁連翹石膏别研各二兩芒硝熬蜀升麻大青乾藍栝樓乾葛茵蔯黃芩肉桂芎藭茯苓各三兩巴豆三兩去心皮熬令變色别研如脂大黃二兩右二十三味搗篩密和更搗一千杵封以油臘紙無在有患時溫熱疰病鬼瘧病心腹鼓脹疸黃垂欲死者可服四五丸丸如梧子大或至六七丸但取三兩行快利為度利止即差又療發背腸癰乳癰一切毒腫服之膿化為水神驗方犀角屑十二分大黃五分蜀升麻梔子仁黃芩防風蜀當歸甘草炙乾藍人參黃連黃芪各四兩巴豆二十顆去心皮熬别搗右十三味搗篩蜜和為丸初服十丸取快利三兩行如不快利更服三兩丸以快利為度若利多以冷酢飯止之已後服每減丸常取溏利腫消乃止一方有蓼實又療一切腫初覺痛不可忍神效方取麵溲如十指許粗繞腫令匝滿中布生椒又以一片麵可椒上蓋之當中以艾炷如酸棗大灸之蓋麵欲焦即換著新麵痛停止又療風毒及一切腫塗散方天后賜㑹稽王岑十六遂於嶺南見郭訥駙馬患腫發背㑹稽與蘆黃門等親與藥須臾平復岑侯因得此法大黃五兩白斂三大兩寒水石紫葛青木香各一大兩硝石黃芩各二大兩大青三兩苦參一兩右九味搗散和牛乳塗故布上搨腫上隨著即消乾復易之若腫在骨節即搨近骨節好肉處移取腫榻即消又方汝隂靈明府說傳云甚驗水銀二斤右一味以紙分為兩裹蜜繫頭更以帛重褁勿令走失遞互將搨上覺溫即易不過十數度熱毒盡歇即消矣神效又發背神驗方狗白糞半兩右一味覺欲作腫者以暖水一升絞取汁分再服以滓敷上每日再為之差止又方凡腫起於背胛中頭白如􅎟粟四相連腫赤黑令人悶亂者名發背也宜禁陽事酒䔉麵若不灸療即入內殺人可當瘡灸七八百壯有人不識多作雜腫療皆乃死又方取三年酢滓微火煎和牛脂封上日一易之又方取亂髮灰酒服一方寸匕亦治瘭疽又方狗牙灰酢和封之差又方飲鐡漿三升下利即差又方猪羊脂封之亦療乳癰妙又方鹿角灰酢和塗之佳又療石氣在皮膚腫熱膏方生麥門冬去心萎蕤鼠李皮石膏碎凝水石沙參各一兩青葙子露蜂房各一分竹瀝一大合杏仁油一大合牛酥五大兩生地黃汁三合右十二味切內酥油瀝中微火上煎令魚眼沸一炊久膏成覺有熱處即摩之差止又療發背及癰疽潰漏并未潰腫毒方栝樓榆皮胡燕窠鼠坌土女人潮信帛水洗取汁右五味等分潮信汁和如泥塗腫上乾即易之潰者四面封亦覺即封之三五日差又排膿內塞散主大瘡熱已退膿血不止瘡中肉虛疼痛方防風茯苓白芷桔梗逺志甘草炙人參芎藭當歸黃芪各一兩附子二枚炮桂心二分厚朴炙二兩赤小豆五合熬右十四味搗散酒服一方寸匕日三服夜一服又排膿止痛利小便散方瞿麥二兩芍藥三兩赤小豆微熬桂心芎藭麥門冬去心白斂各二分黃芪當歸各二兩右九味搗篩先食溫酒服一方寸匕日三又療癰腫令自潰長肉薏苡仁散方薏苡仁桂心自斂當歸肉蓯蓉乾薑各二兩右六味搗篩為散先食溫酒服一方寸匕日三夜再之又療諸虛不足發背及癰疽差後經年復發背由風聚結毒氣在內閉塞得夏月出攻背不治積聚作膿血或為內漏內塞排膿散方山茱萸五味子茯苓乾薑各六分當歸石韋去毛芎藭各四分附子二分炮肉蓯蓉巴㦸天去心逺志去心麥門冬去心乾地黃各八分莵絲子酒漬地麥各三分取洗者石斛人參甘草炙芍藥桂心各五分右二十味搗散服一方寸匕日三夜一稍加至二匕長服終身不發癰癤又療癰疽發背婦人發乳諸癤已潰未潰者便消不消者速潰疾愈內補散方木占斯敗醬細辛乾薑厚朴炙桔梗甘草炙各一兩人參六分一法二兩栝樓子六分防風六分右十味搗篩為散酒服方寸匕日三夜二間食長服去敗醬又療癰疽發背猪蹄湯方猪蹄一具黃芪黃連芍藥黃芩各二兩薔薇根狼牙各八兩切右七味切以水三斗煮猪蹄令熟澄取三升漬諸藥煮取一升洗瘡一食頃著帛拭乾著生肌膏日二生痂止瘡痛者加當歸甘草各二兩又蝕惡肉散方馬齒礬石燒研䕡茹麝香研丹砂研雄黃研雌黃研白礬各三分燒汁盡研硫黃三分研右八味細作散傅之先蝕惡肉令盡即封生肌膏又癰疽蝕惡肉膏方大黃附子去皮莾草芎藭雄黃研雌黃研真珠研各一兩白斂礬石燒研黃芩䕡茹各二兩右十一味先以猪膏一升半煎六種草去滓內䕡茹礬石末絞之塗瘡中惡肉盡即止又散方䕡茹漆頭者礬石燒研雄黃研硫黃研各二分右四味為散內瘡孔中惡肉盡止勿使過好肉也又療癰疽發十指或起膀胱及發背去惡肉方猪蹄一具治如食法當歸大黃芎藭芍藥黃芩獨活莾草各一兩右八味以水三斗煮猪蹄取八升汁內藥煮取四升去滓洗瘡兩食頃拭令燥以後麝香膏封之又麝香膏主諸惡瘡及癰疽發背去惡肉方麝香礬石燒雄黃真珠各一兩研作末右四味以猪脂攪令如泥塗惡肉盡即止更敷生肌膏又生肌膏主癰疽發背已潰方甘草當歸白芷椒去目乾地黃細辛續斷各三兩一法無續斷烏喙六枚去皮肉蓯蓉三兩薤白二十莖蛇銜一兩右十一味切以好酢半升和漬一宿取猪膏三斤微火煎之令魚眼沸三上三下候白芷黃膏成用塗之佳又療胸背遊腫癰黃芪湯方黃芪人參麥門冬去心石膏碎芎藭當歸各二兩生地黃八兩甘草炙芍藥各三兩生薑五兩切大棗三十枚擘半夏四兩洗去滑竹葉一握右十三味切以水一斗煮竹葉取九升去滓內藥煮取三升分四服日三夜一又療服石之人患瘡腫等單服牛蒡方每吞三撮又方每食訖含生乾地黃九如胡桃大除熱補益也又療年四十以上强壯常熱發癰無定處大小便不通大黃湯方大黃黃芩各三兩升麻二兩梔子五枚芒硝一兩湯成下右五味切以水五升煮取二升四合去滓下芒硝攪令調分三服得利為度不過三劑即差又療散發生瘡腫赤焮方取赤石臼一片燒令赤置酢中搗作末敷之如燥更易以差為度又取糞中蠐螬蟲搗如泥塗腫上不過三度即合口甚妙又主腹內癰方大黃四兩牡丹三兩芥子半升硝石三合桃仁五十枚去尖皮碎切右五味切以水六升煮取一升五合分再服膿即下無膿者下血又若大熱背腫身多生瘡下諸石方露蜂房六兩木緋帛一尺亂髮二兩升麻三兩右四味先用緋帛褁蜂房等以麻纒使遍於炭火上燒令烟盡及熱搗碎作黑灰篩之取末候熱時空腹酒和服一方寸匕日再服此藥五六日即常以小便及大便下青黃赤汁及黑物極滑而腥臭者此石下候三五度下即休若多恐令瘦損若不大急困但煮五加木汁服亦療丁腫又療背上初欲作腫方大黃升麻甘草炙黃芩各三兩梔子仁百枚右五味切以水九升煮取二升半分服快利便止不下便進又凡發背為癰疽已潰未潰方香豉三升右一味少著水和熟搗如强泥作餅子厚三分依腫大小貼之以艾布其上灸其豉餅使溫溫熱而已勿令破肉也若熱痛急易之或一日二日灸之若先有瘡孔勿令豉餅蓋却但四面著灸孔中汁出即差止又療惡毒腫著隂卵或偏著一邊疼急攣痛牽入小腸痛不可忍一宿殺人方茴香草右一味搗取汁飲一升日三四服又取滓敷腫此外國神法從元嘉末來用之神效起死人又生魚薄主乳癰方生鯉魚長七寸大黃莾草竈中黃土各六兩右四味别搗魚如膏三味下篩更搗令調以生地黃汁和敷腫上日五六夜二三即愈又療動散背腫已自利虛熱不除宜服竹葉黃芪湯方出古今録驗竹葉切三升黃四兩小麥一升芍藥三兩甘草二兩炙石膏二兩研人參三兩升麻一兩茯苓二兩一法七分桂心六分一法二分當歸三兩乾棗十四枚五味子三兩生薑三兩乾地黃一兩麥門冬三兩去心知母一兩右十七味切以水一斗二升煮竹葉小麥取九升去滓內藥煮取三升溫分四服又商陸貼諸腫方商陸二兩黃芩黃連白芷白斂大黃莾草各二兩白芨二兩右八味搗篩消膠汁和如泥塗紙貼腫乾即易之又有患癰破下膿訖著兊藥塞瘡孔乃瘡痛煩悶困極有人為去兊藥以楸葉十重以布帛褁緩急得所日再三易之痛悶即止此法大良無比勝於衆法貼此主癰疽潰後及凍瘡有刺不出甚良冬無楸葉當早牧之臨時以鹽湯沃令潤用之亦佳薄削楸白皮用之亦得又梔子湯主表裏俱熱三焦壅實身體生瘡或發癰癤大小便不利方芒硝湯成下甘草炙各二兩黃芩知母各三兩大黃四兩别漬梔子仁七枚右六味切以水五升煮四味減半下大黃煮取一升八合去滓內芒硝分三服又療癰疽發背後小瘰癧李根散方李根切一升甘草炙桔梗黃芩各二兩葛根當歸各三兩桂心芍藥各四兩芎藭六分通草白斂厚朴炙附子炮各一兩栝樓子一升半夏一升洗右十五味搗篩為散酒服一方寸匕日三瘡大困者夜再有人發背骨出十餘節服此即差又主癰瘡發背方蜀椒汗黃芩人參各二兩乾薑附子炮白斂防風桂心甘草炙各一兩芎藭二兩赤小豆一合半右十一味為散酒服一方寸匕日三夜再服之又內補散療癰疽發背已潰未潰排膿生肉方當歸人參各二兩桂心芎藭厚朴炙防風白芷桔梗甘草炙各一兩右九味為散以酒服一方寸匕日三夜再瘡未合服勿停又瞿麥散主諸癰未潰瘡中疼痛膿血不絶法瞿麥白芷黃芪當歸細辛芍藥芎藭薏苡仁赤小豆末各一兩右九味先以清酒一升漬小豆出銅器中熬之乾復漬漬復熬五遍止然後搗諸藥下篩酒服一方寸匕日三夜二服三五日後痛者癢肌肉生一法以春酒漬小豆多痛倍瞿麥痛未開倍白芷多膿倍黃芪薏苡仁芍藥甚妙又黃芪散主癰疽撮膿方黃芪五分多膿倍赤小豆一分熱口乾倍芎藭二分肉不生倍芍藥三分痛不止倍白斂三分栝樓三分小便多倍之右六味搗散酒服方寸匕日三服之一方有甘草三分又療發背及癰腫熱焮已熟者即膿出未熟者自然消除神驗方牛蒡根嫩者洗去土勿令見風細切一大升右一味以水三大升煮令爛絞去滓更盛於瓷器中重湯煎之使如稀糊以塗爛帛貼腫上熱則易之驗外臺祕要方卷三十七
