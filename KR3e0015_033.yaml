body:
  text: 外臺祕要方卷二十九唐王燾撰從髙墮下方三首千金療丈夫從髙墮下傷五藏微者唾血甚者吐血及金瘡傷絶崩中皆主之方阿膠炙乾薑各二兩艾葉芍藥各三兩右四味切以水八升煮取三升去滓入膠令消分二服羸人三服女人産後崩中傷下血過多虛喘腹中絞痛下血不止服之悉愈又療從髙墮下㵼血及女人崩中方當歸二分大黃一分右二味搗為散酒服方寸匕日三范汪同並出第二十六卷中千金翼膠艾湯主男子傷絶或從髙墮下傷五藏微者唾血甚者吐血及金瘡經內絶者方阿膠炙艾葉芍藥乾地黃各三兩乾薑當歸甘草炙芎藭各二兩右八味切以水八升煮取三升去滓內膠令煬分再服羸人三服此湯正主婦人産後崩中傷下血多虛喘欲死腹痛血不止者服之良出第十九卷中從髙墮下瘀血及折傷內損方一十八首廣濟療從髙墮下內損瘀血消血散方蒲黃十分當歸乾薑桂心各八分大黃十二分虻蟲四分去足翅熬右六味搗為散空腹以酒服方寸七日再漸漸加至一七半忌生葱猪犬肉出第四卷中肘後療卒從髙墮下瘀血脹心面青短氣欲死方取胡粉一錢七以水服之備急文仲同又方煮大豆或小豆令熟飲汁數升和酒服之彌佳千金備急文仲同一云大豆二升煮令熟取汁二升去豆以醇酒六七升和飲之一日飲盡小豆亦佳又方生乾地黃二兩熬末以酒服之又方生地黃搗取汁服一升或二升尤佳又方烏鴉趐羽二七枚燒末酒和服之即當吐血也如得左羽尤佳又療從髙墮下若為重物所頓笮得瘀血方豆豉三升沸湯二升漬之食頃絞去滓內蒲黃三合攪調頓服之不過三四服神良刪繁小品文仲同備急集驗千金又方烏梅五升去核以飴糖五升煮稍稍食之自消文仲備急千金同又方取茅連根葉搗絞取汁一二升服之不過三四服愈冬用根又方刮琥珀屑酒服方寸七取蒲黃二三七日四五服良又方末鹿角酒服三方寸匕日三千金同又方取敗蒲薦燒灰以酒服方寸匕並出第三卷中深師療從髙墮下傷內血在腹聚不出療下血方取好大黃二兩桃仁三十枚右二味搗以水五升煮取三升分為三服去血後作地黃酒服隨能服多少益血過百日成微堅者不可復下之虛極殺人也又療墮落瘀血桃枝湯方桃枝一中指長銼芒硝五分大黃四兩當歸甘草炙桂心各二兩虻蟲二十枚去趐足熬水蛭二十枚熬桃仁五十枚去尖皮熬右九味㕮咀以水八升煮取三升去滓溫分三服內消又療墮落積瘀血消血理中膏方大黃二兩猪脂二斤桂心一兩乾薑一兩當歸二兩通草亂髮各一兩右七味切以膏煎髮令消盡搗藥下篩須令絶細下膏置地內諸藥攪勻微火煎之三上三下即藥成去滓以好酒服一兩日二服一方不去滓並出第二十六卷中千金療從髙墮下及被木石所迮或因落馬凡是傷損血瘀凝積氣急欲絶無不療方净土五升蒸之令極熱分半以故布數重褁之尉病上勿令大熱恐破肉候冷即易之以痛止即已但有損傷並以此法療之神效已死不能言者亦活三十年亦差又療從髙墮下損有瘀血方蒲黃八兩附子一兩炮去皮末右二味為散以酒服五六錢匕日三不知增之並出第二十六卷中近效土質汗療折傷內損有瘀血每天隂則疼痛兼療産婦産後諸疾神效方開寶本草云質汗主金瘡傷折瘀血內損補筋消惡血下血婦人産後諸血並酒消服之亦敷病處出西蕃如凝血蕃人煎甘草松淚柳乳地黃並熱血成之今以益母成煎故謂之土質汗也三月採益母草一重擔一名夏枯草右一味揀擇去諸雜草及乾葉以新水淨洗於箔上攤曬令水盡則用手捩斷可長五寸勿用刀切即置鑊中量水兩石令水髙草三二寸則縱火煎候益母草糜爛水三分减二漉去草取五六斗汁㵼入盆中澄之半日以綿濾取清汁盆中滓澱並盡棄之其清汁於小釜中慢火煎取一斗如稀餳每取梨許大暖酒和服之日再服和羹粥喫並得如逺行不能將稀煎去即更錬令稠硬停作小丸服之七日內則疼痛漸瘳二七日平復或有産婦惡露不盡及血運一兩服即差其藥兼療風益心力無所忌鄭長史處吏部李郎中服之得力墜損方三首廣濟療墜損骨肉苦疼痛不可忍方故馬氊兩段其氊欲得故膩者於鐺中以酒五六升著一抄鹽煮令熱即內氊於鐺中看氊熱便用褁所損處冷即易之勿令久熱傷肉如是三五遍痛定即止仍服止痛藥散即漸差又療男子虛勞墜傷內損吐血不止欲死面目黑如漆者悉主之方黃芪芎藭當歸芍藥各三兩甘草三兩灸生薑八兩右六味切以水九升煮取二升五合去滓分溫三服服别相去六七里並出第四卷中近效療墜損方生地黃一斤分為三分右每服取一分熬令焦黃以酒半升煎一兩沸絞去滓令溫暖得所食前日三無所忌馬墜亦療之墜落車馬方六首肘後療忽落馬墮車及墜屋坑崖腕傷身體頭面四肢內外切痛煩躁呌喚不得卧方急覔鼠矢無問多少燒搗末以猪膏和塗封痛處急褁之仍取好大黃如雞子大以亂髮褁上如鴨子大以人所裁白越布衫領巾間餘布以褁髮外乃令火燒煙斷搗末屑薄以酒服日再三無越布餘布可強用常當預備此物為要備急集驗古今録驗同出第三卷中千金療凡人墜落車馬心腹積血唾吐血無數方乾藕根末酒服方寸匕日三如無取新者搗取汁服之尤妙又療墮馬及樹崩瘀血腹滿短氣方大豆五升水一斗煮得二升半去豆頓服劇者不過三服並出第二十六卷中千金翼療落馬墮車及諸傷腕折臂腳疼痛不止方黃茋芍藥各三兩乾地黃當歸附子炮通草續斷桂心乾薑各二兩蜀椒一合汗烏頭半兩炮右十一味搗為散先食酒服五分匕日三忌如常法本方有大黃一兩又云服方寸匕出第十九卷中救急療墜馬落車被打傷腕折臂呼喚痛聲不絶服此散呼吸之間不復大痛三日筋骨相連當歸散方當歸熬令香桂心甘草炙蜀椒汗各二分芎藭六分熬附子炮澤蘭熬各一分右七味搗為散酒服方寸匕日三小兒被奔車馬所損裂其膝皮肉決見骨即絶死小蘇啼不可聽聞服之便眠十數日便行走其神驗如此忌同前方千金翼深師同出第六卷中近效療墮馬內損方取㕎藥一小兩搗為末牛乳一盞煎五六沸和服李諫議云㕎藥以羊肉汁和服一日內不用喫菜極效出第一卷中折骨方三首肘後療凡脫折折骨諸瘡腫者慎不可當風卧濕及多自扇若中風則發痓口噤殺人若已中此覺頸項強身中急束者急服此方竹瀝飲三二升若口已噤者可以物拗開內之令下禁冷飲食及飲酒竹瀝卒燒難得多可合束十許枚併燒中央兩頭承其汁投之可活小品備急文仲古今録驗同出第三卷中千金療腕折骨痛不可忍方取大麻根葉無問多少搗取汁飲一小升無生青者以乾者煮取汁服亦主墮墜打捶瘀血心腹脹滿短氣良出第二十六卷中救急療骨折接令如故不限人畜也方取鈷䥈銅錯取末仍搗以絹篩和少酒服之亦可食物和服之不過兩方寸匕以來任意斟酌之出第九卷中傷筋方三首千金療被傷筋絶方取蟹頭中腦及足中髓熬之內瘡中筋即續生又方搗葛根汁飲之葛白屑熬令黃敷瘡止血並出第二十六卷中救急續斷筋方取旋覆草根淨洗去上搗量瘡大小取多少敷之日一易之以差為度必效同出第九卷中筋骨俱傷方七首肘後療腕折四肢骨破碎及筋傷蹉跌方爛搗生地黃熬之以褁折傷處以竹片夾褁之令遍病上急縳勿令轉動一日可十易三日即差千金刪繁備急文仲古今録驗同又方取生栝樓根搗之以塗損上以重布褁之熱除痛止備急同又方搗大豆末合猪膏和塗之乾即易之並出第三卷中深師療折腕傷筋骨槐子膏方槐子中仁秦芁白术續斷各一兩桂心六分巴豆十枚去皮心熬大附子一枚炮右七味㕮咀以醇苦酒漬槐子等一宿以成錬猪脂二斤於微火上煎三上三下候膏成絞去滓溫酒服棗子許一枚日三并塗敷忌生葱猪肉冷水蘆笋桃李雀肉等出第二十卷中千金療四肢骨碎及傷筋蹉跌方生地黃多少熟搗熬以裹傷骨處頻易古今録驗同又方豉三升以水七升漬之絞去滓取汁飲止煩悶古今録驗同又方乾地黃當歸獨活苦參各二兩右四味搗末以酒服方寸匕日三服並出第二十六卷中折腕方一首深師卓氏膏大附子四枚生用去皮右一味切苦酒漬三宿以脂膏一斤煎之三上三下膏成敷之亦療卒中風口噤頸項強出第二十六卷中折腕瘀血方四首千金療折腕瘀血方虻蟲去足趐熬牡丹等分右二味為散以酒服方寸匕血化成水又方大黃六兩桂心二兩桃仁六十枚去皮右三味切以酒六升煮取三升分三服當下血差並出第二十六卷中千金翼療折腕瘀血方菴䕡草汁飲之亦可作散服出第十九卷中古今録驗療折腕瘀血方蒲黃一升當歸二兩右二味搗散酒服方寸匕日三先食服之千金同出第三十四卷中蹉跌方三首深師療蹉跌補絶復傷地黃散方乾地黃十分桂心乾薑芎藭甘草灸當歸各二分芍藥五分右七味搗為散先食以酒服方寸匕日三服又方大豆熬令黑大黃各二兩桂心一兩右三味搗為散分為三劑酒和服忌生葱又大黃一兩生地黃三兩切熬以水酒二升煮取一升頓服之差出第二十六卷中范汪蹉跌膏兼療金瘡方當歸續斷附子去皮細辛甘草灸通草芎藭白芷牛膝各二兩蜀椒二合右十味㕮咀以猪膏二斤煎以白芷色黃膏成絞去滓日再以摩損處出第十卷中被打有瘀血方一十三首肘後療若為人所打舉身盡有瘀血方刮青竹皮二升亂髮如雞子大四枚燒灰延胡索二兩右三味搗散以一合酒一升煎三沸頓服日三四備急范汪同又療被打擊有瘀血在腹內久不消時時發動方大黃二兩乾地黃四兩右二味搗散為丸以酒服三十丸日再為散服亦妙備急文仲小品范汪等同並出第三卷中范汪療被打有瘀血方大黃二兩桃仁去尖皮熬虻蟲各二十一枚去足趐熬右三味搗蜜丸四丸即內酒一升煎取七合服之備急肘後同又方薑葉切一升當歸三兩右二味為末以酒服方寸匕日三並出第十卷中備急若久血不除變成膿者宜此方大黃三兩桃仁三十枚去皮尖右二味切以水五升煮取三升分三服當下膿血不盡更作文仲肘後同又若久宿血在諸骨節及脅肋外不去者方牡丹虻蟲去足熬等分右二味搗末以酒服方寸匕血化成水小品文仲千金並翼古今録驗同又方大黃如雞子一枚蚯蚓矢一合右二味酒半升煮取三沸服之又方鐵一斤酒三升煮取一升服之又燒令赤投酒服之小品文仲肘後同出第八卷中千金療被打傷破腹中有瘀血方蒲黃一升當歸桂心各二兩右三味搗散以酒服方寸匕日三夜一不能酒飲服之劉消子方又方搗莨菪子末以敷瘡上又凡有瘀血者其人喜忘不欲聞人聲胸中氣塞短氣方甘草一兩灸茯苓二兩杏仁五合右三味切以水一斗煮取三升分為三服范汪同又被歐擊損傷聚血腹滿方豉一升以水二升煮三沸去滓再服不瘥重服之范汪同並出第二十六卷中張文仲劉涓子療被打腹中瘀血白馬蹄散方白馬蹄燒令烟斷搗末以酒服方寸匕日三夜一亦療婦人瘀血消化為水肘後備急千金同被打損青腫方七首千金療被打頭眼青腫方用新熱羊肉敷之又方大豆黃末和敷之又方牆上朽骨唾於石上研摩塗之乾即易又方釜月下土細末塗之又方羊皮上卧之又方炙肥猪肉令熱搨上又炙猪肝貼之亦佳出第二十六卷中文仲療被打青腫方以水磨桂塗之赤則以牆中朽骨磨塗之則平復也梁都督侍中傳效也出第八卷中許仁則療吐血及墮損方三首許仁則論曰此病有兩種一者緣墮打損內傷而致此病一者緣積熱兼勞而有此病若內傷自須依前墮墜內損大便血等諸方救之若積熱纍勞吐血狀更無餘候但覺心中悁悁似欲取吐背上煩熱便致此病宜依後雞蘇七味湯桑白皮八味散療之方雞蘇五兩生地黃切青竹筎各一升生薑桑白皮各六兩小薊根切六合生葛根切六合右藥切以水九升煮取三升去滓分溫三服服别相去如人行十里久若一劑得力欲重合服至四五劑尤佳隔三四日服一劑如未定則宜合後桑白皮八味散服之桑白皮散方桑根白皮六兩生薑屑六兩柏葉雞蘇各四兩小薊根五兩乾地黃七兩青竹筎一升新者地菘三兩右藥搗散煮桑白皮飲和一方寸匕日再服漸漸加至二三匕以竹瀝下亦得又此病有兩種一者外損一者內傷外損因墜打壓損或手足肢節肱頭項傷折骨節痛不可忍覺內損者須依前內損法服湯藥如不內損只傷肢節宜依後生地黃一味薄之法及芥子蘇等摩之方生地黃無問多少淨洗搗碎令爛熬之候水氣盡及熱以薄折處冷即易之如骨蹉跌即依療折傷法縹縳兼薄羊腦生龜生鼠等法為有所損此不復載如傷損處輕搗芥子和蘇以摩傷處若被打墜壓傷損急卒雖不至昏悶腹內無覺觸然身之中相去非逺外雖無狀內宜通利或慮損傷氣不散外雖備用諸方腹內亦須資藥但不勞大湯如前內損欲死者服湯取利欲用時間小小諸物服之理應無嫌其法略出如後小便酒煮生地黃每始王木綟木梓葉㕎藥梒藥猪脂及石蜜白石地菘延胡索赤泥藥以上十一物並出下卷吳升同金瘡禁忌序一首肘後凡金瘡去血其人若渴當忍之常用乾食並肥脂之物以止渴慎勿鹹食若多飲粥輩則血溢出殺人不可救也又忌嗔怒大言笑思想隂陽行動作勞勿多食酸鹹飲酒熱羹臛輩皆使瘡痛腫發甚者即死瘡瘥後猶爾出百日半年乃稍復常耳凡金瘡傷天窗眉角腦户臂裏跳脉髀內隂股兩乳上下心鳩尾小腸及五臟六腑輸此皆是死處不可療也又破腦出血而不能言語戴眼直視咽中沸聲口急唾出兩手妄舉亦皆死候不可療若腦出而無諸候者可療又療卒無汗者中風也瘡邊自出黃汁者中水也並欲作痓候可急療之又痛不在瘡處者傷經也亦死之兆又血出不可止前赤後黑或白肌肉腐臭寒冷堅急者其瘡難愈亦死也並出第三卷中金瘡預備膏散方三首肘後療金瘡膏散三種宜預備合以防急疾之要續斷膏方蜀續斷蛇銜防風各三兩右三味切以猪脂三斤於東向露竈煎之三下三上膏成去滓若深大瘡者但敷四邊未可使合若淺小瘡者但通敷便相連令止血住痛亦可以酒服如杏子大又冶葛蛇銜膏方蛇銜薔薇根續斷冶葛各二兩當歸附子各一兩半去皮防風黃芩澤蘭各一兩松脂柏脂各三兩右十一味㕮咀以猪脂二斤煎之别以白芷一枚內中候色黃即膏成去滓濾以密器收貯之以塗瘡無問大小皆差不生膿汁也出第七卷中深師預備金瘡散方乾薑甘草灸桂心各一兩當歸三兩芎藭四兩蜀椒三兩汗右六味搗散以酒服方寸匕日三肘後同出第二十九卷中金瘡方一十一首肘後療金瘡方割氊方一寸燒灰研以敷之瘥又方杏仁去皮尖搗如泥石灰分等以猪脂和之淹足合煎令杏仁黃絞去滓以塗瘡上日五六遍愈又方燒故青布作灰敷瘡上裹縳之數日瘥可解去又方以蛇銜草搗敷之差又方狼牙草莖葉熟搗敷貼之兼止血一方燼草挼敷之又方五月五日掘葛根暴乾搗末敷瘡上止血止痛又方釣樟根出江南刮取屑敷瘡上有神驗又方紫檀末以敷金瘡止痛止血生肌又方燒牡蠣末敷之佳凡裹縳瘡用故布帛不寬不急如繫衣帶即好並出第七卷中近效金瘡或壓損斷裂方剝取新桑皮作線縫之又以新桑皮裹之以桑白汁塗之極驗小瘡但以桑皮裹即差又金瘡炙瘡火燒瘡等方蠟如胡桃杏子一抄爛搗檳榔仁一枚薰陸香半合右四味和搗以猪脂煎即以此藥塗帛上貼瘡此方甚效金瘡續筋骨方三首千金療金瘡粉散辟風水續筋骨止血方石灰地菘苗細辛旋復根葛葉猪膏青蒿麥門冬苗益母苗不限多少切右九味搗取汁和石灰作餅子暴乾末如粉以敷傷瘡上止血止痛生肌五月五日合之神效出第二十六卷中必效療被斫筋斷者續筋方旋覆根搗汁瀝瘡中仍用滓封瘡上即封裹之十五日即斷筋便續矣更不須開易此方出蘇景仲家獠奴用效出第四卷中古今録驗療金療中筋骨續斷散方續斷五兩乾地黃蛇銜地榆杜蘅各四兩乾薑蜀椒汗細辛桂心各一兩當歸芎藭蓯蓉芍藥各三兩人參甘草炙附子炮去皮各二兩右十六味搗為散以酒飲和服方寸匕日三服忌海藻菘菜生菜生葱猪肉冷水一方無杜蘅有杜礪出第三十四卷中金瘡止痛方五首范汪療金瘡內塞止痛地榆散方地榆根白斂各二分附子一分炮當歸四分芎藭白芷芍藥各三分右七味搗散以酒飲服方寸匕日三服忌同前方又金瘡內塞逐痛方黃芩當歸各三兩甘草灸二兩細辛烏頭炮各二兩乾薑一兩白芷四兩右七味搗篩以酒飲服一錢匕日三可至二錢匕忌同前方又金瘡止痛方馬蹄燒灰三指撮以酒和服之並出第十九卷中千金凡金瘡若刺瘡痛不可忍者方葱白一把水三升煮數沸漬洗瘡上痛即止亦治因水入疼痛翼深師同出第二十六卷中古今録驗療金瘡止痛牡蠣散方牡蠣二分熬石膏一分右二味下篩以粉瘡痛即止出第三十四卷中金瘡生肌方四首廣濟療金瘡生肌破血補勞消瘡輕身紫葛湯方紫葛三握細銼之以順流河水三大升煎取一升二合去滓空腹分三服若冷以酒一大升水二升和煮取一大升無忌出第六卷中范汪療金瘡內塞止痛生肌肉散方當歸甘草炙肉蓯蓉芎藭芍藥蜀椒汗吳茱萸乾薑桂心白及黃芪厚朴人參右十三味等分搗為散以酒飲服一方寸匕日三服忌如前方又療金瘡生肌白膏方白芷一兩六銖乾地黃一兩半芎藭一兩六銖甘草半兩炙當歸白斂附子各十八銖去皮蜀椒二合半汗右八味㕮咀以猪脂五斤合煎三上三下藥成去滓塗瘡上日再忌同前方並出第九十五卷中古今録驗療金瘡生肌散方甘草一斤炙黃蘗八兩當歸四兩右三味搗末以封瘡上日再出第三十四卷中金瘡去血多虛竭內補方二首千金療金瘡去血多虛竭內補方當歸三兩芍藥細辛各五分乾薑三分甘草二分炙右五味為散以酒服方寸匕日三夜一忌同前方出第二十六卷中古今録驗療金瘡去血多虛竭內補方蜀椒三分乾薑二分蓯蓉甘草炙芍藥當歸芎藭桂心黃芩人參黃芪厚朴炙吳茱萸桑白皮各一兩右十四味搗散以酒服方寸匕日三一方有白及無桑白皮千金翼同出第三十四卷中金瘡中風方八首肘後療金瘡中風方蜀椒量瘡大小用麵作餛飩煻灰中炮令熟及熱開一小口當瘡上掩之即引風出可多作取差備急小品同出第三卷中必效療金瘡中風角弓反張者方取杏仁碎之蒸令餾搗絞取脂服一小升許兼以摩瘡上即差又方取蒜一大升破去心以無灰酒四升煮蒜令極爛並滓服一大升以來須臾汗如雨出則差又療口噤不能語方蔓菁子淨洗一升搗令細粘手撮為炷以灸瘡上一兩度熱徹即差兼服後方又療因瘡著風方雞糞一合烏豆二升簸令淨二味相和於鐺中熬令焦黑及熱㵼出以酒二大升淋之與服隨多少令盡取汗差如無汗更作服又療因瘡著風角弓反張方取莨菪根可瘡大小截令平如無大者並縳數根稱瘡以為限猪脂一大合鹽末一雞子黃大和膏於火上溫之令膏鹽相得不用過熱熱即傷肉以暖得炷瘡上冷即易之為兩炷於垍器中燒之更相用以差止驗又方生雞子烏麻沙二味合煎稍稠待冷以封瘡上古今録驗療金瘡得風身體痓強口噤不能語或因破打而得及斧刀所傷得風臨死總用此方無有不差瓠􅕧燒麻燭熏之方取未開瓠􅕧一枚長柄者開其口隨瘡大小開之令瘡相當可繞四邊閉塞勿使通氣上復開一孔如碗口取浮麻子燭兩條並然瓠􅕧向上燭盡更續之不過半日即差若不止亦可經一兩日熏之以差為度若燭長不得內入瓠􅕧可中折用之出第三十四卷中諸瘡中風寒水露方五首文仲云凡以八九月刺手足金瘡及諸瘡中寒露水冷毒皆殺人不可輕也療之方生竹若桑枝兩條著煻火中令極熱斫斷炷瘡口中熱氣盡更易一枚盡二枚則瘡當爛乃取薤白搗以綿裹著熱灰中使極熱去綿以薤白薄瘡上布帛急裹之肘後千金同又療若已中水及惡露風寒腫痛方以鹽數合著瘡上以火炙之令熱達瘡中畢以蠟內竹管插熱灰中令煬以滴入瘡中即便愈若無鹽用薤白但單用蠟亦良肘後同出第五卷中備急療諸瘡中風寒水露腫痛云因瘡而腫者皆中水及中風寒所作也其腫氣入腹則殺人也方燒黍穰或牛馬乾糞桑條輩多烟之物掘地作坎於中燒之以版掩坎上穿版作小孔以瘡口當孔上熏之令瘡汁出盡乃止又滴熱蠟瘡中佳集驗肘後文仲同又方以桑灰汁溫之以漬瘡大良姚云神驗肘後千金同中出第十八卷近效療瘡因水入疼痛方取生葱一束搗以腳踏上須臾更著之差李諌議房給事録試效被刀箭傷方一十一首劉涓子療金瘡箭在肉中不出方半夏三兩洗白斂三兩右二味下篩以酒服方寸匕日三淺者十日出深者二十日出終不住肉中肘後千金文仲小品同出第三卷中肘後療卒被毒箭方搗藍青絞取汁飲之並薄瘡上若無藍取青布漬之絞取汁飲之亦以汁淋灌瘡中肘後范汪文仲備急千金同又方煮藕取汁飲之多多益善肘後文仲備急同又方但多食生葛根自愈或搗生葛絞取汁飲之乾者煮飲之小品千金集驗備急文仲同又方乾薑鹽等分搗末敷瘡上毒皆自出范汪肘後備急同一作乾葛又凡毒箭有三種交廣夷俚用焦銅作鏃次嶺北用諸蛇蟲毒螫物汁著管中漬箭鏃此二種才傷皮便洪腫沸爛而死唯射猪犬雖困猶得活以其噉人糞故也人若有中之便即餐糞或絞濾取汁飲之並以塗瘡上須臾即定不爾不可救也又一種是今之獵師射麞鹿用射罔以塗箭鏃人中之當時亦困頓著寬處者不死若近胸腹亦宜急療之今葛氏方是射罔者耳又療箭鏑及諸刃刀在咽喉胸膈諸隱處不出者方牡丹一分白斂二分右二味搗末以溫酒服方寸匕日三服刃自出肘後備急千金同出第九卷中小品療被毒箭傷方雄黃末敷之愈肘後千金集驗同此方亦療蛇毒又方食麻子數升愈搗飲其汁亦佳肘後范汪千金同出第十卷中集驗療毒箭方以鹽滿瘡中灸鹽上三十壯肘後同又方煮蘆根汁飲一二升范汪小品同一云煮薑汁飲二三升又療刀箭瘡有血不止方以小兒矢塗封之三日即差並不傷人出第九卷中竹木刺不出方一十六首劉涓子竹木刺不出方鹿角燒灰末以水和塗之立出久者不過一夕集驗文仲備急肘後范汪古今録驗深師同出第三卷中肘後療竹木刺不出方取羊糞燥者燒灰和脂塗之刺若未出重敷之刪繁集驗千金備急深師同一云用乾羊糞末又方嚼白梅塗之集驗千金同又方王不留行末服之並敷上即出集驗文仲深師千金同又方搗烏梅水和塗之刺上立出千金用白梅並出第三卷中深師療刺不出方以鹿腦厚敷上燥復易之半日即出出第二十九卷中集驗療刺藏在肉中不出方用牛膝根莖合搗以敷之即出縱瘡合其刺猶自出肘後備急文仲范汪深師千金同出第九卷中千金療刺在人肉中不出方煮瞿麥汁飲之日三立出又方溫小便漬之又方白茅根燒末以膏和塗之亦主諸瘡因風致腫肘後同又方薔微燒灰以水服方寸匕日二度十日刺出又方燒鑿柄為灰酒服二方寸匕又方酸棗核燒末服之差又方頭垢塗之並出第二十六卷中文仲療竹木刺不出方刮象牙屑水和塗刺上立出肘後范汪備急深師同出第八卷中救急療竹木刺傷方嚼豉封之立差千金肘後同出第九卷中狐尿刺方二首千金翼論凡諸螳蜋之類盛暑之時多有孕育遊諸物上必有精汁其汁乾久則有毒人手觸之不疑之間則成其疾故曰狐尿刺日夜慘痛不識眠睡百方療不能差方但取蒲公英莖葉根斷之取白汁塗令厚一分即差神驗出第二十四卷中肘後療狐尿棘刺人腫痛欲死方以熱桑柴灰汁漬之冷復易永差備急崔氏同出第八卷中狐刺方五首崔氏療狐刺方取好豉心以足為限但覺被刺即熟嚼豉以薄之少頃看豉中當見毛不見又速嚼豉數薄之以晝夜勿絶但以毛盡便愈又方熱搗杏仁細研煮一兩沸承熱以浸刺處數數易之大良古今録驗同集驗療狐刺方熱魚汁灌瘡中備急療狐刺方以熱蠟灌瘡中又烟熏之令汁出愈此狐所溺之木猶如蛇螫也肘後小品文仲同出第八卷中必效主狐刺痛如烏啄者方生括樓香豉二味等分搗之為餅敷患處乾即易之效假家方出第六卷中惡刺方三首千金翼療惡刺方五月蔓菁子搗末和烏牛乳封之無烏牛但是牛乳亦得本方云人乳亦得出第二十四卷中古今録驗療惡刺方取未煮餅油脂以麵和油調須臾著瘡上即愈一云蔓菁根和粉以麵和油又方取麴末和獨頭蒜搗之內瘡孔中蟲出即差出第三十五卷中灸瘡方四首肘後論曰凡灸不依明堂脉穴或是惡日神惡時殺病人年神人神所犯天地昏暗日月無光久積隂沉及灸日食毒物方畢或灸觸犯房室等其灸瘡洪腫發作疼痛病人加甚灸者疾本不痊增其火毒日夜楚痛遇其凡愚取次亂灸此皆因火毒傷藏即死矣今用方療之柏白皮三兩當歸一兩薤白一握右三味切以猪脂一升煎三上三下以薤白黃絞去滓以塗瘡上亦療風水中瘡火瘡出第三卷中集驗療灸瘡痛腫急方搗竈中黃土末之以水和煮令熱以漬之深師千金肘後同又療灸瘡薤白膏生肌肉止痛方薤白當歸各二兩白芷一兩羊髓一斤右四味㕮咀以羊髓煎白芷色黃藥成去滓以敷瘡上日二肘後千金文仲同出第八卷中千金療灸瘡方甘草炙當歸各一兩胡粉六分一作胡麻羊脂六分右四味切以猪脂五合煎之去滓以敷瘡上忌海藻菘菜出第二十六卷中灸瘡膿不差方三首肘後療灸瘡膿不差方白蜜一兩烏賊骨一兩末右二味相和以塗之千金同千金療灸瘡膿壞不差方臘月猪脂一斤薤白切一升胡粉一兩右三味先煎薤白令黃去之綿裹石灰一兩更煎去之入胡粉令調敷之日三又方石灰一兩末細絹篩以猪脂和相得微火上煎數沸先以暖湯洗瘡訖以布裹灰尉瘡上三過便以藥貼瘡上灸之又搗薤敷之肘後同出第二十六卷中火燒瘡及火油天火瘡方三首集驗凡被火燒者初慎勿以冷水冷物並井下泥火瘡得冷即熱氣更深轉入至骨爛壞人筋攣縮者良由此也又療卒被火燒苦劇悶絶不識人方取新熱小便飲一升及冷水和蜜飲之口噤不開者可拗開灌之其悶差然後療外乃善千金古今録驗崔氏小品同出第八卷中千金療火瘡方未熬麻油和梔子仁末塗之唯厚為佳已成瘡者篩白煻灰粉之即差出第二十六卷中近效療火油及天火瘡初出似沸子漸漸大如水泡似火燒瘡赤色熱翕翕須臾浸淫漸多急速者是也方藝薹菜不限多少搗絞取汁芒硝大黃生鐵衣各等分搗大黃末相和芒硝等以藝薹汁調如稀糊以秃筆㸃藥敷瘡上乾即再㸃頻用極有效閻師云藝薹冬月煮取汁洗亦可火灼爛壞方五首劉涓子療火燒人肉爛壞麻子膏方麻子一合柏白皮山梔子碎白芷甘草各一兩柳白皮一兩右六味㕮咀以猪脂一升煎三上三下去滓以塗瘡上日三出第五卷中集驗療火爛瘡膏方柏白皮生地黃研各四兩苦竹葉甘草各四兩右四味切以猪脂一斤煎三上三下藥成濾去滓以摩瘡上日再摩千金無地黃深師千金劉涓子范汪同出第八卷中千金墮火灼爛瘡方榆白皮熟嚼封之差又火瘡敗壞方柏白皮切臘月猪膏合淹相和煮四五沸色變去滓塗瘡范汪同出第二十六卷中又方柏白皮生地黃黃芩蛇銜梔子苦竹葉各一兩右六味切以羊髓半升煎之三上三下去滓塗瘡上差湯火所灼未成瘡及已成瘡方一十一首肘後療湯火所灼未成瘡者方取暖灰以水和習習爾以敷之亦以灰汁洗之又方黍米女麴分等右二味各異熬令黑如炭搗下以雞子白和塗之良又方取菰蔣根洗去土燒灰雞子黃和塗之又方取柳白皮細切以猪膏煎以塗之以柏白皮彌佳凡此以上三方皆能止痛疾仍不成瘡也又方以小便漬洗之又方以苦酒和雄黃塗之又若已成瘡者方以白蜜塗瘡上取竹幕貼之日三出第七卷中范汪療湯火灼瘡方破雞子取白塗之肘後同又方以豆醬汁塗之肘後文仲同並出第九十一卷中備急療湯火灼瘡方柳皮燒灰如粉敷之肘後同又方猪膏和米粉塗之日五六過良此二方既令不痛又使速愈又無瘢㾗已試有效肘後同出第八卷中湯火瘡無問大小方四首崔氏療湯火瘡無問大小祕要方取狗毛碎剪煬膠和之以遍封瘡上一封之後比至痂落亦不痛救急同出第五卷中文仲療湯火瘡無問大小祕要方新熱牛糞塗之良崔氏同出第十七卷中救急療湯火瘡無問大小祕要方取粟熬令焦黑投水中攪之良久濾取汁重煎如糖以敷瘡上並滅瘢崔氏同又方取黍米煮粥和雞子白敷瘡良並出第五卷中湯火爛瘡方五首肘後療湯火爛瘡方取石膏搗末以敷之立愈古今録驗同出第三卷中備急湯火灼爛方白斂末塗之立有效又方以竹中蠹蟲末塗之良又方石灰末以水和塗之乾即易之並出第八卷中古今録驗療湯火爛方取商陸根搗末以粉瘡上出第四十卷中湯煎膏火所燒方四首肘後療為沸湯煎膏所燒火爛瘡方丹參細切以羊脂煎成膏敷瘡上千金備急文仲集驗同又方熟搗生胡麻如泥以厚塗瘡上並出第七卷中集驗被湯火熱膏所燒不問大小梔子膏方梔子三十枚白斂黃芩各五兩右三味切以水五升麻油一升煎令水氣竭去滓冷之以淋瘡令溜去火熱毒肌乃得完也作二日任用膏塗湯散治之千金並翼古今録驗小品同出第八卷中文仲滚湯煎膏所灼火焰所燒方牛糞新者和以雞子白塗之比常用之亦不作瘡不痛神效出第七卷中漆瘡方二十七首廣濟療漆瘡方煮椒湯洗頻三五度又嚼糯米敷上乾即易之頻四五度即差忌熱麵肉飲酒出第五卷中肘後療卒得漆瘡方以雞子黃塗之乾即易之不過三五度文仲同又方煮柳葉湯適寒溫洗之柳皮尤妙集驗必效文仲千金同又方取生蟹黃塗之又方煮香薷以漬洗之深師古今録驗同又方濃煮鼠查莖葉洗之亦可搗取汁以塗之集驗千金同赤瓜木也又方嚼秫米以塗之又方以造酒小麴搗末以粉之乾即以雞子白和塗之良又方挼慎火草若雞腸草以塗之漆姑草亦佳深師千金翼同又方以羊乳汁塗之千金翼深師同又呪漆法畏漆人見漆便漆著之唾之曰漆奕丹陽漆無弟無兄漆自死丹亡二七須鼠傷三唾之又呪三過止則不復生瘡也出第四卷中刪繁療漆瘡方取蓮葉乾者一斤以水一斗煮取五升洗瘡上日再肘後崔氏文仲千金同又方芒硝五兩湯浸洗之肘後千金翼深師同出第九卷中千金療著漆洗湯方取磨石下滓泥塗之取差止大驗翼同又方礬石著湯中令消以洗之翼肘後同出第二十六卷中千金翼療漆瘡方貫衆搗末以塗之良乾以油和塗之集驗文仲肘後同又方取猪膏塗之文仲刪繁千金同又方宜噉肥肉集驗深師千金同又方嚼穄榖塗之出第十九卷中崔氏療漆瘡方頻以鹽湯洗之大良又方以馬尿洗之差止備急療漆瘡方搗韭根如泥塗之煮薤葉洗之佳肘後深師崔氏同又方取蟹搗以塗之最妙或以水浸之取水數數洗之亦效救急療漆瘡方以鐵漿洗之隨手差頻為之妙出第八卷中必效療漆瘡方取漆姑草搗汁二分和芒硝一分塗之若無芒硝即朴硝最妙炙韭尉之效又方濃煮杉木汁洗之數數用即除小兒尤佳出第四卷中古今録驗療漆瘡方黃櫨木一斤銼鹽一合二味以水一斗煮取五升去滓候冷以洗之即差王長華家神方出第四十三卷中論曰此疾雖小有著者遍身頭面似疹癩浮腫生瘡痛癢毛髮脫落心煩恍惚不得眠睡因療之遲遂為他疾或便成風癩亦可畏也侵淫瘡方七首肘後療卒得侵淫瘡轉廣有汁多起於心不早療之繞身周匝則能殺人方以雞冠血塗之良又方取牛糞新者絞取汁以塗之亦燒煙熏之又方胡燕窠末以水和塗之文仲備急同又方取鯽魚長三寸者以少豉合搗塗之亦療馬鞍瘡若先起四肢漸向頭面者難療也又取鯽魚油煎去魚塗之文仲備急同出第四卷中集驗療卒毒氣攻身或腫或赤痛或癢并分散上下周匝煩毒欲死方取生鯽魚切之如鱠以鹽和搗遍塗瘡上乾復易之此為侵淫瘡也備急同出第八卷中古今録驗療侵淫瘡苦瓠散方苦瓠一兩蛇皮半兩燒露蜂房半兩熬大豆半升梁上塵一合右五味為散以粉粥和塗紙貼赤處日三甚良又療侵淫瘡戎鹽散方戎鹽二分大黃四分䕡茹一分右三味搗散以酒和敷瘡上日三良月蝕瘡方一十二首廣濟療月蝕瘡方自死青蛙一枚燒灰母猪蹄一枚燒灰甘草末救月杖燒灰右四味等分蜜和塗瘡上日二差止又方五月五日乾蝦蟇一枚燒灰石硫黃一兩研礬石一兩熬令汁盡右三味為散以敷瘡上日二差止小兒耳後瘡同用並出第五卷中肘後療大人小兒卒得月蝕瘡方五月五日蝦蟇灰以猪膏和塗之差止文仲備急集驗同又方於月望夕取兔矢仍內蝦蟇腹中合燒為灰末以敷瘡上差止集驗崔氏同崔氏云兔矢七枚又方取蘿摩草搗末塗之差又方燒蚯蚓矢令赤末以猪膏和敷之文仲備急千金古今録驗同又云此瘡多在兩耳上及七孔邊隨月死生故名月蝕瘡也世言小兒夜指月所為實多著小兒也文仲備急同又方水銀黃連末各二兩胡粉熬松脂各一兩研右四味相和合研水銀硝以塗瘡瘡如乾以臘月猪脂和先以鹽湯洗拭然後敷之出第十六卷中集驗療月蝕瘡方救月蝕鼓皮如手許大一片以苦酒三升漬一宿以塗瘡上或云燒作灰脂和敷之崔氏同又方虎頭骨二兩碎浮萍屑一兩右二味以猪脂一斤煎取骨黃成膏以塗瘡上崔氏同又方茱萸根地榆根薔薇根右三味各等分為散作湯洗瘡取藥塗瘡上日三崔氏同又方然燭照瘡使燭熱氣相及瘡即愈崔氏古今録驗同並出第九卷中千金翼療月蝕瘡惡肉方班猫去足趐熬石硫黃䕡茹各一兩末右三味搗篩以塗瘡上如瘡乾以猪脂和塗之日三出第二十四卷中代指方一十一首小品代指者其狀先腫焮焮熱痛色不黯黑然後緣爪甲邊結膿劇者爪皆脫落亦謂之代指病也又代指無毒正繇人筋骨中熱盛撮結故耳吳人名遭指野夫名為土盧即皆是代指疾也療方單煮甘草汁漬之或用芒硝湯漬之搗青菜汁搨之但得一種浸搨之即差千金同肘後療代指方以猪膏和白善敷之數易差止深師千金翼同白善一作曲蟺土又方以指刺炊上熱飯中七遍文仲集驗深師千金范汪同又方取梅核中仁熟搗以淳苦酒和敷之須臾差止文仲同又指忽掣痛不可忍方灸指頭痛處七壯愈千金同又指端忽發瘡方燒鐵令熱勿令赤以灼之上二方俱主代指並出第五卷中千金翼療代指方先刺去膿炙鮓皮令熱以褁縳指令周匝痛即止便愈千金同出第二十三卷中崔氏論代指者是五藏之氣使然流注於十二源經脉熱衝手指不還即代指也當取熱湯急漬之即出使滿七度便以冷水中浸之訖又復浸之如此三度即塗羊膽愈未成膿此方甚效或以猪膽盛代指纒之差本方云訖乾封桂末便愈出第四卷中備急療手指忽腫痛不已者名為代指方和泥泥指令遍周匝厚一寸許以熱灰中炮之令燥視皮皺即愈不皺者更為之良文仲深師范汪同又方取梁米粉鐵鐺中熬令赤以衆人唾和之塗上令厚一寸即消又方小便和鹽作泥厚裹之數易差鑱針刺血出最妙出第五卷中甲疽方五首崔氏夫甲疽之為病或因割甲傷肌或因甲長侵肉成瘡腫痛復緣靴窄研損四邊腫焮黃水出侵淫相染五指俱爛漸漸引上腳跌泡漿四邊起如火燒瘡日夜倍增萬醫所不能療之方緑礬石五兩形色似朴硝而緑色右一味置於鐵版上聚炭封之以囊袋吹令火熾即沸流出色赤如融金看沸定汁盡去火待冷收取挼為末色似黃丹先以鹽湯洗瘡拭乾用散敷瘡上唯多為佳著藥訖以軟綿纒裹當日即汁斷瘡乾若患急痛即塗少酥令潤每日一遍鹽湯洗濯有膿處則洗使淨其痂乾處不須近每洗訖敷藥如初似急痛即塗酥五六日即覺瘡上痂漸剝起但依前洗敷藥十日即瘡漸漸總剝痂落軟處或更生白膿泡即捺破敷藥自然總差神驗無比刑部張侍郎親嬰此病卧經六十餘日困頓不復可言在京衆醫並經造問皆隨意處方了無效驗唯此法得效如神今故録之以貽好事者出第五卷中救急療甲疽方屋上馬齒菜崑崙青木香印成鹽右三味各燒成灰並等分又取光明砂少許於諸藥中拌總和下篩為細散以敷瘡上乾即易之以差止當瘡未差以前不宜食雞猪魚肉腥穢酒蒜等差後仍三十日忌酒良出第九卷中必效療甲疽赤肉生甲邊上裹甲者方取瓜州礬石燒令沸定末敷之濕即刮却更著日數易即消散竇宣城綽云效亦主雜瘡有蟲有黃水若得吳白礬石亦佳若無雞矢礬亦好又療甲疽瘡腫爛生腳指甲邊赤肉出時差時發者方黃芪二兩䕡茹三兩右二味切以苦酒浸一宿以猪脂五合微火上煎取三合絞去滓以塗瘡上日三兩度其息肉即消散出第四卷中近效療甲疽瘡神妙方熏黃慳好者蛇皮右二味等分更和研之又先以溫泔清浸洗瘡令軟以尖刀子割去甲角入內處裛乾取藥棗栗許大以敷瘡上用軟綿裹之半日許藥濕即易之一日許即永除其先痛者敷藥訖一飯頃即宜痛定差訖一二日勿著窄靴鞋若能斷酒及猪雞魚蒜麵等其效愈逺其藥不過三四度永差簫十四郎中有效肉刺方二首古今録驗療肉刺方好薄刮之以新酒醋和羊腦敷之一宿洗去常以綿裹之良出第四十一卷中近效療肉刺方以黑木耳取貼之自消爛又不痛宜以湯浸木耳軟乃用之手足皸裂方五首深師療手足皸裂方蜀椒四大合汗以水一升煮之七沸去滓漬之半食頃出令燥須臾復浸塗羊猪髓腦尤妙范汪同出第二十九卷中集驗療手足皸裂血出痛方若涉氷霜凍面及手足皸裂瘃壞取麥窠濃煮汁及熱以浸洗之即差又方取葱葉萎黃及籜煮以漬洗之范汪同又療人腳無冬夏常坼裂名曰尸腳此因履踏洗尸水及惡物故也方取雞屎一升以水二升煮數沸待小冷以漬腳半日不過三四度差深師千金范汪同出第九卷中千金療手足皴裂血出疼痛方猪著熱酒中以洗之即差深師集驗同云無酒用湯亦佳出第二十四卷中手足逆臚及瘃壞方二首范汪療手足指逆臚方真珠一分乾薑二分右二味搗末以塗瘡指上日三千金深師同深師療冬月冒涉凍凌面目手足瘃壞及始熱痛欲瘃者方蜀椒二分芎藭二分白芷防風各一分薑一分一作鹽右五味以水四升煎令濃以洗之出第二十九卷中疣目方一十九首肘後療疣目方月晦日夜於厠前取故草二七莖莖研二七過粉疣目上訖呪曰今日月晦疣驚或明日朝乃棄勿反顧之又方取亡人枕若席物以二七拭之亡人近彌易去也並出第五卷中集驗療去疣目方七月七日以大豆一合拭疣目上三過訖使病疣目人種豆著南向屋東頭第二􅋼中豆生四葉以熱湯沃殺疣目便去矣千金肘後范汪同又方取松柏脂合和塗其上一宿即不知處千金同又方作艾炷著疣目上灸之三炷即除范汪千金同又方以石硫黃突疣目上六七過除千金同千金去疣目方取月十五日月正中時望月以秃苕帚掃疣目上三七遍差止又方以猪脂癢處揩之令少血出即差神驗不可加也又方以苦酒漬石灰六七日取汁㸃疣上小作瘡即落又方杏仁燒令黑研如膏塗之令差止又方以牛涎數塗之自落並出第二十四卷中崔氏疣目方取月盡日平旦井花水月生一日煮作湯竈突北面南自洗呪曰日盡水月初湯竈突北千疣死百疣亡凡七度洗及呪甚良又方先布紙一張於牀上即以筆㸃疣一下還㸃紙一下無問多少皆一一㸃每㸃即呪曰紙亦爛疣亦散㸃一遍訖乃深埋㸃紙於屋澑下久當疣散又方以蜘蛛網絲繞纒之自落良又方盜取一酘酒醋以摩疣上呪曰疣疣不知羞一酘酒醋洗你頭急急如律令呪滿七遍久即自愈並出第四卷中張文仲療手足忽生疣目方蒴藋赤子挼使壞疣目上塗之即去范汪同又方以鹽塗疣上令牛舐之不過三度出第五卷中近效療疣子法以墨塗之不過五度即差又方以屋澑下水塗疣上韋給事方去黑子方二首集驗去黑子及贅方生藜蘆灰五升生薑灰五升石灰二升半右三味合和令調蒸令氣澑取甑下湯一斗從上淋之盡湯取汁於鐵器中煎減半更閙火煎以雞羽搖中即然斷藥成欲去黑子疣贅先小傷其上皮令裁破以藥㸃之此名三灰煎祕方古今録驗范汪同出第九卷中救急去黑子方夜以暖漿水洗面以布揩黑子令赤痛挑動黑子水研白栴檀取濃汁以塗黑子上旦又復以暖漿水洗面仍以鷹屎粉其上出第三卷中疣贅疵黑子雜療方六首深師灰煎療瘤贅瘢痕疵痣及癰疽惡肉等方石灰一斗五升濕桑灰四斗柞櫟灰四斗右三味合九斗五升以沸湯令浥浥調濕內甑中蒸之從平旦至日中還取釡中沸湯七斗合甑三淋之澄清內銅器中煎令至夜斟量餘五斗汁微火徐徐煎取一斗洗亂髮乾之如雞子大內藥中即消盡又取五色綵剪如韭葉大量五寸著藥中亦消盡又令不強藥成以白罌子中貯之作藥時不得令婦人小兒雞犬臨見之灰煎亦療瘤驗其肉瘤石瘤藥敷之皆愈其血瘤瘤附左右胡脉及上下懸癰舌本諸險處皆不可令消消即血出不止殺人不可不詳之又療疣贅方取速讀子熟時壞破之以塗其上便落並出第二十九卷中千金療皮中紫赤疵痣靨穢方乾漆熬雌黃礬石各三兩熬巴豆五十枚炭皮一斤雄黃五兩右六味為散以雞子白和塗故綿貼病上日二易之即除深師加莽草三兩餘同出第二十四卷中又療疣贅疵痣方雄黃硫黃真珠礬石熬䕡茹巴豆去皮心藜蘆各一兩右七味為散以漆和令如泥以塗貼病上頃成瘡及去面上黑子㸃之即去深師同出第二十四卷中古今録驗療黑子去疣等五灰煎方石灰蒴藋灰桑灰炭灰菌灰各一升右五味以水溲蒸令氣匝仍取釜中湯淋取清汁五升許於銅器中東向竈煎之不得令雞犬小兒女人穢者見之膏成好凝強如細沙糖即堪用量以㸃封之出第五卷中廣濟療疣贅赤黑疵痣靨穢瘡疽息肉強結瘤等神效灰煎方炭灰三升湯拌令濕徹以熱湯漬令半日後還以湯淋之稍稍㸃湯不得太速下即灰汁不驗候汁下得三二升即內一小鐺中煎令一兩沸即别取一兩石灰風化者為佳恐中濕者須熬令極熱內灰汁中和煎以杖箄攪之勿住手候如煎餅麵少許細細取成膏急㵼著一瓷器中攪令冷不然須臾乾燥不堪用常候此煎十分有一分堪久停但有傷損肉色須臾變赤黑色痛如火燒狀若灸瘢發焮經二十餘日病自然脫落無瘢痕欲衝風冷逺行貼烏膏亦神效痂亦易落瘡未差間忌小豆薑外縱有瘢亦不凸出烏膏在二十四卷中滅瘢痕方一十七首廣濟療人面瘢痕滅之方取白雞以油脂和水煮小麥令熟純以飼雞三兩日大肥安雞著版上作籠籠之七日莫與雞食空飼清水七日取猪脂去脉膜切噉飼如食糞皆凝白開收暖水取塗瘢上十度平復舊欲用塗以粗葛布揩微赤離離訖然後塗之男女俱用效也又療人面及身瘡瘢不滅方鷹白糞爛腐骨尿白鹹各四分麝香二分右四味研令如粉以葛布揩令赤微離離以脂和敷之日二度差止並出第五卷中劉㳙子六物滅瘢膏方衣中白魚雞屎白鷹糞白芍藥白斂白蜂等分右藥研如粉以乳汁和塗瘢上日三良出第五卷中小品滅瘢方雞矢白一兩辛夷四分白附子二分細辛二分右四味酒浸一宿以羊脂六合微火煎三上三下去滓傷瘢以甘草洗訖塗之一方有桂心二分又方鷹屎白一兩研白蜜和塗瘢上日三並出第十卷中千金翼凡面靤瘡瘢三十年以上并冷瘡薑瘢金瘡等方斑猫三枚去足翅熬巴豆三枚去心皮蜜陀僧胡粉二兩鵝脂三兩煎金􅑭洮沙三兩髙良薑三兩去皮海蛤三兩取中者右八味為粉用鵝脂和夜半塗之旦以甘草湯洗之差止出第五卷中救急滅瘢方猪脂三斤飼烏雞令三日使盡收取白矢內白芷當歸各一兩煎白芷令黃去滓內鷹矢白二分攪令調塗之旦洗之千金同又方蒺藜子山梔子仁各一合右二味為散醋漿和如泥臨卧時以塗之旦洗之千金同又方痕凸出秋冬小麥麵春夏大麥麵下篩令細以酥和封之良千金同又方夏以熱瓦尉冬以凍凌尉之千金同又方鷹矢白一兩白魚二七枚右二味為散蜜和塗之日三即差千金同又方鷹矢白十分白殭蠶八分右二味研如粉白蜜和敷之日三差慎五辛肥膩生冷物千金同又方臘月猪脂四升煎大鼠一枚令消盡以生布摩傷以塗之日四五過千金同並出第三卷中必效滅瘢方禹餘糧半夏右二味等分末以雞子黃和之先以新布拭瘢上令赤以塗之勿令見風二十日滅矣十年瘢無不愈平復如故救急范千金同又療灸瘡及金瘡凡百瘡瘢能令髙者平下者起方雞屎白鷹屎白各二合辛夷仁四分白附子杜若各三分細辛二分右六味下篩以赤蜜少少和先以布揩瘢微破塗之日二差後忌五辛小豆油膩及酢飲酒等若慎口味如大小淺深無不差一本無杜若有桂心並出第四卷中古今録驗療面上瘢滅之方白殭蠶一兩珊瑚一兩白芷一兩雞矢白一兩朱砂一兩研右五味搗蜜和敷之尤良又方木蘭香一斤以三歲米醋浸令沒百日出暴乾搗末以塗之一方用醋漿水浸百日出暴乾末服方寸匕日再出第三卷中外臺祕要方卷二十九
