即安出第五卷中古今録驗療婦人墮娠血不盡來去喜煩滿鹿角屑豉湯方鹿角一兩屑熬香豉一升半右二味以水三升煮令三沸漉去滓然後內鹿角屑攪令調頓服須㬰血下出第三十七卷中數墮胎方四首刪繁療婦人懷胎數落而不結實或寒冷熱百病之源黃耆散方黃芪吳茱茰乾薑人參甘草炙芎藭白术當歸乾地黃各二兩右九味搗散清酒服一匕半日再服加至兩匕為劑忌海藻菘菜蕪荑桃李雀肉等經心録同出第七卷中千金療妊娠數墮胎方妊娠三月灸膝下一寸七壯又方赤小豆末酒服方寸匕日二亦主妊娠數月月水尚來者並出第三卷中經心録紫石門冬丸主風冷在子宫有子常落或始為婦便患心痛乃成心疾月水都未曽來服之肥悅令人有子方逺志去心澤㵼肉蓯蓉桂心各二兩紫石英天門冬去心五味子三兩禹餘糧蜀椒汗烏頭炮卷柏烏賊骨寄生石楠當歸各一兩杜仲甘草炙石斛柏子仁辛夷人參各二兩雲母一兩燒右二十二味末之以蜜丸酒服二十丸如梧桐子稍加至三十四十丸日三忌海藻菘菜猪肉冷水生葱鯉魚千金同出第六卷中妊娠得病欲去子方三首小品療妊娠得病事須去胎方通按麥芽神曲墮胎如神凡有孕者不可妄用麥蘖一升末和煮二升服之即下神效又方七月七日法麴三升煮兩沸宿不食旦頓服即下並出第二卷中文仲療妊娠得病欲去胎方取雞子一枚以三指撮鹽置雞子中服之立出此與阮河南療産難同出第七卷中肘後千金經心録同落胎去胎方四首廣濟療落胎方栝樓四兩桂心五兩牛膝三兩瞿麥二兩右四味切以水七升煎取二升三合去滓分三服服别如人行八九里進之無忌又方取牛膝六七莖綿纒捶頭令碎深內至子宫頭忌生葱猪牛肉並出第三卷中小品療羸人欲去胎方甘草炙乾薑人參芎藭生薑桂心蟹瓜黃芩各一兩右八味切以水七升煮取二升分三服忌海藻菘菜生葱出第七卷中千金欲去胎方大麴五升清酒一升煮三沸去滓令盡分五服當宿勿食旦再服其子如糜令母肥盛無疾苦千金不𫝊出第三卷中産乳序論三首崔氏夫人生夀夭雖有定分中間枉橫豈能全免若調攝㑹理或可致長生若將護乖方乃胎乳傷促且中人之性識異𢎞逺言及産育情多鄙之都未知此道幽深博施處廣僕褰帷之暇頗敦經史逮乎藥術彌復關懷今歷選羣方兼申短思苟非切要詎能載録晚述職孤城空莊四絶尋醫訪道理闕多疑豈得坐而相守以俟其斃此書所記故緣於此蓋擬備諸私室未敢貽厥將來必有以為要亦所不隱也余因披閲巒公調氣方中見巒公北平陽道慶者其一妹二女並皆産死有兒婦臨月情用憂慮入山尋余請覔滑胎方余報言少來多遊山林未經料理此事然當為思量或應可解慶停一宿余輒憶想畜生之類緣何不聞有産死者淫女偷生賤婢獨産亦未聞有産死者此當由無人逼佐得盡其分理耳其産死者多是富貴家聚居女婦輩當由兒始轉時覺痛便相告報傍人擾擾令其驚怖驚怖畜結生理不和和氣一亂痛切唯甚傍人見其痛甚便謂至時或有約髻者或有力腹者或有冷水潠面者努力强推兒便暴出畜聚之氣一時奔下不止便致運絶更非他緣至且以此意語慶慶領受無所聞然猶苦見邀向家乃更與相隨停其家十餘日日晡時見報云兒婦腹痛似是産候余便教屏除牀案遍一房地布草三四處懸繩繫木作衡度髙下令得蹲當腋得憑當衡下敷慢氈恐兒落草悮傷之如此布置訖令産者入位語之坐卧任意為其說方法各有分理順之則全逆之則死安心氣勿怖强此産亦解人語語訖閉戶戶外安牀余共慶坐不令一人得入時時隔戶問之何似答言小痛可忍至一更令爛煮自死牝雞取汁作粳米粥粥熟急手攪使渾渾適寒溫勸令食三升許至五更將末便自産聞兒啼聲始聽人入産者自若安穩不異云小小痛來便放體長吐氣痛即止蓋任分和氣之效也慶問何故須食雞肉汁粥答云牝雞性滑而濡庶使氣滑故耳問何不與肉答云氣將下恐肉不卒消為妨問何故與粥答云若飢則氣上氣下則速産理不欲令氣上故耳慶以此為産術之妙所𫝊之處無不安也故知巒公隱思妙符神理然則日遊反支之類復何豫哉但以婦人怯弱臨産驚遽若不導以諸法多恐志氣不安所以簡諸家方法備題如左其間取捨各任量裁凡婦人産難必須先簡此書推所投月日知犯忌各須豫慎不得犯之其次應須帳幕皮醋藏衣等物之類並早經營入月即須使足若不豫備臨急用逮事必致闕唯舊經事者始逹此言豫備不虞古之善教也又凡産者雖是穢惡然將痛之時及未産已産皆不得令死喪汚穢家人來視之必産難若已産者則傷子又凡産法唯須熟忍不得逼迫要須兒痛欲出然後抱腰傍人不得驚擾浪作形勢但此事巒公法中已經商略無用師巫妄述已能橫相牽挽失其本性今故重述特宜防也崔氏年立成圖法一首女人年十三行年在庚申反支在正月七月禍害在南方離絶命在東南巽生氣在西南坤宜喚西南黃衣師看産産婦宜著黃衣卧西南首懸尸在辰戌日閉肚在辛八壯在申女人年十四行年在己亥反支在八月二月禍害在西南坤絶命在西南兑生氣在南方離宜喚南方赤衣師看産産婦著赤衣卧南首懸尸在卯酉日閉肚在壬八壯在癸女人年十五行年在戊午反支在三月九月禍害在西北乾絶命在東北艮生氣在北方坎宜喚北方黑衣師看産産婦宜著黑衣卧北首懸尸在寅申日閉肚在癸八壯在壬女人年十六行年在丁巳反支在四月十月禍害在東北艮絶命在西北乾生氣在東方震宜喚東方青衣師看産産婦宜著青衣卧東首懸尸在丑未日閉肚在申八壯在辛女人年十七行年在丙辰反支在五月十一月禍害在東方震絶命在北方坎生氣在東北艮