東首勿甲乙日起庚辛日生子勿著赤衣宜著黃衣卧無南首勿丙丁日起壬癸日生子勿著黃衣宜著白衣卧無四角首勿戊巳日起安置産婦法二首凡欲産時先以朱砂㸃産婦項後宛宛中又㸃鼻孔間柱兩傍宛宛中牛穿据處即向産處呪之曰此地空間安居産婦某姓就此吉處諸神擁護百鬼速去莫相觸忤三呪之訖即燒火於産處四方以井華水四器亦置産處四方各橫刀於水上其刀浮磨拭之又法捉一刀子先向産處呪曰一尺刀子七寸刃拒以反支而治運如此三呪訖釘刀子著産處地上然後坐産已上並出第十上卷中産難方二十四首崔氏凡婦人産難死生之候母面赤舌青者兒死母活母面赤舌赤口中沫出者母死兒活母脣口青口兩邊沫出者母子俱死文仲同出第十上卷中廣濟療難産三日不出者方取死鼠頭燒作屑井花水服千金崔氏救急同又方槐子十四枚蒲黃一合內酒中溫服須臾不生更服之千金集驗崔氏同又方吞生雞子黃三枚并少苦酒崔氏集驗備急文仲同又方吞皂莢子二枚亦效千金崔氏小品同並出第三卷中小品療産難歷日氣力乏盡不能得生此是宿有病方赤小豆二升阿膠二兩右二味以水九升煮豆令熟取汁內膠令煬一服五合不覺不過再即産崔氏千金同又方取馬銜一枚覺痛即令左手持之崔氏同又方取槐東引枝手把之崔氏同又方手捉鸕鷀頭甚驗崔氏同並出第七卷中集驗若日月未至而欲産者方末知母蜜和兔屎大服一丸痛不止更一丸千金崔氏小品同又方取夫衣帶五寸燒作灰酒服立下崔氏廣濟文仲同並出第七卷中備急療難産方取槐子吞三枚崔氏同又方取鑿柄入孔裏者燒末酒服之立下崔氏同又方弓弦三寸箭簳二寸各燒末酒服之崔氏同又方取羚羊角屑燒末酒服之千金崔氏同又若母已死兒子不出方但以水銀如彈丸格口內喉中捧起令下食頃又捧令起子便落崔氏同又方搗蒲根絞取汁一二升灌口中此亦治母生子死驗崔氏同又療母子俱死者産難及胎不動轉者方榆白皮三兩葵子五合甘草炙桂心各一兩右四味切以水四升煮取二升服一升須臾不産更服一升忌海藻菘菜生葱崔氏小品同又産難數日欲絶祕方書奏作兩行字凡二十字文日帝乙生子司命勿止即出其胞及其子無病其母封其中央以朱印之令産婦持之崔氏小品同又産難六七日母困方取好膠二兩清酒一升半微火煬膠內新雞卵一枚鹽一寸匕相和頓服即産不産更服崔氏同又産難母如死不知人事方用陳葵子末三指撮酒服口噤者去齒下藥即愈立驗崔氏同又療婦人産難方書紙曰坐為蒲卧為魚女屬母兒屬夫急急如律令即産婦吞之又書兩道兩手各執一凡書三本崔氏同並出第一卷中救急療産難方取厠前用草二七枚燒作屑服之千金崔氏同崔氏云日用籌又方取牛屎中大豆書一片作入字一片作出字還合吞之良崔氏同並出第四卷中千金療難産方令夫唾婦口中二七過立下集驗崔氏同出第十卷中逆産方一十二首小品療逆産方鹽塗兒足底又可急搔瓜之并以鹽摩産婦腹上即愈崔氏千金集驗同又方鹽和粉塗兒兩足下即順矣千金崔氏同又方又彈丸二枚搗末三指撮溫酒服集驗千金崔氏同並出第七卷中集驗療逆産方燒錢令赤內酒中飲之崔氏同又方夫隂毛二七枚燒以猪膏和丸如大豆吞兒手即持丸出神驗千金崔氏同又方朱書左足下作千字右足下作黑字崔氏同又方生不出手足先見燒蛇脫皮末服刀圭亦云三指撮面向東酒服即順崔氏千金同又方真丹刀圭塗兒腋下崔氏同又方以手中指取釜底黑煤交畫兒足下順出千金文仲崔氏備急同並出第十一卷中刪繁療逆産難産數日不出者方取桃仁中破書一片作可字一片作出字還合吞之崔氏同又療逆産方取車肚中膏畫腋下及掌心崔氏文仲備急小品千金集驗同又療逆産胞衣不出方取竈屋上黑塵酒服之千金崔氏同並出第七卷中橫産方四首小品療橫産及側或手足先出方可持粗針刺兒手足入二分許兒得痛驚轉即縮自當回順文仲備急千金崔氏集驗同集驗療橫生方取梁上塵三指撮酒服之千金文仲崔氏同出第十一卷文仲療縱橫不可出用莵絲子末酒若米汁服方寸匕即出車前子亦好服如上法千金崔氏同又方服水銀如大豆一枚備急崔氏同右以前橫産逆産二條條流雖别療法蓋同可以意量逐善參用也子死腹中欲令出方一十五首集驗療子死腹中方真珠二兩酒服盡立出崔氏同又方取竈下黃土三指撮酒服之立出當著兒頭上千金崔氏文仲同又療胎死在腹方取三家雞卵各一枚三家鹽各一撮三家水各一升合煮令産婦面東向飲之立出千金備急崔氏同又方取矍麥一斤以水八升煮取二升分再服不出更服文仲千金崔氏同又方葵子一升阿膠五兩水五升煮取二升頓服出間日又服崔氏千金文仲備急同並出第十一卷中崔氏療子胎在腹中恐死不下方當歸芎藭各二兩右二味以好釅醋二升煮藥二十沸頓服之若胎已死即下如胎未死即便安穩也又療子死腹中又妊兩兒一兒活一兒死令腹中死者出生者安此方神驗萬不失一蟹瓜一升甘草二尺炙切阿膠三兩炙右三味以東流水一斗先煮二味取三升去滓內膠令煬頓服不能頓服分再服若人困校口下藥入即汗煎藥宜東向竈以茅葦薪煮之集驗廣濟千金備急文仲同又療妊身熱病子死腹中又出之方烏頭一枚右一味細搗水三升煮取大二升稍稍摩臍下至隂下胎當立出又方以苦酒濃煮大豆一服一升死兒立下不能頓服再服之亦得千金同又療子胎在腹內已死方甘草一尺炙蒲黃一合筒桂四寸香豉二升雞子一枚右五味切以水六升煮取一升頓服胎胞穢惡盡去大良千金集驗同並出第十卷中文仲療或半生胎不下或子死腹中或半著脊及在草不産血氣上蕩心母面無顔色氣欲絶方猪膏一升煎白蜜一升淳酒二升右三味合煎取二升分再服不能隨所能服之備急刪繁千金崔氏同又子死腹中不出方以牛屎塗母腹上立出備急崔氏千金同又方榆皮切一兩珍珠一兩右二味以苦酒三升煮取一升頓服死兒立出集驗千金備急崔氏同並出第二卷中救急療子死腹中方服水銀三兩立出集驗千金備急文仲小品同又方取夫尿二升煮令沸飲之集驗千金崔氏同並出第四卷中胞衣不出方二十首廣濟療胞衣不出方末竈突中土三指撮以水服之集驗千金備急文仲同又方取夫單衣蓋井上立出千金集驗救急崔氏小品同又療胞衣不出方取苦酒服赤米一兩千金集驗崔氏同又方雞子一枚苦酒一合和飲之即出集驗千金崔氏同又方當戶燒黍穰即出崔氏同並出第二卷中小品療胞衣不出方取皂莢搗末著鼻孔中嚏即出崔氏同又方鹿角末三指撮酒服之崔氏同又方兒衣不出吞此符吉延年療婦人傷娠及胎死腹中胞衣不出産後疾病及諸困竭欲死方刺取羊血及熱飲之不能者人含吐與之能多益善若不能咽噉少鹽又水潠其面此方神驗崔氏文仲備急同又胞衣不出方以洗兒水服半柸即出崔氏同又療胞衣不出腹中滿則殺人方但多服猪膏又大豆一升苦酒一斗煮取三升分三服崔氏同又方吞雞子黃兩三枚解髮刺喉中令得嘔即出若困極死者以水一升煮栝樓一枚三兩沸寫口中汁下即出出第十四卷中崔氏云水一升煮螻蛄一枚三沸服救急療胞衣不出并兒橫到死腹中母氣欲絶方半夏二兩洗白斂二兩右二味搗篩服方寸匕小難一服橫生二服到生三服兒死四服亦可加代赭瞿麥各二兩廣濟集驗小品備急文仲崔氏同又方小豆小麥相和濃煮汁飲之立出小品千金備急崔氏同又療胞衣不出方取炊箄當戶前燒之廣濟集驗千金崔氏同出第四卷中必效療胞衣不出令胞爛牛膝湯方牛膝四兩滑石八兩當歸三兩通草六兩葵子一升矍麥四兩右六味切以水九升煮取三升分三服忌牛狗內廣濟集驗千金崔氏同通草一方作莾草又方服蒲黃如棗大良集驗千金崔氏同又方生男吞小豆七枚生女吞二七枚千金崔氏並同又方生地黃汁一升苦酒三合暖服之不能頓服再服之集驗千金崔氏同又方澤蘭葉三兩滑石五兩屑生麻油二合右三味以水一升半煮澤蘭取七合去滓內滑石生麻油頓服廣濟集驗千金崔氏同並出第四卷中已上三符主産難産婦吞之吉産難燒此符水和服之吉逆産橫産吞此符右出崔氏産書外臺祕要方卷三十三
