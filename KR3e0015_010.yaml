body:
  text: 外臺秘要方卷六唐王燾撰霍亂病源論三首病源霍亂者由人温涼不調陰陽清濁二氣有相干亂之時其亂在於腸胃之間者因遇飲食而變發則心腹絞痛其有先心痛者則先吐先腹痛者則先痢心腹並痛者則吐痢俱發挾風而實者身發熱頭痛體疼而復吐痢虚者但吐痢心腹刺痛而已亦有飲酒食肉好飡腥膾生冷過度或居處不節或露卧濕地或當風取涼而風冷之氣歸於三焦傳於脾胃脾胃得冷則不磨不磨則水穀不消化亦令清濁二氣相干脾胃虚弱便生吐痢水穀不消則令心腹脹滿皆成霍亂霍亂有三名一名胃反言其胃氣虚逆反吐飲食也二名霍亂言其病揮霍之間便致撩亂也三名走哺言其哺食變逆者也診其脈來代者霍亂又脈代而絶者亦霍亂霍亂脈大可療微細不可療霍亂吐下脈微遲氣息劣口不欲言者不可療也養生方云七月食蜜令人暴下發霍亂出第二十二卷中千金論曰原夫霍亂之為病也皆因食飲非闗鬼神飽食肫膾復飡乳酪海陸百品無所不啖眠卧冷席多飲寒漿胃中諸食結而不消陰陽二氣擁而反戾陽氣欲降陰氣欲升陰陽乖隔變成吐痢頭痛如破百節如解遍體諸筋皆為迴轉論證雖小卒病之中最為可畏雖臨深履危不足以喻之也養生者宜達其㫖趣庶可免於天横者矣又凡霍亂務在温和將息若冷則遍體轉筋凡此病定已後一日不食為佳仍須三日少少喫粥三日以後乃可恣意食息也七日勿雜食為佳所以養脾氣也出第二十卷中霍亂吐痢方一十二首廣濟療霍亂吐痢扁豆湯方扁豆葉一升香薷葉一升木𤓰一枚乾薑一兩右四味以水六升煮取二升五合絞去滓分温三服服别相去如人行六七里並無所忌又療冷熱不調霍亂吐痢宿食不消理中丸方人參八分白术八分甘草八分炙乾薑六分高良薑八分桂心六分右六味擣篩蜜丸空腹以飲下梧子大三十丸日二服漸加至四十丸老小以意減之忌生冷油膩生葱海藻菘菜桃李雀肉等物又療霍亂冷熱不調吐痢高良薑湯方高良薑五兩木𤓰一枚杜梨枝葉三兩右三味切以水六升煮取二升絞去滓空腹温三服服别如人行六七里無所忌並出第四卷中小品霍亂吐痢心煩亂髪湯主之亂髪一握燒焦人參一兩呉茱茰一升甘草一兩炙右四味切以水三升酒二升煮取二升絞去滓温服五合忌海藻菘菜又療霍亂吐痢已服理中及四順湯不解者以竹葉湯方竹葉一虎口小麥一升生薑十兩甘草一兩炙人參一兩附子一兩炮肉桂二兩當歸二兩芍藥一兩白术三兩橘皮二兩右十一味以水一斗半先煮小麥竹葉取八升汁去滓内諸藥煮取二升半分三服吐痢後腹滿加厚朴二兩炙上氣加呉茱萸半升差理中四順則大熱熱毒霍亂宜竹葉湯忌生葱海藻菘菜猪肉桃李雀肉等千金古今錄驗並同又霍亂吐痢而汗出小便復利或下利清穀裏外無熱脈微欲絶或惡寒四肢拘急手足厥逆四逆加猪膽湯主之方甘草二兩炙乾薑半兩炮附子一枚生猪膽汁半合右四味切以水二升煮取一升四合温分再服無猪膽以羊膽代之强人可與大附子一枚乾薑加至三兩若吐之後吸吸少氣者及下而腹滿者加人參一兩諸藥皆減為一兩如證者亦宜與理厥人參湯佳忌海藻菘菜猪肉删繁千金經心錄同又四順湯與前療同常用此方人參三兩乾薑三兩甘草三兩附子二兩右四味切以水六升煮取二升絞去滓温分三服轉筋肉冷汗出嘔噦者良忌海藻菘菜猪肉千金同刪繁范汪方云利甚者加龍骨二兩炒又白丸療霍亂嘔吐及暴痢良方半夏三兩洗附子四兩炮乾薑四兩炮人參三兩桔梗二兩右五味作散臨病和之若吐痢不止者以苦酒和之飲服二丸如梧子不差復服耐藥者加之以意下者用蜜和丸亦得忌猪羊肉餳范汪同並出第四卷中崔氏理中丸療三焦不通嘔吐不食并霍亂吐逆下痢及不得痢悉主之方人參三兩乾薑二兩炮白术三兩甘草三兩炙右四味擣篩蜜和丸如梧子平旦取粥清服五丸日再服一方乾薑三兩忌海藻菘菜桃李雀肉等出第二卷中延年理中丸療霍亂吐痢宿食不消方白术二兩乾薑二兩炮人參二兩甘草二兩炙大麥蘖二兩炒黄右五味擣篩蜜和為丸以飲服十五丸如梧子大日再服稍加至二十丸忌海藻菘菜桃李雀肉等出第六卷中必効理中散主霍亂及轉筋吐痢不止方青木香六分桂心八分炙厚朴八分炙甘草八分炙白术八分乾薑十分炮附子六分炮右七味擣篩為散飲服兩錢匕如人行五六里不定更服一錢匕差止忌海藻菘菜生葱猪肉桃李雀肉等又方若熱霍亂則渴心煩欲得冷水喫則宜恣意飲冷水及土漿取足定止霍亂臍上築方三首病源霍亂而氣築悸者由吐下之後三焦五藏不和而水氣上乘於心故也腎主水其氣通於陰若吐下則三焦五藏不和故脾氣亦虚不能制水水不下宣與氣俱上乗心其狀起臍下上從腹至心氣築築然而悸動不定也出第二十二卷中仲景論霍亂臍上築者腎氣動也先療氣理中湯去术加桂凡方加术者以内虚也加桂者恐作奔豚也理中湯方人參二兩甘草三兩炙白术三兩乾薑三兩炮右四味切以水八升煮取三升去滓温服一升日三夜一若臍上築者腎氣動也去术加桂心四兩吐多者去术加生薑三兩若下多者復用术悸者加茯苓二兩若先時渴喜得水者加术合前成四兩半若腹中痛者加人參合前成四兩半若惡寒者加乾薑合前成四兩半若腹滿者去术加附子一枚炮去皮破六片服湯後一食頃飲熱粥一升許汗微出自温勿發揭衣被也忌海藻菘菜桃李雀肉等千金備急文仲崔氏集驗必効小品古今錄驗並同又霍亂臍上築者以吐多故也若吐多者理中湯主之方如前法加減霍亂四逆吐少嘔多者附子粳米湯主之方附子一枚炮半夏半升洗甘草一兩炙大棗十枚粳米半升右五味切以水八升煮米熟去滓温服一升日三忌羊肉猪肉海藻菘菜餳一方有乾薑一兩小品千金同出第十七卷中范汪療霍亂臍上築而悸茯苓理中湯方茯苓二兩甘草三兩炙乾薑一兩炮人參三兩木𤓰三兩右五味㕮咀以水六升煮取三升去滓適寒温分為四服忌海藻菜酢物出第四卷中霍亂腹痛吐痢方七首廣濟療霍亂腹痛吐痢方取桃葉切三升以水五升煮取一升三合分温二服出第四卷中范汪理中加二味湯療霍亂胷滿腹痛吐下方人參三兩乾薑三兩炮甘草三兩炙白术三兩當歸二兩芍藥二兩右六味㕮咀以水七升煮取三升絞去滓温服一升日三甚良忌海藻菘菜桃李雀肉等又主霍亂腹痛吐下方取桃葉冬取皮煎汁服一酒柸有効千金云擣絞取汁一升服立止出第四卷中千金理中湯療霍亂吐下脹滿食不消心腹痛方人參三兩白术三兩甘草三兩炙乾薑三兩右四味以水六升煮取三升絞去滓温分三服不差頻進兩三劑逺行防霍亂作丸如梧子服二十丸散服方寸匕酒亦得若轉筋者加石膏三兩忌海藻菘菜桃李雀肉等與前仲景方同加減别備急集驗小品文仲古今錄驗同出第二十卷中備急療霍亂吐痢高良薑酒方高良薑火炙令焦香每用五兩打破以酒一升煮取三四沸頓服亦療霍亂腹痛氣惡崔氏延年同出第一卷中救急療霍亂初覺不好則用此方主腹痛吐痢香薷湯方生香薷切一升小䔉一升碎厚朴六兩炙生薑十兩右四味切以水一斗煮取三升分三服得吐痢止每服皆須温如吐痢不止用後方又蘆根湯方生蘆根切一升生薑一斤橘皮五兩右三味切以水八升煮取二升分二服服别相去以意消息之并出第一卷中霍亂不止及洞下洩痢方八首病源霍亂而下痢者是冷氣先入於腸胃腸胃之氣得冷則交擊而痛故霍亂若先腹痛者則先下痢也出第二十二卷中廣濟療霍亂不止方取酢漿水三升煮取一升五合内米粉一抄攪調分二服服别相去如人行三四里出第四卷中小品霍亂卒吐下不禁脈暴數者人參湯主之方人參二兩茯苓二兩葛根二兩橘皮二兩麥門冬去心二兩甘草二兩炙右六味切以水五升煮取二升絞去滓温分三服忌海藻菘菜酢物出第四卷中刪繁療霍亂洞泄不止臍上築築腎氣虚人參理中湯方人參乾薑甘草炙各三兩茯苓四兩橘皮四兩桂心三兩黄耆二兩右七味切以水九升煮取三升去滓分温三服忌海藻菘菜生葱醋物肘後云洞者宣瀉也出第四卷中又療中焦虚寒洞泄人參湯補虚泄方人參三兩甘草二兩炙黄芩二兩當歸三兩茯苓四兩乾薑四兩厚朴四兩炙芎藭三兩粟米二升右九味切以水一斗五升煮米取熟去米澄取七升下諸藥煎取三升分三服忌海藻菘菜大酢等物又療中焦洞泄下痢或因霍亂後瀉黄白無度腹中虚痛黄連湯方黄連四兩黄蘗三兩當歸三兩厚朴二兩石榴皮四兩乾薑三兩地榆四兩阿膠四兩右八味切以水九升煮取三升去滓下阿膠更煎取烊分三服忌猪肉冷水並出第四卷中千金療霍亂洞下不止方取艾一把水三升煮取一升頓服之備急同出第二十卷中延年増損理中丸主霍亂下氣能食止洩痢方人參六分白术六分厚朴六分炙茯苓六分甘草六分炙薑屑二分右六味擣篩蜜和為丸如梧子大一服十丸飲下酒下亦得加至十五二十丸忌生冷海藻菘菜桃李雀肉大醋出第六卷中必効療霍亂水痢腹中雷鳴無不差烏梅黄連散方烏梅肉三兩黄連三兩熟艾葉三兩赤石脂二兩當歸三兩甘草三兩炙附子二兩炮阿膠三兩炒右八味擣篩為散有患者每服二方寸匕疑熱則飲下疑冷則酒下忌海藻菘菜猪肉冷水出第二卷中霍亂後脈絶手足冷方四首病源霍亂而大吐下後其腸胃俱虚乃至汗出其脈欲絶手足皆冷名為四逆四逆者謂陰陽卒厥絶也出第二十二卷中仲景傷寒論既吐且痢而大汗出小便復利或下利清穀裏寒外熱脈微欲絶或發熱惡寒四肢拘急手足厥逆者四逆湯主之方甘草二兩炙附子一枚生乾薑一兩半右三味切以水三升煮取一升二合去滓温分二服加減依後法忌海藻菘菜猪肉千金同又吐已下斷汗出厥冷四肢拘急不解脈微欲絶者通脈四逆湯主之方甘草二兩炙大附子一枚乾薑三兩炮右三味以水三升煮取一升二合去滓温分二服其脈即出愈若而色赤者加葱九莖若腹中痛者去葱加芍藥二兩若嘔者加生薑二兩若咽痛者去芍藥加桔梗一兩若利止脈不出者去桔梗加人參二兩病皆與方相應乃合服之若吐利止身疼痛不休者消息和其外傷寒論中又有療諸發熱霍亂者審取之忌海藻菘菜猪肉仲景傷寒論上證合用通脈四逆加猪膽湯又吐利止身痛不休者消息和解其外宜桂枝湯小和之並出第十七卷中小品扶老理中散并作丸長服亦得療羸老冷氣惡心食飲不化腹虚滿拘急短氣及霍亂嘔逆四肢厥冷心煩氣悶流汗悉主之方人參五兩乾薑六兩白术五兩麥門冬三兩去心附子三兩炮茯苓三兩甘草五兩炙右七味作散臨病煮取三合白湯飲和方寸匕一服不効又服常將蜜丸酒服如梧子二十丸忌海藻菘菜猪肉桃李雀肉大醋千金同出第四卷中千金四逆湯主多寒手足厥冷脈絶方呉茱萸二升當歸三兩桂心三兩芍藥三兩細辛二兩通草二兩生薑八兩甘草二兩炙大棗十二枚右九味切水六升清酒六升合煮取三升分温四服舊方棗二十五枚今以霍亂法多痞故除之若除棗入葛根二兩佳忌生葱生菜海藻菘菜小品同仲景傷寒論此方名當歸四逆加呉茱萸生薑湯霍亂煩躁方八首病源霍亂之後煩躁卧不安者由吐下之後腑藏虚極隂陽未理血虛氣亂故血氣之行未復常度内乘於腑藏故煩躁而不得安卧也出第二十二卷中肘後霍亂後煩躁卧不安葱白大棗湯方葱白二十莖大棗二十枚右二味以水二升半煮取一升去滓頓服之文仲同又療霍亂心腹脹痛煩滿短氣未得吐下方生薑或乾薑一小升右一味㕮咀以水五升煮三沸頓服若不即愈可更作又方桂心屑半升以煖飲二升和之盡服忌生葱備急同出第二卷中文仲療霍亂煩躁方濃煮竹葉飲五升令灼灼爾以淋轉筋處肘後備急同又方服乾薑屑三兩方寸匕肘後備急同又方小䔉一升㕮咀水三升煮取一升頓服之肘後同並出第二卷中備急療霍亂煩躁方黄梁米粉半升水一升半和攪如白飲頓服糯米亦得又方燒亂髪如雞子大以鹽湯三升和服之不吐復服出第一卷中霍亂衆藥療不効方二首小品療霍亂諸藥不能療亂髪湯方亂髪一握燒灰小䔉十四枚附子一兩炮甘草二兩炙右四味切以水六升煮取三升去滓温分三服忌猪肉海藻菘菜出第四卷中千金人參湯療毒冷霍亂吐痢煩嘔轉筋虚冷汗出手足指浮腫氣息垂死絶語音聲不出百方不効脈不通者服此湯取差乃止隨吐者續更服勿住方人參附子炮厚朴炙茯苓甘草炙橘皮當歸葛根各二兩桂心乾薑炮各三兩右十味以水七升煮取二升半分温三服忌海藻菘菜生葱大酢出第二十卷中乾濕霍亂及痰飲方五首病源霍亂者多吐痢也乾霍亂者冷氣摶於胃飲食不消但腹滿煩亂絞痛短氣其腸胃先挾實故不吐痢名為乾霍亂也出第二十二卷中救急療霍亂無問乾濕冷熱等木香湯方青木香長三寸高良薑二兩豆蔲子二枚右三味㕮咀以水一大升煮取半升頓服之則定又方取烏牛屎二兩以水二升煮沸絞濾頓服之大良又生薑湯方以東壁土一把生薑一大兩碎之右二味用水一大升煮取半升澄清熱飲之如渴依前進並出第一卷中必効療上吐下痢者名為濕霍亂方黄牛屎半大升許取水一大升煮三兩沸和牛屎濾取汁服半升即止犂牛子屎亦佳無牛處常將乾者相隨亦好用備急崔氏范汪同出第三卷中又四神丸主霍亂冷實不除及痰飲百病無所不主方乾薑一兩桂心一兩附子一兩炮巴豆六十枚製右四味末之蜜和為丸如小豆大飲服二丸取快下不下又服一丸忌生葱野猪肉蘆笋胡洽同出第四卷中霍亂心腹痛方三首病源霍亂而心腹痛者是風邪之氣客於藏腑之間冷氣與真氣相擊或上攻心或下攻腹故心腹痛也出第二十二卷中厚朴四兩炙橘皮二兩人參二兩高良薑一兩當歸一兩藿香一兩右六味以水七升煮取二升五合絞去滓分温三服服别相去如人行六七里忌生冷粘膩出第四卷中肘後療霍亂苦絞痛不止方薑二累豉二升合擣中分為兩分手捻令如粉熬令灼灼爾更番以熨臍中取愈並第一卷中千金霍亂蠱毒宿食心腹痛冷氣鬼氣方極鹹鹽湯三升一味霍亂心腹暴痛宿食不消積冷煩滿者熱飲一升以指刺口令吐宿食使盡不盡更刺吐訖復飲三吐佳静止此法大勝諸藥俗人以為田舍淺近法鄙而不用守死而已凡有此疾即須先用之備急崔氏集驗文仲並同出第二十卷中霍亂煩渴方四首病源霍亂而煩渴者由大吐逆上焦虚氣不調氣乗於心則煩悶也大利則津液竭津液竭則藏燥藏燥則渴也煩渴不止則引飲引飲則利亦不止出第二十二卷中肘後療霍亂吐下後大渴多飲則殺人方黄梁米五升水一斗煮之令得三升汁澄清稍稍飲之勿飲餘飲備急同糯米亦得出第二卷中備急近効療霍亂不吐不下食氣急而渴方木𤓰一枚切以水四升煮取二升細細飲盡更作吐不止者亦差若止唯飲此湯佳根莖亦可用此湯令人吐崔氏張文仲同出第一卷中必効霍亂渴方糯米二升濤取泔飲訖則定若不渴不須一方渴者服之并當飽又云研糯米取白汁恣意飲之以差為度涇陽崔尉云竒効偏主乾霍亂出第三卷中又療霍亂後渴口乾腹痛不止者厚朴桂心湯方厚朴四兩炙桂心二兩右二味切以水四升煮取一升二合絞去滓内分六合細細飲之服了如其渴欲得冷水盡意飲之長安傳少府常服忌生葱出第二卷中霍亂乾嘔方五首病源霍亂而乾嘔者由吐下之後脾胃虚極上焦不理氣痞結於心下氣時逆上故乾嘔乾嘔者謂欲嘔而無所出也若更遇冷冷折胃氣胃氣不通則變噦也出第二十二卷中肘後療苦嘔不息方取薤白一虎口切以水三升煮令得一升半服之不過三度備急同又乾薑茱萸湯方乾薑切茱萸各二兩熬右二味以水二升煮取一升頓服之下不止手足逆冷者加椒百粒附子一枚炮水三升煮取一升頓服出第二卷中刪繁療霍亂後不欲食胃弱嘔吐不止厚朴湯方厚朴四兩炙乾扁豆葉二兩茯苓三兩白术五兩人參三兩右五味切以水七升煮取二升分三服忌桃李大醋雀肉等出第二卷中千金療霍亂引飲後輒乾嘔方生薑五兩水五升煮取二升半分二服又煮高良薑飲之大佳延年祕錄備急小品崔氏張文仲同出第二十卷中經心錄療霍亂後煩嘔厚朴湯方厚朴二兩炙生薑三兩枳實三兩炙右三味切以水六升煮取二升分三服出第二卷中霍亂轉筋方一十四首病源霍亂而轉筋者由冷氣入於筋故也足之三隂三陽之筋起於足指手之三陰三陽之筋起於手指並循絡於身夫霍亂大吐下之後陰陽俱虚血氣虚極則手足逆冷而榮衛不理冷摶於筋則筋為之轉冷入於足之三陰三陽則脚筋轉入於手之三陰三陽則手筋轉隨冷所入之筋筋則轉轉者由邪冷之氣擊動其筋而移轉也又轉筋者由榮衛氣虚風冷摶於筋故也手足之三陰三陽之筋皆起於手足指而並絡於身若血氣不足陰陽虚者風冷邪氣中其筋隨邪所中之筋筋則轉轉者謂其轉動也經云足太陽下血氣皆少則喜轉筋若腫下痛者是血氣少則陽虚虚而風冷乘之故也診其左手闗上肝脈也沈為隂隂實者肝實也苦肉動轉筋左手尺中名神門以後脈足少陰經也浮為陽陽虚者病苦轉筋其湯熨針石别有正方補養宣導今附於後養生方導引法云偃卧展兩脛兩手外踵者相向令鼻内氣自極七息除兩膝寒脛骨疼轉筋又云覆卧傍視立兩踵伸腰鼻内氣去轉筋又云張脛兩足指號五息止令人不轉筋極自用力張脚痛挽兩足指號言寛大去筋節急攣躄痛久行身開張又云覆卧傍視立兩踵伸腰以鼻内氣自極七息除脚中弦痛轉筋酸疼一本云療脚弱出第二十二卷中廣濟療霍亂吐痢轉筋欲入腹高良薑湯方高良薑四兩桂心四兩右二味切以水七升煮取二升去滓分三服如人行四五里一服忌生冷生葱又療霍亂轉筋不止茱萸湯方呉茱茰一升甘草二兩炙乾薑二兩炮蓼子一把亂髪一兩燒桂心二兩右六味切以水七升煮取二升三合絞去滓分温三服服别相去如人行六七里忌生葱海藻菘菜生冷粘膩等又療轉筋方取故綿多取釅醋甑中蒸及熱用褁病人脚冷更易勿停差止千金同並出第四卷中肘後療兩臂脚及胷脅轉筋者方取鹽一升半水一斗煮令熱灼灼爾漬手足在胸脅者湯洗之轉筋入腹中到擔病人令頭在下腹中平乃止若劇者引隂陰縮必死猶在到擔之可兾活耳又方煮苦酒三沸浸氈褁轉筋上合少粉尤佳又以綿纒膝下至足崔氏集驗備急同又若轉筋入腹中轉者方取雞屎白一方寸匕水六合煮三沸温頓服勿令病者知仲景經心錄備急集驗必効同又若霍亂注痢不止而轉筋入腹欲死者方生薑三兩擣破以酒一升煮三四沸頓服之肘後小品備急同出第二卷中刪繁療舌强筋縮牽陰股引胷腹脹痛霍亂黄龍藤湯方黄龍藤切一升此樟木上藤也斷以吹氣從中貫度者好也右一物以水四升煮取八合為一服一劑不止更至一劑良驗或宿食不消霍亂或乾霍亂或吐痢不止或不吐痢並悉療之出第三卷中千金霍亂轉筋入腹不可奈何方極鹹作鹽湯於糟中煖漬之則差小品集驗同又方以醋煮青布㩉脚膝冷復易之備急文仲崔氏小品集驗救急同又方蓼一把去兩頭以水二升煮取一升頓服一方云梨葉文仲小品備急同出第二十卷中救急霍亂脚轉筋絶四肢已冷强氣絶心上微暖者猶可救之方取朱砂二兩熟研䗶三兩和之為丸待冷著火籠中如熏衣被厚覆勿令煙洩兼牀下著火令腹微暖徹良久當汗則漸氣通便活忌生血物出第一卷中必効主霍亂脚轉筋及入腹方以手抝所患脚大母指灸當脚心下急筋上七壯又方木𤓰子根皮合煮湯服之並出第三卷中霍亂雜灸法二十六首肘後療霍亂先腹痛者法灸臍上十四壯名太倉在心厭下四寸更度之千金備急崔氏古今錄驗並同通按銅人經中管一名太倉在臍上四寸胃募也又療先洞下者法灸臍邊二寸男左女右十四壯甚者至三十四十壯名大腸募也千金備急崔氏古今錄驗同又療轉筋者法灸脚心下名湧泉又灸當足大母指聚筋上六七壯神騐又灸足大指下約中一壯千金及翼同又療轉筋入腹痛者法令四人捉手足灸臍左二寸十四壯又灸股中大筋上去陰一寸又療苦啘方法灸手腕第一約理中七壯名心主當中指又療下痢不止者法灸足大指本節内側一寸白肉際左右七壯名大都千金同通按銅人經大都二穴在足大指本節後陷中又療吐且下痢者法灸兩乳邊連黒外近腋白肉際各七壯可至二七壯又療苦煩悶急滿法灸心厭下三寸七壯名胃管文仲同又法以鹽内臍中灸上二七壯文仲千金翼同又療苦繞臍痛急者法灸臍下三寸三七壯名闗元良文仲同又療先吐者方灸心下一寸十四壯又并療下痢不止上氣灸五十壯名巨闕正心厭尖頭下一寸是也千金翼文仲崔氏備急同通按銅人經巨闕在鳩尾下一寸心之募也又療霍亂神秘起死灸法以物横度病人口中屈之從心鳩尾度以下灸度下頭五壯横度左右復灸五壯此三處併當先灸中央畢更横度左右也又灸脊上以物圍令正當心厭又夾脊左右一寸各七壯是腹背各灸三處崔氏文仲同又華佗療霍亂已死上屋喚魂者又以諸療皆至而猶不差者法捧病人覆卧之伸臂對以繩度兩肘尖頭依繩下夾背脊大骨空中去脊各一寸灸之百壯無不活者所謂灸肘椎空囊歸已試數百人皆灸畢即起坐佗以此術傳其子孫世世皆秘之不傳千金崔氏備急同並出第一卷中千金凡得霍亂灸之或時雖未立差終無死憂不可逆灸或但先腹痛或先下後吐當隨病灸之又療霍亂灸法灸穀門穴在臍傍二寸男左女右一名大腸募灸二七壯不止又灸如前數通按甲乙鍼經天樞一名長谿一名榖門夾臍兩傍各二寸陷者中又療吐下不禁兩手三陰三陽脈俱疾數者法灸心厭骨下三寸又灸臍下三寸各六七十壯又療乾嘔者法灸間使穴在手掌後三寸兩筋間左右各灸七壯不差更灸如前數翼文仲肘後同又療手足逆冷者法灸三陰交穴在足内踝直上三寸廉骨際陷中左右七壯不差更灸如前數肘後古今録騐同又療轉筋不止者法灸足踵聚筋上白肉際七壯立愈又療走哺轉筋者法灸踝白肉際左右各二十一壯又灸小腹下横骨中央隨年壯又療轉筋四厥者法灸兩乳根黒際各一壯又療轉筋在兩脅及胷中法灸手掌白肉際七壯又灸膻中中府巨闗胃管尺澤以上并療筋拘頭足攣急皆愈又療轉筋不止者法若是男子手挽其陰牽之女子挽其乳逐左右邊又療轉筋欲死者方令四人手持足灸臍上一寸十四壯自不動勿復持之又療霍亂泄痢所傷煩欲死者方灸慈宫各二十壯慈宫在横骨兩邊各二寸半横骨在臍下横門骨是也並出第二十卷中通按甲乙鍼經衡門一名慈宫上去大横五寸在横骨兩端約中動脈是救急療霍亂心腹痛脹吐痢煩悶不止則宜灸之方令病人覆卧伸兩臂膊著身則以小繩正當兩肘骨尖頭從背上量度當脊骨中央繩下㸃之去度又取繩量病人口至兩吻截斷便中折之則以度向所㸃背下兩邊各依度長短㸃之三處一時下火灸絶便定神驗艾炷大稍加也又療霍亂轉筋不止漸欲入腹凡轉筋能殺人起死之法無過於灸灸法唯三處要穴第一承筋穴在腨股下際取穴法以繩從脚心下度至脚踵便截斷度則迴此度從脚踵縱量向上盡度頭當腨下際宛宛中是穴灸三七壯則定又不止則灸涌泉在足心下當足大指中節後一寸半正當大筋上是穴又灸足跟後黒白肉交際當中央此三處要穴灸之不過二三七壯必定並出第一卷中三焦脈病論二首刪繁論曰夫三焦者一名三闗也上焦名三管反射中焦名霍亂下焦名走哺合而為一有名無形主五藏六腑往還神道周身貫體可聞不可見和利精氣決通水道息氣脾胃之問不可不知也凡上焦三管反射者通三焦名中清之腑也别號玉海水道出屬膀胱合者雖合而不同上中下三焦同號為孤之腑也而榮出中焦衛出上焦榮者是絡脈之氣道衛者是經脈之氣道也上焦如霧霧者霏霏起上也起於胃上管並咽以上貫膈布胷中走腋循足太陰之分而行還注手陽明上至舌下注足陽明常以榮衛俱行於陽二十五度行陰亦二十五度為一周日夜五十周身周而復始大㑹於手太陰手少陽也主心肺之病内而不出人有熱則飲食下胃其氣未定汗則出或出於面或出於背或出於身手皆不循衛氣之道而出葢外傷於風内開腠理毛蒸理泄衛氣走之故不得循其道此氣慓悍滑疾見開而出故不得其道名曰漏泄其病則肘掌痛食先吐而後下氣不續胸膈間厭悶所以飲食先吐而後下也寒則精神不守泄下便利語聲不出若實則上絶於心若虚則引氣於肺出第四卷中千金同千金論曰三焦病者腹脹氣滿少腹尤堅不得小便窘急溢則為水留則為脹候在足太陽之外大絡在太陽少陽之間亦見于脈取委陽少腹病腫痛不得小便邪在三焦約取太陽大絡視其結脈與厥陰小絡結而血者三焦脹者氣滿在皮膚殻殻然而不堅手少陽之脈是動則病耳聾煇煇焞焞嗌腫喉痺是主氣所生病者汗出目鋭眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用為此諸病寒則留之熱則疾之陷下則灸之不盛不虚以經取之盛者人迎一倍於寸口虚者人迎反小於寸口出第二十卷中上焦熱及寒吐痢腸鳴短氣方九首刪繁療上焦實熱飲食下胃其氣未定汗出面背身中皆熱名曰漏氣通脈瀉熱澤瀉湯方澤瀉二兩生地骨皮五兩甘草一兩炙半夏二兩洗石膏八兩柴胡三兩茯苓三兩生薑三兩竹葉切五合人參二兩桂心一兩蓴心一升右十二味切以水一斗煮取三升分三服忌海藻菘菜羊肉餳醋生葱千金同又療上焦熱腹滿而不欲食或食先吐而後下肘脅攣痛麥門冬理中湯方生麥門冬一升生薑四兩白术五兩甘草二兩炙人參三兩茯苓二兩橘皮三兩竹茹一升生薑根一升蓴心五合萎蕤三兩廩粟一升右十二味切以水一斗五升煮取三升分三服忌海藻菘菜大醋桃李雀肉等千金同又療上焦氣不續胸膈間厭悶所以飲食先吐而後下半夏理中續膈破寒湯方半夏半升製生薑四兩麻黄三兩去節前胡三兩澤瀉三兩竹葉一升細辛三兩枳實三兩炙杏仁三兩去皮尖右九味切以水九升煮取三升去滓分三服忌羊肉餳生菜等物又療上焦熱牽肘攣心痛喘欬短氣動而好唾潤肺止心痛大枣湯方大棗三十枚杏仁三兩去皮尖人參三兩紫菀二兩萎蕤三兩麥門冬三兩去心百部三兩通草三兩石膏八兩五味子一兩羊腎三枚去膏麻黄三兩去節右十二味切以水一斗煮取二升五合去滓下蜜三合生薑汁三合淡竹瀝三合更上火煎取三升分三服又療上焦虛寒精神不守泄下便利語聲不出茯苓安心湯方茯苓三兩人參三兩乾薑三兩桂心一兩逺志皮三兩甘草二兩炙右六味切以水九升煮取三升去滓分三服忌生葱醋物海藻菘菜等物又療上焦虛寒腸鳴下利心下痞堅半夏瀉心湯方半夏五兩洗黄芩三兩甘草三兩炙人參三兩乾薑三兩黄連一兩桂心三兩右七味以水九升煮取三升去滓分三服忌海藻菘菜餳羊肉生葱猪肉冷水此仲景半夏瀉心湯方本無桂心有大棗十二枚出第四卷中千金療上焦虚寒短氣語聲不出黄耆理中湯方黄耆二兩桂心二兩丹參四兩一作人參桔梗三兩乾薑三兩五味子三兩茯苓三兩甘草三兩炙杏仁四兩去皮尖芎藭二兩右十味切以水九升煮取三升絞去滓温分三服忌海藻菘菜猪肉生葱大醋刪繁同又療上焦冷下痢腹内不安食好注下黄連丸方黄連八兩乾薑四兩橘皮三兩烏梅肉八兩附子四兩炮桂心一兩芎藭三兩黄蘗三兩阿膠四兩炙右九味末之白蜜和為丸如梧子大飲下二十丸加至三十丸忌猪肉冷水生葱等刪繁同又療上焦閉塞乾嘔嘔而不出熱少冷多好吐白沫清涎吞酸厚朴湯方厚朴四兩炙呉茱萸五合人參三兩茯苓四兩桔梗三兩生薑八兩𤣥參三兩芎藭四兩白术四兩附子三兩橘皮三兩去赤脈右十一味切以水九升煮取三升絞去滓分三服忌猪肉桃李雀肉大醋刪繁同出第二十卷中中焦熱及寒洩痢方三首刪繁論曰中焦如漚漚者在胃中如漚也起於胃中管在上焦之後此受氣泌糟粕蒸津液化其精微上注於肺脈乃化而為血奉以生身莫貴於此故獨得行於經隧名曰榮氣主足陽明陽明别號曰豐隆在外踝上去踝八寸别走太陰絡諸經之脈上下絡太倉主熟五穀不吐不下實則生熱熱則閉塞不通上下隔絶虚則生寒寒則洞泄便痢霍亂主脾胃之病夫血與氣異形而同類衛是精氣榮是神氣故血與氣異形而同類焉奪血無汗此是神氣奪汗無血此是精氣故人有一死而無再生也猶精神之氣隔絶也若虛則補於胃實則瀉於脾調其中和其源