少少啜之忌野猪肉蘆笋等物張文仲處又療濕霍亂吐痢無限宜合高良薑等三味飲子服之方高良薑二兩豆蔲子十二枚桂心二兩右藥切以水四升煮取一升去滓細細啜之亦有於此方加乾薑人參二物忌生葱又木𤓰桂心二物飲之方木𤓰一枚濕乾並得桂心二兩右藥以水二升煮取七合去滓細細飲之亦有豆蔲子代桂心者亦有單煮木𤓰汁飲之忌生葱呉昇同出第一卷中雜療霍亂方四首小品療霍亂嘔啘氣厥不得喘息豉湯方豉一升半夏一兩洗生薑二兩人參一兩柴胡一兩甘草一兩炙右六味切以水五升煮取二升半温服七合忌羊肉餳海藻菘菜等千金有桂心一兩又療卒道中得霍亂無有方藥氣息危急醫視捨去皆云必死療之方蘆蓬蕽一大把煮令味濃頓服二升則差已用有効食中魚蟹毒者服之尤良蘆蓬蕽蘆花是也備急集驗文仲范汪同並出第四卷中刪繁療霍亂食不消腸鳴腹痛熱不止桔梗湯方桔梗四兩白术五兩乾薑三兩茯苓三兩倉米一升右五物切以水八升煮倉米熟去米將汁煮藥取二升絞去滓分服忌桃李雀肉大酢近効訶梨勒散療一切風氣痰冷霍亂食不消大便澁方取訶梨勒三顆擣取皮和酒頓服三五度則差乾嘔方六首病源乾嘔者胃氣逆故也但嘔而欲吐吐而無所出故謂之乾嘔也出第二十一卷中廣濟療卒乾嘔不息方破雞子去白吞中黄數枚則愈肘後備急張文仲同又方生葛根絞取汁服一升又方甘蔗汁温令熱服一升日三服一云甘草汁張文仲同並出第三卷中集驗療病人乾嘔方取羊乳汁飲一杯千金同又療吐逆乾嘔生薑湯方生薑四兩澤瀉三兩桂心二兩橘皮三兩甘草二兩茯苓四兩人參一兩大黄四兩右八味切以水七升煮取三升服五合日三忌海藻菘菜醋物生葱並出第四卷中崔氏療患嘔人參湯方人參一兩胡麻仁八合灼令香橘皮二兩枇杷葉半斤拭毛蜜炙右四味切以水一斗煮枇杷葉取五升汁内人參等三種煎取三升稍稍飲之徐王張文仲千金同出第三卷中嘔噦方四首病源嘔噦之病者由脾胃有邪穀氣不消所為也胃受邪氣逆則嘔脾受邪脾脹氣逆遇冷折之氣逆不通則噦也出第二十一卷中廣濟療嘔噦不止橘皮湯方橘皮一升生薑八兩甘草二兩炙枇杷葉四兩拭毛蜜炙右四味切以水五升煮取二升五合絞去滓分温三服每服相去如人行六七里忌海藻菘菜出第一卷中肘後療嘔噦方生蘡薁籐斷之當汁出器承取飲一升生葛籐尤佳又方枇杷葉一觔拭毛蜜炙水一斗煮取三升分再服備急同出第一卷中必効療嘔噦方取蘆根五兩切以水五升煮取三升頓服兼以童子小便一兩合不過三服則差出第二卷中噦方七首病源脾胃俱虚受於風邪故令新穀入胃不能傳化故穀之氣與新穀相干胃氣則逆胃逆則脾脹脾脹則氣逆因遇冷折之則噦也右手闗上脈沉而虚者病善噦也出第二十一卷中肘後療卒啘不止方痛抓睂中央閉氣也又方以物刺鼻中若以少許皂莢屑内鼻中令嚏則差又方但閉氣抑引之又方好豉二升煮取汁服之千金同又方粢米粉二升井華水服之並出第三卷中集驗療卒噦方枳實三枚炙去核㕮咀之以三家乳一升以羊脂五兩煎枳實令沸復内乳令沸去滓含咽之范汪同出第六卷中張文仲陶氏啘方飲新汲井水數升佳肘後備急千金同出第六卷中嘔逆吐方八首病源嘔吐者皆由脾胃虚弱受於風邪所為也若風邪在胃則嘔膈間有停飲胃内有久寒則嘔而吐其狀長大息心裏澹澹然或煩滿而大便難或溏泄並其候養生方云八月勿食薑一云被霜𤓰向冬發寒熱及温病食欲吐或心中停飲不消或為反胃其湯熨針石别有正方補養宣導今附於後養生方導引法云正坐兩手向後捉腕反向拓席盡勢使腹弦弦上下七左右換手亦然除腹肚冷風宿氣或胃口冷食飲進退吐逆不下又云偃卧展兩脛兩手左右蹻兩足腫以鼻内氣自極七息除腹中病食苦嘔又云坐直舒兩足以兩手挽兩足自極十二通愈腸胃不能受食吐逆以兩手直义兩脚底兩脚痛舒以頭抵膝上自極十二通愈腸胃不能受食吐逆出第二十一卷中仲景傷寒論嘔吐病在隔上後必思水者急與之思水與猪苓散方猪苓去皮茯苓白术右三味各等分擣篩飲汁和服方寸匕日三服欲飲水者極與之本虚與水則噦攻其噦亦噦忌桃李雀肉醋物千金同出第必効小麥湯主嘔吐不止方小麥一升洗人參四兩青竹茹二兩半茯苓三兩厚朴四兩炙甘草一兩炙生薑汁三合右七味以水八升煮取三升分三服忌海藻菘菜酢千金同又凡服湯嘔逆不入腹者方先單煮炙甘草三小兩以水三升煮取二升服之得吐但更服不吐益好消息定然後服餘湯則流利更不吐也忌海藻菘菜千金同並出第二卷中延年人參飲主吐方人參一兩橘皮三兩生薑一兩右三味切以水四升煮取一升五合分温三服出第六卷中又麥門冬飲主風邪熱氣衝心心悶短氣吐不下食方麥門冬二兩去心人參一兩橘皮一兩生薑三兩羚羊角一兩屑右五味切以水五升煮取一升五合去滓分温三服又甘草飲主脾腎冷氣乗心痛悶吐利四肢逆冷或煩疼方甘草二兩炙人參二兩乾薑四兩厚朴二兩炙白术二兩右五味切以水五升煮取一升五合去滓分温三四服如人行八九里忌海藻菘菜桃李雀肉等出第六卷中新附近効療嘔逆方白油麻一大合以清酒半升煎取三合看冷熱得所去油麻以酒頓服之立驗無忌又方麻仁三合熬擣以水研取汁著少鹽喫立効李諌議用有効嘔逆不下食方八首廣濟療嘔逆不能多食方訶梨勒三兩去核煨右一味擣為散蜜和丸空腹服二十丸日二服以知為度利多減服無所忌又療嘔逆不下食腹中氣逆豆蔲子湯方豆蔲子七枚碎生薑五兩人參一兩甘草一兩炙右四味切以水四升煮取一升五合去滓分温二服相去如人行五六里忌海藻菘菜又療兩脅下妨嘔逆不下食柴胡湯方柴胡八分茯苓八分橘皮六分人參六分厚朴八分炙桔梗六分紫蘇五分生薑十六分訶梨勒七枚去核煨甘草五分炙右十味切以水八升煮取二升五合絞去滓分温三服服别相去如人行六七里進一服不吐利忌海藻菘菜醋物猪肉等又療患身體煩疼頭痛喫食嘔逆不得食柴胡湯方柴胡十分茯苓八分枳實八分炙白术八分生薑八分合皮切麥門冬八分去心甘草六分炙右七味切以水六升煮取二升三合絞去滓分温三服每服相去如人行六七里忌海藻菘菜酢物桃李雀肉熱麪炙肉油膩又療虚熱嘔逆不下食食則煩悶地黄飲子方生地黄汁六合蘆根一握生麥門冬一升去心人參八分白蜜三合橘皮六分生薑八分一方云生薑汁一合右七味切以水六升煮取二升去滓下地黄汁分温三服如人行四五里進一服不利忌蕪荑生冷麫炙肉蕎麪猪肉蒜粘食又療煩熱嘔逆不下食食則吐出麥門冬湯方生麥門冬三兩去心青竹茹三兩茅根五兩甘草一兩炙生薑五兩人參一兩右六味切以水七升煮取二升五合去滓分温三服如人行六七里進一服不吐利忌海藻菘菜並出第一卷中備急療吐逆水米不下乾薑甘草湯方乾薑二分炮甘草一分炙右二味切以水二合煎取一合去滓頓服則定少間與粥則不嘔神驗忌海藻菘菜張文仲同出第三卷中延年人參飲主嘔不能食方人參八分厚朴六分炙橘皮六分白术八分生薑八分右五味切以水四大升煮取一升五合分温三服忌桃李雀肉等蔣孝璋處出第六卷中許仁則療嘔吐方四首許仁則療嘔吐病有兩種一者積熱在胃嘔逆不下食一者積冷在胃亦嘔逆不下食二事正反須細察之必其食飲寢處將息傷熱又素無冷病年壯力强膚肉充滿此則是積熱在胃致此嘔逆如將息食飲寢處不熱又素有冷病年衰力弱膚肉瘦悴此則積冷在胃生此嘔逆若是積冷嘔逆經乆急須救之不爾甚成反胃病積熱在胃嘔逆不下食宜合生蘆根五味飲服方生蘆根切一升生麥門冬一升去心青竹茹一升生薑汁五合茯苓五兩右藥切以水八升煮取二升半去滓加竹瀝六大合攪調分三服相去如人行十里乆始服一劑忌醋物又依前生蘆根等五味飲服之雖可然未能全除者宜合茯苓等五味丸服之方茯苓五兩人參三兩麥門冬一升去心生薑屑六兩青竹茹一升右藥擣篩蜜和為丸煎蘆根飲下之初服十五丸日二服稍加至三十丸丸如梧子大忌醋物又積冷在胃嘔逆不下食宜合半夏等二味丸服之方半夏一升製小麥麪一升右擣半夏為散以水溲麪丸如彈子大以水煮令麪熟則是藥成初吞四五丸日二服稍稍加至十四五丸旋煮旋服服此覺病減欲更重合服亦佳忌羊肉餳救急同又依前半夏等二味丸雖覺漸損然病根不除欲多合前丸又慮毒藥不可久服欲不服藥又恐病滋蔓宜合人參等七味丸服之方人參五兩白术五兩生薑屑八兩厚朴四兩炙細辛四兩橘皮三兩桂心二兩右藥擣篩為末蜜和為丸如梧子飲下之初服十丸日二服稍稍加至二十丸欲與前半夏丸間服亦得忌桃李雀肉生葱生菜呉昇同並出第一卷中雜療嘔吐噦方三首仲景傷寒論夫嘔家有癰膿者不可療也其嘔膿盡自愈若先嘔後渴者為欲解也先渴後嘔者為水停在心下此屬飲家嘔家本渴今反不渴者以心下有支飲故也此屬支飲張仲景雜方此證當用小半夏加茯苓湯方在支飲門中嘔脈弱小便復利身有微熱見厥者難療四逆湯主之方甘草二兩炙附子一枚乾薑一兩半右三物㕮咀以水三升煮取一升二合去滓温分再服强人用大附子一枚乾薑三兩忌海藻菘菜猪肉又嘔心下痞堅者大半夏湯主之方半夏三升洗人參三兩切白蜜一升右三味以泉水一斗二升并蜜和揚之二百四十遍煮藥取二升半温服一升日再服忌羊肉餳本論治反胃支飲又乾嘔下利黄芩湯主之方黄芩三兩人參三兩桂心二兩大棗十二枚半夏半升洗乾薑三兩右六味切以水七升煮取三升温分三服忌羊肉餳生葱出第十六卷中噫醋方七首病源噫醋者由上焦有停痰脾胃有宿冷故不能消穀穀不消脹滿而氣逆所以好噫而吞酸氣息酸臭也出第三十一卷中廣濟療吐酸水每食則變作醋水吐出㯽榔散方㯽榔十六分人參六分茯苓八分橘皮六分蓽撥六分右五味擣篩為散平晨空腹取生薑五大兩合皮擣絞取汁温内散方寸匕攪調頓服之日一服漸加至一匕半若利多減以微通洩為度忌酢物生冷油膩猪魚等又療常吐酸水脾胃中冷茯苓湯方茯苓十二分橘皮十二分白术八分人參六分桂心六分甘草八分炙紫蘇十分生薑十二分㯽榔七枚右九味切以水九升煮取二升半絞去滓分温三服每服如人行七八里未好差三兩日更服一劑老小取微利忌生葱酢物桃李雀肉海藻菘菜又療嘔吐酸水結氣築心白术散方白术八分茯苓八分呉茱萸四分橘皮六分蓽撥四分厚朴八分炙㯽榔十分人參六分大黄十分右九味擣篩為散空腹煮薑棗湯服方寸匕日二服漸加至二匕半覺熱服少飲食三兩口壓之忌酢物桃李雀肉等又療心頭結氣連胷背痛及吐酸水日夜不止茯苓湯方茯苓四兩厚朴四兩炙橘皮二兩白术二兩生薑十兩右五味切以水九升煮取二升七合絞去滓分温三服每服相去如人行七八里須利加㯽榔末一兩半湯欲熟時内之甚安穩三日服一劑頻服五六劑可則停忌酢物桃李雀肉等一方有呉茱萸人參各二兩並出第十卷中延年療食訖醋咽多噫呉茱萸湯方呉茱茰五合生薑三兩人參二兩大棗十二枚右四味切以水六升煮取二升絞去滓分為三服每服相去十里乆肘後集驗文仲備急千金並同肘後分兩小别又増損承氣丸療胷脅支滿背上時有一荅熱則痛腹脹多噫醋咽氣逆兩脅滿並主之方前胡七分枳實七分炙桂心五分乾薑五分呉茱萸五分茯苓四分芍藥六分厚朴十分炙橘皮十分大黄七分杏仁七十枚去皮尖右十一味擣篩為末内杏仁脂中研調篩度蜜和丸每服食後少時酒飲任性初服七丸如梧子以氣宣下洩為度忌生葱大醋並出第十七卷中必効理中散主食後吐酸水食羮粥酪劇方乾薑二兩食茱萸二兩右二味作散酒服方寸匕日三温服勿冷服之常醋水差千金同出第二卷中外臺秘要方卷六
