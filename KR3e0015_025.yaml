body:
  text: 外臺秘要方卷二十一唐王燾撰天竺經論眼序一首隴上道人撰俗姓謝住齊州於西國胡僧處授蓋聞乾坤之道唯人為貴在身所重唯眼為寳以其所繫妙絶通神語其六根眼最稱上是以療眼之方無輕易爾叙眼生起一首謝道人曰夫眼者六神之主也身者四大所成也地水火風隂陽氣候以成人身八尺之體骨肉肌膚塊然而處是地大也血淚膏涕津潤之處是水大也生氣温暖是火大也舉動行來屈伸俛仰喘息視瞑是風大也四種假合以成人身父母精血實斯増長而精成者也其眼根尋無他物直是水耳輕膜裹水圓滿精微皎潔明浄状如寳珠稱曰眼珠實無别珠也黒白分明肝管無滯外託三光内因神識故有所見凡人不解謂眼有珠喻若魚之被煮此事不然夫魚畜水陸之有目者悉皆是水無有别珠直以湯火煎煮水凝結變自成珠但㸔生魚未被煮炙豈有珠義直置死魚水已凝厚論其活者水亦輕薄出眼疾候一首謝道人曰夫人眼白睛重數有三設小小犯觸無過傷損但黒睛水膜止有一重不可輕觸致敗俄頃深可慎之凡人不究謬據多重或七或五此皆是其妄説一家成言耳然眼之精微水映輕薄無所堪耐易致諸疾故學療之者事須安審不可麤疎恐致毁傷患眼之家自須謹慎諸所禁忌悉不應犯若覺有疾即宜早療當及其初根脚未立則易驅遣若其乆後根盤四布既成痼疾雖復行療極難成效且身稟四大性各不同是以治者證候非一冷熱風損疾生不同傷勞虚實其方各異宜應察其元起尋究本根按法依源以行療救不得謬濫措方以乾薑療熱毒之眼以冷水療風寒之目非直冷熱無効蓋亦致患俄頃常見愚人不識病源直尋古方輕欲立療或經有疾遇藥得愈便以此法遞相傳授都不知病有冷熱之殊虚實之異或有道姑𡡉嫗為人求食輕得有損寧慮幽㝠良為病家不别真偽聞語便從遂使應愈之病増為痼疾驪珠之眸永成盲瞽一何可哀故目有條貫以示後人皆苦眼無所因起忽然膜膜不痛不痒漸漸不明乆厯年嵗遂致失明令觀容狀眼形不異唯正當眼中央小珠子裏乃有其障作青白色雖不辨物猶知明暗三光知晝知夜如此之者名作腦流青盲眼未患時忽覺眼前時見飛蠅黒子逐眼上下來去此宜用金箆決一針之後豁若開雲而見白日針訖宜服大黄丸不宜大泄此疾皆由虚熱兼風所作也眼疾品類不同候一首謝道人曰若有人苦患眼漸膜膜狀與前青盲相似而眼中一無所有此名黒盲宜針刺服藥如瞳子大者名曰烏風如瞳子瞖緑色者名為緑瞖青盲皆是虚風所作當覺急須即療湯丸散煎針灸禁慎以驅疾勢若眼自闇多時不復可療此疾之源皆從内肝管鈌眼孔不通所致也亦宜須初欲覺時即須速療之若已成病更不復可療亦無勞措意也若因時病後得眼生白障者此名為瞖也為熱毒所作宜應速服湯丸依法鐮之傳食瞖散若因病後生肉者此為膚障也後卷并無食瞖散通按後方傳瞖皆令瞖除食即除字意此是風熱所作宜服湯丸鈎割除之若眼赤痒淚出者為熱虚風服散煎除之若見黒煙赤光瞳子黒大者為烏風勞水動故宜服車前空青丸以消息之若眼忽爾赤痛者此是天行眼痛風熱所作應宜早急療之不者當生於瞖後難療若人眼痛當黒珠生白瞖并黒子等大如米如此之者名為痛損眼此不易可療勿輕犯觸但眼因破損有物撞作瞖障瘢痕者悉不可療亦無勞措意通按勞水動三字疑有闕文眼将節謹慎法一首謝道人曰五行云肝者眼家之根本此乃一家之同類而言其實五藏六腑悉皆相連故欲療眼而審其虚實察其由起既識病源宜先作内療湯丸散煎事事分明既服諸藥便須依方謹慎凡欲療眼不問輕重悉不得以風霜雨水寒熱虚損大勞并及房室飲食禁忌悉不得犯若虚勞冷者宜服補肝丸出千金翼第十卷十五味在此卷下也若人患眼不值明師遇道姑𡡉嫗欺詐妄語云犯神鬼或以環鈎或復蒜熏或火燒針熨此皆不識病源而逆療包隂陽為益實微動致傷余見此途内懐矜愍學療之者勿習是方非直疾勢不除亦自竒成蠱道此法中文句疑昧金别季校眼暴腫痛方一十首謝道人療眼暴腫毒痛不可忍欲生瞖方決明子一升石膏四兩研升麻四兩切梔子仁一升地膚子茺蔚子各一分苦竹葉切二升乾藍葉切一升芒硝二兩車前草汁一升二合冬𤓰子三升為末右十一味以水二斗煮竹葉取七升二合去滓内諸藥煮取四升分為四服每服相去可兩食間再服為度小兒減藥以意裁之又療眼暴腫痛方苦竹葉一升柴胡二兩蛇銜二兩黄連白芒硝細辛各一兩右六味切以水三升煮取一升去滓温服之忌豬肉又方秦皮黄連各一兩苦竹葉一升右三味切以水五升煮取八合洗眼與前方相類眼忽腫痛盲須煮秦皮作湯洗是主療也忌豬肉又方細辛蕤核仁盧鹽各一兩決明子二兩右四味切以地骨汁煮取一升半去滓更以蜜一升半合煎取一升半與前方同又療眼天行暴腫痒痛方地骨皮三斤切右一味以水三斗煮取三升絞去滓更内鹽二兩煎取一升傅目或加乾薑一兩又方前胡三兩芍藥青葙子決明子細辛各二兩車前子五合梔子淡竹葉切一升右九味切以水九升煮取三升温分為三服忌生菜又方半夏一升洗生薑八兩前胡四兩枳實二兩炙細辛一兩烏梅十二枚擘右六味切以水七升煮取二升半温分為三服忌羊肉餳生菜又方甘草一兩炙粟米三合甘竹茹雞子大蘆根五兩右四味切以水八升煮取二升七合分為三服忌海藻菘菜又療兩眼痛大黄湯方大黄四兩芍藥五兩細辛甘草炙各四兩黄芩二兩右五味切以水七升煮取二升半温分為三服甚妙又方大黄八兩切右一味以水五升漬之一宿明旦絞取汁分三服之病甚多由脾實以上忌油膩生冷房室蒜菜酒麫等物目赤痛方二十一首病源凡人肝氣通於目若肝氣有熱熱衝於目故令赤痛出第二十八卷中廣濟療目赤病及胎赤方以蜯蛤裹置蜜二分鹽碌一分夜卧火炙煖著目眥三四日差止又方豬膽和鹽碌五分㸃眥効深師療眼赤痛除熱黄連煎方黄連半兩大棗一枚切右二味以水五合煎取一合去滓展綿取如麻子注目日十夜再忌豬肉集驗療目赤痛方甘竹葉二七片烏梅四兩碎大錢三文右三味以水二升洗漬藥半日早向東竈煮之三沸三上三下取二合臥以注目眥又療目赤痛洗眼方蕤核仁二十枚碎苦竹葉一把細辛半兩右三味以水三升煮取半升以洗眼日三五度甚妙刪繁療眼赤洗眼竹葉湯方淡竹葉五合黄連四枚青錢二十文大棗二十枚去皮核梔子仁七枚車前草五合右六味以水四升煮取二升以洗眼日六七遍此方甚良忌豬肉千金療眼赤闇方杏未熟時杏仁汁一合鹽五兩青錢三文右三味合内瓷器中封頭勿令泄百日後出著四眥頭日二三千金翼療赤眼方杏仁四十九枚去皮尖絹袋裹飯底蒸之承熱絞取脂以銅青胡粉各如大豆乾薑石鹽各如半大豆許熟研之以雞毛沾取掠眼中眥頭日三夜再又方杏仁脂一合鹽碌如棗核大印成鹽三顆右三味取杏仁脂法先𢷬杏仁如脂布袋盛蒸絞取脂置蜜器中内諸藥直坐著其中密蓋二七日夜臥注目四眥不過七度差止又療赤眼不問乆近方硼砂三兩以酢漿垍器中浸日中暴之三日藥著器四畔乾者取如粟大夜著兩眥不過三四度永差并石鹽石膽等分尤佳並出第十一卷中通按垍乃堅土或係粗瓦罐如甖類也張文仲療兩眼熱赤方東壁上土帛細羅内如豆大兩眥中令淚出三五度即差常用大効肘後同又傳効療眼赤無新乆皆差神驗方石鹽棗核大人乳一棗許置故銅椀中以古錢十文研之使青稠著椀底取熟艾急摶一雞子許掘地作小坑子坐艾於坑中燒使煙出以銅椀覆上以土擁四邊勿令煙出量艾燃盡即止刮取著椀青藥每以半豆許於蛤蜯中和棗核大人乳汁研細以綿纒杖頭注入兩眥夜即仰臥著之至五六度必差無石鹽以白鹽無古錢以青錢替之亦得肘後同延年療眼赤熱不能得好差此由肝中客熱不絶方黄連三兩秦皮三兩右二味切以水三升煮取一升五合去滓食後温服分二服如人行七八里服必効同又療眼赤飲方前胡黄連秦皮黄芩梔子仁各三兩決明子二兩半蕤仁一兩碎竹葉一升右八味切以水六升煮取二升五合去滓分三服食後服之忌豬肉又療眼赤方蕤仁黄芩梔子仁黄連秦皮各二兩竹葉一升右六味切以水五升煮取一升六合分三服又療目赤熱方前胡二兩防風決明子黄連蕤仁各二兩竹葉一升右六味切以水六升煮取二升分為五服又竹葉飲主痰熱眼赤頭痛方竹葉一握犀角屑升麻乾葛各二兩黄芩麥門冬各三兩去心右六味切以水六升煮取二升分為三服又方竹葉一握麥一升淘地骨白皮三分右三味以水五升煮取二升以麥熟為度食後分二服蒋孝璋處此方近効療眼赤痛眼漠漠方硝石研末於眼四角各㸃一粟許須臾熱淚出便睡睡覺以漿水洗又明目又療赤眼及眼睛上瘡方秦皮一大兩以清水一大升於白瓷椀中浸春夏一食乆以上㸔碧色出即以筯頭纒綿㸃下碧汁仰卧㸃所患眼中仍先從大眥中滿眼著微痛不畏量乆三五度飯間即側卧瀝却熱汁每日十度以上著不過兩日差忌酢蘿蔔李諌議近効方又勅賜源乾曜療赤眼方生石蜜朱砂光明者石鹽芒硝鹽碌石決明去麤皮細研各六分蕤仁三百顆黄連宣州者細辛各一兩烏賊魚骨長二寸去甲右十味𢷬篩細研欲著時少少取白蜜和置眼兩大角中如菉豆許大仍不避風日唯破及枯除此並差萬金不傳忌猪肉生菜胎赤乆赤方七首病源胎赤者是人初生洗目不淨令穢汁浸漬於眼使臉赤爛至大不差故云胎赤出第二十八卷中千金療胎赤眼方取槐木枝如馬鞭大長二尺齊頭麻油一匙置銅鉢中旦使童子以水研之至瞑止取夜卧時以塗目眥日三度差止崔氏療三五十年眼赤并胎赤方西域法太常丞吕才道効生烏麻油半雞子許著銅器中以細蠣石磨之使述述不能研乃止熟艾三升杏仁一升去尖皮黄連一兩雞糞一升鹽一合亂頭髪如半椀許大右七味穿一坑其形如瓶口小裏大燒使乾别開一小風孔以前藥并艾等一重重布著坑内狀如灸炷以火燒之將前所磨銅器以蓋坑口煙盡收取銅器上脂煙傅眼眥瘡上欲卧時著胎赤三十五十年者不過三兩日差忌猪肉又方胡粉六分蕤仁四分右二味先研蕤仁使碎内胡粉中更熟研又𢷬生麻子為燭燃使著别取猪肪脂於燭燄上燒使脂流下滴入蕤人胡粉中更研攪使均如餳以綿纒細杖子内藥内承軟㸃眼兩眥藥須臾冷還於麻燭上燒而用之又療積年赤眼方取古字錢四十九文重著又取石鹽末填心孔中令滿以五月五日中於石上用烈炭火燒令極赤然後内一升醶酢中以傾甖内用四十九重紙封一日去一重去盡然後用一黍米大㸃眼眥中極効並出第四卷中必効主眼風赤乆胎赤方銅鏭鑼一尺以下面者一枚著石鹽末如杏仁許油脂半雞子許相和合鹽取栁枝如箸一握急束齊一頭用研油脂三日狀如墨取熟艾如雞卵大剜地作小坑置几於下安艾著火合銅鏭鑼於上其下仍令通氣火盡即成常蓋頭欲用時以綿纒杖子頭㸃取藥著兩眥頭每夜著即卧蘇六方云頓用甚効又療積年風赤眼方取生油生猪脂胡粉各等分和研傅眼中二日内赤揔除救急療乆患風赤眼方黄連一兩大棗兩顆去皮核細切印成鹽兩大豆許右三味以井花水半升内前件藥攪緩火煮三分去一以綿濾使盡其餘汁更緩火煎之候藥上有紫液起即是更煎以物盡刮取於合内貯之勿使塵汚取用一度取二大豆許以人乳和之置兩眼眥頭從淚出每著苦入咽喉即停積年患赤眼者不過五度即差及風胎赤皆差亦不勞避風每欲出時口含鹽水以洗之甚良忌猪肉目暴卒赤方六首肘後葛氏療目卒赤痛方以鹽湯洗之又方燒荆木出黄汁傅之又方竹葉黄連各一兩錢二七枚右三味以水三升煎取二合綿染傅眥日五六度忌豬肉並出第二卷中深師療眼忽赤痛方鯉魚膽一枚黄連二十一枚右二味和淹於飯下蒸之熟去滓塗目眥五六度愈忌豬肉必効療眼暴赤方雞舌香二十枚乾棗二十擘黄連二十枚碎右三味以水半升煎五六沸澄取清㸃目中差多著令人目明忌豬肉韋永傳又日暴赤熟毒方蕤仁一分𢷬成膏吳黄連一分雞子白一枚右三味以綿裹二味内雞子白中漬一宿塗眼四五度厚則洗之目痒方四首肘後療目卒痒且痛方削乾薑令圓滑内眥中有汁拭薑復内之未盡易之姚同又風目常痒淚出方以鹽注眥中差止文仲療眼暗及風赤痒方煎成白鹽三匙烏賊魚骨四枚去甲右二味以清酢漿水四升煎取二升澄清每旦及晚洗眼赤去膚肉單鹽漿水煎之洗亦佳又療風痒赤方黄連半兩丁香二七枚碎蘗皮半兩蕤仁二七枚錢七文古者右五味以水二升煎取一升去滓綿纒杖㸃取著眼角差止肘後同目中風腫方五首病源目為肝之外候肝虚不足為冷熱所干故氣上衝於目外復遇風冷所擊冷熱相摶而令臉内結腫或如杏核大或如酸棗之狀腫而因風所發故謂之風腫出第二十八卷中肘後療目中風腫弄眼方礬石二錢熬末右一味以棗膏和如彈丸以磨目上下食頃止日三磨一作揉姚同又方取頭垢著眥中亦得又方枸把根白皮伏雞子殻右二味等分𢷬為末著目上范汪療目中風腫痛方取薤白刀截仍以膚上令遍漠皆差薤頭辛痛者止之集驗療目中腫痛方𢷬枸把汁洗之日六七度深師療眼有熱生瞖肘後同眼熱磣痛赤腫方三首刪繁療眼熱眥赤生赤脈息肉急痛開不得開如芒在眼磣痛大棗煎方大棗十顆去皮核黄連二兩淡竹葉五合右三味以水二升煎取一升澄取八合下棗黄連煎取四合去滓綿濾細細㸃傅眼中忌猪肉又車前草湯洗方車前草切半升乾藍五合淡竹葉三兩右三味切以水三升煮取二升綿濾去滓用上好鹽半刀圭内湯中攪令調取冷細細用洗眼一刀圭者凖丸如兩大豆大必効同張文仲療眼暴赤腫磣痛不得開淚出方黄連黄蘗蕤仁鹽碌芒硝各等分右五味𢷬篩和如黍米大内眥中忌豬肉眼闇令明方一十四首千金論曰凡人年四十五十以後漸覺眼闇至六十以後還漸目明療之法五十以前可服㵼肝湯五十以後不可㵼肝目中病可傅石膽散等藥無病不可輒傅散但補肝而已目病肝中有風熱令人眼闇者當灸肝俞五百壯穴在明堂部中及服除風湯丸散數十劑當愈也凡生食五辛接熱食飲刺頭出血過多極目逺視夜讀細書不避煙火博奕不休日没後讀書飲酒不已熱食麫食抄寫多年雕鏤細作泣淚過度房室無節數向日月輪㸔夜逺視星火月中讀書雪山巨睛視日極目瞻視山川草木右十九件並是喪明之由養性之士宜熟慎之又有馳騁田獵冒渉霜雪迎風追獸日夜不息者亦是傷目之媒也恣一時之浮意為百年之痼疾可不慎歟可不慎歟凡人從少時不自将慎年至四十即漸漸眼闇若能依此将慎可得白首無他所以人年四十已去當須瞑目非有要事不可輙開此之一術䕶慎之極也其讀書博奕等過度患目者名曰肝勞若欲療之非三年閉目不視不可得差徒自㵼肝及作諸療終是無効也人有風邪多必眼闇先攻其風而闇自差出第六卷中廣濟主令明目方三月中取新杏仁研脂絞取汁一升石鹽兩大豆大銅器盛之取銅古錢二七文浸之二七日綿注目中夜洗眼用出第五卷中小品療眼漠漠黄連洗湯方黄連三兩秦皮二兩蕤仁半兩右三味㕮咀水三升煮取一升半絞去滓適寒温以洗目日四五度又加升麻二兩加水煎之忌豬肉集驗明目令髮不落方十月上已日取槐子内新甖中封口三十日洗去皮初服一枚再服二枚至十日服十枚滿十日却從一起千金云從月一日一枚二日二枚每日加一枚計十日服五十五枚一月日服一百六十五枚一年服一千九百八十枚小月減六十枚此療主明目令髮不白好顔色長生舊病冷人勿服肘後云扁鵲方刪繁療肝虚寒目􅑩􅑩視物不明稀視生花防風補煎方防風細辛各二兩芎藭白鮮皮獨活各三兩甘草炙橘皮去脈各二兩大棗二七枚去核甘竹葉一升切蜜五合右十味切以水一斗二升煮取四升去滓下蜜更煎兩沸分為四服日三夜一服若是五六月燥器貯冷水藏之忌海藻菘菜生菜千金崔氏同出第十一卷中千金補肝散療男子五勞七傷明目方地膚子一斤隂乾生地黄七斤取汁右二味𢷬地膚末和汁暴之令乾更𢷬為散酒服方寸匕日三又方白𤓰子七升絹袋盛絞沸湯中三遍訖以酢五升漬一宿暴乾𢷬下篩酒服方寸匕日三乆服佳又神麴丸主明目百嵗可讀細書方神麴四兩磁石二兩燒研光明朱砂一兩研右三味末之蜜和丸如梧子飲服三丸日三常服益眼力衆方不及學者須知此方神驗當寳秘之忌生血物並出第六卷中千金翼㵼肝湯主藏中痰實熱衝眼漠漠闇方苦竹根八兩半夏四兩洗乾藍茯苓枳實炙白术各三兩杏仁二兩熬乾地黄二兩細辛二兩甘草二兩炙右十味切以水一斗二升煮取二升七合分三服又補肝丸主明目方地膚子藍子蒺藜子車前子𤓰子莬絲子茺蔚子青葙子各二分決明子三合細辛桂心螢火蟲各三兩大黄八分黄連六分右十四味𢷬篩蜜和為丸如梧子飲服子五丸日三加至三丸前方有白术名㵼肝此方有大黄名補肝通按前将節謹慎中云虚勞冷者宜服補肝丸豈有虚冷而可服大黄乎又主眼闇方蔓菁子一斗浄洗右一味以水四升煮自旦至午去汁易水又煮至晚去汁易水又煮至旦暴乾以布袋貯之一度𢷬三升以粥飲服三方寸匕日三服美酒等任性所便並出第十一卷中延年令目明方濾療香取黍米一粒内目眥中當有水出并目中習習然引風出狀即明之候也常以日申時傅之若似痛以冷水洗之即定以申時傅藥者為其目至日下便漠漠暗如有物即以藥内中淚出以熟帛拭之以水洗訖便豁然明也此香以單主百病服之益人勝石乳也本云是外國用之明目甚驗天竺沉香中出此必効洗眼湯去熱氣漠漠視物不見并瞖方秦皮黄蘗皮蕤仁各三分細辛二分茺蔚子三分黄連四分古銅錢七文右七味切以水二升煮取八合平旦洗目忌生菜又青葙子丸主眼風闇有花方青葙子槐子覆盤子地膚子菥蓂子車前子各五分右六味𢷬篩蜜和丸如梧子日服十五丸忌五辛豬雞牛羊肉魚蒜麫酢近効療眼中一切諸疾盲瞖天行風冷熱胎赤淚出當漠漠不多見物唯不療睛破餘悉主之方石膽一兩光明者波斯鹽緑一兩色青隂兩中乾不濕者是真石鹽二兩硇砂二分以上四味各别研秦皮三兩蕤仁三兩研三日烏賊魚骨一兩去上甲别研細辛一兩防風三兩馬蹄決明二兩七孔者仍以煖水洗去上細皮數過用鈆丹一兩黄連三兩右十二味草石藥合𢷬篩唯似粉仍以重絹羅重篩訖以白蜜於火上微煖去上沫取下清者和之作塊更𢷬千杵以油臈紙裹之亦取瓷瓶子盛貯勿使見風可得多年不敗每欲著以兩米許硬和少許蜜稀搗如熟麫闕箆子頭分置兩眼眥至夜仰卧枕之合眼至明不漱口含清漿和一豆許鹽鹽消吐洗眼不避風日未差之前忌食麫羊肉醬果子生菜虀汁苜蓿萵苣惟羊頭蹄肝冷鹽下餘竝不得食至著後復更七日慎之過此一任與食每日一度著藥甚妙失明方六首肘後療積年失明不識人方七月七日取蒺藜子隂乾𢷬篩食後服方寸匕深師療失明主一嵗二嵗三嵗四嵗拭目中無他病無所見如絹中視決明散方馬蹄決明二升右一味𢷬篩以粥飲服方寸匕忌魚蒜豬肉辛菜千金補肝散療目失明漠漠無所見方青羊肝一具去上膜薄切之以新瓦盆子未用者浄拭之内肝於中炭火上炙令極燥脂汁盡取之别𢷬決明子半升蓼子一合熬令香下篩三味合和更篩以飲汁食後服方寸匕漸加至三匕不過兩劑能一嵗復可夜讀書又補肝散療三十年失明方細辛鍾乳研茯苓雲母粉逺志去心五味子右六味各等分𢷬作散飲服五分匕日三加至一錢匕忌生菜大酢又方胡麻一石蒸三十遍末之日服一升良又方三月採蔓菁花隂乾末之空腹以井花水服方寸匕乆服長生目明可夜讀細書並出第六卷中青盲及盲方六首病源青盲者謂眼本無異瞳子黒白分明直不見物耳但五藏六腑之精氣皆上注於目若藏虚有風邪痰飲乘之有熱則赤痛無熱但内生障是腑藏血氣不榮於睛故外狀不異只不見物而已是謂之青盲養生方云勿塞故井水瀆令人耳聾目盲又云正月八日沐浴除目盲出第二十八卷中深師療青盲方豬膽一枚一味微火煎之可丸如黍米内眼中食頃良又黄牛肝散療青盲積年方黄牛肝一具土𤓰根三兩羚羊角屑三升蕤仁三兩細辛六兩車前子一升右六味藥合肝於瓶中春夏之月封之十五日冬月封之二十日出暴乾𢷬下篩酒服方寸匕忌肉魚五辛生菜等又療肝藏病眼青盲内或生障惡風赤痛補肝散方乾薑六分甘遂三分桂心茯苓附子炮黄連甘草炙當歸乾漆熬貝齒燒豬苓白术各五分乾地黄八分丹參六分防風七分黄芪六分右十六味為散酒服方寸匕日三服忌海藻菘菜生菜豬肉冷水桃李雀肉等又療肝氣之少眼視􅀈􅀈面目青眼中眵淚不見光明調肝散方細辛栢實各二兩蕤仁甘草炙各一兩羊肝一具去脂膜炙乾右五味𢷬為散以酒服方寸匕甚良忌同前又療眼盲腦痛方鯉魚腦并膽等分調以注目眥日三良肘後療雀目必効蔓菁子散主青盲瞳子不壊者治十得九方蔓菁子六升蒸之㸔氣遍合甑下以釡中熱湯淋之即暴乾如是三度訖𢷬篩清酒服二方寸匕漸至加三匕隂雨日勿合散壊百曰剋愈神効甚良雀目方四首病源人有晝而睛明至瞑則不見物世謂之雀目言其如鳥雀瞑便無所見也出第二十八卷中廣濟療雀目地膚子丸方地膚子五兩決明子一升右二味𢷬篩米飲和丸每食後以飲服二十丸至三十丸又雀目至暮無所見者栢皮散方老栢白皮四兩烏梅肉二兩熬細辛地膚子各四兩右四味𢷬篩為散每食後清酒服二方寸匕日三四服差崔氏療雀目方七月七日九月九日取地衣草淨洗隂乾末之酒和服方寸匕日三服一月即愈出第四卷中千金翼療眼暮無所見方豬肝一具細切以水一斗煮熟置小口器中及熱以目臨上大開勿閉也冷復温之取差為度出第十一卷中目膚瞖方一十四首病源隂陽之氣皆上注於目若風邪痰氣乘於腑藏腑藏之氣虚實不調故氣衝於目乆不散變生膚瞖膚瞖者明眼睛上有物如蠅翅者即是又此言肝藏不足為風熱之氣干之故令目睛上生瞖瞖乆不散漸漸長侵覆瞳子出第二十八卷中深師療眼瞖方胡粉注瞖上以療三年瞖又療眼黒瞖覆瞳子膚起方貝子四枚燒空青一兩礬石一兩熬汁盡右三味末取如黍米注瞖上日二又主眼瞖方書中白魚末注少許於瞖上千金療目赤及瞖方烏賊魚骨去甲鈆丹等分合研細和白蜜如泥蒸之半食乆著少許四眥中差又去瞖方貝齒十枚燒細篩末取胡豆著瞖上日再正仰卧令人傅之炊一石米乆乃拭之息肉者加真珠如貝子分等研如粉又療目瞖障白膜落方雄雀屎人乳和研以傅上當漸漸消爛良妙肘後并翼同又洗眼湯療熱出攻眼生障瞖方秦皮黄蘗決明子黄芩黄連各三分蕤仁五分梔子仁七枚大棗五枚右八味切以水一升煮取六合洗目日二差忌豬肉千金翼真珠散主白瞖覆瞳睛不見物方光明硃砂二分研貝子五枚炭燒末之白魚七枚炙乾薑末半分右四味𢷬為末相和研之如粉以熟帛三篩之仰卧遣人以小指爪挑取少許将傅眼中亦主白膚瞖風淚忌生血物又七寳散主目瞖經年不愈方白真珠一分珊瑚一分紫貝一分馬珂一分硃砂二分琥珀一分蕤仁二分決明子一分石膽一分右九味𢷬下篩極細傅目中如小豆日三大良忌生血物並出第十一卷中崔氏療瞖五十年不差方貝齒一枚燒豆䜴三十枚三年苦酒三升右三味先漬貝齒三宿消盡乃内豉微火煎如膠取三合藥置筒中夜卧時著如小麥大於眥頭明日以湯洗之十日愈又療眼中瞖少輕者方取枸把及車前子葉分等手中熟挼使汁欲出又别取桑葉兩三重裹之懸於隂地經宿乃摘破桑葉取汁細細㸃目中不過三五度瞖自當爛又瞖如重者方取楮白皮暴乾合作小繩子如麤釵脚許火燒作灰待冷隨便以灰㸃瞖上不過三五度瞖自當爛張右司送並出第四卷中延年療眼熱暈白瞖覆瞳子方車前子九分決明子黄連各九分黄芩秦皮𤣥參沙參瞿麥地骨皮蕤核仁各七分藍實九分右十一味𢷬篩蜜和丸如梧子食後飲服二十九漸加至三十丸差止為度忌豬肉謝道人療眼瞖欲盡微微猶有者傅此散方珊瑚虎珀玉屑曽青紫貝硃砂伏雞子殻去白皮右七味各等分研重篩為散仰卧以米許置瞖上四五度忌血物暈瞖方四首病源五藏六腑之精華皆上注於目目為肝之外候肝藏血血氣不足則肝虚致受風邪風邪摶於精氣故精氣聚生於白睛之上繞於黒睛之際精彩昏濁黒白不明審謂之目暈延年主眼熱暈瞖覆瞳子方柴胡三兩茯苓枳實炙決明子瞿麥各三兩黄連别漬甘草炙蕤仁各二兩右八味切以水一斗煮取二升七合去滓分再服忌海藻菘菜豬肉酢物又方黄連決明子車前子各九分黄芩沙參人參地骨皮蕤仁瞿麥茯神各七分秦皮甘草澤㵼各五分右十三味𢷬篩蜜和為丸如桐子飲服二十丸日再服為度又療眼因赤差後瞖暈方決明子六兩碎黄連蕤仁各六兩黄蘗四分鹽碌二分右五味𢷬末更研極細取少許内目中日三四度忌豬肉又方秦皮一兩右一味以水一升五合煮取七合澄清決明用漬散内目中一如前法並出第四卷中生膚息肉方八首病源息肉淫膚此由邪熱在藏氣衝於目熱氣攻於血脈藴積不散結而生息肉在於白睛膚瞼之間即謂之息肉淫膚也肘後療目中生肉稍長欲滿目及生珠管方貝齒真珠分等右二味並研如粉拌令和以注肉上日三四度良小品療眼膚肉生覆瞳子者方取針燒令赤爍著膚上不過三爍縮也有令人割之三復生不如爍之良刪繁療肝熱不止衝眼為眥赤脈息肉閉痛不開但熱勢彭彭不歇及目睛黄洗肝乾藍飲方乾藍切車前子苦竹葉切各三升秦皮三兩細辛決明子蕤仁山梔子升麻芍藥各三兩右十味切以水二斗煮乾藍取一斗去滓取清八升煮藥取一升下芒硝三兩沸去滓分再服忌生菜千金療眼中息肉方驢脂石鹽末和以注眥即差千金翼礬石散主目瞖及努肉方礬石上上白者内如黍米大於瞖上及努肉上即令淚出以綿拭之令得惡汁盡日一其疾逐惡汁盡日日漸自薄便差好上上礬石無過絳礬色明淨者慎如療眼常法崔氏療人眼熱冷膚肉闇方光明硃砂一兩研硇砂一兩研漿水一大升右三味以五月五日合置銅器中日暴使乾用刀子刮取以新帛裹之每夜眠時著一米許安眼四眥各一米盡一月間内外暗者皆愈忌生血物出第四卷中必効療眼熱努肉及赤痒方黄連一兩碎竹葉一兩切右二味以水一升半煎取半升置銅器中湯上煎似稀餳止卧時㸃眼中熱淚出即差止謝道人療眼風熱生赤肉方大黄二兩黄芩一兩甘草炙人參地骨白皮決明子各三兩防風石膽地膚子黄連兔肝各一兩車前子一升螢火蟲一兩枚右十三味𢷬篩為散以鯉魚膽一合和丸飲下十五至三十丸忌豬肉海藻菘菜目風淚出方六首病源目為肝之外候若被風邪傷肝肝氣不足故令目淚出其湯熨針石别有正方補養宣導今附於後養生方導引法云以鼻内氣左手持鼻除目暗泣出又云端坐伸腰徐以鼻内氣以手持鼻除目暗淚出又夫五藏六腑皆有津液通於目者為淚若藏氣不足則不能収制其液故目自然淚出亦不因風而出不止本無赤痛並出第二十八卷中深師療眼淚出雞舌香丸方雞舌香二銖黄連六銖乾薑一銖蕤仁一百枚礬石二銖熬右五味𢷬為末以棗膏和丸如雞距以注眼眥忌豬肉又療眼白瞖淚出雞距丸方乾薑三分蕤仁三十枚雞舌香十枚黄連二銖胡粉四銖礬石五銖熬右六味𢷬末以棗膏丸如雞距注眼大眥日再忌豬肉又療風淚出眼痒痛散方貝齒十枚燒決明子黄連細辛乾薑各一分右五味𢷬下篩以指𤓰取如麻子注眥中日再三夏月加乾薑一分眼痛以三指撮二合水煮三沸去滓以汁洗之良何漢夀用甚有効驗集驗療目中風寒淚出眥赤痒乳汁煎方黄連三分蕤仁二分乾薑四分右三味𢷬散以乳汁一升漬藥一宿明旦於微火上煎得三合綿絞去滓取如米内眥中崔氏療目淚出方苦酒一斗古錢一百五十文右二味以苦酒漬錢微火煎取三升去錢濾取汁更煎取七合漸漸㸃著眥中甚良又療目中煙淚出不得開即刺痛方取石鹽如大豆許用内目中習習去鹽以冷水洗數日差並出第四卷中眯目方八首廣濟療眯目甑帶灰方取少許甑帶燒作灰水服方寸匕立出肘後同又療眯目不出淫膚瞿麥散方瞿麥乾薑各二分右二味為散以井花水服方寸匕日三不過三眯出又療眯目豬膏塞鼻方以豬膏如半雞子裹鼻孔中隨眯左右著鼻中以噏之即便仰卧須臾不知眯處又麥芒入目不出方煮大麥汁注眼中即出良肘後療目萃芒草沙石輩眯不出方磨好書墨以新筆㸃注目中瞳子上又方鹽豉各少許著水中臨目視之即出並出第一卷中深師療目痛及眯忽中傷因有熱瞑者方取地膚白注目中千金翼主眯目不明方椎羊鹿筋擘之内口中熟嚼著臉上以手輕挼之若有眯者二七過挼便出之視眯當著筋出即止未出者復為之如此法常以平旦日未出時為之以差為度出乾以好蜜注四眥頭鯉魚膽亦佳若數挼目痛可間日挼之出第十一卷中肝氣不足方二首千金翼補肝湯主肝氣不足兩脅拘急痛寒熱目不明并婦人心痛乳癰膝脛熱消渴𤓰甲枯口面青方甘草炙防風各三兩烏頭二兩炮大棗二十枚細辛栢子仁茯苓各二兩蕤仁桂心各一兩右九味切以水八升煮取三升分為三服忌海藻菘菜豬肉生葱菜酢物又補肝湯主肝氣不足方甘草炙黄芩人參桂心各二兩右四味切以水六升煮取二升分三服忌生葱餘同肝實目痛方二首刪繁療肝實熱目痛胷滿急塞㵼肝前胡湯丸方前胡秦皮細辛梔子仁黄芩升麻蕤仁決明子各三兩芒硝三兩苦竹葉切一升車前草切一升右十一味切以水九升煮取三升去滓内芒硝分為三服千金同又療肝實熱或眼痛熱不止生地黄煎方生地黄汁一升𤣥參汁五合蜜五合車前汁五合升麻細辛各二兩芍藥梔子各三兩切右八味切以水五升煮升麻等四物取一升五合去滓下生地黄等汁蜜沸成煎分五六服眼雜療方二十首内缺二方廣濟療客熱衝眼赤痛淚出決明湯方決明子升麻枳實炙柴胡黄芩芍藥各一兩梔子十四枚竹葉一升車前草四升甘草一兩炙右十味切以水九升煮取二升五合去滓内芒硝温服分為三服忌海藻菘菜又療先服石熱衝上眼赤方黄連苦參槐子各八兩蕤仁決明子黄芩各二分麥門冬六分去心萎蕤大黄各六分右九味𢷬篩蜜和丸如梧子食後以蜜水下二十至三十丸忌豬肉肘後療目卒痛珠子脱出及有青瞖方越鷰矢真丹乾薑各等分右三味末如粉以少許著目中瞖上良妙小品療眼風結腫合或眼生瞖人口吹之睛中牽引疼痛白睛赤起或黒變黄從下上覆半睛者秦皮湯方秦皮洗黄連各二分黄蘗三分大棗五枚蕤仁二分右五味切以水二升煮取一升以洗眼忌豬肉集驗療眼闇熱病後失明方以羊膽傅旦暮各一又療風眼爛眥者方竹葉四分栢白皮六分黄連四分右三味切以水二升煎取五合稍稍滴兩眥日三度忌豬肉刪繁療肝陽氣伏邪熱喘逆悶恐眼視無明狂悸非意而言竹瀝泄熱湯方竹瀝一升麻黄大青梔子人參𤣥參升麻茯苓知母各三兩石膏八兩碎生薑四兩芍藥四兩生葛八兩右十三味切以水九升煮取二升去滓下竹瀝更煎三五沸分三服忌酢物千金翼蕪菁子主明目益肌膚方蕪菁子三升淨淘髙著水煮二十沸出著水盆中淘之令水清接取以别釡煮之水盡即添益時嘗㸔味美瀝出暴乾右一味𢷬末酒飲等任意和服三方寸匕日惟服七合飽食任性酒服即服無限時慎生冷百日身熱瘡出不乆自差又療目赤口乾脣裂方石膏一斤生地黄汁一升赤蜜一升淡竹葉五升右四味以水一斗二升煮竹葉取七升去滓入石膏取一升半下地黄汁蜜取三升細細服之忌蕪荑並出第十一卷中文仲陶氏療數十嵗􅀈眼爛眥方摘葫葉中心一把著鐺中水五升煮用小板覆上穿作孔以目臨上瘡當痛食頃出淚一升便即差必効硃砂散主人眼中有黒白花逐眼上下方光明砂六分研地骨白皮五分車前子三分龍腦香六分決明子五分右五味𢷬篩細研如粉少少傅之近効療熱風暴赤臉爛生瘡或磣或疼或痒或痛乆患虚熱逺視不明喻若隔絹㸔花或服石乳發動冷熱淚出白睛赤紅腫脹淚裹眼珠皆是肝膈實熱腎藏已虚宜先服竹葉飲子治之然後可㸃藥凡患眼有連睛疼痛者皆不得以辛辣藥㸃之幸請細意詳思不得措手比見投方㸃藥未曽試驗各説異能競施衆療微有疼障似瞖者或有庸人不審眼珠厚薄乃将針穿至爪甲摩之傷敗非一今輙附數方百無一失且服之不令吐利㸃藥不痛不疼将攝既有所憑疾苦豈能不愈如前病狀宜服此竹葉飲子除風客熱暴磣澁疼痛睛赤目黄冷淚熱淚兼理石乳天行眼疾方竹葉一握乾葛三兩地骨白皮薺苨各五兩甘草三兩炙右五味切以水二大升煎取半升去滓内車前子三兩分三服一日令盡皆食後服之良不過三劑眼中疼痛歇次得㸃藥一無疼痛神効前方亦須傅藥抽熱毒風不然恐尋經脈入眼熱深入亦難差也又取羊肝一具或豬肝亦得豬肉精處亦堪取三斤皆須破作手許大片厚薄亦如手掌候其疼處或從眼後連耳上頭或有從眉向上入頭掣痛者火急新汲水中漬令極冷貼其疼痛脈上及所患部分候肝或肉稍暖徹則易之須臾間其肝肉等並熟如煮來者豈不是熱毒之候出也此即損眼之禍又恐三辰齋忌之月無肉以大豆還作四五替如漬肝肉法更互熨之其疼痛忽連鼻中酸辛者並是難差之候亦宜急覔吳藍莖葉𢷬如泥傅痛處亦有差者十得三四凡是此患不宜乆忍痛若深入於眼中漸成痼疾又療眼睛不疼亦不痛上下臉赤風痒生瘡淚多者宜㸃此藥方蕤仁四十九枚去赤皮研胡粉如碁子許大上火燒㸔赤變如金色右二味各别研取好真酥如杏核許大都一處和研令匀入龍腦香如大豆許大三粒研令消宜油帛裹或銅合子盛之勿泄氣傷風則不堪用或有小兒胎赤並宜用此方且不疼痛亦不損眼大人乆患赤痛爛瘡者宜先取鹽花或好白鹽一方寸匕醋漿水不用純酢中中者一大升煎鹽三五沸綿濾取汁欲夜卧先以清水洗眼次以鹽湯洗之拭令眼乾次以爪甲挑取麻子許多藥塗眼大小眥任眼開合須臾少淚出眼中涼冷狀若人吹不經三日内其赤便差視物漸明恐眼中忽有到眯毛刺眼者速令一人以鑷子摘去之否則令眼淚多磣痛若不除之塗藥終無益耳又凡目疾不問少長男女等所忌有五一房室二麪酒三目衝風冷霜雪向日逺視四哭泣嗔怒五終身不用喫生五辛蕎麥葵菜若因疾犯者則疾深難療幸細意将慎百無一失故具五忌也又療眼赤腫熱疼淚出燒人皮肉不可堪忍或石乳發動連睛疼悶乍歇乍發頭痛増寒臉赤瘡爛無所見物白膜覆黒珠或因天行斑毒入眼無所見者一切藥並不可著唯宜用此法甚驗萬無失一方千嵗虆汁一名蘡薁藤汁也不問春秋冬夏比採其莖削去上蒼皮麤細如大母指大者即得截㫁可長六七寸取一銅器或瓷器中盛水三五升漬之一食頃其頭白乳汁出可長半寸許取此汁將闕又療眼中一切諸疾青盲瞖者天行風赤無端忽不見物悉主之此方兵部侍郎盧英所傳價重千金石膽研波斯鹽碌研石決明烏賊魚骨去甲鈆丹細辛濃沙各三分蕤仁三兩碎防風三兩末秦皮三兩支馬蹄決明二兩淨右十一味𢷬散及研避風煮以白蜜鍊濾使淨和訖入臼中更𢷬五七千杵以油臘紙重裹之重合盛勿令見風可致百年不敗合之不欲見蟲大與鳥雀婦女及孝子穢惡之類仍取臘月合之有患取米粒更和上蜜如稀餳夜卧㸃之衝風行亦不畏每日㸃以差即止夏侯拯處傳又凡自天行病後皆不得食葵熱麵生五辛蕎麥魚膾毒物傷目就中更犯房室加之疼痛連眉乍疼乍痒鬢邉脈掣微似憎寒愚醫不曉遂妄針灸兼服補藥因茲失明或有先服英乳之人亦同斯疾宜即将理不得妄服湯丸甘苦酸辛須知冷熱只如腎風虚損瞳人脹大無瞖而便失明假如肝藏熱風筋膜連睛生薄浮瞖宜服甘平苦味之藥辛酸温熱入口發其風毒唯宜傅薄膏散熱氣自除少飲湯方攝理不盈三劑日漸痊愈吐利湯鍼灸不得妄施宜服後方療天行從因犯食毒失明兩鬢脈掣熱疼兼頭痛憎寒天隂即發及先食英乳者方前胡三兩生麥門冬五兩去心竹葉一握甘草二兩炙梔子二七枚乾葛萎蕤三兩漏蘆各三兩右八味切以水三大升煮取一大升分作三服神驗良忌海藻生菜又鼢鼠土膏療眼疼脈掣連耳熱疼不可堪者方取田中鼢䑕土二升青木香一兩大黄五兩白歛三兩寒水石六兩右五味𢷬篩為散用熟新白酒和如稠餳當痛掣處摩之如手掌許𫝊之乾即易至平旦午即止神効無比又眼有倒睫毛或折在臉中聚生刺人白睛唯覺痒悶漸赤膜起連上下臉多赤生瘡若掣刺黒睛則淚出似白瞖出若刺著瞳人令眼疼痛磣澁不欲見明連鼻駿痛兼腦掣疼此多損傷宜速救療其法如左若欲療之者皆取平晨日未出之際令一眼明人把鑷子拔之去倒睫毛勿使毛㫁連根去之下手十減八九疼痛立止至夜㸃前千嵗虆汁三五日将息方得平復㸃首生男乳汁良若㸃辛辣之藥從此傷敗實可痛哉慎風寒日月光及煙火房室五辛一月内即差又凡是黒睛及瞳人瑩薄有瘡瞖皆不可用辛辣及温藥洗之並是害眼之兆宜用秦皮湯洗之方秦皮一兩梔子仁二七枚淡竹葉一握右三味切綿裹以水一升半著銅器中煎三五沸以綿濾取洗眼切須淨器物盛之夏侯拯録用外臺秘要方卷二十一
