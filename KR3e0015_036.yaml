汁浸藥再宿如無蓮子草汁如地黃汁五小升浸藥於微火上內油脂等和煎九上九下以白芷色黃膏成布絞去滓欲塗頭先以好泔沐髮後以傅頭髮摩至肌又洗髮取棗根白皮銼一升以水三升煮取一升去滓以沐頭髮塗膏驗出第二卷中延年療頭風白屑風癢長髮膏方蔓荆子附子去皮澤蘭防風杏仁去皮零陵香藿香芎藭天雄辛夷各二兩沈香一兩松脂白芷各二兩馬鬐膏松葉切熊脂各一兩生麻油四升右十七味以苦酒漬一宿以脂等煎緩火三上三下白芷色黃膏成去滓濾收貯塗髮及肌中摩之日三兩度差又療熱風衝髮髮落生髮膏方松葉切蓮子草切鍊成馬鬐膏棗根皮切各一升韭根切蔓荆子碎各三合竹瀝豬脂各二升防風白芷各二兩辛夷仁吳藍升麻芎藭獨活寄生藿香沈香零陵香各一兩右十九味以棗根煮汁竹瀝等浸一宿以脂等煎之候白芷色黃膏成以塗頭髮及頂上日三五度妙古今録驗生髮及療頭風癢白屑膏方烏喙莽草細辛續斷石南草辛夷仁皂莢澤蘭白术防風白芷各二兩柏葉竹葉切各一升豬脂五升生麻油七升右十五味以苦酒漬一宿以油脂煎候白芷色黃膏成濾捩收以塗頭髮先沐洗後用之妙生髮膏方一十一首廣濟生髮方蓮子草汁一大升熊白脂一大合豬鬐膏一合生麻油一合柏白皮切三合山韭根切三合瓦衣切三合右七味以銅器煎之候膏成去滓收貯每欲梳頭塗膏令頭肌中髮生又黑又生髮膏方細辛防風續斷芎藭皂莢柏葉辛夷仁各一兩八銖寄生二兩九銖澤蘭零陵香各二兩十六銖蔓荆子四兩桑根汁一升韭根汁三合三勺竹葉切六合松葉切六升烏麻油四大升白芷六兩十六銖右十七味以苦酒韭根汁漬一宿以綿裹煎微火三上三下白芷色黃去滓濾以器盛之用塗摩頭髮日三兩度深師療頭風烏喙膏生髮令速長而黑光潤方烏喙莽草石南草續斷皂莢去皮子熬澤蘭白术各二兩辛夷仁一兩柏葉切半升豬脂三升右十味以苦酒漬一宿以脂煎於東向竈釡中以葦薪煎之先致三堆土每三沸即下致一堆土候沸定却上至三沸又置土堆上三畢成膏訖去滓置銅器中數北向屋溜從西端至第七溜下埋之三十日藥成小兒當刮頭日三塗大人數沐沐已塗之甚驗千金療脈極虛寒髮墮落安髮潤方桑根白皮切一升右一味淹漬煮五六沸去滓以洗沐髮數數為之不復落也又方麻子三升碎白桐葉切一把右二味以泔汁二升煮取八九沸去滓洗沐頭髮不落而長也翼同又生髮膏方胡麻油一升鴈脂一合丁子香甘松香各一兩半吳藿香細辛椒各二兩澤蘭白芷牡荆子苜蓿香大麻子各一兩芎藭防風莾草杏仁各三兩去皮竹葉切五合右十七味切以酢漬一宿煎之以微火三上三下白芷色黃膏成去滓以塗髮及頂尤妙出第十三卷中千金翼生髮膏令髮速長黑傅藥時特忌風方烏喙莽草續斷皂莢去皮子澤蘭竹葉細辛白术各二兩辛夷防風各一兩柏葉切四兩杏仁别搗松葉各三兩豬脂三升右十四味先以米酢漬一宿以脂煎三下三上膏成去滓塗髮及頂上又長髮方蔓荆子三升大附子二枚右二味以酒一斗二升漬之以瓷器盛之封頭二十日取雞脂煎以塗之澤以汁櫛髮十日長一尺勿近面塗驗又生髮附子松脂膏方附子松脂各二兩蔓荆子四兩搗篩右三味以烏雞脂和瓷器盛密縛頭於屋北隂乾百日藥成馬鬐膏和以傅頭如澤勿近面驗又生髮牆衣散方牆衣五合暴乾搗末鐡精一合合歡木灰二合水萍末三合右四味搗研末以生油和少許如膏以塗髮不生處日夜再即生髮效並出第五卷中近效生髮方蔓荆子青箱子蓮子草各一分附子一枚碎頭髮灰二匕右五味以酒漬內瓷器中封閉經二七日藥成以烏雞脂和塗之先以泔洗後傅之數日生長一尺也生眉毛方二首千金生眉毛方爐上青衣鐡生分等右二味以水和塗之即生甚妙又方七月烏麻花隂乾末生烏麻油二味和塗眉即生妙令髮黑方八首深師療生髮黑不白澤蘭膏方細辛續斷皂莢石南草澤蘭厚朴烏頭莽草白术各二兩蜀椒二升杏仁半升去皮右十一味切以酒漬一宿以鍊成豬脂四斤銅器中向東炊竈中煎三上三下膏成絞去滓拔白者以辰日塗藥皆出黑髮十日效又生長髮令黑有黃白者皆黑魏文帝用效祕之方黃芪當歸獨活芎藭白芷芍藥莽草防風辛夷仁乾地黃藁本蛇銜各一兩薤白切半升烏麻油四升半馬鬐膏二升右十五味切以微火煎三上三下白芷黃膏成去滓洗髮訖後塗之千金令白髮還黑方隴西白芷一升旋復花秦椒一升桂一尺右四味下篩以井華水服方寸七日三三十日白髮還黑禁房室又方烏麻九蒸九暴搗末以棗膏和丸久服之翼同又方取黑椹水漬之頻沐髮即黑效可塗傳之又方取生麻油浸烏梅塗髮良又方以鹽湯洗沐以生麻油和蒲葦灰傳之常用效出第十三卷中千金翼瓜子散主頭髮早白又虛勞腦髓空竭胃氣不和諸藏虛絶血氣不足故令人髮早白少而生蒜髮及憂愁早白逺視􅑩􅑩得風淚出手足煩熱恍惚忘誤連年下痢服之一年後大驗方瓜子一升白芷松子去皮當歸芎藭甘草炙各二兩右六味搗散食後服方寸匕日三酒漿湯飲任性服之忌如常法出第五卷中拔白髮良日并方三首千金翼白髮令黑方八角附子一枚大酢半升右二味於銅器中煎兩沸內好礬石大如碁子許一枚消盡內香脂三兩和令相得攪至凝內竹筒內拔白髮以膏塗拔根即生黑髮也出第五卷中備急拔白毛令黑毛生方拔去白毛以好白蜜敷拔處即生黑毛眉中無毛以鐡挑傷敷蜜亦生眉毛比見諸人以石子研丁香汁拔白毛訖急手以敷孔中即生黑毛此法神驗延年拔白髮良日正月四日二月八日三月十二十三日兩日並得四月十六日五月二十日六月二十四日七月二十八日八月十九日九月十五日十月十日十一月十日十二月十日右並以日正午時拔當日不得飲酒食肉五辛經一拔已後黑者更不變千金同變白髮染髮方五首范汪王子喬服菊增年變白方菊以三月上寅日採名曰五英六月上寅日採名曰容成九月上寅日採名曰金精十二月上寅日採名曰長生者根莖也隂乾百日取等分以成日合搗千杵下篩和以蜜丸如梧桐子日三服七丸百日身體潤一年白髮變黑二年齒落復生三年八十者變童兒又染髮方胡粉一分白灰一分右二味以雞子白和先以泔漿洗令淨後塗之即急以油帛裹之一宿以澡豆洗却黑軟不絶甚妙必效染白髮方揀細粒烏豆四升右一味以醋漿水四斗煮取四升去却豆以好灰汁淨洗髮待乾以豆汁熱塗之以油帛裹之經宿開之待乾即以熊脂塗揩還以油帛裹即黑如漆一塗三年不變妙驗又方搗木槿葉以熱湯和汁洗之亦佳近效換白髮及􅧋方嚴中書處得云驗熊脂二大兩臘月者佳白馬鬐脂一兩細切熬之以綿濾絞汁婆羅勒十顆其狀似尖齊于去皮取汁但以指甲搯之即有汁生薑一兩亦鐺中熬之母丁香半大兩右五味二味搗為末其脂鍊濾之以藥末相和令勻取一小槐枝左攪數千遍少頃即凝或似膏即拔白髮以辰日良以槐枝點藥拔一條即以藥令入髮眼孔中以措頭熟揩之令藥入十餘日便黑髮生此方妙髮黃方三首肘後髮黃方臘月豬脂膏和羊矢灰蒲灰等分傅黑也千金并翼同千金髮黃方大豆五升醋漿水二斗右二味煮取五升汁淋之頻為之黑翼同千金翼療髮黃方熊脂塗髮梳之散頭入牀底伏地一食頃即出便盡黑不過一升脂驗頭髮秃落方一十八首深師療髮白及秃落茯苓术散方白术一斤茯苓澤瀉豬苓各四兩桂心半斤右五味搗散服一刀圭日三食後服之三十日髮黑又療秃頭方蕪菁子末和酢傅之日一兩度千金同又方麻子二升熬焦末右一味以豬脂和塗之髮生為度千金同又方東行棗根長三尺以中央空右一味以甑中心蒸之以器承兩邊汁以傅頭即生髮良千金同肘後作桑根良又方麻子三升右一味搗末研內泔中一宿去滓以沐髮便生又方取爛熟黑椹二升右一味於瓷瓶中三七日化為水以塗洗之髮生妙千金同又療髮秃落生髮膏方馬鬐膏驢鬐膏豬脂熊脂狗脂鍊成各半合升麻防風薺苨各二兩蜣蜋四枚莽草白芷各兩右十一味以脂煎諸藥三上三下膏成去滓收以塗之千金并翼同又主髮落生髮方大黃六分蔓荆子一升白芷防風附子芎藭莽草辛夷細辛椒當歸黃芩各一兩馬鬐膏五合豬膏三升右十四味煎之以白芷色黃先洗後傅之驗又主風頭毛髮落不生方取鐡上生衣研以臘月豬脂塗之并主眉毛落悉生千金云合煎三沸又長髮方麻子一升熬令黑押取油以傅頭長髮鷹脂尤妙千金同又方多取烏麻花瓷甕盛密蓋封之深埋之百日出以塗髮易長而黑妙千金療髮落不生方取羊糞灰淋汁洗之三日一洗不過十洗大生翼同千金療髮落方柏葉一升附子二兩右二味搗以豬脂和作三十丸每洗頭時即內一丸於泔中洗髮即不落其藥以布裹蜜器貯勿令漏泄之又療髮落不生方取石灰三升水拌並令濕炒令極熱以絹袋盛之取好酒三升漬之密封冬二七日春秋七日取酒溫服一合常令酒氣相接七日落止百日服終身不落新髮旋生又方取桑根白皮一石水一石煮五沸以沐頭三遍即落止並出第五卷中必效療頭一切風髮秃落更不生主頭中二十種病頭眩面中風以膏摩之方䕡茹三兩半去皮細辛附子各二兩桂心半兩右四味搗篩以豬膏勿令中水去上膜及赤脈二十兩搗令脂銷盡藥成搗訖仍研恐其中有脂膜不盡以生布絞掠取以密器貯之先用桑柴灰汁洗髮令淨方云桑灰兩日洗待乾以藥摩須令入肉每日須摩如非十二月合則用生烏麻油和極效近效韋慈氏療頭風髮落并眼暗方蔓荆實三兩研桑生寄生桑根白皮各二兩韭根切三合白芷二兩甘松香零陵香各一兩馬鬐膏三合烏麻油一升甘棗根白皮汁三升松葉切二合五粒者右十一味細切諸藥內棗根汁中浸一宿數數攪令調濕匝已後旦內油脂中緩火煎之勿令火熱三五日候棗汁竭白芷色黃膏成去滓每日揩摩鬢髮及梳洗其藥浸經宿臨時以綿寬裹煎之膏成去滓綿濾以新瓷瓶盛稠濁者即先用却不堪久停特物近手糜壤也又宜服防風蔓荆子丸方防風黃連乾地黃各十六分甘皮六分萎蕤十分甘草八分炙茯神十二分蔓荆子二十分大黃八分錦文者右九味搗篩蜜和丸如桐子飲下二十丸稍稍加之以大腸暢為度盡更合服除眼中黑花令眼目明以差為度白秃方一十一首集驗療白秃方以大豆髑髏骨二味各燒末等分以臘月豬脂和如泥塗之立差千金松瀝煎療頭瘡及白秃方松瀝七合丹砂研雄黃研取精各二兩水銀研黃連各一兩礬石一兩燒本方無礬有峭粉一兩燒右六味搗散內瀝中攪令調以塗之先以泔洗髮令淨及瘡令無痂後敷藥日三後當作膿膿訖更洗塗藥如此三度作膿訖以甘草湯去藥毒可十度許洗即差又療白秃髮落生白痂終年不差方五味子三分蓯蓉二分松脂二分蛇牀子一分逺志三分菟絲子五分雄黃研雌黃研各一分白蜜一分雞屎白半分右十味搗篩以豬膏一升合煎先入雄黃雌黃次雞屎白次蜜次松脂次入諸藥末並先各各别末之候膏成先以桑柴灰洗頭後傅之又療白秃方煮桃皮汁飲并洗頭訖以麵豉二味和以傅之妙又方炒大豆令焦黑搗末和臘月豬脂熱暖之以塗傅上可裹勿令見風日並出第六卷中千金翼王不留行湯主白秃及頭面久瘡去蟲止痛方王不留行東引桃皮各五兩蛇牀子三升東引茱茰根五兩苦竹葉三升牡荆實蒺藜子各三升大麻子仁一升右八味以水二斗煮取一斗洗瘡日再并療􅏴疽妬乳月蝕瘡爛千金同又方以桃花末和豬脂傅上差為度又松脂膏主白秃及癰疽百種瘡悉治方杜蘅雄黃研木蘭皮礬石燒研附子大黃石南秦芁真珠苦參水銀各一兩松脂六兩右十二味細切諸藥以酢漬一宿豬脂一斤半煎之以附子色黃去滓乃內礬石雄黃水銀更煎三兩沸待凝以傅之並出第五卷中千金同必效主秃瘡方以童子小便暖用洗之揩令血出取白鴿糞五合熬末和醶醋令調塗之即差又主秃方取三月三日桃花開口者隂乾與桑椹等分搗末以豬脂和以灰汁洗後塗藥差又方栁細枝一握取皮水銀大如小豆皂莢一挺碎右三味以醋煎如餳以塗之赤秃方三首千金療赤秃方搗黑椹三升如泥先灰汁洗後以塗之又服之甚妙又方燒牛羊角灰和豬脂傅之又方馬蹄灰和臘月豬脂塗之令髮不生方三首千金令毛髮不生方􅑕灰以鱉脂和拔却毛髮即塗永不生又方取狗乳塗之又方拔毛髮以蟹脂塗之永不復生鬼舐頭方二首千金療鬼舐頭方燒貓屎灰以臘月豬脂和傅之又方取赤磚末以蒜搗和傅之澡豆方八首廣濟療澡豆洗面去皯𪒟風癢令光色悅澤方白术白芷白及白斂茯苓藁本萎蕤薯蕷土瓜根天門冬百部根辛夷仁栝樓藿香零陵香雞舌香各三兩香附子阿膠各四兩炒白麵三斤楝子三百枚蓽豆五升皂莢十挺去皮子右二十二味搗篩以洗面令人光澤若婦人每夜以水和漿塗面至明溫漿水洗之甚去面上諸疾千金療澡豆方丁香沈香桃花青木香木瓜花鍾乳粉各三兩麝香半兩㮈花櫻桃花白蜀葵花白蓮花紅蓮花各四兩李花梨花旋復花各六兩玉屑真珠各二兩蜀水花一兩右十八味搗末乳等并研以絹下之合和大豆末七合研之千遍蜜貯勿泄常以洗手面後作粧百日面如玉光潤悅澤去臭氣粉滓咽喉臂膊皆用洗之悉得如意又澡豆方豬􅏬一具去脂豆末四升細辛土瓜根白术藁本防風白芷茯苓商陸根白附子杏仁桃仁各四兩去尖皮栝樓三枚皂莢五挺炙去皮子冬瓜仁半升雀屎半合菟絲子一合搗末右十八味搗末以麵一斗用漿水和豬􅏬研令爛和諸藥及麵作餅子暴乾搗絹篩收貯勿令遇風洗手面極妙又澡豆令人洗面光潤方白解皮鷹屎白白芷青木香甘松香白术桂心麝香白檀香丁子香各三兩冬瓜子五合白梅三七枚雞子白七枚豬􅏬三具麵五升土瓜根一兩杏仁二兩去皮右十七味以豬􅏬和麵暴令乾然後諸藥搗散和白豆末三升以洗手面十日如雪三十日如凝脂妙無比崔氏澡豆悅面色如桃花光潤如玉急面皮去皯􅍍粉刺方白芷七兩芎藭五兩皂莢末四兩萎蕤白术各五兩蔓荆子二合冬瓜仁五兩梔子仁三合栝樓仁三合蓽豆三升豬腦一合桃仁一升去皮鷹屎三枚商陸三兩細銼右十四味諸藥搗末其冬瓜仁桃仁梔子仁栝樓仁别搗如泥其豬腦鷹屎合搗令相得然後下諸藥更搗令調以冬瓜瓤汁和為丸每洗面用漿水以此丸當澡豆用訖傅面脂如常粧飾朝夕用之亦不避風日備急蓽豆香澡豆方蓽豆一升白附子芎藭芍藥白术栝樓商陸根桃仁去皮冬瓜仁各二兩右九味搗末以洗面如常法此方甚妙延年澡豆洗手面藥豆屑方白茯苓土瓜根商陸根萎蕤白术芎藭白芷栝樓藁本桃仁各六兩去皮皂莢五挺去皮子豆屑二升豬􅏬三具暴乾豬蹄四具治如食法爛煮取汁麵一斗右十五味取豬蹄汁拌諸藥等暴乾搗散以作澡豆洗手面妙蘇澄藥澡豆方白芷芎藭栝樓子各五兩青木香雞舌香各三兩皂莢十兩去皮子炙蓽豆赤小豆各二升右八味搗末和散任用洗手面去皯靤妙手膏方三首千金翼手膏方桃仁杏仁各二兩去皮橘仁一合赤匏十枚辛夷仁芎藭當歸各一兩大棗二十枚牛腦羊腦白狗腦各二兩無白狗各狗亦得右十一味搗先以酒漬腦又别以酒六升煮赤匏以上藥令沸待冷乃和諸腦等勻然後碎辛夷等三味以綿裹之棗去皮核合內酒中以瓷器貯之五日以後先洗手訖取塗手甚光潤而忌火炙手備急作手脂法豬􅏬一具白芷桃仁去皮細辛各一兩辛夷冬瓜仁黃瓜樓仁各二兩末酒二升右八味煮白芷沸去滓膏成以塗手面光潤妙古今録驗手膏方白芷四兩芎藭藁本萎蕤冬瓜仁楝仁各三兩桃仁一升去皮棗肉二十枚豬􅏬四具冬瓜瓤汁一升橘肉十枚栝樓子十枚右十二味以水六升煮取二升酒三升挼豬􅏬取汁桃人研入以洗手面口脂方三首千金翼口脂方熟朱二兩紫草末五兩丁香二兩麝香一兩右四味以甲煎和為膏盛於匣內即是甲煎口脂如無甲煎即名唇脂非口脂也備急作唇脂法蠟二分羊脂二分甲煎一合須别作自有方紫草半分硃砂二分右五味於銅鍋中微火煎臘一沸下羊脂一沸又下甲煎一沸又內紫草一沸次硃砂一沸㵼著筒內候凝任用之古今録驗合口脂法好熟硃砂三兩紫草五兩丁香末二兩麝香末一兩口脂五十挺武德六年十月內供奉尚藥直長蔣合進沈香三升五藥上蘇合四兩半麝香二兩甲香五兩白膠香七兩雀頭香三兩丁香一兩蜜一升右十四味並大稱大兩粗搗碎以蜜總和分為兩分一分內瓷器瓶內其瓶受大四升內訖以薄綿幕口以竹篾交絡蔽瓶口藿香二兩苜蓿香一兩零陵香四兩茅香一兩甘松香一兩半右五味以水一斗酒一升漬一宿於胡麻油一斗二升內煎之為澤去滓均分著二坩各受一斗掘地著坩令坩口與地平土塞坩四畔令實即以上甲煎瓶器覆中間一尺以粳火燒之常令著火粳作火即散著粳三日三夜燒十石粳即好冷出之綿濾即成甲煎蠟七斤上硃砂一斤五兩研令精細紫草十一兩於蠟內煎紫草令色好綿濾出停冷先於灰火上消蠟內甲煎及攪看色好以甲煎調硬即加煎軟即加蠟取點刀子刃上看硬軟著紫草於銅鐺內消之取竹筒合面紙裹繩纒以鎔脂注滿停冷即成口脂模法取乾竹徑頭一寸半一尺二寸鋸截下兩頭並不得節堅頭三分破之去中分前兩相著合令蜜先以冷甲煎塗摸中合之以四重紙裹筒底又以紙裹筒令縫上不得漏以繩子牢纒消口脂㵼中令滿停冷解開就模出四分以竹刀子約筒截割令齊整所以約筒者筒口齊故也前有麝香末一兩後又有麝二兩未詳燒甲煎法六首千金翼甲煎法甲香三兩沈香六兩丁香藿香各四兩薰陸香楓香膏麝香各二兩大棗十枚取肉右八味㕮咀如豆片又以蜜二合和攪內瓷坩中以綿裹口將竹篾交絡蔽之又油六升零陵香四兩甘松二兩綿裹內油中銅鐺緩火煎四五沸止去滓更內酒一升半并內煎坩中亦以竹篾蔽之然後剜地為坑置坩於上使出半腹乃將前小香坩合此口上以濕紙纒兩口仍以泥塗上使厚一寸訖竈下暖坩火起從旦至暮暖至四更止明發待冷看上坩香汁半流瀝入下坩內成矣崔氏燒甲煎香澤合口脂方蘭澤香半斤零陵香一斤甘松香五兩吳藿香六兩新壓烏麻油一升右五味並大斤兩揀擇精細暖水淨洗以酒水漬使調勻經一日一夜並著銅鐺中緩火煮之經一宿通前滿兩日兩宿唯須緩火煎訖漉去香滓澄取清以綿濾總訖內著瓷坩中勿令香氣泄出封閉使如法沈香一斤丁香甲香各一兩麝香薰陸香艾納各半小兩白膠香蘇合香各一兩右八味並大斤兩令别搗如麻子大先鍊白蜜去上沫盡即取沈香等於漆盤中和之使調勻若香乾取前件香澤和使勻散內著瓷器中使實看瓶大小取香多少别以綿裹以塞瓶口緩急量之仍用青竹篾三條􅳞之即覆瓶口於前件所燒香澤瓶口上仍使兩口上下相合然後穿地埋著香澤瓶口共地平覆合香瓷瓶令露乃以濕紙纒瓶口相合處然後以麻搗泥瓶口邊厚三寸盛香瓶上亦令遍厚一寸以炭火繞瓶四邊緩炙使薄乾然後始用粳火馬糞火亦佳燒經三宿四日勿得斷火看之必使調勻不得有多少之處香汁即下不勻三宿四日燒訖即住火其香澤火傷多即焦令帶少生氣佳仍停經兩日使香餅冷訖然始開其上瓶總除却更取别瓶內一分香於瓶中燒之一依前法若無别瓶還取舊瓶亦得其三分者香並燒訖未得即開仍經三日三夜停除火訖又經兩日其甲煎成訖澄清斟量取依色鑄㵼其沈香少即少著香澤只一遍燒上香瓶亦得好味五升銅鐺一口銅鉢一口黃蠟一大斤右件蠟置於鐺中緩火煎之使沫銷盡然後傾鉢中停經少時使蠟冷凝還取其蠟依前銷之即擇紫草一大斤用長竹著挾取一握置於蠟中煎取紫色然後擢出更著一握紫草以此為度煎紫草盡一斤蠟色即足若作紫口脂不加餘色若造肉色口脂著黃蠟紫蠟各少許若朱色口脂凡一兩蠟色中和兩大豆許硃砂即得但搗前件三色口脂法一兩色蠟中著半合甲煎相和著頭點置竹上看堅柔得所㵼著竹筒中斟酌凝冷即解看之又煎甲煎先須造香油方零陵香藿香各一兩並銼之以酒拌微濕用綿裹內烏麻生油二升緩火一宿絞去滓將油安三升瓶中掘地作坑埋瓶於中瓶口向地面平沈香一斤小甲香八兩麝香三兩蘇合香一兩右六味並搗如大豆粒以蜜拌內一小角瓶中用竹篾封其口勿令香漏將此角瓶倒捶土中瓶口內以紙泥泥兩瓶接口處不令土入用泥泥香瓶上厚六七分用粳火一石燒上瓶其火微微不得烈使粳盡煎乃成矣並出第九卷中古今録驗甲煎方沈香甲香各五兩檀香半兩麝香一分香附子甘松香蘇合香白膠香各二兩右八味搗碎以蜜和內小瓷瓶中令滿綿幕口以竹篾十字絡之又生麻油二升零陵香一分半藿香二分茅香二分又相和水一升漬香一宿著油內微火上煎之半日許澤成去滓别一瓷瓶中盛將小香瓶覆著口入下瓶口中以麻泥封并泥瓶厚五分埋土中口與地平泥上瓶訖以粳火微微半日許著瓶上放火燒之欲盡粳勿令絶三日三夜煎成停二日許得冷取澤用之云停二十日轉好云燒不熟即不香須熟燒此方妙又方蠟蜜各十兩紫草一兩半右三味和蠟煎令調紫草和朱砂併澤瀉筒中蔡尼甲煎方沈香六兩丁香􅀢香四兩楓香青木香各二兩麝香一具大棗十枚肉甲香三兩右八味銼以蜜一合和拌著坩內綿裹竹篾絡之油六升零陵香四兩甘松香二兩綿裹著油中煎之緩火可四五沸即止去香草著坩中埋出口將小香坩合大坩濕紙纒口泥封可七分須多著火從旦至午即須緩火至四更即去火至明待冷發看成甲煎矣造燕脂法一首崔氏造燕脂法準紫鉚一斤别搗白皮八錢别搗碎胡桐淚半兩波斯白石蜜兩磊右四味於銅鐵鐺器中著水八升急火煮水令魚眼沸內紫鉚又沸內白皮訖攪令調又沸內胡桐淚及石蜜總經十餘沸紫鉚並沈向下即熟以生絹濾之漸漸浸疊絮上好淨綿亦得其番餅小大隨情每浸訖以竹夾如乾脯獵於炭火上炙之燥復更浸浸經六七遍即成若得十遍以上益濃美好出第九卷中造水銀霜法二首千金翼飛水銀霜法水銀一斤朴硝八兩大醋半升黃礬十兩鍚二十兩成鍊三遍者玄精六兩鹽花三斤右七味先鍊鍚訖又溫水銀令熱乃投鍚中又搗玄精黃礬令細以絹下之又搗鍚令碎以鹽花并玄精等合和以醋拌令濕以鹽花一斤藉底乃布藥令平以朴硝蓋上訖以盆蓋合以鹽灰為泥泥縫際乾之微火三日武火四日凡七日去火一日開之掃取極須勤心守勿使須臾間解慢則大失矣出第五卷中崔氏造水銀霜法水銀石硫黃伏龍肝各十兩細研鹽花一兩鹽末是也右四味以水銀别鐺熬石硫黃碎如豆並别鐺熬之良久水銀當熱石硫黃消成水即併於一鐺中和之宜急傾併併不急即兩物不相入併訖下火急攪不得停手若停手即水銀别在一邊石硫黃如灰死亦别在一處攪之良久硫黃成灰不見水銀即與伏龍肝和攪令調并和鹽末攪之令相得别取鹽末羅於鐺中令遍底厚一分許乃羅硫黃伏龍肝鹽末等於鐺中如覆蒸餅勿令全遍底羅訖乃更别羅鹽末覆之亦厚一分許即以盆覆鐺以灰鹽和土作泥塗其縫勿令乾裂裂即塗之唯令勿泄炭火氣飛之一復時開之用火先緩後急開訖以老雞羽掃取皆在盆上凡一轉後即分舊土為四分以一分和成霜研之令調又加二兩鹽末準前法飛之訖棄其土又以餘一分土和飛之四分凡得四轉及初飛與五轉每一轉則棄其土五轉而土盡矣若須多轉更用新土依前法飛之七轉而可用之出第九卷中鹿角桃花粉方二首崔氏鹿角粉方取角三四寸截之乃向炊竈底燒一遍去中心虛惡者并除黑皮訖搗作末以絹篩下水和帛練四五重置角末於中絞作團大小任意於炭火中熟燒即將出火令冷又搗碎作末還以水和更以帛練四五重絞作團如此四五遍燒搗碎皆用水和已後更三遍用牛乳和燒搗一依前法更搗碎於瓷器中用玉鎚研作末將和桃花粉佳又桃花粉方光明砂雄黃熏黃並研末真硃末鷹糞珊瑚雲母粉麝香用當門子鹿角粉無問多少各等分右九味研以細為佳就中鹿角粉多少許無妨薰衣濕香方五首千金濕香方沈香三分零陵香􅀢香麝香各六分薰陸香一分丁子香二分甲香半分以水洗熬甘松香二分檀香一分藿香二分右十味粗搗下篩蜜和瓦燒之為濕香薰衣出第六卷中千金翼薰衣濕香方薰陸香八兩詹糖香五兩覽探藿香各三兩甲香二兩青桂皮五兩右六味先取硬者黏濕難碎者各别搗或細切㕮咀使如黍粟然後二薄布於盤上自餘别搗亦别於其上有頃篩下者以紗不得太細别煎蜜就盤上以手搜搦令勻後乃搗之燥濕必須調適不得過度太燥則難丸太濕則難燒易盡則香氣不發難盡則煙多煙多則唯有焦臭無復芬芳是故香須粗細燥濕合度蜜與香相稱火又須微使香與緑煙共盡出第五卷中備急六味薰衣香方沈香麝香一兩蘇合香一兩半丁香二兩甲香一兩酒洗蜜塗微炙白膠香一兩右六味藥搗沈香令碎如大豆粒丁香亦搗餘香訖蜜丸燒之若薰衣加艾納香半兩佳又方沈香九兩白檀香一兩麝香二兩並和搗丁香一兩二銖蘇合香一兩甲香二兩酒洗準前薰陸香一兩二銖和搗甘松香一兩别搗右八味蜜和用瓶盛埋地底二十日出丸以薰衣又薰衣香方沈水香一斤銼酒漬一宿􅀢香五兩雞骨者甲香二兩酒洗蘇合香一兩如無亦得麝香一兩丁香一兩半白檀香一兩别研右七味搗如小豆大小相和以細羅羅麝香內中令調以蜜器盛封三日用之七日更佳欲薰衣先於潤地陳令浥浥上籠頻燒三兩大佳火炷籠下安水一碗燒訖止衣於大箱中裛之經三兩宿後復上所經過處去後猶得半日以來香氣不歇正觀年中勑賜此方裛衣乾香方五首千金乾香方麝香沈香甘松香各二兩丁香􅀢香各一兩藿香四兩右六味合搗下篩用裛衣大佳出第六卷中千金翼裛衣乾香方沈香苜蓿香各五兩白檀香三兩丁香藿香青木香各一兩甘松香各一兩雞舌香一兩零陵香十兩艾納香二兩雀頭香一兩麝香半兩右十二味各搗如黍粟麩粳勿令細末乃和相得若置衣箱中必須綿裹之不得用紙秋冬猶著盛熱暑之時香速絶凡諸香草必須及時乃佳若欲少作者準此為大率也出第五卷中備急裛衣香方藿香零陵香甘松香各一兩丁香二兩右四味細銼如米粒微搗以絹袋盛衣箱中南平公主方又方澤蘭香甘松香麝香各二兩沈香檀香各四兩苜蓿香五兩零陵香六兩丁香六兩右八味粗搗絹袋盛衣箱中貯之又方麝香研蘇合香鬱金香各一兩沈香十兩甲香四兩酒洗熬丁香四兩吳白膠香詹糖香六兩右八味搗以絹袋盛裛衣中香炒外臺祕要方卷三十二
