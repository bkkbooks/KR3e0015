body:
  text: 外臺祕要方卷三十二唐王燾撰面膏面脂兼療面病方一十三首千金翼論曰面脂手膏衣香澡豆士人貴勝皆是所要然今之醫門極為祕惜不許子弟泄漏一法至於父子之間亦不傳示然聖人立法欲使家家悉解人人自知豈使愚於天下令至道不行壅蔽聖人之意甚可怪也又面脂方主面及皴皺靨黑皯凡是面上之病皆悉主之丁香十一分零陵香桃仁去皮土瓜根白斂白及防風當歸沈香辛夷商陸麝香研梔子花芎藭各十二分蜀水花青木香各八分白芷萎蕤莵絲子藿香甘松香各十五分木蘭皮白􅀈蠶藁本各十分茯苓十八分冬瓜仁十六分鵝脂羊髓各一升半羊腎脂一升豬􅏬六具清酒五升生豬肪脂三大升右三十二味挼生豬􅏬汁漬藥一宿於脂中煎三上三下以白芷色黃去滓以上件酒五升挼豬􅏬以炭火微微煎膏成貯器中以塗面又面膏方杜蘅杜若防風藁本細辛白附子木蘭皮當歸白术獨活白茯苓萎蕤白芷天門冬玉屑各一兩莵絲子防己商陸梔子花橘仁冬瓜仁􅀢蕪花各三兩藿香丁香零陵香甘松香青木香各二兩麝香半兩白鵝脂如無半升白羊脂牛髓各一升羊􅏬三具右三十二味先以水浸膏髓等五日日滿别再易水又五日日别一易水又五日二日一易水凡二十日止以酒一升挼羊􅏬令消盡去脈乃細切香於垍器中浸之密封一宿曉以諸脂等合煎三上三下以酒水氣盡為候即以綿布絞去滓研之千遍待凝乃止使白如雪每夜塗面晝則洗却更塗新者十日以後色等桃花本方白斂人參各三兩無蘼蕪花冬瓜仁此皆是面膏藥疑更有此二味又方香附子十枚大者白芷二兩零陵香二兩茯苓一兩並以大兩蔓菁油二升無以豬膏充牛髓羊髓各一升水漬白臘八兩麝香二分右九味以油髓微火煎五物令色變去滓內麝香研千遍凝用澡豆洗面後塗敷之又方杏仁二升去皮白附子三兩密陀僧二兩研如粉白羊髓二升半真珠十四枚搗研如粉白鮮皮一兩雞子白七枚胡粉二兩以石米下闕又方防風白及芎藭各三兩白术八分甘松白斂木蘭皮栝樓白芷藁本桃花蜀水花商陸密陀僧白􅀈蠶零陵香杜蘅鷹屎白萎蕤土瓜根各三分麝香丁香各二兩白附子玉屑各四分鵝脂五合鹿髓一升羊髓一升白臘四兩豬膏二升右二十九味細切酢漬密封一宿明旦以豬膏煎三上三下白芷色黃為藥成去滓攪數萬遍令色白以傅面慎風日良又方防風芎藭白芷白􅀈蠶蜀水花白斂細辛茯苓藁本萎蕤青木香辛夷仁當歸土瓜根栝樓各三分桃仁去皮尖豬脂二升鵝脂一升羊腎脂一升右十九味細切綿裹酒二升浸一日一夜便內脂中急火煎之三上三下然後緩火一夜藥成去滓以寒水石粉三分內脂中以栁木箆熟攪任用之並出第五卷中千金面膏去風寒令面光悅耐老去皺方青木香白附子芎藭白蠟零陵香白芷香附子各二兩茯苓甘松各一兩羊髓一升半鍊之右十味以酒水各半升漬藥經宿煎三上三下候酒水氣盡膏成去滓收貯任用塗面作粧皯􅍍皆落又方玉屑芎藭土瓜根白芷冬瓜仁木蘭皮萎蕤桃仁去皮白附子各四兩商陸根五分辛夷莵絲子藁本白􅀈蠶當歸黃耆藿香細辛防風麝香青木香各三分豬􅏬三具蜀水花一合鷹屎白一合白狗脂一升鵝脂一升熊脂二升右二十七味細切以清酒漬一宿微火煎一日以新布絞去滓以塗面切慎風任用之出第六卷中崔氏蠟脂方白蠟十兩煉令白桃花莵絲子白芷木蘭皮細辛辛夷仁白茯苓土瓜根栝樓根白附子杜蘅桃仁去皮杏仁去皮各三分蔓菁子油二升半羊髓牛髓鹿髓脂各一合右十八味並細切以苦酒漬一宿用上件臘油髓脂等煎如面脂法其蔓菁油酒在前煎令煙出後始下蠟髓訖內諸藥候白芷色黃膏成任用每以澡豆洗面後以塗之又常用臘脂方蔓菁油三升甘松香一兩零陵香一兩辛夷仁五分白术二升細辛五分竹筎一升竹葉切五合白茯苓三分蘼蕪花三分羊髓半升以水浸去赤脈錬之麝香任炙右十二味切以綿裹酒浸經再宿絞去酒以脂中煎緩火令沸三日許香氣極盛膏成乃鍊蠟令白看臨熟下臘調瓷硬得所貯用之出第九卷中文仲療人面無光潤黑及皺常傅面脂方細辛萎蕤黃耆白附子薯蕷辛夷芎藭白芷各一分栝樓木蘭皮各二分豬脂二十鍊成右十一味切以綿裹用少酒漬一宿內脂膏煎之七上七下别出一斤白芷煎色黃藥成去滓攪凝以傅面任用之亦主金瘡止血良延年面脂方白术茯苓杜蘅各六分萎蕤藁本芎藭土瓜根栝樓各五分木蘭皮白􅀈蠶蜀水花辛夷仁零陵香藿香各四兩莵絲子八分梔子花麝香酒浸綿裹鷹屎白各三分冬瓜仁五分桃仁五合並令碎白蠟三兩羊脂腎邊者一升豬脂三升水浸七日日别易水豬􅏬一具白附子四分右二十五味並細切酒二升取豬􅏬桃仁冬瓜仁綿裹內酒中挼令消絞取汁用漬藥一宿别煎豬脂令消去滓以鵝脂羊脂白蠟於鐺中用綿裹內鐺微火煎三上三下藥黃色去滓待澄候凝內鷹屎末攪令勻以塗面妙又方防風萎蕤芎藭白芷藁本桃仁去皮白附子各六分茯苓八分細辛甘松香零陵香各二分當歸栝樓研各四分蜀椒五十粒鸕鷀屎冬瓜仁研各三分麝香一分右十七味酒浸淹潤一夕明日以綿薄寬裹之以白鵝脂三升羊脂三升並鍊成者以煎之於銅器中微火上煎使之沸勿使焦也乃下之三上看白附子色黃膏成去滓又入鐺中上火內麝香氣出仍麝香更以綿濾度之乃內栝樓仁桃仁冬瓜仁等脂并鷹屎鸕鷀屎粉等攪令調膏成待凝以瓷器貯栁木作槌子於鉢中研使輕虛得所生光研之無度數二三日研之方始好唯多則光滑任用洗面藥方二首千金翼面藥方朱砂研雄黃水銀霜各半兩胡粉二兩黃鷹屎一升右五味合和洗淨面夜塗以一兩霜和面脂令稠如泥先於夜欲卧時以澡豆淨極洗面并手乾拭以藥塗面厚薄如尋常塗面厚薄乃以指細細熟摩之令藥與肉相入乃卧一上經五日五夜勿洗面止就上作粉即得要不洗面至第六夜洗面塗一如前法滿三度塗洗更不塗也一如常洗面也其色光淨與未塗時百倍佳出第五卷中延年洗面藥方萎蕤商陸根栝樓杜若滑石各八兩土瓜根芎藭辛夷仁甘松香各三兩黃瓜樓五枚去皮白茯苓白芷一斤木蘭皮零陵香各三兩麝香二兩蓽豆二升冬瓜二升去皮豬蹄三具右十八味搗為散和蓽豆以水桃仁冬瓜仁黃瓜樓子揉之令碎豬蹄汁中挼令散和藥作餅子暴乾搗篩更和豬蹄汁又捻作餅更暴乾汁盡乃止搗篩為散稍稍以洗手面妙面色光悅方五首千金療人令面悅澤好顔色方豬姬三具蕪菁子二兩栝樓子五兩桃仁三兩去皮右四味以酒和之搗如膏以傅面慎風日妙又方酒漬三月三日桃花服之好顔色治百病又方採三株桃花隂乾為散以酒飲服方寸匕日三令面光悅如紅出第六卷中千金翼令面生光方密陀僧以乳煎塗面即生光出第五卷中延年去風令光潤桃仁洗面方桃仁五合去皮右一味用粳米飯漿水研之令細以漿水搗取汁令桃人盡即休微溫用洗面時長用極妙令面色白方四首千金療面黑不白淨方白鮮皮白殭蠶芎藭白附子鷹屎白白芷青木香甘松香白术白檀香丁子香各三分冬瓜仁五合白梅二七枚去核瓜子一兩杏仁三十枚去皮雞子白七枚大棗三十枚去核豬姬三具麵三升麝香二分研右二十味先以豬姬和麵暴令乾然後合諸藥搗篩又以白豆屑二升為散旦用洗面手十日以上太白神驗出第六卷中文仲令人面白似玉色光潤方羊脂狗脂各一升白芷半升烏喙十四枚大棗十枚麝香少許桃仁十四枚甘草一尺炙半夏半兩洗右九味合煎以白芷色黃去滓塗面二十日即變五十日如玉光潤妙又隱居效驗面黑令白去黯方烏賊魚骨細辛栝樓乾薑蜀椒各三兩右五味切以苦酒漬三日以成鍊牛髓二斤煎之以酒氣盡藥成作粉以塗面醜人亦變鮮妙光華近效則天大聖皇后鍊益母草留顔方用此草每朝將以洗手面如用澡豆法面上皯𪒟及老人皮膚兼皺等並展落浮皮皮落著手上如白垢再洗再有效淳用此藥已後欲和澡豆洗亦得以意斟酌用之初將此藥洗面覺面皮手滑潤顔色光澤經十日許特異於女面經月餘生血色紅鮮光澤異於尋常如經年久用之朝暮不絶年四五十婦人如十五女子俗名鬱臭此方仙人祕之千金不傳即用藥亦一無不效世人亦有聞説此草者為之皆不得真法今録真法如後可勿傳之五月五日收取益母草暴令乾燒作灰取草時勿令根上有土有土即無效燒之時預以水灑一所地或泥一爐燒益母草良久燼無取斗羅篩此灰乾以水熟攪和溲之令極熟團之如雞子大作丸於日裏暴令極乾訖取黃土泥泥作小爐子於地四邊各開一小孔子生剛炭上下俱著炭中央著藥丸多火經一炊久即微微著火燒之勿令火氣絶絶即不好經一復時藥熟切不得猛火若藥鎔變為瓷巴黃用之無驗火微即藥白色細膩一復時出之於白瓷器中以玉捶研絹篩又研三日不絶收取藥以乾器中盛深藏旋旋取洗手面令白如玉女項頸上黑但用此藥揩洗並如玉色祕之不可傳如無玉捶以鹿角捶亦得神驗面皯方十三首廣濟療面皯方雄黃七分雌黃五分並以綿裹於漿水中煮一日光明砂密陀僧五分內豬脂中煮數沸煮訖洗用真珠三分研末峭粉三分白􅀈蠶三分白及三分茯苓五分水銀五分和藥末研令消盡右十味各研如粉訖相和又研之令勻少減取和豬脂面脂攪令調每夜用澡豆漿水洗去粧勿衝風及火千金療面皯方李子仁和雞子白塗上則落又方真白羊乳三升羊􅏬兩具以水漬去皮細擘甘草二兩炙末右三味相和一宿先以酢漿水洗面以生布拭之夜塗藥明旦以豬蹄湯洗却又依前為之即盡又方白附子末以水和塗上頻頻用即落盡又方桂心石薑末蜜和塗之又方杏仁酒浸皮脫搗如泥以絹囊裹夜則拭之效又方水和丹砂末服方寸匕男女七日皆色白也又方美酒浸雞子三枚蜜封四七日成塗面淨好無比又方狗杞根一百斤生地黃三十斤右二味先下篩狗杞又搗碎地黃暴乾合下篩空腹服方寸匕日三效文仲療皯令人面皮薄如蕣萆方鹿角尖取實白處於平石上以水磨之稍濃取一升二合乾薑一兩右二味搗篩乾薑以和鹿角汁攪使調每夜先以暖漿水洗面軟帛拭乾取上白蜜塗面以手摩使蜜盡手指不粘為候後塗藥平明還以暖漿水洗之二三日顔色驚人塗藥不用過見風日妙救急療面皯方芍藥茯苓杏仁去皮防風細辛白芷各一兩白蜜一合右七味搗為散先以水銀霜傅面三日方始取前件白蜜以和散藥傅面夜中傅之不得見風日向曉任意作粉能常用大佳每夜先須漿水洗面後傅藥古今録驗療面皯方取白蜜和茯苓粉傅面七日愈又療面皯黯蘇合煎方蘇合香麝香白附子炮女菀蜀水花各二兩青木香三兩雞舌香鸕鷀屎各一兩右八味先取糯米二升淅硬炊一斗生用一斗合醇酢用水一斛五斗稍稍澄取汁合得一斛煮並令沸以綿裹諸藥內著沸漿中煎得三升藥熟以澡豆洗皯處令燥以藥傅皯上日再欲傅藥常以酢漿水洗面後塗藥塗藥至三四合皯處當小急痛皯處微微剝去便白以漿三洗三傅玉屑膏訖白粉之若急痛勿怪癢勿搔之但以粉粉上面按抑癢處滿百日可用脂胡粉取差面皯黯方二十一首肘後療面多皯黯如雀卵色者方以苦酒漬白木以拭面上即漸漸除之又方以羚羊膽酒二升合煮三沸以塗拭之日三差又方羊膽豬頭細辛末煎三沸塗面平旦以醋漿水洗之又方茯苓白石脂等分末和蜜塗之日三除去文仲療皯黯方杏仁去皮搗末雞