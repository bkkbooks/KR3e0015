body:
  text: 外臺秘要方巻二十五唐王燾撰水榖痢方一十首病源水榖痢者由體虚凑理開血氣虚春傷於風邪氣留連在肌肉之間後遇脾胃大腸虚弱而邪氣乗之故為水榖痢也脾與胃為表裏胃者脾之府也為水糓之海脾者胃之藏也其候身之肌肉而脾氣主消水榖水榖消其精化為榮衛以飬其藏充實肌膚大腸肺之腑也為傳道之官化物出焉水榖之精化為血氣者行於經脉其糟粕行於大腸也肺與大腸為表裏而肺主氣其候身之皮毛春陽氣雖在表而血氣尚弱其飲食居處運動勞役血氣虚者則為風邪所傷客在肌肉之間後因脾胃氣虗風邪又乗虚而進入於腸胃其脾氣弱者不能尅制水榖故糟粕不結聚而變為痢也又新食竟取風名為胃風其狀惡風頭多汗膈下塞不通食飲不下腹脹形瘦腹大失衣則䐜滿食寒則洞泄洞泄者痢無度也若胃氣竭者痢絶即死診其脉小手足寒難療也脉大手足温易療也下白沫脉沉則生浮則死身不熱脉不懸絶滑大者生懸濇者死以藏期之也脉絶而手足寒晬時脉還手足温者生脉不還者死脉緩時小結者生洪大數者死懸絶而澁者死細微而濇者生𦂳大而滑者死得代絶脉者不死飬生方云秋三月此謂容平天氣以急地氣以明早卧早起與雞俱興使志安寧以緩秋刑收斂神氣使秋氣平無外其志使肺氣清此秋氣之應飬收之道也逆之則傷肺冬為飱洩义云五月勿食未成核果及桃李發癰癤不爾發寒熱變黄疸又為洩痢出第十七巻中廣濟療赤白水榖冷熱等痢方地榆六分白术五分赤石脂七分研厚朴六分炙乾薑六分熟艾四分龍骨七分甘草四分炙黄連十分烏梅六分熬人參六分當歸五分右十二味𢷬篩為末蜜丸以米飲汁服二十丸如梧桐子大日三服加至三十丸出第四巻中集騐論黄帝問曰人若溏洩下痢者何也對曰春傷於風夏生溏洩腸澼久風亦為溏洩也又療熱水􅂖下痢黄連阿膠湯方黄連阿膠炙各二兩梔子三十枚烏梅二十枚黄蘗一兩右五味切以水七升煮取二升半分為再服神良備急同肘後名烏梅湯療熱下􅉶又方黄連一升金色者陳米五合右二味以水七升煮取二升分再服肘後文仲同並出第四卷中刪繁療中焦熱水糓下痢藍青丸方藍青汁三升黄連八兩黄蘗四兩阿膠五兩白术地榆地膚子烏梅肉各三兩右八味𢷬篩為散用藍汁和微火上煎取可為丸丸如杏子大飲進三丸出第四卷中崔氏療水榖痢方乾薑三分雞子二枚小豆二百粒炒令香黄連三分右四味𢷬篩三味内雞子黄白中熟攪令相得㣲火上炒令可丸一服五十丸如小豆大旦以飲服差即停出第三巻中文仲療因仲夏熱多令人發水糓痢腸中鳴轉一瀉五六升水方黄連去毛厚朴各三兩右二味切以水三升煮取一升頓服之出第三卷中必効療水榖痢方小豆一升煮蠟二兩煮右二味和頓服之即愈又方㯶䕡灰燒灰右一味研以水和服三方寸匕並出第二卷中古今録驗療熱水糓下痢方黄連阿膠各二兩梔子二十枚右三味切以水七升煮取二升分為三服又方黄連當歸甘草炙各二兩酸石榴皮三兩右四味切以水三升煮取一升半分為三服並出第十卷中水痢方六首廣濟療水痢及霍亂崔氏方同云冷痢食不消化及有白膿日夜無節度但疑是冷悉主之方白石脂乾薑各八分右二味𢷬篩為末以沸湯和少許麫薄糊和藥併手捻作丸如食法下不止加乾薑八兩忌如常法又療水痢腹中氣方茯苓八分白龍骨八分研訶梨勒皮八分黄連八分酸石榴皮八分右五味𢷬篩為末蜜丸空心以飲服如梧子大三十丸日二服差止出第四卷中文仲療水痢百起者馬藺散方馬藺子乾薑黄連原無分兩右三味為散熟煮湯取一合許和二方寸匕入腹即斷冷熱皆治常用神効不得軽之又方朽骨灰牛骨灰亦得神麴炒黄右三味等分為散空腹飲服一方寸匕無六月六日麴時用常麴亦得御傳並出第三卷中經心録主水痢方雞子二枚黄蠟一兩右二味熬熟食之宜空肚食之日三服佳又方黄連倉米各三兩右二味作散和雞子七枚令熟併捻作丸煮赤豆作漿粥服三十丸日三服若渴但飲豆漿粥並出第二巻中久水痢不差腸垢方四首病源腸垢者腸間精液垢膩也由熱痢藴積腸間虚滑所以因下痢而便腸垢也出第十七巻中肘後療水下積久不差腸垢已出者方烏梅二十枚右一味以水二升煮取一升頓服之又方石榴一枚右一味合皮擣絞取汁隨多少服之最良備急療水下積久不差腸垢已出者方赤石脂桂心乾薑附子炮右四味等分𢷬篩蜜丸如小豆每服三丸日三服飲下肘後同出第六巻中文仲治久水痢難斷方黄連二兩黄蘗二兩阿膠二兩炙右三味𢷬篩為散以苦酒蜜各半升煮内阿膠令烊又内諸藥令可丸飲服三丸日四此是古方極要冷痢方二十二首病源冷痢者由腸胃虗弱受於寒氣腸虚則泄故為冷痢也凡痢色青色白色黑皆為冷也色黄色赤並為熱也故痢色白食不消謂之寒中也診其脉沉則生浮則死出第十七巻中廣濟療冷痢青白色腹中常鳴其痢行數甚疎出太多此是冷痢宜服調中散方龍骨人參黄連阿膠炙黄蘗各一兩右五味𢷬篩為散煮米飲服兩方寸匕日兩服差停出第四巻中肘後療水下痢色白食不消者為寒下方黄連乾薑各三兩右二味𢷬篩白酒一升半合煎令可丸飲服如梧桐子二十丸忌猪肉冷水又方黄連二兩甘草炙半兩附子炮半兩阿膠半兩炙右四味切以水三升煮取一升半分再服之又方半夏洗烏頭炮甘草炙各等分右三味𢷬篩蜜和丸如梧桐子大飲服三丸日再服又方生薑汁二升白蜜一升半右二味相和分再服之又方腥二兩切乾薑三兩末右二味以水六升半煮米一合煮作糜糜熟内薑一食令盡不差更作備急同又方酸石榴皮燒灰右一味為末服方寸匕文仲同又方乾薑二兩末雜麫一升右二味為燒餅熟食之盡更作不過三劑差文仲同又療純下白如鼻涕者方龍骨乾薑附子炮右三味等分𢷬篩蜜和丸如梧子大飲下五丸漸至十丸日一服文仲同又方黄連末臘阿膠各一兩右三味先以酒半升令沸下膠臘合烊乃内黄連末頓服之本云姚氏療卒注下竝痢血一日夕數十行又方灸臍下一寸五十壯良文仲同竝出第二卷中千金論曰凡五臟絶於内者下不自禁下甚者手足不仁也細尋取之萬不失一下病體例畧如此耳素問曰春傷於風夏為膿血夏多滯下也夏傷於風秋必洞泄秋下水者患必是冷也又療久冷痢下純白者此由積卧冷處經久病發遂令脾胃俱冷日夜五六十行大小腹痛不可忍之凡白痢屬冷赤痢屬熱方上好麴末五升㣲熬令香右一味温清淳酒熱和麴末一升空腹一頓服之日三若至食時𢷬蒜一升令至熟下薑椒末調如常食法惟須稠勿加塩以水和麫二升作索餅極熟爛煮之乾漉熱内蒜虀中相和一頓食之少與餘食至饑時仍凖前食麴末酒比至差來少食餘食以此法療不過二日必差又烏梅丸療冷痢久下方烏梅三百粒當歸四兩乾薑十兩桂心六兩附子六兩炮黄連十六兩蜀椒汗四兩細辛六兩人参六兩黄蘗六兩右十味異𢷬篩合治之苦酒漬烏梅一宿去核蒸之如五斗米下𢷬如泥盤中揉合相得蜜和𢷬二千杵食前飲服如梧子大十丸日三稍增至二十丸此本仲景傷寒論方又舊療痢於貴勝用健脾丸多効今療積久冷痢先以温脾湯下訖後以健脾丸補之未有不效者貧家難以充辦亦不可將息温脾湯方療積久冷痢赤白者大黄三兩桂心三兩附子炮乾薑人参各二兩右五味切以水七升煮取二升半分為三服日再並出第十五卷中備急葛氏療痢色白食不消者為寒下方䜴一升綿裹薤白一把右二味以水三升煮取二升及熱頓服之陶效方云療暴下大去血痢姚療赤白下痢并効肘後同又方牛角腮燒灰右一味𢷬篩白飲服方寸匕日三肘後同又方好麫炒右一味𢷬篩煮米粥内麫方寸匕日四五云此療日百行師不救者肘後同出第六卷中古今録驗白頭翁湯療寒急下及滯下方白頭翁乾薑各二兩甘草炙一兩當歸一兩黄連秦皮各一兩半石榴皮一兩生者二兩右七味切以水八升煮取三升分為四服出第十巻中近効療冷痢方肉豆􅅳五顆合皮碎甘草二兩炙右二味切以水三升煮取一升半頓服之户部李尚書處得云療冷痢極者有效自用得力又療久冷痢方赤石脂𢷬作末和麫作餛飩空腹服一碗以下不過兩頓差老人尤佳體中先熱者不可服之以上二方新附文仲治青下白下薑附散方乾薑附子炮皂莢炙去子右三味等分𢷬篩為散飲服方寸匕不過再服即愈亦可丸服小品肘後同又治冷痢薑艾餛飩子方乾薑末熟艾右二味等分作麫餛飩如酸􅀥大煮熟服四五十枚日二服腹脹者炙厚朴煮汁服藥此熱服訖即須食飯大效曾有産婦冷痢如白膏服之立差腹痛亦定冷痢食不消下方六首廣濟療脾胃氣微不能下食五内中冷及微下痢方白术八兩神麴末五兩炒甘草炙乾薑枳實炙各二兩右五味𢷬篩蜜和丸空腹以温酒服如梧桐子大二十丸日二服漸加至三十丸腹中痛者加當歸出第四巻中文仲華佗治老小下痢柴立不能食食不化入口即出命在旦夕久痢神驗方黄連末半雞子殻亂髮灰準上淳苦酒準上蜜準上白蠟方寸匕雞子黄一枚右六味於銅器中炭火上先内苦酒蜜蠟雞子黄攪調乃内黄連末髪灰又攪煎視可摶出為丸久困者一日一夜盡之可者二日盡之肘後同出第三巻中延年増損黄連丸主腹内冷食不消及冷痢兼補方黄連黄茋各三分龍骨三分當歸甘草炙五分乾薑厚朴炙各六分地榆白术人参各一分右十味𢷬篩蜜丸如梧子大飲酒任下服十五丸日再服加至二十九蔣仲璋處又地榆丸主冷痢不消食腹中脹痛氣滿不能食方地榆六兩炙赤石脂七分厚朴六分白术五分乾薑六兩龍骨七分黄連十分當歸五分熟艾五分烏梅肉六分甘草四分炙右十一味𢷬篩蜜和丸如梧子大飲服二十丸日二服加至二十五丸並出第七巻中又深師療冷痢膿血絞臍痛食不消腹脹方吳茱茰乾薑各六分赤石脂麴末炒各八分厚朴炙當歸各四分右六味𢷬篩蜜和丸如梧子空腹以飲下四十丸日再又療冷氣久痢臍下痛出白膿食不消方吳茱茰人参芎藭桔梗甘草炙各四分枳實炙三分乾薑十二分附子炮八分麴末二十分炒右九味𢷬篩蜜和丸如梧子空腹飲下七丸日二服漸加之文仲云温脾丸療久寒氣逆脹滿面目痿黄食不消化白痢方八首病源白滯痢者腸虚而冷氣客之薄於腸間津液凝滯成白故為白滯痢出第十七卷中廣濟療白膿痢方甘草六分炙厚朴十二分炙乾薑枳實茯苓各八分右五味切以水五升煮取一升六合絞去滓分為二服日再服又療心腹脹滿不能下食及痢白膿方厚朴五兩炙豆􅅳五枚甘草一兩炙乾薑一兩右四味切以水五升煮取一升五合絞去滓分為二服日再並出第四卷中千金大桃花湯主冷白滯痢腸痛方赤石脂八兩乾薑當歸龍骨各三兩附子炮牡蠣各二兩熬芍藥甘草炙各一兩人参一兩半白术一升右十味切以水一斗二升煮白术取九升内藥煮取三升分為三服膿者加厚朴三兩嘔者加橘皮三兩又方龍骨六兩厚朴三兩炙赤石脂五兩當歸一兩右四味切以水七升煮取二升半分為三服日再服熱加白頭翁十分牡蠣三兩延年烏梅肉丸主冷白膿痢食不消方烏梅肉熬熟艾黄蘗甘草炙各八分右四味𢷬篩蜜丸如梧子以飲服十五丸日三服忌同前出第七巻中必効白痢方麻子汁右一味以汁煮取菉豆空腹飽服極妙又方黄連末右一味以水和每服三匕即愈並出第二卷中古今録驗療白滯下晝夜無復數龍骨湯下龍骨牡蠣各三兩煉烏梅肉熟艾白頭翁乾薑各一兩女萎黄連當歸各二兩甘草六兩炙右十味切以水七升煮取三升二合分服日三夜一斷便止忌同前出第十巻十重下方六首病源此謂今赤白滯下也今人下部疼重故曰重下去膿血如雞子白日夜數十行繞臍痛也出第十七巻中肘後療重下方黄連一升右一味以酒五升煮取一升半分温再服臍當小絞痛則差又方鼠尾草右一味以濃煮煎如薄飴糖服五合至一升日三赤下用赤花者白下用白花者佳也文仲備急同文仲隱居效驗方主下部絞痛重下下赤白方當歸黄蘗黄連乾薑各二兩右四味𢷬篩煮取烏梅汁服方寸匕日夜若腹中絞痛加當歸下赤加黄連下白加乾薑大効神良秘之備急同出第三巻中備急療重下方此即赤白痢下也今人下部疼重故名重下葛氏方䜴熬令少焦右一味𢷬服一合日再三服又熬䜴令焦水一升淋取汁服冷則用酒淋日三服之肘後文仲同出第六巻中古今録驗重下下赤者方取獺赤糞下白取白糞燒末右一味以飲清旦空腹服一小杯三旦飲之即愈又療得毒病後得重下赤白絞痛方石鍾乳一兩研黄連防風附子炮黄蘗蜀椒汗當歸乾薑各二兩右八味切以水六升煮取二升半分三服適寒温服並出第十卷中卒暴冷下部疼悶方二首千金療卒暴冷下部疼悶方燒磚令熱大酢沃之三重布覆坐上取差又方黍米二升臘羊脂膠炙各二兩右四味合煮作粥一頓令盡即差並出第十五巻中冷熱痢方七首病源夫冷熱痢者由腸胃虚弱宿有寒而為客熱所傷冷熱相乗其痢乍黄乍白是也若熱摶於血血滲腸間則變為血痢也而冷伏腸内摶津液則變凝白則成白滯亦變赤白痢也其湯熨鍼石别有正方補飬宣𨗳今附於後養生方𨗳引法云泄下有寒者微一作引氣以息内腹徐吹息以鼻引氣氣足復前即愈其有熱者微呼以去之也出第十七卷中刪繁療下焦冷熱不調暴下赤白痢香䜴湯方香䜴一升白术六兩薤白切一升升麻二兩右四味切以水七升煮取二升半分為三服出第四卷中古今録驗生春石榴將療熱不調下或滯或水或白青黄者方酸石榴五枚右一味合殻舂絞取二升汁分服五合稍稍服一升盡即斷小兒以意服二三合佳千金同出第十巻中又深師無問冷熱新舊痢方黄連黄蘗乾薑甘草炙艾烏梅肉熬各八分附子三枚蠟一雞子大右八味𢷬篩以蜜和蠟於鐺中鎔之其著蜜須候蠟鎔盡如乾益蜜丸空腹以飲服四十丸日二漸加至五六十丸近効療痢無問冷熱神驗黄連丸方黄連一兩茯苓二兩阿膠一兩炙右三味先𢷬黄連茯苓為末以少許水鎔阿膠和為丸衆手丸之暴乾量患輕重空腹以飲下三四十丸漸漸加至六十丸不過五六服必差常用之極効又療苦下無問冷熱及膿血痢悉主之方生犀角屑黄蘗各二兩黄連苦参各二兩右四味𢷬篩為散以糯米煮作飲莫令生每日空腹服一方寸匕日再服便差勿輕之此方於度支王郎中處得曽用極效肘後有當歸云庾侍郎家方産後彌佳崔氏治痢無問冷熱赤白久新并疳温劉秘監積年患痢毎服此即愈方阿膠二兩一兩炙入藥一兩消作清黄連一兩乾薑二兩入黄無食子二枚久痢腸滑甚者量加至三四枚右四味𢷬篩為末以醋鎔膠清頓和丸如梧子飲服二十五丸日再漸加至三十丸老小者以意斟酌禁如常法一云若冷痢以酒下熱痢以粥飲下出第三卷中文仲治無問冷熱即五色痢入口即定方黄連四分黄蘗當歸黄芩各一兩阿膠二兩炙熟艾一兩右六味𢷬篩為散以醋二升煮膠烊下藥煮令可丸如大豆飲服七八十丸日二夜一服特宜老人若産婦痢加蒲黄一兩蜜和為丸神驗出第三卷中熱毒痢方三首肘後若已下色黄者協毒熱下也療之方梔子十四枚去皮右一味𢷬篩蜜和丸如梧子飲服三丸日再服出第二卷中千金療熱毒痢方苦参橘皮獨活阿膠炙藍青黄連鬼箭羽一云鬼臼黄蘗甘草右九味等分𢷬篩以蜜烊膠和併手丸如梧子乾以飲服十丸日三稍加之卒下疰痢者大良出第十五巻中文仲治熱痢久不差者黄連丸方黄連末以雞子白和丸如梧子飲服十丸至二十丸日三熱毒血痢方六首廣濟療熱毒痢血其痢行數甚數痢出不多腹中刺痛此是熱痢宜生犀角散方生犀角末酸石榴皮熬枳實熬令黄各三兩右三味各異𢷬篩為散以飲服兩三寸匕日再差停熱食物又療熱毒痢血片臍下絞刺痛方升麻地榆茜根黄芩各六分犀角四分生地黄八分梔子七枚擘薤白八分香䜴二合右九味切以水六升煮取一升五合絞去滓分温三服日再並出第四巻中千金大熱毒純血痢療不可差者方黄連六兩右一味切以水七升煮取二升半夜露著星月下旦空腹頓服之卧將息不差加黄連二兩更作服之仍不差者以疳痢法療之佳忌如常又療熱毒下黑血五内攪切痛日夜百行氣絶欲死方黄連一升龍骨白术各二兩阿膠炙乾薑當歸赤石脂各三兩附子一兩炮右八味切以水一斗煮取五升分為五服余以正觀三年七月十二日忽得此痢至於五日將絶處此藥入口即定並出第十五巻中古今録驗療熱毒下血及豆汁犀角煎方犀角屑人參當歸各三兩黄連四兩蜜一合右五味切以水五升煮取一升去滓内蜜煎三沸分為三服日三忌同出第十巻中文仲治熱毒痢痢血犀角散方犀角三兩石榴皮三兩燒黄連三兩乾藍二兩地榆二兩右五味𢷬篩為散以米飲服三方寸匕日二服出第三巻中赤痢方四首病源此由腸胃虚弱為風邪所傷則成痢挾熱熱乗於血則血流渗入腸與痢相雜下故為赤痢也出第十七卷中集驗療下赤痢方秫米一把鯽魚鮓二臠細切薤白一虎口細切右三味合煮如作粥法噉之古今録騐同出第四巻中千金療赤帶下方成煎猪膏三合清酒五合右二味以緩火煎十沸適寒温頓服之取差止又論曰凡痢病通忌生冷酢滑猪雞魚油乳酪酥乾脯醬粉醎食所食諸食皆須大熟爛為佳亦不得傷飽此將息之大經也若將息失所聖人不救也並出第十五巻中必效療赤痢方香豆䜴半升黄連一兩右二味以水一升半浸䜴一日濾取汁碎黄連薄綿裹䜴汁中煎取强半升空腹頓服即止桑泉蔣尉云効出第二巻中崔氏治赤痢黄連丸方陳倉米四分黄連四分乾薑四分右三味𢷬篩為末緩火炒令色變以内二顆雞子白中熟和丸如梧子大空腹服五十丸以好無灰酒温一盞下之至晩間痢赤色當變白明旦即差出第三巻中久赤痢方二首病源久赤痢者由體虚熱乘於血血渗腸間故痢赤腸胃虗不平復其熱不退故經久不差胃氣逆則變為嘔噦也胃虗糓氣衰蠱動侵食則變為􅉶也出第十七巻中千金療下赤連年方地榆䑕尾草各一兩右二味切以水二升煮取一升分為二服如不差取屋塵水盡去滓服一升日二服古今録驗服屋塵汁一小杯餘同此是徐平方療下血二十年者若不止重服即愈肘後同又方鼠尾草薔薇根秦皮用槲皮亦得右三味等分水淹煎去滓以銅器重釡煎成丸如梧子服五六丸日三稍增差止亦可濃汁服半升出第十五巻中卒下血方七首深師治卒下血晝夜七八行方黄連黄蘗各四兩右二味切以淳苦酒五升煮取一升半分為二服亦療下痢又療卒下血蒲黄散方蒲黄三合當歸一兩鹿茸一枚燒右三味𢷬篩為散飲服方寸匕先食日三並出第一十六巻中集驗療卒下血不止方龍膽草一握右一味切以水五升煮取二升半分為五服如不差更服出第四巻中葛氏療卒下血方小豆二升右一味𢷬碎水三升和絞取汁飲之姚云立止又方黄連半兩黄蘗二兩梔子二七枚右三味切以酒二升漬一宿去滓煮三沸頓服之並出第十六巻中崔氏治卒下血不止方竈突中塵一升黄連五兩地榆三兩右三味𢷬篩為散粥飲服方寸匕日再服重者夜一近効治卒下血不問丈夫婦人立効牛角鰓灰散方黄牛角鰓一具燒赤色出火即青碧右一味為細散食前濃煮䜴汁和二錢匕重者日三神驗血痢方六首病源血痢者熱毒乘於血血渗入大腸故也血之隨氣循環經絡通行臟腑當無停積毒熱氣乘之遇腸虗者血渗入於腸腸虚則洩故為血痢也身熱者死身寒者生診其關上脉芤大便去血暴下血數升也出第十七巻中廣濟療血痢黄連丸方黄連白龍骨炙禹餘粮伏龍肝各八分代赭研乾薑各六分右六味𢷬篩蜜和丸飲服三十丸如梧子漸加至四十丸差止又療痢鮮血方茜根黄連地榆各八分梔子十四枚薤白切香䜴各八分犀角屑六分右七味切以水八升煮取二升分為三服日再出第四卷中必効療患熱血痢方粳米一升研右一味研碎令米盡取汁可一大升於新磁瓶中盛取油絹蜜閉頭繋内著井水中令至明飲之傳與人無不差者出第二巻中古今録驗療血痢及膿血方黄連三兩右一味切以清水三升漬一宿旦煎取一升半去滓分為二服服令須㬰盡文仲同又療下痢鮮血方乾地黄犀角屑地榆二兩右三味𢷬篩蜜丸如彈子大每服一丸水一升煎取五合去滓温服之又療下血痢地膚散方地膚五兩地榆根黄芩各二兩右三味𢷬篩為散以水服方寸匕日三並出第二巻中久血痢方三首病源此由體虚受熱熱折於血血入腸故成血痢熱不歇胃虚不復故痢血久不差多變嘔噦及為濕􅉶出第十七巻中崔氏療痢血數十年方石灰三大升炒令黄右一味以水一斗攪令澄清一服一升三服止出第三巻中小品療下血連嵗不愈方黄連半斤右一味𢷬末以雞子白和為餅微火炙令黄黑復𢷬篩服方寸匕日三有効下清血痿黄失色醫不能療者皆差肘後同文仲治七八十老人患積痢不斷兼不能飲食方人參四分鹿角去皮取白作末炒令黄右二味𢷬篩為散平旦以粥清服方寸匕日再並出第三巻中蠱注痢方三首病源此由嵗時寒暑不調則有濕毒之氣傷人隨經脉血氣漸至於藏腑大腸虚者毒氣乘之毒氣挾熱與血相摶則成血痢也毒氣侵食於藏腑如病蠱注之狀痢血雜膿瘀黑有片如雞肝與血雜下是也出第十七巻中肘後療苦時嵗蠱注毒下者方礬石熬二兩乾薑附子炮黄連各二兩右四味𢷬篩為散以酒服方寸匕日三不止更服又方黄連黄蘗等分右二味𢷬末蜜丸如梧子大飲服十丸日四服並出第二卷中古今録驗療純痢血如鵞鴨肝并協蠱毒方茜根升麻犀角桔梗黄蘗黄芩各三兩地榆蘘荷根各四兩右八味切以酒三升漬一伏時服一升日一服千金同未差更作出第六巻中腸蠱痢方一首病源腸蠱痢者冷熱之氣入在腸間先下赤後下白連年不愈侵傷於藏腑下血雜白如病蠱之狀名為腸蠱也出第十七巻中肘後凡病下應先下白後下赤若先下赤後下白為腸蠱方牛膝三兩𢷬碎以酒一升漬經宿毎服一兩杯日二三服姚同出第二巻中膿血痢方七首病源夫春陽氣在表人運動勞役凑理則開血氣虚者傷於風至夏又熱氣乘之血性得熱則流散也其遇大腸虚而血渗入焉與腸間津液相摶積熱藴結血化為膿腸虚則泄故成膿血痢也所以夏月多苦膿血痢者腸胃虚也秋冬診其脾脉微濇者為内潰多下血膿又脉懸絶則死滑大則生脉微小者生實急者死脉沉細虚遲者生數急大而有熱者死出第十七巻中肘後療熱病久下痢膿血蘗皮湯方黄蘗二兩梔子二十枚黄連四兩阿膠炙二兩右四味切以水六升煮取二升分為三服又一方加烏梅二十枚文仲同出第二巻中文仲治熱痢及下黄赤水及黄膿血四肢煩皮上冷者方黄連八兩熟艾一兩黄蘗四兩黄芩三兩右四味搗篩為末以黄蠟二兩安一升蜜中煮令消及煖和藥白飲服六七十丸如小豆日二夜一即驗又久下痢膿血方赤石脂一升烏梅二十個乾薑四片粳米一升右四味切以水七升煮取令熟藥成服七合日三肘後同並出第三巻中刪繁療下焦熱或痢下膿血赤石脂湯方赤石脂八兩烏梅二十枚去皮梔子十四枚白术蜀椒汗麻各三兩乾薑二兩粟米一升右八味切以水一斗二升煮米熟去滓取七升下諸藥煮取五合服之出第四卷中備急葛氏云若挾熱者多下赤膿雜血方黄連竈突中塵各半兩右二味末之酒服方寸匕日三服肘後云以棗膏和分作三丸日服一丸姚氏同出第六巻中古今録驗療腸澼溏便膿血乾薑散方乾薑黄連桂心各一分右三味搗篩服方寸匕著糜中食日三多膿加薑多血加桂有驗又療中寒下痢膿血附子散方蜀附子一枚炮麴乾薑各三分右三味下篩為散先食以酒服方寸匕日二并療婦人漏下忌如前並出第三巻中赤白痢方六首病源凡痢皆由榮衛不足腸胃虚弱冷熱之氣乘虚而入客於腸間腸虚則泄故為痢也然其痢而赤白者是熱乘於血血渗腸内則赤也冷氣入腸摶於腸間津液凝滯則白也冷熱相攻故赤白相雜重者狀如膿涕而血雜之􅁿者白膿上有赤脉薄血狀如魚腦世謂之魚腦痢也出第十七巻中文仲鹿葺散治青黄白黑魚腦痢日五十行方鹿茸二分炙石榴皮二兩乾薑二分􅀥核中仁七枚赤地利一兩燒作灰肘後云赤􅄢如三指右五味𢷬篩為散先食飲服方寸匕日三夜一若下數者可五六服肘後同小品卒久赤白下方燒馬屎一丸作灰分服酒水隨意服已試良肘後同深師療赤白下者黄連湯方黄連黄蘗乾薑石榴皮阿膠炙各三兩甘草一兩炙右六味切以水七升煮取二升為三服日再出第二十六巻中延年駐車丸主赤白冷熱痢腹痛方黄連六兩乾薑二兩當歸三兩阿膠炙三兩右四味𢷬篩三年酢八合消膠令鎔和併手丸如大豆以飲服三十丸日再肘後同出第七巻中救急療赤白痢無問新舊入口即斷方香䜴心䜴心謂合䜴其中心者熟而且好不是去皮取心勿浪用之右一味以取䜴煿令乾香𢷬為末壯年者一大升䜴心為四服小兒量與之出第九巻中必効主赤白痢方黄連二兩阿膠四片右二味以好酒二大升合黄連煎十五沸漉出滓然後内膠令烊温分三服出第二巻中久赤白痢方四首病源久赤白痢者是冷熱乘於血血滲腸間與津液相雜而下甚者腸虚不復故赤白連滯久不差也凢痢久不差脾胃虚弱則變嘔噦胃弱氣逆故嘔也氣逆而外有冷折之不通故噦亦變為􅉶蟲食人五藏也三月九蟲常居人腸胃腸胃虚則動上食於五藏則心懊憹而悶齒齗唇口並生瘡下食於腸則肛門傷爛而榖道開也輕者可治重者致死出第十七巻中崔氏馬藺子散療赤白痢腹内㽲痛并久水榖痢色白如泔澱悉主之極重者不過三四日必差方馬藺子一升熬地榆根皮八分厚朴炙八分熟艾八分赤石脂一升龍骨十分茯苓十分當歸十分右八味搗篩為散一服方寸匕加至四五匕日再夜一白飲服出第三巻中文仲療赤白痢五六年者方燒大荆右一味取瀝服五六合即差肘後同又卒腹痛下赤白數日不絶方雞子一枚扣頭取黄去白胡粉末令滿壳燒焦成劑右二味以酒服之肘後同並出第三巻中近効療赤白痢日數十行無問老小方甘草二兩炙右一味切以漿水四升煮取一升去滓頓服之疳痢方六首必効療冷疳痢方取莨菪子熬令色黄右一味搗為末和臘月猪脂更搗令熟為丸綿裹如棗許大以内下部因痢出即更内新者不過三度即差出第二卷中古今録驗療五疳蒸下痢方苦参三兩青箱甘草炙各三兩右三味切以水四升煮取二升半分三灌即愈凡蒸但服生地黄汁即差又方青黛丁香黄連各等分右三味搗篩用泔淀和為丸口中有瘡含之若下部有瘡以綿裹内下部日服五六十丸含之令下差又方丁香麝香别研石黛石鹽山榆仁小蘗皮桂心乾薑青礬石燒頭髮灰右十味𢷬為散著瘡上乾者和臘月猪膏煖著療時行病後食羊肉及肥膩或酒或房而得久蒸絡變為疳必須攻下部不可􅁿之又療疳濕痢方青葙雄黄研石硫黄研蕪荑雷丸各二兩苦參狼牙各三兩藜蘆一兩炮右八味𢷬篩為散取如杏仁大内下部中又療疳濕痢神効方黄連三兩零陵香一兩半犀角屑一分丁香三十枚麝香一大豆牛黄一大豆右六味以水洗黄連零陵香丁香澄取清水去滓更以水添滿九升内黄連零陵丁香犀角煮兩沸然後著牛黄麝香煎一沸取一升分作三服如一日服不盡二日服又深師以九升先以一升煮添盡九升取一大升分為三服並出第十巻中久疳痢及久痢成疳方九首廣濟療久患疳痢不差兀子礬散方兀子礬八分燒麝香二分研吳白礬六分燒雲母粉五分桂心二分龍骨六分無食子七顆燒黄連八分右八味𢷬篩為散空腹以生薑汁和三錢匕服日再煮薑湯下又療積年疳痢羸瘦面色痿黄方石硫黄研黄連各一兩艾一兩蜜一升右四味以水二升先煮黄連艾取半升後内石硫黄末更煮三五沸即絞去滓又内蜜更煎三五沸下分為三服並出第四卷中必効療積久痢成疳灌方樗根一握浄洗剥白皮𢷬絞取汁三合取時勿令見風麻子脂二合燒如車脂酢泔淀二合椒四分汗䜴二合右五味以水六升取椒䜴和煎絞取汁二升和樗汁麻油泔淀等三味分為兩分用一分灌隔一日更取餘者復灌其藥欲用時温温即得又療痢初較後膿血或變純白或成魚腦五十日以上或一二年不差變成疳所下如泔淀方生羊肝一具右一味取大酢一年以上者米麥並中年深者佳取羊肝則去上膜栁葉切朝旦空腹取肝手拈取酢中出吞之覺心悶則止不悶還服之一日之間能不食粥飯盡一具羊肝者大佳不然除飽吞已外料理如生肝以薑虀下飯如常法食之日食一具肝不過二三具即永差後一月不得食熱麫油膩醬猪魚雞肉等又療疳痢久不差羸瘦著牀欲死方新出羊糞一升右一味以水一升漬經宿明旦絞汁頓服之極重者不過三服又療疳法丈夫婦人小兒久痢百方療不能差此方最効丁香麝香黄連各等分右三味擣篩為散以杏核大取竹筒吹入下部小兒取核子量力減之不過三四廻差積年久疳痢不差蔡光州云常用竒効備急同並出第三卷中又療久痢變成疳下部竅生惡瘡惡寒壯熱者方桃白皮切一升槐白皮一升苦參切五合艾大􅀥十枚右五味以水五升煮取二升半去滓内熊膽􅀥許大攪令匀取二升灌下部餘三分服近効新附療久痢及疳痢諸方不差者此方必効揀樗根白皮不拘多少當取時不宜見狗及風右一味細切𢷬如泥取細麫捻作餛飩如小􅀥勿令破熟煮吞七枚重者不過七八服皆空腹服之又疳痢曉夜無度者方取樗根濃汁一雞子壳許右一味以和粟米泔一雞子殻許灌下部再度即差其驗若神小孩兒減半用之醫人褚球録上數十年痢方一十一首千金療下痢丸主數十年痢下下氣消糓令人能食夏月長時服之令人不霍亂方黄連黄蘗桂心大麥蘗一升半乾薑各三兩吴茱萸四兩蜀椒汗半兩麴一升熬炒烏梅二升半右九味𢷬篩蜜和食已飲服如梧子十丸日三服至二十丸亦可至三十丸又療數十年下痢消糓下氣補羸烏梅肉丸方麴好者一升炒附子炮二兩大麥蘗炒一升當歸三兩桂心三兩黄連呉茱萸烏梅肉乾薑各四兩蜀􅎛一兩汗右十味𢷬篩蜜和丸如梧子食已飲服十丸日三又四續丸主三十年疰痢骨立萎黄腸滑不療方雲實五合蠟五兩白者附子炮二兩女萎三兩龍骨二兩右五味𢷬篩為末以蠟煎烊以丸藥如梧子飲服五丸日三不過五六服必差其雲實熬令香千金名蠟煎丸又療三十年下痢所食之物皆不消化或青或黄四肢沉重起即眩倒骨肉消盡兩足逆冷腹中熱苦轉筋起止須人扶隂冷無子椒艾丸方赤石脂二兩研末熟艾一升乾薑三兩蜀椒三百枚汗烏梅三百枚醋浸剥取肉右五味先𢷬篩薑椒為末將熟艾梅肉著一斛酒飯下蒸令飯熟内乾薑椒末赤石脂末合𢷬三千杵蜜和丸如梧子飲服十丸日三不差至二十丸加黄連一升艾一斤又療三十年痢不止方厚朴炙乾薑阿膠炙各二兩黄連五兩石榴皮艾葉各三兩右六味切以水七升煮取二升分再服又療積久三十年常下神効方赤松木皮去上蒼皮二斗右一味為散麫粥和一升服之日三即止不過服一斗永差秘方三十年痢百日服差良並出第十五卷中古今録驗療三十年寒下及霍亂諸藥所不能療并腸滑若是蠱注所中方蓼子艾屑各一升龍膽續斷白术各三兩蜀椒汗附子炮桂心苦参乾薑甘草炙䑕尾草各二兩右十二味𢷬篩蜜和一嵗兒服一丸如梧子三嵗兒服二丸五嵗兒服三丸大人服五丸飲下療寒熱氣愊愊在胷中卒氣痛繞臍神良廪丘公療下痢三十年方茯苓乾薑黄連等分右三味𢷬篩為散蜜和丸如梧子飲服之一日漸增至百丸苦痢劇者加龍骨附子炮等分一服十丸漸增之以知為度又當歸湯療三十年下痢止諸痛方當歸一兩生薑八兩大􅀥二十枚右三味以水四升煮取一升半分作三服不差復作之又云吾患痢三十餘年諸療無効唯服此方得愈也安石榴湯療大疰痢及白滯困篤欲死腸已滑醫所不能療方乾薑二兩生薑倍之黄蘗一兩細切石榴一枚小者二枚阿膠二兩别研漬之右四味切以水三升煮取一升二合去滓内膠令烊頓服不差復作療老小亦良人羸者稍稍復之不必頓盡須臾復服石榴須預取之肘後同一方無黄蘗用黄連並出第二卷中又深師療久痢方龍骨赤石脂無食子各六分地榆三分熟艾三月者良三分橡子黄蘗各五分右七味𢷬篩蜜和丸如梧子空腹飲服四十五十丸日二服稍加至六十丸休息痢方五首病源休息痢者胃管有停飲因痢積久或冷氣或熱氣乘之氣動於飲則飲動而腸虚受之故為痢也冷熱氣調其飲則静而痢亦休也腸胃虚弱易為冷熱其邪氣或動或静故其痢乍發乍止謂之休息痢也出第十七巻中肘後療休息痢方黄連切龍骨如鴨子大一枚膠如掌大炙熟艾一把右四味水五升煮三物取二升去滓乃内膠膠烊分再服濃煮乾艾葉亦佳又當煮忍冬米和作飲飲之又方乾地榆一斤附子一兩炮右二味以酒一斗漬五宿飲一升日三服盡更作又方龍骨四兩右一味搗如小豆以水五升煮取二升半冷之分為五服又以米飲和為丸服十丸文仲同並出第二卷中文仲葛氏若久下經時不愈者此名為休息下療之方取大骨右一味炙令黄焦𢷬篩飲服方寸匕日三愈肘後備急同胡洽麴蘗丸療數十年休息痢下不能食消糓下氣療虚羸方麥蘗炒麴炒各一升附子炮桂心烏梅肉各二兩人參茯苓各四兩右七味𢷬篩蜜和為丸如梧子食前飲服十丸日三稍稍增之肘後備急同並出第三巻中腹肚不調痢一首廣濟療冷熱不調痢膿水方人参乾薑枳實炙各四兩厚朴炙龍骨赤石脂黄連苦参各六分黄芩五分右九味𢷬篩蜜九空腹以飲服如大豆十五丸日二漸加出第三巻中洩痢不禁不斷及日數十行方三首集驗結腸丸療熱毒下不斷不問久新悉療之方苦参橘皮獨活阿膠炙芍藥乾薑黄蘗甘草炙鬼臼各四分右九味搗篩蜜與膠共烊以和丸併手捻作丸如梧子暴燥以飲服十丸日三不知稍加此方亦療諸疰下及卒下悉効又禆脾丸療脾滑胃虚弱洩下不禁飲食不消雷鳴絞痛方附子炮一兩蜀椒汗一兩桂心二兩赤石脂黄連人參乾薑茯苓大麥蘗陳麫炒石槲當歸各二兩鍾乳三兩研右十三味𢷬篩蜜和以酒服十丸如梧子日三稍稍加之出第四巻中文仲療五勞及飽食房室傷胃令人大便數至溷而不能便日數十行劇者下血并婦女産後餘疾腹絞痛方附子一枚炮右一味以猪脂如雞子黄大煎附子裂為候削去上黑皮𢷬篩蜜和丸先食服如大豆三丸日三稍加可至十丸當長服之永不痢出第三巻中下焦虚寒及逺血近血方二首崔氏療下焦寒損或先見血後便此為逺血或痢不痢伏龍肝湯方伏龍肝五合研甘草一兩炙乾地黄五兩燒髮灰屑三合黄芩乾薑生槲皮阿膠各二兩炙牛膝右九味切以水七升煮七物取三升去滓下阿膠更煎取烊乃下髮分作三服又療下焦虚寒損或前便轉後見血此為近血或痢下或不痢好因勞冷而發續斷湯方續斷當歸桔梗阿膠炙桂心炙三兩乾薑乾地黄芎藭各四兩蒲黄一升甘草二兩炙右十味切以水九升煮八物取三升五合去滓下阿膠更烊膠取沸下蒲黄分為三服並出第四卷中下痢食完出及上入下出方一首范汪温中湯療寒下食完出方甘草炙乾薑各三兩蜀椒八十枚汗附子一枚炮右四味切以水二升煮取一升分為再服若嘔内橘皮半兩小與老皆取服之良出第十五卷中下痢腸滑方三首范汪苦酒白丸療赤白滯下腸已滑日數十行者方女萎半夏洗各二兩附子炮藜蘆炙去頭各一兩右四味𢷬合下篩和以十年苦酒頓丸如梧子若有下者飲服三丸日三不知稍稍增之出第十五卷中集騐療下痢腸滑飲食及服藥皆完出猪肝丸方猪肝一斤煮焙乾黄連阿膠炙烏梅肉各二兩胡粉七棊子右五味𢷬下篩蜜和酒服十五丸如梧子日三稍加亦可散服葛氏文仲胡洽同肘後云亦可散服出第四巻中千金療下痢絞痛腸滑不可差方黄連六兩阿膠鼠尾草當歸乾薑各三兩右五味切以酒七升煮取三升去滓温分三服若熱不絞痛去乾薑加當歸以水煮之出第十五卷中大注痢及赤白困篤腸滑方二首深師卒大注痢及赤白滯下困篤欲死腸已滑方乾薑二兩生者焙黄蘗石榴皮各一兩阿膠二兩半淡䜴一升前胡四兩右六味切以水三升煮取三合去滓内膠頓服不差更作無毒宜老小羸人稍稍服之此湯兼療傷寒大下及赤白困篤亦皆主之出第二十六巻中范汪療得病羸劣服藥不愈因作腸滑下痢膿血日數十行腹中絞痛身熱如火頭痛如破其脉如濇方黄連四兩苦參二兩阿膠一兩右三味咀㕮以水一斗煮取二升去滓適寒温服二合日三少少益至半升服湯盡者復合以愈為度曾試驗古今録驗同痢兼渴方二首病源夫水糓之精化為血氣津液以飬藏腑藏腑虚受風邪邪入於腸胃故痢痢則津液空竭藏腑虚燥故痢而兼渴也渇而引飲即痢不止翻溢水氣脾胃已虚不能剋消水水氣流溢浸漬肌肉則變成膿也出第十七卷中必効療痢兼渇方麥門冬三兩去心烏梅二大枚右二味以水一大升煮取强半絞去滓待冷細細咽之即定仍含之出第二巻中古今録驗療熱渴痢方冬𤓰一枚右一味以黄土厚一尺火炮穩約以水爛去土浄洗絞取服之許仁則痢方七首許仁則云此病有數種有水痢有糓痢有血痢有膿痢有膿血相和痢者有腸澼痢其水痢者本由脾氣熱消糓作水糓氣不得消便生此痢糓痢者由脾氣冷糓氣不消而生此痢血痢者由毒熱在腹血流入腸致有此痢膿痢者由積冷所致膿血相和痢者由冷熱相擊便致此痢腸澼痢者由積冷在腸腸間垢涕不能自固便有此痢色數雖多其源則一皆縁飲食不節將息失宜也又水痢之候心腹甚痛食無妨但食後即痢食皆化盡唯變作水糓無期度多食多下少食少下有此伏者宜依後黄芩等五味散服之方黄芩黄連黄蘗各五兩黄茋四兩龍骨六兩右藥𢷬篩為散以飲下之初服一方寸匕日二服稍稍加至二三匕服差乃止又糓痢之候痢無期度食不消化腹痛毎過冷便發有此疾候者宜依後附子等五味散主之方附子炮細辛白术各五兩乾薑四兩神麴一升右藥𢷬篩為散以飲下之初服一方寸匕日再服稍稍加至二三匕良又血痢之候小腹絞痛無期度食不住如水但兼血而下有此患者宜依後方犀角五味散方生犀角末五兩阿膠炙四兩黄蘗四兩艾葉乾薑各三兩一作乾藍右藥搗篩為散以飲下之初服一方寸匕日再服稍稍加至二三匕良又膿痢之候腹亦刺痛食亦不大稀但大便兼膿遇冷而劇有此候者宜依後神麴等五味散服之良麴末一升乾薑六兩丁香豆􅅳各四兩髙良薑五兩右藥𢷬篩為散以飲下之初服一方寸匕日再服稍稍加至二三匕良又膿血相和痢候食不甚稀毎出膿血與食相兼腹亦小痛有此候者宜依後黄茋等五味散服之方黄芪六兩赤石脂八兩厚朴五兩炙乾薑艾葉炙各二兩右藥𢷬篩為散以飲下之初服一方寸匕日再服稍稍加至二三匕良又腸澼痢候食稀或稠便但似膿每便極滑痢有常期有如此者宜依後豆􅅳子等八味散服之方豆􅅳子丁香各三兩細辛附子炮乾薑各四兩人参黄茋各五兩赤石脂六兩右藥搗篩為散以飲下之初服一方寸匕日再稍稍加至二三匕良又前件諸痢患無新舊如藥療之暫差還發此疾縦以新藥止之終存其根本由腸胃中冷熱不調病根固結必須湯藥滌之以洩病勢痢後更以藥物補助之有此候者宜依後附子等六味湯以利之後服髙良薑十味散以補之方附子炮細辛甘草炙人參各二兩乾薑三兩大黄五兩右藥切以水七升煮取二升四合去滓分温三服服如人行十里久一服此湯當得快利利中有惡物如魚腦狀或如桃李但異於常利勿怪之將息經三四日宜合後髙良薑等十味散服之方髙良薑細辛黄茋白术苦参各五兩丁香二兩人参乾薑各四兩豆􅅳子三兩赤石脂六兩右藥𢷬篩為散以飲下之初服一方寸匕日再服之稍稍加至二三匕並出上卷中外臺秘要方卷二十五
