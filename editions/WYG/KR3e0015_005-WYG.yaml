body:
  text: 外臺秘要方卷一唐王燾撰諸論傷寒八家合一十六首隂陽大論云春氣温和夏氣暑熱秋氣清凉冬氣凛冽此則四時正氣之序也冬時嚴寒萬類深藏君子周密則不傷於寒觸冐之者乃名傷寒耳其傷於四時之氣皆能爲病以傷寒爲毒者以其最成殺癘之氣也中而即病者名曰傷寒不即病者寒毒藏於肌膚中至春變爲温病至夏變爲暑病暑病者熱極重於温也是以辛苦之人春夏多温熱病者皆由冬時觸冐寒冷之所致非時行之氣也凡時行者春時應暖而反大寒夏時應熱而反大冷秋時應凉而反大熱冬時應寒而反大温此非其時而有其氣是以一歳之中長㓜之病多相似者此則時行之氣也仲景病源小品千金同王叔和曰傷寒之病逐日淺深以施方治今世人得傷寒或始不早治或治不對病或日數久淹困乃告醫醫又不知次第而治之則不中病皆以臨時消息制方無不效也今搜採仲景舊論録其證候診脉聲色對病真方有神驗者擬防世急也又土地髙下寒温不同物性剛柔飡居亦異是故黄帝興四方之問岐伯舉四治之能以訓後賢開其未悟臨病之工宜湏兩審也小品千金同又曰夫表和裏病一作陽盛隂虚下之而愈汗之則死裏和表病一作陽虚隂盛汗之而愈下之則死夫如是則神丹不可以誤發神丹丸在此卷崔氏部中六味者是也甘遂何可以妄攻甘遂者水導散也在第三卷天行狂語部中甘遂等二味者是也出千金方表裏之治相背千里吉凶之機應若影響然則桂枝下咽表和則斃桂枝湯在此卷仲景日數部中桂枝等五味者是也承氣入胃裏平則亡承氣湯在此卷仲景日數部中三味者是也此表裏虚實之交錯其候至微發汗吐下之相反其禍至速而醫術淺狹為治乃誤使病者隕沒自謂其分至令寃魂塞於㝠路死尸盈於曠野仁者鑒此豈不痛歟千金同又凡兩感病俱作治有先後發表攻裏本自不同而執迷妄意者乃云神丹甘遂合而服之且解其外又除其内言巧似是於理實違安危之變豈可詭㦲夫病發熱而惡寒者發於陽無熱而惡寒者發於隂發於陽者可攻其外發於隂者宜温其内發表以桂枝温裏宜四逆四逆湯在第二卷傷寒不通按第二卷傷寒不得眠得眠部中三味者是也部並無四逆湯三味方惟小便不利部内有四逆散加减法蕐佗曰夫傷寒始得一日在皮當摩膏火灸即愈若不解者至二日在膚可法鍼服解肌散發汗汗出即愈若不解者至三日在肌復發汗則愈若不解者止勿復發汗也至四日在胸宜服藜蘆丸㣲吐則愈若更困藜蘆丸不能吐者服小豆𤓰蒂散吐之則愈視病尚未醒醒者復一法鍼之藜蘆丸近用損人不録之𤓰蒂散在卷末雜療中范汪方二味者是也五日在腹六日入胃入胃則可下也若熱毒在胃外未入於胃而先下之者其熱乘虚便入胃則爛胃也然熱入胃病要當須復下去之不得留於胃中也胃若實熱致此為病三死一生此輩皆多不愈胃虚熱入爛胃也其熱㣲者赤斑出劇者黒斑出赤斑出者五死一生黒斑出者十死一生但論人有強弱病有難易功効相倍耳病者過日不以時下之熱不得泄亦胃爛斑出矣士弱氏曰藜蘆丸見第五卷許仁則療㿖云曽用釋深師一方大効三味者近似若得病無熱但狂言煩燥不安精采言語與人不相主當者勿以火迫之但以五苓散一方寸匕水和服之五苓散仲景云猪苓散是也在第二卷傷寒中風部中千金翼方五味者是也當以新汲井水強飲一升許若一升半可至二升益佳令以指刺喉中吐之病隨手愈不即吐者此病輩多不善勿強與水水停即結心下也當更以餘藥吐之皆令相主當者不爾即危若此病不急以猪苓散吐解之者其死殆速耳亦可先吐去毒物及法鍼之尤佳又云春夏無大吐下秋冬無大發汗發汗法冬及始春大寒宜服神丹丸亦可摩膏火灸膏在雜療中黄膏七味白膏四味范汪方是也若末春夏月初秋凡此熱月不宜火灸又不冝厚覆宜服六物青散青散在雜療中范汪方六味者是也若崔文行度障散度障散在雜療中范汪方四味者是也赤散赤散在雜療中范汪方七味者是也木出蕐佗雪煎亦善雪煎在雜療中古今録驗方三味者是也若無丸散及煎但單煮柴胡數兩傷寒時行並可服也不但一也至再三發汗不解當與湯實者轉下之其脉朝夕駃者為實癖也朝平夕駃者非癖也轉下湯爲可早與但當少與勿令下多耳少與當數其間病有虚煩熱者與傷寒相似然不惡寒身不疼痛故知非傷寒也不可發汗頭不痛脉不𦂳數故知非裏實也不可下如此内外皆不可攻而師強攻之必遂損竭多死矣諸虚煩但當行竹葉湯竹葉湯在第三卷天行虚煩部中出文仲方是也若嘔者與橘皮湯一劑不愈者可重與也橘皮湯在第二卷傷寒嘔噦部中四味者是也出於深師方此法宫泰數用甚效傷寒後虚煩亦宜服此湯仲景千金方同陳廪丘云或問得病連服湯藥發汗汗不出如之何荅曰醫經云連發汗汗不出者死吾思可蒸之如蒸中風法蒸濕之氣於外迎之不得不汗出也後以問張苖苖云曽有人作事疲極汗出卧單簟中冷得病但苦寒踡諸醫與丸散湯四日之内凡八發汗汗不出苖令燒地布桃葉蒸之即得大汗於被中就粉傅身極燥乃起便愈後數以此發汗汗皆出也人性自有難使汗出者非但病使其然蒸之無不汗出也小品千金同蒸法在此卷崔氏日數部中阮河南法又有桃葉湯熏其法在第三卷天行部中文仲方支太素法是范汪論黄帝問於岐伯曰人傷於寒而得病何以反更為熱岐伯曰極隂變陽寒盛則生熱熱盛則生寒諸病發熱惡寒脉浮洪者便宜發汗當發汗而其人適失血及大下利如之何岐伯荅曰數少與桂枝湯使體潤漐漐汗纔出連日如此自當解也千金同九卷云黄帝曰傷寒熱病死候有九太素云不可刺者九一曰汗不出大灌發者死太素云汗不出大通按靈樞熱病灌發赤噦者死論中大顴發赤噦者死二曰泄而腹滿甚者死甚一作黄三曰目不明熱不已者死四曰老人嬰兒熱病腹滿者死五曰汗不出嘔下血者死六曰舌本爛熱不已者死七曰欬而衂汗不出出不至足者死八曰髓熱者死九曰熱而痙者死熱病痙者腰反折瘈瘲齒噤齘也熱病七八日脉㣲小病者便血口中乾一日半而死熱病七八日脉不躁不數後三日中有汗三日不汗四日死熱病已得汗而脉尚躁盛此隂脉之極也死其得汗而脉静者生熱病脉常盛躁而不得汗者此陽脉之極也死脉盛躁得汗者生甲乙太素同士弱氏曰灌發灌驟也漬也先不出汗後則若灌溉之驟至而淋漓浸漬亡陽也小品論曰古今相傳稱傷寒爲難療之病天行温疫是毒病之氣而論療者不别傷寒與天行温疫為異氣耳云傷寒是雅士之辭云天行温疫是田舍間號耳不說病之異同也考之衆經其實殊矣所冝不同方說宜辨是以畧述其要焉出第十卷中千金同千金論曰人生天地之間命有遭際時有否㤗吉凶悔吝苦樂安危喜怒愛憎存亡憂畏闗心之慮日有千條謀身之道時生萬計乃度一日是故天無一歳不寒暑人無一日不憂喜故有天行瘟疫病者則天地變化之一氣也斯盖造化必然之理不得無之故聖人雖有補天立極之徳而不能廢之雖不能廢之而能以道御之其次有賢人善於攝生能知樽節與時推移亦得保全天地有斯瘴癘還以天地所生之物以防備之命曰知方則病無所侵矣然此病也俗人謂之横病多不解療皆云日滿自差以此致枉者天下大半凡始覺不佳即須救療迄至於病愈湯食競進折其毒熱自然而差必不可令病氣自在恣意攻人拱手待斃斯為誤矣今博採羣經以為上下兩卷廣設備擬好養生者可得詳焉又夫傷寒病者起自風寒入於腠理與精氣分争榮衛否隔周行不通病一日至二日氣在孔竅皮膚之間故病者頭痛惡寒腰背強重此邪氣在表發汗則愈三日以上氣浮在上部填塞胷心故頭痛胷中滿當吐之則愈五日以上氣沉結在藏故腹脹身重骨節煩疼當下之則愈明矣當須消息病候不可亂投湯藥虚其胃氣也經言脉㣲不可吐虚細不可下又夏亦不可下此醫之大禁也文仲同又脉有沉浮轉能變化㦯人得病數日方以告醫雖云時覺視病已積日其病源結成非復發汗解肌所除當診其脉隨時形勢救解求免也不可苟以次第爲固失其機要乃致禍矣此傷寒次第病三日以内發汗者謂當風解衣夜卧失覆寒濕所中并時有疾疫賊風之氣而相染易為惡邪所中也至於人自飲食生冷過多腹藏不消轉動稍難頭痛身温其脉實大者便可吐下之不可發汗也又凡人有少病苦似不如平常則須早道若隱忍不療冀望自差須臾之間以成痼疾小兒女子益以滋甚若天行不和當自戒謹若有小不和則須救療尋其邪由及在腠理以時早療鮮有不愈者患人忍之數日乃說邪氣入藏則難可制此雖和緩亦無能為也癰疽疔腫尤爲甚急此自養之至要也又凡作湯藥不可避晨夜時日吉凶覺病須臾即宜便治不等早晚則易愈矣服藥當如方法若縱意違師不須療之也又凡得時氣病五六日而渇欲飲水飲不能多不當與也所以爾者腹中熱尚少不能消之便更與人作病矣若至七八日大渇欲飲水者猶當依證而與之勿令極意也能飲一斗者與五升若飲而腹滿小便澀若喘若噦者不可與之飲而忽然汗出者已愈也人得病能飲水者欲愈也出第九卷中經心録論曰傷寒病錯療禍及如反覆手耳故諺云有病不治自得中醫者論此疾也其病有相類者傷寒熱病風温濕病隂毒陽毒熱毒温疫天行節氣死生不同形候亦别宜審詳也出第二卷中論傷寒日數病源并方二十一首素問黄帝曰夫熱病者皆傷寒之類也或愈㦯死其死皆以六七日間其愈皆以十日以上者何也岐伯曰巨陽者諸陽之屬也其脉連於風府故為諸陽主氣也人之傷於寒也則爲病熱熱雖甚不死其兩感於寒而病者必死帝曰願聞其狀岐伯曰一日巨陽受之故頭項痛腰脊強二日陽明受之陽眀主肌肉其脉夾鼻絡於目故身熱目疼而鼻乾不得卧三日少陽受之少陽主膽其脉循脇絡于耳故胷脇痛而耳聾三陽經絡皆受其病而未入於藏者故可汗而已四日太隂受之太隂脉布胃中絡於嗌故腹滿而嗌乾五日少隂受之少隂脉貫腎絡肺繋舌本故口燥舌乾而渇六日厥隂受之厥隂脉循隂器而絡於肝故煩滿而嚢縮三隂三陽五藏六府皆受病榮衛不行五藏不通則死矣其不兩感於寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾㣲聞十日太隂病衰腹減如故則思飲食十一日少隂病衰渇止不滿舌乾已而􅅉十二日厥隂病衰嚢縱少腹㣲下大氣皆去病日已矣帝曰治之奈何岐伯曰治之各通其藏脉病日衰已矣其未滿三日者可汗而已其滿三日可泄而已又帝曰其病兩感於寒者其脉應與其病形何如岐伯曰兩感於寒病者病一日則巨陽與少隂俱病則頭痛口乾煩滿而渇也二日則陽眀與太隂俱病則腹滿身熱不欲食譫語三日則少陽與厥隂俱病則耳聾嚢縮厥逆水漿不入不知人則六日而死帝曰五藏已傷六府不通榮衛不行如是之後三日乃死何也岐伯曰陽明者十二經脉之長也其氣血盛故不知人三日其氣乃盡故死出第九卷中甲乙太素同病源傷寒一日太陽受病太陽者小腸之經也為三陽之首故先受病其脉絡于腰脊主於頭項故得病一日而頭項背􅈩腰脊痛也又傷寒二日陽明受病陽眀者胃之經也主於肌肉其脉絡鼻入目故得病二日肉熱鼻乾不得眠也諸陽在表表始受病在皮膚之間故可摩膏火灸發汗而愈出第七卷中仲景傷寒論傷寒一二日心中悸而煩小建中湯主之方桂心三兩甘草炙二兩生薑三兩大棗十二枚擘膠飴一升芍藥六兩右六味切以水七升先煮五味取三升去滓内飴更上火微煮令消解温服一升日三服如嘔家不可服建中湯以甜故也忌海藻菘菜生葱千金翼同出第三卷中張仲景傷寒論傷寒一二日内麻黄湯主之此云小建中湯非也此方但治心中悸而煩病源傷寒三日少陽受病少陽者膽之經也其脉循於脇上於頸耳故得病三日胸脇痛而耳聾也三陽經絡始相傳病未入於藏故皆可汗而解出第七卷中仲景傷寒論療太陽病三日發其汗病不解蒸蒸發熱者屬調胃承氣湯方甘草炙三兩芒硝半斤大黄四兩右三味切以水三升煑二物取一升去滓内芒硝更煑微沸温温頓服以調胃承氣則愈忌海藻菘菜經心録同出第十卷中張仲景傷寒論三日亦可服麻黄湯此云調胃承氣湯非也此方但治三日發汗不解蒸蒸發熱者病源傷寒四日太隂受病太隂者脾之經也爲三隂之首是知三日以前陽受病訖傳之於隂而太隂受病焉其脉絡於脾主於喉嗌故得病四日腹滿而嗌乾其病在胸膈也故可吐而愈又傷寒五日少隂受病少隂者腎之經也其脉貫腎絡肺繋於舌故得病五日口燥舌乾渇而引飲也其病在腹故可下而愈矣並出第七卷中仲景傷寒論傷寒四五日身熱惡風頸項強脇下滿手足温而渇者小柴胡湯主之方柴胡半斤栝蔞根四兩桂心三兩黄芩三兩牡蠣三兩甘草炙二兩乾薑三兩右七味切以水一斗二升煑取六升去滓更煎取三升温服一升日三服初服微煩温覆汗出者便愈也忌生葱海藻菘菜范汪同出第三卷中仲景傷寒論名柴胡姜桂也合用柴胡人參甘草黄芩半夏生薑大棗七味小柴胡湯是也玉凾千金翼同病源傷寒六日厥隂受病厥隂者肝之經也其脉循隂器絡於肝故得病六日煩滿而嚢縮也此則隂陽俱受病毒氣在胷故可下而愈又傷寒七日太陽病衰頭痛少愈傷寒七日病法當小愈隂陽諸經傳盡故也今七日以後病反甚不除者欲為再經病也再經病者是隂陽諸經絡重受病故也並出第七卷中仲景傷寒論療傷寒不大便六七日頭痛有熱與承氣湯其人小便反清者知不在裏仍在表也當須發汗若頭痛者必衂血冝桂枝湯方士弱氏曰藥非衂後用乃當汗時用則不衂矣先未汗故衂耳桂枝湯方桂枝芍藥各三兩甘草炙二兩生薑三兩大􅀥十二枚擘右五味切以水七升煑取三升去滓温服一升須臾喫稀粥一升助藥力覆取㣲汗忌生葱海藻菘菜集驗備急文仲范汪同仲景傷寒論此方六七日病在表者可服之又傷寒五六日嘔而發熱者柴胡湯証具而以他藥下之柴胡証仍在故可與柴胡湯此雖已下之不為逆必蒸蒸而振却發熱汗出而解病源傷寒八日陽明病衰身熱少愈傷寒八日病不解者或是諸隂陽經絡重受於病㦯因發汗吐下之後毒氣未盡所以病證猶存也又傷寒九日少陽病衰耳聾㣲聞傷寒九日以上病不除者㦯初一經受病即不能相傳或已傳三陽訖而不能傳於隂致停滯累日病證不罷者㦯三陽三隂傳病已畢又重感於寒故日數多而病候改變出第七卷中仲景傷寒論療傷寒八九日風濕相摶身體疼痛而煩不能自轉側不嘔不渇下之脉浮虚而濇者属桂枝附子湯若大便鞕小便自利者附子白术湯桂枝附子湯方桂心四兩附子三枚炮去皮生薑三兩甘草二兩炙大棗十二枚擘右五味切以水六升煑取二升去滓温分三服忌生葱猪肉海藻菘菜附子白术湯方白术四兩大棗十二枚甘草炙一兩生薑二兩附子三枚炮去皮四破右五味切以水六升煑取二升去滓温分三服初一服其人身如痺半日許復服之都盡其人如冐狀者勿怪此以附子术併走皮中逐水氣未除故使人如冐狀也本云附子一枚今加之二枚名附子湯忌葱猪肉菘菜海藻桃李雀肉等千金翼同出第十一卷中張仲景論法當加桂枝四兩此本一方二法以大便鞕小便自利故去桂也以大便不鞕小便不利當加桂附子三枚恐多也虚弱家及産婦冝減之此二方但治風濕非治傷寒也病源傷寒十日太隂病衰腹減如故則思飲食十一日少隂病衰渇止不滿舌乾已而􅅉十二日厥隂病衰嚢縱少腹㣲下大氣皆去病日已矣出第七卷中素問太素甲乙竝同仲景傷寒論療吐下之後不大便五六日至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若􅇵者發則不識人循衣摸床惕而不安㣲喘但發熱讝讝疾而寤寐自語也語者屬大承氣湯方大黄去皮四兩陳枳實炙五枚芒硝三合厚朴半斤右四味切以水一斗先煑二物取五升去滓内大黄煮取二升去滓内芒硝煑一二沸分為兩服初一服便得利者止後服不必盡劑千金方并翼同出第五卷中又太陽病過經十餘日及二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急一云嘔止小安鬱鬱㣲煩者為未解也可與大柴胡湯下之即愈方柴胡半斤黄芩芍藥各三兩半夏半斤水洗大棗十三枚擘生薑五兩枳實四枚炙右七味切以水一斗二升煑至六升去滓更煎取三升温服一升日三服一方加大黄二兩今不加大黄恐不名爲大柴胡湯也忌羊肉餳兼主天行千金翼肘後同又傷寒十三日不解胷脇滿而嘔日晡所發潮熱熱畢而微利此本柴胡證下之不得利今反利者知毉以丸藥下之此非其治也潮熱者實也先冝服小柴胡湯以解其外後以柴胡加芒硝湯主之方柴胡二兩十六銖黄芩人參甘草炙生薑各一兩半夏五枚大􅀥四枚擘芒硝二合右八味切以水四升煮七味取二升去滓下芒硝更上火煎一二沸分為兩服未解更作忌海藻菘菜羊肉餳等出玊凾經一方芒硝三合桑螵蛸五個大黄四分煑取一升半温服五合微下愈本云柴胡湯再服以解其外取愈一方外加芒硝大黄桑螵蛸是也肘後方七首肘後療傷寒有數種庸人不能分别今取一藥兼療者若初覺頭痛肉熱脉洪起一二日便作此葱䜴湯方葱白一虎口豉一升綿裹右二味以水三升煑取一升頓服取汗若汗不出更作加葛根三兩一方更加升麻三兩水五升煑取二升分温再服徐徐服亦得必得汗即差若不得汗更作加麻黄三兩去節服取汗出爲效文仲同又方葱白一握切米三合豉一升右三味以水一斗煑米少時下豉後内葱白令大熟取三升分温三服則出汗又方豉一升絺綿裹右一味以童子小便三升煮取二升分温再服汗出為効集驗方加葱白一升切云神良支太醫文仲備急同又方葛根四兩切右一味以水一斗煮取三升内䜴一升更煑取一升半分温再服取汗爲差又方擣生葛根汁一二升服亦佳又療傷寒汗出不歇已三四日胷中惡欲令吐者方豉三升綿裹鹽一兩右二味以水七升煑取二升半去滓内蜜一升又煑三沸頓服一升安卧當吐如不吐更服一升取吐為效又方苦參三分甘草炙一分𤓰蒂赤小豆各二七枚右四味切以水一升煮取半升一服之當吐吐不止者作葱豉粥解之必息忌海藻菘菜又方苦參黄芩各二兩生地黄半斤右三味切以水八升煎取二升服一升㦯吐下毒物忌蕪荑深師方四首深師療傷寒一日至三日應汗者作此湯方葛根半斤烏梅十四枚葱白一握豉一升綿裹右四味切以水九升煑取三升分為三服初一服便厚覆取汗汗出粉之又麻黄解肌湯療傷寒三四日煩疼不解者方麻黄三兩去節甘草一兩炙杏仁七十枚去皮尖熬桂心二兩右四味切以水九升先煑麻黄減二升掠去沫乃内諸藥合煮取二升半絞去滓分服八合以汗出為度忌海藻菘菜生葱本仲景麻黄湯千金翼并同又黄芩湯療傷寒六七日發汗不解嘔逆下利小便不利胸脇痞滿㣲熱而煩方黄芩桂心各三兩茯苓四兩前胡八兩半夏半升洗右五味切以水一斗二升煑取六升分為六服日三服夜三服間食生薑粥投取小便利為差忌羊肉餳生葱酢物又石膏湯療傷寒病已八九日三焦熱其脉滑數昏憒身體壯熱沉重拘攣㦯時呼呻而已攻内體猶沉重拘攣由表未解今直用解毒湯則攣急不差直用汗藥則毒因加劇而方無表裏療者意思以三黄湯以救其内有所增加以解其外故名石膏湯方石膏黄連黄檗黄芩各二兩香䜴一升綿裹梔子十枚擘麻黄三兩去節右七味切以水一斗煑取三升分為三服一日併服出汗初服一劑小汗其後更合一劑分兩日服常令㣲汗出拘攣煩憒即差得數行利心開令語毒折也忌豬肉冷水出第十四卷中小品方四首小品詔書發汗白薇散療傷寒二日不解方白薇二兩麻黄七分去節杏仁去皮尖熬貝母各三分右四味擣散酒服方寸匕厚覆卧汗出愈古今録驗千金同又雞子湯療發汗後二三日不解頭痛肉熱方麻黄一兩去節甘草一分炙右二味切以水二升扣雞子白令置水内合和令匀内藥復攪令和上火煎之勿動煎至一升適寒温頓服之盖覆汗出粉傅之有效忌海藻菘菜古今録驗備急同張文仲療天行又葛根湯療傷寒三四日不差身體熱毒方葛根八兩生薑三兩龍膽大青各半兩桂心甘草炙麻黄去節各二兩萎㽔一兩芍藥黄芩各二兩石膏碎升麻各一兩右十二味切以水一斗先煑葛根麻黄取八升掠去沫後内餘藥煮取三升分三服日二夜一忌海藻菘菜生葱千金同名葛根龍膽湯又療傷寒六七日其人大下寸脉沉遲手足厥逆下部脉不至咽喉痛不利唾膿血泄利不止者麻黄升麻湯方麻黄二兩半去節升麻三分當歸五分知母萎㽔一作菖蒲黄芩各三分麥門冬去心一作天門冬桂心芍藥乾薑石膏碎甘草炙茯苓白术各一兩右十四味切以水一斗先煑麻黄減二升掠去上沫内諸藥煮取三升去滓温分三服相去如炊三斗米頃令盡汗出便愈忌海藻菘菜生葱醋桃李雀肉等並出第六卷中此張仲景傷寒論方通按千金作麻黄知母萎㽔黄芩各三兩餘十味作各二兩爲異耳用此方者當以傷寒論爲正集驗方五首集驗療傷寒時氣温疫頭痛壯熱脉盛始得一二日者方真丹砂一兩末右一味以水一斗煑之取一升頓服之覆取汗忌生冷物千金同又療疫氣傷寒三日以後不解者方好豉一升綿裹葱白切一升右二味童子小便五升煮取二升分再服覆取汗神效千金同又療傷寒五六日斑出以後湯方豬膽三合雞子一枚苦酒三合右三味合和煎令三沸強人盡服之羸人煎六七沸分為兩服取汗出為効文仲備急千金同又療傷寒七八日不解黙黙煩悶腹中有乾糞譫語大柴胡湯方柴胡半夏湯洗各八兩生薑四兩知母芍藥大黄萎㽔各二兩甘草炙一方加枳實四兩黄芩二兩右十味切以水一斗煑取三升去滓温服一升日三服忌海藻菘菜羊肉餳范汪加人參三兩餘並同千金用芍藥不用枳實又療傷寒熱病十日以上發汗不解及吐下後諸熱不除及下利不止斑出方大青四兩甘草炙二兩阿膠炙珠二兩豉一升綿裹右四味切以水八升煑二味取三升半去滓内豉煑三沸去滓乃内膠令溶分温三服欲盡更作當使有餘渇者當飲但除熱止吐下無毒忌海藻菘菜肘後深師千金同出第二卷中千金方六首合一十一法千金治傷寒頭痛項強四肢煩疼青膏方當歸芎藭呉茱茰附子烏頭莽草蜀椒各三兩白芷三兩右八味切以醇苦酒漬再㝛以豬脂四斤緩火煎候白芷色黄絞去滓以煖酒服􅀥核大三枚日三服取汗不出稍増可服可摩如初得傷寒一日苦頭痛背強冝摩之佳忌豬肉又少隂病得病二三日口燥咽乾急下之冝承氣湯又少隂病六七日腹滿不大便者急下之宜承氣湯又陽明証其人善㤀必有蓄血所以然者夲有久瘀血故令善􅁯雖大便堅反易色必黒宜抵當湯下之又傷寒有熱而少腹滿應小便不利今反利者此為有血不可餘藥宜抵當丸又太陽病身黄脉沉結少腹堅小便不利者此為無血也小便自利其人如狂者血證諦也冝抵當湯下之又陽眀病脉遲雖汗出不惡寒體必重短氣腹滿而喘有潮熱者此外欲解可攻裏也手足濈然汗出者此為大便已堅冝承氣湯主之若汗多而微發熱惡寒爲外未解宜桂枝湯其熱不潮未可與承氣湯若腹大滿不大便可少與承氣湯㣲和其胃氣勿令致大下又陽明病潮熱微堅者可與承氣湯不堅者勿與之若不大便六七日恐胃中有燥糞欲知之法可與小承氣湯若腹中轉失氣者為有燥糞乃可攻之若不轉失氣者此為但頭堅後溏不可攻之攻之必脹滿不能食欲飲水者即噦其後發熱者必復堅與小承氣湯和之不轉失氣者慎不可攻之夫實則譫語虚則鄭聲鄭聲重語也直視譫語喘滿者死若下利者亦死又傷寒四五日脉沉喘滿沉為在裏而反發汗津液越出大便為難表虚裏實久則譫語承氣湯方枳實陳者五枚炙大黄四兩芒硝三合厚朴半斤右四味切以水一斗先煑二味取五升内大黄更煮取二升去滓内芒硝更上微火一兩沸分温再服得下餘勿服也小承氣湯方大黄四兩厚朴二兩炙枳實大者三枚炙右三味切以水四升煑取一升二合去滓分温再服若一服得利譫語止勿服之也又抵當丸方水蛭二十枚熬桃仁二十枚去皮尖雙仁䖟蟲二十枚去足趐熬大黄三兩右四味末下篩合分為四丸以水一升煑一丸取七合頓服晬時當下血不下仍須服之取血下為效又抵當湯方水蛭熬三十枚桃仁二十枚去皮䖟蟲去足趐熬三十枚大黄三兩右四味切以水五升煑取三升分爲三服不下更服又療傷寒頭痛牡熱百節疼痛湯方柴胡芍藥梔子仁各四兩知母四兩香豉一升綿裹石膏八兩碎黄芩大青升麻杏仁去雙仁皮尖各三兩右十味切以水九升煑取二升七合分三服苦熱盛者加大黄四兩並出第十卷中千金翼方一十三首合一十三法千金翼療少隂病一二日口中和其背惡寒者當灸之服附子湯方大附子二枚炮茯苓芍藥各二兩人參二兩白术四兩右五味切以水八升煑取三升温服一升日三服忌豬肉桃李雀肉酢又療少隂病二三日咽痛者可與甘草湯不差可與桔梗湯方甘草湯方甘草二兩右一味切以水三升煑取一升半服七合日三服忌海藻菘菜又桔梗湯方大桔梗一兩甘草炙三兩右二味切以水三升煑取一升分兩服吐膿血差忌豬肉海藻菘菜又療少隂病二三日至四五日腹痛小便不利下利不止而便膿血桃蕐湯方赤石脂一斤一半全用綿裹一半篩末乾薑一兩切粳米一升右三味以水七升煑取米熟去滓取七合内赤石脂末一方寸匕日三服傷寒論千金崔氏范汪同又療少隂病得之二三日已上心中煩不得卧者黄連阿膠湯主之方黄連四兩黄芩一兩雞子中黄二枚芍藥二兩阿膠三兩炙一云三片右五味切以水六升先煑三味取二升去滓内阿膠煑烊盡小冷内雞子黄攪令相得温服七合日三服忌豬肉冷水并出第十一卷中又療傷寒五六日中風往來寒熱胸脇苦滿嘿嘿不欲飲食心煩喜嘔㦯胸中煩而不嘔㦯渇或腹中痛或脇下痞堅㦯心下卒悸小便不利㦯不渇外有微熱㦯欬小柴胡湯方柴胡八兩半夏洗半斤生薑黄芩人參甘草炙各三兩大棗十二枚擘右七味切以水一斗二升煑取六升去滓更煎取三升温服一升日三服但胸中煩而不嘔者去半夏人參加括蔞實一枚若渇者去半夏加人參合前成四兩半括蔞根四兩若腹中痛者去黄芩加芍藥三兩若脇下痞堅者去大棗加牡礪六兩若心下卒悸小便不利者去黄芩加茯苓四兩若不渇外有微熱者去人參加桂心三兩温覆取㣲汗若欬者去人參大棗生薑加五味子半升乾薑二兩忌羊肉餳海藻菘菜崔氏深師同又療傷寒五六日大下之後身熱不去心中結痛此為未解梔子豉湯方肥梔子十四枚擘香豉四合綿裹右二味以水四升先煑梔子取二升半去滓内䜴更煑取一升半去滓温分再服若一服得吐餘更勿服之若嘔者用後梔子加生薑湯傷寒論備急同傷寒兼療不得眠又梔子生薑湯方肥梔子十四枚擘香豉四合生薑五兩切右三味以水四升煑梔子生薑取二升半去滓内豉更煑取一升半去滓温分再服若一服安即勿服傷寒論同並療虚煩不得眠耳又傷寒六七日結胸熱實其脉沉𦂳心下痛按之如石堅宜䧟胸湯主之方大黄六兩切甘草末一錢芒硝一升右三味以水六升先煑大黄取二升去滓内芒硝煑一二沸乃内甘遂小温分再服得快利止後服又傷寒若吐若下後七八日不解熱結在裏表裏俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之又諸衂血家不可與白虎湯虚者亦不可與卒得之腹痛而利者但可温之又傷寒無大熱而口乾渇心煩其背㣲惡寒者白虎湯主之又傷寒脉浮發熱無汗其表不解者不可與白虎湯渇欲飲水無表証者白虎湯主之方知母六兩石膏一升碎綿裹甘草三兩粳米六合右四味切以水一斗二升煑取米熟去米内藥煑取六升去滓分六服日三服忌海藻菘菜千金傷寒論備急文仲崔氏范汪經心録同諸家兼療天行之病又白虎加人參湯方石膏粳米各一升知母六兩人參三兩甘草二兩炙右五味切以水一斗二升煑米熟内藥煮取六升去滓分服一升日三服此方立秋後立春前不可行白虎湯正二三月時尚冷亦不可與服與之則嘔利而腹痛忌海藻菘菜又療傷寒八九日下之後胸滿煩驚小便不利譫語一身盡重不可轉側柴胡加龍骨牡蠣湯方柴胡四兩黄芩生薑龍骨人參牡蠣熬鈆丹桂心茯苓各一兩半半夏二合半湯洗大棗六枚擘大黄二兩右十二味切以水八升煑取四升内大黄切如􅀶碁子煑取二升去滓温分再服忌羊肉餳生葱酢物又陽明病發熱而汗出此為熱越不能發黄也但頭汗出其身無有到頸而還小便不利渇飲水漿此為瘀熱在裏身必發黄宜服茵陳湯方茵陳六兩大肥梔子十四枚擘大黄二兩右三味切以水一斗二升先煑茵陳减六升去滓内諸藥煮取三升分三服小便當利如皂莢沫狀色正赤一㝛腹减黄從小便去並出第九卷中崔氏方一十五首崔氏療傷寒始得一二日方便可灸頂三壯又灸大椎三壯各加至五壯益良用之驗大椎平肩斜齊髙大者是也仍不得侵項分取之則非也上接項骨下肩齊在椎骨節上是餘穴盡在節下凡灸刺不得失之毫釐今崔氏不定髙下是以言之出黄帝鍼灸經又療傷寒一二日至三日可發汗度瘴散方麻黄十分去節桔梗蜀椒汗細辛白术呉茱茰防風各四分烏頭炮乾薑桂心各五分右十味擣篩為散温酒服方寸匕温覆取汗㦯數服得汗即止若得病一二日而輕者服此藥皆得汗解若得便重者頗不能解也然可以二大豆許著鼻孔中覺燥涕出一日可三四著必愈兼辟天行病忌豬肉生葱生菜桃李雀肉等又療傷寒赤色惡寒發熱體疼發汗神丹丸方人參五分烏頭四分炮半夏洗五分茯苓五分硃砂一分研附子四分炮右六味擣為末蜜和丸如大豆每服三丸生薑湯下𤼵汗出令體中濈濈然如汗未出更以熱粥投之令汗出若汗少不解復如前法若得汗足不解當服桂枝湯此藥多毒飲水解其熱愈周護軍子期自說天行用之甚良故記之忌豬羊肉大酢生血等物刪繁范汪同兼主天行又療傷寒服度瘴散而不汗出者便作葱豉湯方葱十四莖䜴一升綿裹右二味以水三升煑取一升頓服温煖覆取汗出勝度瘴散也與前肘後方重又療傷寒服葱豉湯不得汗可服葛根湯方葱白十四莖豉一升綿裹葛根三兩切右三味以水五升煑取二升分爲再服温覆取汗汗不出更服余時用此一服輙汗略不再服救數十人甚效又療傷寒前軍府直吏周虎服葛根湯再服不得汗余更視之甚惡寒而拘急更思作麻黄湯以解之方麻黄二兩去節葛根三兩葱白十四莖豉一升綿裹右四味切以水七升煑取二升半分三服虎再服快汗愈其疹與周虎相似者服之皆汗十餘人差又療傷寒阮何南蒸法薪火燒地良久掃除去火可以水小灑取蠶沙若桃葉桑栢葉諸禾糠及麥麬皆可取用易得者牛馬糞亦可用但臭耳桃葉欲落時可益收取乾之以此等物著火處令厚二三寸布席卧上温覆用此發汗汗皆出若過熱當細審消息大熱者可重席汗出周身輙便止當以温粉粉身勿令遇風又療傷寒三五日疑有黄則宜服此油方取生烏麻清油一盞水半盞以雞子白一枚和之熟攪令相得作一服令盡又小前胡湯療傷寒六七日不解寒熱徃來胸脇苦滿黙黙不欲飲食心煩喜嘔寒疝腹痛方胡洽云出張仲景前胡八兩半夏半升洗生薑五兩黄芩人參甘草炙各三兩乾􅀥十二枚擘右七味切以水一斗煑取三升分四服忌羊肉餳海藻菘菜古今録驗同仲景方用柴胡不用前胡今詳此方治寒疝腹痛恐性凉耳合用仲景柴胡桂薑湯今崔氏用之未知其可也又療傷寒或始得至七八日不大便或四五日後不大便或下後秘塞者承氣湯方厚朴炙大黄各三兩枳實六片炙右三味切以水五升煑取二升體強者服一升羸者服七合得下必效止范汪同又若胃中有燥糞令人錯語正熱盛亦令人錯語若秘而錯語者宜服承氣湯通利而錯語者宜服下四味黄連除熱湯承氣湯舊用芒硝余以有毒故去之用之數年安穏得下良既服湯亦應外用生薑兊讀作銳下同使必去燥糞若服湯兼兊而並不得下者可依本方加芒硝一兩又薑兊法削生薑如小指長二寸鹽塗之内下部中立通又方以豬膽灌下部用亦立通張仲景傷寒論云豬膽和法醋少許灌穀道中又前軍督護劉車者得時疾三日已汗解因飲酒復􅇵苦煩悶乾嘔口燥呻吟錯語不得卧余思作此黄連解毒湯方黄連三兩黄芩黄蘗各二兩梔子十四枚擘右四味切以水六升煑取二升分二服一服目明再服進粥於此漸差余以療凡大熱盛煩嘔呻吟錯語不得眠皆佳傳語諸人用之亦效此直解熱毒除酷熱不必飲酒􅇵者此湯療五日中神效忌豬肉冷水又大前胡湯療傷寒八九日不解心腹堅滿身體疼痛内外有熱煩嘔不安方胡洽云出張仲景前胡半斤半夏半升洗生薑五兩枳實八片炙芍藥四兩黄芩三兩乾􅀥十二枚擘右七味切以水一斗煑取三升分四服日三夜一服忌羊肉餳等物古今録驗同張仲景用柴胡不用前胡本云加大黄二兩不加大黄恐不名大柴胡湯又凡少隂病寒多表無熱但苦煩憒黙黙而極不欲見光有時腹痛其脉沈細而不喜渇經日不差舊用四順湯余怪其熱不甚用也若少隂病下利而體猶有熱者可服黄連龍骨湯若己十餘日而下利不止手足徹冷及無熱候者可服增損四順湯方黄連龍骨湯見第三卷天行中甘草二兩炙人參二兩龍骨二兩黄連乾薑各二兩附子中形者一枚炮去黑皮右六味切以水六升煑取二升分再服不差復作甚良若下而腹痛加當歸二兩嘔者加橘皮一兩忌海藻菘菜豬肉冷水又療少隂病二十日後下不止可服陟釐丸浩京方陟釐四兩不用鹹者當歸四兩漢防己三兩黄連三兩紫石英别擣末細研二兩豉三升厚朴二兩炙苦酒五升右八味切以二升苦酒漬防己一㝛出切炙之燥復内苦酒中盡止又以三升苦酒漬豉一宿小蒸之研絞取汁擣下篩諸藥以酒豉汁和之丸如梧桐子大冷漿水服二十丸丸極燥乃可服之忌豬肉冷水並出第一卷中張文仲方一十首張文仲葛氏療傷寒及温病頭痛壯熱脉盛始得一二日方破雞子一枚著冷水半升中攪令相得别煑一升水令沸以雞子水投其湯中急攪調適寒温頓服覆取汗備急同又療傷寒二三日以上至七八日不解者可服小柴胡湯方柴胡半斤人參甘草黄芩生薑各二兩半夏五合洗大􅀥十二枚擘右七味切以水一斗二升煮取三升分三服㣲覆取汗半日便差不差更服一劑忌羊肉餳海藻菘菜備急范汪千金翼方重又療傷寒温病等三日以上胸中滿陶氏云若傷寒温病已三四日胸中惡欲令吐者服酒膽方苦酒半升豬膽一枚右二味和盡服之吐則愈神驗支云去毒氣妙胡洽集驗備急千金同又療傷寒近效方凡胸中惡痰飲傷寒熱病瘴瘧須吐者方鹽末一大匙右一味以生熟湯調下須臾則吐吐不快明且更服甚良備急同又𤓰蒂散主傷寒胸中痞塞宜吐之方𤓰蒂赤小豆各一兩右二味擣散白湯服一錢匕取得吐去病差止備急經心録范汪同又療傷寒已四五日頭痛體痛肉熱如火病入腸胃宜利㵼之方生麥門冬一升去心生地黄切一升知母二兩生薑五兩半芒硝二兩半右五味以水八升煑取二升半内芒硝煎五沸分五服取利爲度忌蕪荑備急同又療傷寒五日以上冝取下利陶氏云若汗出大便堅而譫語方大黄四兩厚朴二兩炙枳實四枚炙右三味以水四升煑取一升二合分兩服通者一服止此是仲景方備急范汪同與前千金崔氏方重又療傷寒八九日不差名爲敗傷寒諸藥不能消者方鼈甲炙蜀升麻前胡烏梅枳實炙犀角屑黄芩各二兩甘草一兩炙生地黄八合右九味切以水七升煑取二升半分五服日三服夜二服忌海藻菘菜莧菜蕪荑備急方同又若十餘日不大便者服承氣丸方大黄杏仁去皮尖各二兩枳實一兩炙芒硝一合右四味擣下篩蜜和丸如彈子以生薑湯六七合研一丸服之須臾即通不通更服一丸取通爲度備急同又療晩發傷寒三月至年末爲晩發方生地黄一斤打碎梔子二十枚擘升麻三兩柴胡石膏各五兩右五味切以水八升煑取三升分五服頻頻服若不解更服若頭面赤去石膏用乾葛四兩無地黄用豉一升煑取三升分三服忌蕪荑備急同並出第二卷中古今録驗方八首古今錄驗陽毒湯療傷寒一二日便成陽毒或服藥吐下之後便成陽毒身重腰背痛煩悶不安狂言或走或見神鬼或吐血下利其脉浮大數面赤斑斑如錦文喉咽痛唾膿血五日可療至七日不可療也宜服升麻湯方升麻二分當歸二分蜀椒汗一分雄黄研梔子桂心各一分甘草二分炙鼈甲大如手一片炙右八味切以水五升煑取二升半分三服如人行五里久再服温覆手足毒出則汗汗出則解不解重作服亦取得吐佳隂毒去雄黄忌海藻菘菜生葱莧菜張仲景方無梔子桂心隂毒去雄黄蜀椒又隂毒湯療傷寒初病一二日便結成隂毒或服湯藥六七日以上至十日變成隂毒身重背強腹中絞痛喉咽不利毒氣攻心心下堅強短氣不得息嘔逆脣青面黒四肢厥冷其脉沈細緊數一本無數字仲景云此隂毒之候身如被打五六日可療至七日不可療宜服甘草湯方甘草炙升麻當歸各二分蜀椒一分出汗鼈甲大如手一片炙右五味切以水五升煑取二升半分再服如人行五里頃復服温覆當出汗汗出則愈若不得汗則不解當重服令汗出忌海藻菘菜莧菜千金集驗備急文仲小品肘後同並出第二卷中又還魂丸療傷寒四五日及數年諸癖結堅心下飲食不消目眩四肢疼咽喉不利壯熱脾胃逆滿腸鳴兩脇裏急飛尸鬼注邪氣或爲驚恐傷瘦背痛手足不仁口苦舌燥天行發作有時風温不能久住吐惡水方巴豆去心皮熬甘草炙朱砂芍藥各二兩麥門冬二兩去心右五味各擣下篩合和以蜜擣三千下丸如梧桐子大每服兩丸葱􅀥湯下小兒二嵗以上服如麻子大二丸日二服忌海藻菘菜野豬肉蘆笋生血物出第三卷中又麥奴丸療傷寒五六日以上不解熱在胸中口噤不能言唯欲飲水爲敗傷寒醫所不療方麻黄去節大黄芒硝竈突中墨黄芩各二分麥奴梁上塵釡底墨各一分右八味擣篩蜜和如彈丸以新汲水五合研一丸病者渇欲飲水但極飲冷水不節升數須臾當寒寒訖汗出則愈若日移五丈不汗依前法服一丸以㣲利止藥勢盡乃食當冷食以除藥勢一名黒奴丸小麥黒勃名爲麥奴是也肘後胡洽小品刪繁張文仲深師范汪經心録廣濟並同又解肌湯療傷寒發熱身體疼痛方葛根四兩麻黄去節茯苓各三兩牡蠣二兩熬右四味切以水八升煑取三升分三服徐徐服之得汗通則止忌酢物千金有生薑甘草又調中湯療夏月及初秋忽有暴寒折於盛熱熱結四肢則壯熱頭痛寒傷於胃則下痢或血㦯水㦯赤帯下壯熱且悶脉微且數宜下之方大黄葛根黄芩芍藥桔梗茯苓藁本白术甘草炙各二兩右九味以水九升煑取三升分三服服别相去二食久勿以食隔須取快下壯熱便歇其下亦止也凡秋夏旱熱積日忽有暴寒折之熱無可散喜搏著肌中作壯熱氣也胃爲六腑之長最易得傷非忽暴寒傷之而下也虚冷人則不在壯熱但下痢㦯霍亂也少實人有服五石人喜壯熱甚適與藥喫斷下則加熱喜悶而死矣亦有不止便作壅熱毒壯熱甚不歇則劇是以宜此調中湯下之和其胃氣其表熱者宜前胡大黄下之也忌海藻菘菜豬肉酢物桃李雀肉等又療徃來寒熱胸脇逆滿桃仁承氣湯方大黄四兩漬别下甘草炙芒硝湯成下桂心各二兩桃仁五十枚去皮尖碎右五味以水七升煑取二升半去滓内芒硝更煎一兩沸温分三服忌海藻菘菜太醫較尉史脫方肘後傷寒論千金翼同並出第二卷中雜療傷寒湯散丸方八首並是論中所要者范汪療傷寒赤色頭痛頸強賊風走風黄膏方大黄附子細辛乾薑蜀椒去目桂心各一兩巴豆好者五十枚去皮右七味各切以淳苦酒漬藥一宿以臘月豬脂一斤煎之調適其火三上三下藥成傷寒赤色發熱酒服如梧桐子許又以摩身數百遍兼療賊風絶良風走肌膚追風所在摩之已用有效此趙泉方千金同忌野豬肉生葱生菜蘆笋又療傷寒白膏摩體中手當千遍藥力方行并療惡瘡小兒頭瘡牛領馬鞍皆療之先以鹽湯洗惡瘡布拭之著膏瘡腫上摩向火千遍日再自消方天雄烏頭炮莽草羊躑躅各三兩右四味各切以苦酒三升漬一宿作東向露竈又作十二聚濕土各一升許成煎豬脂三斤著銅器中加竈上炊以葦薪爲火令膏釋内所漬藥炊令沸下著土聚上沸定頃上火煎如此十二過令土聚盡遍藥成絞去滓傷寒頭痛酒服如杏核一枚温覆取汗咽痛含如棗核日三咽之不可近目千金同忌豬肉等又崔文行解散療傷寒發熱者方一名皮瘴散烏頭一斤燒桔梗細辛各四兩白术八兩右四味擣散皆令盡若中寒服一錢匕覆取汗若不覺復少増服之以知爲度時氣不和且服錢五匕辟惡氣欲省病服一服皆酒服忌生菜豬肉桃李雀肉等千金同又六味青散療傷寒赤色惡寒者方烏頭炮桔梗白术各十五分附子炮五分防風細辛右六味擣篩爲散温酒服錢五匕不知稍増服後食頃不汗出者飲薄薄粥一升以發之温覆汗出濈濈可也勿令流離勿出手足也汗㣲出勿粉若汗大出不止温粉粉之不得汗者當更服之得汗而不解當服神丹丸忌生菜豬肉桃李雀肉等千金同又服桂枝湯大汗出後脉洪大者與桂枝湯如前法若形如瘧一日再發者汗出便解屬桂枝二麻黄一湯主之方桂心一兩十七銖杏仁十六枚去尖皮芍藥一兩六節麻黄一十六銖去節生薑一兩六銖切甘草炙一兩二銖大棗五枚擘右七味切以水五升先煑麻黄一兩沸掠去沫乃内諸藥煮得二升去滓温服一升日再本云桂枝湯二分麻黄湯一分合爲二升分再服今合爲一方忌海藻菘菜生葱本張仲景傷寒論方集驗療天行又療傷寒及天行𤓰蒂散吐方赤小豆一兩𤓰蒂一兩右二味擣作散温湯二合服一錢匕藥下便卧若吐便且急忍也候食頃不吐者取錢五匕散二合湯和服之便吐矣不吐復稍増以吐爲度吐出青黄如菜汁者五升以上爲佳若吐少病不除者明日如前法復服之可至再三不令人虚也藥力過時不吐服湯一升助藥力也吐出便可食無復餘毒若服藥過多者益飲冷水解之與前張文仲方重又療傷寒熱病辟毒氣疫病七味赤散方朱砂烏頭炮各二兩細辛躑躅乾薑白术各一兩栝樓一兩半右藥擣散服半錢匕用酒調服汗出解不解増至一錢匕除邪氣消疫癘忌桃李雀肉生菜豬肉生血等物出第二十一卷中又療傷寒雪煎方麻黄十斤去節杏仁四升去双仁尖皮熬擣爲膏大黄一斤十三兩金色者各細剉右三味以雪水五石四斗漬麻黄於東向竈釡中二宿入大黄攪調炊以桑薪煑至二石去滓復於釡中下杏仁膏煎至六七斗絞去滓置銅器中更以雪水三斗合煎得二斗六升其藥已成可丸如彈子大有病者以三沸白湯五合研一丸入湯中適寒温服立汗出若不愈者復服一丸蜜封藥勿令泄氣也此本出第三卷中千金同外臺秘要方卷一
