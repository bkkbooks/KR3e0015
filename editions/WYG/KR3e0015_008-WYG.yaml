body:
  text: 外臺秘要方卷四唐王燾撰温病論病源二首病源經言春氣温和夏氣暑熱秋氣清涼冬氣氷寒此則四時正氣之序也冬時嚴寒萬類深藏君子固宻則不傷於寒觸冒之者乃為傷寒耳其傷於四時之氣皆能為病以傷寒為毒者以其最為殺厲之氣中而即病者名為傷寒不即病者其寒毒藏於肌膚中至春變為温病至夏變為暑病暑病者熱極又重於温也是以辛苦之人春夏多温熱病者皆由冬時觸冒寒氣之所致以上與傷寒論同凡病傷寒而成温病者先夏至日者為病温後夏至日者為病暑故曰冬三月早卧晚起必待日光使志若伏若匿若有私意若已有得去寒就温無泄皮膚使氣亟奪又因於寒欲如運樞故冬傷於寒春必病温也又有冬時傷非節之暖名為冬温之毒與傷寒大異也有病温者乃天行之病耳其冬月温暖之時人感乖候之氣未遂發病至春或被積寒所折毒氣不得泄至天氣暄熱温毒始發則肌肉斑爛也經曰虛邪賊風避之有時恬淡虗無真氣従之精神内守病安従來故曰人清淨則肉腠閉拒雖有大風苛毒弗之能害又云四時隂陽者萬物之根本也是以聖人春夏養陽秋冬養隂以従其根也従隂陽則生逆之則死故曰精者身之本藏於精者春不病温也有病温汗出輒復熱而脉躁疾不為汗衰狂言不能食病名為何曰病名隂陽交交者死人所以汗出者皆生於榖榖生於精今邪氣交爭於骨肉之間而得汗者是邪却而精勝也精勝則當能食而不復熱熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也不能食者精無禆也病而留者其壽可立而傾也汗出而脉尚躁盛者死今脉不與汗相應此不勝其病也其死明矣狂言者是失志失志者死今見三死不見一生雖愈必死凡膚熱其脉盛躁者病温也其脉盛而滑者汗且出也凡温病人三二日身軀熱脉疾頭痛食飲如故脉直疾八日死四五日頭痛脉疾喜吐脉來細十二日死此病不療八九日脉不疾身不痛目不赤色不變而反利脉來牒牒按不彈手指時大心下硬十七日死病三四日以下不得汗脉大疾者生脉細小難得者死不治也下利腹中痛者死不治辟温方二十首肘後屠蘇酒辟疫氣令人不染温病及傷寒歳旦飲之方大黄桂心各五十銖白术十銖桔梗十銖菝葜蜀椒十銖汗防風烏頭各陸銖右八味切綘袋盛以十二月晦日中懸沉井中令至泥正月朔旦平曉出藥至酒中煎數沸於東向户中飲之屠蘇之飲先従小起多少自在一人飲一家無疫一家飲一里無疫飲藥酒待三朝還滓置井中能仍歳飲可世無病當家内外有井皆悉著藥辟温氣也又太乙流金散辟温氣雄黄三兩雌黄六兩􅈨石一兩半鬼箭羽一兩半羚羊角燒二兩右五味治下篩三角綘袋盛一兩帶心前并掛門户上若逢大疫之年以月旦青布褁一刀圭中庭燒之温病人亦燒熏之又雄黄散辟温氣方雄黄五兩朱砂一作赤木菖蒲鬼臼各二兩右四味擣篩末以塗五心額上鼻人中及耳門又斷温疫轉相染著至滅門延及外人無收視者方赤小豆鬼箭羽鬼臼雄黄各三兩右四味搗末以蜜和丸如小豆大服一丸可與病人同床又辟温粉川芎蒼术白芷藁本零陵香各等分右五味擣篩為散和米粉粉身若欲多時加藥增粉用之出第十卷中千金辟温虎頭殺鬼丸方虎頭骨五兩炙朱砂一兩半研鬼臼一兩雄黄一兩半研皂莢一兩炙雌黄一兩半研蕪荑一兩右七味擣篩以臘蜜和如彈丸大綘嚢盛繫臂男左女右家中置屋四角月朔望夜半中庭燒一丸忌生血物肘後同又治瘴氣竹茹湯方青竹茹二升右一味以水四升煮取三升分三服又辟温病粉身散方芎藭白芷藁本右三味等分搗下篩内米粉中以粉塗身延年同又斷温疫朱蜜丸方白蜜和上等朱砂粉一兩常以太歲日平旦大小勿食向東方立人吞三七丸如麻子大勿令齒近之并吞赤小豆七枚投井泉水中終身勿忘此法又治温病不相染方正旦吞麻子赤小豆各二七枚又以二七枚投井中肘後延年同又方新布盛大豆一升内井中一宿出服七枚肘後用小豆又方切松葉如粟米酒服方寸匕日三服辟五年温又方常以七月七日合家含赤小豆向日吞二七枚又方常以七月七日男吞大豆七枚女吞小豆七枚又方神仙教人立春後有庚子日温蕪菁葅汁合家大小並服不限多少又療温氣蒜豉湯方蒜五十子并皮研之豉心一升右二味以三歳小兒小便二升合煮五六沸頓服並出第九卷中千金翼老君神明白散方白术二兩桔梗一兩細辛一兩附子二兩炮烏頭四兩去黒皮右五味擣篩綘嚢盛帶之所居閭里皆無病若有得疫癘者温酒服一方寸匕覆取汗得吐則差若經三四日者以三方寸匕内五升水中煮令大沸分三服又度瘴散方麻黄去莭升麻附子炮白术各一兩細辛防已乾薑桂心防風烏頭炮蜀椒出汗去目桔梗各二分右十二味擣篩為末蜜封貯之山中所在有瘴氣之處旦空腹服一錢匕覆取汗病重稍加之並出第十卷中古今録騐許季山所撰干敷散主辟温疫疾惡令不相染著氣方肘後作敷干抱朴子作敷干附子一枚炮細辛一分乾薑一分麻子一分研栢實一分右五味擣篩為散正旦舉家以井華水各服方寸匕服藥一日十年不病二日二十年不病三日三十年不病受師法但應三日服歳多病三日一服之肘後胡洽延年范汪刪繁同出第二卷中又殺鬼丸去惡毒方雄黄五兩研朱砂五兩研鬼臼五兩鬼督郵五兩雌黄五兩研馬兠鈴五兩皂莢五兩炙虎骨五兩炙阿魏五兩甲香一兩羚羊角一枚屑桃白皮五兩白膠香一兩菖蒲五兩羖羊角一枚屑臘蜜八斤錬石硫黄五兩研右十七味擣篩十六味臘蜜和之丸如杏子將徃辟温處燒之殺鬼去惡毒氣若大疫家可燒并帶行與胡洽方七味不同出第三卷中延年秘録辟温方正旦取東行桑根大如指長七寸以丹塗之懸著門戸上又令人帶之出第十卷中辟温不相染方二首病源此病皆因歲時不和温涼失節人感乖候之氣而生病則病氣轉相染易乃至滅門延及外人故須預服藥及為法術以防之出第十卷中千金斷温疫主温病轉相染著乃至滅門延及外人無收視者赤小豆丸方赤小豆二兩鬼臼二兩鬼箭二兩丹砂二兩研雄黄二兩研右五味末之以蜜和如小豆大服一丸可與病人同床傳衣也出第九卷中延年主辟温疫疾惡氣令不相染易䜴湯方豆豉一升伏龍肝三兩研小兒小便三升右三味用小便煎取一升五合去滓平旦服之令人不著瘴疫天行有瘴之處宜朝朝服出第十卷中温病噦方四首病源伏熱在胃令人胸滿胸滿則氣逆氣逆則噦若大下後胃中虗冷亦令致噦也並出第十卷中小品茅根湯療温病有熱飲水暴冷噦者方茅根葛根各切半升右二味以水四升煮取二升稍温飲之啘止則停又療温病熱未除重被暴寒寒毒入胃熱藴結不散變啘者方單煮梓皮稍稍飲之佳温病積飲冷冷結胃中熱入腎中變壯熱大啘者服梓皮温啘得止也夫腎中有熱者病差後足心皮喜剥脫去頭髪秃落是其證也又茅根橘皮湯療春夏天行傷寒温病干胃冷變啘方白茅根切一升橘皮三兩桂心二兩葛根二兩右四味切以水六升煮取三升分温服三合數連服之盡復合啘止乃停耳微有熱减桂一兩文仲古今録騐同出第六卷中古今録騐療温病有熱飲水暴冷啘枇杷葉飲子方枇杷葉拭去毛茅根各半升右二味切以水四升煮取二升稍稍飲之啘止則停出第三卷中温病渴方二首病源熱氣入腎藏腎藏惡燥熱氣盛則腎燥腎燥則渴引飲也出第十卷中深師療温毒病及吐下後有餘熱渴芍藥湯神方芍藥五分黄連四分甘草二分炙黃芩二兩桂心二兩栝樓二分右六味切以水五升煮取三升分三服一日令盡出第十四卷中古今録驗知母解肌湯療温熱病頭痛骨肉煩疼口燥心悶者或是夏月天行毒外寒内熱者或已下之餘熱未盡者或熱病自得痢有虗熱煩渇者方麻黃二兩去節知母三兩葛根三兩石膏三兩甘草二兩炙右五味切以水七升煮取三升分為三服若巳下及自得下虗熱未歇者除麻黃加知母葛根病熱未除因夢泄者可除麻黃加白薇人參各二兩則止小品同出第二卷中温病發斑方七首病源夫人冬月觸冒寒毒者至春始發病病初在表或巳發汗吐下而表證未罷毒氣不散故發斑瘡又冬月天時温暖人感乖候之氣未即發病至春又被積寒所折毒氣不得泄至夏遇熱其春寒解冬温毒始發出於肌膚斑爛隱􅇙如錦文也出第十卷中肘後療温毒發斑大疫難救黒膏方生地黃半斤好䜴一升右二味以猪膏二斤合露之煎五六沸令三分減一絞去滓末雄黃麝香如大豆者内中攪和盡服之毒便従皮中出則愈忌蕪荑出第二卷中小品葛根橘皮湯療冬温未即病至春被積寒所折不得發至夏得熱其春寒解冬温毒始發出肌中斑爛隱􅇙如錦文壯熱而欬心悶嘔但吐清汁宜服此湯則靜方大効葛根二兩橘皮二兩杏仁二兩去尖皮麻黃二兩去節知母二兩黃芩二兩甘草二兩炙右七味切以水七升煮取三升分温三服嘔悶吐當先定便且消息古今録驗同出第六卷中删繁療肺腑藏熱暴氣斑㸃香豉湯方香豉一升綿褁葱鬚切四兩石膏八兩梔子仁三兩生薑八兩大青二兩升麻三兩芒硝三兩右八味切以水六升煮七味取二升五合去滓然後下芒硝分三服出第十卷中備急療温毒發斑赤斑者五死一生黒斑者十死一生大疫難救黒奴丸方麻黃三兩去節大黄二兩芒硝一兩黃芩一兩釡底墨一兩研竈尾墨一兩研屋梁上塵二兩研右七味擣末用蜜和如彈子大新汲水五合研一丸服之若渇但與水須􅁷當寒寒訖便汗則解日移五丈不覺更服一丸此療六日胸中常大熱口噤名壞病醫所不療服此丸多差胡洽小品同一名水解丸又一方加小麥黒勃一兩名為麥奴丸范汪方同古今録驗黃連橘皮湯療冬温未即病至春被積寒所折不得發至夏得熱其春寒解冬温毒始發出肌中斑爛隱􅇙如錦文而欬心悶嘔吐清汁眼赤口瘡下部亦生瘡己自得下痢宜服此方黃連四兩去毛橘皮二兩杏仁二兩去尖皮枳實一兩炙麻黃二兩去節葛根二兩厚朴一兩炙甘草一兩炙右八味切以水八升煮取三升分三服令盡且消息下當先止又漏蘆橘皮湯療冬温未即病至春被積寒所折不得發至夏熱其春寒解冬温毒始發出肌中斑爛隱􅇙如錦文而欬心悶嘔吐清汁眼赤口瘡下部亦生瘡方漏蘆橘皮甘遂麻黃去節杏仁去皮尖黃芩各二兩右六味切以水九升煮取三升分四服得下為佳下後餘外證未除更服葛根橘皮湯方在前小品方一方有知母枳實白薇升麻大黃甘草為十二味出第三卷中又發斑瘡方黃連切三兩去毛右一味以水二升煮取八合頓服之忌猪肉冷水温病勞復方四首病源温病勞復謂病新差津液未復血氣尚虗因勞動早更生於熱熱氣還入經絡復成病也又凡得温毒病新差脾胃尚虗榖氣未復若食犬猪羊肉并腸血及肥魚炙脂膩必大下痢下痢則不可復救又食餅餌炙鱠棗栗諸生果難消物則不能消化停積在於腸胃便脹滿結實大小便不通因更發熱復成病也非但雜食梳頭洗浴諸勞事等皆須慎之如桃李生葱生菜海藻菘菜雀肉等俱在所忌並出第十卷中千金論曰凡熱病新差及大病之後食猪肉及腸血肥魚炙膩必大下痢醫所不能療也必至於死若食餅餌粢黍飴脯炙鱠棗栗諸果及堅實難消之物胃氣尚虗弱不能消化必更結熱適以藥下之則胃虗冷大利難禁不下之必死下之復危皆難救也熱病及大病之後多坐此死不可不慎也病新差後但得食糜粥寧可少食令饑慎勿飽不得他有所食雖思之勿與引日轉久可漸食羊肉糜若羮汁雉兔鹿肉不可食猪狗肉也新差後當靜卧慎勿早起勿令人梳頭澡洗非但體勞亦不可多語言用心使意勞凡此皆令人勞復有人得病已差而未徤詣華旉視脉曰雖差尚虗未復陽氣不足勿為勞事餘勞尚可御内則死臨死當吐舌數寸其妻聞其夫病除従百餘里來省之止宿交接中間三日發病舌出數寸而死病新差未滿百日氣力未平復而以房室者略無不死及熱病房室名隂陽易之病皆難療多死古今録驗集驗同又療重病新差早起勞及飲食多致復欲死方燒鼈甲末服方寸匕忌莧菜肘後集驗文仲偹急同出第十卷中深師療温病差愈食復病麻黄散方麻黄十分去節大黄十五分炙附子一分炮厚朴二分炙苦參六分石膏六分碎綿褁烏頭六分炮右七味擣篩以酒若米汁和服方寸匕日三夜二服出第十四卷中古今録驗療熱病復麻子湯呉正服効方麻子一升豉一升牡鼠屎一十三枚右三味以水五升煮取二升半分温三服立愈試之有神驗肘後同又大黄丸方大黄一兩蒸之二斗米下巴豆五十枚去心皮熬硝石三分熬無者以芒硝代之桂心二分乾薑二分炮右五味擣篩四味别擣巴豆令如泥合和以蜜更擣二千杵丸如梧子一丸湯服之但熱在膈上當吐在膈下當利豫作粥如服他吐下丸法服藥兩食頃不吐下以熱飲動之若不得吐下可更服一丸半能藥壯人可二丸此藥優於他下藥丸故宜大小下多冷粥解之若有瘡綿挺如指蜜和一丸塗挺頭旦内瘡中㬂出之不差更作温病不得大便服之得下佳宿食不消亦服之飛尸遁尸漿服半丸日一應須臾止心腹脹滿痛服一丸瘧者依發日先宿勿食清晨服一丸丁壯人服二丸得吐下忍飢過發時乃食婦人産後血結中奔走起上下或絶産無子或月經不調面目青黄服半丸小兒淋瀝寒熱臚脹大腹不欲食食不生肌三四歳者如麻子服一丸日一六七歳兒服二丸比三十日心腹諸病差兒小半之愈大良忌野猪肉蘆笋生葱出第三卷中諸黄方一十三首病源黄病者一身盡疼發熱面色洞黄七八日後結熱在裏有血當下去之如㹠肝狀其人小腹滿急若其人眼睛澀疼鼻骨疼兩膊及項強腰背急則是患黄大便澀但令得小便快則不慮死不用大便多多則心腹脹不好此由寒濕在表則熱畜於脾胃腠理不開瘀熱與宿穀相摶鬱蒸不得消則大小便不通故身體面目皆變黄色凡黄候其寸口近掌無脉口鼻氣冷並不可療之必死出第十二卷中仲景傷寒論諸黄猪膏髪煎主之方猪膏八兩亂髪大如雞子一枚右二味内髪膏中煎之髪消盡研絞去膏細滓分二服病従小便去也肘後備急文仲千金古今録驗深師范汪同云太醫校尉史脫家婢再病胃中乾糞下便差神驗出第十四卷中删繁療天行毒熱通貫藏腑沈鼓骨髓之間或為黄疸黒疸赤疸白疸榖疸馬黄等疾喘息須􅁷而絶𤓰蔕散方𤓰蔕二七枚赤小豆三七枚秫米二七粒右三味擣篩為散取如大豆粒吹於兩鼻之中甚良不差間日復服之千金范汪集驗同又方𤓰蔕二七枚右一味以水一升煮取五合作一服又方鹽一升右一味紙褁漬濕燒之取通赤内三升水中攪令調手巾漉度為一服己前二方服訖並吐出黄汁崔氏療黄貧家無藥者可依此方取栁枝三大升以水一斗煮取濃汁搦半升一服令盡又療黄兼主心腹方蔓菁子一大合揀令淨右一味擣碎熟研以水一升更和研濾取汁可得一大盞頓服之少頃自當轉利或亦自吐腹中便寛亦或得汗便愈備急文仲深師同並出第一卷中延年秘録療黄𤓰蔕湯方𤓰蔕一兩赤小豆四十九枚丁香二七枚右三味擣末以水一升煮取四合澄清分為兩度滴入兩鼻中出第十卷中救急療三十六種黄方取雞子一顆并殻燒作灰研酢一合又温之揔和頓服身體眼暗極黄者不過三顆鼻中蟲出神効又療諸黄闇黄眼闇及大角赤黒黄先擲手足内黄患渴疸黄眼赤黄腎黄小便不通氣急心悶五色黄𤓰蔕散方丁香𤓰蔕赤小豆各十枚右三味細擣篩取煖水一雞子許和服大神驗並出第十七卷中廣濟同必効療一切黄蔣九處得其父逺使得黄服此極効茵陳湯及丸方茵陳四兩大黄三兩黄芩三兩梔子三兩擘右四味切以水五升煮取三升分為三服空肚服之不然搗篩蜜和為丸飲服二十丸稍稍加至二十五丸量病與之重者作湯勝服丸日一服忌羊肉酒麪熱物等以差為限小便黄色及身黄者並主之又療諸黄眼已黄亦差𤓰蔕散方丁香一分赤小豆一分𤓰蔕一分一方加秫米一分右三味擣末温水食前頓服使盡則當利并吐黄水不差更服並出第一卷中千金療黄疸大黄丸方大黄二兩葶藶三兩右二味擣篩為末蜜和為丸如梧子大未食服十丸日三服病差便止又大黄丸方大黄二兩黄連三兩黄芩黄蘗各一兩麴衣五合右五味擣篩為末蜜和丸如梧子大食前服三丸日三服不知可至五丸忌猪肉冷水並出第十卷中急黄方六首病源脾胃有熱榖氣鬱蒸因為熱毒所加故卒然發黄心滿氣喘命在頃刻故云急黄也有得病即身體面目發黄者有初不知是黄死後乃身面黄者其候得病但發熱心戰者是急黄也並出第十二卷中廣濟療急黄身如金色𤓰蔕散方赤小豆二七枚丁香二七枚黍米二七枚𤓰蔕二七枚麝香薫陸香等分别研青布二方寸燒為灰右七味擣篩為散飲服一錢匕則下黄水其黄則定忌生冷熱麫粘食陳臭等一方止三味出第一卷中必効療急黄疸内等黄大黄湯方大黄三兩切芒硝二兩右二味以水二升生漬大黄一宿平旦絞汁一升半内芒硝攪服須臾當快利差出第一卷中延年秘録療急黄心下堅硬渴欲得水喫氣息喘麄眼黄但有一候相當即須宜服此𤓰蔕散吐則差方𤓰蔕二小合赤小豆二合右二味擣篩為散年大人煖漿水五小合和散一服滿一方寸匕一炊久當吐不吐更服五分匕水亦減之若輕病直吹鼻中兩黒豆粒大亦得當鼻中黄水出即歇并宜灸心厭骨下一寸名巨闕灸五七炷以來初小作炷在後漸大仍不得大如梧子吐訖及灸了計即渴仍服麥門冬飲子方麥門冬四兩去心括蔞三兩竹葉一升茯苓四兩升麻二兩生蘆根一升甘草一兩炙右七味切以水七升煎取二升五合絞去滓分温三服服别相去如人行八九里久服此飲渴即止出第十卷中千金療急黄熱氣骨蒸兩目赤脉地黄汁湯方生地黄汁八合大黄六分末芒硝一兩右三味合和一服五合日二服以利為度近効療急黄方取蔓菁子油一盞頓服之臨時無油則以蔓菁子擣取汁水和之喫亦得候顔色黄或精神怠則是此病韋給事試用之有効黄疸方十三首病源黄疸之病此由酒食過度藏腑不和水榖相并積於脾胃復為風濕所摶瘀結不散熱氣鬱蒸故食已如饑令身體面目爪甲及小便盡黄而欲安卧若身脉多赤多黒多青皆見者必寒熱身痛面色微黄齒垢黄爪甲上黄此黄疸也疸而渴者其病難療疸而不渴者其病可療發於隂部其人必嘔發於陽部其人振寒而發熱出第十二卷中仲景傷寒論黄癉麻黄醇酒湯主之方麻黄一大把去節右一味美清酒五升煮取二升半去滓頓服盡古今方云傷寒熱出表發黄疸宜汗之則愈冬月用酒春宜用水煮之良小品古今録驗張文仲經心録同又黄疸茵蔯蒿五苓散主之方茵蔯蒿末十分五苓散五分右二味和先食白飲和方寸匕服之日三深師范汪同又五苓散利小便治黄疸方猪苓三分去皮白术三分茯苓三分澤瀉五分桂心二分右五味擣篩和合白飲和服一方寸匕日三多飲煖水以助藥勢汗出便愈千金深師范汪同並出第十四卷中肘後療黄疸方燒亂髪服一方寸匕日三秘驗酒飲並得備急文仲同出第一卷中范汪療黄疸散方取瓠子白瓤及子熬令黄擣為末服半錢匕日一服十日愈用瓠子數數有吐者當先詳之出第三十四卷中集驗療黄疸百藥不差者方驢頭一枚煮熟以薑虀噉之并隨多少飲汁備急崔氏張文仲古今録驗同出第二卷中千金療黄疸方取生小麥苖擣絞取汁飲六七合晝夜三四飲三四日便愈無小麥苗穬麥苖亦得范汪云用小麥勝也備急文仲集驗並同出第十卷中千金翼療黄疸目黄不除𤓰丁散方𤓰丁細末如大豆許内鼻中令病人深吸取入鼻中黄汁出又黄蒸湯方黄蒸一升麥麪一升猪屎一升右三味以水五升漬一宿煮取三升絞去滓頓服一升覆取汗必効同出第十八卷中崔氏療黄疸年六十以上方茅根一把猪肉一斤右二味合作羮盡一服愈當灸臍上下兩邉各一寸半一百壯手魚際白肉側各一灸隨年壯備急范汪同又療黄疸方苦胡蘆瓤如大棗許右一物以童子小便二合浸之三兩食頃取兩酸棗許汁分内兩鼻孔中餘節候與上方同比來常用乃勝𤓰蔕散近効療黄疸𤓰蔕散方𤓰蔕二七枚赤小豆七枚生秫米二七枚丁香二七枚右四味擣篩重者取如大豆二枚各著一枚鼻孔中痛縮鼻須􅁷鼻中瀝清黄水或従口中出升餘則愈病輕者如一小豆則可一與不盡間日復頻用効李暠用之立驗俗人或使人以竹筒極力吹鼻中無不死者慎之又療男子女人黄疸病醫療不愈身目悉黄食飲不消胃中脹熱生黄衣在胃中有乾屎使病爾方以成煎猪脂一小升温熱頓盡服之日三燥屎下去乃愈備急崔氏同黄疸遍身方一十一首廣濟療黄疸遍身面悉黄小便如濃梔子汁茵陳丸方茵陳四兩黄芩三兩枳實二兩炙大黄三兩右四味擣篩蜜丸空腹以米飲服如梧子二十丸日二服漸加至二十五丸微利為度忌熱麪蒜蕎麥粘食陳臭物一方有升麻三兩出第一卷中肘後療黄疸者一身面目悉黄如橘柚暴得熱外以冷廹之熱因留胃中生黄衣熱熏上所致方猪脂一升右一味成煎者温令熱盡服之日三燥屎當下下則稍愈便止與前近効方同備急崔氏同出第三卷中小品療黄疸身目皆黄皮膚麴塵出三物茵陳蒿湯方茵陳蒿一把梔子二十四枚石膏一斤千金方加大黄三兩右三味以水八升煮取二升半去滓以猛火燒石膏令正赤投湯中沸定取清汁適寒温服一升自覆令汗出周身遍以温粉粉之則愈若不汗更服一升汗出乃愈也深師古今録驗千金翼同出第四卷中集驗療黄疸身體面目皆黄大黄散方大黄四兩黄連四兩黄芩四兩右三味擣篩為散先食服方寸匕日三服亦可為丸服備急文仲千金同出第二卷中删繁療黄疸者通身並黄茵陳湯方茵陳四兩柴胡四兩升麻三兩龍膽草二兩黄芩大黄各三兩右六味切以水九升煮取三升分三服若身體羸去大黄加梔子仁五六兩生地黄切一升古今録驗千金同出第十卷中千金翼論曰凡遇天行熱病多必内瘀著黄但用𤓰丁散内鼻中令黄汁出乃愈即於後不復恐病黄矣常須用心警候病人四肢身面微似有黄氣則須用𤓰丁散不得令散漫失候必大危矣特忌酒麪犯者死又凡人無故忽然振寒便發黄皮膚黄麴塵出小便赤少大便時閉氣力無異食飲不妨己服諸湯餘熱不除久黄者苦參散方苦參一兩黄連一兩葶藶子熬𤓰蔕黄芩黄蘗大黄各一兩右七味擣為散飲服方寸匕當大吐者日一服不吐日二亦得下服藥五日知可消息不知更服忌猪肉冷水古今録驗千金小品同出第十八卷中崔氏療黄疸身體面目盡黄茵陳湯太醫校尉史脫方茵陳蒿三兩黄連二兩黄芩三兩梔子十四枚大黄一兩甘草一兩炙人參一兩右七味切以水一斗煮取三升分三服千金同出第一卷中延年秘録梔子湯療遍身黄如橘心肋滿急方梔子仁四兩黄芩三兩柴胡四兩升麻三兩龍膽草三兩大黄三兩括蔞三兩芒硝二兩右八味切以水九升煮取二升八合去滓分温三服相去四五里進一服出第十卷中必効黄疸身眼皆如金色但諸黄皆主之方取東引桃根細切如筯若釵股以下者一握取時勿令見風及婦人并雞犬等見之以水一大升煎取搦一小升適寒温空腹頓服服後三五日其黄離離如薄雲散唯眼最後差百日方平復身黄散後可時時飲一盞清酒則眼中易散不則散遲忌食麪猪魚等肉此方是徐之才家秘方其侄珍惠說宻用出第一卷中近効療發黄身面眼悉黄如金色小便濃如煮黄蘗汁者衆醫不能療良驗茵陳湯方茵陳四兩黄芩二兩梔子三兩升麻三兩大黄三兩龍膽草二兩枳實二兩炙柴胡四兩右八味切以水八升煮取二升七合分温三服若身絶羸加生地黄一升梔子加至七兩去大黄如氣力不羸依前著大黄取驗忌如法不差更作以差為限不過三四劑差隔三五日一劑經心録同李暠處得此方神良癊黄方三首病源陽氣伏隂氣盛熱毒加之故但身面色黄頭痛而不發熱名為癊黄也出第十二卷中廣濟療癊黄身面眼俱黄小便如豉汁色茵陳散方茵陳四兩白鮮皮三分括蔞四分黄芩三分梔子四分芍藥三分青木香三分柴胡三分枳實三分炙黄連三分紫雪八分土𤓰根三分大青三分大黄十分右十四味擣篩為散煮茅根飲待冷平旦空腹以茅根飲服五錢匕一服少間當一兩行微利利後煮稀葱䜴粥食之利多以意漸減常取微洩利通一兩行為度差止忌猪肉冷水魚蒜粘膩及諸熱食出第一卷中必効療癊黄眼睛黄汗染衣涕唾黄方好黄蒸二大升右一味每夜以水二大升浸煆煖令熱勿令沸銅噐中平旦絞取汁半升飲之餘汁須􅁷則飲冬日微煖服夏冷飲每夜則浸依前服之亦得每夜小便中浸白帛片取色退為驗兩方並極効忌麪羊肉猪魚又療癊黄汗染衣涕唾黄者方取蔓菁子擣細末平旦以井花水和一大匙服之日再漸加至兩匙以知為度每夜小便裏浸少許帛各書記日色漸退白則差不過服五升以來必差李潤州傳極効備急肘後張文仲深師同出第一卷中黄疸小便不利及腹滿喘方二首仲景傷寒論黄家腹滿小便不利而赤身汗出者表和裏實也宜下之大黄黄蘗皮梔子消石湯方大黄四分黄蘗四兩梔子十五枚消石四兩右四味切以水六升煮三物得二升半去滓内消石更煎取一升先食頓服盡小品千金翼深師范汪並同又黄疸小便色不變欲自利腹滿而喘者不可除其熱熱除必噦噦者小半夏湯主之方半夏五兩炮生薑八兩右二味以水六升煮取一升半去滓分温三服忌羊肉􅄳范汪同並出第十四卷中黄汗方三首病源黄汗之為病身體洪腫發熱汗出而渴狀如風水汗染衣色正黄如蘗汁其脉自沉此由脾胃有熱汗出而入水中若浴水入汗孔得之出第十二卷中仲景傷寒論師曰黄汗為病身體腫發熱汗出而渴狀如風水汗沾衣色正黄如蘗汁脉自沉也問曰従何得之師曰以汗出水入汗孔水従外入而得之宜黄耆芍藥桂心酒湯主之方黄耆五兩芍藥三兩桂心三兩右三味切以苦酒一升水七升和煮取三升去滓温服一升正當心煩也至六七日稍稍自除其心煩不止者以苦酒阻故也阻一作沮一方用美清醯代酒忌生葱備急張文仲千金古今録驗深師范汪經心録同又凡黄汗之病兩脛自冷假令發熱此屬歴節食己則汗出又身常夜卧盗汗出者此勞氣也若汗出即發熱者久久身必甲錯也發熱不止者必生惡瘡也若身重汗出已輙輕者久久必身瞤瞤則胸中痛又従腰以上必汗出下無汗腰髖弛痛如蟲在皮中狀劇者不能食身疼重煩躁小便不利者名曰黄汗桂枝湯加黄耆五兩主之方桂心三兩芍藥三兩甘草三兩炙生薑三兩大棗十二枚黄芪五兩右六味切以水八升微火煎取三升去滓温服一升覆取微汗須臾間不汗者食稀熱粥一升餘以助湯力若不汗者更服湯也忌海藻菘菜生葱古今録驗范汪同出第十四卷中療黄疸身腫發熱汗出而渴狀如風水汗出著衣皆黄黄汗呉藍湯方呉藍六分芍藥麥門冬去心桑白皮漢防己白鮮皮山梔子各六分右七味各細切以水二升煎取八合去滓空腹分二服未効再合服此方未詳所出女勞疸方四首病源女勞疸之狀身目皆黄發熱惡寒少腹滿急小便難因大勞大熱而房室房室畢入水所致也出第十二卷中仲景傷寒論黄家日晡發熱而反惡寒此為女勞得之膀胱急小腹滿身體盡黄額上反黒足下熱因作黒癉大便必黒腹臚脹滿如水狀大便黒溏者此女勞之病非水也腹滿者難療消石礬石散主之方消石熬黄礬石燒令汁盡右二味等分擣絹篩以大麥粥汁和服方寸匕日三重衣覆取汗病隨大小便去小便正黄大便正黒也大麥則須是無皮麥者千金方云消石二分熬令燥礬石一分熬令燥故注之肘後小品崔氏文仲千金范汪深師並同出第十四卷中千金翼療黄疸之為病日晡所發熱惡寒小腹急體黄額黒大便黒溏泄足下熱此為女勞也腹滿者難療方滑石五兩研石膏五兩研右二味為散以大麥粥汁服方寸匕日三小便極利則差小品千金備急文仲並同出第十八卷中近効女勞疸黄家日晡發熱而反惡寒此為女勞得之膀胱急小腹滿身體盡黄額上反黒足下熱因作黒疸其大便必黒腹臚脹滿如水狀大便黒溏此女勞之病非水也療與黒疸同榖疸食則眩心忪怫鬰不安久久發黄為榖疸並以前茵陳湯主之方在遍身黄部中必効女勞之黄氣短聲沉者宜服此方取婦女月經布和血衣燒作灰以酒空腹服方寸匕日再服不過三日必差黒疸方三首病源黒疸之狀苦小腹滿身體盡黄額上反黒足下熱大便黒是也夫黄疸酒疸女勞疸久久變成黒疸出第十二卷中肘後療黄疸變成黒疸者多死急治之方取土𤓰根汁服一小升平旦服至食時病従小便去則愈不忌先須量病人氣力不得多服力衰則起不得千金并翼文仲集驗崔氏删繁范汪並同出第一卷中深師療黒疸身體及大便正黒赤小豆茯苓湯方赤小豆三十枚茯苓六銖𤓰蔕四銖雄黄二銖甘草半兩炙女萎四銖右六味切以水三升煮小豆茯苓取八合汁擣後四藥為散取前汁調半錢匕適寒温服之須臾當吐吐則愈一方云療久黄疸忌大醋海藻菘菜千金方名赤苓散千金翼同出第二十卷中千金翼茵陳丸主黒疸身體闇黒小便澀體重方茯苓四分茵陳一兩枳實五分炒黄白术五分土炒半夏三兩洗甘遂一分杏仁三分去尖皮蜀椒二升汗當歸二分葶藶子四分熬大黄三分熬勿令焦乾薑四分右十二味擣篩蜜和丸如梧子空肚飲服三丸日三服忌羊肉􅄳酢桃李雀肉等出第十八卷中酒疸方七首病源夫虗勞之人若飲酒多進榖少者則胃内生熱因大醉當風入水則身目發黄心中懊痛足脛滿小便黄面發赤斑若下之久久變為黒疸目青面黒心中如噉蒜虀狀大便正黒皮膚􅎲之不仁其脉浮弱故知之酒疸心中熱欲嘔者當吐之即愈小便不利其候當心中熱足下熱是其證眀也若腹滿欲吐鼻燥其脉浮者先吐之沉弦者先下之出第十二卷中仲景傷寒論酒癉者心中懊憹或熱痛梔子枳實豉大黄湯主之方梔子七枚枳實五枚香豉一升大黄一兩右四味切以水六升煮取二升去滓温服七合日三服肘後千金同出第十四卷中肘後療酒疸者心中懊痛足脛滿小便黄飲酒面發赤斑黄黒由大醉當風入水所致黄耆散方黄茋二兩木蘭皮一兩右二味為散酒服方寸匕日三備急文仲同深師酒疸艾湯方生艾葉一把麻黄二兩去節大黄六分大豆一升右四味切清酒五升煮取二升分為三服出第三十卷中千金茵陳湯主黄疸酒疸酒癖身體面目盡黄方太醫校尉史脫處茵陳三兩大黄二兩一方用一兩梔子二七枚黄芩三兩一方用一兩人參半兩一方用一兩黄連二兩一方用一兩甘草一兩炙右七味切以水一斗煮取三升分為三服忌猪肉冷水海藻菘菜文仲范汪同又夫人病疸者或無熱静言了了腹滿欲吐酒疸心中熱欲嘔吐之即愈方取千金翼苦參散吐良在上通身黄部中七味者是也又肉疸飲少小便多白如泔色得之從酒寒水石散方寒水石五分白石脂五分括蔞五分莵絲子三分酒漬知母三分桂心三分右六味擣篩麥粥服五分匕日三服五日知忌生葱古今録驗深師等並同古今録驗療酒癖及飲黄疸散方芫花椒目各等分右二味擣下篩為散平旦服一錢匕老少半服之藥攻兩脅則下便愈間一日復服使小減如前又與之使盡根源深師同出第二十七卷中榖疸方三首病源榖疸之狀食畢頭眩心忪怫鬱不安而發黄由失饑大食胃氣衝熏所致陽明病脉遲食難用飽飽則發煩頭眩者必小便難此欲為榖疸雖下之其腹必滿以其脉遲故也出第十二卷中范汪療榖疸茵陳湯方茵陳四兩切以水一斗煮取六升以汁煎大黄二兩梔子七枚得二升分為三服黄従小便去病出立愈肘後同出第十四卷中集驗療勞疸榖疸丸方苦參三兩龍膽草一兩右二味下篩牛膽汁和丸先食以麥粥飲服如梧子大五丸日三不知稍増千金同出第二卷中刪繁療勞疸榖疸苦參丸方勞疸者因勞為名也榖疸者因食而勞故曰榖疸苦參三兩龍膽草二兩梔子仁三七枚右三味擣篩為散若病甚取猪膽和為丸如梧子大一服五丸日三四服以飲汁下之許仁則療諸黄方七首許仁則療急黄病此病始得與前天行病不多異五六日但加身體黄甚者洟音夷鼻液也下同淚汗唾小便如蘗色眼白睛正黄其更重狀與天行病候最重者無别如至此困自須依前救天行最重半夏等分十味湯救之若未至是者宜依後法急黄狀始得大類天行病經三兩日宜合麻黄等五味湯服之發汗以洩黄勢方麻黄三兩去節乾葛五兩石膏八兩生薑六兩茵陳二兩右藥切以水八升煮取二升七合去滓分温三服服相去十里久服訖當欲汗則覆被微取汗以散之又依前麻黄等五味湯服之取汗汗出後未歇經三五日又合梔子等五味湯以取利方梔子二十枚柴胡三兩黄芩三兩茵陳三兩芒硝六兩右藥切以水八升煮四味取二升六合去滓内芒硝攪令消分温三服如人行十里久更服之効又依前梔子等五味湯服之取利利後病勢不歇經六七日又合秦艽牛乳二味湯服之方秦艽六兩牛乳二升右藥切秦艽以牛乳煮之可三分減一去滓帶煖頓服令盡極驗文仲必効同西域法也又依前秦艽等二味湯藥服後不覺病退漸加困篤勢如前天行最重狀則不可更服諸冷物冷物在心唯是痞速宜同前天行用半夏等十味湯以救之亦可合𤓰蔕等三味散吹鼻孔中并與之服方𤓰蔕七枚丁香七枚赤小豆七枚右藥擣篩末取如大豆分吹兩鼻孔中須􅁷當出黄水正如煮蘗汁及出黄蟲亦可以新汲水和一方寸匕與患人服或利或吐吐利所出亦如煮黄蘗汁天行用此療亦與崔氏同又論云此病俗間亦有單煮𤓰蔕汁灌鼻孔中者亦有單服生麻油者又療黄疸病此病與前急黄不同自外狀與平常無别但舉體正黄甚者眼色如蘗涕涎洟小便及汗悉如蘗汁食消多於尋常稍覺瘦悴乏力此病不甚殺人亦有經年累歳不療而差者此由飲酒多亦是積虗熱所致黄疸初得稍覺心中煩熱滿身黄色眼白睛黄覺如此者宜合白鮮皮等七味湯以洩之黄連十味丸以壓之白鮮皮三兩乾葛五兩黄芩三兩鬱金三兩豉五兩梔子十枚芒硝六兩右藥切以水八升煮取二升半去滓内芒硝分温三服服相去如人行二十里久更服此湯當得利利後將息一二日則合後黄連等十味丸服之又黄連丸方黄連五兩黄芩五兩苦參六兩沙參五兩乾地黄六兩乾葛六兩梔子仁三兩麥門冬一升去心地骨白皮五兩茯苓五兩右十味擣篩為末蜜和為丸以米飲下初服十丸日三服稍稍加至三十丸如梧子大黄疸亦有單服猪脂得差者忌猪肉冷水大酢蕪荑等物呉昇同雜黄疸方三首千金濕疸之為病始得之一身盡疼發熱面色黄黒七八日後壯熱熱在裏有血當下去之如㹠肝狀其小腹滿者急下之亦一身盡黄目黄腹滿小便不利礬石散方礬石五兩滑石五兩右二味為散大麥粥汁服方寸匕日三服當先食服便利如血者當汗出差深師古今録驗並同出第十卷中古今録驗九疸秦王散方胃癉食多喜飲梔子仁主之心癉煩心心中熱葛根主之腎癉其人唇乾葶藶子主之脾癉溺赤出少心惕惕若恐括蔞主之肺癉飲少小便多秦椒汗𤓰蔕主之一云膏疸舌癉渴而數便石鍾乳主之肉癉其人小便白凝水石主之髓癉目眶深多嗜卧牡蠣澤瀉主之肝癉胃熱飲多水激肝白术主之右十一味名秦王散各等分隨病所在加二分擣合下篩飲服五分匕日三稍加至方寸匕忌桃李雀肉等膏癉飲少小便多秦椒散方秦椒一分汗𤓰蔕二分右二味擣下篩水服方寸匕日三服深師千金同出第二十七卷中外臺秘要方卷四
