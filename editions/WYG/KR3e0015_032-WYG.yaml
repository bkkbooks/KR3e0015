body:
  text: 外臺秘要方卷二十八唐王燾撰中惡方一十三首病源中惡者是人精神衰弱為鬼邪之氣卒中之也夫人隂陽順理榮衛調平神守則强邪不干正若將攝失宜精神衰弱便中鬼毒之氣其狀卒然心腹刺痛悶亂欲死凡卒中惡腹大而滿者診其脉𦂳大而浮者死𦂳細而微者生又中惡吐血數升脉沉數細者死浮焱如疾者生中惡有差後餘勢停滯發作則變成注又中惡死候中鬼邪之氣卒然心腹絞痛悶絶此是客邪暴盛隂陽為之離絶上下不通故氣暴厥絶如死良久其真氣復則生也而有乘年之衰逢月之空失時之和謂之三虚三虚而腑臟衰弱精神微羸中之則真氣竭絶則死也其得差者若餘勢停滯發作則變成注並出第二十三卷中廣濟療卒中惡心腹刺痛去惡氣方麝香一分研青木香二分生犀角二分屑右三味為散空心熟水服方寸七日二立効未止更作忌如常法出第四卷中肘後華佗療中惡短氣欲絶方灸兩足大拇指上甲後聚毛中各灸二七壯即愈又法三七壯集驗張文仲備急同又方杏仁七十枚去尖皮桂心二兩甘草一兩炙麻黄三兩去節一方四兩右四味切以水八升煮取三升分三服含嚥之通療諸昏客忤良忌如常法又方韭根一把烏梅十四顆茱茰半升右三味切以勞水一升煮之以病人櫛内中三沸櫛浮者生沉者死煮取三升飲之大効又方桂心一兩生薑三兩梔子十四枚豉五合右四味擣碎以酒二升微煮之去滓頓服之取吐爲度並出第一卷中集驗療中惡遁尸心腹及身體有痛處甚者短氣不語手摸按之得其痛處則病色動惡人近則是痛處方取艾葉挼碎著痛上厚寸餘鐺中煮湯和灰作泥令熱薄艾上冷輙易之不過再著則愈出七卷中又療中惡心痛胷脅㽲痛喘急湯方桃東行枝白皮一握真珠一兩梔子仁十四枚生薑二兩當歸桂心各三兩附子一兩炮香豉五合吳茱茰五合右九味切以水八升煮取二升去滓内真珠分二服忌如常法小品同又方仰卧以物塞兩耳以兩個竹筒内死人鼻中使兩人痛吹之塞口傍無令氣得出半日所死人即噫噫勿復吹也千金同又方擣皂莢細辛屑吹兩鼻孔中單用皂莢末亦佳千金同並出第四卷中删繁療中惡痛欲絶方釡底墨五合塩一撮右二味和研以水一升攪調一服范汪同又方牛屎絞取汁五合爲一服口不開扣齒内藥若無新者亁者即以水和取汁並出第十卷中崔氏療卒中惡氣絶方取真珠研末書鬼字于舌上額上亦書鬼字驗又方灸右肩髙骨上隨年壯並出第四卷中卒死方二十四首病源卒死者由三虚而遇賊風所為也三虚謂乘年之衰一也乘月之空二也失時之和三也人有此三虚而爲賊風所傷使隂氣偏竭於内則陽氣阻隔於外二氣擁閉故暴絶如死也若腑藏氣未絶者良久乃蘇然亦有挾鬼神之氣而卒死者皆有頃邪退乃活也凡中惡及卒忤卒然氣絶其後得蘇若其邪氣不盡者停滯心腹或心腹痛或身體沉重不能飲食而成宿疹者皆變成疰又卒忤死候犯卒忤客邪鬼氣卒急傷人入於腑藏使隂陽離絶氣血暴不通流􅍕然厥絶如死狀也良久隂陽之氣和乃蘇若腑藏虚弱者死亦有雖蘇而毒氣不盡時發即心腹刺痛連滯變成疰也並出第二十三卷中甲乙經云黄帝問於岐伯有卒死者何邪使然答曰得三虚者暴疾而死得三實者邪不能傷也黄帝曰願聞三虚答曰乘年之衰逢月之空失時之和因為賊風所傷也願聞三實答曰逢年之盛遇月之滿得時之和雖有賊風邪氣不能傷也有卒死不知人有復生何氣使然隂氣先竭陽氣未入故卒死而不知人氣復則生集騐同出第六卷中肘後云卒死中惡及尸厥者皆天地及人身自然隂陽之氣有乖離否隔上下不通偏竭所致故雖涉死境猶可療而生縁氣未都竭也當爾之時兼有鬼神於其間故亦可以符術䕶濟者又卒死或先有病痛或居常倒仆奄忽而絶皆是中惡之類療方取葱刺鼻令入數寸須使目中血出乃佳一云耳中血出佳此扁鵲法同後云吹耳中葛氏吹鼻别爲一法肘後集騐備急文仲必効等同崔氏亦療中惡又方令二人以衣壅口吹其兩耳亦可以葦筒吹之肘後同又方以葱刺耳耳中鼻中血出者勿怪無血難療之有血者是活候也其欲蘇時當捧兩手莫放之須㬰死人目當舉手撈人言痛乃止男刺左鼻女刺右鼻孔令入七寸餘無苦立効亦療自縊死此扁鵲法肘後集驗備急同又方視其上脣裏弦有青息肉如黍米大以針决去之差肘後同又方以小便灌其面數過即能活扁鵲法也肘後集驗張文仲備急同又方以綿漬好酒内鼻中手按令汁入鼻中並持其手足莫令驚動也肘後同又方灸其脣下宛宛中名承漿十壯大良肘後同並出第一卷中文仲療卒死方濕牛馬糞絞取汁以灌其口中令入喉若口已噤者以物強發若不可強發者扣折齒下之若無新者以水若人尿和亁者絞取汁扁鵲法集驗備急肘後同又方以細繩圍其人肘腕中男左女右伸繩從背上大椎度以下行脊上灸繩頭一云五十壯又從此灸横行各半繩此凡三灸各灸三壯即起又方令人痛𤓰其人人中取醒不起者捲其手灸下文頭隨年壯又方灸鼻下人中三壯又方灸臍中百壯又方半夏末如大豆許吹鼻中又方擣薤若韭取汁以灌口鼻中張文仲集驗范汪同又方猪膏如雞子大苦酒一升煮沸灌喉中集驗肘後備急同又卒死而壯熱者方礬石半斤煮以漬脚令没踝肘後范汪同並出第一卷中備急療卒死而目閉者方騎牛臨其面擣薤汁灌耳中末皂莢吹鼻中集驗文仲肘後范汪同又療卒死而張目反折者方灸手足兩爪甲後各十四壯飲以五毒諸膏散有巴豆者良肘後張文仲同又療卒死而四肢不收失便者方馬屎一升水三斗煮取二斗以洗足又取牛糞一升温酒和灌口中肘後同又方灸心下一寸臍上三寸臍下四寸各百壯良肘後同又卒死而口噤不開者方縳兩手大拇指灸兩白肉中二十壯肘後文仲范汪同並出第一卷中集驗療卒死無脉無他形候隂陽俱竭故也方牽牛臨鼻上二百息又灸熨斗以熨兩脅下鍼兩間使各百餘息灸人中又療卒死而有脉形候隂氣先盡陽氣後竭故也方嚼薤哺灌之肘後文仲千金范汪同並出第一卷中古今録驗司空三物備急散療卒死及感忤口噤不開者方巴頭去心皮熬亁薑大黄各等分右藥擣篩為散服如大豆許二枚以水三合和之腹脹煩熱復飲水能多益佳又療心腹痛㡬死服此丸令小利差如腹常滿痛當令得下差一方服一刀圭以酒下之不能刀圭者便丸如大豆許四枚不知復加一豆許不差又加一豆許若病者口噤不能自飲掘口含之藥不預合預合氣力歇卒病者便合之無臼木柸中擣耳不過三服取利無不差者蜜丸尤良出第四卷中客忤方一十三首病源卒忤者亦名客忤謂邪客之氣卒犯忤人精神也此是鬼厲之毒氣中惡之類也人有魂魄衰弱者則為鬼氣所犯忤喜於道間門外得之其狀心腹絞痛脹滿氣衝心胷或即悶絶不復識人肉色變異腑臟虚竭者不療即至於死然其毒氣有輕重輕者微療而差重者侵尅腑臟雖當時救療餘氣停滯久後猶發乃變成疰出第二十三卷中肘後論曰客者客氣也忤者犯也謂客氣忽犯人也此惡鬼毒厲之氣療之多愈亦有侵尅藏腑經絡雖差後猶宜治療以消餘勢不爾終為人患有時輙發又客忤死者中惡之類也喜於道間門外得之令人心腹絞痛脹滿氣衝心胷不即療亦殺人方灸鼻下人中三十壯愈備急文仲同又方以水漬粳米取汁二升以飲之口已噤者以物強發之又方以銅器瓦器盛熱湯器著腹上冷者徹去衣器襯肉大冷者易以熱湯取愈也又方先以衣三重藉腹上以銅器著衣上取茅草於器中燒之草盡再益勿頓多也取愈乃止備急文仲同又方以繩横其人口以度度臍四面各一處灸三壯令火俱起也又方横度口中折之令上頭著心下灸下頭五壯也並出第一卷中又療客忤心腹絞痛脹滿氣衝心胷煩躁壯熱或氣悶絞刺鬼魅之氣未散方麝香一錢茯神人參天門冬去心鬼臼菖蒲等分右六味蜜丸如桐子服十丸日三文仲扁鵲療客忤有救卒死符並服塩湯法恐非庸世所能用故不載而此病即今人所謂中惡者與卒死鬼擊亦相類焉療皆叅取而用之已死者方擣生菖蒲根絞取汁含之即愈備急肘後同又療卒忤停尸不能言者方燒桔梗二枚末飲服之又方細辛桂心各等分右二味内口中肘後備急同又卒忤口噤不開者方生附子末置管中吹内舌下備急肘後同並出第一卷中千金療客忤惡氣方吞麝香如大豆立驗出第五卷中千金翼客忤方灸間使七壯又肩井百壯又十指甲下各三壯出第二十七卷中卒魘方二十一首病源卒魘者屈也謂夢裏為鬼邪之所魘屈也人卧不寤皆是魂魄外遊為他邪所執録欲還未得致成魘也忌火照火照則魂魄遂不復入乃至於死而人有於燈光前魘者本由明出所以不忌火也其湯熨針石别有正方補養宣導今附於後養生方導引法云拘魂門制魄户名曰握固法屈大拇指著四小指内抱之積習不止眠時亦不復開令人不魘魅又云人魘忽然明喚之魘死宜闇喚之好唯得逺喚亦不得近而急喚亦喜失魂魄也又魘不寤候人眠睡則魂魄外遊為鬼邪所魘屈其精神弱者魘則久不得寤乃至氣暴絶所以須傍人助喚並以方術療之即蘇也並出第二十三卷中肘後療卒魘寐不寤方卧忽不寤勿以火照之殺人但痛齧其脚踵及足拇指甲際而多唾其面則覺也又方皂莢末以竹筒吹兩鼻孔中即起三兩日猶可吹之也又方以筆毛刺兩鼻孔男左女右展轉進之取起也集騐同又方擣薤取汁吹兩鼻孔冬日取韭絞汁灌口集驗仲景文仲備急同又方以蘆管吹兩耳並取其人髮二七莖作繩内鼻孔中割雄雞冠取血以管吹喉咽中大良並出第一卷中集驗療卒魘方以塩湯飲之多少在意並嚙其足大指爪際痛嚙之即起也肘後文仲備急同又方以其人置地取利刀畫從肩起男左女右畫地令周遍訖以刀鋒刺病人鼻下人中令入一分急持勿動其人當鬼語求去乃具問阿誰以何故来自當乞去乃以指㓕向所畫地當肩頭數寸令得去又方雄黄細篩管吹兩鼻孔中佳並出第一卷中崔氏主卒魘方以甑帶左索縳其肘後男左女右用餘猶急絞之又縳牀脚乃詰問其故肘後古今録驗同崔氏云療卒狂鬼語方以甑帶急令縳兩手大指便灸左右脅下屈肘頭尖各七壯須臾鬼語自道姓名乞去徐詰問乃觧其手文仲療卒魘方令一人坐頭邊守一人於户外呼病人姓名坐人應曰在便甦活也肘後同又人喜魘及惡夢者方以下並辟魘方取燒死人灰著履中令枕之又方帶雄黄男左女右也又方枕麝香一分於頭邊佳又灌香少許又方以虎頭為枕佳又方取雄黄如棗核繋左腋下令人終身不魘也集驗范汪同又方作犀角枕佳又方青木香内枕中并帶之亦佳並出第一卷中千金小定心湯療虚羸心氣驚弱多魘方茯神四分一本作茯苓甘草芍藥亁薑大棗十五枚擘逺志去心人參桂心各二兩右八味切以水八升煮取三升分三服日三忌如常法又大定心湯療心氣虚悸恍惚多忘或夢寤驚魘志少不足方人參茯苓茯神逺志去心赤石脂龍骨亁薑當歸甘草灸白术芍藥大棗桂心防風紫菀各二兩右十五味切以水一斗二升煮取三升半分為五服日三夜二忌如常法千金翼療卒魘不覺方灸兩足大指聚毛中二十一壯范汪同出第二十七卷中備急療卒魘不寤方末灶下黄土或雄黄桂心末亦得右以蘆管吹入兩鼻孔中文仲同出第一卷中鬼擊一十首病源鬼擊者謂鬼厲之氣擊著於人也得之無漸卒著如人以刀矛刺狀胷脅腹内絞急切痛不可抑按或即吐血或鼻中出血或下血一名為鬼排言鬼排觸於人也氣血虚弱精魂衰微忽與鬼神遇相觸突致之為其所排撃輕者因而獲免重者多死也出第二十三卷中肘後鬼撃之病得之無漸卒著如人以刀矛刺狀胷脅腹内絞急切痛不可抑按或即吐血或鼻中出血或下血一名鬼排治之方灸臍上一寸七壯及兩踵白肉際差千金翼同又方熟艾如鴨子大三枚以水五升煮取二升頓服之並出第一卷中文仲療鬼撃方鹽一升以水二升和攪飲之并以冷水潠之須臾吐即差備急肘後同又方粉一撮於水中攪飲之備急肘後同又方以淳苦酒吹令入兩鼻孔中肘後同並出第一卷中備急療鬼擊方燒䑕至末如黍米許水和服不能飲以水和少許内喉中肘後文仲同又方升麻獨活桂心各等分右三味為末酒服方寸匕立愈肘後同又有諸丸散並在備急條中今巫覡實見人忽被神鬼所擊刺擺􅀈者或犯其行伍或遇相觸突或身神散弱或愆負所招輕者獲免重者多死猶如周宣燕簡輩事不為虚也必應死者亦不可療要自不得不救之耳肘後同並出第一卷中刪繁倉公散方特生礬石燒半日研皂莢灸去皮子雄黄研藜蘆熬右四味等分搗為末主療卒鬼繫鬼排鬼刺心腹痛下血便死不知人及卧魘嚙脚踵不覺者諸惡毒氣病取前散如大豆許以管吹入鼻中得􅅉則氣通便活若未􅅉復更吹之得􅅉為度此藥能起死人漢文帝太倉令淳于意以此方療如前病勝餘方若别疾不若玉壺丸等法崔氏備急范汪等同出第六卷中千金翼療鬼擊方灸臍下一寸三壯出第二十七卷中尸厥方一十二首病源尸厥者隂氣逆也此由陽脉卒下墜隂脉卒上升隂陽離居榮衛不通真氣厥亂客邪乘之其狀如死猶㣲有息而不常脉尚動而形無知也聴其耳内循循有如嘯之聲而股間暖者是也耳内雖無嘯聲而脉動者故當以尸厥療之診其寸口脉沉大而滑沉則為實滑則為氣實氣相搏身温而汗此為入腑雖卒厥不知人氣復則自愈若脣正青身冷此為入藏亦卒厥不知人即死候其左手關上脉隂陽俱虚足厥隂足少陽俱虚也病若恍惚不知人妄有所見張仲景云尸厥脉動而無氣氣閉不通故靜而死也治方菖蒲屑納鼻兩孔中吹之令人以桂屑著舌下又方取左角髮方寸匕燒末酒和灌令入喉立起肘後方白馬尾二七莖白馬前脚甲二枚燒之以苦酒丸如小豆大開口吞二丸須臾服一丸又方灸鼻人中七壯又灸隂􅇸下去下部一寸百壯若婦人灸兩乳中又云爪刺人中良久又針人中至齒立起此扁鵲法又方以繩圍其臂脘男左女右繩從大椎上度下行脊上灸繩頭盡處五十壯活此是扁鵲法又方熨其兩脇下取炷中墨如彈丸大漿和飲之更以管吹耳中令三四人更互吹之又方以小管吹鼻孔梁上塵如豆大著中吹之令入又方針百㑹當鼻中入髮際五寸許針入三分補之針足大指甲下肉側去甲三分又針足中指甲上各三分大指之肉去端韭葉許又針手少隂銳骨之端各一分又方灸膻中季肋間二七壯也肘後惟云灸膻中集騐同並出第一卷中千金論曰風寒之氣客於藏間滯而不能發故瘖不能言及喉痺失聲皆風邪所為也入藏皆能殺人凡尸厥如死脉動如故此陽脉下墜隂脉上争氣閉故也療方灸百㑹百壯鍼入三分補之又方鍼足中指頭去甲如韭葉並刺足大指甲下内側去甲三分崔氏論曰凡尸厥為病脉動而形無所知陽脉下墜隂脉上争榮衛不通其狀如死而猶微有息其息不常人乃不知欲殯殮者療之方急可以蘆管吹其兩耳極盡以氣吹之立起若人氣極可易人吹之出第四卷中中蠱毒方二十一首病源凡蠱毒有數種皆是變惑之氣人有故造作之多取蠱蛇之類以器皿盛貯任其自相噉食唯有一物獨在者即謂之為蠱便能變惑隨逐酒食為人患禍患禍於他則蠱主吉利所以不覉之徒而畜事之又有飛蠱去来無由漸狀如鬼氣者得之卒重凡中蠱病多趨於死以其毒害勢甚故云蠱毒著蠱毒面青黄者是蛇蠱其脉洪壯病發之時腹内熱悶胷脅支滿舌本脹强不喜言語身體常痛又心腹如似蟲行顔色赤脣口亁燥經年不治肝膈爛而死其面色赤黄者是蝪􅔼蠱其脉浮滑而短病發之時腰背微滿手脚脣口悉皆習習而喉脉急舌上生瘡二百日不治噉人心肝盡爛下膿血羸瘦顔色枯黒而死其面色青白又云其脉沉濡病發之時咽喉塞不欲聞人語腹内鳴喚或上或下天隂雨轉劇皮内如蟲行手脚煩熱嗜醋食欬唾膿血顔色乍白乍青腹内脹滿狀若蝦蟇若成蟲吐出成科斗形是蝦蟇蠱經年不治噉人脾胃盡脣口裂而死其脉緩而散者病發之時身體乍冷乍熱手脚煩疼無時節吐逆小便赤黄腹内悶胷痛顔色多青毒或吐出似蜣蜋有足翅是蜣蜋蠱經年不治噉人血脉枯盡而死欲知是蠱與非當令病人唾水内沉者是蠱浮者非蠱又云旦起取井花水未食前當令病人唾水内唾如柱脚直下沉者是蠱毒沉散不至下者草毒又云含大豆若是蠱豆脹皮脱若非蠱豆不爛脱又云以鵠皮置病人卧下勿令病人知若病劇者是蠱也又云取新生雞子煮熟去皮惡黄白令完全日晚口含以齒微嚙勿令破作兩炊時夜吐瓦上著霜露内旦看大青是蠱毒也昔有人食新變鱧魚中毒病心腹痛心下鞕發熱煩寃欲得水洗沃身體搖動如魚得水狀有人診云是蠱其家云從無此毒不作蠱治遂死其湯熨鍼石别有正方補養宣導今附於後養生方導引法云兩手著頭相乂坐地緩舒兩脚以兩手從外抱膝中痛低頭入膝間兩手交乂頭十二通愈蠱毒及三尸毒腰中大氣又云常度日月星辰清净以雞鳴安身卧潄口三咽之調五藏殺蠱蟲令人長生治心腹病又云治百病邪蠱當正卧閉目閉氣内視丹田以鼻徐徐内氣令腹極滿徐徐以口吐之勿令有聲令入多出少以微為故存視五藏各如其形色又存胃中令鮮明㓗白如素為之倦極汗出乃止以粉粉身摩捋形體汗不出而倦者亦可止明日復為之又當存作大雷電光走入腹中為之不止病自除出第二十五卷中千金論曰蠱毒千品種種不同或吐下鮮血或好卧闇室不欲見光明或心性反常乍嗔乍喜或四肢沉重百節酸疼如此種種狀貌説不可盡亦有得之三年乃死急者一月或百日即死其死時皆於九孔中或於脅下肉中出去所以出門常須帶雄黄麝香神丹諸大辟惡藥則百蟲猫鬼狐狸老物精魅永不敢著人養生之家大須慮此以下亦有灸法初中蠱於心下作艾炷灸一百壯並主猫鬼亦灸得差又論曰世有拙醫見患蠱脹者徧腹腫滿四肢如故小便不甚澁以水病療之近服水藥經五十餘日望漸痊愈日復増加􅍕致殂殞如此者不一學者當細尋方意消息用之萬不失一醫方千卷不盡其理所以不可一一備述云爾出第二十五卷中廣濟療蠱毒方服此升麻散三四日後即服前光砂丸方升麻桔梗栝樓各五兩右三味擣為散以熟湯洗所患人隂中再以濃汁服方寸匕日二服漸加至二匕内消忌粘食猪肉出第四卷中肘後療中蠱毒諸方人有養畜蠱毒以病人凡診法中蠱狀令人心腹切痛如有物齧或吐下血不即療之食人五臟盡即死矣欲知是蠱與非當令病人唾水沉者是浮者非也小品文仲備急集騐千金並翼同又欲知蠱主姓名方取皷皮一片燒灰末以飲服病人須臾自當呼蠱主姓名可語令知便即去病愈矣亦有以蛇涎合作蠱毒著飲食中使人得瘕病此一種積年乃死療之各自有藥江南山間人不可不信之又方以蘘荷宻著病人卧席下亦能令呼蠱主姓名也文仲備急千金並翼同出第三卷中小品療蠱方皷皮廣五寸長一尺薔薇根五寸如足拇指大細切本方云莨菪根右二味以水一升清酒三升煮取一升頓服之當下蠱即愈千金古今録驗同千金治蠱吐下血又方土𤓰根大如拇指長三寸切以酒半升漬一宿一服當吐下古今録驗同又方皂莢三挺長一尺者炙去皮子美酒一升漬一宿去滓頓服古今録驗范汪同肘後云以酒五升分三服又方取薺苨根擣為末以飲服方寸七古今録驗同千金犀角丸療蠱毒百病腹暴痛飛尸惡氣腫方犀角末羚羊角末鬼臼桂心各量四錢七天雄炮莽草炙真珠研雄黄研各一兩麝香半兩研貝齒燒灰五枚赤足蜈蚣五節炙射罔如雞子黄三枚巴豆五十枚去皮心熬右十三味各擣合篩之以蜜和為丸如小豆大服一丸不知増一丸卒得腹中痛飛尸服如大豆二丸若惡氣腫以苦酒和以塗之甚良以絳􅇸盛藥繫男左女右臂辟惡可以備急療萬病也忌如常法崔氏古今録驗范汪同出第二十五卷中千金翼療蠱毒方槲木北隂白皮一大握長五寸以水三升煎取一升空腹服之即吐蠱出也並療蠱下血出第十五卷中崔氏療蠱方黄𤓰樓根亁者二兩擣以綿褁酒一升漬一日去滓温服之少時即吐利蠱即出後煮粥飲服一兩盞吐利即斷不斷即煮人參甘草灸生薑各一兩服之此根唯山南者好出第三卷中備急療蠱方取白鴿毛糞燒灰以飲和服之良又療蠱方人家雖藏此方而不知如此効驗擣生栝樓根取汁一升醬汁少許和温服之須臾吐蠱出試驗並出第十六卷中必効療蠱毒大神驗方大㦸桃白皮東引者以火烘之班猫去足翅熬等分右三味搗篩為散以冷水服半方寸匕一服其毒即出未出更一服蠱並出李饒州法云竒効若以酒中得則以酒服若食中得以飲服之崔氏千金同肘後云班毛一分桃皮大㦸各二分和棗核大米清飲服吐出蠱十日不差更一服千金崔氏云服八捻又方胡荽根擣取汁半升和酒服之立下又方取未鑚相思子二七枚擣碎為末煖水半盞和攪頓服之令盡即當欲吐抑之勿吐若耐不得即大張口吐之其毒即出出訖服稀粥勿食諸肉輕者但服七枚差無問年月深淺非常神効勿輕之又試蠱法取銀匙若筯或釵含之經宿色黒即是不黒者非出第三卷中古今録驗療蠱方巴豆十枚去心皮熬䜴半升熬釡底墨方寸匕右三味搗篩為散清旦以酒服如簮頭大小行蠱主當自至門勿應之去到家立自知其姓名又雄黄丸主蠱毒中藥欲死方雄黄研硃砂研藜蘆灸馬目毒公皂莢灸去皮子二分莽草二分灸巴豆去心皮熬各二分右七味擣篩以蜜丸如大豆許服三丸當轉下先利清水次出蛇等當煩悶者依常法可用鴨􅃵補之忌如常法又療中蠱毒方取牡丹根擣末服一錢七日三服至良忌胡荽范汪同又療中蠱胡洽方以猪膽導下部至良肘後集驗范汪同並出第四十五卷中蠱吐血方一十首病源蠱是合聚蟲蛇之類以器皿盛之任其相噉食餘一存者名為蠱能害人食人腑藏其狀心切痛如被物嚙或鞭面目青黄病變無常是先傷於膈上則吐血也不即治之食藏腑盡則死出第二十五卷中肘後療中蠱毒吐血或下血皆如爛肝方茜根蘘荷根各三兩右二味㕮咀以水四升煮取二升去滓頓服即愈又當自知蠱主姓名千金小品崔氏文仲備急古今録驗同又方巴豆一枚去心皮熬豉三粒釡底墨方寸匕右三味擣分作三丸飲下一丸須臾當下蠱毒不下更服一丸小品必効集驗文仲備急范汪同並出第三卷中范汪療中蠱吐血方麥麪二升熬以水服之令盡當下蠱又方苦瓠一枚以水二升煮取一升分服當吐蠱如蝦蟇科斗之類苦瓠毒可臨時量用之肘後千金小品文仲備急古今録驗同千金云苦瓠一分治下血又方生桔梗擣取汁服二三升日三服牛膝根亦得並出第十四卷中文仲療中蠱吐血方羚羊皮方三寸敗皷皮亦佳苦參蘘荷根三兩黄連二兩當歸二兩右五味切以水七升煎取二升分三服備急集騐同一方有苦瓠又方取桑木心剉一斛於釡中以水淹之令上有三寸煮取二斗澄取清又微火煎得五升宿勿食旦服五合則吐蠱毒崔氏集驗古今録驗同又方雄黄研釡月下黄土獺犴炙各如棗班猫十四枚去足翅熬右四味擣末以酪漿服之分為三四服則吐蝦蟇小品同古今録驗方有大黄如棗大或吐蝦蟇及蛇等物餘同范汪同崔氏療中蠱吐血方雄黄研丹砂研藜蘆炙各一兩右三味擣篩為散旦以井花水服一刀圭當吐蠱毒忌生血物狸肉肘後集驗同凡蠱有數種而人養作者最多也郡縣有名章者尤甚今東有句章章安故鄉南有豫章無村不有無縣不有而不能如此之甚耳非唯其飲食不可噉乃至目色之已入人類此輩小易療復有自然飛蠱狀如鬼氣者難療此諸種得真犀角麝香雄黄為良藥人可常帶此亦預防之易有蠱卦又子産所說並以器皿中蟲為蠱今省凡皿上安一蟲字或作蟲邊大非體也並出第四卷中小品療中蠱心痛吐血欲死方鹽一升淳苦酒一升煮令消和一服立吐蠱毒出已用良驗肘後文仲備急古今録驗同出第四卷中蠱下血方九首病源蠱是合聚蟲蛇之類以器皿盛之任其自相食噉餘畱一存者為蠱能變化為毒害人有事之以毒害多因飲食内行之人中之者心腹懊痛煩毒不可忍食人五臟下血瘀黒如爛雞肝出第二十五卷中小品療蠱毒腹痛注下赤血躑躅散方羊躑躅亁薑藜蘆熬附子炮巴豆去皮心熬野葛皮肉桂丹砂研雄黄研蜈蚣炙各一分右十味擣為散以水服一刀圭不知加一粟米忌猪肉蘆笋生血物生葱狸肉古今録驗同又療蠱下血欲死方薔薇根剉一升牛膝五分連翹子一升臘一彈子許右四味切以水四升煮取三升分三服即愈古今録驗同又療諸蠱大便下血日數十行方巴豆二七枚藜蘆炙附子炮芫青去足翅熬礬石各二分熬汁盡右五味搗下篩别研巴豆如膏和相得以綿褁一大豆許内下部中日二三愈忌同前方千金古今録驗中同並出第四卷千金凡忽患下血以上件方療更増劇者此是中蠱其下血狀如鴨肝腹中絞痛急者此方主之茜根升麻屑角各三兩地榆白蘘荷各四兩桔梗黄蘗黄芩各一兩右八味切以水九升煮取二升半分三服又凡卒患血痢或赤或黒無有多少此皆是蠱毒粗醫以斷痢處之此大非也又療中蠱毒吐血下血皆如爛雞肝令人心腹絞切痛如有物嚙若不即療令人五藏盡乃死驗之法欲知是蠱令病人唾水中沉者是蠱浮者非蠱也方槲木北隂白皮桃根皮蝟皮炙一方寸七亂髪灰一方寸七生麻子汁五升右五味先煮槲皮桃根取濃汁一升和麻子汁亂髪灰蝟皮末等令病者少食旦服一升須臾著盆水以鷄翮攪吐水中如牛涎犢胎及諸蠱毒之物出第二十五卷中千金翼療蠱毒下血方蝟皮燒灰以水服方寸七當吐蠱毒出第十五卷中崔氏療中蠱下血及毒下羚羊皮湯方羚羊皮方三寸炙蘘荷根四兩苦參黄連各二兩當歸升麻犀角各三兩右七味切以水九升煮取三升分三服無蘘荷根以茜根代之又療中蠱毒㵼血日夜無度腹痛不可忍方取白蘘荷葉四五枚私内著病人眠卧處席下勿令病人知之若為蠱毒所傷則不肯在上眠即知是蠱毒為病用皂莢三挺炙去皮子打碎用極醶醋四升於甆器中候日正午時漬皂莢又以新白布三尺蓋上布上又横一口食刀正對病人眠牀下安之至来日午時取藥用蓋藥布濾去滓分三服毎服相去如人行十里久若不肯服可將鍼刺兩手大拇指端甲亦不勞深其鍼且勿㧞出病人當自服藥蠱毒或吐或大便中出除其血即斷腹痛亦除此方用皆驗並出第三卷中古今録驗療卒中蠱下血如雞肝者晝夜下石餘血四藏悉損唯心未毁或乃鼻破待死方桔梗擣末以酒服方寸匕日三不能下藥以物掲口開灌之心中當煩須臾自静有頃下蠱至服七日止當服猪肝臛以補之出第四卷中五蠱方一十二首千金太上五蠱丸主百蠱吐血傷中心腹結氣或堅氣塞咽喉語聲不出短氣欲死飲食不下吐逆上氣去来無常狀如鬼祟身體浮腫心悶煩疼寒戰夢與鬼交狐狸作魅卒得心痛上乂胷脅痛如刀刺經年累歲著牀不起悉主之方雄黄研椒目熬巴豆去心皮熬鬼臼莽草炙芫花熬真珠藜蘆炙礬石各四分燒獺肝炙二分附子炮去皮五分蜈蚣三枚炙班猫三十枚去翅足熬右十三味搗末蜜和更搗一二千杵毎服如小豆一丸餘宻封勿泄十丸為一劑如不中病後日增一丸以下利為度當下蟲種種狀貌不可具載下七日後將息服一劑三十年百病盡除忌五辛猪肉冷水生血物狸肉蘆笋等又方酒服桔梗犀角末方寸匕日三服不能自服掲口與藥下心中當煩須臾自静有頃下至七日止當食猪脾以補之並出第二十五卷中崔氏療五蠱毒方一曰蛇蠱食中得之咽中如有物嚥之不入吐之不出悶亂不得眠心熱不能食方服馬篼苓根即吐出又服麝香方寸匕亦自消或吐出也二曰􅎙蜋蠱得之胷中忽然或哽入咽怵怵如蟲行欬而有血方服獾肫脂即下或吐或自消也三曰蝦蟇蠱得之心腹脹滿口亁思水不能食悶亂大喘而氣發方服車脂半升即出四曰科斗蠱同上療法甚驗五曰草蠱術在西凉以西及嶺南人多行此毒八人咽刺痛求死方服甘草藍汁即自消又方五蠱共一法療之但取産婦胎衣切之暴亁為散水和服半錢七五毒自消又方含升麻嚥汁又方五蠱都服馬篼苓苗似蘿摩草形正直上取雞子大搗為散服半錢七或至一七五蠱毒之病多在喉中常須記之或小醫不識此病言胃冷蚘動或浪稱是注灸刺浪服諸藥枉死也此由醫生未經歴故也宜令審别之並出第三卷中古今録驗五蠱湯方犀角三兩蘘荷根黄連綘草當歸各二兩羚羊皮方二寸灸右六味切以水七升煮取二升分為三服又五蠱下利去膏血赤罽丸方芫花一升巴豆一百枚赤罽方圎一寸右三味擣篩以蜜為丸更擣丸如胡豆服一丸如下利不止以清粥汁止之不下小增之欲令隂除不令大下范汪同並出第四十五卷中蠱注方三首病源蠱注者住也言其病遲滯停住死又注易傍人也蠱者是聚蛇蠱之類以器皿盛之令其自相噉食餘有一箇存者為蠱也而能變化人有造作欽事之者以毒害於他多於飲食内而行用之中之者心悶腹痛其食五藏盡則死有緩有急急者倉卒十數日便死緩者延引歲月遊走腹内常氣力羸憊骨節沉重發則心腹煩懊而痛令人所食之物亦變化為蠱漸侵食腑藏盡而死死則病流注染著傍人故為蠱注也出第二十四卷中范汪療蠱注百病癥瘕積聚酸削骨肉大小便不利卒忤遇惡風臚脹腹滿淋水轉相注殫門盡户延及男女外孫醫所不能療更生十七物紫參丸方紫參人參半夏洗藜蘆代赭桔梗白􅅔肉蓯蓉各三分石膏一分大黄一分牡蠣一分熬丹參一分蝦蟇灰烏頭炮四分狼毒一分附子炮五分巴豆七十枚去心皮熬右藥擣篩蜜和為丸以飲下如小豆一丸日三服老小以意减之蜂蠆所螫以塗其上神良忌羊肉冷水一方無蝦蟇有亁薑四分出第十四卷中小品雄黄丸療蠱注四肢浮腫肌膚消索欬逆腹大如水狀漏泄死後注易家人方一名蠱脹方雄黄研巴豆莽草灸鬼臼各四分蜈蚣三枚灸右五味擣篩為末蜜和更𢷬三千杵藥成宻器封之勿令泄氣宿勿食服如小豆一丸不知加一丸當先下清水蟲長數寸及下蛇或如壊雞子或白如膏下訖後作葱豉粥鴨􅃵補之忌生魚生菜猪肉蘆笋冷水煖食將養也千金同出十四卷中集驗療鬼注蠱注毒氣變化無常鮫魚皮散方鮫魚皮鵲魚班皮是犀角麝香研龍骨丹砂研雄黄研蘘荷葉鹿角炙各一分蜈蚣一枚炙椒一分汗亁薑一分貝子十枚雞舌香一分右十三味𢷬篩為散空心酒服一錢七日三服出第一卷中蠱毒雜療方五首小品療蠱似蚘方雄黄研麝香研右二味各如大豆許取生羊肺如指大以刀開取雄黄等末以肺褁吞之崔氏集驗古今録驗同又療人食菜及菓子中蛇毒方大豆末以酒漬取汁半升服之又以雞血和真鐵精吞如梧子大一丸古今録驗同又療有人食新變魚取飽中毒病心腹痛心下堅發熱煩寃欲得水沃身動搖如魚得水狀有人診病云是蠱家云野中相承無此毒不作蠱療之遂死並出第四卷中千金療人得藥雜蠱方班猫六枚去足翅熬桂心一片如指大釜月下土如彈丸大藜蘆如指大炙右四味搗散水服一錢匕下蟲蛇蝦蟇蜣蜋白蟲又療有人中蠱毒腹内堅如石面目青黄小便淋􅅹變狀無常方犀角一兩芍藥一兩黄連二兩本方一兩梔子仁十枚蘘荷葉四兩半牡丹皮一兩羚羊皮方廣五寸灸右七味切以水五升煮取一升半去滓分温再服翼古今録驗同出第二十五卷中古今録驗療食中有蠱毒令人腹内堅痛面目青黄淋露骨立病變無常方爐中取鐵精細研别搗烏雞肝和之丸如梧子大以酒服三丸日三服甚者不過十日愈微者便愈肘後崔氏同出第四十五卷中猫鬼野道方三首病源猫鬼者云是老狸野物之類變為鬼蜮而依附於人人畜事之猶如事蠱以毒害人其病狀心腹刺痛食人腑藏吐血痢血而死又野道者是無主之蠱也人有畜事蠱以毒害人為惡既積乃至死㓕絶其蠱則無所依止浮遊田野道路之間有犯害人者其病發猶是蠱之狀但以其於田野道路得之故謂之野道並出第二十五卷中千金療猫鬼野道病歌哭不自由方五月五日取自死赤蛇燒作灰研井花水服方寸匕日一服又療猫鬼眼見猫狸並耳有所聞方相思子萆麻子巴豆各一枚朱砂末蠟各四銖右五味𢷬作丸取麻子許含之即以灰圍患人前頭著一斗灰火吐藥火中即畫火上作十字其猫鬼並皆死矣忌猪肉蘆笋生血物翼方有峭粉出第二十六卷中古今録驗療妖魅猫鬼病人不肯言鬼鹿角散方鹿角屑𢷬散以水服方寸匕病者即言實也出第四十五卷中自縊死方一十五首病源人有不得意志者多生忿恨徃徃自縊以繩物繫頸自懸挂致死呼為自縊若覺早雖已死徐徐捧下其隂陽經絡雖暴擁閉而藏腑真氣故有未盡所以猶可救療故有得活者若見其懸挂便忽遽截斷其繩則不可救此言氣已擁閉繩忽暴斷其氣雖通而奔並運悶氣則不能還即不復得生又云自縊死旦至暮雖已冷必可活暮至旦則難療此謂其晝則陽盛其氣易通也夜則隂盛其氣難通也又云夏則夜短又熱則易活又云氣雖已斷而心微温一日以上猶可活也出第二十三卷中肘後葛氏療自縊死心下尚㣲温久猶可活方徐徐抱觧其繩不得斷之懸其髪令足去地五寸許塞兩鼻孔以蘆管内其口中至咽令人嘘之有頃其腹中礱礱轉或是通氣也其舉手撈人當益堅捉持更逓嘘之若活了能語乃可置若不得懸髪可中分髪兩手牽之又方皂莢末葱葉吹其兩鼻孔中逆出復内之千金備急文仲同又方以蘆管吹其兩耳極則易人吹取活乃止若氣通者以少桂湯稍稍嚥之徐徐乃以少粥清與之並出第三卷中仲景云自縊死旦至暮雖已冷必可療暮至旦小難也恐此當言隂氣盛故也然夏時夜短於晝又熱猶應可療又云心下若微温者一日以上猶可活皆徐徐抱解不得截繩上下安被卧之一人以脚踏其兩肩手小挽其髪常弦弦勿縱之一人以手按據胷上㣲動之一人摩捋臂脛屈伸之若已殭但漸漸强屈之並按其腹如此一炊頃氣從口出呼吸眼開而猶引按莫置亦勿苦勞之須令可少桂心湯及粥清含與之令濡喉漸漸能嚥乃稍止兼令兩人各以管吹其兩耳彌好此最善無不活者並皆療之肘後備急文仲古今録驗同備急方以罽衣若氍㲣厚氊物覆其口鼻抑之令兩人極力吹其兩耳一炊頃可活也肘後千金文仲集驗小品同又方懸牽其頭髪塞兩耳勿令通氣以葱葉刺鼻中兩人極力痛吹之嚙其兩脚踵即活亦可塞鼻而吹口活也小品古今録驗同范汪療自縊死方懸其髪令足裁至地一時許即活又方急手掩其口鼻勿令内氣稍出二時許氣至即活備急文仲古今録驗肘後同又方以絹急絞身體令堅以車牛載行三十里許使人於車上行踏肩引髪吹耳又方以松子油内口中令得入咽中則便活千金療自縊死方以藍青汁灌之又極須安定身心徐徐緩解慎勿割繩抱取心下猶温者刺雞冠血滴口中即活男用雌雞女用雄雞又方雞屎白以棗許酒半盞和灌口鼻中即活又方梁上塵如大豆各内一筒中四人各一筒同時吹兩耳鼻中極力吹之即活又方尿鼻口眼耳中並捉頭髪一撮如筆管大掣之立活並出第二十六卷中刪繁療五絶死方一曰自縊二曰牆壁所迮三曰溺水四曰魘魅五曰産乳皆取半夏一兩𢷬篩吹一大豆内鼻孔中即活心下温一日者亦可活千金同熱暍方七首病源夏月炎熱人多冐渉途路熱毒入内與五藏相並客邪熾盛欝瘀不宣致隂氣卒絶陽氣暴擁經絡不通故奄然悶絶謂之暍也然此乃外邪所撃真藏未壊若遇便療救氣宣則蘇也夫熱暍不可得冷得冷便死此謂外邪卒以冷觸其熱藴積於内不得宣發故也又冒熱困乏候人盛暑之時觸冒大熱熱毒之氣入藏則悶鬱冒至於困乏也並出第二十三卷中肘後夏月中熱暍死凡中暍死不可使得冷得冷便死療之方以屈革帶繞暍人臍使三四人尿其中令温亦可用泥土屈草亦可扣瓦椀底若脱車釭以著暍人臍上取令尿不得流去而已此謂道路窮急無湯當令人尿其中仲景云欲使多人尿取令温若有湯便可與之仲景云不用泥及車釭恐此物冷暍既在夏月得熱土泥暖車釭亦可用也備急文仲集驗小品千金同又方灸兩乳頭各七壯千金同又方取道中熱塵土以積暍人心下多為佳少冷即易通氣也千金同又方𢷬菖蒲汁飲之一二升又凡此療自經溺暍之法並出自張仲景為之其意理殊絶殆非常情所及亦非本草之所能開悟實拯救人之大術矣傷寒家别復有暍病在上仲景論中非此遇熱之暍文仲同出第七卷中千金療熱暍方可飲熱湯亦可用少亁薑橘皮甘草煮飲之稍稍嚥勿頓使飽但以熱土及熱灰土擁其上佳古今録驗同文仲療夏月暍死方濃煮蓼汁灌三升不差更灌之肘後千金同古今録驗療熱暍方令人口嘘心前令暖易人為之肘後同溺死方九首病源人為水所投溺水從孔竅入灌注腑藏其氣擁閉故死早拯救得出即泄􅅹其水令氣血得通便得活又云經半日及一日猶可療氣若已絶心下暖者亦可活出第二十三卷中肘後療溺死一宿者尚可活方以皂莢末綿褁内下部中須臾出水則活古今録驗同又方倒懸解衣挑去臍中垢極吹兩耳即活集驗千金小品文仲備急同又方倒懸死人以好酒灌鼻中立活千金備急文仲古今録驗同又方取甕傾之以死者伏甕上令口臨甕口燃以蘆火二七把燒甕中當死人心下令煙出小入死者鼻口中鼻口中水出盡則活蘆盡更益為之取活而止常以手候死人身及甕勿令甚熱冬天常令火氣能使死人心下得煖若卒無甕可就岸穿地令如甕燒之令煖乃以死人著上亦可用車轂為之當勿隱其腹及令得低頭使水出并熬灰數斛以粉身濕即易千金同小品療溺死若身尚暖者方取灶中灰兩石餘以埋人從頭至足水出七孔即活備急千金肘後同又方便脫取暖釡覆之取溺人伏上腹中出水便活也肘後同並出第十卷中千金療落水死方以灶中灰布地令厚五寸以甑側著灰上合死人於甑上使頭小垂下炒鹽二方寸七内管中吹下孔中即當吐水水下因去甑以死人著灰中擁身使出鼻口即活矣又方掘地作坑中熬灰數斛内坑中下死人覆灰濕徹即易之勿令灰熱烙􅏼人冷即易之半日即活備急療溺死方屈死人兩脚著人肩上以死人背向生人背負持走吐出水便活肘後云亦治凍死千金肘後文仲中集驗小品古今録驗同出第八卷凍死方一首病源人有在途路逢凄風苦雨繁霜大雪衣服霑濡冷氣入藏致令隂氣閉於内陽氣絶於外榮衛結澁不復流通故致噤絶而死若早得救療血温氣通則生又云凍死一日猶可活過此即不療出第二十三卷中肘後療冬天墮水凍四肢直口禁裁有㣲氣出方以大器中多熬灰使煖􅇸盛以薄其心上冷即易心煖氣通目則得轉口乃開可温尿粥清稍稍含之即活若不先温其心便持火炙其身冷氣與火相搏則死集驗備急文仲千金古今録驗同入井塜悶方二首肘後云此事他方少有其説且人為之寡不俟别條今於水凍之後附此乃是地氣薫蒸蓋亦障霧之例服諸解毒犀角雄黄麝香之屬豉豆竹􅅹升麻諸湯亦應為佳出第三卷中小品療入井塜悶冐方凡五月六月井中及深塜中皆有伏氣入中令人鬱悶殺人如其必須入中者先以鷄鴨雜鳥毛投之直下至底則無伏氣毛若徘徊不下則有毒氣也亦可内生六畜等置中若有毒其物即死必須入不得已當先以酒若無以苦酒數升先灑井塜中四邊畔停少時然後可入若覺中有些氣鬱悶奄奄欲死者還取其中水灑人面令飲之又以灌其頭及身體即活若無水取他水用也肘後千金録驗同出第十卷中千金療入井塜毒氣方取他井中水灑身上至三食頃便活若東井取西井南井取北井中水用之出第二十六卷中外臺秘要方卷二十八
