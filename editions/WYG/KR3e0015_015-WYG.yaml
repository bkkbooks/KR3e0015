body:
  text: 外臺秘要方巻十一唐王燾撰消渇方一十七首病源夫消渇者渇而不小便是也由少服五石諸丸散積乆經年石勢結於腎中使人下焦虚熱及至年衰血氣減少不能制于石石勢獨盛則腎為之燥故引水而不小便也其病變者多發癰疽此坐熱氣留於經絡經絡不利血氣壅澀故成癰膿也診其脉數大者生細小浮者死又沉小者生實牢大者死有病口甘者名為何何以得之此五氣之溢也名曰脾癉夫五味入於口藏於胃脾為之行其精氣溢在於脾令人口甘此肥美之所發也此人必數食甘美而多肥肥令人内熱甘者令人中滿故其氣上溢為消渇也厥隂之為病消渇氣上衝心中疼熱飢不欲食甚者則欲吐下之不肯止養生法云人睡卧勿張口乆成消渇及失血也赤松子云卧閉目不息十二通治飲食不消其湯熨鍼石别有正方補養宣導今附於後法云解衣倓卧伸腰腹少腹五息止引腎去消渇利隂陽解衣者使無罜礙倓卧者無外想使氣易行伸腰者使腎無逼蹙䐜者大努使氣滿少腹者攝腹牽氣使五息即止之引腎者引水來咽喉潤上部去消渇枯槁病利隂陽者饒氣力也出第五卷通按後條古人喜石冝消渇今服石者少何有此症縁酒多令中頗三焦熱藏腑燥亦致消渇不必皆由服石也但治法同千金論曰夫消渇者凡積乆飲酒無有不成消渇病者然則大寒凝海而酒不凍明其酒性酷熱物無以加脯炙鹽鹹此味酒客多嗜不離其口三觴之後制不由已飲噉無度咀嚼鮓醬不擇酸鹹積年長夜酣興不懈遂使三焦猛熱五藏乾燥木石猶且焦枯在人何能不渇療之愈否屬在病者若能如方節愼旬月而瘳不自愛惜死不旋踵方書醫藥寔多有効其如不愼者何其所愼者有三一飲酒二房室三鹹食及麪能愼此者雖不服藥而自可無他不知此者縱有金丹亦不可救深思慎之深思慎之凡消渇之人愈與未愈常須慮患大癰何者消渇之人必於大骨節間忽發癰疽而卒所以戒在大癰也當預備癰藥以防之宜服麥門冬丸除腸胃熱實兼消渇方麥門冬八分去心茯苓八分堅白者黄連八分石膏八分碎萎蕤八分人參六分龍膽六分黄芩六分升麻四分栝樓十分枳實五分炙生薑屑十分地骨皮六分茅根切一升粟米三合右十五味以水六升煮茅根及粟米令爛餘十三味搗末蜜和丸如梧子以前茅根粟米汁作飲服十丸日二若渇則與此飲至足大麻亦得忌豬肉酢物又栝樓湯方栝樓五両切麥門冬汁三升生薑五両切茅根切三升蘆根切二升右五味以水一斗煮取三升分為三服忌如藥法又胃腑實熱引飲常渇茯苓湯洩熱止渇方茯苓五兩一作茯神栝樓五兩知母四兩小麥二升麥門冬五兩去心大棗二十枚去核生地黄六兩萎蕤四兩淡竹葉三升右九味切以水三斗先煮小麥竹葉取九升去滓内諸藥煮取四升分四服不問早晩隨渇即進非但正治胃渇通治渇病熱即服之忌蕪荑酢物又豬肚丸療消渇方豬肚一枚治如食法黄連五兩去毛栝樓四兩麥門冬四兩去心知母四兩茯神四兩梁米五兩右七味𢷬為散内肚中線縫安置甑中蒸之極爛熟接熱及藥木臼中𢷬可堪丸若硬乾少蜜和丸如梧子飲汁下三十丸日再服漸加至四五十丸渇即服之翼同又栝樓散方栝樓八分麥門冬六分去心甘草六分炙鈆丹八分右四味𢷬為散以漿水服方寸匕日三服忌海藻菘菜一方有茯苓六分又黄茋湯方黄茋三兩茯神三兩栝樓三兩甘草三兩炙麥門冬三兩去心乾地黄五兩右六味切以水八升煮取二升半分三服忌蕪荑酢物海藻菘菜日進一劑服十劑訖服丸藥後腎消門中宣補丸是又方取七家井索近桶口結處燒作灰右一味以井華水服之不過三服又方飲䜴汁任性多少差止又方濃煮竹根汁飲之取差止肘後同又方煮青梁米汁飲之差止肘後同又消渇隂脉絶胃反吐食方茯苓八兩澤瀉四兩白术三兩生薑三兩桂心三兩甘草一兩炙右六味切以水一斗煮小麥三升取五升去滓内茯苓等煮取二升半一服八合日再翼同又方取屋上瓦三十年者破如雀頭三大升以東流水兩石煮取二斗乾地黄八兩生薑八兩橘皮三兩甘草三兩炙人參三兩黄芪三兩桂心二兩逺志三兩去心當歸二兩芍藥二兩大棗二十枚擘白术八兩右十二味切内瓦汁中煮取三升分温四服單瓦汁亦佳一方無甘草又療熱病後虚熱渇四肢煩疼方葛根一斤人參一兩甘草一兩炙竹葉一把右四味切以水一斗五升煮取五升渇則飲一升日三夜二忌海藻菘菜又虚熱渇無不効填骨煎方茯苓三兩兎絲子三兩山茱茰三兩當歸三兩大豆黄巻一升石葦二兩去毛牛膝三兩巴㦸天三兩麥門冬三兩去心天門冬五兩去心五味子三兩人參二兩逺志三兩去心桂心二兩附子二兩炮石斛三兩右十六味先𢷬篩别取生地黄十斤生栝樓十斤舂絞取汁於火上煎之減半便作數分内藥并下白蜜二升牛髓一升㣲火煎之令如糜食如雞子黄大日三亦可飲服之佳忌酢物鯉魚生葱豬肉冷水一方有肉蓯蓉四両又方桃膠如彈丸含之咽津甚佳本方療渇小便利復非淋又方蠟如雞子大酢一升煮兩沸適寒温頓服之本方療渇小便利復非淋通按小便利而且長不比淋症之滴瀝也故曰復非淋又方水和栝樓散服方寸匕亦可蜜丸如梧子服三十丸日再服無所忌並出第二十一卷中近効極要消渇方二首近効極要論消渇舊來以為難療古方有黄連湯牛膽丸為勝亦不能好差自作此方以來服者皆差服多者即吐水豈有更渇之理又療消渇麥門冬丸方麥門冬五兩去心乾地黄三兩蜀升麻五兩黄芩五兩栝樓七両苦參八兩人參三兩黄連五兩黄蘗五兩右九味末之以牛乳和衆手捻作丸子曝乾以飲服二十丸日二加至五六十丸忌蕪荑豬肉冷水又方黄連五兩苦參一斤知母五兩栝樓二兩麥門冬五兩去心牡蠣粉五兩熬人參五兩黄茋五両乾地黄五兩右九味末之以牛乳丸清漿服二十丸日二服加至五十丸忌豬肉冷水蕪荑近効極要熱中小便多漸瘦方四首近効極要論熱中雖能食多小便多漸消瘦方地骨皮切一升麥門冬三兩去心黄連二兩小麥八合人參一兩右五味切以水九升煮取三升八合去滓分為三服間食服之如不能多服分作四五服亦得忌豬肉又方人參五兩麥門冬八分去心牡蠣粉八分乾地黄十分知母八分苦參二十分黄連八分栝樓八分右八味末之以生牛乳為丸如梧子清漿服十五丸日再加至四十丸食後服忌蕪荑豬肉冷水又療小便多或不禁方兎絲子二兩蒲黄三兩黄連三兩硝石三兩肉蓯蓉二兩右五味兼雞䏶胵中黄皮三兩為散服服方寸匕日三服如行五里久又一服未有不差者忌豬肉千金名九房散又療小便數多不足日便一二斗或如血色方麥門冬八兩去心蒺藜子三両甘草一両炙乾薑四両炮桂心二両乾地黄八両續㫁二両右七味切以水一斗煮取二升五合分為三服忌海藻菘菜生葱蕪荑古今録驗療腎消脚瘦細小便數赤色似血虚冷者渇利虚經脉澀成癰膿方一十一首病源夫渇利者隨飲小便是也由少服乳石石熱盛時房室過度致令腎氣虚耗下焦生熱熱則腎燥腎燥則渇然腎虚又不能傳制水液故隨飲小便也其病變多發癰疽以其内熱而小便利故也小便利則津液竭津液竭則經絡澀經絡澀則榮衛不行榮衛不行則熱氣留滯故成癰膿也出第五卷中千金療下焦虚熱注脾胃從脾注肺好渇利方小麥一升竹葉三升麥門冬四兩去心茯苓四兩甘草三兩炙大棗三十枚去核生薑五兩栝樓五兩地骨皮一升右九味切先以水三斗煮小麥取一斗去滓澄清取八升去上沫取七升煮藥取三升分三服忌海藻菘菜酢物又療渇利虚熱引飲不止消熱止渇茯神湯方茯神四兩石膏八兩碎地骨皮一升竹葉三升栝樓五両萎蕤四両麥門冬二升去心知母四兩生地黄一升宿薑四兩右十味切以水一斗二升下大棗三十枚擘并藥煮取四升分為四服忌蕪荑又消渇利方生栝樓根三十斤右一味切以水一石煮取一斗半去滓以牛脂五合煎取水盡以煖酒先食後服如雞子大日三服又方葵根五升盤大兩束切右一味以水五升煮取三升宿不食平旦一服三升又療渇小便利復非淋方榆白皮二斤去黒皮切右一味以水一斗煮取五升一服三合日三服又方小豆藿一把𢷬取汁頓服日三肘後文仲同又渇利方栝樓粉和雞子日曝乾更𢷬水服方寸匕日三丸服亦得又療虚熱四體羸瘦渇熱不止茯神消渇補虚煮散方茯神四兩石斛八兩栝樓五兩甘草三両炙五味子三兩蓯蓉四兩知母三両黄連八両丹參五両人參三両當歸三両小麥三升萎蕤四両右十三味擣篩為散取三寸匕以水三升煮取一升絹袋貯煮之日再一煮為一服忌豬肉醋物海藻菘菜出第二十一卷中崔氏療消渇瘦中焦熱渇方苦參一大斤黄連六分栝樓五両知母五両牡蠣粉五両麥門冬五両去心右六味各𢷬篩為散以牛乳和併手捻為丸如梧子大曝乾日再服飽食訖以漿水下之服二十丸如微利減十丸如食熱麫酒等即加服五丸忌豬肉出第三巻中廣濟療脾胃中虚熱消渇小便數骨肉日漸消瘦方麥門冬十二分去心苦參八分栝樓八分知母八分茯神八分土𤓰根八分甘草六分炙人參六分右八味𢷬篩蜜和丸每食少時煮蘆根大麥飲服如梧子二十丸日再漸加至三十丸忌海藻菘菜豬肉大酢一方有黄連十二分出第一卷中肘後療消渇肌膚羸瘦或虚熱轉筋不能自止小便數方栝樓六分黄連六分漢防已六分鈆丹六分研右四味𢷬篩為散每食後取酢一合水二合和服方寸匕日三服當強飲水須􅁷惡水不復飲矣陶氏廣濟文仲同千金翼同分兩小别出第十卷中消渇口乾燥方三首廣濟療口乾數飲水腰脚弱膝冷小便數用心力即煩悶徤忘方麥門冬十二分去心牛膝六分龍骨八分土𤓰根八分狗脊六分茯神六分人參六分黄連十分牡蠣六分熬碎山茱茰八分兎絲子十二分酒漬一宿鹿茸八分炙右十二味𢷬篩為末蜜和丸每服食後煮麥飲服如梧子二十丸日二服漸加至三十丸忌生菜熱麫豬牛肉蒜粘食陳臭酢物等又療消渇口苦舌乾方麥門冬五兩去心茅根一升栝樓三両切烏梅十顆去核小麥三合竹茹一升右六味以水九升煮取三升去滓細細含咽分為四五服忌熱麫炙肉並出第一卷中千金口含酸􅀥丸療口乾方酸棗一升五合去核石榴子五合乾之葛根三兩烏梅五十顆去核麥門冬四両去心茯苓三両半覆盤子三両桂心三両六銖石蜜四両半栝樓三両半右十味𢷬篩蜜和為丸含如酸棗許大不限晝夜常令口中有津液出為佳忌大酢生葱翼同出第二十一卷中消中消渇腎消方八首病源内消病者不渇而小便多是也由少服五石熱結於腎内熱之所作也所以服石之人小便利者石性歸腎腎得石則實實則消水漿故利利多則不得潤養五藏藏衰則生諸病焉由腎盛之時不惜真氣恣意快情數使虚耗石熱孤盛則作消中故不渇而小便多也出第五卷中千金論曰夫内消之為病當由熱中所作也小便多於所飲令人虚極短氣又内消者食物皆消作小便而又不渇正觀十年梓州刺史李文博先服白石英乆忽然房道強盛經月餘漸患渇經數日小便大利日夜百行以來百方療之漸以増劇四體羸惙不能起止精神惚恍口舌乾焦而卒此病雖稀甚可畏也利時脉沉細微弱服枸把湯即効若恐不能長愈服鈆丹散立効其間将服除熱宣補丸枸杞湯方枸把枝葉一斤栝樓根三兩石膏三兩黄連三兩甘草二両炙右五味切以水一斗煮取三升去滓分温五服日三夜二服困重者多合渇即飲之忌海藻菘菜猪肉又鈆丹散主消渇止小便數兼消中悉主之方鈆丹二分熬别研入栝樓根十分甘草十分炙澤瀉五分胡粉二分熬研入石膏五分研白石脂五分研入赤石脂五分右八味𢷬研為散水服方寸匕日三服少壮人一匕半患一年者服之一日差二年者二日差渇甚者夜二服若腹中痛者減之丸服亦佳一服十丸以差為度不要傷多令人腹痛此方用之如神已用經今三十餘載矣忌海藻菘菜文仲云腹中痛者宜漿水飲汁下之亦得又備急云不宜酒下用麥汁下之亦得丸服者服十丸日再服合一劑救數人得愈古今録驗云服此藥了經三兩日宜爛煮羊肝肚空腹喫之或作羮亦得宜湯飲食之候小便得鹹苦即宜服後花蓯蓉丸兼煮散将息又療腎消渇小便數宣補丸方黄茋三両栝樓三両麥門冬三兩去心茯神三両人參三両甘草三兩炙黄連三兩知母三兩乾地黄六兩石膏六兩研兎絲三兩肉蓯蓉四兩右十二味末之以牛膽汁三合共蜜和丸梧子大以茅根汁服三十丸日漸加至五十丸一名茯神丸集驗同又療腎氣不足虚損消渇小便數腰痛宜服腎瀝湯方羊腎一具去脂膜切逺志二兩去心人參二兩澤㵼二兩乾地黄二兩桂心二両當歸二兩龍骨二兩甘草二兩炙麥門冬一升去心五味子五合茯苓一兩芎藭二兩黄芩一兩生薑六兩大􅀥二十枚右十六味切以水一斗五升煮羊腎取一斗二升内藥取三升分三服忌海藻菘菜生葱酢物蕪荑集驗同又阿膠湯療久虚熱小便利而多或服石散人虚熱多由汗出當風取冷患脚氣喜發動兼消渇腎消脉細弱服此即立減方阿膠三両乾薑二兩麻子一升逺志四両去心附子一兩炮人參一兩甘草三兩炙右七味切以水七升煮取二升半去滓内膠令烊分三服説云小便利多白日夜數十行至一石令五日服之甚良忌海藻菘菜豬肉冷水又腎消夜尿七八升方鹿角一具炙令焦右一味𢷬篩酒服方寸匕漸漸加至一匕半又黄茋湯主消中虚勞少氣小便數方黄茋二兩芍藥二兩生薑二兩當歸二両桂心二兩甘草二兩大棗三十枚麥門冬一兩去心乾地黄一兩黄芩一両右十味切以水一斗煮取三升去滓空腹溫分三服忌海藻菘菜生葱蕪荑古今録驗論消渇病有三一渇而飲水多小便數有脂似麩片甜者皆是消渇病也二喫食多不甚渇小便少似有油而數者此是消中病也三渇飲水不能多但腿腫脚先瘦小隂痿弱數小便者此是腎消病也特忌房勞若消渇者倍黄連消中者倍栝樓腎消者加芒硝六分服前件鈆丹丸得小便鹹苦如常後恐虚憊者並宜服此花蓯蓉丸方花蓯蓉八分澤㵼四分五味子四分紫巴㦸天四分去心地骨皮四分磁石六分研水淘去赤汁乾之研入人參六分赤石脂六分研入韭子五分熬龍骨五分研入甘草五分炙牡丹皮五分乾地黄十分禹餘粮三分研入桑螵蛸三十枚炙栝樓四分右十六味𢷬篩蜜和丸如梧子以牛乳空腹下二十丸日再服忌海藻菘菜胡荽蕪荑等物又服前丸渇多者不問食前後服煮散方桑根白皮六分薏苡仁六分通草四分紫蘇莖葉四分五味子六分覆盤子八分枸把子八分乾地黄九分茯苓十二分菝葜十二分黄茋二分右十一味𢷬以馬尾羅篩之分為五貼每貼用水一升八合煎取七合去滓温服忌酢物蕪荑出第二十六卷中睡中尿牀不自覺方六首病源夫人有於眠睡中不覺尿出者是其禀質隂氣偏盛陽氣偏虚則膀胱腎氣俱冷不能温制於水則小便多或不禁而遺尿膀胱足太陽也為腎之腑腎者足少隂也為藏與膀胱合俱主水凡人之隂陽日入陽氣盡則隂受氣至夜半隂陽大㑹氣交則卧睡小便者水液之餘也從膀胱入於胞為小便夜卧則陽氣衰伏不能制於隂所以隂氣獨發水下不禁故於睡眠而不覺尿牀也出第十四卷中肘後療少小睡中遺尿不自覺方取鵲巢中蓐燒水服一錢匕即差文仲方千金同又方雄雞肝桂心右二味等分𢷬丸服如小豆一枚日三服又方雄雞屎白熬桂心右二味等分末酒服方寸匕日二亦可除桂心又方礬石燒令汁盡牡蠣熬右二味等分末之以粟米粥飲服方寸匕日三又方雄雞喉嚨及矢白䏶胵裹黄皮燒末麥粥清盡服之亦可以赤雞翅燒末酒服三指撮日三又方薔薇根隨多少剉𢷬以酒飲之並出第二卷中渴後小便多恐生諸瘡方二首病源渇利之病隨飲小便也此謂服石之人房室過度腎氣虚耗故也下焦生熱熱則腎燥腎燥則渇然腎虚又不能制水故小便利也其渇利雖差熱猶未盡發於皮膚皮膚先有風濕濕熱相摶所以生瘡也出第五卷中近効恐腎虚熱渇小便多除風濕理石毒止小便去皮膚瘡調中方升麻四分𤣥參五分甘草四分炙知母五分茯苓三分牡蠣六分漏蘆五分枳實六分炙菝葜四分黄連六分右十味𢷬篩飲汁服方寸匕日再服以差為度忌豬肉海藻菘菜酢物又方栝樓八分茯苓八分𤣥參四分枳實六分炙苦參三分甘草三分炙橘皮三分右七味𢷬篩每空腹以漿水服方寸匕日再服忌海藻大酢菘菜渇後恐成水病方三首病源五藏六腑皆有津液若腑藏因虚實而生熱者熱氣在内則津液竭少故渇也夫渇數飲其人必眩背寒而嘔者因利虚故也診其脉心脉滑甚為善渇其久病變或發癰疽或為水病出第五巻中近効渇後數飲嘔逆虚羸恐成癰疽水病方茯苓五分栝樓六分升麻四分麥門冬六分去心桑根白皮八分橘皮三分右六味𢷬為散清水服一方寸匕日再服忌酢物又方人參三分豬苓三分通草五分黄連六分麥門冬八分去心栝樓八分右六味𢷬為散漿水送方寸匕日再服以差為度忌豬肉冷水生冷等物又若已覺津液竭身浮氣如水病者方漢防已六分豬苓六分栝樓八分茯苓四分桑根白皮十二分白术三分杏仁六分去皮尖熬郁李仁六分葶藶子十二分熬紫色右九味𢷬篩蜜和丸如梧子空腹漿水服三十丸日一服腫消小便快下為度忌酢物桃李雀肉等又葶藶丸療消渇成水病浮腫方甜葶藶隔紙炒栝樓仁杏仁去皮尖雙仁麩炒黄漢防已各一両右四味為末蜜丸𢷬二三百杵如梧子大服三十丸食前茯苓煎湯送下日三四服又瞿麥湯療消渇欲成水氣面目并足脛浮腫小便不利方瞿麥穗澤瀉滑石各両半防已三分黄芩大黄各一分桑螵蛸炒十四枚右七味切毎服三錢匕水三升煮一升去滓空心温服良久再服虚勞小便白濁如脂方四首病源此由勞傷於腎腎氣虚冷故也腎主水而關竅在隂隂為尿便之道胞冷腎損故小便白而如脂或如麩片也出第四卷中崔氏飲水不知休小便中如脂舌乾渇方黄連五兩栝樓五両右二味𢷬末以生地黄汁和丸併手丸每食後牛乳下五十丸日再服之忌猪肉近効消渇肝肺熱焦枯消瘦或寒熱口乾日夜飲水小便如脂不止欲死方水飛鐵粉三両絶燥者别研入雞膍胵五枚隂乾末入牡蠣二両熬别研如粉入黄連三両右四味𢷬篩三五度鍊蜜和丸飲汁下如梧子大五十丸重者不過食時輕者手下差勿傳忌猪肉又主消渇口乾方黄連䜴曝令乾右二味一處𢷬令成丸食後飲服四十丸日再丸稍大如常藥丸常服有効忌猪肉又消渇能飲水小便甜有如脂麩片日夜六七十起方冬𤓰一枚黄連十両右截𤓰頭去穰入黄連末火中煨之候黄連熟布絞取汁一服一大盞日再服但服兩三枚𤓰以差為度一方云以𤓰汁和黄連末和如梧子大以𤓰汁空肚下三十丸日再服不差増丸數忌猪肉冷水經驗用大牡蠣不計多少以臘日端午日将黄泥褁煆通赤放冷取出為末用活鯽魚煎湯調下一錢強中生諸病方六首病源夫强中病者莖長興盛不痿精液自出是也由少服五石石熱住於腎中下焦虚熱少壮之時血氣尚豐能制於石及至年衰血氣減少腎虚不能制精液也若精液竭則諸病生矣出第五卷中千金論曰夫人生放恣者衆盛壮之時不自慎惜快情縱慾極意房中稍至年長腎氣虚竭百病滋生又年少慮不能房多服石散真氣既盡石氣孤立唯有虚耗脣口乾焦精液自洩或小便赤黄大便乾實或渇而且利日夜一石以來或渇而不利或不渇而利所食之物皆作小便此皆由房室不節之所致也又强中之病者莖長興盛不痿精液自出也消渇之後即作癰疽皆由石熱凡如此等宜服猪腎薺苨湯制腎中石熱又将服白鴨通丸便差猪腎薺苨湯方猪腎一具去脂膜大豆一升薺苨三両人參二兩茯神二兩磁石二両碎知母二兩葛根二両黄芩二兩栝樓二兩甘草二両炙石膏三兩右十二味切以水一斗五升先煮猪腎大豆取一斗以下去滓内諸藥煎取三升去滓分温三服渇乃飲之下焦熱者輙合一劑病勢漸歇即停忌海藻菘菜酢物又平人夏月喜渇者由心王也心王便汗出汗出則腎中虚燥故令渇而小便少也冬月不汗出故小便多而數也此皆是平人之候名曰腎渇但小便利而不飲水者名腎實也經曰腎實則消消者不渇而利是也所以服石之人其於小便利者石性歸腎腎得石則實實則能消水漿故利利多則不能潤養五藏藏衰則生諸病也張仲景曰若熱結中焦則為堅熱也熱結下焦則為溺血亦令人淋閑不通明知不必悉患小便利信矣内有熱氣者則喜渇也除其熱則止渇兼虚者須除熱而兼宜補虚則病愈又療嶺南山瘴氣兼風熱毒氣入腎中變成寒熱脚弱虚滿而渇方黄連不限多少生栝樓汁生地黄汁羊乳無即用牛乳及人乳亦得右四味取三般汁乳和黄連末任多少衆手捻為丸如梧子大麥飲服三十丸漸加至四十丸五十丸日三服輕者三日愈重者五日愈若藥苦難服即煮麥飲汁下亦得文仲云黄連丸一名羊乳丸肘後同忌猪肉蕪荑又療消渇浮萍丸方浮萍栝樓根等分右二味𢷬篩以人乳汁和為丸如梧子麥飲服二十丸日三服三年病三日差肘後文仲同主虚熱甚佳又療面黄咽中乾燥手足俱黄短氣脉如連珠除熱止渇利補養地黄丸方生地黄汁二升生栝樓汁二升生羊脂三升牛脂亦得好蜜四升黄連末一斤右五味𢷬合銀鍋中熬成煎可丸如梧子飲汁送五丸日三服加至十丸若苦冷而渇差即令别服温藥忌猪肉蕪荑肘後同又療渇小便數散方知母六分栝樓一斤茯苓四分鈆丹一分雞䏶胵中黄皮十四枚右五味為散飲服方寸匕日三禁酒生菜肉差後去鈆丹以蜜和之以麥飲長服勿絶良忌酢物肘後同消渇不宜鍼灸方一十首千金論曰凡消渇病經百日以上者不得灸刺灸刺則於瘡上漏膿水不歇遂成癰疽羸瘦而死亦忌有所誤傷皮肉若作鍼孔許大瘡者所飲之水皆於瘡中變成膿水而出若水出不止者必死慎之慎之初得消渇者可依後方灸刺之為佳孫氏云消渇病百日外既不許鍼刺所飲之水皆化為膿水不止者皆死特須慎之又云仍不得誤傷皮肉若有小瘡亦云致死既今亦得消渇且未免飲水水入瘡即損人今初得日豈得令其灸刺致此誤傷之禍輙将未順其理且取百日以上為能未悟初灸之説故不録灸刺凡灸刺則外脱其氣消渇皆是宣疾灸刺特不相宜唯脚氣宜即灸之是以不取炙宂者耳又有人患消渇小便多而數發在於春經一夏專服栝樓及䜴汁得其力渇漸差然小便猶數甚晝夜二十餘行常至三四升極差不減二升也轉乆便止漸食肥膩日就羸瘦脣口乾燥吸吸少氣不得多語心煩熱兩脚酸食乃兼倍於常而不為氣力者然此病皆由虚熱所為耳療法栝樓汁可長服以除熱牛乳杏酪善於補此法最有益出第二十一卷中文仲療消渇熱中加減六物丸方栝樓根八分麥門冬六分去心知母五分人參四分苦參四分土𤓰根四分右藥𢷬篩以牛膽和為丸如小豆服二十丸日三服麥粥汁下未知稍加至三十丸咽乾者加麥門冬舌乾加知母脅下滿加人參小便難加苦參小便數加土𤓰根隨患加之一分肘後同又黄連丸主消渇方黄連一斤去毛生地黄十斤右二味𢷬絞地黄取汁漬黄連出曝之燥復内之令汁盡乾𢷬之下篩蜜和丸如梧子服二十丸日三服亦可散以酒服方寸匕日三服盡更令作即差止忌猪肉蕪荑肘後集驗千金廣濟同並出第八卷中千金栝樓粉散療消渇秘方深掘大栝樓根厚削皮至白處右一味寸切以水浸一日一易經五日出取爛𢷬破之以絹袋盛擺之一如出粉法水服方寸匕日三四亦可作粉粥乳酪中食之不限多少取差止出第二十一卷中肘後主消渇方秋麻子一升以水三升煮三四沸取汁飲之無限不過五升差文仲同出第二卷中廣濟療消渇兼氣散方栝樓三兩石膏三両研甘草三両甘皮二兩右四味𢷬篩為散食後煮大麥飲服方寸匕日二夜一服漸加至二匕忌熱麪海藻菘菜又療消渇麥門冬湯方蘆根切二升苧根切二升石膏六分碎生薑五両栝樓五兩小麥二升生麥門冬二升去心右七味切以水二斗煮取六升去滓一服一升渇即任意飲未差更作並出第一卷中崔氏療患熱消渇常服有驗方䜴心三兩以酸醋拌蒸乾如此者三熬令微黄黄連三両右二味𢷬篩訖以蜜和為丸日再空腹服二十五丸食後又服二十丸又取烏梅十顆以水二小升煎之數沸取湯下前件丸藥如無烏梅以小麥子二升煮取汁亦得又方黄連一升去毛麥門冬五両去心右二味𢷬篩以生地黄汁栝樓根汁牛乳各三合和頓為丸如梧子一服二十五丸飲下日再服漸漸加至三十丸若不頓為丸經宿即不相著也消渇及小便多並是虚熱但冷将息即差前件三方崔氏本方中此處更有一方用栝樓黄連者故云前件三方並是冷補空腹服恐少腹下冷常喫少許食服之大好忌猪肉蕪荑又療消渇無比方土𤓰根八両苦參粉三両黄連五両去毛鹿茸三両炙栝樓三兩雄雞腸三具牡蠣五両熬白石脂三兩研甘草三兩炙黄茋三両桑螵蛸三十枚炙白龍骨五両研雞䏶胵黄皮三十具熬右一十三味𢷬篩為散一服六方寸匕日再服夜一服以後藥下之竹根十両麥門冬四両去心石膏四両甘李根白皮三両右四味以水一斗二升煮取三升五合以下前件散藥如難服可取此藥汁和丸一服六十丸仍還用此藥汁下之忌猪肉海藻菘菜並出第四卷中千金加減巴郡太守奏三黄丸療男子五勞七傷酒渇不生肌肉婦人帶下手足寒熱者方春三月黄芩四両大黄三兩炒黄連四両夏三月黄芩六両大黄一両炒黄連七両炒秋三月黄芩六両大黄二両黄連三両冬三月黄芩三両大黄五両黄連二両炒右三味隨時合𢷬下篩以蜜和為丸如大豆服五丸日三不知稍増七丸服一月病愈乆服走及奔馬近常試驗忌猪肉出第二十一卷中卒消渇小便多太數方八首肘後卒消渇小便多方多作竹瀝飲之恣口數日差忌麪炙肉通按恣口者謂多飲竹瀝非恣食也又方酒煎黄蘗汁取性飲之通按性飲者若人性畏冷即少飲也又方熬胡麻令變色研淘取汁飲半合日可三四服不過五升即差又療日飲水一斛者方桑根白皮新掘入地三尺者佳炙令黄黒色切以水煮之無多少但令濃隨意飲之無多少亦可内少粟米勿與鹽集驗云宜熱飲之又小便卒太數復非淋一日數十過令人瘦方未中水猪脂如雞子一枚炙承取肥汁盡服之不過三劑差又方羊肺一具作羮内少肉和鹽䜴如食法任意進之不過三具差千金同又方䜴一升内於鹽中綿褁之以白礬好者半斤置綿上令蒸之三斗米許時即下白礬得消入䜴中出暴乾𢷬末服方寸匕又小便數猪肚黄連丸方猪肚一枚洗去脂膜黄連末三斤内猪肚中蒸之一石米熟即出之曝乾𢷬丸如梧子服三十丸日再服漸漸加之以差為度忌猪肉出第二卷中近効祠部李郎中消渇方一首論曰消渇者原其發動此則腎虚所致每發即小便至甜醫者多不知其疾所以古方論亦闕而不言今略陳其要按洪範稼穡作甘以物理推之淋􅄳醋酒作脯法須􅁷即皆能甜也足明人食之後滋味皆甜流在膀胱若腰腎氣盛則上蒸精氣氣則下入骨髓其次以為脂膏其次為血肉也其餘别為小便故小便色黄血之餘也騷氣者五藏之氣鹹潤者則下味也腰腎既虚冷則不能蒸於上榖氣則盡下為小便者也故甘味不變其色清冷則肌膚枯槁也猶如乳母榖氣上洩皆為乳汁消渇疾者下洩為小便此皆精氣不實於内則便羸瘦也又肺為五藏之華蓋若下有暖氣蒸即肺潤若下冷極即陽氣不能昇故肺乾則熱故周易有否卦乾上坤下陽阻隂而不降隂無陽而不昇上下不交故成否也譬如釡中有水以火煖之其釡若以板蓋之則煖氣上騰故板能潤也若無火力水氣則不上此板終不可得潤也火力者則為腰腎强盛也常須暖将息其水氣即為食氣食氣若得煖氣即潤上而易消下亦免乾渇也是故張仲景云宜服此八味腎氣丸並不食冷物及飲冷水今亦不復論此頻得効故録正方於後耳凡此疾與脚氣雖同為腎虚所致其脚氣始發於二三月盛於五六月衰於七八月凡消渇始發於七八月盛於十一月十二月衰於二月三月其故何也夫脚氣者擁疾也消渇者宣疾也春夏陽氣上故擁疾發即宣疾愈也秋冬陽氣下故宣疾發即擁疾愈也審此二者疾可理也又宜食者毎間五六日空腹一食餅以精羊肉及黄雌雞為臛此可温也若取下氣不食肉菜食者宜煮牛膝韭蔓菁又宜食雞子馬肉此物微擁亦可療宣疾也擁之過度便發脚氣猶如善為政者寛以濟猛猛以濟寛隨事制度使寛猛得所定之於心口不能言也又庸醫或令喫栝樓粉徃徃經服之都無一効又每至椹熟之時取爛羙者水淘去浮者飡之下候心胷間氣為度此亦甚佳生牛乳煖如人體渇即細細呷之亦佳張仲景云足太陽者是膀胱之經也膀胱者是腎之腑也而小便數此為氣盛氣盛則消榖大便硬衰則為消渇也男子消渇飲一斗水小便亦得一斗宜八味腎氣丸主之神方消渇人宜常服之乾地黄八両薯蕷四両茯苓三両山茱茰五両澤瀉四両牡丹皮三両附子三両炮桂心三両右藥𢷬篩蜜和丸如梧子大酒下十丸少少加以知為度忌猪肉冷水蕪荑胡荽酢物生葱范汪小品深師古今録驗必効文仲方等並同先服八味腎氣丸訖後服此藥壓之方黄連二十分苦參粉十分乾地黄十分知母七分牡蠣八分麥門冬十二分去心栝樓七分一方無餘並同右七味𢷬篩牛乳和為丸如梧子大併手作丸曝乾油袋盛用漿水或牛乳下日再服二十丸一方服十五丸患重者渇差後更服一年以來此病特慎麞鹿肉須慎酒炙肉鹹物喫索餅五日一頓細切精羊肉勿著脂飽食喫羊肉須著桑根白皮食一方云差後須服此丸一載以上即永絶根源此病特忌房室熱麪并乾脯一切熱肉粳米飯李子等若覺熱渇加至二十五丸亦得定後還依前減其方神効無比餘並準前方忌猪肉蕪荑将息禁忌論一首夫人雖嘗服餌而不知養性之術亦難以長生養性之道不欲飽食便卧亦不宜終日乆坐皆損壽也人欲小勞但莫乆勞疲極也亦不可强所不能堪耳人不得每夜食食畢即須行步令稍暢而坐卧若食氣未消而傷風或醉卧當成積聚百疾或多霍亂令人暴吐又食欲得少而數不欲頓而多多即難消也能善養性者皆先候腹空積饑乃食先渇後飲不欲觸熱而飲飲酒傷多即速吐之為佳亦不可當風卧及得扇之皆令人病也才不逮而思之傷也悲哀憔悴傷也力所不勝而舉之傷也凡人冬不欲極温夏不欲窮凉亦不欲霧露星月下卧大寒大熱大風皆不用觸冐之五味入口不欲偏多偏多則損人腑藏故曰酸多即傷脾苦多即傷肺辛多即傷肝鹹多即傷心甘多即傷腎此是五行自然之理又傷初即不覺乆乃損夀耳夫喫生肉鱠必須日午前即良二味之中其鱠尤腥而冷也午後隂陽交錯人腹中亦順天時不成癥積亦能霍亂矣夫人至酉戍時後不要喫飯若冬月夜長性熱者須少食仍須温軟喫訖須摇動令食消散即不能成脚氣凡衝熱有汗不用洗手面及漱口令人五藏乾枯少津液又冬夏月不用枕冷物石鐵尤損人木枕亦損人縱不損人及少年之時即眼暗也通按此條雖附消渇後不单言消渇也凡病與不病人俱冝遵之後魚肉菜米豆等倣此叙魚肉等一十五件羊肉甚補虚患風及脚氣不用喫偶食即生薑和煮又猪肉兎肉鶉肉牛肉驢馬肉大鯉鮎魚河肫等並禁不可食之鹿肉微冷少喫麞肉温不可炙喫令人消渇乆喫炙肉令人血不行野雞春月以後不堪喫鯽魚長六七寸以上並益人仍不要生喫生乾脯不可喫不消化為蟲叙菜等二十二件凡冬𤓰食之下氣惟脚氣相宜令人寒中不可多喫能下積年藥力甚損人乆服令人虚壊筋骨萵苣令人寒中乆食節骨頭生冷水令人髮鬢白蘭香胡荽芸臺三物不益人也甘菊枸把菜發丹石少喫即温多即冷紫蘇薄荷荏葉水蘇温中益人苜蓿白蒿牛蒡地黄苖甚益人長喫苜蓿雖微冷益人堪久服凡菜皆取熟喫不可生喫損人薤雖葷不同五辛温中補筋骨可食葱調諸候但少喫無妨多食令人虚冷韭從二月以後青稍長煮喫甚補至四月上旬止不可食從七月二十日後即漸堪喫至九月後冷兼有土氣蘿葡消食下痰澼甚宜人生熟喫俱善斜蒿不甚益人亦無損蔓菁作虀令黄堪喫芥發熱動風傷筋骨蒜傷血損藥不可食葵性滑夏不堪食冬曝乾熟時煮用蘿葡作虀下之利大小腸醋鹹並傷筋骨尤須節之不可縱性叙米豆等九件茶酒附之通按少喫任意猶云小任意喫也白米甚益人小豆菉豆白豆並動氣仍下津液少喫任意大豆甚下氣益人久服令人身重蕎麥不可食小麥麪喫之令人動熱不可頻飡之大麥麫甚益人性小冷發癖氣粳米性寒南中温温茶不可多喫熱温煮桑代之酒有熱毒漬地黄丹參大豆即得飲之以上遂是祠部方法亦一家秘寳也外臺秘要巻十一
