body:
  text: 外臺秘要方卷十唐王燾撰肺痿方一十首千金論曰寸口脉數其人病欬口中反有濁唾涎沫出何也師曰此為肺痿之病肺痿之病何從得之師曰病熱在上焦因欬為肺痿或從汗出或從嘔吐或從消渴小便利數或從便難被駃藥下利重亡津液故得肺痿又寸口脉不出而反發汗陽脉早索隂脉不澀三焦踟蹰入而不出身體反冷其内反煩多唾唇燥小便反難此為肺痿傷於津液便如爛􅆶亦如豚腦但坐發汗故也其病欲欬不得欬欬則出亁沫乆乆小便不利甚則脉浮弱肺痿吐涎沫而不欬者其人不渴必遺溺小便數所以然者上虗不能制下故也此為肺中冷必眩師曰肺痿欬唾咽燥欲飲水者自愈自張口者短氣也出第十七卷中仲景傷寒論療肺痿吐涎唾不欬者其人不渇必遺溺小便數所以然者以上虗不能制下故也此為肺冷必眩甘草乾薑湯主之以温其臟方甘草四兩炙乾薑二兩右二味切以水三升煮取一升半分温二服服湯已小温覆之若渇者屬消渇忌海藻菘菜又療肺痿涎唾多心中温温液液者炙甘草湯方甘草四兩炙生薑三兩去皮人參二兩地黄一斤阿膠三兩炙大麻子仁半升大棗四十枚桂心二兩麥門冬半斤去心右九味切以美酒七升水八升相和先煮八味取四升絞去滓内膠上微火烊銷温服七合日三夜一竝出第八卷中肘後療肺痿欬嗽吐涎沫心中温温咽燥而渇者方一云不渇生天門冬𢷬取汁一升酒一升飴糖一斤紫菀末四合右四味合銅器中於湯上煎可丸服如杏仁一丸日三忌鯉魚范汪經心録同出第一卷中集驗療肺痿欬唾涎沫不止咽燥而渇方一云不渇生薑五兩人參三兩甘草二兩炙大棗十二枚擘右四味切以水五升煮取一升半分再服忌海藻菘菜仲景傷寒論備急范汪千金經心録同又療肺痿欬嗽涎沫心中温温咽燥而渇方一云不渇生薑五兩甘草二兩炙大棗十二枚擘右三味切以水五升煮取一升半分再服一方亁薑三兩代生薑忌海藻菘菜文仲千金古今録驗同深師云温脾湯范汪亦同又療肺痿時時寒熱兩頰赤氣急方童子小便每日晩取之去初末少許小便可有五合取上好甘草量病人中指節男左女右長短截之炙令熟破作四片内小便中置於閑浄處露一宿器上横一小刀明日平旦去甘草頓服之每日一劑其童子勿令喫五辛忌海藻菘菜熱麫竝出第四卷中刪繁療虗寒喘鳴多飲逆氣嘔吐半夏肺痿湯方半夏一升湯洗母薑一斤橘皮一斤白术八兩桂心四兩右五味切以水九升煮取三升去滓分温三服忌羊肉餳桃李雀肉生葱一方有桑白皮切一升又療凡虗寒肺痿喘氣亁地黄煎方亁地黄五兩桑根白皮切二升芎藭五兩桂心人參各三兩大麻仁一升炒右六味切以水九升先煮五味取三升去滓内大麻仁煎數沸分三服忌生葱蕪荑竝出第二卷中千金療肺痿涎唾多出心中温温液液甘草湯方甘草二兩炙右一味切以水三升煮取一升半分温三服忌海藻菘菜范汪同又療肺痿吐涎沫桂枝去芍藥加皂莢湯方桂心三兩甘草二兩炙大皂莢一挺去皮子炙生薑三兩大棗十二枚擘右五味切以水七升微火煮取三升分三服忌生葱海藻菘菜范汪經心録同並出第十七卷中肺氣客熱方二首延年百部根飲主肺氣客熱暴傷風寒因嗽不安方百部根一兩半天門冬二兩去心紫菀一兩半貝母亁葛白前橘皮各一兩生薑二兩葱白切三合豉三合右十味切以水六升煮取一升七合去滓分温三服疎數任情亦可分為四服欲間食亦得禁生冷鯉魚蒜出第五卷中古今録驗療肺客熱并肝心家氣人參湯方桂心甘草炙各三両人參亁薑防風各二兩白术一兩半右六味切以水八升煮取三升分三服日三宜温忌桃李雀肉生葱海藻菘菜出第二十一卷中肺熱兼欬方七首刪繁療肺熱氣上欬息奔喘橘皮湯方橘皮杏仁四兩去去皮柴胡麻黄去節各三兩乾蘇葉二兩母薑四兩去尖石膏八兩右七味切以水九升先煮麻黄兩沸除沫下諸藥煮取三升去滓分三服不差再服母薑千金云宿薑千金同出第五卷中千金療肺熱悶不止胷中喘急驚悸客熱來去欲死不堪服藥泄胷中喘氣方桃皮一斗芫花一斗右二味以水四斗煮取一斗去滓以故布手巾内汁中薄胷温四肢不盈數日即歇又凡右手寸口氣口以前脉隂實者手太隂經也病苦肺脹汗出若露上氣喘逆咽中塞如欲嘔狀名肺熱實也又療肺熱實胷慿仰息泄氣除熱湯方枸杞根皮二升白前三兩石膏八兩碎綿褁杏仁三兩去尖皮研橘皮白术各五分赤蜜七合右七味切以水七升煮取二升去滓下蜜更煮兩三沸分三服忌桃李雀肉等又療肺熱言音喘息短氣好唾膿血方生地黄切二升石膏八兩淡竹茹如雞子大一枚杏仁四兩去去皮研羚羊角屑三兩芒硝三兩赤蜜一升麻黄五兩去節升麻三兩右九味以水七升煮取二升去滓下蜜煮兩沸分三服忌蕪荑出第十七卷中延年天門冬煎主肺熱兼欬聲不出方生天門冬汁一升橘皮二兩生地黄汁五升白蜜五合牛酥三合白糖五兩杏仁一升去去皮貝母紫菀通草各三兩百部根白前甘草炙各二兩人參二兩右十四味切以水六升煮貝母等藥取二升五合去滓内天門冬地黄汁煎可减半内酥蜜生薑等煎令可丸稍强取如雞子黄大含嚥之日四五度忌鯉魚蕪荑海藻菘菜等張文仲處又地黄麥門冬煎主肺熱兼欬方生地黄汁三升生麥門冬三升生薑汁一合酥二合白蜜二合右五味先煎地黄麥門冬薑汁等三分可減一分内酥蜜煎如稀􅄳内貝母末八分紫菀末四分攪令調一服一匙日二服夜一服忌蕪荑又天門冬煎主肺間熱欬咽喉塞方天門冬三兩去心麥門冬二兩去心款冬花一兩貝母一兩紫菀二兩茯苓二兩升麻二兩生薑汁三升蜜一升酥一合地黄汁三升右十一味切以水八升煮七物取一升去滓内生薑地黄汁煮取一升内蜜酥於銀器中加湯上煎令成丸一服如彈丸一枚含嚥日夜三五丸忌醋物蕪荑鯉魚等顔仁楚處又羚羊角飲主肺熱胷背痛時時乾欬不能食方羚羊角屑二兩貝母生薑茯苓各三兩橘皮人參芍藥各二兩右七味切以水五升煮取一升八合去滓分温三服每服如人行八九里乆更服禁生冷蒜麪醋並出第五卷中肺虗寒方三首刪繁療肺虗寒癘風所傷聲音嘶塞氣息喘憊欬唾酥蜜膏酒止氣欬通聲方酥崖蜜飴糖生薑汁生百部汁大棗肉研為脂杏仁去皮尖甘皮五其末右八味合和微火煎常攪三上三下約一炊乆薑汁并百部汁各減半停下温清酒一升服方寸匕細細嚥之日夜三千金同出第六卷中千金療肺虗寒癘風傷語音嘶塞氣息喘憊嗽唾方猪􅏬三具大棗一百枚去核好酒五升右三味以酒漬二味秋冬七日春夏三日生布絞去滓二七日服盡忌鹽無猪􅏬以羊􅏬代肘後張文仲備急同出第十八卷中又凡右手寸口氣口以前脉隂虗者手太隂經也病苦少氣不足以息嗌乾不津液病名曰肺虗寒也又療肺虗寒則聲嘶傷語言用力戰掉緩弱虗瘠風入肺防風散方防風獨活芎藭川椒汗黄茋各七分附子炮七分乾薑七分石膏研天雄炮甘草炙山茱茰麻黄去節五味子各六分秦艽桂心山藥杜仲人參防已各五分貫衆二枚紫菀菊花各四分細辛五分當歸五分右二十四味𢷬篩為散酒服方寸匕日再忌海藻菘菜猪肉冷水生葱生菜一方無石膏當歸出第十七卷中肺氣不足口如含霜雪方四首廣濟療肺氣不足寒從背起口如含霜雪語無聲音劇者吐血苦寒五味子湯方五味子三兩大棗五十枚擘桑根白皮一升藁本二兩鍾乳三兩款冬花二兩雞蘇二兩右七味切以水九升煮取三升分温三服每服如人行七八里進一服忌猪魚炙肉熱麪陳臭等物此方甚良又療肺氣不足逆氣胷滿上迫喉咽閉塞短氣連唾相屬寒從背起口如含霜雪語無音聲劇者唾血腥臭或歌或哭乾嘔心煩耳聞風雨聲皮毛悴面白紫菀湯方紫菀五味子生薑合皮切白石英研綿褁欵冬花桂心人參各二兩鍾乳研綿褁麥門冬去心桑根白皮各三兩大棗二十枚擘粳米一合右十二味切水一斗五升先煮桑根白皮粳米取九升去滓内諸藥煎取三升去滓分温三服毎服相去如人行七八里乆忌生葱熱麪炙肉深師千金無紫菀人參並出第二卷中深師療肺氣不足逆滿上氣咽喉中閉塞短氣寒從背起口中如含霜雪語言失聲甚者吐血補肺湯方五味子三兩亁薑二兩欵冬花二兩桂心一尺麥門冬一升去心大棗一百枚擘粳米二合桑根白皮一斤右八味切以水一斗二升先煮棗并桑白皮粳米五沸後内諸藥煮取三升分三服忌生葱千金同出第十八卷中集驗補肺湯療肺氣不足欬逆短氣寒從背起口中如含霜雪語無音聲而渇舌本乾燥方五味子白石英研綿褁鍾乳同上桂心橘皮桑根白皮各三兩粳米二合茯苓竹葉欵冬花紫菀各二兩大􅀥五十枚杏仁五十枚去兩仁去皮蘇子一升生薑五兩麥門冬四兩去心右十六味切以水一斗三升先煮桑白皮􅀥粳米熟去滓内諸藥煮取四升分三服日再夜一忌大酢生葱千金同出第四卷中肺脹上氣方四首五法廣濟療患肺脹氣急欬嗽喘麤眠卧不得極重恐氣欲絶紫菀湯方紫菀六分甘草八分炙㯽榔七枚茯苓八分葶藶子三合炒末湯成下右五味切以水六升煮取二升半絞去滓分温三服每服如人行四五里乆進之以快利為度忌生葱菜熱麪海藻菘菜大醋蒜粘食出第二卷中仲景傷寒論肺脹者欬而上氣煩躁而喘脉浮者以心下有水宜服小青龍湯加石膏主之方麻黄三兩去節五味子半升石膏綿褁乾薑芍藥細辛各三兩桂心甘草各三兩炙半夏半升洗右九味切以水一斗先煮麻黄減二升去上沫内諸藥煮取二升半去滓温服强人一升瘦人及老小以意減之日三夜一忌生葱生菜海藻菘菜羊肉􅄳等又肺脹者病人喘目如脱狀脉浮大也肺脹而欬者越婢加半夏湯主之方大􅀥十五枚擘半夏半升洗生薑三兩麻黄六兩去節甘草二兩炙石膏半斤右六味切以水六升先煮麻黄三二沸去沫内諸藥煮取二升去滓温服八合日三不知更作之忌海藻菘菜羊肉􅄳並出第十八卷中深師療欬而上氣肺脹其脉浮心下有水氣小青龍湯加石膏二兩設若有實者必躁其人常倚伏小青龍湯方用前仲景方千金療肺脹欬嗽上氣咽燥脉浮心下有水麻黄湯方麻黄去節芍藥生薑五兩細辛桂心各三兩半夏半升洗石膏四兩五味子半升右八味切以水一斗煮取三升分三服忌生葱羊肉􅄳生菜集驗同出第十七卷中肺氣積聚方二首救急療肺氣積聚心肋下滿急發即欬逆上氣方麻黄三兩去節杏仁去雙仁去皮紫胡生薑半夏洗十遍葶藶子熬研如脂各四兩亁棗十二枚擘㯽榔十枚右八味切以水一斗煮取二升八合去滓分温三服每服相去如人行八九里乆七日忌食生冷猪魚羊肉此方服一劑訖將息滿七日則服後方忌羊肉􅄳又方茯苓亁蘇莖菜橘皮麻黄各三兩杏仁去尖皮兩仁者柴胡生薑各四兩右七味切以水一斗煮取二升七合去滓分温三服每服如人行八九里乆禁酢物蒜熱麪猪肉五日服一劑並出第六卷中肺癰方九首千金論曰病欬唾其脉數實者屬肺癰虗者屬肺痿欬而口中自有津液舌上胎滑此為浮寒非肺痿也若口中辟辟燥欬即胷中隱隱痛脉反滑數此為肺癰也問曰病者欬逆師脉之何以知此為肺癰當有膿血吐之則死後終吐膿死其脉何類何以别之師曰寸口脉微而數微則為風數則為熱微則汗出數則惡寒風中於衛呼氣不入熱過於榮吸而不出風傷皮毛熱傷血脉風舎於肺其人則欬口亁喘滿咽燥不渴唾而濁沫時時振寒熱之所過血為凝滯蓄結癰膿吐如米粥始萌可救膿已成則難治寸口脉數趺陽脉緊寒熱相摶故振寒而欬趺陽脉浮緩胃氣如經此為肺癰趺陽脉浮緩少隂微緊微為血虗緊為微寒此為䑕乳其病屬肺也問曰振寒發熱寸口脉滑而數其人飲食􅁸居如故此為癰腫病醫反不知而以傷寒治之應不愈也何以知有膿膿之所在何以别知其處師曰假令在胷中者為肺癰其脉數欬唾設膿未成其脉自緊數緊去但數膿為已成也出第十七卷中仲景傷寒論欬胷中滿而振寒脉數咽亁不渇時出濁唾腥臭乆乆吐膿如粳米粥者肺癰也桔梗白散主之方桔梗三分貝母三分巴豆一分去皮心熬研作脂右三味𢷬篩强人飲服半錢匕羸人減之若病在膈上者必吐膈下者必利若利不止者飲冷水一杯則定忌猪肉蘆笋等出第十八卷中集驗療胷中滿而振寒脉數咽燥而不渇時時出濁唾腥臭乆乆吐膿如粳米粥是為肺癰桔梗湯方桔梗二兩千金古今方云用一兩甘草二兩炙右二味切以水三升煮取一升分再服朝暮吐膿血則差張文仲千金備急古今録驗范汪同此本仲景傷寒論方出第四卷中千金療欬有微熱煩滿胷心甲錯是為肺癰黄昏湯方黄昏手掌大一枚即合歡木皮右一味切以水三升煮得一升分再服范汪同又肺癰喘不得卧葶藶大􅀥瀉肺湯主之兼療胷脇脹滿一身面目浮腫鼻塞清涕出不聞香臭酸辛欬逆上氣喘鳴迫塞方葶藶三熬令色紫右一味𢷬令可丸以水三升煮擘大􅀥二十枚得汁二升内藥如彈丸一枚煎取一升頓服古今録驗刪繁仲景傷寒論范汪同並出第十七卷中備急療腸癰肺癰方升麻白歛漏蘆芒硝各一兩黄芩枳實炙連翹蛇銜各三兩梔子二十枚擘蒴藋根四兩右十味𢷬令細以水三升漬經半日以猪脂五升煎令水竭去滓傳之日三若交急合水煎出第四卷中古今録驗療肺癕方薏苡仁一升醇苦酒三升右二味煮取一升温令頓服有膿血當吐范汪經心録同又療肺癰葦莖湯方剉葦一升薏苡仁半升桃仁五十枚去尖皮兩仁者𤓰瓣半升右四味㕮咀以水一斗先煮葦令得五升去滓悉内諸藥煮取二升分再服當吐如膿仲景傷寒論云葦葉切二升千金范汪同千金云葦莖二升先以水二斗煮五升又療肺癰經時不差桔梗湯方桔梗三升白术二兩當歸一兩地黄二兩甘草炙敗醤薏苡仁各二兩桑白皮一升切右八味切以水一斗五升煮大豆四升取七升汁去豆内清酒三升合諸藥煮之取三升去滓服六合日三夜再忌猪肉蕪荑桃李雀肉海藻菘菜等又療肺癰生地黄汁湯方生地黄汁一升當歸甘草炙白石英綿褁人參各一兩附子二分炮白小豆三十顆白雞一頭男用雌女用雄療如食法一作雉右八味切以水一斗五升煮雞取七升汁去滓内地黄汁諸藥等煮取三升去滓分服六合日三夜二忌蕪荑海藻菘菜冷水猪肉等並出第二十一卷中大腸論二首千金論曰大腸腑者主肺也鼻柱中央以為候也肺所以合氣於大腸者大腸為行道傳瀉之腑也號監倉掾重二斤十二兩長一丈二尺廣六寸臍右廻疊積還反十二曲貯水穀一斗二升主十二時定血脉和利精神又曰肺前受病移於大腸肺欬不已則大腸受之大腸欬則遺失便利肺應皮皮厚即大腸厚皮薄即大腸薄皮緩腹褁大者大腸緩而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結刪繁同又扁鵲云大腸絶不療何以知之洩痢無度痢絶則死實即腸熱熱則脹滿不通口為生瘡食下入腸則腸實而胃虚下胃則胃實而腸虚所以實而不滿乍實乍虚乍來乍去虚則傷寒寒則腸中雷鳴洩青白之痢而發於氣水根在大腸大腸有寒鶩溏有熱便腸垢大腸有宿食寒慄發熱有時如瘧狀大腸病者腸中切痛而鳴濯濯冬日重感於寒則洩當臍而痛不能乆立與胃同候腸中雷鳴氣上衝胷喘不能乆立邪在大腸也大腸脹鳴而痛腸寒即洩食不化出第十八卷中大腸熱實方三首千金凡右手寸口氣口以前脉陽實者手陽明經也病苦腸滿善喘欬面赤身熱喉咽中如核狀名曰大腸實熱也又療大腸實熱腹脹不通口為生瘡生薑洩腸湯方生薑橘皮青竹茹白术黄芩梔子各三兩桂心一兩生地黄十兩茯苓芒硝各二兩大􅀥十四枚擘右十一味切以水七升煮取三升去滓下芒硝分三服忌生葱蕪荑海藻菘菜醋物桃李雀肉等出第十八卷中刪繁療肺脉厥逆大於寸口主大腸熱欬上氣喘鳴心煩麻黄湯方麻黄六兩去節芍藥生薑半夏洗十遍細辛五味子各三兩桂心二兩石膏八兩右八味切以水九升先煮麻黄七八沸去沫次下諸藥煎取三升去滓分三服忌羊肉􅄳生葱生菜等又療大腸熱甚脅滿掌中熱淡竹葉飲泄熱氣方淡竹葉切三升橘皮三兩亁蘇葉三兩白术四兩甘草一兩炙葱白切一升桂心一兩石膏六兩碎杏仁六十枚去皮尖熬右九味切以水一斗二升先煮竹葉取一斗去滓澄清取九升下諸藥煮取三升絞去滓分三服若須利下内芒硝三兩忌海藻菘菜桃李雀肉生葱並出第二卷中大腸虚寒方三首千金凡右手寸口氣口以前脉陽虚者手陽明經也病苦胷中喘腸鳴虚渴脣亁目急善驚泄白名曰大腸虚寒也又療大腸虚寒痢下青白腸中雷鳴相逐黄連補湯方黄連四兩茯苓四兩醋石榴皮四枚芎藭三兩地榆五兩伏龍肝如雞子大一枚右六味切以水七升煮五味取二升五合去滓下伏龍肝屑攪調分三服忌猪肉冷水火醋出第十八卷中刪繁療大腸虚寒欠呿欬氣短少腹中痛款冬花丸方款冬花七分桂心五味子各六分亁薑芎藭甘草炙各五分附子四分炮桔梗四分蘇子五合熬蜀椒一升百部汁七合白蜜一升乾􅀥五十枚去皮薑汁一升右十四味細𢷬為末將薑蜜汁和微火上煎取為丸如梧子每服温酒下三十丸加至四十丸日再忌海藻菘菜猪肉冷水生葱出第二卷中皮虚實方二首刪繁論曰夫五藏六腑者内應骨髓外合皮毛膚肉若病從外生則皮毛膚肉闗格强急若病從内發則骨髓疼痛然隂陽表裏外皮内髓其病源不可不詳之也皮虚者寒皮實者熱凡皮虚實之應主于肺大腸其病發於皮毛熱即應藏寒即應腑十金同出第三卷中千金療皮虚主大腸病寒氣闗格蒴藋蒸湯方蒴藋根葉切三升桃皮葉剉三升菖蒲葉剉三升細糠一斗秫米五升右五味以水一石五斗煮取米熟為度大盆器貯於上作小竹牀子罩盆人身坐牀中四面周廻將席薦障風身上以衣被蓋覆若氣急時開孔對口洩氣取通身接汗可作兩食乆許如此三日若盆裏不過熱盆下安炭火也非惟療寒但是皮膚下一切勞冷並皆療之忌羊肉􅄳刪繁同又療皮實主肺病熱氣梔子煎方梔子枳實炙大青杏仁去兩仁尖皮柴胡芒硝各三兩生地黄切一升石膏八兩淡竹葉切一升生𤣥參五兩右十味切以水九升煮取三升下芒硝分三服忌蕪荑刪繁同並出第十八卷中上氣方九首廣濟療上氣方葶藶子五合熬紫色别擣如泥桑根白皮切大棗二十枚擘右三味以水四升煮取一升絞去滓内葶藶子泥如􅀥大煮之三分減一頓服以快利為度忌如藥法出第二卷中肘後主上氣方灸從大椎數下行第五節下第六節上空間即灸一處隨年壯秘方深師千金翼文仲同出第三卷中千金療上氣方上酥一升獨頭蒜五顆去皮先以酥煎蒜蒜黄出之生薑汁二合右三味同煎使熟空腹服一寸匕温服之忌熱麪又方芥子三升右一味末之蜜和為丸寅時井華水服如梧子七丸日二服散亦佳禁如藥法尢忌油麪等並出第十七卷中必効療上氣方半夏洗茯苓各四兩橘皮白术各三兩生薑五兩㯽榔十顆右六味切以水一斗漬一宿煮取二升七合分三服更加甘草三兩人參二兩前胡二兩紫蘇一兩忌羊肉􅄳桃李雀肉醋物出第一卷中古今錄驗温中湯療上氣方甘草三兩炙桂心四兩生薑一斤右三味切以水七升半煎取三升分五服忌生葱海藻菘菜又昆布丸療胷滿上氣方大黄硝石海藻洗水銀各一兩昆布三兩洗苦瓠瓣四十枚葶藶半升熬通草二分桃仁五十枚熬右九味𢷬篩以蜜和為丸如梧子許先食服三丸日再服又已試鯉魚湯療上氣方杏仁熬貝母桂心各三兩橘皮人參甘草炙厚朴炙麻黄去節茯苓胡麻白前各二兩鯉魚五斤生薑六兩半夏五兩洗右十四味切先以水二斗煮魚得一斗二升去魚内藥煎取三升二合分四服日三夜一忌海藻菘菜醋物羊肉􅄳生葱等物又上氣二物散本司馬大將軍方麻黄一斤去節杏仁一百枚右藥各别𢷬合和下篩為散上氣發時服方寸匕可至三方寸匕以氣下為候不必常服深師療上氣兼欬范汪同並出第十九卷中卒上氣方六首深師療卒上氣胷心滿塞半夏蘇子湯方半夏五兩洗蘇子一升生薑五兩大􅀥四十枚擘橘皮桂心各三兩甘草二兩右七味切水七升煮取二升七合分三服氣即下忌海藻菘菜羊肉􅄳生葱又療卒急上氣胷心滿竹篠下氣湯方生甘竹篠一虎口石膏一兩生薑橘皮各三兩甘草三兩炙右五味切以水七升煮竹篠取四升半去滓内諸藥煮取二升分二服此方療忽上氣不止者服兩三劑差忌海藻菘菜並出第十八卷中備急葛氏療卒上氣鳴息便欲絶方桑根白皮切三升生薑切半升吳茱茰半升右三味切以酒五升煮三沸去滓盡令服之入口則愈千金秘方又方麻黄去節甘草炙各二兩右二味切以水三升煮取一升半分三服古今録驗用水八升煮取三升八合忌海藻菘菜差後欲令不發者更取二味并熬杏仁五十枚𢷬篩蜜和丸服四五丸日三文仲肘後范汪同又療卒上氣氣不復報肩息方乾薑三兩㕮咀右一味以酒一斗漬服一升日三服又方麻黄三兩去節桂心甘草炙各一兩杏仁如法製右四味切以水六升煮取二升分三服此二方名小投杯湯有氣疾者亦可為散將服之冷多加乾薑三兩淡唾者加半夏三兩忌海藻菘菜生葱出第三卷中乆上氣方四首千金療積年上氣不差垂死者方莨菪子熬令色變熟羊肺薄切暴乾為末右二味各别𢷬等分以七月七日神酢拌令相著夜不食空肚服二方寸匕須􅁷拾針兩食間以冷漿白粥二口止之隔日一服永差三十日内得煮飯汁作蕪菁羮食之以外一切禁斷文仲肘後同又療上氣三十年不差方大棗一百枚去核皮豉一百二十顆杏仁一百粒椒二百粒汗右四味先𢷬杏仁令極熟後内棗椒豉更𢷬作丸如棗核大含稍稍嚥之日三夜並出第十七卷中近効療乆上氣氣急卧不得方紫蘇葉二兩生薑麻黄去節杏仁各三兩赤茯苓桑根白皮葶藶子各二兩熬橘皮一兩半右八味切以水八升先煮麻黄去沫下諸藥和煮取二升七合絞去滓分三服每服如人行七八里乆温服之畢服後丸又丸方葶藶子六兩熬令紫色右一味𢷬如泥丸如梧子大每食後以棗飲下十丸日二服亁􅀥十顆擘辟以水一升煮取五合去滓用下丸甚効上氣胷滿方二首古今録驗胡椒丸療欬上氣胷滿時復嘔沫方胡椒蓽撥乾薑各三兩白术二兩桂心髙良薑人參欵冬花紫菀甘草炙各二兩右十味𢷬篩蜜和丸如梧子一服五丸日二服不知増之以知為度忌生冷醋滑猪魚肉蒜桃李雀肉生葱海藻菘菜出第十九卷中救急茯苓人參散療上氣胷脅滿悶益心力除謬忘永不霍亂能飲食此方功力諸藥不逮有人年四十時因患積痢羸憊不能起止形狀如七十老人服此藥兩劑平復如舊乆服延年益夀方茯苓二斤去黑皮擘破如􅀥大清水漬經一日一夜再易水出於日中曝乾為末人參七兩𢷬甘草一兩炙切白沙蜜一升五合牛乳七升右五味以水五升内甘草煮取二升除甘草澄濾内茯苓緩火煎令汁欲盡次内白蜜牛乳次内人參緩火煎令汁盡仍攪藥令調勿許焦成日中曝乾𢷬篩為散以紙盛之温乳及蜜湯和喫並得亦不限多少夏月水和當麨忌海藻菘菜大醋並是大斗大升大秤兩也此方極驗合數劑立効出第六卷中上氣欬身面腫滿方四首崔氏療肺熱而欬上氣喘急不得坐卧身面腫不下食消腫下氣止欬立驗方葶藶子二十分熬貝母六分杏仁十二分炮紫菀六分茯苓五味子各六分人參八兩桑白皮八兩右八味𢷬篩蜜和丸如梧子一服十丸日二服甚者夜一服漸漸加至二三十丸煮􅀥汁送之若腥氣盛者宜服此藥若小便不利者宜服後方忌酢物又方葶藶子二十分熬杏仁十二分牽牛子八分熬茯苓六分右四味𢷬篩蜜和為丸如梧子許每服八丸日再夜一漸漸加至二十丸煮棗汁送之大忌醋物又療上氣欬嗽長引氣不得卧或水腫或遍體氣腫或單面腫或足腫並主之方葶藶子三升㣲熬右一味𢷬篩為散以清酒五升漬之春夏三日秋冬七日初服如胡桃許大日三夜一冬日二夜二量其氣力取微利為度如患急困者不得待日滿亦可以綿細絞即服其葶藶單莖向上葉端兩角角麤且短又有一種苟芥草葉近根下作歧生角細長採時必須分别前件六種病狀發動各不同始終至困並歸於水但人腹内有塊及兩邊皆有者或當心有塊稍肚大者並是水病即此藥必須得好新熟無灰酒清者始可用經日多者惡不堪用前件病皆是熱服藥唯須慎酒麪生冷雞猪魚肉大困及不得卧入口則定老少任意量力必須好差平復始可停藥此方神驗服藥如傷多悶亂者作土漿飲即定並出第六卷中必効療上氣欬嗽腹滿體腫方取楸葉三升右一味煮三十沸去滓煎堪作丸如小􅀥子以竹筒内下部立愈出第一卷中上氣喉中水雞鳴方一十二首深師療乆逆上氣胷滿喉中如水雞鳴投杯湯方小麥一升麻黄四兩去節厚朴五兩石膏如雞子杏仁五合右五味以水一斗煮取小麥熟去麥内藥煮取三升分三服欬嗽甚者加五味子半夏洗各半升亁薑三累經用甚良又療上氣脉浮欬逆咽喉中水雞鳴喘息不通呼吸欲死麻黄湯方麻黄八兩去節射干二兩甘草四兩炙大􅀥三十顆右四味切以水一斗先煮麻黄三沸去上沫内諸藥煮取三升分三服已用甚良忌海藻菘菜等又療欬逆上氣胷中塞不得息卧不安席牽繩而起咽中如水雞聲投杯湯方款冬花二十分杏仁四十顆甘草一兩炙大􅀥二十顆桂心二兩麻黄四兩去節生薑半夏洗各三兩紫菀細辛各一兩右十味切以水八升煮取二升頓服之一方分再服卧令汗出食粥數口勿飽食神良忌海藻菘菜羊肉􅄳生葱生菜又療欬逆上氣燥嗽冷嗽晝夜甚喉中水雞鳴鍾乳丸方鍾乳人參桂心乾薑各八分附子炮款冬花細辛各六兩紫菀十分杏仁四分右九味𢷬篩蜜和酒服如小豆二丸日三不知稍稍加之忌猪肉冷水生葱生菜等物又療上氣欬嗽喉中水雞鳴唾膿血腥臭麻黄湯方麻黄六兩去節桂心一兩甘草炙杏仁去尖皮各二兩生薑八兩一方用乾薑三兩右五味切以水七升煮取三升半分五服巳用療欬唾膿血喉中腥臭得力後長將丸服忌海藻菘菜生葱又療乆欬上氣喉中鳴晝夜不得卧貝母散方貝母三兩麻黄去節乾薑各二兩桂心甘草炙各一兩右五味𢷬篩平旦酒服方寸匕日二不知増之至二匕大劇可至再服酒隨飲多少忌海藻菘菜生葱等又療乆欬逆上氣體腫短氣脹滿晝夜倚壁不得卧喉常作水雞鳴白前湯方白前二兩紫菀半夏洗各三兩大㦸切七合右四味切先以水一斗漬之一宿明旦煮取三升分三服忌羊肉􅄳此方四味千金方見水腫欬上氣中千金古今録驗同並出第十八卷中小品療欬逆喉中如水雞聲貝母湯方貝母甘草炙各二兩麻黄去節桂心各四兩半夏洗乾薑各三兩杏仁七十枚右七味切以水二斗三升先煮麻黄得十沸内藥煮取三升温服七合日三忌海藻菘菜生葱羊肉􅄳古今録驗同又療欬而上氣咽中如水雞聲射干麻黄湯方射干十二枚麻黄去節生薑各四兩紫菀三兩欵冬花三兩細辛三兩五味子半升半夏八枚洗大􅀥七枚右九味切以東流水一斗二升煮取三升分三服忌羊肉􅄳生菜此本仲景傷寒論方千金古今録驗同並出第一卷中必効療病喘息氣急喉中如水雞聲者無問年月逺近方肥皂莢兩挺好酥一兩右二味於火上炙去火髙一尺許以酥細細塗之數翻覆令得所酥盡止以刀輕刮去黒皮然後破之去子皮筋脉𢷬篩蜜和為丸每日食後服一丸如熟豆日一服訖取一行微利如不利時細細量加以微利為度日止一服忌如藥法出第一卷中古今録驗沃雪湯療上氣不得息卧喉中如水雞聲氣欲絶方麻黄四兩去節細辛二兩五味子半升桂心乾薑各一兩半夏八枚洗去滑一方四兩右六味切以水一斗煮取三升絞去滓適寒温服一升投杯則卧一名投杯麻黄湯令人汗出不得卧勿怪亦可從五合不知稍増日再凡煮麻黄先煎二沸去上沫又内餘藥忌生葱生菜羊肉􅄳集驗經心録范汪同又投杯湯療乆欬嗽上氣胷中寒冷不得息食卧不安席每牽繩而起咽中如水雞聲方欵冬花四十顆細辛一兩紫菀三兩甘草炙桂心麻黄去節乾薑各二兩五味子半升杏仁四十枚半夏半升洗右十味切以水八升煮取二升分再服卧汗出即愈忌海藻菘菜生葱生菜羊肉􅄳並出第九卷中因食飲水上氣方四首古今録驗宫泰説李將軍兒得病喘息甚難并數上氣呼吸療之不差遂亡本由食餅後乃飲水得之服五味湯不差此軰皆死是後乃有婢得之行極而渴飲水多此為所發起同與五味湯亦不差然後小差泰因此與三物備急藥半錢吐下得差由此思惟病之所由以冷水入肺及入腸寒熱不消化結聚逼迫於胃口故令其呼吸乏氣息不得下過謂喘而上氣息數也宜吐下之亦可與三物瓜蔕散吐之三味備急散本療卒死感忤宫泰以療人卒上氣呼吸氣不得下喘逆差後已為常用方巴豆乾薑大黄右藥等分巴豆小熬去心皮合𢷬下篩服半錢匕得吐下則愈忌野猪肉蘆笋范汪同又三味吐散宫泰以療上氣呼吸喘逆方瓜蔕三分杜蘅三分人參一分右藥𢷬篩為散以温湯服一錢匕老小半之范汪同並出第十九卷中肘後療大走馬奔走喘乏便飲冷水冷飲因得上氣發熱方竹葉三斤橘皮三兩切右二味以水一斗半煮取三升去滓分為三服三日服一劑良集驗用竹葉三兩文仲備急范汪等同又方葶藶子一兩熬𢷬乾􅀥四十顆右二味以水三升先煮􅀥取一升内葶藶子煎取五合大人分一二服小兒分三四服並出第一卷中卒短氣方四首肘後卒短氣方𢷬韭取汁服一升立愈文仲備急千金同出第一卷中千金療卒短氣方枸杞葉二兩生薑二兩切右二味以水三升煮取一升頓服之又方生薑五兩切小麥一升右二味以水七升煮取一升頓服之又方紫蘇莖葉切一升大􅀥二七枚右二味以酒三升煮取一升半分再服水亦得又方加橘皮半兩並出第十七卷中上氣及氣逆急牽繩不得卧方八首廣濟療肺氣痰上氣急及欬方柴胡五兩五味子橘皮紫菀貝母杏仁各三兩麻黄四兩去節甘草炙黄芩各二兩右九味細切𢷬令極碎每服取麥門冬一兩去心生薑半兩切竹葉一兩半以水二升五合先煮麥門冬生薑竹葉有一升五合内散二兩煎取一升二合絞去滓分二服平旦空肚服之一服日晩食消後服之每日作一劑忌油麪猪犬肉小豆粘滑酸鹹海藻菘菜出第三卷中肘後療欬上氣喘息便欲絶方末人參服之方寸匕日五六出第一卷中深師療上氣及諸逆氣神驗白前湯方白前五兩紫菀杏仁厚朴炙各三兩半夏洗麻黄去節各四兩生薑一斤一方用八兩人參桂心各二兩甘草一兩炙大􅀥十四枚右十一味切以水八升煮取二升半分三服良忌海藻菘菜羊肉生葱􅄳又療肺氣不足欬嗽上氣牽繩而坐吐沫唾血不能食飲補肺溢湯方蘇子一升桑白皮五兩半夏六兩洗紫菀人參甘草炙麻黄去節五味子乾薑杏仁去皮尖各一兩細辛一兩半桂心三兩欵冬花一兩射干一兩右十四味切以水一斗二升煮取三升分五服日三夜再忌海藻菘菜羊肉􅄳生葱生菜千金同又療諸欬病上氣胷滿晝夜不得卧困篤鍾乳丸方鍾乳八分乾薑六分欵冬花細辛桑白皮半夏洗各四分貝母附子炮各五分蜀椒三分汗芎藭四分紫菀八分杏仁三分右十二味𢷬篩蜜和服如大豆二丸日三忌冷食猪羊肉􅄳生菜並出第十八卷中千金療上氣不得卧神秘方橘皮生薑紫蘇人參五味子各三兩右五味切以水七升煮取三升分三服一方有桔梗無五味子出第十七卷中古今録驗療積病後暴上氣困篤投杯湯方石膏四兩碎甘草二兩炙五味子三兩大􅀥二十枚人參桂心半夏冼杏仁各二兩麻黄三兩去節生薑四兩右十味切以水一斗煮取三升一服六合日三夜一忌羊肉􅄳海藻菘菜生葱等又療上氣呼吸牽繩肩息欲死覆杯湯方麻黄四兩去節甘草炙乾薑桂心貝母各二兩右五味切以水八升煮取二升分再服則愈有人先有風患兼有石熱取冷當風飲酒房室體虚末春因天行病至夏中差尚虚有風熱未除兼藥石勢過傷於胃氣因腹脹堅如石氣息不利因自下後變四肢腫遊走無定小便不通積服利藥忽吐逆不下食變噦至掣動百脉狀如嘘唏積日乃變上氣服此方加杏仁二兩與兩劑上氣得止忌海藻生菜菘菜范汪經心録同出第十九卷中欬嗽上氣方七首病源欬嗽上氣者肺氣有餘也肺感於寒微則成欬嗽肺主氣氣有餘則喘欬上氣此為邪摶於氣氣擁滯不得宣發是為有餘故欬嗽而上氣也其狀喘欬上氣多涕唾面目浮腫則氣逆也出第十四卷中深師療上氣欬嗽蘇子煎方蘇子二升生薑汁二升白蜜二升杏仁二升生地黄汁二升右五味𢷬蘇子以地黄薑汁澆之絹絞取汁更𢷬以汁澆復絞如此六七過令味盡去滓熬杏仁令黄黒𢷬令如脂又以向汁澆之絹絞取汁徃來六七過令味盡去滓内蜜和置銅器中於重湯中煎之令如飴煎成一服方寸匕日三夜一忌蕪荑千金同又療欬嗽上氣射干煎方射干八兩紫菀半兩膠飴五兩細辛半兩乾薑五兩末生竹瀝一升芫花根半兩桑根白皮欵冬花各八兩附子半兩甘草半兩炙白蜜一升半右十二味先切射干合蜜竹瀝汁煎五六沸絞去滓㕮咀諸藥以水一升四合漬一宿煎之七上七下去滓乃合飴薑末煎令如餔服酸􅀥一丸許日三夜一不知稍増之忌海藻菘菜猪肉冷水生菜千金同又療欬上氣中寒冷鼻中不利杏仁煎方杏仁五兩五味子三合甘草四兩炙麻黄一斤去節欵冬花三合紫菀乾薑各三兩桂心四兩右八味切以水一斗煮麻黄減二升掠去沫乃内諸藥煮取四升絞去滓又内膠飴半斤白蜜一斤合内汁中攪令相得湯中煎如飴成先食服如半􅀥日三不知稍加之忌海藻菘菜生葱千金同出第十八卷中崔氏療上氣暴欬方紫蘇莖葉二升大豆一升右二味以水四升煮大豆次下紫蘇煮取一升五合分為三服晝二夜一忌醋鮓鹹酸油膩等出第六卷中必効主上氣腹脹心胷滿并欬不能食方段明府云極効枇杷葉一握去毛炙㯽榔三七顆生薑二分髙良薑二兩蜜二合酥二合右六味切以水二大升煮取一大升湯成後内酥蜜更煮三五沸分温三服每服如人行八九里乆甚重者三兩劑任意食之出第一卷中救急療上氣欬肺氣胷痛方杏仁三大升白蜜一大升牛酥二大升右三味杏仁𢷬碎於瓷盆中研取汁五升浄磨銅鐺勿令脂膩先傾三升汁於鐺中刻木記其深淺又傾二升汁以緩火煎減至於所記處即内白蜜及酥還至木記處藥乃成貯不津瓷器中每日三度以煖酒服一大匙不能飲酒和粥服亦得服一七日唾色變白二七日唾稀三七日欬斷此方非但療欬兼補虚損去風冷兼悦肌膚白如瓠婦人服之更佳延年秘録同出第六卷中古今録驗療上氣兼欬蘇子湯方蘇子一升五味子五合麻黄去節細辛紫菀黄芩甘草炙各二兩人參桂心當歸各一兩半夏三兩洗生薑五兩右十二味切以水九升煮取三升分二服上氣病亦特單煮蘇子及生蘇葉冬天煮乾枝莖葉亦佳忌海藻菘菜羊肉􅄳生葱生菜出第十九卷中欬逆上氣嘔吐方四首病源五藏皆禀氣於肺肺感微寒則成欬嗽也寒摶於氣氣聚還肺而邪有動息邪動則氣奔逆上氣上則五藏傷動動於胃氣者則胃氣逆而嘔吐也此是肺欬連滯氣動於胃而嘔吐者也又有季夏脾王之時而脾氣虚不能王有寒氣傷之而欬嗽者謂之脾欬其狀欬則右脅下痛隂隂引膊背甚則不可動動則欬發脾與胃合脾欬不已則胃受之其狀欬嗽而嘔嘔甚則長蟲出是也凡諸欬嗽甚則嘔吐各隨證候知其腑藏也出第十四卷中深師療欬嗽上氣喉咽中腥臭虚氣攪心頭痛眼疼耳中嘈嘈風邪毒注天行食不生肌胷中隔塞嘔逆多唾惡心心下堅滿飲多食少療疰并淋通氣丸方膠飴五斤蜀椒二升汗烏頭七分炮桂心六分大附子五枚炮乾薑人參各四分杏仁一升天門冬十分蜈蚣五節去頭炙右十味末之𢷬杏仁作膏稍稍内藥末𢷬千過烊膠飴乃内藥中攪令調和合如半􅀥一枚日六七夜二三服令胷中温為度若夢與鬼神交通及飲食者全用蜈蚣食不消者加杏仁五合有虚氣少腹急腰痛加天門冬杜仲有風加烏頭二枚附子一枚立夏後勿加也有留飲加葶藶子一兩熬末之忌猪肉冷水生葱鯉魚等物千金同又療上氣欬逆口乾手足寒心煩滿積聚下利嘔逆若墜瘀血上氣胷脅脹滿少氣腸鳴飽食傷中裏急婦人乳飲滯下有邪濕隂不足大小便不利肢節皆痛硝石丸方硝石一升乾薑前胡大黄各一斤杏仁一升右五味𢷬篩蜜和飲服如梧子三丸日再五日後心腹諸疾隨大小便去月經絶則通下長蟲數十亦利血及冷熱赤白汁癥瘕毒悉主之藥利以意消息又療上氣煩悶嘔逆不得飲食厚朴湯方厚朴一兩炙人參一兩半夏四兩洗生薑八兩茯苓甘草炙橘皮桂心各二兩枳實二兩炙右九味切以水八升煮取三升分三服忌海藻菘菜羊肉􅄳生葱醋物並出第十八卷中必効療上氣欬嗽嘔逆不下食氣上方橘皮紫菀各三兩人參茯苓柴胡杏仁去去皮右六味切以水六升煮取二升分為三服患冷加生薑二兩患熱加麥門冬三兩去心不能食加白术二兩厚朴二兩炙忌醋物桃李雀肉等出第一卷中上氣欬嗽多唾方三首廣濟療上氣肺熱欬嗽多涕唾方白前四分生麥門冬十分去心貝母石膏甘草炙五味子生薑各四分黄芩五分杏仁四十顆淡竹葉切一升白蜜一匙右十一味切以水七升煮取二升七合絞去滓内白蜜更上火煎三沸分温三服每服如人行五六里須利三兩行湯成後宜加芒硝八分忌熱麪炙肉油膩醋食海藻菘菜出第二卷中古今錄驗小紫菀丸療上氣夜欬逆多唾濁方乾薑甘皮一作甘草細辛欵冬花各三分紫菀三分附子二枚炮右六味擣篩以蜜和為丸如梧子先食服三丸日再以知為度忌冷水猪肉生菜等物又療欬氣上多涕唾杏仁煎方出徐王杏仁一升右一味擣碎研取大升三升汁以水和研之煎取一大升酒服一匙日三忌猪雞魚肉胡荽等物並出第十九卷中上氣欬方一首古今録驗療欬逆上氣胷滿多唾太醫令王叔和所撰已更御服甚良効方乾薑三分礜石一分泥裹燒丰日蜀椒五分汁細辛二分烏頭一分炮去皮杏仁一分吳茱茰四分洗菖蒲一分紫菀二分皂莢一分去皮子炙欵冬花三分麻黄四分去節右十二味𢷬篩蜜和丸如梧子夜卧吞一丸日二不知加之療二十年欬不過二十丸便愈御藥也秘在石室不傳忌猪羊肉􅄳生菜冷水一方有桂心三分無麻黄千金同出第十九卷中乆欬嗽上氣方三首肘後療乆欬上氣十年二十年諸藥療不差者方猪胰三具乾􅀥一百顆右二味以酒三升漬數日服二三合至四五服愈服盡此則差千金同出第三卷中深師療乆上氣欬麻黄散方司馬太𫝊欬常將此服愈麻黄一斤去節杏仁一百枚甘草二兩炙桂心一兩右四味𢷬篩别𢷬杏仁如脂内諸末合令調臨氣上發時服方寸匕氣下止食頃氣不下更服一匕可至三匕氣發便服即止忌海藻菘菜生葱千金古今録驗同又療乆上氣欬亦療傷寒後欬嗽方甘草二兩炙大棗二十枚右二味以水七升煮取二升分再服數用驗忌海藻菘菜等古今録驗名温脾湯並出第八卷中欬逆上氣方五首病源肺虚感微寒而成欬欬而氣還聚於肺肺則脹是為欬逆也邪氣與正氣相摶正氣不得宣通但逆上喉咽之間邪伏則氣靜邪動則氣奔上煩悶欲絶故謂之欬逆上氣出第十四卷中深師療欬逆上氣支滿息欲絶氣結於胷中心煩躁不安一合湯方芫花二分熬桂心乾薑各五分甘草炙細辛各四分蕘花二分右六味切以水三升煮取一升先食服一合日三夜一又云合湯亦得分六七服一日盡便愈一方有菖蒲四分無蕘花忌海藻菘菜生葱生菜等又療欬逆上氣腹中有堅痞徃來寒熱令人羸瘦不能飲食或時下痢此服中如絞在臍上下闗疝氣上腸使然為病有氣涌逆蜀椒散方蜀椒五合去目并閉口者汗桂心甘草各一兩炙通草半夏洗各三兩右五味𢷬篩飲服方寸匕日三夜一忌海藻菘菜羊肉􅄳生葱並出第十八卷中古今録驗麥門冬丸主氣逆上氣方乾薑六分麥門冬十分去心昆布洗海藻洗各六分細辛海蛤蜀椒熬桂心各四分右八味𢷬篩蜜和丸如梧子以飲服十丸漸加至二十丸日三有人患風虚得冷輙胷中上氣喉中常如吹管聲欬嗽唾清沫將此丸服得差若散服方寸匕日三忌生葱生菜經心錄同又鯉魚湯療欬逆上氣喉中不利方生鯉魚一尾熟艾二升白蜜一升紫菀牡蠣各四兩熬欵冬花一升杏仁二十枚豉半升射干二兩細辛三兩飴八兩菖蒲二兩右十二味㕮咀藥和内魚腹中置銅器中蒸之五斗米飯下藥成服一升日三夜一忌生菜羊肉􅄳等又杏仁煎療欬逆上氣方杏仁一升石斛乾薑各四兩桂心甘草炙麻黄去節各五兩五味子欵冬花紫菀各三兩右九味𢷬八味下篩以水一斗先煮麻黄取八升去滓内藥末膠飴半斤蜜一升攪令相得未食服如棗大一枚日三忌生葱海藻菘菜等並出第二十九卷中雜療上氣欬嗽方四首廣濟療上氣欬嗽兼水氣癖氣方葶藶子熬貝母桔梗鼈甲炙防葵各六分白术茯苓大㦸枳實炙紫菀旋復花杏仁橘皮各四分芫花二分大黄十分皂莢一分炙去皮子右十六味𢷬篩蜜和為丸空腹以飲服如梧子五丸日二服漸漸加至十丸以微利為度忌桃李雀肉莧菜醋物猪肉陳臭等出第二卷中深師療上氣搶心胷奄奄不得息腹中脹滿食輙吐蘇子湯方蘇子一升大棗三十顆半夏三兩洗橘皮生薑桂心各一兩蜀椒二分汗右七味切以水七升煮取二升分三服忌羊肉􅄳生葱出第十八卷中古今録驗半夏湯療上氣五藏閉塞不得飲食胷中脅下支脹乍去乍來虚氣結於心中伏氣住胃管脣乾口燥肢體動摇手足疼冷夢寐若見人怖懼此五藏虚乏諸勞氣不足所致并療婦人方當歸防風黄茋各二兩柴胡半斤細辛麻黄去節人參各一兩杏仁五十粒桂心三兩半夏一升洗大棗二十枚生薑五兩黄芩一兩右十三味切以水一斗先煮麻黄一沸去上沫更入水一升及諸藥煮取五升分為五服日三夜二忌羊肉生葱生菜􅄳等出第十九卷中近効療上氣腹内脹滿飲食不消欲作霍亂及欬嗽紫蘇子丸方紫蘇子橘皮各二兩髙良薑桂心人參各一兩右五味𢷬篩蜜和為丸每服十五丸酒飲任下若食𤓰膾等物有生熟氣擬似霍亂者即半棗栗許大細細嚥取汁令消盡應時立愈常有此藥永不患霍亂甚神効也忌生葱猪肉陳臭等物外臺秘要方卷十
