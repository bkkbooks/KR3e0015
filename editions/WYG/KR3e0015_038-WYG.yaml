body:
  text: 外臺秘要方巻三十四唐王燾撰産婦忌慎法六首千金論曰産婦雖是穢惡然將痛之時及未産已産並不得令死喪汚穢家人來視之則生難若已産者則傷兒也又凡婦人産乳忌反支月若值此月當在牛皮上若灰上勿令水血惡物著地則殺人及浣濯衣水皆以器盛過此忌月乃止又凡産不依産圖脱有犯觸於後母子皆死若不至死即母子俱病庶事皆不稱心能依圖無犯觸母子即得無疾子即易養又凡欲産時特忌多人瞻視唯得三二人在傍待摠産訖即告語衆人也若人衆令人難産又凡産婦第一不得怱怱忙怕傍人極須少静皆不得預緩預急憂悒憂悒則難産若腹痛眼中火生此兒迴轉未即生也兒生訖一切人及母皆忌問是男是女兒胎落地即急取口中惡物與新汲井水五合嚥忌與煖湯物亦勿令母看視穢汚又産婦慎熱食熱藥熱麵食常識此飲食當如人肌温温也並出第二巻中令易産方六首千金令易産方凡欲臨産時先脱尋常所著衣以籠竈頭及竈口令至密即易生神驗又方生地黄汁半升生薑汁半合煎熱頓服又方燒藥杵令赤内酒中飲之小品同並出第二巻中小品預服散令易生母無疾病未生一月日前預服過三十日行步動作如故兒生墮地皆不自覺甘草散方甘草八分炙黄芩大豆黄巻粳米麻子仁乾薑桂心各二分吳茱茰二分右八味𢷬散酒服方寸匕日三千金同又療婦人易生産飛生丸方飛生一枚槐子故弩箭羽各十四枚右三味𢷬末蜜丸桐子大以酒服二丸即易産又方取蛇脱皮著衣帶中鑑鼻擊衣帶臨欲産時左手持馬銜右手持飛生毛令易産並出第七巻中下乳汁方一十五首廣濟療婦人乳無汁方以母猪蹄四枚治如食法以水二斗煮取一斗去蹄土瓜根通草漏蘆各三兩以汁煮取六升去滓内葱白豉如常法著少米煮作稀葱豉粥食之食了或身體微微熱有少許汗佳乳未下更三兩劑甚驗崔氏同出第三巻中千金療乳無汁漏蘆湯方漏蘆通草各八分鍾乳四分黍米一升右四味切將米宿漬研取汁三升煮藥三四沸去滓作飲服經心録同又方土瓜根末酒服半錢匕乳日下如流水崔氏同又療乳無汁單行石膏湯方石膏四兩研以水二升煮三沸稍稍服一日盡良又療乳無汁單行鬼箭湯方鬼箭五兩水六升煮取四升去滓一服八合日三服亦可燒灰作末水服方寸匕日三又下乳汁通草散方通草鍾乳研右二味等分為散麺粥服方寸匕日三百日後可兼養兩兒又麥門冬散方麥門冬去心鍾乳研通草理石各等分研右四味𢷬散食前後酒服方寸匕日三又下乳漏蘆散方漏蘆二分鍾乳五分研栝樓五分蠐螬三分熬右四味𢷬散食後粆糖水下方寸匕日三又方母猪蹄一具麤切以水二斗煮令熟餘五六升汁飲之甚良崔氏同又方猪蹄二枚炙搥碎通草八兩切右二味以清酒一斗浸之稍漸飲盡不出更作崔氏同又方栝樓根切一升酒四升煮三沸去滓服半升日三良崔氏同又方栝樓青色大者一枚熟𢷬以白酒一升煮取四升去滓温飲一升日三若無大者用小者兩枚無青色者黄色者亦好崔氏同又方燒鯉魚頭末酒服三指撮又方燒死䑕酒服灰方寸匕日三立下並出第三卷中崔氏療乳汁不下方䑕肉五兩羊肉六兩麞肉八兩右三味合作臛噉之勿令食者知出第十巻中妬乳瘡痛方一十四首集驗論療婦人妬乳乳癰諸産生後宜勤擠乳不宜令汁畜積不去便不復出惡汁於内引熱温壯結堅掣痛大渇引飲乳急痛手不得近成妬乳非癰也方始妬乳急灸兩手魚際各二七壯斷癰脈也便可令小兒手助捋之則乳汁大出皆如膿狀内服連翹湯汁自下外以小豆散薄塗之癰處當差千金同又産後不自飲兒及失兒無兒飲乳乳畜喜結癰不飲兒令乳上腫者方以雞子白和小豆散塗之乳房令消結也若飲兒不泄者數捻去之亦可令大者子含水使潄口中冷為嗍取乳汁吐去之不含水潄令乳頭作瘡乳孔寒也千金同又療妬乳乳癰連翹湯方連翹升麻杏仁去皮尖射干防已黄芩大黄芒硝柴胡各三兩芍藥甘草炙各四兩右十一味切以水九升煮取三升分服忌海藻菘菜千金同又方取葵莖燒灰𢷬散服方寸匕日三即愈千金同又療妬乳生瘡方蜂房猪甲中土車轍中土各等分末苦酒和塗之良千金同一方又有車轂上脂一味又療婦人女子乳頭生小淺熱瘡搔之黄汁出侵淫為長百療不差者動經年月名為妬乳病婦人飲兒者乳皆欲斷世論苟抄乳是也宜以赤龍皮湯及天麻湯洗之傅二物飛鳥膏及飛烏散佳始作者可傅以黄芩漏蘆散及黄連胡粉散並佳方如左赤龍皮湯方槲皮切三升以水一斗煮取五升夏冷用之秋冬温之分以洗乳亦洗諸深敗爛乆瘡洗畢傅膏散千金同又天麻草湯方天麻草切五升以水一斗半煎取一斗隨寒温分洗乳以殺痒也此草葉如麻葉冬生夏著花赤如䑕尾花亦以洗侵淫黄爛熱瘡痒疸濕隂蝕瘡小兒頭瘡洗畢傅膏散千金同又飛烏膏散方用燒朱砂作水銀上黒煙一名細粉者三兩礬石三兩燒粉右二味以絹篩了以甲煎和之令如脂以傅乳瘡日三作散者不須和有汁自著可用散亦傅諸熱瘡黄爛侵淫汁瘡蜜瘡丈夫隂蝕痒濕諸小兒頭瘡疳蝕口邊肥瘡蝸瘡等並以此傅之千金同又黄連胡粉膏散方黄連二兩胡粉十分水銀一兩同研令消散右三味𢷬黄連為末三物相和合皮裹熟挼之自和合也縱不成一家且得水銀細散入粉中也以傅乳瘡諸濕痒黄爛肥瘡若著甲煎為膏千金同備急小品妬乳方黄芩白斂芍藥各等分右三味下篩漿水服一錢五匕日三若右乳結將去左乳汁左乳結即將去右乳汁服即消千金同又方栁白皮酒煮令熱以熨上即消又方苦酒磨升麻若青木香或紫檀香以摩上並良一味即得佳又方已入腹者麝香薫陸香青木香雞舌香各一兩以水四升煮取二升分再服忌蒜麵酒牛馬猪肉必效療婦人妬乳癰瘡遲愈五物雄黄䕡茹膏方雄黄白斂雌黄䕡茹各一分並切亂髮如雞子一枚右以猪脂半斤合煎三沸去滓乃内亂髮髪盡藥成以塗瘡不過十日差乳癰腫方一十八首廣濟療乳癰大堅硬赤紫色衣不得近痛不可忍方大黄芍藥楝實馬蹄炙令黄等分右四味𢷬散酒服方寸匕覆取汗當睡著覺後腫處散不痛經宿乃消百無失一明晨更服一匕忌衝風熱食深師療乳癰腫消核芍藥散方芍藥通草桂心昆布白斂附子炮黄芪人參海藻木占斯各一兩右十味𢷬散以清酒服一錢匕日三當先食并療頥下氣結瘰􅊓又乳癰衆醫不能療柏皮膏方猪膏年多者佳柏皮三斤去黒皮以猪膏煎之當稍稍煎柏皮熟黒便漉出更煎餘柏皮如初盡以塗瘡甚驗集驗療乳癰方大黄二兩莽草二分伏龍肝十二分乾薑二分右四味𢷬末以酢和塗乳上即效止一方生薑極驗可用也千金同又方取鹿角下篩散以猪頷下清汁服方寸匕不過再服亦以醋漿服之良千金云猪脂銷上清汁又療乳癰四物膠薄貼方膠炙大黄莽草細辛右各等分𢷬末以雞子白和塗紙上貼腫頻易晝夜貼之割紙穿如錢大出腫頭又療乳癰三物桂心貼方桂心三分烏頭二分甘草二分右𢷬散以苦酒和塗腫上以小紙覆濡其上將乳居其中以乾布置乳下須㬰布當濡有膿水也佳范汪同千金翼排膿散主乳癰方鐡粉蓯蓉桂心細辛芎藭人參防風乾薑黄芩芍藥各四兩當歸甘草炙各五分右十二味𢷬散酒服方寸匕日三夜一加至一匕半服藥十日血出多勿怪是惡物除甚良出第五巻中備急葛氏療婦人乳癰妬腫者或經乆衆療不差方堅硬紫色削栁根皮𢷬熟熬令温帛囊盛熨乳上冷更易甚良一宿即愈千金同又方研米槌二枚煮令熱以絮及巾覆乳上用二槌更互熨腫數十過差上已用大驗千金云炙熬又乳癰方大黄竈下黄土各一分末生薑二分右三味𢷬末醋和塗乳痛即止極驗劉涓子不用生薑用生魚三味等分余比用鯽魚妙又療乳癰方大黄鼠屎黄連各一分右三味𢷬末合䑕屎更𢷬以黍米粥清和傅乳四邊痛止即愈無黍米粟米粳米並可用千金同救急療乳癰腫痛如升椀大痛不可忍方取白薑石𢷬末一二升用雞子白和如稀泥傅腫乾更易之此方頻試驗如雞子慮罪取榆白皮和𢷬傅即差又療乳癰堅硬痛不可忍方莨菪子半大匙當年新者服時不得嚼破以清水一大盞和頓服痛即止又療乳癰腫方以驗醋研地黄塗上乾即易不過三五遍服以酒研之必效療婦人乳癰方覺痛色未變時以飼猪米研汁飲之即差仍取猪槽木厚如匙面火炙數數熨上又療婦人乳癰丹參膏方丹參白芷芍藥各二兩右三味㕮咀以苦酒淹經宿又取猪脂半斤微火上煎之白芷黄膏成去滓以膏塗上甚良又療瘡上須貼膏方黄芪八分白芷大黄各五分當歸續斷各四分薤白二合切松脂十二分薫陸香蠟各十分猪脂一升生地黄汁七合右十一味切内地黄汁中漬半日内猪脂中微火上煎三上三下白芷色黄膏成布絞去滓剪帛如瘡大小塗帛貼瘡上日四五度易之終身無苦極效産後血暈心悶方一十首廣濟療産後血暈心悶不識人或神言鬼語氣欲絶方荷葉二枚炙蒲黄一兩甘草二兩炙白蜜一匙地黄汁半升右五味切以水三升煮取一升絞去滓下蒲黄蜜地黄汁煖服立差止又療産後心悶血氣衝上血暈羚羊角散方取羚羊角一枚燒成灰末以東流水服方寸匕若未差更服差救急産暈心悶大困方鯽魚剥皮作鱠以虀食三兩口止文仲暈絶方蘇方木三兩碎以水五升煎取二升分再服或無蘇木煮緋色衣取汁服甚驗又方取牆上青衣一抄以水四小升煮取二升分服又生薑汁一小升地黄汁一小升酒一大升相和煎五六沸分再服每劑和大黄末一匙此方甚良崔氏凡暈者皆是虛熱血氣奔迸腹中空所致欲分娩者第一須先取驗醋以塗口鼻仍置醋於傍使聞其氣兼細細飲之此為上法如覺暈即以醋噴面蘇來即飲醋仍少與解之一云仍少與水解之又凡産後忽悶冒汗出不識人者是暴虚故也方取破雞子吞之便醒若未醒可與童子小便一升甚驗丈夫小便亦得切不得用病人者又若乆不識人或時復發者此為有風因産血氣暴虚風行脉中故也若産後去血多者尤増此疾與雞子不醒者可急與竹瀝汁一服五合須臾不定復與五合頻得三五服立差並出第十上巻中近效療血暈絶不識人煩悶方紅藍花三兩新者佳以無灰清酒半升童子小便半大升煮取一大盞去滓候稍冷服之新汲水一大升煮之良乆又方赤父馬糞絞取汁一大盞濕者良若乾者取新汲水半大盞和研絞取汁頓服亦主人血不止神驗夏侯拯録産乳暈絶方五首崔氏療産乳暈絶方以惡血服少許良又方以服洗兒水三合良又方覺暈即用三股麻繩長五六尺繫産婦右脚膝上令人捉兩頭急挽得醒徐徐解之並出第十上卷中文仲療産乳暈絶方半夏一兩洗𢷬篩丸如大豆内鼻中即愈崔氏同救急療産乳暈絶方生赤小豆𢷬為散取東流水和方寸匕服之不差再服崔氏同産後餘血不盡腰脚疼及惡露不下方七首廣濟療産後三日患腰疼腹中餘血未盡并手脚疼不下食生地黄湯方生地黄汁一升芍藥甘草各二兩炙丹參四兩蜜一合生薑汁半合右六味切以水三升煮取一升去滓内地黄汁蜜薑汁微火煎一兩沸一服三合日二夜三利一兩行中間進食與藥更進服又療産後惡露不多下方牛膝大黄各八分牡丹皮當歸各六分芍藥蒲黄桂心各四分右七味𢷬散以生地黄酒服方寸匕日二血下止救急療婦人産後餘血不盡血流入腰脚疼痛胷急氣滿兩脅痛方生薑一斤淡竹葉一升並切右二味以水二升煮取一升去滓分再服又療産後血不盡血痛悶方取荷葉燒作灰煖水和服煮取汁亦良又惡露不盡腹脹痛方取亂髮如雞子大灰汁洗浄燒末酒服又方取百斤秤錘一枚燒赤投酒五升中用此秤錘酒煮當歸三兩取二升去滓分再服千金同又療一切宿血及損傷瘀血在腹内不問新乆并婦人月經不通産後惡血不下皆良方大黄芒硝各三兩桃仁四十枚去尖皮右三味芒硝桃仁合𢷬四五百杵以酢漿二升半漬一宿空腹攬調頓服之不能頓服者分作兩服良乆先下糞次下如豆泥汁或黒血為驗强人日别服一劑弱人兩日服之下血盡便止不過三兩劑忌生冷茶葵並出第四卷中産後惡露不絶方四首廣濟療婦人産後血露不絶崩血不可禁止腹中絞痛氣息急療蓐病三十六疾方亂髮燒灰阿膠各二兩炙代赭乾薑各三兩馬蹄一枚燒乾地黄四兩牛角鰓五兩炙右七味𢷬篩蜜和為丸如梧桐子空腹以飲下二十五丸日二至四十丸良深師療産後虚冷下血及水榖下痢晝夜無數兼療惡露不絶龍骨丸方乾薑甘草炙桂心各二兩龍骨四兩右四味𢷬篩蜜丸如梧桐子以酒下二十丸日三忌如常法此方甚良文仲葛氏療血露不絶方以鋸截桑木取屑五指撮酒服日三差又隠居效方澤蘭湯療産後惡露不盡腹痛徃來兼滿少氣澤蘭八分當歸三分生地黄三分芍藥十分甘草六分炙生薑十分大􅀥十四枚右七味切以水九升煮取三升分為三服欲死塗身得差産後血氣煩悶方四首廣劑療産後心胷中煩悶血氣澀肋下妨不能食方生地黄汁一升當歸一兩末生薑汁三合酒五合童子小便二升右五味和煎三四沸去滓分服一日令盡間食服又血氣煩悶方取生藕𢷬絞取汁飲一升未定更飲差止竹瀝亦得千金同集驗療産後血氣煩悶方取生地黄汁一升酒三合相和微温頓服之千金同千金療婦人産後氣欲絶心中煩悶不解必效方竹葉切麥門冬去心小麥各一升甘草一兩炙生薑二兩大􅀥十四枚右六味切以水一斗煮竹葉小麥取八升去滓内餘藥煮取三升去滓分服心虚悸加人參二兩少氣力加粳米五合一方用竹皮若胷中氣逆加半夏二兩忌如常法出第三卷中産後心痛方三首集驗大巖蜜湯療産後心痛方乾地黄當歸獨活甘草炙芍藥桂心小草細辛各一兩吳茱茰一升乾薑三兩右十味切以水九升煮取三升分三服良千金同經心録蜀椒湯療産後心痛此大寒冷所為方蜀椒二合汗芍藥三兩半夏洗當歸桂心人參甘草炙各二兩生薑汁五合蜜一升茯苓二兩右十味切以水九升煮椒令沸下諸藥煮取二升半去滓下薑汁蜜等更煎取三升一服五合漸至六合盡勿冷飡千金同千金羊肉湯療産後腹中心下切痛不能食往來寒熱若中風乏氣力方羊肉三斤當歸黄芩甘草炙芎藭防風各二兩芍藥三兩生薑四分右八味切以水一斗二升煮羊肉減半煮藥取三升分温三服忌如常法崔氏同出第三卷中産後腹中絞刺痛方九首廣濟療産後腹中絞刺痛不可忍方當歸芍藥乾薑芎藭各六分右四味𢷬散以酒服方匕日二服又療産後内虛寒入腹腹中絞痛下赤煩毒讝語見鬼羊肉湯方肥羊肉一斤當歸甘草炙芍藥各一分右四味切以水一斗煮羊肉取七升煮藥取二升分服又療新産後腹中加弦常堅絞痛無聊方蜜一升當歸一兩右一味末入蜜中煎融融耳適寒温頓服千金當歸湯療婦人寒疝虛勞不足若産後腹中絞痛方當歸三兩生薑五兩芍藥二兩羊肉一斤右四味切以水八升煮取三升適寒温頓服七合日三又療産後疾痛桃仁芍藥湯方桃仁半升去皮尖芍藥芎藭當歸乾漆熬桂心甘草炙各二兩右七味切以水八升煮取二升半分三服又單行茱茰酒療産後腹内外疾痛方吳茱茰一升酒三升漬一宿煎取半升頓服亦可再服差止並出第三巻中必效療産後腹痛方羌活四兩切酒二升煮取一升分服又方兔頭炙令熱以熨産婦腹如刀絞痛者熨之立定又療痛不可忍方取一苦瓠蘆未經開者開之去子訖以沸醶酢投中蒸熱隨痛熨冷即換極甚效産後虛熱方二首千金蜀漆湯療産後虛熱往來心胷中煩悶滿骨節疼及頭痛壯熱晡時輒甚又似微瘧方蝭母芍藥各二兩蜀漆葉甘草炙桂心黄芩各一兩生地黄一斤黄芪五兩右八味切以水一斗先煮地黄取七升去滓下諸藥煮取二升半分三服此湯療寒熱不損人忌如常法出第三卷中千金翼療産後虛熱頭痛方白芍藥乾地黄牡蠣各五兩熬桂心三兩右四味切以水五升煮取二升半分三服日三此湯不損人無毒亦療腹中拘急痛若通身發熱加黄芩二兩甚驗大熱即除出第六卷中産後虛勞方四首千金増損澤蘭丸療産後百病理血氣補虛勞方澤蘭甘草炙當歸芎藭各七分附子炮乾薑白术白芷桂心細辛各四分防風人參牛膝各五分柏子仁乾地黄石斛各六分厚朴炙藁本蕪荑各二分麥門冬八分去心右二十味𢷬末蜜丸以酒下十五丸至二十丸良忌如常法出第四卷中延年増損澤蘭丸主産後風虛勞損黄瘦方澤蘭七分防風乾地黄當歸細辛桂心茯苓芍藥人參甘草炙藁本烏頭炮麥門冬去心石斛紫菀芎藭各五分乾薑栢子仁蕪荑厚朴炙蜀椒汗各四分白术黄芪各六分紫石英研石膏研各八分右二十五味𢷬篩蜜和丸如梧桐子以酒下二十至三十丸忌如常法刪繁療産婦勞虛或本來虛寒或産後血脈虛竭四肢羸弱飲食減少經水斷絶血脈不通虚實交錯澤蘭補虚丸方澤蘭葉九分石膏八分研芎藭甘草炙當歸各七分白芷防風白术藁本蜀椒厚朴炙乾薑桂心細辛各五分右十四味𢷬篩蜜丸如梧桐子酒下二十丸至三十丸日再忌如常法古今録驗澤蘭丸療産後風虚勞羸百病必效方澤蘭葉六分白芷椒汗蕪荑藁本細辛各四分白术栢子仁人參桂心防風厚朴炙丹參各五分芎藭甘草炙當歸各七分乾地黄十分右十七味𢷬篩