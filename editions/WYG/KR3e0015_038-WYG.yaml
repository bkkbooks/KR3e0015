如前傅藥其内甘濕散是蚺蛇膽等六味者是在前療甘濕卷中余家婢遇此疾百方療不差蝕處作兩瘡深半寸余於涓子方中檢得此甘草湯方仍以自處蚺蛇胆散用不經七日瘡乃平復甚效凡救十八人手下即活遇斯疾者請廣流布傳之出第十巻中又療疳頻用大效方蚺蛇膽真者研青木香石硫黄研鐡精麝香各四分舊用五月五日蝦蟆麝香臨時分之多少入用縁麝香辟蛇毒若先以相和蛇膽即無力也右六味等分𢷬篩為散更細研有患取如三碁子和并花水日再服服訖先令便利了即以後方桃枝熏下部訖然後取散如二碁子内竹管裏深吹入下部中亦日再老小量減其熏法每日一度不用再為之甚良又療疳蟲食下部及五藏方取桃東南枝三七枚輕打頭使散以綿緩纒之又𢷬石硫黄為末將此綿纒桃枝橪轉之令末少厚又截一短竹筒先内下部中仍以所橪藥桃枝熟然熏之並出第三卷中文仲療隂蝕欲盡者方蝦蟆兔屎等分末傅之良古今録驗療婦人隂蝕苦中爛傷狼牙湯方狼牙三兩㕮咀以水四升煮取半升去滓内苦酒如雞子中黄一柸煎沸適寒温以綿濡湯以瀝瘡中日四五度即愈隂中腫痛方四首肘後療隂中腫痛方炙枳實以熨之經心録療婦人隂中腫痛不可近者湯洗方防風三兩大㦸二兩艾五兩右三味切以水一斗煮取五升温洗隂中日可三度良古今録驗療婦人隂腫堅痛礬石散方礬石二分熬甘草半分炙大黄一分右三味𢷬篩取棗大綿纒導隂中二十日即愈又療婦人隂腫苦瘡爛麻黄湯洗之麻黄去節黄連蛇牀子各一兩酢梅十枚右四味切以水一斗煎取五升洗之隂中瘡方五首集驗療婦人隂中痛生瘡方羊脂一斤當歸杏仁去皮尖白芷芎藭各兩右五味細切羊脂和置甑中蒸之藥成取如大豆一枚綿裹藥内隂中日一度肘後療女子隂中瘡方末硫黄傅瘡上又療女子隂中瘡方杏仁燒末雄黄礬石燒各二分麝香半分右四味和傅之日三度古今録驗療婦人隂中生瘡黄芩湯洗方當歸黄芩芎藭大黄礬石各二分黄連一分雄黄二分右七味切以水五升煮取四升洗瘡日三度又療婦人隂中生瘡雄黄散方芎藭藜蘆雄黄研丹砂研蜀椒汗細辛當歸各一分右七味𢷬篩散取方寸匕綿裹内隂中又傅外瘡方忌如常法隂痒方五首廣濟療苦産門痒無計方蚺蛇膽研雄黄研石硫黄研朱砂研峭粉未詳藜蘆蕪荑各二分右七味𢷬細篩重蘿令調以臘月猪脂和如泥取故布作篆子如人指長一寸半以藥塗上内孔中日一易易時且以猪椒根三兩煮湯洗乾拭内藥佳崔氏療隂痒痛不可忍方取蒜隨多少水煮作湯洗之日三又方取狼牙蛇牀子煮作湯洗日三又方取杏仁燒作灰乘熱綿裹内隂中良並出第十巻中經心録療隂痒方枸杞根一斤水三升煮十沸適寒温洗之隂中痒有蟲方六首千金療人隂蟲瘡方以肥猪肉一斤以水煮肉令爛去肉以湯令極熱便灌瘡上冷易之又方取狼牙兩把以水五升煮取一升洗之日五六度並出第三卷中崔氏療隂痒似有蟲狀煩悶真丹散方真丹一分研礬石二分燒研芎藭四分右三味為散以縠囊盛著隂中蟲當死盡又隂痒有蟲方取雞肝去脂及熱内隂中蟲當盡死並出第十卷中古今録驗療隂痒有蟲方取牛肝截五寸繩頭内隂中半日蟲入肝出之猪肝亦得又療隂中有蟲痒且痛目腫身黄欲得男子漏血下白少氣思美食方用生鯉魚長一尺去頭内取骨𢷬末熬黄黒以猪脂和以絹袋盛如常法内隂中至痛處即止隂下脱方四首廣濟療隂下脱出方皂筴去皮子炙半夏洗大黄細辛各四分蛇牀子六分右五味𢷬散薄絹袋盛如指大内隂中日二易又以羊脂煎煮遍塗上以鐡精傅脂上多少令調以火炙布令煖以熨之研礠石酒服方寸匕日三服集驗療婦人隂下脱散方當歸黄芩牡蠣熬各二兩芍藥一兩半猬皮一兩切熬右五味𢷬散酒服方寸匕日三服禁舉重良千金同千金療隂下脫硫黄散方硫黄研烏賊魚骨各二分五味子三銖右三味𢷬散以粉上日三出第三卷中千金翼療諸婦人隂下脫方細研礬石酒服方寸匕日三服出第六卷中隂挺出方三首廣濟療婦人子藏挺出數痛洗方蛇牀子一斤酢梅十四枚右二味以水五升煮取二升半洗痛處日夜十過良又方烏頭炮白及各四分右二味𢷬散取方寸匕以綿裹内隂中令入三寸腹内熱即止日一度著明晨仍須更著以止為度集驗療婦人隂下挺出方蜀椒烏頭白及各二分右三味𢷬篩以方寸匕綿裹内隂中入三寸腹中熱明旦更著差止千金同女人傷丈夫頭痛方二首集驗療女人傷於丈夫四體沈重嘘吸頭痛方生地黄八兩芍藥五兩香豉一升葱白切一升生薑四兩甘草二兩炙右六味切以水七升煮取二升半分三服不得重作慎房事千金同千金翼療諸婦人傷丈夫若頭痛欲嘔悶桑白皮湯方桑根白皮半兩乾薑半兩桂心五寸大棗二十枚右四味切以酒一斗煮三四沸去滓分温服之適衣無令汗出千金同出第八巻中交接輙血出痛方二首千金療女人交接輒血出方桂心二分伏龍肝二分右二味𢷬末以酒服方寸匕差止出第三卷中崔氏療合隂陽輒痛不可忍方黄連六分牛膝甘草炙各四分右三味切以水四升煮取二升洗之日三四度差止出第十卷中童女交接他物傷方三首集驗療童女交接陽道違理及他物所傷犯血出流離不止方取釜底墨斷葫蘆以塗之又療童女交接陽道違理血出不止方燒髮并青布末為粉塗之又方割雞冠取血塗之小戸嫁痛方四首千金療小戸嫁痛連日方甘草三分炙芍藥二分生薑三分桂心右四味切以酒二升煮取三沸去滓分温服之神良出第三卷中千金翼療小戸嫁痛單行方牛膝五兩右一味切以酒三升煮再沸分三服又療婦人嫁痛單行大黄湯方大黄三兩右一味以酒一升煮一沸頓服又療婦人小戸嫁痛烏賊魚骨散方烏賊魚骨二枚燒為屑酒服方寸匕日三並出第八卷中坐藥方三首通真論療婦人子門冷坐藥法蛇牀子四分茱茰六分麝香二銖右三味𢷬散蜜丸綿裹如酸棗内之下惡物為度近效坐藥主下冷子門痒閉方吳茱茰葶藶子熬各二分蛇牀子三分無食子一枚右四味為散以綿裹如棗許内子宫中令熱為度又方逺志二分蛇牀子五味子各四分乾薑蓮花葉各三分右五味𢷬散以口中玉泉和兔矢大内隂門中去冷内熱良夏侯拯録婦人欲斷産方四首小品斷産方故布方圓一尺燒屑以酒飲服之終身不産千金云蠶子故布又療姙娠欲去之并斷産方栝樓桂心各三兩豉一升右三味切以水四升煮取一升半分服之又方附子二枚𢷬為屑以淳苦酒和塗右足去之大良千金斷産方油煎水銀一日勿息空肚服棗大一丸永斷不損人外臺秘要方卷三十四
