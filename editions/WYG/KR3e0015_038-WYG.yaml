桂心一尺䗪蟲三枚熬厚朴十銖炙郁李仁一兩去皮尖熬右八味𢷬散早朝空腹以温酒一盞和三錢匕頓服瘕當下下畢養之如産婦法三月無子者當有子三日勿合隂陽四曰血瘕血瘕者婦人月水新下未滿日數而中止因飲食過度五榖氣盛溢入他藏若大肌寒吸吸不足呼吸未調而自勞動血下走腸胃之間流落不去内有寒熱與月水合㑹則生血瘕之聚令人腰痛不可以俛仰横脅下有積氣牢如石少腹裏急苦痛背膂疼腰股下痛隂裏若生子風冷子門僻月水不時乍來乍去有此病者令人無子療之瘕當下即愈矣方闕崔氏療婦人血瘕痛方乾薑烏賊魚骨各一兩炙桃仁一兩去皮尖熬右三味𢷬散酒服二方寸匕日二又方取古鐡秤鎚或大斧頭或鐡杵以炭火燒令赤投好酒三升中稍稍飲之又方桂末温酒服方寸匕佳日二並出第十下卷中古今録驗療婦人血瘕攻刺腹脅時痛導藥方大黄當歸各半分山茱茰一兩皂莢一兩去皮子炙細辛戎鹽二六銖右六味𢷬以香脂丸如指大每以綿裹内隂中正坐良乆瘕當下養如乳婦之法五曰脂瘕脂瘕者婦人月水新下若生未滿三十日其人未復以合隂陽絡脈分胞門傷子戸失禁關節散五藏六腑津液流行隂道瞤動百脈關樞四解外不見其形子精與血氣相遇犯禁子精化不足成子則生脂瘕之聚令人支滿裹急痛痺引少腹重腰背如刺四肢不舉飲食不甘卧不安席左右走腹中切痛時差時甚或時少氣頭眩身體疼解苦寒惡風膀胱脹月水乍來乍去不如常度大小便血不止有此病者令人無子療之當刺以長鍼行以毒藥瘕當下即愈矣又療脂瘕方皂莢十八銖去皮尖礬石六銖燒五味子蜀椒汗細辛乾薑各半兩右六味𢷬散以香脂和如大豆著男子隂頭以合隂陽不三行其瘕乃愈又療婦人絶不復生及未曽生皆以脂瘕腹中有塊以湯煎自下尚不受子導散方皂莢炙去子皮吳茱茰當歸各一兩蜀椒汗各二兩細辛熬礬石燒五味子各三分大黄戎鹽各二兩乾薑二兩右十味𢷬散以輕絹袋如指大長三寸盛藥令滿内隂中坐卧隨意勿行走小便時去之别換新者六曰狐瘕狐瘕者婦人月水當日數來而反悲哀自恐若以逺行逢暴風疾雨電雷驚恐被濕罷音疲倦少氣心中恍惚未定四肢懈墮振寒若寤寐脈氣絶精神游亡邪氣入於隂裏不去則生狐瘕之聚食人子藏令人月水閉不通少腹瘀滯胷脅腰背痛隂中腫小便難胞門子戸不受男精五藏氣盛令人嗜食欲嘔喜睡多所思如有身狀四肢不舉有此病者終身無子其瘕有手足卒成形者殺人未者可療以長鍼急持刺之行以毒藥有法瘕當下即愈矣又療狐瘕方取新死䑕一枚裹以新絮塗以黄土穿地坎足没䑕形置其中桑薪灼其上一日一夜出分去絮内桂心末六銖酒服二方寸匕病當下甚者不過再服差止七曰蛇瘕蛇瘕者婦人月水已下新止適閉未復胞門子户勞動隂陽未平榮衛分行若其中風暴病羸劣飲食未調若起行當風及度泥涂因衝寒大早若坐濕地名曰隂陽亂腹中虚若逺行道路伏飲汚井之水不潔之食通吞蛇䑕之精流落不去則生蛇瘕之聚上食人之肝心苦病長大條條在臍下上還絞左右脅不得吐氣兩股脛間苦疼少腹多熱小便赤黄膀胱引隂中攣急腰背俱痛難以動作喜發寒熱月水或多或少有此病者不復生子其瘕手足成形者殺人未者可治之療有法度行以毒藥瘕當下即愈矣又療蛇瘕方大黄黄芩芒硝各半兩甘草大如指一尺炙烏賊魚骨二枚皂莢六枚去皮子尖右六味𢷬以水六升煮之三沸下絞去滓下硝適寒温服之十日一劑空腹服之當下八曰鼈瘕鼈瘕者婦人月水新至其人劇作罷音疲勞汗出衣服潤濕不以時去之若當風睡足踐濕地恍惚覺悟蹠立未安顔色未平復見所好心為開蕩魂魄感動五内脱消若入水浣洗沐浴不以時出而神不守水氣與邪氣俱入至三焦之中又暮出入玉門先閉津液妄行留落不去則生鼈瘕之聚大如小柸令人少腹内切痛惡氣左右走上下腹中苦痛若存若亡持之躍手下引隂裏腰背亦痛不可以息月水不通面目黄黒脱聲少氣有此病者令人絶子其瘕有手足成形者殺人未者可治之療有法度以長鍼按療之行以毒藥瘕當下即愈矣又療鼈瘕方大黄六分乾薑側子各半分附子人參各九銖廣蟲一寸匕熬桂心一兩六銖細辛土䱉各十八銖白术一兩右十味𢷬散以酒服方寸匕日三以上八般瘕疾出古今録驗第三十卷中肉癥方二首集驗療婦人臍下結堅大如柸升月經不通寒熱徃來下痢羸瘦此為癥氣不可療未生癥者可療方生地黄三十斤取汁乾漆一斤熬右二味𢷬漆為散内地黄汁中微火煎令可丸酒服桐子大三丸至七八丸即止刪繁療女人子門不開血聚腹中生肉癥築築如物此呼為癥氣藏寒所致生地黄煎破血丸方生地黄汁一升生牛膝汁一升乾漆一斤半熬右三味𢷬漆為散内地黄等汁中攪微火煎取堪為丸止停攪丸如梧子一服三丸以酒服日再若覺腹内過痛食後乃服之婦人崩中方一十一首小品療婦人崩中晝夜十數行醫所不能療方芎藭八兩右一味切以酒五升煮取三升分三服不飲酒水煮亦得千金療崩中方白茅根二斤小薊根五斤右二味切以酒五升煮取四升分稍稍服又療婦人白崩中方芎藭阿膠炙桂心赤石脂小薊根各二兩乾地黄四兩伏龍肝雞子許七枚右七味切以酒六升水四升煮取三升去滓内膠令烊分為三服日三並出第四卷中千金翼療婦人白崩中馬通方白馬通汁二升乾地黄四兩伏龍肝如雞子大七枚桂心芎藭阿膠炙小薊根白石脂各二兩右八味切以酒七升合馬通汁煮取三升去滓内膠令烊分服日三又療婦人崩中及痢一日一夜數十起大便欲死多取諸根煎丸得入腹即活若諸根難悉得者第一取薔薇根令多多