body:
  text: 外臺秘要方巻九唐王燾撰欬𠻳方三首病源欬𠻳者由肺感於寒㣲者成欬𠻳也肺主氣合於皮毛邪之初傷先客皮毛故肺先受之五藏與六腑為表裏皆稟氣於肺以四時更王五藏六腑皆有欬𠻳各以其時感於寒而受病故以欬𠻳形證不同五藏之欬者乗秋則肺先受之肺欬之狀欬而喘息有音聲甚則唾血乗夏則心先受之心欬之狀欬則心痛喉中介介如哽甚則咽腫喉痺乗春則肝先受之肝欬之狀欬則兩一作左脅下痛甚則不可轉側兩胠下滿乗季夏則脾先受之脾欬之狀欬則右脅下痛隂引於肩背甚則不可以動動則欬劇乗冬則腎先受之腎欬之狀欬則腰背相引而痛甚則欬逆此五藏之欬也五藏欬久不已傳與六腑脾欬不已則胃受之胃欬之狀欬而嘔嘔甚則長蟲出肝欬不已則膽受之膽欬之狀欬而嘔膽汁肺欬不已則大腸受之大腸欬之狀欬而遺糞心欬不已則小腸受之小腸欬之狀欬而失氣氣與欬俱出腎欬不已則膀胱受之膀胱欬之狀欬而遺溺久欬不已則三焦受之三焦欬之狀欬而腹滿不欲食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也又有十種欬一曰風欬欲語因欬言不得終是也二曰寒欬飲冷食寒注入於胃從肺脉上氣内外合因之而欬是也三曰支欬心下硬滿欬則引四肢痛其脉反遲是也四曰肝欬欬而引脅下痛是也五曰心欬欬而唾血引手少隂是也六曰脾欬欬而涎出續續不止下引少腹是也七曰肺欬欬引頸項而唾涎沫是也八曰腎欬欬則耳聾無所聞引腰并臍中是也九曰膽欬欬而引頭痛口苦是也十曰厥隂欬欬而引舌本是也診其右手寸口氣口以前脉手陽明經也其脉浮則為陽實陽實者病苦腹滿善喘欬脉㣲大為肝痺欬引少腹欬𠻳脉浮大者生沈小伏匿者死又云脉浮直者生沈硬者死欬且嘔腹脹且泄其脉弦弦欲絶者死欬脫形發熱脉小硬急者死欬且羸瘦絡脉大硬者死欬而尿血羸瘦脉大者死出第十四卷中小品療欬𠻳紫菀七味湯方紫菀半兩五味子一兩桂心二兩麻黄四兩去節杏仁七十枚去皮尖兩仁碎乾薑四兩甘草二兩炙右藥切以水九升煎取二升半去滓温服七合日三服忌海藻菘菜生葱䔉麫腥膩經心録古今錄驗同出第二卷中延年紫菀飲主欬𠻳方紫菀貝母茯苓杏仁去皮尖兩仁者生薑各三兩人參二兩橘皮一兩去脉右七味切以水五升煮取一升五合去滓分温三服如人行七里更進一服忌葱蒜麫酢張文仲處古今錄驗同出第五卷中古今錄驗天門冬煎療欬𠻳方天門冬六兩去心杏仁三升去雙仁皮尖碎椒三升熬令汗出桂心厚朴炙杜仲苦參各三兩附子六兩炮乾薑六兩烏頭二枚炮人參六兩蜈蚣一枚去頭足炙右十二味别擣杏仁其餘者合擣下篩以五斤膠飴和擣千杵服如大棗一枚日三忌冷水豬肉生葱鯉魚出第九卷中五𠻳方四首深師療五𠻳一曰上氣𠻳二曰飲𠻳三曰燥𠻳四曰冷𠻳五曰邪𠻳四滿丸方乾薑桂心躑躅花芎藭紫菀芫花根皮各二分人參細辛甘草炙半夏洗鬼督郵各一分蜈蚣一枚去頭足炙右十二味擣篩蜜和服如大豆五丸米飲下日三不知加之至七八丸服此丸無不差方秘不傳忌羊肉􅄳生葱生菜海藻菘菜又方特生礜石一兩泥包燒半日欵冬花一兩䜴三百枚擣千杵巴豆十六枚去皮心熬别擣如脂右四味擣篩蜜和服如大豆米飲下二丸不知稍増至四五丸忌野豬肉蘆笋古今錄驗療三十年欬並出第十八卷中備急華佗五𠻳丸方皂莢炙乾薑桂心右三味等分擣篩蜜和丸如梧子服三丸酒飲俱得日三忌葱出第三卷中古今錄驗四滿丸療五𠻳一為氣𠻳二為痺𠻳三為燥𠻳四為邪𠻳五為冷𠻳悉療之方蜈蚣二枚炙芫花根五分熬躑躅花四分乾薑芎藭桂心各四分人參細辛各二分右八味擣篩蜜和為丸一服米飲下五丸如大豆許日三稍加至十丸忌生葱生菜出第十九卷中新久欬方三首深師療新久欬𠻳唾膿血連年不差晝夜肩息麻黄湯方麻黄去節四兩一方二兩桂心二兩甘草二兩大棗十四枚擘右四味切以水九升煮取三升去滓分温三服日三數用有効忌海藻菘菜生葱等物又療新久欬𠻳前胡丸方前胡六分烏頭炮二枚桔梗乾薑各二分桂心八分蜀椒八分汗右六味擣篩蜜和如櫻桃大一丸含化稍稍嚥之日三又療久欬晝夜不得卧咽中水雞聲欲死者療之良忌豬肉冷水生葱並出第十八卷中千金療新久欬𠻳欵冬花煎方欵冬花乾薑為末芫花根熟熬為末各二兩五味子紫菀各三兩右五味先以水一斗煮三味取三升半去滓内芫花乾薑末加白蜜三升合投湯中令調於銅器中㣲火煎令如飴可一升半服棗核大含之日三服曽數用甚良忌蒜麫腥膩深師同出第十八卷中卒欬𠻳方八首肘後療卒欬𠻳方釡月下土一分豉七分熬右二味熬擣蜜丸如梧子大米飲服十四丸曽用有驗又方飴糖六分乾薑六分末䜴一兩右三味先以水二升煮䜴三兩沸去滓内飴糖消後内乾薑末分為三服又方生薑汁百部根汁右二味合煎服二合並出第一巻中張文仲卒欬方百部根四兩右一味酒一斗煮之再宿火温服一升日再服之効肘後同又方温清酒一升驢膏一升右服之亦療上氣並出第三卷中備急卒欬𠻳方芫花二兩熬右一味水二升煮四沸去滓内白糖一斤服如棗大勿食鹹酸物亦療久欬肘後同又方爐中取鈆屑一分桂心二兩皂莢二兩去皮子炙右三味擣篩蜜和丸如梧子大人米飲下服十五丸小兒五丸日二服忌生葱肘後同出第三卷中深師療卒欬逆上氣肩息晝夜不止欲絶麻黄湯方麻黄去節細辛各二兩甘草半兩炙桃仁二十枚去皮尖及兩仁者研一本作杏右四味切以水七升煮取三升去滓分三服秘方忌海藻菘菜生菜出第十八卷中暴熱嗽方二首千金療暴熱嗽杏仁飲方杏仁四十枚去皮尖兩仁炒研柴胡四兩紫蘇子一升橘皮一兩右四味切水一斗煮取三升分三服常服飲之不妨本方無紫蘇子有乾棗出第十八卷中延年貝母煎主暴熱欬方貝母三兩紫菀五味子百部根杏仁去皮尖兩仁者研甘草炙各二兩右六味切以水五升煮取二升去滓和地黄汁三升生麥門冬汁一升白蜜五合好酥二合生薑汁一合又先取地黄麥門冬及湯汁和煎減半内酥薑汁攪不得停手又減半内蜜煎如稠糖煎成取如棗大含嚥之日三夜再服忌海藻菘菜鹹物蔣孝璋處出第五卷中冷欬方三首深師療冷欬逆氣乾薑湯方乾薑四兩紫菀一兩杏仁七十枚去皮尖雙仁切麻黄去節四兩桂心甘草炙各二兩五味子一兩右七味切水八升煮取二升七合分三服平體人加射干一兩代乾薑忌海藻菘菜生葱等又療冷飲欬芫花煎方芫花二兩乾薑二兩白蜜二升右三味擣篩二味内蜜中攪令相和㣲火煎令如糜服如棗核一枚日三夜一欲痢者多服千金主新久欬並出第十八卷中千金療冷𠻳方乾薑三兩末膠飴一斤右二味攪令和調蒸五升米下令熟以棗大含化稍稍嚥之日五夜三出第十八卷中欬失聲方四首廣濟療咽喉乾燥欬𠻳語無聲音桂心散方桂心三兩杏仁三兩去皮尖雙仁熬擣右二味擣篩為散以蜜和綿褁如棗大含之嚥汁日三夜二忌生葱油膩出第二卷中古今錄驗療暴中冷傷寒鼻塞喘欬喉中瘂塞失音聲者方取芫花根一虎口切㳟右一味令病人以薦自縈就裏舂芫花根令飛揚入其七孔中當眼淚出口鼻皆羅剌郎逹切畢畢耳勿住令芫花根盡則止病必於此差又療忽暴欬失聲語不出杏人煎方杏仁一升去皮尖兩仁者熬通草四兩紫菀五味子各三兩貝母四兩桑白皮五兩蜜一升沙糖一升生薑汁一升右九味切以水九升煮五味取三升去滓内杏仁脂薑汁蜜糖和攪㣲火上煎取四升初服三合日再夜一稍稍加之忌䔉麫炙肉等千金同又通聲膏方五味子欵冬花通草各三兩人參二兩杏仁一升去尖皮兩仁者熬桂心細辛青竹皮菖蒲酪酥各二兩棗膏三升白蜜一升薑汁一升右十三味細切以水五升㣲火煎三上三下去滓内薑汁棗膏煎令調和酒服如棗二枚忌生菜生葱羊肉􅄳千金用蘇五升棗膏蜜各二升餘同並出第十九卷中氣𠻳方八首病源夫肺主氣候皮毛人有運動勞役其氣外洩腠理則開因乗風取凉冷氣卒傷於肺即發成𠻳故為暴氣𠻳其狀𠻳甚而少涎沫出第十四卷中古今錄驗療患氣𠻳并下焦冷結方後四方同療姚大夫别錄要方紫菀貝母百部根欵冬花五味子半夏洗各五分射干十分芫花根皮四分切熬令焦乾薑橘皮各四分杏仁八分去皮尖雙仁者熬蘇子四分白石英八分研鍾乳十分研右十四味擣篩以蜜和為丸如梧桐子酒服十丸日再稍加至三十丸忌羊肉􅄳諸生冷等物又方乾地黄桂心山茱茰五味子各三兩茯苓四兩蓯蓉丹參澤瀉甘草炙鍾乳研各二兩右十味擣篩蜜和酒服十五丸如梧子大日増至三十丸忌海藻生葱醋物菘菜蕪荑又酒方丹參乾地黄各五兩芎藭石斛牛膝黄茋白术蓯蓉各四兩防風獨活附子炮秦芁桂心乾薑各三兩鍾乳六分研右十五味切以酒三斗浸七日初服二合日再稍稍加之忌食桃李雀肉生葱豬肉冷水蕪荑又丸方乾地黄四兩防風蓯蓉澤瀉各三兩山茱茰丹參五味子茯神各二兩一方作茯苓桂心一兩半右九味擣篩蜜和丸如梧子酒服二十丸日再稍加至三十丸忌醋物生葱蕪荑並出第十九卷中延年杏仁煎主氣𠻳方好杏仁一升去皮尖兩仁者酥熬糖一合蜜五合酥一合生薑汁一合貝母八合别篩末蘇子汁二升以七小合蘇子研水和濾取汁右七味先擣杏仁如泥内後六味藥合煎如稠糖取如棗大含嚥之日三但𠻳發細細含之忌豬肉蔣孝璋處又療氣𠻳煎方貝母紫菀百部根炙欵冬花甘草炙各三兩桂心二兩右六味切以水六升煮取一升五合去滓内後藥冄煎生地黄汁三升生麥門冬汁五合生薑汁五合白蜜五合酥五合白糖五合杏仁三合去皮尖雙仁熬擣作膏煎如糖一服一匙日三稍加至三匙𠻳定則停忌海藻生葱菘菜蕪荑䔉醋鹹食豬肉等又療氣𠻳杏仁煎方杏仁五合去皮尖擣研生薑汁二合酥一合蜜三合右四味以水三升研杏仁取汁内銅鐺中煎攪可減半内薑汁煎如稀糖内酥蜜煎令如稠糖一服一匙日三服夜一服稍加至兩匙忌豬肉又杏仁煎主氣𠻳方杏仁一升去尖皮兩仁者研濾取汁酥三合白蜜三合右三味以水三升研濾杏仁令味盡内銅鐺中煎可減半内酥蜜煎二十沸内貝母末四分紫菀末三分甘草炙末一分更煎攪如稀糖一服一匙日三夜一服以欬𠻳止為度大驗忌䔉豬内並出第五卷中呷欬方二首病源呷欬者猶是欬𠻳也其胷膈痰飲多者欬則氣動於痰上摶咽喉之間痰氣相擊隨欬動息呀呷有聲謂之呷欬其與欬𠻳大體雖同至於投藥則應加消痰破飲之物以此為異耳出第十四卷中崔氏三十年以來呷欬并療之方莨菪子新者南青木香真者熏黄無石臭者右三味等分擣篩為散以羊脂塗青紙一張以散藥著紙上卷褁之平旦空腹燒褁頭令烟出吸取十嚥日中時復吸十嚥日晩後吸十嚥七日内禁生冷醋滑三日則差出第六卷中古今錄驗療呷欬書墨丸方大神驗萬年縣令席君懿送書墨二分甘遂二分葶藶子二分熬前胡五分大黄五分巴豆二分去心皮熬右六味擣篩為散巴豆葶藶别細研蜜和丸如梧子以白蜜粥清飲旦空腹服三丸人弱服二丸則利水或吐三日以後更一服還如上法不過三服愈療三十年欬如利不止者以冷白飲止之吐利止後食禁生冷醋滑豬魚雞麫油酒冷水䔉蘆笋此藥宜春夏服之有毒之藥寧從少起廣濟療瘕𠻳上氣喉中作水雞鳴出第十九卷中熏欬法六首千金療欬熏法細熟艾薄薄布紙上廣四寸復以石硫黄末薄布艾上務令調匀以荻一枝如紙長卷之作十枚先以火燒纒下去荻其烟從荻孔中出口吸取煙嚥之取吐止明旦復熏之昨日餘者後日復熏之三日止自然差惟得食白糜餘皆禁之古今錄驗同又法熏黄研令細一兩以蠟蠟紙并上熏黄令與蠟相入調匀卷之如前法燒之亦如上法日一二止以吐為度七日將息後羊肉羮補之又法爛青布廣四寸上布艾艾上又布青礬石末礬上布少熏黄末又布少鹽又布少豉末急巻之燒令著内燥罐中以紙䝉頭作小孔以口含取煙嚥之以吐為度悶時復息煙盡止日一二用三巻用不盡差三七日慎油膩並出第十八卷中崔氏療久欬不差熏法欵冬花右一味毎旦取如雞子許用少許蜜拌花使潤内一升鐡鐺中又用一瓷椀合鐺椀底鑚一孔孔内揷一小竹筒無竹葦亦得其筒稍長作椀鐺相合及揷筒處皆麫埿之勿令漏煙氣鐺下著炭火少時欵冬煙自從筒中出則口含筒吸取煙嚥之如覺心中少悶須暫舉頭即將指頭捻筒頭勿使漏煙氣吸煙使盡止凡如是三日一度為之待至六日則飽食羊肉餺飥一頓則永差出第六卷中古今錄驗療欬欱呼合切下同煙法鍾乳研白石英研人參丹參研雄黄各七分研水銀二分研烏羊腎脂一具浄紙十張右八味各擣篩為末以水銀投藥褁細研使入諸藥羊脂熬取置紙中令均平使厚一分散藥令周遍翦紙一張作三分瘦弱婦人五日用半寸熏未服藥前齋五日服藥後一百日忌五辛酒肉此一劑得療五十人上氣悉皆愈忌生血物又療欬腹脹氣上不得卧身體水腫長孫振熏法蠟紙一張熟艾薄布遍紙上熏黄末三分欵冬花末二分右三味并遍布艾上著一葦筒卷之寸别以繩繫之燒下頭欱煙嚥之亦可三十嚥欱訖則差欱盡三劑一百日斷鹽醋日一毎欱三寸三日盡一劑出第十九卷中療欬方一十四首深師療欬方巴豆炮去殻勿傷肉白飲吞下初日飲服二枚二日三枚良忌野豬肉蘆笋千金同又方蜀椒一合汗去目杏仁去皮尖半合熬䜴半合欵冬花半合右四味擣蜜和為丸晩間不食含一丸如彈丸大含一丸則知効驗十年者五六日知良並出第十八卷中小品療欬生薑五味子湯方五味子五合生薑八兩紫菀一兩半夏二兩洗呉茱茰一兩欵冬花半兩細辛一兩附子一枚炮茯苓四兩甘草二兩炙桂心一兩右十一味切以水一斗煮取五升分温三服老人可服五合忌海藻菘菜豬肉冷水羊肉􅄳生菜醋物生葱古今錄驗同出第一卷中備急療欬方杏仁半斤去尖皮兩仁者熬紫菀二兩右二味先研杏仁取汁使盡細切紫菀更煎少濃去滓内蜜使稠細細飲之立定出第三卷中崔氏療欬方杏仁一升去尖皮兩仁熬蘇子汁五合生薑汁五合煎蜜五合煎令沫盡右四味先擣杏仁作脂訖内諸藥和煎攪調三四沸藥成含嚥如棗大日三四忌䔉麫出第六卷中延年紫菀飲主欬方紫菀一兩半貝母二兩人參一兩橘皮半兩生薑一兩杏仁一兩半去皮尖兩仁者研右六味切以水二升五合煮取八合分三服欲再服亦得慎鹹醋䔉麫蔣孝璋處出第五卷中必効療欬方棗一百二十顆去核豉一百粒桃仁一百二十顆去皮尖兩仁者熬令色黄右三味合擣為丸如棗大含之無不差又方雞子白皮十四枚熬令黄麻黄三兩去節右二味擣成散毎服方寸匕日二食後飲下之無所忌又方麻黄二兩去節紫菀二兩貝母三兩去心右三味擣篩蜜和丸如杏核綿褁含稍稍嚥汁盡更作日四五度又方杏仁一百二十枚去皮尖熬䜴一百枚熬令乾乾棗四十枚去核右三味合擣如泥丸如杏核含嚥令盡日七八度盡更作出第一卷中古今錄驗百部湯療欬晝夜不得眠兩眼突出方百部半兩生薑半斤細辛三兩貝母三兩甘草二兩炙杏仁四兩去皮尖兩仁者紫菀三兩桂心二兩白术二兩麻黄六兩去節五味子二兩右十一味切以水一斗二升煮取三升分三服忌桃李雀肉海藻菘菜生菜千金無杏仁紫菀餘同又療欬噏散方細辛紫菀天雄炮石膏欵冬花鍾乳各二分右六味擣篩作散如大豆七聚以小竹筒噏服日二不得食生魚醬醋生菜但食糜七日欬愈乃止若大豆聚不知亦小益勿大多甚良忌生菜冷水豬肉千金同又療欬麻黄五味子湯方麻黄四兩去節五味子五合甘草二兩炙半夏二兩洗乾薑五合細辛二兩桂心六兩杏仁三兩去皮尖兩仁者右八味切以水一斗煮取四升去滓分温五服日三夜二忌海藻菘菜羊肉􅄳生菜生葱又療欬羊肺湯太醫史脫方欵冬花一兩紫菀乾薑細辛各一兩桂心甘草炙各半兩五味子半斤白前食茱茰各半兩羊肺一枚細切右十味切以水八升合煮取三升去滓一服三合日三禁食鹽䔉生菜海藻菘菜生葱並出第十九卷中積年久欬方二十一首病源肺感於寒微者則成欬𠻳久欬𠻳是連滯嵗月經久不差者也凡五藏皆有欬𠻳不已則各傳其腑諸久欬不已三焦受之其狀欬而腹滿不欲食飲此皆寒氣聚於胃而關於肺使人多涕唾而變面浮腫氣逆故也出第十四卷中深師療五藏欬積年劇則上氣不得卧喉中如有物醫所不療五愈丸方桂心細辛乾薑白前甘草炙各三分蜀椒汗代赭通草欵冬花芫花熬各一分伏龍肝紫菀牡蠣各二分熬右十三味擣篩以飴糖和之擣令調和如棗核一丸含之稍稍嚥其汁盡復含令胷中熱為候不知以意加之其久病重者晝夜二十餘丸若一嵗欬者一月愈十嵗欬者百日愈忌海藻菘菜生葱生菜等又療三十年欬芫花煎方芫花二兩乾薑三兩末之右二味以水五升煮芫花取三升去滓内薑末加蜜一升合煎之如糜一服如半棗日三不知加之一方不用乾薑取芫花汁蜜和煎令可丸服如梧子三丸日三又療三十年欬氣奔上欲死醫所不療海藻丸褚仲堪方海藻三分麥門冬五分去心昆布乾薑細辛文蛤桂心蜀椒汗各二分右八味擣篩蜜和服如杏仁許夜卧一丸著舌上稍稍嚥汁盡更著一丸忌生葱生菜等又療三十年欬𠻳上氣短氣久冷五藏客熱四肢煩疼食飽則劇時有發甚不能行步夜不得卧多夢香豉丸香豉四分熬杏仁二分去尖皮兩仁熬紫菀三分桂心三分甘草八分炙乾薑二分細辛三分呉茱茰二分右八味擣篩蜜和服如梧子四丸日三不知増之能含嚼嚥汁亦佳忌海藻菘菜生葱生菜又療三十年上氣欬𠻳欵冬花丸方欵冬花六分桂心四分紫菀六分杏仁四分去尖皮兩仁熬附子二兩炮藜蘆四分乾薑六分甘草七分炙細辛六分防風八分芫花六分熬蜀椒八分汗野葛四分去心右十三味擣篩蜜和丸如梧子服三丸稍加日三服忌生葱辛鹹醋豬肉冷水海藻菘菜生菜狸肉等一方十四味此方忌酢恐有茯苓又療三十年欬逆上氣咽喉如水雞鳴或唾膿血師藥不能療者方香䜴三升熬蜀椒一升汗乾薑一斤豬肪三斤右四味擣篩内肪中以水五升合䜴等物熟煎毎以二合服之大効又療三十年欬𠻳七星散方蜀椒汗桑根白皮芫花根皮欵冬花紫菀代赭細辛伏龍肝各一兩右八味擣為散取作七星聚聚如藊豆大以竹筒口當藥上一一噏嚥之令藥入腹中先食訖即服藥日三服後三日不差復作七聚以一臠肉炙令熟以轉展藥聚上令藥悉在炙肉中仰卧㕮咀炙肉汁令藥力歆歆皆毒螫咽中藥力盡吞肉前後所療皆不至食肉便愈若不愈復作如初法必愈乃止羊牛鹿肉皆可用勿用豬肉忌生菜千金延年不用椒與芫花根餘同並出第十八卷中千金療三十年欬𠻳方蜜一斤生薑二斤取汁右二味先秤銅銚知斤兩訖内蜜復秤知斤兩次内薑汁以㣲火煎令薑汁盡惟有蜜斤兩在止旦服如棗大含一丸日三禁一切雜食又療三十年欬方紫菀二兩欵冬花三兩右二味為散先食飲服一錢匕日三七日愈張文仲古今錄驗深師同又療三十年欬方百部根三斤右一味擣取汁煎之如飴以温粥飲服方寸匕日三服深師方白蜜二升更煎五六沸服三合有驗又療久欬不差方兔矢四十九枚胡桐律􅗠砂三分右三味擣篩蜜和為丸服如梧子三丸令吐冷物盡則差並出第十八卷中延年療久欬不差方豬腎一具去脂膜椒二十八顆開口者右二味取腎一顆上作十四孔取椒内孔中兩腎揔著二十八顆了以水緩煮令熟割破細切噉之令盡有驗張文仲處出第五卷中崔氏療積年欬喉中啞聲方芫花根白皮六分切熬令焦黒貝母十二分欵冬花六分百部根八分切熬杏仁十分去尖皮熬皂莢四分去皮子炙五味子六分蜈蚣半枚炙桑白皮六分麻黄八分去節紫菀八分右十一味擣篩蜜和為丸如梧子大一服五丸日再服加至十五丸煮棗汁送之出第六卷中必効療欬𠻳積年不差者胷膈乾痛不利方紫菀一大兩杏仁四十九枚去兩仁尖皮熬酥一大合蜜一大合右四味紫菀及杏仁各别擣先煮酥蜜攪令和内紫菀杏仁研破塊煎十餘沸藥成出瓷器中毎日空腹服一彈丸細細含嚥之忌酒麫及猪肉等凌空道士得此方傳効不復可言又方莨菪二分以水淘去浮者水煮令牙出焙乾炒令黄黑色酥一雞子許大棗七枚右三味鐺中煎令酥盡取棗去皮食之日二又方生薑五兩餳半大升右二味取薑刮去皮如筭子切之置餳中㣲火煎薑使熟食使盡則差叚侍御用之極効又方欵冬花右一味和蜜火燒含取煙嚥之三數度則差又方取莨菪子三指撮吞唾嚥之日五六度光禄李丞自服之極神効並出第一卷中古今錄驗療人三十年寒冷欬逆上氣麻黄湯方麻黄八分去節蜀椒四分汗細辛三分藁本二分杏仁五十枚去皮尖兩仁者碎右五味切以水七升煮取三升分為三服日三忌生菜又許明療人久欬欲死方取厚榆皮削如指大去黑尅令如鋸長尺餘内喉中頻出入當吐膿血則愈又香豉丸療上氣三十年欬氣久寒冷痺脾中客熱變為冷方食茱茰一兩甘草一兩香䜴二十枚細辛杏仁去尖皮兩仁者熬各一兩紫菀二兩右六味擣篩為末别擣杏仁如膏乃内末攪令匀蜜和丸如梧子服三丸日三不知増之至五丸暮卧時含十丸著咽喉中嚥之忌海藻菘菜生菜出第十九卷中久欬坐卧不得方二首集驗療久患氣𠻳發時奔喘坐卧不得并喉裏呀聲氣欲絶方麻黄去節杏仁去尖皮兩仁者碎紫菀各三兩柴胡橘皮各四兩右五味切以水六升煮取二升半去滓分三服一劑不差頻兩三劑從來用甚驗張文仲同出第四卷中備急療久欬奔喘坐卧不得并喉裏呀聲氣絶方麻黄去節乾蘇葉橘皮各三兩柴胡四兩杏仁四兩去尖皮兩仁者碎右五味切以水六升煮取二升半分三服服兩劑必差甚効張文仲同出第三巻中欬𠻳短氣方七首病源肺主於氣候於皮毛氣虚為㣲寒客於皮毛傷於肺氣不足則成欬𠻳夫氣得温則宣和得寒則痞澀虚則氣不足而為寒所迫併聚於肺間不得宣發故令欬而短氣也出第十四卷中深師療傷中欬𠻳短氣腸中痛流飲厥逆宿食不消化寒熱邪癖五内不調肉蓯蓉湯方肉蓯蓉五兩乾地黄四兩大棗二十枚擘烏頭一兩炮甘草炙桂心紫菀五味子各二兩生薑石膏碎綿褁麥門冬去心各三兩右十一味切以水一斗五升煮取七升去滓分為七服日四夜三一方用大棗五十枚水一斗二升煮取九升忌海藻生葱菘菜蕪荑豬肉冷水又療上氣咽喉窒塞短氣不得卧倚壁而息腰背苦痛支脅滿不能食面色痿黄貝毋飲方貝母石膏綿褁碎桂心麻黄去節甘草炙各二兩杏仁三十枚去尖皮兩仁者生薑五兩半夏五兩洗右八味切以水一斗煮取三升去滓分三服忌海藻菘菜羊肉生葱􅄳等又療欬而不利胷中痞而短氣心中時悸四肢不欲動手足煩不欲食肩背痛時惡寒海藻湯方海藻四兩茯苓六兩半夏五合洗五味子五合細辛二兩杏仁五十枚去尖皮兩仁者右六味切以水一斗煮取三升分三服忌羊肉􅄳生葱醋物一方有生薑一兩千金同出第十八卷中古今録驗五味子湯療逆氣欬𠻳胷膈中寒熱短氣不足方五味子一兩前胡三兩紫菀甘草炙桂心生薑各二兩棗三十枚擘山茱茰三兩右八味切以水一斗煮取七升絞去滓服一升日三夜三忌生葱海藻菘菜廣濟方用橘皮不用茱茰又胡椒理中丸療欬𠻳逆氣不能飲食短氣方胡椒蓽撥乾薑欵冬花甘草炙橘皮髙良薑細辛各四兩白术五兩右九味擣篩蜜和丸如梧子一服五丸日再忌桃李雀肉生菜海藻菘菜又瀉肺湯療欬逆短氣方人參三分生薑四分半夏五分洗甘草四分炙橘皮十二分竹葉二兩右六味切以水六升煮取二升分三服此方亦療霍亂忌羊肉􅄳海藻菘菜又療欬𠻳及短氣脅痛薑椒湯方生薑椒去目汗各一兩右二味切以水五升煮取三升每服一合並出第十九卷中九種欬𠻳方一首千金九種氣欬𠻳欲死百病方乾薑二分半夏洗細辛紫菀呉茱茰芫花茯苓甘遂防葵甘草炙人參烏頭炮大黄葶藶子熬巴豆去皮心熬厚朴炙杏仁去皮尖兩仁者熬各一分五味子逺志去心枳實炙皂角去皮子炙當歸桂心前胡菖蒲大㦸蜀椒各半分白薇三分右二十八味擣合蜜丸先食服如梧子二丸日三以知為度不知増之忌海藻菘菜羊肉􅄳生葱酢物野豬肉蘆笋一方無巴豆有䗪蟲半分恐非出第十八卷中欬逆及厥逆飲欬方七首病源欬逆者是欬𠻳而氣逆上也氣為陽流行腑藏宣發腠理而氣肺之所主也欬病由肺虚感㣲寒所成寒搏於氣氣不得宣胃逆聚還肺肺則脹滿氣逆不下故為欬逆其狀欬而胷滿氣逆髆背痛汗出尻隂股膝踹䯒足皆痛也其湯熨鍼石别有正方補養宣導今附於後養生方導引法云先以鼻内氣乃閉口欬還復以鼻内氣欬則愈向晨去枕正偃卧伸臂脛瞑目閉口無息極脹腹兩足再息頃間吸腹仰兩足倍拳欲自㣲息定復為之春三夏五秋七冬九蕩滌五藏津潤六腑又云還向反望側望不息七通療欬逆胷中病寒熱出第十四卷中深師療欬𠻳短氣不得息發熱胷苦滿不得飲食五味子湯方五味子二兩桂心甘草炙細辛各一兩乾薑三兩紫菀二兩一方一兩大棗二十枚擘麻黄二兩去節右八味切以水八升煮取三升分三服無乾薑生薑亦得忌海藻菘菜生菜生葱出第十八卷中千金竹皮湯主欬逆下血不息方生竹皮三兩紫菀二兩飴糖一斤生地黄汁一升右四味切以水六升煮取三升分三服忌蕪荑深師同又療大逆上氣喉咽不利止逆下氣麥門冬湯主之方麥門冬二升去心半夏一升洗人參甘草各二兩炙粳米二合大棗十四枚右六味切以水一斗二升煮取六升服半升日三夜一忌羊肉􅄳海藻菘菜此本仲景傷寒論方並出第十八卷中古今録驗療厥逆藏氣有餘寒氣虚勞憂氣驚氣其人善悸胷中或寒上下無常多悲傷流四肢臍四邊常有核遊腫大便不利遊氣湯方厚朴四兩炙人參甘草炙牡蠣各二兩熬茯苓四兩桂心半夏各一兩洗梔子四枚生薑八兩黄芩三兩右十味切以水九升煮取三升半去滓分服七合日三夜再服若腹痛去黄芩加芍藥三兩良驗忌海藻菘菜生葱羊肉􅄳醋物等又療欬逆上氣丸方乾薑四兩桂心欵冬花各一兩附子四枚炮五味子二兩巴豆六十枚老者三十枚去心皮熬右六味先擣上五味下篩别擣巴豆如膏内藥末以蜜和丸如麻子以一丸著牙上㕮咀常暮卧時服亦可日三服忌生葱豬肉蘆笋又小胡椒丸療寒冷欬逆胷中有冷咽中如有物狀吐之不出方胡椒五分乾薑六分欵冬花三分右三味擣篩蜜和丸如梧子大米飲服三丸日再服以知為度禁如前法並出第十九卷中十欬方六首千金問曰欬病有十何謂也師曰有風欬有寒欬有支欬有肝欬有心欬有脾欬有肺欬有腎欬有膽欬有厥隂欬問曰十欬之證何以為異師曰欲語因欬言不得終謂之風欬飲冷食寒因之而欬謂之寒欬心下堅滿欬則支痛其脉反遲謂之支欬欬引脅下痛謂之肝欬欬而唾血引手少隂謂之心欬欬而涎出續續不止下引少腹謂之脾欬欬引頸項而唾涎沫謂之肺欬欬則耳無所聞引腰并臍中謂之腎欬欬而引頭痛口苦謂之膽欬欬而引舌本謂之厥隂欬夫風欬者下之寒欬支欬肝欬灸足太衝心欬灸刺手神門脾欬灸足太白肺欬灸手太泉腎欬灸足太谿膽欬灸足陽陵泉厥隂欬灸手太陵留飲欬者其人欬不得卧引項上痛欬者時如小兒瘈瘲狀夫久欬為水欬而時發熱脉在九菽一云卒弦者非虚也此為胷中寒實所致也當吐之欬家其脉弦欲行吐藥當相人疆弱無熱乃可吐耳通按太泉疑太淵又欬家其人脉弦為有水可與十棗湯下之不能卧坐者隂不受邪故也又夫有支飲家欬煩胷中痛者不卒死至一百日一嵗與十棗湯方芫花甘遂大㦸並熬等分右三味擣下篩以水一升五合煮大棗十枚取八合絞去滓内藥末彊人取重一錢羸人半錢匕頓服之平旦服而不下者明旦更益藥半錢下後自補養古今録驗同此方仲景傷寒論方又欬而引脅下痛者亦十棗湯主之用前方又夫酒客欬者必致吐血此坐久極飲過度所致也其脉沈者不可發汗久欬數嵗其脉弱者可療實大數者死其脉虚者必苦冐也其人本有支飲在胷中故也治屬飲家上氣汗出而欬屬飲家欬而小便利若失溺不可發汗發汗出則厥逆冷又欬逆倚息不得卧小青龍湯主之麻黄去節芍藥細辛桂心乾薑甘草炙各三兩五味子半升半夏半升洗右八味切以水一斗先煮麻黄減二升去沫乃内諸藥煮得三升去滓服一升若渴者去半夏加栝樓根三兩微利者去麻黄加蕘花如雞子大熬黄若食飲噎者去麻黄加附子一枚炮去皮六片破小便不利少腹滿者去麻黄加茯苓四兩若喘去麻黄加杏仁半升去尖皮兩仁者熬芫花不主利麻黄止喘今語反之疑非仲景意加減忌海藻菘菜生葱生菜羊肉􅄳此本仲景傷寒論方青龍下已多唾口燥寸脉沈而尺脉微手足厥逆氣從少腹上衝胷咽手足痺其面翕熱如醉狀因復下流隂股小便難時復冐者可與茯苓桂心甘草五味子等湯主之治其氣衝方茯苓四兩桂心一兩甘草三兩炙五味子半升右四味切以水八升煮取三升去滓温分三服忌海藻菘菜生葱以千金校之亦脫此方今於仲景方録附之衝氣則抵而反更欬胷滿者與茯苓甘草五味子去桂心加乾薑細辛以治其欬滿方茯苓四兩甘草炙乾薑細辛各三兩五味子半升右五味切以水八升煮取三升去滓温服一升日三忌海藻菘菜生菜醋等物欬滿即止而復更渴衝氣復發者以細辛乾薑為熱藥也服之當遂渴而渴反止者為支飲也支飲法當冐冐者必嘔嘔者復内半夏以去其水方茯苓四兩甘草炙乾薑細辛各三兩五味子半升半夏半升洗右六味切以水八升煮取三升去滓温服一升日三忌海藻菘菜生菜羊肉􅄳酢等水去嘔則止其人形腫可内麻黄以其人遂痺故不内麻黄乃内杏仁也若逆而内麻黄者其人必厥所以然者以其人血虚麻黄發其陽故也方茯苓四兩乾薑三兩細辛三兩五味子半升半夏半升洗杏仁半升去尖皮兩仁者甘草三兩炙右七味切以水一斗煮取三升去滓温服一升日三忌海藻菘菜生菜羊肉􅄳酢等若面熱如醉狀者此為胃中熱上衝熏其面令熱加大黄利之方細辛甘草炙乾薑各三兩茯苓四兩五味子半夏洗杏仁去尖皮各半升大黄三兩蒸右八味切以水一斗煮取三升去滓温服一升日三服忌海藻菘菜生菜􅄳醋羊肉並出第十八卷中久欬𠻳上氣唾膿血及濁涎方五首病源久欬𠻳上氣者是肺氣虚極風邪停滯故其病積月累年久不差則胷背疙面腫甚則唾膿血也出第十四卷中深師療肺氣不足欬逆唾膿血咽喉悶塞胷滿上氣不能飲食卧則短氣補肺湯方欵冬花三兩桂心二兩鍾乳二兩乾薑二兩白石英二兩麥門冬去心四兩五味子三兩粳米五合桑白皮根一斤大棗一百枚擘右十味切以水一斗二升先煮桑白皮棗令熟去滓内藥煮取二升二合分三服忌生葱等千金同又療欬逆上氣時時唾濁但坐不得卧皂莢丸方長大皂莢一挺去皮子炙右一味擣篩蜜和服如梧子一丸日三夜一以大棗膏和湯下之千金經心録延年同此本仲景傷寒論方一名棗膏丸又療欬逆上氣吐膿或吐血胷滿痛不能食補肺湯方黄茋一法五兩桂心乾地黄茯苓厚朴乾薑紫菀橘皮當歸五味子逺志去心麥門冬去心各三兩甘草炙鍾乳白石英各二兩桑白皮根人參各二兩大棗二十枚擘右十八味切以水一斗四升煮取四升分温四服日三夜一忌海藻菘菜生葱醋物千金同並出第十八卷中古今録驗療寒冷欬𠻳上氣胷滿唾腥膿血四味石鍾乳散方鍾乳碎研白礜石鍊欵冬花桂心各一分右四味擣合下篩以筒吸之如大豆許一匕聚先食日二不知稍増之數試有驗當作七聚遂吸之忌生葱千金集驗同出第十九卷中必効療上氣唾膿血方灸兩乳下黑白際各一百壯良千金同欬𠻳膿血方一十一首病源欬𠻳膿血者損肺傷心故也肺主氣心主血肺感於寒微者則成欬𠻳傷於隂脉則有血血與氣相隨而行欬𠻳極甚傷血動氣俱乗於肺以津液相摶藴結成膿故欬𠻳而有膿血也出第十四卷中廣濟療瘕瘷吐膿損肺方人參二分𤓰蔕三分杜蘅五分右三味擣篩為散平旦空腹以熱湯服方寸匕當吐痰水惡汁一二升吐己復煮白粥食淡水未盡停三日更進一服忌生冷油膩猪魚肘後古今録驗用杜蘅三分人參一分服一錢匕出第二卷中深師療欬逆唾膿血雞子湯方雞子一枚甘草二分灸甘遂一分大黄二分黄芩二分右五味切以水六升煮取二升去滓内雞子攪令調盡飲之良忌海藻菘菜又療傷肺唾血方茅根右一味擣篩為散服方寸匕日三亦可絞去汁飲之主熱渴出第四卷中刪繁療肺偏損胷中應肺偏痛唾血氣欬欵冬花散方欵冬花當歸各六分桂心芎藭五味子附子炮各七分細辛貝母各四分乾薑乾地黄各八分白术甘草炙杏仁去尖皮各五分紫菀三分右十四味擣篩為散清酒服方寸匕日二服忌生葱生菜桃李雀肉海藻菘菜猪肉蕪荑出第五卷中千金百部丸主諸欬不得氣息唾膿血方百部根二兩升麻半兩桂心五味子甘草炙紫菀乾薑各一兩右七味擣篩蜜和丸如梧子服三丸日三以知為度忌生葱海藻菘菜等物又療肺傷欬唾膿血腸澀背氣不欲食惡風目闇􅍃􅍃足膝脛寒湯方乾地黄切半升桑白皮切二升芎藭切一升白膠五兩桂心二尺人參紫菀各二兩大棗二十枚擘生薑五兩飴糖一升大麻仁一升大麥三升右十二味切以水一斗五升煮麥濾取一斗去滓内藥煎取三升分三服忌生葱又療肺病欬𠻳膿血及唾涕血出不止方好酥五十斤右三遍鍊停凝當出醍醐服一合日三以差止又方三遍鍊酥如雞子黄適寒温灌鼻中日二夜一又療欬𠻳喘息喉中如有物唾血方杏仁二升去尖皮兩仁者猪脂二合糖一升生薑汁二升蜜一升右五味先以猪膏煎杏仁黄黑出以紙拭令淨擣如膏合煎五物令可丸服如杏核日夜六七漸加之並出第十八卷中古今録驗瀉肺湯療肺中膿欬唾血氣急不安卧方芎藭麻黄去節細辛椒去目閉口汗當歸各一兩右五味切以水七升煮取三升分為三服日三微汗或吐膿血忌生菜一方有生薑一兩又羊肺湯療欬晝夜無閑息氣欲絶肺傷唾血方鍾乳五兩牡蠣熬桂心六兩射干桃仁去尖皮貝母橘皮百部根五味子各三兩生薑六兩白石英半夏洗各五兩欵冬花甘草炙厚朴炙各二兩羊肺一具右十六味切先以水二斗三升煮羊肺取一斗去肺内諸藥煮取三升分四服日三夜一忌海藻菘菜羊肉餳生葱出第十九卷中久欬𠻳膿血方四首病源久欬𠻳膿血者肺感於寒微則成欬𠻳欬𠻳極甚傷於經絡血液藴結故有膿血氣血俱傷故連滯積久其血黯瘀與膿相雜而出也出第十四卷中廣濟療積年欬𠻳膿血方莨菪二升大棗一百顆青州者右二味以水三大升取馬糞燒火煎熟之候令汁盡取棗早晨服一枚日中一枚日暮一枚不覺漸加口乾胷熱則以為度不吐不利忌並如前法又療欬經年不差氣喘欲絶傷肺見血方桑白皮切五合白羊肺一具切芍藥十分欵冬花六分茯苓十一分貝母十二分麥門冬六分杏仁六分去尖皮熬為脂升麻十二分生地黄汁一斤黄芩十二分蜜一升右十二味切以水一斗煮取三升去滓内杏仁脂地黄汁蜜等㣲火上煎如魚眼沸攪勿停手取二升二合煎成浄綿夾布濾毎食後含一合日夜三四度老小以意減之微煖含之佳忌生冷油醋麫魚䔉蕪荑並出第二卷中深師療欬逆氣喘不息不得眠唾血嘔血短氣連年欵冬花丸方欵冬花十八分紫菀十二分杏仁八分去尖皮兩仁者熬香䜴十分熬人參二分甘草三分炙蜀椒三分汗天門冬六分去心乾薑桂心乾地黄各三分右十一味擣篩蜜和如彈丸含稍稍嚥汁日四夜再神良忌海藻菘菜生葱蕪荑鯉魚出第十八卷中近効療久欬兼唾血方白前三兩桑白皮桔梗各二兩甘草一兩炙右四味切以水二大升煮取半大升空腹頓服若重者十數劑忌猪肉海藻菘菜李子釗方欬𠻳唾粘方二首廣濟療肺熱欬𠻳涕唾多粘甘草飲子方甘草六分炙欵冬花七分䜴心一合生麥門冬八分去心葱白一握㯽榔十顆合子碎桔梗六分地黄汁半升右八味切以水六升煮取二升絞去滓下地黄汁分温三服如人行四五里進一服不利忌生菜熱麫炙肉海藻菘菜魚䔉粘食猪肉蕪荑出第二卷中延年紫蘇飲療欬𠻳短氣唾涕稠喘乏風虚損煩發無時者宜服此方紫蘇貝母各二兩紫菀一兩麥門冬一兩去心棗五枚擘葶藶子一兩熬令黄别擣甘草一兩炙右七味切以水六升煮取二升分為四服毎服如人行七里禁猪魚肉䔉海藻菘菜出第五卷中許仁則療欬𠻳方一十二首許仁則論欬𠻳病有數種有熱𠻳有冷𠻳有肺氣𠻳有飲氣𠻳熱𠻳者年少力壯體氣充滿將息傷熱積熱所成故致熱𠻳此但食飲取冷兼以藥壓之自歇冷𠻳者年衰力弱體氣虚微如復寢食傷冷故成冷𠻳此亦但將息以温兼進温藥則當平復肺氣𠻳者不限老少宿多上熱後因飲食將息傷熱則常𠻳不斷積年累嵗肺氣衰便成氣𠻳此𠻳不早療遂成肺痿若此將成多不救矣飲氣𠻳者由所飲之物停澄在胷水氣上衝衝入於肺肺得此氣便成𠻳久而不除漸成水氣若作此病亦難療之熱𠻳之狀更無其餘但遇於熱便發此者宜合生地黄等七味湯服之方生地黄一升切生薑二合切桑白皮根切一升射干切二升乾葛切六合紫蘇三合竹瀝一升右藥細切七味以水一斗煮取三升去滓内竹瀝攪調每食後良久則服之分一劑作四服若覺可則重合服之病輕者三數劑則差忌蕪荑又依前生地黄等七味飲雖得暫差於後還發宜合紫菀等十味丸方紫菀五分桑白皮六合射干四兩百部根五兩麻黄二兩去節乾葛五兩地骨皮升麻各四兩乾地黄六兩芒硝六兩右藥擣篩蜜和丸如梧子以竹瀝下之初服十五丸日再服稍稍加至三十丸忌蕪荑又冷𠻳之狀但遇諸冷此疾便發有如此者宜合大棗等七味湯主之方大乾棗三十枚擘桂心四兩杏仁一百枚去尖皮兩仁研細辛五兩呉茱茰當歸各三兩右藥切以水八升煮取二升六合去滓温分三服毎服如人行十里久服一劑覺得力至三四劑亦佳隔三四日服一劑此湯元欠一味忌生葱生菜又依前大乾棗湯服之雖可未能斷其根遇冷便發宜合當歸等十味丸服之方當歸切細辛甘草炙各五兩桂心呉茱茰人參各三兩蜀椒三合汗橘皮乾薑各四兩桑白皮八兩右藥擣篩蜜和丸煮乾棗飲下之初服十丸日再服稍加至三十丸如梧子服此丸經三五日覺熱每服藥後良久喫三數口粥食壓之忌海藻菘菜生葱生菜又肺氣𠻳經久將成肺痿其狀不限四時冷熱晝夜𠻳常不斷唾白如雪細沫稠粘喘息氣上乍寒乍熱發作有時脣口喉舌乾焦亦有時唾血者漸覺瘦悴小便赤顔色青白毛聳此亦成蒸有此狀者宜合白前等七味湯服之兼有麻黄等十味丸桑白皮等十味煎又肺氣𠻳經久有成肺癰者其狀與前肺痿不多異但唾悉成膿出無多少有此病者於白前湯中加半夏五兩黄茋三兩以水一斗煮取二升八合於麻黄丸中加黄茋五兩苦參六兩芍藥三兩於桑白皮煎中加黄茋切三升共桑白皮地骨皮同煎又加水三升同煎忌羊肉􅄳白前湯方白前三兩桑白皮三兩生地黄一升茯苓五兩地骨皮四兩麻黄二兩去節生薑六兩右藥切以水八升煮取二升六合去滓加竹瀝五合分温四服食後服之晝三夜一覺得力重合服五六劑佳隔三日服一劑忌醋蕪荑又依前白前等七味湯雖服覺可根本未除宜合麻黄等十味丸服之方麻黄二兩去節白前二兩桑白皮六兩射干四兩白薇三兩百部根五兩乾地黄六兩地骨皮五兩橘皮三兩右藥擣篩蜜和丸煮桑白皮飲下之初服十丸日再服稍稍加至十五丸丸如梧子大本欠一味忌蕪荑又凡病在胷膈上者宜飽滿而在夜肺既居上此是病在上已晝服丸夜無慿準宜合桑白皮汁等十味煎毎夜含咽之方桑白皮切一升地骨皮切三升二味用水七升熟煎取三升汁去滓澄清生地黄汁五升生麥門冬汁二升生薑汁一升竹瀝三升生葛根汁三升白蜜一升牛酥三合大棗膏一升右八味先於微火上取生地黄汁以下生葛汁以上和煎減半則内桑白皮等二物汁和煎之三分減一則内酥蜜棗膏攪之勿停手得如稠飴狀煎成訖置别器中服之毎夜欲卧時取一胡桃大含之細細嚥汁稍加至雞子大欲晝日間丸服亦得忌蕪荑又飲氣𠻳經久不已漸成水病其狀亦不限四時晝夜𠻳不斷遇諸動𠻳物便致因劇甚者乃至雙眼突出氣即欲斷汗出大小便不利吐痰飲涎洟沫無復窮限氣上喘急肩息毎旦眼腫不得平眠有如此者宜合細辛等八味湯葶藶子十五味丸服之方細辛半夏洗桂心桑白皮各五兩乾薑當歸各四兩芒硝六兩杏仁六合去尖兩仁者研右藥切以水九升煮取三升去滓内芒硝分温三服毎服如人行十里久當得快利後好將息經三四日合丸服之忌生葱生菜羊肉􅄳丸方葶藶子六合熬細辛五味子各五兩乾薑當歸各四兩桂心人參丁香大黄商陸根各三兩橘皮四兩桑白皮六兩皂莢肉二兩炙大腹㯽榔二十枚麻黄二兩去節右藥擣篩蜜和丸煮桑白皮飲下初服十丸日再服稍加至十五丸如梧子大若利則減秘則加以大便通滑為度時時得鴨溏亦佳忌生葱生菜又依前細辛等八味湯葶藶子等十五味丸不覺可漸成水病餘一如前况更加大小便秘澀頭面身體浮腫宜合大乾棗三味丸服之方大棗六十枚擘去核葶藶子一升熬杏仁一升去尖皮兩仁者熬右藥合擣令如膏可作丸如硬燥不相著細細下蜜作丸依前以桑白皮飲下之初服七八丸日再服稍稍加之以大便通為度病重者時令鴨溏佳亦有以前三味煮湯服之又依前大棗等三味丸服雖覺氣蹔歇然病根深固藥力微弱且停服大棗丸合巴豆丸五味細細服之蕩滌宿病方巴豆仁二十枚熬去心皮杏仁一百顆去尖皮兩仁者熬牽牛子五合熬葶藶子六合熬大棗六十枚擘去核右藥合擣一如前大棗丸法還以桑白皮飲下之服三四丸日再服如利即減秘即加常以大便調為候病甚時時取鴨溏亦佳忌蘆笋野豬肉呉昇同出下卷中雜療欬𠻳方三首古今録驗五藏六腑皆令人欬肺居外而近上合於皮毛皮毛喜受邪故肺獨易為𠻳也邪客於肺則寒熱上氣喘汗出欬動肩背喉鳴甚者唾血肺欬經久不已傳入大腸其狀欬則遺糞腎欬者其狀引腰背痛甚則欬涎腎欬經久不已傳入膀胱其狀欬則遺尿肝欬者其狀左脅痛甚者不得轉側肝欬經久不已傳入膽其狀欬則清苦汁出心欬者其狀引心痛喉中介介如鯁狀甚者喉痺咽腫心欬經久不已傳入小腸其狀欬則失氣脾欬者其狀右脅痛隂隂則引肩背甚者不得動動便欬劇脾欬經久不已則傳入胃其狀欬即嘔甚則長蟲出久欬不已則三焦受之三焦欬之狀欬而腹滿不能食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也又非時有風寒冷人觸冐解脫傷皮毛間入腑藏為欬上氣如此也又非時忽然暴寒傷皮膚中與肺合則欬𠻳上氣或胷脅义痛欬唾有血者是其熱得非時之寒暴薄之不得漸散伏結深喜肺癕也因欬服温藥欬尤劇及壯熱吐膿血汗出惡寒是也天有非時寒者急看四時方也又療欬𠻳上氣時時嘔白唾沫數十嵗者方呉茱萸五味子大黄桂心甘草炙細辛人參紫菀欵冬花各一兩大㦸竹筎各三分右十一味切以水一斗煮取三升分為三服亦療隂冷欬至良忌海藻菘菜生菜生葱深師同並出第十九卷中深師療諸欬心中逆氣氣欲絶杏仁煎方杏仁四兩去尖皮末豬膏二斤白蜜二升生薑汁三升右四味著銅器中於微火上先煎薑汁次内蜜膏令如􅄳置器著地乃内杏仁末復令得一沸煎成服如棗大一丸含之日三不知稍稍増之又療氣上迫滿或氣不通煩悶喘嘔蘇子湯方蘇子一升乾薑三兩半夏四兩洗桂心人參各一兩橘皮茯苓各三兩甘草一兩炙右八味切以水八升煮取二升半分為三服若虚熱去乾薑用生薑六兩加黄芩二兩忌海藻菘菜羊肉􅄳生葱酢等物並出第十八卷中外臺秘要方卷九
