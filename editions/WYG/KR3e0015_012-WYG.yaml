各二兩炙茯苓四兩生薑三兩切甘草一兩炙右八味切以水八升煮取三升分為三服日三忌海藻菘菜桃李雀肉等蔣孝瑜處大効又厚朴湯療不能食腹内冷氣方厚朴三兩炙白术人參各一兩茯苓三兩生薑五兩橘皮二兩右六味切以水四升煮取一升二合分為三服忌桃李雀肉酢物蔣孝瑜處出第六巻中脾胃病日漸瘦困不食方三首廣濟主脾胃中熱消渴小便數骨肉日漸消瘦方黄連麥門冬各十二分去心苦參括蔞知母茯神土𤓰根各八分人參甘草炙各六分右九味擣篩蜜和丸毎食後少時煮蘆根大麥飲服如梧子二十丸日二服漸加至四十丸不利忌海藻菘菜猪肉冷水酢等物又主胃氣冷弱食則吐逆從朝至夜不得食食入腹則脹氣滿急大便出飯粒如故帶酸氣而羸計日漸困者方呉茱茰二兩白术三兩人參乾薑甘草炙五味子各二兩麴末麥蘖末各五合厚朴一兩半桂心一兩右十味擣篩為散空腹煮生薑湯服方寸匕一日三服漸加至二匕忌生葱桃李雀肉海藻菘菜出第一巻中延年白术丸療惡心數吐水不多能食少心力者方白术乾薑人參厚朴炙桂心各六分細辛茯苓當歸茯神枳實炙五味子附子各六分炮呉茱茰六分逺志五分去心旋復花四分澤瀉五分右十六味擣篩蜜和為丸如梧子酒服二十丸日再服加至三十五丸忌桃李雀肉大酢生菜生葱猪肉冷水出第十七巻中胃實熱方二首千金凡右手關上脉陽實者足陽明經也病苦頭痛脉經云陽中堅痛而熱汗不出如温瘧脣口乾善噦乳癰缺盆腋下腫名曰胃實熱也療胃實瀉胃熱湯方梔子仁二兩芍藥四兩白术五兩茯苓三兩生地黄汁一升射干三兩赤蜜一兩升麻三兩右八味切以水七升煮六味取一升五合去滓下地黄汁兩沸次下蜜煎取二升分三服老小以意服之忌桃李雀肉酢物蕪荑等又方灸膝下三寸兩脚三里穴各三十壯主胃中熱病胃虚寒方七首千金右手關上脉陽虚者足陽明經也病苦脛寒不得卧惡風寒洒洒目急腹中痛耳虚鳴時寒時熱脣口乾面浮腫名曰胃虚冷也又療胃虚冷少氣口苦身體無澤補胃湯方防風栢子仁細辛桂心橘皮各二兩芎藭呉茱茰人參各三兩甘草一兩炙右九味切以水一斗煮取三升分温三服忌海藻菘菜生葱生菜等物又補胃虚寒身枯絶骨諸節皆痛人參散方人參細辛甘草炙各六分桂心當歸各七分麥門冬七分去心乾薑八分逺志肉四分蜀椒三分汗呉茱茰二分右十味為散食後服方寸匕温清酒進之忌海藻菘菜生葱生菜並出第十六巻中范汪療胃氣虚不欲食四肢重短氣調和五藏并療諸病調中湯方薤白切一升枳實六枚炙橘皮三枚大棗十二枚粳米三合香豉六合右六味切枳實橘皮棗以水六升先煮薤得四升内諸藥煮取一升半適寒温服中分服之良一方生薑四分出第二十一巻中刪繁療胃虚苦饑寒痛人參補虚湯方人參當歸茯苓桔梗芎藭橘皮厚朴炙各三兩桂心甘草炙各二兩白术五兩呉茱茰二兩大麥蘖二升炒右十二味切以水一斗二升煮取三升去滓分三服忌海藻菘菜桃李雀肉生葱猪肉酢等物出第十一巻中又白术八味等散方與前療同白术厚朴炙人參呉茱茰麥蘖炒茯苓芎藭橘皮各三兩右藥擣篩為散食前服方寸匕煖酒進之隨性服忌桃李雀肉大酢出第四巻中延年補胃飲主胃氣虚熱不能食兼渴引飲方茯苓四兩人參三兩橘皮二兩生薑三兩薤白切一升豉五合綿褁糯米二合右七味切以水七升煮取三升去滓分温六服中間任食一日令盡忌酢物張文仲處出第一巻中五膈方八首病源五膈氣者謂憂膈恚膈氣膈寒膈熱膈也憂膈之為病胷中氣結煩悶津液不通飲食不下羸瘦不為氣力恚膈之為病心下苦實滿噫輒酢心食不消心下積結牢在胃中大小便不利氣膈之為病胷脅逆滿噎塞胷膈不通噫聞食臭寒膈之為病心腹脹滿欬逆腹上苦冷雷鳴繞臍痛食不消不能食肥熱膈之為病藏有熱氣五心中熱口中爛生瘡骨煩四肢重脣口乾燥身體頭面手足或熱腰背疼痛胷痺引背食不消不能多食羸瘦少氣及癖也此是方家所說五膈形證也經云陽脉結謂之膈言憂恚寒熱動氣傷神而氣之與神並為陽也傷動陽氣致隂陽不和而腑藏生病結於胷膈之間故稱為膈氣衆方說五膈互有不同但傷動之由有五故云五膈氣出第十三巻中備急膈中之患名曰膏肓湯丸徑過針灸不及所以作丸含之令氣勢得相熏染有五膈要丸方麥門冬十分去心椒六分汗逺志附子炮乾薑人參桂心細辛各六分甘草十分炙右九味擣篩以蜜和丸如彈子以一枚著牙齒間含稍稍嚥汁日三主短氣胷滿心下堅冷氣此病有十許方率皆相類此丸最効五膈者謂憂膈氣膈恚膈熱膈寒膈也忌猪肉生菜海藻菘菜生葱千金肘後文仲同出第三巻中張文仲五膈丸方呉茱茰麴杏仁去皮尖乾薑蜀椒汗好豉熬右六味等分擣篩蜜和丸如梧子飲服七丸日三忌生冷此方出隱居効驗備急肘後同出第三巻中延年秘録凡憂膈氣膈食膈寒膈飲膈五病同藥常以憂愁思慮食飲而得之若寒食食生菜便發其病苦心滿不得氣息引脊痛如刺之狀食則心下堅大如粉絮大痛欲吐吐則差飲食不得下甚者乃手足冷上氣欬逆喘息氣短療以九物五膈丸方麥門冬去心蜀椒汗各三兩逺志三兩去心甘草五兩炙附子一兩炮乾薑三兩人參四兩桂心三兩細辛三兩通按此即前五膈要丸一味不差右藥擣篩蜜和微使淖置有蓋器中先食服大如彈子丸一丸置喉中稍嚥之喉中胷中當熱藥力稍盡復含一丸日三四夜一二服服藥七日愈二十日平復若不能含者可一大丸作二小丸盡服之唯夏月合乃益麥門冬甘草人參耳其餘不異神良椒當以銅器熬於火上使極熱下置地内椒器中熟攪之須􅁷汗出便擣合同處椒力有熱亦去其毒非令有熱也忌海藻菘菜猪肉冷水生葱生菜千金集驗同不能具於此方録用之耳古今録驗大五膈丸療膈中遊氣上下無常處藏有虚冷氣迫咽喉胷滿氣逆脅有邪氣食已氣滿羸瘦著牀骨立往來寒熱腹中不調或下痢嘔逆欬𠻳骨肉銷盡服之令人能食長肌肉强筋骨利五藏好顔色補不足益氣力方細辛桂心黄芩食茱茰厚朴炙各三分杏仁三十枚去尖乾薑川椒汗逺志各三分去心小草芍藥附子炮當歸各二分黄連二分右十四味擣篩蜜和服如梧子二丸日三不知加之以知為度忌猪肉冷水生葱菜等又五膈丸療憂膈氣膈食膈寒膈飲膈異病同藥神方人參附子炮逺志去心桂心細辛各四分乾薑蜀椒各五分汗右七味擣篩以蜜和服如彈丸著牙下㕮咀嚥之若病劇者日三夜再并療諸毒風注氣腹中百病皆應當得真新好藥即可中病耳神祕妙方不傳忌生葱生菜猪肉冷水等物通按此方比前五膈丸同但少麥冬甘草二味又療邪氣嘔逆吸氣五膈為病五藏俱虚則受風冷五藏有邪呼吸不足隂注於内陽結於外隂陽錯亂語言無常膈中左右狀如結氣喉咽不利氣出不入此血氣衰微藏凝冷氣成之服此丸安榖通氣温藏五膈丸出僧深方蜀椒一升汗乾薑二兩桂心二兩芍藥一兩半半夏洗細辛茯苓各一兩前胡一兩半右八物擣篩蜜和服如彈丸一枚喉中稍稍吞之可増至三丸或冷則加逺志一兩佳日再忌羊肉餳生葱生菜醋物又療胷痛逹背膈中煩滿結氣憂愁飲食不下藥悉主之宜丸方製半夏一分甘草炙逺志去心各四分乾薑桂心細辛椒去目汗附子炮各二分右八味擣篩以蜜和為丸先飯酒若粳米飲服如梧子五丸日三稍増至十丸忌海藻菘菜羊肉餳猪肉冷水生葱生菜並出第十八巻中經心録五膈丸療寒冷則心痛咽中如有物吐之不出咽之不入食飲少方乾薑三兩麥門冬二兩去心附子一兩炮細辛二兩蜀椒一兩汗逺志一兩去心甘草一兩炙人參二兩食茱茰二兩桂心三兩通按此方即前五膈丸多食茱茰一味右十味蜜和為丸如梧子服五丸日二忌猪肉冷水海藻菘菜生葱生菜千金同出第二巻中七氣方三首病源七氣者寒氣熱氣怒氣恚氣喜氣憂氣愁氣凡七種氣積聚堅大如柸若拌一作盤蒲官切在心下腹中疾痛欲死飲食不能時來時去毎發欲死如有禍祟此皆七氣所生寒氣則嘔吐惡心熱氣則說物不竟言而迫一云恍惚不章怒氣則上氣不可忍熱痛上搶心短氣欲死不得氣息恚氣則積聚在心下心滿不得飲食喜氣則不可疾行不能久立憂氣則不可劇作暮卧不安席愁氣則喜忘不識人語置物四方還取不得去處若聞急則四肢手足筋攣不能舉狀如得病此是七氣所生男子卒得飲食不時所致婦人則産中風餘疾千金同出第十三巻中千金七氣丸方烏頭七分炮紫菀前胡半夏洗細辛丹參茯苓芎藭桃仁去尖皮呉茱茰桂心桔梗石膏各三分研人參甘草防葵各四分千金作防風大黄七分乾薑二分蜀椒二分汗菖蒲三分右二十味擣篩為末蜜和丸酒服如梧子三丸日三加至十丸一方去半夏加甘遂三分忌海藻菘菜羊肉􅄳猪肉冷水生葱大酢生菜一方有芍藥無菖蒲又七氣丸主七氣七氣者寒氣熱氣怒氣恚氣喜氣憂氣愁氣此七氣為病皆生積聚堅牢如柸心腹絞痛不能飲食時去時來發則欲死凡寒氣狀吐逆心滿熱氣狀恍惚眩冐失精怒氣狀上氣不可當熱痛上盪心短氣欲絶不得喘息恚氣狀積聚心滿不得食飲喜氣狀不可疾行久立憂氣狀不可苦作卧不安席愁氣狀平故怒氣善忘四肢跗腫不得舉止亦療産後中風餘疾方大黄十分椒二分人參半夏洗芎藭柴胡甘草炙桔梗石膏菖蒲桃仁去皮尖呉茱茰茯苓各三分乾薑四分細辛三分右十五味擣篩蜜和丸如梧子酒服三丸日三加至十丸忌羊肉餳生葱海藻菘菜猪肉生菜酢物又七氣湯療虚冷上氣勞氣方半夏一升洗生薑十兩人參桂心甘草炙各一兩右五味切以水一斗煮取三升分為三服日三忌羊肉餳生葱海藻菘菜並出第十七卷中氣噎方六首病源此由隂陽不和藏氣不理寒氣填於胷膈故氣噎塞不通而謂之氣噎令人喘悸胷背痛也出第二十卷中廣濟療噎胷脅氣滿毎食氣噎通氣湯方半夏洗生薑各六兩橘皮桂心各三兩切右四味切以水八升煮取二升五合絞去滓分温三服服别相去如人行六七里服忌羊肉生葱餳等出第一巻中深師療胷滿氣噎通氣湯方半夏八兩洗生薑六兩桂心二兩大棗三十枚右四味切以水八升煮取三升分服五合日三夜一忌羊肉餳生葱千金同出第二十二巻中集驗療氣噎煎方蜜酥薑汁各一升右三味合和微火煎五六大沸取如大棗二枚内酒中飲之直抄服之亦好千金古今録驗同又通氣噎湯方半夏三兩洗桂心三兩生薑八兩羚羊角三兩右四味切以水八升煮取三升分服半升日再服忌羊肉生葱餳古今録驗同並出第四巻中救急療喉中氣噎方半夏洗柴胡生薑各三兩羚羊角屑一法三兩犀角屑桔梗昆布通草甘草炙各二兩右九味切以水八升煮取三升分三服忌羊肉􅄳猪肉海藻菘菜等古今録驗羚羊角湯療噎氣不通不得下食方羚羊角屑二兩厚朴炙呉茱茰乾薑各三兩通草橘皮各二兩烏頭十五枚炮右七味切以水九升煮取三升分三服日三忌猪肉冷水深師千金同出第二十七卷中諸噎方一十二首病源夫隂陽不和則三焦膈絶三焦膈絶則津液不利故令氣塞不調理也是以成噎此由憂恚所致憂恚則氣結氣結則不宣流使噎噎者噎塞不通也出第二十卷中深師療噎方羚羊角屑前胡甘草各一兩人參橘皮各二兩右五味切以水六升煮取二升分四服忌海藻菘菜又方鸕鷀喙右一物當噎時以銜之則下肘後同又方羚羊角右一物多少自在末之飲服亦可以角摩噎上良並出第二十二卷中廣利方療因食即噎塞如炙肉􅀈在咽中不下方呉射干六分升麻四分桔梗四分木通十二分赤茯苓八分百合八分紫菀頭二十一枚右七物切以水二大升煎取九合去滓分温三服食後良久服忌猪肉酢物出第四巻中千金理諸噎方常食乾粳米飯即不噎又方炭末細羅蜜丸如彈子大含少細細嚥津即下集驗同並出第十六卷中集驗療噎方取頭垢如棗大以粥若漿水和服之肘後深師同出第十卷中必効主噎方􅌯捺大椎盡力則下仍令坐之通按􅌯捺未詳仍令坐之亦未詳又方以酢煮麫糊噉之則差此只可一兩日差欲長久絶者取溲為丸如彈子酢中煮熟於水中澤却及熱則食二十丸神驗不過兩三度則差大効又半夏湯主噎方生薑四兩半夏一升洗石膏四兩碎小麥一升完用呉茱茰一升赤小豆二十顆大棗二十一顆人參甘草炙桔梗桂心各二兩右十一味切以酒二升水八升煮取三升分三服忌猪羊肉海藻菘菜􅄳生葱等古今録驗有括蔞無桔梗名乾薑湯不用生薑又方杏仁二兩去尖皮桂心二兩右二味末之蜜和丸含之如棗核許稍稍嚥之臨食先含極効忌生葱千金同並出第二卷中古今録驗療噎方蘆根三斤右一味切以水一斗煮取四升分四服出第二十七卷中卒食噎方九首病源此由藏氣冷而不理津液澀少而不能傳行飲食故食入則噎塞不通故謂之食噎胷内痛不得喘息食不下是故噎也出第二十卷中肘後療卒食噎方橘皮三兩右一味切以水三升煮取一升頓服之又方舂杵頭糠置手巾角以拭齒立下集驗深師千金同並出第五卷中深師療卒噎法傍人可緩解衣帶勿令噎者知則愈又療卒噎方與共食人當以手捉噎人筯問曰此等何物噎人當荅言筯共食人云噎下去則立愈又療卒噎不下方水一杯刀一口右二物先以刀横畫水已後盡飲之則下出第二十二卷中集驗療醋噎方羌活五兩擣用水一升浸三宿毎日温服五合差又療氣噎不下食兼嘔吐方半夏四兩洗生薑三兩各切右二味以東流水二大升煎取一升去滓温服三合日三服忌羊肉􅄳並出第五卷中備急療卒食噎不下方取蜜含之則下千金集驗肘後同又方取老牛涎沫如棗核大置水中飲之終身不有噎必効肘後深師千金同並出第三卷中五噎方三首病源夫五噎謂一曰氣噎二曰憂噎三曰食噎四曰勞噎五曰思噎雖有五名皆由隂陽不和三焦隔絶津液不行憂恚嗔怒所生謂之五噎噎者噎塞不通也出第二十巻中古今録驗五噎丸療胷中久寒嘔逆逆氣隔飲食不下結氣不消氣噎憂噎勞噎食噎思噎氣噎者心悸上下不通噫噦不徹胷脅苦痛憂噎者天隂苦厥逆心下悸動手足逆冷勞噎者苦氣隔脅下支滿胷中填塞令手足逆冷不能自温食噎者食無多少唯胷中苦塞常痛不得喘息思噎者心悸動喜忘目視􅑩􅑩此皆憂恚嗔怒寒氣上逆胷脅所致療之方乾薑蜀椒汗食茱茰人參桂心各五分細辛白术茯苓附子炮各四分橘皮六分右十味擣篩以蜜和為丸如梧子酒服三丸日再不知漸増忌桃李雀肉大酢猪肉冷水生葱生菜酢物出第二十七卷中經心録五噎丸主五種之氣皆令人噎方人參半夏桂心防葵一方用防風小草各二兩附子炮細辛甘草炙各二兩食茱茰三合紫菀乾薑芍藥枳實炙烏頭各六分炮右十三味擣篩以蜜和為丸如梧子大服五丸日三不知加至十五丸忌羊肉􅄳海藻菘菜猪肉生葱生菜千金同出第二卷中集驗噎塞不通方營實根十二分右一味擣為散酒下方寸匕日三服出第五卷中諸骨哽方三十五首肘後療食諸魚骨哽百日哽者方用綿二兩以火煎蜜内一叚綿使熱灼灼爾從外縛哽所在處灼瓠以熨綿上若故未出復煮一叚綿以代前并以皂莢屑少少吹鼻中使得􅅉出矣秘方不傳禮云魚去乙謂其頭間有骨如乙字形者哽入不肯出故也又方取捕魚竹笱鬚燒末飲之魚網亦佳又療食諸肉骨哽方白雄雞左右翮大毛各一枚燒末水服一刀圭也仍取所食餘者骨左右手反覆擲背後則下也文仲備急同又方燒雞足末服方寸匕酒下立出深師同又方生艾蒿數升水酒共一斗煮取三四升稍稍飲之深師同凡療病皆各以其類豈宜以鸕鷀療肉骨狸虎療魚哽耶至於竹篾薤白嚼筋綿蜜事乃可通為諸哽用耳又有呪術小小皆須師解故不備載出第五卷中深師療食魚骨哽方捕魚網燒飲服刀圭匕良是魚哽燒魚網服之良又療哽及刺不出方服薔薇灰末方寸匕日三亦療折箭刺入膿囊不出堅燥及䑕撲服之十日哽刺皆穿皮出効又療鐡棘竹木諸刺在肉中折不出及哽不下方半夏二兩洗白斂二兩右二味擣篩酒服半錢匕日三寧從少少起者半夏㦸人喉中故也忌羊肉􅄳等加乾薑一兩尤佳又方䑕腦厚塗瘡上則出亦可用墳䑕大効又療哽方螻蛄腦右一物吞即下亦療刺不出塗刺瘡上又療咽哽方取魚尾著衣領令下推立下又方白斂白芷等分擣散飲服刀圭又療食哽方鷹糞燒灰存性右一物下篩服方寸匕虎狼鵰屎皆可服之佳又療骨哽咽不得下飲食方白雞翼翮大毛各一枚著銅器中燒之焦作灰飲服一刀圭立下又療哽方半夏五兩洗白芷五兩右二物擣篩服方寸匕則嘔出忌羊肉􅄳又方以東流水一柸東向坐以手指畫氷中作龍字訖飲水不自曉書令他人持手書良又方凡書文曰天有門地有根諸家入口者皆當得吞集驗同並出第二十二卷中千金療哽方取鹿筋漬之濡索之大如彈丸持筋端吞之候至哽處徐徐引之哽著筋出集驗同又方極吹之食骨鯁燒虎狼屎服又方末虎骨若狸骨服方寸匕集驗同又方服瞿麥末方寸匕集驗同古今録驗兼主折刺不出又方吞猪膏如雞子大不差更吞差止古今録驗同又療諸哽方作竹篾刮令滑綿纒内咽中令至哽處可進退引之哽即出小品古今録驗深師同又療諸哽方鸕鷀屎末服方寸匕集驗古今録驗同又療魚骨哽方口稱鸕鷀鸕鷀則下並出第二十六卷中張文仲療食諸魚骨哽方以魚骨挿頭上則立下陶云因􅀈刻則出肘後備急同又方小嚼薤白令柔以繩繫中央持繩一端吞薤到哽處引哽當隨出集驗古今録驗深師備急千金同又療魚骨哽在喉中衆法不能去者方取飴糖丸如雞子黄大吞之不去又吞此用得効也肘後備急千金集驗小品同又療食中吞髮哽不去繞喉者方取梳頭髮燒􅁅飲服一錢匕肘後備急集驗千金同並出第三卷中救急療哽方好蜜以一匙抄稍稍嚥之令下良文仲同又療魚骨哽在喉中方以少許碙砂口中咀嚼嚥之立下出第七卷中必効療魚骨哽方含水獺骨立出小品同又方魚網覆頭立下千金云燒􅁅服半七小品同出第二卷中古今録驗療魚哽骨横喉中六七日不出方取鯉魚鱗皮合燒作屑以水服之則出也未出更服之取出為度出第二十九卷中雜誤吞物方一十七首肘後燎誤吞鈎方若繩猶在手中者莫引之但益以珠璫若薏子輩就貫之著繩稍稍令推至鈎處小小引之則出又方以小羊喉以沓繩推至鈎處當退脫小引則出又方但大戾頭四向顧小引之則出又方常思草頭一把二升水淘灌之十餘過而飲之又療譔吞諸木竹􅁫輩方取布刀故鋸燒漬酒中以女人大指甲二枚燒末内酒中飲之又方若是桃枝竹􅁫但數數多食白糖自消去又療以銀􅁫簪筋擿吐因氣吸誤吞不出方多食白糖漸漸至十斤當褁物自出此說與葛氏小異並出第五卷中深師療誤吞鈎方虎珀珠右一物貫著鈎繩推令前入至鈎所又復推以牽引出矣若水精珠卒無珠堅物摩令滑用之也出第二十二巻中千金療誤吞環若指彄方燒鴈毛二七枚末服之鵝羽亦佳備急文仲同又誤吞珠銅鐡而哽者方燒弩銅牙令赤内酒中飲之立愈出第二十六卷中張文仲療吞諸珠璫鐡而哽方燒弩銅牙令赤内水中飲其汁立愈肘後備急同又療誤吞錢方擣火炭末服方寸匕則出肘後小品集驗千金備急深師同備急葛氏誤吞釵方取薤暴令萎煮令熟勿切食一大束釵則便隨出生麥葉若蘩縷皆可用良効千金肘後同又誤吞釘及箭金鍼鐡等物方多食肥羊肉脂及諸肥肉自褁出肘後千金文仲同並出第五卷中古今録驗療誤吞銀鐶及釵者方取飴糖一斤一頓漸漸食盡多食之鐶及釵便出小品集驗千金同千金作白糖又方取水銀一兩分服之釵便下去也亦可以胡粉一兩擣調之分再服食銀令如泥也若吞金銀物在腹中皆服之令消烊出也又療誤嚥鍼方取真吸鍼礠石末酒白飲服一方寸匕解曰礠石特能吸取鍼難云今吞鍼哽在喉中而服礠石未入腹耶若含礠石口中者或吸鍼出耳二理詳取其義焉小品集驗千金同出第二十九卷中外臺秘要方卷八
