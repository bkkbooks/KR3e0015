body:
  text: 外臺秘要方卷八唐王燾撰痰飲論二首病源痰飲者由氣脉閉塞津液不通水飲氣停在胸腑結而成痰又其人素盛今瘦水走腸間漉漉有聲謂之痰飲其為病也胷脅脹滿水榖不消結在腹内兩肋水入腸胃動作有聲身體重多唾短氣好眠胷背痛甚則上氣欬逆倚息短氣不得卧其形如腫是也脉偏弦為飲浮而滑為飲其湯熨針石别有正方補養宣導今附於後養生方導引法云左右側卧不息十二通療痰飲不消右有飲病右側卧左有飲病左側卧又有不消氣排之左右各十二息療痰飲出第二十巻中千金痰飲論問曰夫飲有四何謂師曰有痰飲一云留飲有懸飲有溢飲有支飲問曰四飲之證何以為異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲飲後水留在脅下欬唾引痛謂之懸飲飲水過多歸於四肢當汗出而不汗出身體疼重謂之溢飲其人欬逆倚息短氣不得卧其形如腫謂之支飲凡心下有水者築築而悸短氣而恐其人眩而癲先寒即為虚先熱即為實故水在於心其人心下堅築築短氣惡水而不欲飲水在於肺其人吐涎沫欲飲水水在於脾其人少氣身體盡重水在於肝脅下支滿􅅉而痛水在於腎心下悸夫病人卒飲水多必暴喘滿凡食少飲多水停心下甚者則悸㣲者短氣脉雙弦者寒也皆大下後喜虚耳脉偏弦者飲也肺飲不弦但喜喘短氣支飲亦喘而不能眠加短氣其脉平也留飲形不發作無熱脉㣲煩滿不能飲食脉沉滑者留飲病病有留飲者脅下痛引缺盤欬𠻳轉甚一云輒已其人欬而不得卧引項上痛欬者如小兒掣瘲狀夫胷中有留飲其人短氣而渴四肢歴節痛心下有留飲其人背寒冷大如手病人胷息上引此皆有溢飲在胷中乆者缺盤滿馬刀腫有劇時此為氣飲所致也膈上之病滿喘欬吐發則寒熱背痛惡寒目泣出其人振振身瞤劇必有伏飲病人一臂不隨時復轉移在一臂其脉沉細此非風也必有飲在上焦其脉虚者為㣲勞榮衛氣不周故也出第十八巻中通按形不發作謂表無病狀也痰飲食不消及嘔逆不下食方九首病源夫痰水結聚在於胷腑膀胱之間乆而不散流行於脾胃脾胃惡濕得水則脹脹則不能消食也或令腹裏虚滿或水榖不消化或時嘔逆皆其候也出第二十巻中廣濟療心頭痰積宿水嘔逆不下食前胡丸方前胡白术甘草炙各五分旋復花豆蔲仁各三分人參麥門冬去心各六分枳實炙大黄各四分右九味擣篩蜜和為丸如梧子大空肚以酒下二十丸漸加至三十丸日再服不利忌桃李雀肉海藻菘菜熱麫炙肉魚蒜粘食生冷等物又療心胷中痰積氣噎嘔逆食不下方柴胡橘皮各六分茯苓十分人參麥門冬去心雞蘇各八分㯽榔人四分末湯成下生薑二十分右八味切以水八升煮取二升五合絞去滓分温三服服别相去如人行七八里進一服未差三日更服一劑以利為度忌酢物生冷油膩粘食並出一巻中千金療痰飲飲食不消乾嘔湯方澤瀉杏仁去皮尖枳實炙白术各三兩茯苓柴胡生薑芍藥各四兩旋復花人參橘皮細辛各二兩半夏四兩洗右十三味切以水九升煮取二升七合分為三服忌桃李雀肉大酢生菜羊肉餳等物又療胷中痰飲腹中水鳴食不消嘔吐水湯方大腹㯽榔四十枚生薑八兩半夏半升洗杏仁四兩去皮尖橘皮三兩茯苓五兩白术四兩切右七味切以水一斗煮取三升去滓分三服忌羊肉􅄳大酢桃李雀肉等古今録驗同並出第十八巻中范汪薑椒湯主胷中積聚痰飲飲食減少胃氣不足欬逆吐哯方半夏三兩洗生薑汁七合桂心附子炮甘草炙茯苓桔梗各一兩蜀椒二合汗橘皮二兩切右九味切以水七升煮取二升半去滓内薑汁煎取四升半分三服服三劑佳若欲服大散并諸五石丸必先服此方及進黄芪丸輩必佳忌海藻菘菜羊肉餳生葱猪肉冷水酢物千金翼深師同又白术茯苓湯主胷中結痰飲澼結臍下弦滿嘔逆不得食亦主風水方白术五兩茯苓三兩橘皮當歸附子炮各二兩生薑半夏各四兩切桂四兩細辛四兩一作人參右九味切以水一斗煮取三升分三服服三劑良忌羊肉餳桃李雀肉猪肉冷水生葱生菜醋物等千金翼同又旋復花湯主胷膈痰結唾如膠不下食者方烏頭五枚去皮熬旋復花細辛前胡甘草炙茯苓各二兩半夏一兩洗生薑八兩桂心四兩右九味切以水九升煮取三升分為三服忌羊肉餳海藻菘菜生葱酢物豬肉冷水等並出第十六巻中延年茯苓飲主心胷中有停痰宿水自吐水出後心胷間虚氣滿不能食消痰氣令能食方茯苓三兩人參二兩白术三兩生薑四兩枳實二兩炙橘皮一兩半切右六味切以水六升煮取一升八合去滓分温三服如人行八九里進之忌酢物桃李雀肉等仲景傷寒論同出第十七巻中古今録驗療胷膈痰飲食噉經日則併吐出食皆不消出如初空腹一兩日聚食還復吐之極不便此由痰飲聚下絶不通服此丸宣通下氣方呉茱茰澤瀉芍藥白术漢防己赤茯苓各二兩蜀大黄二兩右七味擣篩蜜和為丸如梧子大飲服二十五丸忌桃李雀肉酢物出第十九卷中懸飲方二首病源懸飲謂飲水過多留在脅下令脅間懸痛欬唾引脅痛故云懸飲出第二十二巻中范汪大甘遂丸療乆澼留水澼飲方芫花熬甘遂葶藶子熬大黄苦參大㦸芒硝貝母桂心各一兩杏仁三十枚巴豆三十枚去心皮熬烏喙三分炮令折右十二味擣篩其巴豆杏仁擣如膏合以蜜和丸如大豆許服二丸日三服不知稍加以意將息之大佳療大水飲病忌食蘆笋豬肉生葱等出第十六卷中千金療懸飲十棗湯方芫花甘遂大㦸右三味等分擣篩以水一升五合煮大棗十枚取八合絞去滓内藥末强人取一錢匕羸人半錢匕頓服之平旦不下者益藥半錢下後以糜粥自養此本仲景傷寒論方出第十八巻中溢飲方三首病源溢飲謂因大渴而暴飲水水氣溢於腸胃之外在於皮膚之間故言溢飲令人身體疼重而不汗是其候也出第二十巻中范汪溢飲者當發其汗大青龍湯主之方麻黄六兩去節桂心二兩甘草炙二兩生薑三兩石膏如雞子一枚杏仁四十枚去尖皮大棗十枚右七味㕮咀以水九升先煮麻黄減二升乃内諸藥煮取三升絞去滓適寒温服一升温覆令汗汗出多者温粉粉之一服汗出者勿復服汗出多亡陽逆虛惡風煩躁不得眠脉㣲弱汗出惡風不可服服之則厥逆筋愓肉瞤此為逆也忌海藻菘菜生葱此本仲景傷寒論方出第十六卷中千金溢飲者當發其汗宜青龍湯方麻黄去節芍藥細辛桂心乾薑甘草炙各三兩五味子半升半夏半升右八味切以水一斗先煮麻黄減二升乃内餘藥煮三升去滓温服一升忌海藻菘菜羊肉餳生菜生葱此仲景傷寒論小青龍湯也出第十八巻中千金翼大五飲丸主五種飲一曰留飲停水在心下二曰澼飲水澼在兩脅下三曰痰飲水在胃中四曰溢飲水溢在膈上五藏間五曰流飲水在腸間動摇有聲夫五飲者由飲後傷寒飲冷水過多所致方逺志去心苦參烏賊魚骨藜蘆白术甘遂五味子大黄石膏桔梗半夏洗紫菀前胡芒硝括蔞桂心蓯蓉貝母芫花當歸人參茯苓芍藥大㦸葶藶黄芩各一兩常山甘草炙山藥厚朴細辛各三分附子三分炮巴豆三十枚去皮心右三十三味擣篩蜜和為丸如梧子大酒服三丸日三稍加之忌狸肉桃李雀肉猪肉羊肉餳生葱酢物生菜野猪肉蘆笋等胡洽同出第十九巻中支飲方九首病源支飲謂水飲停於胷膈之間支乗於心故云支飲其病令人欬逆喘息身體如腫之狀謂之支飲出第二十巻中深師療心下有支飲其人喜眩一作苦冐澤瀉湯方白术二兩澤瀉五兩右二味切以水二升煮取一升又以水一升煮取五合合此二汁分為再服忌桃李雀肉等此本仲景傷寒論方千金療支飲不得息葶藶大棗瀉肺湯方葶藶子熬令紫色擣為丸如彈丸大大棗十二枚右二味先以水三升煮大棗得汁二升内葶藶煎取一升頓服三日一劑可服三四劑此本仲景傷寒論方又嘔家不渴者為欲解本渴今反不渴心下有支飲故也小半夏湯主之加茯苓者是也先渴却嘔此為水停心下小半夏加茯苓湯主之卒嘔吐心下痞膈間有水目眩悸小半夏加茯苓湯方半夏二斗生薑半斤茯苓四兩右三味切以水七升煮取一升五合分再服忌羊肉餳大醋仲景傷寒論茯苓三兩餘並同又假令瘦人臍下有悸者吐涎沫而癲眩水也五苓散主之方豬苓去皮白术茯苓各三分桂心去皮二分澤瀉五分右五味下篩水服方寸匕日三多飲水汗出愈忌桃李雀肉生葱醋物等此本仲景傷寒論方又心下有痰飲胷脅支滿目眩甘草湯主之方甘草二兩炙桂心白术各三兩茯苓四兩右四味細切以水六升煮取三升去滓服一升日三小便當利忌海藻菘菜生葱桃李醋物等此本仲景傷寒論方又夫酒客欬者必致吐血此坐以極飲過多所致也其脉虚者必冐其人本有支飲在胷中也支飲胷滿厚朴大黄湯主之方厚朴一兩炙大黄六兩枳實四兩炙右三味細切以水五升煮取二升去滓分温再服之此本仲景傷寒論方又夫上氣汗出而欬者此為飲也乾棗湯主之若下後不可與也乾棗湯主腫及支滿澼飲方大黄大㦸各一兩芫花炒蕘花各半兩甘草炙甘遂黄芩各一兩乾棗十枚右八味切以水五升煮取一升六合分四服空心服以快下為佳忌海藻菘菜又膈閒支飲其人喘滿心下痞堅面黧黒其脉沉𦂳得之數十日醫吐下之不愈木防己湯主之方木防己三兩石膏雞子大三枚桂心二兩人參四兩切右四味以水四升煮取二升去滓分再服虚者即愈實者三日復發則復與不愈者宜去石膏加茯苓芒硝湯方木防己三兩桂心二兩人參茯苓各四兩芒硝三合右五味以水六升煮四味取二升去滓内芒硝分温再服取㣲下利則愈忌生葱此本仲景傷寒論方深師同並出第十八巻中留飲方二首病源留飲者由飲酒後飲水多水氣停留於胷膈之間而不宣散乃令人脅下痛短氣而渴皆其候也出第二十巻中范汪海藻丸療腹中留飲方海藻木防己甘遂蓯蓉蜀椒去汗芫花熬葶藶子熬各一兩右七味擣節蜜和為丸如梧子服十丸不差當増之出第十六巻中千金療病者脉伏其人欲自痢痢者反快雖利心下續堅滿此為留飲欲去故也甘遂半夏湯主之方甘遂大者三枚半夏十二枚芍藥一兩甘草如指大一枚炙右四味以蜜半升内藥汁及蜜合一升煎取八大合頓服之忌海藻菘菜羊肉餳此本仲景傷寒論方出第十八巻中酒澼飲方三首病源夫酒澼者因大飲酒後渴而引飲無度酒與飲俱不散停滯在於脅肋下結聚成澼時時而痛因却呼為酒癖其狀脅下弦急而痛出第二十七巻中深師消飲丸療酒澼飲酒停痰水不消滿逆嘔吐目視􅍃􅍃耳聾腹中水聲方乾薑茯苓各三兩白术八兩枳實四枚炙右四味擣篩蜜和丸服如梧子五丸日三稍加之若下去枳實加乾薑二兩名為五飲丸忌桃李雀肉大醋生冷之類大神驗又倍术丸療五飲酒澼方白术一斤桂心乾薑各半斤右三味擣篩蜜和丸如梧子飲服十丸稍加之取下先食服之日再忌桃李雀肉生葱又温脾丸療乆寒宿食酒澼方乾薑三兩炒芍藥三兩蜀椒二兩汗小草一兩熬干芎藭茯苓桃仁去皮尖柴胡熬干各三兩大黄八兩切熬令黄黒右九味擣篩蜜和更擣萬杵服如大豆許十丸日三忌大醋並出第二十三巻中留飲宿食方七首病源留飲宿食者由飲酒宿食後飲水多水氣停留於脾胃之間脾得濕氣則不能消食令人噫氣酸臭腹脹滿亦壯熱或吞酸所以謂之留飲宿食也出第二十卷中深師通草丸療積聚留飲宿食寒熱煩結長肌膚補不足方椒目附子炮半夏洗厚朴炙各一兩芒硝五兩大黄九兩葶藶三兩熬杏仁三兩去皮尖右八味擣篩為末别擣葶藶杏仁令如膏合諸末以蜜和丸擣五千杵服如梧子二丸忌豬肉羊肉餳等大効方中無通草未詳其名出第二十三巻中范汪千金丸療心腹留飲宿食方沙參丹參苦參桂心各二分石膏五分研人參一分大黄一分半夏五分洗乾薑五分戎鹽一分巴豆六十枚去皮心附子一分炮右十二味皆擣合以白蜜和如小豆吞一丸日再令人先食服一丸不知稍益以知為度忌豬肉冷水羊肉餳蘆笋生葱又療留飲宿食桑耳丸方桑耳二兩巴豆一兩去皮右二味擣和以棗膏丸如麻子先食服一丸不下服二丸病下即止忌野豬肉蘆笋又主留飲宿食芫花丸方芫花一兩熬大黄甘遂黄連麻黄去節杏仁去皮尖甘草炙附子炮令各一兩巴豆五十枚去皮心右九味擣篩杏仁巴豆别擣如膏合和以蜜丸如小豆先食服一丸日再不知稍増以知為度忌海藻菘菜豬肉冷水蘆笋等又順流紫丸療百病留飲宿食心下伏痛四肢煩疼男子五勞七傷婦人産有餘疾等方當歸代赭各一分茯苓烏賊魚骨桂心各三分肉蓯蓉二分藜蘆五分小熬巴豆六十枚去心皮右八味擣篩白蜜和丸先食服如小豆一丸日再不知増之欲下倍服之别擣巴豆令如膏忌生葱􅀈肉酢物野豬肉蘆笋並出第十六巻巾千金療留飲宿食不消腹中積聚轉下當歸湯方當歸人參桂心甘草炙芒硝芍藥各二兩大黄四兩生薑黄芩澤瀉各三兩右十味切以水一斗煮取三升分三服空心食後服忌生䓤海藻菘菜出第十八巻中集驗痰飲積聚嘔逆兼風虚勞隂疝方霜後蒺䔧苖子擣汁一石先以武火煎减半即以文火煎攪勿停手候可丸止空腹酒下梧子大三十丸煎服亦得出第五巻中痰澼方二首病源痰澼者由飲水未散在於胷府之間因遇寒熱之氣相摶沉滯而成痰也痰之停聚流移於脅肋之間有時而痛則謂之痰澼出第二十巻中延年療左肋下停痰澼飲結在兩脅脹滿羸瘦不能食食不消化喜唾乾嘔大便或澀或利或赤或黄腹中有時水聲腹内熱口乾好飲水漿卒起頭眩欲倒脅下痛旋復花丸方旋復花五分大黄七分蒸茯苓三分澤瀉四分人參桂心皂莢去皮子炙附子炮去皮各二分芍藥四兩蜀椒三分去目汗乾地黄四兩防葵取水中浮者乾薑枳實炙杏仁去皮尖葶藶子四分熬右十六味擣篩為末内杏仁葶藶脂中碎研調篩度蜜和為丸毎食後少時白飲服三丸如梧子日二服稍増以㣲利為度禁食豬肉魚麫蒜生葱酢今既在肋下有澼氣水飲結聚不散數發則悶刺心痛又未曽服如此破澼飲藥雖服補藥澼氣不除終是不損恐乆積聚更急飲食减少此方正與澼氣相當更有三兩種毒藥今商量除訖其方内有附子及别本續命丸有烏頭此並破澼疾不得不用復聴臨時不如服烏頭丸澼氣得减亦未必須服旋復花丸忌酢物生葱豬肉蕪荑出第十六巻中集驗療痰澼心腹痛兼冷方鼈甲炙柴胡赤芍藥各八分甘草炙枳實炙生薑白术各六分㯽榔七箇右八味切以水六升煮七味取二升半去滓内㯽榔末分服八合當利忌海藻菘菜莧菜桃李雀肉等出第五巻中飲澼方二首病源飲澼者由飲水過多在於脅下不散又遇冷氣相觸而痛呼為飲澼也其狀脅下弦急時有水聲出第二十巻中深師附子湯療氣分心下堅如盤邊如旋柸水飲所作此湯主之方桂心三兩生薑三兩麻黄去節三兩甘草炙二兩細辛三兩大附子一枚炮大棗十二枚右七味切以水七升先煮麻黄再沸掠去沫乃下諸藥煮取二升去滓分服七合當汗出如蟲行皮中即愈神驗忌海藻菘菜生葱豬肉冷水生菜等仲景傷寒論名桂枝去芍藥加麻黄細辛附子湯並出第二十二卷中備急療心下堅大如盤邊如旋盤水飲所作枳實白术湯方枳實七枚灸白术三兩右二味切以水一斗煮取三升分三服腹中輭即散此出姚大夫方忌桃李雀肉等物此本仲景傷寒論方出第三卷中癖飲方七首病源此由飲水多水氣停聚兩脅之間遇寒氣相摶則結聚而成塊謂之癖飲在於兩脅下弦旦起按之作水聲也出第二十巻中深師朱雀湯療久病癖飲停痰不消在胷膈上液液時頭眩痛苦攣眼睛身體手足十指甲盡黄亦療脅下支滿飲輒引脅下痛方甘遂芫花各一分大㦸三分右三味為散以大棗十二枚擘破以水六升先煎棗取二升内藥三方寸匕更煎取一升一合分再服以吐下為知未知重服甚良無比出第二十三巻中通按此即前十棗湯千金中候黒丸療癖飲停結悶滿目闇方巴豆八分去心皮熬芫花三兩熬桂心四分桔梗四分杏仁五分去皮尖右五味擣篩蜜和丸飲服如胡豆三丸日一稍増得快下為度忌豬肉蘆笋生葱等肘後同千金半夏湯療痰冷癖飲胷膈中不理方白术三兩半夏一升洗生薑八兩茯苓二兩人參桂心甘草附子炮各二兩右八味切以水八升煮取三升絞去滓分温三服忌羊肉餳桃李雀肉大酢生葱海藻菘菜豬肉冷水又旋復花丸療停痰癖飲結在兩脅腹脹滿羸瘦不能食食不消化喜唾乾嘔大小便或澀或痢水在腸胃動摇作水聲方旋復花桂心枳實炙人參各五分乾薑芍藥白术各六分茯苓狼毒炙烏頭炮礜石燒各八分細辛大黄黄芩葶藶子熬厚朴炙芫花熬呉茱茰橘皮各四分甘遂三分右二十味擣篩蜜和丸酒服如梧子五丸日再服加之以知為度忌桃李雀肉大酢豬肉生菜生薑等大驗並出第十八巻中千金翼前胡湯主胷中久寒癖實宿痰膈塞胷痛不通利三焦冷熱不調飲食損少無味或寒熱體重卧不欲起方前胡三兩生薑四兩黄芩一兩人參二兩呉茱茰一兩大黄二兩防風一兩杏仁三十枚去皮尖當歸甘草各二兩炙半夏三兩洗麥門冬一兩去心右十二味切以水一斗煮取三升去滓分温三服日三服三劑良深師云若脅下滿加大棗二枚利水亦佳忌海藻菘菜羊肉餳等又半夏湯主痰