body:
  text: 外臺秘要方卷二十二唐王燾撰耳聾方二十二首病源腎為足少隂之經而藏精氣通於耳耳宗脈之所聚也若精氣調和則腎氣强盛耳聞五音若勞傷血氣兼受風邪損於腎藏而精脱精脱者則耳聾然五藏六腑十二經脈有絡於耳者其隂陽經氣有相并時并則有藏氣逆名之為厥厥氣相搏入於耳之脈則令聾其腎病精脱耳聾者其候頰顴色黒手少陽之脈動而氣厥逆而耳聾者其候耳内煇煇焞焞也手太陽厥而耳聾者其候聾而耳内氣滿養生方云勿塞故井及水瀆令人耳聾目盲其湯熨針石别有正方補養宣導今附扵後養生方導引法云坐地交义兩脚以兩手從曲脚中入低頭义項上治乆寒不自温耳不聞聲又云脚著項上不息十二通必愈大寒不覺暖熱乆頑冷患耳聾目眩乆行即成法法身五六不能變出第二十九卷中廣濟療耳聾方生地黄長一寸半肥者杏仁七枚去皮熬令黄色巴豆七枚去皮熬令黄印成鹽二顆髮灰半錢匕右五味𢷬碎研堪丸如蕤核仁大用髮薄裹内耳中日一易耳内當痛有水出即去當直以髮塞耳耳内黄水出痛甚不得更著若未差還依前著藥取差千金翼同又療耳聾不聞人語聲方松脂四分巴豆二分去皮心熬麻子仁二分蠟二分薫陸香一分石鹽二分右六味𢷬如膏丸􅀥核大内耳中三日一易取差集驗療耳聾方杏仁去皮尖熬葶􅐗子熬鹽末各等分右三味𢷬研以少許豬脂和合煎以綿裹塞耳又方附子炮𤓰子杏仁去皮熬各等分右三味𢷬以綿裹塞耳中千金療耳聾方淳醋微火煎附子五六宿削令可入耳以綿裹塞耳中取差又方巴豆十四枚去皮心熬鍊成松脂二分右二味合𢷬丸如黍米簮頭著耳中以差為度又方以竹筒盛鯉魚腦蒸之令烊以灌耳中又方雄黄硫黄各等分綿裹塞耳中數月聞又方取鐡燒令赤投酒中飲之仍以磁石塞耳中差又方萆麻子一百粒去皮大􅀥十九枚去皮核右二味𢷬丸如杏仁内於耳中二十日差又方芥子𢷬碎以男乳和綿裹塞耳取差又方作泥餅子厚薄如􅀈飽覆耳上四邉勿令洩氣當耳孔上以刺泥餅穿作一小孔於上以艾灸之百壯候耳中痛不可忍則止頃側耳㵼却黄水出盡即差灸時泥乾即數易之又方截箭竿竹二寸内耳中以麪擁四畔勿令洩氣灸箭上七壯取差竝出第六卷中崔氏療耳聾方鄭少卿云頻用波律膏一蜆殻無以大麻脂一合小器中煎取一蜆殻替之楓木脂半兩無以薫陸香替以乳頭香更佳松脂半兩研巴豆三七枚去皮熬研蠟如彈通按波律膏丸大疑即胡桐淚右五味先𢷬松脂巴豆一千杵次下大麻油令熟丸如棗核大一頭尖通中作孔以綿裹塞耳數日一易更互塞之取差不得併塞出第四卷中備急療耳聾菖蒲根丸方菖蒲一寸巴豆一枚去皮心右二味合𢷬可丸分作七丸以綿裹塞耳中日别一丸取差肘後同又菖蒲散方菖蒲二兩附子二兩炮右二味𢷬篩以苦酒和丸如􅀥核許綿裹卧即塞耳中夜一易之十日有黄水出便差肘後千金崔氏又方磁石菖蒲通草薰陸香杏仁去皮熬萆麻子去皮松脂等分右七味𢷬篩以蠟及鵞脂和丸稍長作以􅁫脚子穿中心為孔先去耳中垢然後内藥日再初著痒及作聲月餘即差殿中候監云非常良驗肘後同救急療耳聾方真崑崙青木香一兩碎以苦酒浸一宿胡麻油一合微火上緩煎之三上三下以綿濾去滓以㸃耳孔中以差為度必効療耳聾方以好神明膏好􅀥核許内耳中日一度頻著以差三五日以箆子挑耳中塞或痒取差亦治蟲入耳中又方取杏仁七枚去皮搥碎為三分以綿裹各於中著一裹鹽如小豆許以器承於飯甑中蒸之候飯熟出一裹令患耳者側卧和綿捻以油汁入耳中乆又以一裹進前捻之差為度又方雞矢白半升熬令黄色烏豆一升熬令爆聲絶右二味先取無灰酒二升及熱以沃之良乆濾去滓分温服厚取汗其耳如鼓鞞勿訝又療耳聾神驗方取純烏羊新濕糞和杏子脂石鹽末右三味研滿耳孔中塞勿令風入乾即易之乃至七日二七日耳内有聲漸大即以􅓗筒長二寸内耳孔裏四畔以麪塞勿令氣出以麪薄餅子裹筒頭以艾灸上從第一度灸三壯為始耳内即有烏塞乾膿出未間内裹滿疼痛即出之即差但有塞即須挑却還依前法乃至一日兩日差即停以後常用亂髮塞之甚驗風聾方三首病源足少隂之經宗脈之所聚其氣通於耳其經脈虚風邪乘之風入於耳之脈使經氣否塞不宣故為風聾風隨氣脈行於頭腦則聾而時頭痛故謂之風聾出第二十九卷中崔氏療耳風聾牙闗急不得開方取八角附子二枚釅酢漬之二宿令潤徹削一頭内耳中灸上十四壯令氣通耳中即差出第四卷中古今録驗療風聾年乆耳中鳴魚腦膏方生雄鯉魚腦八分當歸六銖菖蒲六銖細辛六銖白芷六銖附子六銖右六味㕮咀以魚腦合煎三沸三下之膏香為成濾去滓冷以一􅀥核大内耳中以綿塞之取差又方附子菖蒲各等分右二味𢷬以綿裹塞兩耳中取差耳聾有膿方三首千金療耳聾有膿方烏賊魚骨去甲炙釡底墨各二分附子四分炮禹餘糧一分龍骨二分伏龍肝二分右六味𢷬末取皂莢子許大綿裹内耳中日一易取差有蟲者加麝香一豆大又方𢷬桂末以魚膏和塞耳中不過三四度並出第六卷中必効耳聾有膿方鯉魚腸一具切酢三合右二味合𢷬以布裹塞耳兩食頃當悶痛白蟲出更著新者蟲盡乃止取差無新者擇去蟲還可用良千金同乆聾方五首病源足少隂腎之經宗脈之所聚其氣通於耳勞傷於腎宗脈虚損血氣不足為風邪所乘故成耳聾勞傷甚者血氣虚極風邪停滯故為乆聾出第二十九卷中廣濟療風聾三十年無所聞方萆麻子五分杏仁四分熬桃仁四分去皮熬巴豆一枚去皮熬石鹽三分附子一分炮薫陸香一分磁石四分研菖蒲四分蠟八分通草二分松脂二兩半右十二味先𢷬菖蒲石鹽磁石通草附子薫陸香成末别𢷬萆麻子等四味乃内松脂蠟𢷬一千杵可捻作丸如􅀥核大綿裹塞耳中日四五度抽出别捻之三日一易以差為度千金翼云日一易之肘後療二三十年聾方取故鐡三十斤以水七斗漬之三宿取其水以釀七斗米用麴如常法酒熟出酒一斗取引針磁石一斤研末置酒中三宿乃可飲之取醉以綿裹磁石塞兩耳中好覆衣衾卧酒醒良乆去磁石即聞人語聲也飲盡更為以差為度甚良千金同又方茱萸巴豆去皮熬乾薑各等分右三味𢷬末以葱涕和以綿裹塞耳食頃乾去之更和塞之如此五日當覺病去無苦八九日便聞人語取差止常以髮塞耳慎避風又方柘根三十斤剉之以水煮用釀酒如常法乆而服之甚良古今録驗療三十年聾方天雄一分雞子一枚附子一枚右三味𢷬末取雞子開一孔取黄和藥却内雞子中封合其頭還令雞覆之藥成以綿裹塞所聾耳中取差為度耳鳴方六首病源腎氣通於耳足少隂腎之經宗脈之所聚勞動經血而血氣不足宗脈則虚風邪乘虚隨脈入耳與氣相擊故為耳鳴診其右手脈寸口名曰氣口以前脈浮則為陽手陽明大腸脈也沉則為隂手太隂肺脈也隂陽俱虚者此為血氣虚損宗脈不足病苦耳鳴嘈嘈眼時妄見花此是肺與大腸俱虚也左手尺中名曰神門其脈浮為陽足太陽膀胱脈也虚者膀胱虚也腎與膀胱合病苦耳鳴忽然不聞時惡風膀胱虚則三焦實也膀胱為津液之府若三焦實則剋消津液剋消津液故膀胱虚也耳鳴不止則變成聾出第二十九卷中廣濟療耳鳴塞耳丸方巴豆二枚去皮熬桃仁去皮熬二枚松脂大豆許右三味𢷬作二丸綿裹塞耳中又療耳鳴沸閙方吳茱萸巴豆去皮熬乾薑石菖蒲磁石細辛各一分右六味𢷬末以鵝膏和少許以綿裹塞耳中以鹽五升布裹蒸之以熨耳門令其煖氣通入耳内冷復易之如此數用差後常以亂髮卷以塞耳中慎風肘後療耳中常鳴方生地黄截斷塞耳日十易之以差一云紙裹微火中煨之用良出第四卷中千金療耳鳴聾方當歸細辛防風附子芎藭白芷各六銖右六味末之以雄鯉魚腦和煎三上三下膏香去滓以􅀥核許塞耳中以綿裹之魚腦用六合微火鍊之又方通草細辛桂心各三分菖蒲四分附子一分礬石一分當歸甘草各二分獨活六分葱涕半合右十味𢷬末以白鵝膏半合旋旋和以綿裹􅀥核大塞耳中日三取差忌如常又療耳聾鳴如流水聲乆不治成聾方生烏頭淨洗削如棗核大以塞耳中日一易之三日愈亦療痒及卒風聾並出第六卷中聤耳方一十首病源耳者宗脈之所聚腎氣之所通足少隂腎之經也勞傷血氣熱乘虚而入於其經邪隨血氣至耳熱氣聚則生膿汁故謂之聤耳出第二十九卷中廣濟療聤耳痒有膿不止菖蒲膏方菖蒲一兩狼毒附子炮磁石燒礬石熬汁盡各一兩右五味𢷬篩以羊髓和如膏取􅀥核大塞耳中以差為度又療聤耳膿血出方取車轄脂綿裹塞耳中差肘後同千金治蟲入耳又療聤耳方黄連龍骨白歛赤石脂烏賊魚骨各等分右五味𢷬末以綿裹塞耳中每著以綿纒拭之著藥肘後療聤耳耳中痛膿血出方取釡月下灰吹滿耳令深日三易之每換即以箆子去之然後著藥取差為度千金云竈下灰薄耳中又方附子末以葱涕和灌耳中取差單葱涕亦佳側卧令入耳中出中卷又方桃仁熟𢷬以故緋絹裹塞耳中日三易以差為度千金同又方黄連附子炮各等分右二味𢷬末以少許微微吹入耳中每著藥先拭惡物然後吹之又方釡月下墨末以豬膏和綿裹内耳中日再集驗療聤耳出膿水散方礬石烏賊魚骨黄連龍骨右四味𢷬末以􅀥核許綿裹塞耳中日再千金療聤耳出膿方黄礬石烏賊魚骨黄連赤石脂各一兩右四味𢷬末以綿裹􅀥核大内耳中取差止日二翼方用龍骨無赤石脂出第六卷耳卒疼痛方三首病源凡患耳中䇿䇿痛者皆是風入於腎之經也不治流入腎則卒然變脊强背直成痙也若因痛而腫生癰癤膿潰邪氣歇則不成痙所以然者足少隂為腎之經宗脈之所聚其氣通於耳上焦有風邪入於頭腦流至耳内與氣相擊故耳中痛耳為腎候其氣相通腎候腰脊主骨髓故邪流入腎脊强背直出第二十九卷中肘後療耳卒疼痛方蒸鹽以軟布裹熨之取差良備急療耳疼痛有汁出方熬杏仁令焦黒𢷬如泥作丸以綿裹内耳中頻易之差廣濟療耳卒疼痛求死者方菖蒲附子各一分右二味末以麻油和以㸃耳中立止肘後崔氏同耳卒腫方二首肘後療耳卒腫出腫方礬石燒末以葦管吹耳中日三四過或以綿裹塞耳孔内取差備急療耳卒腫方栝樓根削可入耳以臘月豬脂煎之三沸冷以塞耳中取差日三作七日愈肘後治卒得風覺耳中怳怳者通耳中膿方二首廣濟療耳膿水通耳礬石散方吳白礬八分燒汁盡麻勃一分青木香二分松脂四分右四味𢷬末先消松脂後入藥末可丸如􅀥核淨拭以塞耳中取差又療通耳膿水出方吳白礬八分燒令汁盡末紅藍花臙脂四十枚右二味和粉淨拭耳中以粉粉之每拭然後著藥蟲入耳方九首廣濟療蟲入耳腫不聞人語聲有膿血出方黄茋四分乾薑一分蜀椒一分右三味𢷬末以生地黄𢷬取汁和用綿裹􅀥核大塞耳中日三夜一以差止肘後療百蟲入耳方苦酒漬椒灌之即出又方温湯灌耳中又方𢷬藍青汁以灌之千金療蟲入耳方取桃葉火熨以塞耳卷之入中肘後同又方以葱涕灌耳中即出並出第六卷中崔氏療蟲入耳方若甲蟲入耳者以火照之手打木入勿令損之即向明出之或蚰蜒諸蟲入耳以酢灌之或麻油或人尿亦佳或酢酪更妙備急療蟲入耳方以銅錢二七枚以豬膏煎之用将灌耳又方以兩刀於耳前相敵作聲蟲即出走蜈蚣入耳方三首肘後療蜈蚣入耳方以木葉裹鹽炙令熱以掩耳上即出冷復易之騐又方閉氣滿即吐之復閉準前以出為度或死耳中徐徐以鈎針出之若積乆不出者取新㹠肉炙向耳中搨之以出為度千金療蜈蚣入耳方炙豬肉掩耳即出集驗小品同出六卷中蚰蜒入耳方三首肘後療蚰蜒入耳方熬胡麻𢷬以葛囊盛枕之蟲聞香則自出又方以水銀大豆許瀉耳中欹卧空耳向下擊銅器叩齒十下即出蚰蜒呼為土蛄似蜈蚣黄色細長是也備急療蚰蜒入耳神効方以牛酪滿耳灌之即出當半消若入腹空腹食好酪一二升即化為黄水不盡更服神効肘後同飛蛾入耳方二首肘後療飛蛾入耳方先大噏氣仍閉口掩鼻呼氣其蟲隨氣一口出又方閉氣以􅓗管極吹之即出蟻入耳方二首肘後療蟻入耳方燒陵鯉甲末以水和灌之即出備急療蟻入耳方炙豬脂安耳孔上即出或兩邉耳雜療方八首廣濟療耳鳴或聾漬酒方菖蒲一斤通草一斤磁石一升碎綿裹右三物切以絹袋盛清酒二斗浸之春夏三日秋冬五日温服三合漸加之至五合以下丸藥亦甚良又療兩耳腫膿水出不聞人語聲方黄茋升麻犀角屑梔子各六分𤣥參八分乾藍芍藥人參各四分大黄八分青木香黄芩芒硝各六分右十二味𢷬篩蜜和丸食後少時以枸杞根湯下二十丸漸増之忌如常又療兩耳腫方青木香防己芍藥𤣥參白歛大黄芒硝黄芩各八分赤小豆十分紫葛八分右十味𢷬散以榆木白皮𢷬汁和之塗布帛上貼腫取消千金療卒聾方細辛一分菖蒲一分杏仁三分麴末三分右四味𢷬篩研杏仁合之如脂棗核大以綿裹塞耳中日一易小差二日一易夜去之旦即著又底耳方燒黄礬𢷬末綿裹塞耳中二三日即差又療耳乾耵聹不可出方爛𢷬自死蚯蚓取汁灌耳不過數灌即挑出之並出第六卷中千金翼赤膏主耳聾齒痛方丹參五兩蜀椒一升大黄白术細辛芎藭各一兩大附子十枚乾薑二兩巴豆十枚去心桂心四寸右十味剉以苦酒漬一宿以豬膏三斤煎三上三下藥成去滓可服可摩耳聾者綿裹膏内耳中齒冷痛著齒間諸痛皆摩腹内有痛以酒服一􅀥許大咽喉痛吞一棗核大一枚出第十一卷中崔氏療風氣及腰脚并耳聾方磁石十二兩碎石菖蒲四兩通草三兩瞿麥二兩山茱茰三兩白术三兩獨活四兩芎藭二兩薯蕷三兩甘草二兩炙附子二兩炮桂心三兩生薑五兩杏仁二兩去皮尖熬碎茯神二兩人參前胡各三兩葱白切一升竹葉一握石膏二兩碎右二十味切以水一斗四升煮取二升半去滓分三服宜向暮服之令盡慎如常法五日禁食羊肉鼻中息肉方一十一首病源肺氣通於鼻肺藏為風冷所乘則鼻氣不和津液壅塞而為􅈹齆冷摶於血氣停結鼻内故變生息肉其湯熨針石别有正方補養宣導今附於後養生方導引法云端坐伸腰徐徐以鼻内氣以右手捻􅈹除目暗淚苦出徐徐閉目吐氣鼻中息肉耳聾亦能除又云東向坐不息三通以手捻鼻兩孔治􅈹中息肉出第二十九卷中肘後療鼻中塞肉不通利方礬石一兩燒通草半兩真珠一兩右三味末以綿裹如􅀥核内鼻中日三易之有加桂心細辛各一兩同前𢷬末和使用之又方陳𤓰蔕𢷬末以傅塞肉上取差又方礬石燒胡粉熬各等分右二味末之以青羊脂和塗塞肉上以差又方細辛𤓰蔕各等分末以吹鼻中須臾涕出頻吹之即差千金方以絮裹如棗大塞鼻中須臾通張文仲亦治􅈹齆不聞香臭小品療鼻中塞肉通草散方通草半兩真珠六銖碎礬石一兩燒細辛一兩右四物𢷬末以綿裹如􅀥核沾散如小豆并綿頭内鼻中日三取差千金同千金療鼻中息肉方灸上星二百壯入髮際一寸又夾上星兩傍相去三寸各百壯灸之取差出第六卷中千金翼􅍠􅈹􅈹中息肉不得息方礬石三分燒藜蘆二分𤓰蔕二七枚附子二分炮右四物𢷬末蘆管吹小豆許於􅈹孔中或以綿裹塞鼻中日再以差為度一方加葶􅐗半兩出第十一卷中崔氏療鼻中息肉不聞香臭方燒礬石末以面脂和著鼻中數日息肉隨藥出千金同必効療鼻中清涕生塞肉方細辛六分附子五分炮甘遂六分通草五分乾薑四分吳茱萸三合桂心四分右七味𢷬篩末蜜丸如杏仁綿裹塞鼻卧時著即涕出日三避風以差為度或以帛裹頭甚良妙古今録驗療鼻中息肉通草散方通草細辛蕤仁雄黄研皂莢去皮子各一分白礬二分燒礜石三分泥裹燒半日研藜蘆三分炙地膽三分熬𤓰蔕三分巴豆十枚去皮䕡茹三分地榆三分右十三味𢷬篩末以細辛白芷煎湯和散傅息肉上又以膠清和塗之取差又療鼻中息肉方生地膽一枚細辛白芷末右三味以地膽押取汁和藥以塗貼息肉上取消亦只以地膽汁於竹筒中盛當上灌之即消無生者乾即酒煮汁用之鼻齆方五首病源肺主氣其經手太隂之脈也其氣通於鼻若脈藏調和則鼻氣通利而知香臭若風冷傷扵藏腑而邪氣乘於太隂之經其氣藴積於鼻者則津液壅塞鼻氣不宣調故不知香臭而為鼻齆也出第二十九卷中千金療鼻齆方甘遂通草細辛附子炮各一分右四味𢷬末以白雄犬膽丸少許内鼻中差崔氏同云卒熱涕出四五升愈又方皂莢炙末如小豆以葦管吹􅈹中又方以乾薑末吹之又蜜和塞之又方以鐡􅀈一云鏁磨石取末以豬脂和綿裹塞鼻中取差止又方伏面臨牀前以新汲水淋玉枕上取差並出第六卷中通按玉枕腦後也肺寒鼻齆方二首刪繁療肺寒損傷氣欬及多唾呼聲􅈹塞乾棗補肺煎方􅀥肉二升取膏杏仁一升去尖皮研酥一升薑汁一升蜜一升􅄳糖一升右六味依常微火煎每服一匙差止又療鼻塞有清涕出方細辛蜀椒汗桂心芎藭吳茱萸各三分皂莢炙屑二分附子八分炮右七味切以苦酒漬一宿以豬脂一斤煎以附子色黄膏成以綿裹内鼻中兼以摩頂鼻窒塞不通利方七首小品療鼻中窒塞香膏方白芷當歸芎藭細辛辛夷通草桂心薰草各三分右八味㕮咀以苦酒漬一宿以猪膏一升煎以白芷色黄成膏濾去滓取少許㸃鼻中或綿裹内鼻中以差止千金無桂心不用薰草用莽草千金鼻塞多年不聞香臭清水出不止方取當道車輾過蒺藜一把𢷬以水三升煎令熟先仰卧使人口含一合灌鼻中不過再大嚔出一兩箇息肉似爛蟲即差一方用黄連各二兩又療鼻窒氣息不通方小薊一把右一味以水三升煮取一升去滓分服又方綿裹𤓰帶末少許塞鼻中並出第六卷中古今録驗療鼻中不通利窒塞者香膏方當歸芎藭青木香細辛通草蕤核白芷各二分右七味切以羊髓微火煎白芷色黄膏成去滓以小豆許内鼻中日再以差為度千金有莽草無青木香云大熱鼻中赤爛者以黄芩梔子代當歸細辛又療人鼻塞不通皂莢散方皂莢一分炙去皮子細辛辛夷蜀椒附子炮各等分右五味𢷬末以少許吹鼻中或以綿裹塞之即通又療鼻窒塞不得喘息皂莢散方皂莢去皮子炙菖蒲各等分右二味以末綿裹塞􅈹中暮卧之時乃著甚良鼻塞常清涕方二首病源夫津液涕唾得熱即乾燥得冷流溢不能自收肺氣通於鼻其藏有冷冷隨氣入乗於鼻故使津涕不能自收出第二十九卷中肘後療老少鼻塞常有清涕出方杏仁二分附子二分細辛一分右三味切以苦酒拌用猪脂五兩煎成膏去滓以㸃鼻中即通又以摩􅇟上佳必効療鼻塞多清涕方細辛蜀椒乾薑芎藭呉茱萸皂莢去皮尖附子各三兩猪膏一升三合右八味切㕮咀以苦酒浸一宿以猪脂煎候附子色黄去滓膏成凝以綿裹少許導鼻中并摩頂鼻生瘡及疳蟲蝕方九首病源鼻是肺之侯肺氣通於鼻其藏有熱氣衝於鼻故生瘡也養生方導引法云踞坐合兩膝張兩足不息五通治鼻瘡出第二十九卷中千金療疳蟲蝕鼻生瘡方燒銅筯投酢中以塗之又方綿裹人屎灰夜卧著之又方燒祀竈飯末以𫝊之又方燒牛狗骨灰末以臘月猪脂和傅之差又方燒杏仁壓取油傅之又乳和傅又方取烏牛耳垢傅之良又方燒故馬絆末傅之又方取牛鼻頭津傅之良並出第六卷中必効療鼻内熱氣生瘡有膿臭并有蟲方礬石一兩燒生地黄三兩苦參一兩右三味切以水八合煮取三合以綿濾之微微㸃鼻中日三五度差止牙疼方八首廣濟療牙疼巴豆丸方巴豆十枚去皮心熬研如膏大棗三十枚取肉細辛一兩末右三味相和研為丸以綿裹著所疼處咬之如有涕唾吐却勿咽入喉中日三差崔氏療牙疼方烏頭獨活郁李根白皮各一兩右三味切綿裹以好酒一大升半漬一宿緩火煎取一升去滓㸔冷熱漸含良久即吐却含取差齒痛不問風蟲無不差必須含吐之不可咽却也有毒恐傷人單用烏頭獨活亦差又方令患人所患牙齒齧宅東南桑枝一條教三姓人於桑枝灸三炷一炷咒之曰東方有蟲子不食五榖專食牙齒三姓灸齒痛蠍蟲自然死一咒一再拜即合灸人患人等還不得迴頭更㸔之張文仲療牙疼驗方獨活五分莽草二分細辛二分附子一枚右四味切以苦酒五合浸以銅器中温之稍熱含良久吐却汁未差更含之勿咽汁欲食以煖水潄口甚良救急療牙疼方莽草細辛枳根皮各三兩椒一合汗右四味切以水一升煮取半升細細含之十度永不發藥有毒不得嚥之含了以煖水三五度潄口訖以胡桐律一豆著痛齒上風痛蟲食並差必効療牙疼方取皂莢子擣末以綿裹如彈子大兩顆於釅醋中煮熱徹於牙疼處齧之冷即易日三五度以差為度又方取桃李槐並白皮各等分以酒煮含之取定姜君療牙疼方白楊皮一握地骨皮一兩椒二七枚杏仁二七枚去皮細辛一兩生地黄二兩碎好鹽一合蒼耳子二兩碎右八味切以酒二升煎六七沸去滓含之冷即吐却别含以差為度齒痛方一十一首病源手陽明之支脈入於齒齒是骨之所終髓之所養若風冷客於經絡傷於骨髓冷氣入齒根則齒痛若蟲食齒而痛者齒根有孔蟲在其間此則針灸不差傅藥蟲死痛乃止其湯熨針石别有正方補養宣導今附於後養生方導引法云常向本命日擳髪之始叩齒九通隂咒曰大帝散靈五老反真泥丸𤣥華保精長存左迴拘月右引日根六合清鍊百疾愈因咽唾三過常數行之使齒不痛髪牢不白頭腦不痛又云東向坐不息四通琢齒二七治齒痛病大張口琢齒二七一通二七又解四通中間其二七大勢以意消息差病而已不復疼痛解病鮮白不黧亦不疏離久行不已能破金剛又云東向坐不息四通上下琢齒三十六下治齒痛出第二十九卷中廣濟療齒痛及落盡石膽傅方取石膽研以人乳汁和以傅齒痛上或孔中日三兩度止痛後生齒百日復故齒生止每以新汲水潄令淨集驗療齒痛方雞屎白燒灰末以綿裹置齒痛上咬咋之差又方芎藭細辛防風礬石燒令汁盡附子炮藜蘆莽草右七味各等分𢷬篩為末以綿裹彈丸大酒漬熨所患處含之勿嚥汁千金同又方獨活三分黄芩芎藭當歸蓽撥各二兩丁香一兩右六味切以水五升煮取三升去滓微微含潄良久吐却更含又方含白馬尿隨左右含之不三五口差張文仲備急同並出第六卷中張文仲療齒疼痛方燒牛膝根末以綿裹著齒痛處含之又方蜀椒礬石各一兩右二味以水一升煎取六合去滓含之𠻳口吐却勿咽之備急療齒痛方胡葈子五升應是胡荽子也以水五升煮取一升含吐之謹按本草葈耳一名胡荽殺疳濕􅉶封丁腫此治齒痛相近即非是胡葈子也又方馬夜眼如米許以綿裹著痛孔中斷根源也通按馬夜眼未詳何物古今録驗療齒痛方取楊栁細白皮卷如指大含嚼之以汁漬痛齒根數過即差又方獨活三兩芎藭二兩當歸二兩蓽撥二兩黄芩二兩甘草二兩細辛二兩雞舌香一兩右八味切以水五升煮取三升去滓含之取差千金無甘草齒疼方六首千金療齒疼方灸外踝下髙骨前交脈三壯又方以繩量手中指至掌後一横文又折為四分量文後當臂中灸一壯隨左右取之又方雞屎白以醋漬煮稍稍含之差又方生地黄一節蒜一瓣右二味𢷬以綿裹著痛處咬之勿嚥汁汁盡吐出日日為之差止又方含驢尿須臾止並出第六卷中姜生療齒疼方附子一分胡椒蓽撥各二分右三味𢷬末著齒痛上又以散用蠟和為丸置齒痛孔上取差止牙齒疼痛方八首病源牙齒痛者是牙齒相引痛牙齒是骨之所終髓之所養手陽明之支脈入於齒若髓氣不足陽明脈虚不能榮於牙齒為風冷所傷故疼痛也又有蟲食於牙齒則齒根有孔蟲居其間又傳變餘齒亦皆疼痛此則針灸不差傅藥蟲死痛乃止出第二十九卷中廣濟療牙齒疼痛牙齗腫痒齒根宣露方肥松節四分細辛一分蜀椒二分胡桐律四分右四味切以清酒四升煮十沸承熱含之冷即吐却更含差止又療牙疼齒痛方取槐白皮一握切右一味以酢一升煮去滓著鹽少許適寒温含日三易之備急姚氏療牙齒疼痛方取枯竹燒竹一頭以注錢上得汁多著齒上即差必効療牙齒疼痛方防風附子蜀椒各二兩莽草一兩炙右四味𢷬篩為散温清酒一盞和少許含勿嚥汁以酒潄口十年患亦差止又方獨頭蒜煨之乗熱截一頭以熨痛上轉易之亦主蟲痛又礬石散療牙齒疼痛風齲蟲食挺根出齒已落者方礬石燒令汁盡藜蘆炙防風細辛乾薑白术椒汗甘草炙蛇牀子附子炮各八分右十味𢷬篩為散温酒半升内散方寸匕攪調含之潄吐勿嚥之日三度差百日齒已落者還生每食時更以空酒潄去藥氣然後喫食又療牙齒疼肉宣露風疼効方莨菪子𢷬末綿裹著痛上吐却汁勿嚥之良又方獨活十兩生地骨白皮切三升細辛一兩楓栁皮一兩甘草二兩炙右五味切以水五升煮取一升細細含勿咽冷即吐之􅉶齒方五首病源齒􅉶者是蟲蝕齒至齗膿爛汁臭如蝕之状故謂之􅉶齒出第二十九卷中廣濟療􅉶齒石黛散方五月五日乾蝦蟇燒灰石黛甘皮各等分𢷬末以傅齒上取差又療􅉶齒及口疳蟲食紫藍灰方取紫藍燒作灰以塗傅之日三五度取差為度又療􅉶齒并蟲積年不差從少至老方雀麥一名牡姓草似牛尾草一味苦瓠葉三十枚淨洗露一宿平旦取草屈長二寸廣一寸厚五分以瓠葉裹縳作五六十裹子以三年酢漬之至日中以兩裹火中炮令極熱内口中齒外邉熨之冷更易取銅器以水内中解裹於水中洗之即有蟲長三分老者黄色少者白色多即三二十枚少即一二十枚此方甚妙千金同必効近貴勝共傅􅉶齒方細辛當歸甘草炙蛇床子各一兩青葙子二兩右五味𢷬以綿裹如大豆著齒上日三勿嚥汁差止肘後同又􅉶齒方韋給事處得之每見月拜咒云月阿姑􅉶齒蟲枯月阿姨􅉶齒蟲死以差即止齒風疼痛方三首張文仲療頭面風口齒痛不可忍方椒一合莽草十葉熬白术崔李根郁李根也獨活芎藭各二兩細辛防風各一兩右八味切以酒三升煮三五沸去滓含之以差為度勿嚥汁千金無白术救急療齒風動痛方蒼耳一握以漿煮著鹽含之古今録驗療齒中風疼痛齲腫芎藭湯方細辛一兩芎藭二兩附子一兩炮右三味切以水六升煮取二升去滓含之少許冷即吐却日三四度勿嚥汁齲齒方七首病源手陽明之支脈入於齒足太陽脈有入於頰遍於齒者其經虚風氣客之絡摶齒間與血氣相乗則齗腫熱氣加之膿汁出而臭侵食齒齗謂之齲齒亦曰風齲養生方云朝夕琢齒齒不齲又云食畢當漱口數過不爾使人病齲齒出第二十九􅃃中廣濟療齒齲痛方五月五日蝦蟇燒作灰石黛甘皮細辛白雞屎麝香乾薑熏黄右八味各等分以薄綿褁少許内蟲齒孔中日三易之差集驗療齲齒方取松脂銳如錐注齲孔内須臾齲蟲縁松脂出又方煮雞舌香汁含之差千金療齲齒及蟲齒方白附子一分知母一分細辛五分芎藭三分髙良薑二分右五味末以綿裹少許著齲上勿嚥汁日二三亦治口氣又方取白馬懸蹄少許塞孔中日三度即差止翼同並出第六卷中張文仲療齲齒方以郁李根白皮切水煮濃汁含之冷易之當吐蟲出備急齲齒方皂莢炙去皮子末少許著齒痛上差齒蟲方五首病源齒蟲是蟲食於齒齒根有孔蟲在其間亦令齒疼痛食一齒盡又度食餘齒養生方云雞鳴時常叩齒三十六下長行之齒不蠧蟲令人齒牢又云朝未起早潄口中唾滿口乃吞之輒啄齒二七過使人丁壯有顔色去蟲而牢齒又云人能常服玉泉必可丁壯妍悦去蟲牢齒謂口中唾也出第二十九卷中小品療齒蟲腐棘刺潄湯方腐爛棘鍼二百枚即是棗木刺朽落地者用一物以水二升煎取一升含之即差日四五度以差為度删繁療齲齒蟲方莨菪子三合青錢七文燒令赤取小口瓶子可令口含得者將錢内瓶子中取莨菪子一撮安錢上令爆烢聲仍以水少許淋錢上即氣出用熏齒冷止三合藥盡為劑蟲食齲齒風痛並用千金同又療蟲齒痛椒湯方蜀椒一兩礬石半兩桂心一兩右三味以水三升煮取一升去滓含之潄齒勿嚥汁甚良又附子塞蟲孔丸方附子一枚炮末以蠟和之為丸準齒蟲孔大小内之取差止必効殺齒蟲方雄黄末以棗膏和為丸塞牙孔中以膏少許置齒燒鐡箆烙之令徹熱以差止一方有附子一枚風齒方四首病源手陽明之支脈入於齒頭面有風陽明之脈虚風乘虚隨風流入於齒者則令齒有風微腫而根浮也出第二十九卷中集驗療風齒疼腫悶方莽草二兩右一味以水五升煎取三升含潄之勿嚥汁又方椒二十粒枳根皮莽草細辛菖蒲牛膝各二兩切右六味切以水四升煮取二升去滓細細含之以差為度未差更作取差備急療風齒疼刺腫方煮獨活含之良又療風齒腫杉葉湯方杉葉三兩芎藭細辛各二兩右三味切以酒四升煮取二升半稍稍含之取差勿嚥之風齒根出方二首廣濟療熱風齒齗肉欲盡根出恐是疳蟲食齗及耳鼻疼痛方石黛五分細辛棘刺菖蒲香附子當歸青木香胡桐律乾薑各四分青葙子六分右十味𢷬為散以半錢匕綿裹就齒痛處含之勿停差止服後丸方一方無細辛有雞舌香丸方苦參八分大黄黄芩枳實各六分地骨皮六分𤣥參八分黄連八分右七味𢷬篩蜜為丸食後少時以漿水服一十五丸日再服至二十丸増減自量之忌蒜麪豬肉風齒口臭方二首廣濟療風齒口氣臭芎藭湯方芎藭三兩當歸三兩獨活四兩細辛白芷各四兩右五味切以水五升煮取二升去滓含潄日三五度取差齒敗口臭方取芎藭煮一味含之牙齒風齲方三首延年療牙齒風齲方䑕粘子右一味𢷬以水四升煮取二升半濾去滓適寒温含之冷吐别含取差又方薏苡根四兩切右一味以水四升煮取二升含冷易之又方郁李根白皮切四兩細辛一兩鹽一合右三味切以水四升煮取二升半去滓内鹽含之取差牙齒疼風蟲俱療方五首廣濟療牙齒疼痛風蟲俱差方獨活防風各四兩芎藭細辛當歸各五兩沉香八分雞舌香零陵香各五兩黄芩十分升麻八分甘草六分炙右十一味𢷬篩烊蠟少許丸如小豆以薄綿裹當痛上含有汁嚥亦無妨口臭氣尤妙又療齒痛不問蟲風者方熏黄一兩莽草一兩臘月羊脂蜀葵莖兩枚右四味𢷬熏黄等為末消羊脂以葵莖蘸脂㸃藥末注齒痛處孔中日三五度每令葵莖熱用之良又療牙齒疼蟲痛含湯方肥松脂三兩皂莢一枚去皮子炙令黄石鹽七枚右三味切以水二升煮取八合去滓温含冷吐之即差止崔氏療牙齒隱隱痛無問風蟲摇動齒齗脚宣露含此藥効其齗便生方取細柳枝捋去皮剉一升炒之内大豆一升和柳枝更炒以豆炮聲盡於垍器盛之以清酒三升漬之經三日含之頻吐即無妨兩劑無不愈其齗亦生出第四卷中必効療風蟲疼痛方取屋間蜂窠一枚炙椒七粒右二味以水一升煎取半升含之或齗腫勿怪之風衝牙齒摇動方二首延年療風衝牙齒摇動方車下李根白皮郁李根也三兩切蒼耳子三合碎右二味以水三升煮取二升含之良又方芎藭三兩細辛一兩防風二兩薏苡根三兩右四味切以水六升煮取三升去滓含潄齒日三五度差止疳蟲食齒方一十首千金凡齒齗宣露多是疳􅉶及月蝕方以角蒿燒灰夜塗齒齗間使滿不過兩三度即差慎油膩沙糖乾棗及桂切忌之又方毎旦以鹽一捻内口中以煖水含和鹽揩齒百遍可長為之口齒牢密又凡人好患齒病多由月蝕夜食飲所致識者特宜慎之所以日月蝕未平復時特忌飲食小兒亦然方蚯蚓糞水和作稠泥團以火燒之令極赤末之如粉以臘月豬脂和傅齒齗上日三即差止又疳蟲食齒根方伏龍肝置石上著一撮鹽須臾化為水以麪展取待凝厚取以内病上又方以皂莢去皮炙末塗上蟲即出又方純麻子燭燼研以井花水和傅之又方黒羖羊脂莨菪子各等分右二味和先燒鋤銎使赤内其中煙出以布單覆頭令煙入口熏之並第六卷中張文仲疳蟲方大酢一升煮枸杞白皮一升取半升含之蟲即岀姜生論云齒齗虚軟而無膿血又口􅉶其齒齗觸著即膿血出又口疳其齒齗不觸自然膿血出又口瘻其齒斤上有小孔如蜂窠形又齒疳其骨脆爛其齒齗蜃口吻變作白色或作青紫黒色者是急疳之狀死不過旬日宜急療之先看脣頰邉有赤白黒脈處即須以針針去惡血便燒鐡箆烙之如此變即定或附齒有黄色物如爛骨狀名為食牀凡療齒看有此物先以鉗刀略去之然後依方用藥其齒齗内附著齒根者形如雞子膜有如蟬翼纒著齒者亦須細看之不爾其齒齗永不附著齒根也病狀如前後方自有委曲也又雄黄膏療齒中疳瘡􅉶瘻蟲蝕牙齒口裏之疾皆療之其膏以十二月合即得一年用不爾難乆停方好牛酥五大兩蜜蠟半兩雄黄一小兩研朱砂二分研藁本半大兩藜蘆二分杏仁四分去皮尖芎藭白芷鰻􅀈魚升麻各三分右十一味以酥中煎諸藥魚令黄色去魚煎三上三下入蠟煎沫盡膏成収器中攪勿住手凝定以本方即諸藥並為末不去滓甚良又升麻揩齒方升麻半兩白芷藁本細辛沉香各三分寒水石六分研右六味𢷬篩為散毎朝楊柳枝咬頭軟㸃取藥揩齒香而光潔一方云用石膏貝齒各三分麝香一分尤妙齒痛有孔方四首備急療牙齒有孔方莨菪子數粒内齒孔中以蠟封之即差古今録驗療齒痛有孔不可食飲面腫莽草湯方莽草七葉蜀椒九箇右二味以漿水二升煮取一升適寒温含滿口冷即吐之日二三含之千金同又療齒齲痛有孔方取雄雀屎以綿裹内齒孔中日二易之姜生療齒有孔方附子二分炮去皮蜜蠟五分右二味相和為丸塞齒孔中即差忌冷水油膩齒挺出及脱落方五首廣濟療齒牙風挺出疼痛郁李根湯方郁李根五兩芎藭二兩細辛二兩生地黄四兩右四味以水六升煮取二升半去滓先以鹽湯潄口然後温含之冷即吐更含取差崔氏療牙齒挺出疼痛不可忍方羊腎脂二合泔淀二合牛糞絞取汁一合甘草半兩生用末之青黛熏黄半兩末右六味相和銅器中微火煎五六沸取東引桃枝如筯大六枝以綿纒頭㸃取藥更互熱烙齒齗際隔日又烙之不兩三度看好肉生以差乃止欲烙時淨刮齒牙根上然後為之不爾肉不生十餘日忌生冷酢酒肉陳臭一年禁油又療疳濕牙齒脫落刺脣穿破及下部侵蝕并痔􅉶齒悉療之方顧恭軍授甘家祕之青黛二兩雄黄研朱砂研莨菪子熬青礬石黄礬石白礬石並燒令汁盡附子炮苦參甘草炙藜蘆炙細辛麝香研各一兩右十三味𢷬篩為散有前齒疾稍稍著病上日二三濕􅉶者以井花水平旦杪取半錢匕水中服之兼以薄綿裹如棗核許著蝕蟲􅉶處日三差止下部中濕􅉶蝕之以苦參甘草作湯和半錢匕灌之良並出第四卷中張文仲療齒根欲脫落方取生地黄𢷬以綿裹貼齒根常含之甚妙備急比見患齒風傷齒挺出一分者方長咋地黄尤妙更不復發齒間血出方三首病源手陽明之支脈入於齒頭面有風而陽明脈虚風挾熱乘虚入齒齗摶於血故血出也出第二十九卷中千金齒間血出者方竹葉濃煮著鹽含之冷吐又方童子小便温含之冷吐血即止並出第六卷中備急療齒疼痛齗間血出神驗方好鹽熬毎夜封齒根上􅅹水盡乃扣齒一二百遍即差忌棗沙糖等齒血不止方四首千金療齒血不止方刮生竹皮以苦酒漬之令其人解衣坐使人含噀其背三遍仍取茗草濃煮汁含之潄嚥終日為之又療齒齗間津液血出不止方生竹茹四兩醋浸一宿含之又方細辛二兩甘草二兩炙右二味醋一升煮夜含之及熱尤良又方礬石一兩燒末以水二升煮先拭血乃含之並出第六卷中齒腫方二首千金療齒根腫方松葉一把鹽一合右二味以好酒三升煮取一升含之冷吐差即止又療齒腫痛及蟲方黄芩甘草桂心當歸細草蛇牀子各一兩右六味切以漿水七升煮取三升去滓含之日三夜一良並出第六卷中牙疼痛及蟲方三首必効療牙風疼方取東牆下朽骨削之如疼牙齒許大於煻灰中煨燒令熱於所痛處齧之冷即易之又牙蟲痛并蟲蝕方以水煮露蜂房細辛各等分含之即差止又療牙疼及頭牙齗風腫口急不開面目虚腫皆頧起者方蒴藋五兩以水五升煮取四升去滓蜀椒一兩吳茱萸獨活烏賊魚骨桃膠各一兩桂心半兩酒一合右八味切以水二升煮取八合投蒴藋汁及酒更煎取一小升去滓含之就病處日三以差止為度牙齒雜療方七首集驗療齒楚痛方生地黄桂心右二味合以含嚼咽汁無妨千金同删繁療心虚寒口氣臭衝人又蟲齒痛芎藭散方芎藭八分白芷七分甘草五分炙桂心四分杜蘅四分當歸五分右六味𢷬篩為末以酒和方寸匕服之日二服千金療酒醉牙齒涌血出方燒釘赤炷血孔中即止又療齒痛方當歸桂心甘草炙各二兩礬石六分燒右四味切以漿水二升煮取一升含之日五六差止張文仲療齒痛風引腫摇動發作不療蟲蝕盡方礬石燒乾薑藜蘆蛇牀子甘草炙細辛蜀椒防風各一兩右八味𢷬散以一錢匕和温酒二合含之勿嚥汁冷即吐出日三度差止齒落自復生甚効又療厯齒稍碎壊欲盡方礬石如棗大以綿裹含之取差古今録驗療牙齒根摇擬欲墮者齲齒方取生地黄綿裹含之微嚼候汁味盡棄之乃更含之緊脣方一十三首病源脾與胃合胃為足陽明其經脈起鼻環於脣其支脈入絡於脾胃脾胃有熱氣發於脣則脣生瘡而重被風邪寒濕之氣摶於瘡則微腫濕爛或冷或熱乍差乍發積月累年謂之緊脣亦名瀋脣出第三十卷中廣濟療緊脣水銀膏方水銀熏黄研青礬研苦參各二兩末絳緋一方亂髮一雞子大細辛二兩末右七物以緋裹髮用麻油一斤蠟二兩先煎苦參細辛以緋髮消盡入水銀石藥及蠟候膏成収凝定以傅病上取差為度水銀和石藥兩味研令盡入煎之又療緊脣瘡乆不差石硫黄膏方石硫黄研白礬燒朱砂研水銀麝香黄蘖末各一分右六味和水銀研於瓷鉢中以水銀盡用臘月豬脂和如泥先拭淨塗之日三五以差為度甚良小品療緊脣方以白布纒作燭著空斧中燒布斧刃有汗出以指厯取塗病上取差千金同千金療緊脣方灸虎口男左女右七壯又方灸承漿三壯良又方青布燒灰酒服之又以脂和塗又方以蠟片炙貼之一宿差又方炙松脂貼上又方先灸瘡燒蛇皮灰以傅之並出第六卷中崔氏療緊脣方取膝頭垢綿裹燒傅之又方取屠兒肉几上垢燒塗之又方燒人屎灰傅之又方馬芥亦名刺芥𢷬取汁日暴令濃先揩脣使血出以藥匕塗之亦療刺風並出第四卷中瀋脣瘡爛方五首肘後療瀋脣常瘡爛方以五月五日鯉魚血墨和塗集驗療瀋脣緊脣方以青布卷燒炷著斧上取汁塗之良千金同又方取亂髮蜂房六畜毛燒作灰以豬脂和如膏傅千金同又方鼈甲及頭垢燒灰傅之千金同又方礬石燒末和胡粉傅之差脣瘡方三首肘後療脣瘡方以頭垢傅之日三千金同又方以東壁土傅之千金療脣瘡方胡粉傅之口瘡方一十一首廣濟療口瘡煎方龍膽黄連升麻槐白皮大青各二兩苦竹葉一升白蜜半升右七味切以水五升煮取一升去滓下蜜煎之塗口瘡差又療口舌生瘡含煎方升麻大青射干各三兩梔子黄蘗各一升蜜八合薔薇白皮五兩苦竹葉一升切生地黄汁五合生𤣥參汁五合無用乾者二兩右十味切以水六升煎取二升去滓入生地黄汁蜜煎成一升如餳細細含之取差即止又心脾中熱常患口瘡乍發乍差積年不差方升麻八分大青枳實炙甘草炙各六分苦參七分黄連八分生乾地黄八分右七味𢷬羅蜜丸以水服二十丸日再忌如常法集驗療口瘡方升麻黄蘗大青右三味切以水煮含之冷吐差止又方蘆根四兩黄蘗升麻各三兩生地黄五兩右四味切以水四升煮取二升去滓含取差含極冷吐却更含之千金療口瘡不歇生牛膝潄口煎方生牛膝生蘘荷根各三兩刺蘗葉一兩右三味剉綿裹以酒三升漬一宿微煎一兩沸含之必効口瘡方黄芩芍藥羚羊角屑黄蘗大青苦竹葉各二兩升麻三兩右七味切以水七升煎取二升去滓内蜜二合攪含冷吐以差止肘後同古今録驗療口瘡湯方細辛甘草桂心各三兩右三味切以酒一升煮取六合含之又黄芩湯療口瘡喉咽中塞痛食不得入方黄芩黄連甘草炙黄蘖各一兩右四味切以水三升煎取一升含之冷吐取差又方大青四分山梔子黄蘗各一兩白蜜半升右四味切以水三升煮取一升去滓下蜜更煎一兩沸含之取差止又升麻散主口瘡方升麻六分黄蘗右二味𢷬末以綿裹含之口瘡乆不差方二首千金療口瘡不差入胷中生瘡三年以上不差方薔薇根濃煮汁含之又稍稍嚥之三日三夜差冬取根夏取莖葉又方以角蒿灰塗之一宿知二宿差勿嚥汁取差為度又論云凡患口瘡及齒切禁油麪酒醬醋膩乾棗差後七日㫁之彌佳若不乆慎尋手即發發而更療其差稍遲慎之慎之薔薇根角蒿為口瘡之神藥人皆不知之口吻瘡方四首病源足太隂為脾之經其氣通於口足陽明為胃之經手陽明為大腸之經此二經並夾於口其腑藏虚為風邪濕熱所乘氣發於脈與津液相摶則生瘡常濕爛有汁世謂之肥瘡亦名鷰口瘡出第三十卷中千金療口吻瘡方楸白皮及濕貼之數易取差又方掘經年葵根欲腐者彌佳燒灰以傅之又方白楊枯枝鐡上燒一頭取熱塗之本方云療鷰吻又方以新炊飯了甑脣及熱熨之三十下三兩度差止口乾燥方五首删繁療口熱乾燥甘草丸方甘草六分炙人參六分半夏六分洗烏梅肉六分棗膏十分右五味𢷬篩四味棗膏相和入蜜丸如彈子含之差千金同分兩小異千金療口乾除熱下氣方石膏五合碎右一味以水三升煎取二升入蜜二升煮取二升去滓稍稍含咽之差止又口乾方豬肪脂雞子大擘内醋半升漬一宿絞汁服之取差為度又方酸棗一升去核酸石榴子五合乾葛三兩烏梅五合去核麥門冬四兩去心覆盆子三合甘草灸栝樓三兩右八味𢷬以蜜丸含如棗核大潤為度張文仲主口乾方乾棗肉三兩甘草炙杏仁烏梅二兩右四味𢷬以蜜和丸如棗核含以潤差止口臭方九首千金療口中臭方桂心甘草細辛橘皮各等分右四味𢷬篩以酒服一錢匕差止為度又方甘草五兩芎藭四兩白芷三兩右三味𢷬篩以酒服方寸匕日三三十日口香又方濃煮細辛含之乆却吐甚良又方橘皮五分桂心三分木蘭皮四分芎藭六分一云棗四十箇右四味𢷬篩以酒服方寸匕日再服一方無芎藭亦可以棗丸含化又方大豆熬令焦以醋沃取汁含之又方細辛豆蔲右二味等分𢷬末煮含之甚良又方梔子甘草炙各三分細辛五分桂心二分芎藭四分右五味𢷬篩蜜丸食後服七丸日再差止又方芎藭白芷橘皮桂心各四分棗肉八分右五味𢷬篩四物以蜜和棗肉為丸食後服十丸又含之以差為度此方甚驗古今録驗療口臭方甘草二兩炙細辛二兩末右二味臨卧三指撮以酒服之甚良千金同舌論一首删繁舌者主心小腸之候也舌重十兩長七寸廣二寸半善用機衡能知五味凡有所噉若多食鹹則舌脈凝而變色多食苦則皮藁而外毛拔多食辛則舌筋急而枯乾多食酸則舌肉腆而脣掲多食甘則舌根痛而外髮落又曰心欲苦肺欲辛肝欲酸脾欲甘腎欲鹹此五味内合五藏之氣也若藏熱則生瘡脣揭赤色若腑寒則舌本縮而口噤脣青寒宜補之熱宜㵼之不寒不熱依腑藏調之舌夲縮口噤方二首刪繁療舌小腸腑寒應舌夲縮口噤脣青獨活解噤膏方獨活芎藭各三兩天雄一兩炮防風一兩蜀椒二合莽草十葉細辛桂心各一兩苦李根皮三兩豬肪二升右十味㕮咀綿裹以苦酒一升淹漬一宿以豬肪微火煎之去滓膏成凝以綿裹少許口含於舌下壓之取差日三度易之此方甚良又生艾葉薄法無生艾葉者取乾者𢷬之以水淹一升已來熟𢷬以帛塗之於寒處上封裹之以差為度舌上瘡方二首千金云舌上瘡不得食舌本強頸兩邉痛此因心虚熱所致療之方柴胡升麻梔子仁芍藥通草各四兩黄芩大青杏仁去尖皮生薑各三兩石膏八兩右十味切以水一斗煎取三升半分四服日三夜一又療舌上瘡方豬膏一斤蜜二升甘草如指節三寸右三味相和煎相得即含棗許嚥之日三差止咽喉舌諸疾方七首千金喉舌諸疾方松子苦芥子𢷬以苦酒和貼上又方麥麪以苦酒和塗之痛止小品療喉諸病方雞子一枚破以黄白攪呑之差文仲療咽喉舌諸方爪耳下張口解間突處痛爪勿止兩三食乆即得咽喉開又方隨所近左右刺手中指爪甲下令血出當先縳中指令血聚刺之備急療急喉咽舌病者方隨病所近左右以刀鋒裁刺手大指甲後爪中令出血即愈又方病人卧急爪其蹠心隨所近左右以差為良通按一本咽喉舌諸疾方七首與前不同今附録之千金烏翣膏喉嚨者脾胃之候若藏熱喉則腫塞神氣不通方生烏翣十兩升麻三兩通草羚羊角芍藥各二兩薔薇根切一升生地黄切五合豬脂二斤艾葉六銖生者猶佳右九味㕮咀綿裹苦酒一升淹浸一宿内豬脂中微火煎取苦酒盡膏不鳴為度去滓薄綿裹膏似杏仁大内喉中細細吞之又方療喉痺以牛角燒研末酒服方寸匕又方療喉痺痺卒不語煮大豆汁吞之又方療喉痺燥腫連頰吐氣數者名馬喉痺馬鞭草一握勿見風截去兩頭𢷬汁服之差又方療舌腫以醋和釜底墨厚傅舌上下脱皮更傳消息取差又方療舌脹用雄雞冠血盞盛浸舌嚥下即縮肘後療舌上出血如鑽孔者煎香薷汁服一升日三服盡口脣舌鼻雜療方一十四首廣濟療疳蟲蝕脣鼻齒口及餘處皆効方石硫黄研乾漆熬文蛤燒作灰右三味各等分絹篩之毎用減取胡桃大麝香棗核大研和先拭上惡物血等然後傅之日三肘後療脣裏忽生丸核稍大方以刀鋒決之令血出差删繁療舌主心藏熱即應舌生瘡裂破脣掲赤升麻泄熱煎方升麻三兩射干三兩黄蘖切一升若竹葉切五合大青三兩生蘆根薔薇根白皮各切一升生𤣥參汁五合生地黄汁五合赤蜜八合右十味切以水四升煮七味取一升絞去滓下諸汁蜜等候成煎放冷以綿取之封貼舌上含之細細嚥之以差為度良千金同千金療舌上有瘡四五孔大如簮者出血如涌泉此心藏病治方戎鹽五分黄蘖黄芩各五分人參一分甘草二分炙大黄三分桂心二分右七味𢷬末蜜和丸以飲服十丸漸増之或燒鐡箆烙孔上又療膀胱熱不已口舌瘡咽腫升麻煎方升麻大青黄蘖各二兩薔薇根射干𤣥參各四兩蜜五合右七味切以水七升煮六味取一升去滓下蜜煎成含之以差即止又療口傍瘡方亂髮灰故絮灰黄連末各等分以傅瘡取差翼中有乾薑又療脣邉生瘡連年不差方以八月藍葉十斤𢷬汁澄取淀以傅之又療脣舌忽生瘡方燒雞舌香末綿裹傅之取差又療脣黒腫痛痒不可忍方取大錢四文於石上磨似泥或乾用臘月豬脂和塗之差又方以竹彈弓彈之要惡血出差又療逺行脣口面􅀈破方通按音無􅀈字一本作􅀈均折裂也煎臘月豬脂傅之差又療冬月脣乾圻血出方𢷬桃仁以豬脂和塗張文仲療舌強不能言方礬石桂心各一兩右二味𢷬末傅舌上差必効療舌忽然麤滿口方以釡下煤和鹽等分以塗舌腫令遍􅅹清水塗之取差止通按一本有後六方今附録之千金療口瘡白漫漫方取桑樹汁先以髮拭口次以汁塗之又療口中及舌上生瘡爛搗黄栢含之又療重舌舌上生瘡涎出以蒲黄末傅之不過三度差又療舌無故出血不止用槐花炒為末摻上立止又療鼻中外查瘤膿血出者正月取䑕頭燒灰和臘豬膏傅之又療咽喉閉塞口噤方用雄雀糞研末毎服温水調灌半錢匕立差外臺祕要方卷二十二
