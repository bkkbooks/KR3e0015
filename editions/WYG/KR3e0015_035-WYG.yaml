body:
  text: 外臺秘要方巻三十一唐王燾撰採藥時節一首千金翼論曰夫藥採取不以時節不知陰乾暴乾雖有藥名終無藥實故不依時採取與朽木不殊徒費人功卒無裨益其法雖具本經學者尋覽造次難得所以甄别即目可知耳萎蕤立春後採陰乾藁本暴乾三十月通草取枝陰乾烏喙陰乾烏頭陰乾絡石陰乾以上並正月採茯苓陰乾茯神陰乾桂心陰白术暴乾地黄陰天門冬暴麥門冬陰薯蕷暴甘草暴人參暴勿見風石龍芮採皮陰乾藁本暴龍膽陰杜仲陰牛膝陰細辛陰獨活暴升麻暴柴胡暴榆皮暴藍葉暴當歸陰防風芍藥桔梗秦芁前胡知母括樓根沙參狗脊茜根王不留行萆薢菝葜白芷杜若百合白歛地榆以上暴乾大黄火乾虎掌黄連秦皮猪苓石韋紫菀紫葛狼毒鬼臼天雄防己烏喙烏頭甘遂牡丹巴㦸天石南葉貫衆羊桃黄精黄芪以上並陰乾二月採黄芩陰大青陰天門冬暴水萍暴厚朴陰青葙葉陰𤣥參陰白薇艾葉暴芫花陰商陸日乾白术暴麥門冬陰紫菀陰躑躅陰射干陰茵芋陰黄環陰澤蘭陰蕪荑陰杜蘅暴藍葉王𤓰陰寄生陰防葵暴紫草陰芎藭暴苦參暴茜根暴紫參火炙澤漆陰藜蘆陰以上並三月採赤箭菥蓂子蒲黄𤣥參蘼蕪以上暴逺志陰景天陰人參暴芎藭大青陰白頭翁白鮮石南葉鼠尾草以上並四月採陰乾菖蒲陰巻栢陰白鮮陰澤㵼陰車前五月採陰石龍芮子蜀漆陰肉蓯蓉陰菥蓂子暴覆盆子乾漆夏至後採半夏暴五加採莖陰杜仲茵蔯陰莽草陰蕤核葛根暴丹參暴蛇床子陰葶藶子立夏後採陰茺蔚子青葙子茛菪子蘼蕪暴松蘿陰旋覆花暴萹蓄陰䕡茹陰青蘘巨勝苗也以上五月採松脂青葙子茅根杜仲蕘花以上六月採陰石解陰五加皮採莖陰巻柏陰海藻暴腐婢陰澤漆陰天門冬暴䑕尾花陰𤓰蔕槐子麻黄立秋採陰石龍蒭暴景天陰飛㢘陰薇銜陰菌桂陰立秋採水蘇瞿麥立秋取實陰桃仁陰續斷陰蒺䔧子暴以上並七月採白𤓰子飛㢘陰女青陰地榆暴大黄火乾桔梗暴大􅀥暴楮實暴秦皮陰桂陰營實陰鬼臼陰百合暴牡丹陰防已陰狼毒陰萆薢暴菝葜暴白芷暴連翹陰苦參暴石龍芮陰狗脊暴白歛暴前胡暴知母暴栝樓根暴巴豆猪苓陰茯神陰蛇含陰茯苓陰虎掌陰薏苡仁天門冬麥門冬陰杜若暴當歸陰耆實暴柴胡暴升麻暴獨活暴細辛陰牛膝陰石斛陰人參暴薯蕷暴甘草暴敗醬暴恒山陰半夏暴雷丸暴牡荆陰漏蘆陰酸棗陰白木暴秦芁暴龍膽陰巴㦸天陰蒺䔧子暴黄連沙參暴王不留行暴續斷陰貫衆陰乾地黄陰地膚子陰五味子陰蜀椒陰雚菌陰鬼箭陰附子上旬採秦椒澤㵼陰牙子暴黄芪陰芍藥暴石南實陰以上八月採松實陰菊花陰耆實暴乾薑枳實陰白术暴楮實暴厚朴陰杜仲皂莢陰山茱茰陰吳茱萸九月採陰梔子暴辛夷暴牡荆陰秦椒莵絲子暴營實陰以上並九月採麥門冬陰牛膝陰地膚子陰枳實陰防風暴決明子皂莢陰桂陰菴䕡子陰山茱萸陰五加根陰厚朴陰雲實暴貝母暴以上並十月採菊子陰莧實陰欵冬花陰龍膽陰以上並十一月採冬葵子菖蒲龍膽忍冬木蘭大㦸以上並十二月採陰拘把子冬採根春夏採葉秋採莖實陰桑根白皮採無時柏葉四時各依方面採之神陰蒴藋春夏採葉秋冬採根莖論曰凢藥皆須採之有時日陰乾暴乾則有氣力若不依時採之則與凡草不别徒棄功用終無益也學者當要及時採掇以供所用耳藥所出州土一首千金翼論曰按本草所出郡縣皆是古名今之學者卒尋而難曉自聖唐開闢四海無外州縣名目事事惟新所以須甄明即因土地名號後之學者容易即知其出藥土地凡一百三十三州合五百一十九種其餘州土皆有不堪進御故不繁録耳闗内道雍州柏子仁茯苓華州覆盆子茯神杜蘅皮柏白茵芋冬天門木防巳麥門冬黄精留行王不白术薯蕷茯苓牛膝細辛狼牙鼈甲水蛭丹參松花鬼臼鼈頭白芷小草欵冬花桑螵蛸白斂松子松蘿𤣥參兎肝沙參逺志續斷澤㵼萸山茱五味子萆薢茯葜白薇桔梗通草石南龜頭石韋同州䗪蟲根麻黄班猫蕪荑麻黄蒲黄寒水石麻黄子岐州樗雞及巳麞骨藜蘆麞髓秦芁鬼督郵甘草寧州芫青荆子菴䕡子䖟蟲萹蓄花菴䕡鄜州芍藥黄芩䕡茹秦芁原州獸狼牙黄芪楓柳皮白藥蓯蓉延州蕪荑涇州澤㵼秦芁防風黄芩靈州代赭蓯蓉野猪黄狟脂鹽州青鹽河南道洛州黄魚膽黄石脂秦椒穀州半夏桔梗鄭州秦椒陜州栝樓仁柏子汝州鹿􅊁鹿茸許州鹿茸虢州茯苓細辛茯神英白石桔梗栝樓桑上寄生豫州吳茱萸鹿茸齊州阿膠防風榮婆藥萊州牡蠣文蛤䕡茹魚烏賊馬刀牛黄海藻海蛤七孔決明兖州防風英紫石仙靈脾雲母羊石石桃花蜜州海蛤牛黄泗州麋脂麋角徐州桑上寄生淄州防風沂州紫石英江南東道潤州躑躅鬼臼貝母半夏卷柏越州榧子奴劉寄婺州睦州歙州建州並出黄連泉州乾薑江南西道宣州半夏黄連饒州黄連吉州陟釐江州生石斛岳州杉木楠木蟬蛻鼈甲潭州生石斛郎州牛黄永州石鷰彬州釣樟根辰州丹砂隴右道秦州防葵牙獸狼狼毒鹿茸鹿角蘼蕪芎藭成州防葵狼牙蘭州蓯蓉膠鹿角廓州大黄武州石膽雌黄雄黃宕州藁本當歸獨活河西道涼州大黄鹿茸白附子甘州椒根肅州肉蓯蓉百脉根伊州伏翼葵子𤓰州甘草西州蒲暴沙州石膏劒南道益州苧根梅煎枇杷葉蜀漆黄環仁薏苡鬱金根百部百兩金恒山薑黄乾薑木蘭草慎火沙糖眉州巴豆資州折傷木嘉州巴豆紫葛綿州天雄側子烏頭天一㦸附子甘皮烏喙卭州賣子木瀘州蒟醬茂州升麻硝馬牙羌活朴硝金牙大黄馬齒礬雄黄芒硝礬石嶲州高良薑松州當州並出當歸扶州芎藭龍州側子烏頭巴㦸天烏喙天雄附子柘州黄進嶺南道廣州石斛子決明白藤花甘蕉根丁根恩州蚺蛇膽賀州梧州象州並出蚺蛇膽桂州滑石膽蚺蛇春州封州瀧州並出石斛融州桂心韶州石斛鍾乳牡桂栁州桂心根釣樟潘州蚺蛇膽交州檳榔龍眼三百兩銀木藍子峯州豆蔲馬牙石一名長石一名太乳一名牛腦石出在空青出蔚州蘭州宣州梓州宣州者佳蔚州者齊州歴城縣無空塊大色深深曾青鄂州蔚州者佳餘州者惡白青簡州梓州者並佳石膽蒲州虞鄉東亭谷及薜集窟塊如雞子大者佳乳石第一出始興其次連廣灃郎栁等州今陜芒硝同名為硝石嶺南始安出者佳菜州齊州州青溪房州三洞出者亞於始興者自餘不可者惡堅潤服之勝乳用也赤石脂虢州盧氏縣澤州陵川縣慈州吕鄉縣桃花石舊出中州鍾山縣似赤石脂但不著舌並有凡石中有石骨如玉陽起石齊州歴城縣西北五六里齊山西北六石腦一名石飴餅出徐州宋里山入土一丈餘七里盧山出白者佳黑者不堪得之大如雞子觸著即破青琅玕出雋州西烏白蠻中及于闐國一名青疑水石出同州韓城縣色青黄理如雲母者佳珠澄城斜理文逆白者劣蒼石梁州均州房州金州並出土陰蘖色白如脂出渭州鄣縣三交驛西北坡礜石漢川武當西遼坂名礜石谷即是其真者平地土窟中乳是也有六十餘坎人云服之同梁州馬道成澗中有鍾乳不發熱戎鹽沙州名為禿登鹽廊州名為土陰鹽生河薑石齊州歴城東者良岸山坂之陰燒之不鳴代赭今靈州鳴沙縣大勝齊代所出者論曰既知無物非藥及所出土地復採得時須在貯積以供時用不得虛棄光陰臨時忽遽失其機要使風燭不救實可悲哉博學者深可思之用為備耳用藥分兩煮湯生熟法則一十六首千金或曰古人用藥至少分兩亦輕差病極多觀君處方非不煩重分兩亦多而差病不及古人者何也答曰古者日月長逺藥在土中自養經乆氣味真實百姓少欲稟氣中和感病輕㣲易為醫療今時日月短促藥力輕虚人多巧詐感病厚重難以為醫故病輕藥味須少痾重用藥即多此則醫之一隅何足恠也又古之醫者自解採取陰乾暴乾皆悉如法用藥必依土地所以療十得九今之醫者但知診脉處方不知採藥時節至於出處土地新陳虚實一皆不悉所以療十不能得愈五六者實繇於此處方者常須加意重複用藥藥乃有力若學古人徒自誤耳將來學者須詳熟之凡紫石英白石英朱砂雄黄硫黄等皆須光明映澈色理鮮浄者為佳不然令人身體乾躁發熱口乾而死凡草木藥皆須土地堅實氣味濃烈不爾療病不愈凡狼毒枳實橘皮半夏麻黄吳茱萸皆欲得陳乆者良其餘唯須精新也問曰凡和合湯藥治諸草石蟲獸用水升數消殺之法則云何答曰凡草有根莖枝葉皮骨花實諸蟲有毛翅皮甲頭足尾骨之屬有須燒鍊炮炙生熟有定一如後法順方者福逆之者殃或須皮去肉或去皮須肉或須根莖或須花實依方鍊治極令浄潔然後升合秤兩勿令參差藥有相生相殺氣力有彊有弱君臣相理佐使相持若不廣通諸經即不知有好有惡或醫自以意加減不依方分使諸藥草石彊弱相欺入人腹中不能治病更加鬭争草石相反使人迷亂力甚刀劍若調和得所雖未能治病猶得利安五藏於病無所増劇例曰諸經方用藥所有熬錬節度皆脚下注之今方不然此篇具條之更不煩别注也凡藥治擇熬炮訖然後秤之以充用不得生秤凡石藥及玉皆碎如米豆以綿褁内湯酒中煮之凡鍾乳及諸石以玉鎚著水研之三日三夜漂練務令極細乾研則七日七夜凡銀屑以水銀和成泥凡礜石以黄土泥團之火燒半日乃熟可用仍不得過之不錬生入藥使入破心肝凡朴硝礬石燒令汁盡乃入丸散芒硝朴硝皆絞湯訖乃内汁中更上火兩三沸令烊盡乃服凡湯中用丹砂雄黄細熟研如粉臨服乃投湯中攪令調和服之凡湯中用完物皆擘破乾􅀥梔子之類是也用細核物亦打破山茱萸五味子蕤核決明子之類是也細花子物正爾完用之旋覆花菊花地膚子葵子之類是也米麥豆輩亦完用之凡橘皮吳茱萸椒等入湯不㕮咀凡諸果子仁皆去尖皮及兩仁者湯揉撻去皮仍切之用梔子者去皮用蒲黄者湯成下凡生麥門冬生薑入湯皆切三擣三絞取汁湯成去滓下之煮五六沸依如升數不可共藥煮一法薄切用之凡麥門冬皆微潤抽去心凡麻黄去節别煮兩三沸掠去沫更益水如本數乃内諸藥煮之不爾令人煩寸斬之小草瞿麥五分斬之細辛白前三分斬之膏中細切用之凡牛膝石斛等入湯酒拍碎用之石斛入丸散者先以碪搥極打令碎乃入臼不爾擣不熟凡用桂厚朴杜仲秦皮木蘭皮輩皆削去上虚軟甲錯取裏有味者秤之茯苓猪苓削去黑皮秤牡丹天門冬巴㦸天逺志野葛等皆搥破去心紫菀洗去土㦸乾乃秤之薤白葱白除責令盡莽草石南茵芋澤蘭剔取葉及嫩莖去大枝鬼臼黄連皆除根毛石韋辛夷拭去毛又去心蜀椒去目及閉口者用大棗烏梅皆去核用鬼箭削取羽皮凡茯苓芍藥補藥須白者瀉藥唯赤者凡兎絲子湯淘汰去土乾漉煖酒漬經一宿漉出暴㣲白擣之不盡者更以酒漬之三五日乃出暴微乾擣之須㬰悉盡極易碎凡甘草厚朴枳實石南茵芋藜蘆皂莢之類皆炙之而枳實去欀藜蘆去頭皂莢去皮子凡椒雲實微熬令汗出即有勢力凡湯丸散用天雄附子烏頭烏喙側子皆煻灰炮令㣲拆削去黑皮乃秤之唯薑附湯及膏酒中即生用亦削去皮乃秤之直理破作七八片半夏熱湯浸洗去上滑一云十洗四破乃秤之以入湯若膏酒丸散皆煻灰炮之用凡巴豆去心皮膜熬令紫色杏仁桃仁葶藶胡麻諸有膏脂藥皆熬黄别擣令如膏脂㩢視之泯泯爾乃以向成散稍稍下臼中合研擣令消散乃復都以輕絹篩之􅀈盡又内臼中依法研治數百杵也湯膏中亦有熬者雖有生用者並擣破凡麥孽麴末大豆黄卷澤蘭蕪荑皆微炒乾漆熬令煙斷烏梅入丸散熬之用熟艾者先炒細擘合和諸藥擣之今細散不可篩者内散中和之凡用諸毛羽齒牙蹄甲龜鼈鮫鯉等甲皮肉骨角筋鹿茸等皆炙蛇蛻皮微炙凡用班猫諸蟲皆去足翅微熬用桑螵蛸中破炙之牡蠣熬令黄色殭蠶蜂房微熬之凡湯中用麝香犀角鹿角羚羊角牛黄須末如粉臨服内湯中攪令調和服之凡丸散用膠先炙令通體沸起燥乃可擣有不沸處更炙之斷下湯直爾用之勿炙諸湯中用阿膠皆絞湯畢内汁中更上火令烊盡凡用蜜先以火煎掠沫令色紫黄即丸經乆不壊掠之多少隨蜜精麤遂至大稠於丸彌佳凡丸中用蠟烊之投少蜜中攪調以和藥凡湯中用飴糖皆湯成下諸湯用酒者皆臨熟下之又云古秤唯有銖兩而無分名今則以十黍為一銖六銖為一分四分為一兩十六兩為一斤此則神農之秤也呉人以二兩為一兩隋人以三兩為一兩今依四分為一兩為定方家有云等分者皆是丸散隨病輕重所須多少無定銖兩兩三種或五種皆悉分兩同等爾凡丸散云若干分兩者是品諸藥宜多宜少之分兩非必止於若干之分兩也假今日服三方寸匕須差止是三五兩藥爾凡散藥有云刀圭者十分方寸匕之一準如梧桐子大也方寸匕者作匕正方一寸抄散取不落為度錢匕者以大錢上全抄之若云半錢匕者則是一錢抄一邊爾並用五銖錢也錢五匕者今五銖錢邊五字者以抄之亦令不落為度一撮者四刀圭也十撮為一勺十勺為一合以藥升分之者謂藥有虚實輕重不得用斤兩即以升平之藥升方作上徑一寸下徑六分深八分内散勿按抑之正爾微動令平調耳今人分藥不復用此凡丸藥有云如細麻者即胡麻也不必扁但令較略大小相稱爾如黍粟亦然以十六黍為一大豆也如大麻子者即今大麻子準三細麻也如胡豆者今之青斑豆也以二大麻子準之如小豆者今赤小豆也粒有大小以三大麻子準之如大豆者以小豆準之如梧桐子者以二大豆準之一方寸匕散蜜和得如梧桐子十丸為度如彈丸及雞子黄者以十梧子準之凡方云巴豆若干枚者當先去心皮畢乃秤之以一分準十六枚附子烏頭若干枚者去皮畢以半兩準一枚枳實若干枚者去核畢以一分準二枚橘皮一分準三枚棗有大小以三枚準一兩乾薑一累者以半兩為正本草云以一兩為正凡方云半夏一升者洗畢秤五兩為正椒一升三兩為正吳茱萸一升五兩為正兎絲子一升九兩為正菴閭子一升四兩為正蛇牀子一升三兩半為正地膚子一升四兩為正此其不同也云某子一升者其子各有大小虚實輕重不可通以秤準皆取平升為正凡方云桂一尺者削去皮重半兩為正甘草一尺者重二兩為正云某草一束者重三兩為正云一把者重二兩為正凡方云蜜一斤者有七合猪膏一斤者一升二合凡湯酒膏藥舊方皆云㕮咀者謂秤畢擣之如大豆又使吹去細末此於事殊不允當藥有易碎難碎多末少末秤兩則不復均平今皆細切之較略令如㕮咀者乃得無末而片粒調和也凡云末之者謂擣篩如法也凡丸散先細切暴燥乃擣之有各擣者有合擣者並隨方所言其濕潤藥如天門冬乾地黄輩皆先切暴乾獨擣令偏碎更出細擘暴乾若值陰雨可微火烘之小停冷乃擣之凡濕藥燥皆大耗當先増分兩須得屑乃秤之為正其湯酒不須如此凡篩丸藥用重蜜絹令細於蜜丸易熟若篩散草藥用輕疎絹於酒中服即不泥其石藥亦用細絹篩令如丸藥者凡篩丸散藥畢皆更合於臼中以杵擣之數百過視其色理和同為佳凡煑湯用㣲火令小沸其水數依方多少大略二十兩藥用水一斗煑取四升以此為率皆絞去滓而後酌量也然則利湯欲生少水而多取汁者為病須快利所以少水而多取汁補湯欲熟多水而少取汁者為病須補益是以多水而少取汁好詳視之不得令水數多少湯熟可用新布兩人以尺木絞去滓澄去垽濁分再服三服者第二第三服以紙覆令宻勿令洩氣欲服以銅器於熱湯上煖之若於鐺中勿令器中有水氣方云再服三服者要令力勢相及並視人之暴羸病之輕重以為進退増減之不必悉依方說也古今諸家丸方一十八首廣濟療𫝊屍骨蒸殗殜肺痿疰忤鬼氣卒心痛霍亂吐痢時氣鬼魅瘴瘧赤白暴痢瘀血月閉痃癖疔腫驚癎鬼忤中小兒吐乳大人狐狸等病吃力伽丸方吃力伽白术是也光明砂訶梨勒皮麝香當門子香附子丁子香沉香蓽撥檀香青木香安息香犀角屑各二兩薫陸香蘓合香龍腦各半兩右十五味擣篩白蜜和為丸每朝取井花水服如梧子四丸於淨器中研破服之老小一丸以蠟褁一丸如彈丸緋絹袋盛當心帶之一切邪鬼不敢近千金不𫝊冷水煖水臨時量之忌五辛生血物以臘月合神前藏之宻器中勿令洩藥氣神驗千金耆婆萬病丸療七種癖塊五種癲病十種注忤七種飛尸十二種蠱毒五種黄病十二時瘧疾十種水病八種大風十二種􅍙痺並風入頭眼暗膜膜及上氣欬𠻳喉中如水雞聲不得卧飲食不作肌膚五藏滯氣積聚不消擁閉不通心腹脹滿連及􅇩背鼓脹氣堅結流入四肢或復又心膈氣滿時定時發十年二十年不差五種下痢疳蟲蚘蟲寸白蟲諸蟲上下冷熱乆積痰飲令人多睡眠消瘦無力蔭入骨髓便成滯疾身體氣腫飲食嘔逆腰脚酸疼四肢沉重不能乆行乆立婦人因産冷入子藏藏中不浄或閉塞不通胞中瘀血冷滯出流不盡時時疼痛為患或因此斷産並小兒赤白下痢及胡臭耳聾鼻塞等病服此藥以三丸為一劑服藥不過三劑萬病悉除說無窮盡故稱萬病丸以其牛黄為主故一名牛黄丸以耆婆良醫故名耆婆丸方牛黄麝香犀角朱砂雄黄並研芫青去頭翅足熬本方七枚黄連人參禹餘粮大㦸炙芫花熬茯苓乾薑桂心桑白皮當歸芎藭芍藥甘遂熬黄芩蜀椒汗細辛巴豆去皮心别熬擣前胡桔梗紫菀蒲黄葶藶子熬防風各一分蜈蚣三節炙石蜥蜴一寸炙右三十一味並令精細上牛黄麝香犀角朱砂雄黄禹餘粮巴豆别研餘者合擣篩之以白蜜和更擣三千杵極熟宻封之除破日平旦空腹以酒服三丸如梧子㣲下三五升惡物為良若卒暴病不要待平旦無問早晩即服以吐利為度若不吐利更加一丸或至三丸五丸須吐利為度不得限以丸數病彊藥少即不利吐若其發遲以熱稀粥一杯發之若吐利不止即以酸飯兩三口止之服藥忌陳臭生冷酢滑粘食大蒜猪魚雞狗馬驢肉白酒行房七日外始得一日服二日補之得食新米韮菜汁作羮粥臛飲食之三四頓大良亦不得全飽産婦勿服之吐利以後常須閉口少語於無風處温牀暖室將息若旅行卒暴無飲以小便送之若一嵗以下小兒有疾者令乳母服兩小豆亦以吐利為度近病及卒病皆用多積乆疾病即少服常取㣲溏利為度崔氏無黄岑桑白皮桔梗防風卒病欲死服三丸如小豆取吐利即差卒得中惡口噤服二丸如小豆和煖水一合灌入口令下令㣲利即差五注鬼刺客忤服二丸如小豆不差後日更服一丸男女邪病歌哭腹大如姙身服二丸如小豆日三夜一服間食服之猫鬼病服小豆三丸不差更服蠱毒吐血腹疼如刺服小豆二丸不差更服以差止瘧病未發前服三丸未差更服諸痰飲者服三丸如小豆不差更服冷癖服三丸如小豆日三服皆間食常令微溏利為度宿食不消服二丸如小豆取利癥瘕積聚服二丸如小豆日三服皆間食以利差止拘急心腹脹滿心痛服三丸如小豆未差更服上氣嘔逆􅇩中滿不得卧服二丸不差更服大痢服小豆一丸日三疳濕以一丸如杏人和酢二合灌下部中服小豆二丸差水病服三丸如小豆日再間食服之差止人弱隔日服頭痛惡寒服小豆二丸覆取汗傷寒天行病服二丸小豆一日三間食服小便不通服小豆二丸不差明日更服之大便不通服三丸如小豆大又内一丸下部中則通耳聾聤耳以綿裹如棗核塞耳中差鼻衂服二丸如小豆無不差癰腫疔腫破腫内一丸如麻子日一敷之根自出亦服二丸差犯疔腫血出以猪脂和塗有孔内孔中差止癘瘡以酢泔洗訖取藥和猪脂塗之漏瘡有孔以一丸如小麥内孔中和猪脂敷痔瘡以藥塗綿内孔中别易差止瘰癧以酢和塗上差癬瘡以布揩令汁出以酢和塗上日一易差止胷背腰脅腫以醋和敷腫上日一易之服二丸如小豆諸冷瘡積年不差者以酢和塗之亦餅貼之惡刺以一丸内瘡孔中即差蝮蛇螫以少許内螫處若毒入腹心煩悶欲絶者服三丸如小豆大蠍螫以少許塗之蜂螫以少許敷之差婦人諸疾胞衣不下服二丸如小豆大小兒驚癎服一丸如米許以塗乳令嗍之㸔兒大小量之小兒客忤服一丸如米和塗乳頭與嗍之以意量之小兒乳不消心腹脹滿服一丸如米許塗乳頭令嗍之取差又大麝香丸療鬼注飛尸等萬病皆療之方麝香三分牛黄真珠並研附子炮鬼臼莽草炙犀角屑礬石熬令汁盡細辛桂心獺肝炙藜蘆各二分蜈蚣炙蜥蝪炙各一枚地膽熬班猫熬杏仁去尖皮熬各五十枚丹砂二兩研雄黄一兩研礜石八分泥裏燒半日芫青熬亭長熬各七枚並去足趐巴豆去心皮熬右二十三味合擣别擣巴豆杏人如泥蜜和更擣三千杵丸如小豆每有病以飲服一丸日再漸至三丸尤妙毒蟲所螫摩之以知為度若欲入毒疫癘鄉死喪家及鬼神廟塚墓處以絳囊盛之男左女右肘後繫之又以少許塗人中卧不魘魅神忌如常法又小麝香丸主療與大麝香丸同方麝香三分雄黄研丹砂研各四分細辛乾薑桂心芍藥各五分莽草炙犀角屑梔子仁各三分附子炮烏頭炮各五枚去皮巴豆五十枚去心皮熬蜈蚣一枚去頭足炙右十四味並擣篩蜜和更擣一千杵丸如小豆每服三丸至五丸日三一切尸注心痛皆主之忌生血物生葱生菜蘆笋猪肉冷水神驗一方有當歸一兩崔氏温白丸療癥癖塊等一切病並治之方紫菀吳茱茰菖蒲柴胡厚朴炙桔梗皂莢去皮炙茯苓桂心乾薑黄連蜀椒汗巴豆去心皮熬人參各三分本方各二分烏頭十分炮右十五味合擣篩以白蜜和更擣二千杵丸如梧子大有病服一丸至二丸不知稍増至三丸五丸以知為度主心腹積聚乆癥癖塊大如盃椀黄疸宿食朝起嘔吐支滿上氣時時腹脹心下堅結上來搶心傍攻兩脅徹背連胷痛無常處繞臍攪痛狀如蠱咬又療十種水病八種痞塞反胃吐逆飲食噎塞五淋九種心痛積年食不消化或婦人諸疾斷緒不生帶下淋瀝或痎瘧連年不差又療一切諸風身體頑痺不知痛痒或半身不遂或疼痛或眉髪墮落又療七十二種風三十六種遁尸注或癲癎或婦人五邪失心夢與鬼神交通四肢沉重不能食飲昬昬黙黙只欲取死終日憂愁情中不樂或恐懼悲啼飲食無味月水不調真似懐孕連年累月羸瘦困弊遂至於死或歌或哭為鬼所亂莫之知也但服此藥者莫不除愈臣知方驗便合藥與婦人服之十日下出癥癖蠱長二尺五寸三十枚下膿二升黑血一升青黄汁五升所苦悉除當月有子臣兄墮馬被傷腹内有積血天陰即發羸瘦著牀命在旦夕與藥服下如雞肝黑血如手者二百餘片白膿二升赤黄水一升其病即除臣知方驗敢不獻上忌生冷酢滑猪雞魚犬牛馬鵝肉五辛油麵豆糯米陳臭等物仲景三物備急丸司空裴秀為散用療心腹諸卒暴百病方大黄乾薑巴豆各一兩去皮心熬别擣如脂右藥各須精新好藥擣篩蜜和更擣一千擣丸如梧子或小豆服三丸老小量之為散不及丸也若中惡客忤心腹脹滿卒痛如錐刀刺痛氣急口噤停尸卒死者以煖水若酒服之或不下捧頭起灌令下咽須臾差如未更與三丸以腹中雷鳴轉即吐下便愈若口巳噤亦須折齒灌之令入尤妙神驗忌蘆笋猪肉冷水肥膩又理中丸療三焦不通嘔吐不食並霍亂吐痢不止者並主之方人參乾薑白术甘草各三兩炙右四味擣篩蜜和如梧子空腹以飲汁服十五丸忌桃李雀肉海藻菘菜延年駐車丸主赤白冷熱血痢腹痛者方黄連六兩乾薑當歸阿膠各三兩右四味擣篩以三年米醋煑膠令消和藥衆手撚丸如梧子每以飲下三十丸日再服亦療産婦下痢不止者服之甚驗忌猪肉冷水粘膩等物救急五香丸療諸毒疰氣心腹脹滿大小便不通鬼疰心痛不可忍方牛黄研犀角屑各三分升麻沉香薫陸香當歸桂心青木香麝香研雄黄研如粉鬼箭羽巴豆去心皮熬訶梨勒皮朱砂研檳榔乾薑吳茱萸甘草炙豆蔲各四分桃仁去尖皮熬附子炮各五分右二十一味擣篩蜜和丸如梧子以煖水服三丸至五丸如不利更服以利為度此方甚驗人乆不𫝊忌海藻菘菜猪肉冷水生葱蘆笋生血物等必効玉壺丸主萬病與麝香丸同効方雄黄研朱砂研巴豆去心皮熬附子炮去皮特生礜石燒半日研藜蘆各三兩炙右六味擣篩蜜和丸如小豆以飲服二丸得利病差小兒黍粟一丸以意量之又青木香丸療一切氣腹脹滿心痛氣冷食不消方青木香檳榔仁各六分芍藥枳實炙訶藜勒皮各五分桂心四分大黄十二分右七味擣篩蜜和丸如梧子飲下十五丸以意増減之常令溏利甚效又五補七宣者麗正殿脩書學士李公所𫝊公名子昭字雲卿趙郡人幼志道法以棲名山徃來茅嵩山經三十載云五補七宣丸方人參茯苓地骨皮乾地黄牛膝等分右五味擣篩蜜和丸如梧子空腹以酒飲下三十丸稍稍增至五十丸日再此是五補丸服至五日十日及半月日覺氣擁即服七宣丸服經二三日覺氣散還服五補丸若病候未退即稍稍増之常自審以取調適終須五補及七宣丸並須合服之夫人所疾皆因風不宣散即成擁緩熱風若氣不流行即成痃癖冷氣轉生衆病皆因此由尋其本源都為不閑將理覺虚則補覺風氣擁即利利即腰背更虚且凡是利藥皆急服便透過未能蓄洩諸病凡是補藥皆滯服未見效先覺風氣發動明知宣補必藉兼行故其人授余二法名曰五補七宣所以安七魄鎮五藏堅骨髓養神明乆服長生百病日去髮黑行及奔馬又七宣丸方大黄十五兩枳實炙青木香柴胡訶黎勒皮各五兩桃仁六兩去尖皮熬甘草四兩炙右七味擣篩蜜和丸如梧子以酒服二十丸稍加至五十丸病在下空腹服病在上食後服之以宣利為度増減以意量之若風氣結聚宿食不消兼沙石皮毛在腹中服經七八日乃盡出下似牛涎魚腦等若病深痼則須半月或一月専服之不用五補丸若積年腰膝疼痛寒冷如氷石脚氣衝心憒悶將死頭旋暗倒肩背重悶心腹脹滿胷膈閉塞風毒腫氣連及頭面及大小便或利澁脾胃氣不理不能飲食夜卧脚轉筋脉掣痛恍恍然眠寢不安等疾以飲服之盡差此藥功效不可盡説如前十數種病則須服七宣丸自外輕病不妨與五補丸兼服循環不輟補養無限不問男女老小並可服餌但須量氣力細察候之加減服若是初生孩子可與三丸五丸稍稍加之取通利其二方當須經乆常服不限春秋冬夏朝夕行止勿間藥性甚善禁如常法近効大麝香丸療積年心痛尸疰蠱毒癥癖氣承心肋下有塊温瘴毒氣精魅邪氣或悲或哭蛇蠍蜂螫等方麝香研牛黄研藜蘆炙朱砂研芍藥當歸茯苓桔梗鬼箭羽金牙研烏頭炮桂心吳茱茰貫衆各一分雄黄一分半研乾薑人參大蟲骨各二分炙蜈蚣二寸去足蜥蜴半枚去牙炙巴豆二十枚去心皮熬右二十一味擣篩蜜和丸如梧桐子飲下三丸如未下以熱飲投之即利三行後以酢飯止之即定然後煮飯葱薤食之忌冷水猪肉如蛇蠍蜂螫取一丸研和塗之即差精魅狐狸之屬抛磚瓦或如兵馬行夜發者是鬼魅無早晩每日服二丸只三兩日即定仍每日燒一丸熏身體衣服無忌以三五丸用緋絹袋子盛帶左臂上辟大蟲毒蛇精魅鬼氣等病又犀角丸療癰腫腸癰乳癰發背一切毒熱腫服之腫膿化為水神方犀角屑十二分川升麻黄芩防風人參當歸黄芪乾薑一作乾藍蓼實一方無黄連甘草炙梔子各四分大黄五分巴豆二十四枚去心皮熬右十四味如法擣篩蜜和更擣三千杵丸如梧子以飲服三丸至五丸以利為度或不利投以熱飲如利以冷漿水粥止之未差每日服一丸以意量之腫消散為度若下黄水或腫輕皮皺色變即是消候忌如藥法効驗不可論之又黄連丸療痢無問冷熱並主之方黄連一兩茯苓二兩阿膠一兩右三味擣篩以水消膠和衆手丸暴乾有痢空腹以飲下十五丸日再以差止甚效又加減麻仁丸療積年患氣不能食飲兼食不消化風氣冷氣熱氣衝上痃癖氣並乳石氣發動並療之服經三四日自覺有效方蜀大黄錦文者四兩人參二兩訶黎勒皮四兩大麻仁二兩右四味擣篩依法以蜜和丸每服十丸二十丸増減以意量之以溏利病除亦不損人雍州王長史常服三十餘年八十嵗萬病皆無百無所忌補理腰脚服經七八日腰腎先冷者即下膿水腰脚輕徤以酒飲下之並得又三黄丸療五勞七傷消渇不生肌肉婦人帶下手足寒熱主一切熱方春三月用黄芩四兩大黄二兩黄連四兩夏三月用黄芩三兩大黄一兩黄連四兩秋三月用黄芩六兩大黄一兩黄連二兩冬三月用黄芩六兩大黄一兩黄連三兩右三味隨時月擣篩蜜和丸如梧子日服七丸諸病悉除古今諸家散方六首千金小金牙散療南方瘴癘疫氣脚弱風邪鬼注方金牙五分研牛黄一分研天雄萆薢黄芩蜀椒汗由跋雄黄研朱砂研烏頭桂心莽草炙麝香研各二分萎蕤細辛犀角屑乾薑各三分蜈蚣一枚長六寸者炙黄連四分右十九味治下篩為散合牛黄麝香擣三千杵以溫酒服五錢匕日三夜二以知為度以絳袋盛男左女右帶一方寸匕省病問孝不避夜行塗鼻人中辟鬼惡毒氣晨昬霧露亦塗之佳崔氏五香散療疰忤邪氣或熱或寒時氣在骨節間似差似劇兼主百病方沉香丁香麝香薰陸香鬼箭羽當歸豆􅅳仁各四分牛黄鬼臼橘皮金牙各三分燒犀角屑羚羊角屑大黄各六分升麻桔梗桃仁去尖皮熬光明砂研安息香各二分研右十九味擣篩為散以湯飲酒隨病服一方寸匕日再服病差即停亦可蜜丸如梧子服十丸又備急散療卒中惡心痛脹滿欲吐短氣方大黄二兩桂心四分巴豆一分去皮熬研右三味擣篩為散取一錢匕以湯七合和服當吐下即愈甚妙紫雪散療脚氣毒遍内外煩熱口中生瘡狂易呌走及解諸石草藥毒發邪熱卒黄等瘴疫毒癘卒死温瘧五尸五注心腹諸疾腋緩刺切痛蠱毒鬼魅野道熱毒小兒驚癎百病方黃金一百兩寒水石石膏各三斤一本用滑石𤣥參一斤羚羊角屑犀角屑沉香青木香各五兩丁香一兩甘草八兩炙右十味切以水三斗煮取一斗去滓取硝石四升芒硝亦可用朴硝十斤投汁中微火煎以柳木箆攪勿住手候欲凝入盆中内朱砂三兩麝香一兩急攪即成霜雪紫色以水和一二分服之以意加減一劑十年用之神妙脚氣乳石天行熱病等服之若神千金翼有礠石三斤滑石一斤升麻一斤丁香用四兩朴硝用四升麝香用二分仙人鍊綘雪療一切病肺氣積聚欬逆嘔吐膿血丹石毒發天行時氣一切熱病諸黄疸等心風昬亂心怯徤忘四肢煩熱頭痛眼赤大小便不通煩悶不安骨節疼痛赤白痢血痢熱毒痢宿食不消化心腹脹滿出氣不得下一切諸毒藥脚氣等飲酒多醉困乆痢不差孩子驚癎等以上和水服之産後一切諸病墮胎和酒服之方朴硝十斤升麻三兩大青桑白皮槐花各二兩犀角屑羚羊角屑各一兩蘇方木六兩竹葉兩訶黎勒山梔子三十枚檳榔仁二十顆朱砂半大兩研右十三味以水二斗漬一宿煎取一斗去滓入鍋内朴硝鍊烊攪勿住手候欲凝出於盆中攪入朱砂麝香訖雪成收於垍器中密封有疾量取之和水服之以利病除身輕目明四肢調適療一切病神驗老小量之上云入朱砂麝香未見分兩近効腎瀝湯煑散主除風下氣彊腰脚明耳目除痰飲理榮衛永不染時氣諸風疾方黃芪芎藭茯苓五味子防風澤㵼獨活𤣥參人參牛膝各六兩麥門冬去心地骨皮各八兩桂心甘草三兩炙丹參五兩右十五味切如大豆分作二十四貼貼著生薑一兩切杏仁十四枚去尖碎以水三升煮一貼取一升去滓澄清取九合頓服每日一貼晩間以氣下心胷空妙十服以後身力不可當常須䕶惜將養之以飲食補之每年春夏秋冬服一劑勝服腎氣丸二十劑永不患風氣先有諸病自然除差張中丞自服以來神效不可言以為乳石力不可比今服不闕效驗妙方云腎瀝湯恐須用猪腎湯煎古今諸家膏方四首廣濟神明膏主諸風頑痺筋脉不利療癬諸瘡痒方前胡白术白芷芎藭並切椒去目吳茱萸各一升附子三十枚去皮切當歸細辛桂心各二兩切右十味以苦酒漬一宿令浥浥然以成鍊猪膏一斗微火煎十沸以來九上九下候附子白芷色黄絞去滓膏成病在外摩之在内以酒服棗核大疥癬等瘡皆療之並去諸風病亦摩折傷被打等崔氏云藥滓酒浸服之亦大療諸病崔氏陳元膏㑹稽太守思翊昧死再拜上書皇帝陛下思幸得典郡視事六年處地下濕身病苦痺飲食衰少醫療不差命在旦暮蒼梧道士陳元賣藥於市思取藥摩之日至再十五日平復思男嘗墮馬苦為腰痛天陰雨轉發思取元膏摩之復愈思妻年四十五苦心腹積聚得病三年思復從元取膏摩之六日下宿食即愈思銓下郭少苦頭眩思取膏摩三日鼻中下水二升所病即愈思知元藥驗謹取元本方奉上當歸三兩一方隴西者生地黄二斤擣取汁附子三兩細辛二兩桂心一兩天雄三兩去皮乾薑二兩丹砂一兩研芎藭二兩雄黄二兩半研烏頭三兩苦酒三升白芷一兩松脂半斤不中水猪脂十斤鍊去滓右十五味㕮咀以地黄汁苦酒漬一宿取猪脂内諸藥微火煎之令十五沸膏成去滓内朱砂等末熟攪勿令婦人雞犬孝子惡疾不具足人小兒等見有人若胷脅背痛服之七日所下狀如雞子汁者二升即愈又有人若脅下積聚如杯摩藥十五日即愈又有人苦臍傍氣如手藥摩之去𤓰中黄穰者升許即愈有人患腹切痛時引背痛數年以膏摩之下如蠱者三十枚即愈又有婦人若月經内塞無子數年膏摩少腹並服如杏子一枚十日下崩血二升即愈其年便有子又療風搔腫起累累如大豆以膏摩之五日即愈老少患脚膝冷痛摩之五日便愈又有人若頭項痛寒熱瘰􅊓摩頭及病上即愈又有人患面目黎黑消瘦是心腹中病服藥下如酒糟者一升餘即愈内外諸風及腹中積聚可服之有病無不愈所療人無數不可悉記又烏膏療一切瘡引膿生肌兼殺瘡中蟲方烏麻油一升黄丹上好者二兩羅之蠟一兩鍊浄濾薰陸香乳頭者一兩末松脂半兩末以上並大升兩右五味緩火煎油三分減一下鐺待冷乃内黄丹更上煎之又三分減一又停待冷次内薰陸香末上火煎候銷盡又内蠟及松脂㸔膏稍稠即㸃於鐵上試斟酌硬軟適中乃罷先問所患瘡如熱即除薰陸及松脂瘡如乆不差此涉於冷即依方合其貼杖瘡者油若一升地黄汁半合和煎黄丹二大兩蠟一小兩餘準上法此膏不須硬也近効蓮子草膏療一切風耳聾眼闇生髮變白堅齒延年本是婆羅門方蓮子草汁三升生巨勝油一升生乳一升不食糟者甘草一大兩末右四味和於鍋中煎之緩火􅆈令魚眼沸數攪之勿住手看上沫盡清澄濾不津垍器中貯之云本方有青蓮蘂六分龍腦花三分鬱金香二分並末先煎諸藥三分減一次下汁及油等膏成每欲㸃即仰卧垂頭牀下一孔中各㸃如小豆許乆乃起有唾唾却勿咽之起訖即啜少熱湯飲㸃經一年白髮盡黑禿處並出韓庶子處得每用驗古今諸家煎方六首廣濟阿魏藥煎方阿魏四分豆蔲仁七顆細研生薑十二分人參八分甘草八分炙鼈甲十分炙藕汁二升訶黎勒七枚去核牛膝半斤白蜜一升地黄汁二升右十一味下地黄等汁煎次下藥末㣲火煎攪勿住攪候如餳於不津器盛每取一匙酒和服之又鹿角膠煎療五勞七傷四肢沉重百事不任怯怯無力昬昬欲睡身無潤澤腰疼頑痺脚弱不便不能乆立胷脅脹滿腹中雷鳴春夏手足煩熱秋冬腰膝冷疼心悸徤忘腎氣不理五藏風虛並悉療之方鹿角膠二斤擣碎作四分於鐺中熬令色黄紫蘓子二升以酒一升研濾取汁生地黄一斤取汁生薑一斤汁黄牛酥一升白蜜三斤右六味先煎地黄汁蘓子汁生薑汁等二十餘沸次下酥蜜又煎三五沸次以蜜並膠末下之攪令相得膠消盡煎即成矣以器盛之空腹以酒調二合服之日再此藥補五藏益心力實骨髓生肌肉理風補虛耳聦目明腰脚甚效驗一兩劑彊徤披覽十倍常時忌羊血蕪荑又主冷氣益氣力温中下氣蒜煎方剥了蒜二升牛乳五升牛膝一大斤末右三味以蒜内牛乳中煎之候蒜消盡攪勿住手下牛膝末煎成於器中貯之食前以酒和兩匙服忌羊血又地黄煎主婦人丈夫血氣勞骨熱日漸瘦悴方生地黄汁二升甘草三兩炙末豉心一升葱白切一升牛酥半斤藕汁二升白蜜一升右七味以小便六升煮葱䜴等取二升絞去滓次下地黄藕汁更煎取三五沸下酥蜜攪勿住手候似稀餳以器貯之每服一匙漸至三匙成煎桑枝熬煎湯調和服之猶妙桃仁湯亦良小品单地黄煎主補虛除熱散乳石癰疽瘡癤等熱方生地黄隨多少取汁於銅鉢中重湯上煮勿蓋釜令氣得泄煎去半更以新布濾絞去麤滓穢又煎令如餳成矣此用地黄須肥大味濃者作煎甘美東南地黄堅細味薄作煎鹹不美近効地黄煎療肺氣欬𠻳補心肺令髭髮不白方生地黄汁二升麥門冬汁五升生薑汁五合紫菀三兩貝母欵冬花甘草炙各三兩右七味切以水七升煮服三大升去滓却入鍋中下地黄汁麥門冬薑汁等三十沸下蜜一升煎如餳成矣盛不津器中冷含如􅀥許増加量之一方有人參三兩古今諸家酒一十二首並代茶飲列於下千金天門冬酒療五藏六腑大風洞泄虛弱五勞七傷癥結滯氣冷熱諸風癎惡疾耳聾頭風四肢拘攣猥退歴節風萬病皆主之乆服延年輕身齒落更生髮天門冬與百部相似天門冬味甘兩頭方百部細長而味苦令人利右一味擣取汁一斗漬麴二升以糯米二斗候麴發準家醖法釀之春夏極冷下飯秋冬稍温如人肌下飯酒熟取清飲一盞常令酒氣相接勿至醉吐慎生冷酢滑雞猪魚蒜特忌鯉魚亦忌油膩此是一斗法餘一石二石亦準此以為大率服藥酒十日覺身體隠􅇙大痒二十日更大痒三十日乃漸止此是風氣出去故也四十日即覺身心朗然大快似有所得五十日便覺大快當風坐卧覺風不著人身中諸風悉盡用米法先浄淘暴炕令乾臨欲用時更别取天門冬汁漬米乾灑炊餘汁拌飯甚宜密封取天門冬汁法淨洗心皮水寸切擣押各三四遍令滓乾如草乃止此酒初熟味酸仍作臭泔腥氣但依式服之乆停則香美餘酒皆不及也封四七日佳凡八九月即少少合至十月多合擬到來年五月三十日以來相續服之春三月亦得合入四月不得合服酒若得散服得力倍速散方如左天門冬去心及皮暴乾擣篩以上件酒服方寸匕日三加至三匕乆服長生凡酒亦得服又大金牙酒療瘴癘毒氣中人風冷濕痺口喎面戾半身不隨手足拘攣歴節腫痛甚者少腹不仁名曰脚氣無所不療方金牙一斤燒白术附子側子天雄蓯蓉茯神當歸防風芎藭黄芪薯蕷細辛桂心茵芋地骨皮五加皮杜仲萆薢狗脊萎蕤白芷厚朴枳實炙桔梗黄芩逺志去心蔓荆子各三兩人參二兩獨活半斤石南二兩磁石十兩燒丹參牛膝各五兩薏苡仁一升麥門冬一升去心生石斛八兩生地黄切二升蒴藋四兩右三十九味並切用絹袋盛以酒八斗漬七日温服一合日四五夜一石藥細研如粉别絹袋盛共藥同浸藥力安和主治極多凡是風虛四體小覺有風痾者皆須將服無不治者服者一依方合之不得輒信誣人大言浪有加減忌如常法又鍾乳酒療虛損通順血脉極補益下氣方鍾乳五兩碎附子三兩炮石斛五兩甘菊花三兩蓯蓉五兩右五味剉以生絹袋盛用酒三斗漬經五日每服二合日再稍加至一升千金翼五精酒主萬病髮白反黑齒落更生方黄精四斤天門冬五斤去心松葉六斤白术四斤枸把五斤洗右五味皆生者内釡中以水三石煮之一日去滓取汁漬麴如家釀法酒熟取清任性飲之長年補養忌鯉魚桃李雀肉等又白术酒方白术二十五斤右一味㕮咀以東流水兩石五斗於不津器中漬之二十日去滓内汁於大盆中夜候流星過時抄巳姓名置盆中如是五夜汁當變如血取以漬麴如家醖法造酒熟取清任性飲之十日萬病除百日白髮反黑齒落更生面有光澤乆服長年忌桃李雀肉等此酒至誠有靈風病服之百神衛人又枸杞酒方枸把一百斤右一味切以東流水四石煮之一日一夜去滓令得一石汁漬麴釀之如家醖法酒熟取清置不津器中取乾地黄桂心乾薑商陸澤㵼蜀椒末各一升六味以絹袋盛内酒中漬密封口埋入地三尺堅牢覆上二十日沐浴整衣冠向仙人拜訖開之其酒當赤如金色平旦空腹服一盞或半升為度十日萬病皆愈二十日瘢痕皆滅惡疾人以一升水和半升酒分為五服服之即愈若欲食少者取河中青白石如棗杏仁大者半升以水三升煮一沸以酒半合置中須臾即熱可食也崔氏蒼耳酒療大風惡疾及一切諸風乃至骨髓中毒風令人充恱方蒼耳和莖葉花實取剉一石八月收牛膝根一升松葉二斗商陸根二升白色者䑕粘根一斗右五物皆剉訖量之以水兩石五斗煮取六斗汁如釡小可分煮之即分三斗汁將浸麴一斗二升髙量其麴加於常法五分為藥力費麴故也餘三斗汁留將拌饙料糯米一石二斗分作五酘淨淘乾漉以上並大斗第一酘一日炊四斗米取藥汁九升拌饙熟細切生地黄三斗和米下之第二酘三日炊三斗米取藥汁七升拌饙熟與杏仁一斗去皮尖碎和擣如泥下之第三酘五日炊二斗米取藥汁六升半拌饙熟取木麻子一斗擣碎和下之第四酘七日炊二斗米取藥汁四升半拌饙熟取胡麻一斗擣碎和下之第五酘九日炊一斗米取藥汁三升拌饙下之右以前五酘法須候米消盡即炊酘之未必要須隔日其酒如米少味薄更炊一二斗米下之使味足然後去糟取清依常法飲半升不能者可量性多少常使有酒氣逼夜飲最是所宜此酒縱非風疾飲之補養益精神令人充徤又烏麻地黄酒療風虚補不足除百病已試大効方六月六日麴四升淨王斯油麻六斗五升出闕州赤色者是如無别用巨勝替之以脫去皮乾暴脫烏麻法以冷水浸經一宿出之置筲箕中漉水令盡舂之即皮自脫去耳生地黄四斗冷熟湯洗待水氣盡便切之更取生地黄一石以水一石和煮麤布絞去滓即取汁六斗又以蠟及麻子塗瓮内蒸之令乾前三味縂内瓮中浸之丹參生石斛牛膝杜仲萆薢生薑各二斤人參八兩右七味切以生絹袋盛同内前件熟地黄汁瓮中浸封閉七日外更取烏豆四大斗摩使光淨分作四度㣲熬令香取無灰重醖酒二斗八升三度淋豆豆一熬三淋淋訖並去豆縂計十二度淋豆取淋酒别器中盛然後更寫麴汁等物及諸藥並出在大瓮中以物閉頭及更將此酒先重蒸瓮㸔冷暖還内麴汁及藥等安在瓮中其日即用八斗精糯米炊作飯如常釀酒法酘酒即以淋豆酒投在瓮中封閉經一兩宿㸔米消盡又炊四斗糯米飯酘之此後更封閉經七日其酒即熟任性飲多少量之不限時候常㣲㣲覺身潤夜中稍加少許或汗出佳避風及忌房室特禁毛桃芥生菜熱麫並酢蒜牛肉冷物醖初酒法待此酒熟即將此酒更重醖右麴依當家常用法每一斗麴用熟水一斗一升浸炊酒飯即量熟湯多少用沾飯如凡釀酒法更不得加生水每一斗米酒為佳釀重醖酒法待此酒熟即將酒二斗八升淋豆右每一斗麴以熟水一斗浸其酒米每一斗饙料以四斗清酒淋其饙然後炊飯使熟更不得加水其所洗甑洗手盆瓮等皆須用此酒還投釀瓮中釀藥酒法右欲和藥酒時先置五斗許藥在瓮底然後加五斗許飯每次如此斟酌至半即内藥袋其藥袋上亦使藥飯相參以至於盡然始閉封封閉藥酒瓮法右封閉瓮頭用紙七重布一重其釀酒室唯造酒得入自外猫犬婦人不得輒入室中又枸把酒療五内邪氣消渇風濕下胷脅氣頭風本方作痛堅筋骨疆陰利大小便填骨髓長肌肉破除結氣五勞七傷去胃中宿食利耳目衂血吐血風症補中逐水破積瘀膿血石淋長髮傷寒瘴癘毒氣煩燥滿悶虛勞喘吸逐熱破血及脚氣腫痺悉主之方糯米一石黍米亦得麴計常醸酒米一石用麴一斗此藥加五升彌佳末用之枸把根二十斤刮去赤皮半寸剉之以水一石漬經三日煮取汁五斗生地黄二十斤洗去土細切和米炊之秋麻子三斗㣲蒸以枸杞湯淋取汁香豉二斗以枸杞湯煑取汁右四味地黄和米蒸之三物藥汁總合得五斗地黄濕即四斗分半漬米饙半及麴和釀飯即總和一酘密蓋瓮口經二七日壓取封泥復經七日初一度一釀用麻子二斗多即恐令人頭痛服酒忌生冷酢滑雞魚麫蒜油膩白酒房室等服訖一二七日將息又地黄酒療虚羸令人充恱益氣力輕身明目方雍州高長史服用効生地黄一石二斗擣絞取汁四斗杏仁一斗去尖皮兩仁者熬令黄擣末大麻子一斗熬擣末糯米一石暴乾麴一斗五升淨刮暴乾細剉右五味先以地黄汁四斗漬麴待發炊米二斗作飯冷暖如人肌酘麴汁中和之候飯消更炊米一斗酘之如前法又取杏仁麻子末各一升二合半和飯攪之酘麴汁中待飯消還炊米一斗杏仁麻子末各一升二合半一依前法酘之如此凡八酘訖待酒沸定封泥二七日取清温服一升漸加至二升日再服之令人頓能食乆服去萬病婦人服之更佳令人有子近効五加酒方五加根莖細剉五斗六月六日麴末三斗黍米一石糯米亦得右三味以水五斗共五加同下於大釡中以木度深淺與水平剋之即更添水一石五斗並前計兩石即下火煎旋旋急火取藥汁減下至木剋處即得以火盆安淨筐筐中安淨布单兼滓漉著筐中其汁在盆中唯有五斗且别盛密封蓋之又重取所漉者五加滓以水煮之如别有五加添和同煮更佳取此汁用洮米拌飯炊之如常炊法用前五加濃汁漬麴且炊米五斗釀之餘五斗分為兩酘如常造酒法酒熟壓漉密封頭每服一盞煖飲之漸加勿令醉又逺志十兩末之下釀中益妙𤣥參及蛇皮肉亦得其糟與已下食之尤佳又代茶新飲方黄芪通草各二斤茯苓乾薑乾葛各一斤桑根白皮一斤䑕粘根三斤濕加一斤生乾地黄枸把根洗忍冬十二月採枝莖葉陰乾濕加五兩薏苡仁各十兩菝葜八兩麥門冬去心萎蕤各五兩右十四味並㨂擇取州土堅實上者刮削如法然後秤大斤兩各各别擣以馬尾羅篩之攪令匀調重篩務令相入不令偏並别取黄白楮皮白皮根相兼細切煑取濃汁和溲令硬軟得所更於臼中擣别作一竹棬子圍濶二寸半厚二分以下臨時斟量大小厚薄作之此亦無定衆手依摸捻成餅子中心穿孔日暴乾百餘餅為一穿即以葛蔓為繩貫之竹作篾亦得挂之通風陰處妙若須煮用以炭火上炙令香熟勿令焦臼中擣末任隨時取足煎以代茶大都濃薄量之著少鹽煮之頻揚之即滑美著鹽橘皮蓽橃亦佳除風破氣理丹石補腰脚聰耳明目堅肌長肉緩筋骨通腠理頭腦閉悶眼睛疼痛心虚脚弱不能行步其效不可言若患氣肺氣疝氣欬𠻳入口即愈患消中消渇尤騐主療既多不復一一具說但服之立取其騐禪居高士特宜多飲暢腑藏調適血脉少服益多心力無勞饑飽飲之甚良若臘月臘日合之十年不敗解飲食相害成病百件肘後凡飲食雜味有相害相得得則益體害則成病以此致疾例皆難療所以病有不受藥療必至於死也今略疏其不可噉物不須各題病名想知者善加慎之諸鳥獸陸地肉物忌法白犬血腎不可雜白雞肝白鵝肝白羊肉不可雜雞肉犬肝不可雜烏雞狗兎肉猪肉不可合烏梅食一云不可合羊肝兎肉不可雜獺肉及白雞心食白馬黒頭者不可食麋肉不可合蝦蟆及獺生菜食麋脂不可合梅李食麋肉不可雜鵠肉食羊肝不可合烏梅白梅及椒牛腸不可合犬血肉等食白馬青蹄肉不可食白猪白蹄青𤓰班班不可食雞有六翮不可食烏雞白頭不可食之殺人鹿白膽不可悞食食猪肉不可卧稻穰草中雄雞肉不可合生葱芥菜食雞鴨子不可合蒜桃李子鼈肉山雞肉雀肉不可雜牛肝落地塵不著不可食暴脯不肯燥及犬炙不動見水而動者不可食祭肉自動及酒自竭並不可飲食也鳥獸自死口不開翼不合不可食鳥獸被燒死不可食病人不可食熊肉及猴肉山羊肉不可合雞子食之半夏菖蒲忌食羊肉雞子不合鯉魚巴豆忌猪肉蘆笋商陸忌白犬肉細辛桔梗忌菜白术忌食桃李甘草忌食菘菜牡丹忌胡荽常山忌葱茯苓忌酢天門冬忌食鯉魚黄連桔梗忌食猪肉藜蘆忌食狸肉凡蠅蜂及螻蟻集食上而食之致瘻病也凡飲水漿及酒不見影者不可飲之丙午日勿食雉肉壬子日勿食猪五藏及黒獸肉等甲子日勿食龜鼈鱗物水族之類又療卒得食病似傷寒其人但欲卧七日不療殺人按其脊兩邊當有陷處正灸陷處兩頭各七壯則愈又療中虛冷不能飲食食輒不消羸瘦四肢尫弱百病因此而生方薤白一斤枳實三兩炙大棗十二枚擘粳米二合豉七合右五味以水七升煮薤餘五升内諸藥煮取一升半分三服差止又方䜴心一升熬末麥蘖麴各一兩熬蜀椒一升汗乾薑一升末右五味擣篩以蜜拌食後酒服之方寸匕又方麴半斤熬麥蘖五升半熬杏仁一升去尖皮熬右三味擣篩蜜和末食後服如彈丸一枚漸増之又方大黄芍藥芒硝各一斤右三味末之以蜜三斤於銅器中湯上煎可丸服如梧子十丸日再服又方麴一斤熬吳茱茰一升乾薑十兩右三味擣為末服方寸匕又療脾胃氣弱穀不消兼不復受食方大麻仁三升大豆黄二升並熬香右二味擣篩以飲服一方寸匕漸加服又療飽食訖便卧得病令人四肢煩重嘿嘿欲卧方大麥蘖一升熬乾薑二兩右二味擣為末服方寸匕日三良又療食生冷雜物或寒時衣薄當風夜食便卧不消心腹煩滿痛脹急或連日不化方燒地令極熱即激薄覆取汗愈深師療食飽煩悶但欲卧而腹痛方麴熬令香黄右一味擣為末服方寸匕大麥蘖亦佳千金翼凡六畜五藏著草自動摇及得酢鹹不變色又隨地不汚又與犬不食皆有毒殺人也凡食飲有毒澆地地墳起皆殺人凡肉在器中蓋密氣不泄者皆殺人凡脯肉熟肉不用深藏密氣不泄殺人若中此毒皆犬糞灰水服方寸匕良古今録騐療新中雜食瘀實不消心腹堅痛方取水三升煮白鹽一升令消分服取吐必差備急席辯刺史云嶺南俚人毒藥皆因食得之多不即覺漸不能食或更心中嘈脹並背急悶先寒似瘴微覺即急取一片白銀含一宿銀變色即是藥也銀色青是藍藥銀色黄赤是菌藥乆乆毒入眼眼或青或黄赤若青是藍藥若黄赤是菌藥俚人有解療者畏人得法在外預合或言三百頭牛藥或言三百兩銀藥余住乆與首領親狎知其藥並是常用俚人不識本草乃妄言之其方如後初得俚人毒藥未得餘藥且令定方生薑四兩甘草三兩炙右二味以水六升煮取二升平旦分二服訖後别方療之又療之方常山四兩白鹽二匕右二味以水一斗漬之一宿以月盡日漬之月一日五更以土釡煎勿令奴婢雞犬見之煮取二升平旦分再服服訖少時即吐以銅盆盛之㸔若色青以杖舉得五尺不斷者即藥未盡一二日後更進一劑又方都惏藤十二兩此藥嶺南有土人識俚人呼為三百銀藥甚細長有高三尺微藤生切右一味以水一升酒二升和煮取二升分三服服訖藥毒逐大小便出十日慎毒食不差更服以差為度肘後云黄藤又療腹内諸毒方都惏藤黄藤各二虎口長三寸並細剉右二味以酒三升合甖中密封以糖火圍四邊燒令三沸待冷出之温常服令有酒色無禁忌若不獲巳欲食俚人食者先取甘草一寸炙令熟嚼咽汁若食著毒藥即吐便是藥也依前法療之若經含甘草而不吐非也宜常收甘草十數片隨身帶之自防也嶺南將熟食米及生食甘蔗巴蕉之屬自更於火上炮炙燒食之永無慮也若被席上散藥卧著因汁入肉最難主療可常自將淨席隨身及匙筯甘草解毒藥行甚妙肘後無黄藤張文仲白黍不可合飴糖蜜共食黍米不可合葵共食白蜜不可合菰首食菰首不可合生菜食病人不可食胡荽芹菜及青花黄花菜姙身勿食桑椹並鴨子五月勿食韭十月勿食椒三月三日四月八日勿食百草二月勿食小蒜四月勿食胡荽謹按仲景方云正月勿食生葱二月勿食蓼三月勿食小蒜四月八月勿食葫五月勿食韭五月五日勿食生菜七月勿食茱茰八月九月勿食薑十月勿食椒食駿馬肉不飲酒殺人也馬鞍下肉不可食馬黑脊而班臂亦勿食食馬肝中毒方取牡䑕矢二七枚兩頭尖者是水和研飲之仲景同又食諸六畜鳥獸肝中毒方取髮翦之長半寸挼土作溏沾二升合和所剉髮飲之須臾髮皆貫所食肝出也謹按髮誤食之令人成髮癥為病不可療今和髮土飲之豈得有此理否可詳審之别有方法也又方服頭垢一錢匕立差仲景千金同又方清水投豉絞取汁飲數升差止又凡物肝藏自不可輕噉自死者彌勿食之諸心皆勿食之為神識所舍使人來生獲報對又食生肝中毒方服附子末方寸匕日三須以生薑湯服之不然自生其毒又禽獸有中毒箭死者其肉有毒可以藍汁大豆解射罔也又食鬱肉及漏脯中毒方取犬矢燒末以酒服方寸匕又方擣生韭絞取汁服一二升冬月連根取和水洗絞之用薤亦佳凡肉閉在宻器中經宿者為鬱肉茅屋溜下沾脯為漏脯並有大毒又食黍米中藏乾脯中毒方濃煮大豆汁飲數升即解兼療諸肉及漏脯毒又食自死六畜諸肉中毒方擣黄蘗末以水和方寸匕服未覺再服差又凡六畜自死皆是遭疫則有毒人有食疫死牛肉令病洞下亦致堅積者並宜以利藥下之良又食諸菜肉脯中毒方燒猪骨擣下篩水服方寸匕日三四差千金同又方燒笠子末服方寸匕日三又食馬肉洞下欲死者方䜴二百粒杏仁三十枚右二味合於炊飯中蒸之擣丸服之至差仲景同又甘豆湯冷飲之諸毒悉解諸不可及也辨魚鼈蟹毒不可食及不得共食肘後云凡魚頭有正白連珠至脊上不可食也魚無腸膽不可食魚頭黑㸃不可食魚頭似有角不可食魚無鰓不可食鯷魚赤目鬚不可食魚不可合烏雞肉食生魚目赤不可作鱠食魚不可合鸕鷀肉食鯷魚不可合鹿肉食之鯽魚不可合猪肝及猴肉食青魚不可合小豆藿食魚汁不可合自死六畜肉食青魚鮓不可合胡荽及生葵麥醬食鯉魚鮓不可合小豆藿鰕不可合雞肉食鰕無鬚及腹下通黒及煮之反白皆不可食鯉魚不可合白犬肉鯉魚不可合繁蔞菜作蒸鼈目凹不可食鼈壓下有如王字不可食之鼈不可合雞鴨子食之鼈肉不可合莧菜食之亦不可合龜共煮之龜肉不可合𤓰及飲酒蟹自相向及足班目赤者不可食之病人不可食鯷魚鮪魚等姙身不可食鼈及魚鱠桂天門冬忌食鯉魚又療食蟹及諸肴膳中毒方濃煮香蘇飲汁一升解本仲景方又人有食蟹中毒煩亂欲死服五蠱黄丸得吐下皆差夫蟹未被霜多毒熟煮乃可食之或云是水莨所為彭蜞亦有毒蔡謨食之幾死又療食諸䴵臛百物毒方取貝齒一枚含之須臾吐所食物差千金同又方擣韭汁服一升冬以水煮根服千金云服數升又方掘厠傍地作坎深一尺以水滿坎中取故厠籌十四枚燒令燃以投坎中乃取汁飲四五升即愈千金同又諸饌食直爾何容有毒皆是以毒投之耳既不知是何處毒便應煎甘草薺苨湯療之漢質帝食䴵魏任城王噉棗皆致死即其事也食魚中毒及食鱠不消方五首古今録驗療食鯸鮧傷毒欲死方取鮫魚皮燒之無皮壞刀裝取燒飲服之䱜魚皮也食諸鮑魚中毒亦用之千金同千金療食魚中毒方煮橘皮停冷飲之又療食魚鱠及生肉住胷膈中不化吐不出便成癥瘕方厚朴炙大黄各二兩右二味以酒二升煮取一升頓服立消人彊者倍大黄用三兩酒取二升再服肘後療食鱠過多冷不消不療必成蟲瘕方馬鞭草擣絞取汁飲一升即消去亦宜服諸吐藥吐之千金同刪繁療食魚鱠不消生瘕常欲須鱠者方獺骨肝肺乾藍大黄各分蘆根鶴骨各七分桔梗五分乾薑四分桂心班猫二十枚炙右九味擣篩蜜丸酒服十丸至十五丸日再差食椒菜瓠中毒方四方肘後蜀椒閉口者有毒食之㦸人咽使不得出氣便欲絶又令人吐白沫並吐下身體冷痺療方煮桂飲汁多益佳又飲冷水一二升又多食蒜又上漿飲一升又濃煮豉汁冷飲之一二升又急飲酢又食椒不可飲熱飲熱殺人又療中苦瓠毒方煮黍穰濃汁飲之數升此物苦則不可食恐作藥中毒也千金療菌毒方掘地作坎以水沃中攪令濁名地漿飲之又療食菜中毒發狂煩悶吐下欲死方取雞毛燒末以飲服方寸匕差解一切食中毒方三首千金論曰凡人跋涉山川不諳水土人畜飲啖誤中其毒素不知方多遭其斃豈非枉横耶然而大聖乆設其法以救活之正為貪生嗜樂忽而不學一朝逢遇便自甘心終不識其所以今述神農黄帝解毒方法好事者可少留意焉又論曰甘草解百藥毒此實如湯沃雪有同神妙有人中烏頭巴豆毒甘草入腹即定中藜蘆毒葱湯下咽便愈中野葛毒土漿飲訖即止如此之事其驗如反諸掌要使人皆知之然人皆不肯學誠可嘆息方稱大豆汁解百藥毒臣試之大懸絶不及甘草又能加之為甘豆湯其驗尤竒有人服玉壺丸吐嘔不已以百藥與之不止藍汁入口即定如此之事皆須知之此即成規更不須試練也解毒方中條例極多若不指出一二學者不可卒知餘方例爾又療諸食中毒方飲黃龍湯及犀角汁百無不治也若飲馬尿亦良又療食飲中毒方苦參三兩右一味切以酒二升半煮取一升頓服之取愈古今録驗療諸食毒方取桑黄心破作一斷著釡中令水出三寸煮取二斗漉澄清微火煎得五升宿不食服之日三合則吐瘕未差更作羸者減之酒醉過度恐腸爛及喉舌生瘡方三首千金療卒大醉恐腸爛方作湯著大器中漬之冷復易之酒自消夏月亦用之佳肘後同又方絞茅根汁飲二升又療連月飲酒喉咽爛舌上生瘡方大麻子一升黄芩二兩右二味擣末以蜜和丸含之飲酒連日醉不醒方九首肘後療飲酒連日醉不醒方蕪菁菜並少米熟煮去滓冷之内雞子三枚或七枚調匀飲之二三升無雞子亦可單飲之又方取水中螺螝若螺􅑕軰以著葱豉椒薑煮如常食法飲汁數升即解又方擣生葛根汁及葛藤餅和絞汁飲之無濕者乾葛煎服佳乾蒲煎服之亦佳又方粳米一升水五升煮使極爛漉去滓飲之尤良千金療酒醉不醒方葛根汁飲一二升無多少取醒止又方本方治飲酒不醒九月九日菊花末飲服方寸匕又方小豆葉陰乾一百日末服之日方寸匕良又方五月五日取井中倒生草陰乾末酒服方寸匕佳又病酒方取豉葱各一升以水四升煮取二升飲之差止飲酒令難醉方一首千金飲酒令無酒氣方乾蕪菁根二匕枚三遍蒸乾末之取兩錢匕飲酒後水服之飲酒積熱方二首肘後飲酒積熱遂發黄病方雞子七枚苦酒漬之器中宻封内井底一宿出當軟取吞之二三枚漸至盡驗千金治飲酒房勞虛受熱積日不食四體中虚熱飲酒不已入百脉心氣虛令人錯謬失常方酸棗仁半升人參白薇枳實炙知母栝樓芍藥各二兩茯苓三兩一云茯神甘草一兩炙生地黄八兩右十味切以水一斗煮取三升分三服斷酒方一十五首千金斷酒方酒七升著瓶中熟朱砂半兩著酒中急塞瓶口安猪圈中任猪喙動經七日取盡飲之永斷又方臘月䑕頭灰柳花等分黄昏時酒服一杯又方正月一日酒五升淋碓頭擣一下取飲又方故氊中葈耳子七枚燒作灰黄昏時煖取一杯酒咒言與病狂人飲勿令知之後不喜飲酒又方白猪乳汁一升飲之永不用酒又方刮馬汗和酒與飲之終身不飲酒又方大蟲屎中骨燒末和酒與飲又方鸕鷀矢灰水服方寸匕永斷又方故紡車絃燒灰和酒與飲之又方驢駒衣燒灰酒服之又方自死蠐螬乾擣末和酒與飲永世聞酒名即嘔吐神驗又方酒客吐中肉七枚陰乾燒灰服之又方酒漬汗鞋替一宿旦空腹與飲即吐不喜見酒又方白狗乳汁酒服之又方臘月馬腦酒服之服藥過劑及中毒方一十一首前後服藥過劑及中毒多煩悶欲死方刮東壁土少少以水一二升和飲之良又方水和胡粉稍稍飲之又方青粳米取其瀋汁五升飲之又方擣蘘荷取汁飲一二升冬月用根夏月用莖葉又方屋霤下作坎方二尺深三尺以水七升灌坎中攪揚之令沫出取沫一升飲之未解更作又方擣藍青絞汁數升飲之無藍以青布水洗飲之又方燒犀角水服一方寸匕備急服藥失度腹中苦煩方飲生葛汁良或乾葛煎湯服之肘後同又方雞子黄三枚吞之良又雞子清飲之又服猪膏良又方服諸石藥過劑者白鴨矢水和服之差肘後同又方大黄三兩芒硝二兩以水五升煮取三升分三服得下便愈肘後用地黄汁五升煮不用水解諸藥草中毒方二十九首肘後療食野葛已死者方以物開口取雞子三枚和以灌之須臾吐野葛出又方取生鴨就口斷鴨頭以血瀝口中入咽則活若口不開取大竹筒以一頭注其胷脅取冷水注筒中數易注之須臾口開則可與藥若甚者兩脅及臍各筒注之甚佳又方飲甘草汁但唯多更善又鈎吻與食芹相似而其所生之地傍無他草莖有毛誤食之殺人方薺苨八兩㕮咀以水六升煮取三升服之又此多生籬埒水瀆邊絶似茶人識之無敢食但不知之必是鈎吻按本草鈎吻一名野葛又云秦鈎吻乃並入藥用此非又一種葉似黄精唯花黄莖紫亦呼為鈎吻不可食故經方引與黄精為比言其形色相似也備急療諸藥各各有相解者然難常儲今但取一種而兼解衆毒求之易得者方甘草濃煮汁多飲之無不生也又食少蜜佳又方煮桂多飲之又服葱涕佳又方煮大豆汁服豉亦解又方煮薺苨濃汁飲之秘方卒不及煮便嚼食之亦可散服此藥在諸藥中並解衆毒又方藍青皮子亦通解諸毒可預蓄之急則便用之凡此諸藥飲汁解毒者雖危急亦不可熱飲之待冷則解毒熱則不解毒也集驗療中諸毒藥及葛未死但聞腹中煩寃剥裂作聲如腸胃破斷狀目視一人成兩人或五色光起須臾不救方取新小便和清邊乆屎一升絞取汁一升頓服氣已絶但絞口與之入腹便活也已死萬一冀活但數與屎汁也又療中藥毒方取竈中當釡月下土末服方寸匕千金中百藥毒方甘草薺苨大小豆汁藍汁及實汁根汁並解之又中狼毒毒方白歛鹽藍汁並解之又中藜蘆毒方雄黄葱汁並解之又中巴豆毒方黄連菖蒲小豆藿汁大豆汁並解之又中躑躅花毒方梔子汁解之又中芫花毒方防風防己甘草桂枝汁並解之又中射罔毒方藍汁大小豆汁竹瀝大麻子汁六畜血貝齒屑蚯蚓屎藕芰汁並解之又中半夏毒方以生薑汁乾薑解之又中大㦸毒方菖蒲汁解之又中烏頭天雄附子毒方用大豆汁逺志防風棗飴糖解之又中杏仁毒方用藍子汁解之又中莨菪毒方薺苨甘草升麻犀角蟹汁並解之又解諸毒雞腸草散方雞腸草三分藍子一合芍藥二分甘草四分炙薺苨四分墳土一分升麻四分當歸二分右八味為散以水服方寸匕多飲水佳若為蜂蛇等衆毒蟲螫以鍼刺螫上血出著藥如小豆許於瘡中令濕差為射罔箭所中削竹如釵股長一尺五寸以綿纒澆水沾令濕取藥内瘡中隨瘡深淺令至底止有好血出即差若服毒藥水服毒解痛止愈又解一切藥發不問草石始覺惡即服方生麥門冬八兩去心葱白八兩切豉三升右三味以水七升煮取三升半分三服又療一切諸藥毒方甘草三兩炙以水五升煮取二升内粉一合更煎三兩沸内蜜半兩分服以定止又解毒藥散方薺苨一分藍葉花二分七月七日取葉並花陰乾右二味擣末以水和服方寸匕日三又中毒方取秦䴏毛二枚燒灰以水服之千金翼療藥毒不止解煩悶方甘草二兩炙切白梁粉一升蜜四兩右三味以水三升煮甘草取二升去滓内粉湯中攪令調下蜜煎令熟如薄粥適寒温飲一升千金同解諸蛇蟲毒方六首千金蛇虺百蟲毒方並用雄黄巴豆並麝香乾薑解之又蜈蚣毒方桑汁及葉根汁解之又蜘蛛毒方藍青解之又蜂毒方蜂房及藍青解之又班猫芫青毒方猪膏大豆汁戎鹽藍汁鹽湯煮猪膏巴豆並解之又馬刀毒方清水解之辨五大毒一首古今録驗辨藥有五大毒不可入口方經曰夫藥有大毒不可入口鼻耳目即殺人一曰鈎吻生崖二曰鴆狀黑雄鷄生山谷中一名雉三曰除命赤色著木懸其子生山海中四曰海薑狀如龍赤色生海中五曰鴆羽狀如鸛雀黑頭赤足遇其毒解之則活卒無藥可飲小便解金鐡等毒方八首肘後療金毒已死方雞矢半升淋取一升飲之可再三千金云雞子清並屎白燒猪脂和服又方吞水銀一兩即金出又方鴨血雞子並解之千金云及尿汁又中雄黄毒方防已解之又譽石毒方大豆汁解之千金又云白鵝膏集驗療服金屑死未絶者知是金毒方以水銀一兩寫口中摇動令下咽喉入腹金則消滅成泥即出可三與服則活千金解金銀銅鐡毒方取鴨屎汁解之又鐡毒方磁石解之惡毒瘴氣毒風腫毒方四首千金療惡氣瘴毒百毒方用犀角羚羊角雄黄麝香解之又主喉腫邪氣惡毒入腹方升麻射干並解之又主哽腫毒方用五香紫檀解之又甘草湯主天下毒氣及山水露霧毒氣去地風氣瘴癘等毒方甘草二兩右一味以水二升煮取一升分服外臺秘要方卷三十一
