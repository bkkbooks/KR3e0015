body:
  text: 外臺秘要方巻二十三唐王燾撰癭病方一十八首病源癭者由憂恚氣結所生亦由飲沙水沙隨氣入於脈搏頸下而成之初作與癭核相似而當頸下也皮寛不急垂搥搥然是也恚氣結成癭者但垂核搥搥然無脈也飲沙水成癭者有核㿔㿔然無根浮動在皮中又云有三種癭有血癭可破之息肉癭可割之有氣癭可具針之養生方云諸山水黒土中出泉流者不可乆居常食令人作癭病動氣増患出第三十一巻中肘後療頸下卒結囊漸大欲成癭海藻酒方海藻一斤去鹹清酒二升右二味以絹袋盛海藻酒漬春夏二日一服二合稍稍含咽之日三酒盡更以酒二升漬飲之如前滓暴乾末服方寸匕日三盡更作三劑佳崔氏文仲同又方昆布海藻等分末之蜜丸含如杏核大含稍稍咽汁日四五並出中巻深師療癭方桂心昆布洗海藻冼甘草炙白麪熬錢三分龍膽草海蛤研土𤓰根半夏洗吳茱萸牡蠣熬各一兩右十一味為散酢漿水服五分匕先食日三十日知盡藥愈節食鹽羊肉餳生葱菘菜又方海藻二分洗龍膽草二分昆布二分洗土𤓰根二分半夏二分洗小麥麪二分炒右六味為散先食酒服方寸匕日三二十日知三十日愈忌羊肉餳並出第二十九巻中小品癭病者始作與癭核相似其癭病喜當頸下當中央不偏兩邉也乃不急膇然則是癭也中國人息氣結癭者但垂膇膇無核也長安及襄陽蠻人其飲沙水喜癭有核瘰瘰耳無根浮動在皮中其地婦人患之腎氣實沙石性合於腎則令腎實故病癭也北方婦人飲沙水者産乳其於難非針不出是以比家有不救者良由此也療癭方小麥一升醇苦酒一升漬小麥令釋漉出暴燥復漬使苦酒盡暴麥燥𢷬篩以海藻三兩别𢷬以和麥末令調酒服方寸匕日三禁鹽生魚生菜豬肉肘後崔氏備急云療三十年癭疾集騐文仲范汪等同出第十巻中肘後用海藻五兩集驗療癭酒方是水雨經露出柳根三十斤右以水一斛煮得五斗同米三斗釀之酒成先食服一升日三范汪同出第四巻中崔氏海藻散療癭方海藻八兩洗去鹹汁貝母二兩土𤓰根二分小麥麴二分炒右四味作散酒服方寸匕日三又方秫米三升依酒法炊右一味取圓葉白楊皮十兩去上蒼者慎勿令見風細切以水五升煮取二升濃汁漬麴末五兩用前件秫米依酒法酘之熟訖封塞一七日然後空腹服一大盞日再服三日内即効神驗無比並出第四巻中張文仲隱居効驗療癭方昆布洗松蘿各三分海藻五分右三味𢷬蜜丸如杏核大含咽津日三夜二大佳備急肘後同又療癭司農揚丞服効第一方昆布六分洗海藻七分松蘿乾薑桂心各四分通草五分右六味𢷬篩蜜丸如梧子一服吞七丸即住在頸下癭處欲至食時即先飲少酒下却丸子後進食禁酢䔉鹽酪􅆨肉倉米等若癭大者加藥令多取差又第二方昆布洗海藻洗各一斤右二味細切好酒五升浸七日量力取數服酒盡以酒更浸兩遍藥力盡當以此酒下前丸藥益善備急肘後同又方小麥三升右以三年米酢三升漬麥暴乾乾更浸使酢盡又暴乾𢷬篩為散别𢷬昆布為散每服取麥散二匕昆布散一匕旦飽食訖清酒和服之若不能飲酒者以水和服亦得服盡即差多服彌善無所禁但不用舉重及悲啼煩惱等事肘後備急集驗同又含丸方檳榔三兩馬尾海藻三兩洗昆布三兩洗右三味末之蜜丸如雞子黄大毎日空腹含一丸徐徐令津液取汁咽之忌鹽並楊丞方服驗肘後備急同並出第六卷中救急療癭要切方䑕粘草根一升湯洗右細切除皮者一升一物以水三升煮取一升半分温三服服相去如人行四五里一服宜頓服六劑病即差一方削除皮細切取三大升𢷬篩為散蜜和丸如梧子一服二十丸日再服之稍稍加至三十丸以無灰酒進之出第五巻中古今録驗療氣癭方晉州熙公奏徐公方問荆一兩出海島羯羊靨五具去脂炙白歛椒目甘草炙各一分小麥麴末二兩熬右六味𢷬篩為散羊靨一種别𢷬為末相和好漿浸更𢷬作丸如小棗大一服五丸無禁又方羊靨一百枚煖湯浸去脂炙大棗二十枚去皮作丸服忌慎如常藥法又方取羊靨一具去脂含汁汁盡去皮日一具七日含便差又療癭海藻散方海藻十分洗昆布一兩洗海蛤一兩研通草一兩菘蘿洗乾薑桂心各二兩右七味下篩酒服一錢匕日三出第四十一巻中肘後無乾薑有白歛氣癭方一十首廣濟療氣癭氣胷膈滿塞咽喉項頸漸麤昆布丸方昆布二兩洗去鹹汁通草一兩羊靨二具炙海蛤一兩研馬尾海藻一兩洗去鹹汁右五味蜜丸如彈子細細含咽汁忌生菜熱麪炙肉蒜笋又療冷氣築咽喉噎塞兼癭氣昆布丸方昆布八分洗乾薑六分犀角六分屑吳茱萸四分人參八分馬尾海藻四分洗葶􅐗子六分熬杏仁八分去皮尖熬右八味𢷬篩蜜丸如梧子空腹以飲服忌生冷粘食陳􅆨等餘忌同前又療氣妨塞方昆布三兩洗菘蘿通草柳根鬚各三兩近水生者右四味𢷬篩蜜丸如彈丸大以海藻湯浸細細含之咽盡勿停忌舉重生嗔憂悲等又療癭細氣方昆布十二分洗馬尾海藻十分洗杏仁八分通草麥門冬去心連翹各六分乾薑橘皮各六分茯苓八分松蘿三兩右十味𢷬末以袋盛含之乃以齒㣲㣲嚼藥袋子汁出入咽中日夜勿停有問荆加四分佳忌嗔及勞油膩粘食並出第二卷中深師蘇子膏療氣癭方臘月豬脂一升蘇子桂心大黄當歸乾薑橘皮蜀椒汗各三分右八味切以水六升煮取二升去滓内豬脂消盡服差忌生葱出第二十九巻中崔氏云凡水癭氣癭可差石癭不可治療氣癭方平旦手挽癭令離項掐其下根脈㫁愈一日一度掐易愈者七日如難差者三七日愈又方昆布二兩洗海藻二兩洗龍膽草一兩馬刀半兩炙海蛤半兩研大黄一分熏黄半兩右七味𢷬蜜丸如梧子大破除日以綿裹一丸含咽津朝暮空腹服忌五辛豬肉又方海藻二兩洗右一味以淳酒四升漬二宿漉去滓細細煖含咽之盡即更造取差為度范汪同並出第四巻中必効主氣癭方白頭翁半兩昆布十分洗海藻七分洗通草七分𤣥參連翹各八分桂心三分白歛六分右八味𢷬篩蜜丸如梧子五丸若冷用酒服禁䔉麪豬魚生葱出第五巻中古今録驗療癭有在咽喉初起游氣去來隂陽氣相搏遂停住喉中前不去腫起如斛羅諸療不差小麥湯方小麥三升昆布二兩洗去鹹厚朴炙一兩橘皮附子炮海藻洗各二兩生薑五兩半夏洗五兩白前三兩杏仁一百枚去尖皮右十味切以水一斗煮取三升半分五服相去一炊頃忌豬肉餳羊肉冷水出第四十一巻中五癭方八首深師五癭丸方取塵靨以酒漬炙乾再内酒中更浸炙令香咽汁味盡更易十具愈千金翼同出第二十九巻中范汪療五癭方昆布三兩洗海蛤二兩研松蘿二兩海藻三兩洗通草白歛桂心各二兩右七味作散酒服方寸匕日三千金翼同出第四十二巻中千金療石癭勞癭泥癭憂癭氣癭方海藻洗龍膽草海蛤研通草昆布洗礜石燒松蘿各三分小麥麴四分熬半夏洗二分右九味作散酒服方寸匕日三禁食魚豬肉五辛生菜羊肉餳十日知二十日愈又方菖蒲二兩海蛤研一兩白歛一兩海藻洗一兩松蘿一兩桂心一兩椒汗兩羊靨百枚半夏一兩洗續㫁一兩神麴三兩到桂草一兩右十二味𢷬作散以羊牛髓和為丸如梧子日服三丸忌羊肉生葱等翼同又方小麥麪一升特生礜石一斤燒海藻一斤洗右三味以陳酢一升漬小麥麪暴乾更漬令酢盡乾各𢷬下篩毎服兩方寸匕日四五服含乃咽之忌同前及大誦大語吹火用氣翼深師用小麥麪一斗餘同並出第二十五巻中千金翼五癭方海藻一兩洗昆布洗半夏洗細辛土𤓰根松蘿各一兩白歛龍膽草各二兩海蛤二兩通草二兩右十味作散酒服方寸匕日再忌羊肉餘忌同前又方昆布二兩洗右一味切如大指酢漬含咽汁盡愈又方海藻一斤小麥麪一斤右二味以陳酢一升溲麪暴令乾復漬令酢盡作散酒服方寸匕日三忌怒出第十一巻中灸癭法一十三首千金灸諸癭法灸肩髃左右相宛宛中男左十八壯右十七壯女右十八壯左十七壯再三以差止又法灸風池百壯風池夾項兩邉兩穴兩耳上髮際中通按此條千金聖濟作灸風池百壯又灸兩耳後髪際百壯乃是兩條然明堂無髪際穴又法灸大椎百壯兩邉相去各一寸半小下垂各三十壯又法灸頸衝頸衝在伸兩手直向前令臂著頭對鼻所住處灸之各隨年壯凡灸五處九穴翼深師並同通按頸衝即臂臑穴在肘上七寸其灸五處九穴即風池髪際大椎大杼頸衝五處共九穴也又癭上氣并短氣方灸肺俞一百壯又癭上氣胷滿法灸雲門五十壯又癭惡氣方灸胷堂百壯又癭惡氣法灸天府十五壯又癭勞氣法灸衝陽隨年壯在肘外屈横文頭是據此是曲池穴衝陽在足跌上五寸又療癭法灸天瞿三百壯横三間寸灸之又癭氣面腫法灸通天五十壯在耳上二寸又灸癭法灸中封隨年壯在兩足趺上曲尺宛宛中並出第二十五卷中又灸癭法灸耳後髮際有一隂骨骨間有一小穴亦有動脈準前灸大効已上穴所在具三十九巻明堂中出第六巻中瘤方三首肘後云皮肉中忽腫起初如梅李漸長大不痒不痛又不堅强按之柔軟此血瘤也不療乃至如􅌉大則不可復消而非殺人病爾亦慎不可破方乃有大療今如覺但依癭家療療若不消更引别大方出中巻深師療瘤脂細瘤方吳茱萸一分􅈨石燒芎藭當歸大黄黄連芍藥白歛黄芩各二分右九味合𢷬下篩和雞子塗著細故熟布上隨瘤大小薄厚貼之燥輒易之著藥當熟作膿脂細細從孔中出探知膿血盡著生膏若膿不盡復起故也生肉膏方如左又生肉膏療癰瘤潰漏及金瘡百瘡悉療之方真當歸附子炮甘草白芷芎藭各一兩薤白一兩生地黄三兩右七味㕮咀以豬膏三升半合微火煎白芷地黄去滓稍以傅瘡上日三良千金並同出第二十九巻中千金云凡肉瘤勿療療則殺人慎之慎之出第二十五巻中千金翼療瘤病方麞鹿二種肉割如厚脯火炙令熱搨掩可四炙四易痛膿便愈不除更炙新肉用之良出第二十四巻中白瘤及二三十年瘤方三首千金翼白瘤方先極搔刮以繩縳之即愈又取東向木空中水熱刮瘤上洗之日三即愈又方白礬硫黄等分右二味末以酢和封上並出第二十四巻中千金陷腫散主二三十年瘤癭及骨瘤石瘤肉瘤膿瘤血瘤或大如柸盂升斗十年不差致有漏潰令人骨消肉盡或堅或䎡或漬令人驚惕寐寤不安體中掣縮愈而復發療之方千金翼云陷麥散烏賊魚骨一分白石英二分石硫黄一分紫石英二分鍾乳三分研乾薑一兩丹參三分琥珀一兩研大黄一兩附子一兩炮胡鷰屎一兩右十一味為散貯以韋囊勿令泄氣若瘡濕即傅之若瘡乾無汁者以豬膏和傅日三四以乾為度若汁不盡者至五劑十劑止勿措意不作也著藥令人不疼痛若不消加芒硝二兩益佳忌豬肉出第二十五巻中翼無鷰屎喉痺方二十一首病源喉痺者喉裏腫塞痺痛水漿不得入也人隂陽之氣出於肺循喉嚨而上下也風毒客於喉間氣結藴積而生熱故喉腫塞而痺痛脈沉者為隂浮者為陽若右手闗上脈隂陽俱實者是喉痺之候也亦令人壯熱而惡寒七八日不治則死其湯熨針石别有正方補養宣導今附於後養生方導引法云兩手拓兩頰手不動樓肘使急腰内亦然住定放兩肋頭向外附膊腰氣散盡勢大悶始起來去七通去喉痺出第三十卷中廣濟療喉痺急疼悶妨不通方馬蘭根切一升升麻三兩瞿麥二兩射干十兩犀角二兩屑通草二兩𤣥參三兩右七味切以水八升煮取二升去滓細細含咽一日令盡得破膿慎熱麪炙肉䔉又療喉痺方馬藺子八分牛蒡子六分右二味𢷬為散每空腹以煖水服方寸匕漸加至一匕半日再並出第二巻中肘後療喉痺者喉裏腫塞痺痛水漿不下入七八日即殺人療之方巴豆一枚開其口右一味以綿裹極堅令有繩出外以巴豆内鼻中隨腫左右時時吸氣半日許即差無巴豆用杏仁以塞耳如之文仲范汪同又方熬杏仁熟𢷬蜜丸如彈子含咽其汁亦可𢷬杏末帛裹含之小品文仲備急范汪同又方礬石一兩水三升漬洗手足又方生地黄汁二升蜜二升合微火煎之取二升稍稍含之又方射干當歸各三兩右二味切以水三升煮取一升稍稍含之吐去更含又方剥葫塞耳鼻孔日再易之有効又方菖蒲根嚼燒秤鎚令赤内一柸酒中沸止飲之文仲備急同又療喉痺方射干一片含咽汁又方升麻㫁含之喉塞亦然又方桔梗三兩右一味切以水三升煮取一升頓服之忌豬肉又方取芥子𢷬碎以水及蜜和滓傅喉下燥輒易又𫝊用神効方桔梗甘草炙各一兩右二味切以水一升煮取服即消有膿即出忌豬肉海藻菘菜備急同又療垂死者方𢷬馬藺根一握少以水絞取汁稍稍咽之口噤以物拗灌之神良古今録驗雞子湯療喉痺方半夏末方寸匕右一味開雞子頭去中黄白盛淳苦酒令小滿内半夏末著中攪令和雞子著刀子鐶令穏炭上令沸藥成置杯中及煖稍咽之但腫即減忌羊肉餳肘後文仲同此與仲景苦酒湯同半夏不可作末剖之可也又療喉痺塞射干丸方射干二兩豉三合芎藭杏仁去尖皮各一兩犀角一兩屑升麻二兩甘草一兩炙右七味𢷬下篩蜜和丸含之稍稍咽津日五六忌海藻菘菜又射干湯療喉痺閉不通利而痛不得飲食者若閉喉并諸疾方當歸二兩升麻一兩白芷三兩射干甘草炙犀角屑杏仁去尖皮各一兩右七味切以水八升煮取一升半分服神良忌海藻菘菜出第二十九巻中近効療喉痺方大附子一個刮去皮作四片右一味以蜜塗火上炙稍熱即含咽汁甜盡又取一片準前含如已作頭即膿出如未作頭立消神驗忌豬肉冷水又方朴硝一兩細細含咽汁一食頃差又若腫全盛語聲不出者方大附子一枚炮裂削去皮切如豆右一味含一塊咽汁半食間即差烏頭亦得忌豬肉冷水咽喉中閉塞方三首廣濟療咽喉中塞鼻中瘡出及乾嘔頭痛食不下方升麻通草黄蘗𤣥參各八分麥門冬十分去心竹茹前胡各六分芒硝十分右八味切以水八升煮取二升五合去滓内硝温分三服服别如人食頃自利去硝又方生雞子一顆開頭取白去黄著米酢拌煻火燠沸起擎下沸定更三度成就熱飲酢盡不過一二即差並出第二巻中近効療喉痺喉咽塞喘息不通須臾欲絶神驗方馬藺根葉二兩右一味切以水一大升半煮取一大盞去滓細細喫須臾即通絡石草亦療煎法分兩亦同喉舌生瘡爛方八首肘後療喉口中及舌生瘡爛方含好淳苦酒即愈文仲備急同又方一酒漬蘘荷根半日含潄其汁又方杏仁二十枚甘草一寸黄連一分右三味末綿裹含之千金同又方礬石二兩燒去汗黄連一分末右二味同研内口中令布瘡上又方黄連一兩右一味切以水三升煮取一升稍稍含冷吐忌豬肉冷水張文仲療口中及舌生瘡爛方取牛膝根酒漬含潄之無酒者但亦取含之肘後同又方剉黄蘗含之肘後同並出第七卷中備急療喉中及舌生瘡爛方剉薔薇根濃煮汁含潄之冬用根夏用枝葉文仲肘後同出第四巻中咽喉生瘡方四首廣濟療咽中生瘡吐血不下食方方怡雲曰此方余用巳驗但不大便者先看輕重消息下之後用此方生地黄五兩青竹茹𤣥參雞蘇各二兩茯苓升麻麥門冬去心各三兩右七味切以水八升煮取二升五合去滓分温三服服相去如人行七八里不能多服含細細咽亦得忌生冷熱麪炙肉油酢出第五巻中千金療口中塞及咽喉不利生瘡口燥膏方豬膏一斤白蜜一斤黄連一兩右三味合煎去滓攪令相得含如半棗日四五度又療熱病口爛咽喉生瘡水漿不得入膏方當歸射干升麻各一兩附子半兩炮二白蜜四兩右五味切以豬膏四兩先煎之成膏下著地勿令大熱内諸藥微火煎附子色黄藥成絞去滓内蜜復上微火煎令相得盛器中令凝取如杏子大含之日四五度稍稍咽之並出第六巻中古今録驗升麻湯療咽喉生瘡方甘草一兩炙升麻石膏碎牡丹皮各一兩右四味切以水七升煮取三升一服七合日三忌海藻菘菜出第二十九巻中咽喉腫方五首肘後咽喉卒癰腫食飲不過方用薤一把𢷬傅腫上冷復易之用苦酒和亦佳范汪同又方吞薏苡仁子二枚延年療喉中熱腫方䑕粘根切一升右一味以水五升煮取三升去滓分温三四服忌䔉麪出第十九巻中古今録驗羚羊角豉湯療喉痛腫結毒氣衝心胷方豉一升半犀角一兩屑羚羊角屑一兩芍藥三兩升麻四兩杏仁一兩去尖皮梔子七枚甘草炙一兩右八味切以水七升煮取一升半去滓分三服忌海藻菘菜又五香湯療諸惡氣喉腫結核方沉香二兩薫陸香一兩麝香二分研湯成下青木香二兩雞舌香二兩右五味以水五升煮取一升半去滓分三服並出第二十九巻中喉卒塞痛及卒毒攻痛方三首范汪療卒喉中塞痛不得飲食方取敗筆一枝燒屑以漿飲服一方寸匕良驗出第十五卷中文仲療喉中卒毒攻痛方章陸根切炙令熱隔布熨之冷轉易立愈姚云苦酒熱熬傅喉亦療喉痺肘後小品同又方𢷬艾傅之並出第七巻中懸癰腫方三首肘後療懸癰腫卒長數寸如指隨喉出入不得食方開口捧頭以筋抑舌及燒小鐡於管中灼之令破灼火畢以鹽隨烙處塗之又方𢷬鹽綿纒筋頭㸃鹽傅以揩之日六七度文仲備急同千金療懸癰垂暴腫長方乾薑半夏等分洗右二味末之以少少著舌本翼同出第六巻中咽喉雜療方四首范汪療咽喉不利下氣丸方射干附子炮人參杏仁各一分右四味合𢷬下篩蜜丸如梧子含一丸咽汁日三夜一忌豬肉冷水千金同又療口中咽喉不利當歸含丸方當歸末二兩杏仁一兩右二味𢷬合下篩以蜜和為丸如梧子二丸含漸漸咽汁日三夜再又療咽喉中痛不利丸方升麻甘草炙鬼臼射干丹砂各一兩雄黄一兩杏仁一十枚麝香半兩右八味𢷬下篩和以蜜丸如梧子飲服一丸日三漸加之酒下亦得咽痛失聲不利用良忌海藻菘菜千金同出第五十巻中崔氏療口咽咽内瘡痛欲失聲方桂心二兩杏仁熬二兩黄荑一兩右三味𢷬末合和綿裹含如杏仁許咽汁消盡更含日三夜二忌膩食出第四巻中寒熱瘰􅊓方一十一首病源此由風邪毒氣客於肌肉隨虗處而停結為瘰􅊓或如梅李等大小兩三相連在皮間而時發寒熱是也乆則變膿潰成瘻也其湯熨針石别有正方補養宣導今附於後養生方導引法云踑踞以兩手從脚入據地曲脚加其上舉􅥑其可用行氣愈瘰􅊓乳癰出第三十四巻中甲乙鍼經寒熱瘰􅊓論黄帝問曰寒熱瘰􅊓在於頸腋者皆何氣所生岐伯對曰此皆䑕瘻寒熱之氣也稽留於脈而不去者䑕瘻之本皆在於藏其末上出於頸腋之間其浮於脈中未著於肌肉而外為膿血者去易問曰去之柰何對曰請從其末引其本可使衰去而絶其寒熱審安其道以予之徐徃徐來以去之其小如麥者一刺知三刺而已決其生死法反其人目視之其中有赤脈從上下貫瞳子見一脈一嵗死見一脈半一嵗半死見二脈二嵗死見二脈半二嵗半死見三脈三嵗死此赤脈不下貫瞳子者可療千金同出第八卷中廣濟療瘰􅊓丸方鸛骨貍骨並炙射干𤣥參升麻炙青木香沉香犀角屑丁香羚羊角屑丹參甘草炙各四分人參沙參各三兩􅆩肝六分連翹六分光明沙二分研右十七味𢷬篩蜜丸以飲服十五丸日二服漸加至三十丸空腹服之忌生冷油膩血食竝酢熱肉海藻菘菜粘食陳臭生血物等又療瘰􅊓方連翹射干𤣥參芍藥青木香芒硝升麻梔子仁劈前胡當歸甘草炙大黄各二兩右十二味切以水一斗煮取三升分三服服别相去如人行六七里快利忌同前方並出第五巻中劉㳙子療寒熱瘰􅊓散方貍骨五兩炙烏頭七分炮黄連六分右三味𢷬下篩先食以酒服一錢匕日三良忌豬肉冷水范汪同出第十巻中千金療瘰􅊓方白殭蠶為散以水服五分匕日三十日差深師救急同又方於患人背兩邉腋下後文上隨年壯灸之又方灸耳後髮際七壯又方槲白皮二斤右一味細切以水七升煮取三升去滓真硃砂方寸匕和汁一升旦向日服之強行須臾吐䑕出三朝服良又方貍頭一枚炙𢷬下篩旦白飲服方寸匕日再服之又方狼糞灰封上良又療寒熱瘰􅊓散方連翹土𤓰根龍膽草苦參黄連括樓芍藥常山皮各兩貍頭骨一枚炙右九味𢷬下篩酒服五分匕日三忌豬肉冷水翼集驗古今録驗同一方云無貍頭骨加之名貍頭散餘同並出第二十四巻中救急療瘰􅊓方馬齒莧隂乾燒灰臘月豬膏和之以煖泔清洗瘡拭乾傅之日三出第三巻中瘰􅊓結核方四首廣濟療瘰􅊓息肉結硬薄方白歛甘草炙青木香芍藥大黄各三兩𤣥參三兩右六味𢷬為散少減以少酢和如稀糊塗故布貼上乾易之勿停忌豬肉五辛熱肉飲酒熱麫等又瘰􅊓結核令消散方黄茋七分𤣥參八分連翹人參升麻青木香伏苓蒼耳子甘草炙朴硝桂心各四分枳實炙去瓤大黄羚羊角屑麥門冬去心各五分䑕粘子苦參各九分右十七味𢷬蜜丸如梧子以酒下十丸日三夜四漸加至二三十丸以知為度忌同前方竝出第五卷中肘後療頸下生瘡􅊓瘰如梅李宜使消之方海藻一斤洗右一味以酒三升漬數日稍稍飲之文仲備急等同又方人參甘草炙乾薑白歛各四分右四味𢷬篩酒服方寸匕日三忌同劉涓子文仲備急同出第六巻中惡核瘰􅊓方四首文仲五香連翹湯療惡肉惡脈惡核瘰􅊓風結腫氣痛方青木香沉香雞舌香各二両麝香半兩薰陸香一兩射干紫葛升麻桑寄生獨活通草連翹各二兩大黄三兩淡竹􅅹二升右十四味切以水九升煮取減半内竹􅅹更煮取三升分三服忌五辛千金方無紫葛雞舌香有丁香古今録驗同出第五巻中延年丹參湯療惡肉核瘰􅊓諸風氣結聚腫氣諸病並主之方蒴藋丹參各二兩甘草炙蓁芁獨活烏頭炮牛膝各一兩躑躅花蜀椒各半兩汗右九味切以水八升煮取三升温服一升忌海藻菘菜豬肉冷水古今録驗有白及餘並同又𤣥參湯主惡核瘰􅊓風結方𤣥參升麻獨活連翹各二兩木防己菊花各一兩右六味切以水八升煮取三升分服一升日三文仲同又丹參膏主惡肉結核瘰􅊓脈腫氣痛方丹參八分白歛獨活連翹白及各四分升麻蒴藋各六分防己𤣥參杏仁各五分去皮尖右十味細切以生地黄汁淹漬一宿以鍊成豬膏四升微火煎五上五下藥成絞去滓以摩病處日三四癰腫瘰􅊓核不消方五首經効犀角丸療瘰􅊓方犀角四分升麻三分大黄六分牛蒡子八分烏蛇十分炙去頭尾𤣥參八分右六味末之蜜和丸如梧子大毎日至午後煎牛蒡湯下三十五丸又方龍骨八分牡蠣八分熬右二味末之酒下三錢匕日三度良又大黄膏方大黄六分附子四分炮細辛三分連翹四分巴豆一分右五味以苦酒浸一宿以臘月豬膏煎三上三下去滓以綿濾之用傅之日三五度塗之良集驗療寒熱瘰􅊓散方連翹六分土𤓰根四分龍膽草五分黄連四分苦參六分栝樓四分芍藥五分右七味為散食後温酒下五分匕日三又方陵鯉甲二十一枚燒𢷬末傅瘡上効千金同䑕瘻及瘰􅊓方一十一首文仲療瘰􅊓方苦參四大兩𢷬末生牛膝和丸如梧子食後煖水下十丸日三服又方昆布四分海藻四分右二味各洗去鹹𢷬末蜜和丸如杏核許大含之日三度良差救急療䑕瘻久不差方取狼䑕不限多少常作羮粥任喫之必驗千金經効同范汪療䑕瘻瘰􅊓方取臘月豬膏正月䑕頭燒令作灰以膏和傅之愈若不差者瘰􅊓右灸右肩頭三指度以下指灸炷皆如雞子大良若不能堪者可如中黄亦可已試有良驗又療頸䑕瘻累累者方貝母乾薑藁本桂心蜀椒各一分汗右五味𢷬下篩先食吳茱萸一分以酒服一撮忌生葱又療䑕瘻瘰􅊓身熱方豬椒二十斤右一味以水淹足煎熟去滓置瓶中覆瓶口以瘡當上熏候熱極乃止痛膿血䑕當從瘡出便愈又寒熱䑕瘻瘰􅊓散方狸骨炙龍骨各五分躑躅熬半兩䑕粘子當歸王不留行土𤓰根各一兩右七味𢷬合篩先食酒服方寸匕日再夜一並出第四十二巻中集驗療䑕瘻及瘰􅊓膏方白馬牛羊豬雞等矢屑各一斤漏蘆藁本各一斤右七味並於石上燒作灰研絹篩之以豬脂一升三合煎亂髮一兩半令沸髮盡乃内諸藥屑微火上煎五六沸藥成先去瘡上痂以鹽湯洗新綿拭瘡令燥然後傅膏若無痂猶須湯洗日再若著膏當以帛覆無令風冷神驗瘰􅊓以膏傅上亦日再古今録驗范汪同又療寒熱瘰􅊓散方白曽青半兩當歸防風括蔞根芎藭黄茋狸骨炙甘草炙各二兩細辛乾薑露蜂房各一兩炙礜石燒半日大附子炮荏子各半兩斑猫去首足羽熬芫青去首足羽各五枚熬右十六味𢷬下篩為散以酒服一錢匕日再忌豬肉冷水海藻菘菜古今録驗范汪同並出第八巻中又療䑕瘻方蛇腹中䑕蝦蟇燒末酒服方寸匕甚効又方以槲葉𢷬末傅腫上熱炒鹽慰之即消良効並出第五巻中毒腫瘰􅊓方四首崔氏大五香湯療毒氣苦肌肉中腫痛結脈寒熱如瘰􅊓痛不可近急者數日殺人苦心煩悶便當急速與湯并以滓薄腫脈上方青木香雞舌香沉香升麻各五分霍香犀角屑吳茱萸桂心麻黄甘草炙各三分薫陸香四分細辛二分右十二味㕮咀以水七升煮取二升分三服不差復合若嗇嗇惡寒加附子中形者一枚炮令坼八破用忌生冷菘菜海藻豬肉冷水生菜五辛古今録驗同又五香湯療毒腫瘰􅊓方麝香研青木香雞舌香藿香薫陸香當歸黄芩升麻芒硝各三分大黄五分右十味㕮咀以水六升煮取二升去滓内硝分二服相去如人行七八里再服諸卒尸注惡氣亦療出第五巻中經心録射干湯療惡毒身強痛瘰􅊓方射干桂心各二兩麻黄去節生薑甘草炙各四兩杏仁四十箇去皮尖右六味切以水四升煮取三升去滓分三服忌同前出第五巻中又升麻湯療風毒咽水不下及療􅊓腫方升麻芍藥各四兩射干三兩杏仁去尖皮三兩麻黄去節二兩甘草炙二兩楓香葛根各三兩右八味切以水八升煎取半分三服忌同前出第三卷中灸瘰􅊓法六首千金灸瘰􅊓法兩腋中患􅊓處宛宛中百壯上又法𢷬生章陸根捻作餅子置漏上以艾炷灸餅子上乾熟易之灸三四炷又法灸五里大迎各三十壯又法葶􅐗三合豉一升右二味合𢷬令極熟作餅如大錢厚二分許取一枚當瘡孔上作艾炷如小指大灸餅上三壯一日易三餅九炷隔三日一灸翼同古今録驗兼主瘻不可灸頭瘡葶􅐗氣入腦殺人劉涓子同又法一切瘰􅊓在項上及觸處但有肉結凝以作瘻瘡及癰節者以獨頭蒜截兩頭留心作孔大艾炷稱蒜大小貼􅊓子上灸之勿令上破肉但取熱而已七炷一易蒜日三易日日灸之取消止翼同又方七月七日日未出時取麻花五月五日取艾等分合𢷬作炷灸􅊓子一百壯並出第二十四卷中九瘻方三十一首廣濟療瘻有九種不過此方芫青四足海藻八分洗一昆布八分洗雄黄研八分狸骨炙三分牡蠣四分熬地膽二十枚熬青木香三分右八味𢷬篩為散酒服一錢匕日二服病從小便出如爛筋忌生冷粘食豬魚肉陳臭物出第五巻中劉涓子療䑕瘻方死􅎙蜋燒作灰右一味苦酒和塗之數過即愈先以鹽湯洗古今録驗千金同又方五月五日樓桃𢷬末先鹽湯洗拭之令乾以末傅瘡上樓桃未詳又方烏頭炮附子炮各二兩右二味㕮咀著五升淳苦酒中漬之待乾復内苦酒中燥復内以苦酒盡暴令乾𢷬末酒服方寸匕日三忌豬肉冷水等又張子仁療䑕瘻要方柞木皮五升右一味以水一斗煮熟去皮煎令汁得二升稍稍服盡當有宿肉出即愈備急文仲古今録同並出第六巻中肘後療苦鼻内肉外查瘤膿並出者是蜂瘻方取蜂房火炙焦末酒服方寸匕日一深師療䑕瘻方鰻鱺魚四兩野豬皮瞿麥一兩巴豆十五枚斑猫二十枚去頭足羽熬五月五日蟾蜍一枚炙臘月豬脂五分右七味𢷬野豬皮下篩合諸藥更𢷬下篩内鰻鱺魚以膏和𢷬千杵平旦未食服如梧桐子二枚覺者寒熱不覺暮復投明日旦起更服三丸稍稍増之慎勿食熱食煩悶殺人蟲當從小便出以堪盛之尿便視乃有百數耳不可以見亦大便出此方驗忌豬肉蘆笋等又方馬齒礬石燒真珠粉右二味𢷬下篩為散厚塗瘡上不過三愈又方松脂硫黄狼毒各二兩豬腦一具白歛二兩右五味熬豬腦取汁狼毒白歛㕮咀以水三升煮取一升内腦汁中煎令得五合細末硫黄松脂下篩内中攪令相得綿裹内瘡中七日知二七日病除神良集驗凡有九種瘻一曰狼瘻始發於頸頭腫有根起於缺盆上轉連耳根腫大此得之因憂恚氣上不得下其根在肺空青主之商陸為佐二曰䑕瘻始發於頸無頭尾如鼷䑕瘻核時上時下使人寒熱脱肉此得之由食大䑕餘毒不去其根在胃狸骨主之知母為佐三曰螻蛄瘻始發於頸項狀如螻蛄腫潰連生瘡其汁赤黄得之食𤓰螻蛄餘毒及果實不去核其根在大腸荏子主之桔梗為佐四曰蜂瘻始發於頸瘰􅊓三四處俱腫起相連潰潰移此得之多飲流水水有蜂餘毒不去其根在脾雄黄主之黄芩為佐五曰蚍蜉瘻始發於頸初得之如傷寒此得之因飲食中有蚍蜉毒不去其根在腎礜石主之防風為佐六日蠐螬瘻始發於頸上下無頭尾如棗核塊塊多在皮中使人寒熱心痛滿此因喜怒哭泣得之其根在心礬石主之白术為佐七曰浮疽瘻始發於頸如兩指使人寒熱欲卧此得之因思慮憂憶其根在膽地膽主之甘草為佐八曰瘰􅊓瘻始發於頸有根初苦痛瘰􅊓覺之使人寒熱得之新沐頭濕結髮汗流入於頸所致其根在腎雌黄主之芍藥為佐九曰轉脈瘻始發於頸如大豆浮在脈中濯濯脈轉苦驚惕身如振寒熱始得之時驚卧失枕其根在小腸斑猫主之白芷為佐療瘻九種方空青研鍊之商陸根狸骨炙知母荏子桔梗雄黄黄芩礜石燒防風礬石燒汁盡地膽熬白术甘草炙雌黄芍藥斑猫去足羽熬白芷各二分右十八味𢷬其論病者特加其分餘種令分等細篩末空青最在後内之苦酒服一刀圭日三服三十日知五一日愈七十日平復病者百日禁食魚肉忌生菜桃李雀肉海藻菘菜犬肉生血物餘二大豆為一刀圭小兒服之半大人全服八嵗以下寜從少起過度令人淋淋即減之出第九巻中千金問曰何謂九瘻答曰一曰狼瘻二曰䑕瘻三曰螻蛄瘻四曰蜂瘻五曰蚍蜉瘻六曰蠐螬瘻七曰浮疽瘻八曰瘰􅊓瘻九曰轉脈瘻謂之九瘻又療狼瘻發於頸頭腫有根起於缺盆上轉連延耳根腫大此得之因憂恚氣上不得下其根在肺空青主之商陸為佐方空青研二分蝟腦二分炕之獨活一分蝟肝一具乾之芎藭半兩女婦草一分黄芩鼈甲炙斑猫去趐足乾薑當歸茴香礬石燒地膽各一分蜀椒三十去汗右十五味作散下篩酒服方寸匕日三十五日即止忌生血物莧菜劉涓子古今録驗同又療䑕瘻發於頸無頭尾如鼷䑕使人寒熱此得之因食大䑕餘毒不去其根在胃狸骨主之知母為佐方陵鯉甲炙山龜殻炙甘草炙桂心雄黄乾薑等分右六味作散下篩服方寸匕日三蜜和内瘡中無不愈先灸作瘡後與藥良忌海藻生葱劉涓子備急古今録驗文仲同又療䑕瘻瘡差復發及不愈出膿血不止方以不中水豬脂㕮咀生地黄内脂中令其脂與地黄足相淹和煎六七沸去滓桑灰汁淨洗瘡去惡汁以地黄膏塗上日一易范汪同又療䑕瘻方得蛇虺所吞口中䑕燒末服方寸匕日再不過三服此大驗但難遇耳并傅瘡中范汪同又療䑕瘻方死䑕一枚中形者亂髮如雞子一枚右二物以臘月豬膏令淹䑕髮煎之令其䑕髮都盡消膏成分作二分一分稍稍塗瘡一分以酒服之即愈矣䑕子當從瘡出神良秘不𫝊翼備急文仲集驗范汪同又療螻蛄瘻發於頸項狀如螻蛄腫潰連生瘡其汁赤黄此得之食𤓰螻蛄餘毒及果實不去核其根在大腸荏子主之桔梗為佐方桂心乾薑桔梗礬石燒獨活各一分附子一分炮椒一百粒汗芎藭半分龍骨半分荏子一分右十味𢷬下篩棗二十枚合𢷬以酢漿丸如大豆温漿下五丸古今録驗劉涓子同又方槲葉灰先以泔清煮槲葉取汁洗拭乾内灰瘡中又療蜂瘻發於頸瘰􅊓三四處俱腫起相連潰潰移此得之飲流水有蜂毒不去其根在脾雄黄主之黄芩為佐方蜂房一具炙鼈甲一分炙茴香一分吳茱萸二分椒一百粒汗乾薑一分右六味𢷬下篩作散傅瘡孔中日十度十日止忌莧菜又療蜂瘻初生時狀如桃而痒搔之則引大如雞子如覆手者方熬鹽熨之三宿四日不差至百日成瘻其狀大如四五寸又廣三寸中生蜂作孔乃有數百治法以石硫黄隨多少然燭燒令汁出著瘡孔中須臾皮中見蜂數十唯蜂盡即差又療蚍蜉瘻發於頸初得如傷寒此因食中有蚍蜉毒不去其根在腎礜石主之防風為佐方白术四分知母雌黄乾地黄獨活青黛斑猫去首羽足熬白芷栢脂芍藥海藻一云海苔當歸各一分蝟皮四分炙椒一百粒去汗桃白皮一分正旦取右十五味𢷬下篩作散服一錢匕日三劉涓子古今録驗同又療蠐螬瘻發於頸無頭尾如棗核塊塊多在皮中使人寒熱心痛滿此因喜怒哭泣其根在心礬石主之白术為佐方白术一分礬石一分空青兩三分當歸二分細辛一分蝟肉炙枸把根斑猫去翅足熬地膽各一分熬乾烏腦三大豆右十味𢷬下篩散服方寸匕日三酢漿服之病在上側卧在下髙枕卧使藥流下劉涓子古今録驗同七曰浮疽瘻發於頸如兩指使人寒熱欲卧得之因思慮憂憶其根在膽地膽主之甘草為佐方雄黄一分乾薑一分龍膽二分一作龍骨石決明續㫁菴䕡根各分細辛二分大黄半分地膽一分熬右九味𢷬下篩為散傅瘡日四五忌生菜劉涓子同古今録驗無雄黄有硫黄餘同又療瘰􅊓瘻發於頸有根初苦痛厯厯覺之使人寒熱此得之新沐頭濕髻髮汗流入於頸其根在腎雌黄主之芍藥為佐方茯苓續㫁礬石燒令汁盡乾薑雌黄芍藥桔梗椒汗乾地黄常山空青狸肉烏腦并腎肝斑猫去翅足熬各一分附子一兩炮礜石二分燒半日虎指各一分一云虎腎右十七味𢷬篩為散蜜丸如大豆夜酒服十丸日三古今録驗同又療轉脈瘻發於頸如大豆浮在脈中濯濯脈轉苦驚惕身如振寒熱得之於驚卧失枕其根在小腸斑猫主之白芷為佐方緑青二分礬石半分燒半日防風一分甘草半分炙大黄二分桂心二分人參二分當歸二分升麻一分地膽一分熬白术一分鍾乳一分研斑猫一分去翅足熬白芷一分續㫁一分麝香一分麥門冬一分去心右十七味𢷬下篩蜜丸酒服如大豆十丸日三勿食倉米慎房百日劉涓子古今録驗同並出第二十四巻中崔氏療九種瘻方芫青二十枚去足翅熬地膽十枚去足羽熬斑猫三十枚準上生犀如棗核大屑豉四十九粒大豆黄一百枚生用牛黄棗核大蜈蚣一枚肥大者折取一寸半微火熬右八味𢷬篩蜜丸如梧子初欲服藥少夜食明旦飲服二丸須臾可煮酢漿薄粥稍稍冷飲之其瘻蟲有形狀皆從小便出至日西甚虚悶可煮湯飡蔓菁菜羮醬食之其餘脂膩醋脯一切口味五辛果子之類並不得食人強隔日一服人弱兩三日一服服藥以瘡差蟲盡為度若差仍作二十日許將息藥欲盡豫合勿使㫁絶藥氣不能將息便不須服救急千金同出第五巻中張文仲療䑕瘻方石南生地黄雌黄茯苓黄連各二兩右五味作散傅瘡日再備急同又療䑕瘻諸惡瘡方苦參三斤露蜂五兩麴二升右三味以水三斗漬藥三宿去滓黍米二升釀熟飲日三一方得蝟皮一具劉涓子同並出第五巻中備急劉涓子䑕瘻方山龜殻炙桂心雄黄乾薑狸骨炙甘草炙右六味等分𢷬篩為散飲服方寸匕日三蜜和内瘡中無不愈先灸作瘡後與藥良又方礬石三分燒斑猫一分去首足羽熬右二味𢷬下篩用酢漿服半匕須臾瘻蟲從小便出刪繁文仲同出第五卷中古今録驗療䑕瘻麝香塗方麝香研雌黄研右二味等分並為散取蝦蟇背白汁和塗瘡孔中日一度又療䑕瘻著頭生小者如杏大者如杯方斑猫一分去首足羽熬牡蠣二分熬海藻四分先去醎味右三味𢷬下篩酒服五分匕日三病當從小便出如魚胞忌蒜並出第四十一巻中諸瘻方一十五首劉涓子瘻腫病方斑猫四十枚去足翅熬桂心四分芫青十枚去足翅熬葛上亭長三十枚熬右四味𢷬下篩酒服半錢匕日一忌生葱又療瘻方斑猫四十枚去足羽熬地膽三十枚去首足翅熬蜥蝪三枚炙右三味𢷬之千杵蜜和如大豆服二丸又療瘻衆方不差効驗方牡蒙數兩右一味𢷬之湯和適寒温取一升許薄瘡上冷易經宿佳又療瘻生肉膏方桑薪灰三升水四升淋之復重淋之取三升石灰熬令黄内灰汁中以兩重帛裹絞去滓更魚目煎取二升勿用急火煎隨瘻孔深淺初時作服散而差孔若深四寸新藥與孔裏薤白使濡安藥薤白入藥孔裏若深四寸隨瘻根而灸兩處毎處與四十壯唯勿灸瘻孔隨深淺去膿散與膏安著瘡孔裏十五過少遷延日月取差肉滿膿亦㫁神良無比出第六巻中肘後論此本在諸方瘡條中病類既多今狀出為别一篇凡瘻病有䑕蛇蜂蛙蚓類似而小異皆從飲食中得其精氣入人肌體變化成形瘡既穿潰浸諸經脈則亦殺人而䑕蟻最多以其間近人故也通治諸瘻方以八月中多取斑猫蟲即内苦酒中半日許出暴乾使十取六七枚著銅器中微火上遥熬令熟𢷬作屑巴豆一粒去皮熬之又拔取黄犬背上毛二七枚亦熬作屑好朱以錢五分匕都合和以苦酒頓服之蟲當盡出若一服未効先時可預作三兩劑後日服逺不過三兩劑通按朱一作末又方虎薊根杜蘅枳根酸棗根各一把斑猫一枚一方云三分去頭足翅熬猫薊根各一把右六味𢷬蜜丸日一服如棗一枚以小丸著瘡中又方若先著下部邉或上出耳後頸項諸處者苦參切五升以苦酒一斗漬三四日宜服一升亦加之但多作以知為度不過三四度必差又療瘻方槲木皮長一尺闊六寸去黒皮細切以水一斗煮取五升去滓内白糖十挺煎取一升分三服以銅器接吐出看視之又方新生兒矢一百日以來皆收置蜜器中五十六十日取塗瘡孔中又方鯉魚腸切作五叚火上脱之洗瘡拭乾以腸封之冷即易自暮至旦乾止覺痒開看蟲出差崔氏療瘻方槲白皮切取五升右一味以水八升煮令泣泣絞去滓重煎令成膏日服半棗漸加至一棗許亦著瘡上無忌患瘡唯宜煮飯苜蓿鹽醬又不得多食之出第五巻中備急療瘻生肉膏方楝白皮二兩䑕肉二兩薤白三兩當歸四兩生地黄五兩右五味以臘月豬膏三升煎薤白黄色膏成傅瘡孔上令生肉肘後文仲同又葛氏云苦著口裏方楝木東引根切右一味水煮取濃汁含之數吐勿咽肘後同並出第五巻中備急療諸瘻方取葶􅐗子𢷬細羅取好白蜜和丸毎欲著藥先温泔洗著瘡孔中以丸内之若塞以物道開日三度瘡痛是差候勿停藥大効出第五巻中必効療諸瘻方先以泔清温洗以綿拭之取葵葉微火煖貼之引膿不過三二百葉膿盡出即肉生王丞頻用大奇効腋臭方三十七首病源人腋下臭如葱豉之氣者亦言如狐狸之氣者故謂之狐臭此皆血氣不和藴積故氣臭出第三十一巻中肘後療人體及腋下狀如狐􅀈氣世謂之胡臭方炊甑飯及熱丸以拭腋下臭仍與犬食之七日一如此即差文仲備急同又方煮雞子兩枚熟去殻及熱各内腋下冷弃之三路口勿反顧三為之文仲備急並同又方燒好礬石末絹囊盛之常以粉腋下不過十度小品集驗文仲備急同又方青木香二兩附子一兩礬石半兩燒白灰一兩半右四味細末著粉腋下汗出因以粉之亦差又方青木香一斤石灰半斤熬右二味常以粉身亦差並𢷬末傅之又方乾薑胡粉白灰等分右三味合作末粉之范汪同並出第五巻中千金療胡臭漏腋有天生胡臭有為人所染臭者天生者難療為人所染者易差然須三年傅白礬散勿止并服五香丸乃可得差勿言一度傅藥即差止可傅藥時暫得一度差耳凡胡臭人通忌食芸薹五辛療之終身不差胡臭方辛夷芎藭細辛杜蘅藁本各三分右五味㕮咀以苦酒漬之一宿煎三日取汁傅之以差為度小品集驗必効范汪同五香丸主口臭及身臭止腫痛散血氣方豆蔲子丁香藿香白芷青木香當歸桂心各一兩零陵香一兩甘菘香二分香附子二兩檳榔二枚右十一味𢷬下篩蜜丸如大豆日三夜一時含之咽津五日内口香十日身香二七日衣被香三七日下風人聞香四七日靜洗手水落地香五七日把他人手亦香禁五辛下氣去臭第一出第六卷中又石灰散主胡臭方青木香楓香丁香薫陸香各二兩陽起石橘皮各三兩礬石四兩燒石灰一升熬右八味𢷬下篩以綿作篆子麤如四指長四寸展取藥著上即以絹囊盛之繫著臂先以布拭揩令痛然後夾之又方水銀胡粉面脂研和傅之大驗救急同又方辛夷細辛芎藭青木香右四味等分𢷬下篩作散熏畢粉之又方伏龍肝作泥傅之良又方牛脂和胡粉三合煎令可丸塗腋下一宿即愈集驗同又方三年苦酒和石灰傅之又方赤銅屑以酢和銀器中炒極熱以布裹熨腋下冷復易差止又方附子炮石灰熬青木香三兩礬石三分燒米粉一升右五味𢷬篩常粉之又方馬齒草一束右一味𢷬碎以蜜和作團以紙裹之以泥糊紙厚半寸暴乾以火燒熟破取更以少許蜜和使熱勿令冷先以生布揩之夾藥腋下痛乆忍不能得然後以手中勒兩臂差出第二十五卷中崔氏療胡臭有効方先用泔清淨洗又用清酢漿水淨洗訖微揩使破取銅屑和醶酢熱揩之不過三四度差又方胡粉銅青右二味等分研以人乳和塗腋下若成瘡且停瘡差又塗以差為度出第四巻中張文仲療胡臭若股内隂下常汗濕且臭或作瘡者方但以胡粉一物粉之即差常用大驗備急同又隠居効驗胡臭方雞舌香藿香青木香胡粉各二両右四味𢷬散作粉綿褁内腋下常傅即差備急同出第七卷中救急療腋臭方銅屑一升石灰三升熬右二味合和囊盛粉之有汗便粉之又方甘草炙松根白皮甘𤓰子大棗各四分右四味為散食後服方寸匕日三出第三巻中又方雞矢白礬石熬令汁盡黄礬熬附子炮木蘭皮青木香各一大兩右六味𢷬為散粉之又石龍衣一大兩蛇蛻皮是也以子日夜半燒為灰服之又方常以鹽緑和醶酢塗之一遍一年再塗永除以胡粉和水銀和令相入塗腋下十日以來無氣出第八巻中又方黄礬細辛芎藭各二兩雄黄一兩右四味𢷬下篩為散先以泔清洗腋拔去毛令血出以粉腋下出第九卷中必効療腋臭方好􅔈砂二兩好白礬熬蜜陀僧各三兩酢酪二兩胡粉二分金屑八分鈆錫生銅屑各二分右八味並研令細酢一升新銅器中盛藥密封其口二七日看上青緑色鬱鬱然其藥即成還須研令極細至用時若乾更以好酢和藥以塗病處若有毛先拔去以石灰水淨洗拭使乾以生布揩令微赤可作瘡一日一塗洗逺不過十日即待腋瘡差訖更取銅屑細研成粉粉病處日五六即止病差終身不得帶麝香食胡荽又方取五月五日承露百草隂乾火燒為灰用井華水和灰為團重火鍊如燂灰色鍊訖即以醶酢和為餅厚如掌大小徑二寸以來即於兩腋下挾即易夾時一身連頭並悶二日後若病不差復著藥微發亦不甚臭還依法療之永㫁又金錯屑塗法金錯屑一銖銀錯屑一兩赤銅屑香附子胡粉錢錯屑各一兩三年醋三升右七味以羊酪一升於銅器中煮得二沸以用塗之又方三年醶酢二升碎銅一斤鹽半合灰二合右四味浸藥攪藥色青即塗腋下日三四塗三日小愈一月全差又方大銅錢二七文白梅二七箇鹽一升右三味以五月五日水一升共置瓶子裹掛户上百日畢可取用塗不得婦人為塗藥食粘食蒜發又方以酢五合内銅器中以錢十四文胡粉五銖置中泥頭七日後以粉十銖和之訖去腋下毛日再傅之合藥勿令人見秘之又方以首子男兒乳汁浸鹽研銅青拔去毛使血出塗差又方醶醋浸青木香置腋下夾之即愈又方錢三七文胡粉三兩馬齒草粗莖三兩青木香二兩大酢半升右五味切先以醋漬錢五六日然後總漬諸藥一物煮五六沸置垍器中先以石灰汁洗病處拭乾訖塗之以差為度並出第三巻中古今録驗療胡臭青羊脂粉方胡粉銅青等分右二味先以鹽湯洗兩腋下及著藥且淋洗又以青羊脂和傅數日差又錢汁𫝊方錢二七文右以礦石磨令平以夾腋下神良范汪同並出第三十巻中漏腋方三首病源腋下常濕仍臭生瘡謂之漏腋此亦是氣血不和為風邪所搏津液藴瘀故令濕臭出第三十一巻中集驗療漏腋腋下及足心手掌隂下股裏常如汗濕致臭六物胡粉傅方乾枸杞根半兩胡粉一兩乾商陸根一兩滑石一兩乾薔薇根半兩甘草半兩炙右藥𢷬下篩以苦酒和塗腋下當微汗出易衣復塗著藥不過三傅便愈或更發復塗之不可多傅傷人腋餘處亦塗之小品文仲備急范汪同出第九卷中經心録漏腋方正朝旦以小便洗文仲備急集驗小品范汪千金同又方𢷬馬齒草腋下夾之令燥後復易之先用雌黄石灰等分合水煎一兩沸如泥泥之毛落然後塗諸藥良並出第五卷中七孔臭氣方三首千金療面目口齒七孔臭方沉香五兩甘草二兩炙白𤓰瓣半升芎藭二兩丁香五兩藁本二兩麝香二兩當歸二兩右八味𢷬下篩蜜丸食後含如小豆五粒日三秘不𫝊乆服令人舉體皆香救急同出第六巻中救急療人七孔臭氣方甘草五分炙芎藭四分白芷三分右三味作散下篩食後飲服方寸匕日三又方𤓰子仁一分芎藭藁本當歸杜蘅各一兩細辛二分防風一分右七味𢷬下篩食後温水服方寸匕日三令人體香方四首肘後令人體香方白芷薫草杜若杜蘅藁本等分右五味末之蜜和旦服如梧子三丸暮服四丸三十日足下悉香文仲備急范汪同又方甘草炙𤓰子大􅀥松根皮等分右四味𢷬下篩食後服方寸匕日三二十日覺効五十日身體並香百日衣服床幃悉香文仲備急范汪千金同又方𤓰子仁芎藭藁本當歸杜蘅細辛各二分白芷桂心各五分甘草二分炙右九味𢷬下篩食後服方寸匕日三五日口香二十日肉香文仲備急同出第五卷中千金療諸身體臭方竹葉十兩桃白皮四兩右二味以水一石二斗煮取五斗浴即香出第六巻中雜療汗出不止方一十首集驗療止汗粉藥方牡蠣二兩熬附子半兩炮麻黄根二兩右三味𢷬篩以白粉一升和合粉汗汗止忌豬肉又汗後遂漏不止其人惡風小便難四肢微急難以屈伸桂枝加附子湯方大棗十三枚擘附子一枚炮桂心三兩芍藥三兩生薑三兩甘草二兩炙右六味切以水七升煮取三升温服一升延年同此夲張仲景傷寒論方千金止汗方青松葉一斤右一味𢷬令汁出清酒一升漬二宿近火一宿初服半升漸至一升頭面汗即止出第八卷中延年澤瀉湯療大虚煩躁止汗治氣方澤㵼茯苓各二兩牡蠣熬白术各兩生薑半升右五味切以水八升煮取二升分服一升日再服又都梁散療汗出如水及汗出衂血吐血小便血殆死方都梁香二兩紫菀人參青竹茹蓯蓉各一兩乾地黄二兩熬令燥右六味𢷬下篩水服方寸匕不効須臾再服忌蕪荑又療大病之後虚汗不可止方杜仲牡蠣等分熬右二味𢷬下篩向暮卧以水服一錢匕午前汗止者不再服服之令人乾燥若汗不止者復服一錢不過再必愈有驗天行及百病後虚吸漏汗遂服之無不止者又療大病後虚汗出不禁者方粢粉豉等分焦炒故竹扇如手掌大燒取灰右三味合𢷬以絹囊盛粉體立止最驗當先熬末粉之千金並同又粉散療大病後身體虚腫汗出止汗方麻黄根三兩防風乾薑細辛各二兩白歛一兩右五味合下篩以粢粉五升熬令黄合和以粉身出第十一巻中古今録驗療汗出不止术桂散方麻黄桂心各五分白术附子炮菖蒲各三分右五味𢷬末酒服方寸匕日三未食服又止汗熱雷丸散方雷丸桂心牡蠣各五分熬右三味𢷬下篩粉身日三出第二十六巻中外臺祕要方巻二十三
