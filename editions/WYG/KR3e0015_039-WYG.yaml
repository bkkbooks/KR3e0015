body:
  text: 外臺秘要方卷三十五唐王燾撰小兒方序例論一首千金論曰夫生民之道莫不以養小為大若無小卒不成大故易稱積小以成高大詩有厥初生民𫝊云聲子生隠公此之一義即是從微至著自少及長人情共見不待經史故今斯方先婦人小兒後丈夫耆老者則是崇本之義也小兒氣勢微弱醫人欲留心救療立功差難今之學者多不存意良由嬰兒在於襁褓之内乳氣腥臊醫者操行英雄詎肯瞻視静而言之可為太息者矣小品方云凡人年六嵗以上為小十六以上為少三十以上為壯五十以上為老其六嵗以下經所不載所以乳下嬰兒有病難療者皆為無所承據也中古有巫妨者立小兒顱􅇟經以占夭夀判疾病死生世相𫝊授始有小兒方焉逮于晉宋江左推諸蘓家𫝊習有驗流於人間齊有徐王者亦有小兒方三卷故今之學者頗得𫝊授然徐氏位望隆重何暇留心於少小詳其方意不甚深細小有可採未為至秘今􅀶撰諸家及自經用有効者為上下兩卷可披而尋之凡百居家皆宜達茲養小之術則無夭横之禍也出第五卷中小兒初生將䕶法一十七首崔氏療小兒初生便以綿褁指拭口中及舌上青泥惡血此為之玉銜一作衡若不急拭啼聲一發即入腹成百病矣又療兒生落地不作聲方取煖水一器灌之須臾自當啼又兒生不作聲者此由難産少氣故也可取兒臍帶向身却捋之令氣入腹仍呵之至百度啼聲自發又方以葱白徐徐鞭之即啼又方小兒初生即當舉之舉之遲晩則令中寒腹内雷鳴乃先浴之然後速斷臍不得以刀子割之須令人隔單衣物咬斷兼將暖氣呵七遍然後纒結所留臍帶當令長至兒足趺上短即中寒令兒腹中不調常下痢若先斷臍然後浴者則臍中水中水則發腹痛其臍斷訖連臍帶中若有蟲宜急剔撥去之不爾當入兒腹成疾矣又兒中水及中冷則令兒腹中絞痛夭糺啼呼面青黑此是中水之過兒尿清一云糞清者冷也與兒臍中水即同方當炙粉絮熨之不時治䕶臍至腫者當臍中隨輕重重者便灸之乃可至八九十壯若輕者臍不大腫但出汁時時啼呼者但𢷬當歸末和胡粉敷之仍炙絮日日熨之至百日乃愈以啼呼止為候又兒初生法宜用父故衣褁之若生女宜以母故衣勿用新帛切須依之令兒長夀又一晬之内兒衣皆須用故綿帛為之善兒衣綿帛特忌厚熱慎之慎之又兒洗浴斷臍訖䙀抱畢未可與朱蜜宜與甘草湯取甘草可中指一節搥碎以水二合煮取一合以綿纒沾取與兒吮之可得一蜆殻入腹止兒當快吐吐去心胷中惡汁也如得吐餘藥更不須與若不得吐可消息計如饑渇須臾復與之若前所服及更與並不得吐者但稍稍與之令盡此一合止得吐去惡汁令兒心神智慧無病也吮一合盡都不吐者是兒不含惡血耳勿復與之乃可與朱蜜以鎮心神安䰟􅅎也又小兒初生三日中須與朱蜜只不宜多多則令兒脾胃冷腹脹喜陰癎氣急變噤痓而死也與朱蜜法以真經飛鍊朱如大豆以赤蜜一蜆殻和之以綿纒沾取與兒吮之得三沾止一日令盡此一豆許可三日與之則用三豆許也亦勿過過此則傷兒與朱蜜訖可與牛黄如朱蜜多少也牛黄益肝膽除熱定精神止驚辟惡氣除小兒百病三日後應開腸胃助榖神可研米作厚飲如乳酪厚薄以大豆粒多與嗍之嗍三豆許止日三與之滿七日乃可與哺也又兒生十日始哺如棗核二十日倍之五十日如彈丸百日如棗若乳汁少不得依此法當用意少少増之若至二十日而哺者令兒無病兒若早哺之及多者令兒頭面身體喜生瘡愈而復發令兒尫弱難長乳兒不用太飽飽則令吐候兒吐者乳大飽也當以空乳乳之即消夏不去熱乳令兒嘔逆冬不去寒乳令兒欬痢乳母妳兒當先以手按散其熱氣勿令乳汁奔出以令兒噎如噎即便奪其乳令得氣息定復乳之如是十反五反視兒饑飽以節度之一日之中幾乳而足以為常準又常捉去宿乳也乳母與兒卧當以臂與兒枕之使乳與兒頭平乃可乳之令兒不噎母欲睡即奪去其乳勿令填兒鼻口乳不知饑飽忌之又兒初生著口噤不開不收乳方赤足蜈蚣半枚去足炙令焦末研之絹篩以猪乳二合和之分三四服與之差又兒著口噤體熱者方煖竹瀝二合分四五服之又兒新生慎不可逆灸灸之忍痛動其五脉因喜成癎是以田舍小兒任其自然皆無此夭也又兒初生有鵝口者其舌上有白屑如米劇者􅈹外亦有療之法以髮纒筋頭沾井花水撩拭之三旦如此便去不者可煑栗荴汁令濃以綿纒筋頭沾拭之無栗荴煑栗木皮如井花水法千金同並出第十上卷中文仲療兒生有連舌舌下有膜如石榴子中隔連其舌下漸漸喜令兒聲不發不轉法以𤓰摘斷之微有血出無害若血出不止可燒髮作末以敷之即止千金同又兒初生六七日後血氣收斂成肉則口舌喉頰裏清浄也若喉裏舌上有物如蘆蘀盛水狀者若懸癕有脹起者以綿纒長針留刃處如粟米許大以刺決之令氣洩去青黄赤血汁也一刺之止消息一日若不消又刺之不過三刺自消或餘小小未消三刺之亦止自然消也有著舌下如此者名重舌有著頰裏及上腭如此者名重腭有著齒齗上者名重齗皆刺之去血汁差止千金同又療兒初生出腹骨肉未斂肌肉猶是血也血凝乃堅成肌肉耳其血阻一作沮敗不成肌肉則使面目繞鼻口左右悉黄而啼一作不啼閉目聚口撮面口中乾燥四肢不能伸縮者皆是血脉不斂也喜不育如此者宜與龍膽湯方在客忤部中十味者是也千金同兒初生將息法二首千金兒初生不可令衣過厚熱令兒傷皮膚害血脉發雜瘡而黄又小兒始生肌膚未成不可暖衣暖衣則令筋骨緩弱宜時見風日若都不見風日則令肌膚脆軟便易中傷皆當以故絮衣之勿用新綿也天和暖無風之時令母將於日中嬉戲數見風日則血凝氣剛肌肉牢宻堪耐風寒不致疾病若常藏於幃帳之中重衣温暖譬猶陰地之草木不見風日軟脆不堪風寒也出第五卷中小兒初受氣論一首崔氏論曰凡小兒初受氣在娠一月結胚二月作胎三月有血脉四月形體成五月能動六月筋骨立七月毛髮生八月藏腑具九月穀氣入胃十月百神能備而生矣生後六十日目瞳子成始笑應知人百五十日百脉生能反覆百八十日尻骨成能獨坐二百一十日掌骨成能匍匐三百日髕骨成能獨倚三百六十日為一朞膝骨成乃能行此其定法若有不依期者必有不平之處小兒變蒸論二首崔氏小兒生三十二日一變六十四日再變兼蒸九十六日三變百二十八日四變又蒸百六十日五變百九十二日六變又蒸二百二十四日七變二百五十六日八變又蒸二百八十八日九變三百二十日十變又蒸此小變蒸畢也後六十四日又蒸蒸後六十四日又一大蒸蒸後百二十八日又一大蒸此大小蒸都畢也凡五百七十六日乃成人所以變蒸者皆是榮其血脉改其五藏故一變畢輒覺情態忽有異也其變蒸之候令身熱脉亂汗出目睛不明微似欲驚不乳哺上脣頭小白泡起如珠子耳冷尻亦冷此其診也單變小㣲兼蒸小劇先期四五日便發發後亦四五日歇凡蒸平者五日而衰逺至七日九日而衰當變蒸之時慎不可療及灸刺但和視之若良久熱不已可微與紫丸熱歇便止若於變蒸中加以天行温病或非變蒸而得天行者其診皆相似唯耳及尻通熱口上無白泡耳當先服黑散以發其汗汗出温粉粉之熱當歇便就差若猶不都除乃與紫丸下之其間節度甚多恐悠悠不能備行今略䟽其經要者如此又黒散方麻黄一分去節大黄一分杏仁二分去皮尖熬令變色右三味先𢷬麻黄大黄為散杏仁别𢷬如脂乃細細内散又𢷬令調和訖内宻器中一月兒服如小豆大一枚以乳汁和服之抱令得汗汗出温粉粉之勿使見風百日兒服如棗核以兒大小量之為度又紫丸方代赭赤石脂各一兩巴豆三十枚去心皮熬杏仁五十枚去尖皮熬右四味𢷬代赭等二味為末巴豆杏仁别𢷬如膏又内二味合𢷬三千杵自相和若硬入少蜜更𢷬宻器中盛封之三十日兒服如麻子一丸與少乳汁令下喉食頃後與少乳勿令多至日中當小下熱除若未全除明旦更與一丸百日兒服如小豆一丸以此準量増減也小兒夏月多熱喜令發疹二三十日輒一服甚佳此丸無所不治代赭須真者若不真以左顧牡蠣代之忌豬肉蘆笋並出第十上卷中相兒命長短法並論二十九首千金翼兒生枕骨不成者能言而死膝骨不成者能倨而死掌骨不成者能匍匐而死踵骨不成者能行而死臏骨不成者能立而死身肉不收者死魚口者死股間無生肉者死頥下破者死陰不起者死囊下白者死赤者死相法甚博略述十數條而已兒初生陰大而與身色同者成人兒初生額上有旋毛早貴妨父母兒初生呌聲連延相屬者夀聲絶而復揚急者不夀兒初生汗血者多厄不夀兒初生目視不正數動者大非佳人兒初生自開目者不成人兒初生通身軟弱如無骨者不成人兒初生髮稀少者不聽人兒初生臍小者不夀兒初生早坐早行早語早齒生惡性者非佳人兒初生頭四破者不成人兒初生頭毛不周匝者不成人啼聲散不成人啼聲深不成人汗不流不成人小便凝如脂膏不成人常摇手足者不成人無此狀候者皆成人兒初生臍中無血者好卵下縫通達黒者夀鮮白長大者夀論曰兒三嵗以上十嵗以下觀其性氣髙下即可知其夭夀兒小時識悟通敏過人者多夭則項橐顔子之流是也小兒骨法成就威儀迴轉遲舒稍費人精神彫琢者夀其預知人意迴旋敏速者亦夭則楊脩孔融之徒是也由此觀之夭夀大略可知也亦由梅花早發不覩嵗寒甘菊晩榮終於年事是晩成就者夀之兆也並出第十一卷中小兒藏衣法五首崔氏凡藏兒衣法兒衣先以清水洗之勿令沙土草汚又以清酒洗之仍内錢一文在衣中盛於新瓶内以青綿褁之其瓶口上仍宻盖頭且置便宜處待滿三日然後依月吉地向陽髙燥之處入地三尺埋之瓶上土厚一尺七寸惟須牢築令兒長夀有智慧若藏衣不謹為豬狗所食者令兒癲狂蟲蟻食者令兒病惡瘡犬鳥食之令兒兵死近社廟傍者令兒見鬼近深水洿池令兒溺死近故竈傍令兒驚惕近井傍者令兒病聾盲棄道路街巷者令兒絶嗣無子當門户者令兒聲不出耳聾著水流下者令兒青盲棄於火裏者令兒生癘瘡著林木頭者令兒自絞死如此之忌皆須慎之又安産婦及藏衣天德月空法正月天徳在丁壬月空在丙二月天徳在坤庚月空在甲三月天徳在壬壬月空在丙四月天徳在辛庚月空在甲五月天徳在乾壬月空在丙六月天徳在甲庚月空在甲七月天徳在癸壬月空在丙八月天徳在艮庚月空在甲九月天徳在丙壬月空在丙十月天徳在乙庚月空在甲十一月天徳在㢲壬月空在丙十二月天徳在庚庚月空在甲凡藏兒衣皆依此法天徳月空處埋之若有遇反支者宜以衣内新瓶盛密封塞口掛於宅外福徳之上向陽高燥之處待過月然後依法埋藏之大吉又法甲寅旬日十日不得藏埋兒衣以瓶盛密封安置空處度十日即藏埋之又法甲辰乙巳丙午丁未戊申此五日亦不藏兒衣還盛瓶中密塞勿令氣通掛著兒生處過此五日即埋之亦不得更過此日又法甲乙日生兒丙丁日藏衣吉丙丁日生兒戊巳日藏衣吉戊巳日生兒庚辛日藏衣吉庚辛日生兒壬癸日藏衣吉並出第十上卷中浴兒法一十一首崔氏初生浴兒良日此謂初生浴兒以後重浴亦吉寅夘酉日大吉壬午丁未癸巳日凶又浴兒虎頭骨湯主辟除惡氣兼令兒不驚不患諸瘡疥方虎頭骨五兩苦參四兩白芷三兩右三味切以水一斗煑為湯内猪膽汁少許適寒温以浴兒良又療兒若卒客忤中人吐下不乳哺面青黄色變弦急者以浴之方取錢七十文以水三斗煑令有味適寒温浴兒良又療兒生三日浴除瘡方桃根李根梅根各八兩右三味切以意著水多少煮令三四沸以浴兒又療少小卒寒熱不佳不能服藥六物莽草湯浴兒方莽草丹參蛇床子桂心各三兩菖蒲半斤雷丸一斤右六味㕮咀以水三斗煑三五沸適寒温浴兒避日向陰處又療少小身熱一物李葉湯方李葉無多少以水煑去滓以浴兒良忌準前又方白芷煎湯浴兒佳根苗皆得又方苦參湯浴兒良又凡尋常浴兒不縁别療諸病只就浴者方湯熟添少許清漿水一捻鹽浴兒浴訖以粉摩兒既不畏風又引散諸氣又兒不用數浴數浴多背冷令兒發癎其湯必適寒温得所又療少小壯熱不能服藥宜此十二物寒水石粉散方寒水石芒硝滑石石膏赤石脂青木香甘草炙大黄黄芩芎藭麻黄去節牡蠣熬右藥各等分𢷬篩以粉一升和藥屑三合復下篩以粉粉兒日三熱退即止本方有防風無牡蠣又少小盜汗三物黄連粉方黄連牡蠣熬貝母右藥各等分𢷬篩以粉粉兒良出第十上卷中剃兒頭法一首崔氏初剃兒頭良日寅丑日吉丁未日凶哺兒法三首崔氏初哺兒良日以平定成日大吉其哺不得令鹹又方寅丑辰巳酉日良又方男戊己日不得女丙丁日不得攘謝法一十二首崔氏軒轅者乾神天丞相使者風伯犯之令兒驚吐可取梨枝六寸埋生處大吉雷公者震神太陰使者天馬犯之令兒煩悶腹滿解之以三屠家肉為餅於産處謝之大吉咸池者坎神天之雨師使者犯之令兒啼不止用羊脯酒於生處謝之吉豐隆者艮神天之東明使者天僕也害氣犯之令兒乍寒乍熱大腹以白魚二枚於生處謝之又大豆一升投井中亦大吉招摇者坤神天上使者犯之令兒驚空嚼不止以酒餅生處謝之即愈天候者㢲神天一執法使者犯之令兒腹脹張眼以白魚二枚於生處謝之吉吳時者離神天一將軍遊擊使者犯之令兒驚腹痛用馬脯五寸於生處謝之吉又以白魚五枚并棗餅埋其生處吉大時者兌神小時北斗使者犯之令兒腹脹下痢解之以酒脯於生處謝之又以大豆一升投井中吉犯月殺者小兒驚啼用丹雄雞血於生處謝之吉犯白虎者用稻米一升雞子三枚於生處謝之吉黍米亦得犯大夫者用羊肝三枚及稻米一升於生處謝之吉又用雞羝羊皮黍米亦得犯日遊者令兒口噤色變欲死者用三屠家肉麥飰於生處謝之吉揀乳母法一首崔氏乳母者其血氣為乳汁也五情善惡悉血氣所生其乳兒者皆須性情和善形色不惡相貎稍通者若求全備不可得也但取不狐臭癭瘻氣嗽瘑疥癡瘙白秃癧痬瀋脣耳聾齆鼻癲癎無此等疾者便可飲兒師見其身上舊灸瘢即知其先有所疾切須慎耳小兒驚癎啼壯熱不喫妳吐不已不小便方五首劉氏療小兒眠睡不安驚啼不喫妳虎睛丸方小兒熱甚神効犀角十二分屑子芩五分梔子仁大黄各十分虎睛一枚研右五味𢷬篩蜜和如梧子大每服七丸大小量之妳母忌熱麵小兒熱風癎以乳汁或竹瀝研三丸服之漸増以差為度小兒百日以下蓐内壯熱以妳汁研四丸與服即差又療小兒初生不喫妳方以乳兩合葱白一寸和煎一兩沸去葱與喫即能喫乳立効以蛤蜅灌之又療小兒喫妳不穏三日至七日以來覺壯熱顔色赤及鼻孔黄即恐作撮口及孩子牙闗裏有蟲似蝸牛亦似黄頭白蜯螺者方燒竹取瀝半合和少許牛黄與喫即差又以豬肉拭口即引蟲出或自消便差又療小兒初生吐不止方人乳二合蘧蒢茂少許鹽兩粟米大右三味煎三兩沸牛黄兩米許研和與服即差止又小兒初生不小便方人乳四合葱白一寸右二味相和煎分為四服即小便利神効小兒將息衣裳厚薄致生諸癎及諸疾方並灸法二十八首廣濟療小兒驚癎體羸不堪療子母五癎煎方鈎藤二分知母子芩各四分甘草炙升麻沙參各三分寒水石蚱蟬一枚去翅炙蜣蜋三枚炙右九味𢷬篩以好蜜和薄泔著銅鉢於沸湯上調之攪不停手如飴糖煎成稍稍别出少許一日兒噉之一枚棗核大日夜五六過服不妨五六日兒噉之三枚一百日兒噉四枚二百日兒至三百日兒噉五枚三嵗兒噉七枚以意量之小品云𤣥中記曰天下有女鳥一名姑獲又名鈎星鬼也喜以陰雨夜過飛鳴徘徊人村里喚得來也是鳥純雌無雄不産喜落毛羽於中庭置入兒衣中便使兒作癎必死即化為其兒也是以小兒生至十嵗衣裳不可露七八月猶忌之千金夫癎病小兒之惡病也或有不及求醫而致困者然氣發於内必先有候常宜審察其精神而採其候也手白肉魚際脉黑者是癎候魚際脉赤者熱脉青大者寒青細者為平也又鼻口乾燥大小便不利是癎候又眼不明上視喜陽是癎候又耳後完骨上有青絡盛卧不静是癎候脉青大刺之令血出又小兒髮逆上啼哭面暗色不變是癎候又鼻口青時小驚是癎候又意氣下而妄怒是癎候又身熱小便難是癎候又吐痢不止厥痛時起是癎候又身熱目時直視是癎候又目閉青時小驚是癎候又咽乳不利是癎候又身熱頭常汗出是癎候又目瞳子卒大黑於常時是癎候又身熱吐哯而喘是癎候又喜欠目上視是癎候又卧惕惕而驚手足振摇是癎候又身熱目視不精是癎候又卧夢笑手足動摇是癎候又㺯舌摇頭是癎候以上諸候二十條皆癎之初也見其候便當𤓰其陽脉所應灸𤓰之皆重手令兒驟啼及足脉絶亦依方與湯又直視瞳子動腹滿轉鳴下血身熱口噤不得乳反張脊强汗出發熱為卧不寤手足瘈瘲喜驚凢八候癎之劇也如此非復湯𤓰所能救便當時灸之妙又小兒驚啼眠中四肢掣動變蒸未解慎不可針灸爪之動其百脉仍因驚成癎也惟陰癎噤痓可針灸爪之凡灸癎當先下兒使虚乃承虚灸之未下有實而灸者氣逼前後不通殺人也又癎平旦發者在足少陽黄昏發者在足太陰日中發者在足太陽夜半發者在足少陰人定發者在足陽明晨朝發者在足厥陰右癎發時節病所在視其發早晩灸其所也又五藏之癎六畜之癎或在四肢或在腹内審察其候隨病所在灸之雖少必差若失其要則為害也肝癎之為病面青目反視手足摇灸陽明太陰各三炷心癎之為病面赤心下有熱短氣息微數灸心下第二肋端宛宛中此為巨闕也又灸手心主及少陰各三炷脾癎之為病面黄腹大泄痢灸胃管三壯俠胃管傍各二壯足陽明太陰各二炷肺癎之為病面目白口沫出灸肝俞二壯又灸太陰二炷腎癎之為病面黑目正直視不摇如尸狀灸心下二寸二分三壯又灸肘下動脉各二壯膈癎之為病目反四肢不舉灸風府又灸頂上鼻人中下脣承漿皆隨年壯腸癎之為病不動摇灸兩承山又灸足心兩手勞宫又灸兩耳後完骨各隨年壯又灸臍中可五十壯右五藏癎證候又馬癎之為病張口摇頭馬鳴欲反折灸項風府臍中三壯病在腹中燒馬蹄末服牛癎之為病目正直視腹脹灸鳩尾上及大椎各三壯燒牛蹄灰末服雞癎之為病延頸反折喜驚自摇灸足諸陽各三壯羊癎之為病喜揚目吐舌灸大椎上三壯豬癎之為病喜吐沫灸完骨兩傍各一寸七壯大癎之為病手屈拳攣灸兩手心一壯灸足太陽各一壯灸肋戸兩聊頭兩穴各一壯良右六畜癎證候凡諸反張大人脊下容側手小兒容三指者不可療也又若目反上視瞳子動當灸􅇟中取之法橫度口盡兩吻際又橫度鼻下亦盡兩邊折去􅈹度半都合口為度從額上髮際上行度之灸度頭一處正在􅇟上未合骨中隨手動者是此最要處也次灸當額上入髮際二分許直望鼻為正也次灸其兩邊當目瞳子直上入髮際二分許次灸頂上廻毛中次灸客主人穴在眉後際動脉是也次灸兩耳門當耳開口則骨解開動張陷中是也次灸兩耳上捲耳取之一法當捲耳上頭是也大人當耳上橫三指小小兒各自取其指也次灸兩耳後完骨上青脉亦可以針刺令血出次灸玉枕項後高骨是也次灸兩風池穴在項後兩轅筋外髮際陷中是也次灸風府當項中髮際亦可與風池三處高下相等次灸頭兩􅊁兩􅊁當廻毛兩邉起骨是也右頭部凡二十九處兒生十日可灸三壯三十日灸五壯五十日灸七壯病重者具灸之輕者唯灸􅇟中風池玉枕也艾使熟炷令平正著肉火勢乃至病所也艾若生炷不平正不著肉徒灸多炷無益也又若腹滿短氣轉鳴灸肺募穴在兩乳上第二肋間宛宛中垂繩取之當瞳子是也次灸膻中次灸胸堂次灸臍中次灸薜息穴薜息在兩乳下第一肋間宛宛中是也次灸巨闕穴巨闕大人鳩尾下一寸小兒去臍作六分分之去心鳩尾下一寸是也并灸兩邊次灸胃管次灸金門穴金門在穀道前囊之後當中央是也從陰囊下度至大孔前中分之右腹部一十二處胷堂巨闕胃管十日兒三炷一月以上可五炷陰下縫三炷或云隨年壯以灸之又若脊强反張灸大椎并灸諸藏俞及督脊上當中央從大椎度至窮骨中屈更從大椎度之灸度下頭是督脊也右背部一十二處十日兒灸三壯一月以上灸五壯又若手足掣瘲驚者灸尺澤次灸陽明次灸少商次灸勞宫次灸心主次灸合谷次灸三間穴次灸少陽右手部一十六處其要者陽明少陽心主尺澤合谷少商也壯數如上又灸伏免次灸三里次灸腓腸次灸鹿溪次灸陽明次灸少陽次灸然谷右足部一十四處皆要可灸如上壯數手足陽明謂人四指凡小兒驚癎皆灸之若風病大動手足掣瘲者盡灸手足十指端又灸本節後又論曰若病家始發便來告師師可診候所解為法作次序療之以其節度首尾取差也病家已經雜療無次序不得制病病則變異其本候後師便不知其前證虚實直依其後證作療亦不得差也要應精問察之為前師貫者所配依取其前蹤續以為療乃無逆耳前師處湯本應數劑乃差而病家服一兩劑求効便謂不驗已後更問他師師不尋前人為療寒温次序而更為療而不依次前師療則斃也或前已下之後須平和療以接之而得差也或前人未下之或不去者或前療寒温失度後人應調理之是為療敗病皆須邀射之然後免耳不依次第及不審察必反重斃也又茵芋丸療少小有風癎疹至長不除或遇天陰節變便發動食飲堅强亦發百脉攣縮行步不正言語不便者服之不發方茵芋炙鈆丹熬鈎藤炙杜蘅防葵石膏研秦芁各四分菖蒲黄芩各六分松蘿二分蜣蜋十枚炙甘草十四分炙右十二味𢷬篩丸如小豆三嵗以下服五丸三嵗以上服七丸五嵗以上服十丸十嵗可至十五丸大小量之又神農本草經説小兒驚癎有一百二十種其證候微異於常便是癎候也初出胎血脉不斂五藏未成稍將養失宜即為病也時不成人其經變蒸之後有病餘證並寛唯中風最暴卒也又小兒四肢不好驚掣氣息小異欲作癎又凡小兒不能乳哺當與紫丸下之小兒始生生氣尚盛但有微惡則須下之必無所損及其愈病則致深益及變蒸日滿不解者並宜龍膽湯也方在客忤中若不時下則成大病病成則難療矣凡下四味紫丸最善雖下不損人足以去疾若四味紫丸不得下者以赤丸下之赤丸不下當倍之若已下而有餘熱不盡當按方作龍膽湯稍稍服之并摩赤膏風癎亦當下之後以豬心湯下之驚癎但按圖炙之及摩膏不可大下也何者驚癎心氣不定下之内虚益令甚耳驚癎甚者特為難治如養小兒嘗慎驚勿令兒聞大聲抱持之間當安徐勿令怖也又天雷時便掩塞兒耳并作餘細聲以亂之凡養小兒皆微驚以長血脉但不欲大驚大驚乃灸驚脉若五六十日灸者驚復重甚生百日後灸驚脉乃善治少小心腹熱除熱丹參赤膏方丹參雷丸芒硝戎鹽大黄各三兩右五味切以苦酒半升浸四種一宿以成鍊豬脂一斤煎三上三下去滓内芒硝膏成以摩心下冬夏可用一方但丹參雷丸亦佳並出第五卷中千金翼凡小兒之癎有三種有風癎有驚癎有食癎然風癎驚癎時時有耳十人之中未有一二是食癎者凡是先寒後熱發癎者皆是食癎也驚癎當按圖灸之風癎當與豚心湯下之食癎當下乃愈紫丸佳凡小兒所以得風者縁衣暖汗出風因而入也風癎者初得之時先屈指如數乃發作此風癎也驚癎者起於驚怖先啼乃發作此驚癎也驚癎微者急療勿復驚之或自止也其先不哺乳吐變熱後發癎此食癎也早治則差四味紫丸逐澼飲最良去病速而不虚人赤丸差駛病重者當用之小兒衣甚寒薄則腹中乳食不消其大便皆酢臭此欲為癖之漸也便將紫丸以微消之服法先從小起常令大便稀勿使大下也稀後便漸減之屎不酢臭乃止藥又凡小兒冬月下無所畏夏月下難差然有病者不可不下後腹中當小脹滿故當節哺乳將紫丸數日又乳哺小兒常令多少有常劑兒漸大當稍稍增之若減少者此腹中已有小不調也便微服藥停哺但與乳甚者十許日微者五六日止哺自當如常若不肯哺而欲乳者此是癖為重要當下之無不差者不下則致寒熱或反吐而發癎或更致下痢此皆病重不早下之所為也此為難療又凡小兒有熱不欲哺乳卧不安又數驚此癎之初也服紫丸便愈不差更服之兒立夏後有病療之慎勿妄灸不欲吐下但以除熱湯浴之除熱散粉之除熱赤膏摩之又臍中以膏塗之令兒在涼處勿禁水漿常以新水飲之又凡小兒屎黃而臭者此腹中有熱宜微將服龍膽湯若白而酢者此寒不消也當服紫丸微者少與藥令内消甚者小増令小下皆須節乳哺數日令胃氣平和若不節乳哺則病易復復下之則傷其胃氣令腹脹滿再三下之尚可過此傷矣並出第十一卷中備急療少小百二十種癎病胷中病蛇蛻皮湯方蛇蛻皮三寸炙細辛甘草炙鈎藤黄芪各二分大黄四分蚱蟬四枚炙牛黄五大豆許右八味切以水二升半煑取一升一合百日兒一服二合甚良窮地無藥物可一二味亦合不可備用然大黄一味不得常用效又療少小二十五癎大黄湯方甘草炙大黄甘皮當歸各一兩細辛半兩右五味𢷬篩以指撮著水一升煮取二合一嵗兒服一合日二古今録騐赤湯療二十五種癎吐痢寒熱百病不乳哺方大黄五兩當歸芍藥黄芩括樓甘草炙桂心人參赤石脂牡蠣􅆈紫石英麻黄去節各二兩右十二味𢷬篩令調盛以韋囊八嵗兒以乾棗五枚用水八合煮棗取五合兩指撮藥入湯中煮取三沸去滓與兒服之取利微汗自除十嵗用棗十枚三指撮藥水一升煮三沸服之此湯療小兒百病及癎神驗又療未滿月及出月兒壯熱發癎鈎藤湯方鈎藤一分蚱蟬一枚去翅柴胡升麻黄芩各二分蛇脫皮二寸炙甘草炙大黄各二分竹瀝三合石膏三分碎右十味切以水一升煮取三合半和竹瀝服一合得利見湯色出停後服至五十六十日兒一服一合乳母忌海藻菘菜等崔氏云若連發不醒加麻黄一分去節又療百日及過百日兒發癎連發不醒及胎中帶風體冷面青反張宜服麻黄五癎湯方麻黄去節羌活乾葛甘草炙枳實各二分炙杏仁二十枚升麻黄芩大黄各四分柴胡芍藥各三分鈎藤皮一分蛇蛻三寸炙蚱蟬二枚炙去羽石膏六分碎右十五味切以水二升并竹瀝五合煎取六合每服一合佳小兒驚悸方二首必効鈎藤湯療小兒壯熱時氣驚悸并熱瘡出方鈎藤人參蚱蟬炙子芩各一分蛇蛻皮三寸炙龍齒四分防風澤瀉各二分石膏一兩碎竹瀝三合右十味切以水二升并竹瀝煎取七合細細服之以差為度又方牛黄兩大豆許研蚱蟬炙各二分龍齒麥門冬去心各四分人參三分鈎藤一分茯神杏仁十二枚蛇蛻皮三寸炙末入右九味切以水二升煎取六合去滓下牛黄末分六服消息服之令盡差小兒夜啼方一十首小品療小兒夜啼一物前胡丸方前胡隨多少右一味𢷬篩蜜丸如大豆服一丸日三加至五六丸以差為度千金同又方以姙娠時食飲偏有所思者以哺兒則愈千金同千金療小兒夜啼不已醫所不治者方取狼糞中骨燒作灰水服如黍米粒一枚即定又療小兒夜啼至明不安寐芎藭散方芎藭防已白术各二分右三味𢷬篩以乳和之與兒服之量多少又以兒母手掩臍中亦以摩兒頭及脊驗二十日兒未能服散者以乳汁和之服如麻子一丸又方交道中土伏龍肝各一把右二味以絹篩水和少許服之差又方取馬骨燒灰敷乳上飲兒啼即止並出第五巻中備急或常好啼方取犬頭下毛以絳囊盛擊兒兩手立効必効小兒夜啼方以日未出時及日午時仰卧著於臍上橫文屏氣以朱書作血字其夜即斷聲効古今録驗小兒夜啼如腹痛方䗪蟲熬令煙盡芍藥炙芎藭熬各等分右三味𢷬末服如刀圭日三以乳服之又療小兒夜啼不止腹中痛宜以乳頭散方黄芪甘草炙當歸芍藥附子炮乾薑各等分右六味為散以乳頭飲兒丸可胡豆三丸大小量之小兒驚夜啼方七首廣濟療小兒五驚夜啼龍角丸方龍􅊁黄芩大黄各二分牡丹皮一分蚱蟬一枚炙牛黄小豆大五枚右六味𢷬篩蜜和丸如麻子少小以意増減之甚良千金牡丹作牡礪崔氏名五驚丸千金療小兒驚啼方以雞屎白熬末以乳服少許又方以臘月縛猪繩燒灰服之又方燒猬皮三寸灰著乳頭飲兒又方車轄脂如小豆許内口中及臍中差又小兒因宿乳不消腹痛驚啼牛黄丸方大附子三枚炮去皮牛黄三銖巴豆去心皮熬杏仁去尖皮真珠各一兩研右五味𢷬附子真珠下篩别𢷬巴豆杏仁合如膏内附子及牛黄𢷬一千二百杵若乾入少蜜足之百日兒服如粟米一丸三嵗兒服如麻子一丸五六嵗兒服如胡豆一丸日二先乳哺了服之隔上下悉當微轉藥完出者病愈散出者更服並出第五卷中文仲隠居効方小兒夜啼不安此腹痛故至夜輙劇狀似鬼禍五味子湯方五味子當歸芍藥白术各四分甘草炙桂心各二分右六味切以水一升煎取五合分服之增減量之小兒客忤一十首千金論曰少小所以有客忤病者是外人來氣息忤之一名中人為客忤也雖是家人或别房異戸或乳母父母從外還衣服或經履鬼神麤惡暴氣或牛馬之氣皆為忤也發作喘息乳氣未定者皆為客忤其乳母遇醉及房勞後乳兒最劇能殺兒也不可不慎又論曰凡中客之為病皆頻吐下青黄白色水穀解離腹痛夭糾面色變易其候似癎但眼不上挿耳其脉急數者是也宜與龍膽湯下之又龍膽湯療嬰兒出腹血脉盛實熱温壯四肢驚掣發熱大吐哯者若已能進哺中食不消壯熱及變蒸不解中客人魃氣并諸驚癎方悉主之小兒皆服之小兒龍膽湯第一此是新出腹嬰兒方若日月長大者以次依此為例若必知客忤及有魅氣者可加人參當歸各如龍膽秤分多少也一百日兒加半分二百日兒加一分一嵗兒加半兩餘藥皆準爾龍膽鈎藤皮柴胡黄芩桔梗芍藥茯神甘草炙各一分蜣蜋二分炙大黄右十味切以水一升煎取五合為劑也服之如後節度藥有虚實虚藥宜足數合水也兒生一日至七日分取一合為三服生八日至十五日分取一合半為三服生十六日至二十餘日至四十日者盡以五合為三服十嵗亦準此得下即止勿復服也又少小卒客忤不知人者方取新熱馬屎一枚絞取汁飲兒下便愈亦治中客忤而􅀈啼面青腹强者又少小見人來卒不佳腹中作聲者二物燒髮散方用向來者人頭生髮十莖斷兒衣帶少許合燒灰細末和乳飲兒即差又少小中忤人一物馬通浴湯方用馬通三升火燒令煙盡以酒一斗煮三沸去滓以浴兒即差又凡乘馬行還得汗氣臭又未盥洗易衣裝而便向兒邊令兒中馬客忤兒忽卒見馬來及聞馬鳴驚及馬上衣物馬氣皆令兒中馬汗氣及客忤慎䕶之特重一嵗兒也又凡非常人及諸物從外來亦驚小兒致病欲防之法諸有從外來人及有異物入戸當將兒迴避之勿令見也若不避者即燒牛糞令有煙氣置戸前則善又方吞麝香如大豆許立愈又療少小客忤二物黄土塗頭方以竈中黄土熟者曲蟮糞等分合𢷬如雞子黄大塗兒頭上及五心良一方雞子清和如泥又療小兒犯客忤發作有時方取母月衣覆兒上大良又療卒客忤方剪取驢前􅈩胛上旋毛大如彈丸以乳汁煎之令毛消藥成著乳頭飲之下喉即愈又療小兒卒客忤方銅鑑鼻燒令赤投少許酒中大兒飲之小兒不能飲者含與之即愈並出第五卷中小兒癥瘕癖方六首廣濟療少小及大人腹中宿食積成癥癖兩脅妨滿氣息喘急不能食面黄日漸瘦腹大脹硬除百病紫雙丸方代赭研丹砂研大黄各八分青木香當歸各五分桂心四分犀角三分屑巴豆六分右八味𢷬篩蜜和丸如梧子大人小兒量之十嵗兒服大豆二丸六嵗者小豆許二丸以下臨時斟酌要㵼病出為度久疾日一丸以溏洩而已不在猛㵼忌如常法又療小兒痃癖發腹痛不食黄瘦鼈甲丸方鼈甲炙郁李仁各八分防葵人參各五分訶黎勒皮七顆大黄四分桑菌三分右七味𢷬篩蜜丸大小量之以酒飲乳服五丸至十丸千金牛黄鼈甲丸療小兒癖實癰腫壯熱食不消化中惡忤氣方牛黄二分鼈甲炙麥麴熬柴胡大黄枳實炙芎藭各二兩厚朴炙茯苓桂心芍藥乾薑各半兩右十二味𢷬篩蜜丸如小豆日三服以意量之又療小兒心下生痞痰澼結聚腹大脹滿身體壯熱不欲哺乳芫花丸方芫花黄芩各四分大黄雄黄細研各十銖右四味𢷬篩為末蜜和更𢷬一千杵三嵗兒至一嵗以下服如粟米一丸欲服丸内兒喉中令母與乳若長服消病者當以意消息與服之與乳哺相避良又療小兒痰實結聚宿癖羸露瘦不能飲真珠丸方真珠半兩研麥門冬一兩去心蕤仁五十枚一云二百箇巴豆七枚去心皮熬一云四十枚右四味𢷬篩蜜和丸朞嵗兒服二丸小豆大二百日兒服如麻子二丸漸增以知為度當下病赤黄白黑葵汁勿絶藥病盡下自止久服令小兒肥白無病已試驗並出第五巻中劉氏療小兒冷癖痃癖氣不下食瘦時時肋下痛方防葵當歸枳實炙厚朴炙楮實人參黄芪茯神白术訶黎勒皮各八分郁李仁去皮柴胡大麻仁芍藥橘皮防風紫菀洗去土薏似仁各六分鼈甲炙三稜根各十二分桂心七分仙䑕二枚如無以糞二合代大附子二枚炮乾薑末二分甘草炙乾地黄各十分大黄十分五味子四分㯽榔四顆牛膝二分右三十味𢷬篩蜜丸如梧子大小増減以意量之須飲服之良小兒痰結方二首千金療少小宿食癖氣痰飲徃來寒熱不欲食消瘦芒硝紫丸方芒硝四分熬大黄四分半夏二兩洗代赭一兩甘遂二兩熬巴豆三百枚去心皮熬杏仁一百二十枚右七味𢷬篩别治巴豆杏仁令如膏𢷬數千杵令相和如强内少蜜百日兒服如胡豆十丸過百日至一嵗服二十丸隨兒大小以意節度之當候兒大便中藥出為愈若不出復與加初出第五卷中古今録驗療八嵗以上兒熱結痰實不能下食方大黄十二分柴胡九分黄芩知母各十二分升麻十分枳實炙杏仁各六分芍藥梔子各八分細辛二分半竹葉切一升右十一味切以水六升煮取一升八合分四服十嵗兒分三服以下以意消息多少量之千金有桔梗黄連無枳實杏仁小兒因食痞滿羸瘦不下食肚脹方四首小品療四五嵗兒因食及在胎中宿熱乳母飲食麤惡辛苦乳汁不起兒哺不為肌膚心腹痞滿痿黄瘦瘠四肢痿􅀢繚戾服之令充悦方芍藥十分炙令黃黄芪鼈甲炙人參各四分柴胡八分茯苓六分甘草炙乾薑各二分如熱以枳實代右八味𢷬篩蜜和為丸如大豆服五丸日二服忌如常法千金有大黄無黄芪云服一丸一嵗以上乳服三丸七嵗兒服十丸日二千金療少小傷寒久病不除差復劇羸瘦骨立五味子湯方五味子十銖大黄六銖芒硝五分麥門冬六分去心石膏一兩甘草炙當歸黄芩黄連前胡各一分右十味切以水三升煮取一升半服二合下利即止効又療小兒羸瘦惙惙常服不妨乳方甘草五兩炙右一味𢷬篩蜜丸如小豆一嵗兒服十丸日三盡即更合並出第五卷中劉氏療小兒肚脹漸瘦不食四肢熱不調方甘草炙鼈甲炙柴胡茯神子芩各六分訶黎勒皮十分㯽榔兼皮三顆研芍藥橘皮各三分生薑當歸各四分知母五分大黄八分右十三味切以水一升半煎取匕合分為數服得㵼病差小兒食不下及不消不嗜食方四首廣濟療小兒心腹滿喫食不下地黄飲子方生地黄汁三合生薑汁三合訶黎勒四分末白蜜一匙右四味相和調匀分温服之微利尤良小品療小兒宿食不消發熱九味當歸湯方當歸甘草炙芍藥人參桂心黄芩乾薑各一分大棗五枚大黄二分右藥切以水一升半煎取六合去滓分服千金療少小五六日不食氣逆桂心橘皮湯方桂心半兩橘皮三兩薤白切五合黍米五合人參半兩右五味切以水七升先煮藥取二升次下薤米米熟湯成稍稍服之又療少小胃氣不調不嗜食生肌肉地黄丸方乾地黄大黄各五分茯芩三分當歸柴胡杏仁各二分右六味末之以蜜丸如麻子大服五丸日三服並出第五卷中小兒霍亂方一十二首廣濟療小兒霍亂心腹刺痛吐痢方茯苓桔梗人參各六分白术五分甘草炙厚朴各四分炙右六味切以水二升煮取六合去滓温服之又療小兒霍亂嘔吐不止方人參六分厚朴三分炙陳倉米三合右三味切以水三升煮取七合去滓分服之千金療小兒吐痢霍亂方人參四分厚朴炙甘草各二分炙白术三分右四味切以水一升二合煑取五合六十日兒服一合百日兒分三服朞嵗兒分再服乳母忌油膩等備急療小兒霍亂吐痢方人參四分厚朴炙甘草各二分炙乾薑一分白术三分右五味切以水一升煮取四合分服之又療孩子霍亂已用有効方人參蘆籜各二分扁豆藤二兩倉米一撮右四味切以水一一升煮取八合分服又方人參四分生薑三分厚朴炙白术甘草炙各二分右五味切以水一升煮取四合分服又方人參四分木𤓰一枚倉米一撮右三味切以水煮分服以意量之立効必効主小兒霍亂方取厠屋戸簾燒灰研以飲服一錢匕又方訶黎勒一枚右一味先煎沸湯研一半許與兒服立止再服神妙古今録驗療小兒霍亂吐痢人參白术湯方人參六分白术茯芩各四分厚朴炙甘草炙各三分右五味切以水一升半煮取六合分温服立効劉氏療百日以來及蓐内兒霍亂方以人乳半合及生薑汁少許相和煎服入口定又療小兒霍亂方生薑四分香薷一兩薄荷一兩右三味以水煎分温兒與母俱服之甚良小兒霍亂雜病方六首劉氏療小兒霍亂空吐不痢方人參六分生薑四分厚朴二分炙橘皮一分兎骨一兩炙碎右五味切以水一升二合煎取四合服之即利下部又以杏仁鹽少許皂莢末少許麫和硬溲如棗核大以綿褁内之便通妳母忌熱麫大効又療小兒霍亂空利不吐方烏牛葹草一團生薑人參各三兩右三味切以甜不醋漿水一升半煎取五合分服之如孩子渴取曲蟮糞爛龍骨一兩以漿水煎澄清與兒喫即差又療小兒霍亂不吐不痢肚脹妨滿上下不通方甘草四分炙當歸二分石鹽三分右三味切以漿水一升半煎取六合去滓牛黄麝香各半錢匕研蜜半匙相和以下灌之即通妳母與漿水粥喫勿喫麵肉等又小兒乾霍渴熱及壯熱眼色慢四大困悶方以烏豆一升淨乾擇生薑一兩切以水三升煎烏豆皮欲爛即濾取汁二合和少許蜜喫即變吐如人行六七里又與喫無問大人小兒並與服之効又療小兒熱霍諸藥不差方以蘆葉二大兩糯米三大合水三升先煑葉入米煑取一升入蜜少許和服即差不足即取桑葉二升生薑半兩切以水三升煑取一升著一匙白米為飲服又療小兒霍亂吐痢不止方以人乳汁二合生薑汁粟米許荳蔲取仁碎似蕎麥大二七枚􅕋蒢一小把龍骨六分以乳煎取一合著少許牛黄麝香兎毛灰等和分為三服如渇以糯米汁著蜜與喫即差小兒吐痢方四首千金療小兒吐痢方以亂髮灰二分鹿􅊁一分作末以米飲服一刀圭日三又方以熱牛矢汁灌之又方燒特猪矢水解取汁少少飲兒劉氏療百日以下蓐内兒吐痢方麵一錢炒乳汁兩合龍骨六分右三味煎龍骨和炒麵服之即差小兒噦方二首備急療小兒噦方以生薑汁五合牛乳五合右二味合煎取五合分二服又方以羊乳一升煎減半分五服無用牛乳代之小兒口噤方四首千金療小兒口噤方以鹿􅊁粉之大豆末之等分和乳塗乳飲兒又方以驢乳二升猪乳一升合煎得一升半服如杏仁三四服差備急療小兒鵝口并噤方礬石燒末朱砂各半分末右二味和研令極細敷兒舌上日三以亂髮洗舌上垢頻頻令淨即差古今録驗療小兒噤其病在咽中如麻豆許令兒沫不能乳哺方取水銀如黍米與服覺病無早晩水銀下咽便愈以意量之不過小麻子許與可也小兒重舌方一十三首千金療小兒重舌方灸行間隨年壯穴在足大指岐中是又方取田中蜂房燒灰酒和薄喉下愈又方以竈中黄土末苦酒和塗舌上又方以赤小豆末和醋塗舌上又方取簸箕舌燒灰敷舌上又方黄蘗竹瀝漬取細細㸃舌上良又方兒重舌舌强不能收唾燒蛇脫末以雞毛蘸醋展藥掠舌下愈千金翼療小兒重舌方取三屠家肉各如指大以摩舌上兒立能乳便啼又方以衣魚燒作灰以敷舌上千金云衣魚塗舌上又方兒重舌舌强不收唾者鹿角末如小豆許著舌下數數與之又療小兒重舌口中瘡涎出至多方以蒲黄敷舌上不過三度愈古今録驗療兒重舌欲死方灸右足踝三壯立愈又炙左右並良千金云炙兩足外踝又方取亂髮燒灰末敷舌上甚佳小兒鵝口䴏口方六首千金療小兒心藏熱口為生瘡重舌鵝口方取柘根剉五升無根只以弓材佳右一味以水一斗煮取二升以汁更煎取五合細細拭齒數次良又方口生瘡白漫漫取桑木汁先以父髮拭口次以桑汁塗之又療小兒鵝口不能飲乳方取白鵝屎汁瀝口中良又方取黍米汁塗之又方取父母亂髮浄洗纒桃枝沾取井華水東向日以髮拭口中得口中白乳以置水中七過瀝洗三朝作之救急療小兒䴏口兩吻生瘡方取髮灰以猪脂和塗之千金同小兒口瘡方五首小品療小兒口爛瘡方取羊乳細細瀝口中不過三度差千金療小兒口瘡方大青三分黄連二分右二味切以水三升煮取一升二合一服一合日再夜一文仲支太醫療小兒口瘡方桑木白汁生地黄汁各一合赤蜜半合右三味和煖敷兒口中瘡便差救急療小兒口瘡方以蛇脫皮水漬令濕軟拭口内瘡一兩遍即差劉氏療小兒口瘡方黄蘗皮一兩切烏豆一升右二味以水二升煑取兩合去滓重煎如餳入少許龍腦香研和敷之甚良小兒口中涎出方三首千金療小兒口涎出方以白羊屎内口中差又方以東行牛口中沫塗兒口中及頥上又方桑白汁塗之差小兒舌上瘡脣腫方五首小品療小兒脣腫及口赤生白瘡爛方清旦研桑木白皮取汁以塗兒脣口即差又小兒舌上瘡方烏賊魚骨燒末以雞子黄和塗之至喉咽舌下遍敷即差止千金療小兒舌瘡方蜂房燒灰屋間塵各等分和先洗瘡使乾敷之効又方羊蹄骨中生髓和胡粉敷上日三取差又舌腫强滿口方滿口含糖醋少時熱氣通愈小兒咽喉生瘡方二首千金療熱病口爛咽喉生瘡水漿不得入者膏方當歸射干升麻各一兩附子半兩白蜜四合右五味切以猪膏四兩先煎之令成膏下著地勿令大熱内諸藥微火煎令附子色黄藥成去滓投蜜更上火一兩沸以器盛之取杏仁許含之日四五咽之無妨大人小兒並用妙又療口中瘡咽喉塞不利口燥膏方猪脂一斤黄連一兩白蜜一升右三味合煎令成膏去滓合半棗大日四五夜亦含之小兒喉痺方四首千金升麻湯主小兒喉痺痛若毒氣盛便咽塞並大人喉咽不利方生薑升麻射干各三兩橘皮一兩右四味切以水六升煎取二升分温三服又療小兒卒毒腫著喉頸壯熱妨乳方升麻射干大黄各一兩右三味切以水二升半煮取八合一嵗兒分三服餘滓敷腫處冷更煖而薄大兒以意加之又方煮桃皮汁三升服之又燒荆瀝汁服劉氏療小兒喉痺熱塞方升麻五兩切馬藺子一合右二味以水一升煎取二合入少白蜜與兒服之甚良小兒䁎耳方四首千金療小兒䁎耳方末石硫黄以粉耳中日一夜一差又療少小䁎耳方桃仁熟末以䜴許褁塞耳中古今録驗小兒聤耳方青羊屎暴乾以綿褁塞中即差又小兒聤耳有瘡及惡肉敷耳雄黄散方白麻措取皮一合花燕脂十願右二味𢷬篩細研敷耳中令滿一兩度差方無雄黄未詳其名小兒鼻塞方四首千金療小兒鼻塞不通濁涕出方杏仁二分椒出汗附子去皮細辛各一分右四味切以醋五合漬藥一宿明早以猪脂五合煎令附子色黄膏成去滓待冷塗絮導鼻孔中日再兼摩頂上又療小兒鼻塞生息肉方通草細辛各一兩右二味𢷬篩以綿纒如棗核大藥如豆著綿頭著鼻孔中日二古今録驗療小兒鼻塞不通細辛膏方細辛通草各一分辛夷仁一分半杏仁二分去皮右四味切以羊髓三合猪脂三合緩火煎之膏成絞去滓取一米粒許大以内鼻孔中頻易差劉氏療小兒鼻塞不通喫乳不得方醍醐三合青木香零陵香各四分右三味切和前成膏取少許以膏和撚為丸或以膏塗兒頭上及塞鼻中以通佳外臺秘要方卷三十五
