body:
  text: 外臺秘要方卷二唐王燾撰傷寒中風方九首臣億等按傷寒論傷寒中風自是兩疾今云傷寒中風非病源中風傷寒之狀太陽中風陽浮隂弱陽浮者熱自發隂弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔此其候也太陽中風以火刼發其汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身即發黄陽盛則欲衂隂虚小便難隂陽俱虚竭身體則枯燥但頭汗出劑頸而還腹滿㣲喘口乾咽爛㦯不大便久則譫語荒語也本作譫甚者至噦手足躁擾循衣摸牀小便利者其人可療陽明中風口苦而咽乾腹滿㣲喘發熱惡寒脉浮緊若下之則腹滿小便難陽明病若能食爲中風不能食爲中寒少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下之則悸而驚太隂中風四肢煩疼其脉陽㣲隂澀而長者爲欲愈少隂中風其脉陽微隂浮者爲欲愈厥隂中風其脉㣲浮者爲欲愈不浮為未愈仲景傷寒論同並出第七卷中仲景傷寒論桂枝湯療太陽中風陽浮隂弱陽浮者熱自發隂弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔方桂枝芍藥生薑各三兩甘草二兩炙大􅀥十二枚擘右五味切薑擘棗次切餘藥以水七升煮棗令爛去滓乃内諸藥水少者益之煑令微微沸得三升去滓服一升日三小兒以意減之初一服便得汗出者後服小小闊其間如不得汗者小小促之令其藥勢相及汗出自䕶如服六物青散法若病重者晝夜服特須避風若服一劑晬時不解病證不變者當更服之至有不肻汗出服二三劑乃愈服此藥食頃亦當飲熱粥以助藥力若初得病甚便以火發汗火氣太過汗出不解煩躁不得寐因此湯加龍骨牡蠣各三兩減桂心生薑各一兩不用芍藥若虚勞裏急腹中痛者取前桂枝湯二升加膠飴一升適寒温分再服若得大汗出者只用桂枝二兩發汗後重發汗亡陽譫語其脉反和者不死發汗已解半日許重發煩其脉浮數可復發汗宜桂枝湯方忌海藻生葱菘菜等在上出第二卷中千金胡洽集驗文仲備急范汪同又療傷寒頭疼腰痛身體骨節疼發熱惡風汗不出而喘麻黄湯方麻黄三兩去節桂心二兩甘草炙一兩杏仁七十枚去皮尖雙仁碎右四味切以水九升煮麻黄減二升去上沫内諸藥煑取二升半去滓服八合覆取微汗不須歠粥餘如桂枝法將息忌海藻菘菜生葱臣億等按張仲景傷寒論麻黄湯惟主傷寒不主中風若中風但可服前桂枝湯又療太陽病項背強兀兀反汗不出惡風者屬葛根湯方葛根四兩麻黄四兩去節甘草二兩炙芍藥桂心各二兩生薑三兩大􅀥十二枚擘右七味切以水一斗煑麻黄葛根減二升去上沫内諸藥煮取三升去滓温服一升覆取微似汗出不須喫熱粥助藥𤼵汗餘將息依桂枝法忌海藻菘菜生葱並出第三卷中張仲景傷寒論治中風汗出用桂枝此證云汗不出亦傷寒之病非中風也小品萎蕤湯療冬温及春月中風傷寒則發熱頭眩痛喉咽乾舌強胸内疼心胸痞結滿腰背強方萎蕤二兩石膏三分末綿裹白薇二兩麻黄二兩去節獨活二兩杏仁二兩去皮尖雙仁碎芎藭二兩甘草二兩炙青木香二兩無可用麝香一分代之右九味切以水八升煮取三升分三服取汗若一寒一熱者加朴硝一分及大黄三兩下之忌海藻菘菜並出第六卷中古今録驗同一方有葛根二兩千金療傷寒中風五六日已上但胸中煩乾嘔括蔞實湯方括蔞實一兩柴胡半斤黄芩三兩甘草三兩生薑四兩切大􅀥十枚擘破右六味切之勿令大碎吹去末以水一斗二升煮得六升絞去滓更煎取三升適寒温服一升日三服忌海藻菘菜出第十卷中千金翼療中風發熱六七日不解而煩有表裏證渇欲飲水飲水而吐此爲水逆五苓散主之方豬苓三分澤瀉五分茯苓三分桂心二分白术三分右五味擣篩水服方寸匕日三多飲煖水汗出愈忌桃李醋物生葱雀肉等又傷寒中風醫反下之其人下利日數十行水穀不化腹中雷鳴心下痞堅而滿乾嘔心煩不能得安醫見心下痞以爲病不盡復重下之其痞益甚此非結熱但以胃中虚客氣上逆故使之堅甘草瀉心湯主之方甘草四兩炙黄芩三兩大棗十二枚擘黄連一兩乾薑二兩半夏半升洗去滑右六味切以水一斗煮取六升分六服忌海藻菘菜豬羊肉餳並出第九卷中一方有人參三兩古今録驗療中風傷寒脉浮發熱徃來汗出惡風項頸強鼻鳴乾嘔陽旦湯主之方大棗十二枚擘桂枝三兩芍藥三兩生薑三兩甘草三兩炙黄芩二兩右六味㕮咀以泉水六升煑取四升分四服日三自汗者去桂心加附子一枚炮渇者去桂加括蔞三兩利者去芍藥桂加乾薑三兩附子一枚炮心下悸者去芍藥加茯苓四兩虚勞裏急者正陽旦主之煎得二升内膠飴半升分爲再服若脉浮緊發熱者不可與也忌海藻菘菜生葱等千金同又大青龍湯療太陽中風脉浮緊發熱惡寒身疼痛汗不出而煩躁方麻黄六兩去節桂枝二兩甘草二兩炙石膏如雞子大碎綿裹生薑三兩杏仁四十枚去皮尖及兩仁大􅀥十枚擘右七味切以水九升先煑麻黄減二升去沫乃内諸藥煮取三升去滓分服一升厚覆取㣲汗汗出多者温粉粉之一服汗者不可再服若復服汗多亡陽遂虚惡風煩燥不得眠也忌海藻菘菜生葱等物並出第二卷中張仲景傷寒論云中風見傷寒脉者可服之傷寒結胸方七首一十二法病源結胸者謂熱毒氣結聚於心胸也此由病發於陽而早下之熱氣乘虗而痞結不散也按之痛其脉寸口浮闗上反自沈是也脉大不可下下之則死脉浮而大下之爲逆若陽脉浮闗上細小沈緊而飲食如故時小便利者名爲藏結藏結病舌上白胎滑者為難療不徃來寒熱其人反靜舌上不胎者不可攻之出第七卷中張仲景傷寒論問曰病有結胸有藏結其狀如何答曰按之痛寸脉浮闗脉沈名結胸也問曰何謂藏結答曰如結胸狀飲食如故時時下利寸口脉浮關上小細而沈緊名藏結舌上白胎滑者爲難治藏結無陽證不徃來寒熱其人反靜舌上胎滑者不可攻也病發於陽而反下之熱入因作結胸病發於隂而反下之一作汗之因作痞也所以成結胸者以下之太早故也結胸證悉具煩躁者亦死結胸證其脉浮大者不可下也下之則死夫結胸病項亦強如柔痓狀下之則和宜大䧟胸丸方蜀大黄半斤葶藶子半升熬杏仁半升去皮尖熬令赤黒色芒硝半升右四味擣篩二味杏仁合芒硝研如泥和散合和丸如彈子大每服一丸用甘遂末一錢匕白蜜一兩水二升同煮取一升温頓服之一㝛乃自下如不下更服取下爲效千金翼同又太陽病脉浮動數浮則爲風數則爲熱動則為痛數則爲虚頭痛發熱㣲盜汗出而反惡寒表未解也醫反下之動數變遲膈内拒痛一云頭痛即眩胃中空虚客熱動膈短氣煩躁心内懊憹陽氣内䧟心下因堅則爲結胸大䧟胸湯主之若不結胸但頭汗出餘處無汗劑頸而還小便不利身必發黄大䧟胸湯方蜀大黄六兩甘遂末一錢匕芒硝一升右三味以水六升先煮大黄取二升去滓内芒硝煮一兩沸内甘遂末温服一升得快利止後服千金翼同又傷寒六七日結胸熱實脉沈緊心下痛按之石堅大䧟胸湯主之方依前法但結胸無大熱者此水結在胸脇也但頭㣲汗出者大陷胸湯主之方依前法又傷寒十餘日熱結在裏復徃來寒熱者與大柴胡湯大柴胡湯方柴胡半斤枳實四枚炙生薑五兩黄芩三兩芍藥三兩半夏半升洗大􅀥十二枚擘右七味切以水一斗二升煮取六升去滓更煎取三升温服一升日三服一方加大黄二兩若不加大黄恐不名爲大柴胡湯忌羊肉餳千金翼古今録驗同又太陽病二三日不能卧但欲起心下必結脉微弱者本有久寒也而反下之若利止者必作結胸未止者四日復下之此作恊熱利也又太陽病下之其脉促不結胸者此爲欲解也若心下滿鞕痛者此爲結胸也大䧟胸湯主之但滿而不痛者此爲痞柴胡不中與之也宜半夏瀉心湯主之方半夏半升洗乾薑三兩人參三兩甘草三兩炙黄連一兩大􅀥十二枚擘黄芩三兩右七味切以水一斗煑取六升去滓温服一升日三若須大䧟胸湯服者如前法忌羊肉餳海藻菘菜豬肉冷水等千金翼同一方半夏五兩又小結胸病正在心下按之則痛脉浮滑者小䧟胸湯主之方黄連一兩上好者括蔞實一枚大者破半夏半升洗右三味切以水六升煑括蔞實取三升去滓内諸藥煮取二升去滓温分三服忌羊肉餳豬肉千金翼同又病在太陽應以汗解之反以冷水潠之若灌之其熱却不得去彌更益煩皮上粟起意欲飲水而反不渇者服文蛤散若不差者與五苓散用前篇方士弱氏曰熱得冷水之氣約退而後却也又寒實結胸無熱證者與三物小䧟胸湯方如前法白散亦可服文蛤散方士弱氏曰龎安常云無熱證者與三物白散小䧟胸湯治熱白散治寒㫖哉言乎文蛤五兩右一味擣篩爲散以沸湯和一方寸匕服之湯用五合千金翼同又白散方桔梗三分貝母三分巴豆一分去心及皮熬令黒赤别研如脂右三味擣篩更於臼内擣之以白飲和服強人半錢匕羸人減之病在膈上則吐在膈下則利利不止飲冷粥一杯止忌豬肉蘆笋等竝出第四卷中千金翼同傷寒嘔噦方一十四首病源傷寒病後胃氣不和此由初受病時毒熱氣盛多服冷藥瀉下及飲冷水病折以後熱勢既退冷氣乃動故使心下堅牢噫噦食臭腹内雷鳴而泄利此由脾胃氣虚冷故也出第八卷中仲景傷寒論療嘔噦心下悸痞鞕不能食小半夏湯方半夏一升洗生薑八兩去皮右二味切以水七升煑取一升半去滓分再服忌羊肉餳又療嘔噦心下痞鞕者以膈間有水頭眩悸半夏加茯苓湯方半夏一升洗生薑八兩去皮茯苓三兩右三味切以水七升煮取一升半去滓温分再服忌羊肉餳酢等物又療胸内似喘不喘似嘔不嘔似噦不噦心中憒憒然徹無聊賴者生薑汁半夏湯兼主天行方生薑汁一升半夏半升洗切右二味以水三升煎半夏取一升内薑汁取一升半綿漉小冷分二服一日一夜服令盡嘔噦一服得止者停後服忌羊肉餳救急同又療乾嘔噦若手足厥冷者小橘皮湯兼主天行方橘皮四兩生薑八兩去皮右二味狹長切以水七升煮取三升去滓小冷服一升下咽則愈救急同出第十六卷中深師療傷寒病啘不止甘草湯方兼主天行甘草三兩炙橘皮三兩右二味切以水五升煮取一升去滓頓服之日三四服取差忌海藻菘菜崔氏同又半夏散方半夏洗焙乾右一味末之生薑湯和服一錢匕忌羊肉餳等又赤蘇湯方赤蘇一把右一味水三升煑取一升去滓稍稍飲之肘後同又乾薑丸方乾薑六分附子四分炮右二味擣篩以苦酒丸如梧子服三丸日三服酒飲下皆得忌豬肉肘後同又療傷寒噦甘竹筎湯方甘竹筎四兩生白米一升右二味以水八升煮之取米熟湯成去滓分服徐徐服療風熱氣噦甚神驗諸噦亦佳又療傷寒嘔噦胸滿虚煩不安大橘皮湯方橘皮一兩甘草一兩炙生薑四兩人參二兩右四味切以水六升煑取二升去滓分三服忌海藻菘菜竝出第十四卷中小品茅根橘皮湯療春夏天行傷寒胃冷變啘方白茅根切一升橘皮三兩桂心二兩切右三味切以水六升煑取三升去滓温分三服數數服之盡復合之啘止乃停取㣲汗有熱減桂心一兩忌生葱文仲同出第六卷中一方有葛根二兩千金療傷寒後嘔噦及乾嘔不下食生蘆根飲方生蘆根切一升青竹筎一升粳米三合生薑二兩切右四味以水七升先煑千里鞋底一隻取五升澄清下藥煑取二升半去滓隨意便飲不差重作又療傷寒後嘔噦通草湯方通草三兩生蘆根切一升橘皮一兩粳米三合右四味切以水五升煑取二升去滓隨意便稍飲不差更作取差止古今錄驗文仲同出第十卷中千金翼乾嘔吐涎沫而頭痛茱茰湯主之方呉茱茰一升炒大棗十二枚擘生薑六兩切人參三兩細剉右四味以水五升煑取二升去滓分服七合日三仲景同出第十卷中此張仲景傷寒論方傷寒咽喉痛方八首病源傷寒病過經而不愈脉反沈遲手足厥逆者此爲下部脉不至隂陽隔絶邪客於足少隂之經毒氣上熏故喉咽不利或痛而生瘡出第七卷中仲景傷寒論少隂病咽喉痛者半夏散及湯主之方半夏洗甘草炙桂心右三味等分各擣篩畢更合擣之以白飲服方寸匕日三服若不能服散者水一升煑七沸内散兩匕更煑三沸下火令小冷少少含細嚥之半夏有毒不當散服之忌羊肉生葱海藻菘菜餳千金翼同出第六卷中文仲療傷寒毒攻喉咽腫痛方兼主天行切啇陸炙令熱以布藉喉以熨布上冷復易之肘後同又方眞䕡茹􅆶甲大内口中以牙小嚼汁以漬喉當微覺異爲佳亦主天行肘後同又附子丸方附子炮藜蘆等分右二朱末之蜜和丸服如梧子一枚飲下含黄蘗亦佳忌豬肉狸肉竝出第二卷中深師貼喉膏療傷寒舌強喉痛方蜜一升甘草四兩豬膏半斤右三味㣲火煎甘草豬膏令數沸去滓乃内蜜温令銷相得如􅀥大含化稍稍咽之忌海藻菘菜出第十四卷中集驗療傷寒熱病喉中痛閉塞不通烏扇膏方生烏扇一斤切豬脂一斤右二味合煎烏扇藥成去滓取如半雞子薄綿裹之内口中稍稍咽之取差忌酒蒜等物張文仲千金等同又升麻湯方升麻三兩通草四兩射干二兩羚羊角三兩屑芍藥三兩生蘆根切一升右六味切以水七升煑取二升半去滓分爲三服徐徐服千金古今錄驗同竝出第三卷中千金治傷寒熱病後口乾多唾咽痛乾棗丸方乾􅀥二十枚烏梅十枚右二味擣合蜜和丸如杏核大綿裹含化嚥津自愈出第十卷中傷寒吐唾血及下血方三首病源此由諸陽受邪熱初在表應發汗而汗不發致使熱毒入深結於五藏内有瘀積故吐血出第八卷中仲景傷寒論吐血不止者柏葉湯主之方青栢葉三兩乾薑二兩切艾三把右三味以水五升煑取一升去滓别絞取新出馬通汁一升相和合煎取一升綿濾之温分再服馬通是馬屎汁也一方有阿膠無艾又吐血下血黄圡湯主之方釡竈下黄焦土半升綿裹甘草三兩炙乾地黄三兩白术三兩附子三兩炮破阿膠三兩炙黄芩三兩右七味切以水八升煑六味取二升去滓内膠令烊分三服忌海藻菘菜蕪荑豬肉桃李雀肉等物並出第十六卷中古今錄驗蒲黄湯療傷寒温病天行疫毒及酒客熱傷中吐血不止面黄乾嘔心煩方蒲黄桑寄生桔梗一作栝蔞犀角屑甘草各二兩炙葛根三兩右六味切以水七升煑取三升去滓分三服徐徐服之忌海藻菘菜豬肉出第三卷中傷寒衂血方四首病源傷寒病衂血者此由五藏熱結所爲也心主血肝藏血熱邪傷於心肝故衂血也衂者鼻出血也肺主氣而開竅於鼻血隨氣行所以從鼻出陽明病口燥但欲漱水不欲嚥者此必衂衂家不可攻其表汗出額上脉急而緊直視而不能眴不得眠亡血不可攻其表汗出則寒慄而振脉浮緊發熱其身無汗自衂者愈出第八卷中肘後療傷寒大病差後小勞便􅈹衂牡蠣散及丸方左顧牡蠣十分熬石膏五分右二味擣末酒服方寸匕日三四亦可蜜丸如梧子大酒服十五丸集驗千金竝同出第二卷中小品芍藥地黄湯療傷寒及温病應發汗而不發之内瘀有畜血者及鼻衂吐血不盡内餘瘀血靣黄大便黑者此主消化瘀血芍藥三分地黄半斤丹皮一兩犀角屑一兩右四味切以水一斗煑取四升去滓温服一升日二三服有熱如狂者加黄芩二兩其人脉大來遲腹不滿自言滿者爲無熱不用黄芩又茅花湯療傷寒鼻衂不止主之方茅花一大把右以水八升煮取三升分三服即差若無茅花取茅根代之亦可又麥門冬湯療傷寒身熱衂血嘔逆主之方麥門冬石膏寒水石各三兩甘草二兩桂心一兩右五味切以水一斗煑取三升分三服傷寒煩渴方九首病源此由隂氣少陽氣勝故熱而煩滿也少隂病惡寒而踡時自煩欲去其衣被者可治也病脉已解而反發煩者病新差又強與榖脾胃氣尚弱不能消穀故令微煩損穀即愈少隂病脉微細而沈但欲卧汗出不煩欲自吐五六日自利後煩躁不得卧寐者死發汗後下之脉平而少煩此新虚不勝榖氣故也又傷寒渴者由熱氣入於藏流於少隂之經少隂主腎腎惡燥故渴而引飲竝出第七卷中仲景傷寒論療傷寒汗出惡寒身熱大渴不止欲飲水至二斗者白虎加人參湯主之方知母六兩石膏粳米各一升人參三兩甘草二兩右五味切以水一斗二升煮米熟去米内諸藥煮取六升去滓温服一升日三忌海藻菘菜出第十卷中小品同又若脉浮發熱渴欲飲水小便不利者豬苓湯主之方豬苓一兩去皮茯苓一兩阿膠一兩炙滑石一兩碎綿裹澤瀉一兩右五味以水四升先煑四物取二升去滓内阿膠令烊銷温服七合日三服忌醋物千金翼同出第五卷中范汪括蔞湯主渴飲方括蔞根内黄脉少者三兩右一味切以水五升煮取一升分二服先以青淡竹瀝一升合水二升煮好銀二兩減半去銀先與病人飲之訖須臾後乃服括蔞湯其銀汁須冷服出第二十卷中千金療傷寒後結熱在内煩渴青葙子丸方青葙子五兩龍膽三兩黄芩一兩梔子仁一兩苦參一兩黄蘗二兩括蔞一兩黄連二兩右八味擣篩爲末蜜丸先食服如梧子七丸飲下日三不知稍増忌豬肉冷水集驗同出第九卷中深師黄芩人參湯療傷寒吐下後内外有熱煩渴不安方黄芩人參甘草桂心生薑各二兩大􅀥十五枚擘右六味切以水八升煑取三升分三服徐徐服忌菘菜海藻生葱等物又療傷寒除熱止渴欲飲水括蔞根湯方黄芩三兩人參二兩桂心二兩大黄二兩括蔞根三兩芒硝二兩甘草二兩炙右七味切以水八升煑取三升去滓飲一升須臾當下不下復飲一升得下止勿復飲湯藥力勢歇乃可食糜耳一方用生薑二兩忌海藻菘菜生葱油膩等物又療傷寒下後除熱止渴五味麥門冬湯方麥門冬去心五味子人參甘草炙石膏碎各一兩右五味擣篩三指撮水一升二合煑令沸得四合盡服忌海藻菘菜竝出第十四卷中古今錄驗黄龍湯療傷寒十餘日不解徃來寒熱狀如温瘧渴胸滿心腹痛方半夏半升洗生薑三兩人參三兩柴胡半斤黄芩三兩甘草三兩炙大棗十二枚擘右七味切以水一斗二升煑取六升去滓更煎取三升温服一升日三服不嘔而渴去半夏加栝蔞根四兩服如前忌羊肉餳海藻菘菜等物出第三卷中此本張仲景傷寒論方又髙堂丸療傷寒苦渴煩滿欲死令極飲水法方大黄二分硝石三分熬釡底墨一分竈突中墨一分黄芩一分梁上塵一分竈中黄圡一分麻黄二分去節胡洽用芒硝無黄圡右八味篩末蜜和如彈丸大取一丸著一盞水中盡用服之即自極飲水汗出得熱除矣一名黑奴丸一名駐車丸并療温瘧神良並出第二卷中此方第一卷用小麥黒奴名黒奴丸傷寒癖實及宿食不消方二首病源此謂被下後六七日不大便煩熱不解腹滿而痛此爲胃中有乾糞挾宿食故也或先患寒癖因有宿食又感於傷寒熱氣相搏故宿食不消也出第八卷中深師駃豉丸療傷寒留飲宿食不消一名續命丸方黄芩五兩大黄五兩梔子仁十六枚黄連五兩去毛豉一升熬甘遂三兩太山者麻黄五兩去節芒硝二兩巴豆一百枚去皮及心熬研右九味擣篩白蜜和丸如梧子服三丸以吐下爲度若不吐利加二丸一本有杏仁七十枚忌豬肉冷水蘆笋肉出第十四卷中范汪同古今錄驗續命丸療傷寒及癖實痰飲百病方大黄五兩黄連一兩麻黄五兩去節甘遂三兩熬黄芩二兩芒硝二兩研杏仁七十枚去皮尖熬巴豆一百枚去心熬研豉一升熬右九味擣篩蜜和丸得傷寒一日服一丸如小梧子大二日二丸至六七日六七丸但吐下得汗愈若水澼及痰實服三五丸日二忌豬肉冷水蘆笋范汪延年刪繁同出第三卷中傷寒春冬欬嗽方三首病源此由邪熱客於肺也上焦有熱其人必飲水水停心下則肺為之浮肺主於欬水氣乘之故欬嗽出第八卷中小品射干湯主春冬傷寒秋夏中冷欬嗽曲拘不得氣息喉鳴啞失聲乾嗽無唾喉中如哽者方射干二兩半夏五兩洗杏仁二兩去皮尖兩仁乾薑二兩炮甘草二兩炙紫菀二兩肉桂二兩呉茱萸二兩當歸二兩橘皮二兩麻黄二兩去節獨活二兩右十二味切以水一斗煑取三升去滓温分三服始病一二日者可服此湯汗後重服勿汗也病久者初服可用大黄二兩初秋夏月暴雨冷及天行暴寒熱伏於内宜生薑四兩代乾薑除茱萸用枳實二兩炙忌羊肉海藻菘菜餳生葱出第六卷中古今錄驗下氣橘皮湯療春冬傷寒秋夏冷濕欬嗽喉中鳴聲上氣不得下頭痛方橘皮紫菀麻黄去節杏仁去雙仁尖皮當歸桂枝甘草炙黄芩各三分右八味切以水七升煑取三升分三服不差重合之忌海藻菘菜生葱出第三卷中延年療傷寒骨節疼頭痛眼睛疼欬嗽知母湯方知母二兩貝母三兩乾葛三兩芍藥三兩石膏四兩碎裹黄芩三兩杏仁一兩去皮尖及雙仁梔子仁三兩擘右八味切以水七升煑取二升五合去滓分爲三服如人行八九里再服忌蒜麫七日出第九卷中傷寒攻目生瘡兼赤白瞖方六首病源目者藏腑之精華肝之外候也傷寒熱毒壅滯熏蒸於肝上攻於目則令目赤腫痛若毒氣盛者眼生瞖膜又肝開竅於目肝氣虚熱乘虗上衝於目故目赤痛重者生瘡瞖白膜息肉出第八卷中肘後療傷寒大病後熱毒攻目方煑蜂房以洗之日六七度張文仲同又方冷水漬青布以掩目張文仲同又療熱病後生瞖方燒豉二七粒末内管中以吹之並出第二卷中文仲備急同小品漏蘆連翹湯療傷寒熱毒變作赤色癰疽丹􅇙腫毒及眼赤痛生障瞖悉主之方兼療天行漏蘆二兩連翹二兩黄芩二兩麻黄二兩去節白歛二兩升麻二兩甘草二兩炙大黄三兩切枳實三兩炙右九味切以水九升煑取三升去滓温分三服相去二食頃更服熱盛者可加芒硝二兩忌海藻菘菜等物千金同又秦皮湯療毒病衝眼忽生赤瞖或白或腫膚起或赤痛不得視光痛入心肝或眼外浮腫如吹汁出生膜覆珠子方秦皮二兩前胡二兩常山二兩黄芩二兩升麻二兩芍藥二兩白薇二兩枳實二兩炙大黄三兩甘草二兩炙右十味以水八升煑取三升分三服相去二食頃更服若盛熱者可加芒硝二兩忌海藻菘菜生葱生菜出第六卷中一方加蕤仁一兩梔子仁半兩張文仲秦皮湯主傷寒病熱毒氣入眼生赤脉赤膜白膚白瞖者及赤痛不得見光痛毒煩惱者神効方秦皮升麻黄連各一兩右三味切以水洗去塵用水四升煑取二升半冷之分用三合仰眼以綿繞筯頭取湯以滴眼中如屋漏狀盡三合止須臾復用日五六遍乃佳忌豬肉冷水出第二卷中傷寒口瘡方二首病源夫傷寒冬時發其汗必吐利口中爛生瘡以其熱毒在藏心脾煩壅表裏俱熱熱不已毒氣熏於上焦故令口舌乾燥生瘡也出第七卷中深師療傷寒熱病口瘡黄蘗蜜方黄蘗削去上皮取裏好處薄斜削右一味以崖蜜半斤極清者以漬蘗一宿唯欲令濃含其汁良久吐之更復如前若胸中熱有瘡時飲三五合尤良又療傷寒口瘡爛者升麻湯方升麻一兩甘草一兩炙竹葉切五合麥門冬三分去心牡丹一分乾棗二十枚擘右六味切以水四升煮取一升半去滓分五服含稍稍咽之爲度忌海藻菘菜胡荽等並出第十四卷中傷寒手足欲脫疼痛方七首病源此由熱毒氣從内而出循經絡攻於手足也人五藏六腑并榮俞皆出於手足指故毒從藏腑而出也出第八卷中范汪療傷寒熱病手足腫欲脫方生羊肉裹之腫消痛止出第三十卷中深師同崔氏療傷寒手足熱疼欲脫方取羊屎煮汁以淋之差止亦療時疾隂嚢及莖腫亦可煮黄蘗洗之肘後深師集驗千金備急並同出第一卷中集驗療毒熱攻手足腫疼欲脫方濃煮虎杖根適寒温以漬手足入至踝上一尺兼療天行范汪肘後千金同又方酒煮苦參以漬之范汪千金集驗同並出第二卷中千金療毒熱病攻手足腫疼痛欲脫方煑馬糞若羊糞汁漬之豬膏和羊糞塗之亦佳范汪集驗肘後同又方取常思草絞取汁以漬之一名蒼耳范汪集驗肘後同出第十卷中備急療熱病手足腫欲脫者方兼主天行以稻穰灰汁漬之佳集驗千金肘後同出第一卷中傷寒虚羸方四首病源其人血氣先虚復爲虚邪所中發汗吐下之後經絡俱損傷隂陽竭絶熱邪始散眞氣尚少五藏猶虚穀神未復無津液以榮養故虚羸而生病焉出第八卷中集驗療傷寒虚羸少氣氣逆苦嘔吐方石膏一斤碎綿裹竹葉一把麥門冬一升去心人參二兩半夏一升洗生薑四兩甘草二兩炙右七味切以水一斗二升煮取六升去滓内粳米一升米熟去米飲一升日三服忌海藻菘菜羊肉餳出第三卷中又生地黄湯療傷寒有熱虚羸少氣心下滿胃中有㝛食大便不利方生地黄三斤大黄四兩大􅀥二十枚擘甘草一兩炙芒硝二合右五味合擣令相得蒸五升米下熟絞取汁分再服忌海藻菘菜出第二卷中千金療傷寒虚羸少氣嘔吐竹葉石膏湯方石膏一斤碎綿裹竹葉一把麥門冬一升去心人參二兩半夏半升洗甘草二兩右六味以水一斗煑取六升去滓内粳米一升煑米熟去米飲一升日三服忌海藻菘菜羊肉餳出第十卷中此張仲景傷寒論方張文仲梔子豉湯療吐下後虚羸欲死方梔子一十枚豉四合綿裹右二味以水五升先煮梔子取二升内豉又煑三四沸去滓分再服支同此出姚萬第二卷中集驗備急同各用梔子十四枚傷寒不得眠方四首病源夫衛氣晝行於陽夜行於隂隂主夜夜主卧謂陽氣盡隂氣盛則目瞑矣今熱氣未散與諸陽并所以陽獨盛隂偏虚雖復病後仍不得眠者隂氣未復於本故也出第八卷中仲景傷寒論療傷寒發汗若吐下後虚煩不得眠劇則反覆顛倒心内苦痛懊憹者屬梔子豉湯證方肥梔子十四枚擘香豉四合綿裹右二物以水四升先煑梔子取二升半去滓内豉更煑取一升半去豉分温再服得吐止後服肘後療大病差後虚煩不得眠腹中疼痛懊憹烏梅䜴湯方豉七分綿裹烏梅十四枚擘右二味以水四升煑烏梅取二升半内䜴更煑取一升半去滓温分再服無烏梅用梔子四枚又半夏茯苓湯方半夏三兩洗秫米一升茯苓四兩右三味切以千里流水一石揚之萬遍澄取二斗合煑諸藥得五升去滓温分五服忌羊肉餳酢等物竝出第一卷中深師酸􅀥湯療傷寒及吐下後心煩乏氣晝夜不眠方酸􅀥仁四升麥門冬一升去心甘草二兩炙蝭母二兩知母也茯苓二兩芎藭二兩乾薑三兩右七味切以水一斗六升煑酸􅀥取一斗去棗内藥煑取三升去滓温分三服忌海藻菘菜大醋出第十四卷中傷寒小便不利方九首病源傷寒發汗後而汗出不止津液少胃中極乾小膓有伏熱故小便不通也出第八卷中仲景傷寒論少隂病二三日不已至四五日腹痛小便不利四肢沈重疼痛自下利者此為有水氣或欬或小便自利或下利或嘔者真武湯主之方茯苓三兩白芍藥三兩附子一枚炮去皮破八片白术三兩生薑三兩去皮右五味切以水八升煑取三升去滓温服七合日三若欬者加五味子半升細辛一兩乾薑一兩若小便自利者去茯苓若下利者去芍藥加乾薑二兩嘔者去附子加生薑足前成半斤忌酢豬肉桃李雀肉等出第六卷中深師同兼主天行大効又傷寒六七日已發汗而復下之胸脇滿結小便不利渴而不嘔但頭汗出徃來寒熱心煩者此未解也屬小柴胡桂薑湯主之方柴胡半斤桂心三兩黄芩三兩牡蠣二兩熬甘草二兩炙括蔞根四兩乾薑二兩右七味切以水一斗二升煑取六升去滓更煎取三升温服一升日三初一服微煩後汗出便愈忌生葱海藻菘菜出第四卷中又療傷寒七八日身黄如橘子色小便不利腹㣲滿者茵陳湯主之方茵陳六兩肥梔子十四枚擘大黄二兩去皮酒洗破二片右三味以水一斗二升先煑茵陳減二升去滓内二物煑取三升去滓分温三服日三小便當利尿如皂莢沫狀色正赤一宿腹減黄從小便去出第五卷中張文仲千金竝同又服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白术湯主之方芍藥生薑切白术茯苓各三兩甘草二兩炙大棗十二箇擘右六味切以水八升煑取三升去滓温服一升小便利則愈忌海藻菘菜酢桃李雀肉等肘後療小腹滿不得小便方兼療天行細末雄黄蜜和爲丸如棗核内溺孔中令入半寸出第二卷中文仲同千金翼療少隂病四逆其人或欬或悸或小便不利或腹中痛或洩利下重四逆散方甘草十分炙枳實十分炙柴胡十分芍藥十分右四味擣細篩白飲和服方寸匕日三服嗽者加五味子乾薑各五分并主下利胸中悸者加桂心五分小便不利者加茯苓五分腹中痛者加附子一枚洩利下重者先以水五升煑薤二升取三升以散三方寸匕内湯中煮之取一升半分再服忌海藻菘菜仲景范汪同出第十卷中崔氏療傷寒熱盛小便不利滑石湯方兼療天行滑石屑二兩葶藶子一合熬右二味以水二升煑取七合去滓頓服之又方擣生葱傅臍下横文中燥則易之又瞿麥湯方瞿麥三兩甘草三兩炙滑石四兩葵子二合半石韋三兩去毛令盡右五味切以水八升煮取二升半分三服忌海藻菘菜竝出第一卷中古今録驗同傷寒下痢及膿血黄赤方一十六首病源傷寒病若表實裏虚熱氣乘虚而入攻於腸胃則下黄赤汁若温毒氣盛則腹痛壯熱下膿血如魚腦或如爛肉汁若寒毒入胃則腹滿身熱下清榖下清榖者不可攻表汗出必脹滿表裏俱虚故也傷寒六七日下利便發熱而痢其人汗出不止者死但有隂無陽故也下利有微熱其人渴脉弱者今自愈脉沈弦者下重其脉大者爲未止脉微數者為欲自止雖發熱不死少隂病八九日而一身手足盡熱熱在膀胱必便血下利脉反浮數尺中自濇其人必圊膿血少隂病下利若利自止惡寒而欲踡手足温者可療陽明病下利其人脉浮大此皆為虚弱強下之故也傷寒下利日十餘行其人脉反實者死出第八卷中張仲景傷寒論陽明無下利證不可下或有云下利其脉浮大者此皆為虚以強下之故也設脉浮革因爾腸鳴當温之與水即噦仲景傷寒論傷寒本自寒下醫復吐之下之不解者寒格更逆吐下食入還吐出者屬乾薑黄連人參湯主之方乾薑黄連黄芩人參各三兩右四味切以水六升煮取二升去滓分再服之忌豬肉冷水等出第六卷中又太陽病桂枝證醫反下之利遂不止脉促者表未解也喘而汗者屬葛根黄連湯方葛根八兩黄連三兩金色者黄芩三兩切甘草二兩右四味切以水八升先煮葛根減二升掠去沫内諸藥煮取二升去滓温分再服忌豬肉冷水海藻菘菜出第七卷中肘後療傷寒若下膿血者赤石脂湯方赤石脂二兩碎乾薑二兩切附子一兩炮破右三味以水五升煑取三升去滓温分三服後臍下痛者加當歸一兩芍藥二兩用水六升煮忌豬肉范汪張文仲同又主下利不能食者兼療天行黄連丸方黄連一兩烏梅二十枚炙燥右二味擣末臘如博碁子一枚蜜一升於微火煎令可丸如梧子一服十五丸日三忌豬肉冷水出第一卷中又白通湯療傷寒泄痢不已口渴不得下食虚而煩方大附子一枚生削去黒皮破八片乾薑半兩炮甘草半兩炙葱白十四莖右四味切以水三升煮取一升二合去滓温分再服渴微嘔心下停水者一方加犀角半兩大良忌海藻菘菜豬肉范汪同出第十四卷中張仲景傷寒論白通湯惟主少隂下利厥逆無脉乾躁而煩者白通加豬膽湯主之本無甘草仍不加犀角范汪療傷寒腹中微痛不止下利秦皮湯方秦皮三兩黄連四兩白頭翁二兩阿膠三兩右四味㕮咀三味以水八升煮得二升絞去滓内膠令烊適寒温先食飲七合日二服忌豬肉冷水又䜴薤湯療傷寒暴下及滯利腹痛方豉一升薤白一把寸切右二物以水三升煑令薤熟漉去滓分為再服不差復作又􅈍草湯療傷寒除熱止下利方􅈍草二兩黄連四兩當歸二兩右三味切以水六升煑得二升適寒温飲五合日三忌豬肉冷水等物又療傷寒下利脉微足厥冷通草湯方通草一兩乾薑一兩枳實四兩炙人參一兩附子一枚炮令裂破右五味切以水六升煑取二升適寒温飲五合日三不差稍加至七合忌豬肉竝出第三十卷中小品犀角湯療熱毒下黄赤汁及赤如腐爛血及赤滯如魚腦腹痛壯熱諸藥無效方黄蘗一兩半黄芩一兩半白頭翁一兩黄連二兩當歸一兩牡蠣一兩半熬犀角屑半兩艾葉半兩石榴皮一兩半桑寄生一兩甘草一兩炙右十一味切以水八升煑取三升分三服忌豬肉冷水海藻菘菜出第六卷中古今錄驗同集驗療傷寒後下利膿血蘗皮湯方黄蘗二兩黄連四兩梔子仁十四枚擘阿膠一兩炙右四味切以水六升煑三味取二升去滓内膠令烊温分再服忌豬肉冷水范汪同出第二卷中千金翼熱利下重白頭翁湯主之方白頭翁二兩黄蘗三兩黄連三兩秦皮三兩切右四味切以水七升煑取二升去滓分服一升不愈更服忌豬肉冷水范汪同出第十卷中此張仲景傷寒論方崔氏療傷寒後赤白帶下無數阮氏桃華湯方赤石脂八兩冷多白帯者加四兩粳米一升乾薑四兩冷多白帯者加四兩切右三味以水一斗煑米熟湯成去滓服一升不差復作熱多則帶赤冷多則帶白千金翼方不同加減稍别傷寒論千金范汪同張仲景傷寒論煮湯和赤石脂末一方寸匕服又療傷寒熱利黄連丸方黄連三兩去毛當歸三兩乾薑二兩赤石脂二兩切右四味擣篩蜜和丸如梧子大服三十丸日三叔尚書以療熱痢是歲傳與東都當方諸軍營及夏口戍人發者數千餘人余時亦復用之亦佳但時用之不及諸湯速耳當服百丸許乃斷忌豬肉冷水竝出第一卷中張文仲陶氏傷寒下利䜴薤湯方豉一斤綿裹薤白一握梔子十四枚擘破右三味以水五升煮取二升半去滓温分三服小品云此方主温毒及傷寒内虚外熱攻腸胃下黄赤汁及如爛肉汁并去赤滯下伏氣腹痛諸熱毒悉主之水四升先煑梔子薤白令熟内䜴煑取二升分三服千金備急方同又療傷寒下利惡血不止犀角湯方乾薑一兩犀角一兩末地榆一兩蜜二合右四味切以水五升煮取一升半去滓下蜜更煑至一升分三服自愈此治熱毒蠱利千金同竝出第十五卷中傷寒􅉶瘡方一十首病源凡得傷寒及天行熱病日數較多腹内有熱又人食少腸胃空虚三蟲行作求食食人五藏及下部也􅉶病之候齒齗無色舌上盡白甚者脣裏有瘡四肢沈重怱忽喜眠如此皆爲蟲食其肛肛爛見五藏則死當數看其上脣内有瘡唾血脣内如粟瘡者則心内懊憹痛此蟲在上食其五藏下脣内生瘡者其人不寤此蟲食下部皆能殺人也出第八卷中肘後若病人齒齗無色舌上白者或喜眠憒憒不知痛痒處或下利宜急療下部不曉此者但攻其上不以爲意下部生瘡蟲食其肛肛爛見五藏便死燒馬蹄作灰細末豬膏和塗綿以導下部日數度差又桃仁苦酒湯方桃仁五十枚去皮尖及兩仁苦酒二升鹽一合右三味煑取六合去滓盡服之竝出第一卷中深師療􅉶食下部桃皮湯方桃皮二兩槐子二兩艾二兩大棗三十枚擘一方用黄連右四味切以水五升煑取三升去滓温分三服之又療􅉶蟲食下部方以泥作甖以竹筒如指所横穿甖肚筒一頭内下孔中内如雞子艾燒之人就甖口吹之常令艾燒強人可益艾甚良千金同又龍骨湯治傷寒已八九日至十餘日大煩渴熱盛而三焦有瘡􅉶者多下或張口吐舌呵吁咽爛口鼻生瘡吟語不識人宜服此湯除熱毒止痢神方龍骨半斤碎右一味以水一斗煑取四升沈之井底令冷服五合餘漸漸進之恣意如飲尤宜老少無味殆如飲水亦斷下文仲備急千金等同又療傷寒及諸病之後内有瘡出下部煩者黄連犀角湯方黄連一兩去毛烏梅十四枚擘犀角三兩青木香半兩右四味切以水五升煑取一升半分再服忌豬肉冷水等竝出第十四卷中范汪療傷寒心中懊憹下利榖道中爛傷當服懊憹散以􅉶藥内榖道中懊憹散方雚蘆十分乾漆二分萹蓄二分右三味各異擣篩粉粥飲服一錢匕先食日再服千金同又療􅉶懊憹麝香散方麝香一分研雄黄一分研丹砂一分研犀角一分屑羚羊角一分研青葙子一分黄連一分升麻一分桃仁一分熬貝齒一分右十味竝擣合下篩先食以小麥粥服錢五匕服藥訖復以錢五匕綿裹以導榖道中食頃去之日三忌豬肉冷水生血等物竝出第三十三卷中小品青葙子散療熱病有􅉶下部生瘡方靑葙一兩雚蘆四兩狼牙三分橘皮二分萹蓄二分切之右五味擣下篩粥飲和合服兩錢匕日三不知稍増之出第六卷中千金同有甘草一分張文仲療傷寒兼􅉶瘡王叔和云其候口脣皆生瘡唾血上脣内有瘡如粟者則心中懊憹痛如此則此蟲在上乃食五藏若下脣内生瘡其人喜眠者此蟲在下食下部方取雞子一枚扣頭出白與漆一合熟和令調如漆還内殻中仰吞之食頃或半日或下蟲或吐蟲劇者再服乃盡熱除病愈凡得熱病腹内熱食少三蟲行作求食食人五藏及下部人不能知可服此藥不爾􅉶蟲殺人集驗深師肘後同又方豬膽一具右一味漬著半升苦酒中和之煎三沸三下三上藥成可放温空腹飲一滿口蟲即死有人經用之驗竝出第二卷中千金同傷寒隂陽易方八首病源傷寒隂陽易病者是男子婦人傷寒病新差未平復而與之交接得病者名爲隂陽易也其男子病新差未平復而婦人與之交接得病者名陽易其婦人得病新差未平復而男子與之交接得病者名隂易若二男二女竝不相易所以呼爲易者隂陽感動其毒度著於人如換易也其病之狀身體重小腹裏急或引隂中拘攣熱上衝胸頭重不能舉眼内生䁾四肢拘急小腹㽲痛手足拳皆即死其亦有不即死者病苦小腹裏急熱上衝胸頭重不能舉百節解離經脉緩弱血氣空虚骨髓枯竭便嘘嘘吸吸氣力轉少著牀不能動摇起止仰人或引歲月方死出第八卷中深師療婦人得温病雖差平復未滿一百日不可與交合交合爲隂易之病病必拘急手足拳皆死丈夫病以易婦人名爲陽易速當療之可差滿四日不可療也宜令服此藥方乾薑四兩右一味擣末湯和一頓服温覆汗出得解止手足伸遂愈范汪同出第十四卷中范汪豭䑕糞湯療傷寒病後男子隂易方薤一大把豭䑕糞十四枚右二味以水五升煑取二升盡飲之温卧汗出便愈亦理勞復豭䑕屎兩頭尖者是也肘後薤作藍又丹米湯療傷寒病已後男子隂易方丹米三兩右一味末以薄酒和盡飲之温覆汗出便愈亦隨人大小不必三兩自以意消息之又療交接勞復卵腫腹中絞痛便絶死竹皮湯方刮青竹皮一升右一味以水三升煑五六沸絞去滓頓服立愈肘後同又療隂陽易括蔞湯方括蔞根二兩右一味以水五升煑取一升分二服先以青淡竹瀝一升合水二升煮好銀二兩減半去銀先與病人飲之訖又須臾乃服湯小便利即差括蔞湯銀汁須冷服與前療渴方同千金曰昔者有人得傷寒病已差未健請華旉視脉旉曰雖差尚虚未復陽氣不足勿爲勞事餘勞尚可御内即死臨死當吐舌數寸其妻聞其夫病除從百餘里來省之止宿交接中間三日發病口舌出數寸而死病新差未滿百日氣力未平復而以房室者略無不死有士蓋正者病愈後六十日已能行射獵以房室則吐涎而死及熱病房室名爲隂陽易之病皆難療多死近者有士大夫小得傷寒差以十餘日能乘馬行來自謂平復以房室則小腹急痛手足拘攣而死醫者張苖說有婢得病後數十日有六人姦之皆死婦人得病易丈夫丈夫得病亦易婦人療之燒裩散方兼主温病隂易也取女人中裩近隠處燒取灰右一物爲散服方寸匕日三小便即利隂頭微腫此爲愈矣女人病可取男子裩如前法酒水服此本仲景方肘後同又療交接勞復卵腫縮腹中絞痛便欲死者方取交接婦人衣服以覆男子肘後同又方取女人手足𤓰二十枚女人衣中裳一尺燒右二味末以酒服亦可米汁飲服之出第十卷中肘後同傷寒勞復食復方二十五首病源傷寒病新差津液未復血氣尚虚若勞動早更復成病故云復也若言語思慮則勞神梳頭澡洗則勞力勞則生熱熱氣乘虚還入經絡故復病也其脉沉緊者宜下之又食復傷寒病新差及大病之後脾胃尚虚榖氣未復若食豬肉腸血肥魚及油膩物必大下利醫所不能治也必至於死若食餅餌􅀈黍飴脯炙膾棗栗諸果牢強難消之物胃氣虚弱不能消化必更結熱適以藥下之則胃氣虚冷大利難禁不下之必死下之亦危皆難救也大病之後多坐此死不可不慎護也夫病新差後但得食糜粥寜可少食令饑慎勿飽不得佗有所食雖思之勿與引日轉久可漸食羊肉糜若羮汁慎不可食豬狗等肉竝出第八卷中廣濟療傷寒因食勞復頭痛壯熱梔子湯方梔子十四枚擘香豉一升綿裹葱白一握切粟米三合雄䑕屎二七枚燒令煙絶末右五味以水八升煑取二升三合去滓内䑕屎分三服服别相去如人行六七里須利内芒硝五分忌麫炙肉蒜等物出第一卷中深師療勞復大青湯方大青四兩甘草二兩炙阿膠二兩炙香豉二兩右四味切以水一斗煑取三升去滓温服一升日五六欲盡復作常使有湯渴便飲無毒除熱止吐下傷寒一二日上至十數日困篤發汗熱不解吐下後熱不除止下痢甚良先煑大青甘草取四升去滓内膠豉膠消盡便漉去勿令豉壞當預漬膠令釋也忌菘菜海藻集驗肘後千金同又方取雞子空殻碎之熬令黄黒擣篩熱湯和一合服之温卧取汗愈雞子殻悉服之肘後崔氏同又方取馬糞燒擣爲散冷酒服方寸匕良三炊頃便驗神良又療傷寒差後勞復葵子湯方葵子二升梁米一升右二味合煮作薄粥飲之多多爲佳取汗立差竝出第十四卷中范汪療傷寒病差語言書疏坐起行歩勞復方刮青竹皮多多煑之令厚濃服三升汁則愈又傷寒已愈食飲多勞復大黄豉湯方䜴五合甘草二兩炙桂心二兩大黄四兩芒硝半斤右五味㕮咀以水六升煮得二升去滓先食適寒温飲一升日再忌海藻菘菜生葱等物又療傷寒差已後飲食勞復梔子湯方梔子十四枚豉一升桂心二兩麻黄二兩大黄二兩右五味㕮咀以水七升先煮麻黄掠去沫内餘藥更煮取二升去滓温服一升日再服當小汗及下利忌生葱並出第三十四卷中千金療傷寒温病後勞復或食飲或動作梔子石膏湯方梔子仁三七枚擘石膏五兩碎䑕屎尖頭者二十枚香豉一升綿裹右四味以水七升煮取三升分三服又療勞復或因洗手足或梳頭或食等勞復方取洗手足汁飲之一合即愈又方取頭垢如棗核大吞一枚又方取飯燒爲末飲進一升肘後同又療大病已差勞復者枳實梔子湯方枳實三枚炙梔子十四枚擘右二味以酢漿一斗先煎取六升煑藥取三升内䜴一升煎五六沸去滓分再服覆取汗如有宿食者内大黄如碁子一枚范汪救急集驗竝同出第十卷中張仲景傷寒論内大黄如傳棊子五六枚又療勞復垂死者方煖湯三合洗四五歲女子隂取汁内口中服則愈男兒亦得起死神方又療食勞方麴一餅煮取汁服之又療食勞方杏仁五十枚酢二升煎取一升服之取汗則差又方燒人糞灰水服之方寸匕乂療傷寒差後更頭痛壯熱煩悶者方服黄龍湯三合日三服又欲令病人不復者方燒頭垢如梧子大服之竝出第十卷中崔氏療傷寒勞復䑕屎湯方梔子二七枚擘豉五合䑕屎兩頭尖者二七枚右三味以漿水二升煑取一升去滓頓服數試異驗出第一卷中古今錄驗梔子湯療傷寒勞復方梔子十四枚擘麻黄二兩去節大黄二兩豉一升綿裹右四味切以水七升煑取二升分爲三服深師肘後同又療傷寒勞復䑕屎湯方䑕屎二十一枚䜴一升綿裹梔子七枚擘大黄三兩切右四味以水五升煎取二升七合分三服微取汗應小鴨溏下千金同又療病新差早起及食多勞復䑕屎豉湯方䑕屎兩頭尖者二十一枚香豉一升右二味以水三升煑取一升盡服之温卧令小汗千金同又療食不消勞復脉實者䑕屎梔子豉湯方豉二升綿裹䑕屎二十一枚梔子七枚擘麻黄三兩去節右四味以水五升煮取二升分服七合汗微出日三服千金麻黄作大黄又療傷寒已愈食飲多復發者方豉五合綿裹甘草二兩炙大黄四兩芒硝半兩右四味切以水九升煑取三升去滓飲一升日再忌菘菜海藻等范汪同又療傷寒差令不復白芷散方白芷十二分白术十分防風八分括蔞五分桔梗四分細辛三分附子二分炮去皮乾薑二分桂心二分右九味擣篩爲散以粳米粥清服一錢匕食已服二錢小兒服一錢常以雞子作􅅅喫粳米飯多少與病人食之亦未必常有雞子􅅅粳米飯如服藥訖即扶起令行歩仍櫛頭洗手靣食輒服之勞行如前則不復浩云數用佳忌豬肉桃李雀肉胡荽蒜青魚鮓生葱生菜范汪同出第三卷中一方有人參三分傷寒百合病方七首病源傷寒百合病者謂無經絡百脉一宗悉致病也皆因傷寒虚勞大病之後不平復變成斯病也其狀意欲食復不能食常黙黙欲得卧復不得卧欲出行而復不能行飲食或有羙時或有不用時聞飲食臭或如強徤人而欲卧復不得眠如有寒復如無寒如有熱復如無熱至朝口苦小便赤黄百合之病諸藥不能療得藥則劇而吐利如有神靈所加也身形如和其人脉微數每尿輒頭痛其病六十日乃愈若尿時頭不痛淅淅然如寒者四十日愈若尿時快然但眩者二十日愈其證或未病而預見或病四五日而出或病二十日一月日復見其狀惡寒而嘔者病在上焦也二十三日當愈其狀腹滿微喘大便硬三四日一大便時復小溏者病在中焦也六十三日當愈其狀小便淋瀝難者病在下焦也四十三日當愈各隨其證以療之耳竝出第八卷中仲景傷寒論療百合之病諸藥不能療若得藥則劇而吐痢如有神靈所加也身體仍和脉微數每尿時輒頭痛六十日乃愈尿時頭不痛淅淅然者四十日愈尿時快然但頭眩者二十日愈其證或未病而預見或病四五日而出或病二十日一月復見者悉療之又發汗已更發者百合知母湯主之方百合七枚擘知母三兩右二味以泉水洗先漬百合經一宿上當白沫㵼却其汁更以好泉水二升煑取一升去滓置之一處别以泉水二升煑知母取一升去滓二味汁相和煑取一升半分温再服之小品千金同又下之已更發者百合滑石代赭湯主之方百合七枚擘以泉水漬一㝛上當白泔出去之滑石三兩碎代赭如彈丸一枚碎右三味先以泉水二升煮百合取一升去滓置一廂又以泉水二升煑和二味取一升去滓合煎取一升半分再服千金小品同又吐之已更發者百合雞子湯主之方百合七枚右一味依前法泉水二升煑取一升去滓扣雞子一枚取中黄内百合湯中攪令調温再服之千金同又不吐不下不發汗病形如初百合生地黄湯主之方百合七枚右一味依前法漬以泉水二升煑取一升生地黄汁一升二味汁相和煑取一升半温分再服一服中病者更勿服也大便當出惡沫千金小品並同又百合病一月不解變成渴者以漬百合水洗身法其後千金方中一味是後服括蔞牡蠣散其次則是竝出第十七卷中小品凡百合病見於隂而以陽法攻之其隂不得解也復發其汗此爲逆其病難治見於陽而以隂法攻之其陽不得解也復下之其病不愈千金百合病經一月不解變成渴者方百合根切一升右一味以水一斗漬一宿以汁洗病人身也洗身訖食白湯餅今餺飥也勿與鹽豉也渴不差可用括蒌根竝牡蠣等分爲散飲調方寸匕日三服小品張仲景方同又療百合病變而發熱者方滑石三兩百合根一兩炙右二味末之飲下方寸匕日三微利者止勿服之熱即除一本云治百合病小便赤澁臍下堅急又百合病變腹中滿痛者方但服百合根隨多少熬令色黄末之飲調方寸匕日三滿消痛止小品同竝出第十卷中傷寒狐惑病方四首仲景傷寒論狐惑之病其氣如傷寒嘿嘿但欲卧目瞑不得眠起卧不安蝕於喉咽者爲惑蝕於隂者爲狐狐惑之病並惡飲食不欲聞飲食臭其靣乍赤乍黑乍白蝕於上部其聲嗄蝕於下部其咽乾蝕於上部瀉心湯主之蝕於下部苦參湯淹洗之蝕於肛外者雄黄熏之又瀉心湯兼療下利不止心中愊愊堅而嘔腸中鳴者方半夏半升洗黄芩三兩人參三兩乾薑三兩黄連一兩甘草四兩炙大棗十二枚擘右七味切以水一斗煮取六升分服一升日三服忌豬肉冷水菘菜海藻羊肉餳千金同出第六卷中又雄黄熏法兼主􅉶病雄黄一物研末以兩筒瓦合之燒以熏下部千金療狐惑薰草黄連湯方黄連四兩去皮薰草四兩右二味切以白漿一斗漬之一宿煮取二升去滓分爲二服忌豬肉冷水小品同又其人脉數無熱微煩嘿嘿但欲卧汗出得之三四日眼赤如鳩眼者得之七八日其四眥黄黑能食者膿已成也療之方以赤小豆三升漬之令生牙足復乾之加當歸三兩爲末漿水服方寸匕日三小品同出第十卷中此本仲景方凡病形不可灸因火爲邪散走血脉傷脉尚可傷藏則劇井輸穴腫黄汁自出經絡外爛肉腐爲癰膿此爲火疽七居反醫所傷也凡微數之脉慎不可灸因火爲邪即致煩逆追虚逐實血散脉中火氣雖微内攻有力焦骨傷筋血難復也外臺秘要方卷二
