body:
  text: 外臺秘要方卷五唐王燾撰療瘧方二十一首病源夏日傷暑秋必病瘧瘧病之發以時者此由邪氣客於風府循膂而下衛氣一日一夜常大㑹於風府其明日下一節故其作也晏此先客於脊背也每至於風府則腠理開腠理開則邪氣入邪氣入則病作此所以日作稍益晏者也其出於風府日下一節二十五日下至尾骶二十六日入於脊内注於伏膂之脈其氣上行九日出於缺盤之中其氣日高故作日益早也其間日發者由邪氣内薄於五藏横連募原其道逺其氣深其行遲不能與衛氣俱行不得皆出故間日蓄積乃作夫衛氣每至於風府則腠理乃發發則邪氣入邪氣入則病作今衛氣日下一節則其氣之發也不當風府其日作者奈何曰此邪氣客於頭項循膂而下者也故虚實不同邪中異所則不得當其風府也故邪中於頭項者氣至頭項而病中於背者氣至背而病中於腰脊者氣至腰脊而病中於手足者氣至手足而病衛氣之所在與邪氣相合則病作故風無常府衛氣之所發必開其腠理邪氣之所合則其府也風之與瘧也相與同類而風獨常在也而瘧得以時休者何也由風氣留其處瘧氣隨經絡沈以内薄故衛氣應乃作陽當陷而不陷陰當升而不升為邪所中陽遇邪則踡陰遇邪則𦂳踡則惡寒𦂳則為慄寒慄相薄故名曰瘧弱則發熱浮乃汗出旦中旦發晚中晚發夫瘧其人形瘦皮必粟起問曰病瘧以月一日發當以十五日愈設不愈月盡解出第十一卷中廣濟療瘧常山散方常山五分升麻二分蜀漆一分右三味擣篩為散一服二錢匕和井華水煮米半合頓服少間則吐吐訖則差忌生葱生菜及諸菓子生冷油膩等物又療瘧常山湯方常山三兩右一味切以漿水三升浸經一宿煎取一升欲發前頓服之後微吐差止忌生葱生菜近効療瘧間日或夜發者張文仲備急同竝出第一卷中張仲景傷寒論辨瘧病師曰夫陰氣孤絶陽氣獨發而脈微者其候必少氣煩滿手足熱而欲嘔也名曰癉瘧若但熱不寒者邪氣在心藏外舍分肉之間令人消爍脫肉又辨瘧脈夫瘧脈自絃絃數者多熱絃遲者多寒絃小𦂳者下之差絃遲者温藥愈弦緊者可發汗針灸也浮大者吐之差脈絃數者風疾也以飲食消息之又辨瘧嵗嵗發至三嵗發連日發不解者以脅下有痞也療之不得攻其痞但虚其津液先其時發汗其服湯巳先小寒者漸引衣自覆汗出小便利則愈瘧者病人形瘦皮上必粟起又問病瘧以月一日發當以十五日愈設不差者當月盡解也如期不差當云何師曰此結為癥􅛎名曰瘧母宜急療之大鼈甲煎方鼈甲十二分炙烏扇三分黄芩三分柴胡六分鼠婦三分熬乾薑三分大黄三分芍藥五分桂心三分葶藶二分熬石韋二分厚朴三分炙牡丹皮五分瞿麥二分紫葳三分半夏一分洗人參一分􅟟蟲五分熬阿膠三分炙蜂窠四分炙赤消十二分蜣蜋六分炙桃仁三分去皮尖熬右二十三味末之取鍛竈下土一斗清酒一斛五升浸土候酒盡一半著鼈甲於中煮令泛爛如膠漆絞取汁下諸藥煎為丸如梧子大空心服七丸日三服忌莧菜生葱胡荽羊肉􅄳等物千金有海藻大㦸蝱蟲無赤消鼠婦用鍛竈灰一斛又瘧發渴者與小柴胡去半夏加括蔞湯方柴胡八兩黄芩三兩人參三兩大棗十二枚擘甘草三兩炙生薑三兩括蔞根四兩右七味切以水一斗二升煮取六升去滓更煎取三升温服一升日三忌海藻菘菜經心錄療勞瘧竝出第十五卷中肘後療諸瘧方取青蒿一把右一味以水一升漬絞取汁盡服之備急張文仲同又方鼈甲三兩炙右一味擣末酒服方寸匕至發時令服三服兼用火炙無不斷者忌莧菜又方牛膝莖葉一把切以酒三升漬一宿分三服令微有酒氣不即斷更作不過三服止文仲備急集驗同竝出第一卷中深師療瘧膈痰不得吐宜吐之常山烏梅湯方烏梅半兩桂心半兩芫花半兩豉五合綿裹半夏半兩常山半兩右六味切以酒三升水四升合煮取二升分三服必得吐一方取三升忌生葱羊肉􅄳生菜一方無半夏常山又療瘧丸神方人參三分鈆丹三分天雄十分熬右三味擣合下篩蜜和初服二丸如梧子臨發服二丸中當温熱四肢淫淫痺為知服藥忌飽飯食瘧斷後食如常萬不失一備急文仲同又療瘧撩膈湯方常山三兩甘草三兩炙松蘿二兩烏梅十四枚黄芩二兩𤓰蒂十四枚梔子仁十四枚擘右七味切以酒二升漬一宿明旦以水四升煮取三升分三服忌海藻生葱生菜菘菜等又瘧結實積熱煩擾迷冒寒熱但多綿惙困篤常山大黄湯方常山三兩甘草三兩炙前胡二兩大黄三兩右四味切以水一斗煮取三升半下大黄煎取三升分澄令冷初服七合中服八合比欲發服九合王文州大子因瘧危困服此皆愈忌海藻菘菜生葱生菜等又療瘧醇醨湯方生薑三兩烏梅三七枚擘一方十四枚甘草三兩炙桂心二兩常山三兩蘘荷根三兩右六味切以水六升煮取一升曰醇未發時須頓服更以水三升煮取一升曰醨至發不斷復頓服甚良别方説發日平旦服醨一升以醇著頭邊若欲發便服醇良二説不同也忌海藻菘菜生葱生菜出第二十二卷中千金麻黄湯療瘧須發汗方麻黄四兩去節大黄四兩栝樓四兩甘草一兩炙右四味切以水七升煮取二升半分三服未發前食頃服臨發更服服後皆覆取汗忌海藻菘菜集驗同出第十卷中千金翼療瘧病醫不能救者方以繩量病人脚圍繞足跟及五指一匝訖截斷繩取所量得繩置頂上著反向背上當繩頭處中脊骨上灸三十壯則定候看復惡寒急灸三十壯則定比至過發一炊乆候之雖飢勿與食盡日此神驗男左足女右足出第十八卷中崔氏療瘧㑹稽賴公常山湯方常山三兩石膏八兩碎綿裹廿竹葉一把切糯米一百粒右四味切以水八升明旦欲服今晩漬於銅器中露置星月下高浄處横刀其上向明取藥於病人房門前於銅器裏緩火煎取三升分三服日欲出一服臨發又一服若即定不須後服取藥滓石膏裹置心上餘四分置左右手足心甚驗忌生葱生菜出第四卷中備急華佗常山桂心丸神良方甘草炙常山大黄桂心各四分右四味末之蜜和平旦服如屎每欲發服六丸飲下之欲服藥時先進少熱粥良忌海藻菘菜生葱生菜文仲同出第二卷中延年療瘧常山丸方裴右庶送常山四分青木香四分南者蜀漆一分牡蠣二分煅大黄二分烏梅肉一分熬丹砂二分研豉二分熬知母二分鼈甲二分炙麻黄一分去節右十一味擣篩蜜和為丸丸如梧子未發前粥飲服五丸訖微吐後須臾任食至欲發更服十丸忌莧菜生血物生葱生菜油膩崔氏同又療瘧丸方常山三兩甘草二分炙知母四分右三味擣篩蜜和為丸丸如梧子未發前飲服十五丸臨發服十五丸得快吐則愈忌海藻生葱生菜菘菜竝出第十五卷中必効療瘧雞子常山丸方取雞子一枚斷開頭出黄及白令盡置小鐺子中又取常山細末量滿前空殻又傾鐺子中又量白蜜還令滿殻復傾鐺子中三味同攪微火煎之勿停手微冷可丸則停丸如梧子如病人午時發已時服三十丸欲至發時又服三十丸用飲汁下欲吐任吐亦如前服訖更不發者不須服服後禁脂膩油麫生菜𤓰菓七日此方勑賜喬將軍服之立効小品崔氏文仲延年支家備急竝同又療瘧不差虎骨常山丸方虎頭骨炙常山甘草炙鼈甲炙烏梅熬萎蕤白薇升麻茯苓石膏研知母麥門冬去心豆豉熬地骨白皮右十四味各等分合擣蜜和丸如梧子大未發前日晩空肚服二十丸至發日平旦服四十丸如人行十里食白粥一椀欲發時亦服三十丸三日内慎生冷萬無一觸不吐自差魏右史處得云竒効忌海藻菘菜大酢生葱生菜莧菜又療瘧常山酒方常山一兩切獨頭䔉一顆去根莖横切糯米一百粒烏豆一百粒清酒一升右五味病未發前一日以酒浸藥於椀中以白紙一張覆之椀上横一刀欲發時三分飲一分如未吐更服一分得吐則差忌生菜生葱竝第一卷中古今錄驗療瘧豉心丸方香豉五合熬令色變常山二兩大黄三分附子二分炮右四味擣篩蜜和丸服如大豆十丸當勿食比至發來令服三十丸瘧不止亦可至四十丸瘧必止若膈上有停痰欲吐聴之若腹中實欲下亦無妨常有驗忌生葱生菜等楊孔思方出第四卷中又烏梅丸療瘧無問温瘴痰瘧悉皆主之方烏梅肉二兩常山二兩鼈甲二兩炙香䜴二兩蜀漆二兩生用人參一兩肉蓯蓉二兩桂心二兩知母二兩桃仁二兩去尖皮别擣如稀􅄳右十味擣篩為末蜜和丸如桐子空心以酒飲任下三十丸忌生葱生菜莧菜海藻菘菜一方有升麻甘草各二兩為十二味五藏及胃瘧方六首病源肺病為瘧者乍來乍去令人心寒寒甚則熱發善驚如有所見此肺瘧證也若人本來語聲清雄忽爾不亮拖氣用力方得出言而反於常人呼共語直視不應雖曰未病勢當不久此則肺病聲之候也察病觀疾表裏相應依源審療乃不失也心病為瘧者令人心煩甚欲飲清水多寒少熱若人本來心性和雅而忽卒急反於常倫或言未訖便住以手剔脚爪此人必死禍雖未及呼曰行尸此心病聲之候也虚則補之實則瀉之不可療者明而察之肝病為瘧者令人色蒼蒼然氣息喘悶戰掉狀如死者若人本來少於悲恚忽爾嗔怒出言反常乍寛乍急言未訖以手向眼如有所思若不即病禍必至矣此肝病聲之候也其人若虚則為寒風所傷若實則熱氣所損陽則瀉之陰則補之脾病為瘧者令人寒則腹中痛熱則腸中鳴鳴己則汗出若其人本來少於喜怒而忽反常嗔喜無度多言自笑不答於人此是脾病聲之候也不盈旬日禍必至矣腎病為瘧者令人悽悽然腰脊痛而宛轉大便澀身掉不定素問作目眴眴然手足寒若人本來不喜不怒忽然謇而好瞋怒反於常性此腎巳傷雖未發覺是其候也見人未言而前開口笑還閉口不聲舉手𤓰柵腹此腎病聲之候也虚實表裏浮沈清濁宜以察之逐以療之夫瘧脈者自弦弦數者多熱弦遲者多寒弦小𦂳者可下之弦遲者温藥巳若脈數而𦂳者可發汗針灸之脈浮大者不可針灸之凡瘧先發食頃乃可以療之過之則失時足太陽之瘧令人腰痛頭重寒從背起先寒後熱熇熇虚嬌切􅀈􅀈然熱止汗出難巳刺郄中出血足少陽之瘧令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然熱多汗出甚刺足少陽足陽明之瘧令人先寒洒洒浙浙寒甚久乃熱熱去汗出喜見日月光火氣乃快然刺足陽明胕上足太陰之瘧令人不樂好太息不嗜食多寒熱汗出病至則善嘔嘔巳乃衰則取之足少陰之瘧令人悶吐嘔甚多寒熱熱多寒少欲閉户而處其病難止足厥陰之瘧令人腰痛少腹滿小便不利如癃狀非癃也數小便意恐懼氣不足腹中悒悒刺足厥陰肺瘧者令人心寒寒甚發熱熱間善驚如有所見者刺手太陰陽明心瘧者令人煩心甚欲得清水反寒多不甚熱刺手少陰肝瘧者令人色蒼蒼然太息其狀若死者刺足厥陰見血脾瘧者令人病寒則腹中痛熱則腸中鳴鳴巳汗出刺足太陰腎瘧者令人洒洒腰脊痛宛轉大便難目眴眴然手足寒刺足太陽少陰胃瘧者令人且病也善飢而不能食食即支滿腹大刺足陽明太陰横脈出血竝出第十一卷中千金療肝邪熱為瘧顔色蒼蒼戰掉氣喘或熱乆勞動如瘧積年不差烏梅丸方烏梅肉四分蜀漆四分石膏八分研鼈甲四分炙常山六分香豉一合熬知母四分甘草三分炙細辛三分苦參四分萎蕤五分右十一味擣篩蜜和丸如梧子大酒服十丸日再飲下亦得忌莧菜生菜生葱海藻菘菜又療心瘧令人煩心甚欲得清水多寒少熱者常山湯方常山四兩淡竹葉切二升梔子仁三七枚擘石膏五兩碎綿裹烏梅三七枚擘鼈甲四兩炙甘草一兩炙香豉一升綿裹蜀漆三兩右九味以水九升煮取三升分温三服忌生葱生菜菘菜人莧海藻刪繁同又療脾熱或渴或不渴熱氣内傷不洩轉為脾瘧令人病寒則腹中痛熱則腸中鳴轉汗出常山丸方常山三兩甘草半兩炙知母一兩鼈甲一兩炙右四味擣篩蜜和丸如梧子大未發前酒服十丸臨發又一服正發又一服忌生葱生菜海藻菘菜人莧等又療肺熱痰聚胷中來去不定轉為瘧其狀令人心寒甚即發熱熱間善驚如有所見常山湯方常山三兩秫米三百粒甘草二分炙右三味切以水七升煮取三升分三服至發時令三服盡忌生葱生菜海藻菘菜等刪繁同又療腎熱發為瘧令人悽悽然腰脊痛宛轉大便難目眴眴然手足寒常山湯方常山三兩烏梅三七枚碎香豉八合熬裹淡竹葉切一升葱白一握除青令盡右五味切以水九升煮取三升去滓分温三服至發令盡忌生葱生菜等竝出第十卷中刪繁療胃腑瘧者令人善飢而不能食四肢脹滿氣喘藜蘆丸方藜蘆一兩皂莢一兩去皮子常山一兩巴豆三十枚去皮熬牛膝一兩右五味熬藜蘆皂莢色令黄合擣為末蜜丸如小豆旦服一丸未發前一丸正發一丸一日勿食飲忌野豬肉蘆笋生葱生菜貍肉等六腑唯胃有瘧不可别列故附於後千金同出第六卷中温瘧方五首病源夫温瘧與寒瘧安舍温瘧得之冬中於風寒寒氣藏於骨髓之中至春則陽氣大發邪氣不能出因遇大暑腦髓鑠肌肉消釋腠理發泄因有所用力邪氣與汗偕出此邪氣先藏於腎其氣先從内出之於外如是則陰虚而陽盛盛則病矣陽衰則氣復反入入則陽虚陽虚則寒矣故先熱而後寒名曰温瘧瘧先寒而後熱者此由夏傷於大暑汗大出腠理開發因遇夏氣淒滄之小寒寒迫之藏於腠理皮膚之中秋傷於風則病成矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱病以時作名曰寒瘧先傷於風而後傷於寒故先熱而後寒亦以時作名曰温瘧夫病瘧六七日但見熱者温瘧也出第十一卷中甲乙經黄帝曰夫瘧皆生於風夏傷於暑秋為㾬瘧黄帝問瘧先寒而後熱何也岐伯對曰夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也名曰寒瘧又問曰先熱而後寒者何也對曰先傷於風而後傷於寒故先熱而後寒也名曰温瘧其但熱而不寒者陰氣先千金作孤絶陽氣獨發即少氣煩寃手足熱而欲嘔名曰癉瘧又曰温瘧者得之冬中於風寒寒氣藏於骨髓之中至春即陽氣大發邪氣不能出因遇大暑腦髓鑠肌肉消釋腠理發洩因有所用力邪氣與汗偕出此邪氣先藏於腎其氣先從内出之於外如是者陰虚而陽盛盛則病矣陽衰則氣復反入入則陽虚陽虚則復寒矣故先熱而後寒名曰温瘧又曰癉瘧者肺素有熱氣盛於身厥氣逆上中氣實而不外泄因有所用力腠理開風寒舍於皮膚之内分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不及於隂故但熱不寒熱氣内藏外鑠肌肉故名曰瘅瘧出庚卷第七千金同廣濟療温瘧漸漸羸瘦欲成骨蒸常山湯方常山三兩車前葉一握甘草二兩炙獮猴骨三兩炙烏梅肉二兩天靈葢一兩燒作灰末驢糞汁三合右七味切以水六升煮五味取三升去滓下糞汁天靈葢末分三服微吐不利忌生葱生菜海藻菘菜麫食等又療温瘧常山丸方常山烏梅肉熬䜴天靈葢燒各六分知母朱砂蜀漆大黄右八味擣篩蜜和丸如梧子空肚以温酒下二十丸至三十丸日三服並未發前服不吐利忌生葱生菜生血等物竝出第十卷中千金論曰癉瘧者陰氣孤絶陽氣獨發其候也少氣煩滿手足熱欲嘔熱而不寒氣藏在心又曰有温瘧者其脈如平人無寒時熱其候骨節疼煩時嘔朝發暮解暮發朝解皆白虎加桂心湯主之方知母六兩甘草二兩炙石膏碎一斤粳米六合右四味切以水一斗二升煮取米爛去滓加桂心三兩煎取三升分温三服覆令汗先寒發熱汗出者愈忌海藻菘菜生葱傷寒論云用粃粳米不熟稻米是也出第十卷中備急竹葉常山湯療温瘧壯熱微寒温瘧之候也壯熱後如覺微寒或癉瘧依時手足冷少時便壯熱亦有手足煩熱乾嘔者㾬瘧先大寒後大熱者並主之神効尢宜乳下小兒亦差方常山三兩切淡竹葉一握小麥一升右三味以水五升漬一宿明旦煮取二升温分三服忌生菜生葱支小品文仲竝同出第三卷中延年療温瘧壯熱不能食知母鼈甲湯方知母鼈甲炙地骨皮各三兩常山二兩竹葉切一升石膏四兩碎右六味切以水七升煮取二升五合去滓分三服忌豬肉莧菜生葱生菜出第十七卷中山瘴瘧方一十九首病源此病生於嶺南帶山瘴之氣也其狀發寒熱休作有時皆由挾溪源嶺瘴温毒氣故也其病重於傷暑之瘧矣出第十一卷中小品療山瘴瘧陵鯉甲湯南方山嶺溪源瘴氣毒作寒熱發作無時痿黄腫滿四肢痺弱皆山毒所為也並主之方陵鯉甲十片炙千金用十四片烏賊魚骨去甲鼈甲炙各一兩常山三兩附子一枚炮右五味切以酒三升漬之一夕先瘧發前稍稍服之勿絶藥味兼以塗身體斷雜人勿食飲過時乃得通人進飲食忌莧菜生葱生菜豬肉千金文仲備急經心錄竝同出第六卷中千金療乍寒乍熱乍有乍無山瘴瘧酒方常山三兩鼈甲炙升麻附子烏賊魚骨去甲各二兩右五味並切絹袋盛以酒六升漬之小令近火轉之一宿成一服一合比發可數服或吐忌豬肉生葱生菜莧菜肘後療老瘧久不斷出第十卷中備急夫瘴與瘧分作兩名其實一致或先寒後熱或先熱後寒嶺南率稱為瘴江北總號為瘧此由方言不同非是别有異病然南方温毒此病尢甚原其所歸大畧有四一山溪毒氣二風温痰飲三加之鬼癘四發以熱毒在此之中熱毒最重故所用藥物須審病源患瘧瘴之後特須防瘴而發痢死不旋踵所以然者瘴體先虚虚不宜痢又瘴宜冷差痢宜温斷斷痢則益瘴斷瘴則益痢大率如此不可不慎非直藥療亦須宜加將息取適若能用一色藥兼二種病冷而止痢温而斷瘧最其妙也如不然先須斷痢然後療瘴瘴緩痢急故也仍率須作挾毒防之不得専醫其痢又服瘴藥皆在發前必須平旦空腹服服藥之後勿洗手面潄口勿通外人勿喫食勿勞力既過發時久小進麋粥如此將療無不即斷又當發熱之時慎勿多飲冷水及多服冷藥若心下冷結更是難療得瘧之後復成癥癖亦有即發氣者死不救若熱渴者豉汁煖服取足得吐彌善水煮豉研犀汁與服兼時進生葛根汁其大熱盛者與紫雪如兩棗許大水和飲之并燒豬糞人糞作黄龍湯亦善各可服三二升又擣一大鼠絞汁與服大止熱毒瘴熱病服此俱効其鼠并頭皮五藏等全擣若汁少著少許水和絞亦不難服常用立驗也又療瘴瘧服藥後灸法灸大椎三四十壯無不斷若先寒者將欲寒預前以炭火安床下令背煖并灸鼈甲末一方寸匕煖酒和服至發時令得三服被覆過時無不斷此是陶氏法比欲寒時但以火灸其背亦乃即差者縱發亦輕効驗又療瘴瘧常山丸方常山黄連䜴各三兩附子二兩炮右四味擣篩為末蜜和丸如梧子發前空腹服四丸欲發更服三丸飲下之自旦至暮乃食三日勿雜食豬肉魚肥膩及生冷生葱生菜桂廣州家傳已用有効此方兼痢者差又麻黄散方麻黄去節常山杏仁去尖皮熬人參乾漆熬甘草炙鼈甲各二兩炙右七味作散平旦空腹温酒三合服方寸匕日再宜七日連服服後七日不得食雜物此許仁則五方元比部云在嶺南服得力大驗年時常服一劑按此兼補虚羸者忌莧菜生葱生菜海藻菘菜又若患瘴熱實兼吐痢者大黄湯方大黄常山升麻甘草炙各三兩右四味切以水七升煮取二升半分三服發前盡服别取吐利此蔣家傳忌海藻菘菜生葱生菜又若瘴熱兼痢苦渴者烏梅飲方烏梅二十枚取好者擘破右一味以水一大升煮取一大盞去梅和一匙蜜細細啜之近方驗竝出第二卷中延年蜀漆丸主嶺南瘴氣發乍熱乍寒積勞似瘧皆主之千金翼方云兼主㾬瘧連年不差方蜀漆知母升麻白薇地骨皮麥門冬各五分烏梅肉鼈甲炙萎蕤各四分石膏八分甘草三分炙常山六分豆豉一合熬右十三味擣篩為末蜜和丸如梧子大飲下十丸日再服加至二十丸此方用無不差加光明砂一兩神良忌海藻菘菜人莧生葱生菜千金亦療勞瘧崔氏千金翼集驗竝同出第十七卷中救急療瘧瘴癘經百日或一年以上諸藥不能差進此方無不損者蜀漆湯方白薇蜀漆知母甘草苦參升麻龍膽各二兩常山大黄别漬後下各四兩鼈甲炙石膏碎茯苓黄芩各三兩香豉二合褁獨蒜七顆切淡竹葉切一升右十六味切以水一斗漬之并春酒二升合煮取三升去滓分三服未發前一服欲至發時又一服皆温之當發日勿見人在一静房卧藥滓置病兒頭邊仍以藥汁塗手面過時任出忌肥膩腥臊滑物生冷海藻人莧大酢菘菜生葱生菜又朱砂丸方朱砂光明者牛膝常山各等分右三味擣篩為末蜜和丸如梧桐子候瘧發日平明服七丸飲下欲覺發時更服七丸當日不斷更作一服即差忌生葱生菜生血物油膩牛肉等又勑賜長孫祥極効常山湯方常山八分橘皮六分牡蠣四分熬桂心二分右四味擣篩為散發日平旦酒服一方寸匕臨發又一匕發後又一匕二日不得洗手面七日忌食雜物唯藥用酒餘皆斷或吐或不吐皆差忌生葱生菜又方取五六嵗兒小便一升内白蜜二大匙攪使相得去白沫訖即頓服當大吐碧綠痰然後食若不得吐但數小便亦佳以前兩方吐碧痰外更吐白沫出後可喫食不然瘴氣終不除又常山湯方常山苗一握無苗取根五兩代之獨蒜七顆淡竹葉二握䜴一合褁鼈甲三兩炙右五味切以苦酒三升煎取一升臨發隨性多少服之盡服之訖當大吐便愈忌人莧生葱生菜古今錄驗瘴瘧及嶂氣常山湯方常山三兩細切右一味擣碎虚弱者二兩蒜七瓣去皮中切以酒一小升半漬一宿旦去滓煖服盡須臾當吐令盡好過時食一日不得潄口及洗手面三七日慎生葱生菜生冷肉麫油膩若早發者半夜服要令吐出第四卷中近効療瘧瘴孟補闕嶺南將來極効常山丸方常山豉熬桃仁去尖皮熬等分右三味各擣末先以豉和桃人擣如泥然後下常山末細攪蜜丸如梧桐子候欲發前一食時酒下四十丸須臾更服二十丸如不差更服逺不過三服能信用者無不差忌生葱生菜又凡跋涉江山防諸瘴癘及蠱毒等常服木香犀角丸方青木香犀角屑羚羊角屑各六分升麻𤣥參豬苓檳榔各十分鼈甲炙甘草炙各八分豉二十分熬右十味擣篩為末蜜和丸如梧子酒飲服三十丸日二服若體熱即去甘草檳榔加大黄二十分忌海藻菘菜又主瘧兼痢無問赤白水榖鮮血瘴皆差黄連犀角丸方黄連犀角屑香豉熬各二兩龍骨四兩牡蠣二分熬右五味擣篩為末蜜和丸如梧子米飲下三十丸日三服差止忌豬肉冷水油膩等又瘴瘧不差蜀漆丸方蜀漆青木香升麻鼈甲炙牡蠣熬朱砂豬苓香豉各四分常山大黄各八分右十味擣篩為末蜜和為丸如梧子米湯下十二丸日二服漸漸差至平復止忌人莧油膩陳臭生血等物十二時瘧方一十二首千金翼黄帝問岐伯曰瘧多方少愈者何岐伯荅曰瘧有十二種帝曰瘧鬼字何可得聞乎岐伯曰但得瘧鬼字便愈不得其字百方不愈黄帝曰瘧鬼者十二時願聞之岐伯曰寅時發者獄死鬼所為療之右以瘧人著窰上灰火一周莫令火息即差夘時發者鞭死鬼所為療之右用五色衣燒作灰三指撮著酒中無酒用清水服之辰時發者墮水死鬼所為療之右令瘧人上木高危處以棘子塞木根間立差巳時發者燒死鬼所為療之右令瘧人坐師以周匝然火差午時發者餓死鬼所為療之右令瘧人持脂火於田中無人處燒脂香假拾薪去即差未時發者溺死鬼所為療之右令瘧人臨發時三渡東流水即差申時發者自刺死鬼所為療之右令瘧人欲發時以刀刺􅊘上使得姓名字呪曰若差我與汝拔却即差酉時發者奴婢死鬼所為療之右令瘧人碓梢上捧上卧莫令人道姓字即差戌時發者自絞死鬼所為療之右令索繩繫其手脚腰頭即差亥時發者盜死鬼所為療之右以刀子一口箭一枝灰一周刀安瘧人腹上其箭横著底下差子時發者寡婦死鬼所為療之右令瘧人脱衣東廂床上卧左手持刀右手持杖打令聲不絶瓦盤盛水著路邊即差丑時發者斬死鬼所為療之右令瘧人當户前卧頭東向血流頭下即差竝出第十八卷中發作無時瘧方二首病源夫衛氣者陽氣也一日一夜大㑹於風府則腠理開腠理開則邪氣入邪氣入則病作當其時陰陽相并隨其所勝則生寒熱故動作皆有早晏若府藏受邪内外失守邪氣妄行所以休作無時也出第十一卷中肘後療瘧發作無常心下煩熱者常山湯方常山二兩甘草一兩半炙䜴五合綿裹右三味切以水六升煎去滓取二升再服當快吐仍節飲食忌海藻菘菜生葱生菜文仲同又雞子常山丸療諸瘧竝經服諸藥法術不斷發無復定時不可復斷者宜服此丸忌食物勿勞力即斷方常山三兩右一味擣篩為散以雞子白和併手為丸如梧桐子大令圓調丸訖分置銅鏂子中以湯煮銅鏂令熱殺得雞子腥氣即止以竹葉清飲服三十丸欲吐但吐比至發時令得三服時早可食者斷若晩不可斷食者當作竹葉汁麋食之忌生葱生菜經心錄同竝出第一卷中㾬瘧方五首病源夫㾬瘧者夏傷於暑也其病秋則寒甚冬則寒輕春則惡風夏則多汗然其畜作有時以瘧之始發先起於毫毛伸欠乃作寒慄叔頷腰脊俱痛寒去則外内皆熱頭痛而渴唯欲冷飲何氣使然此陰陽上下交争虚實更作陰陽相移也陽并於陰則陰實而陽明虚陽明虚則寒慄敊頷太陽虚則腰背頭項痛三陽俱虚則陰氣勝陰氣勝則骨寒而痛寒生於内故中外皆寒陽盛則外熱陰虚則内熱外内皆熱則喘而渴故欲冷飲也此皆得之夏傷於暑熱氣盛藏於皮膚之内腸胃之外此營氣之所舍也此令人汗出空疏腠理開因得秋氣汗出遇風乃得之及得以浴水氣舍於皮膚之内與衛氣并居衛氣者晝日行陽夜行於陰此氣得陽而外出得陰而内薄内外相薄是以日作其間日作者謂其氣之舍深内薄於陰陽氣獨發陰邪内著陰與陽争不得出是以間日而作出第十一卷中小品常山湯療痎瘧先寒戰動地寒解壯熱日日發及間日發竝斷方鼈甲一兩炙淡竹葉切三升洗常山二兩甘草炙三兩久酒三升右五味切以酒漬藥刀置上覆頭安露地明旦以水七升煮取三升分五服比未發前令盡當吐吐極傷多不必盡劑但斷人禁飲食得吐過時乃佳忌人莧海藻菘菜生葱生菜出第六卷中集驗夫瘧必從四肢始療方先其時一食頃用細左索繩𦂳束其手足十指過發時乃解之千金同又方先作羊肉臛餅飽食之其進少酒隨所能令其欣欣有酒氣入一宻室裏然炭火厚覆取大汗則差燕國公説此方常見用有驗竝出第二卷中方士弱曰虚者得効實者彌甚又療温瘧勞瘧烏梅飲子方烏梅七顆桃栁心各七莖葱白七莖豆豉一合甘草四分柴胡四分知母四分大黄三分右八味各細剉以童子小便兩茶椀宿浸明旦早煎三兩沸去滓頓服差未差更作服三服永差忌海藻菘菜又療温瘧痰瘧乆不差黄連散方宣州黄連二兩右一味擣篩末以濃酒一盞調三錢空心頓服相次更服三錢更飲三兩盞酒任意醉却睡候過時方得食如渴枳實煎湯併三日服差忌豬肉冷水間日瘧方二首病源此由邪氣與衛氣俱行於六腑而有時相失不相得故邪氣内薄五藏則道逺氣深故其行遲不能與衛氣偕出是以間日而作也出第十一卷中備急療間日瘧方燒黒牛尾作灰酒服方寸匕日三服出第十卷中又桂廣州法醇醨湯方大黄三分甘草一分半炙常山一分半右三味以水三升煮取一升去滓更以水二升煮滓取一升未發服醨醨是後煮者相次服醇醇是前煮者差忌菘菜海藻生葱生菜支云極驗文仲經心錄方無甘草用石膏三銖餘同一方有桂心一分半出第二卷中乆瘧方八首病源夫瘧皆由傷暑及傷風所為熱盛之時發汗吐下過度腑藏空虚榮衛傷損邪氣伏藏所以引日不差仍故休作也瘧嵗嵗發至三嵗發連日發不解脅下有痞療之不得攻其痞但得虚其津液先其時發其汗服湯已先寒引衣自覆汗出小便自利則愈也出第十一卷中深師療久瘧難斷香䜴丸方香豉一分熬常山七分蜀漆十分附子一分炮大黄二分好者右五味擣下篩蜜和發日早服五丸如梧子須臾又服五丸發晩者至發可三四服令其得吐為佳欲不即斷畏吐者但則長將乆服無不差也忌生葱生菜豬肉又療三十年瘧常山湯方常山三兩黄連三兩右二味切以酒一斗宿漬之向晩以瓦釡煮取六升一服八合比發時令得三服有熱當吐有冷當下服之者千百無一不斷亦可半合無服全劑者忌豬肉冷水生葱生菜竝出第二十二卷中千金梔子湯主瘧經數年不差者兩劑差一月以來一劑差方梔子十四枚常山三兩車前葉二十枚炙乾秫米十四粒右四味切以水九升煮取三升分三服未發一服發時一服發後一服以吐利四五行為差不止冷飲止之忌生葱生菜出第十卷中崔氏療瘧縱久患者不過五六服以來亦差常山㪚方常山三兩乾漆三兩熬煙盡牡蠣一兩半熬桂心三兩橘皮二兩杏仁二兩去皮尖熬右六味擣篩為散一服方寸匕先發熱飲和服若先寒清酒和服之時取未發前一食頃服服藥日唯須晩食七日内慎如藥法忌生葱生菜出第四卷中備急龍骨丸療久瘧不斷者方龍骨一兩常山三兩大黄二兩附子二分炮右四味擣末以雞子黄丸如梧子大先發臨發各飲服五丸無不斷長將服之支云神驗療三十年瘧忌生葱生菜豬肉等張文仲支方同出第二卷中備急療瘧連綿積日不差常山散方常山三兩羚羊角三兩炙令焦烏梅肉三兩黄芩二兩甘草一兩半炙右五味擣為散以竹葉煮飲取六七合飲及熱用調常山散三方寸匕未發前一服若差停不差臨欲發又進二寸匕老小以意量之忌海藻菘菜生葱生菜又療瘧無問年月逺近竝差烏梅丸方烏梅肉三兩熬蓯蓉三兩桃仁三兩熬去皮常山三兩熬升麻二兩炙桂心二兩甘草二兩炙右七味擣篩蜜和丸如梧子大未發時酒服二十丸欲至發時更服二十丸百無所忌唯觸之則難差飲服亦得此藥或吐利或不吐利勿恠五六日頻進佳忌海藻菘菜生葱生菜一方有豉三兩熬文仲備急同竝出第一卷中近効療乆難差瘧常山酒方常山三兩鼈甲二兩炙鯪鯉甲一兩炙烏賊魚骨一兩炙烏梅肉七枚桃仁四十九枚去皮尖别擣如泥竹葉切一升豉三合熬令香葱白切一升右九味細切合以酒三升漬經再宿空腹早朝温服一合良久取吐如不吐至齋午以來服之四服如不差隔日更依前服必差差後十日内不得喫冷水粘滑人莧生菜餘如常梁顥處勞瘧方三首病源凡瘧積久不差者則表裏俱虚客邪未散真氣不復故疾雖暫間小勞便發也出第十一卷中肘後療勞瘧鼈甲酒方鼈甲二兩炙黄常山三兩蜀漆二兩烏賊魚骨一兩炙附子一兩知母二兩椒一兩汗右七味切以酒三斗漬一宿平旦服一合稍稍加至二合日三四服忌莧菜生葱生菜豬肉竝出第一卷中千金勞瘧積久不斷衆療無効此方療之長生大牛膝一虎口切以水六升煮取二升分再服第一服取未發前一食頃服第二服臨發服張文仲肘後同出第十卷中集驗療一切療勞瘧無問年月深逺阿魏散及丸方阿魏安息香蘿蔔子各二兩蕪荑一合右四味擣篩為散以煖水服半錢如不能散服蜜丸熟水下三十丸須臾吐忌冷水如吐不止喫䔉虀餺飥仍以貼子盛散一錢男左女右繫臂上立差出第三卷中牝瘧方二首仲景傷寒論牝瘧多寒者名牝瘧牡蠣湯主之方牡蠣四兩熬麻黄四兩去節甘草三兩炙蜀漆三兩若無用常山代之右四味切以水先洗蜀漆三遍去腥以水八升煮蜀漆及麻黄去沫取六升内二味更煎取二升去滓温服一升即吐勿更服則愈忌海藻菘菜又療牝瘧蜀漆散方蜀漆洗去腥雲母龍骨又三味等分擣篩為散先未發前一炊以清酢漿水和半錢服臨發時更服一錢温瘧者加蜀漆半分雲母炭火燒之三日三夜用雲母一作雲實竝出第十五卷中一切瘧方四首崔氏療一切瘧大黄丸方大黄三兩朴硝二兩巴豆一兩去皮熬令黒研如泥右三味擣篩大黄朴硝然後内巴豆以蜜和擣二千杵丸如梧桐子大米飲下兩丸日二服不斷再服即差忌蘆笋野豬肉等物救急療一切瘧常山湯方常山三兩石膏八兩打破綿褁白秫米一百二十粒淡竹葉一握右四味以水八升漬一宿煮取二升五合去滓分温三服清旦一服欲發一服正發時一服三服訖静室中卧莫共人語過時後洗手面與食七日禁勞生葱生菜酒及熱麫毒魚久瘧不過再劑一方加烏梅二七枚熬之集驗療瘧間日或夜發出姚大夫出第一卷中古今錄驗療一切瘧大有驗朱砂丸方朱砂一兩蜀常山三兩右二味各擣下篩畢别取朱砂瓷器中細研可一日研如麫白蜜和童兒擣一萬七千杵訖作丸如梧子大一服三丸用清酒下行五十餘步隨意坐卧無酒湯下亦得唯須暖將息病人氣力强仍不廢行動者則須於當發日服之如似日西發者臨發之日勿食平旦服三丸巳時服三丸午後更服三丸則差若不差必定輕微更服則差餘時發者凖此日西一時任意消息其病人氣力微弱者不得臨發日服應預前一日服之如似明日發者今日平旦空腹服三丸至齋時食一椀粥至日西更服三丸至日暮復食一椀淡粥竝不得飽食至一更盡更服三丸至平明食粥一椀至齋前更進三丸不得食至午時更進三丸必差差後三日以來唯得食甜粥飲漿忌生冷酢滑膩麫及飽食七日以來特忌生血物生葱生菜若後七日餘者漸食生冷二種須復日禁若如百日來患差後還須百日禁忌生冷乃至七日患者差還復禁七日生冷患來雖經多年但得百日以來禁生冷過百日後得食無妨若不禁者必還重發患來日久極重者不過十服差近者三五服則差病人十五以上者一服三丸十五以下七嵗以上者一服兩丸七嵗以下者一服一丸如小者分此一丸丸作二小丸服之出第四卷中近効加減療一切瘧無不効比用不過再服入口如神萬不一失桃人常山丸方桃仁二兩不熬亦不去雙仁尖皮常山二兩豆豉三兩右三味各别擣五六百杵又和更擣六七百杵然後㸃好酒如黒泥自成丸不飲酒事須酒下三十丸如梧子未發前服臨發更服三十丸以手捧之於鼻下嗅取氣便定如不得平復更服三十丸或吐或微利勿怪亦有不吐利差者吐了仍不得潄口亦不得喫生葱生菜果子甜物油膩等却發則難差此來者不過再三服便差一服差者多其常山須蜀者始堪使用桃仁須是毛桃仁餘者即無効豉須新羙不用陳者渴者取烏梅三枚作漿稍稍咽三五咽其藥唯一人患則少合不堪預合無力不効今方有常山一兩桃人五七枚豉一合甜多者佳擣常山作散訖次研桃人作泥别擣䜴㸃酒擣三五百杵次一處和擣又六百杵以來如法服之醫人夏侯拯錄之灸瘧法一十三首千金療瘧灸法灸上星及大椎大椎穴在背從第一椎上節䧟中是也至發時令滿一百壯艾炷如黍粒俗人不解取穴務大炷又法覺小異則灸百㑹七壯若後更發又灸七壯極難愈者不過三灸又法以足蹋地以綖圍足一匝中折從大椎向百㑹灸綖頭三七壯炷如小豆許大又法灸風池二穴各三壯又法從手發者灸三間穴在虎口第二指節根下一寸三年痎瘧欲發慘慘則下火又法從頭項發者未發前預灸項大椎尖頭漸灸過時止又法從腰發者灸腎俞百壯穴在第十四椎下兩傍各一寸半是又療一切瘧無問逺近法正仰卧以綖量兩乳間中屈從乳向下灸度頭隨年壯男左女右灸又療五藏瘧及一切諸瘧法灸尺澤七壯穴在肘中約紋動脈是也又療痎瘧法上星主之穴在鼻中央直入髮際一寸䧟容豆是也灸七壯又療瘧日西而發者法臨泣主之穴在目貲上入髮際五分䧟者中是也灸七壯又療瘧多汗腰痛不能俛仰目如脱項如拔者法崐崘主之穴在足外踝後跟骨上䧟中是也灸三壯又療瘧實則腰背痛虚則鼻衂法飛揚主之穴在外踝上七寸灸七壯竝出第十卷中禳瘧法六首千金療瘧法未發前抱大雄雞一隻著懷中時時驚動令雞懷中作大聲無不差肘後同出第十卷中崔氏書瘧法平旦日未出時閉氣書之先書額上則戴九天次書兩手心作把九江又書背上從右脾骨下向左分作兩行書之一如後法南山有一木木下不流水水中有一魚三頭九尾不食五穀唯噉瘧鬼急急如律令又書兩脚心下作履九江右以前法既不損人又無不差者其有一度書不甚差可更書之書符必不得脱錯亦不可重㸃畫不成也又勿食五辛書瘧法路州滿上人傳云妙不可道以下二法余用俱効又法令所患人未發前正南北眠頭向南五心并額及舌上七處閉氣書鬼字則差隨意任東西肘後同又法總書八行其下七行一凖前行通而為八山題子山題子山題子山題子凖前計更有七行通前為八行此符厭瘧鬼一去千里外急急如律令某年某月某州某縣某鄉某里姓名牒姓名則所患人也右以手把符勿開男左女右待過時久然後任開其符仍以火燒却呪瘧法候病者發日日未出時自執一石於水濵一氣呪云眢眢團團行路非難捉取瘧鬼送與河官急急如律令即投石沉於水中勿反顧而去竝出第四卷中元希聲侍郎集騐書瘧法額上書兩金字重胷前書兩火字竝背上書兩水字竝兩手書木字单兩足下各書土字齊下作四口字重右含水閉氣用朱書未發前書之有驗許仁則療瘧方四首許仁則此病之候乃有數種亦有宿患痃癖飲食失宜因節氣初交亦生此病亦有痰澼積聚乆不通散冷熱相攻亦生此疾亦有地居卑濕時屬暑熱内有宿病外感惡氣亦生此疾亦有盛夏蒸熱飲冷冷熱間隔秋夏氣交亦生此疾以要言之終由飲食失常寒暑乖宜上熱下繫將療之方吐下為本人有强羸病有輕重自須臨時斟酌不可一槩言之此病别有祈禱厭禳而差者自是人心妄識畏愛生病亦猶弓影成蠱耳必有不誣此法専意信之亦任其從禳禱之道雖然必須資藥以救之比見用藥攻療無不差者以法禳之則有不効者以此言之明知病在於内徒勞於外耳此病之始與天行不多别亦頭痛骨肉酸楚手足逆冷口鼻喉舌乾好飲水毛聳腰脊强欲反拗小便赤但先寒後熱發作有時可不審察其發作日有凖凡經七日以後先服鼈甲等五味散取快吐方鼈甲三兩生用常山二兩甘草二兩炙松蘿二兩桂心一兩右藥擣篩為散煮烏梅湯下初服一方寸匕日二服稍稍加之以得吐為限忌人莧生葱生菜海藻菘菜又審其候若體力全强日再服每服皆取吐自覺氣力不甚强則每一服取吐晩不須服如全綿惙事須取吐則三兩日一服經五六度吐訖但適寒温將息并食飲使體氣漸强若知病雖輕吐根本未似得除事須利之以洩病勢宜合當歸等六味散服之取利方當歸五兩白术五兩細辛四兩桂心三兩大黄五兩朴硝四兩右藥擣篩為散平旦空腹以酒飲下初服一方寸匕日再服稍稍加之得利為度候氣力强羸取利多少一一如前取吐法忌桃李雀肉生葱生菜又依前鼈甲等五味散取吐當歸等六味散利後雖經吐下其源尚在如更吐利又慮尩羸宜合鬼箭羽等十味丸服之方細辛四兩橘皮四兩鬼箭羽折㸔之如金色者二兩白术五兩桂心四兩地骨皮四兩蜀漆二兩甘草三兩炙當歸五兩丁香三兩右藥擣篩蜜和丸如梧子煮烏梅飲下之初服十五丸日再稍稍加至三十丸服經三五日後若覺熱甚每服藥後良久任喫三兩口粥飲壓之忌海藻菘菜桃李雀肉生葱又療此病曽用釋深師一方大有効其方有巴豆皂莢藜蘆三味作丸服雖經困苦一服永斷呉昇同竝出第一卷中外臺秘要方卷五
