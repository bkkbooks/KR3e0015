於六腑淫虛厥於五藏故曰精極也凡陽邪害五藏陰邪損六腑陽實則從陰引陽陰虛則從陽引陰若陽病者主高高則實實則熱眼視無明齒焦髮脫腹中滿滿則厯節痛痛則宜瀉於内若陰病者主下下則虛虛則寒體重則腎水生耳聾行步不正邪氣入内行於五藏則欬欬則多涕唾面腫氣逆所以形不足者温之以氣精不足者補之以味善療精者先療肌膚筋脉次療六腑五藏若邪至五藏則半死半生矣鶣鵲曰五陰氣俱絶不可療絶則目系轉轉則目精奪為志先死逺至一日半日矣非醫所及也宜須精研以表療裏以左療右以右療左以我知彼疾皆差也千金同並出第八卷中千金療精極實熱眼視無明齒焦髮落形衰體痛通身虛熱竹葉黄芩湯方竹葉切三升黄芩茯苓各三兩生薑六兩麥門冬去心甘草炙大黄各二兩芍藥四兩生地黄切一升右九味切以水九升煮取三升去滓分為三服忌酢物海藻菘菜蕪荑删繁同又療精極五藏六腑俱損傷虛熱遍身煩疼骨中㾓痛煩悶方生地黄汁二升生麥門冬汁赤蜜竹瀝各一升石膏八兩碎人參三兩芎藭三兩甘草一兩炙黄芩三兩當歸四兩桂心四兩麻黄二兩去節右十二味切以水七升先煮八物取二升去滓下地黄汁等煮取四升分四服日三夜一忌海藻菘菜生葱蕪荑删繁桂三兩删繁同並出第十九卷中虛勞失精方五首病源腎氣虛損不能藏精故精漏失其病少腹弦急陰頭寒目眶痛髮落診其脉數而散者失精脉也凡脉芤動微緊男子失精出第四卷中深師人參丸療虛勞失精方人參二兩桂心牡蠣熬薯蕷黄蘗細辛附子炮苦參各三分澤㵼五分麥門冬去心乾薑乾地黄各四分莵絲子二分右十三味𢷬合下篩和以白蜜為丸酒服如梧子大三丸痺加附子一分炮婦人血崩加乾地黄好者二分一本云黄蘗四分忌猪肉冷水生葱生菜蕪荑出第三卷中范汪療男子虛失精三物天雄散方天雄三兩炮白术八分桂心六分右藥𢷬下篩服半錢匕日三稍稍増之忌猪肉冷水桃李雀肉生葱張仲景方有龍骨文仲同出第六十八卷中千金療男子虛勞失精陰縮灸法灸中封五十壯又男子虛勞失精陰上縮莖中痛方灸大赫三十壯穴在夾屈骨端三寸並出第十九卷中以上灸穴尺寸逺近具在第三十九卷中古今録驗療虛損失精黄芪湯方黄芪當歸甘草炙各二兩桂心六兩蓯蓉石斛各三兩乾棗百三十枚白蜜二升右八味切以水一斗煮取四升内蜜煎取三升分為四服日三夜一以食相間忌海藻菘菜生葱范汪同出第三卷中虚勞尿精方八首病源虛勞尿精者腎氣衰弱故也腎藏精其氣通於陰勞傷腎虛不能藏其精故因小便而精液出也出第四卷中深師療男子尿精方栝樓根澤瀉土𤓰根各二兩右三味𢷬合下篩以牛膝和為丸如梧子先食服三丸良范汪云用四分餘並同又尿精小便白濁夢泄韭子散方韭子莵絲子車前子各一升附子三枚炮當歸芎藭礬石燒各三兩桂心一兩右八味𢷬合下篩温酒服方寸匕日三亦可蜜和為丸酒服如梧子大五丸忌猪肉冷水生葱千金同出第三卷中千金療虛勞尿精方韭子二升糯米一斗右二味以水一斗七升煮如粥取汁六升分為三服精溢同此又方柘白皮五合桑白皮五合切右二味切以酒五升煮取三升分為三服一方柘白皮作石榴皮又方乾膠二兩炙右一味𢷬末酒二升和温分三服差一方用鹿角膠又方新韭子二升十月霜後採右一味好酒八合漬一宿明旦日色好童子向南𢷬一萬杵平旦温酒五合服方寸匕日再服又小便失精及夢泄精方韭子一升熬麥門冬一升去心莵絲子二合車前子二合芎藭二両白龍骨三兩右六味𢷬篩以酒服方寸匕日三不知稍稍増之甚者夜一服肘後用澤㵼一兩半並出第十九卷中古今録驗棘刺丸療男子百病小便過多失精方棘刺二兩麥門冬去心萆薢厚朴炙莵絲子柏子仁蓯蓉桂心石斛小草細辛杜仲牛膝防葵乾地黄各一兩石龍芮三兩巴㦸天二兩烏頭半兩炮削去皮右十八味𢷬下篩以蜜雜雞子黄各半和之𢷬五六千杵以飲服如梧子十丸日三稍稍増至三十丸以知為度忌猪肉冷水生葱生菜千金有萎㽔深師同並出第十卷中虛勞夢泄精方一十首病源腎虚為邪所乘邪客於陰則夢交接腎藏精今腎虛弱不能制於精故因夢感動而泄也出第四卷中深師韭子丸療虛勞夢泄精方韭子五合熬大棗五枚黄芪人參甘草炙乾薑當歸龍骨半夏洗芍藥各三両右十味𢷬合下篩和以白蜜棗膏丸如梧子服十丸日三四忌海藻菘菜羊肉餳千金同又棘刺丸療虛勞諸氣不足數夢或精自泄方棘刺天門冬去心各二兩乾薑莵絲子烏頭炮小草防葵薯蕷石龍芮枸杞子巴㦸天萆薢細辛萎㽔石斛厚朴炙牛膝桂心各二兩右十八味𢷬合下篩和以蜜雞子白各半相和丸如梧子先食服五丸日三若患風痿痺氣體不便熱煩滿少氣消渴枯悴加萎蕤天門冬莵絲子身黄汗小便赤黄不利加石龍芮枸把子闗節腰背痛加萆薢牛膝寒中氣脹時泄數唾嘔吐加厚朴乾薑桂心陰囊下濕精少小便餘瀝加石斛以意増之莵絲子酒漬之經一宿後有一方十四物長陰加肉蓯蓉磁石其説小異故兩存焉忌猪肉冷水生葱菘菜鯉魚等又鹿角湯療勞夢泄精方鹿角一具屑韭白半斤生薑一斤芎藭茯苓各二兩當歸鹿茸炙各二兩白米五合右八味切先以水五斗煮鹿角取一斗二升去滓内諸藥煮取四升分服一升日三夜一鹿角唯取肥而解者打令碎也忌酢物又桂心湯療虛喜夢與女邪交接精為自出方一名喜湯桂心牡蠣熬芍藥龍骨甘草各二兩炙大棗三七枚一方十枚生薑五兩右七味㕮咀以水八升煮取三升去滓温分三服忌海藻菘菜生葱范汪同並出第三卷中千金療夢泄失精尿後餘瀝尿精方人參麥門冬去心赤石脂逺志去心續斷鹿茸炙各六分茯神一云茯苓龍齒炙磁石研蓯蓉各八分乾地黄十二分丹參韭子熬柏子仁各五分右十四味𢷬篩蜜和丸如梧子以酒服二十丸日再服漸加至三十丸忌酢物蕪荑又療夢失精方韭子一升熬右一味𢷬篩以酒服方寸匕日再神効並出第十九卷中古今録驗石斛散療男子夢泄精方石斛七分桑螵蛸紫菀各二分乾漆熬五味子乾地黄鍾乳研逺志皮附子各二分炮右九味𢷬合下篩以酒服方寸匕漸漸増至二匕日三服忌猪肉冷水蕪荑出第十卷中小品龍骨湯療夢失精諸脉浮動心悸少急隠處寒目眶疼頭髮脱者常七日許一劑至良方龍骨甘草炙各二分牡蠣三分熬桂心芍藥各四分大棗四枚擘生薑五分右七味切以水四升煮取一升半分再服虛羸浮熱汗出者除桂加白薇三分附子三分炮故曰二加龍骨湯忌海藻菘菜生葱猪肉冷水又薰草湯療夢失精方薰草人參乾地黄白术芍藥各三兩茯神桂心甘草炙各二兩大棗十二枚擘右九味切以水八升煮取三升分為二服毎服如人行四五里一方又有茯苓三兩忌桃李雀肉大酢海藻菘菜生葱一本無薰草人參又有薰草人參龍骨别是一方范汪同並出第三卷中集驗灸丈夫夢泄法灸足内踝上一寸一名三陰交二七壯兩脚皆灸内踝踝大脉並四指是范汪文仲同出第五卷中外臺秘要方卷十六
