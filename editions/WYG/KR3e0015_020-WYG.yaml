body:
  text: 外臺秘要方卷十六唐王燾撰五藏勞論一首刪繁論曰夫五藏勞者其源從藏腑起也鼓生死之浮沉動百病之虚實厥陰陽逆腠理皆因勞瘠而生故曰五藏勞也出第七卷中肝勞論一首刪繁論曰凡肝勞病者補心氣以益之心王則感於肝矣人逆春氣則足少陽不生而肝氣内變順之則生逆之則死順之則治逆之則亂反順為逆是謂闗格病則生矣所以肝恐不止則傷精精傷則面離色目青盲而無所見毛悴色夭死於秋出第七卷中肝實熱方二首刪繁療肝勞實熱悶怒精神不守恐畏不能獨卧目視無明氣逆上不下胷中滿塞半夏下氣消悶明目吐熱湯方半夏洗破生薑各八両麻黄去節芍藥杜蘅枳實炙細辛杏仁去皮尖碎烏梅擘各三兩松蘿二兩淡竹葉切一升右十一味切以水一斗先煮麻黄去沫下諸藥煮取三升分為三服忌羊肉餳生菜出第七卷中深師療肝氣實目赤若黄脅下急小便難瀉肝湯方人參甘草各三兩炙生薑五兩黄芩二兩半夏一升洗大棗十四枚擘右六味切以水五升煮半夏三四沸内藥最後内薑煎取二升去滓分為二服羸人三服忌海藻菘菜羊肉餳出第十三卷中肝勞虛熱方四首刪繁療肝勞虛熱兩目為赤閉塞不開煩悶宛轉熱氣胷裏炎炎前胡瀉肝除熱湯方前胡乾薑大青細辛秦皮决明子梔子仁子芩各一兩淡竹葉切一升車前子切一升石膏八兩碎綿褁右十一味切以水一斗煮取三升去滓平旦分為三服須利加芒硝三兩忌生菜又療肝勞熱悶闗格不通精神不守氣逆上胷熱炎炎不止柴胡下熱湯方柴胡黄芩澤㵼升麻芒硝各三兩𤣥參六兩淡竹葉切生地黄切各一升乾薑二兩右九味切以水九升煮取三升去滓下芒硝平旦分三服忌蕪荑又療肝勞熱恐畏不安精神不守悶怒不能獨卧感激惆悵志氣錯越不得安守茯苓安肝定精神丸方茯苓逺志去心防風人參柏子仁熬各五分龍骨七分牡蠣熬大棗肉各八分甘草四分炙右九味𢷬篩白蜜和為丸如梧子初服二十丸加至三十丸為度煖清白飲進之日再服忌海藻菘菜大酢又扁鵲療勞邪氣熱眼赤方灸當容百壯兩邊各爾當容在眼小眥近後在耳之前客主人三陽三陰之㑹處以手按之有上下行脉則是與耳相對並出第七卷中肝勞虛寒方五首刪繁療肝勞寒眩忘欬唾憂恚内傷面離色目青盲硫黄丸方硫黄乾薑吳茱茰人參當歸防風各七分礜石􅅺褁燒半日烏頭各八分炮桂心天雄炮甘草炙各六分蜀椒汗皂莢炙去皮子枳實炙各五分細辛四分甘菊花四分右十六味𢷬篩白蜜和為丸如梧子初服二十丸加至三十丸日再温清酒進之忌猪肉冷水生葱生菜海藻菘菜又肝勞虛寒闗格勞濇閉塞不通毛悴色夭猪膏酒方猪膏七升生薑汁二升右二味微火煎取三升下酒五升和分為三服千金同又療肝氣虛寒眼青盲􅑩􅑩不見物真珠煎方真珠四分研白蜜二合鯉魚膽一枚右三味和合微火上煎兩沸綿褁内眼中眼汁當自出藥歇更為之本方又有鯉魚腦一枚又療肝虛寒勞損口苦骨節疼痛筋攣縮煩悶虎骨酒補勞損骨節疼痛方虎骨一升炙取令焦黄碎如雀頭乾薑芎藭地骨皮各四兩白术猪椒根五加皮枳實熬各五兩丹參八兩乾地黄七兩右十味㕮咀以絹囊貯清酒四升漬四宿初服六七合加至一升日再服忌蕪荑桃李雀肉等竝出第七卷中千金療肝勞虛寒脅下痛脹滿氣急眼昬濁視不明㯽榔湯方生薑附子炮各七兩㯽榔七枚合皮碎茯苓三兩桔梗四兩橘皮桂心各三兩白术四兩吳茱茰五兩右九味切以水九升煮取三升去滓分為三服若氣喘加芎藭三兩半夏四兩洗甘草二兩炙忌酢物生葱猪肉冷水海藻菘菜桃李雀肉等出第十一卷中膽實熱方二首刪繁療膽腑實熱精神不守瀉熱梔子煎方梔子二十一枚甘竹筎一兩熬香䜴六合熬綿褁大青橘皮去脉各二兩赤蜜三合右六味細切以水六升煮取一升七合去滓下蜜更微火上煎兩三沸分再服出第四卷中千金療膽腑實熱精神不守瀉熱半夏千里水湯方半夏洗宿薑各三兩酸棗五合黄芩一兩逺志去心茯苓各二兩生地黄五兩秫米一斗右八味細切取流水五斗煮秫米令蟹目沸揚之三千下澄清取五升煮藥取二升半分為三服忌羊肉餳酢物蕪荑出第十二卷中髓虛實方二首删繁論曰髓虚者腦痛不安髓實者勇悍凡髓虚實之應主於肝膽若其腑藏有病從髓生熱則應藏寒則應腑千金同出第三卷中千金療髓虚腦痛不安膽腑中寒羌活補髓丸方羌活芎藭當歸各三兩桂心二兩人參四兩酥一升棗肉一斤研為脂牛髓一升羊髓一升大麻仁二升熬研為脂右十味先𢷬五種乾藥為散下棗膏麻仁又𢷬相濡為一家下二髓并酥内銅鉢中重湯煎之取好為丸如梧子酒服三十丸日再加至四十丸忌生葱又療髓實勇悍驚熱主肝熱柴胡發泄湯方柴胡升麻黄芩細辛枳實炙梔子仁芒硝各二兩澤瀉四兩淡竹葉切一升生地黄切一升右十味切以水九升煮取三升去滓下芒硝分為三服忌生菜蕪荑並出第十二卷中咽門論并傷破聲嘶方二首千金論曰夫咽門者應五藏六腑往還神氣陰陽通塞之道也喉嚨胞囊舌者竝津液調五味之氣本也不可不研乎咽門者肝膽之候也其重十兩廣二寸五分至胃管長一尺六寸主通五臟六腑津液神氣應十二時若藏熱咽門則閉而氣塞若腑寒咽門則破而聲嘶母薑酒主之熱則通之寒則補之若寒熱調和病不生矣刪繁同出第十二卷中又療咽閉主膽腑咽門傷破聲嘶母薑酒方母薑汁二升牛髓酥油各一升别煎取熱桂心秦椒各四分芎藭獨活各五分防風六分右九味將五物合𢷬下篩為散内薑汁中煎取相淹濡下髓酥油等攪令調微火上三上三下平旦温清酒一升下二合膏細細吞之日三服忌生葱刪繁同此方今録附此論後出第六卷中六極論一首刪繁論曰夫六極者天氣通於肺地氣通於嗌風氣應於肝雷氣動於心穀素問作谷氣感於脾雨氣潤於腎六經為川腸胃為海九竅為水注之於氣所以竅應於五臟五藏邪傷則六腑生極故曰五藏六極也出第八卷中筋極論一首刪繁論曰凡筋極者主肝也肝應筋筋與肝合肝有病從筋生又曰以春遇病為筋痺筋痺不已復感於邪内舍於肝陽氣入於内陰氣出於外凡陰氣外出出則虛虛則筋虚筋虚則善悲色青蒼白見於眼下而傷寒則筋不能動十指爪皆痛數好轉筋其源以春甲乙日得之於傷風風在筋為肝虚風也若陽氣内發發則實實則筋實筋實則善怒嗌乾傷熱則欬欬則脅下痛不能轉側又脚下滿痛故曰肝實風也然則因其輕而揚之因其重而減之因其衰而彰之審其陰陽以别柔剛陽病療隂隂病療陽善療病者病在皮毛肌膚筋脉而療之次療六腑若至五藏則半死半生矣鶣鵲曰筋絶不治九日死何以知之手足爪甲青黑呼罵口不息筋應足厥陰足厥陰氣絶於筋則筋縮引卵與舌足厥陰者肝脉也肝者筋之合也筋者聚於陰器而脉絡於舌本故脉不營則筋急筋急則引卵與舌故脣青舌卷卵縮則筋先死庚篤辛死金勝木醫之拱手也千金同出第八卷中筋實極方四首刪繁療筋實極則好怒口乾燥好嗔身躁不定調筋止怒定氣黄芪湯方黄芪芎藭白柘皮無刺者各三兩白术通草芍藥各四兩甘草炙二兩桂心二兩大棗四十枚擘去核石膏八兩碎綿褁竹葉切一升右十一味切以水九升煮取三升去滓分為三服忌海藻菘菜生葱桃李雀肉等又療筋實極則欬欬則兩脅下縮痛痛甚則不可動轉橘皮通氣湯方橘皮四兩白术石膏碎綿褁各五兩桂心細辛當歸茯苓各三兩香豉一升熬别褁右八味切以水九升煮取三升去滓分為三服忌桃李雀肉生葱生菜酢物千金同並出第八卷中千金療筋實極則兩脚下滿而痛不得逺行脚心如割筋斷折痛不可忍丹參煮散方丹參十二分芎藭杜仲續斷地骨皮各八分通草當歸乾地黄麥門冬去心禹餘糧錬麻黄去節七分甘草炙桂心各五分牛膝九分生薑薄切炒取焦燥牡蠣各十分熬升麻六分右十七味𢷬下篩為散以絹袋子盛散二方寸匕以井華水二升煮數動絹囊子煮取一升為一服日再煮忌海藻菘菜生葱蕪荑刪繁同又療筋實極則手足爪甲或青或黄或黑烏黯四肢筋急煩滿地黄煎方生地黄汁三升生葛汁一升澄清生𤣥參汁一升大黄二兩梔子仁升麻麻黄去節犀角屑各三兩石膏五兩碎芍藥四兩右十一味切以水七升煮取二升去滓下地黄汁一兩沸次下葛汁等煎取三升分為三服日再忌蕪荑刪繁肘後同並出第十一卷中筋虛極方二首刪繁療筋虛極則筋痺好悲思顔色蒼白四肢噓噏脚手拘攣伸動縮急腹中轉痛五加皮酒方五加皮一斤枳刺二升㕮咀炙猪椒根皮丹參各八兩桂心當歸甘草炙各三兩天雄炮秦椒汗白鮮皮通草各四兩芎藭乾薑各五兩薏苡仁半升大麻仁三升研為末右十五味㕮咀以絹袋貯酒四斗漬春夏四宿秋冬六七宿初服六七合稍稍加之以知為度忌生葱猪肉冷水海藻菘菜又療筋虛極傷風為風所傷入筋縮攣腰背不伸強直苦痛或為脚氣牛膝湯方牛膝防風甘李根皮丹參前胡各四兩石斛五兩杜仲秦芁續斷鼈甲炙各三兩大麻仁二升熬研陳橘皮二兩右十二味切以水一斗四升煮取五升去滓下麻仁更煎取二升分三服忌莧菜並出第八卷中筋虛胞轉方二首刪繁療筋虛實暴損絶極或因霍亂轉筋腹滿痛或因服藥吐利過度脚手虛轉腸胞轉痛人參湯方人參厚朴炙各二兩葱白一虎口白术四兩蓼一把長三升右五味切以水五升煮取二升去滓分再服忌桃李雀肉等又療胞轉筋急方白术通草各四兩梔子仁子芩茯苓各三兩榆白皮三兩香䜴一升熬綿褁右七味切以水七升煮取三升去滓分三服忌酢物桃李雀肉等竝出第八卷中一方無香豉轉筋方七首范江療轉筋方以鹽一升水一升半作湯洗漬良又療轉筋在兩臂若胷脅者方灸手掌白肉際七壯並出第八卷中刪繁療轉筋十指筋攣急不得屈伸灸法灸手踝骨上七壯良又鶣鵲療轉筋脛骨痛不可忍方灸屈膝下亷筋上三壯又治轉筋方灸涌泉涌泉在脚心下當大拇指大筋灸七壯亦可灸大都在足大拇指本節内側白肉際灸七壯又腹腸轉筋方灸臍上一寸十四壯並出第八卷中近効療脚轉筋及渾身轉筋方煖水稍熱於浴斛中坐浸須􅁷便差如湯沃雪心勞論一首刪繁論曰凡心勞病者補脾氣以益之脾王則感於心矣人逆夏氣則手太陽不長心氣内消順之則生逆之則死順之則治逆之則亂反順為逆是謂闗格病則生矣心主竅竅主耳耳枯燥而鳴不能聴逺毛悴色天死於冬出第七卷中心勞實熱方五首刪繁療心勞實熱好笑無度自喜四肢煩熱麻黄止煩下氣湯方麻黄去節梔子仁茯苓子芩白术各三兩石膏八兩碎綿褁桂心二兩芒硝三兩地黄生切一升大棗三十枚雞子二枚甘草一兩炙赤小豆二合右十三味切以水一斗煎和下雞子白攪調去沫下諸藥煮取二升五合去滓下竹瀝芒硝煎一沸分為三服忌生葱酢物桃李雀肉海藻菘菜等前無竹瀝復下竹瀝恐有失又療心勞熱口為生瘡大便難閉塞不通心滿痛小腹熱大黄泄熱湯方大黄澤㵼黄芩梔子仁芒硝各二兩桂心二兩大棗三十枚甘草一兩炙石膏八兩碎綿褁右九味切以水九升先取一升水别漬大黄一宿以餘八升煮諸藥取二升五合去滓下大黄更煮兩沸去大黄滓下芒硝分為三服忌海藻生葱菘菜又療心勞熱傷心有長􅆉名蠱蟲長一尺周心為病雷丸丸方雷丸熬橘皮石蠶炙桃皮炙各五分狼牙六分貫衆二枚蕪荑熬青葙子蜀漆各四分殭蠶三七枚熬茱茰根皮七分亂髮如雞子火燒末右十二味蒸切𢷬篩白蜜和為丸如梧子清白飲一服七丸不覺更加至二七丸為度日再又療心勞熱心主竅竅主耳耳枯焦而鳴不能聴逺磁石湯方磁石五兩碎綿褁茯苓大青人參白术菖蒲芍藥各三兩竹葉切一升赤石脂二兩綿褁右九味切以水九升煮取二升五合去滓分為三服忌羊肉餳酢物桃李雀肉等本方無芍藥又療心勞熱不止肉毛焦色無潤口赤乾燥心悶麥門冬飲方生麥門冬一升去心陳粟米一升雞子二七枚取白淡竹葉切三升右四味先以水一斗八升煮粟米竹葉取九升去滓澄清接取七升冷下雞子白攪五百轉去上白沫下麥門冬煮取三升去滓分三服並出第七卷中心實熱方三首千金瀉心湯療心實熱或欲吐吐而不出悶喘急頭痛方小麥三升香豉一升綿褁石膏一斤碎綿褁地骨皮五兩梔子仁二十一枚茯苓二兩淡竹葉切一升右七味切以水一斗五升煮小麥竹葉取八升澄清下諸藥煮取三升去滓分温三服忌酢物本名石膏湯又療心實熱驚夢喜恐畏悸懼不安竹瀝湯方淡竹瀝一升石膏八兩碎綿褁人參知母去毛赤石脂梔子仁芍藥白术各三兩茯神紫菀各二兩生地黄汁二升右十一味切以水九升煮十味取二升七合去滓下竹瀝更煎取三升若須利下芒硝二兩去芍藥分為三服忌桃李雀肉酢物蕪荑又茯神煮散主心實熱口乾煩渴眠卧不安方茯神六分麥門冬去心六分通草六分升麻五分淡竹筎一丸如雞子大熬知母四分去毛赤石脂七分紫苑桂心各三分大棗二十枚擘右十味𢷬麤篩為散取方寸匕帛褁之以井華水二升半煮取九合時動藥褁子平旦為一服日再服忌生葱酢物並出第十三卷中脉極論一首刪繁論曰凡脉極者主心也心應脉脉與心合心有病從脉起又曰以夏遇病為脉痺脉痺不已復感於邪内舍於心則食飲不為肌膚顔脱面色白不澤其脉空虛口唇見赤色凡脉氣衰血焦髮墮以夏丙丁日得之於傷風風損脉為心風心風狀汗多若脉氣實則熱熱則傷心使人好怒口為色赤甚則言語不快血脱色乾燥不澤食飲不為肌膚若脉氣虛則寒寒則欬欬則心痛喉中介介如哽甚則咽腫喉痺故曰心風虚實候也若陽經脉病療陰絡陰絡脉病療陽經定其血氣各守其鄉脉實宜瀉氣虚宜補善療病者病在皮毛肌膚筋脉則全療之至六腑五藏則半死半生鶣鵲曰脉絶不療三日死何以知之脉氣空虛則衰顔焦髮落脉應手少陰手少陰氣絶則脉不通手少陰者心脉也心者脉之合也脉不通則血不流血不流則髮色不澤故面黒如漆柴則血脉先死壬篤癸死水勝火故非治藥所効也出第八卷中千金同脉熱極方三首刪繁療脉實熱極血氣傷心使心好生赫怒口為色變赤言語不快消熱止血氣調脉理中茯苓湯方茯苓黄芩梔子仁芒硝各五兩生麥門冬五兩去心赤石脂升麻紫菀各二兩竹葉切一升香豉一升熬石膏八兩碎綿褁生地黄切一升右十二味切以水九升煮取二升去滓下芒硝分為三服忌酢物蕪荑又療脉極熱傷風損脉為心風心風狀多汗無滋潤消虛熱極止汗麻黄湯方麻黄去節杏仁各四兩去皮尖兩仁碎梔子仁黄芩防風紫菀各三兩升麻桂心茯神人參各三兩大棗二十枚擘石膏六兩碎綿褁桑根白皮一升右十三味切以水一斗先煮麻黄三沸去沫下諸藥煮取三升去滓分為三服忌生葱酢物又療脉熱極遇風為痺痺感心顔脱面色白不澤脉空虚口唇色赤乾燥升麻潤色消痺止熱極湯方升麻射千芎藭人參各三兩赤小豆五合生薑四合麥門冬去心四兩葳蕤四兩生地黄切一升甘草二兩炙竹葉切一升右十一味切以水一斗煮取二升去滓分為三服忌海藻菘菜蕪荑並出第八卷中脉寒極方四首刪繁療脉極虛寒則欬欬則心痛喉中介介如哽甚則咽腫喉痺半夏消痛止極益氣湯方半夏一升洗四破宿薑八兩芎藭細辛附子炮𤣥參當歸各三兩桂心甘草炙茯苓各二兩杏仁六十枚去兩仁皮尖碎右十一味切以水一斗煮取三升去滓分温三服忌羊肉餳生葱菜猪肉冷水菘菜海藻酢物等又療脉極虛寒鬢髮墮落安髮潤生桑白皮沐頭方桑白皮二升細切右一味以水淹漬煮五六沸去滓洗沐鬢髮數數為之自不復落又方麻子三升研白桐葉切一把右二味以淘米甘汁二斗煮取五六沸去滓以洗沐頭則鬢髮不落而長又療髮墮落方生柏葉一升附子四枚炮猪膏三斤右三味末以膏三斤和為三十丸用布褁一丸内煎沐頭汁中令髮長不復落也並出第八卷中脾勞論一首删繁論曰凡脾勞病者補肺氣以益之肺王則感脾是以聖人春夏養陽秋冬養陰以順其根矣肝心為陽脾肺腎為陰一云太陰陽明為根逆其根則伐其本陰陽四時者萬物之始終也千金同出第七卷中脾勞實熱方四首刪繁療脾勞熱身體眼目口唇悉痿黄舌本強直不能得咽唾生地黄煎方生地黄汁三升赤蜜石膏各一升碎綿褁升麻射干子芩各三兩生𤣥參八兩梔子仁葳蕤各四兩甘草二兩炙右十味切以水七升先煮石膏等取二升去滓下生地黄汁更煎取四升綿捩分為四服若須利泄加芒硝三兩分為三服餘一服停下芒硝留晩若熱不止更進服之得利泄止後一服也忌海藻菘菜蕪荑又療脾勞熱有白蟲長一寸在脾為病令人好嘔胷中塞嘔而不出前胡吐熱湯方前胡白术赤茯苓枳實炙細辛旋復花杏仁去尖皮雙仁龍膽常山松蘿各三兩竹葉切一升右十一味切以水一斗煮取三升去滓分為三服若腹中熱滿加芒硝山梔子仁黄芩各三兩苦參二兩加水二升忌酢物桃李雀肉生葱生菜又療脾勞熱有白蟲在脾中為病令人好嘔茱茰根下蟲酒方東行茱茰根大者一尺大麻子八升橘皮二兩切右三味剉茱茰根𢷬麻子並和以酒一斗漬一宿微火上薄煖之三上三下絞去滓平旦空腹為一服取盡蟲便下出或死或半爛或下黄汁凡作藥法禁聲勿語道作藥蟲便下驗並出第七卷中千金療脾勞實熱四肢不用五藏乖皮脹滿肩息氣急不安承氣泄實熱半夏湯方半夏洗宿薑各八兩橘皮芍藥各八兩茯苓白术杏仁各三兩去皮尖兩仁研大棗二十枚擘竹葉切一升右九味切以水一斗煮取三升去滓分為三服忌羊肉餳大酢桃李雀肉等刪繁同出第十五卷中脾勞虛寒方三首刪繁療脾勞虛損消瘦四肢不舉毛悴色天牛髓補虛寒丸方牛髓鹿髓羊髓白蜜酥棗肉研為脂各一升人參四分桂心茯苓各四分生地黄十斤切酒二升漬三宿出暴還内酒中取盡暴乾乾薑白术芎藭各五分甘草六分右十四味𢷬篩内五髓中微火煎攪可為丸如梧子初服三十丸加至四十丸為劑日再服温清酒進之忌海藻菘菜生葱蕪荑桃李雀肉酢髓字恐誤并酥蜜為五物爾又療脾虛勞寒飲食不消勞倦氣脹噫滿憂恚不解人參消食八味等散方人參茯苓陳麥麴熬麥蘖熬白术吳茱茰厚朴炙㯽榔仁炙各八分合子用右藥𢷬篩為散食後服方寸匕日再服清酒進之忌酢物桃李雀肉等千金同並出第七卷中千金療脾虛寒勞損氣脹噫滿食不下通噫消食膏酒方猪膏二升宿薑汁五升吳茱茰一升白术一斤右四味𢷬篩茱茰术等二物為細散内薑汁膏中煎取六升温清酒一升進方寸匕日再忌桃李雀肉等刪繁同出第十五卷中脾實熱方六首千金療脾實熱舌本強直或夢歌樂而體重不能行瀉熱湯方前胡茯苓各三兩龍膽細辛各三兩芒硝三兩𤣥參大青各二兩苦竹葉切一升杏仁四兩去尖皮兩仁者右九味切以水九升煮取三升分三服忌酢物生菜又射干湯主療與前方同射干八兩大青三兩石膏十兩碎綿褁赤蜜一升右四味切以水五升煮取一升五合去滓下蜜煎取二升分三服又療脾熱脅痛熱滿歇目赤不止口脣乾裂方石膏一斤碎綿褁生地黄汁一升赤蜜一升淡竹葉切五升右四味以水一斗二升煮竹葉取七升去滓澄清煮石膏取一升五合去滓下地黄汁兩沸下蜜煎取三升細細服之忌蕪荑又療脾熱偏一邊痛胷滿脅偏脹方茯苓橘皮澤㵼各三兩石膏八兩碎綿褁桑白皮根一升芍藥白术各四兩桂心人參各二兩生薑切一升半夏六兩洗右十一味切以水一斗二升煮取三升分為三服若須利加芒硝二兩忌羊肉餳桃李雀肉生葱酢物並出第十五卷中千金翼瀉脾湯主脾藏病氣實胷中滿不能食方茯苓厚朴炙各四兩甘草炙人參黄芩各二兩桂心五兩生薑八兩半夏一升洗右八味切以水七升煮取三升分為三服此方又主冷氣在脾藏走出四肢手足流腫亦逐水氣忌海藻菘菜羊肉餳生葱酢物等又主脾氣實其人口中淡甘卧憒憒痛無常處嘔吐反胃方大黄六兩右一味以水六升煮取一升分再服又主食即吐并大便不通者加甘草二兩煮取二升半分為三服忌海藻菘菜並出第十七卷中瀉脾丸主脾氣不調及腹滿方三首深師調中利飲食除胃中積聚寒熱老人將服長肌肉令人光澤瀉脾丸方黄芩杏仁去尖皮兩仁熬澤瀉通草芎藭桂心白术乾薑各五分茯苓黄芪乾地黄各六分附子二分炮麥門冬四分去心右十三味𢷬篩蜜和服如梧子二丸日三服忌猪肉冷水桃李雀肉生葱酢蕪荑等物出第十三卷中千金翼瀉脾丸主脾氣不調有寒熱或下閉塞調五藏不利嘔逆飲食者方大黄六分杏仁去尖皮兩仁熬附子炮當歸乾薑桂心各四分人參細辛芍藥茯苓半夏洗黄芩蜀椒各三分汗𤣥參三分右十四味𢷬篩蜜和丸如梧子飲服六丸日三増至十丸忌猪羊肉冷水餳生葱生菜酢等物深師無半夏附子又㵼脾丸主毒風在脾中流腫腹滿短氣食輒嚮嚮不消時時微下方當歸三分吳茱茰二分乾薑二分大黄二分狼毒炙一分桂心三分芎藭二分蜀椒汗二分白薇一分甘遂熬一分附子炮二分葶藶熬令紫色三分右十二味𢷬篩蜜和丸如梧子飲服三丸日三忌猪肉冷水生葱並出第十七卷中温脾湯主脾氣不足及不調下痢方六首深師厚朴湯療冷實服温脾湯不差乃服此湯方厚朴四兩炙桂心二兩枳實三兩炙生薑五兩右四味切以水五升煮取二升分為三服相去五里久不過五劑忌生葱又温脾湯療脾胃中冷結實頭痛壯熱但苦下痢或冷滯赤白如魚腦方人參一兩半乾薑附子炮各二兩大黄三兩右四味切以水六升煮取一升半分為三服忌猪肉冷水又大温脾湯療脾胃中冷不得食又榖不消嚮嚮脹滿時苦下痢方黄芩人參芍藥附子炮各一兩甘草炙乾薑大黄厚朴炙各二兩右八味切以水八升煮取二升八合分為三服亦可四服得下佳不下須㬰復服甚良忌猪肉海藻菘菜並出第二十一卷中千金翼温脾湯主脾氣不足虛弱下痢上入下出方乾薑大黄各三兩人參附子炮甘草炙各二兩右五味切以水八升煮取二升半去滓分為三服忌海藻菘菜猪肉冷水深師文仲同又温脾湯主脾氣不足水穀下痢腹痛食不消方半夏四兩洗乾薑赤石脂白石脂厚朴炙桂心各三兩當歸芎藭附子炮甘草炙人參各二兩右十一味切以水九升煮取三升分為三服忌海藻菘菜猪肉冷水羊肉餳生葱又健脾湯主脾氣不調使人身重如石飲食即嘔四肢酸削不收方芍藥甘草炙黄芪各一兩生薑二兩生地黄一兩白蜜一升右六味切以水九升煮取三升去滓内蜜攪令調煎令微沸服八合日三夜一忌海藻菘菜蕪荑深師同出第十七卷中温脾丸主脾胃中冷及不足方四首深師療宿寒脾胃中冷心腹脹滿食不消化温脾丸方大黄二兩麥麯熬乾薑各三兩厚朴炙附子炮當歸甘草炙桂心人參枳實炙各一兩右十味𢷬篩下蜜和服如梧子十五丸日三増至二十丸亦得食已服之無當歸者用芎藭一兩代之忌猪肉冷水海藻菘菜生葱等又療藏氣不足温養五藏