body:
  text: 外臺秘要方卷三十三唐王燾撰求子法及方一十二首千金論曰夫婦人之别有方者以其血氣不調胎姙生産崩傷之異故也是以婦人之病比之男子十倍難療經言婦人者衆隂所集常與濕居十四嵗已上隂氣浮溢百想經心内傷五藏外損姿顔月水去留前後交互瘀血停凝中道斷絶其中傷墮不可具論矣然五藏虚實交錯惡肉内漏氣脉損竭或飲食無度損傷非一或胎瘡未愈而合隂陽或行步風來便利於懸厠之上風從下入便成十二痼疾所以婦人别立方也若是四時節氣為病虚實冷熱為患者故與丈夫同也唯懐胎姙孕而挾病者避其毒藥耳其雜病與丈夫同則散在諸巻中可得而知也然而女人嗜欲多於丈夫感病倍於男子加以慈戀愛憎嫉妬憂恚染著堅牢情不自抑所以為病根深療之難差故養生之家特須教子女學此三卷婦人方令其精曉即於倉卒之秋何憂畏也夫四徳者女子立身之樞機産育者婦人性命之長務若不通明於此則何以免其夭横者哉故傅母之徒亦不可不學當宜繕寫一本懐挾隨身以防不意也又論曰人之性情皆願賢己而疾不及人至於學問則隨情逐物墮於事業詎肯專一推求至理莫不虚棄光隂没齒無益夫㛰姻養育者人倫之本王化之基聖人設教備論厥㫖後生莫能精曉臨事之日昏爾若愚是則徒願賢己而疾不及人之謬也斯實不達賢己之趣而妄狥虚聲以終無用今具述求子之法以貽後嗣同志之士或可覽焉又論曰夫欲求子者當先知夫妻本命五行相生及與徳合并本命不在子休廢死墓中生者則求子必得若其本命五行相剋及與刑煞衝破并在子休廢死墓中生者則求子了不可得慎無措意縱或得者於後終亦累人若其相生并遇福徳者仍須依法如方避諸禁忌則所誕兒子盡善盡美難以具陳矣禁忌法凡欲要兒子生吉良者交㑹之日常避丙丁及弦望朔晦大風大雨大霧大寒大暑雷電霹靂天地昏冥日月無光虹蜺地動日月薄蝕此時受胎非止百倍損於父母生子或瘖瘂聾聵頑愚癲狂攣跛盲眇多病短夀不孝不仁又避日月火光星辰之下神廟佛寺之中井竈圊厠之側塜墓屍柩之傍皆悉不可夫交㑹如法則有福徳大智善人降託胎中仍令父母性行調順所作和合家道日隆祥瑞競集若不如法則有薄福愚癡惡人來託胎中則令父母性行㐫險所作不成家道日否殃咎屢至雖生成長家國滅亡夫禍福之驗有如影響此乃必然之理何不再思之男女受胎時日法凡男女受胎皆以婦人經絶一日三日五日為男仍遇男宿在貴宿日又以夜半後生氣時瀉精者有子皆男必夀而賢明髙爵也若以經絶後二日四日六日瀉精者有子皆女過六日皆不成子又遇王相日尤吉推王相日法春甲乙夏丙丁秋庚辛冬壬癸推貴宿日法正月一日六日九日十日十一日十二日十四日二十一日二十四日二十九日二月四日七日八日九日十日十二日十四日十九日二十二日二十七日三月一日六日七日八日十日十七日二十日二十五日四月三日四日五日六日八日十日十五日十八日二十二日二十八日五月一日二日三日四日五日六日十二日十三日十五日十六日二十日二十五日二十八日二十九日三十日六月一日三日十日十三日十八日二十三日二十六日二十七日二十八日二十九日七月一日十一日十六日二十一日二十四日二十五日二十六日二十七日二十九日八月五日八日十三日十八日二十一日二十二日二十三日二十四日二十五日二十六日九月三日六日十一日十六日十九日二十日二十一日二十二日二十四日十月一日四日九日十四日十七日十八日十九日二十日二十二日二十九日十一月一日六日十一日十四日十五日十六日十七日十九日二十六日二十九日十二月四日九日十二日十三日十四日十五日十七日二十四日二十七日若春合甲寅乙卯夏合丙午丁巳秋合庚申辛酉冬合壬子癸亥與上件月宿日合者尤佳出第二巻中千金翼論曰夫求子者服藥須有次第不得不知其次第謂男服七子散女服盪胞湯及坐藥并服紫石門冬丸則無不得效矣不知此者得力鮮焉其七子散盪胞湯紫石門冬丸出第五巻中在次下千金并翼方中廣濟療無子令子宫内炙丸方麝香二分研皂莢十分塗酥炙削去黒皮子蜀椒六分汗右三味𢷬篩蜜丸酸棗仁太以綿裹内産宫中留少綿線出覺憎寒不浄下多即抽綿線出却丸藥一日一度換之無問晝夜皆内無所忌又方蛇牀子石鹽細辛乾薑土瓜根各四兩右五味𢷬散取如棗核大以綿裹内子宫中以指進之依前法中間病未可必不得近丈夫餘無所忌並出第三巻中又療婦人百病斷絶緒産白薇丸方白薇細辛厚朴炙椒汗桔梗鼈甲炙各五分防風大黄附子炮石硫黄各六分研牡䝉二分人參桑上寄生各四分半夏洗白殭蠶續㫁秦芁紫菀杜仲牛膝䖟蟲去翅足熬水蛭各二分紫石英研朴硝桂心鍾乳當歸各八分右二十七味𢷬篩蜜丸空腹溫酒服如梧桐子十五丸日二漸加至三十丸不吐不利忌生冷油膩餳生血物人莧生葱生菜猪肉冷水粘食陳臭出第二巻中千金七子散療丈夫風虚目暗精氣衰少無子補不足方五味子牡荆子菟絲子車前子乾地黄薯蕷石斛杜仲鹿茸炙逺志去心菥蓂子各八分附子炮蛇牀子芎藭各六分山茱茰天雄炮黄芪人參茯苓牛膝各五分桂心十分巴㦸天十二分蓯蓉七分鍾乳三分右二十四味𢷬篩為散酒服方寸匕日二服不知増至二匕以知為度忌生冷酢滑猪雞魚蒜油膩不能酒者蜜和丸服亦佳行房法一依素女經女人月信斷一日為男二日為女三日為男四日為女已外無子仍每日午時前半夜後陽時為男下精欲得去玉門入半寸不爾過子宫一方加覆盆子八分忌蕪荑生葱經心録并翼同又朴硝盪胞湯療婦人立身已來全不生及斷緒乆不産三十年者方朴硝牡丹當歸大黄桃仁去皮尖生用合三兩細辛厚朴炙桔梗芍藥人參茯苓桂心甘草炙牛膝橘皮各二兩䖟蟲去翅足微熬水蛭炙各六十枚附子一兩半炮右十八味切以清酒五升水六升合煮取三升分四服日三夜一每服相去三辰少時更服如常覆被取少汗汗不出冬日著火籠必下積血及冷赤膿如赤小豆汁本為婦人子宫内有此惡物令然或天隂臍下痛或月水不調為有冷血不受胎若斟酌下盡氣力弱人困不堪更服亦可二三服即止如大悶不堪可食酢飯冷漿一口即止然恐去惡物不盡不大得藥力若能忍服盡大好一日後仍著導藥翼方無桔梗甘草並出第二巻中千金翼坐導藥方皂莢一兩炙去皮子大黄戎鹽礬石燒當歸各二兩五味子乾薑各三兩細辛三兩蜀椒汗二兩葶藶子苦瓠各三分千金作山茱茰右十一味𢷬篩内輕絹袋子如中指許大長三寸盛之令滿内子門中坐任意勿行走急小便時即出之仍易新者一日當下青黄冷汁汁盡止即可幸御自有子若未見病出亦可至十日安之千金無葶藶一方又有砒霜三分廣濟同著藥後一日乃服紫石門冬丸其方如左紫石英七日研之天門冬各三兩去心紫葳甘草炙桂心牡荆子千金作牡蒙烏頭炮乾地黄辛夷仁石斛卷栢禹餘糧當歸芎藭各三兩烏賊魚骨牛膝薯蕷各六分桑寄生人參牡丹皮乾薑厚朴炙續斷食茱茰細辛各五分柏子仁一兩右二十六味𢷬篩蜜和酒服十丸如梧桐子日三稍加至三十丸慎如藥法經心録同并出第五巻中延年療婦人子藏偏僻冷結無子坐藥方蛇牀子三兩芫花三兩右二味𢷬篩取棗大紗袋盛内産門中令没指袋少長便時須去任意卧著慎風冷出第四巻中久無子方五首廣濟療乆無子白薇丸方白薇牡蒙藁本各五分當歸乾地黄各七分芎藭人參柏子仁石斛桂心附子炮五味子防風吳茱茰甘草炙牛膝桑寄生各六分薑黄七分禹餘糧八分秦椒二分汗右二十味𢷬篩蜜丸如梧桐子空腹酒下二十丸加至三十丸日再服不利忌生葱生菜熱麵蕎麥猪肉葵菜蕪荑菘菜海藻粘食陳臭物等又療乆無子斷緒少腹冷疼氣不調地黄湯方乾地黄牛膝當歸各八兩芎藭卷柏防風各六分桂心牽牛子末各三分右八味切以水六升煮取二升三合去滓分三服服别和一分牽牛子末服如人行四五里更進一服以快利止忌熱麵蕎麥炙肉生葱蕪荑蒜粘食等物出第三卷中千金療月水不利關塞絶産十八年服此藥二十八日有子金城太守白薇丸方白薇細辛各五分人參杜蘅厚朴炙牡蒙半夏洗白殭蠶秦芁當歸紫菀各三分牛膝沙參乾薑各三分蜀椒汗附子炮防風各六分古今録驗不用杜蘅用牡蠣三分熬右十七味末之蜜和丸先食服如梧桐子三丸不知稍増至四五丸此藥不可将服覺有身則止用大驗忌餳猪羊肉冷水生葱生菜崔氏延年同有桔梗丹參各三分出第二巻中千金翼白薇丸主乆無子或斷緒上熱下冷百病皆療之方白薇車前子各三分當歸芎藭蛇牀子各四分紫石英菴䕡子石膏藁本巻柏各五分澤蘭太一禹餘糧覆盆子桃仁熬白芷麥門冬去心人參各六分桂心蒲黄各十分細辛乾薑乾地黄椒汗各十二分茯苓赤石脂逺志去心白龍骨各八分橘皮二分右二十八味𢷬篩為末蜜和酒服十五丸如梧桐子日再増至四十丸以知為度亦可至五十丸慎猪雞魚蒜生冷酢滑生葱生菜蕪荑驢馬等肉覺有身則止藥祕之勿妄傳也出第五巻中經心録茱茰丸療婦人隂寒十年無子方吳茱茰一升蜀椒一升去目汗末右二味蜜丸如彈子丸綿裹導子腸中日再易無所下但開子藏令隂温即有子也出第六巻中養胎法并禁忌一十三首千金論曰舊説凡受胎三月逐物變化稟質未定故姙娠三月欲得觀犀象猛獸珠玉寳物欲得見賢人君子盛徳大師觀禮樂鍾鼓俎豆軍旅陳設焚燒名香口誦詩書古今箴誡居處簡静割不正不食席不正不坐彈琴瑟調心神和性情節嗜慾庶事清静生子皆良長夀忠孝仁義聰慧無疾斯盖文王胎教者也又論曰兒在胎日月未滿隂陽未備府藏骨節皆未成足故自初訖于将産飲食居處皆有禁忌又姙娠食雞子及乾鯉魚令子多瘡又姙娠食雞肉糯米令子多寸白蟲又姙娠食雀肉并豆醤令子滿面皯黯黒子又姙娠食山羊肉令子多病又姙娠食兔犬肉令子無音聲并缺唇又姙娠食驢馬肉延月又姙娠食椹并鴨子令子倒出心寒又姙娠食騾肉難産又姙娠食雀肉飲酒令子心淫情亂不畏羞恥又姙娠勿向非常之地大小便必半産殺人又姙娠勿食羊肝令子多厄又姙娠勿食鼈令兒短項又姙娠食冰漿絶産並出第二巻中姙娠隨月數服藥及將息法一十九首千金姙娠一月名始胚飲食精熟酸美受御宜食大麥無食腥辛是謂才正又姙娠一月足厥隂脈養不可鍼灸其經足厥隂内屬於肝肝主筋及血一月之時血行否澀不為力事寢必安静無令恐畏又姙娠一月隂陽新合為胎寒多為痛熱多卒驚舉重腰痛腹滿胞急卒有所下當預安之宜服烏雌雞湯方烏雌雞一隻治如食法茯苓二兩吳茱茰一升芍藥白术各三兩麥門冬五合去心人參三兩阿膠二兩甘草一兩炙生薑一兩切右十味切以水一斗二升煮雞取汁六升去雞下藥煮取三升内酒三升并膠烊盡取三升去滓温服一升日三服又若曽傷一月胎者當預服補胎湯方細辛一兩防風二兩烏梅一升吳茱茰五合乾地黄白术各一兩大麥五合生薑四兩右八味切以水七升煮取二升半去滓分温三服若寒多者倍細辛茱茰若熱多渇者去細辛茱茰加括樓根二兩若有所思去大麥加柏子仁三合忌生菜蕪荑桃李雀肉等物一方人參一兩又姙娠二月名始膏無食辛臊居必静處男子勿勞百節皆痛是謂胎始結又姙娠二月足少陽脈養不可鍼灸其經足少陽内屬於膽膽主精二月之時兒精成於胞裏當慎䕶驚動又姙娠二月始隂陽踞經有寒多壊不成有熱即萎卒中風寒有所動摇心滿臍下懸急腰背强痛卒有所下乍寒乍熱艾湯主之方丹參三兩當歸人參麻黄去節艾葉阿膠炙各二兩甘草一兩炙大􅀥十二枚擘生薑一兩右九味切以酒三升水一斗内藥煮減半去滓内膠煎取三升分温三服忌海藻菘菜又若曽傷二月胎者當預服黄連湯方黄連人參各一兩吳茱茰五合生地黄五兩生薑三兩右五味切以醋漿七升煮取三升分四服日三夜一每十日一作若頗覺不安加烏梅一升加烏梅者不用漿直用水耳忌猪肉冷水蕪荑一方當歸半兩又姙娠三月名始胎當此之時未有定儀見物而化欲生男者操弓矢欲生女者弄珠璣欲子美好數視璧玉欲子賢良端坐清虚是謂外象而内感者也又姙娠三月手心主脈養不可鍼灸其經手心主内屬於心無悲哀無思慮驚動又姙娠三月為定形有寒大便青有熱小便難不赤即黄卒驚恐憂愁嗔恚喜頓仆動於經脈腹滿繞臍苦痛腰背痛卒有所下雄雞湯方雄雞一隻治如食法甘草炙人參茯苓阿膠各二兩黄芩白术各一兩麥門冬去心五合芍藥四兩大棗十二枚擘生薑一兩切右十一味切以水一斗五升煮雞減半内藥煮取半内清酒三升并膠再煎取三升分三服一日盡之當温卧忌海藻菘菜酢物桃李雀肉等一方當歸芎藭二兩不用黄芩生薑又若曽傷三月胎者當預服茯神湯方茯神丹參龍骨各一兩阿膠當歸甘草炙人參各二兩赤小豆二十一粒大棗十三枚擘右九味切酢漿一斗煮取三升分四服七日後服一劑腰痛者加桑寄生二兩忌海藻菘菜深師有薤白二兩麻子一升又姙娠四月始受水精以成血脈宜食稻粳羹魚鴈是謂成血氣以通耳目而行經絡又姙娠四月手少陽脈養不可鍼灸其經手少陽内輸三膲四月之時兒六腑順成當静形體和心志節飲食又姙娠四月為離經有寒心下温温欲嘔胷膈滿不欲食有熱小便難數數如淋狀臍下苦急卒風寒頸項强痛寒熱或驚動身軀腰背腹痛往來有時胎上迫􅇩心煩不得安卒有所下菊花湯方菊花如雞子大一枚麥門冬去心一升麻黄三兩去節阿膠三兩炙甘草二兩炙當歸二兩人參一兩半生薑五兩半夏二兩洗大棗十二枚擘右十味以水八升煮減半内清酒三升并阿膠煎取三升分三服温卧當汗以粉粉之䕶風寒四五日忌羊肉海藻菘菜餳等又若曽傷四月胎者當預服調中湯方芍藥四兩甘草炙芎藭續斷各一兩生李根白皮柴胡白术各三兩烏梅一升當歸一兩半生薑四兩厚朴炙枳實炙各二兩右十二味切以水一斗煮取三升分四服日三夜一八日復服一劑一方半夏二兩忌海藻菘菜桃李雀肉等物又姙娠五月始受火精以成其氣卧必晏起沐浴浣衣深其居處厚其衣裳朝吸天光以避寒殃其食稻麥其羹牛羊和以茱茰調以五味是謂養氣以定五藏又姙娠五月足太隂脈養不可鍼灸其經足太隂内輸於脾五月之時兒四肢成無大飢無甚飽無食乾燥無自炙熱無大勞倦又姙娠五月毛髮初生有熱苦頭眩心亂嘔吐有寒苦腹滿痛小便數卒有恐怖四肢疼痛寒熱胎動無常處腹痛悶頓欲仆卒有所下阿膠湯方又方旋覆花湯阿膠四兩炙人參一兩麥門冬一升去心生薑六兩吳茱茰旋覆花當歸芍藥甘草炙黄芩各二兩右十味切以清酒三升以水九升煮減半内清酒三升并膠微火煎取三升半分四服日三服夜一先食再服便愈不差更服忌海藻菘菜又若曽傷五月胎者當預服安中湯方甘草炙芍藥各三兩當歸人參乾地黄芎藭各二兩五味子五合麥門冬去心一升大麻仁五合生薑六兩大􅀥三十五枚擘黄芩一兩右十二味切以水七升清酒五升煮取三升半分四服日三夜一七日復服一劑忌菘菜海藻蕪荑又姙娠六月始受金精以成筋身欲微勞無得静處出遊於野數觀走犬馬食宜鷙鳥猛獸之肉是謂變腠理紉筋以養其力以堅背膂又姙娠六月足陽明脈養不可鍼灸其經足陽明内屬於胃主其口目六月之時兒口目皆成調五味食甘美無大飽又姙娠六月卒有所動不安寒熱往來腹内脹滿身體腫驚怖忽有所下腹痛如欲産手足煩疼麥冬湯方麥門冬去心一升甘草炙人參各一兩乾地黄三兩黄芩二兩阿膠四兩生薑六兩大􅀥十五枚擘右八味切以水七升煮減半内清酒二升并膠煎取三升分三服毎服如人行三四里中間進糜粥忌海藻菘菜蕪荑又若曽傷六月胎當預服柴胡湯方柴胡四兩芍藥一方作紫葳白术甘草炙各二兩麥門冬三兩去心蓯蓉一兩芎藭二兩乾地黄五兩生薑六兩大􅀥三十枚擘右十味切以水一斗煑取三升分四服日三夜一中間進穈粥勿食生冷及堅强之物七日更服一劑忌海藻菘菜蕪荑桃李雀肉等一方有黄芩二兩又姙娠七月始受木精以成骨勞身摇肢無使定止動作屈伸以運血氣自此後居處必燥飲食避寒常食粳稻以密腠理是謂養骨而堅齒又姙娠七月手太隂脈養不可鍼灸其經手太隂内屬於肺肺主皮毛七月之時兒皮毛已成無大言無號哭無薄衣無洗浴無寒飲又姙娠七月忽驚恐摇動腹痛卒有所下手足厥冷脈若傷寒煩熱腹滿短氣常苦頸項腰背强葱白湯方葱白長三四寸十四枚半夏洗麥門冬去心各一升生薑八兩甘草炙當歸黄芪各三兩阿膠四兩人參一兩半黄芩一兩旋復花一把右十一味切以水八升煮減半内清酒三升并膠煎取四升温服一升日三夜一温卧當汗出若不出者加麻黄二兩煮服如前法若秋後勿强責汗忌羊肉餳海藻菘菜等又若曽傷七月胎者當預服杏人湯方杏仁去雙仁皮尖甘草炙鍾乳研各二兩麥門冬去心吳茱茰各一兩乾薑二兩五味子粳米各五合紫菀一兩右九味切以水八升煮取三升半分四服日三夜一中間進食七日服一劑忌海藻菘菜又姙娠八月始受土精以成膚革和心静息無使氣極是謂密腠理光澤顔色又姙娠八月手陽明脈養不可鍼灸其經手陽明内屬於大腸大腸主九竅八月之時兒九竅皆成無食燥物無輒失食無忍大起又姙娠八月中風寒有所犯觸身體盡痛乍寒乍熱胎動不安常苦頭眩痛繞臍下寒時時小便白如米汁或青或黄或使寒慄腰背苦冷痛而目視茫茫芍藥湯方芍藥四分人參當歸甘草炙各三兩白术一兩厚朴二兩炙薤白切一升生薑四兩切右八味切以水五升酒四升合煮取三升分三服日再夜一忌海藻菘菜桃李雀肉等又若曽傷八月胎者當預服葵子湯方甘草炙三兩芍藥二兩一方四兩柴胡三兩葵子一升白术三兩生薑六兩大棗二十枚擘厚朴二兩右八味切以水九升煮取三升分三服日三十日服一劑忌海藻菘菜桃李雀肉等又姙娠九月始受石精以成皮毛六腑百節莫不畢備飲醲食甘緩帶自持而待之是謂養毛髮多才力又姙娠九月足少隂脈養不可鍼灸其經足少隂内屬於腎腎主續縷九月之時兒脈續縷皆成無處濕冷無著灸衣又姙娠九月若卒下痢腹滿懸急胎上衝腰背痛不可轉側短氣半夏湯方半夏洗麥門冬去心各五合乾薑一兩當歸吳茱茰阿膠炙各三兩大棗十二枚擘右七味切以水九升煮取三升去滓内白蜜八合微火上温分四服痢即止忌生血物餳等又若曽傷九月胎者當預服猪腎湯方猪腎一具茯苓桑寄生乾薑乾地黄芎藭各三兩白术四兩麥門冬一升去心附子中者一枚炮大豆三合右十味切以水一斗煮腎令熟去腎内諸藥煎取三升半分四服日三夜一十日更一劑忌猪肉冷水蕪荑桃李雀肉酢物等又姙娠十月五藏俱備六腑齊通納天地氣於丹田故使關節人神皆備但俟時而生集驗延年同並出第二巻中小品療姙娠五月日舉動驚愕動胎不安下在小腹痛引腰胳公洛切腋下也小便疼下血安胎當歸湯方當歸阿膠炙芎藭人參各一兩大棗十二枚擘艾一虎口右六味切以酒水各三升合煮取三升去滓内膠令烊分三服腹中當小便緩差也古今録驗救急同出第七巻中姙娠嘔吐及惡食方九首集驗療婦人姙娠惡阻嘔吐不下食湯方青竹筎橘皮各五兩生薑茯苓各四兩半夏五兩湯洗右五味切以水六升煮取二升半分三服不差頻作忌羊肉餳酢物等千金經心録同又療姙娠嘔吐不下食橘皮湯方橘皮竹筎人參白术各三兩生薑四兩厚朴炙二兩右六味切以水七升煮取二升半分三服不差重作忌桃李雀肉等千金救急經心録同出第十一巻中古今録驗療姙娠不欲食或吐春月所宜服柴胡湯方甘草炙柴胡各二兩麻黄一兩去節煎去沫大棗十二枚擘食茱茰一升右五味切以水六升煮取三升適寒温服一升日三療食噫醋除熱下氣多所宜與上同但春秋冬夏去茱茰加枸杞一斤六月加小麥一升石膏三兩秋去石膏加甘草一兩九月去麻黄加乾薑一兩十月加芎藭三分忌海藻菘菜又療惡食人參湯方人參四兩厚朴炙生薑枳實炙甘草炙各二兩右五味切以水六升煮取三升分三服忌海藻菘菜並出第三十四巻中崔氏半夏茯苓湯療姙娠阻病心中憒悶空煩吐逆惡聞食氣頭眩重四肢百節疼煩沈重多卧少起惡寒汗出疲極黄瘦方半夏洗生薑各五兩旋復花一兩橘皮二兩茯苓二兩細辛芎藭人參桔梗甘草炙各二兩芍藥二兩乾地黄三兩右十二味切以水一斗煮取三升分三服忌猪羊肉餳菘菜海藻生菜蕪荑千金云若病阻積月日不得治及服藥冷熱失候病變客熱煩渇口生瘡者除橘皮細辛用前胡知母各二兩若變冷下痢者除乾地黄用桂心二兩若食少胃中虚生熱大便閟塞小便赤少者加大黄三兩除地黄加黄芩一兩餘依方服一劑得下後消息看氣力冷熱更増損方調定更服一劑湯便急服茯苓丸令能食便强徤也又茯苓丸療姙娠阻病患心中煩悶頭眩重憎聞飲食氣便嘔逆吐悶顛倒四肢垂重不自勝持服之即效要先服半夏茯苓湯兩劑後可將服茯苓丸方茯苓人參各一兩桂心熬橘皮白术甘草炙葛根熬乾薑半夏洗枳實炙各二兩右十味𢷬篩蜜和丸如梧桐子大飲服二十丸漸至三十丸日三忌海藻菘菜羊肉餳桃李雀肉酢等千金同肘後只五味又云姙娠忌桂故熬肘後不用乾薑半夏橘皮葛根又療姙娠常苦煩悶此子煩也竹瀝湯方竹瀝三兩防風黄芩麥門冬去心各三兩茯苓四兩右五味切以水四升合竹瀝煮取二升半分三服不差重作忌酢物又方時時服竹瀝隨多少出第十巻中近效療姙娠惡食心中煩憒熱悶嘔吐方青竹筎麥門冬去心各三兩前胡二兩陳橘皮一兩炙令黄焦香氣出佳蘆根一握取肥白嫩者右五味切以水二大升煮取半大升去滓分再服食後一服無麥門冬用小麥三合煮之勿令裂即熟四肢煩蒸者加地骨皮醫人夏侯極録姙娠胎動方九首廣濟主安胎胎病漏肚痛方當歸芎藭阿膠炙人參各一兩大棗十二枚擘右五味切以水三升酒四升合煮取二升半分三服五日一劑頻服三四劑無所忌出第三巻中小品療姙娠重下痛引腰背安胎止痛湯方當歸阿膠炙乾地黄黄連芍藥各一兩雞子一枚秫米一升右七味切以水七升攪雞子令相得煮秫米令如蟹目沸去滓内諸藥煮取三升分四服忌蕪荑經心録同又膠艾湯療損動母去血腹痛方阿膠二兩炙艾葉二兩右二味以水五升煮取二升半分三服出第七巻中經心録同集驗療姙娠胎動不安腹痛葱白湯方葱白切一升阿膠炙當歸續斷芎藭各三兩銀隨多少右六味切以水一斗先煮銀取七升去銀内餘藥煎取二升半内膠令烊分三服不差更作千金同又療姙娠二三月上至八九月胎動不安腹痛已有所見方艾葉阿膠炙芎藭當歸各三兩甘草一兩炙右五味切以水八升煮取三升去滓内膠令烊分三服日三千金文仲備急同又療姙娠六七月胎不安常處旋復花湯方旋復花一兩厚朴炙白术枳實炙黄芩茯苓各三兩半夏洗十遍芍藥生薑各二兩右九味切以水一斗煮取二升半先食分五服日三夜二忌羊肉餳醋桃李雀肉等千金同出第十一巻中刪繁療女人懐姙胎動不安葱豉安胎湯方香豉一升熬葱白切一升阿膠二兩炙右三味切以水三升煮二物取一升去滓下阿膠更煎膠烊服一日一夕可服三四劑出第七巻中經心録同文仲徐王效神驗胎動方當歸六分芎藭四分右二味切以水四升酒三升半煮取三升分三服若胎死即出比用神驗血上心腹滿者如湯沃雪救急經心録同崔氏用米醋二升煎二十沸服又安胎寄生湯療流下方桑上寄生五分白术五分茯苓四分甘草十分炙右四味切以水五升煮取二升半分三服若人壯者可加芍藥八分足水二升若胎不安腹痛端然有所見加乾薑四分即安忌海藻菘菜酢物桃李雀肉等崔氏小品經心同出第七巻中動胎腰腹痛方三首廣濟療婦人姙娠動胎腰腹痛及血下方當歸三兩葱白切一升芎藭三兩艾葉二兩鹿角膠二兩炙苧根三兩右六味切以銀汁一斗煮取三升絞取滓内膠上火膠烊分三服服别相去如人行六七里未好差停一日更進一劑無所忌出第三卷中小品苧根湯療勞損動胎腹痛去血胎動向下方苧根乾地黄各二兩當歸芍藥阿膠炙甘草炙各一兩右六味切以水六升煮取二升去滓内膠烊分三服忌海藻菘菜蕪荑出第七巻中救急療姙娠動胎去血腰腹痛方芎藭阿膠炙當歸青竹筎各三兩右四味切以水一斗半煮銀二斤取六升去銀内藥煎取二升半分三服日再夜一不差更作一劑集驗千金文仲古今録驗備急經心録同出第四巻中頓仆胎動方四首集驗療姙娠二三月上至七八月頓仆失踞胎動不安傷損腰腹痛欲死若有所見及胎奔上搶心短氣膠艾湯方當歸芎藭甘草炙阿膠炙芍藥各二兩艾葉三兩乾地黄四兩右七味切以水五升好酒三升合煮取三升去滓内膠更上火令膠烊分三服日三不差更作忌海藻菘菜蕪荑文仲同出第十一巻中文仲葛氏若由頓仆及舉重致胎動去血者方𢷬黄連下篩酒服方寸匕日三愈血乃止忌猪肉冷水等物又方赤小豆二升熬令香著雞子十四枚破内小豆中更熬令黄黒末和酒服一匕日三服又方膠三兩炙當歸二兩甘草二兩炙右三味切以水五升煮取二升分再服忌菘菜海藻並出第七巻中胎數傷及不長方三首廣濟療婦人懐姙數傷胎方鯉魚二斤粳米一升右二味如法作臛少著鹽勿著葱豉醋食之甚良一月中頓三􅂈作效安穏無忌集驗文仲備急崔氏延年同出第三巻中集驗療婦人懐胎不長方鯉魚長一尺者水漬没内鹽如棗煮令熟取汁稍稍飲之當胎所腹上當汗如鼻狀雖有所見胎雖不安者十餘日輒一作此令胎長大甚平安出第十一巻中古今録驗療姙娠養胎白术散方白术芎藭各四分蜀椒三分汗牡蠣二分右四味𢷬下篩酒服滿一錢匕日三夜一但苦痛加芍藥心下毒痛倍加芎藭吐唾不能食飲加細辛一兩半夏大錢二十枚服之復更以醋漿水服之若嘔亦以醋漿水服之復不解者小麥汁服之已後其人若渇大麥粥服之病雖愈盡服之勿置忌桃李雀肉等裴伏張仲景方出第十一巻中姙娠傷寒方四首廣濟療姙娠傷寒頭痛壯熱支節煩疼方前胡知母各三兩石膏五兩大青黄芩梔子各一兩葱白切一升右七味切以水七升煮取二升三合絞去滓分三服服别相去如人行七八里再服不利忌熱麫羊肉集驗文仲備急救急同出第三巻中千金療姙娠傷寒方葱白十莖生薑二兩切右二味以水三升煮取二升半頓服取汗又方鯽魚一頭燒作灰𢷬末酒服方寸匕取汗並出第二巻中救急療婦人姙娠十月若傷寒壯熱赤斑變為黒斑溺血方升麻梔子仁各四兩大青杏仁去皮尖黄芩各三分葱白切一升右六味切以水六升煮取半分三服出第四巻中姙娠患瘧方二首集驗療姙娠患瘧湯方常山二兩甘草一兩炙黄芩三兩烏梅十四枚擘石膏八兩右五味切以水一升半合漬藥一宿煮三四沸去滓初服六合次服四合後服二合凡三服忌海藻菘菜生葱千金救急古今録驗同千金姙娠患瘧方常山竹葉各三兩石膏八兩碎糯米一百粒右四味切以水六升煮取二升半去滓分三服第一服未發前一食乆服之第二服取臨欲發餘一服用塗頭額及胷前五心藥滓置頭邊當一日勿進水及進飲食過發後乃進飲粥忌生葱菜集驗文仲備急同出第二巻中姙娠下痢方四首千金療姙娠下痢方白楊皮一斤以水一大升煮取二小升分三服又姙娠及産已寒熱下痢方黄連一升梔子二十枚擘黄蘗一斤右三味切以水五升漬一宿煮三沸服一升一日一夜令盡嘔者加橘皮一把生薑二兩翼同並出第二巻中文仲療姙娠下痢不止方黄蘗乾薑赤石脂各二兩石榴皮一具右四味切以水八升煮取二升分三服出第七巻中古今録驗療姙娠下痢方酸石榴皮黄芩人參各三兩櫸皮四兩粳米三合右五味切以水七升煮取二升半分三服千金經心録同出第三十四巻中姙娠心痛方九首千金療姙娠心痛方青竹筎一升羊脂八兩白蜜三兩右三味合煎食前頓服如棗核大三枚日三服又方蜜一升和井底泥泥心下又方青竹皮一升酒二升煮三沸頓服之又方破雞子一枚和酒服之又方麻子三升水八升煮取五升分三服又方橘皮三兩豉二兩右二味𢷬為丸如梧桐子服二七丸又方燒牛屎焦末水服方寸匕日三並出第二巻中文仲葛氏療姙娠卒胎上迫心痛方取弩弦急帶之立愈出第七巻中古今録驗療姙娠卒得心痛欲死术湯方白术六兩黄芩三兩芍藥四兩右三味切以水六升煮取二升半分三服半日令盡微下水令易生忌桃李雀肉出第三十四巻中姙娠腹痛方三首千金療姙娠腹中痛方生地黄三斤𢷬絞取汁酒一升合煎減半頓服又方燒車釭脂末内酒中服又服一升蜜良並出第二巻中古今録驗療姙娠腹痛或是冷痛或是胎動葱白當歸湯方葱白一虎口當歸三兩右二味切以水酒共五升煮取二升分再服亦將小便服相去一炊頃出第三十四巻中姙娠漏胞方五首小品療姙娠數月日猶經水時時來者名曰漏胞若因房室勞有所去名曰傷胎視説要知如此小豆散療數傷胎將用之方赤小豆五升濕地種之令生牙乾之右一物下篩懐身數月日經水尚來以温酒服方寸匕日三得效便停千金救急經心録同出第七巻中集驗姙娠血下不止名曰漏胞血盡子死方雞子十四枚取黄以好酒二升煮使如餳一服之又方生地黄汁一升酒四合合煮三四沸頓服之不止頻服救急千金文仲備急古今録驗經心録同並出第十一巻中崔氏療姙娠漏胞方乾地黄四兩乾薑二兩右二味𢷬篩酒服方寸匕日再服集驗文仲經心録同又方乾地黄𢷬末以三指撮酒服之不過三服甚良千金同並出第十巻中姙娠下血及尿血方五首千金療姙娠卒下血方葵子一斗右一味以酒五升煮取二升分三服差又方生艾葉一升右一味以酒五升煮取二升分三服冬用莖又方生地黄切一升右一味以酒四升煮取二升分三服亦療落身後血又方燒秤錘令赤内酒中沸定取出飲之又方葵根莖燒作灰以酒服方寸七日三並出第二巻中文仲療姙娠下血方取黍膏燒末服一七日三出第七巻中千金云黍莖古今録驗療姙娠下血豆醬散方豆醬二升漉去汁熬令燥末酒服方寸匕日五六服出第三十四巻中姙娠小便不通利方五首千金療姙娠小便不通方蕪青子七合𢷬為末水和方寸七服日三出第二巻中千金翼療姙娠小便不利方葵子一升榆白皮一把右二味以水五升煮五沸服一升日三服千金同又方葵子茯苓各一兩右二味為散水服方寸匕日三小便利止千金同並出第五卷中古今録驗療姙娠卒不得小便方杏仁二十枚去皮尖熬令變色右一味𢷬服如大豆大七枚立得利又療姙娠不得小便方滑石水和泥臍二寸並出第三十四卷中姙娠子淋方五首小品療姙娠患子淋宜下地膚大黄湯地膚草大黄各三兩知母黄芩茯苓一作猪苓芍藥枳實炙升麻通草甘草炙各二兩右十味切以水八升煮取三升分三服得下後淋不好差還飲地膚葵根汁忌海藻菘菜酢物又方猪苓五兩右一味𢷬篩以白湯三合和方寸匕為一服漸至二匕日三夜二盡不差宜轉下之服甘遂散出第七巻中甘遂散在後大小便不利中千金療姙娠患子淋方葵子一升以水三升煮取二升分再服經心録同又方葵根一把水三升煮取二升分再服出第二卷中經心録療姙娠患子淋小便數出少或熱痛酸疼及足腫地膚飲方地膚草三兩以水四升煮取二升半分三服日三夜一劑文仲小品同出第六巻中姙娠大小便不利方五首小品療姙娠子淋大小便並不利氣急已服猪苓散不差宜服甘遂散下之方太山赤皮甘遂二兩右一味𢷬篩以白蜜二合和服如大豆粒多覺心下煩得微下者日一服之下後還將猪苓散不得下日再服漸加可至半錢匕以微下為度中間將猪苓散黄蘗寄生湯在療子淋方中經心録同出第七巻中子淋方中唯有猪苓散無黄蘗寄生湯古今録驗療姙娠得病六七日以上身熱入藏大小便不利安胎除熱葵子湯方葵子二升滑石四兩碎右二味以水五升煮取一升盡服須㬰當下便愈出第二十四巻中姙娠子癎方二首小品療姙娠忽悶眼不識人須㬰醒醒復發亦仍不醒者名為痓病亦號子癎病亦號子冒葛根湯若有竹近可速辦者當先作瀝汁後辦湯也其竹逺不可即辦者當先辦湯此二療㑹得其一種其竹瀝偏療諸痓絶起死也非但偏療姙娠産婦絶死者有效小兒忽癎痓金瘡療之亦驗作竹瀝法取新伐青淡竹斷之除兩頭節留中央一節作片以塼並側令竹兩頭虚布列其上燒中央兩頭汁出以器承之取服又主痓冒葛根湯療姙娠臨月因發風痓忽悶憒不識人吐逆眩倒小醒復發名為子癎病方貝母葛根丹皮去心木防己防風當歸芎藭桂肉切熬茯苓澤瀉甘草炙各二兩獨活石膏碎人參各三兩右十四味切以水九升煮取三升分二服貝母令人易産若未臨月者升麻代之忌海藻菘菜酢並出第七巻中姙娠水氣方三首集驗療婦人姙娠手脚皆水腫攣急方赤豆五升商陸根一斤切一方加澤漆一斤右三味以水三斗煮取一斗常稍稍飲之盡更作千金同出第十一巻中千金療姙娠腹大胎間有水氣生魚湯方生鯉魚二斤生薑五兩白术三兩芍藥當歸各三兩茯苓四兩右六味切以水一斗二升煮魚熟澄清取八升内藥取三升分三服忌桃李雀肉酢物等集驗同出第二巻中崔氏療姙娠體腫有水氣心腹急滿湯方茯苓白术各四兩旋復花二兩杏仁去皮尖黄芩各三兩右五味切以水七升煮取二升半分二服飲之忌桃李雀肉酢物等千金救急古今録驗集驗同出第十巻中損娠方六首廣濟療婦人因損娠下血不止方當歸白龍骨乾地黄各八分地榆阿膠芍藥乾薑各六分熟艾四分牛角䚡十分炙令黄蒲黄五分右十味𢷬篩為散空腹以飲服方寸匕日二服漸加至二匕差止不吐利忌生冷油膩猪魚蒜蕪荑出第三巻中千金落娠胎墮下血不止方丹參十二兩右一味切以酒五升煮取三升分三服集驗文仲備急同出第二巻中又方地黄汁和代赭末服方寸匕又方桑蝎蟲屎燒酒服方寸匕並出第四巻中救急療損娠方取朱砂末一錢匕生雞子三顆打取白和朱砂頓服胎若死即出如未死即安出第五卷中古今録驗療婦人墮娠血不盡來去喜煩滿鹿角屑豉湯方鹿角一兩屑熬香豉一升半右二味以水三升煮令三沸漉去滓然後内鹿角屑攪令調頓服須㬰血下出第三十七巻中數墮胎方四首刪繁療婦人懐胎數落而不結實或寒冷熱百病之源黄耆散方黄芪吳茱茰乾薑人參甘草炙芎藭白术當歸乾地黄各二兩右九味𢷬散清酒服一匕半日再服加至兩匕為劑忌海藻菘菜蕪荑桃李雀肉等經心録同出第七巻中千金療姙娠數墮胎方姙娠三月灸膝下一寸七壯又方赤小豆末酒服方寸匕日二亦主姙娠數月月水尚來者並出第三巻中經心録紫石門冬丸主風冷在子宫有子常落或始為婦便患心痛乃成心疾月水都未曽來服之肥悦令人有子方逺志去心澤㵼肉蓯蓉桂心各二兩紫石英天門冬去心五味子三兩禹餘糧蜀椒汗烏頭炮巻柏烏賊骨寄生石楠當歸各一兩杜仲甘草炙石斛柏子仁辛夷人參各二兩雲母一兩燒右二十二味末之以蜜丸酒服二十丸如梧桐子稍加至三十四十丸日三忌海藻菘菜猪肉冷水生葱鯉魚千金同出第六卷中姙娠得病欲去子方三首小品療姙娠得病事須去胎方通按麥芽神曲墮胎如神凡有孕者不可妄用麥蘖一升末和煮二升服之即下神效又方七月七日法麴三升煮兩沸宿不食旦頓服即下並出第二卷中文仲療姙娠得病欲去胎方取雞子一枚以三指撮鹽置雞子中服之立出此與阮河南療産難同出第七巻中肘後千金經心録同落胎去胎方四首廣濟療落胎方栝樓四兩桂心五兩牛膝三兩瞿麥二兩右四味切以水七升煎取二升三合去滓分三服服别如人行八九里進之無忌又方取牛膝六七莖綿纒搥頭令碎深内至子宫頭忌生葱猪牛肉並出第三巻中小品療羸人欲去胎方甘草炙乾薑人參芎藭生薑桂心蟹𤓰黄芩各一兩右八味切以水七升煮取二升分三服忌海藻菘菜生葱出第七巻中千金欲去胎方大麴五升清酒一升煮三沸去滓令盡分五服當宿勿食旦再服其子如糜令母肥盛無疾苦千金不𫝊出第三巻中産乳序論三首崔氏夫人生夀夭雖有定分中間枉横豈能全免若調攝㑹理或可致長生若將䕶乖方乃胎乳傷促且中人之性識異𢎞逺言及産育情多鄙之都未知此道幽深博施處廣僕褰帷之暇頗敦經史逮乎藥術彌復關懐今歴選羣方兼申短思苟非切要詎能載録晚述職孤城空莊四絶尋醫訪道理闕多疑豈得坐而相守以俟其斃此書所記故縁於此盖擬備諸私室未敢貽厥將來必有以為要亦所不隠也余因披閲巒公調氣方中見巒公北平陽道慶者其一妹二女並皆産死有兒婦臨月情用憂慮入山尋余請覔滑胎方余報言少來多遊山林未經料理此事然當為思量或應可解慶停一宿余輒憶想畜生之類縁何不聞有産死者婬女偷生賤婢獨産亦未聞有産死者此當由無人逼佐得盡其分理耳其産死者多是富貴家聚居女婦輩當由兒始轉時覺痛便相告報傍人擾擾令其驚怖驚怖畜結生理不和和氣一亂痛切唯甚傍人見其痛甚便謂至時或有約髻者或有力腹者或有冷水潠面者努力强推兒便暴出畜聚之氣一時奔下不止便致運絶更非佗縁至且以此意語慶慶領受無所聞然猶苦見邀向家乃更與相隨停其家十餘日日晡時見報云兒婦腹痛似是産候余便教屏除牀案遍一房地布草三四處懸繩繫木作衡度髙下令得蹲當腋得憑當衡下敷慢氈恐兒落草悮傷之如此布置訖令産者入位語之坐卧任意為其説方法各有分理順之則全逆之則死安心氣勿怖强此産亦解人語語訖閉戸戸外安牀余共慶坐不令一人得入時時隔戸問之何似答言小痛可忍至一更令爛煮自死牝雞取汁作粳米粥粥熟急手攪使渾渾適寒温勸令食三升許至五更將末便自産聞兒啼聲始聴人入産者自若安穏不異云小小痛來便放體長吐氣痛即止盖任分和氣之效也慶問何故須食雞肉汁粥答云牝雞性滑而濡庶使氣滑故耳問何不與肉答云氣將下恐肉不卒消為妨問何故與粥答云若飢則氣上氣下則速産理不欲令氣上故耳慶以此為産術之妙所𫝊之處無不安也故知巒公隠思妙符神理然則日遊反支之類復何豫哉但以婦人怯弱臨産驚遽若不導以諸法多恐志氣不安所以簡諸家方法備題如左其間取捨各任量裁凡婦人産難必須先簡此書推所投月日知犯忌各須豫慎不得犯之其次應須帳幕皮醋藏衣等物之類並早經營入月即須使足若不豫備臨急用逮事必致闕唯舊經事者始逹此言豫備不虞古之善教也又凡産者雖是穢惡然將痛之時及未産已産皆不得令死喪汚穢家人來視之必産難若已産者則傷子又凡産法唯須熟忍不得逼迫要須兒痛欲出然後抱腰傍人不得驚擾浪作形勢但此事巒公法中已經商畧無用師巫妄述已能横相牽挽失其本性今故重述特宜防也崔氏年立成圖法一首女人年十三行年在庚申反支在正月七月禍害在南方離絶命在東南巽生氣在西南坤宜喚西南黄衣師看産産婦宜著黄衣卧西南首懸尸在辰戌日閉肚在辛八壯在申女人年十四行年在己亥反支在八月二月禍害在西南坤絶命在西南兑生氣在南方離宜喚南方赤衣師看産産婦著赤衣卧南首懸尸在卯酉日閉肚在壬八壯在癸女人年十五行年在戊午反支在三月九月禍害在西北乾絶命在東北艮生氣在北方坎宜喚北方黒衣師看産産婦宜著黒衣卧北首懸尸在寅申日閉肚在癸八壯在壬女人年十六行年在丁巳反支在四月十月禍害在東北艮絶命在西北乾生氣在東方震宜喚東方青衣師看産産婦宜著青衣卧東首懸尸在丑未日閉肚在申八壯在辛女人年十七行年在丙辰反支在五月十一月禍害在東方震絶命在北方坎生氣在東北艮