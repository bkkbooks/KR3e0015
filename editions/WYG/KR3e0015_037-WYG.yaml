巻中文仲療或半生胎不下或子死腹中或半著脊及在草不産血氣上盪心母面無顔色氣欲絶方猪膏一升煎白蜜一升淳酒二升右三味合煎取二升分再服不能隨所能服之備急刪繁千金崔氏同又子死腹中不出方以牛屎塗母腹上立出備急崔氏千金同又方榆皮切一兩珍珠一兩右二味以苦酒三升煮取一升頓服死兒立出集驗千金備急崔氏同並出第二巻中救急療子死腹中方服水銀三兩立出集驗千金備急文仲小品同又方取夫尿二升煮令沸飲之集驗千金崔氏同並出第四巻中胞衣不出方二十首廣濟療胞衣不出方末竈突中土三指撮以水服之集驗千金備急文仲同又方取夫單衣盖井上立出千金集驗救急崔氏小品同又療胞衣不出方取苦酒服赤米一兩千金集驗崔氏同又方雞子一枚苦酒一合和飲之即出集驗千金崔氏同又方當戸燒黍穰即出崔氏同並出第二巻中小品療胞衣不出方取皂莢𢷬末著鼻孔中􅅉即出崔氏同又方鹿角末三指撮酒服之崔氏同又方兒衣不出吞此符吉延年療婦人傷娠及胎死腹中胞衣不出産後疾病及諸困竭欲死方刺取羊血及熱飲之不能者人含吐與之能多益善若不能咽噉少鹽又水潠其面此方神驗崔氏文仲備急同又胞衣不出方以洗兒水服半柸即出崔氏同又療胞衣不出腹中滿則殺人方但多服猪膏又大豆一升苦酒一斗煮取三升分三服崔氏同又方吞雞子黄兩三枚解髮刺喉中令得嘔即出若困極死者以水一升煮栝樓一枚三兩沸寫口中汁下即出出第十四巻中崔氏云水一升煮螻蛄一枚三沸服救急療胞衣不出并兒横到死腹中母氣欲絶方半夏二兩洗白斂二兩右二味𢷬篩服方寸匕小難一服横生二服到生三服兒死四服亦可加代赭瞿麥各二兩廣濟集驗小品備急文仲崔氏同又方小豆小麥相和濃煮汁飲之立出小品千金備急崔氏同又療胞衣不出方取炊箄當戸前燒之廣濟集驗千金崔氏同出第四巻中必效療胞衣不出令胞爛牛膝湯方牛膝四兩滑石八兩當歸三兩通草六兩葵子一升矍麥四兩右六味切以水九升煮取三升分三服忌牛狗内廣濟集驗千金崔氏同通草一方作莾草又方服蒲黄如棗大良集驗千金崔氏同又方生男吞小豆七枚生女吞二七枚千金崔氏並同又方生地黄汁一升苦酒三合煖服之不能頓服再服之集驗千金崔氏同又方澤蘭葉三兩滑石五兩屑生麻油二合右三味以水一升半煮澤蘭取七合去滓内滑石生麻油頓服廣濟集驗千金崔氏同並出第四卷中已上三符主産難産婦吞之吉産難燒此符水和服之吉逆産横産吞此符右岀崔氏産書外臺秘要方卷三十三
