生葱韓同識頻服大効古今常用又療腹脹滿堅如石積年不損者方取白楊東南枝去蒼皮護風細剉五升熬令黄酒五升淋訖則以絹袋盛滓還内酒中蜜封再宿毎服一合日三並出第二巻中卒心腹脹滿方六首肘後療卒心腹煩滿方剉薏苡根濃煮取汁服三升又方黄芩一兩杏仁二十枚去皮尖牡蠣一兩熬右三味切以水三升煮取一升頓服之又方灸兩手大拇指内邊爪後第一文頭各一壯又灸兩手中央長指爪下一壯愈肘後此方本治卒吐逆此本在雜療中其病亦是痰飲霍亂之例兼宜依霍亂條中法療之人平居有患者亦少皆因他病兼為之耳或從傷寒後未復或從霍亂吐下後虚躁或是勞損服諸補藥痞滿或觸寒熱邪氣或食飲協毒或服藥失度並宜各循其本源為療不得專用此法也並出第一巻中備急療卒心腹脹滿又胷脅痛欲死方熱煮湯令灼灼爾以漬手足冷則易秘之肘後張文仲同又桂心散方枳實炙桂心右二味等分下篩以米汁服一匕忌生葱肘後張文仲同並出第一巻中救急療卒患心腹脹滿刺痛方生薑大有功能逺行宜將自隨煮汁服良患乆痢虚損嘔逆不下食見食則吐取三兩細切擣絞取汁㣲煖㸃少多蜜頓一服則下食大効出第七巻中腹脹雷鳴方三首范汪療腹中寒氣脹雷鳴切痛胷脅逆滿附子粳米湯方附子一枚炮半夏半升洗甘草一兩灸大棗十枚粳米半升右五味切以水八升煮米取熟去米内藥煮取三升絞去滓適寒温飲一升日三忌海藻菘菜猪羊肉􅄳仲景傷寒論同集驗加乾薑二兩出第十五巻中延年療患腹内氣脹雷鳴胷背痛方丹參三兩枳實炙各三兩桔梗白术芍藥各二兩生薑四兩㯽榔七枚右七味細切以水九升煮取二升七合去滓分温三服忌猪肉桃李雀肉生冷油膩魚蒜等出第十五巻中又丹參湯療腸鳴發則覺作聲方丹參茯苓各三兩桔梗二兩生薑四兩細辛厚朴炙食茱茰各二兩右七味切以水八升煮取二升五合去滓分温三服毎服如人行七八里忌生菜猪肉酢物出第四卷中腹内諸氣及脹不下食方一十一首廣濟療腹内諸氣脹滿昆布散方昆布海藻人參𤣥參橘皮升麻各三兩芎藭桂心乾薑各二兩小麥一升半醋一升半漬之一宿出暴醋盡止右十味擣篩為散别擣小麥作散合藥散一處更擣千杵酒服方寸匕日三服漸加至二匕不利忌熱麫炙肉生葱蒜粘食等物又療冷氣薏苡仁飯粥方細伐薏苡仁炊為飯氣味欲匀如麥飯煮粥亦好豉漿粥並任意無所忌又療氣蘇子粥方蘇子不限多少研如麻子作粥依食法著葱豉薑並得無所忌又療氣膀胱急妨宜下氣方蕪荑擣和食鹽末令調以綿褁如棗大内下部乆時或下惡汁并下氣佳無所忌通按膀胱急妨謂小便急不得出而妨悶也又療氣昆布臛法髙麗昆布一斤白米泔汁浸一宿洗去鹹味以水一斗煮令向熟擘長三寸闊四五分仍取葱白一握二寸切斷擘之更合熟煮令昆布極爛仍下鹽酢豉糝調和一依臛法不得令鹹酸以生薑橘皮椒末等調和宜食粳米飯粳米粥海藻亦依此法極下氣大效無所忌又療心頭冷硬結痛下氣㯽榔湯方㯽榔十顆生薑青木香各三兩橘皮枳實炙甘草炙大黄各二兩右七味切以水六升煮取二升半絞去滓分温三服服别如人行四五里進一服取微利忌生菜熱麫炙肉海藻菘菜等又療一切氣妨悶不能食㯽榔丸方㯽榔七箇芍藥五分枳實七枚炙人參五分大黄十六分青木香六分桂心四分右七味擣篩蜜和丸空腹服如梧子二十丸日再服漸加至二十五丸微洩為度忌生菜熱麫炙肉蒜粘食生葱等物又療氣小芥子酒方小芥子一升擣碎以絹袋盛好酒二升浸之七日空腹温服三合日二服漸漸加之以知為度酒盡旋旋添之無所忌又療乆患氣脹烏牛尿方取烏牛尿空心温服一小升日一服氣散則止無所忌並出第二卷中近効燒鹽通一切氣尤療風方取鹽花以生麻油和之以濕布一片急褁以繩子繫如打牆鎚許大置瓦子上以炭火四面燒望之如火氣訖更勿加炭待火盡冷訖吹扇去灰收取鹽擣破如患心腹脹滿氣隔不通取碁子大含嚥之立差如煮訶梨勒㯽榔及茶湯用此鹽療一切病韋特進用之極効驗又訶梨勒丸療氣脹不下食尤除惡氣方訶梨勒青木香右二味等分擣篩融沙糖和衆手一時捻為丸隨意服之氣甚者毎服八十丸日再稍輕者毎服四五十丸則得性熱者以生牛乳下性冷者以酒下不問食之前後禮部蕭郎中處得云自服大効灸諸脹滿及結氣法二十二首千金療臚脹脅腹滿法灸膈俞百壯三報穴在第七椎下兩傍各一寸半翼同又療脹滿水腫法灸脾俞隨年壯穴在第十一椎下兩傍各一寸半翼同又療脹滿雷鳴酒沸法灸大腸俞百壯三報穴在第十六椎下兩傍各一寸半翼同又療脹滿氣聚寒冷法灸胃管穴在心鳩尾下三寸灸百壯三報之翼同又療脹滿繞臍結痛堅不能食法灸中管百壯穴在臍上一寸一名水分翼同又療脹滿瘕聚帶下疼痛法灸氣海百壯穴在臍下一寸半忌不可針翼同又療脹滿結氣如水腫狀小腹堅如石法灸膀胱募百壯穴在中極臍下四寸翼同又療脹滿腎冷瘕聚泄痢法灸天樞百壯通按銅人經天樞二穴俠臍二寸翼同又療冷脹胷滿心腹積聚痞疼痛法灸肝俞百壯穴在第九椎下兩傍各一寸半翼同又療五藏六腑積聚脹滿羸瘦不能飲食法灸三焦俞隨年壯穴在第十三椎下兩傍各一寸半翼同並出第十六巻中又療結氣法扁鵲曰第四椎下兩傍各一寸半名闕俞主胷中膈氣灸隨年壯通按闕當作厥四椎兩旁一寸半乃厥隂俞也又主心腹諸病堅滿煩痛憂思結氣寒冷霍亂心痛吐下食不消腸鳴泄痢法灸太倉穴一名胃募在心下四寸胃管下一寸灸百壯又主結氣囊褁針藥所不及法灸盲募二穴在從乳頭邪度至臍中屈去半從乳下行度頭是灸隨年壯通按銅人腧穴依法量度乃得日月膽募之穴然主療别肝募期門穴在此穴上五分然主療與此頗同又凡臍下絞痛流入隂中發作無時此冷氣療之法灸臍下三寸名關元百壯又療短氣不語法灸肘後兩筋間名天井百壯又方灸大椎隨年壯又方灸肺俞穴在第三椎兩傍各一寸半百壯又方灸肝俞第九椎百壯又方灸尺澤百壯又方灸手十指頭各十壯又方灸小指第四指間交脉上七壯又少年房室多短氣者法灸鳩尾頭五十壯並出第十七巻中胷脅痛及妨悶方四首病源胷脅痛者由膽與肝及腎之支脉虚為寒氣所乗故也足少陽膽之經也其支脉從目銳眥貫目下行至胷循脅裏足厥隂肝之經也其支脉起足大指聚毛上循入腹貫膈布脅肋足少隂腎之經也其支脉起肺出絡心注胷中此三經之支脉並循行胷脅邪氣乗於胷脅故傷其經脉邪氣之與正氣交擊故令胷脅相引而急痛也診其寸口脉弦而滑弦則為痛滑則為實痛則為急實則為躍弦滑相摶則胷脅搶息痛也又卒苦煩滿又胷脅痛欲死候此由手少陽之絡脉虚為風邪所乗故也手少陽之脉起小指次指之端上循入缺盆布膻中散絡心包風邪在其經邪氣廹於心絡心氣不得宣暢故煩滿乍上攻於胷或下引於脅故煩滿而又胷脅痛也若經乆邪氣留連摶於藏則成積摶於腑則成聚也並出第十六巻中廣濟療氣結築心胷脅悶痛不能喫食訶梨勒散方訶梨勒四顆炮去核人參二分右二味擣篩為散以牛乳二升煮三四沸頓服之分為二服亦得如人行三二里進一服無所忌又療胷脅不利腹中脹氣急妨悶半夏湯方半夏一升洗生薑一斤桂心六兩㯽榔二兩末右四味細切以水八升煮取二升四合絞去滓分温五服服别相去如人行六七里進一服快利為度忌羊肉􅄳生葱油膩小品有呉茱茰三十顆無㯽榔餘並同又療胷脅妨悶胃中客氣大便苦難大黄丸方大黄十二分厚朴四分炙枳實四分炙芒硝八分杏仁六分去皮尖葶藶子四分熬右六味擣篩蜜和丸空腹以飲服如梧子十丸日二服稍稍加以大便微調為度忌生冷油膩粘食出第二巻中千金療冷氣脅下往來胷膈痛引脅背悶當歸湯方當歸芍藥呉茱茰桂心人參大黄甘草各二兩茯苓枳實各一兩乾薑三兩右十味細切以水八升煮取二升半一服八合日三服治尸注亦佳忌海藻菘菜生葱酢物等出第十六巻中脅肋痛方二首小品療脅下偏痛發熱其脉𦂳弦此寒也當以温藥下之大黄附子湯方大黄三兩附子三枚炮細辛二兩右三味切以水五升煮取二升分三服若强盛人煮取三升半分為三服服别如人行四五里進一服忌猪肉冷水生菜等仲景同又半夏茯苓湯療胷膈心腹中痰水冷氣心下汪洋嘈煩或水鳴多唾口清水自出脅肋急脹痛不欲食此皆胃氣弱受冷故也其脉喜沉弦細遲悉主之方半夏五兩洗生薑五兩茯苓三兩旋復花一兩陳橘皮人參桔梗芍藥甘草炙各二兩桂心一兩右十味切以水九升煮取三升分三服欲得利者加大黄須微調者用乾地黄病有先時喜水下者加白术三兩除旋復花若大便不調宜加大黄及乾地黄並用三兩忌羊肉􅄳酢物生葱猪肉海藻菘菜集驗同出第一卷中胷膈氣方三首廣濟療胷膈氣脹滿喫食心下妨虛熱脚手煩疼漸羸瘦不能食四肢無力枳實丸方枳實六分犀角四分前胡四分青木香八分麥門冬去心八分赤茯苓八分苦參六分芍藥六分右八味擣篩為末蜜和丸如梧子以飲空腹下二十丸漸加至三十丸日二服不利忌生菜熱麫油膩炙肉酢蒜又療胷膈滿塞心背撮痛走注氣悶宜服此柴胡湯方柴胡六分當歸六分青木香六分犀角屑六分㯽榔十箇甘草二分炙右六味切以水七升煮取二升半絞去滓内麝香末分温三服如人行四五里微利為度忌海藻菘菜生菜熱麫蕎麥猪魚蒜又療胷膈間伏氣不下食臍下滿柴胡湯方柴胡三兩枳實三兩生薑三兩白术三兩甘草炙一兩㯽榔七箇右六味切以水六升煮取二升絞去滓分温二服服别如人行六七里進一服小弱人微利禁生冷蒜腥海藻菘菜桃李雀肉等並出第一卷中寒疝腹痛方一十三首病源疝者痛也此由隂氣積於内寒氣結摶而不散腑藏虚弱風冷邪氣相擊則腹痛裏急故云寒疝腹痛也出第二十卷中廣濟療丈夫虚勞寒疝腹痛并主産後方生乾地黄三兩甘草炙二兩茯苓二兩人參二兩當歸二兩大棗十四枚白羊肉去脂三斤右七味切以水三斗先煮羊肉取一斗去羊肉内諸藥煮取五升内葱白一把煮取四升絞去滓分温五服服别相去如人行十二三里後藥消進少食食消服藥忌蕪荑海藻菘菜酢物餘無忌出第四巻中仲景傷寒論寒疝遶臍苦痛若發則白汗出手足厥寒若脉沉弦者二物大烏頭煎主之方大烏頭十五枚白蜜二斤右藥以水三升煮烏頭取二升去烏頭内蜜煎令水氣盡得二升强人服七合弱人五合一服不差明日更服日止一服不可再也忌猪肉冷水千金同又寒疝腹滿逆冷手足不仁若一身盡痛灸刺諸藥所不能治者抵當烏頭桂枝湯主之方秋烏頭實中大者十枚白蜜二斤一方一斤桂心四兩右三味先以蜜微火煎烏頭減半去烏頭别一處以水二升半煮桂取一升去滓以桂汁和前蜜合煎之得一升許初服二合不知更服至三合又不復知更加至五合其知如醉狀得吐者為中病也忌猪肉冷水生葱等范汪方同桂心三兩芍藥三兩甘草二炙生薑三兩切大棗十二枚右五味切以水七升煮取三升去滓取五合和前烏頭蜜令得一升餘並同前法服仲景傷寒論千金同又療寒疝腹中痛引脅痛及腹裏急者當歸生薑羊肉湯主之方當歸三兩生薑五兩肥羊肉一斤去脂右三味切以水一斗合煮取三升去滓温服七合日三痛即當止若寒多者加生薑足前成一斤若痛多而嘔者加橘皮二兩术一兩合前物煮取三升加生薑者亦加水五升煮取三升二合服之依前經心録范汪同無忌又療寒疝腹中痛者柴胡桂枝湯方柴胡四兩大棗六枚黄芩一兩半人參一兩半甘草一兩炙半夏二合半桂心生薑各一兩半芍藥一兩半右九味以水八升煮取三升去滓温服一升日三服又云人參湯作如桂枝法加半夏茈胡黄芩復如茈胡湯法今著人參作半劑忌海藻菘菜羊肉􅄳生葱並出第十五卷中小品寒疝氣腹中虚痛及諸脅痛裏急當歸生薑等四味主之方當歸生薑芍藥各三兩羊肉三斤右藥切以水一斗二升煮肉爛熟出肉内諸藥煎取三升分温服七合日三數有効古今録驗經心録范汪同出第一巻中集驗療寒疝氣往來衝心腹痛桂心湯方桂心四兩生薑三兩呉茱茰二兩右三味切以酒一大升煎至三合去滓分温三服如人行六七里一服忌生葱又療寒疝下牽少腹痛附子丸方附子二兩炮桃仁三兩去皮尖蒺䔧子一升去角尖熬右三味擣篩末蜜和丸梧子大空腹酒下十丸漸加至十五丸及二十丸日再服忌生菜熱麫炙肉笋蒜猪魚出第六卷中又療積年腹内宿結疝冷氣及諸癖癥等香䜴丸方香美爛䜴暴乾微熬令香即止小芥子去土石微熬令赤即止各一升右二味擣篩蜜和丸梧子大空腹酒服二十丸漸加至三十丸日二服初服半劑以來腹中微絞痛勿怪之是此藥攻病之候又療疝瘕冷氣方採鼠李子日乾九蒸九暴酒浸服三合日兩服漸加至三服能下血及碎肉積滯物古今録驗楚王𤓰子丸療心腹寒疝胷脅支滿食飲不化寒中腹痛及嘔痢風痙頸項强急不得俛仰方桂心五分茱茰三兩白薇一分乾薑四分烏頭二分炮蜀椒五分汗芎藭四分防葵二分白芷三分右九味末之合蜜和為丸如梧子先食服一丸日三不知稍稍増之以腹中温身中憹憹為度忌生葱猪肉冷水方中無𤓰子未詳方名范汪等同出第八巻中寒疝心痛方三首病源夫疝者痛也隂氣積結所生也隂氣不散則寒氣盛寒氣盛則痛上下無常處冷氣上衝於心故令心痛也出第二十卷中范汪大茱茰丸療心腹寒疝胷中有逆氣時上搶心痛煩滿不得卧面目惡風悸掉惕惕時驚不欲飲食而嘔變發寒熱方呉茱茰半斤細辛芍藥柴胡一方用前胡旋復花黄芩紫菀人參白术茯苓乾薑桂心附子炮甘草炙半夏洗當歸各半兩右十六味擣篩以蜜和為丸如梧子先食服三丸日三不知稍加忌生葱羊肉􅄳酢物桃李雀肉猪肉生菜海藻菘菜除此更無所忌一方有蜀椒無桂心又一方有乾地黄無黄芩深師同出第十四巻中小品解急蜀椒湯主寒疝氣心痛如刺繞臍腹中盡痛白汗出欲絶方蜀椒二百枚汗附子一枚炮粳米半升乾薑半兩半夏十二枚洗大棗二十枚甘草一兩炙右七味切以水七升煮取三升澄清熱服一升不差更服一升數用療心腹痛困急欲死解結逐寒上下痛良忌猪羊肉􅄳海藻菘菜肘後古今録驗范汪方無甘草餘同經心録同出第一巻中古今録驗療心痛寒疝牡丹丸方牡丹去心桂心各二兩烏頭炮二枚右三味末之合蜜和為丸如大豆旦起未食服三丸日二不知稍増之藥少急寧少服并治遁尸發動無烏頭附子亦可用炮之忌胡荽猪肉冷水生葱等出第八巻中卒疝方三首集驗療卒疝暴痛方灸大敦男左女右三壯立巳穴在灸經圖上出第六巻中文仲療卒得諸疝少腹及隂中相引絞痛白汗出欲死方擣沙參下篩酒服方寸匕立愈肘後備急同又若不差服諸利丸下之走馬湯亦佳此名寒疝亦名隂疝張仲景飛尸走馬湯方巴豆二枚去心皮熬杏仁一枚去尖皮右二味取綿纒搥令極碎投熱湯二合捻取白汁服之須㬰差未差更一服老小量之通療鬼擊有尸疹者常蓄此藥用驗忌野猪肉蘆笋備急同出第十巻中七疝方三首病源七疝候七疝者厥疝癥疝寒疝氣疝盤疝胕疝狼疝也厥逆心痛足寒諸飲食吐不下名曰厥疝也腹中氣乍滿心下盡痛氣積如臂名曰癥疝也寒飲食則脅下腹中盡痛名曰寒疝也腹中乍滿乍減而痛名曰氣疝也腹中痛在臍傍名曰盤疝也腹中臍下有積聚名曰胕疝也少腹與隂相引而痛大便難名曰狼疝也凡七疝皆由血氣虚弱飲食寒温不調之所生也出第二十巻中文仲小器七疝丸主暴心腹厥逆不得氣息痛逹背膂名曰尸疝心下堅痛不可手迫名曰石疝臍下堅痛得寒冷食輒劇名曰寒疝脅下堅痛大如手痛時出見若不痛不見名曰盤疝臍下結痛女人月事不時名曰血疝少腹脹滿引膀胱急痛名曰脉疝悉主之方臣等看詳七疝已載前序椒四分汗桔梗芍藥乾薑厚朴炙細辛附子炮各二分烏頭一分炮右八味末之蜜和丸服如大豆三丸加至七八丸日三服忌猪肉冷水生菜出第一卷中古今録驗七疝丸療疝諸寒臍傍痛上支胷中滿少氣太醫丞樊之方蜀椒五分汗乾薑厚朴炙黄芩細辛芍藥桂心各四分桔梗二分烏喙一分炮柴胡一分茯苓一分牡丹皮一分右十二味擣篩蜜和丸梧子大先餔以酒服七丸日三不知漸加以知為度忌猪肉冷水生葱生菜酢物胡荽范汪同出第十卷中集驗疝氣桃仁湯方桃仁去皮尖呉茱茰橘皮海藻各三兩生薑茯苓羌活蒺䔧子去角各三兩右八味切以水三大升煮取九合分為三服空心服忌酢物寒疝不能食方四首深師療虚冷心腹寒疝胷脅支滿飲食不消腹中痛乆痢頸强芎藭丸方芎藭七分烏頭四分炮防葵三分蜀椒九分汗白薇二分桂心十分白芷五分茱茰六分乾薑八分右九味擣篩蜜和丸如梧子飲服二丸日三稍加至五六丸以知為度忌猪肉冷水生葱范汪同又主虚冷痰癖疝食不消心腹痛氣弱不欲食虚惙羸瘦呉茱茰丸方呉茱茰十分紫菀三分白薇三分烏頭十分炮桂心六分前胡芍藥細辛芎藭黄芩各五分右十味下篩蜜和酒服如梧子五丸日三稍加之忌猪肉冷水桃李生葱生菜等謹按别本有此方元欠五味按忌法有桃李即當用白术恐後古今録驗治寒疝積聚是全方出第十六卷中范汪療手足熱腹中寒疝不能食飲數心腹痛十一物七熬飯後丸方茯苓五兩乾薑六兩今倍併十二兩大黄二斤柴胡十兩芎藭七兩蜀椒一兩汗芒硝一升重十兩今减五合杏仁一升去皮尖葶藶子一升加桂心五兩附子三兩炮右藥乾薑茯苓不熬餘皆熬擣篩以蜜和丸如梧子飲服七丸日三龍朔元年三月十七日詔書十一物七熬方忌猪肉冷水醋物生葱等出第十四巻中通按除乾薑茯苓當九熬今云七者以桂心附子葢加之集驗療寒疝不能食方取馬藺子一升毎日取胡桃許以麫拌熟煮吞之然後依常飯日再服服盡必愈亦除腹内一切諸疾消食肥肌仍時燒塼熱以羖羊毛作氊褁却氊上熨之日一度尤佳寒疝積聚方四首病源夫積聚者由寒氣在内所生也血氣虚弱風邪摶於腑藏寒多則氣澁氣澁則生積聚也積者隂氣五藏所生始發不離其部故上下有所窮已聚者陽氣六腑所成也故無根本上下無所留止但諸藏腑受邪初未能為積聚邪氣留滯不去乃成積聚其為病也或左右脅下如覆杯或臍上下如臂或胃管間覆大如盤羸瘦少氣或洒浙寒熱四肢不收飲食不為肌膚或累累如桃李或腹滿嘔泄寒則痛故云寒疝積聚也其脉駃所吏反而𦂳積聚浮而牢積聚牢强急者生虚弱急者死出第二十巻中通按脉數為駃脉遲為駛深師破積丸療寒疝乆積聚周走動摇大者如鼈小者如柸乍來乍去在於胃管大腸脹滿不通風寒則腸鳴心下寒氣上搶胷脅支滿芫花丸方芫花一分蜀椒一分汗大黄六分細辛六分桔梗五分烏頭四分炮茱茰芍藥茯苓各三分龍膽二分半夏一分洗右十一味擣篩蜜和丸如梧子大飲服五丸日三當下如泥病愈忌猪羊肉􅄳酢物生菜等又當歸丸療心腹勞强寒疝邪氣往來堅固結聚苦寒煩悁於縁切下同不得卧夜苦汗出大便堅小便不利流飲在腹中食不生肌方桔梗二分葶藶子熬五分藜蘆炙二分厚朴炙五分杏仁五十枚去皮尖附子炮五分桂心人參各三分沙參三分特生礜石一兩燒半日右十味擣篩蜜和丸如梧子飲服三丸日三稍加之忌猪肉生葱冷水出第二十二巻中古今録驗療乆寒三十嵗心腹疝癥瘕積聚邪氣往來厥逆搶心痛乆痺羸瘦少氣婦人産乳餘疾胷脅支滿不嗜食手足悁煩月水不通時時便血名曰破積聚烏頭續命丸方食茱茰十分芍藥五分細辛五分前胡五分一云柴胡乾薑十分烏頭十分炮紫菀黄芩白术白􅅔各三分芎藭人參乾地黄各五分蜀椒十分汗桂心十分右十五味擣篩蜜和為丸如梧子大先食服三丸日三不知稍加至七丸忌生菜生葱猪肉冷水桃李雀肉蕪荑等范汪同出第十巻中集驗療腎冷及疼疝氣滯後灌方鹽花一大合漿水半大升右二味和煖灌下部少間即下膿日一度再灌之即止心疝方四首病源心疝者由隂氣積於内寒氣不散上衝於心故使心痛謂之心疝也其痛也或如錐刀所刺或四肢逆冷或脣口變青皆其候也出第二十巻中范汪療心疝復繞臍痛上支脅心下痛方芍藥桔梗細辛蜀椒汗桂心乾薑各三分附子一分炮右七味末之合蜜和為丸如梧子服七丸以酒下日二服忌猪肉冷水生葱生菜等又療三十年心疝神方真射釅好者新好茱茰一名殺子右二味等分擣篩蜜和丸服如麻子二丸日三藥勢盡乃熱食良已用得差劉國英所秘又一心疝方炙兩足大指甲寅之際甲寅各半炷隨年壯良通按寅當作肉又心疝發時心腹痛欲死方炙足心及足大指甲後横理節上及大指岐間白黒肉際百壯則止足心者在足下偏近大指本節際不當足心中央也並出第十八巻中通按足心在足下近大指本節即湧泉穴也外臺秘要方巻七
