  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0015_WYG_011-1a, image: WYG0736/WYG0736-0222a.png}
body:
  text: 外臺秘要方卷七唐王燾撰心痛方八首病源心痛者由風冷邪氣乘於心也其痛發有死者有不死者有乆成疹者心為諸藏主而藏神其正經不可傷傷之而痛為真心痛朝發夕死夕發朝死心有支别之絡脉其為風冷所乘不傷於正經者亦令心痛則乍間乍甚故成疹不死又心為火與諸陽會合而手少陰心之經也若諸陽氣虛少陰之經氣逆謂之陽虛陰厥亦令心痛其痛引喉是也又諸藏虛受病氣乘於心者亦令心痛則心下急痛謂之脾心痛也足太陰為脾之經與胃合足陽明為胃之經氣虛逆乗心而痛其状腹脹歸於心而痛甚謂之胃心痛也腎之經足少陰是也與膀胱合膀胱之經足太陽是也此二經俱虛而逆逆氣乗心而痛者其状下重不自收持苦泄寒中為腎心痛也診其心脉急者為心痛引背食不下寸口脉沉𦂳苦心下有寒時痛關上脉𦂳心下苦痛左手寸口脉沉則為陰隂絶者無心脉也苦心下毒痛出第十六卷中備急療心痛方桂心末温酒服方寸匕須㬰六七服乾薑依上法服之亦佳忌生葱文仲集驗肘後同出第一卷中延年療心痛茱茰丸方呉茱茰一兩半乾薑一兩半桂心一兩白术二兩人參一兩橘皮一兩附子一兩半炮蜀椒一兩出汗甘草一兩炙黄苓一兩當歸一兩右十一味擣篩為散蜜丸一服五丸如梧子大日三服稍加至十五丸忌猪肉生葱海藻菘菜桃李雀肉等藥盡更合酒飲無拘食前後任意肘後有桔梗一兩出第十五卷中救急療心痛方取驢糞絞取汁五六合及熱頓服立差肘後同又方東引桃枝一握切以酒一升煎取半升頓服大効肘後同出第八卷中必効療心痛方當歸末酒服方寸匕頻服備急文仲同又方生油半合温服差肘後備急張文仲同並出第五卷中古今録驗療心痛黄連湯方黄連八兩右一物㕮咀以水七升煮取一升五合絞去滓適寒温飲五合日三忌猪肉冷水肘後范汪同出第八卷中九種心痛方三首廣濟療九種心痛蛔蟲冷氣先從兩肋胷背撮痛欲變吐當歸鶴蝨散方當歸八分鶴蝨八分橘皮六分人參六分㯽榔十二分枳實六分炙芍藥六分桂心五分右八味擣篩為散空腹煮薑􅀥飲服方寸匕日二服漸漸加至一匕半不利忌生葱生冷物油膩粘食出第四卷中千金療九種心痛一蟲心痛二注心痛三氣心痛四悸心痛五食心痛六飲心痛七冷心痛八熱心痛九去來心痛悉主之并療冷衝上氣落馬墮車附子丸方附子一兩炮巴豆仁一兩去心皮熬人參一兩生狼毒一兩炙令極香食茱茰一两乾薑一兩右六味擣末蜜和空腹服如梧子三丸一日一服弱者二丸卒中惡心痛口不能言連年積冷流注心胷痛者亦服之好好將息神効忌野猪肉蘆笋必効經心録同又療九種心痛方取當太嵗上新生槐枝一握去兩頭水三升煮一升頓服之並出第十三卷中諸蟲心痛方一十八首廣濟療諸蟲心痛無問冷熱蛔蟲心痛㯽榔鶴蝨散方當歸桔梗芍藥橘皮鶴蝨各八分人參六分桂心六分㯽榔十分右八味擣篩為散空腹煮薑棗湯服方寸匕漸漸加至二匕不利忌猪肉生葱油膩小豆粘食等又療蛔蟲心痛積年乆不差方取苦酒五合燒青錢二文令赤安酒中則取雞子白一顆去却錢瀉著酒中頓服之差無所忌又主心腹攪結痛不止仍似有蛔蟲者當歸湯方當歸橘皮細辛甘草炙生薑各四分大黄八分别漬鶴蝨二分右七味切以水六升煮取二升分温三服如人行四五里進一服不利未差三日更作服之忌海藻菘菜生菜救急同出第四卷中小品温中當歸湯療暴冷心腹刺痛面目青肉冷汗出欲霍亂吐下脉沉細者及傷寒毒冷下清水變作青白滯下及白滯後還復下清水者悉主之此方可以調諸冷痛也當歸人參乾薑茯苓厚朴炙青木香桂心桔梗芍藥甘草炙各二兩右十味切以水八升煮取三升分温三服日三服不耐青木香者以犀角一兩代之忌海藻菘菜猪肉醋物生葱等又凡厥心痛與背相引喜瘈瘲如物從後觸其心身傴僂者腎心痛也厥心痛腹脹滿不欲食食則不消心痛尤甚者胃心痛也厥心痛痛如錐鍼刺其心心痛甚者脾心痛也厥心痛色蒼如死灰状不得太息者肝心痛也千金同厥心痛卧若徒居痛間動作痛益甚色不變肺心痛也真心痛手足清至節心痛甚旦發夕死夕發旦死心腹中痛發作腫聚往來上下痛有休止腹中熱喜涎出是蚘蟲咬也出甲乙經第一卷中千金療心腹中痛發作腫聚往來上下痛有休止多熱喜涎出是蚘蟲咬也並宜温中當歸湯服兩三劑後若不効有異宜改方增損湯其温中當歸湯在前小品方中此是増損湯方芍藥六兩黄芩四兩厚朴四兩桔梗四兩柴胡四兩當歸三兩升麻三兩右七味切以水八升煮取二升半分三服忌猪肉出第十三卷中張文仲療蛔蟲心痛鶴蝨散方鶴蝨二分末温酢一盞和服之蟲當出備急千金同又乾漆丸方乾漆熬擣蜜和丸服十五丸日再備急同又方取槐上木耳燒灰末如􅀥大正發和水服若不止飲熱水一升蛔蟲立出必効方云酒下備急同又方發時取鹽一匙内口中水下立定蟲即出備急同出第一卷中延年療蛔蟲惡吐水心痛鶴蝨丸方鶴蝨三兩擣篩蜜和為丸用蜜漿水平旦服二十丸日只一服古今録驗用十兩云韋雲患心痛十年不差令服此便愈又鶴蝨丸療蛔蟲心痛方鶴蝨六兩呉茱茰五兩橘皮四兩桂心三兩㯽榔四兩右五味擣篩蜜和為丸如梧子大一服二十丸蜜湯下日二服加至三十丸以蟲出為度忌生葱出第十五卷中救急療心痛不可忍似蛔者胡粉丸方生真胡麻一合胡粉半合熬擣右二味先以猪肉脯一片空腹啖嚥汁勿嚥肉後取胡粉和胡麻搜作丸以少清酒使成頓服盡十嵗以上斟酌増減忌生冷猪肉魚雞蒜酢滑等七日若是蛔吐水者是也出第八卷中必効療蜎心痛方士弱氏曰蜎井中小虫葢痛一處若小虫咬也取鰻鱺魚淡炙令熟與患人喫一二枚永差飽食彌佳又方熊膽如大豆和水服大効又茱茰丸方呉茱茰一升桂心二兩當歸二兩右三味擣篩蜜和丸如梧子酒服三十丸日再服漸加至四十丸以知為度忌生葱又丁香散方丁香七枚頭髮灰一棗許右二味並末和酒服之又鶴蝨㯽榔湯方鶴蝨二兩小兒用一兩㯽榔二七枚右二味以猪肉汁六升煮㯽榔取三升去滓内鶴蝨末先夜不食明旦空腹頓服之須㬰病下及吐水永差神効七日禁生冷酢並出第五卷中冷氣心痛方五首廣濟主冷氣心痛肋下鳴轉喉中妨食不消常生食氣每食心頭住不下桔梗散方桔梗當歸芍藥茯苓橘皮厚朴炙白术各八分蓽撥四分荳䓻子四分㯽榔六分訶梨勒皮六分炙桂心六分右十二味擣篩為散空腹煮薑􅀥飲服方寸匕日二服加至一匕半不利忌生葱猪肉酢物桃李雀肉等一方有枳實不用桔梗出第四卷中深師療胷滿短氣心痛吐涎虚冷防風茯苓湯方防風二兩茯苓二兩桂心六兩甘草二兩炙半夏四兩洗乾薑四兩炮人參三兩右七味切以水一斗煮取三升絞去滓分三服良忌酢物生葱海藻菘菜羊肉餳出第十六卷中崔氏療心痛與冷氣痛者特相宜烏頭丸方烏頭三兩炮附子三兩炮赤石脂三兩蜀椒二兩出汗桂心二兩乾薑二兩右六物擣篩蜜和為丸痛發時温清酒服三丸如梧子覺至痛處痛則止若不止加至五六丸以知為度若早朝服無所覺至午時又服三丸此方丹陽有隱士出山云得華佗法其療略同若乆心痛每旦服三丸稍加至十丸盡一劑遂終身不發忌生葱豬肉張文仲備急同出第四卷中延年療冷氣乆刺心痛不能食方當歸桂心桔梗呉茱茰人參白术髙良薑已上各六分橘皮三分右八味擣篩為散蜜和為丸如梧子大一服十丸酒下日二服加至十五二十丸為度忌生葱桃李猪肉雀肉等又療心痛冷痛腹滿如錐針刺及蟲囓心痛當歸湯方當歸三兩桔梗二兩呉茱茰三兩桂心三兩芍藥二兩大黄二兩右六味切以水六升煮取三升三合去滓内鶴蝨一兩攪温一沸分三服空腹服之微利為度忌猪肉生葱出第十五卷中惡疰心痛方三首廣濟療惡疰撮肋連心痛當歸湯方當歸八分青木香六分㯽榔十顆碎麝香一銖研右四味切以小便一大升半煮取六大合絞去滓下麝香末分温三服服别如人行四五里進一服微微利忌生菜熱麫猪犬肉粘食蒜陳臭物出第四卷中崔氏療疰在心腹痛不可忍方取東引桃枝削去蒼皮取白皮一握以水二大升煮取半升一服令盡則差如不定更依前服之無忌又療心腹痛不可忍似疰病者或暴得惡疰攪刺欲死桃仁大黄湯方鬼箭羽二兩桃仁六十枚去皮尖芍藥四兩鬼臼二兩削去皮橘皮一兩當歸二兩生薑五兩桂心二兩柴胡一兩朱砂二兩研湯成下麝香一分研湯成下朴硝二兩研湯成下大黄三兩别浸右十三味切以水九升急火煮取三升温分三服如人行相去六七里服但得快利三四行必差忌生葱生血物並出第四卷中心痛癥塊方二首廣濟療心痛癥塊硬築心氣欲絶當歸湯方當歸桔梗芍藥各八分厚朴十分炙橘皮八分人參六分髙良薑十分桃仁五十枚去皮尖生薑八分右九味切以水八升煮取二升五合去滓分温三服服别相去如人行六七里進一服不利忌猪肉生冷油膩雞魚粘食小豆大蒜出第四卷中張文仲療心下堅痛大如椀邊如旋柈音盤名為氣分水飲所結方枳實七枚炙白术三兩右二味切以水一斗煮取三升分三服腹中軟即當散也忌桃李雀肉等此張仲景傷寒論方備急肘後同出第一卷中心背徹痛方四首仲景傷寒論心痛徹背背痛徹心烏頭赤石脂丸主之方烏頭二分炮去皮附子一分炮去皮赤石脂二分乾薑二分蜀椒一分出汗右五味擣篩蜜和丸先食服如麻子大一服三丸少少加之忌猪肉冷水千金必効文仲范汪經心録等同出第十五卷中千金分兩小别張文仲蜀椒丸療胷中氣滿心痛引背方蜀椒一升出汗半夏一升洗附子一兩炮右三味擣篩蜜和為丸如梧子大一服五丸日三忌猪羊肉􅄳等出第三卷中范汪療心下切痛引背胷下蓄氣胃中有宿食茱茰煎方呉茱茰一升蜀椒五升甘草二兩炙乾地黄一斤右四味以清酒三升漬三宿絞去汁銅器中煎令沸麥門冬五升去心乾漆一斤内煎中色黄絞去之内石斛五兩阿膠一斤白蜜六升凡九味以湯煎令可丸取如棗大含稍稍咽之日三甚者日五六服膝脛重痛者加石斛少氣加麥門冬服藥五日愈當下癥忌海藻菘菜蕪荑等奉車都尉陳葢試有驗又芫花湯主卒心痛連背背痛徹心心腹並懊痛如鬼所刺絞急欲死者方芫花十分大黄十分右二味擣下篩取四方寸匕著二升半苦酒中合煎得一升二合頓服盡須㬰當吐吐便愈老小從少起此療强實人良若虚冷心痛恐未必可服並出第十八卷中卒心痛方一十四首肘後療卒心痛方先煮三沸湯一升以鹽一升合攪飲之若無火以作湯仍可用水鹽或半升服之古今録驗同又方呉茱茰二升生薑四兩切豉一升酒六升右四味煮取二升半分三服又方白艾成熟者三升以水三升煮取一升去滓頓服之若為客氣所中者當吐蟲物出范汪同又方取竈下熱灰篩去炭分以布􅇸盛令灼灼爾更畨以熨痛上冷者更熬令熱又桂心散方桂心當歸各一兩梔子十四枚右三味擣為散酒服方寸匕日三五服亦主乆心痛發作有時節者忌生葱又桂心丸方桂心一兩烏頭一兩炮右二味擣篩蜜和為丸如梧子服三丸稍増之忌生葱猪肉又療暴得心痛如刺苦參湯方苦參二兩龍膽二兩升麻二兩梔子仁三兩右四味切苦酒五升煮取一升分二服當大吐乃差並出第一卷中集驗卒心痛桂心湯方桂心八兩右一味以水四升煮取一升半分二服忌生葱肘後范汪千金同出第一卷中張文仲療卒心痛方取敗布褁鹽如彈子燒令赤末以酒一杯和服之肘後備急同出第五卷中又方閉氣忍之數十過并以手大指按心下宛宛中取差肘後備急同又方苦酒一升破雞子一枚著中合攪飲之好酒亦佳肘後備急范汪同又方蒸大豆若煮之以􅇸盛更番熨心上冷復易之肘後同並出第十卷中救急療卒心痛不能起止方井華水一大升蜜半合右二味相和婦人患令男子度與飲男子患令婦人度與飲必愈出第八卷中必効療卒心痛人參湯方人參桂心梔子黄芩甘草各一兩炙右五味切以水六升煮取二升分三服則愈竒効忌海藻菘菜生葱肘後同出第五卷中中惡心痛方五首廣濟療卒中惡心腹絞刺痛氣急脹奄奄欲絶𤓰蔕散方雄黄四兩研赤小豆四分熬𤓰蔕三分右三味擣篩為散空肚温漿水服一錢匕半當吐止不吐加至兩錢匕忌生冷油膩粘食陳臭等又療卒中惡心腹刺痛去惡氣麝香散方麝香一分研生犀角二分屑青木香二分右三味擣篩為散空肚以熟水服方寸匕立愈未止更服之不利忌五辛並出第四卷中集驗療卒暴心痛或中惡氣毒痛不可忍方大黄四兩芍藥四兩升麻三兩黄芩三兩鬼箭三兩鬼臼二兩桂心二兩桔梗三兩柴胡四兩朱砂二兩别研朴硝二兩右十一味切以水九升煮取二升七合分三服先分朱砂作三分一服内一分攪朱砂調服之此湯快利若痛不止宜服後方忌猪肉生葱生血物千金云寒氣卒客於五藏六腑中則發心痛方千金同又方赤芍藥六兩桔梗五兩杏仁五兩去尖皮右三味切以水六升煮取二升半分三服日三忌猪肉千金同出第一卷中千金療卒中惡心痛方苦參三兩切好醋一升半右二味以醋煮苦參取八合强人頓服老小二服出第十三卷中多唾停飲心痛方二首病源心痛而多唾者停飲乗心之絡故也停飲者水液之所為也心氣通於口心與小腸合俱象火小腸心之腑也其水氣下行於小腸為溲便則心絡無有停飲也膀胱與腎俱象水膀胱為腎之腑主藏津液腎之液上為唾腎氣下通於隂若腑藏和平則水液下流宣利若冷熱相乗致腑藏不調津液水飲停積上廹於心令心氣不宣暢故痛而多唾也出第十六卷中范汪療胷中寒熱心痛清唾滿口數數欲吐食不化乾薑丸方乾薑一分桂心一分礬石一分熬令汁盡半夏一分蜀椒一分右五味擣篩蜜和丸如大豆許服二丸日三不知稍加以知為度忌生葱羊肉􅄳出第十八卷中集驗療心痛唾多似蟲者方取六畜心隨得生切作四臠刀縱横各一割破之内少真朱砂著中平旦吞之蟲死愈矣無真朱砂可用雄黄麝香也肘後云切作十四臠刀縱横各割之以真丹一兩粉内割中旦悉吞之入雄黄麝香佳肘後經心録同出第一卷中通按生食果安否心下懸急懊痛方四首病源心與小腸合為表裏俱象於火而火為陽氣也心為諸藏主故正經不受邪若為邪所傷而痛則死若支别絡為風邪所乗而痛則經乆成疹其痛懸急懊者是邪廹於陽氣不得宣暢擁瘀生熱故心如懸而急煩懊痛也出第十六卷中仲景傷寒論心下懸痛諸逆大虚者桂心生薑枳實湯主之方桂心三兩生薑三兩枳實五枚炙右三味切以水六升煮取三升去滓温分三服忌生葱范汪同出十五卷中肘後薑附丸方附子二兩炮乾薑一兩右二味擣篩蜜和丸如梧子服四丸酒飲並得日三忌猪肉冷水本方云治心肺傷動冷痛出第一卷中古今録驗療人心痛懊憹悁悶築築引兩乳又或如刺困極桂心湯方按悁音絹躁急也桂心半兩茱茰二兩芍藥三兩當歸二兩生薑半斤無生薑以乾薑五兩代之右五味切以水一斗二升煮取四升服一升晝三夜一良有驗忌生葱出第八卷中千金心下痞諸逆懸痛桂心三物湯主之方桂心二兩膠飴半斤生薑二兩右藥切以水四升煮二味取三升去滓内飴分三服忌生葱出第十三卷中心痛不能飲食方二首病源心痛而不能飲食者積冷在内客於脾而乗心絡故也心陽氣也冷隂氣也冷乗於心隂陽相乗冷熱相擊故令痛也脾主消水榖冷氣客之則脾氣冷弱不勝於水榖也心為火脾為土是母子也俱為邪所乗故痛復不能飲食也出第十九卷中廣濟療乆心刺肋冷氣結痛不能食髙良薑湯方髙良薑十分當歸十分橘皮八分厚朴十分炙桔梗八分桃仁五十枚去尖皮呉茱茰八分生薑八分訶梨勒五分右九味切以水八升煮取二升八合絞去滓分温三服服别相去如人行六七里再服忌猪肉生冷油膩粘食小豆等出第四卷中肘後療常患心痛不能飲食頭中疼重烏頭丸方烏頭六分炮椒六分汗乾薑四分桂心四分右四味擣末蜜丸酒服如大豆四丸稍稍増之忌生葱出第一卷中乆心痛方六首病源心為諸藏主其正經不可傷傷之而痛者則朝發夕死夕發朝死不暇展療其人心痛者是心之支别絡為風邪冷氣所乘痛也故成疹不死發作有時經乆不差也出第十六卷中廣濟療心痛三十年不差月上旬殺蟲雷丸鶴蝨散方雷丸八分鶴蝨八分貫衆八分狼牙八分桂心八分當歸八分㯽榔八分右七味擣篩為散空腹煮蜜水半雞子許服方寸匕日二服若重不過三服則差不利忌生葱生冷油膩猪魚小豆大蒜等出第四卷中范汪療乆心痛烏頭赤石脂丸方赤石脂乾薑桂心椒汗烏頭炮右五味等分末之蜜和丸如梧子服三丸日三以知為度赤石脂當取斑斑赤中者忌猪肉冷水生葱出第十八卷中必効療三十年心痛方桃人七枚去皮尖右一味研湯水合頓服酒服亦良肘後經心録同出第五卷中古今録驗療乆心痛腹痛積年定不過一時間還發發甚則數日不能食又便出乾血窮天下方不差甄立言為處犀角丸服之數日則差方犀角二分屑麝香二分碎朱砂四分光明者研桔梗二分莽草二分炙鬼臼二分附子二分炮桂心二分貝齒五枚甘草六分芫花二分熬巴豆二十枚去心皮赤足蜈蚣二枚去足炙右十三味擣篩蜜和丸如梧子飲服一丸日一漸加至三丸以利為度忌生葱猪肉野猪肉蘆笋生血物一方無附子千金有雄黄二分出第八卷中療心痛如蟲嚙痛宛轉欲死不救方又濃擣地黄汁和麫作冷淘不用鹽服一頓蟲即出不出再服必出便差正元十年通事舎人崔抗女患心痛垂氣欲絶忽記此方服便吐出一物可方一寸以來狀如蝦蟇無目足微似有口葢被此物所蝕抗云往年見親表患心痛因偶食地黄䬪飥遂吐一蟲猶動其時亦不謂地黄冷淘能害此蟲因盛於小竹筒以數莖地黄冷淘投於竹筒中須㬰視之已化為水然覺此冷淘殺蟲心痛無不永絶抗自得此方救三四人皆如神效出手抄方經心録療四十年心痛不差方黍米瀋汁温服隨多少出第一卷中雜療心痛方三首廣濟療心痛又心撮肋心悶則吐血手足煩疼飲食不入桃仁丸方桃仁八分去皮尖當歸六分芍藥八分訶梨勒六分甘草六分炙延胡索四分人參六分㯽榔十四枚右八味擣篩蜜丸如梧子以酒空腹下二十丸漸加至三十丸日再服取快利忌海藻菘菜生菜熱麫蕎麥猪犬肉粘食出第四卷中古今録驗真心痛証手足青至節心痛甚者旦發夕死夕發旦死療心痛痛及已死方髙其枕柱其膝欲令腹皮蹙柔𤓰其臍上三寸胃管有頃其人患痛短氣欲令人舉手者小舉手問痛差緩者止出第八巻中救急療心痛冷熱方取伏龍肝末煮水服方寸匕若冷以酒和服差范汪經心録同出第八巻中腹痛方四首病源腹痛者由腑藏虚寒冷之氣客於腸胃募原之間結聚不散正氣與邪氣交争相擊故痛其有冷氣摶於隂經者則腹痛而腸鳴謂之寒中是陽氣不足隂氣有餘者也診其寸口脉沉而𦂳則腹痛尺脉𦂳臍下痛脉沉遲腹痛脉來觸觸者少腹痛脉隂弦則腹痛凡腹急痛此裏之有病其脉當沉若細而反浮大故當愈矣其人不即愈者必當死以其病與脉相反故也其湯熨針石别有正方補養宣導今附於後養生方導引法云股脛手臂痛法屈一脛臂中所痛者正偃卧口鼻閉氣腹痛以意推之想氣往至痛上俱熱即愈又云偃卧展兩脛兩手仰足指以鼻内氣自極七息除腹中弦急切痛又云偃卧口内氣鼻出之除裏急飽咽氣數十令温中寒乾吐嘔腹痛口内氣七卜所大振腹咽氣數十兩手相摩令熱以摩腹令氣下出第十六巻中張文仲當歸大黄療冷氣牽引腰背肋下腹内痛方當歸三兩芍藥八分桂心三分乾薑六分茱茰五分人參一兩大黄一兩甘草二兩灸右八味切以水六升煮取三升去滓温服一升日三忌海藻菘菜生葱出第三巻中范汪四味當歸湯主寒腹痛方當歸桂心乾薑各三兩甘草二兩炙右切以水八升煮取三升一服一升日三服虚冷激痛甚者加黄耆芍藥各二兩忌海藻菘菜生葱千金無甘草有附子一兩出第十五巻中小品療寒冷腹痛茱茰湯方呉茱茰二兩甘草炙人參桂心各一兩生薑五兩半夏一升小麥一升當歸二兩右八味切以水一斗五升煮取三升分温服一升日三服忌海藻菘菜羊肉餳生葱千金桂二兩生薑切一升出第一卷中古今録驗芎藭湯療卒寒腹中拘急痛方芎藭當歸桂心芍藥甘草炙各一兩黄芩半兩乾薑半兩杏仁三十枚去皮尖右八味切以水五升煮取二升分再服忌海藻菘菜生葱出第八巻中卒腹痛方七首肘後療卒腹痛方粳米二升右一味以水六升煮取六七沸飲之又方掘土作小坎以水滿坎中熟攪取汁飲之差並出第一巻中張文仲療卒腹痛方令病人卧髙枕一尺許柱膝使腹皮踧氣入胷令人𤓰其臍上三寸便愈能乾咽吞氣數十過者彌佳亦療心痛肘後備急同又方灸兩足指頭各十四壯使火俱下良備急肘後同並出第一巻中千金療胷腹中卒痛生薑湯方生薑一斤擣取汁食蜜八兩醍醐四兩右三味微火上熬令相得適寒温服三合日三出第十六卷中集驗療卒腹痛葛氏方桂末三匕酒服人參上好乾薑亦佳忌生葱肘後文仲同又方食鹽一大把多飲水送取吐肘後張文仲同並出第一巻中心腹痛及脹滿痛一十首病源心腹痛者由腑藏虚弱風寒客於其間故也邪氣發作與正氣相擊上衝於心則心痛下攻於腹則腹痛上下相攻故心腹絞痛氣不得息診其脉左手寸口人迎以前脉手少隂經也沉者為隂隂虚者病苦心腹痛難以言心如寒狀心腹痛痛不得息脉細小者生大堅疾者死心腹痛脉沉細小者生浮大而疾者死其湯熨針石别有正方補養宣導今附於後養生方導引法云行大道常度日月星辰清靜以雞鳴安身卧𠻳口三咽之調五藏殺蠱蟲令人長生療心腹痛出第十六巻中廣濟療心腹中氣時時痛食冷物則不安穩及惡水桔梗散方桔梗茯苓各八分枳實炙人參厚朴炙芍藥橘皮各六分桂心五分㯽榔八分麥門冬去心八分右十味擣篩為散空肚煮薑棗飲服方寸匕日三服漸加至一匕半熱以茶飲下不利忌猪肉酢物生葱生冷油膩小豆粘食熱麫炙肉等物又療卒心腹痛氣脹滿不下食欲得㵼三兩行佳當歸湯方當歸茯苓桔梗橘皮髙良薑㯽榔各八分生薑八分右七味細切以水七升煮取二升三合絞去滓分温三服服别相去如人行六七里服訖利三兩行宜停後服忌猪肉酢物生冷油膩魚蒜粘食小豆並出第十五巻中肘後療心腹俱脹痛煩滿短氣欲死或已絶方梔子十四枚䜴七合右二味以水二升先煮䜴取一升二合去滓内梔子更煎取八合絞去滓服半升不愈者盡服之備急文仲同又方烏梅二七枚水五升煮一沸内青大錢二七文煮取一升半强人可頓服羸人分再服當下愈文仲同又方茱茰二兩生薑四兩切豉三合右三味酒四升煮取二升分三服即差又療心腹相連常脹痛狼毒丸方狼毒二兩炙附子半兩炮右二味擣篩蜜和丸服如梧子一日服一丸二日二丸三日三丸