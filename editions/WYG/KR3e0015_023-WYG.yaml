body:
  text: 外臺秘要方卷十九唐王燾撰脚氣腫滿方二十九首病源此繇風濕毒氣摶於腎經腎主水今為邪所摶則腎氣不能宣通水液水液不傳於小腸致水氣擁溢腑藏浸漬皮膚故腫滿也出第十三卷中茯苓乾薑澤㵼各二兩桂心二兩右四味切以水六升煮取二升分為三服忌酢物生葱又療脚氣初發從足起至膝脛腫骨疼者方烏牛尿一服一升日二服腫消止羸瘦者二分尿一分牛乳合煮乳結乃服之又方生猪肝一具細切以淡䔉虀食之令盡若不盡者分再食之並出第十六卷中崔氏療脚氣遍身腫方大豆二大升以水一斗煮取五升去豆桑根白皮一握切㯽榔二七枚碎茯苓二兩切右四味將三物以前豆汁浸經宿煮取二升絞去滓添酒二合内藥中隨多少服之忌酢物救急同又療遍身腫小便澀者用麻豆方主之療脚腫氣烏豆一斗水四斗煮取一斗半去豆桑根白皮切五升大麻子二升熬研碎右三味以豆汁内藥煎取六升一服一升日二服三日令盡又方烏豆五升桑根白皮切四升二物以水二斗煮取一斗半去滓大麻子仁一升熬橘皮二兩升麻二兩杏仁二兩猪苓二兩丹參三兩生薑二兩切右九味切將七物内前桑皮豆汁中煮取四升朝二服相去如三食久藥消進食食消又更進二服此二方並唐尚書送又療脚氣及腰腎膀胱宿水及痰飲桃花散方收桃花隂乾量取一大升但隨虛滿不須按捺𢷬為散紗羅下之温清酒和一服令盡通利為度空腹服之須􅁷當轉可六七行但宿食不消化等物摠㵼盡若中間覺饑虚進少許軟飯及麋粥極安穏不似轉藥虚人廢朝謁但覺腰脚輕快使人踴躍食味倍佳脚先腫者一宿頓消如囊中貯物傾却相似又無毒易將息唯忌胡蒜猪肉三月内腹虚大都消息慎生冷酸滑五辛酒麫及粘食肥膩四五日外諸食復常又余見古方論云脚氣但腫不悶經服利藥法令人渴但腫縱不服利藥亦遣人渴宜利方取大麻子熬令香和水研取一大升别以三大升水煮一大升赤小豆取一升汁即内麻汁更煎三五沸渴即飲之冷熱任取安穏饑時噉豆亦佳而利小便止渴消腫大良榖葉及桑白皮熬炙為飲飲之亦良腫盛力弱不堪大藥者取牛乳一小升烏牛尿一小升無烏牛尿用黄者亦得和調分三服相去十里久小便大利脚腫即頓消若一劑不除隔一二日更服氣力好者依前服羸弱者每日平旦唯一服六七合以差乃止忌雜肉並出第六卷中文仲大麻子酒方療脚氣上脚腫小腹痺大麻子一升碎研清酒三升漬三宿温服隨性兼療頭風補益此一方傳用大良備急同又療脚氣滿小便少者方㯽榔四十枚切大豆三升桑根白皮切二升右三味以水二斗煮取六升分六服間粥亦得若冷脹加吴茱茰二升生薑一兩用亦良備急同又療脚氣非冷非熱老人弱人脹滿者方㯽榔殻汁中或茶飲中豉汁中服㯽榔仁散方寸匕利甚快穏良備急同又脚氣滿方大豆一升以水四升煮之令熱去滓取桑根白皮切一大升和豆汁重煎之厚薄如酪布絞去滓空腹日再備急同又徐王枳實散宜春秋服消腫利小便兼補療風虚冷脹不能食方枳實半斤炙桂心一斤茯苓白术各五兩右四味為散酒服方寸匕日三服加至二七忌生葱酢物桃李雀肉等備急同又手脚酸痛兼㣲腫方烏麻五升㣲熬碎之右一味以酒一升漬一宿隨多少飲之盡更作大佳備急同又若身腫氣攻心者方生猪肉去脂以漿水洗於兩板中壓去汁細切作膾蒜虀啖之日二頓下氣除風此方外國法備急同又捋脚方𢷬烏麻碎水煮漬捋大驗又方水煮杉木浸捋脚去腫滿大驗備急同又脚洪腫方取小豆一升和榖楮心一握熟煮喫三二升即差如湯沃雪良此二方經用効備急同並出第九卷中救急療風水毒氣遍身腫方榖楮白皮三兩橘皮一兩桑根白皮五兩東引者紫蘇生薑各四兩大豆二小升右六味切以水九升煮取一大升絞去滓分為四服其藥並須煖不過三劑必當差百日来唯禁大酢出第七卷中必効主脚氣數發通身滿妨氣急者方取大麻子一升碎以小便二升煮取一升去滓頓服之蘇唐徐同出第三卷中蘇恭療下焦冷腫滿胷塞吐不下食者兼去温毒方防己芍藥各二兩枳實炙獨活防風桂心各三兩生薑八兩葛根三兩半夏一升洗右九味切以水九升煮取三升分作四服相去八九里久中閒食少粥一方無防己枳實加附子二兩炮餘依本方忌羊肉餳生葱出上卷中唐侍中療苦脚氣攻心此方甚散腫氣極驗大㯽榔七枚合子碎生薑各二兩橘皮吴茱茰紫蘇木𤓰各一兩右六味切以水三升煮取一升三合分再服忌如藥法又葶藶丸療水氣及脚并虚腫方葶藶子七分生用牽牛子澤漆葉海藻洗去鹹炙昆布如上炙桑根白皮炙甘遂熬椒目郁李仁各三分去皮桂心一分右十味𢷬篩蜜和為丸如梧子一服十五丸日再服加至二十丸其藥用桑白皮切五合赤小豆一合通草一兩切水二升煮取一升下藥忌生葱出下卷中蕭亮療脚氣腫盛因生瘡積年不差膿血長流依狀是風毒氣為冬間服藥酒擁滯散在腠理宜服此方療風痒及舊癬疥百病輕腰脚兼通大腸療肺中熱毒氣方漏蘆萎蕤烏蛇脯炙各二十四分枳實十二分炙秦芁九分苦參一斤𢷬去筋脉取粉漢防己八分𤣥參二十二分乾麥門冬十二分去心白术黄蓍各十二分大黄二十四分黄芩八分右十三味𢷬篩蜜和丸如梧子一服四十丸日再漸加至五十丸無問食前食後服酒浸藥下之又方牛蒡根切二大升枳實八兩炙磁石一斤薏苡仁一升𤣥參六兩烏蛇脯六兩炙生地黄切二大升烏豆小粒者一大升右八味細切絹袋盛以好無灰酒一大斗浸經三日任性多少將以下前藥又洗方漏蘆一大升白歛五兩甘草三兩炙蒺䔧子槐白皮五加根皮各一大升右六味切以水二大斗煮取六升内芒硝半大升痒即洗其湯㣲温如人體如瘡熱濕布􅀈上忌海藻菘菜又解風毒入腰脚暴悶痛飲子方生犀角屑蜀升麻黄芩乾藍漢防己枳實炙各二兩漏蘆三兩炙白歛一兩梔子仁十箇甘草元闕分兩右十味切以水八升煮取二升三合絞去滓分温三服不問食前後忌海藻菘菜酢此方忌酢恐更有茯苓又􅀈方取前方加大黄三兩梔子四十顆取軟白布剪作三二十筒孔内藥汁中浸濕傅瘡上乾即換近効療脚氣兩脚腫滿暴破衝心衆醫不差方小便三升黍三斤右二味相和煮三五沸將浸脚日三四度極神効其藥於水盆中盛下著火煖之如池瓮法周迴泥塞然後浸脚捋使汗出立効脚氣腫滿小便澀方三首蘇恭防己湯主通身體滿小便澀上氣上下痰水不能食食則脹者方桑白皮五兩大豆五升以水二斗并桑白皮煮取一斗去滓防己橘皮赤茯苓麻黄去節各三兩生薑五兩旋復花一兩杏仁八十枚紫蘇莖葉二兩切右十味切以前件藥汁煮取三升去滓分為三服力弱者分為五服相去六七里久㣲覆當大汗小便利腫氣消下冷多加茱茰四兩熱多加𤣥參四兩忌酢物又腫滿小便少者湯方㯽榔三十枚合子碎大豆三升桑根白皮二升生薑一斤合皮右四味切以水二斗煮取五升半去滓分為六七服各相去十里久再服小便當利腫即消瘦弱不能忍者時復以少粥止之又紫蘇湯方紫蘇莖一兩甘草炙橘皮各一兩半生薑三兩㯽榔五枚右五味切以水五升煮取二升分三服相去十里久若能長服之永令氣消下忌海藻菘菜並出上卷中脚氣上氣方五首病源此繇風濕毒氣初從脚上後轉入腹而乗於氣故上氣也出第十三卷中張文仲硇砂牛膝三物散療脚氣上氣方硇砂牛膝細辛各三兩右藥為散酒和服方寸匕日再經四五服即効此方𠡠賜慕容寳節將軍服者云神効蘇恭脚氣方云是婆羅門法備急必効同又脚氣上氣入腹腫方野椒根除上皮細剉一升右一味以酒二升投安瓶中泥頭煻火燒得一沸然後温服一盞甚効唯忌冷肥物其餘不禁並出第九卷中蘇恭脚氣散主脚弱上氣痺滿不能食常服方牛膝硇砂細辛丹參白术郁李仁各三兩去皮右六味𢷬篩為散酒服方寸匕日二服主脹腫下氣春秋冬三月時得服夏熱不可服春秋冬消腫利小便兼補療風虚冷脹不能食忌桃李雀肉生菜出上卷中唐療上氣㯽榔湯方㯽榔二七枚杏仁四七枚去皮尖𢷬右二味以小便一大升煮取半升分為二服相去五六里許此方甚下氣一日一服之佳如腹中欲利須㯽榔并子搥碎如前煮取汁服之即快利也又風引湯療痺滿上氣遍身脹膝疼并去風濕痛方大豆三升附子三兩炮枳實炙澤㵼橘皮各四兩甘草炙茯苓防風各二兩右八味切以水二斗酒二升煮大豆取一斗去滓内藥煮取三升分三服三劑腫消去大豆澤㵼更服三劑差忌猪肉冷水海藻菘菜酢物並出上卷中脚氣心腹脹急方四首病源此繇風濕毒氣從脚上入於内與藏氣相搏結聚不散故心腹脹急也出第十三卷中蘇恭諸脚氣定時候間滿腹脹不能食者四時俱得服下氣消脹方昆布八兩射干四兩茯苓乾薑各一兩羚羊角屑橘皮各三分杏仁五分去皮尖蓽撥吴茱茰大黄各六分大小便澀者著大黄無不須用右十味𢷬篩蜜和為丸如梧子大飲服十五丸利多服七丸以意消息不能食者加白术六分麴末十分氣發服巳前丸得定如不定作㯽榔皮湯壓之忌酢物桃李雀肉等又方㯽榔七枚碎生薑三兩切橘皮二兩杏仁三十枚右四味切以水四升煮取一升五合分二服相去七八里久或作半劑一服亦得氣脹發則服之差止又若覺冷氣攻喉方當含吴茱茰三五粒即氣散又脚氣夏盛秋歇毒氣既謝風緩猶在若諸病皆退但苦食腹脹不安為氣在咽喉吐不出嚥不入心悶痰滿食已吐酢水者宜此昆布丸若先服諸藥及湯酒等兼服之不相違忤昆布丸方一云吴茱茰丸吴茱茰蓽撥茯苓白术麴葶藶熬昆布各四兩洗杏仁去皮尖熬枳實炙大黄乾薑各三兩旋覆花二兩半橘皮三兩半右十三味𢷬篩蜜和為丸如梧子飲服十丸一本云二十丸日二服利多減之不利加之常令㣲利覺病退則止發便服之不可常服令人瘦六七日半合之或三分減一分不爾酸敗一本有半夏六兩以湯洗熬之射干三兩又一本無旋覆花乾薑大黄杏仁橘皮忌羊肉餳桃李雀肉酢物並出上卷中脚氣寒熱湯酒方一十首千金甘草湯療脚弱舉身洪腫胃反食榖吐逆胷中氣結不安而寒熱下痢不止小便難服此湯即益亦服女麴散利小便腫消服大散摩膏有驗方甘草一兩炙人參一兩半夏一升洗桂心三兩小麥八合完用大􅀥二十枚擘生薑八兩吴茱茰二升蜀椒三兩出汗右九味切以水一斗三升煮麥取一斗去麥内諸藥煮取四升一服六合作六服忌海藻菘菜羊肉餳生葱又若寒熱日再三發可服此常山甘草湯方常山三兩甘草一兩半右二味切以水四升煮取一升半分三服相去五里久進一服忌海藻菘菜生葱生菜又白术膏酒療脚弱風虚五勞七傷萬病皆主之方生白术浄洗一石五斗仍須㨂擇𢷬取汁三斗煎取半濕荆二十五束束别三尺圍各長二尺五寸徑頭二寸火燒取瀝三斗煎取半青竹三十束束别三尺圍各長二尺五寸徑頭一寸燒取瀝三斗煎取半生地黄五大斤粗大者𢷬取汁三斗煎取半生五加根三十斤浄洗訖剉於大釡内以水四石煎之去滓清澄取汁七斗以銅器中盛大釡内水上煎之取汁三斗五升其煎諸藥法一凖五加法右件白术等五種藥摠計並訖得汁九斗五升上糯米一石五斗上小麥麴八斤暴乾末之以藥汁六斗浸麴五日待麴起第一浄淘米七斗令得三十遍以上下米置浄席上以生布拭之然後炊之下饋以餘藥汁澆饙調强弱更蒸之待饙上痂生然後下於席上調強弱冷熱如常釀法醖之蜜蓋頭三日後第二酘更淘米四升一如前法酘之三日後即加藥如左桂心六兩甘草六兩炙白芷六兩當歸六兩芎藭六兩麻黄六兩去節乾薑一斤五加皮一斤細辛六兩防風六兩附子五兩炮牛膝九兩右十二味㕮咀訖第三酘以米四斗浄淘如前法還以餘汁澆饙重蒸待上痂生下置席上調冷熱如常釀法和上件藥酘之三日外後嘗甘苦得中訖蜜封頭二七日後押取清酒一服四合日再細細加以知為度温酒不得過熱慎生冷酢滑猪鯉牛肉葱菜等物又松葉酒療脚弱十二風痺不能行服更生散數劑及衆療不得力服此一劑便能逺行不過一兩劑方松葉六十斤右一味㕮咀以水四石煮取四斗九升以釀五斗米如常法别煮松葉汁以漬米并饙飯釀泥封頭七日發澄飲之取醉得此酒力者甚衆神妙並出第七卷中崔氏療脚弱獨活湯方獨活三兩生石斛三兩白术一兩防風一兩半茯苓四兩白前一兩羚羊角二兩屑芎藭二兩桑根白皮二兩黄芩三兩附子一兩炮生薑三兩桂心一兩防己一兩右十四味切以水九升煮取二升五合去滓分三服相去十里久服隔四日一劑宜服兩劑佳慎生冷酢滑猪魚䔉桃李雀肉生葱蘇恭同出第六卷中備急療脚氣屈弱若田舍貧家無藥者可釀菝葜及松節酒皆善方菝葜一斛浄洗剉之以水三斛煮取九斗以漬麴又以水二斛煮滓取一斛以漬飯釀之如酒法熟押取飲隨多少若用松節及葉亦準此法其汁不壓也患脚氣屈弱積年不能行腰脊攣痺及腹内堅結者服之不過三五劑皆平復如常神驗肘後文仲同又金牙酒最為療脚氣屈弱之要今載之方如左金牙細辛茵芋肘後作莽草乾薑乾地黄防風附子去皮地膚子蒴藋升麻各四兩人參二兩獨活一斤牛膝五兩石斛五兩右十四味切之以酒四斗漬之六七日服二三合稍加之亦療口不能語脚屈至良又側子酒亦驗肘後同千金無升麻人參石斛牛膝茵芋乾薑有蜀椒莽草止十味云冷加乾薑又陶効驗方云金牙酒療脚弱風冷痺曳又令人肥健勝舊百倍起三十年嚲曳不能行口不能語者昔趙寅陽嚲曳二十六年肉冷如鐡唯餘骨爾服此三十日便起郄太山家代傳秘之云一方用茵芋四兩初服無數任性令足使有酒色便止不得食肥肉生菜其方無牛膝石斛二物餘同文仲同並出第二卷中蘇恭獨活酒十月以後腰脚屈弱兼頭眩氣滿服此方獨活生薑石斛各六兩牛膝丹參萆薢側子炮茯苓各四兩防風薏苡仁山茱茰桂心白术天雄炮芎藭秦芁當歸人參各三兩甘菊花二兩生地黄八兩右二十味切絹袋貯以酒二斗五升漬四日温服三四合日二服頭風患冷者加椒二兩汗出第一卷中脚氣痺弱方七首病源此繇血氣虚弱受風寒濕毒氣與血并行於膚腠邪氣盛正氣少故血氣澀澀則痺虚則弱故令痺弱也出第十三卷中肘後療脚氣之病先起嶺南稍来江東得之無漸或㣲覺疼痺或兩脛小滿或行起忽屈弱或少腹不仁或時冷時熱皆其候也不即療轉上入腹便發氣上則殺人療之多用湯酒摩膏藥種數既多不但五三劑今止取單行効用方急先取好豆豉一斗三蒸三暴乾以好酒三斗漬三宿便可飲隨人多少欲盡預作若不及待漬便以酒煮䜴飲之以滓薄脚其勢得小退乃更營諸酒及膏湯炙之文仲備急同又獨活酒方獨活五兩切附子五兩生用去皮破右二味以酒一斗漬三宿服從一合始以㣲痺為度忌猪肉冷水文仲備急同又方好硫黄二兩末之牛乳五升右二味以水五升先煮乳水至五升乃内硫黄煎取三升一服三合亦可直以乳煎硫黄不用水也卒無牛乳羊乳亦善千金翼云一服一合不知至三合又方先煎牛乳三升令減半以五合服硫黄末一兩服畢厚覆取汗勿令得風中間更一服至暮又一服若已得汗不更服但好消息將䕶之若未差愈後數日中亦可更作若長將亦可煎為丸北人服此療脚多效但須極好硫黄取預備之並出第一卷中千金松脂散主一切風及大風脚弱風痺方薰陸法亦同取松脂三十斤以椶皮袋盛繫頭鐡鐺底布竹木置袋於上石押之下水於鐺中令滿煮之膏浮出得盡以後量更二十沸接取置於冷水中易袋洗鐺更煮如此九遍藥成𢷬篩為散以粗羅下之用酒服一方寸匕日二初和藥以冷酒藥入腹後飲熱酒行藥以知為度如覺熱即減不減令人大小便秘澀宜食葱羹仍自不通宜服生地黄汁㣲取泄利也除忌大麻子以外無所禁若欲斷米加茯苓與松脂等分蜜和為丸但食淡麪餺飥日兩度一食一小椀勿多食也作餺飥法稉米和麫熟挼煮五十沸漉出冷水淘更置湯中煮十餘沸然後漉出食之服松脂三十日後自覺有驗兩脚如似水流下是効如恐秘澀和一斤松脂茯苓與棗粟許大蘇即不澀服經一百日後脚氣當愈仙經曰服松脂一年增夀一年服之二年增夀二年服之乃至十年增夀十年出第七卷中蘇恭煮散療脚氣經春夏及秋脚弱或腫氣時上衝心身體痺悶者方獨活茯苓牛膝漢防己白术黄芪麻黄去節柴胡各六兩當歸防風橘皮桂心人參各四兩附子三兩生用磁石十六兩碎如豆羚羊角三兩屑生薑杏仁半夏洗吴茱茰㯽榔碎丹參八兩右二十二味不著分兩自隨時加減餘二十物切如豆分作三十貼貼著生薑一兩合皮碎切杏仁十四枚去皮尖碎以水二升煮取七合去滓頓服之日一服或二日一服冷多加吴茱茰半兩熱多加麥門冬半兩大熱以竹瀝一升代水嘔逆食不下加半夏一兩毒悶加青木香二分以意消息之患人大便難加大黄半兩腹滿食不消加㯽榔三二枚所加藥病差即止不常服忌猪肉冷水羊肉餳生葱桃李雀肉酢物出第一卷中又療諸脚氣弱未至大發尋常煮散方獨活漢防己麻黄去節茯苓丹參牛膝各六兩磁石十六兩碎黄芪防風人參犀角各六兩升麻青木香桂心各四兩石膏十四兩碎吴茱茰八兩生薑半夏洗㯽榔大者杏仁大黄切右二十一味將十六物𢷬切如豆分作三十分分和為一服服以㯽榔三枚生薑一兩各合皮切杏仁十四枚去皮尖以水二升三合煮取七合去滓日晩或夜中服之日一服若氣盛時日二服可一服或二日一服或三日一服若心下滿嘔逆者加半夏一兩嘔定止若大便澀者可去磁石加大黄一兩大便利即停忌生葱醋物羊肉餳脚氣痺攣方二首病源脚氣之病有挟風毒者則風毒搏於筋筋為攣風濕乗於血則痺故令痺攣也出第十三卷中千金石斛酒療風虚氣滿脚疼冷痺攣弱不能行方石斛五兩丹參五兩防風二兩側子四兩桂心三兩乾薑三兩羌活三兩秦芁四兩芎藭三兩杜仲四兩薏苡仁一升碎五加根皮五兩山茱茰四兩橘皮三兩椒三兩黄芪三兩白前三兩茵芋三兩當歸三兩牛膝四兩鍾乳八兩右二十一味切將鍾乳𢷬碎别絹袋盛繫於大藥袋内以清酒四斗漬三日初服三合日再稍稍加之以知為度忌猪肉冷水生葱出第七卷中千金翼防己湯主風濕四肢疼痺攣急浮腫方木防己三兩茯苓四兩芎藭三兩芍藥二兩桂心三兩甘草六分炙大棗十二枚擘麻黄三兩去節桑根白皮切二升右九味以水一斗二升煮麻黄減一升内藥煮取三升分三服服漸汗出令遍身以粉粉之慎風冷出第十六卷中風偏枯方二首此風偏枯以下五門並兼療脚氣風毒等病相類病源風偏枯者由血氣偏虛則腠理開受於風濕風濕客於半身在分腠之間使血氣凝濇不能潤養久不差生氣去邪獨留則成偏枯其狀半身不隨肌肉偏枯小而痛言不變智不亂是也邪初在分腠之間宜温卧取汗益其不足損其有餘乃可復也診其胃脈沈大心脈小牢急皆為偏枯男子則廢左女子則廢右若不瘖舌轉者可療三十日起其年未滿二十者三歲死又左手尺中神門以後脈足太陽經也虚者則病惡風偏枯此繇愁思所致憂思所為其湯熨鍼石别有正方補養宣導今附於後養生方導引法云正倚壁不息行氣從頭至足止愈疽疝大風偏枯諸風痺又云仰兩足指五息止引腰背痺偏枯令人耳聞聲常行眼耳諸根無有障礙又云正倚壁不息行氣從口趣令氣至頭始止療疽痺大風偏枯又云一足蹹地足不動一足向側相轉身欹勢并手盡急迴左右迭二七去脊風冷偏枯不通潤出第一卷中深師大八風湯療毒風濕痺嚲曳或手脚不隨身體偏枯或毒弱不任或風經五藏恍恍惚惚或多語喜忘有時恐怖或肢節㾓疼頭眩煩悶或腰脊强直不得俛仰又加腹滿食少時氣欬或始遇病時卒倒悶絶即不能語便失音半身或舉體不隨不仁沈重皆由體虚恃少不避風冷所致二十三種大八風湯方當歸二兩半升麻一兩半烏頭二兩炮黄芩二兩芍藥二兩逺志二兩去心獨活二兩五味子一兩半防風二兩芎藭二兩麻黄二兩去節乾薑二兩半秦芁二兩桂心二兩大豆二升石斛二兩甘草二兩半炙杏仁四十枚人參二兩茯苓二兩黄芪二兩紫菀二兩石膏二兩碎右藥㕮咀以水一斗三升酒二升合煮取四升强人分四服羸人分五六服千金翼同出第九卷中古今録驗療三十年風躃偏枯不能行香豉散方生地黄三十斤香豉三升綿褁右二味洗地黄㕮咀先蒸半日暴燥更合豉蒸半日暴令燥𢷬下篩以酒服三方寸匕日三亦可水服益精爽氣服數月有神効出第十四卷中風四肢拘攣不得屈伸方五首病源此由體虚腠理開風邪在於筋故也春遇痺為筋痺則筋屈邪客關機則使筋攣邪客於足太陽之絡令人肩背拘急也足厥隂肝之經也肝通主諸筋主在春其經絡虚春遇風邪則傷於筋使四肢拘攣不得屈伸診其脈急細如弦者筋急足攣也若筋屈不已又遇於邪則移變入肝其狀夜卧則驚小便數也其湯熨鍼石别有正方補養宣導今附於後養生方導引法云手前後逓互交拓極勢三七手掌向下低頭面心氣向下至涌泉倉門却努一時取勢散氣放縱身體平頭動膊前後欹側柔轉二七去膊并冷血筋急漸漸如消又云兩手抱左膝伸腰鼻内氣七息展右足除難屈伸拜起脛中痛萎又云以兩手抱左膝著膺除下重難屈伸又云踞坐伸右脚兩手抱左膝頭伸腰以鼻内氣自極七息展右足著外除難屈伸拜起脛中疼痺又云立身上下正直一手上拓㧕手如似推物勢一手向下如捺物極勢上下来去換易四七去膊内風兩膊并内冷血兩腋筋脈攣急又云踞伸左脚兩手抱右膝伸腰以鼻内氣自極七息展左足著外除難屈伸拜起脛中疼痺出第一卷中千金療口風手足拘攣百節疼痛煩熱心亂惡寒經日不欲飲食張仲景三黄湯方麻黄五分去節獨活四分細辛二分黄芪二分黄芩三分右五味切以水五升煮取二升分二服一服小汗兩服大汗心中熱加大黄二分腹滿加枳實一分炙氣逆加人參三分悸加牡蠣三分熬渴加栝樓根三分先有寒加八角附子一枚炮此方神秘不傳張文仲備急深師及翼古今録驗同又麻子湯療大風周身四肢攣急風行在皮膚身勞强服之不虚人又主精神䝉昩方秋麻子三升浄擇水漬一宿防風二兩麻黄二兩去節生薑二兩橘皮桂心二兩竹葉一握洗石膏二兩碎細辛二兩葱白一握香豉一合右十一味切先以水二斗半煮麻子令極熟漉却滓取九升别煮麻黄數沸掠去沬内諸藥汁中煮取三升去滓空腹分三服服訖當㣲汗汗出以粉塗身然極重風者不過三劑乃至五劑以来無不差輕者不過兩劑差有人患大風賊風刺風加獨活三兩比小續命湯準當六七劑忌生葱生菜一方無細辛又白歛薏苡湯療風拘攣不可屈伸方白歛一升薏苡仁一升芍藥一升酸棗仁一升乾薑一升附子三枚炮破甘草炙一升桂心一升牛膝一升右九味淳酒二斗漬一宿㣲火煎三沸服一升日三扶杖起行不耐酒服五合忌生葱猪肉海藻古今録驗同翼方有車前子並出第八卷中崔氏療暴得風四肢攣縮枯細不能行動用大豆蒸貧人不能辦藥者可依此方取大豆三升浄㨂擇淘之漉出蒸之待氣溜下甑傾二大升醶醋甑中和攪令遍於宻屋内地上設鋪席一帛帕傾豆著帕上仍以五六重綿衣覆豆令病人於豆上卧以被覆之若豆冷漸漸却綿衣令一人於被内引挽攣急處却綿衣盡豆冷收取更著甑中依前法蒸熱下甑復著升半酢和豆一準前法用鋪設毎一收豆作二升荆瀝湯與病人飲饑即任食日再度夜一度如此經三日三夜即休忌風出第三卷中古今録驗西州續命湯療中風入藏及四肢拘急不隨緩急風方麻黄三兩去節石膏二兩芎藭一兩生薑三兩黄芩一兩甘草一兩炙芍藥一兩桂心一兩郁李仁三兩去皮防風一兩杏仁四十枚當歸一兩右十二味切以水九升煮麻黄去上沫内諸藥煮取三升分四服初服取汗米粉於衣裏粉之忌海藻菘菜生葱出第四卷中風不仁方三首病源風不仁者繇榮氣虚衛氣實風寒入於肌肉使血氣行不宣流其狀搔之皮膚如隔衣也是診其寸口脈緩則皮膚不仁不仁脈虚數者生牢急疾者死其湯熨鍼石别有正方補養宣導今附於後養生方導引法云赤松子曰偃卧展兩脛兩手足外踵指相向以􅈹内氣自極七息除死肌不仁足寒又云展左足右足上除不仁脛寒出第一卷中深師茵芋酒療新久風體不仁屈曳或拘急腫或枯焦皆主之施連所增損方甚良茵芋二兩狗脊二兩躑躅花二兩生用烏頭二兩生用附子二兩生用天雄一兩生用右六味切以酒一斗絹囊盛藥漬之冬八九日夏五六日初服半合不知增之以知為度忌猪肉冷水千金翼同又八風湯療五緩六急不隨身體不仁下重腹中雷鳴失小便方防風二兩芍藥二兩茯苓二兩黄芪三兩獨活四兩當歸三兩人參三兩乾薑三兩甘草一兩炙大豆二升附子大者一枚炮右十一味切以水一斗清酒二升合煮取三升分三服忌海藻菘菜猪肉冷水酢物又犀角丸療百病鬼注惡風入皮膚淫淫液液流移無有常處四肢不仁牽引腰背腹脹滿心痛逆胷滿不得飲食吸吸短氣寒熱羸瘦夜喜惡夢與鬼神交通欬𠻳膿血皆療之方犀角二分屑獺肝三分炙雄黄四分研桂心二分丹砂四分研貝齒十分炙研巴豆三十枚熬去心蜈蚣一枚去頭足炙真珠四分研射罔一分麝香一分研羚羊角二分屑牛黄二分研附子一分炮鬼臼二分右十五味𢷬下篩蜜和更𢷬五千杵平旦服如胡豆二丸酒飲並得日三忌猪肉冷水生葱生血物蘆笋並出第九卷中風濕痺方四首病源風濕痺病之狀或皮膚頑厚或肌肉酸疼風寒濕三氣雜至合而成痺其風濕氣多而寒氣少者為風濕痺也由血氣虚則受風濕而成此病久不差入於經絡摶於陽經亦變令身體手足不隨其湯熨鍼石别有正方補養宣導今附於後養生方導引法云任縱臂不息十二通愈足濕痺不任行腰脊痛又正卧疊兩手著背下伸兩脚不息十二通愈足濕痺不任行腰脊痛痺有偏患者患左壓右足患右壓左足久行手亦如足周行滿十方止又云以手摩腹從足至頭正卧伸臂導引以手持引足住任臂閉氣不息十二通以療痺濕不可任腰脊痛出第一卷中千金諸風痺方桂心一兩當歸一兩茯苓一兩防風一兩甘草一兩炙黄芩一兩生薑五兩秦芁二分葛根二分乾􅀥三十枚擘杏仁五十枚去皮尖右十一味切水酒各四升煮取三升分三服取汗又療風痺逰走無定處名曰血痺大闕主之方萆薢四分薯蕷四分牛膝四分澤㵼四分蠐螬三分熬天雄三分炮車前子三分乾漆熬三分白术三分地膚子三分山茱茰五分狗脊三分茵芋一分乾地黄十分右十四味𢷬篩蜜和丸酒服如梧子十丸日三服稍稍加之忌桃李雀肉猪肉冷水蕪荑等物又白歛散療風痺腫筋急展轉易無常處方白歛二分附子一分炮右二味𢷬下篩酒服半刀圭日三不知増至一刀圭身中熱行為候十日便覺忌猪肉冷水並出第八卷中古今録驗六生散療急風痺身軀拘痛方生菖蒲一斤切生地黄一斤拘把根一斤生商陸根一斤生烏頭半斤生薑二斤右六味以淳酒漬之一宿出暴乾復内酒中令酒盡暴令燥𢷬下篩以清酒一升服一錢七日再服之忌猪羊肉冷水蕪荑餳出第十四卷中風濕方九首病源風濕者是風氣與濕氣共傷於人也風者八方之虚風濕者水濕之蒸氣若地下濕復少霜雪其山水氣蒸兼值暖猥退人腠理開便受風濕其狀令人懈惰精神昬憒若經久亦令四肢緩縱不隨入藏則瘖瘂口舌不收或脚痺弱變為脚氣其湯熨鍼石别有正方補養宣導今附於後養生方真誥云櫛頭理髮欲得多過通流血脈散風濕數易更櫛畨用之出第十一卷中深師療風濕脈浮身重汗出惡風方漢防己四兩白术三兩蜀黄芪五分甘草二兩炙大棗十二枚擘生薑三兩右六味㕮咀以水六升煮取二升分為三服服湯當坐被中欲解汗出如蟲行皮中忌桃李雀肉海藻菘菜千金同此本仲景傷寒論方又四物附子湯療風濕相摶骨節疼煩掣痛不得屈伸近之則痛白汗出短氣小便不利惡風不欲去衣或一身悉腫方附子二枚炮八破桂心四兩白术三兩甘草二兩炙右藥㕮咀以水六升煮取三升去滓服一升日三當㣲汗若汗出煩者一服五合蔡公數用驗忌猪肉冷水生葱餘忌同前方此本仲景傷寒論方又療風濕百節疼痛不可屈伸痛時汗出方芍藥四兩甘草三兩炙芎藭四兩附子三兩炮四破右四味㕮咀以水五升煮取二升分再服相去十里頃忌同又療風濕身體疼痛惡風㣲腫湯方桂心四兩麻黄二兩去節芍藥二兩天門冬二兩去心生薑三兩杏仁五十枚右六味㕮咀以水一斗煮取三升一服一升日三忌鯉魚忌同並出第九卷中古今録驗附子湯療風濕相摶骨節煩疼不得屈伸近之則痛白汗出短氣小便不得利惡風不欲去衣或一身流腫方桂心三兩白术三兩附子二枚炮八破甘草三兩右四味㕮咀以水六升煮取三升分三服㣲汗即止若汗出煩者稍服五合驃騎使吴諧以建元元年八月二十六日始覺如風至七日卒起便頓倒髀及手皆不隨通引腰背疼痛通身腫心多滿至九月四日服此湯一劑通身流汗即從来所患悉愈本方不用生薑既有附子今加生薑三兩忌同又療風濕體疼惡風㣲腫天門冬湯方天門冬三兩去心葛根四兩生薑三兩桂心四兩麻黄三兩去節芍藥二兩杏仁五十枚甘草二兩炙右八味切以水一斗煮取三升分三服取汗忌鯉魚餘同前深師無芍藥名天門冬湯並出第十四卷中又療頭風濕面如鍼刺之状身體有腫惡風汗出短氣不能飲食麻黄湯方麻黄四兩芎藭一兩莽草一兩當歸一兩杏仁三十枚右五味切以水五升煮取二升去滓分三服日三糜粥将息佳又辨中風偏枯風痱風懿風痺偏枯者半身偏不隨肌肉偏不用而痛言不變智不亂病在分腠之間温卧取汗益其不足損其有餘乃可復也風痱者身無痛四肢不收智亂不甚言㣲知可療甚則不能言不可治也風懿者奄忽不知人咽中塞窒窒然舌强不能言病在藏腑先入隂後入陽治之先補於隂後冩於陽發其汗身轉軟者生汗不出身直者七日死風痺病不可己者足如履冰時如入湯腹中股脛淫濼煩心頭痛嘔眩時時汗出目眩悲恐短氣不樂不出三年死騎士息王恕母年五十紗扇自扇汗出中風口不得語身緩不收積一月困篤張苗為作七物獨活湯服五劑得愈又士度良母年七十餘中風但苦口不得語積百餘日往来飲食如故苗又與合獨活湯四劑得愈七物獨活湯療脚弱及中風濕緩縱不随方出胡洽獨活五兩葛根四兩乾薑二兩桂心四兩半夏四兩洗甘草二兩炙防風三兩右七味㕮咀以水一斗煮取三升每服一升日三得少㣲汗出好忌羊肉餳海藻菘菜生葱又療濕家始得病時可與薏苡麻黄湯方薏苡半升麻黄四兩去節甘草二兩炙杏仁二兩右四味㕮咀以水五升煮取二升分再服汗出即愈濕家煩疼可以甘草麻黄湯發汗不差更合飲家加白术四兩名白术麻黄湯忌海藻菘菜桃李雀肉等此本仲景方分兩小異並出第十五卷中許仁則療脚氣方三首許仁則曰此病有數種有飲氣下流以成脚氣飲氣即水氣之漸亦有腎氣先虚暑月承熱以冷水洗脚濕氣不散亦成脚氣亦有腎氣既虚諸事不節因居卑濕濕氣上衝亦成脚氣此諸脚氣皆令人脚脛大脚趺腫重悶甚上衝心腹滿悶短氣中間有乾濕二脚氣濕者脚腫乾者脚不腫漸覺枯燥皮膚甲錯須細察之若先覺心腹脅肋刺痛胷背滿悶喫食之後此狀彌加時時氣短手脚沈重骨髓疼多喝氣每食諸黏膩陳敗臭物即諸狀轉劇此即飲氣下流而成脚氣有此候者自宜依前療飲氣将成水氣細辛等八味湯葶藶子等十五味丸療之若先無前狀但覺脚腫疼悶沈重有時緩弱乍衝心腹滿悶小腹下不仁有時急痛宜依後吴茱茰等五味湯桑根白皮等十味丸側子等十味酒細細服之吴茱茰湯方吴茱茰二兩生薑五兩橘皮三兩桂心二兩大㯽榔十枚右藥切以水七升煮取二升半去滓分温三服服相去如人行七八里久一服覺諸狀可欲重合服亦佳服湯後將息經三四日即服後桑根白皮等十味丸忌生葱又方桑根白皮五兩生薑屑六兩蜀椒汗桂心升麻四兩五味子四兩右藥𢷬篩蜜和為丸以飲下之初服十五丸日再服稍稍加至三十丸如梧子大覺熱食前服覺冷食後服之忌同蜀椒桂心元未見分兩又至九月以後宜合側子等十味酒服之兼將下丸方側子五兩生薑八兩桑根白皮八兩桂心四兩白术八兩五加白皮六兩丹參六兩續斷五兩牛膝五兩細辛四兩右藥切絹袋盛用無灰酒五升浸五六日初服一雞子黄許日再服稍稍加之以知為度必用前數法不覺可宜依舊脚氣方用之忌猪肉冷水桃李雀肉生葱生菜吴并同並出一卷中論隂陽表裏灸法三十七首蘇恭云凡脚氣發有隂陽表裏當隨狀療之不可妄依古方也患隂療陽病表救裏皆為重虚實危殆之甚也若病從隂發起兩足大指内側上循脛内及膝裏頑痺不仁或腫先發於此者皆須隨病灸復留中都隂陵泉等諸穴灸者先從上始向下引其氣便各灸二十壯向後隔七日灸七壯取差止餘穴皆依此若病從陽發起兩小指外側向上循脛外從絶骨至風市頑痺不仁或腫起於此者須灸陽輔絶骨陽陵泉風市等諸穴灸數及上向下皆依前法若氣毒兼行表裏者乃可量其輕重隨灸膏摩之若上下遍發表裏各灸一二處以此通洩之其用藥内攻各量病投藥也逐偏若處常使灸瘡不差為佳風氣都除乃隨瘡差差後瘢色赤者風毒盡青黑者猶有毒氣仍灸勿止待身體輕利然後可休矣又一本云常須灸三里絶骨勿令瘡差佳灸脚氣穴名陽陵泉二穴在膝外側骨下宛宛陷中是也絶骨二穴在足外踝上骨絶頭陷中又云一尺是也風市二穴平立垂手當中指頭髀兩筋間是也黄帝三部鍼灸經無風市二穴此處恐是環銚風市疑其别名未詳所出崑崙二穴在足外踝後跟骨上陷中是也陽輔二穴在絶骨前半寸少下是也徐云明堂無絶骨名有陽輔二穴在膝蓋下外側三寸傍亷骨當小指兩筋間是也黄帝三部鍼灸經丙卷陽輔二穴在足外踝上四寸輔骨前絶骨端前三分與此不同上亷二穴在三里下三寸是也條口二穴在上亷下二寸是也下亷二穴在條口下一寸是也太衝二穴在足大指本節後二寸是或云一寸半犢鼻二穴在膝盖上外角宛宛中是也一云膝下黄帝三部鍼灸經丙卷犢鼻二穴在膝臏下骭上俠解大筋中膝目二穴在膝蓋下兩邉宛宛中是也黄帝三部鍼灸經無膝目二穴曲泉二穴在膝内屈文頭是又云從三里上度一寸五分又横向脛二寸當脈中是也黄帝三部鍼灸經丙卷曲泉二穴在膝内輔骨下大筋上小筋下陷者中屈膝而得之隂陵泉二穴在膝下内側輔骨下宛宛中是蘇徐同中都二穴在隂陵泉三隂交中間是蘇一名太隂穴黄帝三部鍼灸經中郄一名中都在内踝上七寸䯒骨中央三隂交二穴在内踝上三寸是蘇徐云名太隂也復溜二穴在内踝上二寸是蘇徐云名曰外命黄帝三部鍼灸經復溜無外命之别名少陽維二穴在内踝後一寸動筋中是徐同太隂二穴在内踝上八寸骨下陷中是徐同太隂蹻二穴在内踝下向宛宛中是黄帝三部鍼灸經并同人腧穴經並無少陽維太隂太隂蹻三穴名委中二穴在膝後屈中央是徐蘇同承筋二穴在腨當中陷中是徐蘇同承山二穴在足腨腸下分肉間陷中是徐蘇同涌泉二穴在脚心中是蘇徐同右件穴並要不可揔能灸其穴最要者有三里絶骨承筋大衝崑崙涌泉有患者可灸又謹按明堂制當以立為正取穴必須直立膝臏骨坐立便即移動不定故宜立取之其寸取病人中指上節為一寸若取尺寸有長短取穴必不著又按秦承祖華佗等取穴並云三指四指為準取三里穴四指指濶六分四六二十四只濶二寸四分取穴如何得著黄帝為本諸説並不可信徐同徐論患脚氣體皆春發夏甚秋輕冬歇大法春秋宜灸冬差可行夏都不可灸既瘡敗又不得覆風冷因入反更增痾冬時血凝又逆天理急不得已無藥物處可灸一二要穴不可遍身多灸脚氣病大論毒從下上亦有從上向下者或云灸上毒氣便上謬矣比見毒氣攻處疼痛如刺隨病即灸火徹便瘳不拘上下凡毒氣所衝如賊欲出得穴即出豈在大門也風毒所攻亦復如是此皆經試萬不失一必不為悮耳蘇同蘇恭云脚氣初發轉筋者灸承山承筋二穴噦逆者灸涌泉若從頭至連背痛寒熱如瘧及腰痛者灸委中頭項背痛隨身痛即灸不在正穴也又云若脚氣盛發時自腰以上並不得鍼灸當引風氣上則殺人氣歇以後有餘病者灸無妨唯冬月得灸春夏不可灸自風市以下固宜佳耳又云若氣上擊心不退急灸手心三七炷氣即便退若未退即悶兼煮䜴酒熱飲逐之即差不去即取烏特牛尿一大升煖服以利為止縱至三服五服彌佳又若已灸脚而胷中氣猶不下滿悶者宜灸間使五十炷兩手掌横文後一云三寸兩筋間是也又若胷中氣散而心下有脈洪大跳其數向下分入兩髀股内令人心急忪悸者宜以手按捻少腹下兩傍接髀大斜文中有脈跳動便當文上灸跳三七炷即定灸畢皆須灸三里二十炷以引其氣下也又若心腹氣定而兩髀外連膝悶者宜灸膝眼七炷在膝頭骨下相接處在筋之外陷中是若後更發復灸三炷又凡人雖不患脚氣但苦髀膝疼悶灸此無不應手即愈極為要穴然不可鍼亦不可多灸唯只灸七炷以下又若脚十指酸疼悶漸入趺上者宜灸指頭正中甲肉際三疰即愈又若大指或小指傍側疼悶覺内有脈如流水上入髀腹者宜隨指傍處灸三炷即愈並出上卷中唐論若手指本節間疼稍入臂者宜灸指間疼處七炷即定又若心胷氣滿已灸身脛諸穴及服湯藥而氣猶不下煩急欲死者宜灸兩足心下當中陷處各七炷氣即下此穴尤為極要而不可數灸但極急乃灸七炷耳以前諸灸法並經用所試皆驗灸畢應時即愈故具録記之凡灸不廢湯藥藥攻其内灸洩其外譬如開門驅賊賊則易出若閉户逐之賊無出路當反害人耳灸用火善惡補冩法一首張仲景云四肢者身之支幹也其氣係於五藏六腑其分度淺薄灸之不欲過多須依經數也過謂餘病則宜依之若脚氣不得拘此例風毒灸之務欲多也依此經數則卒難愈疾小品論灸有八木火明堂論灸有補寫之法若能依之應有道理八木之火凡灸用松木火則難愈柏木火則瘡多汁橘木火則傷皮桑木火則肉枯棗木火則髓消竹木火則傷筋多壯則筋縱枳木火則陷脉漬榆木火則傷骨多壯則骨枯凡八木之火皆不可用也火用陽燧之火其次用䃈石之火天隂則用槐木之火陽燧是以火珠向日下以艾於下承之便得火也䃈石似玊堅以此石擊賔鐵即火出仍以極爛榆木承之即得亦用艾取之此是匃奴取火法今胡人猶爾灸有補寫者甲乙經云用灸補者無吹其火須自滅也以灸寫者疾吹其火拊其艾須其火滅也此言以口炊艾炷令疾滅即是寫也不吹聴自滅者即補也小品又云黄帝曰灸不過三分是謂從穴此言作艾炷欲令根下濶三分也若減此則不覆孔穴不中經脉火氣不行不能除病也若江南嶺南寒氣既少當二分為準燧小不得減一分半也嬰兒以意減之凡灸瘡得膿增壊其病乃出瘡不壊則病不除矣甲乙經云灸不發者灸故履底熨之三日即發也甚宜解此又近有蘇㳟善醫此疾馳名於上京顯譽於下邑撰脚氣方卷論方則信為指南叙灸亦未成膠柱乃云毒氣如賊出何必要在大門腹背手足皆須灸也愚謂灸痛風毒所攻腹則引賊入室如何令賊出門特宜知之不可輕脫若手指疾悶灸無妨也出第一卷中雜療脚氣方一十五首千金防風湯療肢體虚風㣲經内發熱肢節不隨恍惚狂言来去無時不自覺悟南方支法存所用多得力温和不損人為勝於續命越婢風引等湯羅廣州一門南州人士常用亦療脚弱甚良方防風三兩麻黄三兩去節秦芁三兩獨活三兩當歸三兩逺志三兩去心木防己二兩甘草二兩炙人參二兩黄芩二兩升麻二兩芍藥二兩石膏一兩碎麝香二分生薑二兩半夏二兩洗右十六味切以水一斗三升煮取四升一服一升初服厚覆取㣲汗亦當三兩行下其間相去如人行十里久更服有熱加大黄二兩先有冷心痛疾者倍當歸加桂心三兩去大黄忌海藻菘菜羊肉餳一方冇白术出第七卷中千金翼青丸主脚氣皮肉身體諸風方烏頭一兩附子三兩炮麻黄四兩去節加枳實四兩炙右四味𢷬篩蜜和丸梧子酒服五丸日三忌猪肉冷水如生用烏頭附子服如麻子五丸出第十六卷中必効白楊皮酒主脚氣偏廢及主一切風緩風手足拘攣並効方取白楊東南面皮去地三尺以上去蒼皮勿令見風細切熬令黄赤色即止内不津器中以酒浸隨皮多少每令酒浸皮二三寸乃以泥封冬月二七日春夏一七日開飲晝二夜一隨性多少有酒氣為度得􅆃口為佳病可者飲至一石若重者乃至兩石以差為度酒唯須不灰其白楊不得取丘塜者服毎日一兩行鴨溏利蘇恭文仲備急同出第三卷中蘇恭療諸氣方杏仁一百二十枚大棗六十枚去皮核香豉三百粒熬令乾右三味先𢷬豉次𢷬杏仁次𢷬棗令極熟取如彈丸大含之細細咽之忌如藥法此方雖少深有効驗又凡脚氣内須服藥攻擊外須膏摩火灸發洩等並是脚氣之要若有攣急及有不仁之處不問冬夏常用膏摩之冶葛膏療江南風毒先從手脚上腫痺及上頸痺及面却入腹即殺人宜用此膏摩之方冶葛二兩蛇銜二兩犀角二兩屑烏頭二兩桔梗二兩茵芋二兩防風三兩蜀椒二兩乾薑二兩巴豆三十枚又方云二兩去心皮升麻二兩細辛二兩雄黄半兩鼈甲一兩炙右十四味細切以酒四升漬藥一宿以不中水猪膏五斤以煎藥於㣲火上三上三下令藥色變黄勿令焦黑膏成絞去滓乃下之攪令調和以摩病上忌猪肉冷水生菜莧菜蘆笋等一方有石南白芷為十六味千金無茵芋細辛有莽草丹參躑躅花又療風痺手足疼弱䑕漏惡瘡毒所有腹内絞痛百病摩之皆愈方莽草三分牡丹皮二兩蜀椒四分藜蘆三分芫花二兩大黄四分皂莢二分附子三兩右八味𢷬篩以苦酒三升漬一宿以不中水猪脂三斤㣲火上煎之三上三下令藥色黄膏成去滓以摩腫傅瘡有毒不可服及近孔要處合藥勿令婦人孝子雞犬見之其二膏療風毒最善然冶葛膏救急勝於曲魚膏久摩不已令人肉漸枯細曲魚膏雖稍緩常用為佳常以臘月合一劑用之極効忌猪肉冷水胡荽又冶葛膏有巴豆摩多損皮肉用莽草膏方莽草五兩附子八兩生用去皮丹參四兩漢防己三兩芎藭四兩椒三兩吴茱茰四兩白芷三兩沈香半兩零陵香半兩雞舌香半兩犀角二兩屑當歸三兩商陸根四兩青木香半兩右十五味切以酢漬一宿以好酥三大斤煎九上九下布絞去滓用摩頑痺并腫處好膏入肉亦無損傷服諸藥不相妨神効忌猪肉冷水又冶葛膏方冶葛二兩犀角二兩屑漢防己二兩莽草二兩烏頭五兩生用吴茱茰五兩椒三兩生用丹參三兩躑躅花一升升麻三兩乾薑二兩附子五兩白芷一升當歸三兩桔梗三兩右十五味切酢漬以成煎猪肪七升煎五上五下去滓用之以酥代肪善忌猪肉冷水舊方無白芷防己茱茰附子當歸有巴豆雄黄蛇銜防風鼈甲又神明膏方附子十四枚小者三十枚炮吴茱茰一升生用蜀椒一升半白芷一升前胡切一升芎藭切一升白术切一升桂心三兩當歸三兩漢防己切一升風多去之腫者去細辛細辛二兩右十一味切酢淹漬一宿以成煎猪肪五升煎五上五下去滓摩腫及不仁大試有驗有牛酥代猪脂大佳忌猪肉冷水生葱生菜桃李等又脚氣風毒發不與人期攻心即死若居僻逺無藥物處致斃為横死其要藥常宜備隨身半夏洗青木香吴茱茰木𤓰犀角屑大黄生薑橘皮常須備之㯽榔茯苓昆布蓽撥紫蘇杏仁前胡細辛桂心旋復花亦其次也並須備急救命若卒患無藥處隨病所在三五味濃煮服之後依方合藥服之又凡人入八月氣自漸定非意氣大發者作半夏獨活湯多唾或睡覺心忪心悶風熱故也竹葉湯食後服之為佳如不已作後湯服麥門冬三兩去心茯苓二兩石膏四兩碎小麥五合竹葉切一升生薑二兩右六味切以水五升煮取一升二合食後分再服相去七八里久忌酢物又尋常氣滿三日兩日服一劑湯方㯽榔七枚碎橘皮一兩厚朴二兩炙生薑四兩吴茱茰二兩右五味切以水二升煮取一升二合分三服相去五六里乆復服之此藥性温去冷氣又蒼耳酒去皮節頭足諸熱風藥性冷不便熱方六月以後收取日乾至九月剉一大斛水三斛煮取四斗漬二大斗麴三度摠以米一大斛漬三日如凡釀法将息酘之酒熟日二三服五合身諸風骨髓中風若差或發瘡瘡差後皮痛膚堅實光恱腰脚甚便若虚熱羸瘦弱人無問男女加生地黄五升牛膝根剉三升丹參二升天門冬二升松葉五升枸把根五升杏仁一升去皮尖荆根若子二升水三石别煮牛膝丹參松葉等取六斗并蒼耳汁摠一石漬五斗麴用米二石五斗分四度酘杏仁末著第一酘飯中下生地黄𢷬如泥著第二酘飯中下天門冬蒸熟剥去皮𢷬如泥著第三酘飯中下又大麻子一大斗𢷬碎著第四酘中下大去皮膚風補虚大良効多頭風者得甘菊花一升漬第五酘糟中下攪之調酒熟大小同服並得餘無禁忌毒魚肉並勿食有藥處可辨無藥處可以蒼耳為本如或少三兩物亦得不必俱備年常釀至三月服極攘衆疾復延齡輕身將漬石斛等藥酒彌佳忌鯉魚蕪荑又單釀䑕黏根酒和蒼耳單酒法大去風疼癢止欬嗽消淡癖差疽瘻亦是良藥脚氣人作漬側子等酒彌佳一名牛蒡根草名䙴責根又患昬昬頭旋彌甚氣滿背痛取前蒼耳酒漬此後藥方獨活山茱茰天門冬去心黄芪甘菊花防風天雄炮側子炮防己白术茯苓牛膝各四兩枸把三兩丹參四兩生薑六兩磁石十兩貫衆三兩生地黄八兩切右十八味切以絹袋盛酒二大斗漬七日温服一盞日二三服忌豬魚陳臭物餘無禁主腰脚兼去酒風忌豬肉冷水桃李雀肉鯉魚蕪荑酢物並出第一卷中外臺秘要方卷十九
