body:
  text: 外臺秘要方劄子宋皇祐三年五月二十六日内降劄子臣寮上言臣昨南方州軍連年疾疫瘴癘其尤甚處一州有死十餘萬人此雖天令差舛致此扎瘥亦緣醫工謬妄就增其疾臣細曾詢問諸州皆闕醫書習讀除素問病源外餘皆傳習偽書舛本故所學淺俚詿誤病者欲琞聖慈特出秘閣所藏醫書委官選取要用者較定一本䧏付杭州開板模印庶使聖澤及於幽隱民生免於夭橫奉聖旨宜令逐路轉運司指揮轄下州府軍監如有疾疫瘴癘之處於聖恵方内寫錄合用藥方出牓曉示及遍下諸縣許人抄劄仍令秘閣簡外臺秘要三兩本送國子監見較勘醫書官子細較勘聞奏劄付孫兆准此至治平二年二月二日准中書劄子較正醫書所狀醫書内有外臺秘要一項今訪聞前較正官孫兆較對已成所有浄草見在本家欲乞指揮下本家取赴本局修寫進册所貴早得了當候指揮奉聖㫖依所申施行至四年三月日
