body:
  text: 外臺秘要方巻二十四唐王燾撰癰疽方一十四首集驗癰疽論黄帝曰夫子言癰疽何以别之岐伯答曰榮衞稽留於經脉之中則血泣而不行不行則衞氣從之從之而不通壅遏不得行故熱大熱不止熱勝則肉腐肉腐則為膿然不能陷肌膚於骨髓骨髓不為焦枯五臟不為傷故命曰癰黄帝曰何謂疽岐伯答曰熱氣純盛下陷肌膚筋髓骨肉内連五臟血氣竭盡當其癰下筋骨良肉皆無餘故命曰疽疽者其上皮夭瘀以堅亦如牛領之皮癰者其上皮薄以澤此其候黄帝曰善出太素第十六巻中經言五藏不調致疽六腑不和生癰一曰熛疽急者二三日殺人緩者十餘日殺人二曰癰疽急者十餘日殺人緩者一月死三曰緩疽急者一年殺人緩者數年四曰水疽所發多在手足數年猶可療疽者數十種要如此于氏法癰之疾所發緩地不殺人所發若在險地宜令即外消若至小膿猶可療大膿致禍矣一為腦尸二為舌本三為𤣥癰四為喉節五為胡脉六為五藏俞七為五藏繫八為兩乳九為心鳩尾十為兩手魚十一為腸屈之間十二為小道之後十三為九孔十四為兩腨腸十五為神主之舍一本云主客之舍凡十五處不可傷而况於癰乎若癰發此地遇良醫能不及大膿者可救至大膿害及矣范汪同候賊風證但夜痛應骨不可按抑不得廽轉痛處不壯熱體亦不乍寒乍熱但覺體瘆瘆然冷欲得熱熱慰痛處即小寛時有汗此是賊風證也宜即得針灸服療風藥温也方在療風候上大法宜知二候如此也又初得附骨疽即服漏蘆湯下之傅小豆薄得消也又下利已腫處未消者可除大黄用生地黄及乾地黄隨時也熱漸退餘風未歇者可服五香連翹湯除大黄餘熱未消可傅升麻膏佳若失時不消成膿者用火針膏散如療癰法又有䐔疾喜著四肢其狀赤脉起如編繩急痛壯熱其發於脚者喜從躡起至踝赤如編繩謂之䐔病也又其發於臂者喜腋下起至掌也皆由四肢勞熱氣盛為凉濕所折風結筋中成此疾也不即療取消潰去膿則筋攣縮也其若但置不消復不潰其熱歇氣不散喜變作䐔也又療之宜服漏蘆湯令下外以鋒針針去血氣針寫上結脉處傅小豆薄則消也皆可依療丹法消之及潰成膿出火針傅膏散如療癰法也又亦用甘蕉根薄之差又癰發腫髙者病源淺腫下者病源深大熱者易療小熱者難療初便大痛傷肌晩乃大痛傷骨都堅者未有膿半堅半軟者有膿發腫都軟血瘤也非癰發腫以漸知長引日月亦不大熱時時牽痛瘤也非癰吳音曰謂諸氣結亦有腫久久不消成癰療之宜散氣氣已散若初腫處有浮氣年衰皆發癰療之宜及年盛竝折散熱可無此憂于氏法夫癰疽脉洪麤難療脉㣲濇者易療諸浮數之脉應當發熱而反惡寒者癰也此或附骨以有膿也趙乃言無虚勞腹中疾或發血瘤瘡瘡狀墳起頭墨正爾置不當灸療療之火熨便焦爛剥刮去焦痂則血泄不可禁必死癰起於節解遇頑醫不能即消令至大膿者豈膏藥可得復生乎又發癰堅如石走皮中無根瘰􅊓也久不消因得他熱之疾時有發為癰也又發癰至堅而有根者名為石癰療之法當服酒非酒即藥勢不宣但當稍飲取令相得和散便止凢癰腫有肥人用貼宜栝蔞根和平體宜赤小豆貼方以赤小豆五合内苦酒中熬之畢擣為散以苦酒和之塗拭紙上貼腫從發腫兩頭以下范汪同又論少小有渴年四十以外多發癰疽有膈痰而渴者年盛必作黄疸年衰必發癰疽也范汪同又黄帝曰願聞癰疽之形與其期日岐伯曰畧説癰疽之極者十八種又癰疽發咽名曰猛疽猛疽不療則化血為膿膿不寫塞咽半日死其化膿者寫已則含豕膏無冷食三日而已一去無食又發於股胻名曰股脱疽其狀不甚變而癰腫膿摶骨不急療三十日死髀内曰股股外曰髀膝上股下骨稱曰股胻也又發於脇名曰改訾改訾者女子之疾也久之其狀大癰膿其中乃有生肉大如赤小豆療之方剉連翹草及根各一升以水一斗六升煮令竭取三升即强飲厚衣坐釡上令汗出至足已又發於􅥑者名曰鋭疽其狀赤堅大急療之不療三十日死又發於脛者名曰兔囓其狀赤至骨急療之不療害人又發於足上下者名曰四淫其狀大如癰不急療百日死又發於肩及臑者名曰疵疽其狀赤黑急療之此令人汗出至足不害五藏癰發四五日逆􅌊之上灸百壯石子當碎出也不出可益壯從癰發髙下以後范汪並同又石癰者始發皮核相親著不赤頭不甚堅微痛熱熱漸自歇便堅如石故謂之石癰難消又不可得自熟縱愈皆百餘日也又發癰兩頭牽而旁推無根者又不痛結筋非癰也發癰狀如蚢雖極大此肉瘤非癰也腫一寸至三寸癤也三寸至五寸癰也五寸至一尺癰疽也一尺至三尺名曰竟體疽腫成膿九孔皆出諸氣憤鬱不遂志欲者多發此疾癰及疽血瘤鼠乳石癰結筋瘤􅊓皆不可就針角針角少不及禍者凢癰疽之疾未見膿易療之當上灸三百壯四邊間子灸各二百壯實者可下之虚者可補之有氣者下其氣服占斯内塞散得愈絶房三年凡癰瘡審知膿者破之皆當近下邊膿出後當膏藥兌之常使開潤勿令燥合也若其人羸勿一頓盡膿徐徐令後稍出乃盡癰方潰其上皮薄人喜當上破之此終不愈當下破之乃得膿耳勿要其皮厚也凢癰有膿當破無膿但氣腫若有血慎不可破針灸也按之四邊堅中軟此為有膿瀋也一邊軟亦有膿都堅者此為菹核或但有氣也都軟者此為有血血瘤也當審堅軟虚實為要若堅疽積久後若更變熟偏有軟處不可破者疽當暖裹置耳若灸刺破療必暴劇不可救及結筋腄馳偽切肉䑕乳皆不當療也又服内塞散不與他療相害晝夜十餘度服散當以酒又發於腋下堅赤者名曰米疽療之用砭石欲細而長疎啟之塗以豕膏六日巳勿裹其癰堅而不潰者為馬刀挾纓急療之太素經曰頸前已纓又發於股隂者名曰赤弛不急療六日死在兩股之内不可療一云六十日死又發於膝者名曰疵疽其狀大癰色不變寒熱如堅石勿石石之死須其柔色異乃石之者生冷石熨之柔乃破之凖例之也又諸癰腫之發於節而相應者不可療大素經云膈八節門故不可療也又發於陽者百日死又發於隂者三十日死丈夫陽器曰陽婦人隂器曰隂又發於踝者名曰走緩其狀肉色不變數石其輸而止其寒熱不死又發於足傍者名曰厲疽其狀不大初從小指發急療之去其黑者不消輒益不療百日死云足側也又發於胸者名曰背疽狀如大豆三四日起不早療下入腹入腹不療十日死太素經云寒熱不去十日早死又發於足指者名曰脱疽其狀赤黑死不療不赤黑可療療不衰急斬去之得活不去者死又發於膚者名曰舌疽其狀如糓實𤓰蔞常苦寒熱急療之去其寒熱不療十嵗死死後出膿又發於頸者名曰夭疽其狀大而赤黑不急療則熱氣下入淵腋前傷任脉内熏肝肺十餘日死太素經曰項曰前曰頸一云發頭以前十八種竝千金論曰夫癰疽初發人皆不以為急此實竒患唯宜速療若療不速病成難救以此致禍者不一發皆外皮薄為癰皮厚為疽宜急治之夫癰壊後有惡肉者以豬蹄湯洗去穢次傅食肉膏散惡肉盡傅生肉膏散及摩四邉令善肉速生當斷絶房室慎風冷勞煩待筋脉平復乃可任意耳不爾新肉易傷傷則重潰發發則禍至慎之慎之凡癰疽始發或似小節或復大痛或復小痛或發如米粒大白膿子此皆微候宜善察之見有少異即須大驚忙須急治之及斷口味速服諸湯下去熱毒若無醫藥即灸當頭百壯其大重者四面及頭上二三百壯壯數不慮多也復薄冷藥貼膏種種救療必差也又其用藥貼法皆須當瘡中處開孔口令洩瘡熱氣出亦當頭以大針針入四分即差身中忽有痛處似打狀名曰氣痛痛不可忍逰走不住發作有時痛則小熱痛定則寒此皆由冬受温風至春暴寒風來折之不成温病乃作氣痛也又宜先服五香連翹湯摩丹參膏又以白酒煮楊柳皮及暖熨之有赤氣㸃㸃刺出血也其連翹湯可服數劑及竹瀝湯勿以一劑未效便謂即止遂不服耳中間將白薇散佳素問曰寒氣客於經絡血凝渗澀不行壅結為癰疽也不言熱之作也其後成癰又陽氣凑集化寒為熱熱盛則肉腐為膿也又以酢和蜂蛤灰塗之乾即易差即止凡腫根廣一寸以下名癤一寸以上名小癰如豆粒大者名皰子皆始作急服五香連翹湯下之數劑即差止並出第二十三巻中廣濟療癰疽排膿散方黄茋十分膿多倍青小豆一分熱口乾倍芎藭三分肉不生倍芍藥三分痛不止倍白斂三分冇膿不合倍栝蔞三分若渇小便利倍甘草三分炙右七味為散酒服方寸匕日三服不利忌海藻菘菜熱麫魚蒜等千金同一方無白斂甘草又療發癰疽排膿散方人参二兩當歸二両桂心二両芎藭一両厚朴一両炙甘草一両炙防風二両白芷二両桔梗一兩右九味擣篩為散以酒服方寸匕日二服不利若瘡未合常服之忌生冷菘菜海藻生葱蒜並出第五巻中劉㳙子療癰疽先宜傅大黄食肉膏方在發背部千金方食惡肉散後用大黄附子等十物者乃是次兌膏方當歸芎藭白芷各二両烏頭一兩巴豆二十枚去皮松脂二両豬肪二分右七味㕮咀内膏中㣲火合煎三沸已内松脂攪令相得以綿布絞去滓以膏著綿絮兊頭大瘡雖深兊之膿自出就兊盡即生善肉瘡淺者不足兊著瘡中日三惡肉盡即止又療癰疽發壊出血生肉黄耆膏方黄茋一両芍藥一両當歸一両大黄芎藭獨活白芷薤白生地黄各一両右九味切猪膏二升半煎三上三下膏成絞去滓傅兌瘡上摩左右日三文仲同並出第四卷中又療癰疽瘡生肉黄茋膏方黄茋細辛生地黄蜀椒當歸芍藥薤白白芷芎藭丹參各一兩猪膏一升半臘月者甘草蓯蓉獨活黄芩各一兩右十五味以苦酒一升二合夏月漬一宿冬月二宿㣲火煎三沸煮酒氣盡成傅之又療癰疽始作便壊熱毒發瘡膏方羊髓一兩甘草二兩胡粉五分一法五両大黄一兩豬膏二升右五味切合膏髓煎二味烊内甘草大黄三上三下絞去滓内胡粉攪令調和傅瘡上日五度又療癰疽已潰白芷摩膏方白芷甘草各二分烏頭三分薤白十五挺青竹筎雞子大一枚右五味切以猪膏一升合煎白芷黄膏成絞去滓塗瘡四邊勿著瘡中並出第五巻中師深内塞散療癰疽潰漏血脉空竭方黄茋細辛芍藥薏苡仁白芷瞿麥各二両赤小豆七両乾地黄人参防風各二両右十味切先以新成白苦酒置新器中内赤小豆須㬰出銅器中熬令燥復須内苦酒中更熬凡五反止合𢷬為散酒服方寸匕日夜六七過腹痛甚倍芍藥口未閉倍薏苡仁膿多倍黄茋出第二十八巻中刪繁療癰疽等毒潰爛猪蹄洗湯方猪蹄一具治如食法薔薇桹一斤甘草五兩炙芍藥五兩白芷五兩右五味切以水二斗煮猪蹄取八升去滓下諸藥煮取四升稍稍洗瘡出第九巻中千金翼黄帝問曰有疽死者奈何岐伯曰身有五部伏莬一朓二一云膊背三五藏之腧四項五五部有疽死也刪繁同本出靈樞又王不留行散主癰疽及諸雜腫潰皆服之亦療癰腫不潰苦困無賴方野葛皮半分五色龍骨五両王不留行子二升千金方用三合翼云一升桂心一両當歸二両乾薑一両栝樓末六合右七味為散食訖温酒服方寸匕日三以四肢習習為度不知漸漸加之此浩仲堪方隨日濟闍黎施行實為神散癰腫即消此方妙千金同出第十四巻中癰腫方二十五首集驗療癰腫大按乃痛者病深小按便痛者病淺按之處陷不復者無膿按之即復者有膿若當上破者膿出不盡不盡稍深蝕骨骨碎出當以魚𨗳側際從下頭破令膿出盡出盡則骨生愈矣若惡肉不盡者食惡肉藥去之膏塗之即愈食肉藥方取白荻灰水淋之煎令如膏此不宜預作作之十日則歇并可以去黑子黑子藥注便即拭去不時拭則傷膚又一方以桑皮灰亦妙凡破諸病肉厚處當先廣封四面不爾瘡披裂氣泄便死不可救也以前范汪同有久癰餘瘡為敗癰深疽有脛間喜生瘡中外惡瘡霜寒凍不差經年或骨疽亦名脛瘡深爛青黑四邊堅强中央膿血惡汁出百藥療不差汁漬好肉處皆腫亦有碎骨從中出者可温赤龍皮湯洗之夏月日日洗之冬日三日四日一洗潰肉多者可時傅白䕡茹散食去之可一日之中三四傅之止後長傅家猪尿散得差也取猪矢燒作灰下絹篩以粉疽敗瘡中令滿汁出脱去便傅之長傅須差也若更生青肉復著白䕡茹散如前法也出第八巻中千金翼凢五子日夜半五丑日鷄鳴五寅日平旦五卯日日出五辰日食時五巳日禺中五午日日中五未日日昳五申日晡時五酉日日入五戌日黄昏五亥日人定右以此日時遇疾發者皆不起也出第二十三巻中廣濟療癰腫腫潰内服藥外宜貼膏方松脂一斤煉者膒脂三合生椒葉一両白蠟三両蛇銜一兩黄茋一兩芎藭一兩白芷一兩當歸一兩細辛一兩芍藥一兩右十一味切以水先煎脂蠟烊盡内諸藥三上三下白芷色黄膏成用剪故帛可瘡大小塗膏貼上日夜各一又療癰腫膿潰瘡中有紫肉硬不消以此散兊頭内蝕之方石硫黄一分研馬齒礬石二分熬令汁盡漆頭䕡茹二分麝香二分研雄黄二分雌黄一分研白礬二分熬令汁盡丹砂二分研右八味𢷬篩為散攪令調熟以傅瘡中瘡惡肉上貼膏日二易千金并翼深師同並出第三十巻中劉㳙子療癰腫方白斂烏頭炮黄芩各等分右三味𢷬下篩和雞子白傅上即愈出第十巻中療癰腫有熱黄茋貼方數用神騐甘草炙大黄白斂黄芎藭右五味各等分𢷬篩以雞子黄和如濁泥塗布上隨赤熱有堅處大小貼之燥易甚效刪繁療癰腫白斂薄貼方白斂當歸芍藥大黄莽草芎藭右六味各等分𢷬篩下雞子黄和如泥塗布隨大小貼之燥易又療癰腫堅核不消白斂貼之方白斂大黄赤石脂芍藥莽草黄芩黄連茱茰右八味各等分𢷬篩以雞子黄和如濁泥塗布上隨核大小貼之燥易又療癰腫黄茋貼之方黄芪一兩半黄芩一兩芎藭一兩黄連白芷芍藥各二兩當歸一兩半右七味𢷬篩以雞子白和如膏諸暴腫起處以塗著布上已貼燥易腫處不覺貼冷便愈熱勢毒者加白斂一兩尤佳又療癰腫黄芪貼方黄茋大黄白芷牡蠣熬白斂右五味各等分𢷬篩和雞子貼燥易又療癰腫已潰四物黄連薄貼方黄連黄蘗地榆白芷各一兩右藥𢷬篩雞子白和塗布薄癰上對瘡口穿布出癰氣令疎氣又療癰腫一物栝樓薄貼方以栝樓根隨多少止一物切五片内苦酒中熬燥𢷬篩之苦酒和塗紙上以貼癰腫上服散人宜用並出第九巻中千金療癰腫松脂貼方當歸黄茋黄連芍藥蠟黄芩芎藭大黄各一両細切松脂一斤半膒脂一合半右十味切以㣲火煎之三上三下綿布絞去滓向火炙塗生牋紙上隨大小貼之一日三度易之即差又療腫蒺䔧散方蒺藜子一升熬令黄右一味𢷬篩以麻油和之如泥炒令焦黑以塗故布上剪如腫大勿開頭㧺上無蒺藜子用小豆和雞子如前乾則易之甚妙又㧺湯方大黄黄芩白斂各三両芒硝六分右四味以水六升煮取三升以故帛四重内汁中以㧺腫上煖復易晝夜為之翼同又癰腫痛煩困方以生楸葉十重貼之以布綿裹緩急得所日二易止痛消腫食膿血良無比勝於衆貼冬以前收乾者臨時鹽湯沃潤用之亦可薄削楸皮用之備急張文仲肘後同又諸癰腫牢堅諸藥不療方削附子如碁子厚一指正著腫上以少唾濕附子火炙附子令熱徹附子欲乾輒令更唾濕之常令附子熱氣入腫中無不愈者此法絶妙並出第二十三巻中千金翼黄茋湯主癰腫熱盛口乾除熱止渇方黄茋升麻栝樓乾地黄各二両麥門冬去心芍藥各二両黄芩一兩半梔子二十枚擘右八味切以水一斗煮取三升分三服劉㳙子用升麻一兩梔子十四枚餘藥同又白斂薄貼主癰腫方白斂大黄黄芩各等分右三味𢷬篩和雞子白如泥塗布上薄貼腫上乾則易之可以三指撮藥末内三升水中煮三沸綿注汁拭腫上數十遍以寒水石末和塗腫上以紙覆之乾則易之一易輒以煮拭之日夜三十度劉涓子同又療癰腫方伏龍肝以大酢和作泥塗布上貼之乾則易之消矣又凡腫已潰未潰者方以膠一片水漬令軟納納然稱腫之大小貼當頭上開孔若已潰還合者膿當被膠急撮之膿皆出盡未有膿者腫當自消矣又方燒鯉魚作灰酢和塗之一切腫上以差為度至良又温中湯主癰腫取冷過多寒中下利食完出方甘草炙乾薑附子各六分炮蜀椒二百四十枚汗右四味切以水六升煮取二升分三服忌海藻菘菜猪肉冷水劉涓子同出第二十三巻中張文仲劉涓子療癰消膿木占斯散方木占斯桂心人參細辛敗醬乾薑厚朴炙甘草防風桔梗各一兩栝樓一兩右十一味𢷬為散服方寸匕入咽覺流入瘡中若癰及疽灸亦不能發壊者可服之瘡未壊者去敗醬已壊發膿者内敗醬此藥時有化癰疽令成水為妙隱居必效方消癰腫白斂二分藜蘆一分右二味𢷬為末以苦酒和如泥貼腫上日三大良備急同出第五巻中石癰方五首千金堅如石核復大色不變或作石癰療之錬石散方鹿角八兩一作白灰白斂三兩粗理黄石一斤酢五升先燒石令赤内酢中復燒内之酢盡半止右三味𢷬篩作細末以餘酢拌和如泥厚塗之乾即塗取消止盡更合諸漏瘰􅊓藥悉皆主之並須火針瘡上塗膏又方單磨鹿角半夏塗不如上方佳也集騐文仲小品古今録騐同又療石癰堅如石不作膿方以生商陸根爛𢷬傅之燥則易之治腦漏及諸癰癤古今録騐同又方以蜀桑根白皮隂乾𢷬末消膠以酒和傅上即㧞出並出第二十三巻中備急療若發腫至堅而有根者名曰石癰也方灸腫三百壯當石子破碎出如不出益壯乃出其癰疽石癰結筋瘰􅊓皆不可針角針角殺人集騐文仲千金同出第四巻中癰癤方一十四首劉涓子療癰癤諸腫有熱方地黄三斤洗細切右一味以水一斗煮取三升去滓煎湯令小厚以塗紙當瘡中央貼之日再三易數用大良並療牛領上腫出第十卷中集騐療癰及癤如結實赤熱者方以水磨半夏塗之燥復更塗得流便消也出草中可自掘生半夏乃佳此療神騐勿不信也出第八卷中千金療凡癤無頭者吞葵子一枚即出勿多服頭多也又方燒葛蔓灰封上自消又方牛糞封之佳又方以鼠粘葉貼之又方用水和雀糞傅之又方猪頭骨芸薹子右二味等分為末和酢封之又療癰癤潰後膿不斷及諸物刺傷不差方取石硫黄三兩粉之一味筋一片磓頭令碎少濕之内石硫黄中刺瘡孔以瘡差為度通按筋字可疑又乾地黄丸主虚熱消瘡癤方乾地黄四兩大黄六兩桂心二兩芍藥三兩茯苓三兩王不留行二兩黄芩二兩麥門冬二兩去心逺志二兩升麻二兩人参二兩甘草二兩炙枳實二兩炙右十三味𢷬篩蜜和丸如梧子大酒服十丸日三加至二十丸長服令人肥健翼同又地黄煎方補虚除熱可將和服取利也散石癰疽癤痔熱悉宜服百日癰疽永不發也取生地黄隨多少三擣三押取汁令盡一味以新布重絞其汁澄清置銅器中湯上煮之減半復下更新布絞去麤碎結濁者滓穢盡復煎之濃竭令如飴糖置甆器中酒服如彈丸大日三勿加至百日服之有驗又梔子湯主表裏俱熱三焦不實身體生瘡或發癰癤大小便不利方芒硝二兩大黄四兩梔子二七枚擘黄芩二兩知母二兩甘草二兩炙右六味切以水五升煮減半下大黄煮取一升八合去滓内芒硝二兩分三服忌海藻菘菜並出第一十三巻中千金翼論曰一切癰疽皆是瘡㾗根本所患癰之後膿汁不止得冷即是鼠瘻是以漏方次之大須急救之馬齒草五斤切槲白皮一斤水五升煮取一升澄清麝香半臍乾之仍研作末杏仁半斤油煎令黑𢷬如膏右四味以甆器貯之合和以三四重綿宻繫口病已成瘡者以泔清浄洗拭乾剪作貼子塗藥貼著瘡上日三易若未作瘡如作瘰􅊓子者以艾一升熏黄如棗大乾漆如棗大末之釡月下土三味並末和艾作炷灸三七壯本方療鼠瘻出第二十三巻中又主癤腫方生椒末麴末釡月下土末之以大酢和傅之並出第二十四巻中附骨疽方八首千金診附骨疽法凡附骨疽者無故附骨成膿故名附骨疽喜著大節解中丈夫産婦喜著胯髀嬰兒亦著脊背丈夫急者先覺痛不得動摇按之應骨痛經日便覺皮肉漸急洪腫如肥狀是也小兒纔近便大啼呼即是肢節有痛候也大人緩者先覺肥洪洪然經日便覺痺痛不隨小兒四肢不能動摇亦如不隨狀著肢節解中有洪洪處不知是附骨疽令遍身成腫不至潰死體皆青黯大人亦有不别是附骨疽呼為賊風風腫也又凡人身體患熱當風取凉風入骨解中風熱相摶便成附骨疽其候嗜眠沈重忽忽耳鳴又秋夏露卧為冷所折風熱伏結而作此疾急者熱多風少緩者風多熱少小兒未知取風冷何意而有此疾由其血氣盛肌嫩漸為風冷折之即凑理凝結故也又凡骨疽者久瘡不差差而復發骨從孔中出名為骨疽方以猪膽和楸葉𢷬封之又方𢷬白楊葉下篩傅之又方穿地作坑口小裏大深三尺取乾雞屎五升以艾及荆葉和之令可燃火令煙出内疽孔坑中以衣擁坑口勿洩煙半日許當有蟲出又癰疽敗及骨疽方末龍骨粉瘡四面厚二分又方用自死蝦蟇一枚頭髮一把以猪膏一片半内二物煎之消盡下之欲冷内鹽一合攪和以膏著瘡中日一易蟲出如髮蟲盡愈又骨疽百方療不差方可瘡上以艾灸之三日三夜無不愈也並出第二十三卷中備急若骨疽積年毎一年一發汁出不差方取膠熬𢷬末粉勃療上及破生鱧魚以㩉之如食頃刮視其小蟲出更洗更傅蟲出盡止備急文仲同又療疽瘡骨出方黄連牡蠣各二分熬又二味末先以鹽湯洗以粉之文仲同出第四巻中瘭疽方一十六首集騐論胷中痛少氣急入闇中以手掩左眼竟視右眼見光者胷中結癰也若不見光瘭疽内發若吐膿血此不療之疾宜以灰掩膿血上不爾著傍人也又齒間臭熱血出是瘭疽也七日死療所不差宜以灰掩地血瘭疽喜著指與代指相似人不别者亦呼作代指不急療其毒逐脉上入藏殺人也南方人得此疾皆斬去指恐其毒上攻藏故瘭疽著指頭者其先作黯疱然後腫赤黑黯瘆痛入心是也出第八巻中千金瘭疽論説曰瘭疽者肉中忽生㸃子如豆粒小者如黍粟劇者如梅李或黑赤青白不定一種其狀有根不浮腫痛瘆應心根深至肌少久便四面悉腫皰黯黯紫黑色能爛壊筋骨也毒散逐脉入藏殺人南方人名為榻著毒著厚肉處即割去之亦燒鐵烙疱上合焦如炭亦疱上灸百壯為佳單𢷬酸草葉傅腫四面防其長大飲葵根汁及藍青汁若犀角汁升麻汁竹瀝汁黄龍湯諸單療折其勢耳其病亦喜著指故與代指相似人不識之呼作代指不急療之亦逐脉上入五藏殺人南方人得之皆斬去指疽著指初指頭先作黯疱然後腫赤黑黯瘆痛入心是也復有惡肉病者身上忽有肉如赤豆粒突出便長推出如牛馬乳上如雞冠狀不療自長出不止不痛癢此由春冬時受惡風入肌脉中變成此疾療之宜服漏蘆湯外燒爍日日為之令焦盡竟以升麻膏傅之積日乃差備急同出第二十三巻中劉㳙子療瘭疽侵淫廣大羊髓膏方羊髓二兩大黄甘草炙胡粉各二兩右四味㕮咀以猪膏二升半合煎微火三上三下絞去滓傅日四五深師云兼療赤黒爛壊成瘡出第五卷中千金療瘭疽著手足肩背累累如米起色白刮之汁出愈復發方黄茋六分欵冬花二分升麻四分附子一分炮苦参一分赤小豆一分右六味下篩酒服半錢匕漸増至一錢日三服范汪方無苦参有赤小豆又方虎糞白者以馬尿和之暴令乾燒灰粉之翼同又方胡粉青木香龍骨滑石各二兩右四味下篩以米粉一升和之稍以粉之日四五又方竈室塵竈突中墨竈釡底土各一升右三味合研令匀以清水一斗煮三沸取汁洗療日二三度又凢瘭疽手足肩背忽磥磥如赤小豆刺之汁出者是療之方剥却瘡皮温泔清洗胡鷰窠和百日男子矢塗之又方熬蕪菁子熟𢷬綿裹傅之勿止文仲備急肘後同又方熬麻子末摩上日五六度又方麫和酒傅之又方鯽魚三寸長者亂髮如雞子大猪脂一斤煎以成膏塗之又療瘭疽秘方世所不𫝊神良無比射干甘草炙升麻枳實炙各二兩大黄十分麝香二分研乾地黄二兩犀角六分屑前胡三兩本方云三分右九味切以水九升煮取三升分三服差止不限劑數翼同深師加黄芩十分餘同又瘭疽漏蘆湯方漏蘆白斂黄芩麻黄去節白薇枳實炙升麻芍藥甘草各二兩炙大黄三兩右十味切以水一升煮取三升分三服無藥單用大黄下之良張文仲備急並翼並同又升麻膏方升麻白薇漏蘆連翹芒硝各二兩黄芩蛇銜枳實各二兩炙梔子仁二十枚蒴藋四兩右十味切𢷬破令細後以水三升漬半日以猪膏五升煎水氣竭去滓傅諸丹毒皆用及熱瘡腫上並日三易之升麻㧺湯方升麻漏蘆芒硝各二兩梔子二十枚黄芩三兩右五味切以水一斗合蒴藋五兩煎取七升冷㧺諸丹腫上常令濕内宜服漏蘆湯甚佳又療瘭疽浸淫多汁日就侵大胡粉散方胡粉一分熬黄連三分甘草二分炙䕡茹二分右四味下篩以粉瘡上日三翼文仲備急深師同並出第二十三卷中千金翼薄㩉湯主瘭疽浸淫欲作未成或如桃李核或如雞子赤焮方甘草炙黄芩大黄黄連當歸芒硝各兩右六味切以水一斗煎取三升絞去滓鐺中下芒硝一沸攪之貼布帛中以㩉腫上數百遍劉涓子深師同出第二十三巻中緩疽方四首集驗論有緩疽者初結腫形似癰回回無頭尾其色不異但痛深有根核又與皮肉相親著外耳一名内癰其有大者如拳小者如桃李狀積日不消喜變紫色黯黑久即皮肉俱爛如牛領瘡狀便通體遍青黯色而不作頭穿潰出膿初作服五香連翹湯鑱去血以小豆薄塗之其間數針鑱去血又薄之取消也若不消色未變青黯者以鍊石薄之若失時不得療已爛者猶服五香連翹湯及漏蘆湯下之隨熱多少投方也外以升麻湯搨洗之薄升麻膏若生臭惡肉者可以單行一物白䕡茹散傅之青肉去盡便停也好肉既生但薄升麻膏良不生單傅一物黄茋散也若傅白䕡茹散積日青惡肉不盡者可以漆頭赤皮䕡茹取半錢七和大三錢七白䕡茹散中合和傅之惡肉去盡還以淳用白䕡茹散也視好肉欲生可傅黄茋散也黄茋散方白䕡茹散方漆頭䕡茹散方並一味單行隨多少𢷬篩為散出第八巻中范汪飛黄散療緩疽惡瘡食惡肉方取丹砂著瓦盆南雌黄著中央磁石北曾青東白石英西礜石上石膏次鍾乳下雄黄覆雲母薄布下各二兩先𢷬篩瓦盆中以一盆覆上羊毛泥令厚作三隅竈燒之以陳葦一日成取其飛者使之甚妙又療緩疽以飛黄散食惡肉令盡作土竈熏之方雄黄一兩雞白屎一兩䔧蘆一兩丹砂一兩乾鰻鱺魚一兩右五味𢷬下篩青布褁之熏經三日乃止止畢要以蛇銜膏摩之良簡范汪方無蛇銜膏崔氏方附於後並出第三十一巻中崔氏蛇銜膏療癰腫瘀血産後血積耳目暗等牛領馬鞍瘡方蛇銜一兩大黄附子去黑皮芍藥當歸細辛黄芩大㦸椒去月莽草獨活各一兩薤白十四莖右十二味並切之以苦酒淹之一宿以不中水成鍊猪膏二升龍銜藤一兩合膏煎名龍銜膏今又有龍草似蛇銜而葉大耳亦有取其根合煎者亦名龍銜膏出第二巻中小品療緩疽初作即以小豆薄塗之亦消也出第十卷中發背方四十一首其乳石發背自有正方在第三十八卷中具述千金論曰凡發背皆由服餌五石寒食更生散所致亦有單服鍾乳而發者亦有生平不服諸石而自發背者此是上代有服之者其候率多於背兩胛間起初如粟米大或痛或癢仍作赤色人皆初不以為事日漸長大不過十日遂至不救其臨困時方圓徑三四寸髙一寸瘡有數十孔以手按之諸孔之膿皆反出尋即失音不言所以飬生者小覺背上痛痒有異即取浄土冷水和泥捻作餅子徑一寸半厚二分以麤艾大作炷灸泥上貼著瘡上灸之一炷一易餅子若粟米大時可灸七餅即差若榆莢大灸二七炷即差至錢許大日夜灸不住乃差并服五香連翹湯及鐵漿諸藥攻之乃愈又常以冷水射之漬冷石熨之日夜勿止待差住手此病忌麫酒肉五辛等亦有當兩腎上發者又論曰凡服石人皆須大勞役四體無得自安如其不爾多有發動亦不得遂便恣意取煖稱適已情必須違欲以取寒凍雖當時不寧於後在身多有所益終無發動之慮又發背方凡腫起於背胛中頭白如黍粟四面相連腫赤黑令人悶亂者名發背也即禁房慎蒜麫不速灸治即入内殺人灸當瘡上七八百壯有人不識多作雜腫療之皆死又方取亂髮灰酒服方寸匕又方以三年酢滓㣲火煎令調和牛脂封上日一易又方取狗牙灰酢和𫝊之又方取猪羊脂封之亦療發乳又方以蛇頭灰水和傅之又方飲鐵漿三升下利為佳又方以鹿角灰酢和塗之古今録騐同又方燒古蜯末之如粉雞子白和傅上日三即差止又發背及癰疽潰漏並未潰毒腫方栝樓榆皮胡鷰窠鼢鼠土女人月水布洗取汁右五味並須等分以月水汁和如泥封腫上乾即易之潰者四面封已覺即封從一日至五日令差翼同又療癰疽潰漏發背及小小瘰􅊓李根散方李根半夏洗栝樓各一升甘草二兩炙葛根三兩桂心四兩當歸二兩通草二兩芎藭一兩半白斂一兩桔梗二兩厚朴炙黄芩各一兩芍藥四兩附子一兩炮右十五味為散酒服方寸匕日三瘡大困者夜再服有患發背骨出身有三十餘癰癤服此差忌羊肉餳海藻菘莱猪肉冷水生葱范汪同又治諸虚不足發背癰疽經年差後復發或由大風聚結毒氣在内閉塞夏月已來出攻於背久不療積聚作膿血為瘡内漏大内塞排膿散方山茱茰五味子茯苓乾薑各六分當歸四分附子二分炮肉蓯蓉八分石斛五分兔絲子三分酒漬巴㦸天八分瞿麥三分一云地麥地膚地膚子也逺志八分去心人参五分甘草五分炙麥門冬八分志心石葦四分芎藭四分芍藥五分乾地黄八分桂心五分右二十味為散酒服方寸匕日三夜一稍加至兩七長服終身不發癰癤忌同前又内補散療癰疽發背方蜀升麻黄芩人参各二分乾薑白斂桂心甘草炙附子炮防風各一兩芎藭一兩赤小豆右十一味為散酒服方寸匕日三夜再一云蜀椒非又内補散主癰疽發背已潰排膿生肉方當歸桂心人参各二兩芎藭厚朴炙桔梗甘草炙防風白芷各一兩右九味為散酒服方寸匕日三夜再瘡未合服勿停忌范汪同又瞿麥散主排膿止痛利小便方瞿麥二兩芍藥二兩桂心半兩赤小豆半合芎藭半兩白斂半兩黄芪一兩當歸二兩麥門冬二兩去心右九味為散先食温酒服方寸匕日三忌生葱翼深師同又薏苡仁散主令癰自潰長肌肉方薏苡仁桂心乾薑白斂當歸肉蓯蓉各一兩右六味為散先食温酒服方寸匕日三夜再翼同又黄茋竹葉湯主胷背逰熱癰疽方生地黄八兩黄茋甘草炙芍藥黄芩各三兩人参石膏碎芎藭當歸各二兩生薑五兩大棗三十枚擘半夏四兩洗淡竹葉切一升麥門冬去心三兩右十四味以水一斗二升煮竹葉取九升去滓内藥煮取三升分四服相去如人行五六里再服日三夜一忌海藻菘菜羊肉餳古今録騐同又排膿内塞散主大瘡熱已退膿血不止瘡中肉虚疼痛方防風茯苓白芷桔梗逺志去心甘草炙人参芎藭當歸黄茋各一兩桂心二分附子炮二枚厚朴二兩赤小豆五合熬右十四味𢷬散酒服方寸匕日三夜一忌同前又麝香膏主諸惡瘡及癰疽發背上惡肉方麝香研雄黄研真珠研各一兩礬石一兩熬右四味細篩以猪膏攪令如泥塗惡肉盡止更傅生肉膏佳又療癰疽敗壊生肉膏方生地黄一斤辛夷獨活當歸黄茋大黄芎藭各一兩薤白五兩白芷芍藥黄芩續斷各一兩右十味切以臘月猪脂四升煎傅之佳又方大黄附子炮芎藭雄黄真珠各一兩白斂礬石燒黄芩䕡茹各二兩雌黄一兩莽草一兩右十一味先以猪膏一升半煎六沸去滓内䕡茹礬石末攪之塗瘡上惡肉盡止劉涓子同又方䕡茹漆頭者礬石各二分熬雄黄二分研硫黄二分右四味為散内瘡口中惡肉盡止勿使過好肉也又發背上初欲作腫即服此方梔子仁一百枚大黄升麻黄芩甘草炙各三兩右五味切以水九升煮取三升半分三服使利便止不下更進一服忌海藻菘菜從瞿麥散以下九方並療發背部中已次之丈仲備急同並出第二十三巻中范汪療癰腫發背虎牙散方虎牙炙乾薑附子炮當歸甘草炙防風桂心王不留行茯苓各一兩右九味𢷬下篩服方寸匕日三忌同前出第三十一卷中又療癰發背排膿内補鐵屑散方當歸人参細辛甘草炙蓯蓉黄茋桂心防風黄芩鐵屑芎藭芍藥右十二味各等分合𢷬為散服方寸匕忌同前又療癰腫牢核發背成膿莽草膏方莽草芎藭當歸細辛附子炮黄芩烏頭炮牛膝躑躅野葛茯苓防風杜蘅各一両猪脂二斤右十四味切用猪肪合煎去滓傅瘡上日再忌同前又卓氏白膏療癰疽發背金瘡已壊及未敗火瘡諸瘑疥患療之方當歸附子炮細辛芎藭續斷牛膝通草甘草炙白芷各二兩蜀椒三合芍藥黄茋各一兩右十二味㕮咀以猪膏二升煎之㣲火上以白芷色黄藥成絞去滓以傅瘡上日三忌同前又療發背發乳房及諸惡瘡膏方黄連當歸馬齒芎藭薯蕷各一兩珍珠十四枚礬石半兩燒黄蘗半兩石葦三分去毛生竹皮三合猪肪一斤右十一味㕮咀細切肪美酒一升合煎石葦焦膏成去滓有病稍稍傅上亦可酒服棗核大一枚忌同前並出第四十一巻中救急療發背百無不差方取猪羊脂切作片冷水浸取貼上暖輒易之五六十片即差若初貼少許即寒寒定好眠甚妙又療發背若初覺赤腫腫上作小瘡疼不可近方急用針刺上七八針取冷水用筒注射腫上日夜不止疼歇腫消出第五卷中又療發背方取白麫搜圍腫四畔令童子七人尿漬之又方以馬糞封之乾易婦人發乳亦差又方取蔚臭草𢷬取汁服一雞子滓封上熱即易之又方𢷬地菘汁一升日再服以差止又方大黄石灰熬小豆右三味等分末白酒和塗立效忌羊肉熱麫大酢並出第六卷中近效凡發背皆發出自腸胃流入五藏仕流多脚氣為主或有先服乳石并熱肉麫并失饑房室過度皆作此疾縱身不曾服乳石先代服亦有此病或有下里人服麫過度亦有患者請依後方萬不失一發背亦覺有腫即須審看根硬軟如硬頭一㸃白燒四邊紫黑色時掣痛憎寒不食狀如天行此石癰知是此狀即須當上灸一百壯艾炷大如鼠屎許大凡發背初亦一㸃白四邊赤色漸漸長大或盃盞并碗許大四邊生飯漿小小瘡如粟米大亦時時抽掣痛此兩狀皆是死病一日内堪醫十日以外不濟就中冬月得此病即延得三五日其發背初覺即須當頭灸二十一壯如盃許大即五花炙之各二十一壯即服牛蒡子栝樓葛粉第二服犀角湯瀉之不然服犀角丸亦得大效也忌梨鯉魚麫酒肉漿水粥真鴻臚賈顯録凡發背候憎寒壯熱身如拘束或口乾不用食瘡初出如青紫色者毒重赤者輕膿如稀泔者極重膿稠白赤者輕張道士昇𤣥房陵口録留又療惡寒嗇嗇似欲發背或巳生瘡腫隱疹起方硝石三兩右一味以煖水一斗和令消待冷取故青布疊三重可似欲赤處方圓濕布㩉根熱即換之頻易差又療發背及一切毒腫方生麻油六合黄丹二兩半地膽兩錢搗碎篩生栗子四十九枚取大小中者熬焦去皮碎絹篩右四味和於銅器中盛用炭火重湯煎候沫溢出與器口欲平取小麥一合分二人嚼取筋急内藥中攪使與相合膏擎下安銅器冷水中成膏訖以故綿塗膏貼所苦處晨夕換膏又療前瘡定訖令生肌方黄四員外云極効麝香兩錢棗皮灰半兩生麻油六合右三味依法和用火重湯上煎十餘沸稀稠前藥相似取故綿塗膏貼瘡上膏漸取瘳減唯得喫白羊頭肉但是豆並不得喫餘如藥法又療癰腫犀角丸主腸癰乳癰發背一切毒腫服之化為水神驗方犀角十二分蜀升麻黄芩各四分大黄五分防風四分巴豆二十二枚去心皮熬令黄人参四分當歸四分黄茋四分乾蓼藍黄連甘草炙梔子仁各四分右十三味𢷬為末别𢷬巴豆成膏内末和以杵研𢷬令相得鍊蜜和搜更𢷬二三百杵煖湯服三丸如梧子得利兩三行喫冷粥止即差不利加至四五丸初服取快利後漸減丸數取鴨溏微洩為度老小以意增減腫消及和潤乃止利却黄水即覺輕皮皴色變一切腫皆内消神驗不可論忌熱麫蒜猪肉蘆笋魚海藻菘菜生冷粘食以上並主發背癰疽發背雜療方二十六首劉涓子療發背發乳口已合皮上急痛生肉摩踠折丹参膏方丹参防風白芷細辛芎藭黄芩芍藥牛膝大黄槐子獨活當歸各一兩又十二味切以臘月猪脂五升㣲火煎三上三下膏摩病日三四不須向火古今録驗同出第五巻中肘後療諸癰疽發背及乳方熬粢粉令黑雞子白和之以塗練上貼癰小穿練上作小口以泄毒氣令散燥復易之此藥神效文仲備急同又方以釡底土𢷬取散以雞子中黄和塗之加少䜴彌良以五月葫及少鹽佳文仲備急同一本無下一法又方取茱茰一升𢷬之以苦酒和貼癰上乾易之佳刪繁療癰疽發背九物大黄薄貼方大黄黄芩各三兩白芷二兩寒水石五兩白斂五兩黄蘗二兩石膏赤石脂黄連各三兩右藥下篩以三合投粉糜二升中和之薄塗紙貼腫上燥易之腫下止不下厚傅之忌生冷熱麫大酢又蝟皮散療諸瘻及浮核壊敗并主男子發背女子發乳等癰疽或膿血肉瘤方蝟皮一具燒杜仲八分炙續斷五分附子炮地榆各五分厚朴八分藁本五分當歸桂心各五分小露蜂房一具燒右十味𢷬篩為散服方寸匕日三服酒進取差止忌猪肉生葱冷水又陵鯉甲散療發背乳房癰腫方陵鯉一頭取甲爪炙桂心三分當歸二分右三味擣篩為散服方寸匕日三服酒進出第九巻中千金療癰疽發背猪蹄湯方猪蹄一具治如食法黄茋黄連芍藥各三分黄芩二兩薔薇根狼牙根各八兩右七味以水三斗煮蹄令熟澄取二斗清切藥煮取一斗洗瘡一食頃以綿拭燥著生肉膏日二差生痂止痛加當歸甘草各二兩又療癰疽發十指或起膀胱及發背後生惡肉方猪蹄一具當歸大黄芎藭芍藥黄芩獨活莽草各一兩右八味蹄取膝下斷制如食法以水二斗煮取八升内藥煮取四升去滓漬瘡兩食頃拭令燥以麝香膏傅之其方在前發背部中只有四味者是也又生肉膏主癰疽發背已潰令生肉方甘草炙當歸白芷蓯蓉蜀椒細辛各二兩烏啄六枚薤白二十茎乾地黄三兩續斷一兩無以蛇銜替之右十味以好酢半升相和漬二宿猪膏三斤煎令三沸三上三下膏成使用劉涓子同又癰發腹背隂匿處通身有數十者方取牛糞乾者燒𢷬下重絹以雞子白和以塗之乾復易肘後張文仲備急同又若已結膿使聚長者方以生栝樓根細𢷬苦酒和傅上燥復易之末赤小豆亦佳又凡發背為癰疽已潰未潰者方以香䜴三升少與水和熟𢷬成强泥可腫作餅厚三分已有孔勿覆孔可腫上布䜴餅艾列其上灸其䜴使温温熱而已勿令破肉也其熱痛急易之癰疽當減便得安或一日二日灸之若先有瘡孔孔中汁出即差備急文仲並翼同又癰腫發背初作及經十日以上腫勢焮熱毒氣猛盛日夜疼痛百藥不治者方􅖁叚雞子一枚新出狗矢如雞子大右二味攪令調和微火熬之令稀稠得所捻作餅子腫頭堅處貼之以紙貼上以綿抹之時時看之覺餅子熱即易勿令動轉及歇氣經一夜定其多日患者三日貼一度差止謹按千金論曰此方穢惡不可施於貴勝然其愈疾一切諸方皆不及又自外諸方還復備員作儀注而已學者常當曉斯以備諸急云耳並出第二十三卷中千金翼諸癰腫發背及癰癤已潰爛疼痛方蒸糜糓更遞熨之當即愈一云薔薇糓更炙熨之又連翹五香湯主一切惡核瘡腫方連翹射干升麻獨活各二兩桑寄生二兩通草二兩大黄三兩丁香一兩青木香二兩沉香二兩薰陸香二兩麝香三兩右十二味㕮咀以水九升煮減半内竹瀝二升煮取三升分三服未差中間常服佳又五香湯主惡氣毒腫方沉香青木香丁香各一兩薫陸香一兩麝香半兩右五味切以水五升煮取一升半分三服集驗方用雞舌香一兩不用丁香出第二十四巻中崔氏療發背及諸瘡久不差有効方先以甘草湯洗瘡拭極乾乃嚼胡麻傅上乾即易從旦至日西去胡麻乃取黄連末滑石末中半相和以傅瘡上數數易明日又依前傅胡麻及黄連等末更不須洗瘡不過六七日即差必効備急同又連翹湯療患瘡腫而渇方連翹蜀升麻各二兩黄芩三兩枳實二兩炙乾藍三兩芍藥二兩𤣥参二兩白斂二兩甘草二兩炙羚羊角屑二兩通草二兩黄茋二兩大黄三兩右十三味切以水八升煮取二升半分三服利一兩行後更服去大黄乾藍即不利忌海藻菘菜又犀角飲子方犀角三兩屑羚羊角三兩屑右二味以水八升煮取三升渇即飲盡更作之時熱恐壊懸著井底甚妙又五香連翹湯療惡瘡熱毒腫恐惡毒氣入腹兼取利以洩毒氣方連翹三兩蜀升麻二兩薰陸香二兩淡竹瀝一升麝香一分研青木香二兩丁香一兩獨活二兩寄生三兩射干二兩甘草二兩沉香一兩大黄四兩水一升别漬朴硝二兩熬乾别内右十四味切以水一斗煮取二升半絞去滓然後内大黄朴硝竹瀝更煮一兩沸去滓内麝香分温三服服别相去如人行十里久以得利一二行為度愼雞猪魚蒜生冷酢滑油膩麫食小豆五辛葵菜等備急文仲同並出第五巻中備急葛氏療始發諸癰疽發背及乳房方皆灸上百壯半夏末雞子白和塗良姚云生者神驗以水和塗之肘後文仲古今録驗小品並同又方以酢和墓上土茱萸搗薑小蒜薄貼並良肘後文仲同並出第四卷中救急療熱毒風丹並發背犀角膏方犀角六分屑升麻十大分羚羊角六分梔子仁二七枚薤白切一升呉藍八分大藍亦得𤣥参六分續斷大黄白斂射干白芷各六分蛇銜切一升寒水石十二分黄芩六分愼火草切一升麻黄六分去節右十七味切以竹瀝三升生地黄汁五合漬藥一宿内猪脂二升微火上煎十上十下候白芷黄膏成去滓塗病上出第五卷中文仲療發背及婦人發乳及腸癰木占斯散方木占斯厚朴炙甘草炙細辛栝樓防風乾薑人参桔梗敗醬草各一兩右十味為散酒服方寸匕日七夜四以多為度病在上當吐病在下當下膿血此謂腸癰之屬凡癰腫即可服兼療諸疽痔若瘡已潰便早愈發背無有不療常服去敗醬亦療婦人諸産癥瘕亦良是劉涓子方千金范汪刪繁古今録驗同出第五巻中古今録驗療諸癰瘡發背有膿血當歸貼方當歸一分蠐螬一分丹参一分附子一分炮蠟蜜一分梔子十枚桂心一分膠一分右八味合煎以貼瘡上出第二十一巻中外臺秘要方巻二十四
