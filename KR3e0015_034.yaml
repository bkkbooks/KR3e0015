body:
  text: 外臺秘要方卷三十唐王燾撰惡疾大風方一十首千金論曰惡疾大風有多種不同初得雖遍體無異而眉鬚已落有遍體已壊而眉鬚儼然有諸處不異好人而四肢腹背皆有頑處重者手足十指已有墮落有患四體大寒而重裘不暖者有尋常患熱不能暫凉者有身體枯槁者有津汗常不止者有身體乾痒徹骨搔之白皮如麩卒不作瘡者有瘡痍荼毒重疊而生晝夜痛不已者有直置頑鈍不知痛痒者其色亦有多種有青黄赤白黒光明枯闇此疾雖種種狀貌不同而難療易療皆屬在病人不繇醫者何則此病一著無問賢愚皆難與語口順心違不受醫教直希望藥力不欲求已故難療易療屬在病人不闗醫藥臣嘗手療六百餘人差者十分有一莫不一一親自撫養所以深細諳委知其情性若覺難共語不受人教即不須與療縱與療終有觸藥力病既不差乃勞而無功也仁者易共語故可療也又論曰神仙𫝊有數十人皆因惡疾而致仙道者何皆繇割棄心累懐頴陽之風所以非止差病乃至因禍而取福也故臣所覩病者其中頗有士大夫乃至有異種名人乃遇斯患皆戀愛妻孥繋著心髓不能割捨直望藥力未肯近求諸身若能絶其嗜慾斷其所好非但愈疾因茲亦可自致神仙嘗問諸病士人皆云自作不仁之行久久並為極猥之業於中仍欲更作云為雖有悔言而無悔意但能自新受師教命飡進藥餌何有不除臣以正觀中嘗將一病士入山教服松脂欲至百日鬚眉皆生由此觀之唯須求之於已不可一仰醫藥者也然有人數年患身體頑痺羞見妻子不告之令知其後病成狀候分明乃云卒患此皆自誤然斯疾也雖大治之於微亦可即差此疾一得多者不過十年皆死近者五六歲而亡然病者皆自謂百年不死深可悲悼又論曰一遇斯疾即須斷鹽常進服松脂一切公私物務釋然皆棄猶如脱屣凡百口味特須斷除漸漸斷榖不交俗事絶乎慶弔幽隱巖谷周年乃差差後終身慎房室犯之還發茲疾有吉凶二義修善則吉若還同俗類必是凶矣今略述其繇致以示後之學者可覧而思焉又􅞒豆療惡疾方細粒烏豆擇取摩治之去有皮不落者三月四月取天雄烏頭苗及根淨去土勿洗擣絞取汁漬豆一宿豆如熟豆大漉出暴乾如此七度始堪服每服三枚漸加至六七枚日一忌房室猪魚雞雉肉畢三十日毛髪即生犯藥即不差又岐伯神散療萬病癰疽疥癩風痿骨肉疽敗百節疼眉毛髪落身體淫淫躍躍痛痒目痛爛眥耳聾齲齒痔瘻等方天雄炮去皮附子炮去皮細辛烏頭炮去皮茵芋炙各一兩亁薑二兩石南菖蒲防風各二兩白术獨活各三兩躑躅一兩椒汗二兩防葵二兩枳實二兩炙右十五味擣散以酒服方寸七日三勿加又療惡疾狼毒散方狼毒灸秦芁右二味等分為散酒服方寸七日二服五十日愈切須忌慎又方松脂鍊投冷水中二十遍杵末蜜丸服二兩饑即服之日三鼻柱斷離者二百日差斷鹽及雜食房室又石灰酒主生髪毛長鬚眉去大風方松脂成錬者十斤黍米一石石灰一石拌和濕蒸令氣足上麴一石二升右四味先於大鐺中炒石灰以木著灰中火出為度枸杞根剉五斗以水一石五斗煮取九斗半去滓以淋石灰三遍澄清以石灰汁和釀漬麴用汁多少一如釀法訖封四七日開飲一二升常令酒氣相及為度百無所忌不得觸風其米泔水及飯糟不得使六畜犬䑕食之皆須令深埋却此方九月作至二月止恐隔上熱服後進三五口冷飯壓之婦人不能食飲黄瘦積年及褥風不過一石即差又療風身體如蟲行方鹽一斗水一石煎減半澄清温洗浴三四遍亦療一切風又方以淳灰汁洗面不過一月愈又方以大豆漬飯漿中旦温洗面頭中痒加少麪沐頭勿以水濯之十洗必差又方成鍊雄黄松脂等分蜜和丸以飲服十丸丸如桐子大日二百日差慎酒肉鹽豉生冷生血物等神秘不𫝊出第二十四卷中近効婆羅門僧療大風疾並壓丹石熱毒熱風手脚不隨方硝石一大兩生烏麻油二大升右二味内鐺中以土墼蓋口以紙泥固勿令氣出細細進火煎之其藥未熟氣腥候香氣發即熟更以生烏麻油二大升和之更微火煎之以意斟量得所訖内不津器中服法患大風者用火為使在室中重作小紙屋子屋子外然火令病人在紙屋中發汗日服一大合病人力壯日二服服之三七日頭面疱瘡皆滅若服諸藥丹石熱發不得食熱物著厚衣卧厚牀牀風者即兩人共服一劑服法同前不用火為使忌風二七日或但取一匙内口待消咽汁熱除忌如藥法吕員外處得諸癩方九首病源凡癩病皆是惡風及犯觸忌害得之初覺皮膚不仁或淫淫苦痒如蟲行或目前見物如垂絲或癮疹輙赤黒此皆為疾之始起便急療之斷米榖肴鮭專食胡麻松术輩最善也夫病之生多從風起當時微發不將為害初入皮膚之裏不能自覺或流通四肢潛於經脉或於五藏乍寒乍熱縱横脾腎蔽諸毛腠理壅塞難通因茲氣血精髓乖離久而不療令人頑痺或汗不流泄手足酸疼針灸不痛或在面目習習奕奕或在胷頸狀如蟲行或身體徧痒搔之生瘡或身面腫痛徹骨髓或頑如錢大狀如蚝毒或如梳或如手錐刺不痛或青黄赤黒猶如腐木之形或痛無常處流移非一或如酸棗或若懸鈴或似繩縳拘急難以俛仰手足不能摇動眼目流腫内外生瘡小便赤黄尿有餘瀝面無顔色恍惚多忘其間變狀多端毒蟲若食人肝眉睫墮落若食人肺鼻柱崩倒或鼻生息肉塞孔氣不得通若食人脾即語聲變散若食人腎耳鳴啾啾或如雷皷之音若食人筋脉支節墮落若食人皮肉頑痺不覺痒痛或如針錐所刺名曰刺風若蟲乘風走於皮肉猶若外有蟲行復有食人皮肉徹外從於頭面即起為皰肉如桃核小棗從頭面起者名曰順風從兩脚起者名曰逆風令人多瘡猶如癬疥或如魚鱗或痒或痛黄水流出初起之時或如榆莢或如錢孔或青或白或黒或黄變易無定或起或滅此等皆病之兆又云風起之繇皆是冷熱交通流於五藏徹入骨中虚風因濕和合蟲生便即作患論其所犯多因用力過度飲食相違房室太過毛孔既開冷熱風入五藏積於寒熱寒熱之風交過通徹流行諸脉急者即患緩者稍逺所食穢雜肉蟲生日久冷熱至甚暴蟲遂多食人五藏骨髓及於皮肉筋節久久皆令壊散名曰癩風若其欲療先與雷丸等散服之出蟲見其蟲形青赤黒黄白等諸色之蟲與藥療者無不差然癩名不一木癩者初得先當落眉睫面目痒如復生瘡三年成大患急療之愈不療患成火癩者生瘡如火燒瘡或斷肢節七年落眉睫急療可愈八年成疾難可療金癩者是天所為也負功徳崇初得眉落二年食鼻鼻柱崩倒叵療良醫能愈土癩者作病身體塊磊如雞子彈丸許此病宜急療之六年成大患十五年不可療水癩者先得水病因即畱停風觸發動落人眉鬚急療之經年病成蟋蟀癩者如蟋蟀在人身體内百節頭皆欲血出三年叵療麫癩者蟲出如麪舉體艾白難療熏藥可愈多年叵療白癩者班駁或白或赤眉鬚墮落亦可療之多年難療疥癩者狀似癬瘙身體狂痒十年成大患可急療之愈風癩者風從體入或手足刺瘡風冷痺癡不療二十年後便成大患急療之愈蚼癩者得之身體沉重狀似風癩可療之至久積歲成大患疾速療之酒癩者酒醉卧黍穰上因汗體虚風從外入落人眉鬚令人惶懼小療大愈養生禁忌云醉酒露卧不幸生癩也又云魚無鰓不可食食之令人五月發癩出第二卷中肘後凡癩病皆起於惡風及觸犯忌害得之初覺皮膚不仁淫淫若痒如蟲行或眼前見物如垂絲或癮疹赤黒氣漭沆此皆為疾之始便急療之此疾乃有八九種大都皆須斷米榖鮭肴専食胡麻松术最善别有蠻夷酒決疑丸諸大方數首亦有符術今只取小小单方苦參五斤剉之右一味以好酒三斗漬四五日稍稍飲之二三合備急同本方療白癩又方苦參根皮三斤右一味麤擣以酒三斗漬二十一日去滓服一合日三若是癩疾即應覺痺禁雜食范汪療癩方取馬新蒿一名馬矢蒿一名爛石草擣末服方寸匕日三百日如更赤起一年都差平復肘後同又方灸兩手約指中理左右及手足指虎口中隨年壯深師療癩身體面目有瘡必死方取白艾蒿十束如升大煮取汁釀米七斗一如釀法酒熟稍稍飲之又方水銀研䕡茹藜蘆真珠研丹砂研雄黄研右六味各一斤皆研如粉以三歲苦酒三石五斗於瓮中漬諸藥令耗七日於淨温宻室中漬浴始從足漸至腰浸之日一以綿拭面目訖以水洗兩目勿令入目也可七日為之勿令冷神効忌狸肉生血等范汪同又療通身癩瘡方蓮荷二十枚石灰一斗淋取汁合煮令極濃以漬瘡半日許可數為之又方取水中浮萍青者一秤濃煮以漬浴半日用此方多愈並出第九卷中集驗療癩方取葎草一擔以水二石煮取一石以漬洗瘡不過三五度差烏癩方一首病源夫癩病皆是惡風及犯觸忌害所得初覺皮毛變異或淫淫若痒如蟲行或眼前見物如垂絲言語無定心常驚恐皮肉之中或如桃李癮疹赤黒手足頑痺針刺不覺痛脚下不得踏地凡食之時開口而鳴語亦如是身體瘡痛兩肘如繩縳此名黒癩出第二卷中集驗烏癩白癩丸方猬皮炙魁蛤蝮蛇頭炙木䖟四枚去趐足熬䖟蟲去趐足熬蠐螬各一枚並炙陵鯉甲去頭足炙葛上亭長七枚炙班猫去趐足七枚炙蜈蚣去頭足炙附子各二枚炮去皮蜘蛛五枚炙水蛭一枚雷丸三十枚巴豆十五枚去皮心熬水銀研大黄真丹桂心射罔各一兩黄連一分石膏研二兩蜀椒汗三分芒硝一分研龍骨三分甘遂熬礬石燒滑石各一分右二十八味擣篩蜜和丸如胡豆服二丸日三加之以知為度忌猪肉冷水生葱此方分兩多不同為是古方傳冩差錯若臨用時即以意量之一方有七蟲無木蝱斑猫蜈蚣蝮蛇作蚺蛇范汪同出第八卷中白癩方五首病源凡癩病語聲嘶破目視不眀四肢頑痺肢節火然一作大熱心中燠熱手脚俱緩背膂至急肉如遭劈身體手足隱疹起徃徃正白在肉裏鼻有息肉目生白珠當瞳子視無所見此名白癩出第二卷中集驗療白癩釀酒方苦參二斤露蜂房五兩炙右二味切以水三斗法麴二斤和藥漬經三宿絞去滓炊黍米二斗釀凖常法作酒候酒熟壓取先食一飲一雞子日三稍稍増之以差為度一云亦療風痿惡瘡肘後同出第八卷中范汪療在身白屑虚搔之或呼作白癩方苦參五升露蜂房五兩炙猬皮一具炙剉之麴三升右四味切以水三斗五升合藥漬四宿去滓炊米二斗釀如常法酒熟食後飲三五合漸増之以知為度千金療白癩大風眉鬚落赤白癩病八風十二痺筋急肢節緩弱飛尸遁注水腫癰疽疥癬惡瘡脚攣手折眼間血淋痰飲宿癖寒冷方商陸根二十五斤如馬耳薄切之麴二十五斤右二味以水一斛漬之炊黍米一石釀之如家造酒法使麴末相淹三酘之訖封三七日開看麴浮酒熟澄清温服之至三斗稍輕者二斗藥發吐下佳宜食粥飯牛羊鹿肉羹忌生冷酢滑猪肉魚雞犬肉等物出第二十四卷中文仲療白癩方乾艾葉濃煮以漬麴作酒如常法飲之令醺醺姚氏范汪同又方大蝮蛇一枚乾者并頭尾全勿令欠少以酒漬之大者一斗小者五升以糠火温令酒盡稍稍取蛇一寸許以臘月猪膏和𫝊瘡上忌小麥熱麴肘後范汪同並出第五卷中十三種疔腫方一十二首千金論曰夫稟形之類須存攝養將息失度百病萌生故四時代謝隂陽遞興比之二氣更相撃怒當其時也必有暴氣夫暴氣者毎月必有䘚然大風大霧大寒大熱若不將避人忽遇之此皆入人四體頓折皮膚流注經脉遂使腠理擁隔榮衛結滯隂陽之氣不得宣瀉變成癰疽疔毒惡瘡諸腫至于疔腫若不預識令人死不旋踵若著訖乃欲求方其人已入木矣所以養生之士須早識此方凡是瘡痍無所逃矣又一曰麻子疔其狀肉上起頭大如黍米色少烏四邊微赤多痒忌食麻子及衣麻布并入麻田中行二曰石疔其狀皮肉相連色烏黒如烏豆甚硬刺之不入肉内隂隂微疼忌瓦礫磚石之屬三曰雄疔其狀疱頭烏黶四畔仰瘡疱漿起色黄大如錢孔許忌房室四曰雌疔其狀瘡頭少黄向裏黶亦似灸瘡四畔疱漿起色赤大如錢孔忌房室五曰火疔其狀如火瘡頭烏黶四畔有皰漿漿如赤粟米忌火炙爍食炙􅏼等物六曰爛疔其狀色少黒有白斑瘡中有膿水形大小如匙面忌熱食爛臭物七曰三十六疔其狀頭烏浮起形如烏豆四畔起火赤今日生一明日生二後日生三乃至十若滿三十六藥所不療如未滿者可療俗名黒皰忌嗔喜愁恨八曰蛇眼疔其狀瘡頭黒皮皮浮生形如小豆狀似蛇眼體大硬忌惡眼人見之及嫉妬人看之九曰鹽膚疔其狀如匙面遍瘡皆赤有黒粟起忌鹹食十曰水洗疔其狀大如錢形或如錢孔大瘡頭白裏黒靨汁出中硬忌飲漿水洗渡河十一曰刀䥥疔其狀瘡濶狹如韭葉長一寸側内黒忌燒爍刺及刀䥥切割十二曰浮漚疔其狀如浮漚瘡體曲圓少許不合長狹如薤葉大内黄外黒曲黒曲處刺不痛裏黄處刺痛十三曰牛拘疔其狀肉皰起搯不破右十三種疔瘡初起必先痒後痛先寒後熱熱定多四肢沉重頭痛心驚眼花若大重者則嘔逆嘔逆者難療其麻子疔一種始末唯痒所録之忌不得犯觸犯觸者難療其浮嘔牛拘兩種無禁忌縱不治亦不殺人其狀寒熱與諸疔同皆以此方療之萬不失一欲知犯觸但脊強瘡痛極甚忍不可得則是犯之狀療之方用枸把春名天精夏名枸把秋名却老冬名地骨春三月上建日採葉夏三月上建日採枝秋三月上建日採子冬三月上建日採根四味並暴乾若得五月五日午時合和大良如不得依法採者但得一種亦得緋繒一片以褁藥為限亂髪一鷄子大牛黄如梧子大反勾棘刺針二七枚末赤小豆七枚末先於緋繒上薄布亂髪以牛黄末等布髪上即卷緋繒作團亂髪作索十字繋之熨斗中急火熬令沸以沸定自然乾即刮取擣作末絹下之以方寸一七取枸把根四味合和擣篩二七和合前一七共為三七和令相得又分為三分旦空肚酒服一分日三又凡是疔腫用之齊州榮姥方白薑石一斤軟黄者枸杞根皮二兩牡礪九兩爛者鍾乳下者研一兩白石英一兩研桔梗一兩右六味各擣篩乃秤之合和攪令相得先取伏龍肝九升末之以清酒一斗二升攪令渾渾澄取清二升和藥捻作餅子大六分厚二分其濁滓仍置盆中布餅子於籠上以一重紙藉盆上以泥酒氣熏之仍數攪令氣發經半日藥餅微乾乃内瓦坩瓶中一重紙一重藥遍布勿令相著宻以泥封之三七日乾以紙袋貯乾處舉之用法以針刺瘡中心深至瘡根并刺四畔令血出以刀刮取藥如大豆許内瘡上若病重困日夜三四度輕者一二度著重者二日根爛始出輕者半日一日爛出當看瘡浮起是根出之候若根出已爛者勿停藥仍著之藥甚安穏令生肌易其病在口咽及胷腹中者必外有腫異相也寒熱不快疑是此病即以飲或清水和藥如二杏仁許服之日夜三四服自然消爛或以物剔吐根出即差若根不出亦差當看精神自覺醒悟合藥以五月五日為上七月七日次之九月九日臘月臘日皆可若急須藥他日亦得要之不及良日也脩合須清浄燒香不得觸穢毋令孝子不全之人及産婦六畜雞犬等見之凡有此病忌房室猪牛雞魚生韭葱蒜芸薹胡荽醋麫等若犯諸忌而發動者取枸把根湯和藥服並如後方前二家方本是一家智者平論以為後方最是真本其病通忌酒肉五辛芸薹胡荽油麪生冷酢滑耳後方如左崔氏同白薑石二十五兩牡蠣十兩枸把根白皮四兩茯苓三兩右四味細篩合和先取新枸把根切六升水一斗半煮取五升去滓内狗屎二升攪令調匀澄取清和前藥熟搗捻作餅子隂乾取兩刃針當頭直刺瘡痛徹拔出刮取藥末塞孔中拔針出即内藥勿令歇氣并遍封瘡上頭即脹起針挑根出重者半日以上即出或已消爛挑根不出自差勿憂之其病在内者外當有腫相應並皆惡寒發熱疑有瘡者以水半盞刮取藥如梧子五枚和服之日夜三四服外自消也若須根出服藥後一日以上以雞羽剔吐出根縱不出根亦自消爛在外者亦日夜三四遍敷藥根出後常敷勿休生肉易差若犯者取枸杞根切三升以水五升煮取三升去滓研藥一錢七和枸把汁一盞服之日二三服并单飲冷枸杞汁三盞彌佳又以枸把汁絞狗屎取汁服之最良合訖即用不必待乾所言白狗屎是狗食骨其屎色如石灰故直言狗白屎也如預造取五月五日七月七日臘日合者其用療病尤良但有人䘚患喉中痛乍寒乍熱者即是其病當急以此藥療之腹中無故而痛惡寒發熱者亦是此病前二方同是一方法用一同亦主癰疽呉昇同又方以針刺四邊及中心塗雄黄立愈一云塗黄土又方馬齒菜二分石灰三分右二味和擣以雞子白和塗之文仲備急等同出第二十三卷中又療一切疔腫方取蒼耳根莖子等燒作灰以酢泔淀和如泥塗上乾即易不過十餘度即拔根出又論曰臣以正觀四年忽口右角患疔腫造甘子振其子振毎為貼藥十日不差臣以此療之一如方説自是常作此方以救諸人未説有不愈者故特論之以𫝊後世疔腫方殆有千首皆不及齊州榮姥方亦不勝此物造次易得也又方飲鐵漿一碗即差又方蒺䔧子一升作灰以醶醋和封塗瘡上一宿差又方皂莢子中仁末敷之數貼五日愈又論曰凡療疔腫皆刺中心至痛又刺四邉十餘下令血出去血後敷藥藥氣入針孔中佳若不達瘡裏則不得力也又論曰其腫好著口邉頰中舌上赤黒如珠子疼痛應心是寒毒久結變作此疾不即療日夜根長流入諸脉數道如箭入身捉人不得動摇若不慎口味房室死不旋踵經五六日不差眼中火光生心神惽昩不可具論此其狀也並出第二十三卷中備急療疔腫姚方云疔毒為瘡肉中突起如魚眼狀赤黒磣痛是寒毒之結變作此疾始作服湯及如療丹法便差又支太醫云有一十三種疔瘡其狀在大方中初起皆患寒熱又三十六疔亦是十三種數内或今日生一眀日生二或生三或生十滿三十六疔皆療之方蛇皮炙末和䑕矢以針刺破瘡内中即拔出差止文仲同又方取人糞乾者末之挑腫破敷瘡大良若犯瘡未死者開口灌厠清一大升須臾立差又方取白馬牙齒燒作灰先以針刺瘡令破以灰封之用麪周匝圍之候腫軟用好酢洗却灰其根即出當便差又内令消神驗方反勾棘針三十二枚一年以上陳者生大豆黄四十枚全者緋頭􅔮三條條濶一寸亂髪三雞子許右四味作三分先將緋一片褁棘針豆黄各三十枚用髪一塊纒緋令周匝牢固又取兩叚緋各如法褁之訖各於炭火上燒令煙盡且以兩段於瓷器中熟研之和酒半盞空腹服之半日瘡四邊軟内舒適即差半日不覺可更服一段必差若後犯之有三五豆赤黒膿出不經犯者十八日即差此方甚効勿犯之疔腫方二十首廣濟療疔腫毒氣敷藥差方白馬牙燒令赤内米醋中更燒附子生用雄黄研半夏右四味各等分為末以臘月猪脂和如泥封腫上一兩遍即差先以針刺至痛處後可封藥即効又方爛棘刺三枚反勾者丁香七枚並燒令煙斷以未滿月孩子糞和塗腫上頻頻三兩度根爛差又方車輻軸脂白鹽蕪菁根釡底墨等分右四味等分為末和以臘月猪脂敷上以醋及水亦得又療疔腫封藥後宜常服散方亂髪雞子大反勾棘針爛者二升露蜂房一升蛇脱皮一升絳緋一尺右五味分作五分以緋褁之用麻急纒之於炭火上燒如煙欲斷即收勿令作白灰末以酒和空肚服方寸匕日二夜一差止又方半夏生用石灰等分右二味𢷬末以敷瘡上並出第五卷中備急療疔腫方乾薑胡椒龍骨斑猫去翅足熬皂莢炙去皮子右五味各等分擣篩以酒和封瘡上日一敷之又方以針刺破瘡頭取熱人糞塗上乾易之不過十五遍即出又以硇砂封上若毒入腹以枸杞根切煎服之如犯觸亦然又方露蜂房二七枚曲頭棘刺二七枚蒼耳子七枚緋一寸亂髪雞子大腐蒿草節二七枚右六味熬令黒末研朱砂少許和酒服方寸匕日三服後加酒令微有酒色禁食如常療肉腫彌佳文仲同又方斑猫一枚捻破然後以針畫瘡上作米字以封上根乃出也又方生大豆黄三十二枚生者緋頭􅔮三條如無用五寸緋代亂髪一雞子許右三味以緋褁亂髪牢纒於炭火上燒得黒煙欲盡即出之冷瓷器中研如粉以酒空腹服之方寸匕平明至午時覺四體舒通覺瘡輕即差如未依前服之差止若犯之瘡即出膿血未經犯六七日平貼忌如常法必効療疔瘡方取舊厠清絞取汁青竹茹燒作灰右二味研和清攪一百遍稀稠成膏刺瘡四邊令遍先以唾和麪圍瘡四面寫藥漸漸令滿其中仍三五度換之睟時瘡即爛以針挑之拔去根即差止未出更著之神効又方蜂窠七枚露者真緋手掌大亂髪拳大右三味各燒為灰作末酒一小升和頓服之差止未差更作之並出第六卷中古今録驗療疔腫方出徐王大黄秦芁䔧蘆石硫黄研硇砂各一兩研右五味擣篩為散以刀子頭取和冷水量瘡大小封之若腫大悶可作五香湯服之并取麪和塗腫上乾即易之差止一方無大黄封之須刺四面麪糊紙貼勿令乾數著也又方白馬齒亂髪髑髏各一分枸把白皮三分右四味燒作灰以酒和服方寸七不差至二七又方曲頭棘刺四百枚橘皮三兩右二味以水三升煮取半升服一合塗腫上亦得又方取磁石擣為粉醶醋和封之立拔根出又方五月五日取壯狗矢燒作灰敷瘡數易之通按壯一作牝又方巴豆二七枚去皮半夏二七枚擣末以寒食餳和之以針刺瘡四邊即以藥塗之立拔出以澤㵼末填瘡孔中便差侍郎崔世謨送又方蛇脱皮四分燒灰露蜂房灰一分髪灰一分右三味並用五月五日採燥之相和以新瓦碗内燒灰白飲服棗許大令汗出未汗更服以汗為度七日不得食鹽酒肉五辛房室生冷醋滑等不得食蝟肉雞肉食者難差蛇皮不得帶赤色有毒純白者上此髙獺奴法邢長史𫝊之又方亂髪一雞子許緋帛三寸曲頭棘刺七七枚東枝白腐者蒼耳三七枝右四味合燒作灰研成散毎以水半盞許服方寸匕日二三差止慎風熱餘忌同前慮有犯觸加鹿角一方寸鼈甲三方寸蜂房三寸三物等分燒灰為散若有犯者依前方服之甚効並出第三十卷中犯疔腫重發方二首廣濟療丁腫犯之重發方青羊糞一升右一味以水二升漬少時煮兩沸絞取汁一升頓服無所忌出第五卷中古今録驗療犯疔腫方枸杞白皮一方寸匕麥七粒燒灰麻子七粒燒灰緋帛一方寸燒灰勾頭棘子二七枚燒灰亂髪灰半七半夏一七枚大小如羊糞者熬令黄右七味藥不問冬夏悉須温酒和服多少任人性此方無所忌不宜犯麻子多致死晉熙公上出第三十卷中惡腫一切毒瘡腫方一十八首廣濟飛黄散療療惡瘡腫方曽青雌黄白礬石磁石雄黄丹砂各一兩右六味各細研依四方色以藥置色處曽青東方丹砂南方白礬石西方磁石北方雄黄中央瓦甕二枚以黄泥下再三過使厚五六分以雌黄屑著下合篩諸藥著上後以半雌黄屑覆上以泥宻塗際勿令氣泄土須厚一宿如常㸃火㸃火用二年陳蘆作樵中調火以新布沈水中覆釡上乾復易九十沸止若日暮七十七沸亦足止太熟一斛米飯頃發出藥惡肉青黒乾不復出汗愈無甕以土釡二枚如上法也第二十四卷緩疽中有此方更有石英石膏鍾乳雲母為十味出第三十一卷中千金療惡毒腫或著隂卵或偏著一邊疼急攣痛牽少腹不可忍一宿殺人方茴香苗右一味擣取汁飲一升日三四服其滓以貼腫上冬中根亦可用此外國神方從永嘉以来用之起死神効又凡風勞毒腫疼攣痛或牽引少腹及腰胯痛方桃仁一升去尖皮兩仁熬令黒煙出熟擣研如脂膏以酒三升攪令相和一服覆取汗不過三差甚妙又大麻子小豆湯主毒腫無定處或嗇嗇惡寒或心腹刺痛煩悶者此由毒氣深重也方射干三兩商陸二兩薄切赤小豆一升麻子五升附子三兩炮升麻四兩右六味切以水二斗煮麻子取一斗半去滓研麻子令破以麻子汁煮藥令豆極熟去滓可得六七升一服一升日夜令盡小便當利大下即毒腫氣當減食此豆益佳如湯汱雪也出第二十三卷中崔氏五香湯療毒腫方麝香研青木香雞舌香藿香薫陸香當歸黄芩升麻芒硝各三分大黄五分右十味切以水六升煮取二升去滓入芒硝令烊分為二服相去六七里久亦療諸卒尸注惡氣也又療惡腫犀角湯方薫陸香青木香雞舌香藿香犀角各二分屑沉香二分升麻七分右七味切以水六升煮取二升半去滓分三服其問消息以意量之出第五卷中又烏膏療一切瘡引膿生肌殺瘡中蟲方烏麻油一升生清者黄丹二兩羅之薫陸香一兩乳頭者松脂半兩蠟半兩右五味先空煎油三分減一停待冷次内黄丹更上火緩煎又三分減一又停冷次内薫陸香末不冷即恐溢沸出煎候香消盡次下松脂及蠟看膏稍稠即以㸃鐵物上試之斟酌硬軟適中乃罷先問所患瘡是熱即減薫陸香及松脂若瘡如久不差此涉於冷依方煎之其貼杖瘡者油若一升地黄汁半合黄丹二大兩蠟一小兩餘凖上法此膏不須硬出第二卷中必効療惡瘡方熱毒腫以瓮近下鑚孔盛水令水射腫又以雞子清封腫上熱即易之又方取茺蔚臭草擣汁服一雞子許滓封腫熱則易之甚良又方擣地松汁服之毎日兩三服即差止又方大黄石灰赤小豆各等分右三味擣末以苦醋和塗之効出第四卷中經心録療諸毒腫升麻膏方升麻三兩白歛漏蘆連翹芒硝各二兩黄芩蛇銜各三兩蒴藋根四兩山梔子二十枚枳實二兩右十味擣碎以酒浸半日以猪膏五升煎之膏成去滓以器盛有毒熱腫取塗貼上摩之即消散日三小品同又大潝漬腫毒升麻湯方升麻一兩黄芩三兩梔子二十枚漏蘆二兩蒴藋根五兩芒硝二兩右六味切以水一斗煮取七升候冷分用漬潝腫常令濕潤即消小品集驗同又漏蘆湯方漏蘆無用梔子白歛黄芩麻黄白薇無用知母枳實炙升麻無用犀角芍藥甘草炙各二兩大黄三兩無用芒硝右十味切以水一斗煮取三升分三服若無藥處单服大黄一兩取利忌海藻菘菜等千金云療一切癰小品亦治丹毒並出第五卷中近効療一切熱毒腫驗方并主乳癰青木香紫葛紫檀朴硝各二兩赤小豆一合蜀升麻白歛生礬石各一兩右八味擣篩以水和如稀麪糊又以榆皮汁和之亦佳以布剪可腫大小仍毎片剪三兩箇小孔子塗藥貼腫上乾即易之王度支處又貼毒熱腫消方蔓菁根三兩芸薹苗葉根三兩右二味擣以雞子清和貼之乾即易之當日消又方商陸根芸薹苗葉根等分右二味擣之依上方貼之効又療一切熱瘡腫硝石膏方硝石一斤生麻油三升右二味先煎油令黒臭下硝石緩火煎令如稠餳膏成以好瓷器中收貯以塗貼瘡腫或熱發服少許妙用好酥煎更良忌生血物反花瘡及諸惡瘡方四首病源反花瘡者由風毒相搏所為初生如飯粒其頭破則血出便生惡肉漸大有根濃汁出肉反散如花狀因名反花瘡凡諸惡瘡久不差者亦惡肉反出如反花形也出第三十五卷中千金療一切久不差諸惡瘡兼反花瘡大神驗方䑕粘子草根細切熟擣和以臘月猪脂封貼腫瘡上取差止出第二十三卷中必効療反花瘡方栁枝葉以水煎成膏如稠餳塗之良又方取馬齒草燒灰敷之頻貼差止千金同又方鹽灰敷之神驗並出第四卷中魚臍瘡方一十首千金療魚臍瘡似新火針瘡四邊赤中央如欲黒色可針刺之若不痛即可畏也方亦名魚臍疔臘月魚頭灰以亂髪灰等分以雞稀溏屎和令相得封瘡上頻貼差止此瘡見不足言而能殺人又方以寒食餳封之又硬者燒灰塗貼敷之即差又療魚臍瘡其頭白似腫痛不可忍者方先以針刺瘡上及四畔作孔擣白芷取汁滴著瘡孔中如無以乾白芷末用敷一云白苣又方本方云赤根疔瘡取鼢䑕壤土以水和如泥塗貼上熱則易之差又方馬牙齒擣末以臘月猪脂和塗之拔根出即止亦燒灰用又方本方云療犯丁瘡刺瘡頭及四畔令汁極出擣生栗黄敷上以麪圍之勿令黄出自旦至午根必出又方同上以麫圍瘡如前法以針亂刺瘡上及四畔取銅器煎醋令沸寫著麪圍中令容一盞冷即易之不過三度即拔根出又方同上以水四升煮蛇脫皮如雞子大三四沸去滓服之立愈又燒蛇皮灰以雞子清和塗上差並出第二十三卷中崔氏療魚臍毒瘡腫方瘡初生之時頭白如黍米許大當中黒如蟻四畔赤至四五日之後疼痛不可忍似潰不潰雖至潰破膿出迴轉還滿疼痛不止者便是其候取獺屎以水和封腫處及瘡上即得膿出止痛消腫慎口味與患疔腫同千金同又方取瞿麥和生油熟擣塗之亦佳並出第五卷中丹毒方九首肘後夫丹者惡毒之氣五色無常不即療之痛不可堪又待壊則去膿血數升或發於節解多斷人四肢蓋疽之類療之方煮栗脥有刺者洗之姚同又療發足踝方擣蒜如泥以厚塗乾即易之集驗文仲備急同出第二卷中小品説丹毒一名天火也肉中忽有赤如丹塗之色大者如手掌其劇者竟身體亦有痛痒㣲腫方赤小豆一升右一味末下篩以雞子白和如泥塗之乾復塗之逐手消也竟身者倍合之盡復作刪繁千金同又療丹諸单行方或得一物差水苔生蛇銜生地黄生菘葉蒴藋葉五葉藤慎火草浮萍草豆豉大黄梔子黄芩芒硝右十三味但得一物擣以貼之即差赤小豆末和雞子白塗無雞子水和用之千金同又方新附淋草半斤蛇退皮一條露蜂房三兩右三味以水一斗煮取四升以帛榻洗之隨手消神妙經用効故附此卷𫝊之又方煮粟取濃汁以洗之妙又方取曲蟮糞水和如泥塗之千金論曰丹毒一名天火肉中忽有赤如丹塗大者如手掌甚者竟身痒㣲腫又白丹肉中起痒痛㣲虚腫如吹癮疹起亦有雞冠丹赤起大者如錢小者如麻豆粒如雞冠上澀一名茱茰火丹有水丹由體熱遇水濕搏之結丹晃晃黄赤色如有水在中喜著腹及隂處此雖小疾不治令人至死療之皆用升麻膏方升麻白薇漏蘆連翹芒硝各二兩黄芩蛇銜枳實炙各三兩梔子二十枚蒴藋四兩右十味擣碎令細以水三升漬半日猪脂五升煎之候水氣竭去滓乾器中收之量取敷丹毒上頻塗敷之以差止凡種丹及熱瘡腫皆用之効忌如常内宜服漏蘆湯文仲備急集驗無白薇崔氏同又療丹神驗方芸薹茱茰擣令熟厚封之隨手即消散餘熱未愈再封臣以貞觀七年三月八日於内江縣飲多至夜睡中覺四體骨肉並疼比至曉頭痛目眩額左角如彈子大腫痛不可得近至午時近右角至夕諸處皆到眼遂閉合不暫開㡬致殞斃其縣令周公以種種方藥治皆不差經七日臣自處此方其驗如神故疏之以𫝊来世云爾赤丹方五首病源赤丹者初發疹起大者如連錢小者如麻豆肉上粟如雞冠肌理由風毒之重故使赤也亦名茱茰丹出第三十一卷中肘後療面目身體卒得赤班或黒班如瘡狀或痒搔之隨手腫起不急療之日甚殺人方羚羊角煎以摩之數百遍若無用牛脂及猪脂有解毒藥者皆可用摩務令分散毒氣神妙又若已遍身赤者方生魚合皮鱗燒擣末以雞子白和遍塗之文仲備急同又新附方羚羊角無多少即燒之為灰令極細以雞子清和塗之極神効無雞子以水和塗之亦妙出第二卷中一云赤小豆一升羊角燒之三兩爲末雞子白和敷之無羊角单用赤小豆良備急文仲同集驗療人面目身體卒赤黒丹起如疥狀不療日劇遍身即殺人也煎羊脂以摩之青羊脂最良千金文仲肘後刪繁同又方以猪槽下土泥塗之千金同又以飼猪杓灸熨之即差並出第八卷中白丹方一十三首病源白丹者初發痒痛㣲虚腫如吹軫起不痛不赤而白色由挾風冷故然色白也出第三十一卷中肘後療白丹方末豉以酒和塗之擣香薷葉苦蓼敷之又方屋上塵以苦酒和塗之又方燒鹿角作灰以猪膏敷之又方蜜和乾薑末敷之又方酸模草五葉草煮飲汁又以滓薄丹以薺亦佳備急文仲同出第二卷中集驗云有白丹者肉中起痒痛㣲虚腫如吹癮疹起者療之亦如赤丹法有雞冠者赤色丹起大者如連錢小者如麻麥豆粒肉上粟粟如雞冠肌理也方説一名為茱茰火丹療之如天火法有水丹由體熱過水濕搏之結丹晃晃黄赤色如有水在其中喜著腹及隂處療之亦如火丹法其水丹著人足趺及踹脛間者作黄色如火丹狀經久變紫色不療皆成骨瘡也無毒非殺人疾若成骨瘡即難差也經言風邪客於肌中則肌虚真氣發散又被寒氣搏皮膚外發腠理開毫毛淫淫氣妄行之則爲痒也所以有風疹風瘙疾皆由於此有赤疹者忽起如蚊蚤吮煩痒劇者連連重沓壟腫起搔之逐手起有白疹者亦如此證也療之皆如療丹法也療之方擣白瓷器屑猪膏和塗之又方燒猪矢灰和雞子白塗之肘後千金備急文仲同崔氏療丹毒或發背及諸腫方取馬齒草熟擣敷之數數易勿住若得藍靛和之更良又方以生羊牛肉貼數數易之良又方䑕粘草根勿使見風及犬見洗去土熟擣以敷腫處兼絞取汁飲之佳又方茺蔚草蛇銜草慎火草相和熟擣敷之良數數易之又方擣鯽魚敷之數數易之良出第五卷中備急療白丹方苧根三斤小豆四升水二斗煮以浴日三四遍肘後文仲同出第四卷中丹疹方四首病源丹疹者肉色不變又不熱但起癮疹相連而㣲痒故謂之丹疹出第三十一卷中千金翼療丹癮疹方酪和鹽熱煮以摩之手下消也又方白芷根葉煮汁洗之効又方擣慎火葉封之神良又方以一條艾蒿燭竿以兩手極意尋之著壁伸十指當中指頭以大艾炷灸燭竿上令燭竿斷即止灸十日差於後重發更依此灸永差赤疹白疹方一十一首千金云凡赤疹熱時發冷即止白疹天隂冷即發方白疹以水煮白礬汁拭之又煮蒴藋著少酒以浴又以酒煮石南拭之又以水煮雞屎汁拭之又枳實汁拭之所療一如療丹法集驗同又方末白术酒服方寸匕日三盡五斤又方淋石灰汁漬洗之又方煎白芷根葉作湯洗之又方芥子末以醋漿水服方寸七日三服差又療身體赤癮疹而痒搔之隨手腫方莽草二分當歸芎藭躑躅花大㦸細辛芍藥芫花附子炮蜀椒各四分猪脂二升半右十一味切以猪膏合煎之候附子色黄膏成濾去滓收貯以敷病日三以差為度又方礬石二兩酒三升漬令煬拭上立差延年療赤白二疹丸方白术一斤蔓荆子四分防風四分附子二分炮桂心二分右五味擣篩蜜和為丸如梧子大酒服十丸日二服稍加至十五丸若能作散服一錢匕此療風疹正方凡風皆由舊来有風氣所以方中不得不用桂心附子白术既用一斤附子只有二分復有防風其防風即能斷附子毒所以一物毒亦無所至伏聽進止又其赤疹心家稍虚熱氣相搏其色赤宜作芒硝湯拭之方芒硝三兩右一味用湯一升内芒硝令消散以帛子沾取拭疹即漸除湯盡更合以前二件赤白疹方許崇處並出第十三卷中古今録驗云赤疹者由令濕折於肌中甚即為熱熱成赤疹也得天熱則劇取冷則減療之方取生蛇銜草擣極爛以塗之最驗集驗小品同又白疹者由風氣折於肌中之熱熱與風相搏遂為白疹也得天隂雨冷則劇出風中亦劇得晴暖則減著衣身暖亦差療之方水煮枳實拭之佳又擣末熬之青布褁熨之集驗同出第三十卷中肺風冷熱疹方二首延年論曰凡風疹有二先受風寒氣其疹色白厚搔之即破應手下有道生此是肺家風冷氣宜外洗拭即定方吳茱茰一兩清酒一升煮取五合以軟帛取汁拭疹處不過三兩度即定如疹處多用盡更合白疹即是肺藏受寒冷氣所發也又療肺風熱皮膚生風結狀如疹或生風搔如水疥粟粒戢戢然方天門冬八分去心枳實十二分白术人參各六分獨活苦參各五分有冷不用右六味擣篩蜜和為丸梧子大食後以飲下七丸日再服加至十丸忌如常法出第十三卷中雜丹疹毒腫及諸色雜瘡方五首刪繁療丹走皮中淫淫名火丹方取蠐螬末水和敷之出第九卷中千金療赤流腫方榆根白皮擣末以雞子白和塗之出第二十三卷中近効梔子湯主表裏俱熱三焦不實身體生瘡或發癰癤大小便不利方芒硝四分大黄四分梔子甘草炙黄芩知母各六分右六味切以水二升煮取九合去滓分温服忌如常法此方甚佳一方芒硝三兩大黄四兩梔子二七枚黄芩知母各三兩甘草二兩右以水五升煮減半下大黄煮取一升八合去滓内芒硝分三服又療諸色瘡腫神驗方考功韋郎中處胡粉熬令赤赤小豆熬糯米吳茱茰黄連各一兩水銀二分右六味擣篩以生蔴油和如稀麪糊然後取水銀於手掌中以唾指研熟訖入藥中令匀先椒湯洗瘡乾拭以藥塗之日再以差為度療孩子瘡佳一云用泔清洗瘡又牛蒡粥療瘡腫方取牛蒡根二莖净洗煮令爛於盆中研令細去筋脉汁中即下米煮粥鹹淡任性服一碗甚良無忌瘑瘡方一十二首病源瘑瘡者由膚腠虚風濕之氣折於血氣結聚所生多著手足間逓相對如新生茱茰子痛痒抓搔成瘡黄汁出侵淫生長折裂時差時劇變化生蟲故名瘑瘡出第三十五卷中深師療瘑瘡方荆木燒取汁塗之差救急同又方灸瘑上周匝最良並出第二十九卷中集驗療瘑瘡方苦酒一升温令沸以生韭一把内中以薄瘡上即差范汪同又方雄黄一兩黄芩二兩松脂二兩髪灰如彈丸大右四味以白膏與松脂合擣以敷瘡上范汪文仲備急用黄連餘同又方亂髪頭垢等分螺殻二十枚燒以臘月猪脂和如泥以敷之范汪同又方羊躑躅花三升以水漬之半月去滓以汁洗瘡一方炙鮓以敷瘡上蟲當出也范汪同又方桃花鹽等分熟擣以醋和敷之范汪同又方皂莢十枚苦酒四升煮之去滓煎如飴以敷瘡上范汪同又方新瓦罐一口安雞屎一合酒煎成膏塗之又方糓木白汁一合苦酒二合小蒜半合釡月下土一合右四味和如泥塗之乾復塗並出第八卷中范汪同刪繁療瘑瘡螺殻膏方螺殻二七枚爛者亂髪燒灰頭垢龍膽末右四味各等分合研如粉以三年油淀和敷之加膩粉妙又療瘑瘡多汁方水銀八分以唾手掌中研令入藥用黄連八分胡粉八分熬令黄右三味黄連為末和以粉敷瘡上並出第二十九卷中瘑瘡久不差方五首病源瘑瘡積久不差者由膚腠虚則風濕之氣停滯蟲在肌肉之間則生長常痒痛故經久不差出第三十五卷中廣濟療瘑瘡久不差方豆豉熬令極乾爲末先以泔清洗瘡拭乾以生麻油和之敷上差以油单片褁之三日開未差更塗差止又療諸瘑瘡經年依手拂疽痒引日生不差瘡久則有疽蟲䔧蘆膏方䔧蘆六分黄連八分礬石熬汁盡松脂雄黄研各八分苦參六分右六味擣以厚絹篩之用豬脂二升煎之候膏成去滓入雄黄礬石末攪令和調待凝以敷之諸瘡經年或搔之汁出不生痂百藥療不差悉主之瘑疥痒頭瘡亦効熱瘡者起瘡便生白膿是也黄爛瘡者起瘡淺但出黄汁若肥瘡是也侵淫瘡者淺瘡黄汁出兼搔之漫延長不止是也瘑瘡者喜著手足相對痛痒折裂春夏隨差集驗同又方剉羊桃枝葉右一味水煮以洗之三四度劉㳙子療久瘑疥癬諸惡瘡毒五黄膏方雄黄二兩研亂髪如雞子大燒黄連一兩黄蘗二兩黄芩二兩青木香二兩雞舌香一兩白芷二兩狼䟦子四十枚雌黄二兩研右十味㕮咀以苦酒半升漬諸藥一宿以臘月猪膏三升煎取髪三四沸内諸藥又三沸止絞去滓膏成敷瘡日五過出第五卷中崔氏療瘡積年不差瘡汁浸四畔好肉復變成瘡瘡色赤黒痒不可耐搔之並汁出者方黄連黄蘗豉心各三分擣為末一方加蔓菁子亦有加杏仁者與黄連等分擣篩之胡粉水銀油脂以上三物和之如泥右六物若慮水銀不散可内掌中細細和唾研之自當散訖然後攪胡粉等以塗瘡上仍取黄連末粉之此瘡多有黄汁著藥候汁徹即易之以差為度出第五卷中癬瘡方一十一首病源癬病之狀皮肉癮疹如錢文漸漸増長或圓或斜痒痛有匡郭裏生蟲搔之有汁此由風濕邪氣客於腠理復值寒濕與血氣相搏則血氣否澁發此疾按九蟲論云蟯蟲在人腸内變化多端發動亦能為癬而癬内實有蟲也養生方云夏勿露面卧露下墮面皮厚及喜成癬出第三十五卷中肘後療癬瘡方獨活根去土擣之一把許附子二枚炮擣以好酒和塗之三日乃發欲敷藥先以皂莢湯洗拭令乾然後敷藥便愈出上卷中深師療癬秘方雄黄一兩研硫黄一兩研羊蹄根一兩白糖一兩荷葉一兩右五味以後三種擣如泥合五種更擣和調以敷之若強以少蜜解之令濡不過三差又療癬神驗方用雄黄研以淳苦酒先和以新布拭癬上令傷以藥塗之神効又方菖蒲細切取五升以水五斗煮取二斗以釀二斗米如酒法熟極飲令得極醉即愈未差更作無有不愈一云長服菖蒲末酒調並作丸佳又方取乾蟾蜍燒灰末以猪脂和塗之良出第二十卷中千金翼療癬秘方擣羊蹄根分著瓷中以白蜜和之刮瘡四邊令傷先以蜜和者敷之如炊一石米久拭去更以三年大醋和之以敷癬上燥便差若刮瘡處不傷即不差深師同出第二十三卷中救急療癬方先以針䥥癬上即擣瓜蔕末敷上仍先以泔洗之又方烊松脂擣熏黄末和更煎仍以泔清洗癬乃熱敷之一兩度即差並出第五卷中必効療癬方淳甲煎塗之愈好口脂亦得又方附子一枚炮大皂莢一枚炙九月九日茱茰四合右三味為散揩癬上令汁出敷之乾癬苦酒和塗之深師古今録驗同並出第四卷中古今録驗療癬方作麻浮敷癬上褁之差麻浮不差以鹽及豉和擣塗之即差止乾濕癬方一十五首病源乾癬但有匡郭皮枯索痒搔之白屑出是也皆是風濕邪氣客於腠理復值寒濕與血氣相搏所生若其風毒氣多濕氣少故風沉入深故無汁為乾癬其中生蟲又濕癬者亦有匡郭如蟲行侵淫赤濕痒搔之多汁成瘡是其風毒氣淺濕多風少故為濕癬也其中亦有蟲出第三十五卷中肘後療燥癬方水銀和胡粉研令調以塗之范汪同又方以雄鷄冠血塗之范汪同又方胡粉熬令黄赤色苦酒和塗之乾即易差止又方以穀汁塗之又方擣桃白皮苦酒和敷之佳千金同又療濕癬方刮瘡令圻火灸指摩之以蛇床子末和猪脂敷之差止深師療乾濕癬神方取狼毒末以苦酒研之如墨法先洗刮令傷以敷之不用大塗恐壊人肉范汪同又烏梅煎治燥濕癬方烏梅十四枚大蒜十四枚屋塵三合鹽三合大麻子四合右五味相和熟擣以苦酒一升半拌和以敷之日三過差又香瀝療燥濕癬及瘑疥百瘡方柏節杉節沉香節松節各一斤右四味悉碎一如指大以布囊盛之竟令囊注麻腴中半食頃出漉先取一枚白坩穿去底令孔如鷄鴨卵大以松葉一小把籍孔上以坩安著白鹽以黄土泥塸坩合際令厚數分畢以藥内坩中以生炭著藥上使然其瀝當流入塸中須然盡乃開出取塸中汁以薄瘡上日再用之療白秃疽疥惡瘡神効出第二十九卷中崔氏療乾濕癬方取楮葉面著癬用匙背打葉葉碎即換可三四度換即差亦可只用一葉唯熟打使極碎即褁之勿令碎葉落即差又療乾癬積年痂厚搔之黄水出每逢隂雨即痒方取巴豆肥者一枚炭火上燒之令脂出即於斧上以指研之如杏􅀈法以塗癬上薄敷之不過一兩度便愈又療乾癬諸治不差者方但看癬頭有痱癗子處即以小艾炷灸之差出第五卷中古今録驗療濕癬方石硫黄研大醋三年者和數數敷瘡上又方蛇床子一兩黄蘗一兩黄連一兩胡粉一兩研右四味擣篩為散内水銀一棗大和猪膏研入相和以塗瘡云是驗方又方取肥猪肉薄割之於𨫼上炙之令熱以薄瘡上日三四度出第四十卷中疥癬惡瘡方五首廣濟療疥癬惡瘡方石硫黄六兩白礬十二兩熬並於瓷器中研以烏麻油和稠調如煎餅麪更熟研敷之熱灸疥癬上摩一二百下乾即移摩之取差出第五卷中劉涓子療疥癬惡瘡膏方丹砂研雄黄研亂髪白蜜松脂别入各一兩䕡茹三兩巴豆十四枚去皮猪膏二升右八味先煎猪膏亂髪消盡内松脂蜜三上三下絞去滓末䕡茹石藥内膏中更一沸以攪令極調以敷瘡上日三差止神効出第五卷中救急療癬瘡方白礬石熬多年韭根雄黄研䔧蘆𤓰蒂胡粉各一分水銀三分右七味以柳木杵研水銀使盡用猪脂一升煮䔧蘆韭根𤓰蒂三沸去滓入石藥等攪令相得以敷瘡上甚妙近効療熱瘡疥癬痒痛不可忍者方硝石一物先用泔清洗瘡去痂拭乾看瘡大小研硝石末和生麻油如麪糊以塗瘡上三兩度差又方水銀蕪荑酥和塗之薑黄塗之牛李子塗之醋煎艾塗之羊蹄根和乳汁塗之出第三卷中疥風痒方七首肘後療疥方石灰二升以湯五升浸取汁先用白湯洗瘡拭乾乃以此汁洗之有効出第六卷中深師療疥大黄膏方黄連十四銖䔧蘆十二銖大黄一兩乾薑十四銖䕡茹十銖莽草十二銖羊躑躅十銖右七味擣篩以成煎猪脂二斤㣲火向東煎之三上三下膏成去痂汁盡付之神効合時勿令婦人雞犬見之出第二十九卷中集驗療疥方擣羊蹄根和猪脂塗上或著少鹽佳范汪同又療疥及風瘙瘡苦痒方丹參四兩苦參四兩蛇床子一升右三味切以水六升煎之以洗疥瘡以粉粉身日再為之即差備急葛氏療疥瘡方取楝根削去上皮切皂莢去皮子等分熟擣下篩脂膏和搔痒去痂以塗之䕶風勿使女人小兒雞犬見之范汪同又療方石硫黄無多少研粉以麻油或以苦酒和塗摩之以酒漬苦參飲之並出第五卷中薫疥法取艾如雞子大先以布褁亂髪於紙上置艾熏黄末硃砂末杏仁末水銀各如杏仁許水銀於掌中以唾研塗紙上以卷藥末炙乾燒以熏之一云筒瓦一口一同安灰盖上以䋲束之用熏疥於脚頭被内置之少時火盡止隔日一薰不過再即差無所損外䑓秘要方卷三十
