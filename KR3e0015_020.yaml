於六腑淫虛厥於五藏故曰精極也凡陽邪害五藏陰邪損六腑陽實則從陰引陽陰虛則從陽引陰若陽病者主高高則實實則熱眼視無明齒焦髮脫腹中滿滿則厯節痛痛則宜瀉於內若陰病者主下下則虛虛則寒體重則腎水生耳聾行步不正邪氣入內行於五藏則咳咳則多涕唾面腫氣逆所以形不足者溫之以氣精不足者補之以味善療精者先療肌膚筋脈次療六腑五藏若邪至五藏則半死半生矣鶣鵲曰五陰氣俱絶不可療絶則目系轉轉則目精奪為志先死逺至一日半日矣非醫所及也宜須精研以表療裏以左療右以右療左以我知彼疾皆差也千金同並出第八卷中千金療精極實熱眼視無明齒焦髮落形衰體痛通身虛熱竹葉黃芩湯方竹葉切三升黃芩茯苓各三兩生薑六兩麥門冬去心甘草炙大黃各二兩芍藥四兩生地黃切一升右九味切以水九升煮取三升去滓分為三服忌酢物海藻菘菜蕪荑刪繁同又療精極五藏六腑俱損傷虛熱遍身煩疼骨中悁痛煩悶方生地黃汁二升生麥門冬汁赤蜜竹瀝各一升石膏八兩碎人參三兩芎藭三兩甘草一兩炙黃芩三兩當歸四兩桂心四兩麻黃二兩去節右十二味切以水七升先煮八物取二升去滓下地黃汁等煮取四升分四服日三夜一忌海藻菘菜生蔥蕪荑刪繁桂三兩刪繁同並出第十九卷中虛勞失精方五首病源腎氣虛損不能藏精故精漏失其病少腹弦急陰頭寒目眶痛髮落診其脈數而散者失精脈也凡脈芤動微緊男子失精出第四卷中深師人參丸療虛勞失精方人參二兩桂心牡蠣熬薯蕷黃蘗細辛附子炮苦參各三分澤㵼五分麥門冬去心乾薑乾地黃各四分莵絲子二分右十三味搗合下篩和以白蜜為丸酒服如梧子大三丸痺加附子一分炮婦人血崩加乾地黃好者二分一本云黃蘗四分忌豬肉冷水生蔥生菜蕪荑出第三卷中范汪療男子虛失精三物天雄散方天雄三兩炮白术八分桂心六分右藥搗下篩服半錢匕日三稍稍增之忌豬肉冷水桃李雀肉生蔥張仲景方有龍骨文仲同出第六十八卷中千金療男子虛勞失精陰縮灸法灸中封五十壯又男子虛勞失精陰上縮莖中痛方灸大赫三十壯穴在夾屈骨端三寸並出第十九卷中以上灸穴尺寸逺近具在第三十九卷中古今録驗療虛損失精黃芪湯方黃芪當歸甘草炙各二兩桂心六兩蓯蓉石斛各三兩乾棗百三十枚白蜜二升右八味切以水一斗煮取四升內蜜煎取三升分為四服日三夜一以食相間忌海藻菘菜生蔥范汪同出第三卷中虛勞尿精方八首病源虛勞尿精者腎氣衰弱故也腎藏精其氣通於陰勞傷腎虛不能藏其精故因小便而精液出也出第四卷中深師療男子尿精方栝樓根澤瀉土瓜根各二兩右三味搗合下篩以牛膝和為丸如梧子先食服三丸良范汪云用四分餘並同又尿精小便白濁夢泄韭子散方韭子莵絲子車前子各一升附子三枚炮當歸芎藭礬石燒各三兩桂心一兩右八味搗合下篩溫酒服方寸匕日三亦可蜜和為丸酒服如梧子大五丸忌豬肉冷水生蔥千金同出第三卷中千金療虛勞尿精方韭子二升糯米一斗右二味以水一斗七升煮如粥取汁六升分為三服精溢同此又方柘白皮五合桑白皮五合切右二味切以酒五升煮取三升分為三服一方柘白皮作石榴皮又方乾膠二兩炙右一味搗末酒二升和溫分三服差一方用鹿角膠又方新韭子二升十月霜後採右一味好酒八合漬一宿明旦日色好童子向南搗一萬杵平旦溫酒五合服方寸匕日再服又小便失精及夢泄精方韭子一升熬麥門冬一升去心莵絲子二合車前子二合芎藭二兩白龍骨三兩右六味搗篩以酒服方寸匕日三不知稍稍增之甚者夜一服肘後用澤㵼一兩半並出第十九卷中古今録驗棘刺丸療男子百病小便過多失精方棘刺二兩麥門冬去心萆薢厚朴炙莵絲子柏子仁蓯蓉桂心石斛小草細辛杜仲牛膝防葵乾地黃各一兩石龍芮三兩巴戟天二兩烏頭半兩炮削去皮右十八味搗下篩以蜜雜雞子黃各半和之搗五六千杵以飲服如梧子十丸日三稍稍增至三十丸以知為度忌豬肉冷水生蔥生菜千金有萎㽔深師同並出第十卷中虛勞夢泄精方一十首病源腎虛為邪所乘邪客於陰則夢交接腎藏精今腎虛弱不能制於精故因夢感動而泄也出第四卷中深師韭子丸療虛勞夢泄精方韭子五合熬大棗五枚黃芪人參甘草炙乾薑當歸龍骨半夏洗芍藥各三兩右十味搗合下篩和以白蜜棗膏丸如梧子服十丸日三四忌海藻菘菜羊肉餳千金同又棘刺丸療虛勞諸氣不足數夢或精自泄方棘刺天門冬去心各二兩乾薑莵絲子烏頭炮小草防葵薯蕷石龍芮枸杞子巴戟天萆薢細辛萎㽔石斛厚朴炙牛膝桂心各二兩右十八味搗合下篩和以蜜雞子白各半相和丸如梧子先食服五丸日三若患風痿痺氣體不便熱煩滿少氣消渴枯悴加萎蕤天門冬莵絲子身黃汗小便赤黃不利加石龍芮枸把子關節腰背痛加萆薢牛膝寒中氣脹時泄數唾嘔吐加厚朴乾薑桂心陰囊下濕精少小便餘瀝加石斛以意增之莵絲子酒漬之經一宿後有一方十四物長陰加肉蓯蓉磁石其説小異故兩存焉忌豬肉冷水生蔥菘菜鯉魚等又鹿角湯療勞夢泄精方鹿角一具屑韭白半斤生薑一斤芎藭茯苓各二兩當歸鹿茸炙各二兩白米五合右八味切先以水五斗煮鹿角取一斗二升去滓內諸藥煮取四升分服一升日三夜一鹿角唯取肥而解者打令碎也忌酢物又桂心湯療虛喜夢與女邪交接精為自出方一名喜湯桂心牡蠣熬芍藥龍骨甘草各二兩炙大棗三七枚一方十枚生薑五兩右七味㕮咀以水八升煮取三升去滓溫分三服忌海藻菘菜生蔥范汪同並出第三卷中千金療夢泄失精尿後餘瀝尿精方人參麥門冬去心赤石脂逺志去心續斷鹿茸炙各六分茯神一云茯苓龍齒炙磁石研蓯蓉各八分乾地黃十二分丹參韭子熬柏子仁各五分右十四味搗篩蜜和丸如梧子以酒服二十丸日再服漸加至三十丸忌酢物蕪荑又療夢失精方韭子一升熬右一味搗篩以酒服方寸匕日再神效並出第十九卷中古今録驗石斛散療男子夢泄精方石斛七分桑螵蛸紫菀各二分乾漆熬五味子乾地黃鍾乳研逺志皮附子各二分炮右九味搗合下篩以酒服方寸匕漸漸增至二匕日三服忌豬肉冷水蕪荑出第十卷中小品龍骨湯療夢失精諸脈浮動心悸少急隱處寒目眶疼頭髮脫者常七日許一劑至良方龍骨甘草炙各二分牡蠣三分熬桂心芍藥各四分大棗四枚擘生薑五分右七味切以水四升煮取一升半分再服虛羸浮熱汗出者除桂加白薇三分附子三分炮故曰二加龍骨湯忌海藻菘菜生蔥豬肉冷水又薰草湯療夢失精方薰草人參乾地黃白术芍藥各三兩茯神桂心甘草炙各二兩大棗十二枚擘右九味切以水八升煮取三升分為二服每服如人行四五里一方又有茯苓三兩忌桃李雀肉大酢海藻菘菜生蔥一本無薰草人參又有薰草人參龍骨别是一方范汪同並出第三卷中集驗灸丈夫夢泄法灸足內踝上一寸一名三陰交二七壯兩腳皆灸內踝踝大脈並四指是范汪文仲同出第五卷中外臺祕要方卷十六
