body:
  text: 外臺袐要方卷十五唐王燾撰風狂方九首病源風狂者由風邪入并於陽所為也風邪入血使人隂陽二氣虚實不調若一實一虚則令血氣相并氣并於陽則為狂發或欲走欲自高賢稱神聖是也又肝藏魂悲哀動中則傷魂魂傷則狂妄不精明不敢正當人而攣筋兩脇骨不舉毛瘁色天死於秋皆由血氣虚受風邪致令隂陽氣相并所致故名風狂千金方療狂邪發惡或披頭大呌欲殺人不避水火方苦參為末以蜜丸如梧子大每服十丸薄荷湯下又方療癲狂不識人人屎燒灰酒調服之又方療風狂百病麻仁四升水八升猛火煮令牙生去滓煎取七升旦空心服或發或不發或多言語勿怪之但令人摩手足須定凡進三服千金翼療癲狂不識人伏龍肝為末水調方寸匕日進三服肘後方療風狂䘮心取葶藶一升搗三千杵取白犬倒懸之以杖杖血出盛取以和葶藶末丸如麻子大一丸三服取差又方莨菪子二升酒五升浸之出曝乾再漬盡酒止𢷬服一錢匕日三勿多服益狂又方防葵為末酒服一刀圭至二三身潤又小不仁為候又方自縊死者繩燒三指撮服之又主狂言恍惚方灸天樞百壯並出第十四卷中銅人經天樞俠臍二寸風驚恐失志善忘及妄言方六首深師人參湯療忽忽善忘小便赤黄喜夢見死人或夢居水中驚恐惕惕如怖目視􅑩􅑩不欲聞人聲飲食不得味神情恍惚不安定志養魂方人參甘草炙各二兩半夏一兩洗龍骨六兩逺志八兩麥門冬一升洗去心乾地黄四兩大棗五十枚擘小麥一升阿膠三兩炙膠飴八兩石膏四兩碎綿裹右十二味切以水三斗煮小麥令熟去麥内藥煮取七升去滓内膠飴令烊一服一升日三夜一安卧當小汗彌佳忌海藻菘菜羊肉蕪荑又龍骨湯療宿驚失志忽忽善忘悲傷不樂陽氣不起方龍骨茯苓桂心逺志去心各一兩麥門冬去心二兩牡蠣熬甘草炙各三兩生薑四兩右八味㕮咀以水七升煮取二升分為二服忌海藻菘菜酢生葱又鐵精散療驚恐妄言或見邪魅恍惚不自覺發作有時或如中風方鐡精茯苓芎藭桂心蝟皮炙各三兩右五味𢷬下篩以酒服錢五匕日三不知稍増至一錢以上知之為度忌酢物生葱等並出第九卷中古今録驗道士陳明進茯神丸一名定志小丸主心氣不定五藏不足甚者憂愁悲傷不樂忽忽善忘朝差暮劇暮差朝發發則狂眩加茯神為茯神丸不加茯神為定志丸二分合少可兩度合方菖蒲逺志去心茯苓各二分人參三兩右四味𢷬下篩服方寸匕後食日三蜜和丸如梧桐子服六七丸日五亦得一方加茯神一兩半牛黄五銖為六味茯苓逺志菖蒲各一兩忌酢物羊肉餳千金同又定志紫葳丸療五驚喜怒不安方紫葳六分逺志十五分去心白龍骨七分牛黄一兩甘草十分炙虎頭皮十二分炙令焦人參桂心白术各八分防風七分麥門冬去心熬雷丸各五分柴胡六分右十三味各别𢷬下篩蜜和丸如梧桐子大先食服十丸日三甚良忌海藻菘菜桃李生葱並出第五卷中千金療驚勞失志方茯神五兩甘草炙桂心各一兩龍骨麥門冬去心防風牡蠣熬逺志去心各二兩棗二十枚擘右九味切以水八升煮取二升分為二服日再服忌海藻菘菜生葱酢物出第十四卷中一云主驚悸心神錯亂或是或非言語無度茯神湯風邪方八首病源風邪者謂風氣傷於人也人以身内血氣為正外風氣為邪若其居處失宜飲食不節致腑藏内損血氣外虚則為風邪所傷故病有五邪一曰中風二曰傷暑三曰飲食勞倦四曰中寒五曰中濕其為病不同風邪者發則不自覺知狂惑妄言悲喜無度是也出第二卷中廣濟療風邪狂亂失心安神定志方金銀薄各一百和合石膏研龍齒研鐵精研地骨白皮茯神黄芩生乾地黄升麻茯苓𤣥參人參各八分虎睛一具微炙牛黄生薑屑各四分麥門冬十分去心枳實炙甘草炙葳蕤芍藥各六分逺志去心栢子仁白鮮皮各五分右二十四味𢷬篩以蜜和為丸食訖少時煮生枸杞根汁服如梧桐子二十丸日二服漸加至三十丸不利忌熱麫海藻菘菜蕪荑炙肉醋蒜粘食陳臭油膩出第一卷中深師鎮心丸療老小心氣不足虚弱時苦小語勞則劇風邪百病並主之方銀屑一分半研牛黄九銖丹砂研甘草炙麥門冬去心逺志去心各五分防葵人參防風細辛茯神椒汗附子炮紫石英研各四分桂心乾薑各六分菖蒲紫菀各三分右十八味𢷬下篩以白蜜和丸如梧子大先食服三丸日三不知稍稍増之忌海藻菘菜生菜豬肉生葱生血酢物餳等丹砂一作丹參又五石鎮心丸療男女風虚心氣不足風邪入藏夢寤驚恐心悸諸病悉主之方紫石英研白术各一兩茯苓海蛤菖蒲白石英杏仁去皮尖兩仁熬硫黄研逺志去心細辛牛黄鐵精研卷栢阿膠炙各四分麥門冬去心蓯蓉鍾乳研銀屑研大豆卷當歸乾薑各五分大棗五十枚人參防風薯蕷甘草炙各七分澤㵼六分白斂前胡各二分石膏研乾地黄芍藥桔梗栢子仁桂心烏頭炮各三分秦芁六分半夏八分洗大黄五分三斗米下蒸黄芪六分右四十味𢷬下篩棗膏蜜和為丸如梧子大一服十丸不知増之忌海藻菘菜豬羊肉餳生葱桃李羊血蕪荑酢物並出第十卷中肘後麻子湯療風邪感結衆殃恍惚不安氣欲絶水漿不入口方麻子五合熬橘皮芍藥生薑桂心甘草炙各三兩半夏五兩洗人參一兩當歸二兩右九味切以水九升煮取三升分為三服忌海藻菘菜羊肉餳生葱等物古今録驗同出第三卷中千金翼續命湯療大風風邪入心心痛達背背痛達心前後心痛去來上下或少腹脹滿微痛一寒一熱心中煩悶進退無常面或青或黄皆是房内太過虚損勞傷交通㑹後汗出汗出未除或因把扇或出當風因而成勞五俞大傷風因外入下有水因變成邪雖病如此然於飲食無退坐起無異至卒不知是五内受風故也名曰行尸宜預備此方麻黄六分去節大棗十枚擘桂心防風細辛芎藭甘草炙芍藥人參秦芁獨活黄芩防己各一兩附子炮白术各三分乾薑五分右十六味切以水一斗三升先煮麻黄令一沸下之去沫内諸藥煮取五升去滓内棗煎取三升分為三服老小人病服五合强人可取微汗忌生葱海藻菘菜生菜豬肉冷水桃李雀肉等物又鎮心丸療胃氣厥實風邪入藏喜怒愁憂心意不定恍惚善忘夜不得寐諸邪氣病悉主之方秦芁一兩栢實當歸乾漆熬白斂杏仁去皮尖熬芎藭各三分澤㵼一兩乾地黄六兩防風人參各四兩甘草一兩白术薯蕷茯苓乾薑各二分麥門冬去心二兩前胡四分右十八味𢷬下篩以蜜和為丸如梧子大先食飲服十丸日三不知稍增之忌桃李雀肉海藻菘菜蕪荑酢物並出第十六卷中崔氏療風邪虚悸恍惚悲傷或夢寐不安鎮心湯方茯神半夏洗生薑各四兩羚羊角屑當歸人參防風芎藭杏仁去皮尖桔梗各二兩龍齒碎綿裹石膏碎各三兩綿裹防己桂心各一兩半竹瀝一升右十五味切以水一斗煮減半内竹瀝煎取二升八合去滓分温三服相去如人行十里乆忌酢物羊肉豬肉餳生葱等物又别離散療男子女人風邪男夢見女女夢見男交歡日乆成勞愁悲憂恚怒喜無常日漸羸瘦連年嵗月深乆難療或半月或數月日復發者方楊上寄生三兩炙菖蒲細辛附子炮乾薑薊根一云苧根天雄炮桂心各一兩白术二兩茵芋二兩炙右十味合𢷬下篩以酒服半方寸匕日三不飲酒用童子小便調服合藥勿令婦人雞犬見之勿令病人見合藥見者令邪氣不去禁之為驗忌生葱生菜豬羊肉桃李雀肉餳等物小品同並出第七卷中五邪方五首深師五邪丸療心驚恐夢寤愁憂煩躁不樂心神錯亂邪氣經入五藏徃來煩悶悲哀啼泣常如苦怖吸吸短氣當發之時恍惚喜卧心中踊踊忽然欲怒癲倒手足冷清氣乏鬼邪氣所中涉於藏腑食即嘔逆除氣定心神方芎藭龍角無角用齒茯苓紫石英研防風厚朴炙鐵精研甘草炙各四分逺志六分去心丹參大黄梔子仁桂心細辛菖蒲椒汗去目人參乾薑附子炮吳茱茰各五分芥子三分禹餘粮七分研右二十二味𢷬下篩和以蜜丸如梧子大未食服二十丸夜服十丸棗湯下不知増之忌海藻菘菜生葱生菜豬羊肉餳等物又五邪湯療風邪恍惚悲涕泣狂走如有神之狀身體强直或疼痛口噤候痺水漿不通面目變色甚者不識人方菖蒲秦芁桂心當歸禹餘粮人參附子炮黄芩甘草炙逺志去心防風各一兩龍骨赤石脂茯苓芍藥芎藭防己各二兩右十七味𢷬下篩作麤散調和取水二升一方取東流水煮小沸内散二兩煮取一升五合未食服五合日再夜一分作十二裹重裹令密勿令泄氣忌羊肉餳海藻菘菜酢物並出第八卷中范汪五邪湯療五邪氣入人體中鬼語諸妄有所語悶亂恍惚不足意志不定發作來往有時方人參白术茯苓菖蒲茯神各三兩右五味切以水一斗煮取三升先食服八合日三忌桃李雀肉羊肉餳酢物並出第四十二卷中古今録驗五邪湯主邪氣啼泣或歌或哭方禹餘粮研防風桂心芍藥逺志去心獨活甘草炙人參石膏碎綿裹牡蠣熬秦芁各一兩白术防己菖蒲雄黄研茯神蛇蜕皮炙各一兩右十七味𢷬麤篩以水一升半内三方寸匕煮二沸去滓服之日四服忌生葱海藻菘菜桃李雀肉餳醋等深師用黄丹不用雄黄餘同又茯神湯主五邪氣入人體中見鬼妄語有所見聞心悸動摇恍惚不定方茯神二兩人參茯苓各三兩赤小豆四十枚菖蒲三兩右五味以水一斗煮取二升半分為三服忌酢羊肉餳深師千金翼同並出第四卷中風驚悸方九首病源風驚悸者由體虚心氣不足心之經為風邪所乘也或恐懼憂迫令心氣虚亦受風邪風邪搏於心則驚不自安驚不已則悸動不定其狀目睛不轉而不能呼診其脈動而弱者驚悸也動則為驚弱則為悸出第一卷中廣濟療熱風驚悸安心乆服長年鎮心丸方茯神人參龍齒研升麻石膏研黄芩茯苓麥門冬八分去心銀薄二百番研虎睛一具炙枳實炙白斂𤣥參芍藥葳蕤甘草炙各六分生薑二分右十七味𢷬篩蜜和丸每食訖少時以飲服如梧子大十五丸日二服漸漸加至三十丸不利忌海藻菘菜醋蒜麵粘食陳臭等物出第卷中深師大定心丸療恍惚驚悸心神不安或風邪因虚入藏語言喜忘胷脅滿不得飲食方人參桂心各三兩白术防己茯苓乾薑防風大黄茯神桔梗白斂各一兩牛膝十銖逺志二兩去心銀屑六銖右十四味𢷬合下篩以蜜丸如梧子大先食服五丸日三不知稍稍増之一方無牛膝而有茱茰一兩銀屑十銖餘悉同忌生葱酢物豬肉桃李雀肉等又補心湯療心氣不足其病苦滿汗出心風煩悶善恐獨苦多夢不自覺者咽喉痛時時吐血舌本强水漿不通手掌熱心驚悸吐下血方麥門冬三兩去心紫石英五分紫菀二兩桂心一尺一方二兩茯苓四兩一方一兩小豆二十四枚一方六合人參半兩大棗二十五枚擘甘草五寸炙一方一兩右九味切以水八升煮取二升四合羸人分作三服强人再服心王之時有血證可服耳一方説用藥兩數不盡同注之在下煮取多少服亦同忌海藻菘菜生葱酢物並出第十卷中千金療心虚寒隂陽寒損心驚掣悸語聲寛急混濯口喎冒昧好自笑厲風傷心荆瀝湯方荆瀝三升麻黄去節白术芎藭各四兩防風桂心升麻茯苓逺志去心人參羌活當歸各三兩防己甘草炙各二兩母薑切一升取汁右十五味切以水一斗先煮麻黄兩沸去沫次下諸藥煮取三升絞去滓下荆瀝薑汁煎取四升分為四服日三夜一忌海藻菘菜酢生葱桃李雀肉等物又大鎮心丸療心虚驚悸夢寤恐畏方紫石英茯苓防風人參甘草炙澤㵼各八分秦芁黄芪白术薯蕷白斂各六分麥門冬當歸各五分桂心逺志去心栢子仁石膏桔梗大黄大豆卷各四分熬椒汗去目芍藥乾薑細辛各三分右二十四味酒服如梧子大十五丸日再一方用棗膏丸忌海藻菘菜生葱豬肉生菜桃李雀肉等又小鎮心散療心氣不足虚悸恐畏悲思恍惚心神不定惕惕而驚方人參逺志去心赤小豆附子炮桂心細辛乾薑防風龍齒炙菖蒲乾地黄各二兩茯苓白术黄芪各四兩右十四味𢷬篩為散以酒服兩方寸匕日三忌羊肉餳桃李雀肉生葱生菜豬肉並出第十四卷中崔氏療熱風驚掣心忪恐悸風邪狂呌妄走者服此湯亦差朱四頻用之極效方茯神三兩杏仁三兩去皮尖兩仁切升麻白鮮皮沙參各二兩龍齒六兩炙寒水石一斤碎綿裹石膏二十兩碎綿裹生麥門冬去心四兩右九味切以水一斗二升煎取三升去滓分温為三服相去十里若甚者減水三升内竹瀝三升先用水煮九沸然後内竹瀝煮取三升服如上法忌酢物出第六卷中古今録驗茯神湯療風經五藏虚驚悸安神定志方龍骨二兩乾薑一兩半細辛一兩半白术一兩茯神三兩人參逺志去心甘草炙桂心獨活各二兩酸棗一兩防風二兩右十二味切以水九升煮取三升分為三服忌海藻菘菜桃李雀肉生葱生菜醋物又大竹瀝湯療大虚風氣入腹拘急心痛煩寃恍惚迷惑不知人或驚悸時怖吸吸口乾濇濇惡寒時失精明歴節疼痛或緩或不攝産婦體虚受風惡寒慘慘憒憒悶心欲絶者并療風痙口噤不開目視如故耳亦聞人語心亦解人語但口不得開劇者背强反折百脈掣動悉主之方秦芁防風茯苓人參各二兩茵芋烏頭炮黄芩乾薑當歸細辛白术各一兩天雄一枚炮甘草三兩炙防己二兩右十四味切以竹瀝一斗水五升煮取四升分服一升羸人服五合佳此湯令人痺寧少服也茵芋有毒令人悶亂目花虚人可半兩良風輕者用竹瀝三升水七升小重者竹瀝五升水五升風大劇停水用竹瀝一斗忌酢生菜海藻菘菜桃李雀肉等並出第一卷中風驚恐方三首病源風驚恐者由體虚受風入乘腑藏其狀如人將捕之心虚則驚肝虚則恐足厥隂為肝之經與膽合足少陽為膽之經主決斷衆事心肝既虚而受風邪膽氣又弱而為風所乘故驚恐如人將捕之出第一卷中廣濟療心虚熱風上衝頭面心係急時時驚四肢煩腰膝冷邪氣發神不定犀角丸方犀角屑防風人參升麻防葵㯽榔仁各五分青木香光明砂研牛膝各八分龍齒炙鐡精各六兩露蜂房炙銀箔研各三分右十三味𢷬篩蜜和為丸如梧子酒下二十丸至二十五丸日再服不利忌生血物熱麵蕎麥炙肉葵蒜粘食等出第一卷中深師續命湯療大風風邪入心或心痛徹背背痛徹心去來上下驚恐小腹脹滿微痛乍寒乍熱心中悶狀如微温進退無常面青或白或黄虚勞邪氣入百脈百病皆療之方人參甘草炙乾薑麻黄去節獨活當歸芎藭石膏碎綿裹各二兩附子一枚炮桂心白术細辛各三分防風五分芍藥二分秦芁一兩杏仁四十枚去兩仁尖皮黄芩一兩右十七味以水一斗煮麻黄十餘沸内諸藥煮取四升半去滓内棗十枚煎取三升分五服老小者五合此以下以意消息調和六腑安五藏無不損除無芎藭防己代之無獨活天雄代之無附子烏頭代之湯成之後服湯以椒十枚置湯中温令煖服之此與十二味西州續命湯療同俱療癲邪大風西中有十二味者中有大棗三十枚忌海藻生葱豬肉桃李生菜雀肉等又療五藏六腑血氣少亡魂失魄五藏晝夜不安惚惚善悲心中善恐怖如有鬼物此皆發於大驚及當風從髙堕落所致療之十黄散方雄黄五分熬人參五分蜀椒五分汗大黄四分朱砂三分研乾薑四分黄蘗二分山茱茰二分細辛二分黄芪三分澤㵼三分黄連一分蒲黄一分桂心三分麻黄去節一分黄孫一分牡蒙也一方云黄昬黄環三分黄芩三分右十八味𢷬篩為散未食温酒服一方寸匕日三稍増至二匕服此散體中筋力强者不須増人參氣力羸虚可増人參五分合十分忌豬肉冷水生菜生葱生血物等並出第八卷中崔氏同千金無椒朱砂乾薑風癲方七首病源風癲者由血氣虚風邪入於隂經故也人有血氣少則心虚而精神離散魂魄妄行因為風邪所傷故邪入於隂則為癲疾又人在胎時其母卒大驚精氣并居令子發癲其發則仆地吐涎沫無所覺是也原其癲病皆由風邪故也養生方云夫人見十步直牆勿順牆而卧風利吹人必發癲癎及體重人卧春夏向東秋冬向西此是常法其湯熨鍼石别有正方補養宣導今附於後養生方導引法云還向反望不見七通治欬逆胷中病寒熱癲疾喉不利咽乾咽塞又云以兩手承轆轤倒懸令脚反在其上元愈頭眩風癲坐地舒兩脚以繩絆之以大繩絆訖拖轆轤上來下去以兩手挽繩使脚上頭下不使離地自極十一通愈頭眩風癲乆行身卧空中而不墜落出第二卷中集驗風癲論曰凡癲病發則仆地吐涎沫無知若强掠如狂及遺糞者難療無方出第三卷中千金同千金療風癲方葶藶子熬研鉛丹栝樓虎掌各三分烏頭三分炮白术一分鴟頭一枚炙鐵精䕡茹各一兩椒汗大㦸炙甘遂天雄各二分炮右十三味末之以蜜和如梧子大服二丸日二忌桃李雀肉豬肉冷水經心録同名鴟頭丸又芎藭湯主風癲引脅牽痛發作則吐耳如蟬鳴方芎藭藁本䕡茹各五兩右三味切内酒一斗煮取三升頓服酒一升羸者二服取大汗深師同又方生天門冬十斤生地黄三十斤右二味取汁作煎服之忌鯉魚蕪荑又天門冬酒通治五藏六腑大風洞虚五勞七傷癥結滯氣冷熱諸風癲癎惡疾耳聾頭風四肢拘攣猥退歴節風萬病皆主之乆服延年輕身齒落更生髮白再黒方天門冬與百部相似天門冬味甘兩頭方百部細長而味苦令人利門冬汁一斗漬麴二升令發以米二斗準家法醖之春夏極冷下飯秋冬温如人肌酒熟取清服一盞常令酒相接勿至醉吐慎生冷酢滑雞豬魚蒜特忌鯉魚亦忌油脂此是一斗汁法餘一石二石亦準此以為大率服藥十日覺身體大痒二十日更大痒三十日乃漸止此是風氣出去故也四十日即覺心豁然大快似有所得五十日更覺大快當風坐卧覺風不著人身中諸風悉盡用米法先浄淘米暴炕令乾臨欲用時更别取天門冬汁漬米灑炊之餘汁拌飯取天門冬汁法浄洗天門冬乾漉去水切之𢷬押取汁三四遍令滓乾如草乃止此酒初熟味酸仍作臭泔腥氣但依式服之乆停即香美餘酒不及也封四七日佳凡八月九月即少少合至十月合擬到來年五月三十日以來相續服之春三月亦得合入四月不得合服酒時若得散服更得力倍速散方如左天門冬去心皮暴乾𢷬篩以上件酒服方寸匕日三加至三匕乆服長生凡酒亦得服之又療風癲方茯神白龍骨研龍齒研龍角研龍膽蔓菁子鐵精研乾薑各十分人參逺志去心黄連大黄各八分芎藭白芷黄芩當歸各六分桂心五分去皮右十七味末之蜜和丸湯服十五丸如梧子大日二稍稍加之以知為度忌酢物豬肉冷水生葱並出第十四卷中古今録驗療風癲六生散方菖蒲蒴藋一作雚蘆防風茵芋商陸根蜀附子炮各二兩右六味𢷬下篩酒服錢五匕日再服不知稍増以知為度忌豬肉冷水羊肉餳牛犬肉蒜等又侯氏黒散療風癲方菊花四十分防風白术各十分茯苓細辛牡蠣熬鍾乳研礜石泥裹燒半日研人參乾薑桂心芎藭當歸礬石如馬齒者燒令汁盡研各三分黄芩五分右十五味𢷬合下篩以酒服方寸匕日三忌桃李雀肉胡荽青魚鮓酢物生葱生菜並出第十卷中張仲景此方更有桔梗八分無鍾乳礜石以温酒下之禁一切魚肉大蒜常宜冷食六十日上即藥積在腹中不下也熱食即下矣冷食自能助藥力五癲方三方病源五癲者一曰陽癲發時如死人遺尿有頃乃解二曰隂癲坐小時臍瘡未愈數洗浴因此得之三曰風癲發則眼目相引牽縱反强羊鳴食頃方解由熱作汗出當風因以房室過度醉飲飽滿行事令心意逼迫短氣脈悸得之四曰濕癲眉頭痛身重坐熱沐頭濕䯻腦沸未止得之五曰馬癲發作時反目口噤手足相引身熱坐小時膏氣腦熱不和得之皆然診其脈心脈微澀為癲疾并脾脈𦂳而疾者癲脈也腎脈急甚為骨癲疾脈洪大而長者癲疾脈浮大附隂者癲疾脈來牢疾者癲疾三部脈𦂳急者癲可療發則仆地吐涎沫無所知若强掠起如狂及遺糞者難療脈虚則可療實則死脈𦂳弦實牢者生脈沈細小者死脈搏大滑乆乆自巳其脈沈小急疾不可療小牢急亦不可療出第二卷中古今録驗莨菪子散療五癲反側羊鳴目飜吐沫不知痛處方豬卵一具隂乾百日莨菪子三升牛黄八分研鯉魚膽五分桂心十分研右五味切以清酒一升漬莨菪子暴令乾盡酒止乃𢷬合下篩酒服五分匕日再當如醉不知稍増以知為度忌生葱等又鐵精散療五癲方鐵精一合研芎藭防風各一兩蛇牀子五合右四味合𢷬篩酒服一錢匕日三有效文仲范汪同又療五癲牛癲則牛鳴馬癲則馬鳴狗癲則狗吠羊癲則羊鳴雞癲則雞鳴五癲病者腑藏相引盈氣起寒厥不識人氣争瘲吐沫乆而得蘇雄黄丸方鉛丹二兩熬成屑真珠雄黄研水銀熬雌黄一方無各一兩丹砂半兩研右六味𢷬和以蜜又𢷬三萬杵乃丸先食服胡豆大三丸日再驚癎亦愈良忌生血物千金范汪同云各五兩小兒三丸如小豆卷並出第六中癎方三首廣濟療癎疾積年不差得熱即發水銀丸方水銀紙裹鍊麥門冬去心烏蛇脯炙鐵精研乾地黄各八分龍角研人參防風子芩升麻各六分熊膽四分研右十一味𢷬篩蜜和丸如梧子食後以生驢乳汁下二十丸漸漸加至三十丸日再不利忌蕪荑生菜熱麵蕎麥炙肉蒜粘食出第卷中千金大鎮心丸主諸癎醫所不救方虎睛一具酒漬一宿炙防風秦芁防葵龍齒研黄芩雄黄防己山茱茰茯苓鐵精研鬼臼人參大黄銀屑研乾薑牛黄研各四分寒水石六分研羌活升麻逺志白鮮皮細辛白薇貫衆麝香鬼箭各三分茯神石膏研天雄炮各二分蛇蜕皮一尺炙蜂房二分炙右三十二味𢷬篩蜜和酒服十五丸日二服加至三十丸忌醋物生菜豬肉冷水出第十四卷中崔氏云療風癎及風邪有鴟頭三枚炙無茯苓餘並同救急療癎少老増減之方竹筎一握衣中白魚七頭右二味以酒一升煎取二合頓服之出第八卷中風癎及驚癎方五首廣濟療風癎卒倒嘔沫無省覺方麻黄去節大黄牡蠣熬黄芩各四兩寒水石白石脂石膏研赤石脂紫石英滑石研各八兩人參桂心各二兩蛇蜕皮一兩炙龍齒六兩研甘草三兩炙右十五味𢷬篩為散八兩一薄以絹袋盛散藥用水一升五合煮取一薄取七合絞去滓頓服之日一服一方水二升煮散方寸匕取一升去滓服之少小百日服一合熱多者日二服三五日一服亦得本方無麻黄龍齒蛇蜕皮忌海藻菘菜生葱熱麵蕎麥豬肉蒜膩粘食又方弔藤皮麻黄去節各二分龍齒六分研綿裹銀一斤寒水石梔子擘知母石膏碎綿裹杏仁去兩仁皮尖研各十二分升麻十分子芩十分蛇蜕皮七寸炙蚱蟬四枚去足趐炙柴胡十分芍藥沙參各八分生葛汁五分蜜七合牡牛黄如大豆粒十枚煎成研下之右十九味切以水六升淡竹瀝二升合煮取二升四合絞去滓内杏仁脂葛汁蜜於微火煎攪不停手令餘二升三合成三四嵗一服二合五六嵗一服二合半日再服稍増兒若大便濇者加大黄十分慎熱麵炙肉魚蒜粘食油膩冷水並出第一卷中深師療大人風及少小驚癎痸瘲日數十發醫所不能療除熱方龍骨大黄乾薑各四兩牡蠣三兩熬滑石赤石脂白石脂桂心甘草炙各三兩右九味𢷬下篩韋囊盛大人三指撮以井華水二升煮三沸藥成適寒温大人服一升未滿百日服一合未能飲者綿裹筯頭内湯中著小兒口中以當乳汁熱多者日四服無毒以意消息之忌海藻菘菜生葱一方無大黄赤石脂桂心甘草出第九卷中崔氏療暴得驚癎立驗方朱四云極效弔藤皮茯神黄芩升麻白鮮皮沙參各二兩龍齒三兩石膏八兩蚱蟬七枚去翅炙研湯成内寒水石六兩碎研裹甘竹瀝二升湯熟内之右十一味切以水九升煮取三升温分三服相去六七里乆若小孩子患藥各減量取多少細細飲之立差忌醋物又療大人風引少小驚癎痸瘲日數十發醫所不能療除熱鎮心紫石湯方紫石英滑石白石脂石膏寒水石赤石脂各八兩大黄龍骨乾薑各四兩甘草炙桂心牡蠣熬各三兩右十二味𢷬篩盛以韋囊置於高涼處大人欲服乃取水二升先煮兩沸便内藥方寸匕又煮取一升二合濾去滓頓服之少小未滿百日服一合熱多者日二三服每以意消息之紫石湯一本無紫石英紫石英貴者可除之永嘉二年大人小兒頻行風癎之病得發例不能言或發熱半身掣縮或五六日或七八日死張思惟合此散所療皆愈忌海藻菘菜生葱此本仲景傷寒論方古今録驗范汪同並出第六卷中風毒方五首廣濟療風毒發即眼睛疼脚縱中指疼連肘邊牽心裹悶兩肋脹少氣力喘氣急欲絶不能食黄芪丸方黄芪黄連各七分防風甘草炙五分五加皮白鮮皮枳實炙各四分升麻車前子苦參炙麥門冬去心葶藶子熬巨勝各六分右十三味𢷬篩蜜和丸如梧子空腹以酒浸大豆下二十丸漸加至三十丸日二服不知増之忌海藻菘菜豬肉冷水熱麵炙肉蕎麥並出第一卷中深師芍藥湯療中毒風腫心腹痛達背迫氣前後如疰痛方芍藥細辛桂心甘草炙當歸吳茱茰獨活各二兩乾地黄二兩生薑五兩桃仁四十枚去皮兩仁尖碎右十味切以水九升煮取三升分為四服宜利者加大黄二兩忌海藻菘菜生葱蕪荑生菜並出第九卷中備急虎骨酒療男子女人骨體疼痛風毒流灌藏腑及至骨肉方虎骨一具炭火炙令黄色刮削去脂血搥碎取盡𢷬篩得數升絹袋盛清酒六升浸五宿隨多少稍稍飲之日二三盃酒盡更添文仲同又續命湯療毒風其病喉咽塞氣噎或口不能言或身體緩縱不能自勝不知痛處拘急腰背强引頭恍恍惚惚不得卧轉側綿絶欲死此毒風所作方麻黄三兩去節石膏碎綿裹乾薑各二兩防風一兩當歸芎藭甘草炙黄芩桂心各二分杏仁二十枚去兩仁尖皮碎右十味切以水九升煮取三升分服小取汗若口噤不能飲絞口與湯不過二三劑忌海藻菘菜生葱並出第九卷中千金逐風毒石膏湯方石膏如雞子大三枚碎綿裹麻黄三兩去節杏仁三十枚去皮尖兩仁碎雞子二枚甘草一尺指許大炙右五味切以水三升破雞子内水中洋令相得内藥煮取一升服之覆取汗汗不出燒石熨令汗出良忌海藻菘菜等物並出第八卷中風多汗及虚汗方五首深師療風多汗惡風四味防風散方防風五分澤㵼牡蠣熬桂心各三分右藥𢷬下篩為散先食酒服方寸匕日再忌生葱又療風汗出少氣方趙子髙法防風十分白术九分牡蠣三分熬右三味𢷬篩為散以酒服方寸匕日三増至二三匕惡風倍防風少氣倍术汗出面腫倍牡蠣忌桃李雀肉胡荽火蒜青魚鮓等物並出第九卷中延年療風虚止汗石膏散方石膏研甘草炙各四分右二味合𢷬下篩為散先食以漿水服方寸匕日三夜再服忌海藻菘菜等又療風虚汗出不止方秦芁附子炮石斛菖蒲白术桂心各三分麻黄根防風各五分右八味𢷬為散以酒服方寸匕日三忌羊肉餳豬肉冷水桃李雀肉生葱並出第五卷中刪繁療大虚汗出欲死若白汗出不止方麻黄去節附子炮各一兩牡蠣二兩熬右三味𢷬下篩以一合藥白粉一升合和令調以粉汗上一方粉二升忌豬肉冷水出第九卷中風熱方六首病源風熱者風熱之氣先從皮毛入於肺也肺為五藏上蓋候身之皮毛若膚腠虚則風熱之氣先傷皮毛乃入肺也其狀令人惡風寒戰目欲脱涕唾出候之三日内及五日内目不精明者是也七八日微有青黄膿涕如彈丸大從口鼻内出為善也若不出則傷肺變欬唾膿血也出第二卷中延年黄連丸主風熱氣發即頭面煩悶不能食兼欠呿眠睡不安方黄連十二分人參茯神各六分葳蕤四分豉一合熬生薑屑三分右六味𢷬篩蜜和為丸如梧子一服十丸食上飲汁下日二服加至十五丸二十丸忌豬肉冷水酢物又葳蕤飲主風熱項强急痛四肢骨肉煩熱方葳蕤三兩羚羊角屑人參各二兩葱白切一升豉一升綿裹右五味切以水五升煮取二升去滓内豉煎取一升五合去豉分温三服如人行八九里取微汗即差忌蒜麵脂魚文仲處又葳蕤丸主虚風熱發即頭熱悶不能食方葳蕤六分人參白术各五分甘草四分炙右四味𢷬篩蜜和為丸如梧子一服十丸食上飲汁下日三服加至十五二十丸忌桃李海藻菘菜雀肉等物文仲處並出第十卷中千金翼防風丸主肺間風熱旦朝好噴嚏方防風茯神各三分天門冬四分去心芎藭白芷人參各二分右六味𢷬篩蜜和丸如梧子酒服十丸日二服加至十五丸忌鯉魚鮓物蔣孝璋處又葳蕤丸主熱風衝頭面妨悶方葳蕤黄連各八分防風人參各六分茯神五分豆豉三合熬右六味𢷬篩蜜和為丸如梧子一服十五丸飲汁下日二服加至二十丸若冷用酒下之忌豬肉冷水酢物蒜熱麵出第十八卷中近效療熱風衝頂熱悶方訶梨勒一枚取大者芒硝三合醋一升右三味𢷬訶梨勒為細末并芒硝於醋中攪令消摩塗熱處日一二度張文仲處必效范汪同頭風及頭痛方一十首病源頭面風者是體虚陽經脈為風所乘也諸陽經脈上走於頭面運動勞役陽氣發泄腠理開而受風謂之首風病狀頭面多汗惡風病甚則頭痛又新沐中風則為首風又新沐未乾不可以卧使頭重身熱反得風則煩悶診其脈寸口隂陽表裏互相乘如風在首乆不差則風入腦則變為頭眩養生云飽食仰卧乆成氣病頭風又云飽食沐髮作頭風又云夏不用露面卧露墮面上令面皮厚喜成癬一云作面風其湯熨鍼石别有正方補養宣導今附於後養生方導引法云一手拓頥向上極勢一手向後長舒急弩四方顯手掌一時俱極勢四七左右換手皆然拓頥手兩向共頭欹側轉身二七去臂膊頭風眠睡又云解髮東向坐握固不息一通舉手左右導引手掩兩耳治頭風令髮不白以手復捋五通脈也又云熱食枕手卧乆成頭風目澀又云端坐伸腰左右傾頭閉目以鼻内氣除頭風自極七息止又云頭痛以鼻内徐吐出氣三十過休又云欲治頭痛閉氣令鼻極偃卧乃息汗出乃止又云义兩手頭後極勢振摇一七手掌飜覆安之二七頭欲得向後仰之一時一勢欲得欹斜四角急挽之三七去頭掖膊肘風出第二卷中千金療頭風方附子一枚中形者炮裂鹽附子大右二味作散沐頭畢以方寸匕摩頂上日三忌猪肉冷水等又方服荆瀝不限多少取差又方又𢷬蒴藋根二升酒二升漬服汁又方蔓荆子二升酒一斗絹袋盛浸七宿温服三合日三又方臘月烏雞屎一升炒令黄末之絹袋盛酒三升浸温服之多少任性常令醺酣又方七月七日麻勃三升麥子一碩末相和蒸之沸湯一碩五斗三遍淋之煮取一石神麴二十斤漬之令發以黍米兩石五斗釀之熟封三七日服清一升百日中身澀皮八風五藏骨髓伏風百病悉去又方生油二升鹽一升末油煎一宿令消盡塗頭石鹽尤良又方大豆三升炒令無聲先以一斗二升瓶盛九升清酒乘豆熱即傾著酒中密泥頭七日温服之並出第十三卷中延年療風熱頭痛掣動方防風黄芩升麻芍藥各二兩龍骨石膏碎各四兩乾葛三兩竹瀝二升右八味切以水六升和瀝煮取二升六合去滓分温三服日晚再忌蒜麵猪肉油膩又療風勞氣吐逆不能食四肢骨節酸疼頭痛頂重方茯苓三兩枳實炙橘皮人參芍藥各二兩生薑四兩右六味切以水五升煮取三升去滓分温三服日晚再忌麵蒜醋物並出第十卷中風頭眩方九首病源風頭眩者由血氣虚風邪入於腦而引目系故也五藏六腑之精氣皆上注於目血氣與脈并上為系上屬於腦後出於項中逢身之虚則為風邪所傷入腦則腦轉而目系急目系急故成眩也診其脈洪大而長者風眩又得陽維浮者蹔起目眩也風眩乆不差則變為癲其湯熨鍼石别有正方補養宣導今附於後養生方導引法云以兩手拘右膝著膺除風眩又云凡人常覺脊背倔强不問時節縮咽髆内仰面努髆并向上頭左右兩向挼之左右三七一住待血行氣動住然始更用初緩後急不得先急後緩若無病人常欲得旦起午時日没三辰别二七徐寒熱病脊腰頸項痛風痺口内生瘡牙齒風頸頭眩衆病盡除又云大寒不覺暖熱乆頑冷患耳聾目眩病乆行即成法法身五六不能變也又云低頭不息六通治耳聾目癲眩咽喉不利又云大前側牢不息六通愈耳聾目眩隨左右聾伏並兩膝耳著地牢强意多用力至大極愈耳聾目眩病乆行不已耳聞十方亦能倒頭則不眩也出第二卷中千金療風頭眩口喎目痛耳聾大三五七散方天雄細辛各三兩山茱茰乾薑各五兩薯蕷防風各七兩右六味𢷬篩為散清酒服五分匕日再不知稍稍加之忌猪肉生菜又療頭風目眩耳聾小三五七散方天雄三兩炮山茱茰五兩薯蕷七兩右三味𢷬篩為散以清酒服五分匕日再不知稍増以知為度忌猪肉冷水並出第十三卷中崔氏療忽頭眩運經乆不差四體漸羸食無味好食黄土方白术三斤麴三斤右二味𢷬篩酒和併手捻丸如梧子暴乾飲服二十枚日三忌桃李雀肉等又療風眩飜倒無定方獨活六兩枳實炙三兩石膏碎綿裹蒴藋各四兩右四味切清酒八升煮取四升頓服之以藥滓熨覆取汗覺冷又内鐺中温令熱熱又熨之即差文仲肘後千金同又療頭痛眼眩心悶隂雨彌甚方當歸山茱茰各一兩防風柴胡薯蕷各二兩雞子二枚熟去皮打黄碎右六味𢷬下篩用前雞黄和散令調酒服方寸匕日三並出第六卷中延年薯蕷酒主頭風眩不能食補益氣力方薯蕷白术五味子碎丹參各八兩防風十兩山茱茰二升碎人參二兩生薑屑六兩右八味切以絹袋盛酒二斗五升浸五日温服七合日二稍加忌桃李雀肉等出第十卷中古今録驗九江太守獨活散療風眩厥逆身體疼痛百節不隨目眩心亂反側若癲發作無常方獨活四分白术十二分防風八分細辛人參乾薑各四分蜀天雄炮桂心各一分栝樓六分右九味𢷬合細篩旦以清酒服半方寸匕日再忌桃李雀肉猪肉冷水生菜生葱等物又防風湯療風眩嘔逆水漿不下食輒嘔起即眩倒發作有時手足厥方防風白术防己乾薑甘草炙各一兩附子炮桂心各十兩蜀椒一百枚汗右八味切以水四升煮取一升半分為三服忌猪肉冷水生葱海藻菘菜桃李雀肉等出第四卷中近效白术附子湯療風虚頭重眩苦極不知食味暖肌補中益精氣又治風濕相搏骨節疼痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣身體微腫者方白术三兩附子二枚炮甘草二兩炙桂心四兩右四味切以水六升煮取三升分為三服日三初服得微汗即解能食復煩者將服五合以上愈忌海藻菘菜猪肉生葱桃李雀肉等此本仲景傷寒論方頭風旋方七首廣濟療熱風頭旋心悶衝風起即欲倒方麥門冬去心山茱茰茯神苦參各八分地骨皮薯蕷人參蔓荆子沙參防風芍藥枳實大黄各六分甘菊花龍膽各四分右十五味𢷬篩蜜丸每食訖少時以蜜水服如梧子大二十丸日二漸加至三十丸不利忌酢物熱麵炙肉蒜猪肉魚粘食又療頭面熱風頭旋眼濇項筋急强心悶腰脚疼痛上熱下冷健忘方肉豆蔲十顆去皮人參犀角屑枳實炙各六分黄連白术大黄各八分甘草炙苦參旋復花各四分㯽榔仁十顆右十一味𢷬篩蜜和丸如梧子以酒飲服二十丸漸加至三十丸日三服無問食前後服之不利忌生菜熱麵蕎麥酒蒜猪肉海藻菘菜桃李雀肉等又療心虚感風頭旋心忪痰飲築心悶惽惽惚惚不能言語宜微吐痰此候極重秦芁飲子吐方秦芁常山人參羚羊角屑各二兩甘草三兩生用右五味切以水六升煮取二升絞去滓分温二服日再如人行四五里乆進一服取快吐不利忌生菜生葱熱麵蕎麥猪肉魚海藻菘菜並出第一卷中貼頂膏療頭風悶亂鼻塞及頭旋眼闇皆主之方萆麻去皮杏仁去兩仁皮尖石鹽芎藭松脂防風右六味等分先𢷬石鹽以下四種為末别𢷬萆麻杏仁相次入訖即臘紙裹之有病者先灸百㑹三壯訖刮去黒毛使浄作一帛貼子裁大於灸處塗膏以貼上兩日三日一易之其瘡於後即爛破膿血出及帛貼之似爛柿蒂出者良一方用膿兼前七物相和出第三卷中延年療頭風旋不食食即吐方前胡三兩白术防風枳實炙茯神各三兩生薑四兩右六味切以水六升煮取二升去滓分温三服忌桃李雀肉酢又療風邪氣未除發即心腹滿急頭旋眼運欲倒方芎藭獨活防風白术杏仁去尖皮枳實炙各二兩茯神三兩生薑四兩羚羊角屑黄芩各一兩右十味切以水九升煮取三升分為三服日三忌桃李雀肉大酢蒜麵等又療風痰氣發即頭旋嘔吐不食防風飲方防風人參橘皮各二兩白术茯神各三兩生薑四兩右六味切以水六升煮取三升去滓分温四服中間任食一日令盡忌大醋桃李雀肉蒜麵等物並出第十卷中癮疹風疹一十三首俗呼為風矢者是也黄帝素問曰風邪客於肌中肌虚真氣致散又被寒搏皮膚外發腠理淫氣行之則痒也所以癮疹瘙疾皆由於此有赤疹忽起如蚊蚋啄煩痒重沓壟起搔之逐手起也刪繁同深師療十種疹散方鬼箭甘草炙白斂白术礬石熬各一兩防風二兩右六味𢷬篩以菜米粉五合極拭身以粉内藥中𢷬合一服五分匕日三中間進食不知増之忌海藻菘菜桃李雀肉等出第十卷中千金癮疹百療不差方景天一斤一名護火草右一味𢷬絞取汁塗上熱炙摸之再三即差又方黄連芒硝各五兩右二味以水六升煮取四升去滓洗之日四五度良忌猪肉冷水范汪同又療風痺癮疹方以酒六升煮大豆三升四五沸服一杯日三又方蛇牀子二升防風三兩生蒺藜二斤右三味切以水一斗煮取五升漬綿拭之日四五范汪同又方白术三兩戎鹽半兩黄連黄芩芎藭細辛莽草茵芋各一兩礬石半兩右九味切以水一斗煮取三升洗之日三又方馬藺子蒴藋茺蔚子礬石蒺藜茵芋羊桃篇蓄各二兩右八味切以酢漿水二斗煮取一斗二升内礬石洗之日三范汪無馬藺並出第二十三卷中崔氏療風疹遍身方麻黄去節生薑各三兩防風二兩芎藭芍藥當歸蒺藜子甘草炙獨活烏喙人參各一兩右十一味切以水九升煮取二升八合絞去滓分温三服訖進粥食三日慎生冷酢滑猪肉冷水海藻菘菜出第四卷中延年塗風疹蒴藋湯方蒴藋根切蒺藜子羊桃切楮枝切茺蔚子石鹽各半升辛夷仁礬石各三兩右八味切以水一斗煮取三升去滓内鹽攪令消用塗風疹上下塗之一方有菟藿又方取枳實以醋漬令濕火炙令熱適寒温用熨上即消文仲處並出第十卷中古今録驗療三十嵗癮疹耳目皆合春秋輒發方於南屋東頭第一梁壁外以細灰厚布地大小足容兩脚躡灰上訖使病人徑去勿反顧灸脚十指間灸灰上隨病人年為壯數車緩道方已試神良范汪同出第十卷中元侍郎希聲集療卒風疹祕驗方石灰隨多少和醋漿水塗疹上隨手即滅出第一卷中近效療風疹方生葱一大束三尺以上圍者并根鬚鹽三大升以香漿水三石煮取兩石並大斗於浴斛中適冷熱浸雖積年患者不過三兩度浸必差風搔身體癮疹方五首病源邪氣客於皮膚復逢風寒相折則起風搔癮疹若赤胗者由涼濕搏於肌中之熱熱結成赤疹也得天熱則劇取冷則滅也白疹者由風氣搏於肌中之熱熱與風相搏為白疹也得天隂雨冷則劇出風中亦劇得睛暖則滅厚衣身暖亦差也脈浮而大浮為風虚大為氣强風氣相搏即成癮疹身體為癢養生方云汗出不可露卧及浴使人身振寒熱風疹也出第二卷中深師療風搔癮疹如漆瘡連心中悶方天雄炮蝭母知母也牛膝各四分防風六分桂心乾薑細辛人參各三分栝樓五分白术八分右十味𢷬篩先食服半錢匕日再不知稍増之忌猪肉生葱生菜桃李雀肉等又療風搔身體癮疹粉散方烏頭炮桔梗細辛白术各一兩右四味𢷬篩以鈆朱為色粉四升和令調以粉身范汪同並出第十卷中千金療風搔癮疹方牛膝末酒服方寸匕日三并主骨肉疽癩病及㾦瘰出第二十三卷中延年蒴藋膏主身癢風搔癮疹方蒴藋根切蒺藜子各一升附子獨活犀角屑薔薇根白芷防風苦參及已升麻白斂防己各三兩川椒莽草青木香蛇牀子蛇銜草各二兩茺蔚子切一升枳實五枚炙茵芋二兩半切右二十一味切以苦酒漬令淹匝一宿明旦銅器中炭火上用猪膏五升煎令三上三下以候白芷色黄膏成絞去滓内不津器中用摩風疹張文仲同又茺蔚浴湯主身痒風搔或生癮疹方茺蔚蒺藜羊桃蒴藋根苗亦得漏蘆蒿各一斤鹽三斤右六味切以水三石煮取二石五斗去滓内鹽令消適寒温先飽食即入浴能良乆浸最好每至夜即浴浴訖即卧慎風如法並出第十三卷中風熱頭面疹痒方四首千金療風搔腫痒在頭面大黄㧺洗方大黄芒硝各匹分莾草二分黄連六分黄芩八分蒺藜五合右六味切以水七升煮取三升半去滓内芒硝訖帛㧺上日一過勿令近眼出第二十三卷中延年牡丹膏主項强痛頭風搔疹癢風腫方牡丹皮當歸芎藭防風升麻防己芒硝各六分芍藥細辛乾藍犀角屑漏蘆蒴藋零陵香各四分杏仁去兩仁皮尖碎梔子仁黄芩大黄青木香各三分竹瀝二升右二十味切以竹瀝漬一宿醍醐三升半煎於火上三下三上候芍藥黄膏成絞去滓以摩病上又犀角竹瀝膏主風熱發即頭項脈掣動急强及熱毒疹癢方犀角十二分屑升麻八分蒴藋根秦芁獨活白芨菊花白术防己白芷當歸防風芎藭青木香寒水石碎苦參漏蘆根各四分蒺藜子二合莽草二分枳實二枚四破梔子仁七枚竹瀝三升吳藍一兩右二十三味切以竹瀝漬一宿明旦於炭火上和猪脂五升煎令九上九下以候白芷色黄膏成絞去滓内於不津器中用摩風處日三張文仲同並出第七卷中肘後枳實丸療熱風頭面痒風疹如癩方枳實六分炙天門冬去心獨活蒺藜防風桔梗各五分黄連薏苡仁各四分菌桂一分半右九味𢷬篩蜜和丸如梧子飲服十五丸日再如能以酒和飲之益佳不限食之前後以意加減忌鯉魚生葱猪肉冷水出第四卷中一方有人參五分風搔癮疹生瘡方六首病源人皮膚虚為風邪所折則起癮疹寒多則色赤風多則色白甚者癢痛搔之成瘡出第二卷中深師療風癮疹或發瘡甚則胷急滿短氣欲吐方茵芋七分泰山者炙芎藭烏頭炮防風白斂乾薑各三分桂心二分右七味𢷬下篩為散服半錢匕日再忌猪肉生葱又療癮疹煩滿及血不止方取新濕馬矢絞取汁服二升微者一升立愈若乾者水濕取汁並出第十卷中延年療風疹癢悶搔之汁出生瘡洗湯方苦參一小斤漏蘆根一小斤枳實五小兩蒺藜一小斤楮莖葉一小斤嫩者右五味切以清漿水二升煮取一大升以綿沾拭癢處日八九度訖以粉粉拭處差又枳實丸主風熱氣發衝頭面熱皮膚生風疹瘙痒盛生瘡不能多食方枳實炙蒺藜子苦參各六分人參四分獨活天門冬去心菌桂各三分白术四分右八味𢷬篩蜜和丸如梧子一服十丸用薄酒下日二加至十五丸忌蒜熱麵鯉魚桃李雀肉生葱並出第十卷中又升麻犀角膏療諸熱風毒氣癢衝出皮膚搔即癮疹赤起兼有黄水出後結為膿窠瘡悉主之方升麻犀角屑白斂漏蘆枳實炙連翹生蛇銜草乾薑芒硝研湯成下各二兩黄芩三兩梔子二十枚擘蒴藋根四兩𤣥參三兩右十三味切以竹瀝二升漬一宿以成鍊猪脂五升煎令竹瀝水氣盡絞去滓内芒硝攪令凝膏成用摩患處日五六度益佳文仲同近效療風熱結疹搔之汁出痒不可忍方麻黄根五兩蛇牀子四兩蒺藜子礬石各二兩熬白粉二小升右五味𢷬篩生絹袋盛痒即粉之此方甚良風身體如蟲行方四首病源夫人虚風邪中於榮衛溢於皮膚之間與虚熱并故遊奕遍體狀如蟲行出第二卷中千金石南湯療六十四種風淫淫液液走人皮膚中如蟲行腰脊强直五緩六急手足拘攣癮疹搔之作瘡風尸身痒卒面目腫起手不上頭口石南炙乾薑黄芩細辛人參各一兩桂心麻黄去節當歸芎藭各六分甘草八分炙乾地黄三分食茱茰五分右十二味切以水六升酒三升煮取三升去滓分為三服取大汗勿觸風但是癮疹服之皆差忌蕪荑生葱生菜海藻菘菜等又療舉體痛痒如蟲齧皮上痒時瘙則皮脱作瘡方蒺藜子三升碎蛇牀子二升茺蔚子一升防風五兩大㦸一斤大黄二兩礬石三兩熬右七味切以酒四升水七升煮取四升去滓内礬石三上火燒用帛拭身上差止又方灸曲池隨年壯發即灸之神良並出第二十三卷中延年蒺藜子丸療熱風衝頭面痒如蟲行身上時有風疹出除風熱消疹兼補益堅筋骨倍氣力充實方蒺藜子六分黄芪獨活白芷防風薯蕷各三分枳實炙人參黄連各四分葳蕤地骨白皮各二分桂心一分右十二味𢷬篩蜜和為丸如梧子一服十丸酒下日二服加至十五丸中間欲服术煎及黄連丸並無妨忌猪肉生葱張文仲處出第三卷中癧瘍風方一十五首廣濟療癧瘍風方石硫黄三兩研雄黄一兩研硇砂附子生用各二兩右四味𢷬篩為散以苦酒和如泥塗瘍處乾即更塗以差為度出第五卷中集驗療癧瘍方苦酒於瓦甌底磨硫黄令如泥又取附子截一頭又磨硫黄上使熟將卧先以布拭瘍上數過乃以藥傅之即愈深師處文仲范汪延年同又方硫黄研礬石研水銀别研入竈墨右四味等分𢷬下篩内椀子中以葱葉中涕和研之臨卧以傅病上肘後同並出第九卷中刪繁療癧瘍方取五月五日車轍中水并牛蹄中水浴甚良出第九卷中千金療癧瘍方取三年酢磨烏賊魚骨先布磨肉赤即傅之良又方取塗中先死蜣蜋𢷬爛之當揩令熱封之一宿差止又方酢磨硫黄塗之最上又方雌黄研蛇蜕一具燒灰研槲皮燒灰研硫黄研右四味分等下篩以清漆和之塗白處欲塗時先以巴豆半截拭白處皮微破然後傅之不過兩三度即差並出第二十四卷中崔氏療癧瘍方取茵蔯蒿兩握以水一斗五升煮取七升以皂莢湯先洗癧瘍令傷然後以湯洗之湯冷更温洗可作三四度洗隔日作佳不然恐痛難忍出第四卷中救急療癧瘍方取青胡桃皮𢷬之并少許醤清和硇砂令相入如煎餅麵先以泔清洗之然後傅藥又方以醤汁研石硫黄作泥以生布揩破以傅瘍上又方以石硫黄薫之令汗出佳並出第五卷中古今録驗療身體癧瘍班駮女葳膏方女葳一分附子一枚炮雞舌香青木香各二分麝香方寸匕白芷一分右六味㕮咀以臘月猪膏七合煎内五物微火煎令小沸急下去滓内麝香攪調復三上三下膏成以浮石摩令小傷以傅之又方三淋蒴藋淋灰取汁熏之洗癧瘍訖醋研木防己塗之即愈神驗達奚送又蜀水花膏療癧瘍方蜀水花白附子麝香白斂商陸鷹屎白各二兩右六味切以猪膏二升合煎之沸三上二下膏成以傅上並出第十卷中白癜風方九首廣濟療白癜風方苦參三斤露蜂房炙松脂附子炮防風各三兩梔子仁五兩烏蛇脯六兩炙木蘭皮右八味𢷬篩為散一服一匕以酒下宜常喫蘿蔔菜勿食雞肉猪肉冷水熱麵生菜文仲同又方黒油麻一大升生地黄五大兩桃仁去兩仁皮尖三十枚熬右三味先退去油麻皮蒸之日暴乾又蒸之如此九度訖又暴取乾𢷬令極碎然後𢷬地黄桃仁羅之即搃相和加少蜜令相著一服一匙日再服和酒喫空喫亦得兼食諸肺尤妙忌蕪荑熱麵猪蒜油膩等又方礬石研硫黄研右二味等分酢和傅之並出第五卷中千金療白癜風方酒服生胡麻油一合日三稍加至五合慎生冷猪魚蒜百日服五升差又方揩上令破摘蘿摩白汁塗之日日為之取差為度崔氏療白癜風神效方劉袐監録送雌黄七分細研木蘭皮白术各八分苦參芎藭麻黄去節山茱茰甘草炙狗脊枳實炙各四分秦芁沙參細辛牛膝白斂人參當歸薯蕷白芷各五分防風附子炮枲耳子各六分右二十二味𢷬篩為散酒服方寸匕日再漸漸加至二匕忌生葱菜海藻菘菜猪肉桃李雀肉等出第四卷中古今録驗療疱白癜風商陸散方生商陸根切一升白斂天雄炮黄芩各三兩乾薑四兩附子炮躑躅花一升右七味𢷬篩酒服五分匕日三忌猪肉冷水千金同亦主癧瘍又療白癜風附子膏方附子炮天雄炮烏頭炮各三兩防風二兩右四味切以猪膏三升合煎之先服散白癜上以膏傅之一方無防風又方蘿摩草煮以拭之取差並出第八卷中白駮方七首集驗療頸項及頭面上白駮侵淫漸長有似癬但無瘡可療之方乾鰻鱺魚脂以塗之先洗拭駮上外把刮之使磣痛拭燥然後以魚脂塗之一塗便愈難者不過三塗之深師千金同又方取蛇蜕皮熟摩之數百過棄皮置草中深師千金同又療身體白駮方取木空中水洗之𢷬桂屑唾和傅駮上日三千金文仲同並出第七卷中古今録驗療面白駮方出徐王弊帛蟬頸箒甑帶脯腊履底蛇皮右七味等分以月蝕之夕盛蝕時合燒之𢷬篩以酒服方寸匕日二二服止以淳苦酒和塗白上一抍除之又方荷葉裹鮓合葉相和更裹令大臭爛先拭令熱傅之即差二公主方又療舉體苦白駮經年不差此風虚生菖蒲酒方陸地菖蒲細切一石别煮天門冬一斤去心天雄三兩去皮生用麻子仁一升茵芋乾漆乾地黄逺志去心各三兩露蜂房五兩苦參一斤黄芪半斤獨活石斛各五兩柏子仁二升蛇皮長三尺大蓼子一升右十六味㕮咀之以絹囊盛著先以水二斛五斗煮菖蒲根取八斗以釀一斛五斗米許用七月七日造冬月酒成漉糟停藥著器中下消減令人延年益夀耳目聰明氣力兼倍一劑不覺更作尤妙當以差為期更重煮菖蒲去滓取汁以漬洗悉益佳禁食羊肉餳鯉魚猪肉蕪荑雞犬生冷十日酒定熟須去滓佳並出第八卷中外臺祕要方卷十五
