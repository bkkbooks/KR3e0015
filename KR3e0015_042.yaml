body:
  text: 外臺秘要方卷三十八唐王燾撰乳石發動熱氣上衝諸形候解壓方五十二首論曰夫乳石之性緩而且速能悍風寒逐暑濕導經脉行飲食之氣在隂即補其不足在陽即能發其炎隂盛陽虚則二儀亢位所以炎上府之受邪則表熱氣隔至隂之伏也脉形陽浮而數隂伏而沈理之於經自然通泰若灸之於孫絡即血脉遄流或全抑之則乖於石性理而兼助則表裏周榮若遇小發可自勞力按摩不可即治熱不已者别法隨事擇用解散方療寒熱胷中塞面腫手足煩疼是鍾乳發宜服生麥門冬湯方生麥門冬四兩去心豉三升綿褁葱白切半斤右三味以水八升煮取三升分服體氣熱是客熱當自漸加衣物雖似惡加之後必佳忌如常法此方甚良千金翼同又壓丹石發方天台山國清師所𫝊用杏仁一百枚去皮尖右一味以水二升於盤中研之絞取汁令盡以白麵二升用杏仁汁溲作餺飥還以杏仁汁煮務令極熟其病者量性多少噉之令盡訖又取美酒數升煮十餘沸候熱訖病者量性多少飲之徐令盡盖覆安卧初覺心悶頃間四體輕虚一服三年不發大効又療乳石發方甘草炙麻黄去節各一兩右二味切以水三升煮取半升和清酒半升其患者先湏火邊炙熱徹欲汗承熱服令盡盖衣卧湏臾大汗即差千金翼同又若因食倉米臭肉動乳方必湏葱豉湯細細服之五六度即差千金翼同又食飲損者方於葱豉湯中加當歸一兩煎之去滓分服即差若未可即服蘆根湯千金翼同又若已服安和藥仍不退者此小觸動服葱豉等湯不解者可服蘆根湯解壓之方蘆根地榆五加根各一兩右三味切以水三升煮取一升服之即解千金翼同又若得時氣冷熱不調動乳者皆是寒熱所致其狀似瘧乆乆不療損人性命縱服湯藥必終難差宜作生熟湯浴之方以大器盛湯若大熱投少冷水即於湯中坐勿動湏臾百節開寒熱之氣皆從毛孔中出變作流汗若心中熱悶者還服少許熱湯即定乆乃出湯以衣被覆盖睡豁然平復如患太重者不過三兩度即差千金翼同又解一切石發方僧珎法胡豆半升右一味𢷬研之以水八合絞取汁飲之即差虚弱人半升中平以意量之又大黄丸方大黄五兩𢷬末大麻子五兩熬勿令焦待冷於簸箕中以手挼去皮取入研如膏右二味合治令匀以蜜和丸如梧子大以湯飲下十丸至二十丸以宣利為度此方甚妙通陽壅秘服之尤良忌如常法華陀薺苨湯療石毒卒發者慄慄如寒或欲食或不欲食若服紫石英發毒者亦熱悶惽惽喜卧起止無氣力或寒皆是腑臟氣不和所生療之方薺苨四兩甘草藍子各一兩茯苓黄芩各二兩蔓菁子一升人參一兩芍藥二兩右八味切以水一斗煮蔓菁子取八升去滓内餘藥煎取三升去滓分三服日三若虚弱倍人參若氣上加茯苓薺苨一兩甚良千金翼云若體寒者倍人參減黄芩若氣上倍茯苓加薺苨一兩應楊州所得異故單葱白湯藥療沈體中數年或更發宜服之方葱白一斤切右一味以水五升煮取二升半去滓服盡未定更作服之至三劑即差止又療乳石發樊尚書傳蕭亮常服良驗余因熱重盛切慮不安遍於李䖍祐率更呉昇諾議處求解法亦稱此味竒絶方甘草二兩炙生犀角一兩牛屑萎蕤三兩右三味切以水四升煮取一升半分服甚効又方烏豆二升右一味以水九升煮取五升去滓以銅鉢重湯煮取一升每服一匙盡即差未定更作佳又若盛熱發方取無灰酒煮三五沸承稍熱服之以布手巾兩箇浸水以搨熱處取差為妙更互用之又療諸乳石發動口乾寒熱似鬼神為病方麥門冬八分去心五加皮犀角屑黄芩各四分萎蕤四兩梔子四分升麻四兩大黄五分芍藥四分大青甘草炙各三分苦參六分右十二味𢷬篩宻丸食後以蜜水服十四丸漸加至二十丸日再以意加减千金翼同又療諸石發熱困苦方猪脂五合成鍊者芒硝四分葱白五合切豉心三合右四味以水三升煮葱豉取一升二合去滓下猪脂芒硝分三服未差再服千金翼同又療石發熱盛充實四體煩滿脉急數大小便赤澀升麻湯方升麻黄蘗黄連甘草炙各三兩黄芩四兩芍藥六兩白鴨通五兩淡竹葉切一升梔子十四枚豉一升大黄三兩右十一味切以水二斗煮竹葉鴨通取一斗一升去滓澄清取一斗内諸藥煮取四升去滓分三服若上氣者加杏仁五合滿加石膏二兩千金翼同又常防備熱發法方麥門冬三兩去心甘草一兩人參三兩右三味𢷬篩蜜和丸如彈丸一日服三丸甚良千金翼同又三黄湯折石熱通氣泄腸胃解肌方大黄三兩别漬黄芩二兩梔子一七枚甘草二兩炙豉一升麻黄一兩去節右六味切以水九升煮麻黄去上沫下諸藥煎取三升半下大黄三五沸去滓分服得利以差止千金翼同又方黄芩二兩豉五合綿褁葱白五合梔子二七枚右四味切以水四升煮取一升八合去滓分服三劑差止千金翼同又療石發身熱如火燒黄芩湯方靳邵法黄芩三兩枳實二兩炙厚朴炙栝樓芍藥各一兩梔子十四枚甘草炙二兩右七味切以水七升煮取三升去滓分三服忌如常法千金翼同又療熱氣結滯經年數數發方胡荽半斤五月五日採隂乾如此物可先收貯備之右一味以水七升煮取一升半去滓分服未差更作服春夏取葉秋冬取根莖用又療膈上熱方柴胡黄芩甘草炙茯苓麥門冬去心枳實炙生地黄各三兩竹葉切一升右八味切以水一斗煮取三升去滓分服又方取河中石不限多少燒令赤投小便一大升候冷頓服之良又方取寒水石長含以差為度又方取黄連水漬服一升最良又療心下煩熱悶内熱不安冷石湯方冷石半兩細研之右一味以水攪如白飲頓服不差更作又去石毒麻黄湯方麻黄二兩去節甘草二兩炙豉一升綿褁右三味切以水五升煮取一升去滓分温再服之又猪膏湯解大散方猪膏二兩烊之豉一升右二味以水三升煮豉取汁一升内猪膏服七合日三服石人飲食宜清冷不宜熱熱即氣擁痞石唯酒一種湏熱也千金翼同又療乳石發如寒熱狀似瘧方前胡半升黄芩甘草炙生薑知母各三兩牡蠣熬石膏各六兩大棗二十枚擘右八味切以水一斗煮取四升去滓分為四服取差為度此方甚良又療胷背頭中遊熱補虚方黄芪芍藥各三兩甘草炙桂心各一兩茯苓人參石膏生乾地黄生薑麻黄去節麥門冬去心各二兩大棗三十枚擘竹葉切一升右十三味切以水一斗二升煮竹葉取一斗去滓下諸藥煎取三升去滓分服之一方無茯苓有大黄又療石發諸藥療不差方以硝石含之效又方若熱盛可向冷地卧腰下以厚物薦之腰以上令薄使受稍似凉即起不得過度又三黄丸療虚熱氣壅不通方黄連黄芩各三兩大黄二兩右三味𢷬篩宻丸以湯飲下十五丸至二十丸如梧子以利即差又療精神如失氣攻上骨熱方柴胡升麻黄芩澤㵼各三兩淡竹葉切一升生地黄切二升乾藍茫硝各二兩右八味切以水八升煮取三升去滓下芒硝分服取利止忌如常法又療石熱將行體微筋嗇即此方從叔汾州刺史河東公口受此法余乆服石每服此飲頗甚為効方茱萸萎蕤各一兩豉心一升葱白一握右四味切以水四升煮取減半分服又療服諸藥石後或熱不禁多向冷地卧又不得食諸熱麵酒等方五加根皮二兩右一味切以水四升煮取二升半候石發之時便服未定更作服又療諸石盛熱不除心腹滿小便赤大便不利吐逆氣衝胷口焦乾目赤重熱三黄湯方黄連芒硝各二兩甘草炙大黄一兩黄芩三兩右五味切以水五升煮取二升半去滓下芒硝分服以利為度甚良妙又療天行丹石發動上下擁隔不通頭痛口苦不能食立効方醴泉杜主薄傳青木香紫葛紫參𤣥參丹參苦參人參石膏代赭細辛桂心獨活蓯蓉乾薑齊鹽呉藍各一分巴豆二分去皮心熬右十七味𢷬篩宻和丸如梧子有患服三丸强者服五丸餘即量與之以飲下得快利三兩行即差忌如常法又療石發内有虚熱胷中痞滿外風濕不解肌肉拘急方香豉一升梔子十四枚葱白一握黄芩二兩右四味切以水七升煮豉五六沸去豉内藥煮取三升分三服之不止更為之千金翼同又療熱腫初起始欲作癰便宜服升麻湯方升麻大黄黄芩芍藥枳實各二兩甘草炙當歸各一兩右七味切以水八升煮取三升分三服腫即消散如熱加黄芩三兩千金翼同又淡竹葉湯方淡竹葉切一升茯苓白术甘草炙枳實炙梔子人參各一兩大黄二兩黄芩三兩右九味切以水七升煮取三升分服以差止又療服散不得力食不下飲酒解散輒嘔吐七味三黄湯方豉五合綿褁梔子十四枚枳實八分炙甘草炙前胡大黄各一兩芒硝二兩右藥切以水七升煮取三升分服又増損竹葉湯解散下氣方黄連麥門冬去心竹葉切人參各二兩枳實炙梔子各一兩甘草炙茯苓各二兩右八味切以水八升煮取三升分服之差止又療心忪熱煩悶如火氣上方石膏八兩茯神萎蕤黄芩各四兩橘皮五味子乾藍麻黄去節甘草炙犀角屑各二兩杏仁去皮尖梔子各三兩右十二味切以水八升煮取三升分服之差止又療虚勞下焦虚熱骨節煩疼肌肉急内痞小便不利大便數而少吸吸口燥少氣折石熱方大麻仁五合研䜴二升右二味以水四升合煮取一升五合分三服三劑即止千金翼同又療内熱結不除或更服散或以飲酒冷食澡洗猶不解或腹脹頭痛眼眶疼或先有癖實不消或連飲不食或時作心痛服此湯皆愈方甘草炙黄芩大黄各二兩右三味切以水五升煮取二升分三服千金翼同又散熱白鴨通湯方白鴨通五升以沸湯二斗半淋之澄清取一斗麻黄四兩去節豉二升冷石一兩梔子仁二十一枚甘草炙五兩石膏三兩碎右七味切以鴨通汁煮取六升去滓内豉煮三沸一每服五合若覺冷小便利濶其間若熱猶盛小便赤促服之不限五合宜小小勞漸漸進食不可令食少但勿頓多耳千金翼同又下氣除熱前胡湯方前胡黄芩甘草炙茯苓各二兩梔子仁枳實炙大黄各一兩杏仁六十枚去尖皮生薑三兩切右九味切以水九升煮取二升半分服又麻黄湯下氣解肌折熱方麻黄四兩黄芩甘草炙石膏各三兩碎升麻二兩梔子仁一兩右六味切以水一斗煮取三升半分三服之又療服升麻湯内解外不解者宜此麻黄湯方麻黄去節升麻大黄黄芩石膏各三兩碎甘草一兩炙梔子仁三合右七味切以水九升煮取三升分服之差止又療腹中無妨直患虚汗方澤㵼知母石膏各二兩碎當歸甘草炙人參桂心黄芩茯苓各三兩麥門冬三兩去心竹葉切三升右十一味切以水一斗二升煮竹葉取一斗去滓下諸藥煮取四升分服差忌如常法石發熱𠻳衝頭面兼口乾方六首論曰五藏之尊心雖為王而肺最居其上也肺為華盖覆其四藏合天之徳通逹風氣而肺母火也性慣受温而惡寒心火更炎上蒸其肺肺金被火傷則葉萎倚著於肝肺發痒即𠻳或因石増熱心肝虚弱不能傳陽至下焦遂被正陽俱躋變成𠻳矣或為發背或作癰頭也夫言惡寒則何以知也肺主皮毛皮毛遇寒即慄而粟起其肺𠻳亦萎倚著肝而成病亦猶木能扣金興鳴也凡如此先食養肺抑心肝虚熱和其腎即愈矣療石發熱衝頭面兼口乾𠻳方生麥門冬去心萎蕤石膏各三兩碎生地黄汁七合葱白一握和鬚乾葛四兩豉心三合右七味切以水七升煮取三升分三服忌如常法又療熱𠻳方取生䜴漬汁温之纔免冷食服訖即卧勿令入腰中故也以意消息之又天門冬煎主定肺氣去風熱明目止𠻳喘麤血腥乳石發冷而補之方通按天冬性冷而能補病虚熱者宜服天門冬汁一升生地黄汁二升生薑汁二合杏仁五合去皮尖研如膏白蜜八合牛酥五合欵冬花升麻百部根紫菀麻黄去節各二兩甘草四兩炙右十二味切以水八升煮麻黄去沫下諸藥煎取二升去滓澄濾銅器中㣲火煎去半下天門冬等汁次第下之錬成煎取一匙含咽之日三五度取差忌如常法又療上氣肺熱呼𠻳沸唾方麥門冬十分去心杏仁三十枚去皮尖研貝母生薑各六分切石膏八分碎黄芩五分甘草炙五味子白术各四分淡竹葉切一握白蜜一匙右十一味切以水四升煮取一升二合去滓内蜜分服若湏利入芒硝又療肺脹氣急呀嗷喘麤眠卧不得極重恐氣即絶紫菀湯方紫菀六分甘草炙茯苓各八分檳榔七枚碎葶藶子三分熬末之右五味切以水六升煮取二升去滓分再服又宜服丸主上氣呀𠻳不得卧卧即氣絶方芸薹子葶瀝熬各十二分馬兠苓十顆紫菀人參杏仁去皮尖皂莢去皮子炙白前甘草各六分炙漢防己八分右十味𢷬篩蜜和丸如桐子大服十丸至二十丸増減量之石發兼虚熱痰澼乾嘔方五首論曰凡人有五藏合則脾胃為水榖之府且國府足榖則足食足兵也人胃足食則榮衛不厥若人能食則能悦也隂陽和平有何患乎若服食之人皆増於熱失時不食則胃口乾焦胃口乾焦則土不足或因飲酒水而食少變為痰結酒水流下迎令上昇下焦無陽即陽虚也中府無榖上焦漸炎致陽嘔噦經曰陽數即嘔吐又曰嘔噦發下焦之間此之義也可以破痰結通水榖填胃府則無咎也夫通填之義不可虚其虚實其實岐伯曰㵼虚補實神去其室他藏皆倣此療因饑空腹飲酒飲水食少痰結心頭乾嘔方枳實三兩炙梔子仁一兩香䜴半升大黄二兩别浸右四味切以水六升煮取二升分再服忌如常法又療結熱澼心下腫胷中痞塞嘔逆不止鴈肪湯方鴈肪一具甘草炙當歸桂心芍藥人參石膏各二兩碎桃仁三十枚去皮尖大棗二十枚擘大黄二兩右十味切以水一斗二升煮鴈肪取汁一斗煮諸藥取五升去滓分服無鴈肪以鴈肉無鴈以鴨代之雞亦得又療嘔不止不下食方薤白一握橘皮一兩豉半升麥門冬二兩去心粟米一合右五味切以水三升煮取一升去滓細細服之差止又療熱發胷中痰醋乾嘔煩熱方半夏洗白薇各一兩乾薑一兩甘草半兩炙右四味切以苦酒五升煮取三升分服夫苦酒能令石朽爛故用之又療數振動煩悶嘔逆人參湯方人參甘草炙栝樓麥門冬去心各二兩黄芩蘆根各一兩右六味切以水四升煮取二升分四服差止石發吐血衂血方七首論曰五藏所藏心藏血也血之傷盛則心脱力制固無守自然流溢為陽氣傷故也或有衂血者加以肺風熱之謂也若益之於服石則客熱復盛榮衛増勞旋周無度則投虚而出出而多則傷榮氣色奪而黄乆不療則氣撮撮傷損先湏破汚血留好血調經絡平腑藏則愈也療石發熱盛吐血方生地黄五兩𢷬碎小薊根切一升黄芩二兩豉一升梔子仁三七枚右五味切以水五升煮取二升分温服之又衂血方生地黄汁小薊汁右二味隨多少以㸃鼻中兼服之良又療心腑中熱甚鼻中衂血不止方胡粉熬光墨末釡下墨末乾薑髮灰伏龍肝末等分右六種但得一物以兩碁子許以竹筒吹令入兩鼻孔中即止又方橘皮蒼耳莖葉翹遥莖葉生地黄雞蘇苖右五種但得一味𢷬絞汁服五六合即止如未定即更服之又療頭痛壯熱鼻衂血心上硬遍身疼痛四肢煩悶兩膊舉不得方小薊四兩青竹茹生麥門冬去心碎雞蘓各三兩生薑二兩切生地黄汁半斤右六味切以水九升煮取三升去滓分服之以止為度忌如常法又療卒吐血一二升口鼻俱出至一二斗者方生地黄汁小薊汁生麥門冬汁伏龍肝十匙右地黄等三味汁相和每服五合著伏龍肝末一匙許和攪服之以止為度忌如常法又療心悶吐血方生麥門冬八分去心生地黄二十四分碎甘草四分炙薺苊乾薑各六分茅根十分香豉五合以綿褁右七味切以水五升煮取二升去滓分服之忌如常法石發熱煩及渴方一十六首論曰凡人陽處其表隂處其裏則非純隂在其下復非純陽在其上皆湏隂陽通平隂陽通平則五氣不乏五氣不乏則人無病只如服石之人多為隂虚而服攝之過温則經脉湊溢或遭陽時亦發其證也正陽本自浮昇石力更藏陽氣客主兩陽併蒸肺肝故患渴也或藏實腑虚而生發背亦渴不獨兩陽為禍也且肺是庚辛庚辛畏火即告其子其子腎腎為壬癸雖子投而性惡寒陽雖得水暫寒而水潜流於下客水正水足為滂沱渴乃未除更増腎冷凡遇此候皆先泄溝瀆致隂氣於腎微理其石氣孰不痊乎療解散失度飲食冷熱不消虚脹吐清水而渴悶欲死方人參栝樓枳實炙甘草炙白术各一兩大棗二十枚擘右六味切以水六升煮取二升半分温二服差止又療發癰虚熱大渴方生地黄八兩竹葉切三升小麥二升黄芪黄芩通草前胡各三兩栝樓四兩芍藥升麻甘草炙大黄别浸知母茯苓各二兩人參當歸各一兩右十六味切以水二斗煮竹葉小麥取一斗去滓内餘藥煮取四升去滓分服之小便利除通草大熱者去人參當歸忌如常法又療客虚熱衝上焦胷中口乾燥頭面熱赤并渴方生葛汁生地黄生麥門冬汁白蜜各一升棗膏八合生薑汁二合右六味和煎之内蜜候如稀餳食後漸漸含之其功甚妙又療消渴止小便方黄連一斤金色者麥門冬八兩去心生地黄汁羊乳栝樓汁各三兩右五味𢷬上二味為末以汁相和藥末衆手一時丸如梧子食後以飲服二十丸忌如常法又療熱渴竹葉湯方淡竹葉切五升茯苓石膏各三兩碎小麥三升栝樓二兩右五味切以水二斗煮竹葉取八升下諸藥煮取四升去滓分温服忌如常法又療發癰盛患渴口乾排膿止渴方黄芪梔子仁栝樓生乾地黄升麻各二兩麥門冬去心芍藥各二兩黄芩一兩半右八味切以水一斗煮取三升服之差止忌如常法又療消渴方取螺二升右一味以一石江水浸養之傾澄取汁飲之經日放却更取新者漬之准前服又方竹根濃煮汁飲之又方煮青梁米汁飲之又方𢷬冬𤓰汁飲之又方冬麻子二升右一味𢷬以水煮三四沸飲之又方以水浸鷄子取清生服甚良又方黄蘗一斤右一味切以水一斗煮汁飲之又方桃仁五升去尖熬研白米三升右二味以水一斛煮取三升渴即飲之良又方石膏碎枳實炙茯苓各三兩右三味切以水九升煮取四升分服之又方茯苓半斤澤㵼四兩白术乾薑桂心各三兩小麥三升甘草二兩炙右七味切以水一斗煮小麥取八升入藥煎取五升分服之石發熱風頭痛心煩寒熱方三首論曰五行五藏皆互相生肝雖處中而為藏首位在甲乙懐養懐仁故應春而王也為心之母餘藏循而次生焉心為王主身神毅而無纎不察四藏為四鄙四鄙有憂王必懐憂四藏和平則王有悦悦則榮衛不錯憂則經絡患生心不受邪所病者為憂樂能致也肺為風府施於太穹為呼吸之門氣息之道也諸藏紊亂氣息皆形誰能出不繇户耳若熱風盛心憂即頭痛若過憂即心煩熱盛必寒寒盛必熱倚伏之道足可明焉皆繇風狂邪熱之謂也但平風熱抑狂邪榮衛自然通泰也療熱如火燒頭痛心煩悶乍寒乍熱胷中熱嘔逆方升麻前胡甘草炙黄連各二兩黄芩生地黄各三兩枳實炙梔子仁栝樓各一兩豉五合綿褁右十味切以水八升煮取三升分服忌如常法又療食訖心煩悶眩心下胷中不安方􅌲陳四兩大黄二兩梔子仁二十枚右三味切以水五升煮取二升分服即差又療頭疼欲裂方取當歸二兩清酒一升煮取六合飲至再服石發口瘡連胷面及身上心痛方一十四首論曰夫人痒者為虚痛者為實在表為虚在裏為實心肺虚熱衝胷口乾乾乆乃成瘡生膿則痒矣自然虚極非是實也藏者藏也為不能含藏陽氣使陽氣妄出發則日虚若獨肝家有風即木氣摶心故痛亦非真心痛苦真心痛只得半日而死為心不受邪故也療乳石熱發頭痛心痛胷恊脹滿寒熱手足逆冷或口生瘡爛或乾嘔惡聞食氣氣上欲絶乆虚者方前胡芍藥黄芩大黄甘草炙各二兩大棗二十枚擘右六味切以水八升煮取三升分服若堅實加茯苓二兩若胷滿塞加枳實一兩炙若吐逆加乾薑二兩若口燥加麥門冬二兩増減以意量之忌如常法又療食失度口中發瘡潄之湯方黄芩三兩升麻甘草炙各二兩石膏二兩碎右四味切以水五升煮取三升去滓冷含漱口吐却日十數過差止又療口瘡方子蘗四兩龍膽三兩黄連二兩升麻一兩右四味切以水四升煮取二升别取子蘗冷水浸投湯中令相得絞取汁稍稍含之取差忌如常法又若熱發腹内胷悉有瘡方升麻二兩烏梅十枚黄芩黄連栝樓甘草炙各一兩右六味切以水五升煮取半去滓含之咽亦不妨又療體赤熱煩悶口中瘡爛表裏如燒痛不能食方黄芩三兩梔子仁二十一枚香䜴二升大黄二兩右四味切以水四升煮取一升半去滓分服又塗飛雪湯方麻黄四兩去節石膏二兩碎黄芩三兩芒硝四兩右四味切以水八升煮取四升去滓内生雞子白二枚及芒硝攪令匀以拭瘡上取瘡差即止又療熱不散體生細瘡并熱不止方黄連芒硝各五兩右二味切以水六升煮取三升去滓内硝以拭瘡上取差為限又療紫石發動惡寒壯熱口舌乾焦方烏豆二兩右一味以水四升煮令稀稠得所如餳去豆下蜜二合更一兩沸以匙抄細細含之如腹中鳴轉欲利即停得利即差忌熱食陳臭物千金翼治發背癰疽又療石氣發熱身體微腫面生瘡方升麻萎蕤各六分黄芩紫雪各八分湯成下甘草炙犀角各四分梔子十四枚右七味切以水五升煮取二升内雪分服之以飛雪湯塗之即差千金翼同又療體卒熱生瘡麥門冬湯方麥門冬五兩去心䜴二升桂心人參各二兩甘草三兩炙葱白一斤右六味切以水一斗煮取三升去滓分服之忌如常法又療表裏俱熱身體生瘡或發癰癤大小便不利方芒硝湯成下黄芩知母甘草各二兩梔子仁二七枚大黄四兩右六味切以水五升煮取二升下芒硝分服忌如常法又療兩鼻生瘡熱痒内亦熱兼頭痛方麥門冬去心知母澤㵼甘草炙各二兩粳米五合竹葉切一升小麥二升右七味切以水一斗半煮竹葉小麥取九升去之内諸藥煮取四升去滓分服日三夜一忌如常法又療生瘡熱氣奔胷方豉一升葱白切梔子仁各十四枚右三味以水二升煮取九合去滓分服之忌如常法又療石熱發煩熱滿脹及體生瘡兼氣力弱方黄芩芒硝麥門冬各二兩大黄三兩梔子十四枚甘草一兩炙右六味切以水六升煮取二升分再服之石發腹脹痞滿兼心痛諸形證方七首論曰服石之人發狀非一或發於外陽則頭角皮膚作病癰腫頭痛是也或發於内隂則反冷藏虚口瘡吐血是也凡氣内温五藏外榮經絡石性清浄不喜煩穢目所覩鼻所聞皆欲馨香不願欎腐因成種種之病也或食陳臭生酸之物貯於胃腑胃腑不受推諸藏諸藏不受即肝膈痞滿或為臚脹而堅積便發心痛亦非心自然而痛為穢觸神氣也覺此候者可速滌腸胃無令留壅不然即成痰澼其心轉痛豈能不勉哉靳邵療寒過度成痰澼水氣心痛百節俱腫者大黄丸方大黄葶藶子熬豉各一兩杏仁去皮尖熬巴豆各三十顆去皮心熬右五味大黄𢷬篩末四味别𢷬如膏入少蜜和更𢷬一千杵以飲下一丸如麻子稍强至二丸三丸以意量之忌如常法又療赤石脂發心痛飲熱酒不解方葱白半斤切豉二升綿褁右二味以水六升煮取二升半分服之良又療大熱心腹滿脹方石膏半斤碎黄芩麻黄芍藥各二兩大青續斷各三兩右六味切以水八升煮取四升去滓分服之又療心腹痛不解若通身顫寒者榮衛不通人參湯方麻黄三兩去節人參枳實炙黄芩甘草炙茯苓各一兩右六味切以水五升煮二升分服之又療散發心痛腹脹兼冷熱相搏甘草湯方甘草炙枳實炙白术梔子各二兩桔梗三兩右五味切以水六升煮取三升分服之忌如常法又療腹脹頭痛眼眶疼先有癖實不消或飲酒下食内熱或時時心急痛方甘草炙黄芩大黄别浸麥門冬去心芒硝各二兩梔子三十枚右六味切以水七升煮取三升分服之忌如常法又療石發動上氣熱實不除心腹滿小便赤大便不利痞逆衝胷口乾燥目赤痛方大黄一兩别浸黄芩三兩黄連甘草炙芒硝麥門冬去心各二兩右六味切以水五升煮取二升入大黄更煎三五沸去滓分再服之石發熱目赤方一十一首論曰凡人五藏盡有風而發有髙下動有深淺則腎風發脚氣肝風目淚而暗肺風鼻鼽嚏而𠻳脾風肉緩而重心風恍惚而忘若加於熱亦隨藏觀候即肝風脅滿而怒喜静加之熱即目漠漠而暗若石氣兼之則赤而益痛或生努肉及腫而爛速可隨輕重㵼之不然喪明矣經曰肝王則目赤若兼石則冬慎勿食熱熱既不散遂成伏氣遇春必發預宜法防之即非石藥之過豈不惜哉黄帝曰形受味精受氣皆為飲食寒温呼吸之召也諸藏倣此療眼乆赤痛方乾棗相接長一尺切黄連相接長一尺擘右二味以水一升煎三合綿裹夜卧㸃眼眥中以差為度忌如常法又㵼肝湯不服石人亦主之方大黄黄連石膏各二兩碎甘草炙黄芩細辛生薑半夏洗各一兩梔子十四枚擘右九味切以水八升煮取三升分温服忌如常法又療眼赤閉目不開煩悶熱胷中澹澹㵼肝湯方前胡大青秦皮乾薑子芩細辛各三兩決明子三枚梔子仁二兩石膏八兩碎淡竹葉車前葉各切一升右十一味切以水一斗煮取三升去滓分服或加朴硝三兩得利即差忌如常法又療眼腫痛不開方精猪肉薄切以貼眼上熱即易之一方用子肝又以井花水浸更再用之取差又療乆風目赤兼胎赤方光明鹽六分杏仁油五合又云半雞子右二味以浄銅鑼一尺面者一枚内鹽油即取青栁枝如筯大者一握急束截令頭齊用研之三日候如稠墨即先剜地作一小坑置瓦于底又取熱艾一鵝子許於瓦上燒火即安前藥鑼覆坑上令烟熏之勿令火滅候火盡可收置於銅合子或垍合子中每夜用㸃目眥間便卧頻㸃之取差通按前目病胎赤用此方又主眼生赤脉息内磣痛不開者方大棗七枚取肉黄連二兩碎綿裹淡竹葉切五合右三味以水二升煮竹葉取一升澄清取八合内棗肉黄連煎取三合去滓以㸃眼眥中差止又療目痒赤方黄連半兩碎丁香二七枚碎黄蘗皮半兩切青錢七文蕤仁三七枚碎右五味以水二升煮取一升去滓以綿纒杖子頭㸃之妙扁鵲療令人目明髮不落方取十月上巳日槐子去上皮不限多少於瓶中封口三七日初服一枚再服至二枚十日十枚還從一起甚騐又療發熱心腹脹滿小便赤大便難逆衝胷中口燥目赤痛方黄芩大黄各二兩梔子一兩豉三合右四味切以水三升煮取一升二合去滓分服又療目瞖方乾藍二分雄黄二分研右二味相和以少許㸃上三五度即便差石發痰結大小腹留壅老小虚羸方六首論曰夫老小尫羸為和氣不足寒氣獨積於地炎氣獨散於天天地不交故體成否體成否則肌肉不潤腠理不通胷膈氣急腸胃招滿為隂氣衝陽陽不接也或膀胱堅積支足沉痾為陽氣不能下營隂氣獨盛也致大腸留擁湯藥不下或水榖不消更加短氣若不利闗格寔不得其死也療羸劣老弱體性少熱因服石散而寒氣盛藥伏胷膈冷熱不調煩悶短氣欲死者藥既不行又不能大便作害於人急宜吐之方甘草四兩生用右一味切以水五升煮取折半去滓令頓服之當大吐藥亦與病俱去便愈矣夫散家患心腹痛服諸藥不差者服此甘草湯諸膈即通大便亦利甚騐又療甚虛弱去熱益氣力方竹葉切一升大棗二十枚擘黄芪四兩芍藥三兩甘草炙人參乾地黄升麻生薑各二兩桂心黄芩茯苓各一兩右十二味切以水一斗五升煮竹葉取一斗去竹葉入諸藥煎取三升分温服之忌如常法又療散發後虚熱羸乏或脚疼腰痛本是虚勞人并挾風宜腎瀝湯方羊腎一具去脂膜切五味子三兩當歸甘草炙芎藭逺志去心芍藥麥門冬去心茯苓各一兩乾地黄生薑各四兩切黄芩桂心各一兩大棗二十枚擘右十四味切以水一斗煮腎取八升内諸藥煎取三升半去滓分服忌如常法又療性熱虚羸補益方生地黄二石細切蒸之極熟右一味以好酒一升灑之暴乾𢷬衆併手丸之每食前含一丸如胡桃大咽令盡日三五度甚妙又療人身體黄瘦不能食及服藥腰背拘急痛眠卧䧟牀沈重不能起行宜秋夏中服之方半夏洗茵蔯各四兩生薑茯苓各三兩黄芩土𤓰根梔子各二兩大黄一兩别浸右八味切以水八升煮取三升去滓分温服耆婆湯療人風勞虚損補髓令人健方麻油一升牛酥一斤葱白一握胡麻仁一升研豉二升以水二升漬一枚取汁蜜一升上酒二升右七味先於鍋中入油煎令沸著葱白令色黄下酥蜜豉汁麻仁沸下酒成煎收不津器中盛之日服一匙兩匙或和酒服亦妙冷即加生薑一斤取汁乾薑末亦可用之石發大小便澀不通兼小便淋方一十六首論曰夫言大小便澀者皆繇大腸虚受邪氣所致也且府有髙下而肺府係在天上中接土府名之大腸為傳導之府也有風氣熱結即大便乾澀而不通順或發癰腫口鼻乾燥或腎府有虚則心肺俱熱使小便赤而澀也或腎氣虚熱膀胱不足加之以渴飲即小便淋澀皆繇藏虚不能主其府也且形能受味氣能致精氣散則精虚味益則體實體實之人筋骨有餘因勞精氣精氣既衰即招其病故石氣流入膀胱作其淋疾則非正石氣而行此肺遭熱盛傳之於腎腎為精竭純隂自孤石氣懼隂不入便投其膀胱膀胱受邪遂成淋也淋狀合澀數赤熱而痛何以知之澀至故知肺傳於子也數至為子被母逼水急奔下也熱赤至為心與石氣相傳也痛至為本藏自虚客氣衝擊也所以服石藥者藉其少滋味而助精氣即神門之固病邪不能入也何以知因石虚竭虚竭之人其隂好怒而交接難畢其病名强中或不交接其精自流也或為消利為作消渴皆由少服諸石用之傷勞也夫遇兹候等可救其病失時不療便至夭枉不可全服補虚之藥恐變諸疹常以不虚不實於大腸不寒不燥於腠理能調神氣有何患乎療小便淋澀少腹痛方大黄芍藥茯苓各一兩麻仁四兩研右四味切以水五升煮取二升去滓分服之良又方桑螵蛸二十枚熬黄芩一兩右二味切以水一升煮取四合頓服之又療熱淋澀痛方車前草葵根各切一升通草三兩芒硝八分右四味切以水五升煮取二升去滓入芒硝分服之又療血淋不絶方雞蘓竹葉各一握葵子末石膏各八分碎蜀椒末四分右五味切以水二升煮取九合後下葵末服之又療初患淋方滑石五兩通草二兩石韋拭去毛瞿麥各三兩芒硝二兩湯熱下冬葵子二升右六味切以水九升煮取三升分服之忌諸熱物又療淋積年醫不能愈或十日五日一度發即可時或頻發不定方冬葵子滑石各八分茯苓芍藥子芩蒲黄芒硝各六分石韋去毛瞿麥各五分陳橘皮四分右十味𢷬散空腹煮後飲子和服一方寸匕加至二匕以小便通利為度忌如常法下散飲子方桑白皮六分白茅根十分通草八分甘草四分炙滑石十分右五味𢷬散煎湯服前散又卒患淋方取船底青苔如雞子大以水一升煮服之又主熱淋方白茅根四斤切右一味以水一斗半煮取五升適寒温飲之差止又石淋狀如碎沙石下者方車前子二斤以絹囊盛右一味以水八升煮取三升經宿空腹服之即石下又療煩熱身體微腫不能食飲小便不利方茯苓三兩甘草炙栝樓根人參黄芩桂心白术各一兩枳實二兩炙右八味切以水六升煮取三升去滓每服三合盡即差甚妙又療氣上不得食嘔逆大小便澀氣滿煩悶折熱下氣方前胡黄芩各三兩梔子大黄各一兩甘草炙茯苓生薑各二兩杏仁四十枚去尖皮碎右八味切以水八升煮取三升分服之忌如常法又療熱小便數少如淋葵子湯方冬葵子一升右一味以水三升煮取一升半分服之忌如常法又若大小便塞不通或淋瀝尿血隂中疼痛此是熱氣所致先以冷物熨之小腹又以熱物熨更互冷熱若小便數亦是取冷所致即暖將息也療發熱體氣昬昬不痛不痒小便赤澀方生芽根五大斤浄洗擇𢷬絞取汁服之差又若發熱口乾小便澀方取甘蔗去皮盡足喫之咽汁若口痛𢷬取汁服之又方取萎蕤五兩煮汁飲之差石發後變霍亂及轉筋方一十六首論曰服石之人體常多熱熱即引飲饑復加飡水榖既傷胃府失度土既衰損木必來乘故曰肝入胃即泄或單下而不吐是肝乘之盛也木既尅土尅過必宣二氣俱虚而肝必怒陽氣既乏則發轉筋變吐加腎肝之病也宜速止之仍温足而兼復調以五味其病必痊矣療石發霍亂絞痛不可忍方茱萸一升右一味以酒三升煮取一升强服之得下差又療霍亂吐多者必轉筋不渴即臍上築者腎氣動先療其築理中湯方人參桂心甘草炙各三兩乾薑二兩右四味切以水八升煮取三升分服又加白术三兩又療霍亂轉筋入腹方取雞屎白乾者一方寸匕以水和頓服之又療轉筋入腹痛方灸脚心下當拇指上七壯又方灸足大拇指下約中一壯又乾嘔方灸手腕後中指兩筋間左右各七壯名間使又若吐止而下痢不止方灸臍下一跌約上二七壯又嘔不息者方薤白一握右一味切以水一升煮取六合頓服之又吐痢不止轉筋入腹欲死方生薑三兩切右一味以酒一升半煮三沸頓服之良又方藿香一把右一味以水四升煮取一升服之差艾亦佳又療轉筋不吐不下氣息急方木𤓰一枚右一味切以水二升煮取一升服之差又方髙良薑五兩搥碎右一味以酒二升煮取一升服亦主腹痛又方桑葉切二升右一味以水三升煮取一升三合去滓服之又療腹滿痛不可忍方取鹽一合熬以水二升煮取一升頓服即得吐止若吐痢止心中煩悶及渴不止取竹瀝一升分服即止不止心中復似冷取茱萸一兩於鐺中炒𢷬末以水二升煮取一升著少鹽澄清服之取差又療霍亂吐痢不止方粟米任多少研右一味以水攪如乳服之即差又療脚轉筋方灸兩大拇指𤓰甲後連肉處當中尖三壯石發後變下痢及諸雜痢方一十二首論曰凡石性剛烈氣多炎上理之傷温即火轉為熾内煎脾肺脾肺苦熱遂成其渴飲水過量即溲腸胃胃得水則吐腸得水即金寒藏雖寒火炎不滅水漸流下而為行潦遂變擁腸胃虚冷水榖不消在陽益氣不飡在隂腸鳴而泄乆將不差有成痢者經言嘔噦發下焦之間其斯之謂歟療下痢乾嘔服香豉多服之佳如不損更發宜服此方香豉二升乾薑三兩甘草二兩炙葱白切一升右四味切以水五升煮取二升去滓温分服之甚良又方乾薑五兩右一味切以水二升煮取一升去滓頓服之又療白赤痢兼熱悶方梔子仁十四枚薤白一握切右二味以水三升煮取一升二合去滓分服之良又療白痢方黄連一兩碎綿褁白蜜一合右二味以童子小便二升漬一宿煮取一升去滓入蜜分服之又方黄連一兩碎薤白切一升烏梅一握右三味以水二升煮取一升分温服之又療解散已經快利熱尚不退兼痢不斷黄連湯方黄連一兩碎白梁米二合右二味以水五升煮取二升分服之又療癰腫熱盛取冷過多寒中下痢食完出方甘草炙乾薑附子炮各六兩蜀椒二百三十枚汗右四味切以水六升煮取三升分服之忌如常法又療天行兼有客熱下血痢止血破棺起死黄連湯方黄連四兩黄蘗三兩梔子仁十五顆阿膠一兩炙乾薑枳實炙芍藥各二兩右七味切以水六升煮取三升分服之忌如常法又療解散除熱止痢黄連湯方甘草炙升麻各一兩黄連三兩豉五合梔子仁十四枚右五味切以水三升煮取一升分温服之又解散因痢宜服甘草湯方甘草炙人參黄連各一兩梔子仁二十一枚右四味切以水五升煮取二升分服之又療熱毒赤白痢方羊肝去膜切以水洗二十遍血盡以粟米飯拌作麵餅右一味以水煮熟漉著漿水中淘之乾漉以美蒜虀候極饑食之不過三兩頓即差又療水榖痢方取鯽魚無問多少治如食法以新布乾拭斷血脉切作鱠以蒜虀食之取足候至夜要以白粥量事喫之即得差忌如常法石發兩脚卒冷兩脅腋卒熱并口噤方三首論曰經言脉有隂蹻陽蹻有隂搏陽搏此在三隂位也脉足大隂脾脉也脾為中州含藏陽氣壓本脉者矣若人之和平則脾能行陽氣暖其三隂三隂暖則足能舒適若脾虚不能含藏則地氣漸泄陽上騰則三隂堅塞足便冷也或有踵緩急不仁者則加之以腎肝之氣不足使少隂厥隂之闕也所以足無載運之功而不能蹻㨗其力是隂摶其陽此由藏虚所生陽氣傷狂而隂不能獨理有因發熱口噤及腋下熱不可近者即三陽傷盛之所致也况服石増熱飡􅀈失度在隂為疹可外温其足内置陽氣於三隂則愈也在陽為疹可微冷於外又以寒藥散其内熱其痾豈能逃乎療兩脚卒冷方以醋漿温置盆中以浸脚即差又療口噤氣上欲絶方蔓菁子二升茯苓三兩蓼藍子人參薺苨甘草炙黄芩白术各一兩右八味切以水二斗煮蔓菁子取八升去滓内餘藥煮分服若口噤以物嚾之即差又療兩腋熱不得相近方滑石一斤寒水石三斤芒硝一斤右三味𢷬散取絹一尺分作袋盛散藥結口更互於腋下夾之勿住取凉冷止石發若熱解折下石方四首論曰五形之人其性各别則土形之人骨聳氣清水形之人體薄氣長木形之人筋骨麤聲圎而長火形之人性急氣尖而散其有固疾者則先服草藥病愈後始服石必速應也凡土火二形人性躁氣髙而肥盛多火氣若更服石益之於炎物盛必衰自焚之名也若覺禍發速宜下之只如固疾之人服石者病氣乆强石熱尚薄不能破其病但増其熱亦能損人若熱不濟者亦可速下自餘形人服之者如有發動但以石投之自然而差不可見小熱即求大冷為山九仭終虧一籄醫者意也詳而行之臣億等按論中五形少金别無本校今闕蜂房飲解石餘方露蜂房三兩右一味以水三升煮取一升去滓頓服不定三五日更服如熱悶服後方千金翼療石發熱困苦宜下石方露蜂房一升切以水二升煮取一升一服五六合日三服石從小便下如細沙盡停無所忌又下石方葛根紫草各八兩犀牛角十二兩屑露蜂房十兩炙芒硝大黄各二兩薺苨人參各七兩𤣥參甘草炙銀屑細研各四兩猪脂十二兩臘月者右十二味以無灰酒漬經十日其猪脂用酒一升煎取脂三兩取銀屑和研内藥中每日空腹服之一匙前合藥未得本法元本如此可求别定本細而勘之千金翼方中更有升麻萎蕤各七兩黄芩八兩梔子十四枚計十六味以無灰酒八升漬經十日猪脂用酒一升煎錬取三兩與銀屑和研内藥中每日空腹服之量力多少忌熱麵炙肉海藻蒜等又療散發不可堪忍欲下之方肥猪肉五斤葱白薤白各半斤右三味並𢷬研合器中蒸之令熟早朝噉之盡為度又療雖服乳石等而常患冷此由不先服㵼湯而服石等以其病藥各在一處丹石不行則病所以依舊患冷宜依此法㵼之冷自差石勢行方人參茯苓乾地黄當歸桔梗甘草炙芍藥各二兩大黄四兩右八味切以水三升煮取一升二合去滓分服之服石後將息飲食所宜法二首論曰服石所宜飲食時宜以自調護隨所取適若一一依方慎之則動成滯礙能依此法庻得通濟方取少脂猪肉一月二服百沸餺飥任性無妨新熟白酒少飲亦好及白羊頭蹄并猪肉作薑豉任作食之壓石肥肉黎柿等甚佳凡欲喫熱羊肉餺飥宜先食三五匙冷飯後喫之即不畏熱喫訖乃速以飯壓之行步適散乃可不慮致損生菜亦然芸臺胡荽等亦不宜多食服石人有性好麵嗜醋不能禁慎者宜食淡糠醋百沸紫餺飥及水漠餅即不慮熱冷韭羹亦大補時時宜食之諸飲食品類既多不可一一但言不得服所不宜者服石人亦不宜多飲酒飲酒多則失食味失食味則不多食不多食則令人虚熱虚熱則令石數發惡寒寡沉又損石力為酒能壓石故也多飲則損石勢亦令人風虚脚弱此繇飲酒致之耳若能飲食者大佳甚妙其方藥如右服石特忌熱麵陳臭哀孝哭泣憂恚大醋生蒜虀芥醬雞犬肉老牛肉鮑魚肉鮓衡熱忍饑冷酒有灰酒蕎麥小豆胡麻餺飥枸把羮倉米臭魚脯勿承饑虚熱沐浴夏月不宜喫猪肉冷水恐致滑痢不止傷冷飲食不消或成霍亂特宜消息慎之紫餺飥并食飲將慎法三首千金紫餺飥方烏豆任多少煮取濃汁右一味以和麵稍鹽和之依常法作餺飥以此豆汁中熟煮可三二十沸溢添冷烏豆汁以猪羊肉為臛亦精好或以山芋粉尤妙又宜食麵餅方取麵溲如家常作餅法細切如小豆許以麵於簸箕中拌令圎煮之令極熟承熱任以諸肉作臛食之大凉補腰脚又夏月冒熱逺行早食晩失饑石氣發動作大麥餅將行在路食之亦壓得石氣凡患瘡腫無問大小或如黍米即湏加意專精療之或以冷水淋或鹽湯洗以指擿破即以指甲細細搯傍邊亦以藥塗之或以蒼耳湯浸洗之或以冷石熨之即差夫服石將慎至難若不能將息特宜勿服非但服之若瘦熱更増他疾性行躁暴唯多勿恚飲食日減形體日消妻子不能供承卑下何其能濟此皆由將慎失度致使然也人之無檢慎勿輕服至於背坼腦裂藥物無及也婦人則發乳體腫帷簿不修特宜審慎自量其力將息尤佳服石後防慎貯備雜藥等一首凡服石人當宜收貯藥等人參朴硝苦竹瀝大黄梔子大麥麵好䜴薺苨黄連升麻石膏荆瀝葛根并粉猪膏酥蜜紫蘓子白鴨屎梗米前胡冬葵子生薑冬𤓰大豆車前地榆五加皮大小麥奴天門冬葱白萎蕤麥門冬生地黄蘆根紅雪紫雪黄芩露蜂房外臺秘要方卷三十八
