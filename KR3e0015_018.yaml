body:
  text: 外臺祕要方卷十四唐王燾撰中風及諸風方一十四首灸法附病源中風者風氣中於人也風是四時之氣分布八方主長養萬物從其鄉來者而人中少死病不從鄉來者人中多死病其為病也藏於皮膚之間內不得通外不得泄其入經脉行於五藏者各隨藏腑而生病焉心中風但得偃卧不得傾側若脣赤流汗者可療急灸心俞百壯若脣或青或黑或白或黃此是心壞為水面目亭亭時悚動者不可復療五六日而死肝中風但踞坐不得低頭若繞兩目連額色微有青唇青面黃者可療急灸肝俞百壯若大青黑面一黃一白是肝已傷不可復療數日而死脾中風踞而腹滿通身黃吐鹹汁出者可療急灸脾俞百壯若手足青者不可復療腎中風踞而腰痛視脅左右未有黃色如餅粢大者可療急灸腎俞百壯若齒黃赤鬚髮直面土色者不可復療肺中風偃卧而胸滿短氣冒悶汗出視目下鼻上下兩邊下行至口色白者可療急灸肺俞百壯若色黃為肺已傷化為血不可復療其人當妄掇空指地或自拈衣尋衣縫如此數日而死診其脉虛弱者亦風也緩大者亦風也浮虛者亦風也滑散者亦風也出第一卷中深師療中風汗出乾嘔桂枝湯方桂心甘草炙各三兩大棗十二枚擘右三味切以水五升煮取二升半分三服一方用生薑五兩忌生葱海藻菘菜又桂枝湯療中風身體煩疼惡寒而自汗出頭彊痛急方桂心五兩生薑八兩甘草二兩炙葛根八兩芍藥三兩大棗十二枚擘右六味切以水七升煮取二升半服八合日三溫覆取汁陸伯庸用良忌生葱海藻菘菜人玉曰此仲景桂枝加葛根湯方也今云頭强痛急當作項强痛急才是又麻黃湯療中風氣逆滿悶短氣方麻黃三兩去節甘草二兩炙石膏四兩碎綿裹杏仁五十枚去兩仁及尖皮碎人參三兩乾薑五兩茯苓防風各四兩桂心三兩半夏一升洗右十味以水九升煮取三升先食服一升日三服甚良忌海藻生葱羊肉餳菘菜又茯苓湯療中風入腹心下如刺不得卧或在脅下轉動無常腹滿短氣惙惙欲死此病或中虛冷或素有宿食食飲不消或素風氣在內今得他邪復于五藏故成此病方茯苓二兩芎藭乾薑芍藥白术當歸人參各一兩枳實三分炙甘草炙一兩右九味細切以水九升煮取三升日三若病劇者可相去如人行五里頃一服胸中有氣可加人參二兩服一劑不差不過兩劑神良忌海藻菘菜桃李雀肉大酢並出第九卷中千金翼中風論聖人以為風是百病之長深為可憂故避風如避矢是以禦風邪以湯藥針灸蒸尉隨用一法皆能愈疾至於火艾特有竒能雖曰針湯散皆所不及灸為其最要昔者華他為魏武帝針頭風但針即差華他死後數年魏武帝頭風再發他當時針訖即灸頭風豈可再發只由不灸其本不除所以學者不得專恃於針及湯藥等望病畢差既不若灸安能拔本塞源是以雖豐藥餌諸療之要在火艾為良初得風之時當急下火火下即定此煮湯熟已覺眼明豈非大要其灸法先灸百㑹次灸風池次灸大椎次灸肩井次灸曲池次灸間使各三壯次灸三里五壯其炷如蒼耳子大必須大實作之其艾又須大熟從此以後日别灸之至隨年壯止凡人稍覺心神不快即須灸此諸穴各三壯不得輕之茍度朝夕以致殞斃誡之哉誡之哉又論曰學者凡將欲療病先須灸前諸穴莫問風與不風皆先灸之此之一法醫之大術宜深體之要中之要無過此術是以常預收三月三日艾擬救急危其五月五日亦好仍不及三月三日者又有卒死之人及中風不得語者皆急灸之夫卒死者氣入五藏為生平風發彊忍怕痛不灸忽然卒死謂是何病所以皆必灸之是大要也又論曰夫得風之時則依此次第療之不可違越若不依此當失機要性命必危又凡初得風四肢不收心神惛憒眼不識人言不出口凡中風多由熱起服藥當須慎酒麵羊肉生菜冷食豬魚雞牛馬蒜乃可差得患即服此竹瀝湯方竹瀝二升生葛汁一升生薑汁三合右三味相和溫暖分三服平旦日晡夜各一服訖覺四體有異似好以進後方士弱曰一云有荆瀝一升又方麻黃去節防風各一兩半芎藭防己附子炮人參芍藥黃芩桂心甘草炙各一兩生薑四兩杏仁四十枚去尖皮兩仁者羚羊角二兩屑竹瀝一升生葛汁五合一云地黃汁石膏六兩碎綿裹右十六味切以水七升煮取一半乃下瀝汁煮取二升七合分溫三服五日更服一劑頻與三劑慎如上法漸覺稍稍損次進後方忌豬肉冷水海藻菘菜生葱又方竹瀝二升防己一兩麻黃三兩去節防風升麻桂心芎藭獨活羚羊角各二兩屑右九味切以水四升并瀝煮取三升分為三服兩日進一劑進三劑若手足冷加生薑五兩白术二兩若未除次進後方忌生葱等如前又方防風麻黃去節芍藥各一兩半防己桂心黃芩各一兩附子三分炮甘草炙白术人參芎藭獨活各一兩竹瀝一升羚羊角二兩屑升麻一兩石膏二兩碎綿裹生薑二兩右十七味以水八升煮減半下瀝煮取二升半分三服相去如人行十里再服有氣加橘皮牛膝五加皮各一兩若除退訖可常將服後煮散忌豬肉冷水海藻菘菜桃李生葱雀肉等又煮散方防風獨活芍藥黃芪人參芎藭白术丹參薯蕷茯神桂心麥門冬去心山茱茰厚朴牛膝五加皮天門冬去心升麻羚羊角屑地骨皮秦艽石斛防己甘草各四分麻黃三兩去節甘菊花薏苡仁各一升石膏六兩橘皮三兩生薑二兩切乾地黃六兩附子三兩炮逺志三兩去心右三十三味搗篩為散每煮以水三升內藥三兩煮取一升綿濾去滓頓服之日别一服覺心中煩熱以竹瀝代水煮之千金有黃芩檳榔藁本杜仲犀角無山茱茰薯蕷甘草麥門冬附子又凡患風人多熱宜服荆瀝方荆瀝竹瀝生薑汁各五合右三味相和溫為一服每日旦服煮散午後當服此荆瀝常作此將息防風湯主偏風甄權處治安平公方防風白术芎藭白芷牛膝狗脊萆􅐺各一兩薏苡仁杏仁去尖皮兩仁者人參葛根羌活各二兩麻黃四兩去節石膏碎綿裹桂心各二兩生薑五兩切右十六味切以水一斗二升煮取三升分為三服服一劑覺好更服一劑一劑一度灸之服九劑湯九度灸之灸風池一穴肩髃一穴曲池一穴支溝一穴五樞一穴陽陵泉一穴巨墟下亷一穴合七穴即差仁夀宫備身患腳奉勑灸環跳陽陵泉巨墟下亷陽輔即起行大理趙卿患風腰腳不隨不得跪起灸上􅐎二穴環跳二穴陽陵泉二穴巨墟下亷二穴即得跪起庫狄欽偏風不得挽弓灸肩髃一穴即差前方忌桃李生葱千金翼本方並云針此云灸者蓋王道不取針也又一切風虛方常患頭痛欲破者杏仁九升去尖皮兩仁者暴乾右一味搗作末以水九升研濾如作粥法緩火煎令如麻浮上匙取和羹粥酒內一匙服之每食即服不限多少服十日後大汗出二十日後汗止慎風冷豬魚雞蒜大酢一劑後諸風減差春夏恐酢少作服之秋九月後煎之此法神妙可深祕之並出第十六卷中千金同備急療若卒覺體中恍恍皮肉習習此即欲中風方急取獨活桂心各五兩二味切以酒三升漬於火邊灸之使暖一服五合日三加至一升良忌生葱千金同出第二卷中近效薏苡仁湯療諸風方薏苡仁五合萎蕤生薑茯神各三兩生犀角末二兩烏梅七枚麥門冬去心竹瀝各三合白蜜一合右九味切以水八升緩煮取二升七合汁絞去滓內竹瀝白密攪調細細飲之不須限以回數多少亦不限食前食後亦不限晝夜冷暖盡又合服亦不限劑數多少此飲但合服勿輕尤佳以防風候忌食米醋油脂陳敗難消等物以前方療暴風手足癱廢言語蹇澀神情恍惚遊風散走或出諸四肢􅍙痺有所不穩似緣風候即合服之十日服一劑甚佳吳升處卒中風方七首千金芎藭湯主卒中風四肢不仁善笑不息方芎藭六分杏仁二十枚去兩仁尖皮碎黃芩當歸炙石膏碎綿裹麻黃去節桂心秦芁炙甘草炙乾薑各四分右十味切以水九升煮取三升分為三服忌海藻菘菜生葱又主卒中風四肢不仁善笑不息方芎藭六分黃芩當歸桂心秦芁乾薑甘草炙麻黃去節黃連各四分杏仁二十枚去皮尖兩仁碎右十味切以水九升煮取三升溫服一升日三大汗忌生葱海藻菘菜豬肉並出第八卷中崔氏小續命湯療卒中風欲死身體緩急口目不正舌彊不能語奄奄惚惚神情悶亂諸風服之皆驗不令人虛方出小品余昔任戶部員外忽嬰風疹便服此湯三年之中凡得四十六劑風疾迄今不發余曽任殿中少監以此狀說向名醫咸云此方為諸湯之最要麻黃去節人參黃芩芍藥芎藭甘草炙杏仁去兩仁尖皮碎桂心各一兩防風一兩半附子一枚大者炮生薑五兩右十一味切以水九升煮取三升分為三服甚良不差合三四劑必佳取汗隨人風輕重虛實也有人腳弱服此方至六七劑得差有風疹家天隂節變輒合之可以防瘖也忌豬肉冷水海藻菘菜生葱千金有防己一兩如惚恍者加茯神逺志若骨節煩疼本有熱者去附子倍芍藥服之又續命湯方太府梁卿得效麻黃去節茯神生薑各三兩附子炮防己甘草炙各一兩半芎藭細辛白鮮皮杏仁去皮尖兩仁碎人參羌活桂心各三兩右十三味切以水八升煮取二升八合去滓分三服服别相去八九里許覆取汗可服三劑間五日一進慎如藥法本方云間五日一進若老弱虛羸非間十日以上不可頻服忌猪肉冷水海藻菘菜生葱生菜大酢並出第六卷中備急療卒得中風急悶亂欲死方灸足大指下橫文隨年壯又不能語者方灸第三或第五椎上百五十壯並出第六卷中古今録驗小續命湯療卒中風欲死身體緩急目不停舌强不能語諸中風服之皆驗不令人虛方大附子一枚炮芍藥一兩生薑五兩芎藭一兩甘草一兩炙麻黃三兩去節白术一兩木防己一兩防風六分黃芩一兩桂心一兩人參一兩右十二味㕮咀以水一斗三升煮取三升分三服甚良大善可作三四劑必佳忌豬肉海藻桃李生葱菘菜出第十四卷中四時中風方四首古今録驗療中風發三春脈浮短者多凶大而長可療青龍湯方甘草一兩炙麻黃二兩去節桂心七寸大棗二十枚擘生薑芍藥各二兩右六味切以水六升煮取二升半分為再服初服覆取汗後即止忌海藻菘菜生葱等物又療中風發三夏脈沈緊惡寒不汗煩三陽湯方當歸一兩生薑二兩甘草五分炙麻黃五兩去節杏仁四十枚去尖皮兩仁碎石膏二兩碎綿裹右六味切以水六升煮取半分再服忌海藻菘菜等物又療中風發三秋脈浮大而洪長扶金湯方葛根三兩獨活二兩附子一兩炮四破石膏二兩碎綿裹右四味切以水八升煮取三升服九合晝二夜一忌豬肉冷水等物又療中風發三冬脈浮大者溫脾湯方芎藭二兩石膏四分碎綿裹甘草四分炙黃芩三兩杏仁十四枚去尖皮兩仁碎麻黃六分去節蜀椒二分去目閉口汗防風四分桂心五分右九味切以水八升煮取三升分三服忌海藻菘菜生葱等物中風發熱方三首深師十一味防風湯療中風發熱無汗肢節煩腹急痛大小便不利方防風當歸麻黃去節甘草炙各三分茯苓天門冬去心附子炮乾地黃白术山茱茰二兩黃芩五分右十一味㕮咀以水九升煮取二升半去滓分服七合日三大小便不利內大黃人參各二分大棗三十枚擘生薑三兩忌海藻菘菜豬肉蕪荑大酢桃李雀肉等又防風湯療中風發熱頭痛面赤吸吸苦熱惡風煩悶身中悁悁而疼其脉浮而數者方防風白术桂心蜀椒汗黃芩細辛芍藥人參甘草炙各一兩麻黃三兩去節石膏二兩碎綿裹大棗三十枚擘右十二味切以水九升煮取三升分三服忌海藻菘菜桃李生葱生菜出第三卷中范汪療中風發熱大㦸洗湯方大㦸苦參右二味等分搗篩藥半升用醋漿一斗煮之三沸適寒溫洗之從上下寒乃止小兒三指撮之醋漿四升煮如上法肘後同出第一卷中賊風方一十二首病源賊風者謂冬至之日有疾風從南方來名曰虛風此風至能傷害於人故言賊風也其傷人也但痛不可抑按不得動轉痛處體平無熱傷風冷則骨解深痛按之乃應骨痛但覺身體內凛凛冷欲得熱物尉痛處即小寬時有汗久而不去重遇冷風相搏乃結成瘰􅊓及偏枯遇風熱氣相搏乃變作附骨疽也出第一卷中深師療賊風入腹五藏四肢心胸急痛背反寒咽乾口噤戴眼方此故是大續命湯藥分兩不同麻黃三兩去節石膏碎綿裹當歸芎藭甘草炙乾薑桂心各二兩黃芩一兩杏仁三十枚去兩仁尖皮右九味㕮咀以水酒各五升合煮取四升分為四服忌海藻菘菜生葱又秦芁湯療賊風入腹搶心拘急四肢不隨腹滿欲死者方桂心防風黃芩乾薑茱茰秦芁甘草各一兩炙右七味切以水五升煮取一升半分再服湯令熱不差更作忌海藻菘菜生葱又竹瀝湯療大虛挾風及賊風入腹腹中拘痛煩亂恍惚妄語迷惑不知人口噤不開手足緩縱飲食不作肉卧驚見屋中光口乾惡風時時失精夢寤沈重及婦人産後餘病體虛受風躁憒欲死方秦芁甘草炙防風當歸各二兩茵芋烏頭炮乾薑細辛人參黃芩桂心天雄炮木防己茯苓白术各一兩右十五味切以竹瀝一斗半煮取五升隨病加後藥胸逆滿加前胡二兩半半夏二兩洗术附子炮各一兩腹中痛加芍藥二兩椒一兩汗煩加知母一兩口乾加麥門冬一兩去心體痺加麻黃二兩去節有方不用术附子用半夏二兩忌海藻菘菜豬肉冷水生葱生菜桃李雀肉酢物等又大續命湯療毒風賊風身體不能自收不知痛處咽中卒不得語若拘急腰痛引頸目眩不得見風坐欲却倒覺即反張脊不著席脈動不安恍惚恐懼欲啼上氣嘔逆面腫方杏仁三十枚去雙仁皮尖碎芎藭石膏碎綿裹甘草炙桂心當歸麻黃去節黃芩各一兩乾薑一兩右九味切以水六升酒三升合煮取三升分為四服取微汗汗出粉之勿見風忌海藻菘菜生葱又茵芋酒療賊風濕痺身體不能自動四肢偏枯火灸不熱骨節皆疼手足不仁皮中淫淫如有蟲行搔之生瘡癮疹起手不得上頭頭眩瞑甚者狂走歷節腫及諸惡風悉主之方茵芋烏頭炮天雄炮石南女葳附子炮躑躅花熬秦芁木防己防風各二兩右十味㕮咀以絹囊盛之清酒三斗漬之夏三日春秋五日冬七日平旦服一合不知稍增之可至二合以意消息忌如常法又甘草湯療心腹絞痛賊風入腹脹滿拘急不得氣息並轉筋寒中下重溫中止痛利大小便方甘草炙防風各一兩半吳茱茰乾地黃芍藥當歸細辛乾薑各一兩右八味㕮咀以水五升煮取三升分再服良忌海藻菘菜生葱菜蕪荑又烏頭膏療賊風身體不隨偏枯口喎僻及傷風寒身彊直方烏頭炮野葛各五兩去心莽草一斤右三味㕮咀以好酒漬令淹漸再宿三日漬之以不中水豬肪五斤煎成膏合藥作東向露竈以葦薪煎之三上三下藥成去滓有病者向火摩三千過汗出即愈若觸露鼻中塞對火摩頭頂鼻中即通藥不可令入口眼也並出第九卷中千金療賊風所中腹內攣急方麻黃四兩去節甘草一兩炙切石膏如雞子大碎之綿裹鬼箭羽削團如雞子大右四味以東流水二杯煮取一杯頓服之忌海藻菘菜又大巖蜜湯主賊風腹中絞痛并飛尸遁疰發作無時發則搶心脹滿脅下如刀錐刺并主少隂傷寒方甘草乾地黃細辛乾薑當歸羊脂青羊脂更勝桂心茯苓吳茱茰芍藥各一兩梔子十五枚擘右十一味切以水八升煮取三升去滓內脂溫分三服忌海藻菘菜生葱生菜蕪荑酢物深師同小品治中惡一方無桂心有防風又烏頭湯主寒疝腹中絞痛賊風入腹攻五藏拘急不得轉側呌呼發作有時使人隂縮手足厥逆方烏頭十五枚炮芍藥四兩甘草二兩炙大棗十枚擘生薑一斤桂心六兩右六味切以水七升煮五味取三升去滓别取烏頭去皮四破蜜二升微火煎令減五六合內湯中兩三沸去滓服一合日三間食彊人三合以如醉狀為知不知漸增忌海藻菘菜豬肉冷水生葱深師同又倉公當歸湯主賊風口噤角弓反張身體彊直方當歸細辛防風各六分獨活三分麻黃十分去節附子四分炮去皮右六味切以清酒八升水四升合煮取四升分為四服口不開者挍口下湯一服當蘇再服小汗三服大汗忌豬肉生葱廣濟同並出第八卷中古今録驗續命湯療中風賊風入腹角弓反張口噤舌不停目視不見不能語舉身不仁或心腹絞痛方甘草炙黃芩各二兩防風一兩半生薑五兩人參芎藭芍藥麻黃去節木防己各一兩大附子一枚炮右十味切以水一斗二升煮取三升分為三服一日令汗可服三劑不令人虛本方有十三味見藥止有十味忌海藻豬肉菘菜冷水魚等物出第十卷中歷節風方一十首病源歷節風之狀短氣白汗出歷節疼痛不可忍屈伸不得是也由飲酒腠理開汗出當風所致亦有血氣虛受風邪而得之者風歷關節與血氣相搏交擊故疼痛血氣虛則汗出風冷搏於筋則不可屈伸為歷節風也出第二卷中深師大風引湯療男女歷節風大虛手腳曲戾或變狂走或悲笑言語錯亂無所不療方茯苓防風當歸白前乾薑甘草炙各二兩大豆一升生薑獨活各三兩逺志去心附子炮人參各一兩大棗三十枚右十三味切先以水一斗五升煮豆棗取一斗去滓內諸藥煮取三升分為五服忌海藻菘菜豬肉醋物蒜麵生菜等物出第九卷中千金論曰夫歷節風著人久不療者令人骨節蹉跌變成癲病不可不知古今以來無問貴賤往往苦之此是風之毒害者也療之雖有湯藥而並不及松膏松節酒若羇旅家貧不可急辦者宜服諸湯猶勝不療但於痛處灸三七壯佳又防己湯療風發歷節四肢疼痛如捶煆不可忍者方防己茯苓白术桂心生薑各四分人參二兩烏頭七枚炮甘草三兩炙右八味切以苦酒一升水一斗合煮取三升半一服八合日三夜一當覺熱痺忽忽然慎勿怪也若不覺復合服以覺乃止凡用烏頭皆去皮熬令黑乃堪用不然至毒人宜慎之忌醋物桃李雀肉生葱豬肉冷水海藻菘菜古今録驗同又大棗湯療歷節疼痛方大棗十五枚擘黃芪四兩附子一枚炮生薑一兩麻黃五兩去節甘草一尺炙右六味切以水七升煮取三升服一升日三忌豬肉冷水海藻菘菜古今録驗同又療歷節諸風百節酸疼不可忍方松脂三十斤鍊五十遍不能五十遍二十遍亦可用右一味以鍊蘇三升溫和松脂三升熟攪令極調旦空腹以酒服方寸匕日三數數食麵粥為佳慎血腥生冷酢物果子百日差又松節酒主歷節風四肢疼痛猶如解落方通按酘音投酒再釀也松節四十斤細銼以水四石煮取一石猪椒葉四十斤細銼以水四石煮取一石右二味澄清合漬乾麴五斗候發以糯米四石五斗釀之依家醖法四酘勿令寒冷熱第一酘時下後諸藥柏子仁五兩礠石十二兩末獨活十五兩天雄五兩炮茵芋四兩炙防風十兩秦芁六兩芎藭五兩人參四兩萆􅐺五兩右十味細切內飯中炊之下酘為池酘足訖封頭四七日押取清適性服之勿令至醉吐忌豬肉冷水又方松膏一升搗酒三升浸七日服一合日再數劑即愈又方松葉三十斤酒二石五斗漬三七日服一合日五六並出第八卷中延年療歷節風四肢頭面腫方黃芪十二分獨活八分生地黃切三升暴乾豆豉一升熬鼠粘子三升暴乾右五味搗篩為散一服方寸匕飲汁下日二服加至二三匕忌蕪荑蒜麵豬肉一方無鼠粘子又療歷節風流入腰腳方獨活六兩𤣥參四兩犀角屑升麻各三兩生地黃切三升暴乾豉三合熬鼠粘根切三升暴乾右七味搗篩為散服方寸匕飲汁下日二服加至二三匕忌蕪荑蒜麵並出第十卷中古今録驗防風湯主身體四肢節解疼痛如墮脫腫按之皮急一作陷頭眩短氣溫溫悶亂如欲吐方防風桂心知母各四兩白术生薑各五兩芍藥甘草各三兩炙附子二枚炮右八味切以水一斗煮取三升分為三服忌生葱豬肉海藻菘菜桃李雀肉等出第四卷中千金有半夏杏仁芎藭為十味無附子中風角弓反張方七首病源風邪傷人令腰背反折不能俯仰似角弓者由邪入諸陽經故也出第一卷中肘後療中風無問男子婦人中風脊急身痓如弓紫湯方雞屎二升大豆一升防風三兩切右三味以水三升先煮防風取三合汁豆雞屎二味鎗中熬之令黃赤色用酒二升淋之去滓然後用防風汁和分為再服相去如人行六七里衣覆取汗忌風出第二卷中小品大巖蜜湯療中風身如角弓反張并主卒心腹絞痛方茯苓芎藭當歸甘草各一兩炙桂心二兩半梔子十四枚擘吳茱茰三兩細辛乾薑乾地黃各二兩右十味切以水八升煮取三升分為三服相去如行十里頃若痛甚者加羊脂三兩當歸芍藥人參各一兩心腹脹滿堅急者加大黃三兩忌酢生葱生菜海藻菘菜蕪荑等出第四卷中千金小巖蜜湯主惡風角弓反張飛尸入腹絞痛悶絶往來有時筋急少隂傷寒口噤不利方大黃二兩雄黃一兩青羊脂乾薑桂心芍藥甘草炙細辛乾地黃各四分吳茱茰三兩當歸四兩右十一味切以水二斗煮取六升分六服重者加藥用水三斗煮取九升分十服忌海藻菘菜生葱生菜深師同又療半身不隨手足拘急不得屈伸體冷或智或癡身彊直不語或生或死狂言不可名狀角弓反張或欲得食或不用食大小便不利方人參桂心當歸獨活黃芩乾薑各三分甘草二分炙石膏六分碎綿裹杏仁四十枚去皮兩仁尖碎右九味切以井華水九升煮取三升分二服日二覆取汗不汗更合服之忌海藻菘菜生葱等物又療賊風口噤角弓反張痓者方當歸防風各三分獨活六分麻黃去節五分附子一枚炮細辛二分右六味切以酒五升水二升煮取三升服一升口不開尺挍口下湯一服當開二服小汗三服大汗又單服荆瀝忌豬肉冷水生菜並出第八卷中備急療若身體角弓反張四肢不隨煩亂欲死者方清酒五升雞屎白一升熬右二味搗篩合和揚之千遍乃飲之大人服一升小兒服五合更小者服三合良肘後同出第二卷中必效療風入耳角弓反張及婦人風方烏豆二升熬令聲絶酒三升內鐺中急攪以絹濾頓服取汗不過三劑極重者和雞糞合熬若口不開者灌之良備急文仲同出第三卷中古今録驗療卒中風身體直角弓反張口噤西州續命湯方麻黃去節乾薑各三兩附子一兩炮防風桂心白术人參芎藭當歸甘草炙各一兩杏仁四十枚去皮尖及兩仁碎右十一味切以水九升煮取三升未食分再服覆令汗出文仲同出第一卷中風口噤方一十首病源諸陽經筋皆在於頭三陽之筋並絡入於頷頰夾於口諸陽為風寒所客則筋急故口噤不開診其脈遲者生出第一卷中深師竹瀝湯療卒中惡風噎倒悶口噤不能語肝厥方淡竹瀝一斗防風葛根各一兩菊花細辛芍藥白术當歸桂心通草防己人參各一兩甘草炙附子炮茯苓𤣥參各一兩秦芁生薑各二兩楓寄生三兩右十九味切以淡竹瀝一斗煮藥取四升分為四服忌海藻菘菜豬肉生菜生葱醋桃李雀肉等物又甘竹瀝湯療卒中惡風噎倒悶口噤不能語肝厥尸蹶死不識人閉目灸針不知痛風狂宜服此湯方甘竹瀝一斗生薑三兩防風甘草炙各三兩防己麻黃去節人參黃芩白术細辛茵芋秦芁桂心各一兩附子一枚人者炮右十四味㕮咀以湯漬藥令赤合竹瀝煮取四升分為四服忌海藻菘菜桃李雀肉生葱生菜豬肉冰水並出第十九卷中千金排風湯主諸毒風氣邪風所中口噤悶絶不識人身體疼煩面目暴腫手足腫方犀角末羚羊角貝齒末升麻末右四味各一兩和勻以方寸匕為一分水二升半內四匕煮取一升去滓服五合殺藥者以意增之若腫和雞子傅上日三老小以意亦可多合用之深師同又療中風口噤不能言者方防己二兩葛根三兩桂心麻黃去節各二兩甘草炙防風芍藥各一兩生薑四兩右八味切以水六升煮取二升分為三服瘖不能言皆療忌海藻菘菜生葱又方服淡竹瀝一斗又方白术四兩切酒二升右二味合煮取一升頓服之忌桃李雀肉又方服荆瀝一升又方豉五升綿裹吳茱茰一升右二味以水七升同煮取三升漸漸飲之並出第八卷中備急陶隱居效驗方療人卒中風口不開身不著席大豆散方大豆二升熬令焦乾薑椒汗各三兩右三味為散酒服一錢匕日一汗出即差大良文仲同又方若口噤不開大豆五升熬令黃黑以五升酒漬開口灌之取汗肘後同並出第二卷中風口喎方九首病源風邪入於足陽明手太陽之經遇寒則筋急引頰故使口喎僻言語不正而目不能平視診其脈浮而遲者可療養生方云夜卧當耳勿得有孔風入耳中喜口喎出第一卷中廣濟療風著口面喎語不多轉方生地黃汁一升竹瀝一升獨活三兩切右三味相和煎取一升頓服之未正更進藥一劑無所忌出第一卷中深師續命湯療中風口僻噤諸疾卒死不知人補虛起死神方人參木防己麻黃去節芍藥芎藭甘草炙黃芩白术各一兩桂心防風各二兩大附子一枚炮生薑五兩右十二味切以水一斗二升煮取三升分為三服不差復作忌海藻菘菜猪肉生葱桃李雀肉又療中風面目相引偏僻牙車疼急舌不得轉方牡蠣熬礬石燒令汁盡附子炮竈中黃土右四味分等搗篩以三嵗雄雞冠血和藥傅其急上預持鑒及水著邊照才欲復故便洗去血不速去便過不復還也肘後范汪同出第九卷中千金附子散主中風手臂不仁口面僻方附子炮桂心各五兩細辛防風人參乾薑各六兩右六味搗下篩酒服方寸匕日三稍稍增之忌猪肉冷水生葱生菜又口喎不正方取空青如豆一枚含之即愈范汪同又療卒中風口喎方以葦筒長五寸以一頭刺耳孔中四畔以麵密塞之勿令泄氣一頭內大豆一顆并艾燒之令然灸七壯即差患右灸左患左灸右千金不傳又方灸手交脉三壯左灸右右灸左其煙如鼠矢形橫安之兩頭放火也又方炒大豆三升令焦以酒三升淋取汁頓服之又方大皂莢五兩去皮子下篩以三年大醋和右喎塗左左喎塗右乾更塗並出第八卷中風失音不語方八首病源喉嚨者氣之所以上下也㑹厭者聲之戶舌者聲之機脣者聲之扇也風寒客於㑹厭之間故卒然無音皆由風邪所傷故謂風失音不語養生方云醉卧當風使人發瘖出第一卷中廣濟療風失音不得語方羌活十分甘草炙人參二分荆瀝竹瀝生地黃汁各二升大附子一枚炮八分右七味切諸藥內三汁中煎取一升六合去滓分溫二服未差四五日更進一劑取微利忌熱麵海藻菘菜猪肉冷水蕪荑魚蒜粘食出第一卷中深師防風湯療中風兩目不開不能言短氣欲死方防風甘草炙黃芩茯苓當歸各一兩杏仁五十枚去兩仁尖皮秦芁半兩生薑五兩乾棗三十枚擘麻黃二兩去節右十味㕮咀以清酒水共四升煮取三升分三服發汗忌海藻菘菜大酢又四逆湯療卒中風不能言厥逆無脉手足拘急者方山茱茰細辛乾薑炙各一兩甘草三兩炙麥門冬一升去心右五味切以水七升煮取二升分為四服忌海藻菘菜生葱菜出第九卷中肘後療卒不得語方以苦酒煮芥子薄頸一周以衣包之一日一夕乃解即差范汪千金同又方煮大豆煎其汁令如粘含之亦但濃煮飲之並出第一卷中范汪同千金厥失音論曰風寒之氣客於中滯不能發故瘖不言及喉疼失聲皆風邪所為也入藏皆能殺人凡尸蹶如死脈動如故陽脈下墜隂脈上爭氣閉故也療之方取竈突墨彈丸大漿和飲之又方濃煮桂汁服之一升覆取汗亦可末桂著舌下漸咽汁忌生葱范汪同又方濃煮豉汁含之亦佳並出第八卷中風不得語方二首病源脾脈絡胃夾咽連舌本散舌下心之别脈係舌本今心脾二藏受風邪故舌彊不得語也出第一卷中救急療中風身體緩急口目不正舌彊不能語奄奄忽忽神情悶亂諸風服之皆驗不令人虛湯方麻黃去節防己黃芩桂心芍藥甘草炙各一兩防風人參各六分附子一枚炮生薑二兩右十味切以水九升先煮麻黃三沸去沫內諸藥煮取二升五合去滓空腹分為三服服别相去十里能言别服十劑諸風悉愈禁生冷及風勞酒出第六卷中千金有芎藭杏仁為十二味古今録驗療卒不得語方取人乳汁半合以著美酒半升中合攪分為再服肘後范汪同出第十卷中風身體手足不隨方二首病源風身體手足不隨者由體虛腠理開風氣傷於脾胃之經絡也足太隂為脾之經脾與胃合足陽明為胃之經為水榖之海也脾候身之肌肉主為胃消行水榖之氣以養身體四肢脾氣弱則肌肉虛受風邪所侵故不能為胃通行水榖之氣致四肢肌肉無所稟受而風邪在經絡搏於陽經氣行則遲關機緩縱故令身體手足不隨也診其脈脾脈緩者為風痿四肢不用又心脈腎脈俱至即難以言九竅不通四肢不舉腎脉來多即死也其湯尉針石别有正方補養宣導今附於後養生方導引法云極力左右振兩臀不息九通愈臀痛勞倦風氣不隨振兩臀者更互踶􅀈猶言蹶九通中間偃伏皆為之名蝦蟇行氣不已愈臀痛勞倦風氣不隨患久行不覺痛癢作種種形狀又云偃卧合兩膝布兩足生腰口內氣振腹七息除壯熱疼痛兩脛不隨又云療四肢疼悶及四肢不隨腹內積氣牀席必須平而且穩正身仰卧緩解衣帶枕髙三寸握固握固者必兩手各自以四指把手拇指舒臂令去身各五寸兩腳竪指相去五寸安心定意調和氣息莫思餘事意專念氣徐徐漱醴泉漱醴泉者以舌䑛略脣口牙齒然後咽唾徐徐以口吐氣鼻引氣入喉須微微緩作不可卒急彊作待好調和引氣吐氣勿令自聞出入之聲每引氣心心