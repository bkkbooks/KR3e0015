骨之端如前三分許去丘墟七寸灸三壯主寒熱腰痛如小錐居其中沸然腫不可以欬欬則筋縮急諸節痛上下無常處寒熱痠痟四肢不舉腋下腫馬刀瘻髀膝脛骨摇酸痺不仁喉痺陽交一名别陽一名足􅂒陽維郄在外踝上七寸斜屬三陽分肉間灸三壯主寒厥癲疾噤齗瘈瘲驚狂喉痺胸滿面腫寒熱髀脛不收瘖不能言陽陵泉在膝下一寸外廉䧟者中足少陽脈氣所發灸三壯主太息口苦咽中介介數唾脇下支滿嘔吐逆髕痺引膝股引廉痛不仁筋急嘔宿汁心澹澹如人將捕之膽脹陽闗在陽陵泉上三寸犢鼻外䧟者中不宜灸主膝外廉痛不可屈伸脛痺不仁中瀆在髀外膝上五寸分肉間䧟者中足少陽脈氣所發灸五壯主寒氣在分肉間痛攻上下筋痺不仁環跳在髀樞中側卧伸下足屈上足取之足少陽脈氣所發灸五十壯主樞中痛不可舉腰脇相引急痛痺筋瘈脛痛不可屈伸痺不仁本神在曲差傍一寸半髮際上目直耳上入髪際四分足少陽陽維之會灸五壯主頭目眩痛頸項強急胸脇相引不得傾側癲疾嘔沫小兒驚癎頭維在額角髮際本神傍一寸五分禁不可灸主寒熱頭痛如破目痛如脱喘逆煩滿嘔吐流汗難言臨泣當目上眥直上入髮際五分䧟者中足少陽太陽之會灸三壯主頰青不得視口沫泣出兩目眉頭痛小兒驚癎反視目窓一名至營在臨泣後一寸足少陽陽維之會灸三壯主頭痛目瞑逺視􅑩􅑩上齒齲腫正營在目窓後一寸足少陽陽維之會灸五壯主牙齒痛唇吻急強齒齲痛惡寒承靈在正營後一寸半足少陽陽維之㑹灸五壯主腦風頭痛惡見風寒鼽衂鼻窒喘息不通腦空一名顳顬在承靈後一寸半俠玉枕骨下䧟者中足少陽陽維之會灸五壯主頭痛身熱引兩頷急腦風目眩頭痛風眩目痛鼻管疽發為厲鼻癲疾大瘦風池在顳顬後髮際䧟者中足少陽陽維之會灸三壯主寒熱癲疾僵仆温熱病汗不出頭眩痛㾬瘧頸項痛不得顧目泣出多氣多鼻􅍠衂目内眥赤痛氣發耳寒目不明喉痺傴僂引項筋攣不收顱息在耳後青脈間足少陽脉氣所發灸三壯主身熱頭重脇痛不可反側小兒癎喘不得息耳鳴懸顱在曲角顳顬上廉足少陽脈氣所發灸三壯主熱病頭痛引目外眥而急煩滿汗不出引頷齒面赤皮痛頷厭在曲角顳顬上廉足少陽陽明之會灸三壯主善嚏頭痛身熱目眩無所見偏頭痛引目外眥而急耳鳴懸釐在曲角顳顬下廉手足少陽陽明之會灸三壯主熱病偏頭痛引目外眥耳鳴善嚏陽白在眉上一寸直瞳子灸三壯主頭目瞳子不可以視頸項強急不可以顧絲竹空一名目􅡍在眉後䧟者中足少陽脈氣所發不可灸不幸使人目小及盲眩頭痛互引目中赤􅑩􅑩臍風目上挿痓反目憎風癲疾狂煩滿瞳子􅡍一名後曲在目外去眥五分手足少陽之會灸三壯主青盲無見逺視􅑩􅑩目中膚瞖白膜天衝在耳上如前三寸灸九壯主頭痛癲淚下嘔沫痓互引善驚蟀谷在耳上入髮際一寸五分嚼而取之灸三壯主醉酒風發兩角弦痛一云兩目眩不能飲煩滿嘔吐曲鬢在耳上入髪際曲隅䧟者中鼔頷有空足太陽少陽之㑹灸三壯主頸頷支滿引牙齒口閉不開急痛不能言浮白在耳後入髮際一寸下曲頰後灸三壯主足緩不收痿不能行不能言寒熱喉痺欬逆痰沫胸中滿不得喘息胸痛耳聾嘈嘈無所聞頸項癰腫不能言及癭氣肩背不能舉齒牙齲痛竅隂在完骨上枕骨下手足太陽少陽之會灸五壯主營疽發厲項痛引頸癰腫完骨在耳後入髮際四分足太陽少陽之會灸三壯主風頭耳後痛煩心足痛不收失履口喎僻頭項摇瘈牙車急癲疾僵仆頭面虚腫齒牙齲痛小便赤黄喉痺項腫不可俛仰頰腫引耳㾬瘧狂昜淵腋在腋下三寸宛宛中舉臂取之主胸滿馬刀臂不舉禁療不可灸灸之不幸生腫馬瘍内潰者死寒熱生馬瘍可大包脈出淵腋下三寸脾之大絡布胸脅中九肋間及季脇端灸三壯主腹有大氣不得息息則胸脇中痛實則其身盡寒虗則百節皆縱輒筋在腋下三寸復前行一寸著脇足少陽脈氣所發灸三壯主胸中暴滿不得卧喘息天池一名天㑹在乳後一寸腋下三寸著脇直腋撅肋間手心主足少陽脈之㑹灸三壯主寒熱胸滿頸痛四肢不舉腋下腫上氣胸中有聲喉中鳴章門脾募也一名長平一名脅髎在大横外直臍季肋端足厥隂少陽之會側卧屈上足舉臂取之灸三壯主腹中鳴盈盈然食不化脅痛不得卧煩熱口乾燥不嗜食胸脅支滿喘息而衝膈嘔心痛及傷飽身黄羸瘦腰痛不得反側賁豚腹腫腰清脊強四肢懈墮善怒欬少氣鬱鬱然不得息厥逆肩不舉馬刀身瞤石水胃脹帶脈在季肋下一寸八分灸五壯主婦人少腹堅痛月水不通五樞在帶脈下三寸一云在水道下一寸半灸五壯主男子隂疝兩丸上下入腹痛婦人下赤白裏急瘈瘲京門腎募也一名氣府一名氣輸在監骨腰中季肋本俠脊灸三壯主痙脊反折腰痛不可乆立俛仰寒熱腹䐜央央然不得息溢飲水道不通溺黄少腹裏急痛洞泄髀痛引背維道一名外樞在章門下五寸三分足少陽帶脈之㑹灸三壯主欬逆不止三焦有水氣不能食居􅡍在長平下八寸三分監骨上䧟者中陽蹻足少陽之會灸三壯主腰痛引少腹在腋前兩筋間主肩前痛與胸相引臂裏攣急手不得上舉至肩甄權千金楊操同後腋在腋後廉際兩筋間主腋外相引而痛手臂拘攣急不得上頭轉糓在傍二骨間䧟者中主胸脇支滿不欲食糓入糓不化嘔吐復出舉腋取之飲郄在食門下一寸骨間䧟者中主腹滿臚脹痛引臍傍腹鳴濯濯若中有水聲仰腹取之應突在飲郄下一寸主飲食不入腹中滿大便不得節腹鳴泄注仰腹取之脅堂在腋隂下二骨䧟者中主胸脇支滿臚脹賁㹠噫噦喘逆膽視目黄舉腋取之旁庭在脅堂下二骨間䧟者中舉腋取之灸三壯主卒暴痛中飛尸遁及胸脇支滿時上搶心嘔吐喘逆咽乾脇始素在腋脅下廉下二寸骨䧟者中主脅下支滿腰痛引腹筋攣隂氣上縮舉臂取之脾人脾者藏也兩傍四十八穴甲乙經脾出於隠白隠白者木也在足大指端内側去爪甲角如韭葉足太隂脈之所出也為井冬三月宜灸之流於大都大都者火也在足大指本節後䧟者中足太隂脈之所留也為榮春三月宜灸之注於太白太白者土也在足内側核骨下䧟者中足太隂脈之所注也為輸夏三月宜灸之行於商丘商丘者金也在足内踝上微前䧟者中足太隂脈之所行也為經入于隂陵泉隂陵泉者水也在膝下内側輔骨下䧟者中伸足乃得之足太隂脈之所入也為合秋三月宜灸之出第三卷中甄權千金楊操同隠白在足大指端内側去爪甲角如韭葉灸三壯主腹中有寒氣起則氣喘熱病衂血不止煩心善悲腹脹逆息熱氣足脛中寒不得卧氣滿胸中熱暴洩仰息足下寒膈中悶嘔吐不欲飲食尸厥死不知人脈動如故飲渇身體痛多唾大都在足大指本節後䧟者中灸三壯主熱病汗不出厥手足清暴泄厥心痛腹脹滿心尤痛甚者胃心痛也瘧不知所苦風逆暴四肢腫濕則唏然寒飢則煩心飽則眩太白在足内側核骨下䧟者中灸三壯主病先頭重頰痛煩寃身熱腰痛不可以俛仰腹滿兩頷痛甚暴泄善饑而不欲食善噫熱中足清腹脹食不化善嘔洩有膿血苦嘔無所出先取三里後取太白章門厥心痛腹脹滿心尤痛甚者胃心痛也胸脇支滿腹中切痛霍亂逆氣大便難身重骨痿不相知熱病滿悶不得卧脾脹公孫在大指本節之後一寸别走陽明太隂絡也灸三壯主瘧不嗜食多寒熱汗出實則腹中切痛厥頭面腫煩心狂言多飲不嗜卧虚則鼓脹腹中氣大滿熱痛不嗜飲霍亂商丘在内踝微前䧟者中灸三壯主癲疾狂多食善笑不不休發於外煩心中渇瘧寒腸中痛已汗出腹滿嚮嚮便心下有寒痛隂股内痛氣逆狐疝走上下腹痛脾虚令人病寒不樂好太息喉痺寒熱善嘔骨痺煩滿癎瘈手足擾癲疾目昏口噤溺黄筋攣痛病善厭夣者絶子厥頭痛面腫起欬而泄不欲食痔疾骨疽蝕漏谷在足内踝上六寸骨下䧟者中亦足太隂絡灸三壯主腹中熱若寒腸鳴強欠時内痛心悲氣逆腹滿腹脹而氣快然引肘脇下皆主之少腹脹急小便不利厥氣上頭巔三隂交在内踝上三寸骨下䧟者中足太隂厥隂少隂之會灸三壯主足下熱脛疼不能久立濕痺不能行腹中熱若寒膝内痛心悲氣逆腹滿小便不利厥氣上及巔脾病者身重苦饑足痿不欲行善瘈脚下痛虚則腹脹腹鳴溏洩食飲不化脾胃肌肉痛此出素問地機一名脾舍足太隂郄别走上一寸空在膝下五寸灸五壯主㿗疝溏瘕腹中痛藏痺隂陵泉在膝下内側輔骨下䧟者中伸足乃得之灸三壯主溏洩榖不化腹中氣脹嗑嗑脇下滿腹中氣盛腹脹逆不得卧腎腰痛不可俛仰氣癃尿黄寒熱不節女子疝瘕按之如似湯沃其股内至膝飱泄婦人隂痛少腹堅急痛重下不嗜食心下滿寒中小便不利霍亂足痺痛血海在膝下臏上内廉白肉際二寸中足太隂脈氣所發灸五壯主婦人漏下惡血月閉不通逆氣腹脹箕門在魚腹上越筋間動應手隂市内足太隂脈氣所發云在股上起筋間灸三壯主淋遺溺鼠鼷痛小便難期門期門肝經肝募也在第二肋端不容傍一寸五分上直兩乳足太隂厥隂隂維之會舉臂取之灸五壯主婦人産餘疾飲食不下胸脇支滿目眩足寒小便難心切痛善噫聞酸臭痠痺腹滿少腹尤大息賁脅下氣上下胷中有熱目青而嘔霍亂泄痢痓腹太堅不得息欬脅下積聚喘逆卧不安席時寒熱心太堅奔肫上下癃遺溺鼠鼷痛小便難而白瘖不能言日月日月膽經膽募也在期門下五分灸五壯主太息善悲小腹有熱欲走多唾言語不正四肢不收腹哀在日月下一寸半足太隂隂維之會灸五壯主便膿血寒中食不化腹中痛大横在腹哀下三寸直臍傍足太隂隂維之會灸五壯主大風逆氣多寒善悲腹結一名腸窟在大横下一寸三分灸五壯主繞臍痛搶心膝寒洩痢府舍在腹結下三寸足太隂隂維之會炙五壯主疝瘕髀中急痛循脅上下搶心腹滿積聚厥逆霍亂衝門一名慈宮去大横五寸在府舍横骨兩端約中動脈足太隂隂維之會灸五壯主寒氣腹滿癃淫濼身熱腹中積痛隂疝乳難子上衝心雲門雲門中府肺經在巨骨下氣户傍各二寸䧟者中動脈應手手太隂脈氣所發舉臂取之灸五壯主喉痺胸中暴逆先取衝脈後取三里雲門皆寫之欬喘不得息坐不得卧呼吸氣索咽不得胸中熱暴心腹痛疝積時發上衝心肩痛不可舉引缺盤脈代不至寸口四逆脈䜴不通中府肺募也一名膺中俞在雲門下一寸一云一寸六分乳上三肋間動脈應手䧟者中手太隂之會灸五壯主肺系急胸中痛惡清胸滿悒悒然膽熱嘔逆氣相追逐多濁唾不得息肩背風汗出腹脹食噎不下喉痺肩息肺脹皮膚骨痛寒熱煩滿周榮在中府下一寸六分䧟者中足太隂脈氣所發仰而陳膿取之灸五壯主胸脇支滿不得俛仰飲食不下欬唾胸鄉在周榮下一寸六分䧟者中足太隂脈氣所發仰而取之灸五壯主胸脇支滿却引背痛卧不得轉側天谿在胸郷下一寸六分䧟者中足太隂脈氣所發仰而有聲取之灸五壯主胸中滿痛乳腫賁膺欬逆上氣喉鳴食竇在天谿下一寸六分䧟者中足太隂脈氣所發舉臂取之灸五壯主胸脇支滿膈間雷鳴滀漉常有小聲甄權千金楊操同胃人胃者脾之腑也兩傍九十三穴去下承漿一單穴共九十二穴甲乙經胃出于厲兊厲兊者金也在足大指次指之端去爪甲如韭葉足陽明脈之所出也為井冬三月宜灸之流于内庭内庭者水也在足大指次指外間䧟者中足陽明脈之所留也為榮春三月宜灸之注于䧟谷䧟谷者木也在足大指次指之間本節後䧟者中去内庭二寸足陽明脈之所注也為輸夏三月宜灸之過于衝陽一名㑹骨在足趺上五寸骨間動脈上去䧟骨三寸足陽明脈之所過也為原行于解谿解谿者火也在衝陽後一寸半腕上䧟者中陽明脈之所行也為經入于三里三里者土也在膝下三寸胻外廉足陽明脈之所入也為合秋三月宜灸之出第三卷中甄權千金楊操同厲兊在足大指次指之端去爪甲如韭葉灸一壯主尸厥口噤氣絶脈動如故其形無知如中惡壯瘧不嗜食腹寒脹滿熱病汗不出􅍠衂眩前仆面浮腫足脛寒惡人與木音喉痺齲齒惡風鼻不利多卧善驚内庭在足大指次指外間䧟者中灸三壯主四肢厥逆手足悶者使人乆持之逆冷脛痛腹脹滿皮膚痛善伸數欠惡人與木音振寒嗌中引痛熱病汗不出下齒痛惡寒目急喘滿寒齗口噤僻不嗜食䧟谷在足大指次指之間本節後䧟者中去内庭二寸灸三壯主熱痢面腫目癰腫善嚙唇善噫腹痛脹滿腸鳴熱病汗不出水腫留飲胸脇支滿衝陽一名㑹原在足跗上五寸骨間動脈上去䧟谷三寸灸三壯主皮先寒熱病汗不出口熱痛胃管痛時寒熱皆主之齒齲痛腹大不嗜食振寒而欠狂妄而行登高而歌棄衣而走足下緩失履風水面胕腫解谿在足衝陽後一寸半腕上䧟者中灸三壯主熱病汗不出善噫腹脹滿胃熱譫言風水面胕腫顔黒厥氣上支腹脹大下重瘧瘈瘲驚股膝重胻轉筋頭眩痛癲疾厥寒熱欠煩滿悲泣出狂易見鬼與火霍亂風從頭至足面目赤口痛齧痛豐隆足陽明絡也在外踝上八寸下廉䯒外廉䧟者中灸三壯主厥逆胷痛如刺腹中切痛大小便澁難厥頭痛面浮腫煩心狂見鬼善笑不休發於外有所大喜喉痺不能言巨虚下廉足陽明與小腸合在上廉下二寸灸三壯主少腹痛飱泄出麋次指間熱若脈䧟寒熱身痛唇乾不得汗出毛髮焦脱肉少氣内有熱不欲動摇泄膿血腰引少腹痛暴驚狂言非常女子乳癰驚痺脛腫足跗不收跟痛條口在下廉上一寸足陽明脈所發灸五壯主脛寒不得卧脛疼足緩失履濕痺足下熱不能乆立巨虚上廉足陽明與大腸合在三里下三寸灸三壯主飱泄大腸痛狂妄走善欠大腸有熱腸鳴腹滿俠臍痛食不化喘不能行立胸脇支滿惡聞人木音風水面腫甄權云主大氣不足偏風腲腿脚不隨三里在膝下三寸胻外廉灸三壯主陽厥悽悽而寒少腹堅頭痛脛股腹痛消中小便不利善噦痓中有寒腹中寒脹滿善噫聞食臭胃氣不足腸鳴腹痛食不化心下脹熱病汗不出喜嘔吐苦癃痓身反舌口噤喉痺不能言寒熱隂氣不足熱中消縠善饑腹熱身煩狂言胸中瘀血胷脇支滿膈痛不能乆立膝痿寒水腹脹皮腫乳癰有熱五藏六腑脹狂歌妄言怒恐惡人與火罵詈霍亂遺矢失氣犢鼻在膝臏下胻上骨俠解大筋中足陽明脈氣所發灸三壯主犢鼻腫先熨去之其赤堅勿攻攻者死膝中痛不仁難跪起諸腫節潰者死不潰可療也梁丘足陽明郄在膝上二寸兩筋間灸三壯主火驚乳痛脛苦痺膝不能屈伸不可以行隂市一名隂鼎在膝上三寸伏兎下若拜而取之足陽明脈氣所發不可灸主寒疝下至腹腠膝腰痛如清水大腹諸疝按之下膝上伏兎中寒痛腹脹滿痿厥少氣伏兎在膝上六寸起内足陽明脈氣所發禁不宜灸髀闗在膝上伏兎後交分中灸三壯主膝寒痺不仁痿不得屈伸承泣一名谿穴一名面􅡍在目下七分直目瞳子蹻脈任脈足陽明之會甄權云在眼下八分禁不宜灸無問多少三日以後眼下大如拳息肉長桃許大至三十日即定百日都不見物或如升大目不明淚出目眩瞢瞳子痒逺視􅑩􅑩昬夜無所見目瞤動與項口參相引喎僻口不能言四白在目下一寸足陽明脈氣所發灸七壯主目痛口僻淚出目不明迎香一名衝陽在禾􅡍上鼻下乳傍手足陽明之會主鼻􅍠不利窒洞氣寒喎僻多涕鼻衂有齆不宜灸巨􅡍在俠鼻傍八分直瞳子蹻脈足陽明之會主靣目惡風寒䪼腫癰痛招摇視瞻瘈瘲口僻青盲無所見逺視􅑩􅑩目中淫膚白膜覆瞳子地倉一名胃維俠口傍四分如近下蹻脈手足陽明之會灸三壯主口緩不收不能言語手足痿躄不能行承漿一名天池在頤前下唇之下足陽明任脈之會開口取之灸三壯主寒熱悽厥鼓頷癲疾嘔沫寒熱痓互引口乾小便赤黄或時不禁消渴嗜飲目瞑身汗出衂血不止上齒齲頰車在耳下曲頰端陷者中足陽明脈氣所發灸三壯開口有空主頰腫口急頰車骨痛齒不可用嚼大迎一名髓孔在曲頷前一寸二分骨陷者中動脈足陽明脈氣所發灸三壯主寒熱頸瘰癧癲疾口喎喘痓悸口噤厥口僻失欠下牙痛頰腫惡寒口不收舌不能言不得嚼上闗一名客主人在耳前上廉起骨開口有空灸三壯主唇呦強上齒齲痛口僻噤不開耳痛聾齆瘈瘲口沫出寒熱痓青盲􅀈目惡風寒下闗在客主人下耳前動脈下空下廉合口有空張口而閉灸三壯主失欠下齒齲下牙痛䪼腫耳聾鳴痓口僻耳中有乾底聤耳有膿不可灸之耳門在耳前起肉當耳中缺者灸三壯主耳中有膿及底耳聤耳皆不灸主耳痛鳴聾頭頷痛上齒齲人迎一名天五會在頸大脈動應手俠結喉傍以候五藏之氣足陽明脈氣所發禁不可灸灸之不幸殺人一云有病可灸三壯主陽逆霍亂陽逆頭痛胸滿不得息胸滿呼吸喘喝窮屈窘不得息刺人迎入四分不幸殺人水突一名水門在頸大筋前直人迎下氣舍上足陽明脈氣所發灸三壯主欬逆上氣咽喉癰腫呼吸短氣喘息不通氣舍在頸直人迎俠天突陷者中足陽明脈氣所發灸三壯主欬逆上氣瘤癭氣咽腫肩腫不得顧喉痺氣户在巨骨下俞府兩傍各二寸陷者中足陽明脈氣所發仰而取之灸五壯主胸脇支滿喘逆上氣呼吸肩息不知食味庫房在氣户下一寸六分陷者中足陽明脈氣所發仰而取之灸五壯主胸脇支滿欬逆上氣呼吸多唾濁沬膿血屋翳在庫房下一寸六分陷者中足陽明脈氣所發