不足以息心痛如似刺厥心痛與背相引善瘈如從後觸其心傴僂者腎心痛也厥心痛如錐刺其心心痛甚者脾心痛也胷中寒脈代時不至上重下輕足不能安地少腹脹上搶心胷脅支滿欬唾有血喉痺癃疝石水女子不字隂暴出淋漏男子精溢脛酸不能乆立寒熱消渴黄癉足一寒一熱舌縦煩滿小兒臍風口不開善驚痿厥癲疾洞泄太谿在足内踝後骨上動脈陷者中灸三壯主乆瘧欬逆心悶不得卧嘔甚熱多寒少欲閉户而處寒厥足熱腎脹熱病汗不出黙黙嗜卧溺黄少腹熱嗌中痛腹脹内腫涎下厥心痛如錐刺其心心痛甚者脾心痛也霍亂出泄不自知消癉善噫氣走喉咽而不能言手足清尿黄大便難嗌中腫痛唾血口中熱如膠胞中有大疝瘕積與隂相引如痛苦况泄上下出渥胷中滿痛乳腫潰欬逆上氣喉咽喝有聲厥氣上逆大鍾在足跟後衝中走太陽足少隂絡灸三壯主實則閉癃悽悽腰脊強痛嗜卧口中熱虚則腰痛寒厥煩心悶喘少氣不足以息腹滿大便難時上走胷中鳴脹滿口舌乾口中吸吸善驚咽中痛不可内食善怒驚恐不樂欬喉中鳴欬唾血大腸結照海隂蹻脈所生在足内踝下灸三壯主熱痛頌心足寒清多汗先取然谷後取太谿大指上動脈皆先補之目痛引脊少腹偏痛嘔瘈瘲視昬嗜卧痓驚善悲不樂如墮狀汗不出面塵黒病饑不欲食卒疝少腹痛病在左取右右取左立已隂暴起疝女子不下月水婦人淋漓隂挺出四肢淫濼心悶久瘧及諸淋目中赤痛偏枯不能得行大風黙黙不知所痛視如見星尿黄少腹熱咽乾痺水泉足少隂郄去太谿下一寸在内踝下灸五壯主月經不来来而多心下痛目􅑩􅑩不可逺視復溜一名伏白一名昌陽在足内踝上二寸陷者中灸五壯主腰痛引脊内廉嗌乾腹瘈痛坐起目􅑩􅑩善怒多言瘧熱少氣足胻寒不能自温腹䐜切痛引心心如懸隂厥脚腨後廉急不可前却腸澼下膿血足趺上痛舌卷不能言善笑足痿不收病溺青赤白黄黑青取井赤取榮黄取輸白取經黑取合血痔泄後重腹痛如淋狀及火氣涎出鼻孔中痛腹中雷鳴骨寒熱無所安汗出不休心風四肢腫氣在横骨風逆四肝腫乳難交信穴在内踝上二寸少隂前太隂後廉筋骨間足隂蹻之郄灸三壯主氣癃㿗疝隂急股引腨内廉骨痛築賓在足内踝上腨分中灸五壯主大疝絶子狂癲疾嘔吐隂谷在膝内輔骨之後大筋之下小筋之上按之應手屈膝而得之灸三壯主舌縱涎下煩悶脊内廉痛溺難隂痿不用少腹急引隂及脚内廉痛婦人漏血腹脹滿不得息小便黄男子如蟲女子如阻寒熱腹偏腫輸府在巨骨下去璇璣傍各二寸陷者中足少隂脈氣所發仰卧而取之灸五壯主欬逆上氣喘不得息嘔吐胸滿不得飲食或中在輸府下一寸六分陷者中足少隂脈氣所發仰卧而取之灸五壯主欬逆上氣涎出多唾呼吸喘悸坐不得安神藏在或中下一寸六分陷者中足少隂脈氣所發仰而飲食取之灸五壯主胷滿欬逆喘不得息嘔吐煩滿不得靈墟在神藏下一寸六分陷者中足少隂脈氣所發仰而取之灸五壯主胸脇支滿痛引膺不得息悶亂煩滿不得飲食神封在靈墟下一寸六分陷者中仰而取之灸五壯主胷脅支滿不得息欬逆乳癰洒淅惡寒步郎在神封下一寸六分陷者中足少隂脈氣所發仰而取之灸三壯主胸脇支滿膈逆不通呼吸少氣喘息不得舉臂幽門一名上門在巨闕傍半寸陷者中衝脈足少隂之會灸五壯主胸脇背相引痛心下溷溷嘔吐多唾飲食不下善噦支滿不能食數欬善忘泄有膿血嘔沫吐涎少腹堅善唾女子心痛逆氣善吐食不下通谷在幽門下一寸陷者中衝脈足少隂之會灸五壯主失欠口喎僻不端食飲善嘔不得言一云舌下腫難以言舌縱喎戾不端隂都一名食宮在通谷下一寸衝脈足少隂之會灸五壯主身寒熱㾬瘧心滿氣逆石闗在隂都下一寸衝脈足少隂之會灸五壯主痓脊強痛口不可開多唾大便難婦人于藏中有惡血内逆滿商曲在石闗下一寸衝脈足少隂之會灸五壯主腹中積聚時切痛盲俞在商曲下一寸直臍膀五分衝脈足少隂之㑹灸五壯主心大堅大腸寒中大便乾腹中切痛中注在盲俞下五分衝脈足少隂之會灸五壯主少腹有熱大便難四滿一名隨府在中注下一寸衝脈足少隂之會灸五壯主臍下積聚疝瘕胞中有血腸澼泄切痛振寒大腹石水腎痛氣穴一名胞門一名子户在四滿下一寸衝脈足少隂之會灸五壯主月水不通奔氣上下引腰脊痛大赫一名隂維一名隂闗在氣穴下一寸衝脈足少隂脈之會灸五壯主女子赤淫男子精溢上縮横骨一名下極在大赫下一寸衝脈足少隂之會灸五壯主少腹滿小便難隂下縱卵中痛鳩尾一名尾翳一名􅐳骭在臆前蔽骨下五分任脈之别不可灸刺一云灸五壯主心中寒脹滿不得息息賁時唾血血瘀熱病胸中痛不得卧心痛不可按善噦心疝大息靣赤心背相引而痛數噫喘息胷滿欬嘔腹痛皮瘙痒喉痺食不下甄權云宜針不宜灸巨闕在鳩尾下一寸任脈氣所發灸五壯主心痛不可按煩心熱病胷中澹澹腹滿暴痛恍惚不知人手清少腹滿瘈瘲病心疝滿不得息息賁時唾血心腹脹滿噫煩熱善嘔膈中不通利霍亂發狂妄言怒恐惡火善罵詈狐疝驚悸少氣胸脇支滿瘈瘲引少腹痛短氣煩滿嘔吐心脹上管在巨闕下一寸五分去蔽骨三寸足陽明手太陽任脈之會灸五壯主寒中傷飽食飲不化䐜脹心腹胷脅支滿脈虚則生百病甄權云主心風驚悸不能食心下有隔嘔血目眩頭懸眩痛身熱汗不出心痛有三蟲多涎不得反側腹中滿暴痛汗出中管一名太倉在上管下一寸手太陽少陽足陽明所生任脈之會灸七壯主腹脹不通心大堅胃脹霍亂出泄不自知先取太谿後取太倉之原溢飲脅下堅痛腹脹不通寒中傷飽食飲不化頭熱􅍠血目黄振寒噫煩滿膈嘔傷憂損思氣積疰甄權云主因讀書得賁豚氣積聚腹中脹暴滿心痛身寒難以俛仰衝疝冒死不知人心腹痛發作腫聚往来上下行痛有休止腹中熱善涎出是蛕咬也鼻聞焦臭大便難小腸有熱尿赤黄病温汗不出有血溢水建里在中管下一寸灸五壯主心痛上搶心不欲食支痛斥膈甄權云主腹脹逆氣上并霍亂下管在建里下一寸是太隂任脈之會灸五壯主飲食不化入腹還出六腑之穀氣不轉甄權云主小便赤腹堅硬孕婦不可灸水分在下管下一寸臍上一寸任脈氣所發灸三壯主痓脊強裏急腹中拘急痛甄權云主水病腹腫孕婦不可灸臍中神闕穴也一名氣舍灸三壯主水腹大臍平腹無理不治絶子灸令人有子臍疝繞臍痛衝胷不得息甄權云主水腫臌脹腸鳴狀如雷聲時上衝心口灸七壯至四百壯隂交一名少闗一名横户在臍下一寸任脈衝脈少隂之會灸五壯主水脹水氣行皮中甄權云穴在隂莖下附底宛宛中主驚不得眠善斷水氣上下五藏遊氣也隂疝引睪女子手脚拘攣腹滿疝月水不下乳餘疾絶子隂痒賁豚上䐜腹堅痛引隂中不得小便兩丸騫孕婦不可灸氣海一名脖胦一名下肓在臍下一寸半任脈氣所發灸五壯主少腹疝卧善驚甄權云主下熱小便赤氣痛狀如刀攪孕婦不可灸石門一名利機一名精露一名丹田一名命門在臍下二寸任脈氣所發灸三壯女子禁不可灸主臍疝繞臍痛三焦脹水腹大及水氣行皮中心腹中卒痛而汗出氣癃小便黄氣滿虚則遺溺身寒熱吐逆溺難腹滿疝積乳餘疾絶子隂痒賁豚上䐜腹痛口強不能言莖腫先引腰後引少腹腰髖少腹堅痛下引隂中不得小便兩丸騫甄權云主婦人因産惡露不止闗元一名次門在臍下三寸任脈足三隂之會灸七壯主寒熱石水痛引脅下脹頭眩痛身盡熱氣癃尿黄甄權云主小便處痛狀如散火轉胞不得尿少腹滿引脅下脹頭眩痛身盡熱賁豚寒熱入少腹時欲嘔傷中溺血小便數腰背臍痛下引隂腹中窘急欲湊後泄不止癲暴疝痛少腹大熱身所傷血出多反中風寒若有所墜墮四肢解㑊不收名曰體解女子絶子衃血在内不下中極一名氣原一名玉泉在臍下四寸任會足三隂之㑹灸三壯女子禁中央腹熱痛婦人子門不端少腹苦寒隂痒及痛經閉不通乳餘疾絶子内不足賁肫上搶心甚則不能息忽忽少氣尸厥心煩痛饑不能食善寒中腹脹引脇而痛少腹與脊相控暴痛時窘之後經閉不通小便不利丈夫失精孕婦不可灸曲骨在横骨上中極下一寸毛際陷者中動應手任脈足厥隂之㑹灸三壯主膀胱小便難脚屈轉胞不得尿婦人赤白淫隂中乾痛惡合隂陽水脹滿尿澁癲疾不嘔沫會隂一名屏之在大便前小便後兩隂間任脈别絡俠督脈者衝脈會灸三壯主痺小便難竅中熱實則腹皮痛虚則痒搔痔與隂相通者死隂中諸病前後相引痛不得大小便女子血不通男子隂端寒上衝心中狠狠廉泉一名本池在頷下結喉上舌本下隂維任脈之㑹灸三壯主舌下腫難以言舌縱涎出欬逆少氣喘息嘔沫噤齘上氣胸滿天突一名玉户在頸結喉下五寸中央宛宛中隂維任脈之會灸三壯主欬上氣喘暴瘖不能言及舌下俠青縫脈頸有大氣喉痺咽中乾急不能息喉中鳴翕翕寒熱頸腫肩痛胸滿腹皮熱衂氣鯁心痛癮疹頭痛面皮赤熱身肉盡不仁璇璣在天突下一寸中央陷者中任脈氣所發仰頭取之灸五壯主胸滿痛喉痺咽癰水漿不下華盖在璇璣下一寸陷者中任脈氣所發仰頭取之灸五壯主胸脅支滿痛引胸中欬逆上氣喘不能言紫宮在華盖下一寸六分陷者中任脈氣所發仰而取之灸五壯主胸脇支滿痺痛骨疼飲食不下嘔逆上氣煩心玉堂一名玉英在紫宮下一寸六分陷者中任脈氣所發灸五壯主胸中滿不得息脅痛骨疼喘逆上氣嘔吐煩心亶中一名元兒在玉堂下一寸六分直兩乳間陷者中任脈氣所發仰而取之灸五壯主胸痺心痛煩滿欬逆喘唾短氣不得息不能言中庭在亶中下一寸六分陷者中任脈氣所發灸三壯主胸脅支滿膈塞飲食不下嘔吐食復還出甄權千金楊操同膀胱人膀胱者腎之腑也兩傍一百二十穴并二十二單穴及膏盲附穴共一百四十四穴甲乙經膀胱出于至隂至隂者金也在足小指外側去爪甲角如韭葉足太陽脈之所出也為井冬三月宜灸之流于通谷通谷者水也在足小指外側本節前陷者中足太陽脈之所留也為榮春三月宜灸之注于束骨束骨者木也在足小指外側本節後陷者中足太陽脈之所注也為輸夏三月宜灸之過于京骨在足外側大骨下赤白肉際陷者中足太陽脈之所過也為原行于崑崙崑崙者火也在足外踝後跟骨上陷者中足太陽脈之所行也為經入于委中委中者土也在腘中央動脈足太陽脈之所入也為合秋三月宜灸之甄權千金楊操同至隂在足小指外側去爪甲角如韭葉灸三壯主頭重鼻􅍠及瘈汗不出心煩足下熱不欲近衣項痛目瞖及小便不利㾬瘧寒熱疝風寒從足小指起通谷在足小指外側本節前陷者中灸三壯主身疼痛喜驚互引鼻􅍠癲疾寒熱目􅑩􅑩喜欬喘逆狂疾不嘔沫痓善唏頭眩項痛煩滿振寒㾬瘧束骨在足小指外側本節後陷者中灸三壯主身痛狂善行癲疾寒熱腰痛如折痓驚互引脚如結踹如裂暴病頭痛身熱痛肌肉動耳聾惡風目眥爛赤項不可顧髀樞痛泄腸澼瘧從䯒起京骨在足外側大骨下赤白際陷者中灸三壯主㾬瘧寒熱善唏頭重足寒不欲食脚攣癲疾狂妄善自齧頰偏枯腰髀樞痛善摇頭鼽衂頭痛目白瞖跟尻瘈瘲頭腫痛泄注上搶心目赤眥爛無所見痛從内眥始腹滿頸項強腰背不可俛仰眩痿厥身體不仁手足偏小先取京骨後取中封絶骨寫之厥心痛與肩背相引善瘈如從後觸其心傴僂者腎心痛也痓目反白多鼻不通利涕黄便血申脈陽蹻所出也在足外