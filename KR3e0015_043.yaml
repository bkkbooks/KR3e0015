body:
  text: 外臺秘要方卷三十九唐王燾撰明堂序夫明堂者黄帝之正經聖人之遺教所注孔穴靡不指的又皇甫士安晉朝高秀洞明醫術撰次甲乙並取三部為定如此則明堂甲乙是醫人之秘寳後之學者宜遵用之不可苟従異説致乖正理又手足十二經亦皆有俞手足者隂陽之交會血氣之流通外牽肢節内連藏腑是以原明堂之經非自古之神解孰能與於此哉故立經以言疾之所繇圖形以表孔穴之名處比来有經而無圗則不能明脈俞之會合有圖而無經則不能論百疾之要也繇是觀之書之與圖不可無也又人形不同長短異狀圖象參差差之毫釐則孔穴乖處不可不詳也今依凖甲乙正經人長七尺五寸之身千金方云七尺六寸四分今半之以為圖人長三尺七寸五分千金方云三尺八寸二分其孔穴相去亦半之五分為寸其尺用古尺其十二經脉皆以五色作之奇經八脉並以綠色標記諸家並以三人為圖今因十二經而畫圖人十二身也經脉隂陽各隨其類故湯藥攻其内以灸攻其外則病無所逃知火艾之功過半於湯藥矣其針法古来以為深奥今人卒不可解經云針能殺生人不能起死人若欲錄之恐傷性命今並不錄針經唯取灸法其穴墨㸃者禁之不宜灸朱㸃者灸病為良具注於明堂圖人並可覽之黄帝素問擿孔穴原經脉窮萬病之所始九卷甲乙及千金方甄權楊操等諸家灸法雖未能逺窮其理且列流注及傍通終疾病之狀爾論邪入皮毛經絡風冷熱灸法素問岐伯曰夫邪之客於形必先入於皮毛留而不去入於孫絡又留而不去入於經脉内連五藏散於腸胃隂陽俱感五藏乃傷此邪之従皮毛而入於五藏之次也如此則療其經今邪客於皮毛入於孫絡留而不去閉塞不通不得入於經溢於大絡而生奇病焉出第二卷中夫五藏六腑精靈之氣順脈而出附經而入終而復始如環無端若越其數者則傷脈而損經變為異病也岐伯曰凡欲療風則用火灸風性浮輕色或赤或白痒多者風熱也寒性沈重色或青或黑痛多者寒也濕性萎潤色黄鮮瘀痺多者濕也此三種本同而末異也風為百病之長邪賊之根一切衆病悉因風而起也欲灸風者宜従少以至多也灸寒者宜従多以至少也至多者従三壯五壯七壯又従三十五十七十壯名曰従少至多也灸寒濕者宜従多以至少也従七十五十三十又従七百五百三百名曰従多以至少也灸風者不得一頓滿一百若不灸者亦可以蒸藥熨之灸寒濕者不得一頓滿千若不灸亦可蒸藥熏之風性浮輕則易散故従少而至多也寒性沈重則難消故従多而至少也論疾手足腹背灸之多少及補瀉八木火法楊操音義云凡手足内脈皆是五藏之氣所應也手足外脈皆是六腑之氣所應也四肢者身之支幹也其氣係於五藏六腑出入其灸疾不得過頓多也宜依經數也若頓多血脈絶於火下而火氣不得行隨脈逺去也故云三壯五壯七壯者經曰乃更添灸以差為度其手足外皆是陽脈也不得過於二壯腹中者水榖之所盛風寒之所結灸之務欲多也脊者身之梁太陽之所合隂陽動作冷氣成疾背又重厚灸之宜多經脈出入往来之處故灸能引火氣凡灸皆有補瀉補者無吹其火須炷自滅瀉者疾吹其火傳其艾須其火至滅也其艾炷根下廣三分長三分若減此不覆孔穴不中經脈火氣不行亦不能除病也凡灸忌用松栢桑棗竹柿楓榆八木以用灸人害人肌肉筋脈骨髓可用陽燧火珠映日取火若隂無火鑽槐木以菊莖延火亦可䃈石以艾蒸之取火用灸大良又無此宜以香油布纒及艾莖别引取火則去疾不傷人筋骨皆欲得觸傷其痛根瘡若不攘則病不除也甲乙丙卷云灸則不發者灸故履底令熱好熨之三日即發也得發則病愈矣不宜灸禁穴及老少加减法甲乙經頭維下闗承光腦户氣衝脊中伏兎乳中地五會風府泉腑瘖門天府經渠白環輸鳩尾迎香石門女子絲竹空承泣耳門人迎瘈脈少商尺澤隂市陽闗甲乙經少海小海睛明闗衝右三十二穴並忌不宜灸千金甄權楊操同出第三卷中凡灸有生熟候人盛衰及老少也衰老者少灸盛壯肥實者多灸凡孔穴皆逐人形大小取手中指頭第一節為寸男左女右又一云三寸者盡一中指也凡人年三十以上若不灸三里令人氣上眼闇所以三里下氣也出第三十七卷中黄帝問曰凡灸大風大雨大隂大寒灸否既不得灸有何損益岐伯荅曰大風灸者隂陽交錯大雨灸者諸經絡脈不行大隂灸者令人氣逆大寒灸者血脈蓄滯此等日灸乃更動其病令人短壽大風者所謂一復時不可加火艾大寒者所謂盛冬凌辰也大雨者但雨日即不得雖然有卒得又逢大雨此止可灸之大隂者謂諸雲霧恝合凡人初患卒得終是難下手經云當其盛也慎勿衰傷即是初得重病之狀候年神傍通法論曰此等諸法並散在諸部不可尋究故集之一處造次易知所以省披討也孔穴主對法論曰凡云孔穴主對者穴名在上病狀在下或一病有數穴或數病共一穴皆臨時斟酌作法用之其有須灸者即灸之不宜灸者經穴了注其名並為良法但恨下里間知者鮮爾所以學者深須解之皆須玅解知灸知藥固是良醫通按此欵出千金本文言針言灸言藥合治方為良法今刪去針單言灸藥遂覺文理欠順又云經穴注了其灸似誤或是了注其名臍心肘咽口頭脊膝足年一二三四五六七八九十十一十二十三十四十五十六十七十以上人神所在八傍㸔他皆倣此十九二十二一二二二三二四二五二六二七二八二九三十三一三二三三三四三五三六三七三八三九四十四一四二四三四四四五四六四七四八四九五十五一五二五三五四五五五六五七五八五九六十六一六二六三六四六五六六六七六八六九七十七一七二七三七四七五七六七七七八七九八十八一八二