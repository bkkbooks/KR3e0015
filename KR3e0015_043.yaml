痛寒熱骨痛頭眩目痛頭半寒目痛不能視項似㧞不可左右顧癲疾不嘔沫互引天柱在俠項後髮際大筋外廉陷者中足太陽脈氣所發灸三壯主寒熱暴拘攣癎眩足不任目􅑩􅑩赤痛痓厥頭痛項先痛腰脊為應眩頭痛重目如脱項如㧞狂見目上及項直不可以顧暴攣足不仁身痛欲折咽腫難言小兒驚癎大杼在項第一椎下兩傍各一寸半陷者中足太陽手少陽之會灸七壯主癲疾不嘔沫㾬瘧頸項痛不可以俛仰頭痛振寒瘈瘲氣實脅滿傷寒汗不出腰背痛痓脊強喉痺大氣滿喘胸中鬱鬱身熱眩目􅑩􅑩項強急寒熱僵仆不能乆立煩滿裏急身不安席風門一名熱府在第二椎下兩傍各一寸半督脈足太陽之會灸五壯主風頭眩痛鼻􅍠不利時嚏清涕自出肺俞在第三椎下兩傍各一寸半灸三壯主肺寒熱呼吸不得卧欬上氣嘔沫喘氣相追逐胸滿背膺急息難振慄脈鼓氣隔胸中有熱支滿不嗜食汗不出腰背痛肺脹癲疾憎風時振寒不能言得寒益甚身熱狂欲自殺目妄見瘈瘲泣出死不知人心俞在第五椎下兩傍各一寸半灸三壯主寒熱心痛循循然與背相引而痛胷中邑邑不得息欬唾血多涎煩中善噎飲食不下嘔逆汗不出如瘧狀目􅑩􅑩淚出悲傷㾬瘧心脹膈俞在第七椎下兩傍各一寸半灸三壯主悽悽振寒數欠伸欬而嘔膈寒食飲不下寒熱皮肉骨痛少氣不得卧胸滿支兩脇膈上兢兢脇痛腹䐜胃管暴痛上氣肩背寒痛汗不出喉痺腹中痛積聚嘿嘿然嗜卧怠惰不欲動身常濕心痛周痺身皆痛痓大風汗出癲狂肝俞在第九椎下兩傍各一寸半灸三壯主欬而脅滿急不得息不可反側撅脅下與臍相引筋急而痛反折目上視眩中循循然眉頭痛驚狂衂少腹滿目􅑩􅑩生白瞖欬引胸痛筋寒熱唾血短氣鼻酸痓筋痛急互相引肝脹癲狂膽俞在第十椎下兩傍各一寸半足太陽脈氣所發正坐取之灸三壯主胸滿嘔無所出口苦舌乾飲食不下脾俞在第十一椎下兩傍各一寸半灸三壯主腹中氣脹脅引脊痛食飲多身羸瘦名曰食晦先取脾俞後取季黄癉善欠脅下滿欲嘔身重不動脾痛熱痓大腸轉氣按之如覆杯熱引胃痛脾氣寒四肢急煩不嗜食痺脹胃俞在第十二椎下兩傍各一寸半灸三壯主胸中寒脹食多身羸瘦腹中滿而鳴腹䐜風厥胷脅支滿嘔吐脊急痛筋攣食不下三焦俞在第十三椎下兩傍各一寸半足太陽脈氣所發灸三壯主頭痛飲食不下腹鳴臚脹欲嘔時注泄腎俞在第十四椎下兩傍各一寸半灸三壯主腰痛不可俛仰反側熱痓寒熱食多身羸瘦兩脅引痛心下焦痛心如懸下引臍少腹急痛熱面黒目􅑩􅑩喘欬少氣溺滑赤骨寒熱便難腎脹風頭痛如破足寒如水頭重身熱振慄腰中四肢淫濼欲嘔腹鼔大寒中洞泄食不化骨寒熱引背不得息大腸俞在第十六椎下兩傍各一寸半灸三壯主大腸轉氣按之如覆杯食飲不下善噎腸中鳴腹䐜而腫暴洩腰痛是主津液所生病者目黄口乾衂喉痺肩前臑痛大指次指痛不用氣盛有餘則熱腫虛則寒慄小腸俞在第十八椎下兩傍各一寸半灸三壯主少腹痛熱控睪引腰脊疝痛上衝心腰脊強溺難黄赤口乾大小便難淋痔膀胱俞在第十九椎下兩傍各一寸半灸三壯主熱痓互引汗不出反折尻臀内痛似癉瘧狀腰脊痛強引背少腹俛仰難不得仰息痿重尻不舉溺赤腰以下至足清不仁不可以坐起中膂内俞在第二十椎下兩傍各一寸半俠脊起肉灸三壯主腰痛不可以俛仰寒熱痓反折互引腹脹腋攣背中怏怏引脅痛内引心從項始數脊椎俠膂如痛按之應手灸立已白環俞在第二十一椎下兩傍各一寸半足太陽脈氣所發不可灸主腰脊以下至足不仁小便黄上􅡍在第一空腰髁下一寸俠脊陷者中足太陽少陽之絡灸三壯主腰脊痛而清善傴睪跳騫寒熱熱病汗不出㾬瘧女子絶子隂挺出不禁白瀝次􅡍在第二空俠脊陷者中灸三壯主腰痛怏怏然不可以俛仰腰以下至足不仁脊腰背寒先取缺盆後取尾骶與八􅡍女子赤白瀝心下積脹中􅡍在第三空俠脊陷者中灸三壯主厥隂所結腰痛大便難飱洩尻中寒女子赤淫時白氣癃月事少男子癃小腸脹下􅡍在第四空俠脊陷者中灸三壯主腰痛引少腹痛女子下蒼汁不禁赤淫隂中痒痛引少腹控𦕈不可以俛仰腹腸鳴澼泄會陽一名利機在隂尾骨兩傍督脈氣所發灸五壯主五藏腹中有寒泄注腸澼便血素􅡍一名面玉在鼻柱端督脈氣所發不宜灸主􅍠衂涕出中有懸癰宿肉窒洞不通不知香臭神庭在入髮際五分直鼻督脈足太陽陽明之會灸三壯主頭腦中寒鼻􅍠目泣出癲疾嘔沫風眩善嘔煩㾬瘧寒熱頭痛喘喝目不能視上星在顱上直鼻中央入髪際一寸陷容豆督脈氣所發灸五壯主風眩善嘔煩滿顔青㾬瘧鼻􅍠衂熱病汗不出目睛痛不能視面胕腫癲疾凡云上星主之者皆先取譩譆後取天牗風池甄權云不宜多灸𩕄會在上星後一寸陷者中督脈氣所發灸五壯主痓風眩善嘔煩滿頭痛顔青癲疾嘔沫暫起僵仆惡見風寒面赤腫前頂在𩕄會後一寸五分骨陷中督脈氣所發灸五壯主風眩目瞑惡風寒面赤腫小兒驚癎百會一名三陽五會在前項後一寸半頂中央旋毛中陷容指督脈足太陽之會灸五壯主欬瘧癲疾不嘔沫耳鳴痓頂上痛風頭重目如脱不可左右顧後頂一名交衝在百會後一寸五分枕骨上督脈氣所發灸五壯主風眩目眩顱上痛􅑩􅑩不明惡風寒眩偏頭痛癲疾瘈瘲狂走項直頸痛強間通按灸強間一作七壯一名大羽在後頂後一寸半督脈氣所發灸五壯主頭痛如針刺不可以動項如㧞不可左右顧癲疾狂走瘈瘲摇頭口喎戾頸強腦户一名匝風一名合顱在枕骨上強間後一寸半督脈足太陽之會不可灸主目赤痛不可視面赤腫頭重項痛目不明風眩腦中寒重衣不熱汗出頭中惡風癲疾骨痠眩狂瘈瘲口噤羊鳴舌本出血瘖不能言痓目不眗寒熱風府一名舌本入項髮際一寸大筋内宛宛中督脈陽維之㑹不可灸之主頭痛項急不得顧側目眩暈不得喘息舌急難言狂易多言不休狂走欲自殺目反妄見暴瘖不得言喉嗌痛足不仁瘖門一名横舌一名舌厭在項髪際宛宛中人繫舌本督脈陽維之會仰頭取之不可灸令人瘖主項強舌緩瘖不能言脈傍去上星一寸五分灸三壯此以寫諸陽氣熱衂善噫風頭痛汗不出寒熱痓脊強反折瘈瘲癲疾頭重大椎在第一椎上陷者中三陽督脈之會灸九壯主寒熱以年為壯數傷寒熱盛煩嘔陶道在項大椎節下間督脈足太陽之會俛而取之灸五壯主頭重目瞑悽厥寒熱項強難以反顧汗不出身柱在第三椎節下間督脈氣所發俛而取之灸五壯主癲疾怒欲殺人身熱狂走讝言見鬼瘈瘲神道在第五椎節下間督脈氣所發俛而取之灸三壯主身熱頭痛進退往來㾬瘧恍惚悲愁至陽在第七椎節下間督脈氣所發俛而取之灸三壯主寒熱淫濼脛酸四肢重痛少氣難言筋縮在第九椎節下間督脈氣所發俛而取之灸三壯主小兒驚癎瘈瘲狂走癲疾脊急強目轉上挿脊中在第十一椎節下間督脈氣所發不可灸之主腹滿不能食腰脊強不得俛仰黄癉懸樞在第十三椎節下間督脈氣所發灸三壯主腹中積上下行水穀不化下利腰脊強命門一名屬累在第十四椎節下間督脈氣所發伏而取之痛灸三壯主頭痛如破身熱如火汗不出癲瘈腰腹相引腰俞一名背解一名髓孔一名腰柱一名腰户在第二十一椎節下間灸三壯主腰痛引少腹控䏚不可俛仰以月死生數發針在左取右右取左立已腰以下至足清不仁不可以坐起尻不舉寒熱女子閉溺脊強互引反折汗不出乳子下赤白長强一名氣之隂郄督脈絡别在脊骶端少隂所結灸三壯主腰痛實則脊急強癲疾發如狂者面皮敦敦厚者不療虚則頭重洞泄癃痔大小便難腰尻重難起居寒熱痓反折心痛氣短小便黄閉小兒癎瘈瘲脊強互相引膏肓俞主無所不療諸羸弱瘦損虚勞夢中失精上氣欬逆狂惑妄誤取穴之法先令病人正坐曲脊伸兩手以臂著膝前令正直手大指與膝頭齊以物支肘勿令臂得動也從甲骨上角模索至甲骨下頭其間當有四肋三間灸中間依甲骨之裏去甲骨容側指許摩􅡗去表肋間空處按之自覺牽引於肩中灸兩甲中各一處至六百壯多至千壯當覺下􅀢􅀢然流水狀亦當有所下出者停痰宿疾則無所不下也若病人已困不能正坐當令側卧挽上臂令前取穴灸之求穴大較以右手從左肩上住指頭所不及者是也左手亦然乃以前法灸之若不能乆坐伸兩臂者亦可伏衣襆上伸兩臂令人挽兩甲骨使相離不爾甲骨覆穴不可得也所伏衣襆當令大小有常定不爾則前却失其穴也此穴灸訖後令人凖陽氣盛當消息以自補養令得平復其穴近第五椎相論曰昔者和緩不救晉侯之疾以其在膏之上肓之下針藥所不能及即此穴是也人不能求得此穴所以宿病難遣若能用心此方便求得灸之無疾不愈出第三十卷中三焦人三焦者腑也兩傍五十八穴甲乙經三焦出於闗衝闗衝者金也在手小指次指之端去爪甲如韭葉手少陽脈之所出也為井冬三月宜灸之流於腋門腋門者水也在手小指次指之間陷者中手少陽脈之所留也為榮春三月宜灸之注於中渚中渚者木也在手小指次指本節後陷者中手少陽脈之所注也為輸夏三月宜灸之過於陽池一名别陽在手表腕上陷者中手少陽脈之所過也為原行於支溝支溝者火也在宛後三寸兩骨之間陷者中手少陽脈之所行也為經入於天井天井者土也在肘外大骨之後肘後一寸兩筋間陷者中屈肘得之手少陽脈之所入也為合秋三月宜灸之甄權千金楊操同闗衝在手小指次指之端去瓜甲如韭葉灸三壯主喉痺舌卷口乾煩心臂表痛不可及頭在左取右右取左熱病汗不出肘痛不能自帶衣起頭眩頷痛面黑肩頭痛不可顧霍亂寒熱耳聾鳴甄權云不宜灸腋門在手小指次指間陷者中灸三壯主熱病汗不出風寒熱狂疾瘧頭痛目澁暴變耳聾鳴眩寒厥手臂痛下齒齲則上齒痛善驚妄言面赤中渚在手小指次指本節後間陷者中灸三壯主熱病汗不出頭痛耳鳴目痛寒熱嗌外腫肘臂痛手上類類也五指瘈不可屈伸頭眩耳聾兩顳顬痛身而痒瘧項痛目􅑩􅑩無所見喉痺陽池一名别陽在手表腕上陷者中灸三壯主寒熱㾬瘧肩痛不能自舉汗不出頸腫外闗手少陽絡在腕後二寸陷者中灸三壯主肘中濯濯臂内廉痛不可及頭耳焞焞渾渾聾無所聞口僻噤支溝在腕後三寸兩骨之間陷者中灸三壯主熱病汗不出互引頸嗌外腫肩臂酸痟脅腋急痛四肢不舉痴疥項不可顧霍亂馬刀腫瘻目痛肩不舉心痛支滿逆氣汗出口噤不可開暴瘖不能言男子脊急目赤欬面赤熱會宗手少陽郄在腕後三寸空中灸三壯主肌肉痛耳聾痒癎三陽絡在臂上大交脈支溝上一寸灸九壯主嗜卧身體不能動摇大濕内傷不足四瀆在肘前五寸外廉陷者中灸三壯主卒氣聾齒痛天井在肘外大骨之後肘後一寸兩筋間陷者中屈肘得之灸三壯主肘痛引肩不可屈伸振寒熱頸項肩背痛臂痿痺不仁大風黙黙然不知所痛嗜卧善驚瘈瘲胷痺心痛肩肉麻瘧食時發心痛悲傷不樂癲痺吐舌沫出羊鳴戾頸清冷淵在肘上二寸伸肘舉臂取之灸三壯主頭痛振寒肩不舉不得帶衣消濼在肩下臂外開腋斜肘分下行灸三壯主寒熱痺頭痛項背急和􅡍在耳前兊髮下動脈手足少陽之會灸三壯主頭重頷痛引耳中膿膿䏆䏆聽會在耳門前陷者中張口得之動脈應手手少陽脈氣所發灸三壯主寒熱喘喝目視不能視目泣出頭痛耳中顛颼風齒齲痛聽宮在耳中珠子大如赤小豆手足少陽手太陽之會灸三壯主耳聾填填如無聞膿膿䏆䏆若蟬鳴鴳鴂鳴驚狂瘈瘲眩仆癲疾瘖不能言羊鳴沫出角孫在耳郭中間上開口有空是也火二壯主齒牙不可嚼齲腫瘈脈一名資脈在耳本雞足青絡火三壯主小兒癎瘈吐㵼驚恐失精視曕不明眵瞢翳風在耳後陷者中按之引耳中手足少陽之會灸三壯主聾僻不正失欠脱頷口噤不開痓不能言天牗通按聖濟天牗不宜灸在頸筋缺盆上天容後天柱前完骨下髪際上手少陽脈氣所發灸三壯主肩背痛寒熱歴適頸有大氣暴聾氣啄瞀耳目不用頭頷痛淚出洞鼻不知香臭風眩喉痺三焦病腹氣滿少腹尤堅不得小便窘急溢則為水留則為脹㾬瘧天容在耳下曲頰後手太陽脈氣所發灸三壯主寒熱疝積胷痛不得息胷中痛陽氣大逆上滿於胸中憤䐜肩息大氣逆上喘喝坐伏病咽噎不得息欬逆上氣唾沫肩痛不可舉頸項癰腫不能言耳聾䏆䏆無所聞喉痺顴􅂒一名兊骨在面頄骨下廉兊骨端陷者中手少陽太陽之會主口僻痛面赤目赤目黄口不能嚼䪼腫脣癰肩井通按指聖濟肩井在肩上陷缺盆上太骨前一寸半以三按之當中指下陷中是所主病與此不同在肩上陷解中缺盆上大骨前手足少陽陽維之會灸五壯主肩背痺痛臂不舉寒熱悽索天􅂒在肩缺盆中上毖骨之際陷者中足少陽陽維之會灸三壯主肩肘中痛引項寒熱缺盆痛汗不出胸中熱滿肩貞在肩曲甲下兩骨解間肩髃後陷者中灸三壯主寒熱項歴適耳鳴無聞引缺盆肩中熱痛手臂小不舉肩外俞在肩甲上廉去脊三寸陷者中灸三壯主肩甲中痛熱而寒至肘肩中俞在肩甲内廉去脊二寸陷者中灸三壯主寒熱厥目不明欬上氣唾血曲垣在肩中尖曲甲陷者中按之痛應手灸十壯主肩痛周痺缺盆一名天盖在肩上横骨陷者中灸三壯主寒熱歴適胷中滿有大氣缺盆中滿痛者死外潰不死肩引項臂不舉缺盆中痛汗出喉痺欬𠻳血甄權千金楊操同外臺秘要方卷三十九
