body:
  text: 外臺秘要方卷十三唐王燾撰虚勞骨蒸方七首病源夫蒸病有五一曰骨蒸其根在腎旦起體涼日晩即熱煩躁寢不能安食都無味小便赤黄忽忽煩亂細喘無力腰痛兩足逆冷手心常熱蒸盛傷内即變為疳食人五蔵二曰脈蒸其根在心日増煩悶擲手出足翕翕思水口唾白沫卧即浪言或驚恐不定脈數蒸盛之時或變為疳臍下悶或暴痢不止三曰皮蒸其根在肺必大喘鼻乾口中無水舌上白小便赤如血蒸盛之時胷滿或自稱得疰熱兩脅下脹大欬徹背連胛疼眠寐不安或蒸毒傷藏口内唾血四曰肉蒸其根在脾體熱如火煩躁無汗心腹皷脹食即欲嘔小便如血大便秘澁蒸盛之時或體腫目赤寢臥不安五曰内蒸亦名血蒸所以名内蒸者必外寒而内熱把手附骨而熱是其根在五藏六腑其人必因患後得之骨肉自消飲食無味或皮燥而無光蒸盛之時四肢漸細足趺腫起又有二十三蒸一胞蒸小便黄赤二玊房蒸男子則遺瀝漏精女則月候不調三腦蒸頭眩悶熱四髓蒸髓沸熱五骨蒸齒黒六筋蒸甲焦七血蒸髪焦八脈蒸脈不調或急或緩九肝蒸眼黒十心蒸舌乾十一脾蒸唇焦十二肺蒸鼻乾十三腎蒸兩耳焦十四膀胱蒸右耳偏焦十五膽蒸眼白失色十六胃蒸舌下痛十七小膓蒸下唇焦十八大膓蒸鼻右孔乾痛十九三焦蒸亦雜病乍熱乍寒二十肉蒸二十一膚蒸二十二皮蒸二十三氣蒸遍身氣熱凡諸蒸患多因熱病患愈後食牛羊肉及肥膩或酒或房觸犯而成此疾久蒸不除多變成疳必須先防下部不得輕妄療之出第四卷中崔氏療五蒸夫蒸者是附骨熱毒之氣皆是死之端漸庸醫及田野之夫不識熱蒸體形狀妄注神祟以相疑惑蒸盛揔變為疳而致死者不可勝記其蒸有五請畧陳之一曰骨蒸早起體涼日晩便熱煩躁不安食都無味小便赤黄忽忽煩亂細喘無力或時腰痛兩足逆冷手心常熱蒸盛傷内乃變成疳食人五藏若大便澁方可服芒硝一服一方寸匕日再服亦可擣苦參蜜和為丸如梧子大一服七丸日再以飲送之無忌以體輕涼為度二曰脈蒸其根在心日増煩悶擲手出足翕翕思水口唾白沫臥便浪語或驚恐不安其脈又數此蒸若盛亦變為疳傍臍時悶或痢不止方艾葉甘草各一兩炙苦參青葙各二兩右四味切以水四升煮取一升半分為三分用羊胞盛之以葦灌下部中若不利取芒硝一方寸匕和冷水合和服之日再服忌海藻菘菜三曰皮蒸其根在肺必大喘鼻乾口中無水舌上白小便赤如血蒸盛之時胷中滿悶或自稱得疰手掩兩脅不得大欬徹背連胛疼眠寐不安此蒸毒傷五藏口便唾血方急與芒硝一兩以水一升半和分為三服三日服止訖以冷水浸手以熨脅間及腋下并胷上及痛處亦可舉臂指灸側腋下第三肋間腋下空中七壯立止四曰肉蒸其根在脾體熱如火煩躁無汗心腹皷脹食飲無味食訖便嘔小便如血大便秘澁蒸盛之時或體腫目赤不得安寐方大黄一兩半切如小豆大以水一升浸一宿明旦絞取汁一服五合許㣲利即止若熱不定亦可服芒硝一方寸匕日三以體涼為度五曰内蒸所以言内蒸者必外寒内熱把手附骨而熱也其根在五臓六腑之中其人必因患後得之骨肉自消食飲無味或皮燥而無光蒸盛之時四枝漸細足趺腫起方石膏十兩研如乳粉法水和服方寸匕日再以體涼為度出第七卷中古今錄驗解五蒸湯方甘草一兩炙茯苓三兩人參二兩竹葉二把葛根乾地黄各三兩知母黄芩各二兩石膏五兩辟粳米一合右十味切以水九升煮取二升半分為三服亦可以水三升煮小麥一升乃煮藥忌海藻菘菜蕪荑火醋范汪同一方無甘草茯苓人參竹葉止六味又五蒸丸方烏梅鷄骨一本是鸛骨紫菀芍藥大黄黄芩細辛各五分知母四分礬石鍊栝蔞各一分桂心二分右十一味末之蜜和丸如梧子飲服十丸日二忌生葱生菜並出第五卷中一方無桂心骨蒸方一十七首廣濟療骨蒸肺氣每至日晩即惡寒壯熱頰色㣲赤不能下食日漸羸瘦方生地黄三兩細切葱白細切童子小便二升香䜴甘草炙各三兩右五味切以地黄等於小便中浸一宿平晨煎兩沸絞去滓澄取一升二合分温二服服别相去如人行七八里服一劑差止不服忌海藻菘菜蕪荑熱麫猪肉油膩黏食等出第四卷中崔氏療骨蒸以骨汁淋方取枯朽骨碎五大升一切骨皆堪用唯洗刷刮不得遣㣲有土氣但似有土氣即不差病栁枝三大斗剉桃枝三大斗剉棘針三大斗右四味以清水五大石煮之減半乃濾出汁别取清漿兩大石投釜中和骨重煮三兩沸然後揔濾出淨拭釜取此前後湯相和更報煖隨次取用使患者解髪令散以此湯潑頂淋之其湯令熱但不破肉為準一舉淋湯遣盡若覺心悶即喫三兩口冷飯如不能坐即臥淋淋湯之時自當大汗汗出少處仍偏淋之務取汗勻以袪惡氣淋訖可食一大椀熱䓗䜴粥仍暖覆取汗汗解以粉摩身連手足使周遍患重者不過再淋欲重淋時量氣力淋此湯若飲之尤佳出第七卷中文仲療骨蒸方生地黄一大升擣絞取汁三度擣絞始汁盡分再服若利即減之以身輕涼為度忌蕪荑又療骨蒸苦熱瘦羸面目痿黄嘔逆上氣煩悶短氣喘急日晩便劇不能飲食若服生地黄汁即便服此方龍膽黄連栝蔞苦參青葙芍藥各一兩梔子仁十枚芒硝大黄各二分黄芩三分右十味擣篩為散飲服一錢匕加至方寸匕日再大須慎生食若不禁生食不須服之忌猪肉冷水千金經心錄並作丸服之藥味同又療骨蒸唇乾口燥欲得飲水止渇竹葉飲方竹葉一握麥門冬一升去心大棗二十顆擘甘草三兩炙粳米五合生薑三兩半夏一升湯洗令滑盡右七味切以水五升煮取二升半分温三服忌羊肉餳海藻菘菜又方麥門冬一升去心枸把根切三升小麥二升右三味以水一斗煮取三升煮小麥熟去滓分温日三服又方大烏梅二十枚石膏六兩辟綿裹右二味以水七升煮取四升去滓以蜜三合稍稍飲之佳又方患殗殜上於刼切下余攝切下同等病必瘦脊骨自出以壯丈夫屈手頭指及中指夾患人脊骨從大椎向下盡骨極指復向上來去十二三迴然以中指於兩畔處極彈之若是此病應彈處起作頭多可三十餘頭即以墨㸃上記之取三指大青竹筒長寸半一頭留節無節頭削令薄似劔煮此筒子數沸及熱出筒籠墨㸃處按之良久以刀彈破所角處又煮筒子重角之當出黄白赤水次有膿出亦有蟲出者數數如此角之令惡物出盡乃即除當目明身輕也又療骨蒸消渇消中熱中渇痢心熱心忪風虚熱傳屍等方苦參一大斤黄連去毛知母栝樓麥門冬去心牡蠣各五大兩熬右六味擣篩以生牛乳和併手捻為丸如梧子大暴乾一服二十丸稍稍加至三十丸日再服飽食訖以漿水下如食熱麫酒加至五十丸忌猪肉冷水救急同又療骨蒸蒼梧道士方紫菀桔梗續斷青竹茹五味子各三兩碎桑根白皮五兩甘草二兩炙赤小豆一升乾地黄五兩熱多者用右九味切以水九升煮取三升五合分温三服服五六劑十年者亦差每隔五日一劑初發即服大驗勿輕之可頻服立驗蘇遊𤣥感論云主肺氣欬者相當餘同忌海藻菘菜猪肉蕪荑又療骨蒸欬出膿病重者方皂莢一兩炙去皮綿裹白餳一兩乾棗七枚擘生薑二分切右四味以酒一大升煮取半升去滓先食飯然後服二合如人行三四里不吐更服二合又如人行二三里不吐揔服盡方便令吐即膿出並出第一卷中救急骨蒸之候男子因五勞七傷或因肺壅之後或為瘴瘧之後宿患痃癖婦人因産後虛勞漏汗寒熱或為月閉不通無問男子婦人因天行已後餘熱不除或為頻頻勞復小兒閃癖其病並緣此十候所致因兹漸漸瘦損初著盜汗盜汗以後即寒熱往來寒熱往來以後即漸加欬欬後面色白兩頰見赤如胭脂色團團如錢許大左臥即右出唇口非常鮮赤若至鮮赤即極重十則七死三活若此以後加吐吐後痢百無一生不過一月死服此丸仍得不著後人此病人急多是寃鬼病治之方青葙苗六月六日採知母黄連去毛大黄梔子仁栝蔞常山萎蕤各八分苦參皮十二分甘草炙蜀漆各五分洗右十一味擣篩蜜和為丸如梧子大飲服五丸漸加至十五丸日再以知為度因至利忌猪肉熱麫葱䔉生菜海藻菘菜又療骨蒸方毛桃仁一百二十枚去皮及雙仁留尖右一味擣令可丸平旦以井華水頓服使盡服訖量性飲酒使醉仍須喫水能多最精隔日又服一劑百日不得食肉又療骨蒸極熱方非其人莫浪傳取乾人糞燒令外黑内水中澄清每旦服一小升薄晩後服小便一小升以差為限既常服不可朝朝取作大坑燒二升夜以水三升漬之稍稍減服小便勿用自身者小兒者佳又方用雄黄一大兩和小便一大升研令為粉乃取黄理石一枚方圓可一尺左側以炭火燒之三食頃極熱灌雄黄汁於石上恐太熱不可近冝著一片薄氊置石上令患人脫衣坐上石冷停以衣被圍遶身勿令藥氣洩出莫辭衣物臭也凡經三五度如此必差又療骨蒸傳屍方皂莢長一尺者無相續取炙令㣲焦去黑皮碎之綿裹黒餳大如雞子羊肉大如拳煮如常法右三味取一升無灰清酒貯銅鐺内即著綿裹煎三五沸即漉去綿裹即内黒餳使融液盡煎取三合令病者先啜肉汁即服一合如變吐困不須起次以銅盆貯水令病人坐上有蟲麤如馬尾赤色頭黒即效如無以服三合盡為度一服相去如人行十里必是得驗其禁食一如藥法並出第二卷中必效骨蒸病小便方取三嵗童子小便五升煎取一大升以三匙蜜和為兩服中間如人行二十里服此以後毎自小便即取服仍去前後取中央者病輕者二十日病重者五十日二十日以後當有蟲蚰蜒兒其蟲在身當處出俱令去人五步十步聞病人小便臭者無不差台州丹仙觀張道士自服非常神驗出第二卷中灸骨蒸法圖四首崔氏别錄灸骨蒸方圖并序中書侍郎崔知拂撰夫含靈受氣稟之於五常攝生乖理降之以六疾至若岐黄廣記抑有舊經攻灸單行罕取今術骨蒸病者亦名傳屍亦謂殗殜亦稱伏連亦曰無辜丈夫以癖氣為根婦人以血氣為本無問少長多染此疾嬰孺之流傳注更苦其為狀也髪乾而聳或聚或分或腹中有塊或腦後近下兩邊有小結多者乃至五六或夜臥盜汗夢與鬼交通雖目視分明而四肢無力或上氣食少漸就沈羸縱延時日終於溘盡余昔忝洛州司馬常三十日灸活一十三人前後差者數過二百至如狸頭獺肝徒聞曩說金牙銅鼻罕見其能未若此方扶危拯急非止單攻骨蒸又别療氣療風或瘴或勞或邪或癖患狀既廣救愈亦多不可具錄畧陳梗槩又恐傳授謬訛以誤將來今故具圖形狀庶令覽者易悉使所在流布頗用家蔵未暇外請名醫傍求上藥還魂反魄何難之有遇斯疾者可不務乎灸骨蒸及邪但夢與鬼神交通無不差之法使患人平身正立取一細繩令於脚下𦂳踏男左女右其繩前頭使與大拇指端齊後頭令當脚根後即引向上至曲膕中大横文便截繩使斷又使患人解髪分兩邊使見分頭路仍平身正坐乃取向所截繩一頭與鼻端齊引向上路頭通過逐脊骨引繩向下盡繩頭即㸃著又别取小繩一頭與唇端齊合口處一頭向上至鼻底便截斷將此短小繩於前所㸃處中摺横分兩邊兩頭各㸃記使與中央初㸃處正横相當此小繩兩頭是灸處當脊初㸃者非灸處只借為度其㸃拭却又法使患人平身正坐稍縮髆取一繩繞其項向前雙垂共鳩尾齊即截斷鳩尾是心歧骨人有無心歧骨者可從胷前兩歧骨下量取一寸即當鳩尾仍一倍翻繩向後取中屈處恰當喉骨其繩兩頭還雙垂當脊骨向下盡繩頭㸃著又别取一小繩令患人合口横度兩吻便割斷還於脊上所㸃處横分㸃如前其小繩兩頭是灸處長繩頭非灸處拭却以前揔通灸四處日别各灸七壯以上二七以下其四處並須滿二十壯未覺効可至百壯乃停候瘡欲差又取度兩吻小繩子當前雙垂繩頭所㸃處逐脊骨上下中分㸃兩頭如横㸃法謂之四花此後㸃兩頭亦各灸百壯此灸法欲得取离日量度度訖即下火唯須三月三日艾為佳療差百日以來不用雜食灸後一月許日患者若未好差便須報灸一如前法當即永差出第七卷中張文仲說荆州人王元禮嘗家患骨蒸傳尸死盡有一道士忽教灸即斷兼更教人無有不差者欲識此病其病先乍寒乍熱有時唇赤或頰赤并有時痢血多吐有時欲得食有時不欲食兩脊脈常急患兒多欬盜汗以指按捻脊膂四邊肉有時心胷氣滿急黄瘦膂中肉盡遂即著床如著床胷前自動脊膂兩邊肉盡灸療即難如灸候胷前肉動非事灸法如看病兒是病更不須選离日即預將艾去即將病兒於王道頭日午時灸灸七壯若先知其病又緩即取离日午時大吉欲灸覆病兒面向下著地取撅肋頭以病兒大拇指自捻著展中指直向脊骨指頭脊膂中肉少肋上㸃記從㸃記處向上至耳下尖頭即中央屈繩從初㸃處向上還當脊膂㸃繩所到記之又更再屈繩從元㸃記處向上還進前㸃記又以杖量取患兒中指頭兩節折斷還從元㸃記向下當脊膂㸃記一邊㸃四處兩邊俱㸃總八處各須去脊骨逺近一種並須上下相當下從撅肋上至耳根取直其八處一時下火艾炷如棗核堅實作之灸了即以灰三匝圍坐處便歸家不須迴顧禁肉麫生冷特忌色及雜食平復後任依常未平復有犯重發即不可復療神素師灸骨蒸欬法當頭耳孔横量相離三寸許相當灸有穴日灸三壯至第八日灸二七了第三椎上第二椎下男取左手女取右手頭指依兩指頭東西灸日上七壯至第八日各灸五十壯復五日日灸各十五壯脛取繫鞋横大文量至膝䯊口亞切下中分當脛骨外日灸一七壯滿第八日日灸滿三十五日了當臂上皆男左女右取頭指從腕文當指當頭灸日七壯至第八日滿百壯婦人肚脹月節不通取右手頭指當臍量至下復當指頭灸日七滿三百壯鬲上午後灸鬲下午前灸出第一卷中痃氣骨蒸三方廣濟療痃氣心忪骨蒸熱闇風鼈甲丸方鼈甲炙芍藥蝮蛇脯炙大黄各八分人參訶梨勒皮熬枳實炙防風各六分右八味擣節為末蜜和丸如梧子以酒飲下二十丸漸漸加至三十丸日再服不利忌莧菜生菜熱麫蕎麥蒜粘食出第二卷中備急療痃癖鬼氣疰忤骨蒸秘驗方大黄别漬湯欲成下一方四兩鼈甲炙釣藤升麻甘草炙各二兩丁香二七枚湯欲成下右六味切以水七升煮取二升八合去滓分作三服又用牛黄犀角剉末朱砂麝香各一分細研分為三分每服以一分内湯中服經用多効特忌猪肉粘食生冷莧菜海藻菘菜蘇遊同出第三卷中一方有黄芩二兩必効療痃癖氣壯熱兼欬久為骨蒸驗方柴胡四兩茯苓白术枳實炙各三兩右四味切以水七升煮取二升半分為三服積熱不歇即加芒硝六分取利熱除之後每三日服一劑差後每月一劑肥白終身永除忌桃李雀肉大醋出第二卷中虚損慘顇作骨蒸方四首張文仲療虚損慘顇不食四體勞强時翕翕熱無氣力作骨蒸候方童子小便一大升淡者去前後葱白一合切䜴一合杏仁四十枚去尖皮碎右四味合煎取三分中分之二服使盡日别一劑服之至十劑愈若服經三四劑覺四體益熱即服後方又方小便一大升淡者去前後葱白一合切䜴一抄生薑一大兩切生地黄一握碎右五味合煎六七沸絞取汁半升許分為兩服或三服每服空腹服至二七日必差差後停三四日將息更服二七日神驗每服五六劑覺内少冷即服前方二方以意斟酌間服常夜合浸頃久便即煎服至五更半令服了至欲明更服後丸服訖至日出時不妨食至晚間未食更一服忌蕪荑又方人頭骨三大兩炙麝香一十兩右二味擣篩和蜜擣一千杵丸如梧子一服七丸日再服以粥飲送藥若胷前有青脈出者以針刺看血色未變黒者服藥七日必差每日午時能更服後丸一服亦好藥既無毒於事不妨蘇遊療骨蒸肺痿煩躁不能食蘆根飲子方蘆根切訖秤麥門冬去心地骨白皮各十兩生薑十兩合皮切橘皮茯苓各五兩右六味切以水二斗煮取八升絞去滓分温五服服别相去八九里晝三服夜二服覆取汗忌酢物未好差更作若兼服其人或胷中寒或直惡寒及虚脹并痛者加呉茱茰八兩瘦病方五首病源夫血氣者所以榮養其身也虚勞之人精髓萎竭血氣虚弱不能充盛肌膚故羸瘦也其湯熨針石别有正方補養宣導今附於後養生方云朝朝服玉泉使人丁壯有顔色去蟲而牢齒也玉泉口中唾也朝未起早潄口呑之輙琢齒二七過如此者三乃止名曰練精又云咽之三過乃止補養虚勞令人强壯出第三卷中廣濟療瘦病每日西即赤色脚手酸疼口乾壯熱獺肝丸方獺肝六分炙天靈葢燒四分生犀角四分屑前胡四分升麻四分松脂五分枳實炙四分甘草五分炙右八味擣篩蜜和丸如梧子空腹以小便浸䜴汁下二十丸日再不利忌海藻菘菜生葱熱麫炙肉魚䔉粘食陳臭等物又療瘦病方天靈葢一大兩炙麝香半臍桃仁一大抄去皮朱砂一兩半光明者好䜴一大升乾之右五味各别擣篩訖然後摠和令調毎晨空腹以小便半升和散方寸匕一服差止不利忌生血物又療腹脹瘦病不下食方柴胡茯苓各十二分枳實炙白术人參麥門冬去心生薑合皮切各六分右七味切以水六升煮取一升八合絞去滓分温三服服别相去七八里喫一服不利忌生冷油膩小豆粘食桃李醋物雀肉等又知母丸主瘦病及久癊黄等方知母常山各三兩甘草炙大黄麻黄去節黄芩杏仁各二兩去皮尖熬蜀漆洗牡蠣各一兩熬右九味擣篩蜜和丸如梧子空心服飲下七丸忌猪肉及葱酒麫服後心悶即吐是此病出候不唾更漸加兩丸日與諸人服神驗非一忌海藻菘菜生葱生菜等此方云是張文仲去英公處傳救急療瘦疾方甘草三兩炙右每旦以小便煮甘草三數沸頓服甚良忌海藻菘菜並第二卷中傳屍方四首蘇遊論曰大都男女傳屍之候心胷滿悶背髆煩疼兩目精明四肢無力雖知欲臥睡常不著脊膂急痛膝脛酸疼多臥少起狀如佯病每至旦起即精神尚好欲似無病從日午以後即四體㣲熱面好顔色喜見人過常懷忿怒纔不稱意即欲嗔恚行立脚弱夜臥盜汗夢與鬼交通或見先亡或多驚悸有時氣急有時欬𠻳雖思想飲食而不能多飡死在須臾而精神尚好或兩肋虚脹或時㣲利鼻乾口燥常多粘唾有時唇赤有時欲睡漸就沈羸猶如水涸不覺其死矣又論曰傳屍之疾本起於無端莫問老少男女皆有斯疾大都此病相剋而生先内傳毒氣周遍五蔵漸就羸瘦以至於死死訖復易家親一人故曰傳屍亦名轉注以其初得半臥半起號為殗殜氣急欬者名曰肺痿骨髓中熱稱為骨蒸内傳五蔵名之伏連不解療者乃至滅門假如男子因虚損得之名為勞極呉楚云淋瀝巴蜀云極勞其源先從腎起初受之氣兩脛酸疼腰脊拘急行立脚弱食飲減少兩耳颼颼欲似風聲夜臥夢洩陰汗痿弱腎既受已次傳於心心初受氣夜臥心驚或多忪悸心懸乏氣吸吸欲盡夢見先亡有時盜汗食無滋味口内生瘡心常煩熱唯欲眠臥朝輕夕重兩頰口唇悉紅赤如傳烟脂又時手足五心皆熱心既受已次傳於肺肺初受氣時時欬嗽氣力㣲弱有時喘氣臥即更甚鼻口乾燥不聞香臭假令得聞唯覺朽腐物氣有時惡心憒憒欲吐肌膚枯燥或時刺痛或似蟲行乾皮細起狀若麩片肺既受已次傳於肝肝初受氣兩目膜膜面無血色常欲顰眉視不及逺目常乾澁又時赤痛或復晴黄朝暮瞢莫紅切音蒙音凳常欲合眼及至於臥睡還不著肝既受已次傳於脾脾初受氣兩肋虚脹食不消化又時渇利熟食生出有時肚痛腹脹雷鳴唇口焦乾或生瘡腫毛髪乾聳無有光潤或復上氣擡肩喘息利赤黒汁至此候者將死之證也又論曰毒氣傳五蔵候終不越此例但好候之百不失一又論曰凡患癥癖之人多成骨蒸不者即作水病仍須依癖法灸之兼服下水藥差又論曰此病若脊膂肉消及兩臂飽肉消盡胷前骨出入即難療也若痢赤黑汁兼上氣擡肩喘息皆為欲死之證也此是藏壞故爾又論曰童女年未至十三以上月經未通與之交接其女日就消瘦面色痿黄不悟之者將為骨蒸因錯療之屢有死者有此輩者慎勿療之待月事通自當差矣又論曰或有人偶得一方云療骨蒸不解尋究根本遂即輕用之主療既不相當病愈未知何日了不求諸鑒者唯知獨任己功若此之人寓目皆是至如以主肺痿骨蒸方將療痃癖傳屍者斯乃更増其病豈有得痊之理何者主肺痿方中多是冷藥冷藥非痃癖之所宜若用以療痃癖此乃欲益反損非直病仍未差兼復更損其脾脾唯宜温不合取冷如其傷冷脾氣即衰脾衰之證兩肋虚滿食既不消兼之下利如斯穿鑿欲益反損終莫能悟良可悲哉夫畧舉一隅他皆倣此又論曰凡患骨蒸之人坐臥居處不宜傷冷亦不得過熱冷甚則藥氣難通兼之脹滿食不消化或復氣上熱甚則血脈擁塞頭眩目疼唇乾口燥心胷煩悶渇欲飲水此等並是將息過度之狀深可誡也將養之法須寒温得所先熱而脫先寒而著若背傷冷即令欬嗽若手足傷熱即令心煩若覆衣傷厚即眠臥盜汗若覆衣過薄即心腹脹滿所是飲食不限時節寧可少食保無宿疰數數進之助藥勢也必須傷軟易消故也不宜傷硬恐損胃氣致不消也此皆以意消息之為佳又論曰主療之法先須究其根本考其患狀診其三部決其輕重量其可不與其湯藥指期取差若能如此方可措手先療其根次其末針灸湯散必須相應無容病根深逺少服即望痊除未及得瘳便復罷藥乃言藥病乖越似不相當如此懐疑余所不取亦有因瘧後作亦有因痢後為此病根其源非一畧舉綱紀比類而取療之方法如後所言又論曰骨蒸之病無問男女特忌房室舉動勞作尤所不宜陳臭酸鹹粘食不消牛馬驢羊大小二豆猪魚油膩酒麫𤓰果野猪之屬葵笋蒜蕨及生冷等並不得飡自非平復一月以後乃漸開也大畧如此觸類而長之此病宜食煮飯鹽豉豆醬燒薑葱韭枸杞苜蓿苦菜地黄牛膝葉並須煮爛食之候病稍退恐肌膚虚弱者可時食乾鹿脯為味中間所有得食之者按其條下具言之廣濟療婦人腹内冷癖血塊虚脹月經不通瘦弱不能食無顔色狀如傳尸病方張文仲方麴末二升大麥蘖末二升生地黄肥大者切三升牛膝切三升白术八兩桑耳剉三升金色者薑黄八兩當歸十四分生薑合皮切二升桃仁杏仁各二升去皮尖及雙仁者熬近用加橘皮八兩右十二味並細切於臼中以木杵擣之如泥内瓶中以物葢口封之勿令洩氣蒸於一大石米中飯熟出之停屋下三日開出暴乾擣為散酒飲服方寸匕日二服漸加至一匕半不利初服十日内忌生冷難消之物以助藥勢過十日外即百無所忌任意恣口食之唯忌桃李若須桃李冝去术若不能散蜜丸服之亦得一服三十丸日二服去病令人能食肥健好顔色忌桃李雀肉蕪荑出第四卷中文仲論傳屍病亦名痎瘧遁疰骨蒸伏連殗殜此病多因臨屍哭泣屍氣入腹連綿或五年三年有能食不作肌膚或二日五日若㣲勞即發大都頭額頸骨間尋常㣲熱翕翕然死復家中更染一人如此乃至滅門療之方獺肝一具破乾炙鼈甲一枚炙野狸頭一枚炙紫菀四分漢防己一兩半蜀漆洗麥門冬去心甘草炙各一兩右八味擣篩以成鍊烊羊腎脂二分合蜜一分烊冷和丸藥如梧子大服十丸加至十五丸日再以飲下之其藥合和訖分一分頭邊著一分懸門額上一分繫臂上先服頭邊次服臂上次服門上者大驗忌海藻菘菜莧菜又灸法立脚於繫鞋處横文以手四指於文上量脛骨外逼脛當四指中節按之有小穴取一縷麻刮令薄以此麻緩繫上灸令麻縷斷男左女右患多減又方青羚羊肺一具破於布上乾之莨菪子一升絹袋盛醋一升同漬經三日出各於布上暴之令至乾㣲火熬莨菪子各擣篩和以蜜丸如梧子服三丸加至四丸地骨皮白薇芍藥甘草犀角升麻茯神麥門冬黄芩桔梗枳實大黄前胡茯苓天門冬生薑桑根白皮羚羊角當歸柴胡朱砂芎藭鼈甲蜀漆知母石膏常山烏梅香䜴黄芪地黄橘皮以上並可詳度病狀用之並出第一卷中伏連方五首廣濟療瘦病伏連傳屍鬼氣疰忤惡氣方班猫去頭足熬射干根各四分石膽七分别研桂心牛黄各二分别研犀角三分生者屑石蜥蜴一枚炙人參二分紫石七分别研蜈蚣四十炙麝香少許别研右十一味擣篩為散研相和每日空腹服一寸匕日三服用井華水二合温即頓服勿臨嗅與白米粥喫好覺小便澁好如合藥勿使婦人小兒雞狗見忌熱麫果子五辛酒肉生血生葱又療瘦病伏連辟諸鬼氣惡疰朱砂丸方光明朱砂一兩桃仁十枚去皮尖雙仁者熬麝香三分研右三味研朱砂麝香令細末别擣桃仁如脂合和為丸如梧子其和不合以蜜少許合成訖清飲服一七丸日二服不利忌生血物並出第十四卷中崔氏斷伏連解法先覔一不開口葫蘆埋入地取上离日開之煮取三匙脂粥内其中又剪紙錢財將向新塚上使病兒面向還道背塜坐以紙錢及新綜圍塚及病人使匝别將少許紙錢圍外與五道將軍使人一手捉葫蘆一手於坐傍以一刀穿地即以葫蘆坐所穿地及坐葫蘆了使一不病人捉兩箇鏁拍病人背呪曰伏連伏連解伏連伏連不解刀鏁解又呪曰生人持地上死鬼持地下生人死鬼即各異路呪訖令不病人即擲兩鏁於病人後必取二鏁相背不背更取擲取相背止乃並還勿反顧又取离日令病人騎城外車轍面向城門以水三升灰三重圍病人又作七箇不翻餅與五道將軍呪曰天門開地户閉生人死鬼各異路今五离之日放捨即歸呪訖乃還莫迴頭此法大良出第七卷中文仲療伏連病本緣極熱氣相易相連不斷遂名伏連亦名骨蒸傳屍比用此方甚驗人屎五大升濕者人小便一升新炊粟飲五大升六月六日麴半餅熬碎右四味取一瓷瓶盛宻封置一室中二七日並消一無惡氣每旦服一大合盡二服無不差者合藥時潔淨燒香勿令婦人小兒女子雞犬孝子見之出第一卷中延年桃奴湯主伏連鬼氣發即四肢無力日漸黄瘦乍好乍惡不能方桃奴茯苓各三兩鬼箭羽芍藥人參橘皮各二兩生薑四兩㯽榔七枚麝香一分别研右九味切以水九升煮取二升七合去滓内麝香温分為三服如行八九里久忌大醋生冷五辛出第十七卷中飛尸方三首病源飛尸者發無由漸忽然而至若飛走之急疾故謂之飛尸其狀心腹刺痛氣息喘急脹滿上衝心胷出第二十三卷中集驗療飛尸𤓰蔕散方𤓰蔕赤小豆各一分雄黄二分研右三味擣下細篩一服五分匕稍増至半錢匕以酪服藥廣濟療卒中惡心腹絞刺氣急脹奄奄欲絶廣濟同出第七卷中備急張仲景療飛尸走馬湯方巴豆二枚去心皮杏仁二枚去尖皮右二物綿纒搥令極碎投熱湯二合指捻取白汁便飲之食頃當下老小量服之通療鬼擊病忌野猪肉蘆笋此已見卒疝中正療飛尸故不刪也文仲同出第一卷中古今錄驗附著散療飛尸在人皮中又名惡脈又名賊風發時急頭痛不在一處鍼炙則移發時一日半日乃㣲差須㬰復發皆療之方細辛天雄炮莽草各一分桂心三分附子四分炮雄黄二分研烏頭四分炮乾薑四分真珠二分研右九味擣下篩服五分匕不知稍増當以好酒服之忌猪肉冷水生葱生菜出第六卷中遁尸方三首病源遁尸者言其停遁在人肌肉血脈之間若卒有犯觸則發動亦令人心腹脹滿刺痛氣息喘急傍攻兩脅上衝心胷差後復發停遁不消故謂之遁尸也出第二十三卷中廣濟療初得遁尸及五尸經年不差心腹短氣方鸛骨三寸炙羚羊鼻二枚炙令焦乾薑一兩蜥蜴一枚炙麝香二分研斑猫十四枚去翅足熬雞屎白三兩熬巴豆五枚去心皮熬令黑芫青二十枚去翅足熬藜蘆一兩去蘆頭熬令黄右十味擣篩蜜和丸空腹以飲服如小豆三丸日二服稍加至六七丸以知為度至吐利忌生冷油膩猪肉蒜粘食陳臭蘆笋一方無斑猫雞屎白巴豆芫青藜蘆又初得遁尸鬼疰心腹中刺痛不可忍方青木香六分丁香六分鬼箭羽桔梗紫蘇橘皮當歸各八分生薑十二分㯽榔十四分合子碎桃梟十四枚去核右十味切以水九升煮取三升絞去滓分為三服日晚再以快利為度忌如藥法一方無橘皮桃梟並出第四卷中集驗療遁尸心腹刺痛不可忍方桂心一尺準一兩乾薑三分巴豆二枚去皮心熬右三味合擣下篩以好苦酒和之如泥以塗痛處燥即易之忌野猪肉蘆笋千金同用乾薑一兩出第一卷中五尸方一十一首肘後療卒中五尸五尸者飛尸遁尸風尸沈尸尸疰也其狀皆腹痛脹急不得氣息上衝心胷傍攻兩脅或磥塊踊起或攣引腰脊今取一方而兼療之擣蒺䔧子蜜丸如胡豆服二丸日三又方擣商陸根熬以嚢盛之更畨熨之冷復易又方粳米二升水六升煎二沸服之又方掘土作小坎以水滿坎中熟攪取汁飲之並出第一卷中刪繁療五尸蠱疰中惡客忤心腹刺痛丹砂丸方丹砂研乾薑芎藭芫花熬烏頭炮各四分芍藥八分野葛皮三分炙桂心八分呉茱茰一合右九味擣篩蜜和為丸如大豆服三丸日三清飲進之忌生血物猪肉生葱一方無巴豆梔子出第十卷中備急療卒中五尸遁尸風尸飛尸尸疰沈尸其狀皆腹痛脹急衝心攻脅或磥塊踊起或牽腰脊方破雞子一枚取白生呑之困者搖頭令下文仲肘後同又方葛氏法雄黄大蒜各一兩右二味擣和取如彈丸内二合熱酒中服之須㬰未差更服有尸疹者常畜此藥用之驗文仲肘後同又方乾薑附子各一兩桂心二分巴豆三十枚去皮心生用右四味擣篩蜜和又内臼中擣萬杵服如小豆二丸此藥無所不療忌野猪肉蘆笋生葱肘後同並出第一卷中文仲療卒中五尸方取屋四角茅内銅器中以三尺布覆腹著器布上燒茅令熱隨痛追逐蹠下痒便差若瓦屋削四角柱燒用之神驗肘後同出第一卷中古今錄驗八毒赤丸療五尸癥積及惡心痛蠱疰鬼氣無所不療即是李子豫赤丸方出胡錄雄黄研真珠研礜石泥裹燒半日牡丹皮巴豆去皮心熬藜蘆炙各一兩蜈蚣一枚炙去足附子一兩炮右八味擣篩蜜和丸服如小豆二丸日一極得吐下欲長將服者可減一丸忌猪肉狸肉蘆笋生血等物又五尸丸療諸尸疰方芍藥桂心各八分呉茱茰一合丹砂四分芎藭四分烏頭四分炮梔子仁五分乾薑四分蜀椒一兩去目汗巴豆四十枚去心皮熬右十味擣下篩蜜和丸如大豆每服三丸日三忌猪肉生葱蘆笋生血等物並出第七卷中胡洽有芫花四分野葛皮二分為十二味尸疰方四首病源尸疰者即是五尸内之尸疰而挾外鬼邪之氣流注身體令人寒熱淋瀝沈沈黙黙不的知所苦而無處不惡或腹痛脹滿喘急不得氣息上衝心胷傍攻兩脅或磥磈踊起或攣引腰脊或舉身沈重精神雜錯常覺昬謬每節氣改變輙致大患積月累年漸就頓滯以至於死死後復易傍人乃至滅門以其尸病疰易傍人故曰尸疰出第二十三卷中刪繁療尸疰損鼻或聞哭聲或見尸常發死人席湯方取死人眠席斬棺内餘棄路者一虎口長三寸止一物以水三升煮取一升為一服立効出第十卷中文仲療尸疰方取新布裹椒薄疰上以熨斗火熨椒令汗出立驗又姚氏方燒髪灰杏仁熬令紫色等分右二味擣如脂以猪膏和酒服如梧子三丸日三神良千金同又鸛骨丸療尸疰惡氣兼療百病方鸛骨三寸炙桂心三寸蝱虫十四枚去翅足熬巴豆三十枚去心皮熬斑猫十四枚去翅足熬右五味擣篩蜜和為丸如小豆一服二丸日三服清飲進之忌野猪肉蘆笋生葱並出第一卷中五疰方四首病源注者住也言其連滯停住死又注易傍人也注病之狀或乍寒乍熱或皮膚淫躍或心腹脹刺痛或支節沈重變狀多端而方云三十六種九十九種及此等五注病皆不顯出其名大體與諸注皆同出第二十四卷中刪繁華佗錄帙五疰丸療中惡五疰五尸入腹胷脅急痛鬼擊客忤停尸垂死者入喉即愈若已噤將物强發開若不可發扣齒折以灌下藥湯酒隨進之即効方丹砂研雄黄研附子炮各一兩甘遂半兩熬䜴六十粒熬巴豆六十枚去心皮熬令變色右六味擣下篩巴豆别研令如脂乃更合擣取調白蜜和之蔵以宻器若有急疾服胡豆二丸不覺更益以飲投之此藥多有所療殺鬼觧毒破積去水良驗忌生血物猪肉蘆笋古今錄驗同出第九卷中小品五疰湯主卒中賊風遁尸鬼邪心腹刺痛大脹急方大黄三兩别漬甘草二兩炙烏頭十枚炮削皮生薑半斤桂心四兩芍藥當歸各二兩蜜一斤右八味切以水九升煮取三升烏頭别内蜜中煎令得一升投著湯中去滓分服三合如人行三十里又一服日三不知可至四合王尹威數用之忌海藻菘菜猪肉生葱千金同出第四卷中古今錄驗五疰丸一名神仙丸一名千金丸一名轉疰丸一名司命丸一名殺鬼丸療萬病邪鬼疰忤心痛上氣厭夢蠱毒傷寒時疾疫癘方丹砂研礜石泥裹燒半日雄黄研巴豆去心皮熬藜蘆熬附子炮各二分蜈蚣一枚炙去足石七味擣篩蜜和丸如小豆服一丸日一即差不解夜半更服一丸定止帶一丸辟惡忌猪肉冷水生血物貍肉出第七卷中又五野丸療五疰尸疰哭疰冷疰寒疰熱疰在身體寒熱短氣兩脅下痛引背腰脊吸吸少氣不能行飲食少面目痿黄小便難項强不得俛仰腹堅癖臍左右下雷鳴脹手足煩痛目不明喜忘乆風濕痺腰脊不隨喜夢寤百病皆療之方牛黄研麝香研蜀椒去日汗雄黄研大黄當歸蜀烏頭炮蜀天雄炮硝石熬一方用芒消各一分人參桂心朱砂細辛各二分石蚚蜴一枚炙乾薑二分巴豆五十枚去心皮熬鬼臼二分右十七味擣篩蜜和丸如梧子服三丸日再不知稍増以知為度忌猪肉蘆笋生葱生菜生血物出第六卷中江南九十九疰方二首集驗療江南疰病凡有九十九種寒熱尸疰此病隨月盛衰人有三百六十脈走入皮中或左或右或裏或表如刀錐所刺乍寒乍熱咽喉如鯁食如噎胷中痛繞臍苦痛食不知味腰中難以俛仰兩膝屈伸面或黄或青或白或黑至死更相注易方取桑根白皮切三升暴燥作湯淋取汁浸小豆二升如此取汁盡蒸豆熟作羊鹿肉羮噉此豆出第一卷中崔氏金牙散主邪魅心腹刺痛病狀與前方同金牙别研雄黄研礜石泥裹燒半日丹砂研寒水石芫青熬巴豆去心皮熬朴硝桔梗茯苓人參貫衆附子炮蜀椒去汗目露蜂房炙龍骨乾薑牡桂烏頭炮石膏研莽草炙蓯蓉大㦸芫花熬防風貍骨炙商陸根大黄細辛蛇蛻炙玊支一作玊泉貝母一作牙子即狼牙也右三十二味等分下篩酒服五分匕日三忌猪肉冷水生菜生血肉大醋蘆笋集驗同出第七卷中江南三十六疰方三首崔氏金牙散療江南三十六疰人病經年羸瘦垂死服之皆差并帶之能殺鬼氣逐尸疰諸惡癘不祥悉主之方出胡洽金牙研曽青研礜石泥裹燒半日硝石研石膏研莽草玉支一作玊衆雄黄研朱砂研寒水石龍骨蛇蛻皮炙芫青熬當歸龍膽大黄細辛防風大㦸芫花熬野葛炙蓯蓉天雄炮茯苓附子炮烏啄炮乾薑人參桔梗桂心椒去目汗貫衆巴豆去心皮熬貍骨蜂房炙鸛骨炙各一兩右三十六味擣篩為散以酒服一錢匕漸増五分匕日三并以三角絳嚢貯散方寸匕以繫頭及心上大良一方加蜈蚣蜥蜴雌黄鑑鼻麝香毒公合四十二味忌猪肉生血物生菜冷水大醋蘆笋出第七卷中備急療尸疰鬼疰者葛氏云即是五尸之中尸疰又挾諸鬼邪為害也其病變動乃有三十六種至九十九種大畧令人寒熱沈沈嘿嘿不的知其所苦而無處不惡累年積月漸沈頓滯以至於死後復注易傍人乃至滅門覺如此候者宜急療之方獺肝一具右一味陰乾擣末水服一方寸匕日三如一具不差更作姚氏云神良肘後崔氏千金同又方桑根白皮灰二升蒸令氣出下以釜湯三四升三遍重淋取二升漬赤小豆二升一宿出風乾復漬汁盡止乃濕蒸令熟以羊肉或鹿肉作羮進此豆飯食一升漸至二三升重者七八升乃愈病去時體中覺疼痒淫淫或若根本不除重為之肘後同並出第一卷中疰病相染易方三首深師療鬼物前亡轉相染夢寤紛紜羸瘦往來寒熱嘿嘿煩悶欲寢復不能手足熱不能食或欲向壁悲涕或喜笑無常牛黄散方牛黄研鬼箭羽王不留行徐長卿一名鬼督郵逺志去心乾薑附子炮五味子石葦刮去黄皮黄芩茯苓各二分桂心一分代赭三分菖蒲四分麥門冬六分去心右十五味擣下篩以蜜生地黄汁相拌合復令相得以酒服方寸七日三忌猪肉冷水生葱羊肉餳醋物出第九卷中崔氏療江南三十六疰丸療轉疰滅門絶族族盡轉逐中外滅盡復易親友方雄黄研二分麥門冬去心三分一方用天門冬皂莢去皮子炙莽草炙各二分鬼臼三分巴豆去心皮熬二分右六味擣篩蜜和為丸如小豆服二丸日一服忌鯉魚野猪肉蘆笋又赤丸療人久疰室家相傳乃至滅族方雄黄二兩研馬目毒公鬼臼也丹砂研各二兩真珠一兩研藜蘆熬二兩巴豆八十枚去心皮熬皂莢一兩去皮子炙莽草炙二兩右八味擣篩蜜和丸如小豆一服二丸吐下惡蟲數十枚忌野猪肉蘆笋生血物並出第七卷中鬼疰方二首病源注之言住也言其連滯停住也人有先無他病忽被鬼排擊時或心腹刺痛或悶絶倒地如中惡之類其得差之後餘氣不歇停住積久有時發動連滯停住乃至於死死後注易傍人故謂之鬼疰也出第二十四卷中古今錄驗神秘丸療鬼疰邪忤飛尸疰擊犬馬嚙蜂蛇毒螫盡皆消除方大黄四兩硝石三兩熬巴豆去心皮熬雄黄研各二兩右四味擣篩蜜和丸如小豆先食服二丸日一服忌野猪肉蘆笋出第七卷中崔氏蜀金牙散療鬼疰風邪鬼語尸疰或在脊脅流無常處不喜見人意志不定面目脫色目赤鼻張唇焦爪甲黄方金牙一分研蜈蚣炙蜥蜴石上者炙附子炮各一枚人參四分蜣蜋七枚炙徐長卿芫青炙斑猫去翅足熬各十四枚雄黄一分研桂心四分鬼臼二分葛根一分炙毒公三分芎藭二分石長生椒去汗目大黄甘草炙蛇蛻皮炙露蜂房炙曽青無藍青代别研真珠别研丹砂各二分鬼督郵烏頭狼毒各二分石膏五分研䕡茹一分蕪荑鬼箭藜蘆炙鸛骨炙雷丸乾漆熬龜甲炙各二分狼牙四分亭長七枚炙貝母二枚凝水石五分牛黄别研胡燕屎各四分桔梗三分鐵精一分研硝石二分研右四十五味擣篩為散先食酒服一刀圭日再不知稍増之有蠱隨大小便出也忌猪肉冷水生葱海藻菘菜生血物貍肉深師千金同出第七卷中鬼疰心腹痛方一首古今錄驗還命千金丸療萬病心腹積聚堅結胷脅逆滿欬吐宿食不消中風鬼疰入腹面目青黑不知人方雄黄研鬼臼徐長卿野葛七分炙𤓰丁雌黄研乾薑各四分射肉二分斑猫二十枚去足翅熬蜀椒四分去目汗丹參四分礜石泥裹燒半日地膽十五枚去翅熬右十三味擣篩蜜和擣三千杵丸如小豆先食服一丸日三不知漸増以知為度若百毒所螫牛觸踐馬所蹋嚙癕腫瘰癧以一丸於掌中唾和塗痛上立愈正月旦以椒酒率家中大小各服一丸終嵗無病神良有驗祕不傳出第六卷中鬼疰羸瘦方二首古今錄驗黄帝䕶命千金丸療羸瘦厯年胷滿結疹飲食變吐宿食不下中風鬼疰疾瘦方野葛七寸炙斑猫二十枚去足翅熬雄黄研雌黄鬼臼𤓰丁丹砂研礜石泥裹燒半日沙參莽草炙椒去目汗各一兩地膽十五枚去足翅熬右十二味擣下篩蜜和擣三千杵丸如梧子服五丸日二卒中惡氣絶不知人服如小豆二丸老小半之牛馬所觸踐癕腫若蟲毒所嚙取一丸著掌中唾和塗瘡中毒上立愈正月旦以酒率家中大小各一丸一嵗不病若傷寒身熱服一丸若欲視病服一丸病者共卧不恐忌生血物又犀角丸療百病鬼疰惡風入人皮膚淫淫液液流無常處四肢不仁牽引腰背腹脹滿心痛逆氣填胷不得飲食噏噏短氣寒熱羸瘦喜惡夢與鬼神交通熱欬唾膿血皆療之方犀角屑桂心各三分羚羊角屑牛黄鬼臼附子炮獺肝炙各二分巴豆三十枚去心皮熬蜈蚣四枚去足炙麝香研真珠雄黄研丹砂研各四分射肉一分貝齒十箇燒右十五味擣篩蜜和擣五千杵平旦服如胡豆二丸日三慎生葱猪肉冷水蘆笋生血等物並出第六卷中鬼氣方三首崔氏療鬼氣辟邪惡阿魏藥安息香方阿魏藥即湼盤經云央匱是也服法旦取棗許大研之為末又取牛乳一大升煎之五六沸停令熱定取鴨子許大和攪服之更以餘乳盪盞飲之取盡至暮又取安息香亦如棗許大分如梧子還以熟牛乳服之令盡每日旦暮常然若無乳者即以煮肉汁服之患久者不過十日近者不過五日如過三十日不愈便停只得食脯肉之屬但是一切菜不得近口特忌特忌禮部孫侍郎家中有此病所在訪問有人從梁漢來云官人百姓服此得効者十餘家孫侍郎即令依方進服七八日即効便以此法傳授親知得驗者非一余時任度支郎中欲廣其効故錄之出第七卷中延年療鬼氣骨蒸氣日漸羸方獺肝十六分炙人參沙參丹參各三分鬼臼苦參各二分右六味擣篩蜜和丸如梧子大一服十丸飲汁下日三服加至十丸禁生冷猪魚肉生血等物又五香丸主天行瘟疫惡氣熱毒心肋氣滿脹急及疰鬼氣等方青木香犀角屑升麻羚羊角屑黄芩梔子仁各六分沈香丁香薫陸香各四分麝香鬼臼各二分大黄芒硝各八分右十三味擣篩蜜和丸如梧子一服三丸飲下日三服加至七丸以差止禁蒜麫猪魚並出第十一卷中鬼魅精魅方八首病源凡人有為鬼物所魅則好悲而心自動或心亂如醉狂言驚怖向壁悲啼夢寐喜魘或與鬼神交通病苦乍寒乍熱心腹滿短氣不能食此魅之所持也出第二卷中廣濟療傳屍骨蒸殗殜肺痿疰忤鬼氣卒心痛霍亂吐痢時氣鬼魅瘴瘧赤白暴痢瘀血月閉痃癖丁腫驚癎鬼忤中人吐乳狐魅吃力迦丸方吃力迦即白术光明砂研麝香當門子訶黎勒皮香附子中白沈香重者青木香丁子香安息香白檀香畢撥上者犀角各一兩薰陸香蘓合香龍腦香各半兩右十五味擣篩極細白蜜煎去沫和為丸每朝取井華水服如梧子四丸於淨器中研破服老小每碎一丸服之仍取一丸如彈丸蠟紙裹緋袋盛當心帶之一切邪鬼不敢近千金不傳冷水煖水臨時斟量忌生血肉臘月合之有神蔵於宻器中勿令洩氣出秘之忌生血物桃李雀肉青魚酢等又療精魅病方水銀一兩右取水銀内漿水一升炭火上煎三分減二即去火取水銀如熟豆大取當日神符裹水銀空服呑之晚又呑一服三日止無所忌並出第四卷中肘後療卒中邪魅恍惚振噤之方灸鼻下人中及兩手足大指爪甲本令艾丸半在爪上半在肉上各七壯不止至十四壯便愈集驗同出第三卷中深師五邪丸療邪狂鬼魅妄言狂走恍惚不識人此為鬼魅當得殺鬼丸方丹砂研雄黄研馬目毒公龍骨鬼箭各五兩鬼臼二兩赤小豆三兩芫青一枚桃仁百枚去皮尖熬别研右九味擣下篩别研雄黄丹砂細絹篩合諸藥拌令和調後内蠟和之大如彈丸絳嚢盛之繫臂男左女右小兒繫頭合藥勿令婦人雞犬見之所服蜜和丸如梧子一服三丸日三忌五辛生血物出第九卷中小品療鬼魅四物鳶頭散方東海鳶頭是由䟦根黄牙石又名金牙莨菪防葵各一分右藥擣下篩以酒服方寸匕欲令病人見鬼増防葵一分欲令知鬼疰者復増一分立有驗防葵莨菪並令人迷惑恍惚如狂不可多服備急千金同出第五卷中集驗療男子得鬼魅欲死所見驚怖欲走時有休止皆邪氣所為不能自絶九物牛黄丸方荆實人精也曽青蒼龍精也研玉屑白虎精也研牛黄土精也研雄黄地精也研空青天精也研赤石脂朱雀精也𤣥參真武精也龍骨水精也各一兩凡丸物名曰九精上通九天下通九地右擣下篩蜜和丸如小豆先食呑一丸日三稍加以知為度忌羊血文仲千金并翼同出第三卷中必効辟鬼魅方虎爪赤朱雄黄蟹爪右四味擣令碎以松脂融及煖和為丸不然硬正朝旦及有狐鬼處焚之甚効以薫巫人即神去王三師云奇効忌生血物出第四卷中近効大麝香丸療積年心痛尸疰蠱毒癥癖氣乘心兩肋下有塊温瘴精魅邪氣或悲或哭蛇蠍蜂等所螫並療之方麝香牛黄藜蘆炙朱砂蜀當歸茯苓桔梗鬼箭羽金牙烏頭炮桂心呉茱茰貫衆丹參各一分蜈蚣去足炙乾薑人參虎骨各二分鬼臼半分芍藥雄黄各一分半巴豆二十枚去心皮熬蜥蜴半枚炙右二十三味擣篩蜜和丸如梧子以飲下三丸至辰時下利若不利熱飲投之即利三兩行後冷醋飲止之即定然後煮葱食之勿食冷水明日依前服之永差忌熱麫生菜柿子梨等蛇蠍蜂螫取一丸研破和醋塗之便差精鬼狐狸之屬抛塼瓦或如兵馬行夜發者是鬼魅無早晚每日服前藥兩丸只三兩日服即差仍每日燒一丸熏身體及衣裳宅中燒之亦好無患人以三五丸緋絹袋盛繫左臂上辟虎毒蛇諸精鬼魅等忌狸肉生血物猪肉生葱蘆笋鬼神交通方四首崔氏療夢與鬼神交通及狐狸精魅等方野狐鼻炙豹鼻炙各七枚狐頭骨一具炙雄黄腽肭臍鬼箭羽露蜂房炙白术虎頭骨炙各一兩阿魏藥二兩炙驢馬狗駞牛等毛各四分燒作灰若骨蒸加死人腦骨一兩炙右十五味並大秤兩擣篩為散攪使調勻又先以水煮松脂候烊接取以和散和散之時勿以手攪將虎爪攪和為丸如彈丸以熏患者欲熏之時葢覆衣被勿令藥煙洩外别擣雄黄為末以藉藥燒藥節度一如熏香法其藥欲分於牀下燒熏彌善忌桃李雀肉等出第七卷中備急陶氏療女人與鬼物交通獨言笑或悲思恍惚方松脂三兩烊内雄黄末一兩右二味用虎爪攪令調丸如彈丸夜内籠中燒之令女祼坐籠上被急自蒙唯出頭耳過三熏即斷深師同又方雄黄人參防風各二兩五味子一升右四味為散早以井華水服方寸匕日三服又若男女喜夢鬼通致恍惚者方鹿角屑酒服三撮日三並出第二卷中白虎方五首近効論白虎病者大都是風寒暑濕之毒因虚所致將攝失理受此風邪經脈結滯血氣不行畜於骨節之間或在四肢肉色不變其疾晝靜而夜發發即徹髓酸疼乍歇其病如虎之嚙故名曰白虎之病也廣濟療白虎方犀角屑當歸芍藥各六分牛膝沈香青木香虎頭骨炙各八分麝香一分研槲葉脈一握炙右九味切以水六升煮取二升六合去滓分温三服如人行四五里進一服别加麝香末服之不利忌生菜熱麫蕎麥蒜出第四卷中蘇孝澄療白虎病云婦人丈夫皆有此病婦人因産犯之丈夫眠臥犯之為犯白虎爾其病口噤手拳氣不出方灸臍中七壯一云灸膻中七壯近効療白虎方炭灰五升無炭灰桑灰亦得紗羅羅之一遍蚯蚓糞一升擣之紅藍花七捻右三味一處攪和熬令熱取好釅醋煖之拌令浥浥以故布三四重裹分作四分更畨當所患痛處熨之數數轉勿住手挼之冷熱得所寧令小熱不得作冷冷即復熬令熱又熨之並用後呪法云青􅟡皮青毛出黄􅟡皮黄毛出赤􅟡皮赤毛出白􅟡皮白毛出黑􅟡皮黑毛出急出吾口神吾口聖唾山山崩唾石石裂得汝字汝不去斫頭斫頭急急如律令其呪法先令人唾痛處以手挼之不住手便即誦此呪不限遍數以差即停當誦呪不得令病人及傍人聞呪須先淨潄口潔淨良効無比千金勿傳又療風毒腫一切惡腫白虎病並差方取三年釅醋五升熱煎三五沸切葱白三二升煮一沸許即爪籬漉出布帛熱裹當病上熨之以差為度又療白虎方猪肉三串大麻子一合酒半盞右三味和麻子口含噀上將猪肉三串手擘向痛處來去呪曰相州張如意張得興是汝白虎本師急出呪訖將肉安床下差送頭路神驗無辜方二首崔氏無辜閃癖或頭乾瘰􅕅頭髪黄聳分去或乍痢乍差諸狀既多不可備說大黄煎丸方大黄九兩錦文新實者若㣲朽即不堪用削去蒼皮乃秤右一味擣篩為散以上好米醋三升和之置銅椀内於大鐺中浮湯上炭火煮之火不用猛又以竹木箆攪藥候堪丸乃停於小瓷器中密貯兒年三嵗一服七丸如梧子日再服常以下青赤膿為度若不下膿或下膿少者稍稍加丸下膿若多丸又須減病重者或至七八劑方盡根本大人小兒不等以意量之此藥唯下膿及宿結不令兒痢禁牛馬驢雞猪魚兔肉生冷粘滑油膩小豆蕎麥乳母亦同此忌又療無辜腦後兩畔有小結者方無辜之病此結為根欲療者先看結之大小然後取細竹斟酌籠得此結便截竹使斷狀如指環形仍將此竹籠結自然不得轉動以火針針結子中央作兩下去針訖乃塗少許膏藥無者雜油亦得須待三兩日又如前報針更經一兩日當膿水自出若不出復如前針候膿潰盡結便自散俗法多用刀子頭割者謂之割無辜比來參詳殊不如針之以絶根本恐患者不悉故復重說之並出第七卷中除骨熱方四首范汪療骨熱狸骨丸方狸骨連翹各五分土𤓰山茱茰𤣥參胡鷰屎黄芩丹砂馬目毒公鳶尾各二分黄連芍藥雄黄青葙子龍膽栝蔞各三分右十六味擣篩蜜和丸如梧子先食服三丸日三不知稍稍増之以知為度禁食生魚菜猪肉黄黍米生血物古今録驗同古今録驗除熱三黄丸療骨熱身多瘡瘰癧癕腫者方大黄黄芩黄連當歸茯苓桂心乾薑芍藥各二分梔子一十四枚擘柴胡三分右十味擣篩蜜和丸先食服如小豆三丸不知増至十丸欲取㣲利以意増之久服益良忌生葱醋物猪肉冷水又方大黄黄連黄芩各一兩芒硝二兩右四味擣篩蜜和為丸一服五丸漸加以知為度忌猪肉冷水並出第四卷中盜汗方七首病源盜汗者因眠睡而身體流汗也此由陽虚所致久不已令人羸瘠枯瘦心氣不足亡津液故也診其脈男子平人脈虚弱細㣲皆為盜汗脈也出第三卷中崔氏療盜汗夜睡中即汗汗不休必得風方麻黄根細切小麥各二升右二味以水一斗二升煮小麥得九升内麻黄根煮之得三升去滓分為三服常夜服之不過兩劑即止又方甘皮薑各一兩杏仁三兩去尖皮熬當歸四兩右四味擣合蜜和丸服如梧子五丸漸漸増之又方取死人席緣燒作灰淋汁熱洗從頭至足愈又止汗粉方朱規送麻黄根牡蠣粉敗扇灰栝樓各三兩白术二兩米粉三升右六味擣諸藥下篩為散和粉攪令調以生絹袋盛用粉身體日三兩度忌桃李雀肉仍灸大椎五六百炷日灸二七五七任意不能日别灸亦得汗即漸止並出第三卷中延年主盜汗夜卧床席衣被並濕方牡蠣碎之綿褁麻黄根各三兩黄芪人參各二兩龍骨打碎枸把根白皮各四兩大棗七枚擘右七味切以水六升煮取二升五合去滓分温六服如人行八九里久中間任食一日令盡禁蒜熱麫等物又療夜臥盜汗方左顧牡蠣黄芪各三兩麻黄根五兩杜仲二兩右四味擣篩為散一服方寸匕日三夜一服用敗蒲扇煮取汁下藥禁蒜麫並出第一卷中古今錄驗療盜汗麻黄散方麻黄根三分故扇燒屑一分右二味擣下篩以乳服三分仍日三大人方寸匕日三不知益之又以乾薑三分粉三分擣合以粉粉之大善出第十卷中外臺秘要方卷十三
